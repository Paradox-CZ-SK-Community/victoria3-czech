 je_divided_monarchists_reason: "Tři dynastické linie mají nárok na francouzský trůn: #bold Orléanisté#!, kteří podporují konstituční červencovou monarchii z roku 1830, #bold legitimisté#! podporující sesazeného Karla X. z rodu Bourbonů a jeho potomky, a #bold bonapartisté#! usilující o návrat rodiny Napoleona Bonaparta k moci. Všichni tři monarchisté soupeří jak s vládnoucími silami, tak mezi sebou o dosazení svého kandidáta na francouzský trůn."
