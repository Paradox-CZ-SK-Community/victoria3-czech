 french_pretenders.6.t: "Prozatímní vláda"
 french_pretenders.6.d: "Krize v celé zemi [ROOT.GetCountry.GetName] se ukázala být nad síly [SCOPE.sCharacter('old_ruler_scope').GetFullName]. [SCOPE.sCharacter('monarch_scope').GetSheHe|U] byl nucen abdikovat a uprchnout ze země a byla vyhlášena prozatímní republikánská vláda."
 french_pretenders.6.f: "„Od toho dne vycházely z myslí inovátorů tisíce podivných systémů a šířily se v neklidných myslích davu. Všechno stále stálo kromě monarchie a parlamentu a zdálo se, že otřesem revoluce byla sama společnost rozprášena v prach a že nová podoba, kterou měla společnost získat, byla vystavena soutěži.“\n\n— Alexis de Tocqueville"
 french_pretenders.6.a: "Ať žije republika!"
 je_cement_the_rightful_dynasty_fake: "Přidá #bold Upevnit rod právoplatného nárokovatele#! do deníku země [SCOPE.sCountry('reflexive_reference_france').GetName]"
 je_cement_the_rightful_dynasty: "Upevnit rod [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')]"
 je_cement_the_rightful_dynasty_progressing_fast: "Vláda dynastie [ROOT.GetCountry.GetCustom('french_dynasty')] stojí bez odporu."
 je_cement_the_rightful_dynasty_progressing_normal: "Nárok dynastie [ROOT.GetCountry.GetCustom('french_dynasty')] na trůn je silný."
 je_cement_the_rightful_dynasty_progressing_slow: "Dynastie [ROOT.GetCountry.GetCustom('french_dynasty')] usilovně pracuje na zajištění své vlády."
 je_cement_the_rightful_dynasty_progressing_civil_war: "Rod [JournalEntry.GetCountry.GetCustom('french_dynasty')] se ocitl v #r občanské válce#!."
 je_cement_the_rightful_dynasty_progressing_low_legitimacy: "Právo dynastie [ROOT.GetCountry.GetCustom('french_dynasty')] vládnout je široce #r zpochybňováno#!."
 je_cement_the_rightful_dynasty_goal: "Dynastie [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] udržuje nepřerušenou vládu alespoň na úrovni [GetLegitimacyLevel('legitimacy_level_contested').GetName] [concept_legitimacy]. Čím vyšší $concept_legitimacy$ dynastie dosáhne, tím dříve si zajistí trůn."
 je_cement_the_rightful_dynasty_reason: "Francie je neklidná země a v posledních generacích zažila více vlád, než některé jiné země zažily za celá staletí. Aby monarchie pevně zakořenila, musí rod [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] prokázat, že dokáže zajistit stabilitu, po níž Francie volá."
 dynasty_orleans: "Orléans"
 dynasty_bourbon: "Bourbon"
 dynasty_bonaparte: "Bonaparte"
 dynasty_generic_royalist: "Pravý nárokovatel"
 french_pretenders_pulse.1.t: "Svět [SCOPE.sCharacter('french_royalist_writer').GetIdeology.GetNameNoFormatting]"
 french_pretenders_pulse.1.d: "[SCOPE.sCharacter('french_royalist_writer').GetFullName], výmluvný vůdce [SCOPE.gsInterestGroup('french_royalist_writer_ig').GetName], sepsal působivý traktát popisující politický program [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')]."
 french_pretenders_pulse.1.f: "„Přátelé! Musíme snít o lepším zítřku pro celou Francii. Co je současný režim než krutá karikatura francouzských dějin, všeho, za co kdy bojovala a čeho kdy dosáhla? Abychom národ obnovili a posunuli vpřed, musíme vytvořit novou společnost, která si vezme to nejlepší z naší historie a tradic a vytvoří řád, jenž obstojí v náporu modernity!“"
 french_pretenders_pulse.1.a: "Vytvořme nové zítřky s rodem [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')]!"
 french_pretenders_pulse.1.b: "Celý národ musí slyšet, co dynastie [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] plánuje do budoucna!"
 french_pretenders_pulse.1.c: "[SCOPE.sCharacter('french_royalist_writer').GetLastName] a [SCOPE.gsInterestGroup('french_royalist_writer_ig').GetName] si za tuto práci zaslouží uznání!"
 french_pretenders_pulse.2.t: "Věrnost a křivopřísežnictví"
 french_pretenders_pulse.2.d: "Monarchisté mezi [SCOPE.gsInterestGroup('royalist_hardliners').GetName] odmítají složit přísahu věrnosti současné vládě. Ač ideologicky čistí, může to podkopat jejich snahu budovat politický kapitál v zemi."
 french_pretenders_pulse.2.f: "„Jak mohu přísahat věrnost nějakému samozvanému režimu? Udělat to by znamenalo zradit korunu a přiznat této zvrácené karikatuře Francie legitimitu, kterou si nezaslouží. Ne, říkám! Nikdy tomuto bastardskému režimu sloužit nebudu.“"
 french_pretenders_pulse.2.a: "[SCOPE.gsInterestGroup('royalist_hardliners').GetName] prokazují obdivuhodnou oddanost svým ideálům."
 french_pretenders_pulse.2.b: "Realistický kompromis pomůže věci, ale rozhněvá radikály."
 french_pretenders_pulse_advance_by_five_percent_tt: "Monarchistická věc postoupí o #bold 5%#!."
 french_pretenders_pulse_advance_by_fifteen_percent_tt: "Monarchistická věc postoupí o #bold 15%#!."
 french_pretenders_pulse_advance_by_twenty_five_percent_tt: "Monarchistická věc postoupí o #bold 25%#!."
 french_pretenders_pulse_back_by_five_percent_tt: "Monarchistická věc bude oslabena o #bold 5%#!."
 french_pretenders_pulse_back_by_fifteen_percent_tt: "Monarchistická věc bude oslabena o #bold 15%#!."
 french_pretenders_pulse.3.t: "Podivní spojenci"
 french_pretenders_pulse.3.d: "[SCOPE.gsInterestGroup('monarchists_in_opposition').GetLeader.GetIdeology.GetName] [SCOPE.gsInterestGroup('monarchists_in_opposition').GetName] a [SCOPE.gsInterestGroup('republicans_in_opposition').GetLeader.GetIdeology.GetName] [SCOPE.gsInterestGroup('republicans_in_opposition').GetName] si uvědomují, že sdílejí jeden společný cíl: svržení současného režimu. Někteří stoupenci šli ještě dál a navzájem se podporují u soudů, při publikování traktátů a dalších opozičních aktivitách."
 french_pretenders_pulse.3.f: "„Nepřítel mého nepřítele je můj přítel, ne snad? Samozřejmě, ti tamhle došli ke špatným závěrům o tom, co je třeba udělat, ale ten most spálíme, až k němu dojdeme.“"
 french_pretenders_pulse.3.a: "Zničení režimu vyžaduje solidaritu všech."
 french_pretenders_pulse.3.b: "Je lepší být sám a mít pravdu než dělat kompromisy se špatnou společností."
 french_pretenders_pulse.3.c: "Taková nepřirozená spolupráce nemůže dlouho vydržet."
 french_pretenders_pulse.4.t: "Republikánská apostaze"
 french_pretenders_pulse.4.d: "[SCOPE.gsInterestGroup('monarchist_french_ig').GetName] a [SCOPE.gsInterestGroup('republican_french_ig').GetName] si během společného působení v opozici vytvořily překvapivě blízký vztah. Po [SCOPE.sCharacter('monarchist_french_ig_leader').GetIdeology.GetNameNoFormatting] restauraci oznámil [SCOPE.sCharacter('republican_french_ig_leader').GetFullName] svůj přechod k monarchistické věci svých bývalých spojenců."
 french_pretenders_pulse.4.f: "„Obdivoval jsem odhodlání a houževnatost [SCOPE.gsInterestGroup('monarchist_french_ig').GetNameNoFormatting], když byli pronásledováni úřady, a rád vzpomínám na spolupráci s [SCOPE.sCharacter('monarchist_french_ig_leader').GetFullNameNoFormatting], výjimečnou a schopnou osobností. Je zřejmé, že jejich věc je i mou věcí, a vyzývám své krajany, aby následovali můj příklad.“"
 french_pretenders_pulse.4.a: "Tento „damašský obrat“ [SCOPE.gsInterestGroup('republican_french_ig').GetName] vítáme!"
 french_pretenders_pulse.4.b: "Jednou republikán, navždy republikán — odmítněte [SCOPE.sCharacter('republican_french_ig_leader').GetHerHim]."
 french_pretenders_pulse.4.b.tt: "[SCOPE.sCharacter('republican_french_ig_leader').GetFullName] po tomto ponížení opustí [SCOPE.gsInterestGroup('republican_french_ig').GetName]."
 french_pretenders_pulse.5.t: "Věčný rod [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')]"
 french_pretenders_pulse.5.d: "Dynastie [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] upevnila svou moc nad francouzskou korunou natolik, že žádní jiní uchazeči již nepředstavují vážnou výzvu jejím monarchistickým nárokům."
 french_pretenders_pulse.5.f: "„Přátelé! Má náš velký panovník [SCOPE.sCharacter('monarch_of_france').GetFullNameNoFormatting] sobě rovného? Ne, říkám! [SCOPE.sCharacter('monarch_of_france').GetSheHe|U] je středem vesmíru, jediným skutečným pilířem řádu a národa. Rod [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] nemá sobě rovného!“"
 french_pretenders_the_dynasty_is_secure: "Žádná jiná dynastie již nikdy nezpochybní vládnoucí rod."
 french_pretenders_pulse.5.a: "[SCOPE.sCharacter('monarch_of_france').GetFullNameNoFormatting] nemá sobě rovného."
 french_pretenders_pulse.5.b: "Stoupenci dynastie [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] si zaslouží veškerou chválu!"
 indochina.1.t: "Vymáhání protikatolických ediktů"
 indochina.1.d: "Radikálové požadují důslednější vymáhání protikatolických ediktů, které jsou součástí našich zákonů [GetLawType('law_state_religion').GetName]. Pronásledování však může vyvolat reakci katolických mocností."
 indochina.1.f: "„Udržme zemi uzavřenou! Prosím vás, lidé ze zámoří nám přinesou jen další potíže, pokud jim dovolíme zde zůstat. Musíme jejich agenty uvěznit a vyhnat jejich vlivy, pokud chceme zůstat silní a hrdí!“"
 indochina.1.a: "Zpřísněme protikatolické edikty."
 indochina.1.b: "Možná je lepší postupovat opatrně."
 indochina.2.t: "Intervence v Indočíně?"
 indochina.2.d: "Náboženské a imperiální zájmy se spojily a požadují zásah v Indočíně ve prospěch katolického obyvatelstva v [SCOPE.sCountry('potential_imperialism_target').GetName]."
 indochina.2.f: "„Naše činy vede vyšší poslání! S božským záměrem musíme vyrazit vpřed a zachránit naše bližní! A pokud při tom získáme nějaké území, kdo může říci, že to nebyla součást Božího plánu?“"
 indochina.2.a: "Vydejme se vpřed a udeřme na [SCOPE.sCountry('potential_imperialism_target').GetNameNoFormatting]!"
 indochina.2.b: "Měli bychom hledat mír, ne válku."
 indochina.3.t: "Odveta v Indočíně?"
 indochina.3.d: "Brutální pronásledování katolíků v [SCOPE.sCountry('indochina_target').GetName] přimělo jak jestřáby, tak věřící požadovat okamžitou tvrdou reakci."
 indochina.3.f: "„Jdeme na to — bude to rychlé, tam a zpět, jednoduché dvouměsíční dobrodružství.“"
 indochina.3.a: "[SCOPE.sCountry('indochina_target').GetNameNoFormatting] musí být potrestána a Indočína otevřena!"
 indochina.4.t: "Indočínská unie"
 indochina.4.d: "Naše kontrola nad Indočínou se natolik rozrostla a upevnila, že naše území tam lze považovat za úspěšné sjednocení kolonií a protektorátů."
 indochina.4.f: "„S jednotou mysli, těla i ducha budeme slavit. Metropole a Indočína nyní jednají jako jeden celek, mluví jedním hlasem, cítí jako jeden. Naše národy jsou sjednoceny a nikdy nebudou rozděleny. Jak by tomu mohlo být jinak?“"
 indochina.4.a: "Šiřme naše hodnoty mezi obyvatelstvem."
 indochina.4.b: "Podpořme produkci kaučuku v koloniích."
 indochina.4.c: "Podpořme nám loajální knížata v Indočíně."
 indochina.4.dd: "Podpořme naši slavnou vládu!"
 je_indochina: "Kampaň v Indočíně"
 je_indochina_reason: "Pronásledování katolické menšiny místními mocnostmi v oblasti Indočíny nám poskytlo casus belli k zásahu. Musíme prosadit svou autoritu v tomto sporném regionu a zvláštní úsilí věnovat tomu, aby mocnosti, které katolíky pronásledují, podrobily naši vůli."
 indochina_state_controlled_by_us_or_puppet: "Stát v oblasti [SCOPE.sStateRegion('indochina_capital_state_scope').GetName] je vlastněn [ROOT.GetCountry.GetName] nebo jeho [ROOT.GetCountry.GetAdjectiveNoFormatting] [concept_subject]"
 conquered_indochina_target_tt: "Ovládli jsme všechna území patřící [SCOPE.sCountry('indochina_conquest_target').GetName]"
 conquered_indochina_target_blank_tt: "Ovládli jsme všechna území původně patřící zahajující zemi"
 indochina_five_states_conquered: "Alespoň #bold 5#! států ve strategické oblasti Indočína je vlastněno námi nebo našimi závislými zeměmi"
 indochina_subjects_loyal: "Naše závislé země v Indočíně k nám budou přistupovat přátelštěji."
 popular_royalist_writer: "Populární roajalistický spisovatel"
 popular_royalist_book: "Populární roajalistická kniha"
 upset_royalist_hardliners: "Rozkol mezi radikálními roajaalisty"
 solidarity_in_opposition: "Solidarita v opozici"
 alone_with_principles: "Sám se svými zásadami"
 cryptomonarchists_in_our_ranks: "Kryptomonarchisté v našich řadách"
