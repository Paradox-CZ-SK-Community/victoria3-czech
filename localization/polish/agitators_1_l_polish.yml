 stalwarts_of_the_restoration: "Opory restaurace"
 too_gentle_on_missionaries: "Příliš mírní vůči misionářům"
 inaction_in_indochina: "Nečinnost v Indočíně"
 maintained_by_the_metropole: "Udržováno metropolí"
 indochinese_rubber: "Indočínský kaučuk"
 indochinese_assimilation_modifier: "Indočínská asimilace"
 indochinese_union_glory: "Sláva Indočínské unie"
 you_will_regret_this: "#color:Red;bold Pronásledování může vyvolat reakci zahraničních katolických mocností.#!"
 revolution_pulse1_events.1.t: "Seznamy členů odhaleny"
 revolution_pulse1_events.1.d: "Překvapivá policejní razie odhalila seznam radikálů spojených s [SCOPE.gsInterestGroup('membership_list_ig').GetName]. Existuje několik způsobů, jak lze tento seznam využít ve prospěch vlády."
 revolution_pulse1_events.1.f: "„Přišli na nás příliš rychle! Neměli jsme čas všechno schovat!“\n\n„Díky tomu teď potřebujeme čas schovat #italic všechny#!!“"
 revolution_pulse1_events.1.a: "Vypátrejte každého člena na seznamu."
 revolution_pulse1_events.1.b: "Veřejně odhalte vazby mezi [SCOPE.gsInterestGroup('membership_list_ig').GetName] a radikály."
 revolution_pulse1_events.1.c: "Na tomto seznamu potřebujeme jen jedno jméno: [SCOPE.sCharacter('membership_list_agitator').GetFullName]."
 revolution_pulse1_events.2.t: "Hněv na frontě"
 revolution_pulse1_events.2.d: "Rostoucí ztráty na frontě vedly k šíření řečí o vzpouře mezi vojáky. Pokud se brzy nezakročí, situace se může stát kritickou."
 revolution_pulse1_events.2.f: "„Pane, slyšel jste ten nový výhružný pokřik v kasárnách? ‚Zhasnout! Nože ven! Dej mu to!‘ Začíná to být ošklivé, pane. Obávám se, že samotná fronta už nevěří ve vítězství.“"
 revolution_pulse1_events.2.a: "Zatkněte reptající a pokračujte v boji."
 revolution_pulse1_events.2.b: "Nemůžeme si dovolit zadržovat vojáky."
 revolution_pulse1_events.2.c: "Musíme zastavit a nechat muže odpočinout."
 revolution_pulse1_events.3.t: "Stíhání vydavatelského výboru"
 revolution_pulse1_events.3.d: "Výbor vydavatelů spojený s [SCOPE.gsInterestGroup('publishing_committee_ig').GetName], který produkuje pobuřující pamflety, byl postaven před soud."
 revolution_pulse1_events.3.f: "„Tato skupina nebezpečných mužů musí být zastavena! Musíme jim odebrat prostředky k podněcování davu a srazit tyto arogantní hlupáky na jejich skutečnou úroveň — na pouhé bezvýznamné spiklence a zločince!“"
 revolution_pulse1_events.3.a: "Tlačte na jejich soudní proces."
 revolution_pulse1_events.3.b: "Potichu tyto vydavatele umlčte."
 revolution_pulse1_events.3.c: "Nechte je být. Jsou neškodní."
 revolution_pulse1_events.4.t: "Pekelný stroj"
 revolution_pulse1_events.4.d: "Pokus o život [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zabil mnoho lidí, ale našeho vládce ušetřil. Složitý přístroj, sám poškozený při útoku, je jedinou stopou, kterou revolucionáři na místě zanechali."
 revolution_pulse1_events.4.f: "„Těžko říct, co se stalo. Slyšel jsem tlumený výbuch, jako roztříštěnou salvu, a všude byl kouř a chaos. Lidé po mé pravici i levici padli na místě, ale mně se nic nestalo. Podíval jsem se směrem k [SCOPE.sCharacter('infernal_machine_ruler').GetPrimaryRoleTitle] a najednou tam kolem [SCOPE.sCharacter('infernal_machine_ruler').GetHerHim] zela krvavá prázdnota.“"
 revolution_pulse1_events.4.a: "Na čas omezte veřejná vystoupení [SCOPE.sCharacter('infernal_machine_ruler').GetFullName]."
 revolution_pulse1_events.4.b: "Tento zločin je zjevně dílem [SCOPE.sCharacter('infernal_agitator').GetFullName]."
 revolution_pulse1_events.5.t: "Náhražková strava"
 revolution_pulse1_events.5.d: "Lidé v [SCOPE.sState('food_substitution_state').GetName] se zoufale snaží získat jakékoli jídlo. Regionem se šíří hrozivá varování před „řepnou zimou“."
 revolution_pulse1_events.5.f: "„Minulý týden jsme měli jen krmivo pro prasata. Tento týden... vlastně nevím, co to je. Jsou to piliny?“"
 revolution_pulse1_events.5.a: "Alespoň náhražky zaplní žaludky."
 revolution_pulse1_events.5.b: "Zkuste za každou cenu zvýšit místní produkci potravin."
 revolution_pulse1_events.5.c: "Pro [SCOPE.sState('food_substitution_state').GetName] nemůžeme nic udělat."
 revolution_pulse1_events.6.t: "Posvátná jednota"
 revolution_pulse1_events.6.d: "Válka pohlcuje národ a my musíme odložit naše rozdíly. Výzva k obraně země může uklidnit nepokoje doma, ale budeme muset nabídnout něco našim oponentům, aby se plně přidali."
 revolution_pulse1_events.6.f: "„V našem velkém boji vyzývá národ všechny své syny, aby povstali a bránili své rodiny, a žádá všechny politické vůdce, aby se zavázali, že budeme společně pokračovat až do dne vítězství. Tato posvátná jednota se nezlomí tváří v tvář obtížím ani nepřátelství!“"
 revolution_pulse1_events.6.a: "Ve válce nalezneme mír."
 revolution_pulse1_events.6.b: "Není důvod posilovat oponenty prázdnými sliby."
 revolution_pulse1_events.7.t: "Kolísající revolucionář"
 revolution_pulse1_events.7.d: "[SCOPE.sCharacter('guglielmo_pepe').GetPrimaryRoleTitle] [SCOPE.sCharacter('guglielmo_pepe').GetLastName], spojenec revoluční [SCOPE.gsInterestGroup('guglielmo_pepe_ig').GetName], má podle všeho pochybnosti o svém přesvědčení. Tuto nerozhodnost lze možná využít ve prospěch vlády."
 revolution_pulse1_events.7.f: "„Přátelé! Není to tak, že bych nechtěl povstání... jen mám obavy, víte. Já... ehm... jsem v dobré pozici, jen... co mám dělat? Co mám dělat?“"
 revolution_pulse1_events.7.a: "Přesvědčte [SCOPE.sCharacter('guglielmo_pepe').GetPrimaryRoleTitle], aby podpořil vládu."
 revolution_pulse1_events.7.b: "[SCOPE.sCharacter('guglielmo_pepe').GetFullName] není důvěryhodný. Zatkněte [SCOPE.sCharacter('guglielmo_pepe').GetHerHim]!"
 revolution_pulse1_events.8.t: "Námořníci zůstávají na břehu"
 revolution_pulse1_events.8.d: "Námořníci v [SCOPE.sState('coastal_navy_state').GetName] odmítli vyplout z přístavu. Rozsah vzpoury vyžaduje citlivý přístup."
 revolution_pulse1_events.8.f: "„Je to jednoduché. Máme požadavky. Nevyplujeme, dokud nebudou splněny.“"
 revolution_pulse1_events.8.a: "Zadržte muže a udržte incident v [SCOPE.sState('coastal_navy_state').GetName]."
 revolution_pulse1_events.8.b: "Donuťte muže nastoupit na lodě."
 revolution_pulse1_events.8.c: "Pokuste se s námořníky vyjednávat."
 revolution_pulse1_events.9.t: "Ohrožené zlaté rezervy"
 revolution_pulse1_events.9.d: "S rostoucí podporou revoluce v [SCOPE.sState('radical_capital').GetName] bylo navrženo přesunout státní zlaté rezervy do [SCOPE.sState('loyalist_province').GetName], kde bude menší šance, že je povstalci získají."
 revolution_pulse1_events.9.f: "„Uděláme to teď, nebo ztratíme poslední šanci udržet stabilní finanční základ, pokud dojde ke střetu. Ano, je tu riziko, že nás při tom chytí, ale to riziko musíme podstoupit.“"
 revolution_pulse1_events.9.a: "Pokuste se propašovat rezervy z hlavního města."
 revolution_pulse1_events.9.b: "Nechte zlaté rezervy v hlavním městě."
 revolution_pulse1_events.10.t: "Útěk z hlavního města"
 revolution_pulse1_events.10.d: "Rostoucí počet revolucionářů v [SCOPE.sState('potential_revolutionary_capital').GetName] znervózňuje vládu a vyvolává návrhy na dočasné přesunutí státních institucí do bezpečnější oblasti, například do [SCOPE.sState('potential_loyalist_capital').GetName]."
 revolution_pulse1_events.10.f: "„Každý den se cestou do úřadu lekám vlastního stínu. Vidím, jak na mě lidé zírají, a přísahám, že v jejich očích vidím dýky. Už to tady nevydržím! Prosím, musíme být v bezpečí #italic někde#!!“"
 revolution_pulse1_events.10.a: "Přesuňte část vlády do [SCOPE.sState('potential_loyalist_capital').GetName]."
 revolution_pulse1_events.10.b: "Projevte důvěru setrváním v [SCOPE.sState('potential_revolutionary_capital').GetName]."
 revolution_pulse1_events.11.t: "Doktor povstalců"
 revolution_pulse1_events.11.d: "Lékař v [SCOPE.sState('rebel_doctors_state').GetName] byl přistižen při pomoci zraněným disidentům a revolucionářům. Jeho pomoc nejen léčí pacienty, ale posiluje celé povstalecké hnutí."
 revolution_pulse1_events.11.f: "Obhájce si povzdechl a opřel se. Lékař byl naprosto nemožný klient — jeho obhajoba mu jen škodila. Jeho váhavost byla bolestivá a nedůvěra ke svému právníkovi i blízkým mu zničila šanci na mírnější trest."
 revolution_pulse1_events.11.a: "Prošetřete lékařskou profesi v [SCOPE.sState('rebel_doctors_state').GetName] kvůli sympatizantům."
 revolution_pulse1_events.11.b: "Byl to osamělý případ — není třeba to dál řešit."
 revolution_pulse1_events.12.t: "Za hranicemi"
 revolution_pulse1_events.12.d: "[SCOPE.sCharacter('safehaven_dissident').GetFullName], známý potížista, se usadil v [SCOPE.sCountry('safehaven_for_dissidents').GetName]. Využil tamní nezávislé orgány, aby se vyhnul zatčení."
 revolution_pulse1_events.12.f: "Zaklepání na dveře ho stále znervózňovalo, i když věděl, že je mimo dosah zákona. Alespoň si to myslel. Doufal v to."
 revolution_pulse1_events.12.a: "Požadujte vydání [SCOPE.sCharacter('safehaven_dissident').GetLastName]."
 revolution_pulse1_events.12.b: "Proveďte zásah v jeho domě v [SCOPE.sCountry('safehaven_for_dissidents').GetName]."
 revolution_pulse1_events.12.c: "Když je mimo dohled, není třeba se jím zabývat."
 revolution_pulse1_events.13.t: "Extradice!"
 revolution_pulse1_events.13.d: "Úřady z [SCOPE.sCountry('parent_of_safehaven').GetName] žádají o vydání [SCOPE.sCharacter('safehaven_dissident').GetFullName], disidenta žijícího v naší zemi."
 revolution_pulse1_events.13.f: "„To snad ne! Už jim platíme daně, zdravíme jejich vlajku a posloucháme jejich rozkazy — a teď chtějí #italic tohle#!? Má vůbec smysl nazývat se nezávislou zemí?“"
 revolution_pulse1_events.13.a: "Zatkneme [SCOPE.sCharacter('safehaven_dissident').GetFullName] pro [SCOPE.sCountry('parent_of_safehaven').GetName]."
 revolution_pulse1_events.13.a.tt: "[SCOPE.sCharacter('safehaven_dissident').GetFullName] již nikdy nebude moci agitovat."
 revolution_pulse1_events.13.a.tt2: "Změní postup [concept_civil_war] v [SCOPE.sCountry('parent_of_safehaven').GetName] o #v;g -10%#!"
 notification_revolution_pulse1_events13agitator_killed_name: "Žádost o vydání přijata."
 notification_revolution_pulse1_events13agitator_killed_desc: "Náš cílový agitátor byl vydán a uvězněn."
 notification_revolution_pulse1_events13agitator_killed_tooltip: "Naše žádost o vydání byla přijata a agitátor zatčen"
 revolution_pulse1_events.13.b: "Ne, s lidmi na našem území budeme jednat podle našich pravidel!"
 notification_revolution_pulse1_events13agitator_not_killed_name: "Žádost o vydání zamítnuta!"
 notification_revolution_pulse1_events13agitator_not_killed_desc: "Naše žádost o vydání byla odmítnuta a agitátor zůstává na svobodě."
 notification_revolution_pulse1_events13agitator_not_killed_tooltip: "Naše žádost o vydání byla zamítnuta"
 revolution_pulse1_events.14.t: "Nelegální vydání"
 revolution_pulse1_events.14.d: "Agenti z [SCOPE.sCountry('parent_of_safehaven').GetName] byli přistiženi při pokusu tajně unést [SCOPE.sCharacter('safehaven_dissident').GetFullName] a dopravit [SCOPE.sCharacter('safehaven_dissident').GetHerHim] zpět do své země."
 revolution_pulse1_events.14.f: "„Ti chlápci? Prosím vás, vypadali jako z nějaké romantické komedie, jak se snažili potichu vloupat do ložnice někoho na našem území. Máme plné právo je zastřelit, pokud chceme, vzhledem k tomu, jak porušovali naše zákony. [SCOPE.sCountry('parent_of_safehaven').GetNameNoFormatting] může jít k čertu.“"
 revolution_pulse1_events.14.a: "Nechte agenty dokončit jejich práci."
 notification_revolution_pulse1_events14agitator_belatedly_killed_name: "Agitátor dopaden."
 notification_revolution_pulse1_events14agitator_belatedly_killed_desc: "Náš cílový agitátor byl uvězněn našimi agenty."
 notification_revolution_pulse1_events14agitator_belatedly_killed_tooltip: "Náš zásah k dopadení agitátora byl úspěšný"
 revolution_pulse1_events.14.b: "Na našem území jedná pouze naše policie."
 notification_revolution_pulse1_events14safehaven_very_angry_name: "Tajný zásah odhalen!"
 notification_revolution_pulse1_events14safehaven_very_angry_desc: "Naši agenti byli zatčeni a cíl zůstává na svobodě."
 notification_revolution_pulse1_events14safehaven_very_angry_tooltip: "Náš pokus o zásah byl zastaven a agitátor zůstává na svobodě"
 revolution_pulse1_events.15.t: "Pevnost v moři hněvu"
 revolution_pulse1_events.15.d: "Davy obklíčily arzenál v [SCOPE.sState('besieged_arsenal').GetName] a hrozí, že se zmocní zbraní a munice uvnitř. Stráže zatím útoky odrážejí, ale bez posil arzenál padne do rukou povstalců."
 revolution_pulse1_events.15.f: "„Včera jsem nemohl spát. Velitel odmítá kapitulovat a střelba pokračuje jak z arzenálu, tak z pozic, které jej obklopují. Po jednom hlasitém výbuchu jsem vyskočil z postele a klekl si k modlitbě — modlil jsem se jako nikdy předtím.“"
 revolution_pulse1_events.15.a: "Posily mohou zvýšit napětí, ale jsou nutné."
 revolution_pulse1_events.15.b: "Kapitulace může povzbudit dav, ale musíme to riskovat."
 revolution_pulse1_events.16.t: "Dav se blíží"
 revolution_pulse1_events.16.d: "Rozvášněné davy v [SCOPE.sState('radicalized_state').GetName] jsou stále provokativnější při střetech s armádou. Tvrdá linie požaduje razantní zásah, zatímco umírnění chtějí, aby vojáci ustoupili jako první krok ke zklidnění situace."
 revolution_pulse1_events.16.f: "„Jedna salva bobulí už jednou zachránila situaci a může to udělat znovu — musíme ukázat sílu!“\n\n„Sílu? Hah! Kulky jsou přiznáním slabosti. Musíme jednat a mluvit, ukázat, že se nebojíme.“"
 revolution_pulse1_events.16.a: "Rozptylte dav silou."
 revolution_pulse1_events.16.b: "Nařiďte vojákům ustoupit."
 revolution_pulse1_events.17.t: "Průvod provokací"
 revolution_pulse1_events.17.d: "Disidenti v [SCOPE.sState('provocative_procession_state').GetName] plánují velký pochod kolem vládních budov. Tvrdí, že bude pokojný a neozbrojený, ale nepochybně se stane shromaždištěm nespokojených."
 revolution_pulse1_events.17.f: "„Ten zatracený průvod a ta příšerná hudba! Ani je nevidím, ale slyším je až sem.“"
 revolution_pulse1_events.17.a: "Zastavte pochod za každou cenu!"
 revolution_pulse1_events.17.b: "Nechte průvod proběhnout."
 revolution_pulse1_events.17.c: "Vyhlašte zákaz vycházení a důsledně jej vymáhejte."
 revolution_pulse1_events.18.t: "Když máte kladivo"
 revolution_pulse1_events.18.d: "[SCOPE.sCharacter('will_kill_for_peace_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('will_kill_for_peace_general').GetFullName] navrhl použít armádu k potlačení nepokojů v [SCOPE.sState('will_kill_for_peace_state').GetName]. Jeho spojenci ho podporují, ale plán nese značná rizika."
 revolution_pulse1_events.18.f: "„Je to jednoduché — máme armádu a tamhle je nepřítel. Nechte mě nasadit vojáky a udělat, co je třeba, a nepřítel bude poražen. Nic víc v tom není!“"
 revolution_pulse1_events.18.a: "Pokárejte [SCOPE.sCharacter('will_kill_for_peace_general').GetPrimaryRoleTitle] a plán odmítněte."
 revolution_pulse1_events.18.b: "Musíme využít nástroje, které máme."
 revolution_pulse1_events.18.c: "Možná by mohl navrhnout mírnější řešení."
 revolution_pulse1_events.18.dd: "Hrubá síla může být nejlepší volba."
 our_general_is_disrespected: "Náš generál je znevážen"
 revolution_pulse1_events.19.t: "Pouliční patová situace"
 revolution_pulse1_events.19.d: "Vojáci v [SCOPE.sState('mob_gathering_state').GetName] hlásí stále častější střety s davy. Boj může brzy vypuknout i bez rozkazu. Situaci lze zvládnout jen dvěma způsoby: stáhnout jednotky, nebo nařídit útok."
 revolution_pulse1_events.19.f: "Voják nervózně přešlapoval a svíral zbraň, zatímco sledoval dav nebezpečně blízko. Některé tváře mu byly povědomé — nebo by byly, kdyby nebyly zkřivené nenávistí. Co tu vlastně dělá? Stojí na správné straně?"
 revolution_pulse1_events.19.a: "Nařiďte stažení z [SCOPE.sState('mob_gathering_state').GetName]."
 revolution_pulse1_events.19.b: "Nařiďte postup proti davu."
 revolution_pulse1_events.19.c: "Naši muži jsou profesionálové! Udrží disciplínu."
 revolution_pulse1_events.19.dd: "Armáda a lid jsou jedno — ať si to vyříkají."
 1848.10.t: "Rostoucí frustrace"
 1848.10.d: "Nespokojení členové [SCOPE.gsInterestGroup('disgruntled_ig').GetName] jsou frustrováni tím, že jim stát odmítá poskytnout přístup k jakýmkoli orgánům vlády a zcela je ignoruje. Zejména [SCOPE.sCharacter('disgruntled_ig_leader').GetFullName] začal stupňovat svou protivládní rétoriku, přičemž do ní vnáší i překvapivé ideologické myšlenky."
 1848.10.f: "„Tato vláda nemá obdoby v rozsahu svých křivopřísežností! Její odhodlání umlčet hlas lidu je doprovázeno řadou zločinů — krádežemi, ničením majetku, vraždami, zmrzačením a mnoha dalšími. Lidstvo se zachvěje, až bude číst tuto hanebnou kapitolu dějin!“"
 1848.10.a: "Odmítněme ustoupit těmto křiklounům."
 1848.10.b: "Alespoň jim dovolme podávat petice."
 1848.11.t: "Finanční tíseň"
 1848.11.d: "Rostoucí deficit a vysoké daně vedly k hospodářskému úpadku. [SCOPE.gsInterestGroup('squeezed_ig').GetName] byly tímto poklesem obzvláště zasaženy a [SCOPE.sCharacter('squeezed_ig_leader').GetFullName] požaduje od vlády úlevu."
 1848.11.f: "„Někteří říkají, že těžké časy z nás udělají silné lidi, zocelené utrpením a moudřejší díky zkušenostem. Dovolím si pokorně zeptat těchto vzdělanců, zda se sami podrobují těmto útrapám, aby rostli a učili se?“"
 1848.11.a: "[SCOPE.gsInterestGroup('squeezed_ig').GetName] se musí postarat sami o sebe."
 1848.11.b: "Můžeme jejich situaci alespoň částečně zmírnit."
 1848.12.t: "Chlebová krize"
 1848.12.d: "Probíhající krize v [SCOPE.sState('1848_famine_state').GetName] vedla [SCOPE.gsInterestGroup('famine_radicalized_ig').GetName] k tomu, aby promluvily jménem regionu a ostře kritizovaly vládu."
 1848.12.f: "„To je nepřijatelné! Pokud vláda nedokáže nasytit vlastní lid, co vlastně dokáže?“"
 1848.12.a: "Stížnosti [SCOPE.gsInterestGroup('famine_radicalized_ig').GetName] nás neovlivní."
 1848.12.b: "Můžeme zavést část jejich navrhované pomoci."
 government_support_to_financially_distressed: "Podpora finančně strádajících"
 exiles_more_events.1.t: "Vlastenecké usmíření"
 exiles_more_events.1.d: "Tváří v tvář útoku na naši zemi nabídl [SCOPE.sCharacter('patriotic_exile_scope').GetFullName] své služby státu, který ho kdysi vyhnal do [concept_exile]. [SCOPE.gsInterestGroup('patriotic_exile_home_ig').GetName] tuto myšlenku obzvlášť nadšeně podporují."
 exiles_more_events.1.f: "„V těchto těžkých časech musíme setřít rozdíly mezi lidmi. V obleženém táboře nemůže být vnitřní nepřítel. Pouze bratři ve zbrani mohou odolat náporu, kterému nyní naše země čelí.“"
 exiles_more_events.1.a: "Návrat [SCOPE.sCharacter('patriotic_exile_scope').GetLastName] vítáme!"
 exiles_more_events.1.b: "[SCOPE.sCharacter('patriotic_exile_scope').GetLastName] chce sloužit vlasti? Dejte [SCOPE.sCharacter('patriotic_exile_scope').GetHerHim] zbraň."
 exiles_more_events.1.c: "Není čas na potížisty v našich řadách."
 exiles_more_events.2.t: "Sporný zásah"
 exiles_more_events.2.d: "Patová situace kolem [SCOPE.sLaw('interventionist_exile_law_scope').GetName] vedla [SCOPE.sCharacter('interventionist_exile_scope').GetFullName] k tomu, že se vložil do debaty a snaží se ji uzavřít."
 exiles_more_events.2.f: "„Když už jste o tomto zákoně tak dlouze debatovali, je načase, aby všichni zainteresovaní — tedy i já — konečně přispěli svým názorem. Jak jsem říkal předtím, než mě tento vyhnanec #italic hrubě#! přerušil, já—“"
 exiles_more_events.2.a: "Dobře, dovolme [SCOPE.sCharacter('interventionist_exile_scope').GetHerHim] návrat a vystoupení."
 exiles_more_events.2.b: "[SCOPE.sCharacter('interventionist_exile_scope').GetSheHe|U] může mluvit na dálku, ale vrátit se nesmí!"
 exiles_more_events.2.c: "[SCOPE.gsInterestGroup('interventionist_exile_ig').GetName] už nesdílejí názory [SCOPE.sCharacter('interventionist_exile_scope').GetFullName]."
 exiles_more_events.2.c.tt: "[SCOPE.sCharacter('interventionist_exile_scope').GetFullName] a [SCOPE.sCharacter('interventionist_exile_ig_leader').GetFullName] nejsou ideologicky sladěni."
 exiles_more_events.3.t: "Věc bez stoupenců"
 exiles_more_events.3.d: "Ačkoli [SCOPE.sCharacter('the_loneliest_little_agitator').GetFullName] stále bojuje za svou věc, už ho nikdo nenásleduje. Skleslý [SCOPE.sCharacter('the_loneliest_little_agitator').GetLastName] začal veřejně naznačovat, že možná se svou činností skončí."
 exiles_more_events.3.f: "„K čemu to je? Když už máme řečníky, mluví do prázdných sálů. Žádné davy, žádné prapory. A i když někdo poslouchá, nerozumí. Proč tu vůbec zůstávat?“"
 exiles_more_events.3.a: "Možná [SCOPE.sCharacter('the_loneliest_little_agitator').GetFullName] najde lepší příležitosti jinde."
 exiles_more_events.3.b: "Studium a reflexe mohou hnutí oživit."
 exiles_more_events.3.c: "Žádná váhavost! Hnutí potřebuje radikální změny."
 exiles_more_events.3.dd: "Není třeba uchylovat se k sebevyhnanství."
 exiles_more_events.4.t: "Sjednocení země i občanů"
 exiles_more_events.4.d: "Po sjednocení [ROOT.GetCountry.GetNameNoFormatting] přicházejí do naší země jak hodnostáři, tak disidenti z dřívějších rozdělených států. [SCOPE.sCharacter('post_unification_agitator').GetFullName] si nyní přeje usadit se zde."
 exiles_more_events.4.f: "„Spoluobčané! Naše země byla sjednocena pod praporem [ROOT.GetCountry.GetNameNoFormatting]! Má toto sjednocení znamenat konec myšlení? Ne! Chceme-li skutečně jednotu, musíme přijmout rozmanitost názorů. Já sám jsem jedním z těch podivných hlasů. Přijmete mě?“"
 exiles_more_events.4.a: "Vítáme [SCOPE.sCharacter('post_unification_agitator').GetFullName] s otevřenou náručí."
 exiles_more_events.4.b: "Nemáme důvod zvát potížisty."
 exiles_more_events.5.t: "Zvykání na odchod"
 exiles_more_events.5.d: "[SCOPE.sCharacter('experienced_exile').GetFullName], zkušený aktivista, zvažuje další odchod do [concept_exile] kvůli rostoucím problémům v [ROOT.GetCountry.GetNameNoFormatting]."
 exiles_more_events.5.f: "„Je zvláštní,“ povzdechl si, „že čím častěji odcházíte, tím méně to bolí.“ Usmál se, ale oči se mu zalily slzami."
 exiles_more_events.5.a: "Rozlučme se s [SCOPE.sCharacter('experienced_exile').GetFullName]."
 exiles_more_events.5.b: "Možná to ještě může vyjít."
 exiles_more_events.6.t: "Návrat obávaného [SCOPE.sCharacter('melodrama_villain').GetFullName]"
 exiles_more_events.6.d: "[SCOPE.sCharacter('melodrama_villain').GetFullName], nechvalně proslulý vyhnanec spojený s [SCOPE.gsInterestGroup('melodrama_villain_ig').GetName], oznámil svůj návrat. Vedení [SCOPE.gsInterestGroup('melodrama_villain_ig').GetNameNoFormatting] se obává jeho vlivu."
 exiles_more_events.6.f: "„#extrabold Blázni!#! Opovažujete se zasahovat do plánů [SCOPE.sCharacter('melodrama_villain').GetFullNameNoFormatting], #italic pravého vládce#! [SCOPE.gsInterestGroup('melodrama_villain_ig').GetNameNoFormatting]? Budete #extrabold litovat#! dne, kdy jste mě vyzvali! Můj návrat změní běh #bold dějin#!!“"
 exiles_more_events.6.a: "Třeste se! Vrací se!"
 exiles_more_events.6.b: "Máme lepší vůdce než jeho."
 exiles_more_events.6.c: "[SCOPE.sCharacter('melodrama_villain').GetLastName] opět povstane!"
 exiles_more_events.6.c.tt: "[SCOPE.sCharacter('melodrama_villain').GetLastName] se stává vůdcem [SCOPE.gsInterestGroup('melodrama_villain_ig').GetName]"
 exiles_more_events.6.dd: "I z ciziny může mít vliv."
 exiles_more_events.7.t: "Staré spory přetrvávají"
 exiles_more_events.7.d: "[SCOPE.sCharacter('first_ex_exile').GetFullName] a [SCOPE.sCharacter('second_ex_exile').GetFullName] si přinesli staré konflikty a opakovaně se kvůli nim střetávají."
 exiles_more_events.7.f: "„Ty... ty #italic ničemo#!! Kolikrát ještě vytáhneš tu svou teorii?“\n\n„Neustoupil jsem zákonu, neustoupím ani tobě!“"
 exiles_more_events.7.a: "Názorové střety musíme tolerovat."
 exiles_more_events.7.b: "Vyhoďme [SCOPE.sCharacter('first_ex_exile').GetFullName]."
 exiles_more_events.7.c: "[SCOPE.sCharacter('second_ex_exile').GetFullName] zde již není vítán."
 exiles_more_events.8.t: "Výzva autoritě?"
 exiles_more_events.8.d: "S nízkou [concept_legitimacy] vlády se [SCOPE.sCharacter('dgaf_exile_scope').GetFullName] domnívá, že může bez odporu překročit hranice."
 exiles_more_events.8.f: "„Samozřejmě, že to zkusím! Kdo dnes poslouchá vládu? Bude to hračka.“"
 exiles_more_events.8.a: "Zastavení by bylo příliš nákladné."
 exiles_more_events.8.b: "Policie stále funguje!"
 exiles_more_events.8.b.tt: "[SCOPE.sCharacter('dgaf_exile_scope').GetFullName] bude zastaven."
 exiles_more_events.8.c: "Dohodněme se s [SCOPE.gsInterestGroup('dgaf_exile_home_ig').GetName]."
 exiles_more_events.9.t: "Úrodná půda"
 exiles_more_events.9.d: "[SCOPE.sCharacter('fertile_ground_exile_scope').GetFullName] se rozhodl, že [ROOT.GetCountry.GetNameNoFormatting] je ideální místo k životu díky vlivu [SCOPE.gsInterestGroup('fertile_ground_ig').GetName]."
 exiles_more_events.9.f: "„Jaká země příležitostí! Připravená na mé myšlenky... ano, vydám se tam!“"
 exiles_more_events.9.a: "Není důvod mu bránit."
 exiles_more_events.9.b: "Musíme jeho příchodu zabránit."
 exiles_more_events.9.c: "[SCOPE.gsInterestGroup('fertile_ground_ig').GetName] podporují rozvratníky!"
 exiles_more_events.10.t: "Nestabilní prvky"
 exiles_more_events.10.d: "Přítomnost osob jako [SCOPE.sCharacter('unstable_element_agitator').GetFullName] představuje hrozbu, i když se nepodílejí na revoluci."
 exiles_more_events.10.f: "V temné uličce sledovali zásah. Ozbrojení muži přišli bez varování. Proč útočí? Paranoia vlády se zdá být nesmyslná."
 exiles_more_events.10.a: "[SCOPE.sCharacter('unstable_element_agitator').GetFullName] musí pryč."
 exiles_more_events.10.b: "Potřebujeme spíše smíření než tvrdost."
