l_polish:
 oscar_wilde_events.1.t: "Každý muž zabíjí to, co miluje"
 oscar_wilde_events.1.wilde: "Nechvalně proslulý dandy a dramatik [SCOPE.sCharacter('oscar_wilde').GetFullName] byl odsouzen ke dvěma letům nucených prací na základě obvinění z homosexuality. Pokud neobdrží milost, můžeme rovnou říci, že jsme spolu s [Select_CString(SCOPE.sCharacter('oscar_wilde').IsFemale,'ní','ním')] odsoudili i umění v [ROOT.GetCountry.GetAltAdjectiveNoFlag('L')]."
 oscar_wilde_events.1.flavor_wilde: "„[Select_CString(SCOPE.sCharacter('oscar_wilde').IsFemale,'Její','Jeho')] dílo představuje to nejlepší z tradice satiry a břitkého důvtipu našeho národa.\n\n"
 oscar_wilde_events.1.flavor_author: "„Má všechnu strašlivou krásu řecké tragédie, tragédie, v níž jsem hrál velkou roli.\n\n"
 oscar_wilde_events.1.flavor_quote: "Knihy, které svět nazývá nemravnými, jsou knihy, které světu ukazují jeho vlastní hanbu.“"
 oscar_wilde_tt: "[SCOPE.sCharacter('oscar_wilde').GetFullName] bude [Select_CString(SCOPE.sCharacter('oscar_wilde').IsFemale,'propuštěna','propuštěn')] na svobodu."
 oscar_wilde_events.1.a: "Génius si zaslouží výjimku."
 oscar_wilde_events.1.b: "Nemůžeme být viděni, jak podkopáváme verdikty našich soudců."
 oscar_wilde_events.1.c: "Je barbarské, aby to vůbec bylo trestným činem..."
 happy_arts_protected: "Souhlasí s ochranou umělců"
 unhappy_defended_homosexuality: "Nesouhlasí s tolerancí homosexuality"
 imprisoning_gentlemen: "Věznění džentlmeni"
 upheld_ruling: "Verdikt potvrzen"
