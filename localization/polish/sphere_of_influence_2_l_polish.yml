 je_secure_influence_over_persia: "Zajistit vliv nad Persií"
 je_secure_influence_over_persia_reason: "Persie je bohatá na majetek a zdroje a zároveň slouží jako odrazový můstek pro armády mířící do indického a středoasijského jádra. Každá velmoc se zájmy v těchto oblastech by udělala moudře, kdyby si tuto zemi zajistila pro sebe, a ještě moudřeji, kdyby ji odepřela svým protivníkům."
 persia_puppeted_tt: "#v $PER$#! je naše [concept_subject]"
 je_consolidate_persia: "Konsolidovat Persii"
 je_consolidate_persia_reason: "Vládní kontrola perských provincií měla dlouho chatrnou povahu, přičemž autonomní šejchdomy a cizí mocnosti zde měly větší vliv než nominální guvernéři jmenovaní z [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nMáme-li stát účinně modernizovat, musí být prosazena svrchovanost ústřední vlády."
 je_achieve_sovereignty: "Dosáhnout svrchovanosti"
 je_achieve_sovereignty_reason: "Dokud nás širší mezinárodní společenství neuzná za sobě rovné, bude cizí vměšování do našich vnitřních záležitostí nadále všudypřítomné.\n\nMěli bychom usilovat o to, abychom si u jejich stolu vydobyli místo, aby náš národ nedopadl jako stará Chorasmie."
 je_achieve_sovereignty_tt: "Byli jsme [concept_subject] po #bold 10#! po sobě jdoucích let. (Aktuálně #variable [ROOT.GetCountry.MakeScope.Var('achieve_sovereignty_var').GetValue]#!)"
