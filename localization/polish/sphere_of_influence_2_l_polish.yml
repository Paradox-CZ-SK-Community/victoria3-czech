 gg_afghanistan.7.t: "Muž, který chtěl být králem"
 gg_afghanistan.7.d: "V dobře naložené karavaně ze země [SCOPE.sCountry('the_man_who_would_be_king_origin_scope').GetName] dorazil cizí dobrodruh jménem [SCOPE.sCharacter('the_man_who_would_be_king_scope').GetFullName]. Přiváží dary v podobě palných zbraní a látek a přeje si stát se [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFlag], přičemž slibuje velké bohatství a moc každému, kdo by ho následoval."
 gg_afghanistan.7.f: "„Můj příteli, v tomto světě a věku musí být ten, kdo chce být mužem, pánem. Prozřetelnost mi takovou výsadu na Západě nedopřála, ale skrze impérium si ji vydobudu zde, v hlubokých údolích Hindúkuše.“"
 gg_afghanistan.7.a: "Odmítněte tohoto směšného šílence."
 gg_afghanistan.7.b: "Říkáte zbraně a látky?"
