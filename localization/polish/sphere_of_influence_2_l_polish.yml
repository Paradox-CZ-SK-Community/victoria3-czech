l_polish:
 je_eastern_frontier: "Východní hranice"
 je_eastern_frontier_reason: "Rozlehlé území na našem východě, jemuž dominovala kdysi rušná města jako [SCOPE.sStateRegion('merv_scope').GetName] a [SCOPE.sStateRegion('herat_scope').GetName], tvoří součást [SCOPE.GetRootScope.GetCountry.GetAdjective] Chorásánu už od časů Manúčehra. Ačkoli nám tyto země od té doby vyrval běh času a nadvláda utlačovatelských a mocných vládců, takto to už dál zůstat nemůže.\n\nJe třeba podniknout rozhodné kroky k opětovnému začlenění těchto zbloudilých zemí, aby je už žádná cizí mocnost nemohla znovu napadnout a podrobit si je.\n\n#bold Turanské zajetí#!\nGenerace turkmenských nájezdů do našich zemí vedly k tomu, že početné populace perských otroků dřou v oázách, jako jsou [SCOPE.sStateRegion('uzbekia_scope').GetName] a [SCOPE.sStateRegion('khiva_scope').GetName]. Obsazení těchto oblastí nám umožní osvobodit a #tooltippable #tooltip:je_eastern_frontier_tt_5 přesídlit#!#! zotročené perské komunity, budeme-li si to přát."
 je_eastern_frontier_tt_1: "[GetGeographicRegion('geographic_region_greater_khorasan').GetName] je vlastněn zemí [SCOPE.GetRootScope.GetCountry.GetName] nebo jejími závislými zeměmi."
 je_eastern_frontier_tt_2: "[GetGeographicRegion('geographic_region_chorasmia').GetName] je vlastněn zemí [SCOPE.GetRootScope.GetCountry.GetName] nebo jejími závislými zeměmi."
 je_eastern_frontier_tt_3: "[GetGeographicRegion('geographic_region_transoxiana').GetName] je vlastněn zemí [SCOPE.GetRootScope.GetCountry.GetName] nebo jejími závislými zeměmi."
 je_eastern_frontier_tt_4: "Dobyli jsme a #bold obnovili#! [SCOPE.sStateRegion('merv_scope').GetName]."
 je_eastern_frontier_tt_5: "Použitím [concept_decree] [GetDecreeType('decree_emergency_relief').GetName] lze kterýkoli vlastněný [concept_state] označit za cíl přesídlení." 
 khorasan_tt: "Vyžadované [Concept('concept_state_region','$concept_state_regions$')]:\n$STATE_HERAT$\n$STATE_KABUL$\n$STATE_KANDAHAR$\n$STATE_BALKH$\n$STATE_CENTRAL_HIGHLANDS$\n$STATE_MERZ$\n$STATE_NORTHERN_BALUCHISTAN$"
 chorasmia_tt: "Vyžadované [Concept('concept_state_region','$concept_state_regions$')]:\n$STATE_KHIVA$\n$STATE_TURKMENIA$"
 transoxiana_tt: "Vyžadované [Concept('concept_state_region','$concept_state_regions$')]:\n$STATE_FERGANA$\n$STATE_TAJIKISTAN$\n$STATE_UZBEKIA$"
 greater_khorasan_button: "Vznést nárok na Velký Chorásán"
 greater_khorasan_button_desc: "Ačkoli [SCOPE.GetRootScope.GetCountry.GetAdjective] nároky na Velký Chorásán sahají tisíce let do minulosti, v posledních staletích se naše kontrola nad touto oblastí pohybovala od volné po pouze nominální. Východní tažení Nádira Šáha nakrátko obnovila perskou kontrolu nad Chorásánem, ale jeho úspěchy se ukázaly jako pomíjivé a nepřežily jeho vládu.\n\nCo Nádír Šáh začal, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] dokončí velkým tažením, které navždy obnoví perskou vládu na východě. [SCOPE.sStateRegion('herat_scope').GetName], Perla Chorásánu a náš klíč k východu, bude opěrným bodem tohoto velkého podniku."
 greater_khorasan_button_tt: "V závislosti na našich vzájemných [concept_relations] může [SCOPE.sCountry('britain_scope').GetName] reagovat negativně na naši okupaci [SCOPE.sStateRegion('herat_scope').GetName]."
 persian_baluchistan_button: "Pacifikovat Turkmeny"
 persian_baluchistan_button_desc: "Na našem severu se nezkrotné [SCOPE.sCountry('turkmenia_scope').GetAdjectiveNoFlag] kmeny vzpírají naší autoritě nájezdy na naše země a každoročně unášejí tisíce našich poddaných, aby je prodaly na velkých otrokářských trzích v Buchaře a Chivě - a přitom dál sedí na právoplatných perských zemích. Zabijme dvě mouchy jednou ranou a přinuťme tyto bandity sklonit šíji."
 je_conquest_of_central_asia_turkmen_button: "Pacifikovat Turkmeny"
 je_conquest_of_central_asia_turkmen_button_desc: "Na našem jihu se nezkrotné [SCOPE.sCountry('turkmenia_scope').GetAdjectiveNoFlag] kmeny vzpírají naší autoritě nájezdy na naše země, odmítají uznat autoritu jakéhokoli důstojníka, cara či chána a nikomu neplatí ani minci na daních - a přitom dál sedí na právoplatných ruských zemích. Zabijme dvě mouchy jednou ranou a přinuťme tyto bandity sklonit šíji."
 modifier_turkmen_subjugation: "Tažení za pacifikaci Turkmenů"
 modifier_turkmen_logistics: "Turanská logistika"
 persia_russian_aid_button: "Požádat o $RUS_ADJ$ vojenskou misi"
 persia_russian_aid_button_desc: "Požádat $RUS_ADJ$ vládu, aby vyslala vojenskou misi, která pomůže modernizovat naši armádu výměnou za určité diplomatické a extrateritoriální ústupky.\n\nPrvní vyslaná mise zřídí #bold Perskou kozáckou brigádu#! jako #bold trvalou#! vojenskou instituci."
 if_they_accept_tt: "Pokud přijmou:"
 persia_russian_aid_button_cooldown_tt: "V posledních #variable 10#! letech nepoužilo rozhodnutí $persia_russian_aid_button$#!"
 persia_british_aid_button: "Požádat o $GBR_ADJ$ vojenskou misi"
 persia_british_aid_button_desc: "Požádat $GBR_ADJ$ vládu, aby vyslala vojenskou misi, která pomůže modernizovat naši armádu výměnou za určité diplomatické a extrateritoriální ústupky.\n\nPrvní vyslaná mise zřídí #bold Jižní perské střelce#! jako #bold trvalou#! vojenskou instituci."
 persia_british_aid_button_cooldown_tt: "V posledních #variable 10#! letech nepoužilo rozhodnutí $persia_british_aid_button$#!"
 persia_resettle_merv_button: "Obnovit [SCOPE.sStateRegion('merv_scope').GetName]"
 persia_resettle_merv_button_desc: "Kdysi byl #bold Merv Veliký#! považován za hlavní město východního islámského světa a pyšnil se téměř půlmilionovou populací, ale od té doby upadl do těžkých časů. Po staletích úpadku byl Merv na konci 18. století definitivně srovnán se zemí bucharským šáhem Muradem, který zničil hráze udržující oázu a přesídlil desetitisíce jeho [SCOPE.sCulture('persian_culture').GetName] obyvatel do [SCOPE.sStateRegion('uzbekia_scope').GetName].\n\nDnes zůstaly jen řídké ruiny a [SCOPE.sCulture('turkmen_culture').GetName] kmeny pasou dobytek v chátrající mrtvole starého města. Obnovit jej nebude snadný úkol, ale obnovíme jej."
 persia_events.1.t: "Země vycházejícího slunce"
 persia_events.1.d: "Po úplném obnovení východních hranic země [SCOPE.GetRootScope.GetCountry.GetName] dohlédl [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] na konečnou nápravu velké historické křivdy."
 persia_events.1.f: "Od úrodných oáz Chorasmie přes starobylá města Chorásánu až po turanské srdce za Oxem: dávné východní provincie Persie znovu odpovídají svému právoplatnému pánu."
 persia_events.1.a: "Velké bohatství východu bude živit náš pokrok."
 persia_events.1.b: "Nechť tato dávná intelektuální centra znovu vzkvétají."
 persia_events.1.c: "Já Alí! Nechť se západ třese před řevem lva."
 modifier_wealth_of_the_east: "Bohatství východu"
 modifier_persianize_the_east: "Poznání východu"
 modifier_military_of_the_east: "Šíráni-e Párs"
 darulfunun_modifier: "Dár al-Funún"
 persia_events.2.t: "Perla Chorásánu"
 persia_events.2.d: "Navzdory tuhému afghánskému odporu a pletichám cizích mocností konečně padlo velké město [SCOPE.sState('herat_scope').GetName] před [SCOPE.GetRootScope.GetCountry.GetAdjective] silou."
 persia_events.2.f: "#italic „Považuj tento svět za oceán,\na Chorásán za ústřici v něm.\nA město Herát,\nza perlu v jejím středu.“#!" # Medieval Persian epigram
 persia_events.2.a: "Brána na východ byla prolomena. Teď postupujte dál."
 modifier_herat_inspiration: "Páni Chorásánu"
 persia_events.2.tt: "Tento [concept_modifier] #bold zmizí#!, pokud ztratíme kontrolu nad [SCOPE.sState('herat_scope').GetName]."
 persia_events.3.t: "Turanská metla"
 persia_events.3.d: "Příliš dlouho bylo [SCOPE.sCountry('turkmenia_scope').GetAdjectiveNoFlag] kmenům na našem severu dovoleno podnikat nájezdy do našich zemí bez obav z odplaty. Aby tuto nespravedlnost napravil, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] oznámil zahájení velkého severního pacifikačního tažení."
 persia_events.3.f: "V bolestných rytmických krocích kráčejí spoutaní přes poušť Karakum; její velké ticho narušuje jen občasný posměch jejich turkmenských věznitelů a jejich vlastní žalostné výkřiky;\n\n#italic „Alaman nás odvlekl,\nubozí, ubozí Kizilbašové!\nA nesou nás, a nesou nás,\nv železe a řetězech, v železe a řetězech\nDo Gurgendže a Buchary.“#!" # Persian song of lamentation. Alaman is a Turkmen raiding/slaving party, and qizilbash (red head) is a contemporary word used for Persians (and more).
 persia_events.3.a: "Ukažme těmto nájezdníkům perskou ocel."
 persia_events.4.t: "Persie žádá o vojenskou misi"
 persia_events.4.d: "Vláda země [SCOPE.sCountry('persian_nation_scope').GetName] nás požádala, abychom vyslali vojenskou misi, která pomůže modernizovat její armádu, a výměnou nabízí určité diplomatické a extrateritoriální ústupky."
 persia_events.4.f: "„Tucet děl, několik tisíc pušek a k tomu dost střeliva a nábojů na pět let běžného užívání?“\n„Přesně tak, pane.“\n„Chápu. A ta druhá sada zavazadel?“\n„Píšťala, buben a žestě, pane. Než se nadějete, budou pochodovat za tónů [SCOPE.GetRootScope.GetCountry.GetCustom('marching_songs_custom_loc')].“"
 persia_events.4.a: "To slouží našim zájmům. Neprodleně vyšlete misi."
 persia_events.4.b: "Zdvořile jejich žádost odmítněte."
 modifier_persian_cossack_brigade: "Perská kozácká brigáda"
 modifier_south_persia_rifles: "Jižní perské střelecké sbory"
 modifier_british_persian_aid: "Britská vojenská mise"
 modifier_russian_persian_aid: "Ruská vojenská mise"
 preobrazhensky_march_loc: "Preobraženského pochodu"
 british_grenadiers_march_loc: "Britštích granátníků"
 persia_events.5.t: "Otroci z [SCOPE.sState('persia_slave_liberate_state_scope').GetCityHubName]"
 persia_events.5.d: "Po dobytí [SCOPE.sState('persia_slave_liberate_state_scope').GetName] jsme narazili na velké množství [SCOPE.sCulture('persian_culture').GetName] otroků. Jejich příbuzní se dožadují jejich svobody, ale propuštění z otroctví pravděpodobně vyvolá hněv jejich současných turkických pánů."
 persia_events.5.f: "„Agha, před lety jsem při jedné cestě stál na bucharském bazaru a sledoval prodej mladé perské dívky - ztracené v žalu a vystavené nejhrubší krutosti ze strany svého pána.\n\nTehdy jsem byl bezmocný. Cizinec v jejich zemích, bez prostředků, abych ji vykoupil. Srdce mi hořelo a já se stal ničím. ‚Inšalláh,‘ přísahal jsem, ‚jednou ten den přijde.‘“"
 persia_events.5.a: "Bismilláh, zbavte pout každého nalezeného Peršana."
 persia_events.5.b: "Osvoboďte je a usnadněte jejich přesídlení."
 persia_events.5.c: "Nechte je tam, kde jsou. Nestojí za potíže."
 persia_events.5.tt: "Pokud má [concept_state] [concept_decree] [GetDecreeType('decree_emergency_relief').GetName], náhodný stát s tímto výnosem bude určen jako cíl pro osvobozené [Concept('concept_pop','$concept_pops$')]. Pokud ne, přesídlí se do provincie, odkud byli odvlečeni."
 modifier_slave_relocation_costs_persia: "Výdaje na přesídlení"
 persia_events.6.t: "[SCOPE.sCountry('persia_scope').GetNameNoFormatting] okupuje Herát"
 persia_events.6.d: "Strategicky položené město [SCOPE.sState('herat_scope').GetName], kterému někteří v naší správě říkají „klíč k Indii“, bylo dobyto vojsky náležejícími [SCOPE.sCountry('persia_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('persia_scope').GetRuler.GetFirstName] ze země [SCOPE.sCountry('persia_scope').GetName]."
 persia_events.6.f: "„Dle názoru mého, vašeho pokorného služebníka, i ostatních zde přítomných pánů platí, že pokud by se nepřátelská mocnost pokusila o invazi do Indie ze západu, učinila by tak skrze Persii, a tedy skrze Herát. Naléháme proto, abyste zvážili možnost požadovat okamžité perské stažení z města pod hrozbou ozbrojené odpovědi.“"
 persia_events.6.a: "Pohrozte Peršanům válkou, pokud Herát nevyklidí."
 persia_events.6.b: "To město nestojí za kosti jediného britského granátníka."
 persia_events.7.t: "Merv Veliký"
 persia_events.7.d: "Bazary v [SCOPE.sState('merv_scope').GetName] znovu kypí ruchem a připomínají slavnou minulost města. Jelikož do oázy opět proudí bohatství, musí správa rozhodnout, jak je nejlépe využít."
 persia_events.7.f: "„#italic V té líbezné provincii Slunce,\nprvní z perských zemí, na niž [SCOPE.GetRootScope.GetCountry.GetRuler.GetSheHe] září,\nkde všechny nejkrásnější děti [SCOPE.GetRootScope.GetCountry.GetRuler.GetHerHis] paprsku\nkvítky a plody červenají nad každým proudem,\na ze všech proudů nejkrásnější Murga putuje\nmezi Meronovými jasnými paláci a háji.“#!" # The Veiled Prophet of Khorassan by Thomas Moore
 persia_events.7.a: "Využijte jej k obnově velkých hrází na řece Murghab."
 persia_events.7.b: "Mervské paláce a zahrady budou znovu vystavěny, dvakrát tak nádherné."
 modifier_soltanbent_dam: "Soltan-Bent obnoven"
 modifier_merv_queen_of_the_world: "Merv-i Šáh-Džihán"
 persia_events.8.t: "Británie požaduje stažení z Herátu"
 persia_events.8.d: "Vyslanec ze země [SCOPE.sCountry('britain_scope').GetName] nás informoval, že pokud [SCOPE.GetRootScope.GetCountry.GetName] odmítne vyklidit [SCOPE.sState('herat_scope').GetName], budou to považovat za válečný akt."
 persia_events.8.f: "Lámanou, přesto jasnou perštinou přečetl britský delegát shromáždění požadavky své vlády. Persie se měla z Herátu stáhnout do tří měsíců. Dále se měla vzdát všech nároků na svrchovanost nad územím a městem Herát a už nikdy neměla od jeho náčelníků požadovat žádný projev poslušnosti, například ražbu mincí či tribut.\n\nZa vyslancem se dvořané neklidně ošívali. Nevěděli, jaká bude odpověď [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]. Ať už však bude jakákoli, věděli, že přinese potíže."
 persia_events.8.a: "Ať tito Farangové přijdou, pokud se odváží."
 persia_events.8.b: "Ustupte, nemůžeme si dovolit válku s [SCOPE.sCountry('britain_scope').GetAdjective]."
