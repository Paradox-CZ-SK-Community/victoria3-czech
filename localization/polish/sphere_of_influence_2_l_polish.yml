 je_earn_recognition_reason: "Stav #bold ukazatele pokroku#! bude na základě určitých podmínek #tooltippable;tooltip:[Country.GetTooltipTag],je_earn_recognition_advance postupovat#! nebo #tooltippable;tooltip:[Country.GetTooltipTag],je_earn_recognition_deplete ustupovat#!. Jakmile #bold ukazatel pokroku#! dosáhne hodnoty #bold 200#!, [SCOPE.GetRootScope.GetCountry.GetName] se stane [concept_recognized_power].\n\nPříliš dlouho bylo zemi [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] upíráno náležité diplomatické uznání takzvanými civilizovanými národy světa, což nás činilo zranitelnými vůči jejich postupům a bránilo nám řádně vykonávat vlastní svrchovaná práva.\n\nMěli bychom učinit vše, co je v našich silách, abychom tuto situaci napravili a získali si místo u jejich stolu jako respektovaní sobě rovní."
