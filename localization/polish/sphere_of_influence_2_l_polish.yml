 spooky_halloween_events.1.t: "Noční nabídky"
 spooky_halloween_events.1.d: "V [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] přijel úderem dvanácté v kočáře vysoký bledý muž, který se představil jako hrabě [SCOPE.sCharacter('dracula_scope').GetLastName] a nabídl své služby [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle], přičemž tvrdil, že pochází od Attily Huna a mocných vojvodů dávných časů."
 spooky_halloween_events.1.f: "Mužův stisk ruky byl chladný a svíral jako svěrák. Vládní zástupce potlačil bolestné trhnutí a pozvedl oči k hraběti. „Připravili jsme vám pokoj a jídlo, pane, zatímco budete čekat na [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]. Musíte být po dlouhé cestě unavený.“\n\n„To nebude nutné,“ řekl hrabě s tenkým úsměvem. „Právě jsem si dopřál pozdní večeři. V každém případě už je to příliš dlouho, co jsem naposledy vkročil do [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. A velmi mě zajímá vše, co se změnilo.“"
 spooky_halloween_events.1.a: "Služby tak vznešeného gentlemana lze sotva odmítnout."
 spooky_halloween_events.1.b: "Samozřejmě, můj hrabě, soukromá audience bude ihned zařízena."
 spooky_halloween_events.1.c: "Zdvořile hraběte odmítněte a odveďte ho k městským branám."
 dracula_coup_tt: "Jako v transu předává [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] otěže moci hraběti."
 umbral_coup_modifier: "Stínový převrat"
 dracula_leaves_tt: "Beze slova hrabě nastupuje do svého kočáru."
 dracula_passive_tt: "Drákula si ponechá svou současnou ideologii" 
 spooky_halloween_events.2.t: "Půlnoční návštěvník"
 spooky_halloween_events.2.d: "[SCOPE.sCharacter('dracula_scope').GetFullName] nenápadně dorazil k sídlu [SCOPE.sCharacter('fair_maiden_scope').GetFullName], prošel kolem jeho malátných stráží a vstoupil do dlouhých temných chodeb vedoucích k její pracovně, kde nad hromadami korespondence stále svítilo osamělé světlo."
 spooky_halloween_events.2.f: "[SCOPE.sCharacter('fair_maiden_scope').GetFullNameNoFormatting] nepoznávala muže, který stál na jejím prahu, ani slova, která vycházela z jeho úst, i když zjevně zněla jejím vlastním jazykem. V mysli jí krátce probleskly výjevy formálních večeří a slavností, dokud se její mysl i pohled nezmocnily cizincovy oči.\n\nPlanuly tak strašlivým světlem, že se na ně nedokázala dívat, ale ani od nich nedokázala odvrátit zrak. Když cizinec vykročil o krok vpřed a pomalu obnažil zuby, vynaložila poslední úsilí, aby odvrátila oči, a snažila se přinutit slova, jakákoli slova, aby unikla z jejích úst."
 spooky_halloween_events.2.a: "A pak mysl [SCOPE.sCharacter('fair_maiden_scope').GetFirstName] pohltí plíživá mlha."
 spooky_halloween_events.2.b: "Co... počkat. Kdo jste a co tu děláte? Stráže!"
 spooky_halloween_events.2_tt: "Co zlého může způsobit trocha spánku."
 feeling_drained_1: "Vyčerpaný život"
 feeling_drained_2: "Vyčerpaný život"
 feeling_invigorated: "Pocit osvěžení"
 fair_maiden_fail: "Hrabě se na [SCOPE.sCharacter('fair_maiden_scope').GetFirstName] vrhne s veškerou zuřivostí a silou."
 fair_maiden_success: "Hrabě splyne se stíny a spěšně se stáhne."
 spooky_halloween_events.3.t: "Mistrovství starého i nového"
 spooky_halloween_events.3.d: "[SCOPE.sCharacter('dracula_scope').GetFullName] při úvahách o stále se měnícím světě kolem sebe přemítá, zda se i on musí měnit spolu s ním."
 spooky_halloween_events.3.f: "[SCOPE.sCharacter('dracula_scope').GetFullNameNoFormatting] obrací stránky [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] a vstřebává informace jako houba krev. Titulkům dominovaly války, zvěrstva a vraždy, jako vždy. Byla v tom jistá útěcha, dumal, vědět, že některé záležitosti mají v tomto světě stále řešení stejně prostá jako ve světě dávných časů.\n\nPřesto taková pozorování platila jen zčásti. Uprostřed známého chaosu se objevovaly známky jiného světa - světa v pohybu, poháněného písty, elektrickými světly a politickými nepokoji. Navzdory svému stáří však [SCOPE.sCharacter('dracula_scope').GetLastNameNoFormatting] necítil žádný záchvěv sentimentality. Ať menší tvorové oplakávají starý svět, pomyslel si. Já hodlám utvářet nový."
 spooky_halloween_events.3.a: "Moc přichází skrze kapitál."
 spooky_halloween_events.3.b: "Lidé jsou jen děti a jako děti respektují pouze hůl."
 spooky_halloween_events.3.c: "Proč se vzdávat osvědčených metod kvůli nevyzkoušeným."
 spooky_halloween_events.3.e: "Staré musí uvolnit cestu novému."
