 partition_compromise_button_desc: "Provincie Limburg a Lucembursko budou rozděleny mezi #v $BEL$#! a #v $NET$#!.\n\nJako náhrada Německému spolku za ztrátu západního Lucemburska bude $LIM$ zřízeno jako $NET_ADJ$ [concept_subject] a nominální člen Německého spolku."
 luxembourg_compromise_button: "Podpořit alternativní rozdělení"
 luxembourg_compromise_button_desc: "#v $BEL$#! si ponechá celou provincii Limburg výměnou za to, že #v $NET$#! obdrží celé Lucembursko."
 we_chose_this_london_treaty_tt: "[ROOT.GetCountry.GetName] tento návrh oficiálně podpoří."
 london_treaty_public_debt_info: "Od odtržení #bold Belgie#! od #bold Nizozemského království#! v roce 1830 čelí obě strany přetrvávajícím problémům při určování, jak rozdělit národní [Concept('concept_credit','$concept_credit_debt$')] svého kdysi sjednoceného království."
 london_conference_approve_button: "Ratifikovat Londýnskou smlouvu"
 london_conference_approve_button_desc: "Dohodnutý návrh je přijatelný. Nařiďte našim mužům v Londýně dokument podepsat."
 london_conference_approve_button_tt: "[ROOT.GetCountry.GetName] ratifikuje smlouvu. Pokud budou souhlasit $NET$ i $BEL$, smlouva poté vstoupí v platnost."
 london_conference_disapprove_button: "Odmítnout podepsat"
 london_conference_disapprove_button_desc: "Tento výsledek neslouží [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yym')|l] zájmům. Nepřipojíme svá jména k tomuto cáru papíru."
 london_conference_disapprove_button_tt: "Jednání mezi $BEL$ a $NET$ zkrachují."
 london_conference_has_concluded_loc: "Londýnská konference byla ukončena."
 improve_relations_with_german_confederation_tt: "Následující bude platit pro každou německojazyčnou [concept_country] v Evropě:"
 je_conference_of_london_acceptance_timer_tt: "\n\nVýsledek konference automaticky přijmeme za #variable [GetGlobalVariable('je_conference_of_london_acceptance_timer').GetValue]#! měsíců."
 treaty_of_london_events.1.t: "Belgická otázka"
 treaty_of_london_events.1.d: "Od odtržení země [SCOPE.sCountry('belgium_scope').GetName] v roce 1830 skončily všechny [ROOT.GetCountry.GetAdjective] snahy o znovusjednocení země neúspěchem. Mnozí, unavení důsledky současného neklidného příměří, nyní naléhají na [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], aby se zavázal ke konečnému vyjednanému urovnání."
 treaty_of_london_events.1.f: "„Revoluce roku 1830 je a zůstane největší státní chybou tohoto století, ale naše snahy získat tyto země zpět silou selhaly a naše vyhlídky jsou den ode dne chmurnější.\n\nV současnosti můžeme arbitráží získat více než silou zbraní. Pane, naléhavě vás prosím, abyste co nejdříve vyslal misi do Bruselu.“"
 treaty_of_london_events.1.a: "Souhlas. Svolejte konferenci, která tuto záležitost konečně vyřeší."
 treaty_of_london_events.1.b: "S rebely nevyjednáváme."
 treaty_of_london_explanation_tt: "Zúčastněné [Concept('concept_great_power', '$concept_great_powers$')] budou hlasovat o řešení, které mají ratifikovat $BEL$ a $NET$."
 treaty_of_london_events.2.t: "Haag vyzývá ke konferenci"
 treaty_of_london_events.2.d: "[SCOPE.sCountry('netherlands_scope').GetAdjective] vláda, unavená neklidným příměřím mezi našimi dvěma zeměmi, se na nás obrátila s návrhem konference, která by vyřešila naše současné územní a právní spory."
 treaty_of_london_events.2.f: "„Takže teď Nizozemci touží po arbitráži? Nepochybně mají oči pevně upřené na právoplatnou belgickou půdu. Ačkoli jsou jejich ambice všem zjevné, možná v této věci nemáme příliš na výběr. Odmítnutí kompromisu by mohlo poškodit naše postavení v Evropě způsobem, který nelze snadno napravit.“"
 treaty_of_london_events.2.a: "Dobrá, souhlaste se zprostředkováním velmocí."
 treaty_of_london_events.2.b: "Těm zatraceným Nizozemcům neustoupíme ani o píď!"
 treaty_of_london_events.3.t: "Londýn volá"
 treaty_of_london_events.3.d: "Nevyřešená povaha [SCOPE.sCountry('belgium_scope').GetAdjectiveNoFlag]-[SCOPE.sCountry('netherlands_scope').GetAdjectiveNoFlag] vztahů ohrožuje evropskou stabilitu už od roku 1830. V Londýně byla nyní svolána konference, která má tuto otázku definitivně vyřešit, a všechny evropské velmoci byly pozvány, aby zprostředkovaly arbitráž."
 treaty_of_london_events.3.f: "„Téměř deset let jsme se snažili dostat tyto dvě strany k jednacímu stolu a téměř deset let bylo naše úsilí mařeno. Nyní, ať už díky prozřetelnosti, nebo šťastné náhodě, je máme přesně tam, kde je chceme mít. Nepromarněme tuto příležitost, stabilita Evropy závisí na našem úspěchu.“"
 treaty_of_london_events.3.a: "Vyřešme tuto záležitost jednou provždy."
 treaty_of_london_events.3.b: "O tuto rozepři nemáme zájem."
 treaty_of_london_events.4.t: "Londýnská konference končí"
 treaty_of_london_events.4.d: "Konference skončila a [ROOT.GetCountry.GetCustom('treaty_of_london_coutcome')]"
 treaty_of_london_events.4.f: "#bold Evropské mocnosti zaručují mír a stabilitu#!\nNově ratifikovaná Londýnská smlouva je základním kamenem evropského míru; upevňuje neutralitu a nezávislost Belgie a otevírá novou kapitolu evropské diplomacie, která upřednostňuje mír a vzájemnou úctu mezi národy. Zatímco nizozemská delegace... (pokrač. str. 3-6)"
 treaty_of_london_events.4.a: "Za mír v naší době, hurá!"
 guarantors_of_peace_modifier: "Garant míru"
 treaty_of_london_events.5.t: "Neúspěch Londýnské konference"
 treaty_of_london_events.5.d: "Jelikož jednání mezi zeměmi [SCOPE.sCountry('belgium_scope').GetName] a [SCOPE.sCountry('netherlands_scope').GetName] zcela zkrachovala, zdá se, že diplomatické řešení belgické otázky Evropě znovu uniklo."
 treaty_of_london_events.5.f: "Když delegace vycházely z Foreign Office na King Charles Street, atmosféra srdečnosti, kterou se tak zoufale snažily udržet, nedokázala oklamat ani vrátného - natož jednu druhou. Co to bude znamenat pro budoucí nizozemsko-belgické vztahy, stále nedokázaly říci, ale že to bude špatné? Na tom se konečně dokázaly shodnout."
 treaty_of_london_events.5.a: "Jaká ztráta času pro všechny."
 favour_belgium_loc: "velmoci se rozhodly přiznat Belgii všechny její územní nároky výměnou za převzetí nizozemských dluhů."
 favour_netherlands_loc: "velmoci se rozhodly přiznat Nizozemsku všechny jeho územní nároky výměnou za převzetí belgických dluhů."
 partition_compromise_loc: "velmoci se rozhodly rozdělit sporné oblasti mezi Nizozemsko a Belgii a rozdělit Lucembursko i Limburg."
 luxembourg_compromise_loc: "velmoci se rozhodly rozdělit sporné oblasti mezi Nizozemsko a Belgii, přičemž zachová celistvost provincií Lucembursko a Limburg."
 not_yet_settled_loc: "ještě neskončila."
 treaty_of_london_outcome_tt: "Území bude vyměněno mezi $BEL$ a $NET$ v souladu s jejich smluvními závazky."
