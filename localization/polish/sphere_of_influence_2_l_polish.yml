 je_earn_recognition_tt: "Bude podepsána #bold [SCOPE.GetRootScope.GetCountry.GetCustom('treaty_names_custom_loc')]#! s relevantní [concept_great_power], což nám poskytne uznání ve světě."
 earn_recognition_events.1.t: "[SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFormatting('o')]-[SCOPE.sCountry('treaty_partner_country_scope').GetAltAdjectiveNoFormatting('aa')] [SCOPE.GetRootScope.GetCountry.GetCustom('treaty_names_custom_loc')]"
 earn_recognition_events.1.d: "Podepsáno dnes odpoledne v [SCOPE.sCountry('treaty_partner_country_scope').GetCapital.GetCityHubName], byla tato významná smlouva oficiálně zrušena jakákoli předchozí nevyrovnaná smlouva mezi [SCOPE.sCountry('treaty_partner_country_scope').GetAltAdjective('I')] a [SCOPE.GetRootScope.GetCountry.GetAltAdjective('I')] ve prospěch nové smlouvy vyjednané mezi rovnocennými."
 earn_recognition_events.1.f: "„[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltAdjectiveNoFormatting('G')] a [SCOPE.sCountry('treaty_partner_country_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('treaty_partner_country_scope').GetAltAdjectiveNoFormatting('G')], oba plně toužící po udržení vztahů dobrého porozumění, které šťastně existují mezi nimi, prodloužením a zvýšením vzájemných styků mezi jejich příslušnými státy, a přesvědčeni, že tento cíl nemůže být lépe dosažen než revidováním dosud existujících smluv mezi oběma zeměmi, se rozhodli dokončit takovou revizi, založenou na principech spravedlnosti a vzájemného prospěchu.“"
 earn_recognition_events.1.a: "Nový úsvit pro [SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFlag('A')]. Ratifikujte smlouvu."
 lobby_events.21.t: "Nepřítel mého nepřítele"
 lobby_events.21.d: "Na základě domnělého společného nepřátelství vůči zemi [SCOPE.sCountry('lobby_target_scope').GetName] se mezi vlastenecky smýšlejícími členy [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] rozšířila pro-[SCOPE.sCountry('relevant_country_scope').GetAdjective] sdružení."
 lobby_events.21.f: "Shromáždění pánové zamyšleně přikyvovali řečníkovým slovům. Dokud [SCOPE.sCountry('lobby_target_scope').GetNameNoFormatting] zůstává hrozbou, není nevítán žádný prostředek, který lze proti ní využít.\nKaždé [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] úsilí vynaložené na úkor [SCOPE.sCountry('lobby_target_scope').GetCapital.GetCityHubName] je o jedno úsilí méně, které by museli vyvinout sami."
 lobby_events.21.a: "Povzbuďte je, věc země [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting] je i naší věcí!"
 lobby_events.21.b: "[SCOPE.gsInterestGroup('relevant_ig_scope').GetName] mají právo na své názory."
 lobby_events.21.c: "Naše vztahy se zemí [SCOPE.sCountry('lobby_target_scope').GetName] musí mít přednost."
 enemy_of_enemy_ig_modifier: "Potlačení lobbistů"
 lobby_events.22.t: "Maják pokroku"
 lobby_events.22.d: "Členové [SCOPE.gsInterestGroup('relevant_ig_scope').GetName], kteří s velkým obdivem vzhlížejí k [SCOPE.sCountry('relevant_country_scope').GetAdjective] systému zákona [SCOPE.sLaw('relevant_law_scope').GetName], se v poslední době houfně přidávají k pro-[SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] společnostem."
 lobby_events.22.f: "„Když řeknu ‚[SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting]‘, bohužel první věci, které se mnoha našim drahým krajanům vybaví, budou záležitosti zahraniční politiky, nikoli domácí. Avšak právě k té první, a nikoli k té druhé, musíme hledět jako k základům skutečného a pevného pouta mezi našimi dvěma národy.“"
 lobby_events.22.a: "[SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] systém má jisté přednosti."
 lobby_events.22.b: "Vláda davu nemá v [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] místo."
 lobby_events.23.t: "Absolutistický ideál"
 lobby_events.23.d: "Uvnitř [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] je [SCOPE.sCountry('relevant_country_scope').GetName] stále častěji oslavována jako příklad správně uplatňované absolutistické vlády, přičemž její[SCOPE.sCountry('relevant_country_scope').GetRuler.GetCustom('ageist_adjective')] [SCOPE.sCountry('relevant_country_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_country_scope').GetRuler.GetFullName] se stává cílem téměř kultu úcty."
 lobby_events.23.f: "Ačkoli jen málo členů klubu, pokud vůbec někdo, by za současných okolností chtělo, aby [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] [SCOPE.sCountry('relevant_country_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_country_scope').GetRuler.GetHerselfHimself] vládl z [ROOT.GetCountry.GetCapital.GetCityHubName], nacházeli v [SCOPE.sCountry('relevant_country_scope').GetRuler.GetHerHim] zdroj inspirace - vzor toho, čím se [ROOT.GetCountry.GetNameNoFormatting] mohlo stát, kdyby tomu osud chtěl jinak."
 lobby_events.23.a: "Tento vývoj budeme bedlivě sledovat."
 lobby_events.23.b: "[SCOPE.gsInterestGroup('relevant_ig_scope').GetName] se od této [SCOPE.sCountry('relevant_country_scope').GetRuler.GetCulture.GetNameNoFormatting] surovosti nemají co učit."
 racist_rhetorics_modifier: "Rasistická rétorika"
 lobby_events.24.t: "[SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] model"
 lobby_events.24.d: "Klíčové postavy uvnitř [ROOT.GetCountry.GetAdjective] [SCOPE.gsInterestGroup('relevant_ig_scope').GetName], hluboce ohromené současným stavem [SCOPE.sCountry('relevant_country_scope').GetAdjective] [SCOPE.sCountry('relevant_country_scope').GetCustom('army_or_navy_custom_loc')], se spojily s [SCOPE.sPoliticalLobby('relevant_lobby_scope').GetName]."
 lobby_events.24.f: "V mnoha důstojnických klubech v [ROOT.GetCountry.GetCapital.GetCityHubName] byla [SCOPE.sCountry('relevant_country_scope').GetAltAdjectiveNoFormatting('aa')|l] [SCOPE.sCountry('relevant_country_scope').GetCustom('army_or_navy_custom_loc')] dlouho stejně respektována jako obávána. Hleděli k ní pro inspiraci a plánovali proti ní ve válečných hrách; za žádných okolností ji nebylo radno podceňovat. Jako protivník mohla přinést zkázu. Ale jako spojenec?"
 lobby_events.24.a: "[SCOPE.sCountry('relevant_country_scope').GetAltAdjective('aa')] [SCOPE.sCountry('relevant_country_scope').GetCustom('army_or_navy_custom_loc')] nás může mnohé naučit."
 lobby_events.24.b: "Loajalita [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] má patřit pouze zemi [ROOT.GetCountry.GetNameNoFlag]."
 officer_corps_unrest_modifier: "Nepokoje v důstojnickém sboru"
 affiliation_ban_enforced_modifier: "Zákaz afiliace vynucen"
 x_army_custom_loc: "armáda"
 x_navy_custom_loc: "flotila"
 lobby_events.25.t: "Soudruh [SCOPE.sCountry('relevant_country_scope').GetRuler.GetLastNameNoFormatting]"
 lobby_events.25.d: "Pod dojmem [SCOPE.sCountry('relevant_country_scope').GetAdjective] zavedení zákona [SCOPE.sLaw('relevant_law_scope').GetName] se v [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] pevně zakořenily silné pro-[SCOPE.sCountry('relevant_country_scope').GetAdjective] nálady."
 lobby_events.25.f: "„Dělníci, soudruzi. V [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName] byl zažehnut maják, zářící jasně pro všechny, kdo hledají světlo socialismu, ať už se nacházejí kdekoli.\nMaják, který se síly reakce budou ze všech sil pokoušet uhasit.\nMaják, který my jako přátelé a příslušníci dělnické třídy musíme chránit ze všech sil.“"
 lobby_events.25.a: "Cizí, a přece přítel. [ROOT.GetCountry.GetAdjective] dělník vás zdraví, soudruhu [SCOPE.sCountry('relevant_country_scope').GetRuler.GetLastName]"
 lobby_events.25.b: "Naši občané tento jed hltají až příliš ochotně."
 lobby_events.26.t: "[SCOPE.sState('relevant_state_scope').GetCityHubName] je [ROOT.GetCountry.GetAdjectiveNoFormatting]!"
 lobby_events.26.d: "[SCOPE.gsInterestGroup('relevant_ig_scope').GetName] považují [SCOPE.sCountry('relevant_country_scope').GetAdjective] vlastnictví [SCOPE.sState('relevant_state_scope').GetName] za zločin proti [ROOT.GetCountry.GetAdjectiveNoFormatting] národu a postavili svou váhu za [SCOPE.sPoliticalLobby('relevant_lobby_scope').GetName]."
 lobby_events.26.f: "„Neexistuje větší protimluv než [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] [SCOPE.sState('relevant_state_scope').GetNameNoFormatting]. Neexistuje větší zločin než spoutání této velké země jejími současnými pány.\nDokud železná pěst [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName] spočívá přímo na [SCOPE.sState('relevant_state_scope').GetStateRegion.GetCityHubName], žádný z jejích obyvatel nebude skutečně svobodný.“"
 lobby_events.26.a: "Jejich vlastenectví dává příklad hodný následování."
 lobby_events.26.b: "Neměli bychom ohrozit své vztahy se zemí [SCOPE.sCountry('relevant_country_scope').GetName]."
 lobby_events.27.t: "Rudé nebezpečí"
 lobby_events.27.d: "[SCOPE.gsInterestGroup('relevant_ig_scope').GetName] se z obav před domácími důsledky socialistického režimu v zemi [SCOPE.sCountry('relevant_country_scope').GetName] houfně přidávají k [SCOPE.sPoliticalLobby('relevant_lobby_scope').GetName]."
 lobby_events.27.f: "„Ačkoli muži z [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName] mohou šeptat sladká slůvka o rovnosti a svobodě, skutečné důsledky jejich vlády nejsou ničím jiným než strašlivým despotismem. [ROOT.GetCountry.GetAdjectiveNoFormatting] občan by měl toto varování vzít vážně, aby nenásledoval jejich příklad a nespoutal sám sebe ve jménu svobody.“"
 lobby_events.27.a: "V této věci je vláda plně zajedno s [SCOPE.gsInterestGroup('relevant_ig_scope').GetName]."
 lobby_events.27.b: "Naše mezinárodní vztahy určuje politický realismus, ne ideologie."
 lobby_events.28.t: "Základy tradice"
 lobby_events.28.d: "Nedávné zproštění viny významného spisovatele obviněného z rouhání a neslušnosti v zemi [SCOPE.sCountry('relevant_country_scope').GetName] vyvolalo v [ROOT.GetCountry.GetName] široké pobouření. [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] nyní obviňují [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFlag] soudní systém, že nedokáže hájit mravní a náboženský řád [SCOPE.sPop('relevant_religion').GetReligion.GetName] světa. "
 lobby_events.28.f: "„Vydání této skandální, rouhavé a bezbožné urážky naší víry, stejně jako její tiché přijetí v [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] společnosti, jednou provždy odhalilo pravou povahu tohoto bezbožného národa. Naléhám na všechny počestné občany víry, abyste učinili vše, co je ve vašich silách, k potlačení jeho zhoubného vlivu na [SCOPE.sPop('relevant_religion').GetReligion.GetNameNoFormatting] svět, a to jakýmikoli nezbytnými prostředky.“"
 lobby_events.28.a: "S každým dalším dnem se [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFlag] vzdalují světlu."
 lobby_events.28.b: "Vnitřní záležitosti země [SCOPE.sCountry('relevant_country_scope').GetNameNoFlag] nejsou naše věc."
 refused_to_condemn_blasphemy_modifier: "Odmítnutí odsoudit rouhání"
 lobby_events.29.t: "Despota z [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName]"
 lobby_events.29.d: "[SCOPE.gsInterestGroup('relevant_ig_scope').GetName] se kvůli odporu k svévolné a neliberální vládě [SCOPE.sCountry('relevant_country_scope').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('relevant_country_scope').GetName] přidali k [SCOPE.sPoliticalLobby('relevant_lobby_scope').GetName]."
 lobby_events.29.f: "„Všem, kdo si váží svobody, se [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting], drcená pod botou toho zhoubného [SCOPE.sCountry('relevant_country_scope').GetRuler.GetPrimaryRoleTitle|l], jeví jako příklad těch nejhorších výstřelků despotismu.\nV žádné zemi není nezdolné právo každé duše usilovat o vlastní osud mařeno tak jako v [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting] a v žádné zemi se nenachází větší hrozba pro naši vlastní svobodu než v [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting].\n[SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting] musí padnout, protože pokud nepadne, padneme místo ní my.“"
 lobby_events.29.a: "Pryč s tyrany. Pryč se zemí [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting]!"
 lobby_events.29.b: "Někdy je k dobrému vládnutí potřeba pevná ruka."
 in_league_with_tyrants_modifier: "Ve spolku s tyrany"
 lobby_events.30.t: "Akce a reakce"
 lobby_events.30.d: "Z [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName] unikají zprávy o dalším násilném zásahu proti [SCOPE.sCountry('relevant_country_scope').GetAdjective] dělnickému hnutí a pobouření členové [SCOPE.gsInterestGroup('relevant_ig_scope').GetName] vyšli do ulic [ROOT.GetCountry.GetCapital.GetCityHubName], kde pochodují pod praporem [SCOPE.sPoliticalLobby('relevant_lobby_scope').GetName]."
 lobby_events.30.f: "V představách [ROOT.GetCountry.GetAdjectiveNoFormatting] dělnického hnutí se [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting] už dlouho tyčila jako bašta reakce, ale na tomto konkrétním incidentu bylo něco jinak. Možná byla brutalita, kterou tentokrát předvedlo četnictvo z [SCOPE.sCountry('relevant_country_scope').GetCapital.GetCityHubName], obzvlášť krutá. Možná to byla jen poslední kapka.\n\nAť tak či onak, když [ROOT.GetCountry.GetAdjectiveNoFormatting] dělníci rozvinuli své prapory a pochodovali dolů k vyslanecké čtvrti, jejich volání po svržení [SCOPE.sCountry('relevant_country_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_country_scope').GetRuler.GetFullNameNoFormatting] se rozléhalo městem jako nikdy předtím."
 lobby_events.30.a: "Dokud se jejich hněv soustředí do zahraničí."
 lobby_events.30.b: "Zmírněte jejich hněv diplomatickými kroky."
