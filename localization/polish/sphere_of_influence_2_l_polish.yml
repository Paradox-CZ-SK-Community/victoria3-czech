 je_conference_of_london: "Londýnská konference"
 je_conference_of_london_reason: "Velmoci vyslaly své delegace do Londýna, aby rozhodly o řešení nevyřešených hraničních otázek mezi Nizozemskem a Belgií. \n\n#variable [GetGlobalVariable( 'je_conference_of_london_participants_var' ).GetValue]#! [Concept('concept_great_power', '$concept_great_powers$')] se účastní konference.\n#bold #tooltippable #tooltip:favour_belgium_button_desc $favour_belgium_button$#!#!#! podporuje celkem #variable [GetGlobalVariable( 'je_conference_of_london_proposal_1' ).GetValue]#! [concept_prestige]\n#bold #tooltippable #tooltip:favour_netherlands_button_desc $favour_netherlands_button$#!#!#! podporuje celkem #variable [GetGlobalVariable( 'je_conference_of_london_proposal_2' ).GetValue]#! [concept_prestige]\n#bold #tooltippable #tooltip:partition_compromise_button_desc $partition_compromise_button$#!#!#! podporuje celkem #variable [GetGlobalVariable( 'je_conference_of_london_proposal_3' ).GetValue]#! [concept_prestige]\n#bold #tooltippable #tooltip:luxembourg_compromise_button_desc $luxembourg_compromise_button$#!#!#! podporuje celkem #variable [GetGlobalVariable( 'je_conference_of_london_proposal_4' ).GetValue]#! [concept_prestige]\n\nKonference bude ukončena za #variable [GetGlobalVariable('je_conference_of_london_timer').GetValue]#! měsíců. Návrh s největší prestiží, která jej #tooltippable #tooltip:london_treaty_voting_rules podporuje#!#!, bude poté vybrán jako oficiální řešení konference.\n\n#Bold Výsledek#!\nKonference [ROOT.GetCountry.GetCustom('treaty_of_london_coutcome')][ROOT.GetCountry.GetCustom('treaty_of_london_acceptance_timer')]"
 je_conference_of_london_tt_1: "Konference rozhodla, jak vyřešit belgickou otázku."
 je_conference_of_london_tt_2: "#v $BEL$#! přijímá výsledek konference"
 je_conference_of_london_tt_4: "#v $NET$#! přijímá výsledek konference"
 je_conference_of_london_tt_3: "Buď #v $BEL$#!, nebo #v $NET$#! odmítá výsledek konference."
 je_conference_of_london_tt_5: "#v $BEL$#! a #v $NET$#! se ocitají ve vzájemné válce"
 london_conference_made_choice_tt: "#bold Nepodpořili#! jsme žádný návrh"
 london_treaty_voting_rules: "V případě, že dva vedoucí návrhy získají stejnou míru podpory v [concept_prestige], bude zvolen návrh podporovaný [concept_great_power] s nejvyšší [concept_rank].\n\nPokud do ukončení konference oficiálně nezvýhodníte žádné řešení, vaši delegáti budou jednat nezávisle a jedno vyberou za vás."
 favour_belgium_button: "Podpořit belgické nároky"
 favour_belgium_button_desc: "#v $BEL$#! má obdržet celé provincie Limburg a Lucembursko.\n\nJako náhradu pro #v $NET$#! za ztrátu obou provincií musí #v $BEL$#! převzít celý veřejný [Concept('concept_credit','$concept_credit_debt$')] bývalého #tooltippable #tooltip:london_treaty_public_debt_info #bold Spojeného království nizozemského#!#!#!."
 favour_netherlands_button: "Podpořit nizozemské nároky"
 favour_netherlands_button_desc: "#v $NET$#! má obdržet celé provincie Limburg a Lucembursko.\n\nJako náhradu pro #v $BEL$#! za ztrátu obou provincií musí #v $NET$#! převzít celý veřejný [Concept('concept_credit','$concept_credit_debt$')] bývalého #tooltippable #tooltip:london_treaty_public_debt_info #bold Spojeného království nizozemského#!#!#!."
