 ep2_meiji_pulse.2.t: "Bombardování [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "Jako odvetu za odmítnutí domény [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] zaplatit odškodné za smrt [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] se [SCOPE.sCountry('relevant_gp').GetAdjective] námořní plavidla pustila do několikadenního dělostřeleckého souboje s pobřežní obranou [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]."
 ep2_meiji_pulse.2.f: "Zátoka se ztrácela v mlze dělostřeleckého kouře a [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] hořelo. Přes vodu jedna z cizích lodí pálila rakety do sléváren na severu města. S každým odpálením pekelná rudá záře přehlušila slabé světlo zapadajícího slunce.\n\nPoslední provozuschopné dělo na baterii [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] zahřmělo – byl to dlouhý výstřel i za dobrých podmínek, a nyní beznadějný. Koule dopadla několik délek od třetího plavidla v cizí koloně a vyrazila do vzduchu mohutný sloup vody. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] popadl [SCOPE.sCharacter('name_a_scope').GetHerHis] vytěrák a spěchal se postarat o dělo. Kdesi za zadní zdí stále křičeli muži ranění poslední salvou. Nějakým způsobem je [SCOPE.sCharacter('name_a_scope').GetSheHe] navzdory zvonění v [SCOPE.sCharacter('name_a_scope').GetHerHis] uších stále slyšel."
 ep2_meiji_pulse.2.a: "Tvrdá cena za jejich lehkomyslnost."
