 shogunate.1.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]"
 shogunate.1.d: "Jako nový hlava rodu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] jmenován císařem do úřadu Shōguna. Nový Shōgun je mnohými [SCOPE.gsInterestGroup('daimyo_scope').GetName] považován za pohrdaného, protože si dosud nezískal osobní autoritu."
 shogunate.1.f: "Dúhový průvod daimjó se vinul Ó-hiromou. Na nejvyšším stupni seděl Shōgun oděný v černé a červené, vedle něj v krabici dekret císaře.\n\nJeden po druhém se před ním klaněli šlechtici v červené, modré a fialové a přinášeli meče a dary ze zlata. Shōgun nepromluvil a ti, kteří se mu klaněli, také ne. Ti nižší, kteří nesměli Shōguna vidět, stáli venku. Ze zahrady se zvedal zpěv."
 shogunate.1.a: "Goshōshin, goshōshin!"
 shogunate.2.t: "Otázka následnictví"
 shogunate.2.d: "Nepříznivý stav prvorozeného syna [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], [SCOPE.sCharacter('iesada_scope').GetFirstName], vyvolal obavy, zda bude schopen plnit povinnosti [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]. Zahraniční daimjó vedení [SCOPE.sCharacter('armed_forces_leader').GetFullName] se postavili za [SCOPE.sCharacter('yoshinobu_scope').GetFullName] jako alternativního kandidáta."
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] ložnice byla prázdná. Paravany byly zavřené a veranda uklizena. [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] seděl u postele tváří k prázdnému listu papíru. Oči měl zavřené. Kdyby měla sousední síň projít kočka, [SCOPE.sCharacter('armed_forces_leader').GetSheHe] by to jistě slyšel—a přesto nemohl být jistý, že nikdo neposlouchá. V tak rané fázi bylo nejlepší držet [SCOPE.sCharacter('armed_forces_leader').GetHerHis] ambice pevně v mysli.\n\nBude to vidět Císařský dvůr stejně jako [SCOPE.sCharacter('armed_forces_leader').GetHerHim]? [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] měl důvod tomu věřit, ale to byla ta nejjednodušší otázka. Jeho mysl se obrátila. Jak nejlépe získat dekret? Jak zajistit, aby nezmizel?"
 shogunate.2.a: "Vnitřní [GetLawType('law_bakufu').GetName] si prosadí své."
 shogunate.2.b: "Situace vyžaduje rozhodné vedení."
 shogunate.3.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]"
 shogunate.3.d: "Jako nový hlava rodu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] jmenován císařem do úřadu Shōguna. Shōgun byl od dětství nemocný a jeho stav již rozpoutal souboj o následnictví."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin!"
 shogunate.4.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]"
 shogunate.4.d: "Jako nový hlava rodu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] jmenován císařem do úřadu Shōguna. Podporovatelé nového shōguna v reformatorských doménách mají vysoká očekávání jeho vlády."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi a Nanki"
 shogunate.5.d: "Frakce, které vznikly kolem následnictví Shōguna Ieyoshiho, se opět střetly o to, kdo nastoupí po bezdětném [SCOPE.sCharacter('shogun_scope').GetFullName]. Frakce Hitotsubashi outsiderů daimjó a nižších [SCOPE.gsInterestGroup('armed_forces_ig').GetName] podporuje [SCOPE.sCharacter('yoshinobu_scope').GetFullName], zatímco frakce Nanki insiderů [SCOPE.gsInterestGroup('daimyo_ig').GetName] podporuje [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Zprávař bez výrazu stočil pohled na podlahu před mužem na pódiu. Jeho štětec visel nad papírem.\n\n„Zpráva pro Yoshikatsu-sama“, řekl magistrát. „Někteří u dvora se zabývají nevhodnými spekulacemi o zdraví Shōguna. Předpokládají, že je němý. Dejte mi vědět, pokud se objeví nějaké koncepty napsané za těchto předpokladů.“"
 shogunate.5.a: "Vůle Shōguna je, aby vládl [SCOPE.sCharacter('iemochi_scope').GetFirstName]."
 shogunate.5.b: "Císařský dvůr žádá zkušeného nástupce."
 shogunate.6.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]"
 shogunate.6.d: "Jako nový hlava rodu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] jmenován císařem do úřadu Shōguna. Přesto mladý, Shōgun si již získal reputaci stoického, pečlivého úsudku."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U] bude vládnout pod věrným opatrovníkem."
 shogunate.6.b_regency: "Komprimis s Hitotsubashi—jmenovat [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] opatrovníkem [SCOPE.sCharacter('shogun_scope').GetHerHis]."
 shogunate.7.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]"
 shogunate.7.d: "Jako nový hlava rodu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] jmenován císařem do úřadu Shōguna. Světský a otevřený, očekává se, že Shōgun bude patronovat reformatorským frakcím [GetLawType('law_bakufu').GetName]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin!"
 shogunate.8.t: "Horké léto"
 shogunate.8.d: "Léto a horko výrazně zhoršilo zdraví starého [SCOPE.sCharacter('shogun_scope').GetFullName]. Nyní na lůžku, [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] bojuje poslední bitvu proti svému selhávajícímu srdci."
 shogunate.8.f: "Lůžko Shōguna bylo postaveno čelem k oknu. Jeho služebníci doufali, že chladný vzduch od moře doplní jejich vějíře. Na konci postele stála otevřená truhla s ledem a na čele mokrý hadr.\n\nDnes nebyl vítr. Vzduch se třásl pod zapadajícím sluncem. Nemilosrdný, vše pohlcující. Už nedokázal rozeznat tvar vln dole."
 shogunate.8.a: "To je konec."
 shogunate.8.b: "Pošlete pro holandské léčitele."
