 iwakura_mission.1.t: "Mise na Západ"
 iwakura_mission.1.d: "Vláda sestavila seznam několika ministrů a úředníků vhodných pro roli mimořádného a zplnomocněného velvyslance. Vybraný kandidát bude vyslán, aby vedl expedici na Západ po očekávanou dobu deseti měsíců."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] stál před zrcadlem a znovu a znovu kontroloval [SCOPE.sCharacter('expedition_leader_1').GetHerHis] kravatu. Už nějaký čas uplynul od chvíle, kdy dorazila do Japonska – nejprve jako móda a poté státním nařízením – přesto mu dosud nepřipadala přirozená. [SCOPE.sCharacter('expedition_leader_1').GetSheHe|U] si s tím bude muset poradit. Pokud jeho dohoda uspěje, pokud vláda podpoří [SCOPE.sCharacter('expedition_leader_1').GetHerHis] kandidaturu, pokud se probudí v Londýně, Bostonu a Paříži, konec dne už nebude znamenat oddech."
 iwakura_mission.1.a: "Tato záležitost vyžaduje pozornost [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Jmenujte do této role [SCOPE.sCharacter('expedition_leader_2').GetFullName]."
 iwakura_mission.1.c: "Můžeme se spolehnout na [SCOPE.sCharacter('expedition_leader_3').GetFullName]."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] by z této příležitosti mohl mít prospěch."
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova zpráva"
 iwakura_mission.2.d: "Po návratu [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ovy mise do $JAP$ předložili [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] a [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHis] kolegové velvyslanci své zprávy [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Jejich zprávy obsahují postřehy o průmyslové společnosti a doporučení pro nové státní politiky."
 iwakura_mission.2.f: "„Při hlubším zamyšlení je zřejmé, že úspěch evropských a amerických národů pramení z jejich správného uplatňování zásad. Ti, kdo putují světem, pozorují, že v oněch více než tuctu zkoumaných národů se struktury vládnutí mohou lišit, přesto všechny směřují svou sílu ke vzdělání a sjednocují se pod jedním praporem. Proto při vstupu do kterékoli z těchto zemí není místa bez škol a není člověka bez ducha osvícení.“\n\n—Tanaka Fudžimaro"
 iwakura_mission.2.a: "Západ nám poskytl okno do modernity."
 iwakura_mission.2.b: "Průmysl po [SCOPE.sCountry('iwakura_good_economy_country').GetAdjective] vzoru bude budoucností Japonska."
 iwakura_mission.2.c: "Z [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective] politiky se lze mnohému naučit."
 iwakura_mission.2.e: "Pozemková reforma inspirovaná [SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective] vzorem by oživila venkov."
 iwakura_mission.4.t: "Zlatá brána"
 iwakura_mission.4.d: "Po dlouhé plavbě přes moře dorazila [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise do země [SCOPE.sCountry('iwakura_mission_host').GetName]. Mise plánuje cestovat po jejích železnicích do města [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] a cestou zkoumat [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting] instituce a průmyslová zařízení."
 iwakura_mission.4.f: "„Za úsvitu byla mořská mlha tak hustá, že jsme sotva viděli několik stop před sebe, a loď zastavila, čekajíc na rozednění. Jakmile se rozjasnilo, mlha se postupně rozptýlila a před námi se objevilo pobřeží Kalifornie. Po čase jsme dorazili doprostřed dvou skalnatých mysů, kde se po obou stranách zvedaly vysoké hory; jejich svahy se setkávaly s mořem a bylo vidět kouř parníků plujících sem a tam. Tento krásný výjev je to, čemu se říká Zlatá brána.\n\nDvaadvacet dní jsme překonávali oceán a konečně jsme zde na východě poprvé spatřili hory a vody. Když jsme na ně hleděli, nebylo slyšet nic než radost.“\n\n—Kume Kunitake, #italic Iwakurovo poselstvo, 1871–73#!"
 iwakura_mission.4.a: "Poznání celého kontinentu leží před námi."
 iwakura_mission.4.b: "Amerika je pouze branou do Evropy."
 iwakura_mission.5.t: "V břiše velryby"
 iwakura_mission.5.d: "Po cestě od Pacifiku k Atlantiku dorazila [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise do země [SCOPE.sCountry('iwakura_mission_host').GetName]. Mise usiluje o navázání diplomatických vztahů s vládou [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle] a o prohlídku míst, kde se zrodila průmyslová revoluce."
 iwakura_mission.5.f: "„Jak Amerika prosperovala, přístav Liverpool stále více vzkvétal. U vjezdu do přístavu byla vybudována řada doků, táhnoucí se šest mil podél severního břehu. Na straně obrácené k moři byly navršeny kamenné náspy jako hradby a uvnitř nich byly doky vyhloubeny všemi směry. Všechna plavidla, která vplouvají i vyplouvají, připlouvají do těchto doků a kotví tam. Jejich stěžně připomínají les hustě rostoucích stromů a lanoví připomíná sítě rozvěšené k sušení v rybářské vesnici. Bylo nám řečeno, že to jsou největší doky na světě.“\n\n—Kume Kunitake, #italic Iwakurovo poselstvo, 1871–73#!"
 iwakura_mission.5.a: "Sledujte každou stopu, která se nám nabídne."
 iwakura_mission.5.b: "Dva měsíce stačí k tomu, abychom viděli celé město [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]."
 iwakura_mission.6.t: "Napříč kontinentem"
 iwakura_mission.6.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise dorazila do kontinentální Evropy, počínaje zemí [SCOPE.sCountry('iwakura_mission_host').GetName]. V příštích měsících hodlá mise pozorovat, posuzovat a navazovat vztahy s četnými národy kontinentu."
 iwakura_mission.6.f: "„Dnes odpoledne jsme navštívili hřbitov, jehož jméno jsme se zapomněli zeptat. Leží na východním okraji Paříže a rozkládá se na ploše čtyřiceti akrů. Kromě jediné široké vozové cesty zde téměř není místo nazbyt.\n\nDnes se konal pohřeb někoho, kdo patrně pocházel z rodiny skromných poměrů. Malý průvod doprovázel dřevěnou rakev, která byla spuštěna do hrobu. Když kněz dokončil modlitbu, přítomní, plačíce, vhodili každý hrst země. Ačkoli každý v průvodu měl oči plné slz, nikdo nevznesl hlasitý nářek.“\n\n—Kume Kunitake, #italic Iwakurovo poselstvo, 1871–73#!"
 iwakura_mission.6.a: "Dáme si na čas, abychom mohli porovnávat a rozlišovat."
 iwakura_mission.6.b: "Časový plán vyžaduje zrychlenou cestu."
 iwakura_mission.8.t: "Druhá polovina"
 iwakura_mission.8.d: "Na cestě do [ROOT.GetCountry.GetName] se [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise zastavila v [SCOPE.sCountry('iwakura_mission_host').GetAdjective] kolonii [SCOPE.sState('iwakura_mission_location').GetName]. Mise strávila několik dní pozorováním evropské koloniální společnosti i domorodých [GetReligion('theravada').GetNameNoIcon] praktik."
 iwakura_mission.8.f: "„Během naší zdejší návštěvy nás provázel mnich, který nás nazýval #italic danna#! a chrám #italic garan#!. Zapůsobilo na nás, že sanskrtský původ těchto slov se zachoval až dodnes. Cejlon je posvátnou zemí Buddhova učení a místní lid zůstává buddhismu stále oddán. Protože život lidu je už tak prostý, život mnichů je ještě prostší. Jejich jídla jsou skromná, jejich poustevny zarostlé plevelem a vše dosáhlo stavu krajní jednoduchosti.\n\nVe srovnání s posvátnými místy křesťanství či islámu je zdejší rozdíl nápadný. Je to proto, že toto náboženství odvrhlo světské ozdoby? Snad. Možná však také proto, že mu chybí síla vzkvétat.“\n\n—Kume Kunitake, #italic Iwakurovo poselstvo, 1871–73#!"
 iwakura_mission.8.a: "Mohl takový osud potkat i nás?"
 iwakura_mission.9.t: "Přístav Jokohama"
 iwakura_mission.9.d: "Po měsících strávených v zahraničí a dokončení úplného obeplutí zeměkoule se [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise vrátila do [ROOT.GetCountry.GetName]. Přivezla s sebou soubory dat, cizí zboží a svědectví z první ruky o západních technologiích a politických institucích."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] stál na palubě parníku a hleděl k západu. V dálce viděl mohutnost hory Fudži, zahalené ranní mlhou, která se rozptýlila jen napůl. U zábradlí se shlukla skupinka Zápaďanů – snad obchodníků, či čerstvých světoběžníků jako [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerselfHimself]. Němec seděl na lavičce u dveří kajuty a kreslil scénu do skicáku. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe|U] přemýšlel, zda je to pro ně poprvé, nebo zda se jim, stejně jako [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim], tají dech pokaždé, když spatří tento výhled.\n\nO kolika lidech se skutečně dalo říci, že vykonali to, co on? Kolik jich překročilo tři oceány a navštívilo čtyři kontinenty? Přijde jich stále víc, pomyslel si [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]. Železnice a parník vytvoří stále více takových, jako je [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim], ale dějiny si [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim] zapamatují jako jednoho z prvních."
 iwakura_mission.9.a: "Domov je ze všech pohledů nejkrásnější."
 je_iwakura_mission: "Restaurace: [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise"
 je_iwakura_mission_reason: "V rámci svých modernizačních opatření vyslala nová vláda země [ROOT.GetCountry.GetName] [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] a početný doprovod ministrů a učenců na diplomatickou misi napříč západním světem. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]ova mise usiluje o opětovné vyjednání nerovných smluv se Západem a o prozkoumání politických a technologických základů velmocí.\n\nZa každý #b měsíc#!, kdy mise zůstane v určité zemi, bude existovat šance, že shromáždí poznatky o zákonech nebo technologiích této země. Tyto poznatky ovlivní zprávu, kterou mise vydá po svém návratu, i [concept_ideology] vůdce expedice."
