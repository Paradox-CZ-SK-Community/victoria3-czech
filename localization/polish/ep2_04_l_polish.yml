 ig_in_pro_country_lobby_tt: "[concept_interest_group] je v příznivém [concept_political_lobby]"
 iwakura_mission.1.t: "Mise na Západ"
 iwakura_mission.1.d: "Vláda sestavila seznam ministrů a úředníků vhodných pro roli velvyslance s plnými plnomocemi. Vybraný kandidát bude vyslán vést výpravu na Západ na očekávanou dobu deseti měsíců."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] stál před zrcadlem a kontroloval si kravatu znovu a znovu. Toto oblečení bylo do Japonska zavlečeno—nejprve jako módní trend a poté státní vyhláškou—ale stále mu nepřirostlo k srdci. Musel si poradit. Pokud jeho mise uspěje, pokud bude vláda jeho plán podporovat, pokud se jednou probudí v Londýně, Bostonu nebo Paříži, večer už nebude znamenat odpočinek."
 iwakura_mission.1.a: "Záležitost vyžaduje pozornost [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Jmenujte do role [SCOPE.sCharacter('expedition_leader_2').GetFullName]."
 iwakura_mission.1.c: "Můžeme spoléhat na [SCOPE.sCharacter('expedition_leader_3').GetFullName]."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] by z této příležitosti mohl profitovat."
 iwakura_mission.2.t: "Zpráva [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 iwakura_mission.2.d: "Po návratu mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] do $JAP$ předložili [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] a jeho spoludiplomaté zprávy [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Jejich zprávy obsahují pozorování průmyslové společnosti a doporučení nových státních politik."
 iwakura_mission.2.f: "„Při hlubokém rozjímání je zřejmé, že úspěch evropských a amerických národů pramení z jejich správné aplikace principů. Ti, kdo cestují světem, pozorují, že v přezkoumaných zemích se správní struktury mohou lišit, ale všechny směřují svou sílu k vzdělání a sjednocují se pod jedním praporem. Tudíž v žádné z těchto zemí není místo bez škol a není nikdo bez ducha osvícení.“\n\n—Tanaka Fujimaro"
 iwakura_mission.2.a: "Západ nám dal okno do modernity."
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective]-připravený průmysl bude budoucností Japonska."
 iwakura_mission.2.c: "Je mnoho co se naučit z [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective] politiky."
 iwakura_mission.2.e: "Pozemková reforma inspirovaná [SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective] oživí venkov."
 iwakura_mission.4.t: "Zlatá brána"
 iwakura_mission.4.d: "Po dlouhé plavbě napříč mořem dorazila mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] do [SCOPE.sCountry('iwakura_mission_host').GetName]. Mise plánuje cestovat jejím železničním systémem do [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName], pozorujíc instituce a průmyslová zařízení [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting]."
 iwakura_mission.4.f: "„Za úsvitu byla mlha nad mořem tak hustá, že jsme sotva viděli několik stop před sebou, a loď zastavila, čekajíc na svítání. Jakmile se zvedlo světlo, mlha postupně povolila a před námi se objevil pobřežní pás Kalifornie. Nakonec jsme dorazili mezi dva skalnaté mys, kde hory po obou stranách stoupaly vysoko; jejich svahy se setkávaly s mořem a kouř parníků bylo vidět přecházet sem a tam. Tento krásný výjev se nazývá Zlatá brána.\n\nZa dvacet dva dní jsme překročili oceán a konečně zde na Východě poprvé spatřili hory a vody. Při pohledu na to nebyl slyšet jiný zvuk než radost.„\n\n—Kume Kunitake, #italic Iwakura Embassy, 1871-73#!"
 iwakura_mission.4.a: "Znalost kontinentu leží před námi."
 iwakura_mission.4.b: "Amerika je pouze bránou do Evropy."
 iwakura_mission.5.t: "Břicho velryby"
 iwakura_mission.5.d: "Po průplavě z Pacifiku na Atlantik dorazila mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] do [SCOPE.sCountry('iwakura_mission_host').GetName]. Mise usiluje navázat diplomatické vztahy s vládou [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle] a navštívit zakládající místa průmyslové revoluce."
 iwakura_mission.5.f: "„Jak Amerika prosperovala, přístav Liverpoolu se stal čím dál rušnějším. Linií doků byly vybudovány u vchodu do přístavu, táhnoucí se šest mil podél severního pobřeží. Na mořské straně byly postaveny kamenné hráze jako hradby a uvnitř nich doky vyhloubeny ve všech směrech. Všechna plavidla připlouvající či odplouvající kotvila v těchto dokách. Jejich stěžně připomínaly les hustě rostoucích stromů a ráhna vázala sítě sušené v rybářské vesnici. To, co nám bylo řečeno, byly největší doky na světě.“\n\n—Kume Kunitake, #italic Iwakura Embassy, 1871-73#!"
 iwakura_mission.5.a: "Využít každý náznak, který se před námi objeví."
 iwakura_mission.5.b: "Dva měsíce stačí k poznání [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]."
 iwakura_mission.6.t: "Napříč kontinentem"
 iwakura_mission.6.d: "Mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] dorazila na kontinentální Evropu, začínajíc v zemi [SCOPE.sCountry('iwakura_mission_host').GetName]. V následujících měsících mise hodlá pozorovat, hodnotit a navázat vztahy s množstvím zemí na kontinentu."
 iwakura_mission.6.f: "„Odpoledne jsme navštívili hřbitov, jehož jméno jsme se nepodařilo zeptat. Leží na východních okrajích Paříže a zabírá čtyřicet akrů. Dnes tam byla pohřební slavnost pro zdánlivě prostou rodinu. Malý průvod doprovázel dřevěnou rakev, kterou položili do hrobu. Když kněz dokončil modlitbu, ti přítomní, plní slz, každý vrhnul hrst země. Ačkoliv každý z průvodu měl oči plné slz, nikdo z nich nevykřikl nahlas.“\n\n—Kume Kunitake, #italic Iwakura Embassy, 1871-73#!"
 iwakura_mission.6.a: "Budeme si dávat čas na porovnávání a kontrasty."
 iwakura_mission.6.b: "Časový plán vyžaduje urychlenou prohlídku."
 iwakura_mission.8.t: "Druhá polovina"
 iwakura_mission.8.d: "Na cestě do [ROOT.GetCountry.GetName] udělala mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] zastávku v koloniální oblasti [SCOPE.sCountry('iwakura_mission_host').GetAdjective] [SCOPE.sState('iwakura_mission_location').GetName]. Mise strávila několik dní pozorováním evropské koloniální společnosti a místních buddhistických praktik."
 iwakura_mission.8.f: "„Při naší návštěvě nás provázel mnich, který nám říkal #italic danna#! a chrám #italic garan#!. Byl jsem ohromen, že sanskrtský původ těchto slov je dosud zachován. Cejlon je posvátnou zemí budhistické praxe a domorodí lidé jsou stále oddaní buddhismu. Život lidí je jednoduchý a život mnichů ještě prostší. Jejich pokrmy jsou skromné, jejich poustevny zarostlé plevelem a vše dosáhlo extrémní střídmosti.\n\nVe srovnání s posvátnými místy křesťanství nebo islámu je kontrast na tomto místě výrazný. Je to proto, že náboženství odhodilo světské ozdoby? Možná. Nebo to může být proto, že mu chybí síla rozvíjet se.„\n\n—Kume Kunitake, #italic Iwakura Embassy, 1871-73#!"
 iwakura_mission.8.a: "Mohlo by nás takové osudu postihnout?"
 iwakura_mission.9.t: "Přístav Jokohama"
 iwakura_mission.9.d: "Po měsících v cizině a obkružení světa se mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] vrátila do [ROOT.GetCountry.GetName]. Přivezli s sebou souhrny dat, cizí zboží a první ruční poznatky o západních technologiích a politických institucích."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] stál na palubě parníku a díval se na západ. V dálce spatřil mohutnost Fujijamy, zahalené ranní mlhou, která se jen částečně zvedla. Skupina cizinců—obchodníci, možná čerstvě natěšení cestovatelé jako [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerselfHimself]—se shlukla kolem zábradlí. Německý muž seděl na lavici u dveří kajuty a kreslil scénu do skicáku. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe|U] se ptal, kolik z nich zažilo to, co on. Kolik jich opravdu podniklo tři oceánské přeplavby, navštívilo čtyři kontinenty? Čím dál víc jich přijde, pomyslel si. Železnice a parníky vytvoří stále více takových, ale historie si zapamatuje [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim] jako jednoho z prvních."
 iwakura_mission.9.a: "Domov je nejkrásnější pohled ze všech."
 je_iwakura_mission: "Restaurace: Mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 je_iwakura_mission_reason: "Jako součást modernizačních opatření poslala nová vláda [ROOT.GetCountry.GetName] [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] a početný doprovod ministrů a učenců na diplomatickou misi do Velkých mocností. Mise [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] usiluje o renegociaci nerovných smluv se Západem a o studium politických a technologických základů Velmocí.\n\nZa každý #b měsíc#!, který mise stráví v zemi, může se objevit šance, že získá poznatky o jejích zákonech nebo technologiích. Tyto poznatky ovlivní zprávu, kterou mise po návratu vydá, stejně jako [concept_ideology] vedoucího expedice."
