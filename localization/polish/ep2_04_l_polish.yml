 ep2_meiji_pulse.4.t: "Spálení [SCOPE.sCountry('relevant_gp').GetAdjective] legace"
 ep2_meiji_pulse.4.d: "#italic Sonnō Jōi#! samurajové z domény [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] zaútočili na právě budovanou legaci [SCOPE.sCountry('relevant_gp').GetAdjective] v [SCOPE.sState('edo_state').GetCityHubName]. Co mělo být první západním stylem postavenou budovou ve městě bylo srovnáno se zemí a pachatelé nikde."
 ep2_meiji_pulse.4.f: "Dva muži, skrytí v kuklách a maskách, usedli na vrchol kopce s výhledem na to, co mělo být legací. Oranžový nádech stále stoupal z nyní černé skořápky. Když bylo vše snadno dostupné palivo uhaseno, plameny bojovaly o udržení na hustých vnitřních nosnících.\n\nJak žár vytratil, dva muži zůstali. Jeden promluvil tiše a zíral na pilíř kouře, který zůstal.\n\n„Nebyla by to krása, kdyby jeho popel padal na nás jako sníh?“"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] se stalo neřiditelným."
 ep2_meiji_pulse.4.b: "Zakázat [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] nosit zbraně ve městě."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName] zaplatí odškodnění @money!#v 3M#! během #v 10 let#! [SCOPE.sCountry('relevant_gp').GetName]"
 shimonoseki_indemnity_port_tt: "Město $HUB_NAME_STATE_KANSAI_port_japanese$ v [GetStateRegion('STATE_KANSAI').GetName] bude otevřeno jako [SCOPE.sCountry('relevant_gp').GetAdjective] [concept_treaty_port]"
 modifier_ungovernable_capital: "Přiznána neřiditelnost"
 ep2_meiji_pulse.5.t: "Krveprolitá pomsta"
 ep2_meiji_pulse.5.d: "Nejvyšší ministr Šógunátu, [SCOPE.sCharacter('tairo_scope').GetFullName], byl u brány Edo hradu zavražděn róniny z domén [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. Manifesto pachatelů hlásalo #italic Sonnō Jōi#! zásady a odsuzovalo ministrův ústupek cizincům."
 ep2_meiji_pulse.5.f: "Chuzaburo sledoval, jak Gorokuro vklouzl před průvod a jeden z [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] strážců se postavil, aby jej zadržel. Gorokuro mu nenechal čas na reakci. Vytáhl svůj meč a vrhl se. Z [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] muže vytryskla masivní čára krve z rozsekané tváře a jeho společníci se vrhli vpřed, aby ho pomstili.\n\nChuzaburo nechal plášť spadnout a vytáhl pistoli. Zacílil na bok nosítek a stiskl spoušť. Ránu přerušil křik sekaných mečů a další výstřel. Jeden ze strážců se obrátil a Jizaemon, rónin z [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], střelci šermoval mečem k trupu. Za bojujícím párem Chuzaburo viděl řeku rudé krve protékající dveřmi nosítek na zasněžené ulici. Vytáhl wakizashi a běžel k nim."
 ep2_meiji_pulse.5.a: "Samurajové opět zkříží meče."
 modifier_tairo_assassinated: "Tairō zavražděn"
 ep2_meiji_pulse.6.t: "Incident v Ikedaye"
 ep2_meiji_pulse.6.d: "Na základě informací získaných mučením militantů [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] zahájili [GetLawType('law_shinsengumi').GetName] razii proti shromáždění podezřelých spiklenců v hostinci Ikedaya v [SCOPE.sState('kyoto_state').GetName]. Razie se změnila v zuřivou šermířskou bitvu v a kolem hostince."
 ep2_meiji_pulse.6.f: "Otaka se opřel o zábradlí, když Shinsengumi vrazili dovnitř. Viděl krev na rukávech jejich světlemodrých #italic haori#!—černé na bílém v tlumeném světle lampy. Zvedl meč do obranné pozice.\n\nDva z nich se odtrhli a vtrhli po schodech, které hlídal, po dvou vedle sebe. Úderl mečem, pocítil, jak je parován, vyrovnal se. Jiskry létaly od dopadu. Druhý muž udeřil. Krok vzad, zatočení zápěstím k-\n\nByl záblesk ohně a oceli a pak něco chladného v jeho hrudi."
 ep2_meiji_pulse.6.a: "Odměnit Shinsengumi za jejich iniciativu."
 ep2_meiji_pulse.6.b: "Tato brutality pouze vybízí k odvetě."
 modifier_shinsengumi_meddling: "Rozmáhající se Shinsengumi"
 modifier_shinsengumi_crackdown: "Represe Shinsengumi"
 modifier_refrained_from_crackdowns: "Zdrženlivé Shinsengumi"
 sufficient_pressure_from_sonno_joi_tt: "[concept_activism] [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] je nad @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "Zakázaná brána"
 ep2_meiji_pulse.7.d: "Vojska spojená s hnutím [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] domény [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se pokusila vtrhnout do císařského paláce v [SCOPE.sState('kyoto_state').GetName] a násilím obnovit císaře. Jsou jim na překážku vojáci domény [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] a Aizu."
 ep2_meiji_pulse.7.f: "Hamaguri brána byla zahnána kouřem z pušek. Vše kolem nich Kyōto plane.\n\nAizu vojáci stáli soustředěni podél zdi a vypouštěli salvy mušketového ohně, které se odrážely od vozovky a podvozku děl [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Každých pár sekund jedno z kulecí zasáhlo tělo a vyvolalo výkřiky, které krátce přerušily praskání palby. Kōzō se tiskl u kola děla a snažil se uvolnit zablokovaný muškét. Jen kousek #italic ken#! od něj ležel vůdce jeho čety tváří dolů, bez nohou i paží. Přesto se stále kroutil."
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] a Aizu uspějí v odražení útočníků."
 ep2_meiji_pulse.7.b: "Císařský palác padne do rukou [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "[ROOT.GetCountry.GetName] [concept_coup_resistance] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) je pod [SCOPE.sCharacter('daimyo_1_scope').GetFullName] [concept_coup_strength] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "Výprava [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "Jako odplata za útok [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] na císařský palác nařídil Šógun trestnou výpravu, aby vytlačil frakci #italic Sonnō Jōi#! z domény. Poradci sympatičtí [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] nabídli plán zabezpečení míru výměnou za seppuku viníků."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], daimjó [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], stál na balkóně hradu a díval se do dálky. Daleko se obloha zbarvila kouřem—táboráky postupující armády.\n\n„Shōgun požaduje seppuku tří hlavních vazalů,“ řekl služebník. „Setnutí hlav čtyř ředitelů štábu. Vyhnanství pěti ministrů.“\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] hleděl na ohně. Byly jich stovky, minimálně. Dříve modrá horizont se změnila v cosi nemocného. Nakonec promluvil.\n\n„...Doména [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se podřídí.“"
 ep2_meiji_pulse.8.a: "Pokud je lze porazit bez boje, ať tak bude."
 ep2_meiji_pulse.8.b: "Doména musí být očištěna shora dolů."
 modifier_daimyo_house_arrest: "Zadržený daimjó"
 modifier_daimyo_executed: "Daimjó zbaven majetku"
 ep2_meiji_pulse.9.t: "Rozkaz vyhnat barbaři"
 ep2_meiji_pulse.9.d: "Rozhorčen prikvapnutými smlouvami, které byly [ROOT.GetCountry.GetName] nuceny západními mocnostmi, císař obešel Shōguna a vydal edikt vyhostit cizince z [ROOT.GetCountry.GetAdjectiveNoFormatting] půdy. Militanti hnutí [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] se shromáždili k císařově věci."
 ep2_meiji_pulse.9.f: "Vazal stál opodál jednoho z děl a díval se k průlivu. V této hodině byly lodě plující obrysy u západu slunce. Oní nižší samurajové domény Chōshū pletli patrony a pytle s černým prachem.\n\nKdyž vzhlédl na tvar Hinoyamy a městečka Shimonoseki dole, vybavil si pasáž z ediktu. „I kdyby země měla být spálena na popel,“ stálo v něm, „nepřipustíme otevření přístavů pro obchod.“\n\nBylo to ospravedlnitelné? Připustil by, aby byl jemný zelený svah vypálen, aby pole květin shořela, aby jeho domov byl srovnán se zemí? Ano, pomyslel si. Bez váhání."
 ep2_meiji_pulse.9.a: "Shōgun musí odjet do Kyōta, aby o tom jednal."
 ep2_meiji_pulse.9.b: "Tento rozkaz je podvrh—nechte ho potlačit."
