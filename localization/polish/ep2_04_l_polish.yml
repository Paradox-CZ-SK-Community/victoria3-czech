 zaibatsu.2.t_1: "Vyrovnávací ruka"
 zaibatsu.2.d: "Politika kabinetu [SCOPE.sCharacter('pm_scope').GetLastName] omezila schopnosti [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] ovládat [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici budou vládnout a manažeři se zaměří na zisky."
 zaibatsu.2.d_1: "Politika volného obchodu kabinetu [SCOPE.sCharacter('pm_scope').GetLastName] rozrušila síť vojensko-průmyslových kontraktů, klíčových pro kontrolu [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] nad [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici budou vládnout a manažeři se zaměří na zisky."
 zaibatsu.2.f: "Skupina výkonných pracovníků se přesunula do nejvyšší zasedací síně sídla [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] byl třetí, kdo vstoupil, za sekretářkami. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] usedl u dveří a sledoval své nadřízené projít. Z šálku před ním stoupal slabý párek páry.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] byl poslední, kdo přišel. Jeho pohled přejel každého zaměstnance. V očích měl [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis|U] výraz, který Baron nikdy dřív neukázal. Vyčerpanost. Stíny v rýhách ve tváři byly hlubší a šediny v jeho vlasech řidší."
 zaibatsu.2.a: "Svrchovaná moc je pouze naše."
 zaibatsu.2.b: "Ať lid ví—[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] nebude na prodej."
