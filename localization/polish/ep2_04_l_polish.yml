 ep2_meiji_pulse.1.t: "Právo seknout"
 ep2_meiji_pulse.1.d: "Během cesty ve státě [SCOPE.sState('relevant_treaty_port_state').GetName] byl [SCOPE.sCountry('relevant_gp').GetAdjective] obchodník zabit družinou [SCOPE.sCharacter('daimyo_scope').GetFullName], protože odmítl sesednout, když kolem něj projížděl. Daimjó [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] prohlásil zabití za zákonné na základě práva seknout jakéhokoli prostého člověka, který mu projeví neúctu."
 ep2_meiji_pulse.1.f: "Cizinci narušili řady mušketýrského oddílu a ze všech stran se ozval křik. Když si cizinec v čele všiml ozbrojených mužů kolem sebe, prudce strhl otěže do strany a obrátil koně tak rychle, že málem srazil jednoho z mušketýrů z jeho vlastního koně. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] tasil meč a jeho druhové ve vnitřním kruhu se k němu připojili.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] zasadil první úder a otevřel vetřelci ránu podél boku. Ten vykřikl a znovu švihl otěžemi. Bylo to marné. Nejbližší mušketýr tasil vlastní čepel a udeřil. Ve vzduchu zůstal viset rudý oblouk jako mrak."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] si nepřejí nic víc než nám působit potíže."
 ep2_meiji_pulse.11.t: "Aféra [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "Při obchodní činnosti v zemi [SCOPE.sCountry('japan_scope').GetName] byl [ROOT.GetCountry.GetAdjectiveNoFlag] obchodník jménem [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] zavražděn místním pánem [SCOPE.sCharacter('daimyo_scope').GetFullName]. Pán tvrdí, že se [SCOPE.sCharacter('daimyo_scope').GetHerselfHimself] ospravedlňuje zákony [SCOPE.sCharacter('daimyo_scope').GetHerHis] země, a odmítl zaplatit jakoukoli náhradu za [SCOPE.sCharacter('daimyo_scope').GetHerHis] zločin."
 ep2_meiji_pulse.11.f: "#b Úvodník#!\n\nZa současných okolností opakujeme, že [ROOT.GetCountry.GetNameNoFormatting] nemá jinou možnost než se připravit na velkou válku, nebo se s Japonskem rozloučit. O opuštění opěrného bodu, který tam získala, nebude ani uvažováno, a proto můžeme očekávat konflikt mezi oběma říšemi. Mnozí [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] tuto představu nemají rádi, přesto [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] z [ROOT.GetCountry.GetCapital.GetCityHubName] pokládá konflikt nejen za nevyhnutelný, ale i ospravedlnitelný, už jen na základě odmítnutí Japonců potrestat vrahy [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]... (#italic pokrač. str. 02#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Někdo#! musí zaplatit. Předložte věc Taikunovi."
 ep2_meiji_pulse.11.b: "Opravdu se chceme na Východě zaplést ještě více?"
