 special_character_japanese_emperor: "Císař Japonska"
 special_character_japanese_emperor_desc: "Tato postava je aktuálně usedlý císař Japonska, centrální pro japonské náboženské a politické instituce."
 japan_monarchy.1.t1: "Éra Kaei"
 japan_monarchy.1.t2: "Éra Tenkyū"
 japan_monarchy.1.d1: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] vystoupil na chryzantémový trůn jako císař Japonska. Jeho nástup značí začátek éry Kaei, pojmenované pro věčné štěstí."
 japan_monarchy.1.d2: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] vystoupil na chryzantémový trůn jako císař Japonska. Jeho nástup značí začátek éry Tenkyū, pojmenované pro nebeskou trvalost."
 japan_monarchy.1.f: "Odkudsi mimo dohled dal hudebník signál. Dvě dámy dvora otevřely závěsy trůnu. Tam byl císař, oblečen do šarlatových rouch zdobených bílými a zelenými draky. Jejich objem pohltil jeho sedadlo a zdál se vznášet. Z jeho koruny visel závoj korálků. Stíny, které vrhaly, skrývaly jeho oči před pohledem.\n\nOblečení zašustilo kolem [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], [SCOPE.sCharacter('name_scope').GetHerHis] sklonil hlavu. Ostatní přítomní se vlnou poklonili. [SCOPE.sCharacter('name_scope').GetSheHe|U] je následoval a stín císaře zmizel z dohledu.\n\nDny poté, na cestě zpět do Edo, se [SCOPE.sCharacter('name_scope').GetSheHe] snažil rekonstruovat, co viděl, ale nic nedokázal pevně uchopit. Vzpomněl si na korunu, závěsy, truhly vedle císaře. O samotném muži však nic nevzpomněl."
 japan_monarchy.1.a: "Ať jsou tvé léta jako zrnka písku na břehu."
 japan_monarchy.2.t: "Éra Meiji"
 japan_monarchy.2.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] vystoupil na chryzantémový trůn jako císař Japonska. Jeho nástup značí začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované pro příslib osvícené vlády."
 japan_monarchy.2.f: "Zazněl gong a závěs se zvedl. Na okamžik publikum spatřilo císaře, oblečeného v bohatě zdobeném žlutém hedvábí, jeho tvář částečně skryta. Zelená lakovaná truhla stála nalevo na stojanu a ukrývala posvátný meč a drahokam. Pak mistr zbraní dal znamení a všichni sklopili oči k podlaze. Hlas oznamovatele byl silný a pevný.\n\n„Od starých časů, v věku bohů, byly položeny základy říše a poté, v Kashihara, božský císař založil císařskou dynastii. Císařská linie proto pokračovala nepřetržitě. V souladu se starými zvyky a precedentem bývalých panování nyní přijímáme nebeské posloupnictví a ujímáme se Velkého císařského trůnu.“"
 japan_monarchy.2.a: "Ať jsou tvé léta jako zrnka písku na břehu."
 japan_monarchy.3.t: "Éra Taishō"
 japan_monarchy.3.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] vystoupil na chryzantémový trůn jako císař Japonska. Jeho nástup značí začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované pro ctnost veliké spravedlnosti."
 japan_monarchy.3.f: "Dřevěná plošina zaskřípěla, když po konstrukci prošel muž. Yatarō ji pevně držel. Jakmile kroky pominuly, dal se do práce, aby ji připevnil kladivem.\n\nSlyšel podobné zvuky ze všech stran. Po koutě viděl další skupinu, která montovala černé dřevěné stěny další budovy. Mistři volali na muže, který nesl rozvážně břemeno slámy.\n\nZa šest dní císař projde cestou, kterou stavěl, součástí obřadu, který skončí zničením. Nebude moci být přítomen. Nejlepší, co může doufat, je sledovat její záři odrážející se v mracích."
 japan_monarchy.3.a: "Ať jsou tvé léta jako zrnka písku na břehu."
 japan_monarchy.4.t: "Éra Shōwa"
 japan_monarchy.4.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] vystoupil na chryzantémový trůn jako císař Japonska. Jeho nástup značí začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované pro příslib osvíceného míru a souznění."
 japan_monarchy.4.f: "Čtyři generace rodiny Takaishi se tiskly kolem rádia. Hlas z něj zněl, jako by přicházel z hlubin studny, přepálen šumem. Giyō otáčel knoflíkem sem a tam. Když to přišlo znovu, bylo to silné a stabilní.\n\n„...Hlavní tajemník kabinetu vydal reskript oznamující novou éru. Od této chvíle se éra změní na první rok [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]...“\n\nMatčina oči se upřely na noviny na kuchyňském stole. „Ne Kobun? Je to pravda?“\n\nV místnosti se zvedaly nervózní šeptání a Giyō zesílil rádio. Bylo to marné. Pokud tu bylo něco dalšího, dozvědí se o tom až zítra."
 japan_monarchy.4.a: "Ať jsou tvé léta jako zrnka písku na břehu."
 japan_monarchy.5.t: "Jeden císař, jedna éra"
 japan_monarchy.5.d: "S obnovenou politickou převahou Císař vydal edikt reformující systém éry. Nová éra bude nyní vyhlašována při nástupu nového císaře a potrvá po celou dobu jeho vlády."
 japan_monarchy.5.f: "#bold Císařský edikt#!\n\nZaložení nové éry v okamžiku, kdy svatý panovník obdrží Nebeský mandát, představuje vzor osvíceného věku a standard pro deset tisíc generací. Vždy, když zdědil velkou linii a osobně se staral o nespočet státních záležitostí, nyní měním název éry, abych označil nový začátek s mnoha poddanými v říši. [ROOT.GetCountry.GetCustom('JAP_era_year_name')] bude od nynějška znám jako první rok [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. Od tohoto dne bude starý systém reformován a zavedeno pravidlo jedné éry na panování jako trvalá praxe."
 japan_monarchy.5.a: "Ti u moci to uskuteční."
 japan_monarchy.6.t: "Smrt Daijō Tennō"
 japan_monarchy.6.d: "Důchodce císař, abdikovaný otec současného císaře, zemřel. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U] je připomínán za své úsilí o obnovení císařské prestiže a byl mu dán posmrtný jméno [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Tōhō namočil štětec do inkoustu. Jeho hrot se pohyboval po stránce a tvořil znaky pro den, rok a počasí. Pak přešel do dalšího sloupce a zastavil se.\n\nJaké slova by byla vhodná? Jak nejlépe vyjádřit význam toho, co se stalo? Slyšel pověsti o velikém úsilí důchodce císaře obnovit dvorskou prestiž—vzpomenul si na obřady, které znovu zavedl. A pak přijal poselství dvora a dozvěděl se pravdu.\n\nŠtětec se dotkl papíru. „Obdrželi žádost o precedens týkající se titulu císaře. Konzultováno císařské rodokmeny a podána rada...“"
 japan_monarchy.6.a: "Uskuteční se jeho potomci jeho přání?"
