 zaibatsu.1.t: "Korporátní impérium"
 zaibatsu.1.d: "Trvalé partnerství mezi státem [ROOT.GetCountry.GetAdjective] a [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] upevnilo moc konglomerátů v [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici mohou vládnout, ale generálové a manažeři budou vládnout."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] sledoval zápas z kryté lóže. Jeho preferovaný zápasník dotlačil šampiona [SCOPE.sCharacter('pm_scope').GetHerHis] až na kraj ringu a [SCOPE.sCharacter('pm_scope').GetSheHe] se snažil udržet ruce v klidu. Po boku premiéra stál zcela klidně [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nRozhodčí ukázal vějířem a dav vybuchl. Déšť sedáků prolétal vzduchem a zasypával ring. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] se otočil k [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] a usmál se. Na protilehlé stěně byl vtisknut #italic mon#! [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "Ať se [ROOT.GetCountry.GetCapital.GetCityHubName] rozlije jako moře světel."
 zaibatsu.1.b: "Náš dodavatelský řetězec může být vždy bezpečnější."
