 modifier_taikun_proposal: "Taikunát"
 modifier_emperor_decieved: "Oklamaný císař"
 at_least_six_months_tt: "Následující platí alespoň #v 6#! měsíců (aktuálně [ROOT.GetCountry.MakeScope.Var('restoration_timer_var').GetValue|v0]) #indent_newline:3 "
 ep2_meiji.1.t: "Sonnō Jōi"
 ep2_meiji.1.d: "Konec sakoku probudil pocit bezmoci vůči zahraničnímu vpádu, podkopávající autoritu klanu [ROOT.GetCountry.GetRuler.GetLastName]. Nepřátelé šógunátu se shromáždili pod sloganem #italic Sonnō Jōi#!: „Uctívej císaře, vyžeň barba ry“."
 ep2_meiji.1.f: "Na druhém patře hostince v Kjótu, daleko od oken, se kolem stolu shluklo tucet černě oděných róninů. Venku pršelo tak prudce, že to přehlušilo zvuky ulice. Mezi nimi proběhly rozzuřené šepoty—stížnosti, pak obžaloby, pak přísaha a rozsudek smrti pro vetřelce.\n\nDaleko, v domě přehlížejícím Iso, muž v zeleném kimonu sledoval, jak stoupá pilíř dýmu k obloze. Kopce vrhaly dlouhé stíny přes stavby na pobřeží. Když se slunce přibližovalo k obzoru, záře pecí dole byla stále výraznější. Za nimi se na vodě odráželo světlo lodí. Jednoho dne, doufal, jeho kanón je zahná za obzor."
 ep2_meiji.1.a: "Musíme se přizpůsobit novým poměrům."
 ep2_meiji.2.t: "Podoba šógunátu"
 ep2_meiji.2.d: "Reformátoři šógunátu se dělí mezi dvě teorie vlády. Teorie #italic Kōbu Gattai#! usiluje o obnovení legitimity [GetLawType('law_bakufu').GetName] prostřednictvím sloučení s císařským dvorem, zatímco teorie veřejného rozhodování usiluje o zavedení parlamentního systému vedeného klanem [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "Hostitel položil na stůl tác s higashi a nalil misu tenkého čaje každému ze svých hostů. Tři muži seděli kolem stolu, hostitel a první host s vlasy svázanými v chonmage, druhý krátkovlasý. Z mis se vznášela pára.\n\nHostitel obrátil pohled k tomu krátkovlasému muži a promluvil.\n\n„Gratuluji vám k návratu, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kune#!. Každý z vašich dopisů mi přišel zajímavější než ten předchozí. Vyprávějte nám více o vašem pobytu u barbarů.“"
 ep2_meiji.2.a: "Bakufu musí být obnoven."
 ep2_meiji.2.b: "Veřejné rozhodování je osvícená cesta."
 traditionalist_shogun_warning_tt: "@warning! [GetIdeology('ideology_traditionalist').GetName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] bude neochotný usilovat o #b parlamentní vládu#!"
 traditionalist_shogun_warning_present_tt: "[concept_ruler] #b nemá#! [GetIdeology('ideology_traditionalist').GetName] [concept_ideology]"
 ep2_meiji.3.t: "Císařské manželství"
 ep2_meiji.3.d: "Císař souhlasil zprostředkovat sňatek mezi [SCOPE.sCharacter('shogun_scope').GetFullName] a princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Sňatek je podmíněn tím, že Shōgun se zřekne [SCOPE.sTreaty('relevant_treaty_scope').GetName] a návratem k izolacionistické politice."
 ep2_meiji.3.d2: "Císař souhlasil zprostředkovat sňatek mezi [SCOPE.sCharacter('shogun_scope').GetFullName] a princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Sňatek je podmíněn vyhnáním cizinců Shōgunem a návratem k izolacionistické politice."
 ep2_meiji.3.f: "Průvod zahalil celou Nakasendō. Pojízdný dav třiceti tisíc dělníků, vazalů a členů princeznina úřadu, střežený okruhem vojáků domény Owari, se táhl od městečka Iijima k nádraží Shiojiri. Uprostřed průvodu jela princezna na nosítkách zlaté a červené hedvábí. Po jejím boku jeli samurajové z desítek domén—[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nUvnitř nosítek princezna zívala úzkou mezerou mezi závěsy. Město za městem míjelo, okenice zavřené a ticho. Měla před sebou třicet #italic ri#! na přemýšlení o svém osudu."
 ep2_meiji.3.a: "Pro dobro země."
 has_broken_relevant_treaty_tt: "Porušil [SCOPE.sTreaty('relevant_treaty_scope').GetName]"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] zemřel nebo se stáhl z úřadu"
 je_meiji_imperial_marriage: "Císařský sňatek"
 je_meiji_imperial_marriage_reason: "Ve snaze sjednotit Císařský dvůr a Šógunát zajistil Shōgun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] politické manželství s císařskou princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Souhlas císaře s tímto sňatkem je podmíněn vyhnáním cizinců z [GetGeographicRegion('geographic_region_home_islands').GetName] a návratem k izolacionistické politice.\n\nPokud Shōgun splní svá slova, sňatek výrazně přispěje k uzdravení rozkolu mezi de jure a de facto vládci Japonska."
 je_will_fail_tt: "Ten [concept_journal_entry] se #b selže#!"
 je_has_timed_out_tt: "Ten [concept_journal_entry] #b vypršel čas#!"
 ep2_meiji.4.t: "Válka [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Znepřátelený zabavením svých pozemků a titulů, [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName] a [SCOPE.sCharacter('shogun_scope').GetHerHis] loajální vazalové povstali proti císařskému dvoru. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] usiluje o zvrácení restaurování císařské moci a obnovení Bakufu."
 ep2_meiji.4.f: "„Váš služebník [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], po pečlivém zvážení poměrů od devátého dne minulého měsíce, shledává, že žádná z těchto událostí nevychází ze skutečných úmyslů Císařského dvora, nýbrž zúdělaně z intrik zrádných ministrů pána [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Toto je známo v celém království, zejména v Edo, Nagasaki, provinciích Yashu a Sōshū, kde vznikly nepokoje.\n\nJelikož jde o činy odsouzeníhodné nebem i lidmi, prosíme Vaši Veličenstvo o vydání dekretu k vydání výše zmíněných zrádných ministrů. Pokud nebude žádost vyslyšena, nezbude nám než přistoupit k jejich popravení.„"
 ep2_meiji.4.a: "To je naše přání: zabít zrádce a obnovit mír."
 ep2_meiji.4.b: "Císař se ocitl pod vlivem lupičů."
 ep2_meiji.41.d: "Rozzuřeni snahami klanu [SCOPE.sCharacter('shogun_scope').GetLastName] udržet si moc, koalice restauracionistických domén povstala proti [SCOPE.sCharacter('shogun_scope').GetFullName]. Usilují o obnovení politické převahy císaře, osvobozené od vlivu Tokugawů."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stál na hradebních zdech a díval se dolů. Před ním se z brán vyrojili vojáci [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] v řadách. Někteří byli modernizovaní, oblečeni v nových uniformách tmavě modré barvy s kuželovitými helmami. Jiní nosili tradiční oděvy—červené, zelené, modré. Ti v nových uniformách stáli v čele kolon a získávali uznalé pohledy od shluku zahraničních pozorovatelů, kteří se postavili několik metrů vlevo od [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Za nimi přijeli jezdci-samurajové se svými puškami, a za nimi dělostřelectvo.\n\nNa okraji [SCOPE.sState('revolter_state').GetCityHubName] čekalo shromaždiště, kde se setkají se silami svých spojeneckých domén, aby pochodovali proti Šógunově armádě. Daleko, za tou zdí mečů a bajonetů, čekal zajatý císař."
 ep2_meiji.41.a: "Tito fanatici musí být odraženi."
 ep2_meiji.41.b: "Sonnō jōi!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName] upadne do #r $concept_civil_war$#! mezi #b Shogunátem#! a #b Císařským dvorem#!"
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "Čelíce rostoucímu tlaku od odpůrců [GetLawType('law_bakufu').GetName], [SCOPE.sCharacter('shogun_scope').GetFullName] požádal císaře o navrácení své výkonné pravomoci Císařskému dvoru."
 ep2_meiji.5.f: "„Dokud moc nebude znovu sjednocena v Císařském dvoře, nelze udržet samotné základy našeho národa. Proto se nyní musíme reformovat staré způsoby a vrátit správu Císařskému dvoru.\n\nPo vyčerpání veřejných rad království a po vyžádání Vašeho Veličenstva konečného rozsudku, upřímně věřím, že pokud se všichni srdcem sjednotíme ve službě národu, společně ochráníme naši císařskou zemi a postavíme se po boku ostatních národů světa jako sobě rovní.„\n\n—Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Pod ním jen vzduch."
 ep2_meiji.51.t: "Císařské povolení"
 ep2_meiji.51.d: "Císař vydal svou odpověď na žádost [SCOPE.sCharacter('shogun_scope').GetFullName] o navrácení výkonné moci Císařskému dvoru. Žádost Shōguna byla přijata a politická nadřazenost císaře byla obnovena."
 ep2_meiji.51.f: "„Císař Japonska oznamuje suverénům všech cizích zemí a jejich poddaným, že Shōgunovi [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] bylo povoleno vrátit výkonnou moc v souladu s jeho žádostí. Od této chvíle budeme vykonávat nejvyšší autoritu ve všech vnitřních i zahraničních záležitostech země. V důsledku toho musí být titul císaře nahrazen titulem Taikun, podle kterého byly uzavírány smlouvy. Úředníci jsou naším jménem jmenováni k vedení zahraničních věcí. Je žádoucí, aby zástupci smluvních mocností uznali toto oznámení.“"
 ep2_meiji.51.a: "Hrozivý pocit."
 ep2_meiji.52.t: "Císařské povolení"
 ep2_meiji.52.d: "Císař vydal svou odpověď na žádost [SCOPE.sCharacter('shogun_scope').GetFullName] o navrácení výkonné moci Císařskému dvoru. Odpověď uvádí, že Shōgun si nadále uchovává důvěru dvora a že správní pravomoc může zůstat u Šógunátu."
 ep2_meiji.52.f: "[ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] hrad se ozýval dupotem bot. Poslové a vazalové chodili dovnitř a ven po celý den a nosili stále podrobnější zprávy o událostech posledního týdne. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] je osobně přijímal a po každém setkání zůstával rezolutně mlčenlivý. Čelo se mu stále více svrašťovalo, jak slyšel o vývoji událostí—škvílí šógunovy triumfální průvody, Aizu hlídající císařský palác.\n\nMimo přední palác zapadalo slunce. Z jeviště se [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] ohlédl na dvacet přítomných vazalů. „Doména Chōshū se nepodřídí,“ řekl [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]. „V tom buďte jasní.“\n\nVstal a opustil místnost."
 ep2_meiji.52.a: "Větve ho objímají."
 ep2_meiji.6.t: "Dekret o obnově"
 ep2_meiji.6.d: "Odpůrci rodu [SCOPE.sCharacter('shogun_scope').GetLastName] v rámci dvora přesvědčili císaře, aby vydal dekret formálně obnovující jeho vlastní moc. Dekret zrušuje Šógunát a ustavuje vládu, která vylučuje [SCOPE.sCharacter('shogun_scope').GetFullName] z jakékoli úřední pozice."
 ep2_meiji.6.f: "„[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] požádal o navrácení administrativní pravomoci, která mu byla dlouho svěřena, a nyní si přeje rezignovat na úřad Shōguna. Jeho návrh byl přijat. Země je ohrožena nesrovnatelnými nebezpečími, jimiž se, jak je známo, zaobíral i zesnulý císař. Proto bylo rozhodnuto moudrým rozvahám Jeho Veličenstva položit základy pro obnovení císařské vlády a vzkříšení národní důstojnosti.\n\nOd této chvíle budou zrušeny úřady Sessho, Kanpaku a Shōguna a budou ustanoveny tři úřady: hlavního radního, státního radce a palácového radce. Vše bude rozhodováno prostřednictvím rozumného rozvažování lidu, bez jakéhokoli rozlišení mezi civilními a vojenskými úředníky, mezi šlechtou a prostým lidem.„"
 ep2_meiji.6.a: "Sám ve tmě."
 ep2_meiji.7.t: "Taikunát"
 ep2_meiji.7.d: "Vzhledem k tomu, že Císařský dvůr postrádá praktickou odbornost k vládnutí, spojenci rodu [SCOPE.sCharacter('shogun_scope').GetLastName] uvnitř dvora přesvědčili císaře, aby udělil [SCOPE.sCharacter('shogun_scope').GetFullName] titul Taikun a postavil [SCOPE.sCharacter('shogun_scope').GetHerHim] do čela císařského úřadu."
 ep2_meiji.7.f: "„Jak se různá daimjó postupně shromažďují, konat se bude rozprava. Duch doby se soustředí na veřejnou diskusi—tento výraz se často probírá—a bylo nevyhnutelné jít s veřejným míněním. Tudíž vroucně prosím, aby, pokud možno, byly tyto diskuse dovozeny k dohodě a aby byly přijaty kroky, aby účel shromáždění byl řádně zajištěn.\n\nKdyby během jednání vznikl nesoulad a vybuchl konflikt, ať už by to mělo za následek vítězství vašeho rodu, bylo by to jako kdyby se bratři pohádali uvnitř zdí, zatímco cizí národy nám zatlačují zvenčí.„ \n\n—Nishi Shūsuke, „Návrh programu“"
 ep2_meiji.7.a: "Znovu na bezpečném místě."
 ep2_meiji.8.t: "Dvůr a šógunát"
 ep2_meiji.8.d: "Díky sňatku s císařskou rodinou a splnění slibů [SCOPE.sCharacter('shogun_scope').GetHerHis] vůči císaři uvolnil [SCOPE.sCharacter('shogun_scope').GetFullName] napětí mezi dvorem a šógunátem. Císař může pokračovat ve svém ústraní, s vědomím, že Shōgun zajistí trvalý mír."
 ep2_meiji.8.f: "I kdyby se bouřlivé větry\nměly prohnat krajem,\npočkám, až navrátí slunce v nebi\njejí čistý jas.\n\n—Císař Kōmei"
 ep2_meiji.8.a: "Bouře ustala."
 ep2_meiji.9.t: "První mezi rovnými"
 ep2_meiji.9.d: "Díky důvěře a obratnému manévrování dokázal [SCOPE.sCharacter('taikun_scope').GetFullName] prosadit jak restaurování císaře, tak zachování rodu [SCOPE.sCharacter('taikun_scope').GetHerHis]. Taikunové rodu [SCOPE.sCharacter('taikun_scope').GetLastName] budou vládnout jako první mezi šlechtici moderního $JAP$."
 ep2_meiji.9.f: "Císař už neseděl za paravanem. Jeho ministři seděli u stolu před ním, Taikun po jeho levici. Každý měl na sobě novou dvorskou uniformu, rukávy a prsa zdobené složitými arrangey plátkového zlata. Odznaky cinkaly a šustily, jak se v neobvyklých sedadlech upravovali.\n\nTaikun moderoval diskusi už hodinu a císař nepromluvil ani slovo. Spokojeně naslouchal a věnoval pozornost každému mluvčímu postupně. Na druhé straně místnosti bývalý následovník #italic sonnō jōi#! hovořil o nutnosti mise do Ameriky."
 ep2_meiji.9.a: "Šógun padá, Taikun vstává."
 ep2_meiji.9.b: "Císař je Syn Nebes a Tokugawové jeho nástroje."
