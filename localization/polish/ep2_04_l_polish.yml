l_polish:
 japan_politics.1.t: "Praktické učení"
 japan_politics.1.d: "Otevření [ROOT.GetCountry.GetName] učinilo velkou část školy nizozemského učení zastaralou. Novější myšlenky začaly pronikat do [ROOT.GetCountry.GetAdjectiveNoFormatting] intelektuální komunity, mezi nimi především škola „praktického učení“."
 japan_politics.1.f: "„Důležité je, aby každý řídil své chování podle principů lidskosti, pilně studoval, aby nabyl širokého poznání, a rozvíjel schopnosti odpovídající své zemi. Tak bude vládě snáze vládnout a lidu přijmout její vládu ochotně, každý najde své místo a pomůže zachovat mír národa. To by měl být jediný cíl.“\n\n— Fukuzawa Yūkichi, „Podpora vzdělávání“"
 japan_politics.1.a: "Bohatství skrze vzdělání."
 japan_politics.2.t: "Velké rody"
 japan_politics.2.d: "S industrializací [ROOT.GetCountry.GetName] se [SCOPE.gsInterestGroup('industrialists_ig').GetName] diverzifikovali do výrobního hospodářství. Využitím svého bohatství a vazeb na stát dokázali koncentrovat velkou část průmyslové základny pod svou kontrolu."
 japan_politics.2.f: "Ministr financí sledoval z balkonu, jak makléři podávají nabídky. Ve dnech rýžových burz by konec obchodování signalizoval muž vrhající kbelík vody do davu.\n\nNyní to byl muž s kladívkem, jehož oči byly upřeny na hodiny. U jeho stolu, polozasypán mořem makléřů snažících se koupit dluhopisy se sedmiprocentním úrokem, zahlédl někoho podepisovat smlouvu s dluhopisem pevně zajištěným v ústech. Hluk byl ohlušující, nákupy a prodeje splývaly v něco, co znělo jako vlny narážející na skály.\n\nHodiny odbily a muž u stolu udeřil kladívkem do bronzového talíře. Z davu se ozvaly výkřiky rozhořčení a zvuk posledních obchodů jen zesílil. Zabručel, skrčil se pod stolem a vytáhl kbelík."
 japan_politics.2.a: "Nyní budou vládnout bankéři."
 japan_politics.3.t: "Obyčejný občan"
 japan_politics.3.d: "Eroze edského třídního systému dala vzniknout občanské společnosti založené na společném národním cítění. Ti, kdo byli kdysi označováni jako [SCOPE.gsInterestGroup('pb_ig').GetName], se začali vnímat především jako vlastenečtí občané."
 japan_politics.3.f: "Shizo pomalu otáčel hlavou ze strany na stranu a zkoumal svůj nový sestřih v bronzovém zrcadle. Byl kratší než kdy dříve, chyběl mu uzel, který nosil tak dlouho, jak si pamatoval. Konec čerstvě ostříhaných vlasů byl tlustý a drsný a nemohl si pomoct, aby na ně nezasáhl rukou.\n\nNáhle zavrtěl hlavou a cítil, jak se prameny posunuly způsobem, jaký dříve nebyl. Bylo to jako s novým oblečením, s vysokými límci, které mu dráždily krk. Nepohodlné, ale prospěšné. Nové styly dávaly najevo postoj a přitahovaly další zákazníky do jeho obchodu. Jeho byl civilizovaný podnik, on byl daňový poplatník, strážník, národan—a civilizovaný muž."
 japan_politics.3.a: "Síla národa je v míru jeho občanů."
