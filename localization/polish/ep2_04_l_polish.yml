l_polish:
 japan_politics.1.t: "Praktické učení"
 japan_politics.1.d: "Otevření země [ROOT.GetCountry.GetName] učinilo velkou část školy nizozemského učení zastaralou. [ROOT.GetCountry.GetAdjectiveNoFormatting] intelektuální komunitou se začaly šířit novější myšlenky, především škola „praktického učení“."
 japan_politics.1.f: "„Důležité je, aby každý řídil své chování podle zásad lidskosti, pilně studoval, aby nabyl širokého vědění, a rozvíjel schopnosti odpovídající jeho národu. Tak bude vláda schopna vládnout snáze a lid její vládu přijímat ochotně, každý najde své místo a pomůže zachovat mír národa. To by mělo být jediným cílem.“\n\n—Fukuzawa Júkiči, „Povzbuzení k učení“" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "Bohatství skrze učení."
 japan_politics.2.t: "Velké rody"
 japan_politics.2.d: "S industrializací země [ROOT.GetCountry.GetName] se [SCOPE.gsInterestGroup('industrialists_ig').GetName] rozšířili do výrobní ekonomiky. Využitím svého bohatství a vazeb na stát dokázali soustředit velkou část průmyslové základny pod svou kontrolu."
 japan_politics.2.f: "Ministr financí sledoval z balkonu, jak makléři předkládají své nabídky. Za časů rýžových burz by konec obchodování oznámil muž, který by do davu hodil vědro vody.\n\nNyní to byl muž s kladívkem v ruce a očima upřenýma na hodiny. Nedaleko jeho stolu, napůl pohřbeného mořem makléřů natahujících se po dluhopisech se sedmiprocentním úrokem, viděl někoho podepisovat smlouvu s dluhopisem pevně sevřeným v ústech. Kakofonie byla ohlušující, nákupy a prodeje splývaly v něco, co znělo jako vlny tříštící se o skály.\n\nHodiny odbily a muž u stolu udeřil kladívkem do bronzového disku. Z davu se zvedl křik rozhořčení a hluk obchodů na poslední chvíli ještě zesílil. S brbláním se skrčil pod stůl a vytáhl vědro."
 japan_politics.2.a: "Nyní budou vládnout bankéři."
 japan_politics.3.t: "Obyčejný občan"
 japan_politics.3.d: "Rozklad edského třídního systému dal vzniknout občanské společnosti založené na společné národnosti. Ti, kdo byli kdysi označováni jako [SCOPE.gsInterestGroup('pb_ig').GetName], začali sami sebe vnímat především jako vlastenecké občany."
 japan_politics.3.f: "Šizó pomalu otáčel hlavou ze strany na stranu a zkoumal svůj nový účes v bronzovém zrcadle. Byl kratší než kdy dřív a chyběl mu uzel, který nosil, kam až jeho paměť sahala. Konce čerstvě ostříhaných vlasů působily hustě a drsně a on se jich nepřestával dotýkat.\n\nNáhle potřásl hlavou a cítil, jak se prameny pohnuly způsobem, který předtím neznal. Bylo to jako nové oblečení s vysokými límci, které mu dráždily krk. Nepohodlné, ale prospěšné. Nové styly něco sdělovaly a přitahovaly ostatní do jeho obchodu. Jeho podnik byl civilizovaný a on byl daňový poplatník, gardista, příslušník národa – civilizovaný muž."
 japan_politics.3.a: "Síla národa je v míru jeho občanů."
