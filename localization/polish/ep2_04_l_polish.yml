 ep2_meiji_pulse.1.t: "Právo udeřit"
 ep2_meiji_pulse.1.d: "Při cestě v [SCOPE.sState('relevant_treaty_port_state').GetName] byl [SCOPE.sCountry('relevant_gp').GetAdjective] obchodník zabit družinou [SCOPE.sCharacter('daimyo_scope').GetFullName], protože odmítl sesednout při průjezdu. Daimyō [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] prohlásil zabití za zákonné podle práva udeřit každého obyčejného člověka, kdo jej zneuctí."
 ep2_meiji_pulse.1.f: "Cizinci prorazili řady mušketýrů a všude se rozběhly výkřiky. Vůdce cizinců při pohledu na ozbrojené muže kolem bičoval opratě stranou a kůň provedl prudký manévr, který málem srazil jednoho mušketýra z koně. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] vytáhl svůj meč a jeho společníci vnitřního kruhu se k němu přidali.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] zasadil první úder, otevřel řez na boku vetřelce. Ten vykřikl a znovu zarazil opratě. Bylo to marné. Nejbližší mušketýr vytáhl svůj vlastní nůž a zasáhl. Oblak rudé krve visel ve vzduchu jako mráček."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] nám chce jen způsobit potíže."
 ep2_meiji_pulse.11.t: "Aféra [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "Při obchodování v [SCOPE.sCountry('japan_scope').GetName] byl [ROOT.GetCountry.GetAdjectiveNoFlag] obchodník jménem [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] zavražděn místním pánem [SCOPE.sCharacter('daimyo_scope').GetFullName]. Pán prohlašuje své činy za ospravedlnitelné podle zákonů své země a odmítá zaplatit jakékoli odškodnění za svůj zločin."
 ep2_meiji_pulse.11.f: "#b Redakční poznámka#!\n\nZa současných okolností opakujeme, že [ROOT.GetCountry.GetNameNoFormatting] nemá jinou možnost než se připravit na velkou válku nebo se rozloučit s Japonskem. Opustit zajištěné postavení tam nebude ani uvažováno, a proto můžeme očekávat konflikt mezi těmito dvěma mocnostmi. Mnoho [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] se tomuto nápadu brání, přesto [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] to považuje nejen za nevyhnutelné, ale i za ospravedlnitelné čistě proto, že Japonci odmítli potrestat vrahy [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]... (#italic pokračování str.02#!)"
 ep2_meiji_pulse.11.a: "#italic Někdo#! musí zaplatit. Vznesťe záležitost k Taikunovi."
 ep2_meiji_pulse.11.b: "Chceme se do Východu opravdu dál vměšovat?"
