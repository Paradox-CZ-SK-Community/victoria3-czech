 ep2_meiji_pulse.3.t: "Válka u Shimonoseki"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], daimjó domény Chōshū, dal na vědomí svou poslušnost císařovu rozkazu vyhnat cizince. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U] nařídil své námořnictvo střílet na všechna cizí plavidla proplouvající průlivem Shimonoseki, což vedlo k výměnám palby s [SCOPE.sCountry('relevant_gp').GetAdjective] válečnou lodí."
 ep2_meiji_pulse.3.f: "Denní hromy se valily přes mírný svah Hinoyamy a Masatake zvedl hlavu k obloze. Přivítal ho načechraný bílý oblak.\n\n„Podívej!“ vykřikl Jiro. Ruka vstoupila do jeho zorného pole a ukázala dolů. Loď plnou parou se hnala průlivem níže, děla pálila na něco, co Masatake neviděl. Třísky létaly z jejího trupu, a přesto pokračovala. Nad tím vším rostl další mrak."
 ep2_meiji_pulse.3.a: "Cizinci dělají to, co my nedokážeme."
 ep2_meiji_pulse.3.b: "Pomozte doméně dosáhnout mírové dohody."
 ep2_meiji_pulse.3.c: "Nabídněte Západňanům přístav výměnou za dohodu."
 treaty_name_shimonoseki_war_indemnity: "Indemnita za válku u Shimonoseki"
