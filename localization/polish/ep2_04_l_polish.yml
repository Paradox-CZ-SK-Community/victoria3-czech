 shogunate.1.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Ieyoshi
 shogunate.1.d: "Jako nové hlavě klanu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] císařem udělen úřad šóguna. Mnozí [SCOPE.gsInterestGroup('daimyo_scope').GetName] pohlížejí na nového šóguna s posměchem, neboť si dosud nevybudoval osobní autoritu."
 shogunate.1.f: "Pestrý proud daimjó se vinul skrze Ó-hiromu. Na jejím nejvyšším pódiu seděl šógun, oděný v černé a rudé, s císařským dekretem v krabici po své pravici.\n\nJeden po druhém se před ním klaněli šlechtici v rudé, modré a fialové, předkládali meče a dary ze zlata. Šógun nemluvil, stejně jako ti, kdo se před ním skláněli k zemi. Ti nižšího postavení, kterým bylo zakázáno jej spatřit, se tísnili před sálem. Ze zahrady se zvedl chorál."
 shogunate.1.a: "Gošóšin, gošóšin!"
 shogunate.2.t: "Otázka nástupnictví"
 shogunate.2.d: "Špatné zdraví nejstaršího syna [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], [SCOPE.sCharacter('iesada_scope').GetFirstName], vyvolalo obavy, zda bude schopen vykonávat povinnosti [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]. Vnější daimjó vedení [SCOPE.sCharacter('armed_forces_leader').GetFullName] se semkli za [SCOPE.sCharacter('yoshinobu_scope').GetFullName] jako alternativním kandidátem."
 shogunate.2.f: "Ložnice [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] byla prázdná. Zástěny byly zavřené a veranda uklizená. [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] seděl vedle své postele čelem k prázdnému listu papíru. [SCOPE.sCharacter('armed_forces_leader').GetHerHis|U] oči byly zavřené. Kdyby se sousední chodbou proplížila kočka, [SCOPE.sCharacter('armed_forces_leader').GetSheHe] by ji jistě slyšel – a přesto si [SCOPE.sCharacter('armed_forces_leader').GetSheHe] nemohl být jistý, že nikdo neposlouchá. V takto rané fázi bylo nejlepší držet [SCOPE.sCharacter('armed_forces_leader').GetHerHis] ambice pevně ve [SCOPE.sCharacter('armed_forces_leader').GetHerHis] vlastní mysli.\n\nUvidí císařský dvůr věc stejně jako [SCOPE.sCharacter('armed_forces_leader').GetHerHim]? [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] měl důvod tomu věřit, ale to byla zdaleka ta nejjednodušší otázka. [SCOPE.sCharacter('armed_forces_leader').GetHerHis|U] mysl se obrátila jinam. Jak nejlépe získat dekret? Jak nejlépe zajistit, aby nezmizel?"
 shogunate.2.a: "Vnitřní [GetLawType('law_bakufu').GetName] prosadí svou."
 shogunate.2.b: "Situace vyžaduje rozhodné vedení."
 shogunate.3.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesada
 shogunate.3.d: "Jako nové hlavě klanu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] císařem udělen úřad šóguna. Slabý od dětství, zdravotní stav šóguna už vyvolal závod o jeho nástupnictví."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Gošóšin, gošóšin!"
 shogunate.4.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Yoshinobu
 shogunate.4.d: "Jako nové hlavě klanu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] císařem udělen úřad šóguna. Podporovatelé nového šóguna v reformistických doménách mají od jeho vlády velká očekávání."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Gošóšin, gošóšin!"
 shogunate.5.t: "Hitocubaši a Nanki"
 shogunate.5.d: "Frakce, které vznikly kolem nástupnictví šóguna Iejošiho, se znovu střetly kvůli tomu, kdo vystřídá bezdětného [SCOPE.sCharacter('shogun_scope').GetFullName]. Frakce Hitocubaši složená z vnějších daimjó a nižších [SCOPE.gsInterestGroup('armed_forces_ig').GetName] podporuje [SCOPE.sCharacter('yoshinobu_scope').GetFullName], zatímco frakce Nanki složená z vnitřních [SCOPE.gsInterestGroup('daimyo_ig').GetName] podporuje [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Posel s bezvýraznou tváří hleděl na podlahu před mužem na pódiu. Jeho štětec se vznášel nad papírem.\n\n„Zpráva pro Jošikacu-samu,“ řekl rychtář. „Někteří u dvora si až příliš zvykli na nevhodné spekulace o šógunově zdraví. Debatují, jako by neměl hlas. Informujte mě, pokud se objeví jakékoli návrhy sepsané na základě tohoto předpokladu.“"
 shogunate.5.a: "Vůlí šóguna je, aby vládl [SCOPE.sCharacter('iemochi_scope').GetFirstName]."
 shogunate.5.b: "Císařský dvůr vyžaduje zkušeného nástupce."
 shogunate.6.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iemochi
 shogunate.6.d: "Jako nové hlavě klanu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] císařem udělen úřad šóguna. Ačkoli je mladý, šógun si už získal pověst stoického a pečlivého úsudku."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Gošóšin, gošóšin!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U] bude vládnout pod dohledem loajálního poručníka."
 shogunate.6.b_regency: "Uzavřete kompromis s Hitocubaši – jmenujte [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] [SCOPE.sCharacter('shogun_scope').GetHerHis] poručníkem."
 shogunate.7.t: "Jmenování [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesato
 shogunate.7.d: "Jako nové hlavě klanu [SCOPE.sCharacter('shogun_scope').GetLastName] byl [SCOPE.sCharacter('shogun_scope').GetFullName] císařem udělen úřad šóguna. Světaznalý a otevřený šógun by měl podporovat reformistické frakce [GetLawType('law_bakufu').GetName]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Gošóšin, gošóšin!"
 shogunate.8.t: "Horké léto"
 shogunate.8.d: "Letní vedro způsobilo prudké zhoršení zdraví starého [SCOPE.sCharacter('shogun_scope').GetFullName]. Nyní upoutaný na lůžko musí [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] svést poslední bitvu se svým selhávajícím srdcem."
 shogunate.8.f: "Šógunovo lůžko bylo přesunuto tak, aby směřovalo k oknu. Jeho sluhové doufali, že chladný vzduch vanoucí od moře doplní jejich vějíře. U nohou postele stála otevřená truhla s ledem a přes čelo měl mokrou látku.\n\nDnes nebyl žádný vítr. Vzduch se pod zapadajícím sluncem vlnil. Nelítostný, všeobjímající. Už nedokázal rozeznat tvar vln dole pod sebou."
 shogunate.8.a: "Tohle je konec."
