 glossary_zaibatsu: "#b #italic Zaibacu#!#! je rodinný a vertikálně integrovaný průmyslový a finanční konglomerát.\n\nTypické zaibacu je organizováno kolem holdingové společnosti a banky, které vlastní podíly v několika, obvykle průmyslových, dceřiných společnostech. Zaibacu vzešly z rodinných obchodních konglomerátů pozdního období Edo, které využily své již existující bohatství a vazby na stát ke konsolidaci kontroly nad velkou částí japonské průmyslové základny."
