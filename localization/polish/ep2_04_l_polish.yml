 zaibatsu.1.t: "Korporátní impérium"
 zaibatsu.1.d: "Trvalé partnerství mezi [ROOT.GetCountry.GetAdjective] státem a [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] upevnilo moc konglomerátů v rámci [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici mohou vládnout, ale generálové a výkonní ředitelé budou rozhodovat."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] shlížel na zápas ze své kryté lóže. Soupeř [SCOPE.sCharacter('pm_scope').GetHerHis] oblíbeného zápasníka zatlačil [SCOPE.sCharacter('pm_scope').GetHerHis] šampiona až na samý okraj rýžově-slaměného ringu a [SCOPE.sCharacter('pm_scope').GetSheHe] zjistil, že se snaží zabránit tomu, aby [SCOPE.sCharacter('pm_scope').GetHerHis] klouby zbělely. Po boku předsedy vlády stál dokonale klidný [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nRozhodčí ukázal vějířem a z dolních sedadel se ozval jásot. Vzduchem proletěl déšť sedacích polštářů a zasypal ring. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] otočil hlavu k [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] a usmál se. Tam, na opačné straně ringu, vyražený do jedné ze stěn, byl #italic mon#! společnosti [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "Nechť se [ROOT.GetCountry.GetCapital.GetCityHubName] rozvine jako moře světel."
 zaibatsu.1.b: "Náš dodavatelský řetězec by vždy mohl být bezpečnější."
 zaibatsu.2.t: "Pod zámkem"
 zaibatsu.2.t_1: "Srovnávající ruka"
 zaibatsu.2.d: "Úsilí kabinetu [SCOPE.sCharacter('pm_scope').GetLastName] omezilo schopnost [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] vykonávat kontrolu nad [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici budou vládnout a výkonní ředitelé se zaměří na své zisky."
 zaibatsu.2.d_1: "Politika volného obchodu kabinetu [SCOPE.sCharacter('pm_scope').GetLastName] narušila síť vojensko-průmyslových kontraktů, která byla klíčová pro kontrolu [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] nad [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Politici budou vládnout a výkonní ředitelé se zaměří na své zisky."
 zaibatsu.2.f: "Hejno výkonných ředitelů proudilo do nejvyšší zasedací místnosti ústředí společnosti [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] vstoupil jako třetí, hned po tajemnících. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] se posadil na své místo u dveří a sledoval, jak kolem procházejí [SCOPE.sCharacter('name_a_scope').GetHerHis] nadřízení. Z šálku čaje před [SCOPE.sCharacter('name_a_scope').GetHerHim] se líně zvedal slabý proužek páry.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] vstoupil jako poslední. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis|U] pohled postupně přejel po každém z [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] zaměstnanců. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] si všiml výrazu v [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] očích, jaký baron nikdy předtím neukázal. Vyčerpání. Stíny vržené na [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] tvář se zdály hlubší než dříve a [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] stříbrné vlasy ještě řidší."
 zaibatsu.2.a: "Svrchovaná moc je pouze naše."
 zaibatsu.2.b: "Ať lid ví – [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] si nelze koupit."
