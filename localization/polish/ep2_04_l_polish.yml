 ep2_meiji.1.t: "Sonnó džói"
 ep2_meiji.1.d: "Konec sakoku vyvolal pocit bezmoci vůči cizímu pronikání a podkopal autoritu klanu [ROOT.GetCountry.GetRuler.GetLastName]. Nepřátelé šógunátu se semkli kolem hesla #italic Sonnó džói#!: „Ctěte císaře, vyžeňte barbary“."
 ep2_meiji.1.f: "Ve druhém patře kjótského hostince, daleko od oken, se kolem stolu choulil tucet černě oděných róninů. Venku se s prudkostí lil déšť a přehlušoval zvuky ulice. Mezi nimi se nesly rozzlobené šepoty – stížnosti, poté odsouzení, poté přísaha a rozsudek smrti pro vetřelce.\n\nDaleko odtud, v domě s výhledem na Iso, sledoval muž v zeleném kimonu sloup kouře stoupající k nebi. Kopce vrhaly dlouhé stíny na stavby na mořském pobřeží. Jak se slunce blížilo k obzoru, záře pecí pod nimi byla stále výraznější. Za nimi, odrážející se na vodě, viděl světla lodí. Doufal, že jednoho dne je jeho děla zaženou za obzor."
 ep2_meiji.1.a: "Musíme se přizpůsobit novým okolnostem."
 ep2_meiji.2.t: "Podoba šógunátu"
 ep2_meiji.2.d: "Reformisté šógunátu jsou rozděleni mezi dvě teorie vládnutí. Teorie #italic Kóbu gattai#! usiluje o obnovení legitimity [GetLawType('law_bakufu').GetName] spojením s císařským dvorem, zatímco teorie veřejné deliberace usiluje o zřízení parlamentního systému v čele s klanem [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "Hostitel položil na stůl podnos s higaši a každému ze svých hostů nalil misku řídkého čaje. Kolem stolu seděli tři muži: hostitel a první host s vlasy svázanými do účesu čonmage a druhý s krátkými vlasy. Z misek před nimi stoupala pára.\n\nHostitel upřel pohled na krátkovlasého muže a promluvil.\n\n„Blahopřeji vám k návratu, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Každý z vašich dopisů mi připadal zajímavější než ten předchozí. Pověděl byste nám více o svém čase mezi barbary?“"
 ep2_meiji.2.a: "Bakufu musí být obnoveno."
 ep2_meiji.2.b: "Veřejná deliberace je osvícená cesta."
 traditionalist_shogun_warning_tt: "@warning! [GetIdeology('ideology_traditionalist').GetName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nebude ochoten usilovat o #b parlamentní vládu#!"
 traditionalist_shogun_warning_present_tt: "[concept_ruler] #b nemá#! [concept_ideology] [GetIdeology('ideology_traditionalist').GetName]"
 ep2_meiji.3.t: "Císařský sňatek"
 ep2_meiji.3.d: "Císař souhlasil se sjednáním sňatku mezi [SCOPE.sCharacter('shogun_scope').GetFullName] a princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Sňatek je podmíněn tím, že šógun odmítne [SCOPE.sTreaty('relevant_treaty_scope').GetName] a vrátí se k izolacionistické politice."
 ep2_meiji.3.d2: "Císař souhlasil se sjednáním sňatku mezi [SCOPE.sCharacter('shogun_scope').GetFullName] a princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Sňatek je podmíněn vyhnáním cizinců šógunem a návratem k izolacionistické politice."
 ep2_meiji.3.f: "Průvod zaplnil celé Nakasendó. Zástup třiceti tisíc dělníků, vazalů a členů princezniny domácnosti, střežený obvodem vojáků domény Owari, se táhl od města Iidžima až ke stanici Šiodžiri. V srdci průvodu jela princezna na nosítkách ze zlata a červeného hedvábí. Vedle nich jeli samurajové z tuctu domén – [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nUvnitř nosítek princezna hleděla ven úzkou mezerou mezi závěsy. Jedno město za druhým míjelo kolem, okenice zavřené a tiché. Nad svým osudem bude moci přemýšlet dalších třicet #italic ri#!."
 ep2_meiji.3.a: "Pro dobro země."
 has_broken_relevant_treaty_tt: "Porušila [SCOPE.sTreaty('relevant_treaty_scope').GetName]"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] zemřel nebo odešel do ústraní"
 je_meiji_imperial_marriage: "Císařský sňatek"
 je_meiji_imperial_marriage_reason: "Ve své snaze sjednotit císařský dvůr a šógunát si šógun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] zajistil politický sňatek s císařskou princeznou [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Císařův souhlas se sňatkem je založen na vyhnání cizinců z [GetGeographicRegion('geographic_region_home_islands').GetName] a návratu k izolacionistické politice.\n\nPokud šógun splní své sliby, sňatek významně přispěje k zacelení rozkolu mezi japonskými vládci de iure a de facto."
 je_will_fail_tt: "[concept_journal_entry] #b selže#!"
 je_has_timed_out_tt: "[concept_journal_entry] #b vypršel čas#!"
 ep2_meiji.4.t: "Válka [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName] a [SCOPE.sCharacter('shogun_scope').GetHerHis] loajální vazalové, odcizení zabavením [SCOPE.sCharacter('shogun_scope').GetHerHis] zemí a titulů, povstali proti císařskému dvoru. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] se snaží zvrátit restauraci císařské moci a obnovit bakufu."
 ep2_meiji.4.f: "„Váš služebník [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], který poctivě zvažoval stav věcí od devátého dne minulého měsíce, shledává, že žádná z těchto událostí nevychází ze skutečných úmyslů císařského dvora, nýbrž zcela ze spiknutí zrádných ministrů lorda [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. To je známo po celé říši, zvláště v Edu, Nagasaki a provinciích Jašú a Sóšú, kde vypukly nepokoje.\n\nProtože jde o činy odporné nebesům i lidem, prosíme Vaše Veličenstvo, aby vydalo dekret k vydání výše zmíněných zrádných ministrů. Nebude-li této žádosti vyhověno, nezbude nám než přistoupit k jejich popravě.“" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Toto je naše přání: zabte zrádce a obnovte mír." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "Císař se dostal pod vliv lupičů."
 ep2_meiji.41.d: "Koalice restauračních domén, rozhněvaná snahou klanu [SCOPE.sCharacter('shogun_scope').GetLastName] udržet si moc, povstala proti [SCOPE.sCharacter('shogun_scope').GetFullName]. Usiluje o obnovení politické převahy císaře, zbavené vlivu Tokugawů."
 ep2_meiji.41.d_1: "Rozhořčeni odmítnutím vlády v [ROOT.GetCountry.GetCapital.GetCityHubName] vyhostit cizince vstoupila do povstání koalice domén podporujících Sonnō Jōi. Usilují sesadit císařovy poradce, kteří prosazují západní orientaci, a uskutečnit vyhnání cizího vlivu z Japonska." # todo: NEW TRANSLATION
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stál na hradbách a hleděl dolů. Před ním z bran vycházela řada za řadou vojáků z [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]. Někteří byli modernizovaní, odění do nových uniforem, tmavě modrých s kuželovitými přilbami. Jiní si ponechali tradiční oděv – červený, zelený, modrý. Ti v nových uniformách byli umístěni v čele kolony a získávali uznalé pohledy od skupinky zahraničních pozorovatelů, kteří se postavili několik metrů nalevo od [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Za nimi jeli samurajové na koních s puškovými mušketami a po nich dělostřelectvo.\n\nNa okraji města [SCOPE.sState('revolter_state').GetCityHubName] čekalo shromaždiště, kde se měli setkat se silami spojeneckých domén a vytáhnout proti šógunově armádě. Daleko za touto hradbou mečů a bodáků čekal zajatý císař."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stál na hradbách a hleděl dolů. Před ním se z bran řadily řady [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] vojáků. Někteří byli zmodernizovaní, odění v nových uniformách tmavě modré barvy s kuželovitými helmami. Jiní si ponechali tradiční oděv — červené, zelené, modré. Ti v nových uniformách stáli vpředu v koloně, a za nimi následovala duha sansaibaori. Jezdeckí samurajové se svými mušketami přišli po nich — a za nimi dělostřelectvo.\n\nNa okraji [SCOPE.sState('revolter_state').GetCityHubName] čekalo shromaždiště, kde se setkají se silami svých spojeneckých domén, aby vyrazili proti loajální armádě. Dál, za tou zdí mečů a bajonetů, čekal zajatý císař." # todo: NEW TRANSLATION
 ep2_meiji.41.a: "Tyto fanatiky musíme odrazit."
 ep2_meiji.41.b: "Sonnó džói!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName] upadne do #r $concept_civil_war$#! mezi #b šógunátem#! a #b císařským dvorem#!"
 ep2_meiji.5.t: "Taisei hókan"
 ep2_meiji.5.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], čelící rostoucímu tlaku odpůrců [GetLawType('law_bakufu').GetName], požádal císaře, aby [SCOPE.sCharacter('shogun_scope').GetHerHis] vládní pravomoc vrátil císařskému dvoru."
 ep2_meiji.5.f: "„Nebude-li moc znovu sjednocena v rámci císařského dvora, samotné základy našeho národa nelze udržet. Proto musíme v této chvíli reformovat staré pořádky a vrátit správu císařskému dvoru.\n\nPo vyčerpání veřejných rad říše a při hledání konečného úsudku Vašeho Veličenstva upřímně věřím, že pokud se všechna srdce sjednotí ve službě národu, můžeme společně ochránit naši císařskou zemi a stát jako rovní po boku národů světa.“\n\n—Tokugawa Jošinobu, 1867"
 ep2_meiji.5.a: "Pod nohama nemá nic než vzduch."
 ep2_meiji.51.t: "Císařské schválení"
 ep2_meiji.51.d: "Císař vydal svou odpověď na žádost [SCOPE.sCharacter('shogun_scope').GetFullName] o vrácení vládní pravomoci císařskému dvoru. Šógunova žádost byla přijata a politická svrchovanost císaře obnovena."
 ep2_meiji.51.f: "„Japonský císař oznamuje panovníkům všech cizích zemí a jejich poddaným, že šógunovi [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] bylo na základě jeho vlastní žádosti uděleno povolení vrátit vládní moc. Od nynějška budeme vykonávat nejvyšší autoritu ve všech vnitřních i vnějších záležitostech země. V důsledku toho musí být titul císaře nahrazen titulem Taikun, pod nímž byly uzavřeny smlouvy. Jmenujeme úředníky pro vedení zahraničních záležitostí. Je žádoucí, aby zástupci smluvních mocností toto oznámení uznali.“"
 ep2_meiji.51.a: "Strašlivé vzrušení."
 ep2_meiji.52.t: "Císařské schválení"
 ep2_meiji.52.d: "Císař vydal svou odpověď na žádost [SCOPE.sCharacter('shogun_scope').GetFullName] o vrácení vládní pravomoci císařskému dvoru. Odpověď uvádí, že šógun si zachovává důvěru dvora a že vládní pravomoc může zůstat šógunátu."
 ep2_meiji.52.f: "Hrad [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] se rozléhal zvukem bot. Poslové a vazalové celý den přicházeli a odcházeli a přinášeli stále podrobnější převyprávění zpráv z minulého týdne. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] je přijímal osobně a během každého setkání zůstával neochvějně mlčenlivý. Jeho čelo bylo čím dál zachmuřenější, když slyšel o novém vývoji – o triumfálním průvodu šóguna, o Aizu ponechaných na stráži císařského paláce.\n\nVenku před hlavním palácem zapadlo slunce. Ze svého pódia pohlédl [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] na dvacet shromážděných vazalů. „Doména Čóšú se nepodřídí,“ řekl [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]. „Dobře si to zapamatujte.“\n\nVstal a opustil místnost."
 ep2_meiji.52.a: "Větve jej objímají."
 ep2_meiji.6.t: "Dekret o restauraci"
 ep2_meiji.6.d: "Odpůrci klanu [SCOPE.sCharacter('shogun_scope').GetLastName] u dvora přesvědčili císaře, aby vydal dekret formálně obnovující jeho vlastní moc. Dekret ruší šógunát a zřizuje vládu, která vylučuje [SCOPE.sCharacter('shogun_scope').GetFullName] z jakékoli oficiální funkce."
 ep2_meiji.6.f: "„[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] požádal, aby byla obnovena správní pravomoc, která mu byla dlouho svěřena, a nyní si přeje odstoupit z úřadu šóguna. Jeho návrh byl přijat. Zemi ohrožují nesrovnatelná nebezpečí, jimiž se, jak je dobře známo, vážně zabýval zesnulý císař. Proto bylo moudrou rozvahou Jeho Veličenstva rozhodnuto, že bude položen základ pro obnovu císařské vlády a oživení národní důstojnosti.\n\nOd nynějška budou úřady seššó, kanpaku a šóguna zrušeny a budou zřízeny tři úřady nejvyššího radního, státního radního a palácového radního. O všem se bude rozhodovat rozumnou deliberací lidu, bez jakéhokoli rozlišování mezi civilními a vojenskými úředníky, mezi šlechtici a prostým lidem.“" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Sám ve tmě."
 ep2_meiji.7.t: "Taikunát"
 ep2_meiji.7.d: "Protože císařskému dvoru chybí praktické odborné znalosti k vládnutí, spojenci klanu [SCOPE.sCharacter('shogun_scope').GetLastName] u dvora přesvědčili císaře, aby udělil [SCOPE.sCharacter('shogun_scope').GetFullName] titul Taikun a postavil [SCOPE.sCharacter('shogun_scope').GetHerHim] do čela císařského úřadu."
 ep2_meiji.7.f: "„Jak se různí daimjó postupně shromažďují a scházejí, bude probíhat deliberace. Duch doby se soustředí na veřejnou deliberaci – tento výraz je široce diskutován – a nebylo možné se veřejnému mínění vyhnout. Proto upřímně žádám, aby byly tyto diskuse v co největší míře dovedeny ke shodě a aby byla přijata opatření, díky nimž bude účel shromáždění řádně ustaven.\n\nPokud by v průběhu deliberace vznikl nesoulad a vypukl konflikt, i kdyby skončil vítězstvím vašeho rodu, bylo by to stejné, jako když se bratři hádají uvnitř hradeb, zatímco zvenčí na nás doléhají cizí národy.“\n\n—Niši Šúsuke, „Návrh agendy“"
 ep2_meiji.7.a: "Znovu na pevné půdě."
 ep2_meiji.8.t: "Dvůr a šógunát"
 ep2_meiji.8.d: "Sňatkem s císařskou rodinou a splněním [SCOPE.sCharacter('shogun_scope').GetHerHis] slibů císaři [SCOPE.sCharacter('shogun_scope').GetFullName] zmírnil napětí mezi dvorem a šógunátem. Císař může pokračovat ve své odloučené existenci s jistotou, že šógun zajistí trvalý mír."
 ep2_meiji.8.f: "I kdyby bouřné větry\nzuřily krajinou,\nbudu čekat,\naž vrátí slunce na nebi\njeho původní záři.\n\n—císař Kómei"
 ep2_meiji.8.a: "Bouře skončila."
 ep2_meiji.9.t: "První mezi rovnými"
 ep2_meiji.9.d: "Díky sebedůvěře a obratným manévrům [SCOPE.sCharacter('taikun_scope').GetFullName] provedl restauraci císaře i zachování [SCOPE.sCharacter('taikun_scope').GetHerHis] klanu. Taikunové z rodu [SCOPE.sCharacter('taikun_scope').GetLastName] budou vládnout jako první mezi šlechtou moderního $JAP$."
 ep2_meiji.9.f: "Císař už neseděl za zástěnou. Jeho ministři byli rozmístěni podél stolu před ním a Taikun po jeho levici. Každý měl novou dvorskou uniformu, jejíž rukávy a hruď zdobily složité vzory ze zlatých lístků. Medaile cinkaly a šustily, když se usazovali na neznámých sedadlech.\n\nTaikun poslední hodinu moderoval diskusi, zatímco císař nepromluvil ani slovo. Spokojil se s nasloucháním a postupně obracel pozornost ke každému řečníkovi. Na opačné straně místnosti mluvil bývalý stoupenec #italic sonnó džói#! o nutnosti vyslat misi do Ameriky."
 ep2_meiji.9.a: "Šógun padá, Taikun povstává."
 ep2_meiji.9.b: "Císař je Synem nebes a Tokugawové jeho nástroji."
