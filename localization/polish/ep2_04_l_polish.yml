 ep2_meiji_pulse.3.t: "Šimonosecká válka"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], daimjó domény Čóšú, dal najevo, že se podřídí císařovu příkazu vyhnat cizince. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U] nařídil [SCOPE.sCharacter('choshu_daimyo_scope').GetHerHis] námořnictvu střílet na všechna cizí plavidla proplouvající Šimonoseckým průlivem, čímž vyvolal přestřelky s [SCOPE.sCountry('relevant_gp').GetAdjective] válečnou lodí."
 ep2_meiji_pulse.3.f: "Denní hromobití se rozléhalo nad mírným svahem Hinojamy a Masatake zvedl hlavu k nebi. Přivítal ho nadýchaný bílý oblak.\n\n„Podívej!“ vykřikl Džiró. Do jeho zorného pole vstoupila ruka ukazující dolů. Průlivem pod nimi se plnou parou řítila loď a její děla pálila na něco, co Masatake neviděl. Z jejího trupu létaly třísky, a přesto pokračovala dál. Nad tím vším rostl další oblak."
 ep2_meiji_pulse.3.a: "Cizinci dělají to, co my nemůžeme."
 ep2_meiji_pulse.3.b: "Pomozte doméně dosáhnout dohody."
 ep2_meiji_pulse.3.c: "Nabídněte Zápaďanům přístav výměnou za dohodu."
 treaty_name_shimonoseki_war_indemnity: "Odškodné za Šimonoseckou válku"
 modifier_defeated_westerners: "Poražená západní expedice"
 modifier_bombardment_of_domain: "Bombardované sídlo domény"
 ep2_meiji_pulse.4.t: "Vypálení [SCOPE.sCountry('relevant_gp').GetAltAdjective('eeho')|l] vyslanectví"
 ep2_meiji_pulse.4.d: "Samurajové #italic Sonnó džói#! z domény [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] podnikli útok na rozestavěnou budovu [SCOPE.sCountry('relevant_gp').GetAdjective] vyslanectví v [SCOPE.sState('edo_state').GetCityHubName]. Budova, která měla být první stavbou západního stylu ve městě, byla vypálena do základů a pachatelé nejsou nikde k nalezení."
 ep2_meiji_pulse.4.f: "Dva muži, zahalení a zamaskovaní, se usadili na vrcholu kopce s výhledem na místo, kde mělo stát vyslanectví. Z jeho nyní zčernalé skořápky stále stoupala oranžová záře. Když už všechno snadněji dostupné palivo dohořelo, plameny se jen obtížně udržovaly na hustých vnitřních trámech.\n\nKdyž záře pohasla do nicoty, oba muži zůstali. Jeden promluvil tichým hlasem a hleděl na zanechaný sloup kouře.\n\n„Nebylo by krásné, kdyby na nás jeho popel padal jako sníh?“"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] se stalo nevládnutelným."
 ep2_meiji_pulse.4.b: "Zakažte [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] nosit ve městě zbraně."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName] zaplatí [SCOPE.sCountry('relevant_gp').GetName] odškodné ve výši @money!#v 3M#! během #v 10 let#!"
 shimonoseki_indemnity_port_tt: "Město $HUB_NAME_STATE_KANSAI_port_japanese$ v [GetStateRegion('STATE_KANSAI').GetName] bude otevřeno jako [SCOPE.sCountry('relevant_gp').GetAdjective] [concept_treaty_port]"
 modifier_ungovernable_capital: "Přiznaná nevládnutelnost"
 ep2_meiji_pulse.5.t: "Krvavá pomsta"
 ep2_meiji_pulse.5.d: "Hlavní ministr šógunátu [SCOPE.sCharacter('tairo_scope').GetFullName] byl u brány edského hradu zavražděn róniny z domén [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] a [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. Manifest zanechaný atentátníky vyjadřuje zásady #italic Sonnó džói#! a odsuzuje ústupky hlavního ministra vůči cizincům."
 ep2_meiji_pulse.5.f: "Čúzaburó sledoval, jak Gorokuró vstoupil před průvod a jeden ze strážců [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] se pohnul, aby ho zastavil. Gorokuró mu nedal více času k reakci. Tasil meč a vyrazil vpřed. Z rozpůlené tváře muže z [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] vytryskl mohutný oblouk krve a jeho druhové se vrhli vpřed, aby ho pomstili.\n\nČúzaburó nechal svůj plášť do deště spadnout a vytáhl pistoli. Zamířil na odhalený bok nosítek a stiskl spoušť. Řev výstřelu přerušil zvuk střetávajících se čepelí a výkřiků, a pak zazněl další. Jeden ze strážců se otočil čelem k němu a Džizaemon, rónin z [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], sekl mečem směrem k jeho trupu. Za bojující dvojicí Čúzaburó viděl, jak dveřmi nosítek na zasněženou ulici vytéká rudý proud. Tasil wakizaši a rozběhl se k nim."
 ep2_meiji_pulse.5.a: "Samurajové znovu zkříží čepele."
 modifier_tairo_assassinated: "Tairó zavražděn"
 ep2_meiji_pulse.6.t: "Incident v Ikedaji"
 ep2_meiji_pulse.6.d: "Na základě informací získaných mučením militanta z [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] podnikli [GetLawType('law_shinsengumi').GetName] zátah proti shromáždění údajných spiklenců v hostinci Ikedaja ve státě [SCOPE.sState('kyoto_state').GetName]. Zátah se proměnil v prudkou šarvátku s meči v hostinci i kolem něj."
 ep2_meiji_pulse.6.f: "Ótaka se zapřel o zábradlí, když Šinsengumi vtrhli dveřmi dovnitř. Na rukávech jejich bledě modrých #italic haori#! viděl krvavé skvrny – v tlumeném světle lamp černé na bílém. Zvedl meč do střehu.\n\nDva z nich se oddělili od ostatních a vyrazili po schodišti, které hlídal, bok po boku. Sekl po nich čepelí, ucítil, jak byla odražena, a vyrovnal se s tím. Od nárazu odlétly jiskry. Druhý muž právě útočil. Ustoupil o krok, pootočil zápěstím, aby–\n\nZableskla ocel ozářená ohněm a pak ucítil v hrudi něco studeného."
 ep2_meiji_pulse.6.a: "Odměňte Šinsengumi za jejich iniciativu."
 ep2_meiji_pulse.6.b: "Tato brutalita jen vybízí k odvetě."
 modifier_shinsengumi_meddling: "Bujná Šinsengumi"
 modifier_shinsengumi_crackdown: "Zátah Šinsengumi"
 modifier_refrained_from_crackdowns: "Zdrženlivá Šinsengumi"
 sufficient_pressure_from_sonno_joi_tt: "[concept_activism] hnutí [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] je vyšší než @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "Zakázaná brána"
 ep2_meiji_pulse.7.d: "Vojáci z domény [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], napojené na [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName], se pokusili zaútočit na císařský palác ve státě [SCOPE.sState('kyoto_state').GetName] a obnovit císaře silou. Proti nim stojí vojáci domén [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] a Aizu."
 ep2_meiji_pulse.7.f: "Brána Hamaguri byla udušená dýmem ze střelných zbraní. Všude kolem nich se Kjóto rozhořívalo.\n\nVojáci Aizu byli soustředěni podél zdi a vypouštěli salvy mušketové palby, které se rozstřikovaly po cestě a lafetách děl [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Každých pár vteřin jedna z koulí zasáhla maso a vyvolala výkřiky, které na okamžik pronikly nad praskot střelby. Kózó se krčil u kola děla a zápasil se zaseknutou mušketou. Sotva jeden #italic ken#! od něj ležel velitel jeho oddílu tváří k zemi, bez nohou a bez rukou. Nějakým způsobem se stále svíjel."
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] a Aizu úspěšně odrazí útočníky."
 ep2_meiji_pulse.7.b: "Císařský palác padne pod kontrolu [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "[concept_coup_resistance] země [ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) je nižší než [concept_coup_strength] [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "Expedice proti [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "Jako odvetu za útok [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] na císařský palác nařídil šógun trestnou expedici s cílem vyhnat z domény frakci #italic Sonnó džói#!. Poradci naklonění [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] nabídli plán, jak zajistit mír výměnou za seppuku viníků."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], daimjó [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], stál na hradním balkonu a hleděl do dálky. Daleko odtud byla obloha poskvrněna pruhy kouře – táborovými ohni blížící se armády.\n\n„Šógun požaduje seppuku tří starších vazalů,“ řekl vazal. „Stětí čtyř štábních důstojníků. Vyhnanství pěti ministrů.“\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] pohlédl k táborovým ohňům. Byly jich nejméně stovky. Kdysi modrý obzor se proměnil v cosi chorobného. Nakonec promluvil.\n\n„...[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se podřídí.“"
 ep2_meiji_pulse.8.a: "Pokud je lze porazit bez boje, budiž."
 ep2_meiji_pulse.8.b: "Doména musí být očištěna odshora dolů."
 modifier_daimyo_house_arrest: "Daimjó v domácím vězení"
 modifier_daimyo_executed: "Daimjó zbavený majetku"
 ep2_meiji_pulse.9.t: "Rozkaz vyhnat barbary"
 ep2_meiji_pulse.9.d: "Císař, rozhněvaný smlouvami vnucenými zemi [ROOT.GetCountry.GetName] západními mocnostmi, obešel šóguna a vydal edikt k vyhnání cizinců z [ROOT.GetCountry.GetAdjectiveNoFormatting] půdy. Militanti z [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] se semkli kolem císařovy věci."
 ep2_meiji_pulse.9.f: "Vazal stál vedle jednoho z děl a hleděl k průlivu. V tuto hodinu se plavidla plující párou rýsovala proti zapadajícímu slunci. Stranou od něj se nižší samurajové domény Čóšú zabývali nabijáky a vaky černého prachu.\n\nKdyž vzhlédl k siluetě Hinojamy a městu Šimonoseki pod ní, vytanul mu na mysli úryvek z ediktu. „I kdyby měla být země obrácena v popel,“ stálo v něm, „nedovolíme otevření přístavů obchodu.“\n\nBylo to oprávněné? Dovolil by, aby její mírný zelený svah byl spálen dočerna, její květinová pole shořela a jeho domov byl srovnán se zemí? Ano, pomyslel si. Bez váhání."
 ep2_meiji_pulse.9.a: "Šógun musí odcestovat do Kjóta, aby to projednal."
 ep2_meiji_pulse.9.b: "Tento rozkaz je podvrh – potlačte jej."
