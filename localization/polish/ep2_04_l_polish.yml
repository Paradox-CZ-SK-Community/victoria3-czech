 je_zaibatsu_reason: "Rychlá industrializace země [ROOT.GetCountry.GetName] přivedla velkou část ekonomiky pod zastřešení [concept_zaibatsu]. Tyto podniky, které bohatě těží ze svého propojení se státními institucemi, se staly životně důležitými orgány ve vojensko-průmyslové struktuře #v $JAP$#!.\n\nKoncentrovaná povaha [ROOT.GetCountry.GetAdjectiveNoFormatting] kapitálu učinila ze země mezinárodního konkurenta, za cenu stále větší politické moci v rukou zaibacu a jejich vojenských patronů.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
