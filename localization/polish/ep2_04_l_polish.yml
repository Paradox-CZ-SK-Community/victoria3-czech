 shogunate_strategy_title_decide_loc: "Rozhodnout o reformní strategii"
 shogunate_strategy_title_revise_loc: "Revidovat reformní strategii"
 shogunate_strategy_title_decide_desc_loc: "Aby moc Tokugawů přežila, šógunát se musí reformovat. Taková reforma se může ubírat jedním ze dvou směrů – šógun se může pokusit obnovit legitimitu bakufu sjednocením s císařským dvorem, nebo může usilovat o řízenou restauraci císaře, aby se postavil do čela parlamentní vlády."
 shogunate_strategy_title_revise_desc_loc: "Současná reformní strategie šóguna se ukázala jako ne zcela výhodná. Ačkoli změna přístupu bude něco stát, je lepší nedržet se neúspěšného kurzu."
 je_meiji_restoration_proclaim_imperial_restoration: "Požádat o císařskou restauraci"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "Císař zůstává svrchovaným vládcem Japonska. Bez císařského schválení je šógun jen nejmocnějším daimjó mezi stovkami dalších. Přežití šógunátu – nebo jeho pád – bude záviset na vůli císařského dvora."
 imperial_restoration_kobu_gattai_loc: "Aby krize skončila, musí dojít ke sjednocení šógunátu a dvora. Daimjó musí být přesvědčeni, že rozkazy šóguna nesou císařský příkaz a že šógun požívá plné důvěry dvora. K dosažení tohoto cíle se šógun musí učinit zranitelným a spoléhat na císaře, že znovu upevní jeho autoritu.\n\nTakový plán je osudovým skokem z jeviště – pokud císařský dvůr nebude ochoten spolupracovat, Tokugawové se ocitnou sami uprostřed svých pomstychtivých odpůrců."
 imperial_restoration_kogi_yoron_loc: "Aby krize skončila, musí vládnout císař. Má-li moc Tokugawů přežít restauraci, šógun ji musí provést podle vlastních podmínek. Posledním krokem šógunových reforem musí být vrácení správních pravomocí císaři a vytvoření nové role pro jeho klan v reformované císařské vládě.\n\nTakový plán je osudovým skokem z jeviště – pokud císařský dvůr nebude ochoten spolupracovat, Tokugawové se ocitnou sami uprostřed svých pomstychtivých odpůrců."
 je_meiji_restoration_imperial_marriage: "Sjednat císařský sňatek"
 je_meiji_restoration_imperial_marriage_desc: "Projekt #b Kóbu gattai#! vyžaduje sjednocení v tom nejdoslovnějším smyslu – politický sňatek mezi vládnoucím $RULER_TITLE_SHOGUN$ a císařskou princeznou. Aby bylo možné toto spojení uskutečnit, musí být $RULER_TITLE_SHOGUN$ připraven splnit zásadní podmínky stanovené císařským dvorem."
