 shogunate_strategy_title_decide_loc: "Rozhodnout o strategii reforem"
 shogunate_strategy_title_revise_loc: "Přehodnotit strategii reforem"
 shogunate_strategy_title_decide_desc_loc: "Aby moc Tokugawů přežila, musí se Šógunát reformovat. Taková reforma se může ubírat dvěma směry—Shōgun může obnovit legitimitu Bakufu sjednocením s Císařským dvorem, nebo může usilovat o obnovu císaře kontrolovaným způsobem, aby sám stál v čele parlamentní vlády."
 shogunate_strategy_title_revise_desc_loc: "Současná strategie reforem Shōguna se ukázala ne nutně výhodná. Změna přístupu sice něco stojí, ale lepší není lpět na neúspěšném směru."
 je_meiji_restoration_proclaim_imperial_restoration: "Žádat o císařskou restauraci"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "Císař zůstává suverénem Japonska. Bez císařského souhlasu je Shōgun jen nejsilnějším daimjó mezi stovkami. Přežití Šógunátu—or jeho pád—záleží na vůli Císařského dvora."
 imperial_restoration_kobu_gattai_loc: "Aby krize skončila, musí dojít k sjednocení Šógunátu a dvora. Daimyó musí být přesvědčen, že rozkazy Shōguna mají císařské nařízení a že Shōgun má plnou důvěru dvora. Aby toho dosáhl, musí se Shōgun učinit zranitelným a spoléhat na císaře, že znovu obnoví jeho autoritu.\n\nTakový plán je osudovým skokem z jeviště—pokud Císařský dvůr nebude ochotný spolupracovat, Tokugawové se ocitnou osamoceni mezi svými mstivými odpůrci."
 imperial_restoration_kogi_yoron_loc: "Aby krize skončila, musí vládnout císař. Pokud má moc Tokugawů přežít restauraci, musí ji Shōgun realizovat za svých podmínek. Posledním krokem reforem Shōguna musí být vrácení administrativní moci císaři a ustavení nové role jeho rodu v reformované císařské vládě.\n\nTakový plán je osudovým skokem z jeviště—pokud Císařský dvůr nebude ochotný spolupracovat, Tokugawové se ocitnou osamoceni mezi svými mstivými odpůrci."
 je_meiji_restoration_imperial_marriage: "Uspořádat císařské manželství"
 je_meiji_restoration_imperial_marriage_desc: "Projekt #b Kōbu Gattai#! vyžaduje sjednocení v tom nejdoslovnějším smyslu—politické manželství mezi úřadujícím $RULER_TITLE_SHOGUN$ a císařskou princeznou. Aby k tomu došlo, musí být $RULER_TITLE_SHOGUN$ ochoten splnit značné podmínky stanovené Císařským dvorem."
