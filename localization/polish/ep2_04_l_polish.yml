 je_zaibatsu_reason: "Rychlá industrializace [ROOT.GetCountry.GetName] přenesla značnou část ekonomiky pod křídla [concept_zaibatsu]. Těmto podnikům se daří díky provázání se státními institucemi a staly se důležitými články vojensko-průmyslové struktury #v $JAP$#!.\n\nKoncentrace [ROOT.GetCountry.GetAdjectiveNoFormatting] kapitálu učinila z země mezinárodního konkurenta, za cenu placení stále větší moci v rukou zaibatsu a jejich vojenských patronů.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
