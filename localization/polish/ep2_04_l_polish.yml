 ep2_meiji_pulse.2.t: "Granátování [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "Jako odplatu za odmítnutí domény [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] zaplatit odškodnění za smrt [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] se [SCOPE.sCountry('relevant_gp').GetAdjective] námořní lodě pustily do několika dnů trvající dělostřelecké přestřelky s pobřežními opevněními [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]."
 ep2_meiji_pulse.2.f: "Záliv visel v mlze od kanonády a [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] hořelo. Naproti, jedna z cizích lodí střílela rakety do slévárny na severu města. S každým odpálením pekelně rudé světlo přebíjelo slabé světlo zapadajícího slunce.\n\nPoslední funkční dělo na baterii [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] zaburácelo—dálkový výstřel za dobrých podmínek, nyní však zoufalý. Kámen dopadl několik délek od třetího plavidla cizí kolony a vyrazil mohutný gejzír vody do vzduchu. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] popadl houbičku a pospíchal obsluhovat dělo. Kdesi za zadní zdí stále křičeli těžce ranění muži. Přes hučení v uších je [SCOPE.sCharacter('name_a_scope').GetSheHe] stále slyšel."
 ep2_meiji_pulse.2.a: "Tvrdá cena za jejich lehkomyslnost."
