 special_character_japanese_emperor_desc: "Tato postava je právě vládnoucím japonským císařem, ústřední postavou japonského náboženského a politického zřízení."
 japan_monarchy.1.t1: "Éra Kaei"
 japan_monarchy.1.t2: "Éra Tenkjú"
 japan_monarchy.1.d1: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] usedl na Chryzantémový trůn jako japonský císař. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] nástup na trůn znamenal začátek éry Kaei, pojmenované po věčném štěstí."
 japan_monarchy.1.d2: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] usedl na Chryzantémový trůn jako japonský císař. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] nástup na trůn znamenal začátek éry Tenkjú, pojmenované po nebeské stálosti."
 japan_monarchy.1.f: "Odkudsi mimo dohled hudebník dal signál. Dvě dámy dvora rozevřely závěsy trůnu. Tam stál císař, oděn v šarlatových rouchách zdobených bílými a zelenými draky. Jejich objem pohltil jeho sedadlo, takže se zdálo, že pluje ve vzduchu. Z jeho koruny se snesl závěs z korálků. Stíny, které vrhal, skryly jeho oči před pohledem.\n\nŠatstvo zašustilo kolem [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], [SCOPE.sCharacter('name_scope').GetSheHe] sklonil [SCOPE.sCharacter('name_scope').GetHerHis] hlavu. Ostatní účastníci se vlnili v mohutném poklonu. [SCOPE.sCharacter('name_scope').GetSheHe|U] je následoval, a stínem zahalená tvář císaře zmizela z dohledu.\n\nO několik dní později, na cestě zpět do Edo, se [SCOPE.sCharacter('name_scope').GetSheHe] pokusil rekonstruovat, co [SCOPE.sCharacter('name_scope').GetSheHe] viděl, avšak nenašel žádný uchopitelný obraz. [SCOPE.sCharacter('name_scope').GetSheHe|U] si mohl vzpomenout na korunu, závěsy, krabice spočívající po straně císaře. O samotném muži nebylo nic k nalezení." # todo: CHANGED
 japan_monarchy.1.a: "Tvé roky budou tak početné jako zrnka písku na pobřeží."
 japan_monarchy.2.t: "Éra Meidži"
 japan_monarchy.2.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] usedl na Chryzantémový trůn jako japonský císař. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] nástup na trůn znamenal začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované po příslibu osvícené vlády."
 japan_monarchy.2.f: "Zazněl gong a závěs se zvedl. Jen na mrknutí oka publikum spatřilo císaře, oděného do bohatě zdobeného žlutého hedvábí, s tváří napůl zastřenou. Po jeho levici spočívala na stojanu zeleně lakovaná skříňka, ukrývající posvátný meč a klenot. Pak velitel zbroje pronesl svůj pokyn a všichni sklopili oči k podlaze. Herold promluvil silným a pevným hlasem.\n\n„Od dávných časů, ve věku bohů, byly položeny základy říše, a poté v Kašihaře božský císař založil císařskou dynastii. Císařská linie od té doby pokračuje nepřerušeně. V souladu se starobylými zvyklostmi a příkladem dřívějších vlád nyní přijímáme Nebeské nástupnictví a usedáme na Velký císařský trůn.“" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Tvé roky budou tak početné jako zrnka písku na pobřeží."
 japan_monarchy.3.t: "Éra Taišó"
 japan_monarchy.3.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] usedl na Chryzantémový trůn jako japonský císař. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] nástup na trůn znamenal začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované po ctnosti velké spravedlnosti."
 japan_monarchy.3.f: "Spoj zasténal, když muž prošel po lešení. Jataró jej držel co nejpevněji. Jakmile kroky odezněly, začal jej palicí zajišťovat na místě.\n\nPodobné zvuky slyšel všude kolem sebe. Koutkem oka viděl jinou četu, jak na sousední budově skládá stěny z černého dřeva. Předák křičel pokyny na muže nesoucího vratký náklad došků.\n\nZa šest dní projde císař průchodem, který stavěl, jako součástí obřadu jednou za život, jenž skončí jeho zničením. Nebude se jej moci zúčastnit. Nejvíc, v co mohl doufat, bylo spatřit jeho záři odraženou od mraků."
 japan_monarchy.3.a: "Tvé roky budou tak početné jako zrnka písku na pobřeží."
 japan_monarchy.4.t: "Éra Šówa"
 japan_monarchy.4.d: "Princ [SCOPE.sCharacter('emperor_scope').GetFirstName] usedl na Chryzantémový trůn jako japonský císař. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] nástup na trůn znamenal začátek éry [SCOPE.sCharacter('emperor_scope').GetFirstName], pojmenované po příslibu osvíceného míru a svornosti."
 japan_monarchy.4.f: "Čtyři generace rodiny Takaiši se tísnily kolem rádia. Hlas z něj zněl, jako by přicházel ze dna studny, zabarvený šumem. Gijó otočil knoflíkem jedním směrem a pak druhým. Když se znovu ozval, byl silný a pevný.\n\n„...hlavní tajemník kabinetu vydal reskript oznamující novou éru. Od tohoto dne bude éra změněna na první rok [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]...“\n\nMatčiny oči zalétly k novinám na kuchyňském stole. „Ne Kobun? Říká pravdu?“\n\nMístnost naplnil rozporuplný šepot a Gijó zesílil hlasitost rádia. Bylo to marné. Pokud bylo ještě něco dalšího, bude si o tom muset přečíst zítra."
 japan_monarchy.4.a: "Tvé roky budou tak početné jako zrnka písku na pobřeží."
 japan_monarchy.5.t: "Jeden císař, jedna éra"
 japan_monarchy.5.d: "Po obnovení politické převahy císařského dvora vydal císař edikt reformující systém ér. Nová éra bude nyní vyhlašována při nástupu nového císaře a potrvá tak dlouho, dokud bude vládnout."
 japan_monarchy.5.f: "#bold Císařský edikt#!\n\nUstanovení nové éry při přijetí nebeského mandátu posvátným panovníkem tvoří vzorový model osvíceného věku a měřítko pro deset tisíc generací. Poté, co jsem zdědil velkou linii a osobně se ujal nesčetných státních záležitostí, nyní měním název éry, abych označil nový počátek s nesčetnými poddanými v říši. [ROOT.GetCountry.GetCustom('JAP_era_year_name')] bude od nynějška znám jako první rok [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. Od tohoto dne bude starý systém reformován a zásada jednoho názvu éry na jednu vládu bude ustanovena jako trvalá praxe." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Ti, kdo mají autoritu, jej uvedou v praxi."
 japan_monarchy.6.t: "Smrt daidžó tennó"
 japan_monarchy.6.d: "Vysloužilý císař, abdikovaný otec vládnoucího císaře, zemřel. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U] je připomínán pro své úsilí obnovit císařskou prestiž a bylo mu uděleno posmrtné jméno [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Tóhó namočil štětec do inkoustu. Jeho špička se přesunula na stránku a vytvořila znaky pro den, rok a počasí. Posunula se do dalšího sloupce a zastavila se.\n\nJaká formulace by byla vhodná? Jak nejlépe vyjádřit význam toho, co se stalo? Slyšel zvěsti o velkém úsilí vysloužilého císaře obnovit dvůr – vybavoval si jeho vládu, zprávy o obřadech, které oživil. A pak přijal dvorského vyslance a dozvěděl se pravdu.\n\nŠtětec se dotkl papíru. „Obdržena žádost o precedens ohledně císařova titulu. Konzultována Císařská genealogie a předána rada...“"
 japan_monarchy.6.a: "Uskuteční jeho potomci jeho přání?"
