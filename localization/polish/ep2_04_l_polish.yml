 glossary_zaibatsu: "Zaibatsu je rodinná a vertikálně integrovaná průmyslová a finanční konglomerace.\n\nTypické zaibatsu je organizováno kolem holdingové společnosti a banky, jež drží akcie v několika průmyslových dceřiných společnostech. Zaibatsu se vyvinulo z rodových obchodních koncernů pozdního období Edo, které využily své předchozí bohatství a vazby na stát ke konsolidaci kontroly nad velkou částí průmyslové základny Japonska."
