 decision_found_budapest_desc: "Sjednocením historického maďarského hlavního města Budína s rychle se rozvíjejícím městem Pešť vytvoříme jedinou prosperující metropoli rozprostírající se na obou březích Dunaje."
 decision_found_budapest_tt: "Města #bold Budín#!, #bold Pešť#! a #bold Starý Budín#! budou sloučena do nového města #bold Budapešť#!"
 decision_move_capital_to_buda: "Určit Budín za hlavní město"
 decision_move_capital_to_buda_desc: "Ačkoli Maďarsko poznalo mnoho hlavních měst, žádné nepřekonává Budín svou prestiží a slávou. Musíme tam přesunout maďarský sněm."
 modifier_buda_made_capital: "Růst Pešti"
 decision_demand_hungary_revoke_laws: "Jednostranně zrušit maďarské reformy"
 decision_demand_hungary_revoke_laws_desc: "Ať už z jakéhokoli důvodu, naše tehdejší vláda ustoupila požadavkům nastupujícího maďarského sněmu. Tuto chybu musíme napravit."
 decision_demand_hungary_revoke_laws_tt: "Dovolili jsme maďarskému sněmu přijmout revoluční zákony"
 je_hungarian_revolution: "Maďarská revoluce"
 je_hungarian_revolution_reason: "#italic „Svoboda je princip; její společenství je její bezpečností; výlučnost je její zkázou“#!—Lajos Kossuth\n\nKdyž [ROOT.GetCountry.GetNameNoFlag] vstoupilo do nového století, stále více jej ovládaly kliky liberálních, reformně smýšlejících politiků.\n\nAčkoli se neshodnou na přesné povaze budoucího vztahu Maďarska k #bold habsburské monarchii#!, spojuje je společná touha po politické a hospodářské reformě, jejímž cílem je proměnit relativně zaostalé Maďarsko v moderní a dynamický národní stát s autonomií nad maďarskými [Concept('concept_homeland','$concept_homelands$')].\n\n#bold Občané z donucení#!\nPokud se [ROOT.GetCountry.GetNameNoFlag] ocitne v opozici vůči #bold $AUS$#! v [concept_diplomatic_play], utlačované menšiny mohou situace využít a pokusit se #tooltippable #tooltip:hungarian_revolt_ethnic_unrest_tt #bold setřást#! maďarské jho.#!#! "
 owns_all_hungarian_homelands_tt: "Vlastní #b všechny#! #tooltippable #tooltip:[GetPlayer.GetTooltipTag],hungarian_homeland_states_tt [SCOPE.sCulture('hungarian_culture_scope').GetName] domoviny#!#!"
 hungarian_homeland_states_tt: "#title Následující [Concept('concept_state_region','$concept_state_regions$')] jsou [GetCulture('hungarian').GetName] [Concept('concept_homeland','$concept_homelands$')]:#! #indent_newline:3 \n• $STATE_BANAT$\n• $STATE_SLOVAKIA$\n• $STATE_RUTHENIA$\n• $STATE_BEKES$\n• $STATE_TRANSDANUBIA$\n• $STATE_CENTRAL_HUNGARY$\n• $STATE_DELVIDEK$\n• $STATE_NORTHERN_TRANSYLVANIA$\n• $STATE_SOUTHERN_TRANSYLVANIA$#!"
 hungarian_revolt_ethnic_unrest_tt: "[GetCulture('serb').GetName], [GetCulture('slovak').GetName] a [GetCulture('romanian').GetName] poddaní mohou #n povstat#!, pokud platí následující podmínky:\n\n• Průměrné [concept_acceptance] [GetCulture('serb').GetName], [GetCulture('slovak').GetName] nebo [GetCulture('romanian').GetName] je nižší než #v 60#!\n• Jedna z následujících možností: #indent_newline:3 \n• [concept_cultural_turmoil] v [GetCulture('serb').GetName], [GetCulture('slovak').GetName] nebo [GetCulture('romanian').GetName] [Concept('concept_homeland','$concept_homelands$')] překračuje #n 15%#!\n• [concept_political_movement] způsobuje [concept_obstinance] v [GetCulture('serb').GetName], [GetCulture('slovak').GetName] nebo [GetCulture('romanian').GetName] [Concept('concept_homeland','$concept_homelands$')]#!"
 has_founded_budapest_tt: "Přijali jsme #bold rozhodnutí#! založit #bold Budapešť#!"
 modifier_hungary_timeout: "Země, kterou dějiny minuly"
 hungarian_revolution_annex_transylvania_button: "Vyhlásit unii se Sedmihradskem"
 hungarian_revolution_annex_transylvania_button_desc: "Ačkoli je [SCOPE.sCountry('transylvania_scope').GetName] uznáváno jako země [ROOT.GetCountry.GetAdjective] koruny, od porážky #bold Rákócziho povstání#! v roce 1711 je spravováno odděleně od vlastního Maďarska.\n\nSedmihradský sněm však nadále ovládají prounijní [SCOPE.sCulture('hungarian_culture_scope').GetName] a [SCOPE.sCulture('szekely_culture_scope').GetName] delegáti a při mírném pobídnutí by se pravděpodobně znovu připojil k říši. [SCOPE.sCountry('austria_scope').GetName] však takový krok nejspíš neschválí a pravděpodobně nás označí za zrádce."
 if_trs_accepts_tt: "Pokud [SCOPE.sCountry('transylvania_scope').GetName] přijme náš návrh na unii země [SCOPE.sCountry('transylvania_scope').GetNameNoFormatting] se zemí [ROOT.GetCountry.GetName], [SCOPE.sCountry('transylvania_scope').GetNameNoFormatting] bude #b anektováno#!"
 hungarian_revolution_twelve_points_button: "Vyhlásit Dvanáct bodů"
 hungarian_revolution_twelve_points_button_desc: "Dlouho rozdělení mezi radikály a opatrnější reformátory, [ROOT.GetCountry.GetAdjective] pokrokáři se nyní sjednotili za společnou platformou Dvanácti bodů, sérií dalekosáhlých zákonů určených k tomu, aby navždy zajistily svobodu země."
 hungarian_revolution_twelve_points_tt: "Takto radikální čin pravděpodobně způsobí #bold zásadní rozkol#! v našich vztazích se zemí [SCOPE.sCountry('austria_scope').GetName], #n což může vést až k válce#!"
 hungarian_revolution_austrian_ruler: "Následující podmínky sníží šanci, že [SCOPE.sCountry('austria_scope').GetName] bude odporovat našim krokům:#indent_newline:3 \n• [SCOPE.sCountry('austria_scope').GetAdjective] [concept_ruler] má [concept_character_trait] [GetCharacterTrait('compliant').GetName]\n• [SCOPE.sCountry('austria_scope').GetName] je odhodlaným účastníkem jakékoli [concept_diplomatic_play]#!"
 modifier_the_spirit_of_48: "Společná pokroková fronta"
 possible_effects_hungary_events.9_tt: "#header Následující položky jsou všechny #b možné#! účinky události vyplývající z rozhodnutí země [SCOPE.sCountry('austria_scope').GetName] v $hungary_events.9.t$:#!"
 possible_hun_lawgroup_distribution_of_power_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_census_voting').GetName] ve skupině [GetLawGroup('lawgroup_distribution_of_power').GetName]"
 possible_hun_lawgroup_free_speech_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_protected_speech').GetName] ve skupině [GetLawGroup('lawgroup_free_speech').GetName]"
 possible_hun_lawgroup_land_reform_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_tenant_farmers').GetName] ve skupině [GetLawGroup('lawgroup_land_reform').GetName]"
 possible_hun_lawgroup_church_and_state_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_freedom_of_conscience').GetName] ve skupině [GetLawGroup('lawgroup_church_and_state').GetName]"
 possible_hun_lawgroup_internal_security_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_national_guard').GetName] ve skupině [GetLawGroup('lawgroup_internal_security').GetName]"
 possible_hun_lawgroup_taxation_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_per_capita_based_taxation').GetName] ve skupině [GetLawGroup('lawgroup_taxation').GetName]"
 possible_hun_lawgroup_economic_system_change_tt: "[ROOT.GetCountry.GetName] povolí zákon [GetLawType('law_interventionism').GetName] ve skupině [GetLawGroup('lawgroup_economic_system').GetName]"
 hungarian_revolution_establish_honved_button: "Zřídit honvédskou armádu"
 hungarian_revolution_establish_honved_button_desc: "Zemi [ROOT.GetCountry.GetName], které bylo dlouho upíráno právo vykonávat vojenskou pravomoc nad vlastními branci, nyní nechybí schopnost ani potřeba postavit armádu, která se zodpovídá [ROOT.GetCountry.GetCapital.GetCityHubName], a nikoli #italic Hofkriegsratu#! ve Vídni.\n\nTradiční maďarské pluky jsou však příliš omezené počtem, než aby tuto úlohu zvládly samy. Musíme zahájit rozsáhlou reorganizaci a náborové úsilí, abychom znovu nahnali strach do srdcí našich nepřátel."
 possible_effects_hungary_events.7_tt: "#header Následující položky jsou všechny #b možné#! účinky události z $hungary_events.7.t$:#!"
 dp_hungarian_revolution: "Maďarská revoluce"
 hungary_events.1.t: "Perla Dunaje"
 hungary_events.1.d: "Formálním spojením Budína, Pešti a Starého Budína v jedno zažívá nová metropole Budapešť rozmach, jaký dějiny země [ROOT.GetCountry.GetName] dosud nepoznaly, a do města proudí kapitál i odborné znalosti."
 hungary_events.1.f: "„Hlavní město bude mocné jen tehdy, bude-li mít vládnoucí moc; bude ve svém životě prosperovat, bude-li vedeno jednou duší, jednou vůlí ve svém úsilí; šťastné bude jen tehdy, když se oddělené zájmy rozplynou ve společném zájmu.“\n—Bertalan Szemere"
 hungary_events.1.a: "Panonie je naší obilnicí a Budapešť jejím tlukoucím srdcem."
 hungary_events.1.b: "Borúra derű, kéž Budapešť vede cestu našeho národa."
 modifier_budapest_steam_mills: "Rozmach budapešťských parních mlýnů"
 modifier_budapest_paris_of_the_east: "Paříž Východu"
 modifier_budapest_chain_bridge: "Széchenyiho řetězový most"
 modifier_budapest_grain_barons: "Podpoření obilní baroni"
 modifier_budapest_academy: "Podpořená Akademie věd"
 hungary_events.2.t: "Srbské povstání"
 hungary_events.2.d: "Po shromáždění ve Sremských Karlovcích povstali zástupci [GetCulture('serb').GetName] národa v zemi [SCOPE.sCountry('hungary_country_scope').GetName] se záměrem vybojovat si Srby ovládanou říši severně od řeky Sávy."
 hungary_events.2.f: "„Rozptýleni do sta směrů - ze sta stran nad námi mohl vládnout každý, zatímco my jsme nemohli vládnout ani sami sobě, jako bychom nikdy neřídili svůj vlastní osud!“\n—Nikanor Grujić"
 hungary_events.2.a: "Mobilizujte armádu a srazte tyto vídeňské psíky k zemi."
 hungary_events.2.b: "Za ctihodný kříž a zlatou svobodu!"
 hungary_events.2.c: "Uznat [SCOPE.sCountry('banat_country_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('banat_country_scope').GetRuler.GetLastName] jako našeho místního guvernéra."
 hungary_events.2.e: "Srbům nelze důvěřovat. Rozdrťte i je."
 modifier_serbian_volunteers: "Srbští dobrovolníci"
 hungary_events.3.t: "Slovenské povstání"
 hungary_events.3.d: "Z jejich shromáždění v Myjavě vyhlásila [GetCulture('slovak').GetName] národní rada záměr oddělit se od země [SCOPE.sCountry('hungary_country_scope').GetName] a vyzvala k všeobecnému slovenskému povstání."
 hungary_events.3.f: "„Dlouho jsme sloužili jako hračka ďábelské politiky, která nás záměrně rozdělovala a neustále mezi námi podněcovala sváry, abychom padli vlastní vinou... Dospěli jsme, poznali jsme svá práva a chceme je statečně bránit.“\n—Ľudovít Štúr"
 hungary_events.3.a: "Naše armáda s těmito zrádci rychle skoncuje."
 hungary_events.3.b: "Sláva! Všem Slovákům!"
 hungary_events.3.c: "Slibte Slovákům autonomii výměnou za věrnost."
 hungary_events.3.e: "Pobuřování musí být udušeno."
 modifier_slovak_volunteers: "Slovenští dobrovolníci"
 hungary_events.4.t: "Maďarsko volá po unii"
 hungary_events.4.d: "Odvážným krokem vyhlásil [SCOPE.sCountry('hungary_country_scope').GetAdjective] sněm unii země [ROOT.GetCountry.GetName] s Maďarskem. Aby však unie vstoupila v platnost, je zapotřebí souhlasu sněmu v [ROOT.GetCountry.GetCapital.GetCityHubName], což přimělo prounijní [GetCulture('hungarian').GetName] a [GetCulture('szekely').GetName] delegáty horečně shánět potřebné hlasy."
 hungary_events.4.f: "Kdyby Bůh zamýšlel, aby dnes pracoval, neposlal by mu do cesty takový povyk, pomyslel si Ioan. Znovu vzhlédl od účetní knihy, vzal dýmku, potáhl si a zadíval se z okna.\n\nVenku před palácem Reduta se dav ještě rozrostl. Tvořili jej převážně místní Sikulové a Maďaři, z nichž některé Ioan poznával, a jejich výkřiky „Unie, nebo smrt!“ se rozléhaly ulicemi.\n\nŠpatná věc, pomyslel si. A špatné i #italic pro#! obchod. Jeho horkokrevný syn spolu se dvěma jeho učni už opustil město kvůli jakémusi „národnímu shromáždění“ v Blaji, ze všech míst právě tam. Ne, pomyslel si Ioan a žvýkal dýmku, tohle vůbec neskončí dobře."
 hungary_events.4.a: "Igen. Sněm hlasuje pro sjednocení."
 hungary_events.4.b: "Nem. Návrh je v těsném hlasování zamítnut."
 hungary_events.5.t: "Sedmihradsko ratifikuje unii s Maďarskem"
 hungary_events.5.d: "Po hlasování v oblastním sněmu ovládaném Maďary se Sedmihradsko rozhodlo vstoupit do unie se zemí [SCOPE.sCountry('hungary_country_scope').GetName]."
 hungary_events.5.f: "„Unie, nebo smrt,“ prohlásili minulý týden. Sebevražda hlasováním, pomyslel si; měli raději křičet „Unie #italic a#! smrt“. Bylo to spravedlivé? Snad. Bylo to zákonné? Dá se říci. Bylo to rozumné? Rozhodně ne.\n\nPři jeho štěstí se teď na jeho malý kout světa snese společný hněv [SCOPE.sCountry('hungary_country_scope').GetCapital.GetCityHubName] i Vídně a on tomu nemohl nijak zabránit."
 hungary_events.5.a: "Sedmihradsko je nezcizitelnou součástí maďarské koruny."
 hungary_events.5.b: "Prozatím povolte zachování místních výsad."
 hungary_events.5.c: "Dobrá. Přijměte rozhodnutí sněmu."
 hungary_events.5.e: "Překročili meze! Požadujte okamžité vyklizení Sedmihradska."
 modifier_allowed_transylvanian_autonomy: "Povolená sedmihradská autonomie"
 modifier_not_allowed_transylvanian_autonomy: "Zakázaná sedmihradská autonomie"
 transylvanian_diet_abolished: "Tímto aktem se #bold sedmihradský sněm#! fakticky #bold ruší#!"
 transylvanian_diet_retained: "Tímto aktem je prozatím #bold zachován#! samostatný #bold sedmihradský sněm#!"
 hungary_likely_lead_to_war_tt: "Takový požadavek vyvolá v zemi [SCOPE.sCountry('hungary_country_scope').GetName] pobouření a jeho vznesení pravděpodobně povede k #n válce#!"
 modifier_transylvanian_bands: "Loajální hraničářské pluky"
 hungarian_revolution: "Maďarská revoluce"
 je_hungarian_revolution_backed_down_fail: "#bold $AUS$#! nás donutila ustoupit od našich reforem"
 modifier_revolutionary_fervor: "Revoluční zápal"
 hungary_events.6.t: "Rakouské ultimátum"
 hungary_events.6.d: "Vláda v [SCOPE.sCountry('austria_country_scope').GetCapital.GetCityHubName] pod hrozbou vojenského zásahu nezákonně a jednostranně zrušila naše nedávné reformy a nyní požaduje, abychom se opět podřídili."
 hungary_events.6.f: "Poté, co rakouský vyslanec nahlas přečetl depeši z [SCOPE.sCountry('austria_country_scope').GetCapital.GetCityHubName], srazil podpatky k sobě a uklonil se shromážděným maďarským hodnostářům.\n\nPožadavky byly jasné: čas vyjednávání pominul. Buď maďarský sněm reformu odvolá, nebo ji za něj odvolá rakouská armáda."
 hungary_events.6.a: "Tohle je poslední kapka. Maďaři, do zbraně!"
 hungary_events.6.b: "Nemáme jinou možnost než přijmout."
 austrian_ultimatium_tt: "Přijetí jejich ultimáta zruší všechny naše reformy a #bold $je_hungarian_revolution$#! [concept_journal_entry] #n selže#!"
 modifier_humiliated_by_austria: "Ponížení Rakouskem"
 hungary_events.7.t: "Na nohy, Maďaře"
 hungary_events.7.d: "Polnice zní napříč [ROOT.GetCountry.GetAdjective] říší a tisíce dobrovolníků proudí do nově zřízených náborových kanceláří. Jak se plukovní seznamy plní, nově povýšení generálové se mezi sebou přou, jak je nejlépe využít."
 hungary_events.7.f: "Kde naše hroby budou ležet,\ntam vnuci naši pokleknou\na s požehnanou modlitbou\nodříkají naše svatá jména.\nPři Bohu Maďarů\npřísaháme,\npřísaháme, že otroky už\nnebudeme!\n\n— Sándor Petőfi, #italic Nemzeti dal#!"
 hungary_events.7.a: "Bojujeme za vlast a tam prolijeme svou krev."
 hungary_events.7.b: "Kdo se odváží, vítězí. Musíme přenést boj k nepříteli."
 every_state_with_enlistment_decree_get_modifier: "Každý [ROOT.GetCountry.GetAdjective] [concept_state] s #b aktivním#! [concept_decree] [GetDecreeType('decree_enlistment_efforts').GetName] získá #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_mustering_the_honved_tt $modifier_mustering_the_honved$#! na #v [GetPlayer.MakeScope.ScriptValue('display_normal_modifier_time')]#! let"
 modifier_mustering_the_honved_tt: "[GetStaticModifier('modifier_mustering_the_honved').GetName|v]\n[GetStaticModifier('modifier_mustering_the_honved').GetDesc]"
 modifier_mustering_the_honved: "Shromažďování honvédů"
 modifier_defenders_of_the_homeland: "Obránci vlasti"
 modifier_honved_mobilization_programme: "Honvédský rekviziční program"
 modifier_autumn_campaign: "Vpřed, honvédi!"
 hungary_events.8.t: "Sedmihradské povstání"
 hungary_events.8.d: "Hluboce nespokojeny se sjednocením Sedmihradska a země [SCOPE.sCountry('hungary_country_scope').GetName] se v Blaji shromáždily tisíce [GetCulture('romanian').GetName] významných osobností i prostých lidí a vyhlásily svůj úmysl pozvednout zbraně proti [SCOPE.sCountry('hungary_country_scope').GetCapital.GetCityHubName]."
 hungary_events.8.f: "Mihai vytáhl z kabátu malý polní dalekohled a zaostřil čočku. Ze svého stanoviště na Viničním vrchu viděl velký zástup mužů, který se shromáždil ve městě i kolem něj. Přinejmenším tisíce, a pokud jejich oděv něco naznačoval, pocházeli z celého Sedmihradska i odjinud.\n\nZvuk praskající větve přerušil jeho pozorování. Kroky? Ohlédl se přes rameno, ale neviděl žádného z #italic moți#! hromotluků, kteří mu toho dne už působili potíže. Ti bastardi by nedokázali přepadnout ani chromou svini, pomyslel si, právě když se kyj snesl dolů a rozrazil mu lebku."
 hungary_events.8.a: "Proklatí zrádci. Vyšlete armádu."
 hungary_events.8.b: "Libertate sau Moarte!"
 hungary_events.8.c: "Znovu potvrďte Sedmihradsko jako autonomní korunní zemi."
 hungary_events.8.e: "Nenecháme si vnutit vůli bandou povýšených nevolníků."
 modifier_auraria_gemina_legion: "Legie Auraria Gemina"
 transylvanian_massacres_tt: "Jak se #bold řád rozpadá#!, zprávy o #n masakrech#! páchaných potulnými bandami rolníků a vojáků se šíří po celém #bold Sedmihradsku#!"
 hungary_events.9.t: "Maďarské jaro"
 hungary_events.9.d: "Šokujícím krokem uvedl pokrokáři ovládaný sněm země [SCOPE.sCountry('hungary_country_scope').GetName] v platnost řadu zákonů, jejichž radikální povaha ohrožuje naši vládu nad touto zemí."
 hungary_events.9.f: "Podrobnosti zpráv přicházejících z [SCOPE.sCountry('hungary_country_scope').GetCapital.GetCityHubName] se lišily stejně jako reakce těch, kdo je přijímali. Velký skok k liberální budoucnosti, nebo klopýtnutí do chaosu a anarchie? Akt pobuřování, nebo inspirace pro zbytek říše? Vzdorovité prohlášení, nebo zbabělá rána do zad?\n\nSám to nevěděl, ale obával se, že reakce Hofburgu bude všechno, jen ne srdečná."
 hungary_events.9.a: "Máme naléhavější záležitosti, o které se musíme starat."
 hungary_events.9.b: "Prohlašte zákony za nezákonné a požadujte jejich okamžité zrušení."
 hungary_events.11.t: "Maďarská otázka"
 hungary_events.11.d: "S nástupem [ROOT.GetCountry.GetRuler.GetFullName] jako [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetName] je zpochybňován domněle laxní postoj [ROOT.GetCountry.GetRuler.GetHerHis] předchůdce vůči zemi [SCOPE.sCountry('hungary_country_scope').GetName]. Mnozí nyní naléhají na nového [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], aby zrušil nedávné zákony přijaté maďarským sněmem. "
 hungary_events.11.f: "Je souhlas udělený pod nátlakem skutečně souhlasem?\nJe panovník vázán pošetilými přísahami svého předchůdce?\nJe zavázán zákony přijatými bez řádné císařské autority?\n\nV očích [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] to ve skutečnosti žádná opravdová dilemata nebyla. Jedinou otázkou bylo: jak daleko je ochoten zajít, aby prosadil svou vizi?"
 hungary_events.11.a: "Zrušte zákony a formálně zrušte maďarský sněm."
 hungary_events.11.b: "Nerozkolísávejme loď."
 hungary_events.12.t: "Země zemí"
 hungary_events.12.d: "[ROOT.GetCountry.GetAdjective] revoluce zaznamenala výrazný úspěch a dopad jejích hospodářských i politických reforem je pociťován po celé zemi."
 hungary_events.12.f: "Zde svobody krvavý prapor vlál\nnad maďarskou hlavou;\na zde v dávných bojích padli\nnaši nejlepší a nejušlechtilejší mrtví.\n\nNavzdory dlouhým pohromám\na staletím svárů\nnaše síla, byť oslabená, není vyčerpána;\nnaše země stále žije.\n\n— #italic Szózat#!, Mihály Vörösmarty"
 hungary_events.12.a: "Ať žije maďarská svoboda!"
 hungary_events.12.b: "Ať žije vlast!"
 increased_chance_of_liberal_leaders_tt: "Všechny [Concept('concept_interest_group', '$concept_interest_groups$')] budou mít vyšší šanci na vznik liberálních a radikálních [Concept('concept_leader', '$concept_leaders$')]."
 modifier_efficient_magyarization: "Komplexní maďarizace"
 modifier_hungarian_radicalism: "Vlast svobody"
 modifier_a_liberal_century: "Revoluce ospravedlněna"
 hungary_events.13.t: "Koruna svatého Štěpána"
 hungary_events.13.d: "Když je [ROOT.GetCountry.GetAdjective] nezávislost konečně zajištěna a období prozatímní vlády pod vedením [ROOT.GetCountry.GetRuler.GetFullName] se chýlí ke konci, nastal čas, aby sněm jednou provždy vyřešil postavení monarchie."
 hungary_events.13.f: "Co bude s uvolněným trůnem svatého Štěpána? Debata zuřila celé odpoledne a rada nebyla o moc blíže rozhodnutí. Pragmatiečtí monarchisté, zapálení republikáni a všemožní frankofilové, anglofilové i rusofilové si už celé dny šli po krku - napadali se v sžíravých novinových úvodnících, hlasitých výměnách názorů a alespoň v jednom případě i osobně.\n\nJak však pragmatické úvahy nahlodávají přesvědčení, kdysi pevné dělicí linie se rozmazávají a vznikají nová spojenectví. A na konci závěrečného jednání bylo rozhodnuto."
 hungary_events.13.a: "Už žádní Habsburkové. Maďarsko bude [GetLawType('law_presidential_republic').GetName]."
 hungary_events.13.b: "Na trůn usedne maďarský šlechtic."
 hungary_events.13.c: "Pozvěte [SCOPE.sCountry('russia_scope').GetAdjective] [SCOPE.sCountry('russia_scope').GetRuler.GetLastNameNoFormatting] do [ROOT.GetCountry.GetCapital.GetCityHubName]."
 hungary_events.13.e: "Dobré vztahy se zemí [SCOPE.sCountry('britain_scope').GetName] jsou prvořadé."
 hungary_events.13.g: "[SCOPE.sCountry('france_scope').GetAdjective] princátko usedne na trůn."
