 spooky_halloween_events.6.t: "Ecce Monstrum"
 spooky_halloween_events.6.d: "Vyděšen rostoucí přítomností [GetCulture('promethean').GetName] ve státě [SCOPE.sState('relevant_state_scope').GetName], rozzuřený dav běsnil ulicemi města [SCOPE.sState('relevant_state_scope').GetCityHubName]. [SCOPE.sCompany('frankenstein_company_scope').GetName] odmítla situaci komentovat."
 spooky_halloween_events.6.f: "Dav obklopil stvoření poblíž staré fontány; kruh pochodní a vidlí vytvořil hrozivou zeď a uvěznil vysokou bledou postavu uprostřed.\n\n„Zabijte to! Srazte tu nestvůru k zemi!“\n\n„Nestvůru? Jak se opovažujete nazývat mě nestvůrou vy, kdo bez důvodu a výčitek lovíte mé druhy? Jakou újmu jsme vám kdy bez vyprovokování způsobili? Pozvedněte proti mně ruku a vězte, že vás srazím k zemi - to ze mě však nedělá o nic většího netvora než z člověka, který se brání zločincovu zlovolnému útoku.“"
 spooky_halloween_events.6.a: "Lůza dělá to, čím lůza je."
 spooky_halloween_events.6.b: "[SCOPE.sCharacter('frankenstein_executive_scope').GetFullName] a [SCOPE.sCharacter('frankenstein_executive_scope').GetHerHis] společnost musí nést odpovědnost."
