 austrian_neo_absolutism_constitutional_pressure_progress_bar_desc: "[concept_austrian_constitutional_pressure]: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 austrian_neo_absolutism_abolish_crown_land_autonomy_button: "Marginalizovat zemské sněmy korunních zemí"
 austrian_neo_absolutism_abolish_crown_land_autonomy_button_desc: "Tradičně autonomní #italic Landtage#! představují jednu z největších překážek našeho úsilí prosadit přímou vládu z [ROOT.GetCountry.GetCapital.GetCityHubName]. Musíme je zbavit jejich zákonodárných pravomocí a omezit je na pouhé správní orgány pod přímým císařským dohledem."
 modifier_bureaucratisation_of_the_landtage: "Byrokratizace zemských sněmů"
 austrian_neo_absolutism_abolish_feudal_obligations_button: "Zrušit feudální povinnosti"
 austrian_neo_absolutism_abolish_feudal_obligations_button_desc: "Patent o nevolnictví z roku 1781 osvobodil rakouské rolníky od připoutání k půdě, přesto však zůstávají povinni vykonávat #italic robotu#!, platit feudální dávky a podřizovat se patrimoniální jurisdikci.\n\nOdstranění těchto zastaralých povinností by režimu získalo přízeň reformátorů, ale zároveň by mohlo vyvolat hněv pozemkové elity, která by tímto návrhem přišla o bohatství i vliv."
 modifier_empowered_smallholders: "Posílení velkostatkáři"
 modifier_bureaucratisation_of_nobles: "Zvýšená byrokratizace"
 austrian_neo_absolutism_papal_concordat_button: "Přijmout papežský konkordát"
 austrian_neo_absolutism_papal_concordat_button_desc: "Josefinisté a liberálové svým bezohledným prosazováním reforem podkopali samotné základy naší velké říše: naši neochvějnou víru a věrnost stolci svatého Petra.\n\nMusíme napravit škody, které způsobili, a dosáhnout dohody s církví, jež zajistí, že její přítomnost bude patrná na všech úrovních společnosti - od školních lavic až po svátost manželství."
