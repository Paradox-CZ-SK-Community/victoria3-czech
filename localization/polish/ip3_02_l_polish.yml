 austria_events.1.t: "Vláda brka a bajonetu"
 austria_events.1.d: "Po dokončení poslední neoabsolutistické reformy je [ROOT.GetCountry.GetName] připravena vstoupit do nového zlatého věku. Její národy se odvracejí od frakčního nacionalismu a místo toho se semknou pod praporem osvícené a uvážlivé vlády."
 austria_events.1.f: "„Blaho jednotlivce je založeno na blahu celku; blaho celku však spočívá také na blahu jednotlivců.“\n\n— Joseph von Sonnenfels"
 austria_events.1.a: "Sláva! Sláva [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Ať žije [ROOT.GetCountry.GetRuler.GetHerHis] osvícená vláda!"
 austria_events.1.b: "[ROOT.GetCountry.GetNameNoFlag] přetrvává díky moudrosti a povinnosti svých oddaných byrokratů."
 modifier_everymans_emperor: "Císař všech poddaných"
 modifier_everymans_ruler: "Vládce všech poddaných"
 modifier_volksbeamter: "Lidový úředník"
 modifier_viribus_unitis: "Viribus Unitis"
 austria_events.2.t: "Žádná ústava, žádné peníze"
 austria_events.2.d: "Trpělivost [ROOT.GetCountry.GetAdjective] establishmentu došla. Frustrován domnělým špatným řízením neoabsolutistické frakce požaduje okamžité udělení ústavy."
 austria_events.2.f: "Ostré klapání bot se rozléhalo chodbami Hofburgu, kde ministři a byrokraté postupovali se stále větší naléhavostí. Dveře se v rychlém sledu otevíraly a zavíraly a tlumené rozhovory přerůstaly ve vyhrocené spory. Nepořádek ve vnějším správním okruhu byl už dlouho běžným rysem rakouské správy. Ale ve vnitřním? To bylo mimo normu. Mimo normu - a nebezpečné."
 austria_events.2.a: "Ustupte jejich požadavkům. Stabilita říše je na prvním místě."
 austria_events.2.b: "Oni požadují? Pohrozte jim obviněním ze zrady."
 modifier_unrest_in_the_ministry_of_finance: "Nepokoje na ministerstvu financí"
 modifier_disapproving_of_unqualified_autocracy: "Odpor vůči neomezené autokracii"
 modifier_autocracy_discredited: "Neoabsolutismus zdiskreditován"
 austria_events.3.t: "Krize na Dunaji"
 austria_events.3.d: "Nezávislost země [SCOPE.sCountry('hungary_scope').GetNameNoFlag] rozpoutala po celé naší zemi vlnu etnických nepokojů. Nacionalisté po celé zemi [ROOT.GetCountry.GetName], inspirovaní vývojem v [SCOPE.sCountry('hungary_scope').GetCapital.GetCityHubName], povstali proti [ROOT.GetCountry.GetCapital.GetCityHubName]."
 austria_events.3.f: "Ze čtyř posádek pod jeho velením si pouze jedna zachovala čest a zůstala plně loajální. Zbytek se buď rozprchl jako zbabělci, nebo - což bylo horší - se stal zrádci.\n\nVzbouřenci. Psi. Kdyby měl příležitost, nechal by je všechny pověsit.\n\n„Herr Feldmarschall! Vaše rozkazy?“\n\nTa slova vytrhla generála z myšlenek. Prudce vydechl. „Tato povstání nejsou ničím novým. Říše přežila větší hrozby. Zřiďte perimetr a přiveďte mi kurýra, neprodleně si vyžádám rozkazy z [ROOT.GetCountry.GetCapital.GetCityHubName].“"
 austria_events.3.a: "Periferie je ztracena, stáhněte se do Erblande."
 austria_events.3.b: "Ustupte z Maďarska, ale ani o píď dál."
 austria_danube_croat_revolt: "Naši [SCOPE.sCulture('croat_scope').GetName] poddaní se bouří a vyhánějí naše správce ze svých zemí."
 austria_danube_serb_revolt: "Naši [SCOPE.sCulture('serb_scope').GetName] poddaní se bouří a vyhánějí naše správce ze svých zemí."
 austria_danube_polish_revolt: "Naši [SCOPE.sCulture('polish_scope').GetName] poddaní se bouří a vyhánějí naše správce ze svých zemí."
 austria_danube_italian_revolt: "Naši [SCOPE.sCulture('north_italian_scope').GetName] poddaní se bouří a vyhánějí naše správce ze svých zemí."
 modifier_broken_eagle: "Zlomený orel"
 modifier_overstretched_administration: "Přetížená správa"
 austria_events.4.t: "Ausgleich"
 austria_events.4.d: "Bylo dosaženo kompromisu. Podle dohody má být [ROOT.GetCountry.GetName] přetvořena na Duální monarchii [ROOT.GetCountry.GetNameNoFlag]-[SCOPE.sCountry('hungary_scope').GetNameNoFlag], rozdělenou na Zalitavsko spravované z [SCOPE.sCountry('hungary_scope').GetCapital.GetCityHubName] a Předlitavsko spravované z [ROOT.GetCountry.GetCapital.GetCityHubName]."
 austria_events.4.f: "Hrabě stál mezi sobě rovnými a sledoval, jak [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] v plných insigniích jede vpřed k umělému korunovačnímu pahorku, jehož hlína pocházela ze všech koutů jeho rodné maďarské země. Přišel z povinnosti, ne z oddanosti, ale když [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] dosáhl vrcholu, cítil tíhu okamžiku, kterou nečekal.\n\nKdyž [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] pozvedl [ROOT.GetCountry.GetRuler.GetHerHis] meč, sekl jím jednou do každé světové strany a hlasitě přísahal, že bude chránit království i všechny jeho poddané, cosi se v něm pohnulo. Nebyla to loajalita, pomyslel si. Snad úcta."
 austria_events.4.a: "Ustanovit Zalitavsko."
 austria_events.4.b: "Ustanovit Zalitavsko v plné unii s Trojí monarchií."
 austria_events.4.c: "Ponechat Trojí monarchii pod přímou [ROOT.GetCountry.GetAdjective] kontrolou."
 transleithania_historical_tt: "#bold Zalitavsko#! je definováno jako státní unie Maďarského království a Trojího království [SCOPE.sStateRegion('croatia_state_scope').GetName], [SCOPE.sStateRegion('slavonia_state_scope').GetName] a [SCOPE.sStateRegion('dalmatia_state_scope').GetName], avšak [SCOPE.sStateRegion('dalmatia_state_scope').GetName] zůstává pod přímou [ROOT.GetCountry.GetAdjective] kontrolou."
 transleithania_full_triune_tt: "#bold Zalitavsko#! je definováno jako státní unie Maďarského království a Trojího království [SCOPE.sStateRegion('croatia_state_scope').GetName], [SCOPE.sStateRegion('slavonia_state_scope').GetName] a [SCOPE.sStateRegion('dalmatia_state_scope').GetName] v plném rozsahu."
 transleithania_only_hungary_tt: "#bold Zalitavsko#! je definováno pouze jako země Maďarského království."
 modifier_partial_hungarian_triune_union: "Částečná maďarsko-trojjediná unie"
 modifier_hungarian_triune_union: "Maďarsko-trojjediná unie"
 modifier_croatian_debacle: "Maďarsko-chorvatské vazby přerušeny"
 austria_events.5.t: "Relikty zašlého věku"
 austria_events.5.d: "S tím, jak vláda opustila neoabsolutistický projekt, jsou jeho někdejší podporovatelé nyní v očích národa zdiskreditováni."
 austria_events.5.f: "Zkušenou rukou ministr připojil k dokumentu svůj podpis. Naposledy? Ta myšlenka v něm zůstala. Povzdechl si. Krizí bylo příliš mnoho, hniloba příliš hluboce zakořeněná. Kdyby jim bylo dopřáno ještě deset let, možná dvě desetiletí, pak by se všem ukázala brilantnost jejich díla.\n\nKdyž dokument podával svému tajemníkovi, jeho prsty zaváhaly a stisk zesílil. Na okamžik se jeho ruka vzpírala, neochotná pustit papír.\n\nPak jej nechal vyklouznout."
 austria_events.5.a: "Jejich myšlenky možná byly mylné, ale jejich metody měly své přednosti."
 austria_events.5.b: "Ponechte je ve funkcích v bezpečnostních službách."
 austria_events.5.c: "Veřejně se od nich distancujte."
