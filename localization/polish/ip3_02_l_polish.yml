 grunderzeit.1.t: "Gründerkrach"
 grunderzeit.1.d: "Roky optimismu a finančního růstu se náhle zastavily a na německých burzách jsou hlášena krvavě rudá čísla, zatímco banky a spekulativní společnosti se hroutí jako domino."
 grunderzeit.1.f: "#bold Útok na banku v [ROOT.GetCountry.GetCapital.GetCityHubName]#!\nOznámení o likvidaci řady významných společností spustilo lavinu, která smetla nejen drobné investory, ale i známé finančníky. Celý den se kurýři s telegramy zběsile prodírali davy a obchodníci byli spatřeni, jak pálí své bezcenné akciové certifikáty."
 grunderzeit.1.a: "Na vině jsou spekulanti a bezuzdný ekonomický liberalismus."
 grunderzeit.1.b: "Tohle je dílo predátorských agentů v našem středu."
