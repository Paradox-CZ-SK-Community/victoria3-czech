 country_frankenstein_company_bool_desc: "Z #b ingolstadtských elektrotechnických továren#! přicházejí podivné zvěsti. Velké hučící stroje - jejichž účel není nikdo ochoten vysvětlit - pracují na plný výkon dlouho do noci."
