 je_grunderzeit: "Gründerzeit"
 je_grunderzeit_reason: "Investiční #bold horečka#! zachvátila #bold německé#! země, zatímco kapitál s horečnou intenzitou proudí do železnic, továren a bank - poháněn bezmezným optimismem, spekulativními ambicemi a příslibem #bold nového průmyslového věku#!. Spekulanti s nadšením vsázejí jmění na cíle, které jsou den ode dne fantastičtější. Jak dlouho může tato atmosféra euforie vydržet?\n\nNěmecký [Concept('concept_gdp', '$concept_gdp_short$')], poslední čtvrtletní výsledek: @gdp!#variable [GetGlobalVariable('grunderzeit_combined_gdp_global_var_baseline').GetValue|K]#!\nNěmecký [Concept('concept_gdp', '$concept_gdp_short$')], současný: @gdp![JournalEntry.GetCustom('get_grunderzeit_gdp')]\nNěmecký [Concept('concept_gdp', '$concept_gdp_short$')], čtvrtletní cíl: @gdp!#variable [GetGlobalVariable('grunderzeit_combined_gdp_global_var_goal').GetValue|K]#!\n\n#bold Tempo zakladatelských let#!\n[concept_journal_entry] #bold $je_grunderzeit$#! je organizován do #bold finančních čtvrtletí#!. Každé #v 3#! měsíce bude muset souhrnný [Concept('concept_gdp', '$concept_gdp_short$')] všech #bold německých#! [Concept('concept_country', '$concept_countries$')] v #bold Evropě#! vzrůst alespoň o #v 2#! procenta. Pokud se to nepodaří, #n vyčerpá#! to #bold ukazatel postupu#! o #v 1#!, zatímco úspěch jej naopak #g zvýší#! o #v 1#!. Dosažení hodnoty #v 0#! na ukazateli postupu povede k #n finančnímu krachu#!."
 je_grunderzeit_fail_tt: "#bold Ukazatel postupu#! dosáhl #v 0#!"
 grunderzeit_possible_tt: "#v 75%#! nebo více všech #bold německých#! [Concept('concept_country', '$concept_countries$')] v #bold Evropě#! vyzkoumalo technologii [GetTechnology('mutual_funds').GetName] a má alespoň jednu úroveň budovy [GetBuildingType('building_railway').GetName] (aktuálně [GetGlobalVariable('grunderzeit_countries_percent').GetValue|v%0])"
