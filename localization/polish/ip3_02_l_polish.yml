 bavarocracy_events.1.t: "Civilizátor-král Helénů"
 bavarocracy_events.1.d: "Poté, co [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] úspěšně provedl zemi jejími bouřlivými ranými lety, se nyní prosadil jako schopný státník v čele stabilní vlády."
 bavarocracy_events.1.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] upíjel kávu a procházel svou ranní korespondenci. Zprávy o lupičích u cest, korupčních skandálech a frakčních sporech jako obvykle. Mezi obvyklými ponurými hlášeními se však objevovaly i náznaky změny. Dopady nedávných změn v policejní politice, zakládání intelektuálních institucí a první známky moderního byrokratického aparátu. Zbývalo toho ještě mnoho vykonat, ale rok od roku shledával [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] svou ranní práci o něco příjemnější."
