 je_bavarocracy: "Bavarokracie"
 je_bavarocracy_reason: "Od svého vzniku v roce 1832 je rodící se [ROOT.GetCountry.GetAdjective] království - první skutečně nezávislý řecký stát od dob Konstantina XI. - pod palcem [SCOPE.sCharacter('king_otto_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('king_otto_scope').GetFirstName] a jeho bavorských regentů.\n\nPokud chce mladý král prokázat, že je důstojným vládcem Helénů, bude muset podniknout odvážné kroky ke zvládnutí [Concept('concept_bavarocratic_ire', '$concept_bavarocratic_ire_short$')] svých nových poddaných."
