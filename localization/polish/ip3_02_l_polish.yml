l_polish:
 je_matter_of_hungary: "Maďarská otázka"
 je_matter_of_hungary_reason: "Od chvíle, kdy Habsburkové před staletími poprvé získali trůn svatého Štěpána, se jejich nezávisle smýšlející maďarští poddaní ukázali být obtížně ovladatelní.\n\nTváří v tvář stále bojovnějším požadavkům na [GetCulture('hungarian').GetName] autonomii se správa v [ROOT.GetCountry.GetCapital.GetCityHubName] musí rozhodnout, zda požadavkům maďarských nacionalistů ustoupí, nebo je zkrotí - v případě nutnosti silou.\n\n#bold Maďarská revoluce#!\nAktivace #Bold $je_springtime_of_the_peoples$#! [concept_journal_entry] pravděpodobně posílí radikální frakce v #b $HUN_ADJ$ sněmu#!, což může vést ke konfliktu s vládou v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 modifier_young_hungary_movement: "Hnutí Mladé Maďarsko"
 matter_of_hungary_hungarian_homelands_tt: "[SCOPE.sCulture('hungarian_scope').GetName] [Concept('concept_homeland','$concept_homelands$')] ve státech [GetStateRegion('STATE_CENTRAL_HUNGARY').GetName] a [GetStateRegion('STATE_TRANSDANUBIA').GetName] jsou vlastněny zemí [ROOT.GetCountry.GetName] nebo jejími [Concept('concept_subject','$concept_subjects$')]"
 matter_of_hungary_ausgleich_tt: "#b $HUN$#! je ustanovena jako [concept_subject] v [concept_personal_union] se zemí [ROOT.GetCountry.GetName]"
 je_matter_of_hungary_neoabsolutist_fail_tt: "#bold Selhali#! jsme v [concept_journal_entry] #bold $je_austrian_neo_absolutism$#!"
 je_matter_of_hungary_completion_centralization_tt: "Dokončili jsme [concept_journal_entry] #bold $je_austrian_neo_absolutism$#! a zbavili #bold $HUN$#! jejích tradičních práv a výsad"
 je_matter_of_hungary_completion_autonomy_tt: "Ustanovili jsme #bold Duální monarchii#!"
 je_matter_of_hungary_fail_hungary_is_free: "#bold $HUN$#! se vymanila z [ROOT.GetCountry.GetAdjective] kontroly"
 je_matter_of_hungary_fail_not_at_war_with_hungary: "#bold $HUN$#! #bold neodporuje#! zemi [ROOT.GetCountry.GetName] v [concept_diplomatic_play]"
 je_matter_of_hungary_on_fail_lose_control: "Veškerá zbývající území v Maďarsku pod kontrolou země [ROOT.GetCountry.GetName] nebo jejích [Concept('concept_subject','$concept_subjects$')] #bold se odtrhnou#!. V našich neněmeckých zemích povstanou nacionalističtí rebelové."
 hungarian_above_80_acceptance_for_a_while_tt: "Průměrné [concept_acceptance] [GetCulture('hungarian').GetName] [Concept('concept_pop', '$concept_pops$')] v zemi [ROOT.GetCountry.GetNameNoFlag] bylo vyšší nebo rovno #v 80#! po dobu #b 60 měsíců#! (aktuálně [ROOT.GetCountry.MakeScope.Var('hungarian_acceptance_var').GetValue|v0])" # Actually 70, not 80
 hungarian_movements_pacified_tt: "Žádné [GetCulture('hungarian').GetName] #v $movement_cultural_minority$#! nemá [Concept('concept_activism','$concept_activism_short$')] ve výši $RADICALISM_AGITATING$ (#v 25%#!) nebo vyšší"
 je_austrian_neo_absolutism: "Autokracie ve věku svobody"
 je_austrian_neo_absolutism_reason: "#italic „Pilíře Bachova systému spočívají na jeho čtyřech armádách: stálé armádě vojáků, sedící armádě úředníků, klečící armádě kněží a plížící se armádě donašečů.“ #!\n\nHrozba revoluce zdola si vynutila, aby [ROOT.GetCountry.GetCapital.GetCityHubName] provedlo svou vlastní revoluci shora. Zřízením centralizovaného, racionálního a účinného státního aparátu - obsazeného loajálními a schopnými byrokraty - bude země modernizována tak, aby obstála před výzvami dnešní doby.\n\n[concept_austrian_constitutional_pressure]:\nPokud odpor vůči rakouskému neoabsolutistickému projektu příliš zesílí, [ROOT.GetCountry.GetCapital.GetCityHubName] bude nuceno ustoupit požadavkům na reformu a udělit ústavu omezující pravomoci státu."
