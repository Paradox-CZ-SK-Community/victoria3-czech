 grunderzeit.2.t: "Třicet let pokroku"
 grunderzeit.2.d: "Po desetiletích hospodářské prosperity nyní intenzivní úsilí a aktivita, které je definovaly, poněkud polevily. Tato léta se zapíší do [ROOT.GetCountry.GetAdjective] dějin jako jedny z nejslavnějších."
 grunderzeit.2.f: "„A oni tomu říkali bublina, pche! Bublina!? Jen #italic hlupák#! by do něčeho takového investoval dědictví své manželky, a něco ti povím, #italic liebchen#!, já žádný hlupák nejsem.“"
 grunderzeit.2.a: "Třikrát sláva nezdolnému podnikatelskému duchu člověka!"
 grunderzeit.2.b: "Kéž jsou tato desetiletí jen první z mnoha."
 modifier_grunderyears_success: "Duch slavných třiceti let"
 modifier_grunderyears_success_2: "Lesk slavných třiceti let"
 modifier_grunderyears_success_half_dummy: "$modifier_grunderyears_success$"
 modifier_grunderyears_success_2_half_dummy: "$modifier_grunderyears_success_2$"
 grunderzeit.3.t: "Věk podnikatelů"
 grunderzeit.3.d: "Německé země, povzbuzené inovacemi ve finančním právu a rozšířením železnice, kypí aktivitou a nové společnosti i podnikatelské záměry vyrůstají jako houby po dešti."
 grunderzeit.3.f: "Předák znovu práskl bičem a hnal vyčerpané koňské spřežení vpřed. Dnes udělali slušný pokrok - většina písku už byla ze staveniště odvezena. Ale slušné nestačí. A ani dobré sotva postačí.\n\nBič znovu práskl.\n\nPředák pocítil záchvěv viny vůči ubohým tvorům, ale rychle tu myšlenku zahnal. Milosrdenství toto místo v novou továrnu nepromění. Odhodlání ano."
 grunderzeit.3.a: "Nakupovat! Investovat! Rozšiřovat!"
 grunderzeit.3.b: "Nenechme se příliš unést."
