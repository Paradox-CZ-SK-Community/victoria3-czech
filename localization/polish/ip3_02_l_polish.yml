 bavarocracy_fail_explanation_tt: "Konec bavarokracie nám umožní dosadit na trůn #b $DEN_ADJ$#! prince přijatelného pro [Concept('concept_great_power', '$concept_great_powers$')], nebo založit #b Druhou helénskou republiku#!\n\nPokud nám #b $FRA$#!, #b $GBR$#! nebo #b $RUS$#! dluží [concept_obligation], budou ignorovat ustanovení #b Londýnské konference z roku 1832#! a umožní nám zvolit jednoho z jejich princů králem Helénů.\n\nMožný cizí král přijde s následujícími [Concept('concept_ideology', '$concept_ideologies$')]:\n• $DEN_ADJ$: [GetIdeology('ideology_reformer').GetName]\n• $GBR_ADJ$: [GetIdeology('ideology_market_liberal').GetName]\n• $RUS_ADJ$: [GetIdeology('ideology_royalist').GetName]\n• $FRA_ADJ$ orleánista: [GetIdeology('ideology_market_liberal').GetName]\n• $FRA_ADJ$ legitimista: [GetIdeology('ideology_traditionalist').GetName]\n• $FRA_ADJ$ bonapartista: [GetIdeology('ideology_jingoist_leader').GetName]"
 spooky_halloween_events.4.t: "Prométheovské vize"
 spooky_halloween_events.4.d: "Mladý ženevský student jménem [SCOPE.sCharacter('frankenstein_scope').GetFullName] se obrátil na vládu s žádostí o skromné stipendium a pracovní prostor. Na oplátku sebevědomě tvrdí, že prolomí samotnou hranici mezi životem a smrtí."
 spooky_halloween_events.4.f: "„Pokud lze oživit neživou hmotu, snad by bylo možné obnovit život tam, kde si smrt vybrala svou daň. Kolik z vás ztratilo někoho drahého kvůli nemoci nebo kruté ruce člověka? Co kdyby to šlo napravit? Nebo co kdyby jeho místo mohlo zaujmout něco nového? Nový druh, který by nás uctíval jako stvořitele a pána.“"
 spooky_halloween_events.4.a: "Nanejvýš zajímavé. Informujte ho, že má naši podporu."
 spooky_halloween_events.4.b: "Pohrdněte tímto nekřesťanským šarlatánem a pošlete ho do ústavu."
 spooky_halloween_events.4.tt_1: "[SCOPE.sCharacter('frankenstein_scope').GetFullName] je zavřen a už o něm nikdy neuslyšíme."
 spooky_halloween_events.4.tt_2: "[SCOPE.sCharacter('frankenstein_scope').GetFullName] prchá z místnosti dřív, než se k němu dostanou stráže."
 spooky_halloween_events.4.tt_3: "Plody experimentů pana [SCOPE.sCharacter('frankenstein_scope').GetLastName] nám budou časem odhaleny."
 modifier_ungodly_experiments: "Bezbožné experimenty"
 modifier_experiment_expenses: "Financování nekonvenčního výzkumu"
 spooky_halloween_events.5.t: "Bůh a stroj"
 spooky_halloween_events.5.d: "Výzkum [SCOPE.sCharacter('frankenstein_scope').GetFullName] přinesl ovoce. Se zjevným neklidem před shromážděnými hodnostáři vykládá své metody a tvrdí, že je připraven rozšířit svůj provoz. Jako důkaz předkládá svůj první výtvor coby ověření principu."
 spooky_halloween_events.5.f: "Do místnosti se vpotácí mohutné stvoření; jeho pohyby jsou trhavé a křečovité, jako by se teprve učilo používat své končetiny, přesto má vodnaté, zvídavé oči, téměř jako dítě.\n\n„Ve jménu Božím! Co #italic je#! ta věc zač?“\n\n„Toto, pánové, je budoucnost. #italic Homo novus#! v tom nejdoslovnějším významu toho sousloví.“"
 spooky_halloween_events.5.a: "Jsem si jist, že pro tvora takového... kalibru najdeme využití."
 spooky_halloween_events.5.b: "Dobrá, ale dejte tomu ubožákovi družku."
 spooky_halloween_events.5.c: "Tohle zašlo příliš daleko. Okamžitě to celé zastavte!"
 spooky_halloween_events.5.tt_1: "Umožní založení #b $company_ingolstadt_electrical_company$#! jako [concept_company]"
 modifier_frankenstein_1: "Nadlidské schopnosti"
