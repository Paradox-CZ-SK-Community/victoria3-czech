 bavarocracy_events.2.t: "Pád krále Oty"
 bavarocracy_events.2.d: "Lidové povstání v [ROOT.GetCountry.GetCapital.GetCityHubName], znechucené bavorskou klikou, sesadilo [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], který byl naposledy spatřen, jak nastupuje na cizí škuner mířící na sever. Když je starý [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] pryč, prozatímní vláda vyzvala lid, aby hlasoval o jeho nástupci."
 bavarocracy_events.2.f: "„Žádné tištěné hlasovací lístky? To má být nějaký vtip?“\n\n„Ne, pane. Prostě napíšete jméno muže, kterého byste chtěl na trůně, a do hodiny mi jej odevzdáte.“"
