 je_bavarocracy_convert_button_desc: "Přestože je [ROOT.GetCountry.GetName] pevně [GetReligion('orthodox').GetName] zemí, [SCOPE.sCharacter('king_otto_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('king_otto_scope').GetFirstName] se neochvějně drží své rodné [GetReligion('catholic').GetName] víry, což mezi jeho nově nabytými poddanými vyvolává značné znepokojení.\n\nMá-li othonovská vláda mezi Řeky přetrvat, možná bude nutné přinést určité osobní oběti."
