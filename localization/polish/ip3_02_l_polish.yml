 je_austrian_neo_absolutism_possible_tt: "[ROOT.GetCountry.GetNameNoFlag] nemá #bold žádné#! [concept_crown_land] ani [concept_personal_union] [Concept('concept_subject','$concept_subjects$')]"
 austrian_gdp_higher_than_prussia: "[ROOT.GetCountry.GetNameNoFlag] má vyšší [concept_gdp] než #b $PRU$#!"
 austrian_gdp_higher_than_germany: "[ROOT.GetCountry.GetNameNoFlag] má vyšší [concept_gdp] než #b $GER$#!"
 enforced_wargoal_on_prussia_tt: "[ROOT.GetCountry.GetNameNoFlag] prosadila [concept_war_goal] vůči #b $PRU$#!, zatímco je tento [concept_journal_entry] aktivní"
 enforced_wargoal_on_germany_tt: "[ROOT.GetCountry.GetNameNoFlag] prosadila [concept_war_goal] vůči #b $GER$#!, zatímco je tento [concept_journal_entry] aktivní"
 austrian_rank_three_or_above_tt: "Naše mocenská [concept_rank] musí být mezi prvními #v 3#!"
 modifier_streamline_crown_lands: "Omezená autonomie korunních zemí"
 matter_of_hungary_dual_monarchy_button: "Ustanovit Duální monarchii"
 matter_of_hungary_dual_monarchy_button_desc: "#bold $HUN$#! dlouho toužilo po rovném postavení se zbytkem [ROOT.GetCountry.GetAdjective] říše a jedině jeho udělením můžeme vůbec doufat, že uspokojíme maďarské požadavky na svobodu.\n\nVe spolupráci s $HUN_ADJ$ významnými osobnostmi byl vypracován plán, který #bold $HUN$#! udělí plnou vnitřní autonomii a odpovědné ministerstvo. Maďarsko na oplátku uzná, že říše zůstává jednotným státem pro účely války a zahraničních záležitostí."
 matter_of_hungary_integrate_crown_lands_button: "Integrovat korunní země"
 matter_of_hungary_integrate_crown_lands_button_desc: "Míra autonomie, které se těší [ROOT.GetCountry.GetAdjective] [Concept('concept_crown_land','$concept_crown_lands$')] jako #b $HUN$#!, je po celé generace trnem v oku ústřední vládě. Jsou z velké části spravovány vlastními institucemi zděděnými z dob habsburské složené monarchie a vzdorovaly reformním snahám, které nyní charakterizují takzvané #italic Erblande#!.\n\nV zájmu prosperity naší velké říše musí být tyto [Concept('concept_crown_land','$concept_crown_lands$')] plně integrovány do rakouské správy."
 matter_of_hungary_integrate_crown_lands_tt: "Všechny [concept_crown_land] [Concept('concept_subject','$concept_subjects$')] mají méně než #v 25#! [concept_liberty_desire] "
 matter_of_hungary_defeated_hungary_tt: "Nedávno jsme porazili #bold $HUN$#! ve [concept_war]"
