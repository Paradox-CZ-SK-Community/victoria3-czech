l_polish:
 unification_prestige: "Národní sjednotitel"
 unification_prestige_2: "$unification_prestige$"
 communist_unification_prestige: "Sjednocení Iberského poloostrova"
 formation.1.t: "Znovusjednocení Laosu"
 formation.1.d: "Sjednocený [SCOPE.sCulture('unification_culture').GetName|l] národ byl poprvé od pádu Lan Xangu obnoven."
 formation.1.f: "Od posledních dnů Soulingny Vongsy jsme nepoznali mír. [ROOT.GetCountry.GetNameNoFormatting] je opět sjednocen. Rodiny rozdělené spory dědiců starého krále se znovu spojují pod jednou vlajkou. A s tímto je [SCOPE.sCulture('unification_culture').GetNameNoFormatting] lid připraven čelit novému, zlatému úsvitu."
 formation.1.a: "Obnovíme slávu Lan Xangu."
 formation.2.t: "Pobaltské sjednocení"
 formation.2.d: "Pobaltské státy byly sjednoceny do jednoho národa, čímž se spojil [SCOPE.sCulture('unification_culture').GetName|l], [SCOPE.sCulture('unification_culture_2').GetName|l] a [SCOPE.sCulture('unification_culture_3').GetName|l] lid pod jednou vlajkou."
 formation.2.f: "Ve městech, na polích a v domácnostech se objevily první náznaky národního obrození v číslech, písních a dějinách. Pohnutky přecházely od cizinců k pozváním. Z pozvání se stala setkání, ze setkání dohody a z dohod spojenectví. Zpečetění spojenectví bylo jen jedním svorníkem: lepší být po boku rovnocenných proti světu než si být rovni pod cizí železnou patou."
 formation.2.a: "Jednota zajistí nezávislost."
 formation.3.t: "Purpurový fénix"
 formation.3.d: "Obnovením [ROOT.GetCountry.GetAltAdjective('G')] si náš národ nárokuje dědictví Říma."
 formation.3.f: "Vystoupil na starou kurii, zatímco obloha se zatáhla bouřkovými mraky. Podle vyprávění starých patricijů vystupovali senátoři na kurii a čekali na znamení přízně bohů. Seděl, ale ne dlouho. Oblohu rozčísl blesk a u okapu přistál zlatý orel.\n\nA on se rozplakal: Řím znovu povstane."
 formation.3.a: "Řím znovu povstane."
 formation.4.t: "Etiopské znovusjednocení"
 formation.4.d: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] svým vítězstvím ukončuje Éru knížat a konečně znovusjednocuje [ROOT.GetCountry.GetAltAdjective('A')]."
 formation.4.f: "Dny svévolných knížat skončily. [ROOT.GetCountry.GetNameNoFormatting] se vrátí pod vládu vznešeného císaře, božího šampiona na této zemi. Stabilita a modernita nyní mohou následovat pod božím dohledem, v císařově poslání."
 formation.4.a: "Bůh stál při nás."
 formation.5.t: "Iberské sjednocení"
 formation.5.d: "Spojením Portugalska se všemi bývalými španělskými královstvími vznikl sjednocený Pyrenejský poloostrov."
 formation.5.f: "Zvonění zvonů často na poloostrově ohlašovalo tragédii: válku, mor, požár a smrt v jejich stopách. Dnes však ne. V tento příznivý den pod zářícím sluncem se obě království znovu spojila pod sprškou okvětních lístků. Sjednoceni královským sňatkem, spojeni veselím a podepřeni silou zlaté legie čeká [ROOT.GetCountry.GetAltAdjectiveNoFormatting('A')] slavná budoucnost."
 formation.5.f2: "Sto tisíc drobných delegátů z celého poloostrova bylo svoláno na náměstí v [ROOT.GetCountry.GetCapital.GetCityHubName]. Vůdci vážených království stáli u velkého pergamenu - nové ústavy - a se dvěma velkými pery ji podepisovali. Posledním tahem se oddělené státy staly jedním. Sjednoceni smlouvou, spojeni bratrstvím a neseni stěžni velké armády čeká [ROOT.GetCountry.GetAltAdjectiveNoFormatting('A')] slavná budoucnost."
 formation.5.a: "Slavné sjednocení."
 formation.6.t: "[ROOT.GetCountry.GetAltAdjectiveNoFormatting('ee')] znovusjednocení"
 formation.6.d: "Po letech nejednoty a nepokojů se [ROOT.GetCountry.GetAltAdjective('yy')|l] národ opět zvedá z popela."
 formation.6.f1: "Vnitřní rozpory nebyly Brazílii cizí. Spory si skutečně najdou své místo v každém národě tak obrovské velikosti. Přesto vydržela. I kdyby se rozštěpila, kdyby hniloba zničila její základy a kdyby oportunisté pronásledovali její upadající tělo, vydržela by. Národ byl víc než jeho jednotlivé části. A aniž by se duch obra nejprve zlomil, Brazílie se vždy vrátí silnější, než když se zlomila."
 formation.6.f2: "„Federace žije!“ To byl pokřik statisíců hlasů napříč státy. Navzdory další bouři, která zmítala mladým národem, federace obstála. A uprostřed trosek se objevila příležitost: šance opravit základy země. A s nimi i šance povznést se ještě výš."
 formation.6.f3: "„Oboustranný prospěch,“ byl prvním argumentem pro unii. Sjednotit nesourodé koloniální državy však nebyl jednoduchý úkol. A uprostřed nepřátelství a hrozeb uvnitř i navenek se prosadila jednoduchá pravda: bylo lepší držet pohromadě, než se nechat vybíjet soupeři."
 formation.7.t: "Dunajský stát"
 formation.7.d: "Vzniklá na troskách Rakouského císařství, [SCOPE.sCountry('formation_country').GetName] je rovnoprávným svazkem [SCOPE.sCulture('hungarian_culture').GetName|l], [SCOPE.sCulture('romanian_culture').GetName|l], [SCOPE.sCulture('czech_culture').GetName|l], [SCOPE.sCulture('croatian_culture').GetName|l], [SCOPE.sCulture('slovene_culture').GetName|l] a [SCOPE.sCulture('slovak_culture').GetName|l] národů."
 formation.7.f: "„Dobří lidé z Podunají, z domovů vzdálených i blízkých, bratři moji: Vidím ve vás srdce tisíců opovrhovaných žen a mužů, kteří nemají co ztratit. Vskutku, naši kdysi vládnoucí panovníci nás zavedli na cestu, s níž jsme se ztratili. Naší cestu k velkoleposti v dějinách. Kdysi jsme drželi nůž za ostří a krváceli pro cizí prospěch. Teď už ne. Už ne! Dnes si svou cestu určujeme sami. Naše budoucnost. Sláva čeká!“"
 formation.8.t: "Arabské sjednocení"
 formation.8.d: "Arabské státy Blízkého východu se sjednotily jako jediný [ROOT.GetCountry.GetAdjective] národ."
 formation.8.f: "Kdysi zdroj vědění a pevnost myšlení světa, arabský svět byl podroben nadvládě mnoha mocností. Ty si jej předávaly jako kořist. Dějiny však již byly napsány a vzpomínky na ně byly stále živé. Arabský svět možná opět uvidí pozlacené kopule a zářící minarety. Spolupráce by byla prvním, rozhodujícím krokem."
 formation.8.b: "Všichni Arabové by se měli sjednotit pod námi."
 formation.9.t: "Jugoslávský národ"
 formation.9.d: "Po vymanění se z područí Osmanské a Rakouské říše se slovanské národy na Balkáně sjednotily v jeden národ."
 formation.9.f: "Svoboda. Ne pouhé osvobození z okovů, ale skutečná svoboda. Už nejste chyceni mezi kladivem a kovadlinou, psem a lovcem, nastal čas pro nový svazek. Nový pakt mezi Slovany, který všichni uvidí."
 formation.10.t: "Sjednocení Skandinavie"
 formation.10.d: "Na rozdíl od nerovných svazků minulých severských hegemonů se nově vzniklý [ROOT.GetCountry.GetAdjective] stát hlásá, že [SCOPE.sCulture('unification_culture').GetName|l], [SCOPE.sCulture('unification_culture_2').GetName|l], [SCOPE.sCulture('unification_culture_4').GetName|l] a [SCOPE.sCulture('unification_culture_3').GetName|l] národ bude mít stejné práva."
 formation.10.f: "Jásot zaplnil pivnice, zatímco venku se na zem sypala čerstvá vrstva sněhu. Na stěnách nad doutnajícím ohněm viselo pět vlajek: jedna pro každou zemi a jedna pro vznikající unii. Pryč byly časy, kdy jeden král vládl a druhý byl říší. Dnes je den oslav a nádhery: na severu se probudil nový medvěd a nechť všichni poznají jeho slávu."
 formation.10.a: "I [SCOPE.sCulture('finns_scope').GetName|l] národ by se měl stál rovnocenným s námi."
 formation.11.t: "Malijské impérium"
 formation.11.d: "Největší impérium západní Afriky bylo konečně obnoveno, když se [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] chopil vedení."
 formation.11.f: "Není snadným úkolem převzít odkaz velkých malijských králů minulosti.  Ale [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullNameNoFormatting] má ve své mysli jasný plán - pouze jejich legendární činy mají potenciál sjednotit různorodé národy [SCOPE.sCharacter('ruler_scope').GetHerHis] říše ve společné úctě. Neboť ve velkém projektu budování národa, který je před námi, není žádný nástroj státnické práce lepší než historie, která spojuje naše národy."
 formation.11.a: "Povstaneme podle příkladu Mansy Musy."
 formation.12.t: "Sjednocení Turkestánu"
 formation.12.d: "V neúprosných bojích proti mnohem větším cizím mocnostem byl [ROOT.GetCountry.GetAdjective] národ zocelen."
 formation.12.f: "„Proč máme teď novou vlajku, mami? A proč ti lidé mluví, jako by se dusili?“\n\n„Dítě, buď v klidu. O sousedech takto nemluvíš, zvlášť když žijí blízko a obchodují s námi. Nejsou to oni, kdo nám bere; my jim dáváme, co ušetříme. Teď žijeme společně, abychom měli šanci proti zlodějským ďáblům, kteří žijí daleko od nás.“"
 formation.12.a: "Povstaneme podle příkladu Mansy Musy."
 formation.13.t: "Sjednocení Indonesie"
 formation.13.d: "[ROOT.GetCountry.GetName] povstává s cílem sjednocení mnoha národů malajského světa a setřasení jha evropského útlaku."
 formation.13.f: "„Vidíš tuto čepel? Podívej, synu. Za tento meč je tato rodina zodpovědná už po tři generace. A pokaždé, když se ho ujme nový muž v naší rodině, nesmí být nikdy vrácen zpět, dokud nezabije jiného muže. To je cena za to, co nyní máme. Musíme být připraveni znovu bojovat. Nesmíme přijít o své domovy. Už nikdy více.“"
 formation.14.t: "Sjednocení Indie"
 formation.14.d: "[ROOT.GetCountry.GetName] povstává s cílem sjednocení mnoha národů subkontinentu a setřasení jha evropského útlaku."
 formation.14.f: "Tanečnice v hedvábí a okvětní lístky zaplnily ulice [ROOT.GetCountry.GetCapital.GetCityHubName]. Jídlo létalo z pánví po hrstech, tak rychle, jak je ruce dokázaly uchopit. Tisíce lidí se tlačily v každém dostupném prostoru. Dnes měl být korunován nový císař - [SCOPE.sCharacter('ruler_scope').GetFullNameNoFormatting]. Císař pro indický lid, který už nebude loutkou přivázanou k cizím prstům."
 formation.14.f2: "Cesta k míru začíná tím, že každý člověk bude vyslyšen bez ohledu na své postavení. Základem jednoty je dohoda a spolupráce. Dnešní den je prvním krokem na cestě k míru. Kéž v síle a pokoře pokračujeme dál."
 formation.14.f3: "Drahokamy vyrvané z Indie nyní zdobí korunu někoho jiného. Jídlo pro indická ústa vyrvané z indické půdy a poslané lidem, kteří toho mají na talíři už tak dost. Už nikdy více. Místo Indie v tomto novém světě už nebude pošpiněno. Ti, kdo nás dříve tak snadno drancovali, budou nyní čelit skutečně sjednocenému národu."
 formation.15.t: "Znovusjednocení Jemenu"
 formation.15.d: "[ROOT.GetCountry.GetName] se vynořil z dlouhého období roztříštěnosti jako stabilní a sjednocený národ."
 formation.15.f: "„Ten kmen tamhle. Nebyl kmen tvého otce ještě před pár měsíci s nimi ve válce?“\n\n„Jen malý vnitřní spor. Je to dobrý trénink, kdykoli někdo prodává plný sud písku jako zázračný lék. Ostatně, koho by nerozčílila bratrova tvrdohlavost?“\n\n„To nepopírám, to je i znak mého kmene. Ale nepopřu ani to, že jejich guláš je dobrý důvod ke spojenectví. Ha! Klidně bych v něm mohl být pohřben!“"
 formation.16.t: "Sjednocení Kazachstánu"
 formation.16.d: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] sjednotil [SCOPE.sCulture('unification_culture').GetName|l] lid pod jednou vlajkou."
 formation.16.f: "„Připravte vyslance. Chci mluvit s carem. A teď dobře poslouchejte. Naše požadavky jsou jednoduché: naše nezávislost už není na prodej. Rusko přestane s veškerým zdaněním našeho lidu a zboří své vlastní pevnosti. Jsme připraveni vyrazit do války s plnou silou všech Šajtánů za kopyty našich koní.“"
 formation.17.t: "Sjednocení [SCOPE.sCountry('formation_country').GetAltAdjective('G')]"
 formation.17.d: "[SCOPE.sCountry('formation_country').GetName] se objevuje jako rostoucí mocnost v [SCOPE.sStrategicRegion('capital_region_scope').GetName]."
 formation.17.f: "Nový den svítá, a nový národ vystupuje na světovou scénu. [ROOT.GetCountry.GetAdjectiveNoFormatting] lid čeká slavná a nevyhnutelná budoucnost."
 formation.18.t: "Srdce Evropy"
 formation.18.d_1: "Náš národ vyhlásil obnovení [ROOT.GetCountry.GetAltAdjective('G')], čímž jsme se ustanovili jako obnovený hegemon střední Evropy."
 formation.18.d_2: "Sjednocením všech německých zemí a vyhlášením [ROOT.GetCountry.GetAltAdjective('G')] jsme se ustanovili jako vládce Evropy - a brzy i celého světa."
 formation.18.d_3: "Revoluce napříč velkou částí střední Evropy umožnila vyhlášení [ROOT.GetCountry.GetAltAdjective('G')]. Mezinárodní proletariát bude osvobozen pod praporem Unie."
 formation.18.d_4: "Vyhlášením [ROOT.GetCountry.GetAltAdjective('G')] jsme učinili první kroky k uskutečnění snu o sjednocené Evropě."
 formation.18.f_1: "Pouhým slovem papeže a skloněnou hlavou císaře byl dekret vyhlášen. Před zraky Boha i lidí se tak stalo: Svatá říše římská byla obnovena na své právoplatné místo na světové scéně. Děla ohlašovala proudy piva; jásající muži vítali příchod slavné nové hegemonie."
 formation.18.f_2: "#bold Panevropa povstane! Sláva je náš osud!#!\n\nPro dobro vlasti budou všichni odvádět dávky v obilí či střelném prachu. Společně zachráníme Evropu před nepřáteli uvnitř i vně!\n\n#italic Nedodání nežádoucích osob, výzbroje či potravin bude považováno za porušení vojenského práva. Pachatelé budou souzeni vojenským soudem za sabotáž.#!"
 formation.18.f_3: "Zazněla tovární siréna. Ti dělníci, kteří neodešli s ostatními, zůstali a umyli se. Jakmile si oblékli své obleky a šaty, posadili se kolem mapy Unie. Zprávy z [ROOT.GetCountry.GetCapital.GetCityHubName] potvrdily jejich domněnky: svět je bude za jejich práci nenávidět, ale konečně bude mít další Internacionála opěrný bod, z něhož může působit."
 formation.18.f_4: "„Pánové, předkládám vám vzor našeho obnoveného úspěchu: na západě je kontinent definovaný svými výhodami pro občany. Jakkoli nedokonalý, slouží dnes našim záměrům. A pokud je něco, čím se můžeme proslavit, pak je to náš dar vylepšovat nedokonalé návrhy. Ukažme světu, že jsme hodni vést.“"
 formation.18.a: "Slavné sjednocení."
 formation.18.b: "Francouzský proletariát volá po osvobození."
 formation.18.c: "Nastal čas pohřbít naše spory."
 formation.19.t: "Spojené Nizozemsko"
 formation.19.d: "Poprvé od Belgické revoluce roku 1830 sjednotil jeden stát celé Nizozemí a vyhlásil [ROOT.GetCountry.GetAltAdjective('A')]."
 formation.19.f: "„Slyšel jsem, že se k nám Flandry brzy připojí. Ach, jak nádherné počasí na takovou příležitost.“\n\n„Počasí? Mluvíš o počasí jako nějaký anglický školák, zatímco naše državy jsou ohroženy ze všech stran!“\n\n„Dobrá tedy. Budu mluvit o důležitých věcech. Kolik smetany chceš k poffertjes?“"
 formation.19.a: "Slavné sjednocení."
 formation.20.t: "Rýnský spolek"
 formation.20.d: "V opozici vůči rakouským i pruským ambicím na jejich území se konfederace německých států sjednotila v obnovený [ROOT.GetCountry.GetName]. Spolek stojí jednotně, aby hájil svou suverenitu tváří v tvář svým nepřátelům."
 formation.20.f: "Desítky let po Napoleonově porážce je jeho vliv v Evropě stále patrný. Tato konfederace je jen jedním z mnoha projektů z jeho krvavé éry. Možná, zbavena jeho železné ruky, může být nasměrována k ušlechtilejšímu cíli."
 formation.20.a: "Za německý Rýn!"
 formation.21.t: "Sjednocené Karolíny"
 formation.21.d: "Chyba z roku 1712 byla napravena. Severní a Jižní Karolína opět stojí společně pod jednou vlajkou jako [ROOT.GetCountry.GetName]."
 formation.21.f: "„Viděli jste to? Je hotovo. Už žádné hranice. Můžeme jet vlakem do Charlestonu kdykoli se nám zachce.“\n\n„Ale co Jižané?“\n\n„Co s nimi?“\n\n„No, teď se musí potýkat s Fayetteville.“\n\n To slovo viselo ve vzduchu jako obzvlášť tlustý komár. Muž v červeném zbledl.\n\n„...no, ano. To také.“"
 formation.21.a: "Být a doufat."
 formation.21.b: "Tennessee bylo naše a znovu bude!"
