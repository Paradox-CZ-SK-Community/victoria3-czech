 Circassian_Army: "Čerkeská armáda"
 je_circassian_expulsions: "Vyhnání Čerkesů"
 je_circassian_expulsions_reason: "Ambice vlády osídlit bývalé území Čerkesie loajálními kozáky vedla k nelítostné kampani za vyhnání populace [SCOPE.sCulture('circassian_culture_scope').GetName] z regionu za každou cenu.\n\nDokud je tento [concept_journal_entry] aktivní, budou [SCOPE.sCulture('circassian_culture_scope').GetName] [Concept('concept_pop', '$concept_pops$')] deportováni z našich hranic za cenu obrovských ztrát na životech."
