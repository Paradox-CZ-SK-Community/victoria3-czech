 halt_circassian_deportations_tt: "Snahy pokračovat ve vyhánění lidí [SCOPE.sCulture('circassian_culture_scope').GetName] budou ukončeny"
 modifier_halted_circassian_expulsions: "Zastavené vyhánění Čerkesů"
 russia_halt_circassian_expulsions: "Zastavit vyhánění"
 russia_halt_circassian_expulsions_desc: "Pokračující deportace Čerkesů již není v zájmu vlády. Nařídíme okamžité ukončení deportací."
 halted_expulsions_tt: "Vyhánění Čerkesů již bylo zastaveno"
 caucasus_expulsions.1.t: "Přes moře"
 caucasus_expulsions.1.d: "Vlny najatých uprchlických lodí a obchodních plavidel převážejících tisíce deportovaných [SCOPE.sCulture('circassian_culture_scope').GetName] vypluly přes Černé moře ke svému cíli. Propuknutí nemocí a podvýživy zdecimovalo davy."
 caucasus_expulsions.1.f: "Na pobřeží se tísnily tisíce lidí, sdílející jen to nejnutnější přístřeší a potravu. Všichni byli bledí a vyhladovělí. Mnohé sužovaly neštovice a tyfus. Desítky ležely umírající na pokraji připojení se k hromadám mrtvol, které byly kladeny kamkoli, kde bylo místo.\n\nNa moři přetékaly paluby transportních lodí umírajícími i již mrtvými."
 caucasus_expulsions.1.a: "Další vlna je brzy nahradí."
 caucasus_expulsions.1.b: "Povolit distribuci zahraniční pomoci."
 caucasus_expulsions.1.c: "Máme jiné starosti."
 caucasus_expulsions.2.t: "[SCOPE.sCountry('russia_scope').GetName] žádá o migrační smlouvu"
 caucasus_expulsions.2.d: "[SCOPE.sCountry('russia_scope').GetAltAdjective('sti')] úředníci oslovili vládu se žádostí o povolení deportovat až padesát tisíc lidí [SCOPE.sCulture('circassian_culture_scope').GetName] na naše území. Pozorovatelé jednání [SCOPE.sCountry('russia_scope').GetAdjectiveNoFormatting] na Kavkaze varují, že deportace mohou být mnohem rozsáhlejší."
 caucasus_expulsions.2.f: "„Navrhovaná komise počítá s přepravou až deseti tisíc rodin. Přeprava za pět rublů na osobu, z čehož dvě zaplatí samotní migranti, se zapojením soukromých subjektů.“ Tak zněla ruská verze. Úředník měl pochybnosti, ale nemohl je vyslovit. Na severu probíhala válka — ne formální, ale přesto válka. Mnohem větší exodus byl jistý a jeho podmínky měly být daleko méně uspořádané, než se uvádělo."
 caucasus_expulsions.2.a: "Mohli by dobře osídlit náš východ."
 caucasus_expulsions.2.b: "Tato smlouva hrozí destabilizací."
 caucasus_expulsions.3.t: "Oceán krve"
 caucasus_expulsions.3.d: "Příliv deportovaných [SCOPE.sCulture('circassian_culture_scope').GetName] přicházejících na naše severní pobřeží se proměnil v humanitární katastrofu. Místní úřady jsou zahlceny množstvím uprchlíků, z nichž mnozí hladoví a trpí nemocemi."
 caucasus_expulsions.3.f: "Husté davy otrhaných mužů, žen a dětí pokrývaly pobřeží. Všichni vypadali vyčerpaně a hladově. Mnozí byli téměř nazí. Někteří umírali. U pobřeží se blížily další lodě, proměněné nemocemi v plovoucí hřbitovy. Občas moře vyplavilo další těla, k nepoznání znetvořená kraby a racky. Některá těla měla svázané ruce."
 caucasus_expulsions.3.a: "Požadovat, aby [SCOPE.sCountry('russia_scope').GetAltAdjective('aa')|l] vláda ukončila tyto zvěrstva."
 caucasus_expulsions.3.b: "Nemůžeme nic dělat."
