 modifier_circassian_diplomacy: "Čerkeská diplomacie"
 modifier_repudiated_muhammad_amin: "Odmítnutý imámát"
 modifier_accepted_muhammad_amin: "Přijat naíb imámátu"
 modifier_circassian_joint_struggle: "Společně ve svaté válce"
 modifier_defeat_of_kenesary_khan: "Pacifikované stepi"
 caucasuswar.1.t: "Neúspěšný vpád do [SCOPE.sCountry('adversary_scope').GetAltAdjective('G')]"
 caucasuswar.1.d: "Vpád, který jsme zahájili z [SCOPE.sState('invasion_base_state').GetName] na území nárokované [SCOPE.sCountry('adversary_scope').GetAltAdjective('I')], selhal. Vyslané jednotky se stáhly poté, co utrpěly těžké ztráty v drsném kavkazském terénu."
 caucasuswar.1.f: "„Byli v těch stromech — museli být varováni ještě předtím, než jsme začali. Počkali, až budeme pohlceni tím prokletým lesem, a pak na nás spustili palbu... major padl jako první a naši koně byli pobiti. Jak to máme zvládnout, pane? Jak máme dobýt tuto zemi, když nemůžeme tvrdit, že ovládáme cokoli mimo to, co stíní naše vlastní nohy?“"
 caucasuswar.1.a: "Kryjte ústup palbou a děly."
 caucasuswar.1.b: "Stáhněte jednotky a v tichosti se přeskupte."
 notification_caucasus_russian_failed_attack_notification_name: "Neúspěšný vpád [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] na naše území"
 notification_caucasus_russian_failed_attack_notification_desc: "Expedice [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] z [SCOPE.sState('invasion_base_state').GetName] byla odražena po pokusu o dobytí jedné z našich kontrolovaných oblastí."
 caucasuswar.2.t: "Přepaden zásobovací konvoj v Kavkaze"
 caucasuswar.2.d: "Konvoj vyslaný k zásobení našich sil v [SCOPE.sState('invasion_base_state').GetName] municí a zásobami byl přepaden silami [SCOPE.sCountry('adversary_scope').GetAltAdjective('G')]. Během střetu byla velká část nákladu ztracena."
 caucasuswar.2.f: "Než dorazily posily, těla už začala hnít. Muži i koně leželi propleteni tam, kde padli, jejich věci byly rozebrány a odneseny podnikavými rukami. Jak tam leželi, cesta už nebyla územím Ruska ani nikoho jiného — jejími poddanými byli červi a jejím vládcem Pán much."
 caucasuswar.2.a: "Zabavte prostředky místním, abychom nahradili ztráty."
 caucasuswar.2.b: "Vyčkejte a připravte lépe chráněný konvoj."
 notification_caucasus_russian_supply_convoy_notification_name: "Úspěšný nájezd na [SCOPE.sCountry('russia_scope').GetAltAdjective('yy')|l] konvoj"
 notification_caucasus_russian_supply_convoy_notification_desc: "Úspěšně jsme přepadli a rozprášili [SCOPE.sCountry('russia_scope').GetAltAdjective('yy')|l] konvoj určený k zásobování nepřátelských sil a zmocnili se jeho nákladu." 
 caucasuswar.3.t: "Úspěšný vpád do [SCOPE.sCountry('adversary_scope').GetAltAdjective('G')]"
 caucasuswar.3.d: "Vpád na území nárokované [SCOPE.sCountry('adversary_scope').GetAltAdjective('I')] byl úspěšný, několik vesnic ovládaných horaly bylo vypáleno a nepřítel uprchl."
 caucasuswar.3.f: "Večer vojáci vstoupili do města sevřeného mezi dvěma horami — skromného, ale prosperujícího, obklopeného poli odolných plodin.\n\nRáno po sobě zanechali jen ohořelé černé kostry, obklopené pustým prstencem popela."
 caucasuswar.3.a: "Nikdo nesmí přežít naše tažení."
 caucasuswar.3.b: "Přiměli jsme je dostatečně ke kapitulaci."
 notification_caucasus_russian_village_burned_notification_name: "Vesnice vypáleny [SCOPE.sCountry('russia_scope').GetAltAdjective('yymi')] vojáky"
 notification_caucasus_russian_village_burned_notification_desc: "Řada vesnic v [SCOPE.sState('invasion_state').GetName] byla vypálena během vpádu [SCOPE.sCountry('russia_scope').GetAltAdjective('G')], jejich obyvatelstvo i dobytek byly pobity." 
 caucasuswar.4.t: "Kmen [SCOPE.sCulture('defector_culture').GetName] skládá přísahu věrnosti"
 caucasuswar.4.d: "Zastrašen našimi silami a neochotný dále bojovat, kmen [SCOPE.sCulture('defector_culture').GetName], dříve loajální k [SCOPE.sCountry('adversary_scope').GetAltAdjective('L')], složil přísahu věrnosti [ROOT.GetCountry.GetAltAdjective('D')]."
 caucasuswar.4.f: "Já, níže podepsaný, slibuji a přísahám při Všemohoucím Bohu a jeho svatých evangeliích, že jsem oddán a zavázán jeho imperátorskému veličenstvu, mému pravému a přirozenému nejmilostivějšímu velkému panovníkovi císaři [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting], samovládci všech Rusí, i jeho císařské výsosti, zákonnému dědici trůnu všech Rusí."
 caucasuswar.4.a: "Škoda, že se tak nerozhodli dříve."
 caucasuswar.4.b: "Dovolte jim usadit se na našich územích."
 notification_caucasus_tribe_defection_notification_name: "Kmen přísahá věrnost [SCOPE.sCountry('russia_scope').GetAltAdjective('D')]"
 notification_caucasus_tribe_defection_notification_desc: "Kmen [SCOPE.sCulture('defector_culture').GetName] složil přísahu věrnosti [SCOPE.sCountry('russia_scope').GetAltAdjective('eemu')] [SCOPE.sCountry('russia_scope').GetRuler.GetPrimaryRoleTitle]i, čímž oslabuje naši kontrolu nad vlastním územím." 
 caucasuswar.5.t: "Memorandum [SCOPE.sCharacter('milyutin_scope').GetLastName]a"
 caucasuswar.5.d: "Nově povýšený generálporučík [SCOPE.sCharacter('milyutin_scope').GetFullName] vydal memorandum carovi, v němž podporuje vyhnání nebo vyhlazení celé populace [SCOPE.sCulture('circassian_culture').GetName] v Kavkaze."
 caucasuswar.5.f: "„Naplnění této myšlenky by mělo trojí či čtverý cíl: zaprvé zbavit kavkazskou plošinu trvale nepřátelského obyvatelstva a tím otevřít krásná a úrodná místa pro naše kozácké obyvatelstvo; zadruhé dát samotným domorodcům lepší postavení a zajistit jejich budoucnost, kterou nyní nemají, protože po příchodu do Turecka byli ponecháni sami sobě...“"
 caucasuswar.5.a: "Podpořte memorandum a zesilte vyhánění."
 caucasuswar.5.b: "Toto opatření učiní hory navždy neovladatelnými."
 milyutin_available_tt: "[SCOPE.sCharacter('milyutin_scope').GetFullName] se stane [concept_general]."
 caucasuswar.6.t: "Přeběhnutí k [SCOPE.sCountry('adversary_scope').GetAltAdjective('D')]"
 caucasuswar.6.d: "Mnohonárodní charakter imámátu [SCOPE.sCharacter('shamil_scope').GetFullName] se ukázal být neodolatelný pro mnohé z našich poddaných v [SCOPE.sState('invasion_base_state').GetName]. Důstojníci i statkáři hlásí četná přeběhnutí k imámátu."
 caucasuswar.6.f: "„Špatné zacházení s našimi vojenskými dezertéry ze strany Čečenců drželo mnoho nespolehlivých vojáků, zvláště Poláků, od útěku; ale pokud nyní zjistí, že Šamil dává dezertérům svobodu, obávám se, že útěků přibude. Domnívám se, že abychom zabránili útěkům, měli by být první zajatí dezertéři zastřeleni. Zároveň jsem nařídil všem velitelům zpřísnit dohled nad nespolehlivými vojáky a okamžitě mi hlásit každého, kdo se pokusí uprchnout.“\n\n— Melentij Jakovlevič Olševskij"
 caucasuswar.6.a: "Zpřísněte bezpečnost v regionu, abychom zabránili dalším přeběhnutím."
 caucasuswar.6.b: "Nebudeme dále zhoršovat vztahy s obyvatelstvem."
 notification_caucasus_russian_soldiers_defection_notification_name: "[SCOPE.sCountry('russia_scope').GetAltAdjective('sti')] vojáci přebíhají k našim armádám"
 notification_caucasus_russian_soldiers_defection_notification_desc: "Skupina špatně zacházených vojáků [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] přijala islám a vyjádřila přání podpořit náš boj proti vetřelci."
 caucasuswar.7.t: "Parlament nezávislosti"
 caucasuswar.7.d: "S plnohodnotnou invazí [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] téměř jistou byl v [SCOPE.sState('capital_scope').GetFarmHubName] svolán [ROOT.GetCountry.GetAltAdjective('yy')] národní parlament, aby zvolil jediného vládce a koordinoval sjednocený odpor celé Čerkesie."
 caucasuswar.7.f: "I kdybychom ztratili mnoho našich statečných bojovníků, máme muže i mladé chlapce, kteří je nahradí! V nejhorším případě nebudeme moci používat pušky kvůli nedostatku střelného prachu a munice. Přesto budeme bojovat s meči a dýkami v rukou! Nikdy neposlechneme nepřátele! I kdyby nás celý svět opustil a byli bychom zatlačeni na poslední kousek naší vlasti, ukáže se, čeho jsou Adygejci schopni. Bude-li třeba, budeme muset z milosti vlastníma rukama ukončit životy našich žen a dětí, aby nepadly do rukou nepřítele a nebyly vystaveny ještě horším utrpením. A pak, abychom je pomstili, musíme i my zahynout."
 caucasuswar.7.a: "Právě naším duchem budeme vzdorovat až do konce."
 caucasuswar.7.b: "Musíme požádat zahraniční mocnosti o pomoc."
 caucasuswar.7.c: "Navždy budeme stát po boku našich východních bratrů!"
 caucasuswar.8.t: "Čerkeská výzva"
 caucasuswar.8.d: "Malý kavkazský proto-stát [SCOPE.sCountry('circassia_scope').GetName], zapletený do dlouhého konfliktu s [SCOPE.sCountry('russia_scope').GetAltAdjective('I')], zaslal naší zemi žádost o vojenskou pomoc. Uznání jejich boje by mohlo pomoci oslabit ruskou kontrolu nad regionem."
 caucasuswar.8.f: "Tyto země jsou naše a chceme je spravovat s absolutní spravedlností. Usilujeme o spravedlivou správu naší země, proto jednáme férově s našimi lidmi a respektujeme životy i majetek těch, kdo nás navštěvují."
 caucasuswar.8.a: "Budeme tento konflikt sledovat se zájmem."
 caucasuswar.8.b: "Nemáme důvod se zapojovat."
 circassia_decision_tt: "Získáme možnost nabídnout [Concept('concept_recognized_power','Uznání')] [SCOPE.sCountry('circassia_scope').GetAltAdjective('G')] prostřednictvím #bold rozhodnutí#!."
 caucasuswar.9.t: "Vyslanec imámátu"
 caucasuswar.9.d: "Po smrti našeho předchozího [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a na žádost mnoha členů [SCOPE.gsInterestGroup('devout_scope').GetName] vyslal [SCOPE.sCountry('imamate_scope').GetName] zvláště významného naíba, aby posílil vztahy mezi našimi zeměmi a vedl [ROOT.GetCountry.GetName] v jeho boji."
 caucasuswar.9.f: "Po třetím měsíci, kdy jsme volali na východ o učitele, jenž by nám ukázal cestu, dorazil — jeho přítomnost byla jako titán a jeho vůle jako ohnivá bouře."
 caucasuswar.9.a: "Bude nám ctí sjednotit se s našimi bratry v islámu."
 caucasuswar.9.b: "Náš boj je především národní."
 muhammad_amin_ruler_tt: "#v Muhammad Amin Asijalev#! se stane naším [Concept('concept_ruler','vládcem')]"
 caucasuswar.10.t: "Expedice Kangaroo"
 caucasuswar.10.d: "Oddíl dobrovolníků převážně [SCOPE.sCulture('polish_culture').GetName] a [SCOPE.sCulture('hungarian_culture').GetName] původu z [SCOPE.sCountry('austria_scope').GetAdjective] [SCOPE.sState('galicia_scope').GetName] dorazil do [ROOT.GetCountry.GetName] na parníku Kangaroo, aby pomohl v našem boji jako dobrovolní vojáci proti [SCOPE.sCountry('russia_scope').GetAdjective] vetřelcům."
 caucasuswar.10.f: "„V životě člověka existují předtuchy a touhy, které se navzdory své zdánlivé nepravděpodobnosti někdy naplní. Zažil jsem to na vlastní kůži. Když jsem emigroval, měl jsem posedlou myšlenku odejít na Kavkaz. Nebylo mi tehdy ještě ani dvaadvacet let a téměř romantické legendy o Šamilovi a horských hrdinech, kteří v tak malém počtu vzdorují obrovské moci Ruska, na mě hluboce zapůsobily. Hledal jsem způsoby, jak se s nimi spojit, a ať už jsem byl v Německu, Anglii či Francii, snažil jsem se najít spojence pro tuto myšlenku a vzbudit o ni zájem. Byl jsem považován za nerozvážného snílka a dávali mi za příklad některé mé krajany i několik zoufalých anglických dobrodruhů...“"
 caucasuswar.10.a: "Udělit jejich vůdci roli velitele a vyslat ho na frontu."
 caucasuswar.10.b: "Prospěje nám výcvik v taktikách [SCOPE.sCountry('austria_scope').GetAdjective]." 
 caucasuswar_end.1.t: "Pád Čerkesie"
 caucasuswar_end.1.d: "Po dokončení naší kampaně v oblasti [SCOPE.sState('kuban_state').GetStateRegion.GetName] přešla veškerá bývalá čerkeská území pod naši kontrolu. Země je nyní připravena k osídlení donskými kozáky."
 caucasuswar_end.1.f: "„V tomto roce byl vykonán čin téměř bezprecedentní v dějinách: ani jeden z horských obyvatel nezůstal na svých původních sídlech a jsou přijímána opatření k vyčištění oblasti, aby byla připravena pro nové ruské obyvatelstvo.“"
 caucasuswar_end.1.a: "Deportace budou pokračovat, dokud nebude země vyčištěna."
 caucasuswar_end.1.b: "Zahájit proces integrace čerkeského obyvatelstva." 
 caucasuswar_end.2.t: "Čest a život"
 caucasuswar_end.2.d: "Po porážce armád [SCOPE.sCountry('russia_scope').GetAdjective] na bojišti jsme konečně dosáhli snu o nezávislém a sjednoceném [ROOT.GetCountry.GetName]. Nedotknutelná suverenita [ROOT.GetCountry.GetNameNoFormatting] byla v očích světa zajištěna naším vítězstvím."
 caucasuswar_end.2.f: "Stáli jsme jako jeden proti vetřelci, planoucí vášní pro nezávislost naší vlasti, a vrátili jsme se domů jako vítězové."
 caucasuswar_end.2.a: "Naše síla vždy vycházela z našeho lidu a vždy tomu tak bude."
 caucasuswar_end.2.b: "Moderní [ROOT.GetCountry.GetName] už nikdy nebude ohroženo!"
 caucasuswar_end.2.c: "Nastal čas, aby naši dobrodinci splnili svůj slib." 
 caucasuswar_end.3.t: "Konec imámátu"
 caucasuswar_end.3.d: "Po obsazení oblasti [SCOPE.sState('dagestan_state').GetStateRegion.GetName] a kapitulaci či přeběhnutí mnoha bývalých kavkazských naíbů se vůdce imámátu nakonec vzdal armádě [ROOT.GetCountry.GetAdjective] na žádost manželek a dětí svých posledních stoupenců."
 caucasuswar_end.3.f: "„Celý svět zná vaše činy a jejich sláva nevyhasne. Pokud se dnes, podřízen vůli osudu, vydáte vrchnímu veliteli a odevzdáte se velkorysosti panovníka [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], zachráníte tisíce lidí, kteří jsou naživu a zůstávají vám věrní. Završete své slavné skutky činem prozíravosti a velkorysosti a sardar požádá panovníka, aby zajistil budoucnost vaši i vaší rodiny.“\n\n— Ivan Davidovič Lazarev"
 caucasuswar_end.3.a: "V Čečensku byl konečně nalezen mír."
 caucasuswar_end.3.b: "Mír nebude, dokud bude Šamil stále uctíván." 
 caucasuswar_end.4.t: "Katastrofa na Kavkaze"
 caucasuswar_end.4.d: "Kolaps naší vlády v oblastech [SCOPE.sState('kuban_state').GetStateRegion.GetName] a [SCOPE.sState('dagestan_state').GetStateRegion.GetName] vedl k přerušení Gruzínské vojenské cesty a ke ztrátě schopnosti státu [ROOT.GetCountry.GetAdjective] uplatňovat moc na jižním Kavkaze."
 caucasuswar_end.4.f: "V těchto prokletých horách nám už nezbylo nic než být uvězněni mezi Turky a horaly. Nic už není na naší straně — Bůh je vysoko a car je daleko."
 caucasuswar_end.4.a: "Militarizovat zbývající posádky a držet za každou cenu!"
 caucasuswar_end.4.b: "Ponechat region napospas místním válečníkům." 
 caucasuswar_end.4.c: "Stáhnout se tváří v tvář vznikajícím kavkazským státům." 
 caucasuswar_end.4.e: "Opustit hory transkavkazské inteligenci."
 caucasuswar_end_4b_tt: "#bold Kavkaz#! bude rozdělen mezi různé uchazeče o dědictví jeho historických království."
 caucasuswar_end_4c_tt: "Národní aspirace #bold kavkazských#! národů budou naplněny ve formě samostatných států."
 caucasuswar_end_4e_tt: "#bold Kavkazské#! národy získají nezávislost na [ROOT.GetCountry.GetName] jako sjednocený #bold Zakavkazský#! stát."
 caucasuswar_end.5.t: "Svatý mír"
 caucasuswar_end.5.d: "Porážka armád [SCOPE.sCountry('russia_scope').GetAdjective] nám umožnila osvobodit celé území [SCOPE.sState('dagestan_scope').GetStateRegion.GetName] pod vládou [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]. Cesta k konečnému triumfu [ROOT.GetCountry.GetName] je otevřená."
 caucasuswar_end.5.f: "Z vůle Všemohoucího, Nejvyšší vládce... nevěřící byli rozprášeni a koruna jejich císaře potřísněna krví jeho padlých hord."
 caucasuswar_end.5.a: "Zahájit snahy o konverzi a integraci našich nových ruských sousedů."
 caucasuswar_end.5.b: "Musíme najít způsob, jak se přizpůsobit tomuto novému míru."
 russia_offer_circassia_recognition: "Nabídnout Čerkesii uznání"
 russia_offer_circassia_recognition_desc: "Žádosti o mezinárodní podporu, které nám zaslal vznikající čerkeský stát, představují vynikající příležitost rozšířit naši sféru vlivu na Kavkaze."
 circassia_recognition_tt: "Čerkesii bude nabídnuta možnost stát se [Concept('concept_recognized_power','uznanou mocností')], pokud dokáže #bold konsolidovat#! a #bold znovu získat své území#! od Ruska."
 no_country_recognised_circassia_tt: "Žádná jiná země nenabídla #v $CIR$#! uznání"
 russia_out_of_kuban_tt: "#v $RUS$#! nemá žádný [concept_state] v oblasti [SCOPE.sStateRegion('kuban_scope').GetName]"
 russia_out_of_north_caucasus_tt: "#v $RUS$#! nemá žádný [concept_state] v oblasti [SCOPE.sStateRegion('north_caucasus_scope').GetName]"
 russia_out_of_dagestan_tt: "#v $RUS$#! nemá žádný [concept_state] v oblasti [SCOPE.sStateRegion('dagestan_scope').GetName]"
 imamate_dispatch_muhammad_amin: "Vyslat naíba do Čerkesie"
 imamate_dispatch_muhammad_amin_desc: "Smrt dvou čerkeských thamadů v rychlém sledu zanechala naše západní bratry bez vůdce schopného je sjednotit. Vyslání našeho vlastního vyslance do Čerkesie by mohlo zajistit potřebnou alianci s našimi spolubojovníky a znovu sjednotit kmeny."
 circassia_muhammad_amin_tt: "Vyšleme schopného naíba do #bold Čerkesie#!, aby sjednotil horské národy pod islámem."
 muhammad_amin_possible: "Thamadové #bold Ismail Berzeg#! nebo #bold Hawduqo Mansur#! již nejsou vládci Čerkesie"
 je_conquest_of_central_asia: "Dobytí Turkestánu"
 je_conquest_of_central_asia_reason: "Abychom zajistili naši jižní hranici, čelili britské moci v Indii a otevřeli cesty, kterými můžeme rozšířit vliv [ROOT.GetCountry.GetAdjective] do Blízkého východu, vydala vláda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nařízení k vytvoření protektorátů napříč Střední Asií a rozšíření našeho impéria do samotného Turkestánu."
 russian_central_asia.1.t: "Dobytí Turkestánu"
 russian_central_asia.1.d: "Jižně od kazašské stepi leží chanáty Střední Asie, další překážky bránící projekci moci [ROOT.GetCountry.GetAdjective] směrem do Indie a na Blízký východ. Za každou cenu hodlá vláda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] přivést tyto země pod naši kontrolu."
 russian_central_asia.1.f: "„Rusko ve svém postupu do Střední Asie nevede ani ctižádostivý plán, ani sobecké kalkulace, nýbrž pouze touha uklidnit tento region, dát podnět jeho výrobním silám a otevřít nejkratší cestu pro prodej produktů Turkestánu do evropské části Ruska.“"
 russian_central_asia.1.a: "Nejlepší bude zvolit smířlivější přístup."
 russian_central_asia.1.b: "Turkestán se musí podřídit [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], mírem či válkou."
 central_asia_influence_tt: "Středoasijské země budou ochotnější se nám podřídit."
 notification_central_asia_bribes_notification_name: "[SCOPE.sCountry('russia_scope').GetAdjective] rozšiřuje finanční vliv"
 notification_central_asia_bribes_notification_desc: "Obchodníci a diplomaté zastupující [SCOPE.sCountry('russia_scope').GetName] v naší zemi začali rozhazovat peníze a získávat si přízeň místních [ROOT.GetCountry.GetAdjectiveNoFormatting] úředníků."
 russian_central_asia.2.t: "Velká hra"
 russian_central_asia.2.d: "S otevřením středoasijských obchodních cest do [SCOPE.sCountry('india_overlord').GetAdjective] Indie a na Blízký východ zůstává jejich průchodnost omezena pouze státem [SCOPE.sCountry('afghan_scope').GetName]. Několik jestřábích osobností ve skupině [SCOPE.gsInterestGroup('hawkish_ig').GetName] navrhlo tento stát jako potenciální protektorát."
 russian_central_asia.2.f: "Obávám se, že získání těchto rozsáhlých území jen zvýší obavy [SCOPE.sCountry('india_overlord').GetAdjectiveNoFormatting] a může vyvolat další války o státy, které slouží jako nárazníky mezi našimi říšemi. Musíme dosáhnout míru — buď smlouvou, nebo jejich úplnou kapitulací."
 russian_central_asia.2.a: "I Kábul bude jednou [ROOT.GetCountry.GetAdjective]."
 russian_central_asia.2.b: "Lépe nám poslouží opatrnější přístup."
 russian_central_asia.3.t: "Turkmenská hrozba"
 russian_central_asia.3.d: "Navzdory obecnému uznání naší svrchovanosti nad Turkestánem většinou národů regionu pokračují kmeny [SCOPE.sCountry('turkmenia_scope').GetAdjectiveNoFlag] na jihu v nájezdech na naše území a odmítají se podřídit naší autoritě. Aby byla tato nespravedlnost napravena, oznámil [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] zahájení velké výpravy do turkmenských zemí."
 russian_central_asia.3.f: "Zabodl prst do mapy rozprostřené na stole mezi nimi a generál se ušklíbl. „Tady!“ zahřměl, „Tady udeříme! To hnízdo #italic loupeže#! a #italic ničení#!! Příliš dlouho bránilo našim ambicím i naší cti.“ Mávl směrem k masu mužů a děl za stěnami stanu. „Připravte koně. Vyrazíme za úsvitu.“"
 russian_central_asia.3.a: "Ukažme těm nájezdníkům ruskou ocel."
