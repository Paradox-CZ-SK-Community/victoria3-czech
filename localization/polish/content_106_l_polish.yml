l_polish:
 je_the_eastern_border: "Vládce Východu"
 je_the_eastern_border_reason: "Naše ambice stát se tichomořskou námořní mocností a naše koloniální agenda ve Střední Asii vyžadují, abychom vyřešili naše dlouhodobé pohraniční spory s [SCOPE.sCountry('china_scope').GetAltAdjective('I')] způsobem příznivým pro [ROOT.GetCountry.GetAltAdjective('A')]."
 je_the_eastern_border_treaty_of_beijing: "Uplatnit nároky na Přímoří"
 je_the_eastern_border_treaty_of_beijing_desc: "Oblast #bold Přímoří#! představuje příležitost vybudovat nezamrzající tichomořský přístav, což výrazně zvýší naši schopnost projekce síly. Mohli bychom sjednat smlouvu k zajištění tohoto území využitím slabosti Číny."
 obligation_for_outer_manchuria_tt: "Vyměníme náš Závazek za #bold Přímoří#!."
 transfer_of_outer_manchuria_tt: "Budeme požadovat převod #bold Přímoří#! pod ruskou správu."
 china_explosion_point_2_tt: "Postup #b $je_warlord_china$#! [concept_journal_entry] je pod #v 3#! (aktuálně #variable [SCOPE.sCountry('china_scope').MakeScope.Var('china_warlord_explosion').GetValue]#!)"
 war_with_china_not_russia_tt: "Není ve válce s #bold Ruskem#! a je v [concept_war] s jinou zemí než #bold Ruskem#!"
 russo_chinese.1.t: "Pekingská smlouva"
 russo_chinese.1.d: "S naší současnou převahou nad vládou [SCOPE.sCountry('china_scope').GetAltAdjective('G')] jsme navrhli smlouvu k vytyčení formální hranice v Mandžusku, čímž bude [SCOPE.sState('outer_manchuria_scope').GetName] formálně převedeno pod [ROOT.GetCountry.GetAltAdjective('A')]."
 russo_chinese.1.f: "Články této smlouvy vstoupí v platnost dnem jejich výměny mezi zástupci jednoho i druhého státu a musí být navěky posvátně a nedotknutelně dodržovány."
 russo_chinese.1.a: "Otevřít území pro rozsáhlejší osidlování."
 russo_chinese.1.b: "Nesmí dojít k prodlení v rozšiřování našich přístavů."
 modifier_ruler_of_the_east: "Osídlení Mandžuska"
 modifier_ruler_of_the_east_navy: "Osídlení Mandžuska"
 je_the_eastern_border_russia_chuguchak_protocol: "Vydat čugučacký protokol"
 je_the_eastern_border_russia_chuguchak_protocol_desc: "Získání dalších území ve Střední Asii je prioritou ruské vlády. S Čínou v chaosu se naskýtá příležitost rozšířit se do sporných oblastí."
 obligation_for_central_asia_tt: "Vyměníme náš Závazek za území ve Střední Asii."
 russia_chuguchak_protocol_req_tt: "Státy #BOLD $STATE_SEMIRECHE$#! a #BOLD $STATE_AKMOLINSK$#! jsou kontrolovány Ruskem nebo jeho závislou zemí"
 transfer_of_central_asia_tt: "Budeme požadovat převod sporných #BOLD kazašských a kyrgyzských#! území pod ruskou správu."
 russo_chinese.2.t: "Čugučacký protokol"
 russo_chinese.2.d: "Zahájili jsme jednání se zástupci [SCOPE.sCountry('china_scope').GetAltAdjective('G')], abychom určili hranici mezi našimi zeměmi na západě. Ve Střední Asii se nabízí značné příležitosti k územním ziskům."
 russo_chinese.2.f: "Je naší povinností zajistit, aby země Kyrgyzů a Kazachů, těchto loajálních poddaných Ruska, byly sjednoceny pod státem, který je schopen zajistit bezpečnost před současným stavem banditismu a drobných krádeží v regionu."
 russo_chinese.2.a: "[SCOPE.sState('tomsk_scope').GetName] a [SCOPE.sState('ili_scope').GetName] budou dostačující."
 russo_chinese.2.b: "Území [SCOPE.sState('kirghizia_scope').GetName] je rovněž nezbytné získat."
 russo_chinese.2.c: "Území [SCOPE.sCountry('kirgiz_scope').GetAltAdjective('G')] bude sjednoceno pod naším protektorátem."
 russo_chinese.3.t: "Vládce Východu"
 russo_chinese.3.d: "Zajištěním [SCOPE.sState('vladivostok_scope').GetName] se sen o [ROOT.GetCountry.GetAltAdjective('ee')|l] námořní nadvládě nad Pacifikem přiblížil realitě. Město [SCOPE.sState('vladivostok_scope').GetPortHubName] se stane naším novým hlavním přístavem na východě."
 russo_chinese.3.f: "„Tento přístav lze považovat za nejlepší ze všech. Mnohým připomíná Olgu, jen je menší, teplejší a příjemnější. Všude kolem jsou však stejné duby a tytéž malebné hory. V nížinách šumí řeky; na březích je mnoho pramenů. Naše stanoviště zřízené onehdy se svými bílými stany vypadá dobře ve skupině dubů, které ještě nebyly pokáceny a byly teprve nedávno vyklizeny.“\n\n— Sergej Maksimov"
 russo_chinese.3.a: "Přesunout sibiřské lodě bez odkladu."
 russo_chinese.3.b: "Přístav Vladivostok bude nejlepším v naší zemi."
 modifier_vladivostok_navy: "Vládce Východu"
 modifier_vladivostok_navy_country: "Projekce síly v Pacifiku"
 modifier_vladivostok_civilian: "Vládce Východu"
 je_caucasian_war: "Kavkazská válka"
 je_caucasian_war_reason: "Naše územní ambice v Kavkazských horách jsou brzděny silným místním odporem. Musíme rozdrtit veškerý zbývající odpor, abychom zajistili naši jižní hranici a otevřeli tato území osidlování.\n\nJakmile budou vyzkoumány technologie #bold Drážkované zbraně#! a #bold Logistika#!, bude možné #bold eskalovat válku#! a zahájit plnohodnotnou invazi proti vzbouřeným státům."
 caucasus_secured_tt: "V oblasti Kavkazu neexistuje žádný nezávislý #bold čerkeský#! ani #bold severokavkazský#! národ."
 caucasus_lost_tt: "Celé oblasti států #bold Kubáň#!, #bold Severní Kavkaz#! a #bold Dagestán#! se vymkly [SCOPE.sCountry('russia_scope').GetAltAdjective('ee')|l] kontrole."
 je_caucasian_war_circassia: "Čest před životem"
 je_caucasian_war_circassia_reason: "Imperiální ambice [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] vyžadují úplné zničení našich domovů. Abychom odolali [SCOPE.sCountry('russia_scope').GetAltAdjective('eemu')|l] náporu, musíme sjednotit [ROOT.GetCountry.GetAltAdjective('ee')|l] kmeny a společně čelit boji."
 je_caucasian_war_imamate: "Ghazavát"
 je_caucasian_war_imamate_reason: "Imperiální ambice [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] vyžadují podrobení Kavkazu. Abychom čelili pravoslavné invazi [SCOPE.sCountry('russia_scope').GetAltAdjective('G')], musíme sjednotit [ROOT.GetCountry.GetAltAdjective('ee')|l] národy a společně vést svatý boj."
 caucasus_war_attacker: "Kavkazská válka"
 caucasus_war_defender_circassia: "Čest před životem"
 caucasus_war_defender_imamate: "Odpor a víra"
 russia_escalate_caucasian_war: "Eskalovat kavkazskou válku"
 russia_escalate_caucasian_war_desc: "Díky novým a vylepšeným metodám ochrany zásob a vedení války jsme konečně schopni rozdrtit kavkazské povstalce plnou silou naší armády." 
 no_turmoil_tt: "[STATE.GetName] má #bold nepokoje#! pod 15 %"
 caucasian_war_non_escalated_loc: "Konflikt probíhá pomalým tempem, veden převážně nájezdy a vpády."
 caucasian_war_escalated_loc: "Konflikt přerostl v plnohodnotnou vojenskou kampaň."
 caucasian_war_milyutin_loc: "Konflikt přerostl v plnohodnotnou kampaň s cílem úplného vyhlazení povstalců."
 je_the_last_kazakh_khan: "Poslední kazašský chán"
 je_the_last_kazakh_khan_reason: "Prohlášen zástupci tří žuzů chánem sjednoceného [SCOPE.sCountry('khanate_scope').GetAltAdjective('G')], [SCOPE.sCharacter('kenesary_scope').GetFullName] otevřeně povstal proti [ROOT.GetCountry.GetAltAdjective('ee')|l] vládě. Abychom jednou provždy zajistili kazašská území, musí být povstalecký chanát zničen."
 je_pacify_the_steppes: "Pacifikace stepí"
 je_pacify_the_steppes_reason: "Navzdory nominální [ROOT.GetCountry.GetAltAdjective('ee')|l] kontrole nad kazašskou stepí od 18. století sužují území banditismus a neloajalita. Kazašští povstalci, vedení aristokratem [SCOPE.sCharacter('kenesary_scope').GetFullName], znovu a znovu útočí na naše zásobovací konvoje a pevnosti v regionu.\n\nTeprve s konečnou pacifikací stepí lze [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] skutečně označit za vládce Kazachstánu."
 khanate_is_destroyed_tt: "Kazašský chanát byl zničen"
 kazakhstan_events.1.t: "Kazašské povstání"
 kazakhstan_events.1.d: "Vzbouření zástupci kazašských žuzů vyhlásili obnovení sjednoceného [SCOPE.sCountry('kazakh_scope').GetAltAdjective('G')] pod vedením chána [SCOPE.sCharacter('kenesary_scope').GetFullName]. Povstání ohrožuje naše zájmy napříč celou středoasijskou stepí."
 kazakhstan_events.1.f: "Dvacet tisíc mužů ze tří set kmenů sedí na svých koních na východě, připraveni vyrazit proti svým vetřelcům.\n\nA v jejich čele stojí chán Kenesary, vyzdvižený na bílých plstích svými loajalisty ve třech žuzích, přísahající, že se nikdy nevrátí domů, dokud si car troufá nazývat jeho země svým majetkem."
 kazakhstan_events.1.a: "Svolejte loajální sultány a rozdrťte toto povstání!"
 kazakhstan_events.1.b: "Kazašský lid se nikdy nepodrobí vetřelcům!"
 kazakhstan_events.2.t: "[SCOPE.sCharacter('kenesary_scope').GetFirstName]ova jízda"
 kazakhstan_events.2.d: "Karavana doprovázená kozáky, pohybující se stepí [SCOPE.sState('akmolinsk_state').GetStateRegion.GetName], byla napadena početnou a dobře vycvičenou skupinou kazašských povstalců vedených aristokratem [SCOPE.sCharacter('kenesary_scope').GetFullName]."
 kazakhstan_events.2.f: "Přišli v noci a zaútočili na tábor ze všech stran, oddíl jezdců o stovkách mužů, tak náhle, jako by se zrodili z moře trávy obklopujícího stany. Hlídky pobili během okamžiků, zatímco se střetávaly čepele a zaznívaly výstřely ze standardizovaných mušket vyrobených ve zbrojních dílnách v Tule i z pestré směsice palných zbraní pocházejících z pozůstatků půlky kontinentu.\n\nStačilo jen pár okamžiků a kakofonie utichla, jezdci zmizeli a zanechali po sobě jen doutnající plátno a dvě desítky zjizvených přeživších."
 kazakhstan_events.2.a: "Uveďte pohraniční linie do pohotovosti."
 notification_kazakhstan_ride_of_kenesary_notification_name: "[SCOPE.sCharacter('kenesary_scope').GetFullName] zahajuje povstaleckou kampaň"
 notification_kazakhstan_ride_of_kenesary_notification_desc: "Povstalecký vůdce [SCOPE.sCharacter('kenesary_scope').GetFullName] zahájil dlouhodobou kampaň vojenských akcí proti [SCOPE.sCountry('russia_scope').GetAltAdjective('D')] a jejich protektorátům ve třech žuzích."
 kazakhstan_events.3.t: "Tiché stepi"
 kazakhstan_events.3.d: "Po pacifikaci povstaleckého chanátu a popravě chána Kenesaryho může nyní [ROOT.GetCountry.GetAltAdjective('yy')|l] stát bez odporu uplatňovat svou moc napříč celým kazašským územím."
 kazakhstan_events.3.f: "Kameny, plačte! Ticho, úsvite!\nZříťte se, pyšné útesy!\nUmlkni, veselá písni potoka!\nNení Kenesary, posel nebes —\nje mrtev."
 kazakhstan_events.3.a: "Musíme postupovat dále do Turkestánu."
 kazakhstan_events.3.b: "Nejprve upevněme naše zisky zde."
 kazakhstan_events.4.t: "Napadena kozácká hlídka"
 kazakhstan_events.4.d: "Oddíl sibiřských kozáků v [SCOPE.sState('raid_state').GetName] byl přepaden a pobit skupinou kazašských povstalců pod praporem [SCOPE.sCharacter('kenesary_scope').GetFullName]."
 kazakhstan_events.4.f: "„Všude panuje nepořádek. Pramení částečně z neodpustitelného opomenutí a částečně ze zbabělosti kozáků, kteří se marně snaží přehánět síly nepřítele, aby alespoň částečně ospravedlnili svou zavrženíhodnou nedbalost.“"
 kazakhstan_events.4.a: "Poskytněte náhradu [SCOPE.sCountry('kazakh_scope').GetRuler.GetPrimaryRoleTitle] za karavanu."
 kazakhstan_events.4.b: "Je povinností Kazachů zajistit vlastní území."
 notification_kazakhstan_cossack_patrol_attacked_notification_name: "[SCOPE.sCountry('russia_scope').GetAltAdjective('aa')] kozácká hlídka přepadena v [SCOPE.sState('raid_state').GetName]"
 notification_kazakhstan_cossack_patrol_attacked_notification_desc: "Povstalci loajální k [SCOPE.sCharacter('kenesary_scope').GetFullName] přepadli hlídku sibiřských kozáků v [SCOPE.sState('raid_state').GetName]."
 kazakhstan_events.5.t: "Pohraniční pevnost přepadena"
 kazakhstan_events.5.d: "Jedna z našich pevností ve stepích [SCOPE.sState('raid_state').GetName] byla přepadena skupinou kazašských povstalců pod vedením [SCOPE.sCharacter('kenesary_scope').GetFullName]. Po dobytí pevnosti a rozehnání posádky povstalci nemilosrdně zpustošili nejbližší ruská sídla."
 kazakhstan_events.5.f: "Když se průzkumníkův kůň přiblížil k místu, kde bývala brána, spatřil, co zůstalo. Trosky stále pokrývala vrstva popela, zanechaná požárem, který ožehnul a zčernal trámy i zemní opevnění tvořící hradby. Od vypálení pevnosti nepadl déšť, a tak popel uchoval to, co zbylo.\n\nTam, kde stála pevnost, je nyní hrob. Tam, kde byla posádka, zůstal jen přetrvávající pach kouře."
 kazakhstan_events.5.a: "Místní nesou za tuto katastrofu plnou odpovědnost."
 kazakhstan_events.5.b: "Musíme věnovat více prostředků na ochranu našich zájmů."
 notification_kazakhstan_fortress_raid_notification_name: "[SCOPE.sCountry('russia_scope').GetAltAdjective('aa')] pohraniční pevnost zničena povstalci"
 notification_kazakhstan_fortress_raid_notification_desc: "Pohraniční pevnost [SCOPE.sCountry('russia_scope').GetAltAdjective('G')] byla přepadena a vypálena silami [SCOPE.sCharacter('kenesary_scope').GetFullName] v [SCOPE.sState('raid_state').GetName]."
 kazakhstan_events.6.t: "Loajální auly pobity"
 kazakhstan_events.6.d: "Povstalecké síly [SCOPE.sCharacter('kenesary_scope').GetFullName] přepadly skupinu loajálních aulů v [SCOPE.sState('raid_state').GetName] a šíří teror mezi těmi Kazachy, kteří zůstávají věrní správě vrchního sultána [SCOPE.sCharacter('senior_sultan_scope').GetFullName]."
 kazakhstan_events.6.f: "„Jak máme prokazovat věrnost tobě, který si strkáš do kapsy ruské peníze, skrýváš se za ruskými strážemi ve městě postaveném Rusy? Proč bychom měli cítit strach, který ty tak právem pociťuješ?“"
 kazakhstan_events.6.a: "Přináší zkázu vlastnímu lidu."
 kazakhstan_events.6.b: "Musíme požádat o další pomoc [SCOPE.sCountry('russia_scope').GetRuler.GetPrimaryRoleTitle]."
 notification_kazakhstan_auls_slaughtered_notification_name: "Kazašské auly pobity v [SCOPE.sState('raid_state').GetName]"
 notification_kazakhstan_auls_slaughtered_notification_desc: "Síly [SCOPE.sCharacter('kenesary_scope').GetFullName] pobily kazašské auly v [SCOPE.sState('raid_state').GetName], které byly loajální k [ROOT.GetCountry.GetAltAdjective('I')] dosazenému vrchnímu sultánovi."
 kazakhstan_events.7.t: "Chánova korespondence"
 kazakhstan_events.7.d: "Domnělý chán Kazachů, [SCOPE.sCharacter('kenesary_scope').GetFullName], zaslal dopis [SCOPE.sCharacter('ruler_scope').GetFullName], v němž žádá o alianci s [ROOT.GetCountry.GetAltAdjective('I')] proti svým rivalům v Rusku a Kazachstánu."
 kazakhstan_events.7.f: "„Znovu a znovu jsem žádal ruského cara i jeho poddané o mír a přátelství, a přesto neprojevili žádné upřímné úmysly. Jejich touha ovládnout naše domovy roste rok od roku — letos jsou to ruské pevnosti na řece Irtyš, příště to bude Sarysu.“"
 kazakhstan_events.7.a: "Rusové a jejich vazalové jsou hrozbou pro nás všechny."
 kazakhstan_events.7.b: "Nebudeme součástí jeho boje."
 kazakhstan_events.8.t: "Kazašský nájezd odražen"
 kazakhstan_events.8.d: "Kazašská povstalecká jednotka loajální k [SCOPE.sCharacter('kenesary_scope').GetFullName] se pokusila zaútočit na [ROOT.GetCountry.GetAltAdjective('ou')|l] pevnost v [SCOPE.sState('raid_state').GetName], ale byla odražena místní posádkou."
 kazakhstan_events.8.f: "Když se jezdci objevili na obzoru, posádka už byla připravena. V sevřených řadách na hradbách přivítala ničivý první útok salvou z mušket a kozácká jízda se zapojila do smrtícího střetu, který následoval.\n\nKdyž hrůza skončila, muži i koně zůstali křičet v bolestech a stepní tráva byla napojena krví svých synů."
 kazakhstan_events.8.a: "Pochvalte vojáky za jejich statečnou obranu."
 kazakhstan_events.8.b: "Generál [SCOPE.sCharacter('casia_general').GetFullName] si zaslouží uznání za své činy."
 notification_kazakhstan_raid_repelled_notification_name: "[SCOPE.sCountry('russia_scope').GetAltAdjective('aa')] posádka pevnosti odrazila nájezd"
 notification_kazakhstan_raid_repelled_notification_desc: "Posádka [SCOPE.sCountry('russia_scope').GetAltAdjective('ee')|l] pevnosti v [SCOPE.sState('raid_state').GetName] odrazila nájezd sil loajálních k [SCOPE.sCharacter('kenesary_scope').GetFullName]."
