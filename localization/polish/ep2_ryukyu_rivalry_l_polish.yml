 je_ryukyu_rivalry_sway_merchants_button_desc: "Dozorem nad přístavem Naha můžeme vyslat vyslance na dvůr, aby ovlivňovali, které zahraniční mocnosti získají přístup k obchodu a tributům." # todo: CHANGED
