 ryukyu_rivalry.1.t: "Tributární úvahy" # todo: CHANGED
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName] postupně upřednostňuje [ROOT.GetCountry.GetName]. V reakci [SCOPE.sCountry('rival_scope').GetName] urychlila své diplomatické snahy, projevujíc úctu a potichu posilujíc povinnosti tributárního vztahu [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]." # todo: CHANGED
 ryukyu_rivalry.1.f: "Pečetěné krabice byly v ryukyuanské síni uloženy s velkou pečlivostí. Dvořané si šeptali za paravány, zatímco se dopisy četly nahlas: jeden zapečetěný červenou pečetí Číny, druhý nesoucí pečlivou kaligrafii Japonska. Každou větou vytyčovali povinnosti a sliby, když se dvě mocnosti snažily přitáhnout království na svou stranu." # todo: CHANGED
 ryukyu_rivalry.1.a: "Vystosovat formální protest [SCOPE.sCountry('rival_scope').GetName]." # todo: CHANGED
 ryukyu_rivalry.1.b: "Využít naše zavedené vazby v [SCOPE.sCountry('ryukyu_scope').GetName]." # todo: NEW TRANSLATION
 ryukyu_rivalry.1.c: "Připomenout dvoru naši dlouhodobou patronaci." # todo: CHANGED
 ryukyu_rivalry.1.e: "Tato záležitost nevyžaduje zásah." # todo: NEW TRANSLATION
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName] je podřízené [ROOT.GetCountry.GetName] s [concept_liberty_desire] nižší než #v 25#!" # todo: CHANGED
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName] není podřízené [ROOT.GetCountry.GetName] s alespoň #v Amicable#! [concept_relations]" # todo: CHANGED
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName] vlastní alespoň 3 [Concept('concept_building','$concept_buildings$')] v [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]" # todo: NEW TRANSLATION
 ryukyu_rivalry.2.t: "Rivalita v přístavech" # todo: CHANGED
 ryukyu_rivalry.2.d: "Přítomnost [SCOPE.sCountry('rival_scope').GetAdjective] vyslanců v přístavech [SCOPE.sCountry('ryukyu_scope').GetName] přilákala pozornost a spolupráci mnoha [GetCulture('ryukyuan').GetName] obchodníků, čímž posílila jejich postavení v očích dvora. Náš vlastní vliv se naopak snížil." # todo: CHANGED
 ryukyu_rivalry.2.f: "Obchodní knihy byly zavírány a znovu otevírány pod jinými pečetěmi. Ti, kdo kdysi hledali naše záruky, nyní setrvávali v jiných přijímacích síních, hovoříce o upravených clech a bezpečnějším průchodu. Zdálo se, že mince našly přesvědčivějšího správce." # todo: CHANGED
 ryukyu_rivalry.2.a: "Nekalá hra." # todo: CHANGED
 ryukyu_rivalry.3.t: "Návštěva generála v [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]" # todo: NEW TRANSLATION
 ryukyu_rivalry.3.d: "Generál, [SCOPE.sCharacter('ryukyu_general_scope').GetFullName], se svým doprovodem důstojníků dorazil do [SCOPE.sCountry('ryukyu_scope').GetName], zjevně aby prověřil pobřežní opevnění. Jeho přítomnost byla přijata s úctivým podřízením, posilujíc vliv [SCOPE.sCountry('rival_scope').GetName] u dvora a nenápadně oslabujíc ten náš." # todo: CHANGED
 ryukyu_rivalry.3.f: "Generál kráčel po hradbách se svými [SCOPE.sCharacter('ryukyu_general_scope').GetHerHis] důstojníky, zapisujíc si každé dělo a strážní věž. Ryukyuanské síly se postavily do formace, dobře si vědomy hodnotících očí. Každý úkon a pozdrav pomáhal utužovat neviditelné nitě tkané mezi oběma mocnostmi." # todo: CHANGED
 ryukyu_rivalry.3.a: "Nebezpečné vyhrocení." # todo: CHANGED
 ryukyu_rivalry_risk_of_confrontation: "@warning! If forces from both [SCOPE.sCountry('china_scope').GetName] and [SCOPE.sCountry('japan_scope').GetName] are inspecting coastal defenses, a #r confrontation#! may break out" # todo: CHANGED
 ryukyu_rivalry.4.t: "Návštěva generála" # todo: NEW TRANSLATION
 ryukyu_rivalry.4.d: "Generál, [SCOPE.sCharacter('ryukyu_general_scope').GetFullName], se svým doprovodem důstojníků z [SCOPE.sCountry('from_scope').GetName] byl přijat v [SCOPE.sCountry('ryukyu_scope').GetName], připraven prověřit naše pobřežní opevnění. Jeho přítomnost byla přijata s úctivým podřízením." # todo: CHANGED
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$" # todo: NEW TRANSLATION
 ryukyu_rivalry.4.a: "Pozorně je sledovat." # todo: CHANGED
 ryukyu_rivalry_officer_arrives: "[concept_general] z [SCOPE.sCountry('from_scope').GetName] je nyní k dispozici" # todo: CHANGED
 ryukyu_rivalry.5.t: "Osud [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]" # todo: NEW TRANSLATION
 ryukyu_rivalry.5.d_victor: "Naše úsilí v [SCOPE.sCountry('ryukyu_scope').GetName] přineslo ovoce. Prostřednictvím trvalého diplomatického, ekonomického a politického tlaku nyní jejich dvůr hledí k nám pro vedení a otázka jejich suverenity byla vyřešena v náš prospěch." # todo: CHANGED
 ryukyu_rivalry.5.d_loser: "Navzdory našemu úsilí [SCOPE.sCountry('victor_scope').GetName] získala rozhodující vliv nad [SCOPE.sCountry('ryukyu_scope').GetName]. Jejich dvůr přijal novou politickou realitu, umisťujíc ostrovy pevně do sféry [SCOPE.sCountry('victor_scope').GetNameNoFormatting]." # todo: CHANGED
 ryukyu_rivalry.5.d_ryu: "Rovnováha, kterou jsme se snažili udržet, již není možná. Pod rostoucím tlakem [SCOPE.sCountry('victor_scope').GetName] náš dvůr přijal nové politické uspořádání. Budoucnost [SCOPE.sCountry('ryukyu_scope').GetName] se nyní bude odvíjet pod jejich vzestupem." # todo: CHANGED
 ryukyu_rivalry.5.f_annexed: "Proklamace, psané inkoustem ještě čerstvým na pečetích vydaných v [SCOPE.sCountry('victor_scope').GetCapital.GetName], byly přečteny na tržišti v Nahě. [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting] prapory byly staženy a nahrazeny standarem vládce. Do večera byla zřízena správní kancelář a vyvěšena nová nařízení." # todo: CHANGED
 ryukyu_rivalry.5.f_subject: "Proklamace, psané inkoustem ještě čerstvým na pečetích vydaných v [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting], byly přečteny na tržišti v Nahě. Každý dekret vymezoval nové postavení [SCOPE.sCountry('ryukyu_scope').GetName] v rámci říše. Dlouho tributární k vzdáleným dvorům, království nyní vidělo své úředníky vázané formálními povinnostmi vůči větší moci. Do večera byl jeho směr určen." # todo: CHANGED
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] se stává [SCOPE.sCountry('victor_scope').GetName] [concept_puppet]" # todo: NEW TRANSLATION
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] je převedeno jako [concept_subject] na [SCOPE.sCountry('victor_scope').GetName]" # todo: NEW TRANSLATION
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName] anektuje [SCOPE.sCountry('ryukyu_scope').GetName]" # todo: CHANGED
 ryukyu_rivalry.5.a: "Tak je rozhodnuto." # todo: NEW TRANSLATION
 ryukyu_rivalry.6.t: "Konfrontace v [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]" # todo: NEW TRANSLATION
 ryukyu_rivalry.6.d_brawl: "Důstojníci vyslaní [SCOPE.sCountry('japan_scope').GetName] a [SCOPE.sCountry('china_scope').GetName] se dali do potyčky při inspekci pobřežních opevnění [SCOPE.sCountry('ryukyu_scope').GetName]. Spor vyústil v jednu smrt, což vyvolalo úzkostné pohledy na dvoře Ryukyu." # todo: CHANGED
 ryukyu_rivalry.6.d_accident: "Síly z [SCOPE.sCountry('japan_scope').GetName] a [SCOPE.sCountry('china_scope').GetName] nasazené k inspekci pobřežních opevnění se překrývaly na stejných opevněních v [SCOPE.sCountry('ryukyu_scope').GetName], způsobujíc zmatek v posádce a krátkou výměnu palby." # todo: CHANGED
 ryukyu_rivalry.6.d_fire: "V ubytování přiděleném zahraničním inspekčním misím v [SCOPE.sCountry('ryukyu_scope').GetName] vypukl požár, který pohltil čtvrti [SCOPE.sCountry('japan_scope').GetAdjective] a [SCOPE.sCountry('china_scope').GetAdjective] kontingentů. Příčina zůstává nejasná, ač místní úředníci šeptají o špatně umístěných lucernách." # todo: CHANGED
 ryukyu_rivalry.6.f: "Důstojník Kaimon běhal mezi strážními věžemi a sklady, předávajíc rozkazy strážím. Každý pokyn byl vykřičen, popřen a rychle zopakován. Ač nakonec nastal klid, Kaimon si znovu uvědomil, jak mohou konkurenční mise mezi cizími mocnostmi odhalit křehkou situaci Ryukyu." # todo: CHANGED
 ryukyu_rivalry.6.a: "Napětí eskaluje." # todo: NEW TRANSLATION
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective] a [SCOPE.sCountry('china_scope').GetAdjective] [concept_infamy] se zvýšila o #v 6#!" # todo: CHANGED
 ryukyu_rivalry.7.t: "Ryukyuanské nařízení" # todo: CHANGED
 ryukyu_rivalry.7.d_ryukyu: "Po letech pečlivého sledování a nenápadné diplomacie náš dvůr oznámil úmysl spravovat své záležitosti bez vnějšího vměšování. Dvůr stanovil pevné hranice cizímu vlivu a zajistil prvenství vlastních rituálů, ministrů a tradičních rad. Království si nyní razí vlastní cestu." # todo: CHANGED
 ryukyu_rivalry.7.d: "Po letech pečlivého sledování a nenápadné diplomacie se [SCOPE.sCountry('ryukyu_scope').GetName] osvobodilo od našeho vlivu a prohlásilo úmysl spravovat své záležitosti bez vnějšího vměšování. Dvůr stanovil pevné limity naší přítomnosti, zachovávajíc své rituály, ministry a tradiční rady, zatímco se království odvrací od naší autority." # todo: CHANGED
 ryukyu_rivalry.7.f: "Pečeti a registry tributů byly roztrhány a rozházeny po leštěných podlahách hradu Shuri. V audienčních síních byl stále cítit vliv cizích mocností, ale už nediktoval kroky. Cesta Ryukyu by se rozvíjela jako křehká neutralita, získaná trpělivou diplomacií." # todo: CHANGED
 ryukyu_rivalry.7.a: "Otázka věrnosti je vyřešena." # todo: NEW TRANSLATION
 ryukyu_rivalry.7.b: "Možnost použití síly nám zůstává." # todo: CHANGED
 ryukyu_rivalry.8.t: "Skryté území" # todo: CHANGED
 ryukyu_rivalry.8.d: "S otevřením přístavů [SCOPE.sCountry('japan_scope').GetName] znovu vyvstala dávno spící otázka loajality [SCOPE.sCountry('ryukyu_scope').GetName]. Po generace království kráčelo opatrnou cestou: navenek tributární [SCOPE.sCountry('china_scope').GetName], přitom tiše udržující věrnost [SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Obě mocnosti nyní musí zvážit, jak prosadit svůj vliv." # todo: CHANGED
 ryukyu_rivalry.8.f: "Lampiony zářily podél chodeb hradu Shuri, osvětlujíce vermilionové trámy, které králové Chūzan povýšili za svých velkých dnů. Pod malovanými stropy úředníci kladli tribut vedle dekretů Satsumy. Dvůr dlouho balancoval mezi investiturou ze Středního království a stínem Kagoshimy. Klid zatím přetrvával, ale otázka loajality brzy požádá o plnou pozornost." # todo: CHANGED
 ryukyu_rivalry.8.a: "Záležitost zůstává nevyřešená." # todo: NEW TRANSLATION
