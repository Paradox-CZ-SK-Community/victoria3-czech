 je_ryukyu_rivalry_inspect_defenses_button_desc: "Po zajištění vojenského přístupu můžeme poslat důvěryhodného generála, aby prozkoumal opevnění Ryukyu a zajistil, že hradby a strážní věže odrážejí náš dohled a strategické záměry." # todo: CHANGED
