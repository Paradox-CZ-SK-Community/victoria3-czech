 vampire_panic.1.t: "Podivná pověra"
 vampire_panic.1.d: "Ze státu [SCOPE.sState('vampire_state').GetName] přišly zprávy o podivné nemoci sužující členy téže rodiny. Místní začali exhumovat těla mrtvých ve snaze zastavit takzvanou „kletbu“."
 vampire_panic.1.f: "„Nemyslíte, že existují věci, které nemůžete pochopit, a přesto existují; že někteří lidé vidí věci, které jiní nemohou? Ale existují věci staré i nové, o nichž lidské oči nesmí rozjímat, protože znají — nebo si myslí, že znají — určité věci, které jim řekli jiní lidé.\n\nAch, je to vina naší vědy, že chce všechno vysvětlit; a pokud to nevysvětlí, pak říká, že není co vysvětlovat.“" #Bram Stoker
 vampire_panic.1.d.cullen: "Ze státu [SCOPE.sState('vampire_state').GetName] přišly zprávy o podivné nemoci sužující členy rodiny Cullenových. Místní začali exhumovat těla mrtvých ve snaze zastavit takzvanou „kletbu“."
 vampire_panic.1.a: "Jen další případ venkovských pověr."
 vampire_panic.1.b: "Několik profesorů projevilo o tuto záležitost zájem."
 vampire_panic.1.c: "[SCOPE.gsInterestGroup('devout_ig').GetName] by rádi prozkoumali těla."
 vampire_research_modifier: "Výzkum pověr"
