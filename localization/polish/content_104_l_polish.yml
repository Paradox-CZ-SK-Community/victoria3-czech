l_polish:
 congo_river_expedition: "Expedice po řece Kongo"
 congo_river_expedition_desc: "Srdce afrického kontinentu zůstává pro mnohé záhadou. Vyšleme expedici, aby zmapovala tok řeky Kongo."
 congo_river_expedition_tooltip: "Požadavky:"
 modifier_congo_river_expedition_complete: "Zmapován tok řeky Kongo"
 expedition_events.601.t: "Expedice po řece Kongo"
 expedition_events.601.d: "Byla vypravena expedice, která má prozkoumat řeky Lualaba a Kongo."
 expedition_events.601.f: "K účasti na expedici do samotného srdce přírody byla shromážděna řada odborníků z různých oborů. Jejich mladistvé nadšení se tiše mísí s obezřetným strachem, který naši nejzkušenější průzkumníci pociťují vůči nezmapovanému kontinentu."
 expedition_events.601.a: "Dobrý nápad."
 expedition_events.601.b: "Teď ne."
 expedition_events.602.a: "[SCOPE.sCharacter('expedition_leader_1').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_1').GetFullName]"
 expedition_events.602.b: "[SCOPE.sCharacter('expedition_leader_2').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_2').GetFullName]"
 expedition_events.602.c: "[SCOPE.sCharacter('expedition_leader_3').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_3').GetFullName]"
 expedition_events.603.t: "Volba rozpočtu"
 expedition_events.603.d: "Kolik peněz chcete přidělit na rozpočet expedice?"
 expedition_events.603.f: "„Mohli bychom narazit na nejrůznější překážky a čím více financí budeme mít, tím lépe budeme připraveni.“"
 expedition_events.603.a: "Malou částku."
 expedition_events.603.b: "Střední částku."
 expedition_events.603.c: "Velkou částku."
 expedition_events.604.t: "Expedice dorazila"
 expedition_events.604.d: "Po několika týdnech příprav a cestování dorazila expedice vedená [SCOPE.sCharacter('expedition_leader').GetFullName] k ústí Konga. Odtud zahájí svou cestu za zmapováním toku této nepolapitelné řeky."
 expedition_events.604.f: "„Plout proti proudu té řeky bylo jako cestovat zpět k nejranějším počátkům světa, kdy se vegetace bouřlivě rozrůstala po zemi a velké stromy byly králi. Prázdný proud, veliké ticho, neproniknutelný les. Vzduch byl teplý, hustý, těžký, malátný. V záři slunce nebyla žádná radost. Dlouhé úseky vodní cesty se táhly dál, opuštěné, do šera zastíněných dálek.“" #Joseph Conrad
 expedition_events.604.a: "Vpřed!"
 expedition_events.611.t: "Úspěšná expedice"
 expedition_events.611.d: "[SCOPE.sCharacter('expedition_leader').GetFullName] se triumfálně vrátil a tok i pramen řeky Kongo byly zmapovány."
 expedition_events.611.f: "„Návrat domů má být tou nejsnazší částí a v jistém smyslu jí opravdu byl. Ale džungle si nás navždy vzala, uchvátila naše duše v opojení i hrůze — část nás tam navždy zůstala. Když jsem tam zavřel oči, viděl jsem svou rodinu; když zavřu oči tady, vidím jen vytrvalou, pohlcující zeleň.“"
 expedition_events.611.a: "Výborné zprávy!"
 congo_expedition_modifier: "Úspěšná expedice do Konga"
 expedition_events.612.t: "Neúspěšná expedice"
 expedition_events.612.d: "Po mnoha měsících bez jakýchkoli zpráv je jasné, že expedice, která měla zmapovat tok řeky Kongo, selhala a [SCOPE.sCharacter('expedition_leader').GetFullName] se spolu s ní ztratil."
 expedition_events.612.d2: "Po mnoha měsících bez jakýchkoli zpráv se zdál osud expedice jasný; dnes ráno však konečně dorazil dopis od [SCOPE.sCharacter('expedition_leader').GetFullName], v němž přiznává, že jediný způsob, jak žít, byl vrátit se."
 expedition_events.612.f: "„Vidíte ten příběh? Vidíte vůbec něco? Připadá mi, že se vám snažím vyprávět sen — marně, protože žádné vylíčení snu nedokáže předat pocit snu, to prolínání absurdity, překvapení a zmatení v chvění zápasící vzpoury, tu představu, že jste zajati neuvěřitelným, což je sama podstata snů…“"
 expedition_events.612.a: "Zatraceně!"
 expedition_events.612.b: "Zatraceně!"
 failed_congo_river_expedition_modifier: "Neúspěšná expedice do Konga"
 expedition_events.620.t: "Opravy člunu"
 expedition_events.620.d: "Náš člun byl poškozen nepozorovaným balvanem při pokusu proplout jedním z nejužších meandrů řeky ve státě [SCOPE.sState('current_expedition_location').GetName]."
 expedition_events.620.f: "„Zužující se vody proudí mezi rozeklanými skalami, dřevěnými troskami a unášenými zbytky džungle, která nás obklopuje. Člověk by se v této řece mohl ztratit — dokonce se opravdu ztratit ve vlastní mysli — a tyto ruiny by mohl zaměnit za ruiny své vlastní.\n\nPrudký zvuk nás vytrhl z dětského zasnění, ze vzpomínek na jednodušší časy na jiném místě, v jiné době, tak vzdálené, že pohlcuje tuto existenci a proměňuje ji v cosi divočejšího, cosi osamělejšího. Když jsme se šli podívat, co se stalo, zjistili jsme, že část trupu byla vážně poškozena.“"
 expedition_events.620.a: "Musíme zastavit a postarat se o to."
 expedition_events.620.b: "Nemůžeme si dovolit ztratit žádný čas."
 expedition_events.620.c: "Snadno to dokážeme opravit za pár dní."
 expedition_events.630.t: "Bílá mlha"
 expedition_events.630.d: "Za úsvitu se expedice probouzí a zjišťuje, že ji obklopuje hustá bílá mlha, která jí výrazně zhoršuje viditelnost."
 expedition_events.630.f: "„Byla tam před námi: viskózní a sražená vrstva odporného dechu přírody, jako masa zkažené slonovinové krve, kvůli níž nebylo možné odhadnout, kde je náš parník, ani dokonce poznat, kdo je muž vedle nás, nebo zda je ještě naživu.\n\nByl klid. A tato nehybnost života se ani v nejmenším nepodobala míru.“"
 expedition_events.630.a: "Měli bychom ji ignorovat a pokračovat v cestě."
 expedition_events.630.b: "Za těchto podmínek není bezpečné vyplout."
 expedition_events.640.t: "Krokodýli!"
 expedition_events.640.d: "Při plavbě po řece je jeden z našich mužů nenávratně stažen pod hladinu, když kontroluje stav trupu."
 expedition_events.640.f: "„Na stříbřitých písčinách se bok po boku slunili hroši a aligátoři. Za úsvitu byl slyšet výkřik, ale přišel v podobě neklidného a hlučného snu, na nějž se s údivem vzpomíná uprostřed ohromujících skutečností tohoto podivného světa rostlin, vody a křiku. Když jsme ospale následovali ten zvuk, zjistili jsme, že jeden z našich mužů byl vtažen do hlubin řeky párem ostrých čelistí, jasnýma očima a smaragdovou kůží.“"
 expedition_events.640.a: "Bojuj o život!"
 expedition_events.641.t: "Život vítězí"
 expedition_events.641.d: "Po nekonečné minutě boje se našemu muži podaří zablokovat krokodýlí čelisti dřevěným prknem a rychle se dostat zpět na palubu."
 expedition_events.641.f: "„Křik, zápas a strach. Údery, kousání a plavání. Zavřené oči, třesoucí se ruce a úlevné vzdechy. Dívali jsme se na muže, který bojoval se samotnou smrtí. Položil jsem mu ruku na rameno: „Teď si odpočiň.““"
 expedition_events.641.a: "Dejte tomu muži přidáno!"
 expedition_events.642.t: "Chvíle ticha"
 expedition_events.642.d: "Po nekonečné minutě boje se příroda ukáže jako neodvratná."
 expedition_events.642.f: "„Ostrý zvuk zavírajících se čelistí je přerušen měkčí texturou. Přáli bychom si mít moc přestat slyšet. Parník si razí cestu sametově zbarvenou vodou.“"
 expedition_events.642.a: "Bude zapamatován."
 expedition_events.650.t: "Zadní kolona"
 expedition_events.650.d: "Dorazili jsme do misionářského tábora a našli tam jídlo a odpočinek, po nichž jsme toužili. Nedostatek potravin během naší cesty svedl jednoho muže k žádosti o rozdělení expedice."
 expedition_events.650.f: "„Nic podobného jeho výrazu jsem nikdy předtím neviděl — nebo snad ano, v mladších letech, kdy se okouzlení a naděje mísily s ctižádostí a touhou. Ach, nebyl jsem dojat, byl jsem vyděšen. Kůže kolem jeho úst nebyla prohnutá do úsměvu, ale rozpraskaná extází. „Nechte mě zůstat vzadu, [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting], prosím vás.““"
 expedition_events.650.a: "Nemůžeme zajistit nasycení všech našich mužů."
 expedition_events.650.b: "Expedici nelze rozdělit."
 expedition_events.650.tt: "Muži jsou ponecháni vzadu."
 expedition_events.651.t: "Zprávy od zadní kolony"
 expedition_events.651.d: "Do [ROOT.GetCountry.GetAltAdjectiveNoFlag('G')] byly odeslány dopisy několika počestnými muži, kteří za námi stále zůstávají naživu. Zadní kolona se proměnila v pochmurný kruh jakéhosi Pekla."
 expedition_events.651.f: "„Nedokázali jsme ani odhadnout osud těch, které jsme nechali za sebou. Pokračovali jsme v plavbě a neohlíželi se, protože pokušení výčitek nás mohlo dostihnout a naplnit lítostí, že jsme sami nezůstali vzadu. Zvěrstva, která se tam odehrávala, nám byla neznámá, netušená. A možná to tak bylo lepší.“"
 expedition_events.651.a: "Jméno expedice bylo poskvrněno."
 expedition_events.652.t: "Vzpoura!"
 expedition_events.652.d: "Muži, kteří požadovali rozdělení expedice, vyvolali vzpouru."
 expedition_events.652.f: "„Prchavé pohledy, vyhýbavá slova. Ve tvářích některých našich mužů bylo něco, kvůli čemu jsem si přál, abych byl vyslyšel jejich žádosti zůstat vzadu — ne proto, že bych chtěl splnit jejich sobecká přání, ale proto, že mi jejich společnost začala být odporná.\n\n„Pane [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting],“ zaslechl jsem, když jsem se otočil tváří v tvář chladné hlavni mířící na mou hruď, „bylo by záhodno vrátit se.““"
 expedition_events.652.a: "Pryč se zrádci!"
 modifier_expedition_rear_column_disaster: "Katastrofa zadní kolony"
 expedition_events.660.t: "Obchodní enkláva"
 expedition_events.660.d: "Expedice dorazila k arabské obchodní výspě, jejíž kupci nám nabídli výměnu svého jídla za část naší munice a zbraní."
 expedition_events.660.f: "„Sledovali jsme obrovského rozvinutého hada, jeho hlavu v moři, jeho tělo klidně se vinoucí daleko přes rozlehlou zemi a jeho ocas ztracený v hlubinách pevniny. Sledovali jsme ten ocas jako skupina nenasytných lovců, a pak se had ztratil.\n\nKdyž jsme se vynořili z džungle, objevila se před námi malá enkláva, jejíž obyvatelé byli oděni po způsobu mužů ze severu od pouště. Dívali se na nás zvědavýma očima a ukazovali na naše zbraně. „Jídlo,“ řekl jeden z nich a ukázal našim hladovým a poraženým lovcům bochník chleba.“"
 expedition_events.660.a: "Potřebujeme více jídla."
 expedition_events.660.b: "Potřebujeme zbraně."
 expedition_event_decreasing_peril_tt: "Tím se #tooltippable;TOOLTIP:expedition_peril_explanation_tt sníží #!aktuální nebezpečí expedice."
 expedition_events.670.t: "Do džungle"
 expedition_events.670.d: "Naše odhady nepočítaly s obtížemi, které les ve státě [SCOPE.sState('current_expedition_location').GetName] způsobí naší expedici. Dva měsíce, které jsme této oblasti Konga vyhradili, se s největší pravděpodobností zdvojnásobí."
 expedition_events.670.f: "„Nedokázali jsme pochopit, že už jsme příliš daleko. Snažil jsem se o tom mluvit s našimi důstojníky, ale ti to jen odbývali s tím, že nejsme tak hluboko v džungli. Nedokázali pochopit, že už jsme příliš daleko — ne v džungli, ne na řece, dokonce ani v této neposkvrněné noci hvězdné oblohy a hlubokého ticha.\n\nCestujeme ke konci časů, k počátku časů, k těm prvním věkům, k těmto posledním věkům. Není tu pro nás téměř žádné znamení: postupovat, vrátit se, ticho proti burácející džungli — jen ticho.“"
 expedition_events.670.a: "Je nezbytné, abychom přídělově rozdělili jídlo."
 expedition_events.670.b: "Jsme blíže konci."
 expedition_events.680.t: "Sedm kataraktů"
 expedition_events.680.d: "Při chůzi lesem ve státě [SCOPE.sState('current_expedition_location').GetName] sleduje expedice šum vodních proudů, dokud nedorazí k nezmapovaným vodopádům."
 expedition_events.680.f: "„Bylo to jako zvednout oponu. Zeleň džungle nás přiměla zapomenout na všechny ostatní barvy, byli jsme hluší k živosti světa. A tam to konečně bylo. Pronikli jsme hlouběji a hlouběji do srdce temnoty a prokousali se jím. Snědli jsme je a spolkli, vynořili jsme se zpět se zkrvavenýma rukama, zkrvavenými ústy — červená, nová barva.\n\nOdhrnuli jsme vegetaci stranou a kráčeli dřevem, listím, kamenem. Modrá. Bílá. Vodopády stály před námi, vábivé, velkolepé, inspirující, divoké. Vypadaly jako jediný zdroj vody ve světě žízně.“"
 expedition_events.680.a: "Od nynějška budou známy jako [SCOPE.sCharacter('expedition_leader').GetLastName]ovy vodopády."
 modifier_expedition_waterfalls: "Vodopády na řece Lualaba"
 waterfalls_modifier: "Pojmenovány vodopády"
 expedition_events.690.t: "Velkorysý dar"
 expedition_events.690.d: "Expedice zastavila svou cestu přes stát [SCOPE.sState('current_expedition_location').GetName] v místní vesnici, kde [SCOPE.sCharacter('local_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('local_ruler').GetFullName] laskavě nabídl výměnu darů jako znamení míru."
 expedition_events.690.f: "„Dorazili jsme za úsvitu. Uprostřed džungle jsme slyšeli zvuky a to, co jsme považovali za lidské hlasy. Naše unavená těla se dokázala soustředit jen na ty hlasy, jakékoli hlasy kromě našich vlastních.\n\nDorazili jsme za úsvitu a oni nás nečekali, ale už předtím viděli někoho našeho druhu. [SCOPE.sCharacter('local_ruler').GetWomanMan], který vypadal jako jejich vůdce, k nám přišel, oznámil, že [SCOPE.sCharacter('local_ruler').GetHerHis] jméno je [SCOPE.sCharacter('local_ruler').GetFullNameNoFormatting], a stručnými, přátelskými gesty nás pozval, abychom s nimi strávili den, přičemž mému překvapenému já podal náhrdelník.“"
 expedition_events.690.a: "Tento ohleduplný dar náležitě opětujeme."
 expedition_events.690.b: "Nemáme čas ztrácet čas bratříčkováním s místními."
 urbanization_events.1.t: "Cesta k pokroku"
 urbanization_events.1.d: "[SCOPE.gsInterestGroup('industrialist_ig').GetName] vyjádřili spokojenost se směrem, kterým se země ubírá, i s jejími nově postavenými továrnami."
 urbanization_events.1.f: "„Existuje jen jeden možný směr: vpřed! Pokrok je jako vlak, který nezastavuje, na nikoho nečeká — buď jsi uvnitř, nebo venku.“"
 urbanization_events.1.a: "Udělali jsme to pro náš lid."
 urbanization_events.1.b: "A my ten vlak podpoříme."
 modifier_urbanized_state: "Upřednostněn lid"
 ig_urbanization_industrialists: "Upřednostněni průmyslníci"
 je_urbanization_events_1: "Od farem k továrnám"
 je_urbanization_events_1_reason: "Země rolníků je zemí minulosti. Jak můžeme očekávat, že pokrok dorazí do našich domovů, když tyto domovy nejsou ničím víc než farmami?"
 je_urbanization_events_2: "Urbanizovat [ROOT.GetCountry.GetAltAdjectiveNoFlag('A')]"
 je_urbanization_events_2_reason: "Budoucnost není bílá ani černá, jak říkají staré příběhy — je šedá! Barva vlaku, který nám umožňuje navštěvovat cizí země! Barva továrny, která nám umožňuje zaplatit za takovou cestu! Barva, příteli, pokroku."
 modifier_final_urbanization: "Solidně urbanizováno"
 urbanization_events.2.t: "Ó, město hojnosti"
 urbanization_events.2.d: "Nejvýznamnější členové vyšší společnosti státu [SCOPE.sState('urbanization_state').GetName] byli spatřeni, jak pořádají okázalé večírky v nových a honosných městských budovách."
 urbanization_events.2.f: "„Mramorové zdi, třpytivý kámen. Hluk lidí přicházejících a odcházejících vrací město k životu, ačkoli jsme ani nevěděli, že bylo mrtvé. Vysoké budovy zakrývají západ slunce, děti si hrají s cihlami, kouř se mísí s mraky; vzdálený zvon oznamuje další vlak. Pokrok přichází.“"
 urbanization_events.2.a: "Ať slaví."
 urbanization_events.2.b: "Večírek nikdy neskončí!"
 modifier_ig_industrialists_urbanization: "Spokojeni s urbanizací"
 modifier_strong_urbanized_state: "Zlepšení urbanizace"
 urbanization_events.4.t: "Vznesené obavy"
 urbanization_events.4.d: "[SCOPE.gsInterestGroup('opposing_ig').GetName] vyjádřili své obavy ohledně vládních rozhodnutí, která jasně upřednostňují zájmy skupiny [SCOPE.gsInterestGroup('industrialist_ig').GetName]."
 urbanization_events.4.f: "„Rozhodovat se je vždy těžké; ne proto, že by bylo obtížné učinit rozhodnutí, ale proto, že následky mohou být trochu... nepříjemné. Zvěsti se šíří jako kouř z továrny a zamořují čistý vzduch země [ROOT.GetCountry.GetNameNoFormatting] hustým a záludným jedem.“"
 urbanization_events.4.a: "To je třeba řešit."
 urbanization_events.4.b: "Musí přijmout, že nemůžeme vždy vyhovět všem."
 modifier_ig_happy_urbanization: "Obavy ohledně urbanizace vyřešeny"
 modifier_ignored_ig_urbanization: "Obavy ohledně urbanizace ignorovány"
 modifier_ig_happy_urbanization_bad: "Nesouhlasí s obavami ohledně urbanizace"
 modifier_ig_ignored_urbanization: "Nesouhlasí s ignorováním obav"
 urbanization_events.5.t: "Vítr změn"
 urbanization_events.5.d: "[SCOPE.sState('urbanization_state').GetName] urazil dlouhou cestu od chvíle, kdy jsme se o něj začali zajímat: od malých domů a roztroušené zemědělské půdy až k tomu, že se z něj stává vzkvétající metropole."
 urbanization_events.5.f: "Žena si povzdechne a její staré ruce na okamžik přestanou háčkovat. „Když jsem byla mladší, všude tady byla zemědělská půda. My děti jsme si prostě volně hrály na polích a nemusely se bát, že nás srazí vůz nebo že si pro nás přijdou nějací zločinci. A pořád jsme měly čas pracovat!“\n\n„No, babičko, teď budou mít lidé ještě více míst, kde pracovat.“"
 urbanization_events.5.a: "Konečně [SCOPE.sState('urbanization_state').GetName] září jako nikdy předtím."
 urbanization_events.5.b: "Tohle není konec!"
 modifier_heavily_urbanized: "Silně urbanizováno"
 modifier_urban_centers: "Efektivita městských center"
 urbanization_events.6.t: "Neefektivní zemědělství"
 urbanization_events.6.d: "[SCOPE.gsInterestGroup('industrialist_ig').GetName] si začali stěžovat na nehospodárnou neefektivitu samozásobitelských farem ve státě [SCOPE.sState('subsistence_state').GetName]."
 urbanization_events.6.f: "„Úrodná půda našeho lidu trpí, odkázaná na unavené a mozolnaté ruce, příliš vyčerpané ruční prací na to, aby podávaly slušný výkon. Příliš chudé na to, aby mohly používat pokročilejší nástroje, které by je učinily výnosnějšími... Toto odvětví je jen zbytečná investice.“"
 urbanization_events.6.a: "Na tom nebude záležet, pokud všichni přijdou do města."
 urbanization_events.6.b: "Pak bychom měli farmy modernizovat."
 urbanization_events.6.c: "Vypadá to jako dokonalé místo pro vojenskou základnu."
 modifier_factories_no_subsistence_farming: "Od farem k továrnám"
 modifier_better_farms_no_subsistence_farming: "Od farem k lepším farmám"
 subsistence_farms_ignored: "Od farem k vojskům"
 modifier_army_bases: "Vojensky smýšlející"
