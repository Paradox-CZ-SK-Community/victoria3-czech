 fascist_ideologies_list_tt: "#bold Fašistické#! [Concept('concept_ideology','$concept_ideologies$')|l] zahrnují:\n• [GetIdeology('ideology_fascist').GetName]\n• [GetIdeology('ideology_integralist').GetName]"
 fascist_characters_return_to_normal_tt: "Rychlost, s jakou se objevují #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fašistické#! postavy, se vrátí do normálu"
 fascist_characters_stays_increased_tt: "Rychlost, s jakou se objevují #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fašistické#! postavy, zůstane zvýšená"
 fascism_events.1.t: "Noc dlouhých nožů"
 fascism_events.1.d: "Podezření z vnitřní hrozby mezi našimi vlastními generály a vůdci sílí, doneslo se až k [SCOPE.sCharacter('fascist_leader').GetFullName] a nutnost vyhladit hrozby proti fašistickému režimu je hmatatelná. Ukvapená slova, vyhýbavé pohledy, jsou všude. Všude."
 fascism_events.1.f: "„Nože dopadaly v noci — spali, když jsme dorazili.\n\n„Vstávat!“ Dřevěná podlaha byla mokrá jejich krví. „Byli jste obviněni ze zločinů proti [SCOPE.sCharacter('fascist_leader').GetLastNameNoFormatting] a režimu, co řeknete na svou obhajobu?“\n\nA jejich hlasy byly jako koně frkající a hřmící na bojišti, střelba, děla. „To je nesmysl!“ „Byli jste obviněni z...“ „Nesmysl! Tohle je všechno vzpoura! Sláva [SCOPE.sCharacter('fascist_leader').GetLastNameNoFormatting]!“ Jsou všude. Všude.“"
 fascism_events.1.a: "Musíme s tím naložit s krajní opatrností."
 fascism_events.1.b: "Veřejně je popravte."
 fascism_events.1.c: "Ať shnijí ve vězení."
 night_of_the_long_knives.tt: "[SCOPE.gsInterestGroup('fascist_ig').GetName] budou mít pouze vůdce $Fascist$ nebo $Integralist$."
 fascism_to_jail_tt: "Zrádci režimu budou posláni do vězení."
 traitors_jailed: "Uvěznění podezřelí zrádci"
 traitors_executed_propaganda: "Popravení podezřelí zrádci"
 traitors_executed_approves: "Schvaluje popravy"
 traitors_executed_disapproves: "Nesouhlasí s popravami"
 no_traitors_executed: "Žádní zrádci popraveni"
 no_traitors_executed_approves: "Schvaluje neprovedení poprav"
 traitors_disappeared: "Podezřelá zmizení"
 fascism_progress_bar: "Síla a velikost"
 fascism_progress_bar_desc: "Postup: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 je_fascism_1_complete_condition_tt: "#bold Ukazatel postupu#! dosáhl #bold 100 %#!"
 je_fascism_1_fail_condition_tt: "#bold Ukazatel postupu#! dosáhl #bold 0 %#!"
 fascism_events.2.t: "Slova povzbuzení"
 fascism_events.2.d: "Ohnivé nacionalistické projevy [SCOPE.sCharacter('fascist_leader').GetFullName], otevřeného stoupence ideologie [SCOPE.sCharacter('fascist_leader').GetIdeology.GetName], zřejmě uchvátily určité části našeho obyvatelstva. Stále více lidí přijímá symboly a hesla hnutí [SCOPE.sCharacter('fascist_leader').GetIdeology.GetNameNoFormatting]."
 fascism_events.2.f: "„Žádné město nebylo založeno za jediný den, ani oceány zkroceny za pár rán, nikdy nebyly naše lodě výsledkem líného dne ani domy, které chrání naše rodiny, postaveny za čtrnáct dní.\n\nDosažení velikosti, kterou si naše země zaslouží, nebude a nemá být snadným úkolem. Jako architekti minulosti vztyčíme v našich zemích divy, neměnné na věčnost. Skrze vášeň, skrze sílu, skrze moc!“"
 fascism_events.2.a: "Skrze moc!"
 fascism_events.2.b: "Nepotřebujeme dalšího agitátora."
 fascism_events.2.c: "[SCOPE.sCharacter('fascist_leader_2').GetFullName] má mnohem lepší vizi."
 promoted_fascist_leader_modifier: "Podpořen fašistický vůdce"
 ignored_fascist_leader_modifier: "Ignorován fašistický vůdce"
 promoted_fascist_leader_ig_modifier: "Podpořen fašistický vůdce"
 ignored_fascist_leader_ig_modifier: "Ignorován fašistický vůdce"
 je_fascism_2: "Národ nad jednotlivcem"
 je_fascism_2_reason: "Bezpečná země musí být bezpečná i zevnitř. Zrádci a spiklenci mohou být všude a my musíme být schopni se s nimi vypořádat."
 fascism_2_tt: "Každá zájmová skupina se #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_ideologies_list_tt socialistickým#! nebo [GetIdeology('ideology_radical').GetName] [concept_leader] je [concept_marginalized]"
 fascism_3_tt: "Každé #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt socialistické#! nebo [GetIdeology('ideology_radical_movement').GetName] [concept_political_movement] je buď #bold marginalizováno#!, nebo je #bold potlačováno#!"
 fascism_events.3.t: "Organizovaná většina"
 fascism_events.3.d: "Naše ulice jsou bezpečným útočištěm pro náš lid, bezpečnostní složky zajišťují jeho bezpečí dnem i nocí a buřiči jsou na okraji naší fašistické vlády."
 fascism_events.3.f: "„Teplo dne nutí ptáky zpívat povinný chorál, rytmicky doprovázený policejními sirénami hlídkujícími v ulicích. Děti si hrají v parku, než nastane noční zákaz vycházení. Jiná — a bezpečnější — společnost je možná a jdeme správným směrem.“"
 fascism_events.3.a: "Musíme se soustředit na bezpečnost."
 fascism_events.3.b: "Lidé nám musí důvěřovat."
 fascist_authority_modifier: "Autoritářská politika"
 fascist_loyalty_modifier: "Politika loajality"
 fascism_events.4.t: "Připojení k naší věci"
 fascism_events.4.d: "Fašistické ideály zapouštějí kořeny i v dalších skupinách a mezi masami roste nespokojenost, takže členové skupiny [SCOPE.gsInterestGroup('fascist_ig').GetName] se pokusili ovlivnit skupinu [SCOPE.gsInterestGroup('new_fascist_ig').GetName], aby si zvolila vůdce více nakloněné režimu."
 fascism_events.4.f: "„Opravdu dovolíte těm darebákům, aby neměli žádnou úctu k našemu národu? Úcta, kterou si [SCOPE.gsInterestGroup('new_fascist_ig').GetNameNoFormatting] získali tolika lety tvrdé práce a rozumu, bude pod jejich neschopnou vládou navždy ztracena.\n\nAť si sní o mírové a rovnostářské společnosti jako naivní dítě — míru lze dosáhnout jen jedním způsobem: nadvládou.“"
 fascism_events.4.a: "Vskutku, existuje jen jeden způsob."
 fascism_events.4.b: "Všechny cesty vedou do Říma."
 fascism_events.4.c: "Kapitulace je jen jiný druh smrti."
