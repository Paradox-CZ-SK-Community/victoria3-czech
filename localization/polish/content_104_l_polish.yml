 je_congo_expedition: "Expedice po řece Kongo"
 je_congo_expedition_reason: "Srdce afrického kontinentu zůstává pro mnohé záhadou. Vyšleme expedici, aby zmapovala tok řeky Kongo."
 je_niger_river_expedition: "Expedice po řece Niger"
 je_niger_river_expedition_reason: "Bude vypravena expedice, která zmapuje tok řeky Niger."
 je_west_america_expedition: "Expedice na západní hranici"
 je_west_america_expedition_reason: "Expedice ke zmapování neznámých oblastí a geografie severoamerické západní hranice."
 je_central_africa_expedition: "Expedice po řece Nil"
 je_central_africa_expedition_reason: "Střed afrického kontinentu ukrývá tajemství pramene Nilu."
 expedition_taxes_modifier: "Expediční daně"
 expedition_events.290.t: "Zastávka na cestě"
 expedition_events.290.d: "V nízkých teplotách hor nachází expedice dokonalou louku k úkrytu, poblíž řeky a dost daleko od jakékoli jiné vesnice, aby nenarušila její půdu. [SCOPE.sCharacter('expedition_leader').GetFullName] navrhuje zřídit tábor z topolového dřeva pokáceného na březích řeky."
 expedition_events.290.d2: "V nízkých teplotách hor nachází expedice dokonalou louku k úkrytu, poblíž řeky a dost daleko od jakékoli jiné vesnice, aby nenarušila její půdu. Pevnost postavená předchozími průzkumníky se hrdě tyčí jako útočiště."
 expedition_events.290.f: "„Byl to neobvykle chladný měsíc, když před námi horské pásmo oznámilo svůj nemilosrdný rozsudek. Jak slunce začalo zapadat, třpytivé světlo proniklo korunami stromů, rozechvělo stíny a kapky deště pokryly hnědou, téměř mrtvou trávu.\n\nNaše expedice byla unavená a tato únava duše — daleko od domova a blízko oceánu — se stala mnohem hmatatelnější, když poslední paprsky osvětlily jejich oteklé tváře.“"
 expedition_events.290.a: "Dokonalé místo pro stavbu pevnosti."
 expedition_events.290.b: "Nemůžeme si dovolit toto zdržení."
 expedition_events.290.c: "Zastavíme a odpočineme si."
 built_fort_tt: "Někdo už v předchozí expedici postavil pevnost."
 expedition_events.291.t: "Zázrak života"
 expedition_events.291.d: "Expedici uprostřed noci probudí nelidský křik vycházející z jednoho ze stanů a ženský hlas volá: „Dítě!“."
 expedition_events.291.f: "„Zázrak života! Jak málo to byl zázrak a jak moc to vypadalo jako mučení, když člověk hleděl na tu ubohou ženu při porodu. Křik neustal ještě nejméně dvě hodiny a všechny naše skrovné léky byly vyčleněny na tak děsivou práci — do jaké míry zabraly, musím přiznat, že mé naděje jsou malé a že této ženě po této kalvárii přeji jednodušší život.“"
 expedition_events.291.f2: "„Zázrak života! Jak málo to byl zázrak a jak moc to vypadalo jako mučení, když člověk hleděl na tu ubohou ženu při porodu. Křik neustal ještě nejméně dvě hodiny a všechny naše skrovné léky byly vyčleněny na tak děsivou práci — do jaké míry zabraly, musím přiznat, že mé naděje jsou malé a že našemu průvodci po této kalvárii přeji jednodušší život.“"
 expedition_events.291.a: "Postaráme se o dítě."
 expedition_events.291.b: "Pro oba bude nejlepší vrátit se do vesnice."
 expedition_events.292.t: "Život průzkumníka není pro každého"
 expedition_events.292.d: "Uvnitř expedice se objevila vzpurná skupina a dva muži se uprostřed noci vyplížili do obchodu s alkoholem."
 expedition_events.292.d2: "Ti samí dva průzkumníci, kteří už byli varováni kvůli své neposlušnosti, v noci znovu zmizeli, jen aby byli příští ráno nalezeni opilí na podlaze."
 expedition_events.292.f: "„Ale my... víte, kapitáne, už jsme dlouho daleko od domova a... škyt! Průzkumníci budou průzkumníci, že? Jen jsme trochu prozkoumávali... jiným směrem, škyt! Ale pořád jsme přece prozkoumávali!“"
 expedition_events.292.a: "Tito muži potřebují disciplínu."
 expedition_events.292.b: "Jen potřebovali přestávku."
 expedition_events.293.t: "Nový úkol"
 expedition_events.293.d: "Jak expedice postupuje, určování priorit úkolů nabývá na významu a [SCOPE.sCharacter('expedition_leader').GetFullName] začal vést deník, v němž sleduje, co musí každý muž dělat."
 expedition_events.293.d2: "Jak expedice postupuje, určování priorit úkolů nabývá na významu a [SCOPE.sCharacter('expedition_leader').GetFullName] sleduje, co musí každý muž dělat. Neposlušní průzkumníci však již dali najevo svůj nesouhlas s tímto rozhodnutím."
 expedition_events.293.f: "„Dokumentujte nové druhy rostlin a květin, kreslete je, kreslete zvířata, dokumentujte je také. Jeden z našich mužů má ruku i talent umělce, ačkoli jeho potíže s anatomií už několik členů zpochybnilo. Přesto nám během této expedice velmi pomohl.\n\nVětšina ostatních je posílána na lov, protože naše cesta nechává za sebou zmapované vesnice a cesty, po nichž šli jiní před námi. Teď jsme tu jen my, my a divočina.“"
 expedition_events.293.a: "Lov musí mít přednost."
 expedition_events.293.b: "Je nezbytné, abychom našli osadu."
 expedition_events.294.t: "Mírové úmysly"
 expedition_events.294.d: "Několik dní poté, co byli vysláni na průzkumnou misi, se členové expedice vracejí se zprávou, že našli domorodou vesnici, v níž může skupina nalézt pomoc."
 expedition_events.294.d2: "Několik dní poté, co byli vysláni na průzkumnou misi, se členové expedice vracejí se zprávou, že našli domorodou vesnici, v níž může skupina nalézt pomoc, přičemž novorozeně použili jako symbol svých mírových úmyslů."
 expedition_events.294.f: "„Jak dny přicházejí a odcházejí, naše krajina nabízí jen minimální změny. Tyto hory jsou ostřejší, tyto starší, více erodované; nyní řeka teče po této straně, nyní po druhé, ale řetězec okolností zůstává stejný.\n\nNaši muži se vrátili se skvělými zprávami a oznámili, že našli další domorodou osadu, a tak jsme připravili své dary: jehly, zrcátka, medaile, stuhy a všechny doplňky, které vypadaly bohatě a krásně. Tento rituál jsme už opakovali stokrát, ale pokaždé působil stejně důležitě — potřebovali jsme jejich pomoc.“"
 expedition_events.294.a: "Měli bychom se s nimi pokusit směňovat."
 expedition_events.294.b: "Je tu někdo, kdo nás může vést?"
 expedition_events.294.c: "Nabídli nám zásoby pro dítě a jeho matku."
 expedition_baby_tt: "Expedice cestuje s dítětem."
 expedition_events.295.t: "Lov"
 expedition_events.295.d: "Muži expedice, kteří byli vysláni na lov, našli u břehu řeky oblast plnou všech zvířat, na která během své cesty narazili. Otázka zní: které z nich ulovit?"
 expedition_events.295.f: "„Les byl snem zeleně a medvědů, divokých prasat, vlků, jelenů a bizonů, zajíců, lišek, a dokonce i koz. Byl plný jejich zvuků a pohybu, jako živá kniha. Příroda běžela svobodně a nezraněně a pocit nechat se ztratit byl značným pokušením, návratem do rajských zahrad.“"
 expedition_events.295.a: "Nemůžeme si dovolit žádné riziko. Jděte po menším zvířeti."
 expedition_events.295.b: "Potřebujeme jídlo. Jděte po velké zvěři."
 expedition_events.296.t: "Když země otevřela ústa"
 expedition_events.296.d: "Při cestě horami expedice narazí na nebezpečnou rokli. Jejich průvodce jim radí, aby se místo jejího přechodu vydali delší, bezpečnější cestou."
 expedition_events.296.d2: "Při cestě horami expedice narazí na nebezpečnou rokli. Jejich domorodá průvodkyně navrhuje jinou stezku, po které kdysi chodívala se svým kmenem."
 expedition_events.296.f: "„V nafialovělých počátcích úsvitu se stíny hor mění v šeříkové otisky, rytiny na skalách, které napodobují vlastní tvary jako miniatury vystavené v muzeu. Rokle se zostřuje a zužuje, ústa Země míří přímo na nás — některé hlady nelze nasytit.“"
 expedition_events.296.a: "Náš průvodce ví lépe."
 expedition_events.296.b: "Nemáme čas ztrácet."
 expedition_events.296.c: "Zná tyto stezky."
 native_guide_tt: "Expedice cestuje s domorodým průvodcem."
 expedition_events.297.t: "Ponorková nemoc"
 expedition_events.297.d: "Expedice nachází v horách malou chatrč. Napůl zřícená, zdá se, že ji kdysi používali španělští misionáři, a nyní je prázdná."
 expedition_events.297.f: "„Tohle je dokonalé místo pro vzpouru. Nepokoje. Vystavil jsem tyto muže těžkým nebezpečím, na která nezapomenou. Dnes dříve jsem viděl dva z nich spolu mluvit. Mumlavě si mezi sebou cosi říkali a jen občas pohlédli mým směrem, což dokazovalo, že jejich úmysly nebyly tak ušlechtilé, jak se zdály.\n\nCítím na sobě jejich dychtivé oči i teď. Jak se dívali na chatrč a přikyvovali si: „Měli bychom tu přespat, pane.“ Samozřejmě, že to řekli.“"
 expedition_events.297.a: "Stále někde potřebujeme strávit noc."
 expedition_events.297.b: "Nemůžeme jim dát tuto příležitost."
 expedition_events.120.t: "Předpokládám, že jste Dr. [SCOPE.sCharacter('old_expedition_leader').GetLastName]"
 expedition_events.120.d: "Po příjezdu do vesnice u řeky se k expedici rychle rozběhne jeden z jejích obyvatel a mumlá něco o „jednom z jejich druhu“."
 expedition_events.120.f: "„Džungle a její zvuky, její pronikaví obyvatelé, jejich hřmící křik. Dosažení další osady je vždy zdrojem radosti a klidu.\n\nKdyž nás viděli přicházet, jeden mladík vyběhl k naší skupině, ukazoval na město a tvrdil, že je tam jeden z nás, nebo že se toho můžeme dovtípit. A tam jsme ho našli. Stín člověka, rozmazaný po okrajích, bezbarvý.\n\n„Dr. [SCOPE.sCharacter('old_expedition_leader').GetLastNameNoFormatting], předpokládám?“."
 expedition_events.120.f2: "„Džungle a její zvuky, její pronikaví obyvatelé, jejich hřmící křik. Dosažení další osady je vždy zdrojem radosti a klidu.\n\nKdyž nás viděli přicházet, jeden mladík vyběhl k naší skupině, ukazoval na město a tvrdil, že je tam jeden z nás, nebo že se toho můžeme dovtípit. A tam jsme ho našli. Stín člověka, rozmazaný po okrajích, bezbarvý. Začal na nás křičet, jeho oči ztratily všechny známky muže, kterým býval.\n\n„Dr. [SCOPE.sCharacter('old_expedition_leader').GetLastName], předpokládám?“"
 expedition_events.120.a: "Našli jsme ho!"
 expedition_events.120.b: "Vypadá tu šťastně."
 expedition_events.120.c: "Vzít ho s sebou by bylo rizikem pro naši expedici."
 found_explorer_modifier: "Nalezen ztracený průzkumník"
 found_old_explorer: "Nalezen ztracený průzkumník"
 expedition_events.130.t: "Nečekaný host"
 expedition_events.130.d: "Když expedice narazí na skupinu podezřelých obchodníků, jeden z mužů tvrdí, že je [SCOPE.sC('ambassador_country').GetAltAdjectiveNoFlag('yy')] velvyslanec unesený těmito „žoldáky“."
 expedition_events.130.f: "„Jejich ruce byly potřísněné barvou země, trávy a zrezivělé krve. Jejich tváře se usmívaly, když nás spatřili, a já jsem se na své muže podíval přísným pohledem — žádný muž se tak hluboko v džungli neusmívá.\n\nJeden z nich k nám přistoupil a promluvil cizím jazykem, který jeden z našich mladších chlapců dokázal rozpoznat. „Jsou to kupci,“ řekl, „chtějí vědět, jestli nechceme něco prodat.“ „Průzkumníci?“ vykřikl jiný hlas, hrubý, zoufalý. „Tito muži mě před měsíci unesli! Zloději, žoldáci, zločinci! Jsem [SCOPE.sC('ambassador_country').GetAdjectiveNoFormatting] velvyslanec! Osvoboďte mě z tohoto zrádného osudu!“"
 expedition_events.130.a: "Musíme tohoto muže dostat do bezpečí."
 expedition_events.130.b: "Jak víme, že nelže?"
 expedition_events.140.t: "Špatné zprávy"
 expedition_events.140.d: "Při dosažení jedné z enkláv čekal na [SCOPE.sCharacter('expedition_leader').GetFullName] dopis, v němž stálo, že jeho snoubenka doma v zemi [ROOT.GetCountry.GetName] si vzala jiného muže."
 expedition_events.140.f: "„Ach, jak zarmoucené je srdce a těžká mysl! Tato zrádkyně očarovala můj rozum a otrávila mou duši! Ach, jaká bída! Ach, jaké zoufalství! Pokud jsou bohové osudu spravedliví a čestní, dopřejí této opovrženíhodné ženě její zasloužený konec!“"
 expedition_events.140.a: "Nechte muže truchlit."
 expedition_events.140.b: "Najde si jinou."
 expedition_events.150.t: "Mezi námi"
 expedition_events.150.d: "Jeden z členů expedice byl přistižen, jak krade více zásob, než potřebuje, pod záminkou, že je nemocný a potřebuje více jídla."
 expedition_events.150.f: "„Příděly začaly docházet a mezi skupinou se šířily zvěsti i nedůvěra. Jeden z mužů obvinil jiného, že krade chléb a fazole a uprostřed noci se vyplíží ven. „Pane!“ vykřikl s tváří žlutou a vyzáblou. „Potřeboval jsem to jídlo! Mé tělo začalo selhávat a nedokázal jsem držet tempo dlouhých pochodů do džungle.“\n\nMnozí muži však jeho slova podezřívavě zpochybňovali.“"
 expedition_events.150.a: "Potřebujeme každého muže."
 expedition_events.150.b: "Zloděj nám není k užitku."
 expedition_events.160.t: "Platebně neschopný podnik"
 expedition_events.160.d: "Poté, co se v zemi [ROOT.GetCountry.GetName] doslechli o mnoha nebezpečích, kterým expedice čelí, a o jejím malém pokroku, byla odeslána zpráva, že se výprava musí okamžitě vrátit."
 expedition_events.160.f: "„Ti nafoukaní byrokraté pohodlně sedící za svými dubovými stoly, kouřící doutníky a popíjející starou whisky, znepokojení jen tím, jaký formulář pošlou své další oběti a jaké pekelné odysee nekonečného papírování ji vystaví.\n\nV poledne dorazil dopis: „Pane [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting], byli jsme informováni, že vaše expedice nedosahuje očekávaných výsledků...“ Bůh ví, že kdybych ho mohl spálit, okamžitě bych to udělal. Jsem připraven jít kamkoli, pokud to bude vpřed!“"
 expedition_events.160.a: "Tohle je ztráta času."
 expedition_events.160.b: "Teď se nemůžeme vrátit!"
 expedition_extra_expenses_modifier: "Mimořádné výdaje expedice"
 internal_security_events.1.t: "Znepokojivé zmizení"
 internal_security_events.1.d: "Zmizení [SCOPE.sCharacter('anti_secret_police_leader').GetFullName] ze skupiny [SCOPE.gsInterestGroup('anti_secret_police_ig').GetName] vyvolalo mezi elitami vážné obavy vzhledem k [SCOPE.sCharacter('anti_secret_police_leader').GetHerHis] nedávnému odporu vůči zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 internal_security_events.1.f: "„Bylo dávno po poledni, když rodina podala hlášení příslušným úřadům: [SCOPE.sCharacter('anti_secret_police_leader').GetFullNameNoFormatting] byl celou noc nezvěstný, nezůstalo po něm žádné varování ani vzkaz. Příbuzní vyjádřili obavy, že to mohlo souviset s [SCOPE.sCharacter('anti_secret_police_leader').GetHerHis] trvalým odporem vůči zákonu [SCOPE.sLaw('current_law_scope').GetNameNoFormatting], protože před několika dny byl u jejich dveří zanechán malý nůž, což nyní vykládají jako výhrůžku.“"
 internal_security_events.1.a: "Tady není co vyšetřovat."
 internal_security_events.1.b: "Nemůžeme prosadit zákon za cenu důvěry našeho lidu."
 forced_disappearance_modifier: "Znepokojivé zmizení"
 forced_disappearance_coverage_modifier: "Nevyřešené zmizení vůdce"
 forced_disappearance_acknowledge_modifier: "Přiznáno zmizení vůdce"
 internal_security_events.2.t: "Náhodný objev"
 internal_security_events.2.d: "Zatímco se vláda připravuje prosadit zákon [SCOPE.sLaw('current_law_scope').GetName], naši agenti zajali [SCOPE.sC('spy_country').GetAdjectiveNoFormatting] špiona, čímž dále poškodili naši už tak křehkou důvěru v ně."
 internal_security_events.2.f: "„Seznam všech našich generálů a jejich rodin, poznámky o stavu našich kasáren a přístavů, předpovědi o našem dovozu, vývozu, výrobě, přístavech, o všem! Dokonce mě překvapuje, že nezískali soupis našeho oblíbeného [SCOPE.GetRootScope.GetCountry.GetCustom('alcohol')]!“"
 internal_security_events.2.a: "Náš lid to musí vědět!"
 internal_security_events.2.b: "To jsou velmi užitečné informace, které by měly zůstat... soukromé."
 counterintelligence_modifier: "Kontrarozvědné úsilí"
 counterattack_modifier: "Kontrarozvědný útok"
 counterintelligence_weak_modifier: "Kontrarozvědné úsilí"
 internal_security_events.3.t: "Věk informací"
 internal_security_events.3.d: "Jak zákon [SCOPE.sLaw('current_law_scope').GetName] získává podporu, mnoho našich lidí vyjádřilo obavy o své soukromí."
 internal_security_events.3.f: "„Mám právo neexistovat!“ oznámil znepokojený občan listu [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]. „To je neslýchané — pohoršující! Nedostatek přesnosti, který tyto informace mohou přinést... představte si, že vás obviní ze zločinu, který jste nespáchali, jen proto, že vás zařadili na špatný seznam, ke špatné ideologii, s nesprávným původem.“"
 internal_security_events.3.a: "Možná mají pravdu."
 internal_security_events.3.b: "Nemají se čeho obávat!"
 privacy_concerns_modifier: "Obavy o soukromí"
 privacy_concerns_movement_modifier: "Obavy o soukromí"
 privacy_concerns_movement_bad_modifier: "Obavy o soukromí"
 privacy_concerns_ig_modifier: "Obavy o soukromí"
 privacy_concerns_good_modifier: "Není co skrývat"
 internal_security_events.4.t: "Volání po svobodě"
 internal_security_events.4.d: "Byl svolán protest podporující zákon [SCOPE.sLaw('current_law_scope').GetName], aby umlčel jeho odpůrce. Policejní síly se však rozhodly vzít zákon do vlastních rukou a protestující násilně potlačily."
 internal_security_events.4.f: "„Ach! Jaká ironie situace! Protest proti našim současným zákonům, které nedokážou chránit občana před zkorumpovanou policií, je rozehnán právě touto policií! Při psaní tohoto článku se mi ruce třesou rozhořčením. Pokud je policie schopna něčeho takového už teď, co dalšího udělá v budoucnu? Potřebujeme zákon, který nás ochrání.“"
 internal_security_events.4.a: "Obě strany se musí uklidnit."
 internal_security_events.4.b: "Policie se za to bude muset veřejně omluvit."
 violent_suppression_modifier: "Násilné potlačení"
 violent_suppression_ig_modifier: "Násilné potlačení"
 blamed_police_modifier: "Podpořeni protestující"
 internal_security_events.5.t: "Otázka bezpečnosti"
 internal_security_events.5.d: "S návrhem na prosazení zákona [SCOPE.sLaw('current_law_scope').GetName] vyjádřili členové vlády obavy, že by mohl ohrozit vnitřní bezpečnost země."
 internal_security_events.5.f: "„Jak máme zabránit reakcionářským útokům a spiknutím, když nemáme možnost přístupu k veřejným informacím? Jak máme udržet náš lid v bezpečí, pokud mu nabízíme jen falešný pocit bezpečí?“"
 internal_security_events.5.a: "Tyto informace jsou pro naši správu zásadní."
 internal_security_events.5.b: "Přejdeme na jiné, méně invazivní metody."
 government_info_bad_modifier: "Soukromé informace ponechány"
 government_info_modifier: "Soukromé informace zabezpečeny"
 internal_security_events.6.t: "Neoprávněné útoky"
 internal_security_events.6.d: "Bylo odhaleno, že členové policejních sil organizují systematické útoky proti stoupencům zákona [SCOPE.sLaw('current_law_scope').GetName], vandalizují jejich podniky a místa setkávání."
 internal_security_events.6.f: "„Zničili lavice a vyrazili dveře. Házeli kameny do oken a spálili všechny knihy. Na zdech zanechali malby, na nichž jsme byli zobrazováni jako zvířata a oni nad námi vládli. Také se postarali, aby po sobě zanechali výhrůžky, abychom věděli, že to byli oni.“"
 internal_security_events.6.a: "Proneseme veřejný projev a jasně dáme najevo, že je to nepřijatelné."
 internal_security_events.6.b: "Policejní síly se staly zkorumpovanými a nemorálními. Musí být očištěny."
 terrorist_attack_modifier: "Veřejné omluvy"
 purged_police_modifier: "Čistka policie"
 psychology_events.1.t: "Nepřítomná mysl"
 psychology_events.1.d: "Objevily se zprávy, že [SCOPE.sCharacter('mentally_ill_leader').GetFullName], vůdce skupiny [SCOPE.gsInterestGroup('mentally_ill_ig').GetName], se neúčastní schůzí ani neplní své povinnosti. Už nemůžeme dále přehlížet [SCOPE.sCharacter('mentally_ill_leader').GetHerHis] nepřítomnost."
 psychology_events.1.f: "„[SCOPE.sCharacter('mentally_ill_leader').GetLastNameNoFormatting] sotva reaguje, když zavoláme [SCOPE.sCharacter('mentally_ill_leader').GetHerHis] jménem. Prázdný pohled, [SCOPE.sCharacter('mentally_ill_leader').GetSheHe] téměř nemrká. „Pojďme se projít,“ řekli bychom [SCOPE.sCharacter('mentally_ill_leader').GetHerHim], a [SCOPE.sCharacter('mentally_ill_leader').GetSheHe] mlčky přikývne, a v tichu kráčíme.“"
 psychology_events.1.a: "Lékař musí [SCOPE.sCharacter('mentally_ill_leader').GetHerHim] vyšetřit."
 psychology_events.1.b: "[SCOPE.sCharacter('mentally_ill_leader').GetSheHe|U] může získat pomoc, kterou potřebuje, v ústavu."
 psychology_events.1.c: "Psychoanalýza se stala velmi slibným směrem."
 psychology_events.1.tt: "Postava bude poslána do ústavu."
 psychology_events.2.t: "Zoufalá opatření"
 psychology_events.2.d: "Obavy o blaho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] po celé zemi narůstají po nedostatku [ROOT.GetCountry.GetRuler.GetHerHis] veřejných vystoupení. [ROOT.GetCountry.GetRuler.GetHerHis] choť se v slzách přiznala, že žádný lékař zřejmě nedokáže [ROOT.GetCountry.GetRuler.GetHerHim] vyléčit."
 psychology_events.2.f: "„Zkusila jsem všechno! Ale [ROOT.GetCountry.GetRuler.GetHerHis] nemoc přichází... zevnitř. Žádné zlomené kosti, dokonce ani bolavé hrdlo!\n\nObávám se, že budeme muset přejít k jiným metodám, a dobrý přítel mého bratrance ji dokázal vyléčit! Jen luskl prsty, vyčetl jí budoucnost z karet a voilà! Byla zase tak zdravá jako zamlada, šťastná, plná života.“"
 psychology_events.2.a: "Nesmysl! Skutečný lékař by měl [ROOT.GetCountry.GetRuler.GetHerHim] léčit řádnou hypnózou."
 psychology_events.2.b: "Stojí to za pokus."
 psychology_events.2.c: "Experimentální léčbu nabídla katedra filozofie."
 hypnosis_modifier: "Léčba hypnózou"
 psychology_events.3.t: "Vojákova nemoc"
 psychology_events.3.d: "Po návratu ze služby už [SCOPE.sCharacter('mentally_ill_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('mentally_ill_character').GetFullName] není stejný. [SCOPE.sCharacter('mentally_ill_character').GetSheHe|U] se kasárnám vyhýbá jako moru, odmítá použít zbraň a [SCOPE.sCharacter('mentally_ill_character').GetSheHe] zatraceně jasně prohlásil, že nechce slyšet ani zatracené slovo o válce."
 psychology_events.3.f: "„[SCOPE.sCharacter('mentally_ill_character').GetSheHe|U] se uprostřed noci probouzí, promočený potem, křičí, hledí na mě a nepoznává mě, jen ukazuje a ptá se na [SCOPE.sCharacter('mentally_ill_character').GetHerHis] bratra, [SCOPE.sCharacter('mentally_ill_character').GetHerHis] drahého bratra.\n\nNěkdy se [SCOPE.sCharacter('mentally_ill_character').GetSheHe] dokonce pokouší popadnout něco, co by po mně hodil. „Kde to jsem?!“ křičí [SCOPE.sCharacter('mentally_ill_character').GetSheHe], [SCOPE.sCharacter('mentally_ill_character').GetHerHis] oči hledí skrze mě.“"
 psychology_events.3.a: "Takové vzpomínky by zlomily každého muže. Je třeba to léčit."
 psychology_events.3.b: "[SCOPE.sCharacter('mentally_ill_character').GetSheHe|U] by dostal odpovídající léčbu v ústavu. Daleko od očí veřejnosti."
 psychology_events.3.c: "Tohle je jen další případ zbabělosti. Pošlete [SCOPE.sCharacter('mentally_ill_character').GetHerHim] zpět do služby."
 leader_sent_back_modifier: "Důstojník poslán zpět do služby"
 asylum_leader_modifier: "Důstojník v ústavu"
 public_shame_modifier: "Veřejná hanba"
 psychology_events.4.t: "Pochybné praktiky"
 psychology_events.4.d: "Propuštění pacienti z ústavu ve městě [ROOT.GetCountry.GetCapital.GetCityHubName] postupně odsuzují postupy používané při jejich údajně lékařské léčbě. Mezi obviněními bylo špatné zacházení s nemocnými, zadržování osobních dopisů a nepřiměřené tresty."
 psychology_events.4.f: "„Nutili nás sedět na židli celé hodiny, ne-li celý den. V tichu. Nesměli jsme mluvit s žádným jiným pacientem, dokonce ani číst knihu. Omluvili nás jen tehdy, když jsme šli na toaletu, pokud jsme měli štěstí. Jinak to byl jen rezavý nočník. Žádné jídlo, žádná voda. Pokud jsme nebyli nemocní, když nás přijali, během několika týdnů bychom byli.“"
 psychology_events.4.a: "Jejich úsudku nelze věřit."
 psychology_events.4.b: "Musíme zcela přehodnotit fungování ústavů."
 psychology_events.4.c: "[SCOPE.gsInterestGroup('healthcare_ig').GetName] mohou převzít správu ústavů."
 ignored_asylums_modifier: "Špatné zacházení v ústavech"
 asylums_modifier: "Revize ústavů"
 asylum_pay_modifier: "Revize ústavů"
 asylum_owner_modifier: "Vlastník ústavu"
 asylum_paperwork_modifier: "Byrokracie ústavů"
 psychology_events.5.t: "Výklad snů"
 psychology_events.5.d: "Vážený lékař z budovy [SCOPE.sBuilding('university_building').GetName] ve státě [SCOPE.sState('university_state').GetName] provádí novátorská bádání v oblasti psychiatrie a zdůrazňuje roli, kterou nevědomá mysl a pohřbené vzpomínky z dětství hrají v psychologických patologiích."
 psychology_events.5.f: "„Na následujících stránkách ukáži, že existuje psychologická technika, pomocí níž lze vykládat sny, a že při použití této metody se každý sen ukáže jako smysluplná psychologická struktura, kterou lze zařadit na určitelné místo v psychické činnosti bdělého stavu.\n\nToto bádání bude završeno, až dosáhne bodu, kde se problém snu setkává s širšími problémy, o jejichž řešení je třeba se pokusit pomocí jiného materiálu.“" #Sigmund Freud
 psychology_events.5.a: "Může pokračovat ve svých výzkumech na univerzitě."
 psychology_events.5.b: "Tak brilantní mysl si zaslouží významnou roli!"
 psychology_events.5.c: "To zní krajně nepřesvědčivě."
 freud_modifier: "Podpořena psychoanalýza"
 freud_ig_modifier: "Podpořena psychoanalýza"
 freud_building_modifier: "Podpořena psychoanalýza"
 freud_rejected_modifier: "Odmítnuta psychoanalýza"
 sigmun_freud_tt: "Sigmund Freud se stane vůdcem skupiny [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] s vysokou popularitou."
 sigmun_freud_else_tt: "Výzkumník s vysokou popularitou se stane vůdcem skupiny [SCOPE.gsInterestGroup('intelligentsia_ig').GetName]."
 psychology_events.6.t: "Časopis filozofických studií"
 psychology_events.6.d: "Členové katedry filozofie z budovy [SCOPE.sBuilding('university_building').GetName] ve státě [SCOPE.sState('university_state').GetName] podepsali formální petici za vládní financování svého příštího projektu: vědeckého časopisu."
 psychology_events.6.f: "„Založením našich Filosofických studií vítáme novou éru zkoumání mysli! Éru důkladného výzkumu a seriózního experimentování, éru vědecké spolupráce s našimi zahraničními kolegy, bezpečné útočiště, v němž lze sdílet veškerá bádání týkající se tohoto tématu.“"
 psychology_events.6.a: "Na to nemáme prostředky."
 psychology_events.6.b: "Financujte tento časopis!"
 founded_psycho_journal_modifier: "Financován filozofický časopis"
 founded_psycho_journal_cost_modifier: "Výdaje na filozofický časopis"
 psychological_affliction: "Psychologické postižení"
 psychological_affliction_desc: "Tato postava trpí nemocí mysli, která je špatně pochopena a obtížně se účinně léčí."
 Sigismund_Schlomo: "Sigmund"
 Freud: "Freud"
 je_grand_exhibition: "Očekávání Světové výstavy"
 je_grand_exhibition_reason: "Země po celém světě netrpělivě čekají, co jim ukážeme."
 je_grand_exhibition_bad_points: "Nemáme se čím pochlubit."
 je_grand_exhibition_medium_points: "Máme skromný počet předmětů, které můžeme ukázat."
 je_grand_exhibition_good_points: "Jsme v dobré pozici uspořádat výstavu."
 je_grand_exhibition_great_points: "Tohle bude největší výstava ze všech!"
 grand_exhibition_complete_tt: "Zvyšte své $Body Světové výstavy$ získáváním pokladů na expedicích, výzkumem technologií a zvyšováním hodnosti své země.\nBody ztrácíte zvyšováním své infamie."
 invalid_grand_exhibition_tt: "Odstraní záznam v deníku Světová výstava."
 ge_points_up_3: "Zvyšuje body #bold Světové výstavy#! o #bold 3#!"
 exhibition_events.1.t: "Ne tak velká výstava"
 exhibition_events.1.d: "Po měsících příprav je výstava konečně dokončena a podle všeho je dost zklamáním."
 exhibition_events.1.f: "„Reflexní deštník, nějaký diamant menší a mdlejší než ten, který jste viděli nosit svou babičku, kočár, který pořád páchne ulicemi.\n\nProcestoval jsem kvůli tomu půl země, a k čemu?“"
 exhibition_events.1.a: "No dobře."
 exhibition_events.2.t: "Velká výstava"
 exhibition_events.2.d: "Po měsících příprav je výstava konečně dokončena a byla přijata velmi příznivě."
 exhibition_events.2.f: "„Bylo tam k vidění bezpočet divů: skleněné kopule větší než jakékoli, které jsem kdy viděl, diamanty velké jako vaše pěst. Děti se ptaly, co je tohle a tamto za zvíře, a nikdo ani nedokázal odpovědět. Nemohl jsem tomu uvěřit, připadalo mi to jako návštěva jiného světa.“"
 exhibition_events.2.a: "To je skvělé!"
 exhibition_events.3.t: "Největší výstava"
 exhibition_events.3.d: "Po měsících příprav je výstava konečně dokončena a je oslavována jako jedna z největších výstav své éry."
 exhibition_events.3.f: "„A tuto sochu jsme zachránili z moře,“ a poté byla vystavena poblíž ústřední fontány, stále poznamenaná vodou. „Odvážíš-li se pohlédnout skrz toto sklo, má drahá, spatříš ta nejopuštěnější souhvězdí.“\n\nNa druhé straně sálu vítal[ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] všechny návštěvníky, celý v bílém.\n\nZněly trubky a jásot, hudba a kouř, úžas a ohromení — a byl tam život, tak zářivý."
 exhibition_events.3.a: "Úžasné. Prostě... úžasné."
 exhibition_events.4.t: "Doutnající podezření"
 exhibition_events.4.d: "Plánování výstavy vyvolává s blížícím se zahájením kontroverze. Členové [SCOPE.gsInterestGroup('conservative_ig').GetName] vyjádřili své obavy, že masa návštěvníků by se mohla stát potenciálním revolučním davem."
 exhibition_events.4.f: "„Pošetilost a nesmyslnost, s níž [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] dovoluje tuto cetku, musí udeřit do očí každému rozumnému a soudnému člověku, a jsem ohromen, že ministři sami netrvají na tom, aby [ROOT.GetCountry.GetRuler.GetHerHim] během výstavy alespoň odjel[ROOT.GetCountry.GetRuler.GetHerHis] do [SCOPE.sState('grand_exhibition_state').GetNameNoFormatting], neboť žádná lidská bytost nemůže ručit za to, co se při takové příležitosti může stát.\n\nTa představa... musí šokovat každého poctivého a dobře smýšlejícího [ROOT.GetCountry.GetAdjectiveNoFormatting] muže. Zdá se však, že všechno se spiklo, aby nás ponížilo v očích Evropy.“" #Ernest Augustus I of Hanover
 exhibition_events.4.a: "Jejich obavy jsou neopodstatněné."
 exhibition_events.4.b: "Velký příliv návštěvníků může způsobit určité problémy."
 ignored_conservatives_modifier: "Ignorované obavy ohledně výstavy"
 exhibition_controversy_tt: "Snižuje body #bold Světové výstavy#! o #bold 1#!"
 exhibition_events.5.t: "Za pár drobných"
 exhibition_events.5.d: "Členové [SCOPE.gsInterestGroup('anti_toilet_ig').GetName] výslovně prohlásili, že instalace veřejných toalet na výstavě poškodí její dobrou vůni i pověst."
 exhibition_events.5.f: "„Maminko, maminko! Musím na záchod! Kdyby tak vláda této země nainstalovala nějaké veřejné toalety!“\n\nAch, bože. Na tohle jsme nebyli připraveni."
 exhibition_events.5.a: "Její dobrá vůně a pověst by utrpěly víc, kdybychom je nenainstalovali."
 exhibition_events.5.b: "Kvůli tomu bychom neměli výstavu ohrozit."
 grand_exhibition_toilets_modifier: "Náklady na instalované veřejné toalety"
 grand_exhibition_toilets_ig_modifier: "Instalované veřejné toalety"
 grand_exhibition_toilets_no_ig_modifier: "Veřejné toalety nenainstalovány"
 exhibition_events.6.t: "Oslnivý suvenýr"
 exhibition_events.6.d: "S blížícím se zahájením výstavy se musíme připravit na návštěvníky, kteří si z ní budou chtít odnést malý kousek."
 exhibition_events.6.f: "Žena nasáklá parfémem se pompézně prochází po výstavě. „Tohle by se malému Augustovi líbilo!“ říká, zatímco stojí u každého viditelného předmětu. Pochybujete, že by se malému Augustovi líbil mechanismus fontány, ale nebudete jí odporovat. \n\n„Pijavice!“ slyšíte ji křičet, pozoruhodně nadšenou."
 exhibition_events.6.a: "Stereoskopické karty jim umožní spatřit výstavu znovu."
 exhibition_events.6.b: "Papírový suvenýr by si mohl snadno dovolit každý."
 stereoscope_cards_modifier: "Suvenýry ve formě stereoskopických karet"
 lithographic_cards_modifier: "Suvenýry ve formě litografických karet"
 exhibition_events.7.t: "Obchodní záležitost"
 exhibition_events.7.d: "Bylo nahlášeno, že podezřelí pánové vybírají v prostorách výstavní haly zvláštní poplatek za speciální předměty."
 exhibition_events.7.f: "Je tam muž s vysokým kloboukem — velmi, velmi vysokým kloboukem. Ukazuje na jeden z dalekohledů, tenhle vypadá obzvlášť důležitě. „Chtěl byste si ho, mladý pane, vyzkoušet? Za pouhý jeden penny můžete objevit divy noční oblohy!“\n\nZarazíte se. Stroj se leskne. Přísahali byste, že pod vší tou ocelí vidíte, jak pulzuje. Vstup vás stál celý šilink. Kapsy máte prázdné. Muž má nyní ostrý úsměv — velmi, velmi ostrý úsměv."
 exhibition_events.7.a: "Nemůžeme dovolit, aby tito muži pošpinili dobré jméno výstavy."
 exhibition_events.7.b: "Pár drobných navíc se může hodit každému..."
 titanic.1.t: "Titanic"
 titanic.1.t2: "[SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')]"
 titanic.1.d: "[SCOPE.sCharacter('titanic_leader').GetFullName] ze [SCOPE.gsInterestGroup('titanic_ig').GetName] se rozhodl sponzorovat výstavbu pamětihodného zaoceánského parníku v loděnicích státu [SCOPE.sState('titanic_state').GetName]. Bude to něco, co dosud nikdo neviděl."
 titanic.1.f: "„Majestátnost, dokonalý odraz světla na jeho čtyřech černých komínech, stačily samy o sobě. Několik z nás, kteří si užívali svěží vzduch, se procházelo po palubě. Večer se nás zmocňuje pocit prázdnoty. Dítě stálo mlčky. Poté jsme už nedokázali promluvit.\n\nLoď, západ slunce — a nestoudný sen o budoucnosti, vykrystalizovaný.“"
 titanic.1.a: "Lidé budou mluvit o luxusu této lodi!"
 titanic.1.b: "Měli bychom její výstavbu zefektivnit."
 titanic.1.c: "Nemáme čas následovat bludy šílence."
