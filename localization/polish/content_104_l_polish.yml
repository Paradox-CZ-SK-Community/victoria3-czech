 decree_events.1.t: "Na správné cestě"
 decree_events.1.d: "Vynikající stav našich silničních sítí přilákal inženýry z celé naší země, kteří s námi nyní chtějí spolupracovat různými zajímavými způsoby."
 decree_events.1.f: "„Hladký asfalt, zářící jako hladina ocelové laguny, klidný. Pach kouře z aut, gumy, přírody zkrocené pokrokem... žijeme proto, abychom zkracovali vzdálenosti!\n\nPokud najmete některého z inženýrů, kteří absolvovali naši prestižní univerzitu ve státě [SCOPE.sState('engineers_state').GetNameNoFormatting], ujišťuji vás, můj drahý příteli, že vám nic — nic! — nikdy nebude stát v cestě... ani v cestě vašeho auta!“"
 decree_events.1.a: "Lepší odvodňovací systém by měl být naší prioritou."
 decree_events.1.b: "Tento nadějný mladík nám nabízí levnější alternativu."
 decree_events.1.c: "Kamenné základy, říkáte? Riskantní, ale skvělé!"
 decree_events.1.e: "Nepotřebujeme poslouchat tyto podvodníky."
