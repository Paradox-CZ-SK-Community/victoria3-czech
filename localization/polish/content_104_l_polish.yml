 je_ethno_nationalist_reason: "Domovina našich předků patří nám a nám se také navrátí."
 ethnonationalist_tt: "Má #bold etnonacionalistického nebo fašistického#! vůdce"
 je_ethno_nationalist_tt: "Vlastníte #bold všechny#! své kulturní domoviny"
 fascism_events.8.t: "Hlas národa"
 fascism_events.8.a: "Tak tohle je skvělá hymna!"
 fascism_events.8.d: "Oslovila nás skupina vážených hudebních skladatelů vyučujících v budově [SCOPE.sBuilding('anthem_building').GetName] ve státě [SCOPE.sState('anthem_state').GetName]. Upozornili na znepokojivý nedostatek řádné národní hymny, která by povzbudila ducha našeho lidu."
 first_line_rhyme_a_1: "„Země hor, země u řeky,\n"
 first_line_rhyme_a_2: "„Země bohatství, země stříbra,\n"
 first_line_rhyme_b_1: "„Země válečníků, země nádhery,\n"
 first_line_rhyme_b_2: "„Země boje, nemožné kapitulace,\n"
 second_line_rhyme_a_1: "Sláva je naše, abychom ji přinesli.\n"
 second_line_rhyme_a_2: "Ať se všichni naši nepřátelé třesou!\n"
 second_line_rhyme_b_1: "Hrdí obránci tohoto národa\n"
 second_line_rhyme_b_2: "Vždy hrozící provinilci\n"
 third_line_rhyme_a_1: "Zrozeni z noci a požehnáni dnem,\n"
 third_line_rhyme_a_2: "Proto naše kroky ukazují cestu,\n"
 third_line_rhyme_b_1: "Tak byl náš národ stvořen\n"
 third_line_rhyme_b_2: "Potrestáme ty [SCOPE.sCountry('rival_country').GetAdjectiveNoFormatting], kteří zradili,\n"
 fourth_line_rhyme_a_1: "Abychom všechny své nepřátele zahnali.“"
 fourth_line_rhyme_a_2: "Náš osud se dnes naplní!“"
 fourth_line_rhyme_b_1: "Skrze oheň čepele.“"
 fourth_line_rhyme_b_2: "S pomocí moci a rozumu.“"
 national_anthem_modifier: "Národní hymna"
 fascism_events.9.t: "Otevřené nástupnictví"
 fascism_events.9.d: "Odchod předchozího vůdce skupiny [SCOPE.sCharacter('new_fascist_leader_scope').GetInterestGroup.GetName] zanechal v jejím vedení mocenské vakuum. Zdá se, že jej vyplní [SCOPE.sCharacter('new_fascist_leader_scope').GetFullName], otevřený stoupenec ideologie [SCOPE.sCharacter('new_fascist_leader_scope').GetIdeology.GetName]."
 fascism_events.9.f: "„[SCOPE.sCharacter('new_fascist_leader_scope').GetLastNameNoFormatting], ze všech lidí? [SCOPE.sCharacter('new_fascist_leader_scope').GetSheHe|U] je, s úctou, hrubián. Posadit [SCOPE.sCharacter('new_fascist_leader_scope').GetHerHim] vedle nás by bylo urážlivé.“\n\n„Ta volba není na nás, že?“\n\n„[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] by to vetoval. [ROOT.GetCountry.GetRuler.GetSheHe|U] to #italic musí#! vetovat. Mnozí z nich ještě pořád vidí rozum.“\n\n„Jsem na vážkách. Můžeme si být jisti, že [SCOPE.sCharacter('new_fascist_leader_scope').GetLastNameNoFormatting] vůbec něčemu skutečně věří? Pokud se staneme těmi, kdo s [SCOPE.sCharacter('new_fascist_leader_scope').GetHerHim] promluví jako poslední... zamyslete se nad tím.“"
 fascism_events.9.a: "Není důvod zasahovat."
 fascism_events.9.b: "Tento [SCOPE.sCharacter('new_fascist_leader_scope').GetWomanMan] nesmí být vpuštěn k vládě."
