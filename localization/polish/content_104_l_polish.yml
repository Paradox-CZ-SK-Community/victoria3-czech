 marx_events.1.t: "Komunistický manifest"
 marx_events.1.d: "Rostoucí majetková nerovnost v naší společnosti se stala stejně škodlivou a zjevnou jako ostří kosy. Pamflet nazvaný „Komunistický manifest“, který napsal socialistický revolucionář, upoutal pozornost mas."
 marx_events.1.f: "„Dějiny všech dosavadních společností jsou dějinami třídních bojů.\n\nSvobodný a otrok, patricij a plebejec, pán a nevolník, cechovní mistr a tovaryš, zkrátka utlačovatel a utlačovaný, stáli v neustálém protikladu, vedli nepřetržitý, tu skrytý, tu otevřený boj, který pokaždé skončil buď revoluční přeměnou celé společnosti, nebo společným zánikem bojujících tříd.“"
 marx_events.1.a: "Náš lid by mohl z tohoto učení těžit."
 marx_events.1.b: "Spojit se, vskutku! Nemáme co ztratit než své okovy!"
 marx_events.1.c: "S tímto povstaleckým jedincem nechceme mít nic společného."
