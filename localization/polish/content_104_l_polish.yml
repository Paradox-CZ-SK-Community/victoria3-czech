 natural_disaster_events.7.t: "Erupce ve státě [SCOPE.sState('volcanic_state').GetName]"
 natural_disaster_events.7.d: "Státem [SCOPE.sState('volcanic_state').GetName] otřásla prudká erupce. Úlomky tefry a sopečný popel zničily budovy i úrodu a vyžádaly si životy některých našich lidí."
 natural_disaster_events.7.f: "„Hustý sloup kouře následoval zřetelný výbuch. Pastýři, kteří pracovali u úpatí hory, bezcílně obrátili zrak k nyní jasnému a zřetelnému oblaku. Sesuv půdy přišel poté.“"
 natural_disaster_events.7.a: "Erupci nedokážeme předpovědět."
 natural_disaster_events.7.b: "Náš lid nás potřebuje!"
 modifier_volcano_relief: "Pomoc po sopečné erupci"
 natural_disaster_events.8.t: "Velká erupce ve státě [SCOPE.sState('mega_volcanic_state').GetName]"
 natural_disaster_events.8.d: "Erupce nevídaných rozměrů zcela zničila životy mnoha lidí ve státě [SCOPE.sState('mega_volcanic_state').GetName]. Výbuch bylo slyšet stovky mil daleko a vše, co mělo tu smůlu nacházet se v okolí hory, bylo okamžitě zpustošeno."
 natural_disaster_events.8.f: "„A den se proměnil v noc. Ty obrovské vodopády ohně řítící se po úbočí hory. Černý mrak, gargantuovský, všichni ptáci už dávno opustili toto pole.\n\nZa mnoho let budu sedět u krbu a světlo mě už nebude rušit.“"
 natural_disaster_events.8.a: "Bohužel nemáme žádné prostředky k přidělení."
 natural_disaster_events.8.b: "Těmto lidem musíme bezpodmínečně pomoci."
 modifier_mega_volcanic_relief: "Pomoc po velké erupci"
 natural_disaster_variable_tt: "Existuje šance, že v nadcházejících měsících vypukne hladomor."
 famine_events.1.t: "Těžké časy"
 famine_events.1.d: "Hlad se pro naši zemi stal nebezpečným problémem, protože lidé ze státu [SCOPE.sState('famine_state').GetName] hlásí, že nemají vůbec nic k jídlu. Bylo požádáno o opatření nouzové pomoci."
 famine_events.1.f: "„Nebylo by možné náležitě popsat strádání, které obvykle a tiše snášejí... V mnoha okresech je jejich jedinou potravou brambor, jejich jediným nápojem voda, jejich chatrče je jen zřídka chrání před počasím; postel nebo přikrývka je vzácný luxus a téměř u všech tvoří prase a hromada hnoje jejich jediný majetek.“" #Devon
 famine_events.1.a: "Ty výdaje si nemůžeme dovolit."
 famine_events.1.b: "Ve státě [SCOPE.sState('famine_state').GetName] bude zavedeno zaměření na nouzovou pomoc."
 emergency_hunger_relief_modifier: "Pomoc proti hladu"
 thats_life_modifier: "Žádná opatření pomoci proti hladu"
 great_famine_modifier: "Velký hladomor"
 emergency_relief_promise_tt: "Budeme muset ve státě [SCOPE.sState('famine_state').GetName] vyhlásit dekret nouzové pomoci."
 famine_events.2.t: "Chléb a krev"
 famine_events.2.d: "Nedostatek zásob se rozšířil do sousedního státu [SCOPE.sState('famine_2_state').GetName], kde neúroda zvýšila počet obětí mezi naším lidem."
 famine_events.2.f: "„Žádná představivost si nedokáže vybavit, žádný muž ani žena si nedokáže představit, žádný jazyk nedokáže vyjádřit, žádný autor, novinář, malíř ani herec nedokáže dát podobu hrůzám, kterým čelí mnoho rodin ve státě [SCOPE.sState('famine_2_state').GetNameNoFormatting]. Jejich podvyživené tváře jsou hubené jako chrti; nemluvňata lze sotva rozeznat od boulí v přikrývkách — kdyby jen všechny své přikrývky neprodali, aby si koupili poslední jídlo v měsíci.“"
 famine_events.2.a: "Naše opatření nouzové pomoci zmírnila počet obětí."
 famine_events.2.b: "To jsou následky, kterým musíme čelit."
 famine_events.2.c: "Měli bychom nyní aktivovat nouzovou pomoc v původním státě [SCOPE.sState('famine_state').GetName]."
 no_emergency_relief_tt: "Hladomor se šíří kvůli nedostatku nouzové pomoci."
 emergency_famine_modifier: "Opatření pomoci proti hladu"
 famine_events.3.t: "Hledání lepšího života"
 famine_events.3.d: "Lidé ze státu [SCOPE.sState('famine_state').GetName] začali masově migrovat po celé zemi v naději, že najdou lepší místo, kde se usadit a uniknout velkému hladomoru, který ničí jejich životy."
 famine_events.3.f: "„Podél opuštěných a zrezivělých železnic je pláč dětí jediným zvukem, který lze slyšet — žádný vlak nepřijede před polednem, ale rodiny se už shromáždily u zničené stanice. Někteří z nich šli celé dny, „kde je bratr?“, a kráčejí dál.\n\nZvěsti o lepším životě za hranicemi jejich země jsou pošetilou nadějí, tuší, „kde je bratr?“, déšť padá, někteří muži také.“"
 famine_events.3.a: "Naše opatření nouzové pomoci zmírnila počet obětí."
 famine_events.3.b: "To jsou následky, kterým musíme čelit."
 famine_events.3.c: "Měli bychom nyní aktivovat nouzovou pomoc v původním státě [SCOPE.sState('famine_state').GetName]."
 no_emergency_relief_migration_tt: "Lidé migrují více kvůli nedostatku nouzové pomoci."
 great_famine_migration_modifier: "Migrace kvůli velkému hladomoru"
 famine_migration_modifier: "Migrace kvůli hladomoru"
 famine_events.4.t: "Štědré dary"
 famine_events.4.d: "Poté, co se rozšířily zprávy o hrůzách, které občané státu [SCOPE.sState('famine_state').GetName] snášejí, vzrostla mezi zeměmi solidarita a mnozí chtějí na tuto věc přispět."
 famine_events.4.f: "„A hle! Před námi leží kdysi krásné a prosperující město! Úrodné země, šťastné tváře, prosté životy. Běda, ty časy už dávno pominuly, lide mého lidu, a nyní hlad sužuje jejich mír, hrozivý jako sám vlk! Je naší povinností pokusit se zmírnit jejich utrpení.\n\nVidím, že si tím získáme svatyni v jejich srdcích, v srdci jejich země i v srdci lidstva. To naše země sblíží!“"
 famine_events.4.a: "Měli bychom přijmout dary země [SCOPE.sC('neighbor_country_1').GetName]."
 famine_events.4.b: "Měli bychom přijmout dary země [SCOPE.sC('neighbor_country_2').GetName]."
 famine_events.4.c: "Spolehneme se na domácí dary."
 famine_donations_modifier: "Dary na hladomor"
 famine_internal_donations_modifier: "Dary na hladomor"
 donations_ig_modifier: "Dary na hladomor"
 ig_suppression_events.5.t: "Nečekaná návštěva"
 ig_suppression_events.5.d: "Doslechli jsme se, že [SCOPE.gsInterestGroup('target').GetName] pořádají ve svém sídle velmi zajímavá setkání, které shodou okolností mimořádně dobře známe. Jistě bychom je mohli navštívit."
 ig_suppression_events.5.f: "„Já? Ach, jen jsem šel kolem, když jsem si všiml toho vašeho tak půvabného malého shromáždění, víte? Ale není od vás příliš přátelské, že jste je omezili jen na svou vlastní skupinu. Dalo by se dokonce zajít tak daleko a říci, že je to trochu... sektářské, nemyslíte?\n\n„Samozřejmě bych vás z něčeho takového nikdy neobvinil, ale možná bude pro všechny zúčastněné nejlepší, když toto krajně nezákonné a špinavé setkání laskavě ihned rozpustíte.“"
 ig_suppression_events.5.a: "Naši agenti se o to diskrétně postarají."
 ig_suppression_events.5.b: "Vyrazte ty dveře!"
 ig_suppression_events.5.c: "Ach, kdyby tak měli právo shromažďovací..."
 ig_suppression_events.5.e: "Nepotřebujeme důvod, abychom je prostě rozehnali."
 suppressed_meeting_modifier: "Potlačené setkání"
 sneaky_suppressed_meeting_modifier: "Nenápadně potlačené setkání"
 violent_suppressed_meeting_modifier: "Násilně potlačené setkání"
 ig_suppression_events.6.t: "Sebesabotáž"
 ig_suppression_events.6.d: "Zvěsti o slabé vůli [SCOPE.sCharacter('suppressed_leader').GetFullName] ze skupiny [SCOPE.gsInterestGroup('target').GetName] jsou spíše skutečností než pouhým podezřením. Existuje mnoho způsobů, jak využít slabého protivníka."
 ig_suppression_events.6.f: "„Takže před vámi leží dva kovy, jak vidíte, že? A pak si můžete vybrat: toto laskavě nabídnuté zlato, nebo tuto ostrou — ale stejně krásnou — ocel. Chápete, co tím říkám?“"
 ig_suppression_events.6.a: "Hoďte minci svému vůdci."
 ig_suppression_events.6.b: "Existují i jiné... levnější metody."
 ig_autosabotage_modifier: "Sebesabotáž"
 ig_autosabotage_leader_modifier: "Sebesabotáž"
 bribing_scandal_modifier: "Úplatkářská sebesabotáž"
 je_airships: "Lodě vzduchu"
 je_airships_reason: "Pro naši nejnovější technologii se stále nacházejí nová využití a sny o řiditelných balónech by již brzy mohly přestat být jen sny."
 society_tech_events.301.t: "Ve vzduchu"
 society_tech_events.301.d: "Vzducholoď [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] byla vybrána jako zcela mimořádné místo pro ples vyšší třídy. Nejvýznačnější členové země vyjádřili své názory na tento velkolepý stroj."
 society_tech_events.301.f: "„Z této výšky je obzor jen zlatým náhrdelníkem, pečlivě utaženým kolem živých modří moře. Přichází večeře a restaurace je plná lehkého kouře a hlubokých hlasů.\n\n„Smím vám nabídnout místo, slečno...?“\n\nNeodvážím se zapsat své jméno, neboť někteří z nás mají tajemství, která nesmějí následovat za hranice pevniny. Mosazný zvuk příborů doprovází poslední údery srdce Slunce v rytmickém loučení. Systola, diastola.“"
 society_tech_events.301.a: "Jaká ostudná výstřednost. Tohle je průzkumný válečný stroj!"
 society_tech_events.301.b: "Podívejte na ty sametové polštáře! A na stěny z malovaného hedvábí!"
 society_tech_events.301.c: "Kdyby tak celý ten prostor sloužil zboží místo cestujícím..."
 zeppelins_military_modifier: "Vojenské vzducholodě"
 zeppelins_society_modifier: "Společenské vzducholodě"
 zeppelins_trading_modifier: "Obchodní vzducholodě"
 je_romanticism: "Podporovat romantismus"
 je_romanticism_reason: "Romantické umělecké hnutí obhajuje slavnou minulost: rytíře, hrady, piráty, zapovězenou přírodu a ztracené hrdiny. Jeho přitažlivou povahu je třeba rychle rozšířit."
 society_tech_events.302.t: "Není to romantické?"
 society_tech_events.302.d: "Budova [SCOPE.sBuilding('academy_building').GetName] ve státě [SCOPE.sState('academy_state').GetName] zaznamenala rostoucí zájem o romantické hnutí a někteří z našich největších umělců tvoří skutečná mistrovská díla."
 society_tech_events.302.f: "„V Xanadu dal Kublajchán\nskvostný palác vystavět:\nkde Alf, ta svatá řeka, běžel\nskrz jeskyně nezměrné člověku\nk sluncem nedotčeným vodám.\n\n-Samuel Taylor Coleridge, #italic Kublajchán#!“" #Coleridge
 society_tech_events.302.a: "Ukážeme světu, jak se dělá romantismus!"
 society_tech_events.302.b: "Tito nadějní mladí muži si zaslouží každý haléř."
 society_tech_events.302.c: "Ale mohli byste to udělat trochu... realističtější?"
 romantic_building_modifier: "Romantická architektura"
 preraphaelites_modifier: "Financovaní umělci"
 je_fascism_1: "Síla a velikost"
 je_fascism_1_reason: "Ať už pochází od cizích mocností, nebo od nespokojenců uvnitř našich hranic, hrozba socialismu ohrožuje zničením [ROOT.GetCountry.GetAdjective] národ. Všichni musíme pochodovat pod stejným praporem. Nesmíme zapomenout, kdo jsou naši vůdci a jak jejich síla představuje naši jedinou obranu proti této hrozbě.\n\nDokud je tento [concept_journal_entry] aktivní, rychlost, s jakou se objevují #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fašistické#! postavy, bude zvýšena."
 fascism_1_tt: "Má #bold fašistického#! vůdce nebo agitátora"
 integralist_agitator_appears_tt: "[GetIdeology('ideology_integralist').GetName] [concept_agitator] se objeví v zemi [ROOT.GetCountry.GetNameNoFlag]"
 fascist_agitator_appears_tt: "[GetIdeology('ideology_fascist').GetName] [concept_agitator] se objeví v zemi [ROOT.GetCountry.GetNameNoFlag]"
 fascists_in_government_tt: "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fašističtí#! [Concept('concept_politician', '$concept_politicians$')] jsou nyní [concept_in_government]"
