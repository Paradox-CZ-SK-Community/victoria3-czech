 exhibition_events.8.d: "Členové výstavního výboru navrhli, aby byly v sále výrazně vystaveny předměty z minulých expedic."
 exhibition_events.8.f: "Je těžké odolat jeho slovům, zvlášť když jsou pronesena s takovým zápalem. Zakloní hlavu v smíchu nad něčím, co zmíní jeho společník, tak nenáročně.\n\n„Jde o vzdálené džungle Afriky,“ vysvětluje dychtivě, „pusté pláně Ameriky, neprozkoumané hory Antarktidy. Tak málo našich občanů kdy navštíví jediné z těchto míst — přineseme tato místa k nim.“"
 exhibition_events.8.a: "Výjimečný exemplář nosorožce."
 exhibition_events.8.b: "Tyto fotografie byly pořízeny na Velkých pláních."
 exhibition_events.8.c: "Tyto exotické americké květiny ještě nikdy nikdo neviděl."
