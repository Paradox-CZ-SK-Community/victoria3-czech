 sol_events.6.t: "Chlebové vzpoury"
 sol_events.6.d: "Nedostatek zásob potravin a nízké — ne-li neexistující — mzdy v chudinských čtvrtích vedly k sérii nepokojů mezi ženami ve městě [ROOT.GetCountry.GetCapital.GetCityHubName], kde poničily několik výloh obchodů."
 sol_events.6.f: "„Nemáme jídlo, nemáme peníze, vidíme ty bohaté parchanty, jak hromadí jídlo, jako by jim hrozil hlad, přestože jeden jejich prst je tlustší než naše paže. Máme právo být stejně dobře živené jako oni.“"
 sol_events.6.a: "Určitě najdeme něco, co jim dát."
 sol_events.6.b: "Za své jídlo zaplatí jako všichni ostatní."
 starvation_palliative_modifier: "Zmírňující opatření proti hladu"
 bread_riots_modifier: "Zmírňující opatření proti hladu"
 je_telephone: "Rozšířit využití telefonu"
 je_telephone_reason: "S vynálezem telefonu musíme vybudovat průmyslovou kapacitu pro masovou výrobu této nové elektrické inovace."
 production_tech_events.300.t: "Slyšíte to také?"
 production_tech_events.300.d: "Vynález telefonu otevřel dveře k velkému zlepšení naší komunikace... nebo našeho elektrotechnického průmyslu."
 production_tech_events.300.f: "„Asistentovi přeběhl mráz po zádech, když si pomyslel, že v tom chladném, zaprášeném sklepě slyší hlas svého pána.\n\n„Rozumíte tomu, co říkám?“ Muž se zastavil a málem upustil dřevěnou krabici, kterou nesl, slabě osvětlenou svíčkami pečlivě rozmístěnými kolem převratného zařízení, napůl stroje, napůl člověka. „A-ano.“\n\n„Okamžitě sem přijďte! Máme v rukou něco velikého, chlapče.““"
 production_tech_events.300.a: "Měli bychom zlepšit naši komunikaci."
 production_tech_events.300.b: "Prostě napište dopis! Elektřina je pro průmysl!"
 electrics_building_modifier: "Rozmach elektrotechnického průmyslu"
 je_whaling: "Velrybářský průmysl"
 je_whaling_reason: "Velrybí olej je naší minulostí a bude i naší budoucností! Mýdlo, palivo do olejových lamp, dokonce i důležité mazání našich strojů — tato mnohostranná látka pokrývá všechny tyto potřeby."
 production_tech_events.301.t: "Nebezpečný podnik"
 production_tech_events.301.d: "Efektivita naší budovy [SCOPE.sBuilding('whaling_building').GetName] ve státě [SCOPE.sState('whaling_state').GetName] se ukázala mít nebezpečný protějšek a smrt se stala běžnou součástí téměř každé plavby. Je to vysoká cena, ale zisk je stejně vysoký."
 production_tech_events.301.f: "Tělo velryby leží široké jako obloha. Její hlava byla vyprázdněna a sudy oleje jsou potřísněné krví.\n\nPo molu se rozléhá hlas: „Ztratili jsme tucet mužů,“ a pak je začne vyjmenovávat i jejich města; několik z nich je z hlavního města, jeden z nich má jméno vašeho bratra.\n\nOlej se třpytí — tekutá zlatavá krev sirény, lákající muže na smrt."
 production_tech_events.301.a: "Musíme zajistit bezpečnost námořníků."
 production_tech_events.301.b: "Ale ono se to třpytí!"
 whaling_state_modifier: "Velrybářský rozmach"
 whaling_state_mortality_modifier: "Velrybářská opatření"
 whaling_admiral_modifier: "Velrybářská opatření"
 je_ig_suppression_1: "Zajištění moci"
 je_ig_suppression_1_reason: "[SCOPE.gsInterestGroup('target').GetName] se stali příliš mocnými pro své vlastní dobro, vzhledem k názoru, který na nás mají, a ohrožují naši pokojnou vládu."
 je_ig_suppression_1_goal_desc: "[SCOPE.gsInterestGroup('target').GetName] nesmí být [concept_powerful]."
 je_ig_suppression_1_invalidad_desc: "Odmítli jste pomoc nabídnutou v události $With Friends Like These...$."
 je_ig_suppression_status_1: "O nemorálních činech vůdce skupiny [SCOPE.gsInterestGroup('target').GetName] se rozšířily zvěsti, které podkopávají jeho pověst."
 je_ig_suppression_status_2: "Vůdce skupiny [SCOPE.gsInterestGroup('target').GetName] se po zvěstech o nemorálních činech rozhodl odstoupit."
 je_ig_suppression_status_3: "Vůdce skupiny [SCOPE.gsInterestGroup('target').GetName] byl uvězněn kvůli svému odporu vůči pokojnému odstoupení."
 ig_suppression_events.1.t: "S takovými přáteli..."
 ig_suppression_events.1.d: "Mocný vliv, kterým [SCOPE.gsInterestGroup('suppressed_ig').GetName] disponují, se stal hrozivou přítomností nad naší vládou. Jeden z našich agentů se na nás obrátil s návrhem... méně obvyklého řešení."
 ig_suppression_events.1.f: "„Dveře se otevřely, aniž by si toho kdokoli všiml, dokud vítr nerozfoukal dokumenty ležící na dřevěném stole.\n\n„Omlouvám se,“ oznámil uklidňující hlas a opatrně je sbíral, „doufám, že má návštěva nenaruší vaše důležité záležitosti. Bylo však pozorováno, že [SCOPE.gsInterestGroup('suppressed_ig').GetNameNoFormatting] zoufale potřebují trochu vedení správným směrem, které pomůže jim i nám.“"
 ig_suppression_events.1.a: "Jistě potřebují naše vedení."
 ig_suppression_events.1.b: "To je naprosto nemorální!"
 ig_suppression_tt: "To povede k událostem o oslabení moci skupiny [SCOPE.gsInterestGroup('suppressed_ig').GetName]."
 dismissed_ig_suppression_tt: "Příležitost je odmítnuta a [SCOPE.gsInterestGroup('suppressed_ig').GetName] potlačíme běžnými prostředky."
 ig_suppression_events.2.t: "Proslýchá se"
 ig_suppression_events.2.d: "Zvěsti o hříšném životě postavy [SCOPE.sCharacter('suppressed_leader').GetFullName] ze skupiny [SCOPE.gsInterestGroup('target').GetName] byly vykonstruovány a jsou připraveny šířit se mezi masami jako požár."
 ig_suppression_events.2.f: "„Že udělali co komu? Tomu se nedá věřit! Takové skandální chování nelze v této zbožné zemi tolerovat! A potom na to navázali čím? Už to nedokážu poslouchat! Prosím, ušetřete mě toho utrpení! Skončete to už, zapřísahám vás! Zapřísahám vás!“"
 ig_suppression_events.2.a: "Nejlepší zvěst nelze nikdy vysledovat."
 ig_suppression_events.2.b: "Tohle nakrmí nejeden ples vyšší společnosti."
 ig_suppression_events.2.c: "Lidé na předměstích dychtí po nějaké společenské munici."
 undermined_upper_class_modifier: "Skandál mezi vyššími třídami"
 undermined_lower_class_modifier: "Skandál mezi nižšími třídami"
 undermined_ig_modifier: "Podkopána zájmová skupina"
 suppression_discovered: "Odhaleno spiknutí za účelem podkopání"
 ig_suppression_events.3.t: "Přesvědčování"
 ig_suppression_events.3.d: "Zvěsti o [SCOPE.sCharacter('suppressed_leader').GetHerHis] způsobu života pronikly do všech společenských vrstev a pověst [SCOPE.sCharacter('suppressed_leader').GetHerHis] byla podkopána, takže jistě dokážeme přesvědčit [SCOPE.sCharacter('suppressed_leader').GetFullName], aby odstoupil z pozice vůdce skupiny [SCOPE.gsInterestGroup('target').GetName]."
 ig_suppression_events.3.f: "„Byl to jeden z těch dnů, kdy ohně továren za okny poblikávaly jako drobné oči, jeden z těch dnů, kdy [SCOPE.sCharacter('suppressed_leader').GetFullNameNoFormatting] měl pocit, jako by na [SCOPE.sCharacter('suppressed_leader').GetHerHim] hledělo celé město — obviňovalo, vyžadovalo. Ale nebyla to vina [SCOPE.sCharacter('suppressed_leader').GetHerHis]! [SCOPE.sCharacter('suppressed_leader').GetSheHe] to věděl, [SCOPE.sCharacter('suppressed_leader').GetSheHe] neudělal nic špatného... Byla to vláda, očividně vláda, šířila lži, nikdy neměli [SCOPE.sCharacter('suppressed_leader').GetHerHim] rádi, že? Ach ne, nikdy.\n\n„Na co se díváte!?“"
 ig_suppression_events.3.a: "Trocha vydírání ještě nikdy nikoho nezabila."
 ig_suppression_events.3.a.tt: "[SCOPE.sCharacter('suppressed_leader').GetFullName] odstoupí."
 ig_suppression_events.3.b: "Možná jen potřebujeme skandál ještě zvětšit."
 ig_suppression_events.3.c: "Tohle zašlo příliš daleko."
 blackmailed_ig_modifier: "Vydíraná zájmová skupina"
 suppression_scandal_modifier: "Rostoucí skandál"
 suppression_leader_modifier: "Rostoucí skandál"
 plot_backing_down_modifier: "Ustoupeno od potlačování"
 plot_backing_down_bad_modifier: "Ustoupeno od potlačování"
 ig_suppression_events.4.t: "Rána z milosti"
 ig_suppression_events.4.d: "I přes houževnaté úsilí podkopat pověst [SCOPE.sCharacter('suppressed_leader').GetFullName] se [SCOPE.sCharacter('suppressed_leader').GetSheHe] ukázal jako zdráhavý odstoupit. Je třeba přijmout tvrdší opatření."
 ig_suppression_events.4.f: "Dveře jsou znovu otevřené, tentokrát vás nevaruje žádný vítr, žádný zvuk, v této bezpečné místnosti nelze vnímat žádné narušení života. Ale je tu znovu. Přistupuje k vám tentýž uklidňující hlas: „Omlouvám se,“ poznáváte ten tón, „doufám, že má návštěva nenaruší vaše důležité záležitosti. Náš cíl se však ukázal být vůči našemu přesvědčování poněkud odolný, takže zbývá už jen jedna možnost.“\n\n„Nemůžeme [SCOPE.sCharacter('suppressed_leader').GetHerHim] zabít!“\n\nAgent na vás vrhne zmatený pohled: „Zabít [SCOPE.sCharacter('suppressed_leader').GetHerHim]? Ale ne, to bych nikdy nenavrhoval! Jen jsem myslel, že máme tolik prázdných cel...“"
 ig_suppression_events.4.a: "Ať tělo [SCOPE.sCharacter('suppressed_leader').GetHerHis] shnije ve vězení."
 ig_suppression_events.4.b.tt: "[SCOPE.sCharacter('suppressed_leader').GetFullName] odstoupí."
 ig_suppression_events.4.b: "[SCOPE.sCharacter('suppressed_leader').GetSheHe|U] potřebuje jen trochu více přesvědčování..."
 ig_suppression_events.4.a.tt: "[SCOPE.sCharacter('suppressed_leader').GetFullName] bude uvězněn."
 ig_suppression_events.4.c: "Tohle skutečně zašlo příliš daleko!"
 imprisoned_ig_modifier: "Uvězněný vůdce"
 imprisoned_ig_people_modifier: "Politické uvěznění"
 ig_suppression_events.7.t: "Poslední slovo"
 ig_suppression_events.7.d: "Naše snahy podkopat pověst skupiny [SCOPE.gsInterestGroup('target').GetName] byly mimořádně úspěšné. Jejich vliv je nyní oslaben a nastal čas věnovat se důležitějším záležitostem."
 ig_suppression_events.7.f: "„Dveře se tentokrát neotevřou. Minuty plynou a nic se neděje. Je to skoro zklamání. Cestou ven však na chodbě stojí muž. Má na sobě sametový frak a vy se na něj díváte s očekáváním. Přijde k němu další muž a společně odejdou. Nic se nestane.“"
 ig_suppression_events.7.a: "Lidé budou vědět, koho mají respektovat."
 ig_suppression_events.7.b: "Nikdy jim nedovolíme zapomenout, kdo toho dosáhl."
 ig_suppression_events.7.c: "Dobrá chvíle připomenout jim naše zákony."
