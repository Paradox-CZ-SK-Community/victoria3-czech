 decree_events.6.t: "Hudba pro mé uši"
 decree_events.6.d: "Do státu [SCOPE.sState('decree_state').GetName] dorazila uznávaná skupina potulných umělců a s ní stovky žádostí, aby naše štědrá vláda financovala jeden z jejich koncertů."
 decree_events.6.f: "„Jejich texty... ne, to byste nepochopili. Jen ty nejsmutnější a nejhlubší duše se dokážou ponořit do svých srdcí, otevřených před námi skrze ty tóny klavíru... Jejich písně mluví o samotě, nepochopení, nedostatku klidného místa, kam by se člověk mohl uchýlit... Skutečně vystihují strasti dospívající duše. Jak byste tomu mohli rozumět?“"
 decree_events.6.a: "Financujte je!"
 decree_events.6.b: "Znějí... ne zrovna skvěle."
 foreign_concert_modifier: "Zahraniční koncert"
 foreign_concert_costs_modifier: "Výdaje na zahraniční koncert"
 ignored_concert_modifier: "Žádný zahraniční koncert"
