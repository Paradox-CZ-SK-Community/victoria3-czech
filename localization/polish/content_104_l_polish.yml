 rubber_events.1.t: "Kaučuková horečka"
 rubber_events.1.d: "Ve státě [ROOT.GetState.GetName] se podařilo vypěstovat kaučuk. Křehká povaha těchto stromů a jejich náročné podmínky činí z tohoto úspěchu mimořádně důležitý milník."
 rubber_events.1.f: "Amazonský kaučukový monopol je konečně u konce! Ty krásné stromy se po mnoha neúspěšných pokusech rozhodly růst jinde, ty tvrdohlavé potvůrky, a nyní je naší povinností skoncovat s říšemi těch chamtivých magnátů."
 rubber_events.1.a: "Přiveďte všechny do státu [SCOPE.sState('rubber_state').GetName] a pusťte se do práce."
 rubber_events.1.b: "Důvod, aby naše stávající budova [SCOPE.sBuilding('rubber_plantation').GetName] pracovala usilovněji."
 rubber_events.1.c: "Ať kaučuk vždy pohání nový růst."
 rubber_events.1.e: "Vždy se soustřeďte na naše stávající plantáže."
 rubber_always_spread_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se použijí automaticky vždy, když nastane kaučuková horečka."
 rubber_always_concentrate_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí na [concept_state] s největším počtem budov [SCOPE.sBuilding('rubber_plantation').GetName], kdykoli bude možná kaučuková horečka."
 state_rubber_modifier: "Kaučuková horečka"
 state_rubber_nexus_modifier: "Nelítostný kaučuk"
 children_rights_events.1.t: "Neviditelný pláč"
 children_rights_events.1.d: "Kvůli nelidským podmínkám, kterým děti čelí na svých pracovištích, se mnoho rodin ve státě [SCOPE.sState('child_labor_state').GetName] rozhodlo skrývat své potomky v naději, že nebudou posláni do práce."
 children_rights_events.1.f: "„Řekli nám, abychom byli potichu, pane, tak jsme byli. S bratrem jsme tam stáli, tiší jako hrob, víte, zadržoval jsem dech, jak jen to šlo, ale byla moc velká tma, tak jsem si myslel, že už odešli. Tady nás nenajdou, víte, to říkala máma, ale byla moc velká tma, pane, a byla zima.“"
 children_rights_events.1.a: "Děti? Jaké děti?"
 children_rights_events.1.b: "Byla by škoda, kdyby se schovaly v těchto opuštěných domech..."
 hidden_children_modifier: "Ukryté děti"
 helped_hidden_children_modifier: "Pomohli ukrýt děti"
 children_rights_events.2.t: "Hořká pravda"
 children_rights_events.2.d: "Vzhledem k nízkým mzdám, které pracovníci ve státě [SCOPE.sState('child_labor_state').GetName] dostávají, je stále více rodičů nuceno posílat své děti do práce, aby pomohly uživit rodiny."
 children_rights_events.2.f: "„To je šílenství! Jak máme těmto lidem pomoci, když sami nutí své děti pracovat?! Musíme něco udělat! Okamžitě zastavte toto barbarské rozhodnutí!“\n\n„Nu, zdá se docela zřejmé, že to není něco, co by pro své vlastní děti chtěli, kdyby měli jiné možnosti, že? Soudit tyto chudé lidi podle jejich rozhodnutí o přežití jim také nepomůže.“"
 children_rights_events.2.a: "Musíme to zastavit."
 children_rights_events.2.b: "Dělají, co musí."
 stopped_families_modifier: "Debata o dětské práci"
 allowed_families_send_their_children_modifier: "Ústupky v otázce dětské práce"
 didnt_allow_families_send_their_children_modifier: "Žádné ústupky v otázce dětské práce"
 children_rights_events.3.t: "Nevyhnutelná zranění"
 children_rights_events.3.d: "Kvůli vládnímu tlaku na [SCOPE.sLaw('current_law_scope').GetName] byli dospělí muži nuceni vyplnit mezeru, kterou by děti zanechaly. Jejich těla jsou však příliš velká a prsty příliš široké, takže počet průmyslových nehod roste."
 children_rights_events.3.f: "„Jejich výkřiky naplnily továrnu, jejich krev pokryla stroje, jako by měly vlastní srdce. Už podesáté za týden si muž uřízl prst při pokusu obsluhovat drobný stroj, který dříve ovládaly jen štíhlé ruce dítěte. Protesty sílí: „Když ne ony, tak my.““"
 children_rights_events.3.a: "Nikdo by neměl vykonávat takovou práci."
 children_rights_events.3.b: "Děti se nevrátí, takže by si na to raději měli zvyknout."
 workers_appeased_modifier: "Uklidněni pracovníci"
 confronted_workers_modifier: "Postaveno se pracovníkům"
 antarctica_expedition: "Expedice do Antarktidy"
 antarctica_expedition_desc: "Díky zázrakům technologie a hrdinství našich průzkumníků může být vnitrozemí antarktického kontinentu konečně dostupné. Závod začíná a my musíme být první na pólu!"
 cold.101.t: "Expedice do Antarktidy"
 cold.101.d: "Antarktický kontinent zůstává téměř zcela neprozkoumaný. Expedice do této rozlehlé zmrzlé pustiny by byla nákladná a plná nebezpečí, ale sláva prvních dobyvatelů pólu by byla nesmírná."
 cold.101.f: "Šepot a tlumené hlasy brzy zaplní síně nejprestižnějších vědeckých akademií světa, protože vyhlídka na dosažení posledního geografického objevu se stává něčím mnohem víc než horečnatým snem."
 cold.101.a: "Znám pro tu práci právě toho pravého."
 cold.101.b: "Unese pokladna takový výdaj?"
 cold.102.t: "Polární průzkumník"
 cold.102.d: "Musíme vybrat vůdce nadcházející expedice na antarktický kontinent. Vyznamenalo se několik slibných kandidátů."
 cold.102.f: "Jen málokdo dokáže náležitě ocenit tento hrdinský čin, tento zářivý důkaz lidské odvahy a energie. Tito muži vplují přímo do srdce ledového pole, které všichni předchozí průzkumníci považovali za jistou smrt. Tito muži jsou hrdinové — hrdinové v nejvyšším smyslu slova."
 cold.102.a: "[SCOPE.sCharacter('expedition_leader_1').GetFullName] je zkušený polární průzkumník."
 cold.102.b: "[SCOPE.sCharacter('expedition_leader_2').GetFullName] nás dovede ke slávě."
 cold.102.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName] nás ještě nikdy nezklamal."
 cold.102.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] je nejlépe připravený."
 cold.1.t: "V horách šílenství"
 cold.1.d: "Expedice zahlédla na obzoru dvojici sopečných vrcholů Erebus a Terror. Když je James Clark Ross poprvé objevil, Erebus byl pozorován při erupci. Naštěstí nacházíme hory v klidu."
 cold.1.f: "„Ponurě se tyčily k západní obloze; dovolovaly nám rozeznat různé holé, bezútěšné, načernalé vrcholy a zachytit podivný pocit přeludu, který vzbuzovaly, když se ukazovaly v načervenalém antarktickém světle proti dráždivému pozadí duhových oblaků ledového prachu.“" #Lovecraft
 cold.1.a: "Měli bychom rychle pokračovat dál."
 cold.1.b: "Nasbírejte geologické vzorky."
 cold.1.c: "Vystupte na Erebus. Budeme první, kdo dosáhne kráteru!"
 antarctic_mountains_modifier: "Prozkoumány polární hory"
 cold.2.t: "Chata na půli cesty"
 cold.2.d: "Expedice se vyloďuje na zmrzlém pobřeží antarktického kontinentu. Na poměrně dostupném místě jeden člen posádky navrhuje postavit odolnou chatu, kde bychom si mohli odpočinout a zanechat zásoby pro zpáteční cestu, a možná i pro budoucí průzkumníky."
 cold.2.d2: "Expedice se vyloďuje na zmrzlém pobřeží antarktického kontinentu a vítá ji uklidňující pohled na dřevěnou chatu. Je jen lehce zapadaná sněhem, snadno se dá učinit obyvatelnou a posádka uvnitř nachází dostatek zásob jídla."
 cold.2.f: "„Teplota v chatě je samozřejmě nízká, ale ve všech ostatních ohledech jsme naprosto pohodlně zaopatřeni. Je tu neomezené množství sucharů a náš objev na Pram Pointu znamená neomezenou zásobu tuleního masa. Z prázdné petrolejové plechovky a několika šamotových cihel byla vyrobena výborná malá kamna, která byla napojena na starou kouřovou rouru. Už teď ji můžeme považovat za dočasný domov.“" #Scott
 cold.2.a: "Tato chata obstojí ve zkoušce času."
 cold.2.b: "Chata musí vydržet jen do našeho návratu."
 cold.2.c: "Měli bychom si odpočinout a doplnit zásoby, než budeme pokračovat."
 discovery_hut_tt: "Budoucí průzkumníci získají #tooltippable;positive_value;TOOLTIP:expedition_progress_explanation_tt postup#! při návštěvě chaty."
 cold.3.t: "Minuli cíl"
 cold.3.d: "Expedice si uvědomila, že na trase k dalšímu zásobovacímu skladu zašla příliš daleko."
 cold.3.f: "„Jak jsme pokračovali cestou skrze nemilosrdnou běl, sněhových mohyl bylo čím dál méně. Nebo jsme si to alespoň mysleli. „Už je skoro večer.“ Všichni jsme se zastavili. „Máme dost jídla?“ podařilo se mi zeptat. Všichni jsme znali odpověď, všichni jsme věděli, proč se ptám. Jediné kývnutí, nikdo nemluvil. Všichni jsme věděli, že ty lži jsou bílé jako tato země.“"
 cold.3.f2: "„Jak jsme pokračovali cestou skrze nemilosrdnou běl, sněhových mohyl bylo čím dál méně. Nebo jsme si to alespoň mysleli. Bože, pomoz nám, toto tažení už nemůžeme dál vydržet, to je jisté. Mezi sebou jsme nekonečně veselí, ale co každý muž cítí ve svém srdci, mohu jen hádat.“" #Scott
 cold.3.a: "Ty zásoby potřebujeme. Zpátky."
 cold.3.b: "Pokračujte dál, obejdeme se bez zásob."
 cold.4.t: "Konec je blízko"
 cold.4.d: "Expedice je odsouzena k záhubě. Naprosto vyčerpaná, omrzlá a bez zásob už může jen čekat na chladné objetí smrti."
 cold.4.f: "„Každý den jsme byli připraveni vyrazit k našemu skladu vzdálenému 11 mil, ale za dveřmi stanu zůstává scéna vířící sněhové vánice. Nemyslím si, že teď můžeme doufat v něco lepšího. Vydržíme až do konce, ale samozřejmě slábneme a konec nemůže být daleko. Je to škoda, ale nemyslím, že mohu psát dál.“\n\n„Proboha, postarejte se o naše lidi.“" #Scott
 cold.4.a: "Jdu jen ven a možná tam nějakou dobu zůstanu."
 cold.5.t: "Jižní pól"
 cold.5.d: "Expedice dorazila do svého cíle: na jižní pól! [SCOPE.sCharacter('expedition_leader').GetFullName] hrdě vztyčuje stan nesoucí [SCOPE.sCountry('expedition_country').GetAltAdjectiveNoFormatting('ou')] vlajku a posádka slavnostně pije hrnek kakaa."
 cold.5.d2: "Expedice doráží na jižní pól, jen aby tam našla stan nesoucí [SCOPE.sCountry('pole_winner_country').GetAltAdjectiveNoFormatting('ou')] vlajku. Byli jsme ve svém cíli předstiženi!"
 cold.5.f: "„Pól. Neposkvrněný, bezchybný. Vzduch se třpytil, jako by sníh měl vlastní světlo; pod našima zmrzlýma nohama muselo ležet tajné slunce.\n\n„Je tady.“ A měřili jsme, zaznamenávali každou možnou anomálii, „je tady, posuňte značku,“ a pak byl tady, přímo před mýma očima, a potom byl tam, blíž k saním, ale byl tady. Konečně byl tady a jeho odražená bledost osvětlovala naše unavené tváře. „Pánové, teď si můžeme odpočinout.“\n\nJe tady.“"
 cold.5.a: "Úspěch! Ale teď začíná těžká cesta na sever..."
 cold.5.b: "Zatraceně! A teď začíná těžká cesta na sever..."
 cold.6.t: "Psí maso"
 cold.6.d: "Antarktickým průzkumníkům docházejí zásoby. Posádka probírá výhody zabití některých saňových psů a rozdělení masa mezi muže i zbývající psy, aby zvýšili své šance na přežití."
 cold.6.f: "„Člověk nemůže klidně uvažovat o zabití zvířat, která mají takovou inteligenci a osobitost, často tak roztomilé vlastnosti a která se velmi pravděpodobně naučil považovat za přátele a společníky.“\n\n„Dohodli jsme se, že se nezalekneme ničeho, abychom dosáhli svého cíle! A kromě toho, pokud to neuděláme, psi stejně jistě zemřou podvýživou nebo vyčerpáním.“" #Scott
 cold.6.a: "Je to praktické řešení."
 cold.6.b: "Nesnížíme se k takovému barbarství!"
 pet_dog.tt: "Pohladíte psy a pokračujete v cestě."
 ate_dogs_modifier: "Snědli psy"
 cold.7.t: "Návrat domů"
 cold.7.d: "Posádka antarktické expedice se konečně vrátila domů. Ačkoli svého cíle nedosáhla, její úsilí posunulo vědecký pokrok vpřed a připravilo cestu budoucím průzkumníkům."
 cold.7.d2: "Posádka antarktické expedice se konečně vrátila domů. Jako první lidé, kteří kdy dosáhli jižního pólu, jsou oslavováni jako [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] hrdinové."
 cold.7.f: "„Sláva. Vítězství. Jásot a přehlídky. Absurdní sumy peněz. Laskavá slova. Opakování hrdinova stínu nad vlastním jménem. Posádka. Ta vzácná skupina nezdolných parchantů. Domov. Dny. Noci. Jak moc mi chyběly dny a noci, jejich vypočítané střídání. Nuda rutiny. Probuzení ve vlastní posteli. Horká čokoláda. Káva. Čaj. Mé oblíbené koláčky. Jak moc mi chyběl hluk z této ulice.“"
 cold.7.a: "Příště uspějeme."
 cold.7.b: "Jsou chloubou své země."
 succesfull_south_pole_modifier: "Úspěšný polární průzkumník"
 cold.8.t: "Ledové pole"
 cold.8.d: "Jak se expedice blíží ke svému cíli, hladinu vody začínají pokrývat rozlámané kusy mořského ledu. Trup lodi se snaží prorazit si cestu chladnou masou narážením a drcením, ale led s postupem vpřed sílí."
 cold.8.f: "„Nebylo by rozumné přiznat, že mě takové nebezpečí zaujalo, ale bezprostřední příchod našeho konečného cíle, ohlašovaný přibývajícím mořským ledem, který nás obklopoval, mě nemohl než děsit a fascinovat zároveň. Sněhová pokrývka, která se přes něj rozprostírala, bránila moři odrážet naše siluety či siluetu naší lodi — nebylo vidět nic jiného: jen my a pól.“"
 cold.8.a: "Vpřed!"
 cold.8.b: "Musíme důvěřovat zkušenostem, které má [SCOPE.sCharacter('expedition_leader').GetFullName]."
 cold.9.t: "V sevření ledu"
 cold.9.d: "Loď expedice zasáhla série tlakových vln, která způsobila, že se led kolem ní rozdělil na velké kusy. Okamžik vítězství však rychle vystřídaly dvě kry, které ji sevřely na pravoboku, jedna u přídě a druhá u zádě. Posádka se shromažďuje a připravuje plán, jak ji osvobodit."
 cold.9.d2: "Prostřílet cestu ledovým polem se ukázalo jako sisyfovský úkol. Horší je, že postupující led drtí loď. I kdyby bylo možné ji z ledu vyprostit, už není způsobilá k plavbě. Jedinou zbývající možností je opustit loď a doufat, že pěšky najdeme velrybářskou stanici."
 cold.9.f: "„Chlad nás dostihl. Prkna ze starých dubů byla nyní nesměle ukryta za sněhem obtíženými vrstvami bílé a celá loď by působila opuštěně, nebýt třesavých světel, která se nám podařilo udržet rozsvícená. Led nás pohlcoval a se svou přirozenou ladností začal bodat do našeho drahocenného útočiště.“"
 cold.9.a: "Prostřílíme se ledem!"
 cold.9.b: "Opusťte loď."
 cold.10.t: "Velrybářská stanice"
 cold.10.d: "[SCOPE.sCharacter('expedition_leader').GetFullName] úspěšně dovedl posádku expedice k velrybářské stanici na Jižní Georgii, když se odvážil cesty z Elephant Island v nekrytém záchranném člunu s mizivými zásobami. Příběhy o hrdinství [SCOPE.sCharacter('expedition_leader').GetFirstName] znějí celou zemí navzdory neúspěchu expedice."
 cold.10.f: "„Během naší poslední noci táboření pod nemilosrdnou bělí se mě náš kuchař zeptal, jestli to bylo těžké rozhodnutí — „vrátit se,“ řekl, „když jsme se dostali tak daleko, nebylo to těžké?“ Ne, chtěl jsem říct. Ne, nebylo.\n\nJakou radost by pól mohl přinést člověku uvězněnému mezi mořem a horskými pásmy, hladovějící siluetě mlhy a chladu? Kdyby suchý vzduch foukal jen o něco silněji, všichni bychom se rozptýlili jako průsvitné vločky sněhu.“"
 cold.10.a: "Třikrát sláva pro [SCOPE.sCharacter('expedition_leader').GetFullName]!"
 safe_polar_exp_modifier: "Polární zachránce"
 cold.11.t: "Velká ledová bariéra"
 cold.11.d: "Když loď expedice stáčí bokem, posádka v úžasu spatří vysokou, kolmou stěnu ledu — jediný vstup na kontinent."
 cold.11.f: "„A tam stála. Kdyby měla tvář, vím, že by se nám smála. Ten směšný praskavý zvuk — lámající se led. A už se to děje, tam, blok padá do moře. Hrozivý. Osudný. Míří směrem k naší lodi. Tento okamžik pronásledoval naše mysli od chvíle, kdy jsme opustili poslední přístav. Plavba byla obtížná, ale vstoupit na ten nezmapovaný kontinent by bylo jako sestoupit do hlubin zmrzlého pekla.“"
 cold.11.a: "Musíme na ni vyšplhat!"
 cold.11.b: "Měli bychom trhliny obejít."
 cold.12.t: "Transantarktické pohoří"
 cold.12.d: "Expedice postupovala věčnými dny pochodu sněhem, dokud před sebou nespatřila neproniknutelnou hradbu Transantarktického pohoří. Čeká nás nová výzva, protože jeho trasy byly zdokumentovány jen velmi omezeně."
 cold.12.f: "„Věčně šedá obloha nás uvrhla do stavu kruté anestezie, neschopné rozlišit hranici oddělující sníh od atmosféry, sníh od stop, sníh od nás. Před námi se rozprostřela ostřejší šeď a v její otupělosti sídlila známá útěcha.\n\nKamenná stěna byla pokryta bělí a většinu dne nám trvalo pochopit, že to není svislá obloha, nebe padající na nás, poslední chorál, odsouzené trubky, přelud. Byly to hory.“"
 cold.12.a: "Najdeme novou trasu."
 cold.12.b: "Zvolíme známý přístup."
 cold.13.t: "Podivné značky"
 cold.13.d: "Během postupu expedice sněhem byl objeven podivný kámen s neznámými značkami, zčásti pohřbený pod jejich nohama."
 cold.13.f: "„Právě dnes ráno byl vykopán světlý kámen. Jeho hladkou texturu a dokonalé zakřivení narušoval jen vzor neznámých značek, všechny se objevovaly v posloupnosti, kterou se nikdo z našich mužů neodvážil rozluštit. Když byl umístěn mezi oko a slunce, jeho odstín se měnil, zdánlivě podle denní doby; nyní bílý, nyní žlutý, za soumraku — zelený.“"
 cold.13.f2: "„Právě dnes ráno byl vykopán světlý kámen. Jeho hladkou texturu a dokonalé zakřivení narušoval jen vzor neznámých značek, všechny se objevovaly v posloupnosti, která byla zpočátku nesrozumitelná, ale jejíž význam jsem po chvíli poznal. Neznal jsem ten jazyk, neznal jsem ani ta pokroucená slova úplně odděleně, ale společně — společně jsem věděl. Dostávají hlad, víte. Hlad.“"
 cold.13.a: "Zastavte a prozkoumejte to."
 cold.13.b: "Ignorujte to."
