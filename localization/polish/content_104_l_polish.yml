 krakatoa.1.t: "Dny temnoty"
 krakatoa.1.d: "Erupce nevídaných rozměrů zcela zničila životy mnoha našich lidí ve státě [SCOPE.sState('krakatoa_state').GetName]. Výbuch sopky Krakatoa bylo slyšet stovky mil daleko a vše, co mělo tu smůlu nacházet se v okolí ostrova, bylo okamžitě zpustošeno."
 krakatoa.1.f: "„A den se proměnil v noc. Ty obrovské vodopády ohně řítící se po úbočí hory. Černý mrak, gargantuovský, všichni ptáci už dávno opustili toto pole.\n\nZa mnoho let budu sedět u krbu a světlo mě už nebude rušit.“"
 krakatoa.1.a: "Pomůžeme vším, co máme."
 krakatoa.1.b: "Příroda je vrtošivé stvoření."
 krakatoa_eruption_help_modifier: "Erupce Krakatoa"
 krakatoa_cost_modifier: "Humanitární pomoc po erupci Krakatoa"
 krakatoa_eruption_no_help_modifier: "Erupce Krakatoa"
 krakatoa.5.d: "Erupce nevídaných rozměrů zcela zničila životy mnoha [SCOPE.sCountry('krakatoa_country').GetAdjectiveNoFormatting] ve státě [SCOPE.sState('krakatoa_state').GetName]. Výbuch sopky Krakatoa bylo slyšet stovky mil daleko a vše, co mělo tu smůlu nacházet se v okolí ostrova, bylo okamžitě zpustošeno."
 krakatoa.5.a: "Pomůžeme vším, co máme."
 krakatoa.5.b: "Příroda je vrtošivé stvoření."
 krakatoa.5.c: "Nemáme co postrádat..."
 krakatoa.2.t: "Noci vln"
 krakatoa.2.d: "Vlny vyšší než komíny zpustošily stát [SCOPE.sState('tsunami_state').GetName], což je strašlivý následek sopečné erupce."
 krakatoa.2.f: "„Na to ticho nikdy nezapomenu.“"
 krakatoa.2.a: "Neexistují slova, která by tuto tragédii popsala."
 krakatoa.3.t: "Hořící popel"
 krakatoa.3.d: "Kvůli poklesu teploty způsobenému sopečnou erupcí byla veškerá úroda ve státě [SCOPE.sState('farm_state').GetName] zničena následnou událostí [GetHarvestConditionType('disease_outbreak').GetName] a farmáři nyní přicházejí prosit o pomoc."
 krakatoa.3.f: "„Doma není žádné jídlo, pane, ani jediný kořen k záchraně. Děti se ptají, pane, obloha je pořád temná, pořád rudá. Mají hlad, hlad a strach, můj pane — a já také.“"
 krakatoa.3.a: "Můžeme jim poslat nějaké jídlo."
 krakatoa.3.b: "Nemůžeme nic dělat."
 krakatoa.3.c: "Otevřete státní sýpky!"
 crop_failure_big_modifier: "Neúroda kvůli sopečné zimě"
 crop_failure_medium_modifier: "Neúroda kvůli sopečné zimě"
 crop_failure_small_modifier: "Neúroda kvůli sopečné zimě"
 krakatoa_crop_cost_modifier: "Náklady na pomoc při sopečné zimě"
 krakatoa_crop_failure_tt: "Neúroda postihne i zbytek světa."
 krakatoa_crop_failure_small_modifier_tt: "Naše státy s farmami nebo plantážemi zažijí menší neúrodu."
 krakatoa_crop_failure_medium_modifier_tt: "Naše státy s farmami nebo plantážemi zažijí velkou neúrodu."
 krakatoa_crop_failure_big_modifier_tt: "Naše státy s farmami nebo plantážemi zažijí ničivou neúrodu."
 krakatoa.4.t: "Proudy kouře"
 krakatoa.4.d: "Po celé zemi byly několik měsíců hlášeny sytě rudé západy slunce. Ve státě [SCOPE.sState('art_state').GetName] byli dokonce povoláni hasiči, aby uhasili zdánlivý požár. Mnozí umělci a akademici projevili o tento jev zájem."
 krakatoa.4.f: "„Modrý a někdy zelený měsíc, jehož hořlavá záře rozněcuje noc nepřirozenou intenzitou. Bílé měsíční paprsky pronikající mraky vystupují fialové a někdy také modré, zelené.\n\nLevandulová slunce, noční svítící oblaka, odpudivá fascinace.“"
 krakatoa.4.a: "Jen obraz by dokázal zachytit takovou krásu."
 krakatoa.4.b: "Akademici musí zajistit, abychom byli připraveni na další erupci."
 krakatoa_art_modifier: "Sponzorováni inspirovaní umělci"
 krakatoa_uni_modifier: "Financován sopečný výzkum"
 krakatoa_uni.tt: "Sopečné erupce budou v budoucnu méně ničivé."
 je_prohibition: "Hnutí střídmosti"
 je_prohibition_reason: "Ačkoli jejich postoje vycházejí z velmi odlišných předpokladů, [SCOPE.gsInterestGroup('devout_ig').GetName] i [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] se shodli, že alkohol je jedem pro mysl. Pouze vládní zákaz ukončí toto zlo."
 je_prohibition_goal: "Následující podmínky musí platit celkem 10 let (může být přerušeno):"
 prohibition_fail.tt: "Odmítnuto hnutí střídmosti v události Prohibice."
 prohibition_success.tt: "Likérová [concept_obsession] bude odstraněna z každé primární kultury."
 prohibition.1.t: "Prohibice"
 prohibition.1.d: "[SCOPE.gsInterestGroup('devout_ig').GetName] i [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] vyjádřili přání zastavit znepokojivou spotřebu alkoholu v naší zemi a žádají vládu, aby jej zakázala."
 prohibition.1.f: "„Nepiji ani nekouřím, protože mi můj učitel vštípil tři základní ctnosti: čistotu těla, čistotu mysli a střídmost.“" #John Burns
 prohibition.1.a: "Alkohol je jedem pro mysl."
 prohibition.1.b: "Nic nevykouzlí muži úsměv na tváři víc než sklenka whisky před spaním!"
 started_temperance_modifier: "Zahájeno hnutí střídmosti"
 rejected_prohibition_modifier: "Odmítnuto hnutí střídmosti"
 rejected_prohibition_tt: "Tím se odstraní záznam v deníku Hnutí střídmosti."
 prohibition.2.t: "Zevnitř"
 prohibition.2.d: "Bylo zjištěno, že [SCOPE.sCharacter('alcoholic_leader').GetFullName] ze skupiny [SCOPE.gsInterestGroup('alcoholic_ig').GetName] zřídil ve vlastním domě nelegální palírnu. Během zdánlivě nevinné oslavy [SCOPE.sCharacter('alcoholic_leader').GetHerHis] syna hosté otevřeli špatnou kůlnu."
 prohibition.2.f: "„To je šílenství! Jak bych mohl já, vzorný občan dodržující zákony, být obviněn z takové zrady — takového... odporného chování. Zrada! Vydírání! Někdo mě chce obvinit!“"
 prohibition.2.a: "Výmluvy! Pošlete muže na tu zatracenou oslavu!"
 prohibition.2.b: "[SCOPE.sCharacter('alcoholic_leader').GetSheHe|U] měl vždy problematickou povahu."
 prohibition.2.c: "[SCOPE.sCharacter('alcoholic_leader').GetSheHe|U] je očividně falešně obviněn."
 birthday_raid_modifier: "Nelegální palírna rozebrána"
 birthday_raid_leader_modifier: "Odhalena nelegální palírna"
 birthday_raid_gentlemen_modifier: "Odhalena nelegální palírna"
 prohibition.3.t: "Špatné pro obchod"
 prohibition.3.d: "Členové skupiny [SCOPE.gsInterestGroup('industrialists_ig').GetName] vyjádřili nespokojenost s nedávným hnutím střídmosti a stěžují si, že lihový průmysl tvoří důležitou část jejich příjmů."
 prohibition.3.f: "„Co mám teď dělat? Prodávat hračky? Mám navštívit babičku? Požádat ji, aby mě naučila plést, abych mohl vyrábět malé roztomilé svetříky pro nóbl panenky? Proboha, jsme tu přece všichni dospělí muži, ne?“"
 prohibition.3.a: "Pak by měl [SCOPE.sCharacter('industrialist_leader').GetSheHe] okamžitě zavolat [SCOPE.sCharacter('industrialist_leader').GetHerHis] babičce."
 prohibition.3.b: "Stále mohou využívat vinice."
 industrialists_rejected_modifier: "Odmítnuty požadavky průmyslníků ohledně alkoholu"
 wine_allowed_modifier: "Podpořena výroba vína"
 prohibition.4.t: "Nejlepší zatracený obchod se zvířaty ve městě"
 prohibition.4.d: "Ve městě [SCOPE.sState('temperance_state').GetCityHubName] byly hlášeny neobvyklé zvuky a podezřelé chování. Místní obchod se zvířaty — nedávno otevřený — láká spoustu zákazníků."
 prohibition.4.f: "„Obchod se zvířaty, co? No, mám jen jednu otázku. Jaký obchod se zvířaty je v jednu ráno plný hlučných povalečů a divoké hudby?“" #Simpsons' Reference (again, I'm sorry)
 prohibition.4.a: "To budou asi jen ti hluční Pet Shop Boys."
 prohibition.4.b: "Nuže, pak se podíváme na papíry toho obchodu se zvířaty."
 prohibition.4.c: "Koho si myslí, že obelhávají!? Strážníci!"
 prohibition.5.t: "Pivní baroni"
 prohibition.5.d: "Členové skupiny [SCOPE.gsInterestGroup('alcoholic_ig').GetName] byli přistiženi, jak využívají budovu [SCOPE.sBuilding('temperance_building').GetName] ve státě [SCOPE.sState('temperance_state').GetName] k výrobě přebytku alkoholických nápojů, které nelegálně prodávají pro vlastní zisk."
 prohibition.5.f: "„Byly to brambory! Co jiného s nimi máme dělat? Pyré? Když je v jejich povaze vyrábět alkohol, jak se od nás očekává, že tomu zabráníme?“"
 prohibition.5.a: "To musí být okamžitě rozebráno."
 prohibition.5.b: "Je to jen farma."
 subsistence_liquor_modifier: "Povolen farmářský alkohol"
 subsistence_liquor_bad_modifier: "Zakázán farmářský alkohol"
 banned_subsistence_liquor: "Zakázán farmářský alkohol"
 prohibition.6.t: "Abstinentství"
 prohibition.6.d: "Členové skupiny [SCOPE.gsInterestGroup('devout_ig').GetName] prohlásili, že zákaz lihovin nemá smysl, pokud lidé stále mají přístup k vínu."
 prohibition.6.f: "„Když se chce člověk opít a stát se lidskou zrůdou, stále to může svobodně udělat! Je zbytečné předstírat, že tam venku pořád nejsou, nepijí víno a nehodují, jako by se nic nedělo!“"
 prohibition.6.a: "V tom mají pravdu."
 prohibition.6.b: "Náš lid zvládne jen určitou míru."
 teetoliarism_modifier: "Podpořeno abstinentství"
 no_teetoliarism_modifier: "Odmítnuto abstinentství"
 prohibition.7.t: "Masakr za bílého dne"
 prohibition.7.d: "Členové dvou znepřátelených gangů byli zavražděni za bílého dne během potyčky související s alkoholem. Jeden z jejich vůdců byl konečně identifikován a občané požadují ochranu."
 prohibition.7.f: "„Ale je to takový dobrák! Vždycky byl velmi dobročinný, i přes všechno to pašování alkoholu a podezřelé věci. Přispívá chudým a otevírá vývařovny pro potřebné. Říkám vám, moderní Robin Hood!“"
 prohibition.7.a: "Tohle končí. Postavíme ho před soud."
 prohibition.7.b: "Lidé ho nenávidí. Lidé ho milují. Tady se dá uzavřít dohoda."
 prohibition.7.c: "Dáme jemu i jeho gangu lekci."
 deal_with_gangster_modifier: "Dohoda s gangsterem"
 gangsters_modifier: "Gangster postaven před soud"
 prohibition.8.t: "Odznak modré stuhy"
 prohibition.8.d: "Po vládním úsilí zakázat alkoholické nápoje je země [ROOT.GetCountry.GetName] nyní bez lihovin."
 prohibition.8.f: "„Mluv k synům Izraele a řekni jim, aby si po všechna svá pokolení dělali třásně na okrajích svých rouch a na třáseň okraje dávali modrou šňůrku. A bude vám ta třáseň k tomu, abyste na ni hleděli a pamatovali na všechna přikázání Hospodinova a činili je.“" #Numbers 15:38-39
 prohibition.8.a: "Konečně je náš lid osvobozen od zla."
 prohibition_laws_pm.tt: "Tím se výrazně zvýší postup v záznamu v deníku Hnutí střídmosti."
 prohibition_laws_weak_pm.tt: "Tím se zvýší postup v záznamu v deníku Hnutí střídmosti."
 prohibition_laws_bad_pm.tt: "Tím se sníží postup v záznamu v deníku Hnutí střídmosti."
 expedition_events.695.t: "Nečekaná skupina"
 expedition_events.695.d: "Jak expedice postupuje, bujná džungle odhalí nepravděpodobný výjev: členové ztracené [SCOPE.sCountry('lost_expedition_country').GetAdjectiveNoFormatting] expedice leží nemocní v provizorních hamakách."
 expedition_events.695.f: "„Jako by byla roztržena opona. Na té slonovinové tváři jsem spatřil výraz pochmurné pýchy, bezohledné moci, zbabělé hrůzy — intenzivního a beznadějného zoufalství.\n\nProžil snad v tom nejvyšším okamžiku úplného poznání znovu celý svůj život v každém detailu touhy, pokušení a kapitulace? Zašeptal k jakémusi obrazu, k jakémusi vidění — vykřikl dvakrát, výkřikem, který nebyl víc než dechem: „Ta hrůza! Ta hrůza!““" #Joseph Conrad
 expedition_events.695.a: "Dovedeme tyto muže do bezpečného útočiště."
 expedition_events.695.b: "Přidejte se k nám! Dvě expedice jsou lepší než jedna."
 expedition_events.695.c: "To by nás jen zdrželo."
 expedition_events.695.e: "Bandě [SCOPE.sCountry('lost_expedition_country').GetAdjectiveNoFormatting] mužů bychom nikdy nemohli věřit. Naostřete nože."
 killed_lost_expedition_tt: "Tento čin může mít následky."
 expedition_events.696.t: "Zpráva se rozšířila"
 expedition_events.696.d: "Krátce po triumfálním návratu byla expedice vedená [SCOPE.sCharacter('expedition_leader').GetFullName] odsouzena zemí [SCOPE.sCountry('lost_expedition_country').GetNameNoFormatting], když sílily zvěsti o její účasti na osudu ztracené expedice."
 expedition_events.696.f: "„Bronzové skvrny na jejich šatech, sluncem vyžrané stopy, zoxidované. Jejich tváře zkřivené do dětské grimasy, teď se usmívají, teď se smějí, teď — litují. Snad. Krev zasychala celé týdny, možná měsíce. Nenáviděli to? Byli na své činy pyšní? Mohli se z toho někdy dostat? Zapomenout? Ošklivit si to? Zasychala celé týdny, možná měsíce.“"
 expedition_events.696.a: "[SCOPE.sCharacter('expedition_leader_cruel').GetSheHe|U] musí okamžitě odstoupit!"
 expedition_events.696.b: "Nemají žádný způsob, jak to dokázat."
 expedition_leader_cruel_fired_tt: "[SCOPE.sCharacter('expedition_leader').GetFullName] odstoupí."
 je_assassination: "Zabránit atentátu"
 je_assassination_reason: "Zjistěte, kdo jsou spiklenci, a zastavte atentát, než bude příliš pozdě.\n\nZvyšte úroveň své #bold policejní instituce#!, prosazujte zákony #bold $identification_documents$#! nebo #bold $mass_surveillance$#! a zkoumejte #bold $identification_documents$#! či #bold $mass_surveillance$#!, abyste zvýšili své šance na zdržení zrádců."
 je_assassination_low: "Postup při odhalování spiklenců připravujících atentát je nízký."
 je_assassination_middle: "Došlo k určitému pokroku při odhalování spiklenců připravujících atentát."
 je_assassination_high: "Jsme si téměř jistí, kdo jsou spiklenci připravující atentát."
 je_assassination_tt: "Ohrožený vládce už není u moci."
 je_assassination_timeout_tt: "Spiklencům se podaří zavraždit našeho vládce."
 je_assassination_caught_em_tt: "Odhalíme, kdo jsou spiklenci."
 assassination_events.1.t: "Neviditelní muži"
 assassination_events.1.d: "Spolehlivé zdroje informují o vnitřním spiknutí, jehož cílem je ukončit život [SCOPE.sCharacter('assassination_ruler_scope').GetFullNameWithTitle]. Pokud nezasáhneme včas, stabilita země nebude zaručena."
 assassination_events.1.f: "Možná je to jejich tón, možná nevyhnutelná úzkost, která přichází s mocí. Temná, sladká laskavost tak neupřímná, že i zrádci se děsí poslední večeře.\n\n„Lidé mluví a někteří z nich si přejí, aby [SCOPE.sCharacter('assassination_ruler_scope').GetFullNameNoFormatting] už nemluvil.“\n\nTřicet stříbrných, symbolická cena. Dnes, možná zítra — budeme-li mít štěstí."
 assassination_events.1.a: "Najdeme je a pověsíme!"
 advance_assassination_progress_tt: "Tím pokročíme v určování toho, kdo kuje pikle proti našemu vládci."
 assassination_events.2.t: "Neviditelní muži: prázdné místo"
 assassination_events.2.d: "Bylo odhaleno tajné setkání organizované členy skupiny [SCOPE.gsInterestGroup('suspicious_ig').GetName]. Ačkoli přísahají, že jeho účel byl čistě finanční, mnozí je podezírají ze spojení se spiklenci připravujícími atentát."
 assassination_events.2.f: "Hlasy doléhají na ulici pozoruhodně jasně, vzhledem k jejich úmyslům. Zvuk skla je však slyšet jen z interiéru. Jejich tváře ztrácejí ostrost, když se odrážejí ve víně.\n\n„Jsou tam celý den,“ říká květinářka a její mozolnaté ruce pohrdavě ukazují, „viděla jsem je přicházet, když jsem otevírala obchod, ani na oběd nevyšli.“"
 assassination_events.2.a: "Vypadá to jen jako večírek."
 assassination_events.2.b: "Vskutku dost podezřelé."
 assassination_events.2.c: "O skupině [SCOPE.gsInterestGroup('second_suspicious_ig').GetName] se říkaly horší věci."
 assassination_ig_not_monitored_modifier: "Nemonitorovaná zájmová skupina"
 assassination_events.3.t: "Neviditelní muži: tip zevnitř"
 assassination_events.3.d: "[SCOPE.sCharacter('snitch_leader').GetFullName], vůdce skupiny [SCOPE.gsInterestGroup('snitch_ig').GetName], za námi přišel se znepokojivým varováním. Obviňuje skupinu [SCOPE.gsInterestGroup('snitched_ig').GetName], že právě ona plánuje atentát na [SCOPE.sCharacter('assassination_ruler_scope').GetFullName]."
 assassination_events.3.f: "„Víte, že jsem poctivý [SCOPE.sCharacter('snitch_leader').GetWomanMan], nikdy bych se nepokusil jít proti sobě rovnému, gentlemanovi, pravé dámě. Ale tohle nejsou ušlechtilí lidé. Hodují na slovech závisti a zrady, nedokážou ani udržet jazyk za zuby, protože jsou hluboce prohnilí.“"
 assassination_events.3.a: "To vlastně není překvapení."
 assassination_events.3.b: "Můžeme opravdu věřit rivalovi?"
 assassination_events.3.c: "Zajímavé... protože jsme také slyšeli zvěsti o [SCOPE.sCharacter('snitch_leader').GetHerHim]."
 suspicious_modifier: "Podezřelá zájmová skupina"
 snitch_modifier: "Práskač"
 assassination_events.4.t: "Neviditelní muži: obvinění"
 assassination_events.4.d: "Nejvznešenější členové společnosti nyní tráví dny vzájemným obviňováním z účasti na spiknutí za účelem atentátu a tentokrát se všechny zraky upírají na skupinu [SCOPE.gsInterestGroup('suspicious_ig').GetName]."
 assassination_events.4.f: "„Milý deníčku, dnes byl tak krásný den. Doprovázela jsem matku na večeři a navštívily jsme několik jejích venkovských přátel, kteří přijeli do města na sezónu.\n\nBěda, všichni mluvili o tom nesmyslném atentátu a říkali, že ten či onen gentleman byl viděn s tím či oním. Díky [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], že si mě malý Pincher docela oblíbil a většinu večera jsme si hráli v salonu! Takový milý mladík!“"
 assassination_events.4.a: "Zní to dost podezřele."
 assassination_events.4.b: "#italic Kdo#! to vlastně říká?"
 assassination_events.4.c: "Pokud se informace rozšířily tak snadno, máme horší problémy."
 assassination_events.6.t: "Atentát — nebo také ne"
 assassination_events.6.d: "Spiknutí za účelem atentátu dospělo k nečekanému konci. Jelikož [SCOPE.sCharacter('assassination_ruler_scope').GetFullName] už není hlavou země, jejich snahy byly zcela zastaveny."
 assassination_events.6.f: "„Někdy vyhrajete, někdy prohrajete. Někdy musíte prohrát, abyste vyhráli.“"
 assassination_events.6.a: "No, alespoň nedošlo k atentátu."
 deposed_ruler_modifier: "Sesazený vládce"
 assassination_events.7.t: "Atentát zastaven"
 assassination_events.7.d: "Zrádné úmysly skupiny [SCOPE.gsInterestGroup('suspicious_ig').GetName] byly konečně odhaleny. Příslušníci úřadů našli dostatek důkazů, aby zabránili spiknutí za účelem atentátu."
 assassination_events.7.f: "[SCOPE.sCharacter('assassination_ruler_scope').GetFullNameNoFormatting] dostává [SCOPE.sCharacter('assassination_ruler_scope').GetHerHis] snídani od pondělí do pátku v 8:00 a o víkendech v 8:30. Po obědě se [SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] rád prochází v zahradách, zřídkakdy je [SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] doprovázen.\n\nNásleduje seznam jmen uvádějící všechny muže, které [SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] zve na karty. [SCOPE.sCharacter('assassination_ruler_scope').GetHerHis|U] kuchař, služebné, několik vládních zaměstnanců."
 assassination_events.7.a: "Den, na který můžeme být hrdí!"
 assassination_caught_em_modifier: "Zastaveno spiknutí za účelem atentátu"
 assassination_events.8.t: "Atentát — nebo také ne"
 assassination_events.8.d: "Spiknutí za účelem atentátu dospělo k nečekanému konci. Jelikož [SCOPE.sCharacter('assassination_ruler_scope').GetFullName] zemřel z nesouvisejících příčin, jejich snahy ustaly."
 assassination_events.8.f: "A tak navěky po smrti přichází vzkříšení. Z utrpení této přítomné hodiny přichází radost. A věřme, že země už nikdy nepozná smrt!" #Denis Wortman
 assassination_events.8.a: "Ať [SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] odpočívá v pokoji."
 assassination_dead_ruler_modifier: "Mrtvý vládce"
 election_other_parties_events.1.t: "Člověk nad strojem"
 election_other_parties_events.1.d: "Členové strany [SCOPE.sParty('agrarian_party').GetName] vyjádřili své obavy, že technologie nahradí nezávislost a důstojnost ruční práce."
 election_other_parties_events.1.f: "„Svěřili byste vzdělání svých dětí stroji? Nebo blaho svého těla? Proč bychom jim tedy měli svěřit práci na naší půdě?\n\nJídlo, které jíme, pospolitost, tvrdá práce, spolupráce, která vychází ze zemědělství — to jsou základy naší společnosti a pokrok je nemůže ani nesmí nahradit.“"
 election_other_parties_events.1.a: "Neměli bychom ohrozit práci našeho lidu."
 election_other_parties_events.1.b: "Pokrok si vždy najde cestu."
 anti_industrial_party_modifier: "Člověk nad strojem"
 election_other_parties_events.2.t: "Boží vůle"
 election_other_parties_events.2.d: "[SCOPE.sCharacter('religious_leader').GetFullName] ze skupiny [SCOPE.gsInterestGroup('ig_devout').GetName] byl spatřen, jak káže ve prospěch strany [SCOPE.sParty('religious_party').GetName], přesvědčený, že její vítězství bylo předpovězeno v plánech [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]."
 election_other_parties_events.2.f: "„Myslíte si, že [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] by neměl plán pro naši zbožnou zemi? Samozřejmě, že existuje plán! Vždy musí existovat plán! Sám jsem ho viděl, povím vám, a viděl jsem ho tak jasně, jako teď vidím vás všechny, přímo před svýma očima.\n\nA kdo jiný má vést tuto zbloudilou vládu než ti, kdo dokážou ten plán jasně číst?“"
 election_other_parties_events.2.a: "A kdo jsme my, abychom stáli proti vůli [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]?"
 election_other_parties_events.2.b: "Jaká škoda, že zemi tedy nevládne [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]."
 election_other_parties_events.2.c: "Ale [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] si jistě přeje, aby zvítězila strana [SCOPE.sParty('other_party').GetName]!"
 gods_will_modifier: "Boží vůle"
 gods_wont_modifier: "Odmítnutý projev"
 custom_god: "Bůh"
 custom_the_lord: "Pán"
 custom_allah: "Alláh"
 custom_gods: "Nejvyšší"
 election_other_parties_events.3.t: "Přirozené řešení"
 election_other_parties_events.3.d: "Členové strany [SCOPE.sParty('military_party').GetName] hlasitě prohlásili, že jediným způsobem, jak nás vyvést z války [SCOPE.sWar('ongoing_war').GetName], je svěřit vládu nad naší zemí do jejich schopných rukou."
 election_other_parties_events.3.f: "„Zoufalé časy si žádají zoufalá opatření. Ne že bychom my byli zoufalým opatřením, samozřejmě, ale tak to přísloví říká — přirozený řád lingvistiky. Každému, co jeho jest, ordo naturalis, musíme hrát podle těchto pravidel. A co by mohlo být přirozenější než nechat stranu [SCOPE.sParty('military_party').GetNameNoFormatting], aby nás vedla válkou?“"
 election_other_parties_events.3.a: "Jsou skutečně našimi nejschopnějšími lidmi."
 election_other_parties_events.3.b: "Vojenský populismus? V mé válce?"
 supported_war_politics_modifier: "Válečná politika"
 supported_war_leaders_modifier: "Podpořeni vojenští vůdci"
 election_other_parties_events.4.t: "Zlatá střední cesta"
 election_other_parties_events.4.d: "Členové strany [SCOPE.sParty('social_democrat_party').GetName] upozornili na vzestup strany [SCOPE.sParty('leftist_party').GetName] a vyjádřili ochotu nabídnout umírněnější řešení jejího politického extremismu."
 election_other_parties_events.4.f: "„Slyšeli jste o té nebezpečné straně [SCOPE.sParty('leftist_party').GetNameNoFormatting]? Říkali mi, že se její členové scházejí v noci, plánují svůj další teroristický útok a jedí děti! Děti!“"
 election_other_parties_events.4.a: "A díky [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], že ano."
 election_other_parties_events.4.b: "Zní to trochu přitaženě za vlasy, ale strana [SCOPE.sParty('social_democrat_party').GetName] je stále rozumnou volbou."
 election_other_parties_events.5.t: "Radikální expanze"
 election_other_parties_events.5.d: "Myšlenky strany [SCOPE.sParty('radical_party').GetName] vzbuzují zájem po celé zemi, což může vést k nepokojům."
 election_other_parties_events.5.f: "„Ti, kdo prohlašují, že podporují svobodu, a přitom znevažují agitaci, jsou lidé, kteří chtějí úrodu bez orání půdy; chtějí déšť bez hromu a blesku; chtějí oceán bez burácení jeho mnohých vod.“" #Frederick Douglas
 election_other_parties_events.5.a: "A měli by se rozšířit ještě dál."
 election_other_parties_events.5.b: "Ohrožují jednotu [ROOT.GetCountry.GetAltAdjectiveNoFormatting('G')]!"
 election_other_parties_events.5.c: "Někdo by je měl přesvědčit, aby přestali."
 stopped_radicals_modifier: "Postaveno se proti radikalismu"
 je_belle_epoque: "Belle Époque"
 je_belle_epoque_goal: "Veďte zemi [ROOT.GetCountry.GetName] po dobu #BOLD 10 let#! jako kulturní a technologické centrum světa."
 je_belle_epoque_reason: "Dosáhli jsme tak vysokého uměleckého a společenského pokroku, že nastal čas uvolnit se a užívat si našich úspěchů."
 belle_epoque_sol_trigger: "Více než 50 % našich $concept_incorporated_state$s má $concept_sol$ vyšší než #BOLD 15#!."
 belle_epoque_events.1.t: "Eiffelova věž"
 belle_epoque_events.1.d: "Výstavba Eiffelovy věže rozdělila pařížskou veřejnost. Zatímco někteří tvrdí, že se tato stavba stane jejich nejslavnější dominantou, jiní ji označují za „obří rozhlasovou věž“."
 belle_epoque_events.1.f: "„My, spisovatelé, malíři, sochaři, architekti a vášniví ctitelé dosud nedotčené krásy Paříže, protestujeme ze všech sil, s veškerým rozhořčením ve jménu uraženého francouzského vkusu proti vztyčení této zbytečné a obludné Eiffelovy věže.“"
 belle_epoque_events.1.a: "Mýlí se! Tato stavba je sama Paříž!"
 belle_epoque_events.1.b: "Když to tak říkají..."
 belle_epoque_events.1.c: "Stejně bude za méně než deset let zbořena."
 Alexandre_Gustave: "Alexandre Gustave"
 Eiffel: "Eiffel"
 eiffel_tower_modifier: "Slavnostní otevření Eiffelovy věže"
 gustave_eiffel_modifier: "Podpořen architekt Eiffelovy věže"
 gustave_eiffel_sad_modifier: "Kritizována výstavba Eiffelovy věže"
 eiffel_tower_intelligentsia_modifier: "Kritizována architektura Eiffelovy věže"
 eiffel_tower_slander_modifier: "Očernění Eiffelovy věže"
 gustave_eiffel_angry_modifier: "Znevážen architekt Eiffelovy věže"
 belle_epoque_events.2.t: "Art Nouveau"
 belle_epoque_events.2.d: "Rozšíření nového uměleckého stylu inspirovaného přírodou, napodobujícího klikaté křivky rostlin pomocí robustního železa a skla, aby vyjádřil rozpory pokroku, dosáhlo vyšších kruhů města [SCOPE.sState('belle_epoque_state').GetCityHubName]."
 belle_epoque_events.2.f: "„Víte, prostě jsem maloval dál. Pokračoval jsem — bez návrhu či skici, rostlo to, jak jsem maloval. A ke konci jsem dosáhl takové dokonalosti — každý tah jsem prováděl s takovou volností — že když jsem se dostal zpět k rohu, kde jsem začal, musel jsem část přemalovat, protože rozdíl by byl příliš výrazný. A jak se rozvíjela harmonie v modři a zlatě, víte, zapomněl jsem v radosti z ní na všechno.“" #James McNeill Whistler
 belle_epoque_events.2.a: "Tento nový styl je skutečně okouzlující."
 belle_epoque_events.2.b: "A říkají, že malují bez návrhu. No, je to vidět."
 art_nouveau_strike_modifier: "Art Nouveau strefuje vkus"
 art_nouveau_love_modifier: "Okouzlení Art Nouveau"
 belle_epoque_events.3.t: "Les symbolů" #Baudelaire reference
 belle_epoque_events.3.d: "Po úspěšných publikacích symbolistického hnutí se [SCOPE.sCharacter('symbolist_leader').GetFullName] rozhodl vydat vlastní cestou a pustit se do své vlastní literární pouti, což je zdrojem obav pro [SCOPE.gsInterestGroup('symbolist_ig').GetName]."
 belle_epoque_events.3.f: "„A přece\ndávám přednost před vínem, ba i opiem,\nelixíru tvých rtů, na nichž se láska pyšní;\na v pustině touhy\nmi tvé oči skýtají studny, jež hasí mou žízeň.“" #Baudelaire again / forgive me for these events I've quoted way too much
 belle_epoque_events.3.a: "Zaslouží si mít soukromý život."
 belle_epoque_events.3.b: "To je neslýchané! Básník-politik!"
 belle_epoque_events.3.c: "[SCOPE.sCharacter('symbolist_leader').GetSheHe|U] bude muset odstoupit."
 symbolist_leader_modifier: "Symbolistický vůdce"
 symbolist_ig_bad_modifier: "Obavy ze symbolistického vůdce"
 symbolist_leader_bad_modifier: "Špatná pověst symbolistického vůdce"
 symbolist_ig_good_modifier: "Symbolistický vůdce pokárán"
 belle_epoque_events.4.t: "Moulin Rouge"
 belle_epoque_events.4.t2: "Kouř a kabaret"
 belle_epoque_events.4.d: "Otevření luxusního kabaretu na úpatí kopce Montmartre značně oživilo noční život Paříže. Samozřejmě přitáhlo pozornost a podezření konzervativců."
 belle_epoque_events.4.f: "Žena během zprávy vzdychá v místnosti naplněné kouřem. Kadidlo a cigarety jsou k nerozeznání — stejně jako pára, ačkoli není možné poznat, odkud přichází. Hudba je zde tlumená, hustá jako sirup.\n\n„Děkuji vám za společnost v těchto chladných nocích,“ zavrní a hodí dokument do ohně, „velmi jsme potřebovali trochu paliva navíc.“"
 belle_epoque_events.4.a: "To místo má všechno!"
 belle_epoque_events.4.b: "Tento nemravný podnik musí být okamžitě zavřen."
 cabaret_modifier: "Otevření kabaretu"
 cabaret_good_modifier: "Potlačení kabaretu"
 cabaret_building_modifier: "Podpořen kabaret"
 shut_down_cabaret_modifier: "Náklady na potlačení kabaretu"
 belle_epoque_events.5.t: "Pasteurova vakcína proti vzteklině"
 belle_epoque_events.5.t2: "Vakcína proti vzteklině"
 belle_epoque_events.5.d: "Louis Pasteur, vědec známý svou prací o nemocech bource morušového, sterilizaci a přenosu nemocí, dokončil lidské zkoušky vakcíny proti vzteklině vytvořené ze sušené nakažené nervové tkáně králíků."
 belle_epoque_events.5.d2: "Poprvé [ROOT.GetCountry.GetAdjective] laboratoř dokončila lidské zkoušky praktické vakcíny proti vzteklině vytvořené ze sušené nakažené nervové tkáně králíků."
 belle_epoque_events.5.f: "„Smrt dítěte se zdála nevyhnutelná. Rozhodl jsem se, nikoli bez ostré a trýznivé úzkosti, jak si lze představit, použít na Josepha Meistera metodu, která se mi u psů trvale osvědčila.“"
 belle_epoque_events.5.f2: "K zajištění úspěchu je třeba co nejdříve po vystavení nakaženému zvířeti zahájit každodenní podávání imunizací po dobu čtrnácti až jednadvaceti dnů, blízko konce pracovní doby."
 belle_epoque_events.5.a: "Lidstvo dosahuje dalšího vítězství nad morem."
 modifier_rabies_vaccine: "Vakcína proti vzteklině"
 belle_epoque_events.6.t: "Sortie de l'usine Lumière de [SCOPE.sState('lumiere_state').GetCityHubName]"
 belle_epoque_events.6.t2: "Vzestup kinematografie"
 belle_epoque_events.6.d: "Louis a Auguste Lumièrové, vynálezci kinematografu, uvedli pětačtyřicetisekundový „animovaný fotografický pohled“, který zachycuje dělníky jejich továrny ve státě [SCOPE.sState('lumiere_state').GetName], jak opouštějí své pracoviště."
 belle_epoque_events.6.d2: "Krátký film zachycující dělníky v továrně na kamery ve městě [SCOPE.sState('lumiere_state').GetCityHubName] přitáhl pozornost veřejnosti k technologii pohyblivých obrazů. Diváci ve státě [SCOPE.sState('belle_epoque_state').GetName] se hrnuli do salonů i divadel, aby viděli tento film i jemu podobné."
 belle_epoque_events.6.f: "Publikum, tvořené investory i podnikateli, fascinovaně sledovalo, jak se na plátně rozvíjejí obrazy. Nejprve vyšli vedoucí pracovníci, po nich ženy zaměstnané v továrně a nakonec obyčejní dělníci. Pětačtyřicet sekund působilo mnohem déle, jak se výjev rozprostíral po látkovém plátně a částečky prachu v paprscích světla z projektoru se vznášely ve vzduchu ve stejném očekávání jako publikum."
 belle_epoque_events.6.a: "Dvacáté století bude zachyceno na filmu!"
 belle_epoque_events.6.b: "Kino nemá žádnou komerční budoucnost."
 modifier_film_industry_bonus: "Vzestup kinematografie"
 modifier_trad_arts_bonus: "Podpořeno tradiční umění"
 belle_epoque_events.7.t: "Cinéorama"
 belle_epoque_events.7.d: "Vynálezce Raoul Grimoin-Sanson vyvinul zařízení nazvané „photoachygraphe“, které promítá pohyblivé obrazy na více ploch najednou. S tímto zařízením se mu podařilo vytvořit simulovanou pouťovou jízdu horkovzdušným balonem za použití záběrů Paříže shora, nazvanou Cinéorama."
 belle_epoque_events.7.f: "Plakát se třepotal, jak přes něj přeběhl vánek, a ještě více uvolňoval napůl povolený připínáček, který jej držel na místě. Před ním se tyčila veliká kupole postavená pro tuto událost, obklopená obrovským davem.\n\n„La Grande Attraction Nouvellae: Ballon Cinéorama! Projections panoramiques animées de GRIMOIN-SANSON!“"
 belle_epoque_events.7.a: "Photoachygraphe ukazuje neomezený potenciál!"
 belle_epoque_events.7.b: "Možná neomezený potenciál, ale také neomezené riziko požáru."
 modifier_cineorama_nice: "Jízdy Cinéorama"
 modifier_cineorama_fire: "Požár Cinéoramy"
 belle_epoque_events.8.t: "Peugeot Serpollet"
 belle_epoque_events.8.t2: "Parní omnibus"
 belle_epoque_events.8.d: "Podnik Peugeot ve spolupráci s inženýrem Léonem Serpolletem vytvořil experimentální návrh parní tříkolky využívající Serpolletův „okamžitý parní generátor“. Přestože zařízení nebylo veřejně uvedeno, stalo se v zemi [ROOT.GetCountry.GetName] symbolem inovace."
 belle_epoque_events.8.d2: "S uvolňováním vládních regulací mechanicky poháněných vozidel a vývojem účinnějších parních motorů začaly ve státě [SCOPE.sState('belle_epoque_state').GetName] stále častěji jezdit parní dopravní autobusy."
 belle_epoque_events.8.f: "„Výhody? Rychlý start, nízká hmotnost, malé rozměry, nízká spotřeba vody... a samozřejmě minimální riziko výbuchu.“"
 belle_epoque_events.8.f2: "„Motorové omnibusy jsou poháněny párou a — což je ve městě povahy [SCOPE.sState('belle_epoque_state').GetFarmHubName] důležité — jsou zcela bez zápachu, hluku a vibrací.“"
 belle_epoque_events.8.a: "Tyto stroje budou pohánět růst našich měst."
 belle_epoque_events.8.b: "Zdanění mechanických vozidel poskytne potřebné příjmy."
 modifier_steam_car: "Parní kočáry"
 belle_epoque_events.9.t: "Paříž-Rouen"
 belle_epoque_events.9.d: "Vývoj vozidel poháněných spalovacím motorem inspiroval různé [ROOT.GetCountry.GetAltAdjective('ee')|l] výrobce automobilů k uspořádání výstavy v podobě soutěže bezkoňských kočárů Paříž-Rouen."
 belle_epoque_events.9.f: "Vozidla se seřadila po pěti, každé jiného tvaru, poháněná benzinem i párou.\n\nNa mávnutí vlajkou jejich motory vypustily kakofonii rachotu a syčení, když se vydaly ulicí vpřed tempem, které daleko překonávalo přihlížející pěšáky. Zanedlouho se trať stočila z dohledu startovní čáry a zvuk motorů nahradil jásot."
 belle_epoque_events.9.a: "A vyrážejí!"
 belle_epoque_events.9.b: "Jak příšerná podívaná!"
 modifier_paris_rouen: "Přehlídka Paříž-Rouen"
 modifier_noise_complaints: "Stížnosti na hluk"
 belle_epoque_events.10.t: "Noví zbohatlíci"
 belle_epoque_events.10.t2: "Nové peníze"
 belle_epoque_events.10.d: "Prosperita [ROOT.GetCountry.GetAltAdjective('ee')|l] společnosti dala vzniknout nové generaci bohatých podnikatelů. Nejmódnějším doupětem těchto „nových zbohatlíků“ je Maxim's, exkluzivní restaurace vyzdobená v secesním stylu a sloužící nejbohatším a nejmódnějším občanům města [SCOPE.sState('belle_epoque_state').GetCityHubName]."
 belle_epoque_events.10.d2: "Ti členové [ROOT.GetCountry.GetAltAdjective('ee')|l] společnosti, kteří zbohatli díky nedávnému rozmachu technologického pokroku, si začali vytvářet vlastní módu, navštěvovat stále výstřednější akce vyšší společnosti a exkluzivní restaurace vyzdobené v secesním stylu."
 belle_epoque_events.10.f: "„Bylo to nahromadění sametu, krajek, stuh, diamantů a čeho všeho ještě, co nedokážu popsat. Svléknout jednu z těch žen je jako výlet, který vyžaduje tři týdny předchozího oznámení, je to jako stěhování.“"
 belle_epoque_events.10.f2: "„Má indiskrétní hlas,“ poznamenal jsem. „Je plný-“ zaváhal jsem.\n\n„Její hlas je plný peněz,“ řekl náhle.\n\nTo bylo ono. Nikdy předtím jsem to nechápal. Byl plný peněz - to bylo to nevyčerpatelné kouzlo, které v něm stoupalo a klesalo, jeho cinkot, jeho činelový zpěv.\n\n— F. Scott Fitzgerald, #italic Velký Gatsby#!"
 belle_epoque_events.10.a: "Místo, kam vzít dámy; ale nikdy ne vlastní ženu."
 belle_epoque_events.10.b: "Nový svět; hmotný, aniž by byl skutečný."
 modifier_noveaux_riches: "Nové bohatství"
 belle_epoque_events.11.t: "Kolečkový palác ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.11.t2: "Tanec na kolečkách"
 belle_epoque_events.11.d: "V módní čtvrti města [SCOPE.sState('belle_epoque_state').GetCityHubName] byl otevřen palác pro kolečkové bruslení, který se ihned po zpřístupnění veřejnosti stal nesmírně populárním."
 belle_epoque_events.11.d2: "Ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName] bylo otevřeno kluziště pro kolečkové bruslení, které městským třídám představuje novou vzrušující formu zábavy."
 belle_epoque_events.11.f: "Zatímco uvnitř budovy se ti, kteří měli štěstí a dorazili brzy, smáli při kroužení po dřevěné podlaze, pozdní příchozí venku se střetávali s policií, když se hlučně dožadovali své řady."
 belle_epoque_events.11.f2: "„Mánie? Ano, samozřejmě že je. Kde jinde byste mohli vidět milionáře v diamantech a hedvábí spadnout na zadek, smát se jako šílenec a pak to celé udělat znovu?“"
 belle_epoque_events.11.a: "Trocha tolik potřebné rozmarnosti."
 belle_epoque_events.11.b: "Snadný způsob, jak zapomenout na své démony."
 modifier_roller_skating_sol: "Tanec na kolečkách"
 belle_epoque_events.12.t: "Metro ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.12.t2: "Metro ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.12.d: "Síť podzemních železničních stanic, doplněná vstupy navrženými Hectorem Guimardem v secesním stylu, byla slavnostně otevřena ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]. Klikaté tvary vstupů do metra s červenými světly a zdobeným písmem se rychle staly symbolem města [SCOPE.sState('belle_epoque_state').GetCityHubName]."
 belle_epoque_events.12.d2: "Ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName] byla slavnostně otevřena nová síť podzemních železničních stanic, která dojíždějícím poskytuje ikonickou a levnou dopravu v mezích města."
 belle_epoque_events.12.f: "„Ty božské vstupy do metra, díky jejichž milosti lze sestoupit do oblasti podvědomí živých a monarchické estetiky zítřka.“\n\n— Salvador Dalí"
 belle_epoque_events.12.f2: "Ulice byly v těchto dnech mnohem civilizovanější, pomyslel si, když mířil ke stanici metra. Zatímco kdysi je zaplavoval ponurý pochod zástupů šourajících se do práce a z práce, nyní byla tato nevzhledná stáda zahnána pod zem, vtlačena do svých trubic a řítila se tunely.\n\nA co jiného byl pokrok než uhánění tmou?"
 belle_epoque_events.12.a: "Další krok k městu zítřka."
 belle_epoque_events.12.b: "Nový symbol pokroku naší země."
 modifier_metro_prestige: "Prestižní systém metra"
 modifier_metro_productivity: "Produktivní systém metra"
 belle_epoque_events.13.t: "Koloniální výstava ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.13.d: "Ve státě [SCOPE.sState('belle_epoque_state').GetName] se konala výstava představující bohatství našich kolonií po celém světě, která lákala návštěvníky ukázkami exotických zvířat, přírodních zdrojů a etnologickými expozicemi [SCOPE.sCulture('colonial_culture').GetName] lidí v napodobenině domorodé vesnice."
 belle_epoque_events.13.f: "Plakát k výstavě byl křiklavě rudý, nesl název „L'EXPOSITION ORIENTALE“ a zdobily jej karikatury národů impéria.\n\nŽeny ze západní Afriky s odhalenými prsy, nesoucí štíty a kyje a se zuřivými výrazy ve tvářích, lemovaly Alžířany v rouchách nesoucí ananasy a jemné vietnamské dívky s nalíčenými rty, balancující hrnce na hlavách.\n\nDítě zavěšené do paže své hedvábně oděné matky pohlédlo z plakátu na ni s nadějí v očích. „...stojí to jen půl franku!“"
 belle_epoque_events.13.f2: "„Myslíme si, že naše rasa je už tak dost ponížena, aniž by jednoho z nás vystavovali spolu s opicemi. Myslíme si, že jsme hodni být považováni za lidské bytosti s duší.“\n\n— James H. Gordon"
 belle_epoque_events.13.a: "Ohromující a poučné!"
 belle_epoque_events.13.b: "Možná jsou tyto lidské expozice přehnané."
 modifier_condemned_human_zoos: "Odsouzeny lidské zoo"
 modifier_condemned_human_zoos_negative: "Odsouzeny lidské zoo"
 belle_epoque_events.14.t: "Haute couture"
 belle_epoque_events.14.t2: "Vášeň pro módu"
 belle_epoque_events.14.d: "Okouzleny oblíbenými obrazy dokonalých hedvábných šatů a módních šperků vyráběných pařížskými řemeslníky začaly [ROOT.GetCountry.GetAdjective] ženy cestovat do země [SCOPE.sCountry('haute_couture_country').GetName], aby si v pařížských buticích kupovaly jemné oděvy."
 belle_epoque_events.14.d2: "Okouzleny oblíbenými obrazy dokonalých hedvábných šatů a módních šperků vytvořených [SCOPE.sCountry('haute_couture_country').GetAdjective] návrháři začaly [ROOT.GetCountry.GetAdjective] ženy překračovat hranice, aby si objednávaly jemné oděvy."
 belle_epoque_events.14.f: "„Proč bys vůbec žádala tolik peněz za pouhý oděv? Jaké štěstí ti může přinést?“\n\n„Stejné jako tvé zlaté hodinky a šavle, a možná ještě mnohem větší.“"
 belle_epoque_events.14.a: "Bez ohledu na hranice obě naše země slaví krásu jako sobě rovné."
 belle_epoque_events.14.b: "[SCOPE.sCountry('haute_couture_country').GetName] nás nesmí překonat!"
 modifier_haute_couture_competition: "Soutěž haute couture"
 belle_epoque_events.15.t: "Hledání haute couture"
 belle_epoque_events.15.t2: "Vysoká móda"
 belle_epoque_events.15.d: "Okouzleny oblíbenými obrazy dokonalých hedvábných šatů a módních šperků vyráběných pařížskými řemeslníky začaly ženy až ze země [SCOPE.sCountry('haute_couture_buyer_scope').GetName] cestovat do země [SCOPE.sCountry('haute_couture_country').GetName], aby si v pařížských buticích kupovaly jemné oděvy."
 belle_epoque_events.15.d2: "Okouzleny oblíbenými obrazy dokonalých hedvábných šatů a módních šperků vyráběných našimi řemeslníky začaly ženy až ze země [SCOPE.sCountry('haute_couture_buyer_scope').GetName] cestovat do země [SCOPE.sCountry('haute_couture_country').GetName], aby si kupovaly oděvy našich návrhářů."
 belle_epoque_events.15.f: "Postup, který se v posledních dnech stal běžným, přinášel průvodčím na stanici ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName] nemalé pobavení. Ženy s úzkostlivýma očima a plnými peněženkami přijížděly vlaky ze [SCOPE.sCountry('haute_couture_buyer_scope').GetAdjectiveNoFormatting] stanic a o několik týdnů později odjížděly v nádherných róbách a s kabelkami o několik liber lehčími.\n\nNa nástupištích se obě skupiny mísily, neteční manželé odvraceli zrak, zatímco jejich ženy si navzájem chválily dobrý vkus a slibovaly, že se znovu setkají."
 belle_epoque_events.15.a: "[ROOT.GetCountry.GetName] bude módním hlavním městem světa."
 belle_epoque_events.15.b: "Právě návrháři a pracovníci umožňují vznik takových věcí." # Like that would ever happen.
 modifier_prestigious_fashion_industry: "Prestižní módní průmysl"
 modifier_recognised_fashion_industry: "Uznaní pracovníci módního průmyslu"
 belle_epoque_events.16.t: "La Grande Roue de Paris"
 belle_epoque_events.16.t2: "Přelom století"
 belle_epoque_events.16.d: "Na oslavu konce devatenáctého století a začátku dvacátého bylo ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName] postaveno obrovské ruské kolo. Z jeho kabin lze po celém velkolepém městě [SCOPE.sState('belle_epoque_state').GetCityHubName] pozorovat novoroční ohňostroje."
 belle_epoque_events.16.d2: "Na oslavu konce devatenáctého století a začátku dvacátého bylo ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName] postaveno obrovské ruské kolo. Z jeho kabin lze po celém velkolepém městě [SCOPE.sState('belle_epoque_state').GetCityHubName] pozorovat novoroční ohňostroje."
 belle_epoque_events.16.f: "Celá Paříž se koupala ve světlech, od lodí plujících po Seině až po odrazy ohňostrojů na sněhem vybělených střechách. Když kabina dosáhla vrcholu kola, Marie si představila, že vidí svůj skromný dům, jehož vlastní světla byla zhasnuta, aby se ušetřila další mince na tekuté požitky jejího manžela.\n\nMožná, pomyslela si, ve světě tak rozlehlém a jasném pro ni přece jen existuje budoucnost mimo něj."
 belle_epoque_events.16.f2: "Největší touhou lidstva je dívat se na všechny ostatní svrchu, byť jen na nejkratší okamžik."
 belle_epoque_events.16.a: "Na nové století!"
 belle_epoque_events.16.b: "...a pryč se starým!"
 modifier_new_century: "Nové století"
 belle_epoque_events.17.t: "Myšlení fin de siècle"
 belle_epoque_events.17.t2: "Konec století"
 belle_epoque_events.17.d: "S blížícím se koncem století se zemí [ROOT.GetCountry.GetName] přehnalo literární a umělecké hnutí vyjadřující pesimismus a strach ze společenské degenerace."
 belle_epoque_events.17.f: "„Doufám, že zítra bude hezký den, Lane.“\n\n„Nikdy nebývá, pane.“\n\n„Lane, vy jste dokonalý pesimista.“\n\n„Dělám, co mohu, abych uspokojil, pane.“\n\n— Oscar Wilde, #italic Jak je důležité míti Filipa#!"
 belle_epoque_events.17.a: "Svět se zlepšuje — copak neviděli naše údaje o HDP?"
 belle_epoque_events.17.b: "V srdci každého z nás je semínko pesimismu."
 modifier_fin_de_sicle: "Myšlení fin de siècle"
 modifier_fin_de_sicle_more: "Zesílené myšlení fin de siècle"
 belle_epoque_events.18.t: "Dekadence ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.18.d: "Umělci a autoři napojení na [SCOPE.gsInterestGroup('decadent_ig').GetName] začali čerpat uměleckou inspiraci z „dekadentního“ románu Jorise-Karla Huysmanse „Naruby“, který popisuje zážitky muže, jenž se uchyluje k hyperestetickým smyslovým prožitkům a idealistickému umění, aby unikl světu."
 belle_epoque_events.18.f: "„Neexistuje jediný její výtvor, jakkoli jemný či působivý, který by lidský génius nedokázal vytvořit... O tom nemůže být pochyb: tuto věčnou, žvanivou stařenu již skuteční umělci neobdivují a nadešel čas nahradit ji umělostí.“"
 belle_epoque_events.18.a: "Samotná příručka dekadence."
 belle_epoque_events.18.b: "Jedovatý, rozkladný text."
 modifier_decadence_movement: "Dekadentismus"
 modifier_decadence_movement_no: "Odmítnutí dekadentismu"
 belle_epoque_events.19.t: "Manifest symbolismu"
 belle_epoque_events.19.d: "Básník Jean Moréas po vzoru dekadentního hnutí vydal umělecký manifest popisující umělecký směr, který se soustředí na vyjádření exotických ideálů prostřednictvím výstředních analogií a nepřímých odkazů."
 belle_epoque_events.19.f: "„Rytmus: oživená starobylá metrika; učeně uspořádaný chaos; rým zářící a tepaný jako štít ze zlata a bronzu, k rýmům nesrozumitelné plynulosti; alexandrín s četnými a pohyblivými cézurami; práce s prvními určitými čísly - sedm, devět, jedenáct, třináct - odvážnými v různých rytmických kombinacích, jejichž jsou cenou.“"
 belle_epoque_events.19.a: "Odvažme se žít!"
 belle_epoque_events.19.b: "Každá obnova je šílenství!"
 modifier_symbolism_movement_triumphant: "Vítězné symbolistické hnutí"
 modifier_symbolism_movement_mediocre: "Okrajové symbolistické hnutí"
 belle_epoque_events.20.t: "Nová menažerie"
 belle_epoque_events.20.t2: "Zoo ve městě [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.20.d: "Ménagerie du Jardin des Plantes ve státě [SCOPE.sState('belle_epoque_state').GetName] začala rozšiřovat své expozice díky prudkému růstu [SCOPE.sCountry('france_scope').GetAdjective] prosperity a volného času."
 belle_epoque_events.20.d2: "Zoo ve státě [SCOPE.sState('belle_epoque_state').GetName] začala rozšiřovat své expozice díky prudkému růstu [ROOT.GetCountry.GetAdjective] prosperity a volného času."
 belle_epoque_events.20.f: "„Ze své soukromé sbírky vám mohu zapůjčit znamenitý exemplář lva, odchyceného jako mládě při lovu v Africe...“\n\n„...náhodou již poměrně dlouho znám sběratele a chovatele exotických ptáků, který ve své soukromé menažerii vlastní nádherného papouška...“\n\nKurátor se opřel a pohlédl na sponzory před sebou. „Pánové, vše, co od vás žádám, je...“."
 belle_epoque_events.20.manul: "„Ze své soukromé sbírky vám mohu zapůjčit znamenitý exemplář lva, odchyceného jako mládě při lovu v Africe...“\n\n„...se vším štěstím pro vás dokážu odchytit exemplář mé obzvláště oblíbené druhové kočky. Té kulaté, a přesto divoké kočky manula, kterou Pallas popsal ze stepí nejvzdálenějšího Mongolska...“\n\nKurátor se opřel a pohlédl na sponzory před sebou. „Pánové, vše, co od vás žádám, je...“"
