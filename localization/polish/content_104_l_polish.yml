 sol_events.4.t: "Přeplněno"
 sol_events.4.d: "Bydlení v chudinských čtvrtích města [ROOT.GetCountry.GetCapital.GetCityHubName] dosáhlo tak bídného stavu, že celé rodiny údajně žijí na schodištích několika budov."
 sol_events.4.f: "„Po příjezdu jsme našli ponuré shluky domů namačkaných k sobě jako ozubená kola ve stroji bídy; celé špinavé a zapařené bloky obydlí, zchátralé, staré, temné dvory a temné sklepy, pronajímané tolika rodinám, že se mísily dohromady, jako by to bylo stádo prasat. Veškeré známky důstojného života zmizely.“"
 sol_events.4.a: "Tito lidé si zaslouží trochu důstojnosti."
 sol_events.4.b: "Tyto náklady nemůžeme pokrýt."
 slums_housing_opposed_modifier: "Proti bydlení v chudinských čtvrtích"
 slums_housing_modifier: "Lepší bydlení v chudinských čtvrtích"
 slums_housing_rejected_modifier: "Odmítnuto lepší bydlení v chudinských čtvrtích"
 sol_events.5.t: "[ROOT.GetCountry.GetCapital.GetCityHubName] tak, jak je"
 sol_events.5.d: "Veřejnosti byl zveřejněn článek v [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] o životních podmínkách v chudinských čtvrtích města [ROOT.GetCountry.GetCapital.GetCityHubName]. Následné pobouření se samozřejmě rychle rozšířilo."
 sol_events.5.f: "„Když se díváme na toto velké město, naše mysl může být snadno nepřiměřeně povznesena jeho velkou okázalostí a nádherou — jasem jeho paláců, chrámů a sídel, jeho soudních dvorů, akademií věd a dobročinných institucí. Jistě truchlíme nad tím, že takové město má tolik špatnosti, úpadku, pohanství a prostopášnosti... Davy ubohých, špinavých, ztrhaných, zpustlých, starostmi zmožených vyvrženců, kteří byli vytlačeni až na samý okraj společnosti.“" #John Knox
 sol_events.5.a: "Toto místo je třeba co nejdříve ozdravit."
 sol_events.5.b: "Článek? Jaký článek?"
