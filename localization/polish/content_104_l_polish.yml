 children_rights_events.4.t: "Školy pro chudé děti"
 children_rights_events.4.d: "Během našeho postupu k prosazení zákona [SCOPE.sLaw('current_law_scope').GetName] byly po celé zemi horlivě navrhovány školy pro chudé děti. Tyto charitativní organizace by poskytovaly jídlo a vzdělání nejubožejším dětem naší společnosti."
 children_rights_events.4.f: "„Existuje jen jeden způsob, jak si tyto chudé děti bez známostí či rodiny mohou najít cestu společností: vzdělání. Pokud neumějí napsat své jméno, naučíme je podepsat se; pokud neumějí číst, naučíme je, jak zůstat informované; pokud takové dítě nemůže získat jídlo, seženeme mu práci.“"
 children_rights_events.4.a: "Tak zbožnou záležitost musí spravovat [SCOPE.gsInterestGroup('devout_scope').GetName]."
 children_rights_events.4.b: "Skvělá iniciativa, kterou by měli spravovat učitelé."
 children_rights_events.4.c: "Ty ve skutečnosti nepotřebujeme."
 ragged_schools_modifier: "Školy pro chudé děti"
 ragged_schools_devout: "Náboženské školy pro chudé děti"
 modifier_no_ragged_schools: "Odmítnuty školy pro chudé děti"
 children_rights_events.5.t: "Pero a papír"
 children_rights_events.5.d: "Prosazení zákona [SCOPE.sLaw('current_law_scope').GetName] se zastavilo kvůli veřejným protestům. Mnoho rodin nemá kupní sílu na výdaje spojené s pořízením nových školních pomůcek, což jejich dětem brání ve školní docházce."
 children_rights_events.5.f: "„Poslyšte, žádný rodič by se nesnažil zabránit svým dětem získat lepší budoucnost, než jaká je čeká tady, ale pokud se musím rozhodovat mezi koupí chleba a koupí pera s inkoustem, řekl bych, že to není žádné férové rozhodnutí.“"
 children_rights_events.5.a: "Bohatství nesmí být překážkou."
 children_rights_events.5.b: "Nemůžeme věnovat ještě více veřejných prostředků."
 school_supplies_modifier: "Poskytnuty školní pomůcky"
 no_school_supplies_modifier: "Nefinancované školní pomůcky"
 children_rights_events.6.t: "Nikdy jedněmi z nich"
 children_rights_events.6.d: "Někteří členové skupiny [SCOPE.gsInterestGroup('gatekeeper_ig').GetName] vyjádřili obavy ohledně prosazení zákona [SCOPE.sLaw('current_law_scope').GetName], protože se domnívají, že by ovlivnil zaměstnanost a podpořil agitaci mezi nižšími třídami."
 children_rights_events.6.f: "„Každý má své místo, že? Myslím, že na tom se všichni shodneme. Pokud tyto děti naučíme totéž, co učíme své vlastní děti, kdo jim zabrání chtít stejná zaměstnání?\n\nA kdo pak bude dělat to, co mají dělat ony? Vzdělávání pro vzdělávání je nesmysl, idylická utopie, která povede jen k bídě, prázdným továrnám a líným pracovníkům.“"
 children_rights_events.6.a: "Každý si zaslouží šanci."
 children_rights_events.6.b: "Řekněte [SCOPE.gsInterestGroup('gatekeeper_ig').GetName], že mají pravdu. Pak pokračujte v našem plánu."
 children_rights_events.6.c: "Měli by to považovat za akt dobročinnosti."
