 sol_events.2.t: "Příběh naděje"
 sol_events.2.desc: "Životní podmínky našeho lidu se v poslední době stabilně zlepšují a přinášejí naději i těm nejsklíčenějším částem našich měst — i tak nás však čeká ještě dlouhá cesta."
 sol_events.2.f: "„Byly to nejlepší časy, byly to nejhorší časy, byl to věk moudrosti, byl to věk pošetilosti, byla to epocha víry, byla to epocha nevíry, bylo to období světla, bylo to období temnoty, bylo to jaro naděje, byla to zima zoufalství.“" #Dickens
 sol_events.2.a: "Náš lid nikdy nezapomene, co jsme pro něj udělali."
 sol_events.2.b: "To nám pomůže postoupit ještě dál!"
 sol_events.2.c: "Spokojenost s jejich blahobytem nám stačí."
 sol_improved_modifier: "Zlepšená životní úroveň"
 sol_increased_modifier: "Loajální občané"
 sol_institution_modifier: "Postupující instituce"
 sol_events.3.t: "Hořký nářek"
 sol_events.3.d: "Členové skupiny [SCOPE.gsInterestGroup('ig_devout').GetName] byli spatřeni, jak procházejí chudinskými čtvrtěmi města [ROOT.GetCountry.GetCapital.GetCityHubName] a nabízejí chudým charitativní jídlo. Nyní však žádají státní financování svého úsilí."
 sol_events.3.f: "„Procházet těmi uličkami způsobuje, že se duše cítí, jako by vstupovala na ďáblovy pozemky: nozdry naplněné k nevydržení zápachem havěti, oči zavřené nad rámec soucitu poté, co spatřily brány pekla dokořán.\n\nPokud nedostaneme podporu, kterou potřebujeme, božské světlo možná nikdy nebude dost silné, aby osvítilo ty popelem pokryté tváře.“"
 sol_events.3.a: "Je to dobrá věc, kterou stojí za to podpořit."
 sol_events.3.b: "Nepotřebujeme, aby drželi ještě větší moc."
 charitable_slums_modifier: "Charitativní politika v chudinských čtvrtích"
 bad_charitable_slums_modifier: "Nesouhlasí s charitativní politikou v chudinských čtvrtích"
