 je_sol_1: "Krize chudoby"
 je_sol_1_goal: "Zlepšete [concept_sol] ve své zemi."
 je_sol_goal_desc: "Zlepšete [concept_sol] ve své zemi o 3."
 je_sol_1_reason: "Nižší třídy vyjádřily své obavy, že si nemohou dovolit důstojný život."
 je_sol_invalid_desc: "Odmítli jste protesty proti chudobě v události $Signs of the Times$."
 sol_events.1.t: "Znamení doby"
 sol_events.1.d: "Jedna žena zahájila protest v centru města [ROOT.GetCountry.GetCapital.GetCityHubName] a prohlásila, že její děti nemají k jídlu nic než krysy. Lidé se kolem ní shromáždili a připojili se k jejím zoufalým prosbám."
 sol_events.1.f: "„Doufám, že se nikdy nebudete muset dívat do tváří svých dětí, když jim podáváte zuhelnatělou krysu a říkáte jim, že je to jen vepřové; lhát jim, aby jejich nevinnost vydržela ještě o chvíli déle, ještě jediný den; zakazovat jim hrát si na schovávanou, aby kvůli námaze neměly ještě větší hlad; říkat jim, že pokud se pohnou, strašidlo je najde a chytí.“"
 sol_events.1.a: "Nikdo si nezaslouží takový život."
 sol_events.1.b: "Chudoba je prostě součást života."
 sol_events.1.c: "Okamžitě tyto agitátory zadržte."
 repressed_sol_protester_modifier: "Potlačeny protesty proti chudobě"
