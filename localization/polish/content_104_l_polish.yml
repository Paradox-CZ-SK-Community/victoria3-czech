 decree_events.2.t: "Šedé dny"
 decree_events.2.d: "Lepší silniční sítě vedly ke zvýšení dopravy ve státě [SCOPE.sState('decree_state').GetName], po němž následovalo odpovídající zvýšení znečištění."
 decree_events.2.f: "„V ponurých časech postindustriálního věku přetrvává temnota. Noc se stává světlejší než den, září pouličními světly, dobře osvětlenými příbytky střední třídy a ohni zapálenými v méně zvýhodněných čtvrtích. Ale dny... dny ztratily nekonečný jas slunce, věčně nepřerušený až dosud.\n\nKouř nestoupá jen z továren; také rychlý vítr dopravy zvedá šedé nebe nad kašlem lidí.“"
 decree_events.2.a: "[SCOPE.gsInterestGroup('ecology_ig').GetName] navrhli, že je třeba okamžitě přijmout opatření."
 decree_events.2.b: "Nic, co by nevyřešil výlet do hor."
 addressed_pollution_modifier: "Obavy ze znečištění"
 ignored_pollution_modifier: "Žádná opatření proti znečištění"
 good_pollution_modifier: "Opatření proti znečištění"
 decree_events.3.t: "Od základů"
 decree_events.3.d: "Muž nízkého původu se stal populárním vůdcem skupiny [SCOPE.gsInterestGroup('ig_intelligentsia').GetName], což některé příliš netěší kvůli takové společenské mobilitě."
 decree_events.3.f: "„Zpočátku žil se svou chudou ovdovělou matkou, potom se svým hrozným strýcem, pak prý oba zemřeli, on se stal sirotkem a uprchl ze státu. Poté byl vídán jako obchodník s vínem, mladý, jak byl, a někteří říkají, že se pokusil stát jakýmsi zákoníkem. Pak zkusil psát, v čemž byl mírně úspěšný, a teď... teď to vidíte sami, vůdce skupiny [SCOPE.gsInterestGroup('ig_intelligentsia').GetNameNoFormatting], konečně v pokoji.“"
 decree_events.3.a: "Tuto práci si zasloužil."
 decree_events.3.b: "Dojemný příběh, vskutku, ale nezaslouží si zvláštní zacházení."
 Copperfield: "Copperfield"
 david_copperfield_modifier: "Podpořen vůdce nízkého původu"
 ignored_david_copperfield_modifier: "Ignorován vůdce nízkého původu"
 decree_events.4.t: "Ze srdce moře"
 decree_events.4.d: "V přístavech státu [SCOPE.sState('decree_state').GetName] se představil nový admirál, radostně oslavovaný svými druhy. Synovec postavy [SCOPE.sCharacter('noble_character').GetFullName] však také prohlásil, že má o tentýž titul hluboký zájem."
 decree_events.4.f: "„Existují příběhy, když člověk dává pozor, které znějí tak nemožně, že by patřily do románu. Námořníci říkají, že byl jeden chlapec, který začal svůj život na velrybářské lodi a byl jedním z osmi mužů, kterým se podařilo vrátit z hrozné, hrozné plavby.\n\nPo léta nikdo nevěděl, kde je. Nemluvil a odmítal se dívat mužům do očí. Poté sloužil na šesti různých velrybářských lodích a všechny je bezpečně přivedl domů.“"
 decree_events.4.a: "Muži ho budou následovat."
 decree_events.4.b: "Neměli bychom rozhněvat rod [SCOPE.sCharacter('noble_character').GetLastName]."
 social_mobility_modifier: "Nový admirál"
 decree_events.5.t: "Noc v opeře"
 decree_events.5.d: "Prestižní budově [SCOPE.sBuilding('decree_building').GetName] ve státě [SCOPE.sState('decree_state').GetName] byla vyslána komise, aby získala jednoho z jejích nejlepších skladatelů k napsání národní opery zachycující velkolepost [ROOT.GetCountry.GetAltAdjective('G')]."
 decree_events.5.f: "„Ani ti nejpřísnější kritici nenajdou jedinou chybu v harmonii, měřítku ani rytmu mé opery magny, [SCOPE.GetRootScope.GetCountry.GetCustom('opera_noun')] [SCOPE.GetRootScope.GetCountry.GetCustom('opera_genitive')]. Příběh o lásce, smrti, nesmrtelných tématech, která náležejí k [ROOT.GetCountry.GetAdjectiveNoFormatting] legendám; jejich hrdinové budou díky těmto velkolepým áriím navždy připomínáni!“"
 decree_events.5.a: "Vskutku znamenitý návrh!"
 decree_events.5.b: "Skvělý nápad... který by mohl někdo jiný uskutečnit levněji."
 decree_events.5.c: "Neměla by to být bezplatná služba národu?"
