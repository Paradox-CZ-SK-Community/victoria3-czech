 fascism_events.10.t: "Zaostávání"
 fascism_events.10.d: "Kdysi raketový vzestup hnutí [GetIdeology('ideology_fascist').GetName] se zdá být u konce. Ačkoli tato ideologie jistě přetrvá, setká se s méně vstřícnou veřejností a mnohem zkušenější opozicí."
 fascism_events.10.f: "Byli tací, kdo vzestup fašistického hnutí vítali. Mohlo být čímkoli, co si přáli — laissez-faire, intervencionistické, paternalistické, libertariánské, zbožné, sekulární. Nikdo z nich si doopravdy nemyslel, že jeho vůdci věří v něco jiného než v zarputilý odpor vůči komunistům, a každá kapka krve prolitá fašistickým obuškem byla kapkou, kterou sami prolévat nemuseli.\n\nMožná jej stále vítali, i s jeho milenaristickými sliby čistých ulic a žádných rudých. Ale teď už bylo příliš vážné, příliš známé — a stalo se příliš nepopulárním. Ti, jimž záleželo na důvěryhodnosti, se naučili mlčet a v případě potřeby pronášet jen symbolická odsouzení násilí. Říkali, že šlo o zvláštní vybočení z normálu, které se již vyčerpalo. A tím to končilo."
 fascism_events.10.a: "Dobře, že je pryč."
 fascism_events.10.b: "Tohle není konec."
 fascism_events.11.t: "Pochod na [ROOT.GetCountry.GetCapital.GetCityHubName]"
 fascism_events.11.d: "[SCOPE.sCharacter('fascist_leader').GetFullName] oznámil [SCOPE.sCharacter('fascist_leader').GetHerHis] záměr pochodovat na [ROOT.GetCountry.GetCapital.GetCityHubName] ve jménu uchopení moci nad zemí [ROOT.GetCountry.GetName]. [SCOPE.sCharacter('fascist_leader').GetHerHis|U] stoupenci se shromažďují na okrajích města."
 fascism_events.11.f: "„Nemáme v úmyslu dostat se k moci zadními dveřmi. Nemáme v úmyslu vzdát se svého ohromného a ideálního dědictví za ubohý talíř ministerské čočky. Buď nám vládu dají, nebo si ji vezmeme sami!“" #- Several amalgamated Mussolini speeches.
 fascism_events.11.a: "Pověřte [SCOPE.sCharacter('fascist_leader').GetHerHim] sestavením vlády."
 fascism_events.11.b: "Máme plné právo tento převrat zastavit."
 fascism_events.11.c: "Dost! Nařiďte deportaci tohoto [SCOPE.sCharacter('fascist_leader').GetWomanMan]."
 existent_fascist_character_tt: "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt Fašistické#! hnutí má [concept_character], za kterou se může semknout"
