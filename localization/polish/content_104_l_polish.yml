 titanic.2.t: "Truchlivá katastrofa"
 titanic.2.d: "Poté, co monumentální Titanic opustil loděnice státu [SCOPE.sState('titanic_state').GetName], netrvalo dlouho a dostihla ho tragédie, když část jeho trupu narazila do stejně impozantního ledovce."
 titanic.2.d2: "Poté, co monumentální [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')] opustil loděnice státu [SCOPE.sState('titanic_state').GetName], netrvalo dlouho a čekala ho tragédie, když část jeho trupu narazila do stejně impozantního ledovce."
 titanic.2.f: "„Když mě posadili do člunu, zavolal na mě: ‚To je v pořádku, děvčátko. Jdi. Já zůstanu.‘ Když se náš člun odrazil, poslal mi polibek, a to bylo naposledy, co jsem ho viděla.“" #real life Titanic quote
 titanic.2.a: "To je tragédie."
 titanic_sank_modifier: "Potopení zaoceánského parníku"
 titanic.3.t: "Působivá plavba"
 titanic.3.d: "Poté, co monumentální Titanic opustil loděnice státu [SCOPE.sState('titanic_state').GetName], netrvalo dlouho a jeho první plavba se ukázala jako naprostý úspěch. Davy v přístavu příjezdu mávají pasažérům a jásají."
 titanic.3.d2: "Poté, co monumentální [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')] opustil loděnice státu [SCOPE.sState('titanic_state').GetName], netrvalo dlouho a jeho první plavba se ukázala jako naprostý úspěch. Davy v přístavu příjezdu mávají pasažérům a jásají."
 titanic.3.f: "„Co jsou lidé ve srovnání s vlnami a oceánem? Ta loď byla jediným důkazem, který jsme měli, že člověk nastolil svou vládu nad mořem. Mudrci starověku by se zhroutili a proklínali, neboť jsme očarovali jejich bohy a překonali jejich vodní nestvůry.\n\nJsme zde, nyní — a úžas pramení věčně.“"
 titanic.3.a: "Byla to loď snů."
 titanic_good_modifier: "Úspěch zaoceánského parníku"
 je_krakatoa: "Erupce Krakatoa"
 je_krakatoa_reason: "Následky sopečné erupce ve státě [GetStateRegion('STATE_WEST_JAVA').GetName] stále ovlivňují světové klima a zvyšují četnost i závažnost [Concept('concept_harvest_condition', '$concept_harvest_conditions$')] jako [GetHarvestConditionType('frost').GetName], [GetHarvestConditionType('hailstorm').GetName], [GetHarvestConditionType('disease_outbreak').GetName] a [GetHarvestConditionType('torrential_rains').GetName], dokud se teploty nevrátí k normálu.\n$TSUNAMI_LIST_HEADER$$TSUNAMI_LIST_CONTENT$\n$TSUNAMI_LIST_AFTER$"
 krakatoa_je_tt: "Sopka Krakatoa vybuchla."
