 je_modernization_program: "Program modernizace"
 je_modernization_program_reason: "Mocná země je mocná od samotných pilířů, které ji podpírají. Musíme rozšířit svou infrastrukturu, abychom rozšířili své bohatství."
 je_modernization_program_tt: "Infrastruktura v #bold hlavním městě#! je větší nebo rovna 150"
 fascism_events.5.t: "Čtyřletý plán"
 fascism_events.5.d: "Rozšíření infrastruktury naší země vedlo k efektivnějšímu a produktivnějšímu průmyslu. Ať je tento technologický pokrok prvním z mnoha dalších!"
 fascism_events.5.f: "„Ty takzvané „velmoci“ za našimi hranicemi se nám snažily bránit, škodit naší zemi a pověsti, škodit našemu lidu. Ale od tohoto dne nám už škodit nebudou. Není nic silnějšího než [ROOT.GetCountry.GetAdjectiveNoFormatting] morálka; ani nejjemnější železo, čepele starověku či damašská ocel se jí nemohou rovnat.\n\nA dnes to pevně dokazujeme. [ROOT.GetCountry.GetAdjectiveNoFormatting] národ nelze ekonomicky sabotovat, neboť naše infrastruktura je nyní prostá cizích predátorů.“"
 fascism_events.5.a: "Naše loděnice nám zajistí místo na slunci."
 fascism_events.5.b: "Měli bychom toho využít ke zvýšení rychlosti výstavby."
 infrastructure_port_modifier: "Efektivní přístavy"
 infrastructure_time_modifier: "Rozšířená infrastruktura"
 fascism_events.6.t: "Národní mýty"
 fascism_events.6.d: "Jednota mezi naším lidem je nejen možná, ale skutečná. Všichni občané [ROOT.GetCountry.GetAltAdjective('G')] jsou nyní sjednoceni pod týmž praporem, touž vlajkou."
 fascism_events.6.f: "„Starobylé legendy minulosti brzy najdou svůj protějšek v našich vlastních nových legendách. Naši národní hrdinové na nás nyní hledí s úsměvem. Náš jazyk, naše kultura, vše, co nás spojuje, syny a dcery společného původu, to konečně uctíme.“"
 fascism_events.6.a: "Náš národ, naše kultura!"
 fascism_events.6.b: "Neměli bychom dopustit, aby nás toto vítězství rozptýlilo."
