l_polish:
  BATTLE_CONDITION_ATTACKER_TOOLTIP: "$BATTLE_CONDITION_TOOLTIP$\n\n[Battle.GetAttackerConditionUpdateDesc]"
  BATTLE_CONDITION_DEFENDER_TOOLTIP: "$BATTLE_CONDITION_TOOLTIP$\n\n[Battle.GetDefenderConditionUpdateDesc]"
  BATTLE_CONDITION_EARLIEST_UPDATE: "Změní se dne [DATE.GetString] (zbývá $REMAINING$)"
  BATTLE_CONDITION_IMMINENT_UPDATE: "Brzy se změní, aktuální šance: $CHANCE|v0%$"
  BATTLE_CONDITION_TOOLTIP: "[BattleCondition.GetModifierDesc]\n\n#lore [BattleCondition.GetDesc]#!"
  battle_condition_aggressive_maneuver: "Agresivní manévr"
  battle_condition_aggressive_maneuver_desc: "V této bitvě se projevila velitelova záliba v brutálních, rozhodných akcích."
  battle_condition_blunder: "Chyba"
  battle_condition_blunder_desc: "Velitel se dopustil závažné strategické chyby, protože zcela špatně odhadl nepřítele."
  battle_condition_broken_supply_line: "Přerušené zásobování"
  battle_condition_broken_supply_line_desc: "Nečekaně obtížný terén způsobil dočasné narušení zásobovacích linek."
  battle_condition_camouflaged: "Zamaskován"
  battle_condition_camouflaged_desc: "Velitel využil své zkušenosti s místním terénem, aby snížil viditelnost nepřítele."
  battle_condition_careful_maneuver: "Opatrný manévr"
  battle_condition_careful_maneuver_desc: "Ve strategii této bitvy se projevuje pomalý a rozvážný přístup velitele."
  battle_condition_charted_terrain: "Zmapovaný terén"
  battle_condition_charted_terrain_desc: "Velitel si před bitvou pečlivě zmapoval místní oblast."
  battle_condition_controlled_retreat: "Řízený ústup"
  battle_condition_controlled_retreat_desc: "Těžké ztráty přiměly velitele nařídit okamžitý ústup."
  battle_condition_death_from_below: "Smrt zdola"
  battle_condition_death_from_below_desc: "Použití ponorek v této bitvě zaskočilo nepřítele."
  battle_condition_dug_in: "Zakopaný"
  battle_condition_dug_in_desc: "Velitel dohlížel na výstavbu spolehlivých polních opevnění."
  battle_condition_exhausted: "Vyčerpaný"
  battle_condition_exhausted_desc: "Překonávání těžkého terénu vyčerpalo vojáky ještě před začátkem bitvy."
  battle_condition_good_visibility: "Dobrá viditelnost"
  battle_condition_good_visibility_desc: "Vzhledem k prostředí, povětrnostním podmínkám a svému umístění má tato strana dobrý výhled na nepřítele."
  battle_condition_logistics_secured: "Zajištěná logistika"
  battle_condition_logistics_secured_desc: "Velitel zajistil bezpečné zásobování a logistickou podporu pro bitvu."
  battle_condition_lost: "Ztracen"
  battle_condition_lost_desc: "Pokusy o navigaci v oblasti se ukázaly jako obtížné, některé jednotky se ztratily a nedokázaly se zkoordinovat s ostatními."
  battle_condition_mud: "Bláto"
  battle_condition_mud_desc: "Bahnitý terén ztěžuje operaci."
  battle_condition_panicked_retreat: "Panický ústup"
  battle_condition_panicked_retreat_desc: "Těžké ztráty a nedostatek kompetentního vedení způsobily, že se armáda propadla do chaosu."
  battle_condition_poor_visibility: "Špatná viditelnost"
  battle_condition_poor_visibility_desc: "Vzhledem k prostředí, povětrnostním podmínkám a svému umístění má tato strana špatný výhled na nepřítele."
  battle_condition_pursuit: "Pronásledování"
  battle_condition_pursuit_desc: "Vzhledem k drtivé početní převaze velitel nařizuje obklíčit nepřítele a zahnat ho na ústup."
  battle_condition_ramming_maneuver: "Taranování"
  battle_condition_ramming_maneuver_desc: "Velitel se rozhodl, že se pokusí nepřítele taranovat, což je nebezpečný, ale potenciálně rozhodující manévr."
  battle_condition_rapid_advance: "Rychlý postup"
  battle_condition_rapid_advance_desc: "Velitel využil zkušenosti s místním terénem k efektivnějšímu postupu."
  battle_condition_rough_waters: "Rozbouřené vody"
  battle_condition_rough_waters_desc: "Tento velitel a posádka nebyli připraveni na rozbouřené moře během bitvy."
  battle_condition_strong_winds: "Silný vítr"
  battle_condition_strong_winds_desc: "Nečekaná změna intenzity větru donutila velitele improvizovat."
  battle_condition_surprise_maneuver: "Překvapivý manévr"
  battle_condition_surprise_maneuver_desc: "Díky důvtipu velitele se podařilo provést několik manévrů, které nepřítele zaskočily."
  naval_condition_strong_winds: "Silné větry" # todo: NEW TRANSLATION
  naval_condition_strong_winds_desc: "Poryvy silného větru odnášejí lodě z kurzu a ztěžují navigaci." # todo: NEW TRANSLATION
  naval_condition_fog: "Mlha" # todo: NEW TRANSLATION
  naval_condition_fog_desc: "Hustá mlha zahaluje moře a snižuje viditelnost ostatních lodí." # todo: NEW TRANSLATION
  naval_condition_ice: "Led" # todo: NEW TRANSLATION
  naval_condition_ice_desc: "Ledovce a volné ledové kry plovoucí na hladině i pod ní představují riziko pro lodě proplouvající těmito vodami." # todo: NEW TRANSLATION
  naval_condition_cyclone: "Cyklón" # todo: NEW TRANSLATION
  naval_condition_cyclone_desc: "Obrovský cyklón se žene přes oceán a ohrožuje námořníky, kteří se ocitnou uprostřed jeho větrů." # todo: NEW TRANSLATION
  naval_condition_tropical_storm: "Tropická bouře" # todo: NEW TRANSLATION
  naval_condition_tropical_storm_desc: "Nad těmito vodami se vytvořila bouře, dramaticky zatemňující oblohu." # todo: NEW TRANSLATION
  naval_condition_calm_waters: "Klidné vody" # todo: NEW TRANSLATION
  naval_condition_calm_waters_desc: "Díky jasné obloze a příznivým podmínkám je moře zde poklidné." # todo: NEW TRANSLATION
  naval_condition_rough_waters: "Rozbouřené vody" # todo: NEW TRANSLATION
  naval_condition_rough_waters_desc: "Vysoké a nestabilní vlny přetvářejí hladinu kolem každé lodi, která tudy proplouvá." # todo: NEW TRANSLATION
