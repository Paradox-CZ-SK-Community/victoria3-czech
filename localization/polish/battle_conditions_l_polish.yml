l_polish:
 BATTLE_CONDITION_TOOLTIP: "[BattleCondition.GetModifierDesc]\n\n#lore [BattleCondition.GetDesc]#!"
 BATTLE_CONDITION_ATTACKER_TOOLTIP: "$BATTLE_CONDITION_TOOLTIP$\n\n[Battle.GetAttackerConditionUpdateDesc]"
 BATTLE_CONDITION_DEFENDER_TOOLTIP: "$BATTLE_CONDITION_TOOLTIP$\n\n[Battle.GetDefenderConditionUpdateDesc]"
 BATTLE_CONDITION_EARLIEST_UPDATE: "Změní se dne nebo po [DATE.GetString] (zbývá $REMAINING$)"
 BATTLE_CONDITION_IMMINENT_UPDATE: "Brzy se změní, aktuální šance: $CHANCE|v0%$"
 battle_condition_pursuit: "Pronásledování"
 battle_condition_pursuit_desc: "Díky drtivé početní převaze velitel nařizuje obklíčení nepřítele a jeho pronásledování během ústupu."
 battle_condition_panicked_retreat: "Panický ústup"
 battle_condition_panicked_retreat_desc: "Těžké ztráty a nedostatek schopného velení uvrhly jednotky do zmatku."
 battle_condition_controlled_retreat: "Kontrolovaný ústup"
 battle_condition_controlled_retreat_desc: "Těžké ztráty přiměly velitele nařídit rychlý ústup."
 battle_condition_dug_in: "Zakopáni"
 battle_condition_dug_in_desc: "Velitel dohlédl na vybudování spolehlivého polního opevnění."
 battle_condition_charted_terrain: "Zmapovaný terén"
 battle_condition_charted_terrain_desc: "Velitel před bitvou pečlivě zmapoval místní oblast."
 battle_condition_rapid_advance: "Rychlý postup"
 battle_condition_rapid_advance_desc: "Velitel využil zkušeností s místním terénem k efektivnějšímu postupu."
 battle_condition_camouflaged: "Maskování"
 battle_condition_camouflaged_desc: "Velitel využil znalostí místního terénu ke snížení viditelnosti pro nepřítele."
 battle_condition_logistics_secured: "Zajištěná logistika"
 battle_condition_logistics_secured_desc: "Velitel zajistil stabilní zásobovací linie a logistickou podporu pro bitvu."
 battle_condition_mud: "Bláto"
 battle_condition_mud_desc: "Blátivé podmínky terénu komplikují operace."
 battle_condition_broken_supply_line: "Přerušené zásobovací linie"
 battle_condition_broken_supply_line_desc: "Neočekávaně obtížný terén způsobil dočasné přerušení zásobovacích linií."
 battle_condition_exhausted: "Vyčerpaní"
 battle_condition_exhausted_desc: "Překonávání náročného terénu vyčerpalo jednotky ještě před začátkem bitvy."
 battle_condition_lost: "Ztraceni"
 battle_condition_lost_desc: "Pokusy o orientaci v oblasti se ukázaly jako obtížné, některé jednotky se ztratily a nedokázaly se koordinovat s ostatními."
 battle_condition_surprise_maneuver: "Překvapivý manévr"
 battle_condition_surprise_maneuver_desc: "Díky chytrému uvažování velitele došlo k manévrům, které nepřítele zaskočily."
 battle_condition_aggressive_maneuver: "Agresivní manévr"
 battle_condition_aggressive_maneuver_desc: "Velitelova záliba v brutálním a rozhodném jednání se v této bitvě jasně projevila."
 battle_condition_careful_maneuver: "Opatrný manévr"
 battle_condition_careful_maneuver_desc: "Velitelův pomalý a promyšlený přístup se odráží ve strategii zvolené v této bitvě."
 battle_condition_blunder: "Strategická chyba"
 battle_condition_blunder_desc: "Velitel učinil závažnou strategickou chybu a zcela špatně odhadl nepřítele."
 battle_condition_poor_visibility: "Špatná viditelnost"
 battle_condition_poor_visibility_desc: "Kvůli prostředí, povětrnostním podmínkám a postavení má tato strana špatný výhled na nepřítele."
 battle_condition_good_visibility: "Dobrá viditelnost"
 battle_condition_good_visibility_desc: "Díky prostředí, povětrnostním podmínkám a postavení má tato strana dobrý výhled na nepřítele."
 battle_condition_rough_waters: "Rozbouřené vody"
 battle_condition_rough_waters_desc: "Tento velitel a jeho posádka nebyli během bitvy připraveni na rozbouřené moře."
 battle_condition_strong_winds: "Silný vítr"
 battle_condition_strong_winds_desc: "Neočekávaná změna intenzity větru donutila velitele improvizovat."
 battle_condition_death_from_below: "Smrt z hlubin"
 battle_condition_death_from_below_desc: "Nasazení ponorek v této bitvě nepřítele zaskočilo."
 battle_condition_ramming_maneuver: "Taranování"
 battle_condition_ramming_maneuver_desc: "Velitel se rozhodl pokusit o taranování nepřítele, nebezpečný, ale potenciálně rozhodující manévr."
 naval_condition_strong_winds: "Silný vítr"
 naval_condition_strong_winds_desc: "Poryvy silného větru odklánějí lodě z kurzu a ztěžují navigaci."
 naval_condition_fog: "Mlha"
 naval_condition_fog_desc: "Hustá mlha zahaluje moře a zhoršuje schopnost spatřit jiné lodě."
 naval_condition_ice: "Led"
 naval_condition_ice_desc: "Ledovce a volné kry plovoucí na hladině i pod ní představují riziko pro všechny lodě, které tudy proplouvají."
 naval_condition_cyclone: "Cyklón"
 naval_condition_cyclone_desc: "Obrovský cyklón se žene přes oceán a ohrožuje námořníky, kteří se ocitnou v jeho větrech."
 naval_condition_tropical_storm: "Tropická bouře"
 naval_condition_tropical_storm_desc: "Nad těmito vodami se vytvořila bouře, která dramaticky zatemnila oblohu."
 naval_condition_calm_waters: "Klidné vody"
 naval_condition_calm_waters_desc: "Za jasného počasí a příznivých podmínek se zde moře uklidnilo."
 naval_condition_rough_waters: "Rozbouřené vody"
 naval_condition_rough_waters_desc: "Vysoké a nestabilní vlny mění podmínky pro každé plavidlo, které těmito vodami proplouvá."
