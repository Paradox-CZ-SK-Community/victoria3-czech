 notification_struggle_for_sovereignty_message_desc: "[SCOPE.sCountry('princely_state_scope').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('princely_state_scope').GetNameNoFormatting] dal najevo [SCOPE.sCountry('princely_state_scope').GetRuler.GetHerHis] úmysl, že [SCOPE.sCountry('princely_state_scope').GetNameNoFormatting] usiluje o nezávislost na zemi [SCOPE.sCountry('overlord_scope').GetNameNoFormatting]."
