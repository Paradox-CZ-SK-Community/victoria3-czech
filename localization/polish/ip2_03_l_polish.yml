 je_dravidian_movement: "Drávidské hnutí"
 je_dravidian_movement_reason: "Prostý lid země [ROOT.GetCountry.GetName] zareagoval na neúměrné zastoupení a politickou moc bráhmanů. Po sérii protibráhmanských konferencí vzniklo drávidské hnutí a stanovilo si novou agendu odporu proti bráhmanské dominanci. Usiluje o odstranění kastovních rozdílů ze zákona a státní správy."
 dravidian_movement_fail_tt: "Byl přijat zákon o indické samosprávě"
 caste_conflict.1.t: "Nerovné příležitosti"
 caste_conflict.1.d: "Napětí mezi kastami je výraznější od doby, kdy nedávné sčítání odhalilo neúměrné zastoupení bráhmanů ve vládních zaměstnáních a poukázalo na omezenou kvalifikaci nebráhmanů."
 caste_conflict.1.f: "Praveenův životopis, jeho dva magisterské tituly z ekonomie a práva, se mu mačkal v rukou, když vztekle odcházel od dalšího odmítnutí.\n\nVěděl, že by neměl být tak rozzlobený ani tak překvapený. Věděl, že když se přestěhoval do [ROOT.GetCountry.GetCapital.GetCityHubName], bude daleko od podpory své pokrokově smýšlející univerzity, a přesto ho ta do očí bijící segregace šokovala. Navzdory své kvalifikaci měl potíže uživit sám sebe, zatímco jiní, stejně vzdělaní, si v sídlech vychutnávali čaj. Nejvíc ho rozčilovalo, jak mu stráže zahrazovaly cestu. Jako by v očích pánů, které tak oddaně střežily, byly o něco lepší než on."
 caste_conflict.1.a: "[SCOPE.gsInterestGroup('rural_folk_ig_scope').GetName] budou prosazovat změnu."
 caste_conflict.1.b: "[SCOPE.sCountry('top_overlord_scope').GetName] má své důvody, proč to podporovat."
 rural_folk_pol_str_gain: "Proti bráhmanské dominanci"
