l_polish:
 je_imperialism_of_promise: "Imperialismus příslibu"
 je_imperialism_of_promise_reason: "Máme povinnost podporovat obecné dobro všemi nezbytnými prostředky. Základní svobody a rovné příležitosti hrají v tvorbě politiky ústřední roli. [GetIdeology('ideology_utilitarian_millian').GetName] přístup ke koloniální správě slibuje silnou sílu pokroku jak v zemi [ROOT.GetCountry.GetName], tak po celém světě."
 je_imperialism_of_promise_status: "Dohlížejte na [GetIdeology('ideology_utilitarian_millian').GetName] přístup ke koloniální správě v zemi [JournalEntry.GetCountry.GetName]."
 utilitarian_character_trigger: "Libovolný [concept_agitator] nebo [concept_leader] má [concept_ideology] [GetIdeology('ideology_utilitarian_leader').GetName]."
 has_any_secessionists_fail_tt: "Od země [ROOT.GetCountry.GetName] se odtrhly nějaké odštěpující se země."
 bic_collapse_var_tt: "[ROOT.GetCountry.GetName] již není [concept_subject]"
 secession_war_in_progress_tt: "[Concept('concept_political_movement','$movement_cultural_minority$')] se [Concept('concept_secession','odtrhává')]"
 bureaucrats_no_shortage_trigger: "[ROOT.GetCountry.GetAdjectiveNoFlag] [concept_bureaucracy] je vyšší nebo rovna #v 0#! a země se #bold nechystá#! vstoupit do deficitu [concept_bureaucracy]"
 utilitarian.1.t: "Dobrá vláda pro všechny"
 utilitarian.1.d: "Principy ideologie [GetIdeology('ideology_utilitarian_millian').GetName] nyní hrají ústřední roli v tvorbě politiky země [ROOT.GetCountry.GetAdjective]. Správa byla zreformována tak, aby fungovala jako dobře promazaný stroj."
 utilitarian.1.f: "Oddanost osoby [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] utilitarismu se prohloubila díky tomuto úspěchu při řízení rozvoje země [ROOT.GetCountry.GetNameNoFormatting]. Ačkoli někteří stále zpochybňují hodnotu přístupu osoby [SCOPE.sCharacter('relevant_character').GetLastNameNoFormatting] ke koloniální správě, [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] vystoupili, aby se zasadili o utilitaristický přístup.\n\nZatímco lid Indie pokračuje ve svém životě, čas ukáže, zda plody práce správy budou tak trvalé a dalekosáhlé, jak všichni doufají. Tento úspěch je majákem pro budoucí reformu."
 utilitarian.1.f2: "Oddanost správy utilitarismu se prohloubila díky tomuto úspěchu při řízení rozvoje země [ROOT.GetCountry.GetNameNoFormatting]. Ačkoli někteří stále zpochybňují hodnotu tohoto přístupu ke koloniální správě, jeho pevní zastánci vystoupili, aby se zasadili o utilitaristický přístup.\n\nZatímco lid Indie pokračuje ve svém životě, čas ukáže, zda plody práce správy budou tak trvalé a dalekosáhlé, jak všichni doufají. Tento úspěch je majákem pro budoucí reformu."
 utilitarian.1.a: "Budoucnost vypadá šťastně a zářivě."
 utilitarian_bonus: "Utilitaristický vliv"
 util_colonial_admin_success: "Utilitaristický úspěch"
 utilitarian.2.t: "Falešné sliby"
 utilitarian.2.d: "Chaos, který zachvátil zemi [ROOT.GetCountry.GetName], slouží jako svědectví o selhání projektu [GetIdeology('ideology_utilitarian_millian').GetName]. Jeho zastánci byli obviněni z nevratné destabilizace správy."
 utilitarian.2.f: "Příslib utilitaristického přístupu ke koloniální správě se nenaplnil. Selhání zanechalo nejpevnější zastánce projektu rozčarované a vystavené posměšným poznámkám.\n\n„Vždycky jsem věděl, že projekt selže. Celý přístup byl od samého počátku zásadně chybný. Pro tak absurdní agendu tu není místo.“"
 utilitarian.2.a: "Tady nemají žádný užitek."
 utilitarian_malus: "Porušené sliby"
 util_colonial_admin_fail: "Oslabený vliv"
 utilitarian.3.t: "Projekt bez pokroku"
 utilitarian.3.d: "Ačkoli [GetIdeology('ideology_utilitarian_millian').GetName] přístup ke koloniální správě vypadal slibně, zde v zemi [ROOT.GetCountry.GetName] nezapustil kořeny."
 utilitarian.3.f: "Oddanost osoby [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] utilitarismu zakolísala, protože projekt ztratil dynamiku. [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] již nepovažují utilitaristickou agendu za prioritu.\n\nV tiché chvíli se [SCOPE.sCharacter('relevant_character').GetLastNameNoFormatting] zamýšlí nad poučeními z celého tohoto úsilí. „Možná musíme být praktičtější v tom, jak naše principy ovlivňují tvorbu politiky,“ uvažuje [SCOPE.sCharacter('relevant_character').GetSheHe]."
 utilitarian.3.f2: "Oddanost správy utilitarismu zakolísala, protože projekt přišel o své nejpevnější zastánce.\n\nV tiché chvíli se jeden muž zamýšlí nad poučeními z celého tohoto úsilí. „Možná musíme být praktičtější v tom, jak naše principy ovlivňují tvorbu politiky,“ uvažuje."
 utilitarian.3.a: "Náš lid bude prosperovat bez ohledu na to."
 utilitarian_partial_malus: "Nenaplněné sliby"
 util_colonial_admin_partial_success: "Slabý úspěch"
 utilitarian.4.t: "Nepatřičný vliv"
 utilitarian.4.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName] tvrdí, že veřejné mínění a tisk v zemi [SCOPE.sCountry('relevant_overlord').GetName] negativně ovlivňují politiku země [ROOT.GetCountry.GetAdjective]."
 utilitarian.4.f: "„Samozřejmě, The Times mají svůj názor. Jsem si jistý, že John pekař a Jane švadlena ho mají také. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] by měl naslouchat všem. Koho zajímá, jak špatně informované jsou jejich představy o Indii? Možná by se o každé politice mohlo rozhodovat ve všeobecných volbách.“\n\n„Kdy už se naučí, že kdo chce vládnout Indii, musí být v Indii?“"
 utilitarian.4.a: "Převezměte kontrolu nad obrazem v tisku."
 utilitarian.4.b: "Názory [SCOPE.sCountry('relevant_overlord').GetAdjective] veřejnosti jsou neškodné."
 stop_meddlesome_affairs: "Veřejné mínění pod kontrolou"
 meddlesome_affairs: "Problematické veřejné mínění"
 utilitarian.5.t: "Imperiální přítěž"
 utilitarian.5.d: "Postoje a činy správců kultury [SCOPE.sCulture('not_discriminated_culture').GetName] ve státě [SCOPE.sState('relevant_state').GetName] vůči lidem kultury [SCOPE.sCulture('discriminated_culture').GetName] ohrožují naši misi [GetIdeology('ideology_utilitarian_leader').GetName]."
 utilitarian.5.f: "[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] potvrzuje nedávné zprávy o násilí vůči lidem kultury [SCOPE.sCulture('discriminated_culture').GetNameNoFormatting] ve státě [SCOPE.sState('relevant_state').GetNameNoFormatting]:\n\n„Nezkrotné chování správců kultury [SCOPE.sCulture('not_discriminated_culture').GetNameNoFormatting], kteří přišli do země [ROOT.GetCountry.GetNameNoFormatting] vydělat své jmění, podkopává úsilí naší mise [GetIdeology('ideology_utilitarian_leader').GetNameNoFormatting]. Lidé kultury [SCOPE.sCulture('discriminated_culture').GetNameNoFormatting] potřebují ochranu před nespravedlnostmi, které na nich páchají hledači štěstí z kultury [SCOPE.sCulture('not_discriminated_culture').GetNameNoFormatting].“"
 utilitarian.5.a: "Tito správci se musí krotit."
 utilitarian.5.b: "Proč zasahovat právě teď?"
 unrestrained_fortune_seekers: "Nezkrotní hledači štěstí"
 restrained_fortune_seekers: "Zdrženliví hledači štěstí"
 utilitarian.6.t: "Posilování vazeb"
 utilitarian.6.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] aktivně zvyšuje své úsilí o upevnění vazeb, které má země [ROOT.GetCountry.GetName] se zemí [SCOPE.sCountry('relevant_lobby_country').GetName]."
 utilitarian.6.f: "Portrét titulu [SCOPE.sCountry('relevant_lobby_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_lobby_country').GetRuler.GetFullNameNoFormatting] se tyčí nad dvěma váženými postavami, zatímco se dlouho do večera přou.\n\n„Všichni jsme loajální poddaní říše, [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]. Žádná politika to nezmění. Ale zatímco my pracujeme ve prospěch všech poddaných, vy chcete pomoci jen svým vyhlídkám.“\n\n„Pokud mi [SCOPE.sCountry('relevant_lobby_country').GetRuler.GetPrimaryRoleTitle] důvěřuje, budu moci požádat o [SCOPE.sCountry('relevant_lobby_country').GetRuler.GetHerHis] pomoc.“\n\n„Pokud vám důvěřuje lid, nikdy nebudete mít o pomoc nouzi.“"
 utilitarian.6.a: "Právě teď potřebujeme více autonomie."
 utilitarian.6.b: "Zajistěte, aby úsilí [SCOPE.sPoliticalLobby('relevant_lobby').GetName] nebylo narušováno."
 utilitarian.7.t: "Odložená rozhodnutí"
 utilitarian.7.d: "Dopisy z [SCOPE.sCountry('relevant_overlord').GetCapital.GetCityHubName] dorazily s novými správními pokyny pro důstojníky a úředníky země [ROOT.GetCountry.GetAdjective]."
 utilitarian.7.f: "Každodenní činnost tohoto úředníka kultury [SCOPE.sCulture('not_discriminated_culture').GetNameNoFormatting] často podléhá jen malému dohledu v jeho koutě státu [SCOPE.sState('relevant_state').GetNameNoFormatting]. Jeho jednání zůstávalo dlouho bez kontroly. Dopisy z [SCOPE.sCountry('relevant_overlord').GetCapital.GetCityHubName] stanovují nové pokyny pro hlášení nesrovnalostí v dokumentaci.\n\n„Jaká otrava. Moji důstojníci tvrdě pracují. Nějaká ta nesrovnalost se přece může přehlédnout.“"
 utilitarian.7.a: "Musíme se řídit rozkazy."
 utilitarian.7.b: "Nechte místní úředníky použít vlastní úsudek."
 bic_by_the_book: "Podle pravidel"
 utilitarian.8.t: "Rovné příležitosti"
 utilitarian.8.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] obdržel formální depeši ze země [SCOPE.sCountry('relevant_overlord').GetName], která doporučuje rozšíření vzdělávání v zemi [ROOT.GetCountry.GetName]."
 utilitarian.8.f: "Telegraf dorazil pozdě v noci. Když si ho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] přečetl, přál si, aby ho nechal až na ráno.\n\n„Takže chtějí, abychom vzdělávali masy? To jistě otřese poměry. Buď bude mít můj nástupce mnoho úředníků, kteří budou plnit jeho příkazy, nebo bude mít dobře informovanou a výmluvnou opozici. Budeme muset být opatrní v tom, jak k tomu přistoupíme.“"
 utilitarian.8.a: "[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] mohou pomoci tyto změny prosadit."
 utilitarian.8.b: "Reagovat na depeši je nevýhodné."
 util_law_enactment_progress: "Prosazování změny"
 clerk_state_radicals_increase_tt: "[Concept('concept_pop', '$concept_pops$')] ve státech s politickou silou [SCOPE.gsInterestGroup('relevant_ig').GetName] nad 10 % se stanou více [concept_radical]"
 no_edu_change_stance_gain_pol_str: "Přetrvávající preference"
 utilitarian.9.t: "Mimořádně náročná vize"
 utilitarian.9.d: "Koloniální správci hlásící se k filozofii [GetIdeology('ideology_utilitarian_leader').GetName] vypracovali ambiciózní plány na úplnou racionalizaci společnosti země [ROOT.GetCountry.GetAdjective]. Jejich kritici ji označují za nemožnou, mimořádně náročnou vizi."
 utilitarian.9.f: "„Je to velký podnik, nanejvýš důležitý. Bude vyžadovat spojené úsilí každého loajálního poddaného, zatímco budeme pracovat na tom, abychom tento národ přetvořili v něco, co se podobá řádu. Lid i ti, k nimž vzhlíží, musí dbát našich rad.“\n\n„Na koho se ale obrátit nejdřív? Přivede lid své vůdce k naší věci? Nebo máme svůj případ přednést jim a doufat, že dokážou svým následovníkům ukázat hodnotu naší cesty? Koneckonců vše, co děláme, děláme ku prospěchu všech.“"
 utilitarian.9.a: "Musíme přesvědčit veřejnost."
 utilitarian.9.b: "Přesvědčte více úředníků, aby se přidali k naší věci."
 persuasive_util_pamphlet_attract: "Přesvědčování veřejnosti"
 persuasive_util_pamphlet_pol_str: "Síla v politice"
 utilitarian.10.t: "Studium indické společnosti"
 utilitarian.10.d: "Bylo navrženo zorganizované sčítání lidu, aby bylo možné vytvořit komplexní porozumění populaci v zemi [ROOT.GetCountry.GetName]."
 utilitarian.10.f: "„Studium Indie musí být samo o sobě stejnou profesí jako právo či lékařství.“\n\n„Kdo chce vládnout, musí znát ovládané. Je zázrak, že jsme se dostali tak daleko, aniž bychom dokončili sčítání lidu. Ale jít dál by bylo pošetilé. Ba hůř, bylo by to jako bloudit se zavázanýma očima bludištěm plným pastí. Ne, musíme znát jazyk, kastu, náboženství a pohlaví každého!“"
 utilitarian.10.a: "Pokračujte ve sčítání lidu."
 utilitarian.10.b: "K čemu by sloužilo?"
