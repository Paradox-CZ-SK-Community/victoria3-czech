 princely_states.4.t: "Nejvznešenější řád Hvězdy Indie"
 princely_states.4.d: "[SCOPE.sCountry('top_overlord_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('top_overlord_scope').GetRuler.GetFullNameNoFormatting] poctí [SCOPE.sCharacter('award_winner_scope').GetFullName] tím, že [SCOPE.sCharacter('award_winner_scope').GetHerHim] jmenuje rytířem velkokomandérem Řádu indické říše."
 princely_states.4.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] se procházel sály [ROOT.GetCountry.GetRuler.GetHerHis] rodinného paláce. Kolem [ROOT.GetCountry.GetRuler.GetHerHim] se tyčily portréty [ROOT.GetCountry.GetRuler.GetHerHis] předků. Co by udělali, kdyby byli na [ROOT.GetCountry.GetRuler.GetHerHis] místě? Tito nelítostní muži a ženy, kteří neuznávali žádnou autoritu kromě autority bohů? Řekli by [ROOT.GetCountry.GetRuler.GetHerHim], aby se poklonil? Nebo by [ROOT.GetCountry.GetRuler.GetHerHim] připomněli, že někdo musí začít. Někdo musí vykročit vpřed a říct ne."
 princely_states.4.a: "Nebeské světlo je naším průvodcem."
 princely_states.4.b: "Taková pocta nic neznamená."
 rejected_overlord_gesture: "Odmítnutá odměna"
 princely_states.5.t: "[SCOPE.sCountry('bic_scope').GetName] anektuje knížecí stát"
 princely_states.5.d: "Použitím doktríny propadnutí převzala země [SCOPE.sCountry('bic_scope').GetName] další knížecí stát."
 princely_states.5.f: "Když [ROOT.GetCountry.GetRuler.GetHerHis] vyrůstal, učitelé [ROOT.GetCountry.GetRuler.GetHerHim] povzbuzovali, aby hrál šachy. Při zpětném pohledu tato hra dobře vystihovala jednu stránku vládcovství. Vládce se nikdy nemohl pohnout o víc než jedno pole. A přesto, pokud [ROOT.GetCountry.GetRuler.GetSheHe] padl, na nikom jiném by nezáleželo. Dnes, když další z [ROOT.GetCountry.GetRuler.GetHerHis] sousedů padl do rukou země [SCOPE.sCountry('bic_scope').GetNameNoFormatting], se [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] cítil jako král na šachovnici, obklopený nepřáteli, ale neschopný mnoho udělat. I tak však [ROOT.GetCountry.GetRuler.GetSheHe] měl ještě jeden tah. [ROOT.GetCountry.GetRuler.GetSheHe|U] se jen musel ujistit, že je ten správný."
 princely_states.5.a: "Ta politika je odporná!"
 princely_states.5.b: "Možná je v tom moudrost."
