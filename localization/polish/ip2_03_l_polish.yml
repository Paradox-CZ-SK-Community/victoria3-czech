 sikh_empire.1.t: "Víc než svatba"
 sikh_empire.1.d: "V mimořádném diplomatickém a politickém vystoupení pozval [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] elitu země a zahraniční zástupce na velkolepou princovu svatbu."
 sikh_empire.1.f: "Dvorní kronikář ve službách mahárádži zaznamenává slavnosti velmi podrobně:\n\n#italic „Byly předvedeny ohňostroje všeho druhu. Pohyblivý trůn a „Shalabagh“, ozdobené a vyzdobené různými druhy květin ... neslo na ramenou asi 100 mužů. #!" # Sohan Lal Suri
 sikh_empire.1.a: "Přivítejte zahraniční delegáty."
 sikh_empire.1.b: "Zajistěte naši roli na světové královské scéně."
