 sikh_empire.9.t: "Poslední mahárádža"
 sikh_empire.9.d: "Mladý [SCOPE.sCharacter('duleep_character').GetFullName], který byl sesazen po pádu Sikhské říše, se nyní znovu objevil."
 sikh_empire.9.f: "Dvůr bzučel vzrušením z příjezdu prince bez země, i když se ho tak nikdo neodvážil nazvat do očí. Mladík byl pohledný a zdvořilý a dvůr k němu cítil soucit. Vyrůstal bez rodičů, byl princem bez čehokoli, čemu by mohl vládnout. Přesto se nikdy nezdálo, že by ho to trápilo. Na druhou stranu se někteří ptali, zda vůbec chápe skutečný rozsah všeho, co ztratil."
 sikh_empire.9.a: "Možná najde svůj smysl."
 sikh_empire.9.b: "Někde ho jistě přivítají s otevřenou náručí."
 duleep_goes_to_gbr_tt: "Odejde žít do země $GBR$"
 sikh_empire.10.t: "Rozmetán výstřelem"
 sikh_empire.10.d1: "[SCOPE.sCharacter('relevant_ruler').GetFullName] byl zavražděn při prohlídce zbraně osoby [SCOPE.sCharacter('assassin_scope').GetFullName]. Když [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] hleděl do hlavně [SCOPE.sCharacter('assassin_scope').GetHerHis] brokovnice, [SCOPE.sCharacter('assassin_scope').GetFirstName] stiskl spoušť."
 sikh_empire.10.d2: "[SCOPE.sCharacter('relevant_ruler').GetFullName] byl zavražděn dvořanem předvádějícím dovezenou brokovnici. Když [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] hleděl do hlavně brokovnice, dvořan stiskl spoušť."
 sikh_empire.10.f: "„Váhigurú, Váhigurú, Váhigurú,“ znělo znovu a znovu po celém palácovém areálu. Byl to zvuk truchlení těch, kdo byli věrní nyní bez tváře ležícímu [SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting]. Ostatní mlčeli. Ti, kdo toho muže nenáviděli, se báli následků. Ti, kdo byli věrní Duleepovi, se obávali o jeho bezpečí. A zbytek byl unavený, unavený z nekonečné smrti, která je jako by pronásledovala."
 sikh_empire.10.a: "„Jaká zrada!“"
 sher_singh_death_tt: "[SCOPE.sCharacter('relevant_ruler').GetFullName] zemře"
 sikh_empire.11.t: "Předčasně ukončeno"
 sikh_empire.11.d: "Brutální dvorní intriky pohlcující zemi [ROOT.GetCountry.GetName] si vyžádaly další oběť. Krátce vládnoucí [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_ruler').GetFullName] byl nalezen mrtev ve svých komnatách, [SCOPE.GetRootScope.GetCountry.GetCustom('sikh_ruler_death_reason')]"
 sikh_empire.11.f: "„Co tím myslíš, že tu nikdo nechce pracovat?“ vykřikl palácový kuchař. Jeho služebná, matka dvou dětí, mu neochvějně pohlédla do očí. „Myslí si, že to místo je prokleté,“ odpověděla, „a upřímně, sotva se jim dá divit. Žádné množství zlata nedokáže odstranit pach smrti, který se drží těchto kamenů.“\n\nKuchař zhluboka vydechl. „Ne, to nedokáže. Co tedy navrhuješ, abychom udělali? Necháme nového krále vyhladovět?“\n\n„V langaru se může najíst každý, král i rolník,“ odpověděla žena. „Když jídlo nepřijde ke králi, možná může král přijít k jídlu.“"
 sikh_empire.11.a: "Předčasný konec."
