 wedding_prestige: "Královská svatba"
 notification_sikh_wedding_diplomacy_message_name: "Královská diplomacie"
 notification_sikh_wedding_diplomacy_message_desc: "Vztahy mezi zeměmi [SCOPE.sCountry('pan_scope').GetName] a [SCOPE.sCountry('bic_scope').GetName] se zlepšily od účasti na královské svatbě v [SCOPE.sCountry('pan_scope').GetCapital.GetCityHubName]."
 notification_sikh_wedding_diplomacy_message_tooltip: "#header $sikh_wedding_diplomacy_message_name$#!\n$TOOLTIP_DELIMITER$\n$sikh_wedding_diplomacy_message_desc$"
 sikh_empire.2.t: "[SCOPE.sCountry('relevant_country').GetName] útočí"
 sikh_empire.2.d: "Zatímco se naši generálové účastnili královské svatby, síly ze země [SCOPE.sCountry('relevant_country').GetName] se pokusily zabrat území ve státě [SCOPE.sState('relevant_state').GetName]."
 sikh_empire.2.f: "Byl jsem v Láhauru, když k mahárádžovi dorazila zpráva o emírově útoku na jeho pevnosti. Dokázal bych vám říct hodinu dne, kdy slavnosti náhle skončily. Na okamžik celé město utichlo.\n\nA pak jsem uslyšel hlasitý, rozkazovačný hlas, jak vykřikl bojový pokřik, který po desetiletí děsil nepřátele Sikhů: „Jo bole so Nihaal“; požehnáni jsou ti, kdo jej vysloví. A každý voják v Khalsaji odpověděl známou odpovědí: „Sat Sri Akal“, Bůh je konečná pravda."
 sikh_empire.2.a: "Povzbuďte více vojáků, aby se přidali k našim silám."
 sikh_empire.2.b: "Nechte Khalsaji naplánovat náš další krok."
 sikh_conscription: "Síla v počtech"
 show_of_strength: "Síla ve strategii"
 notification_pan_encroaching_neighbor_message_name: "Zajištění hranice"
 notification_pan_encroaching_neighbor_message_desc: "[SCOPE.sCountry('relevant_country').GetName] se pokusila zabrat území ve státě [SCOPE.sState('relevant_state').GetName]. Musíme reagovat."
