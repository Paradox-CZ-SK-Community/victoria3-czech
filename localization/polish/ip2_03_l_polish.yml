 railway_ig_approval: "Zájmová skupina sledující vlastní zájmy"
 india_railway.4.t: "Prvotřídní vybavení"
 india_railway.4.d: "Ačkoli mnoho lidí nyní přijímá cestování vlakem, napětí mezi komunitami je vysoké, protože segregace zůstává pevně zakořeněná."
 india_railway.4.f: "Dva chlapci se vyklánějí ze dveří vlaku a prudký vítr je ochlazuje v horkém a mizerném dni.\n\n„Slyšel jsem, že první třída má stropní ventilátory, postele a židle vycpané bavlnou, takže na nich můžeš sedět celé hodiny!“\n\n„No, já slyšel, že mají vlastní záchody.“\n\n„Tak to jsi slyšel špatně, pánové a dámy záchody nepotřebují.“\n\n„Proto ho nemá ani náš oddíl?“"
 india_railway.4.a: "Společenské záležitosti nejsou naléhavé."
 india_railway.4.b: "Více čajových stánků zmírní napětí."
 rising_intracommunal_tension: "Rostoucí napětí"
 india_railway.5.t: "Železnice k prosperitě"
 india_railway.5.d: "Velkolepý železniční projekt byl konečně dokončen. Nová železnice otevírá lidem nové příležitosti cestovat, pracovat a propojovat se napříč zemí."
 india_railway.5.f: "Dokončením této stanice je budoucnost rádže zajištěna. Naše síť vlaků bude páteří našeho obchodu, naší armády i samotné vlády. Pára a uhlí budou proudit žilami říše.\n\nA tato krásná stanice, pojmenovaná po našem velkém titulu [SCOPE.sCountry('relevant_overlord').GetRuler.GetPrimaryRoleTitle], bude jejím bijícím srdcem."
 india_railway.5.f2: "Dokončením této stanice je budoucnost rádže zajištěna. Naše síť vlaků bude páteří našeho obchodu, naší armády i samotné vlády. Pára a uhlí budou proudit žilami říše.\n\nA tato krásná stanice, pojmenovaná po našem velkém titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], bude jejím bijícím srdcem."
 india_railway.5.a: "Velkolepé."
 india_railway_reward: "Skvělá spojení"
 je_victoria_terminus: "Victoria Terminus"
 je_victoria_terminus_reason: "Přívrženci skupiny [SCOPE.gsInterestGroup('relevant_terminus_ig').GetName] vybrali prostředky na #tooltippable #tooltip:victoria_terminus_construct_tt #bold vytvoření velkolepého terminálu#! #!#!ve státě $STATE_BOMBAY$. Tento elegantní terminál s dalšími železničními nástupišti a správními kancelářemi slibuje pozvednout veřejné mínění o Indii."
 je_victoria_terminus_status: "Postavte $building_victoria_terminus$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_BOMBAY$."
 victoria_terminus_possible_tt: "[ROOT.GetCountry.GetNameNoFormatting] má $building_railway$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_BOMBAY$."
 victoria_terminus_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] postavila $building_victoria_terminus$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_BOMBAY$"
 victoria_terminus_populated_tt: "[concept_occupancy] pracovní síly budovy $building_victoria_terminus$ je vyšší nebo rovna #variable 50 %#!"
 rejected_victoria_terminus_project_tt: "[ROOT.GetCountry.GetNameNoFormatting] odmítá návrh na výstavbu $building_victoria_terminus$."
 does_not_have_state_bombay_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_BOMBAY$."
 owns_bombay_province_tt: "Vlastní město $HUB_NAME_STATE_BOMBAY_city$"
 victoria_terminus.1.t: "Terminál jako žádný jiný"
 victoria_terminus.1.d: "[SCOPE.gsInterestGroup('relevant_terminus_ig').GetName] předložili návrh na výstavbu velkolepého terminálu ve státě [SCOPE.sState('relevant_bombay_state').GetName]. Skupina shromáždila značnou sumu peněz, která má být použita na jeho výstavbu."
 victoria_terminus.1.f: "Malou kancelář plní kouř z dýmek, zatímco skupina úředníků posuzuje návrhy nového železničního terminálu.\n\n„Vypadá to na poměrně nákladnou záležitost. Je přestavba stanice opravdu nejlepším využitím našich zdrojů?“\n\n„Můj drahý příteli, toto je éra lokomotiv. Naše výdělky jsou úměrné rychlosti doručování. A naše současná rychlost doručování je srovnatelná s koňským povozem.“"
 victoria_terminus.1.a: "Okamžitě zahajte výstavbu."
 victoria_terminus.1.b: "Tyto prostředky by měly být přesměrovány tam, kde jsou potřeba."
 victoria_terminus_construct_tt: "$building_victoria_terminus$ může být postaven pomocí [concept_political_lens] ve státě $STATE_BOMBAY$."
 dismissed_victoria_terminus_je_tt: "[concept_journal_entry] #bold $je_victoria_terminus$#! bude zrušen"
 victoria_terminus_accepted: "Přijata výstavba terminálu"
 victoria_terminus_rejected: "Odmítnuta výstavba terminálu"
 victoria_terminus.2.t: "Architektonický div"
 victoria_terminus.2.d: "Dokončený $building_victoria_terminus$ je spojením architektonických vlivů a znamená novou kapitolu jak pro stát [SCOPE.sState('relevant_bombay_state').GetName], tak pro Indii jako celek."
 victoria_terminus.2.f: "Dva Britové v oblecích stojí před nově postaveným terminálem, zatímco kuli nese jejich zavazadla.\n\n„Nebýt té měsíce trvající plavby lodí, myslel bych si, že jsme zpátky v Londýně.“\n\n„A právě v tom spočívá genialita jeho návrhu. Naši krajané v něm vidí rozšíření britské kultury. Místní ho zase vnímají jako uctivé pokračování svého mughalského dědictví. Všichni jsou spokojení, nikoho to neuráží a obchod především vzkvétá.“"
 victoria_terminus.2.a: "Tento terminál dobře poslouží celé Indii."
 victoria_terminus.2.b: "Svět bude žasnout nad naším novým úspěchem."
 victoria_terminus_reward_loc: "Nový městský uzel"
 victoria_terminus_reward_int: "Symbolický růst"
 je_sikh_sovereignty: "Sikhská suverenita"
 je_sikh_sovereignty_reason: "Toto jsou první dny naší nově založené dynastie. Naše rozvíjející se království se těší velkým úspěchům v letech od chvíle, kdy #bold Šér-e-Pandžáb#! dobyl bývalé mughalské císařské hlavní město.\n\nV této době je zásadní, abychom chránili své území před vnější agresí a ctili zásady naší víry [GetReligion('sikh').GetName]. Kéž je odkaz této dynastie dlouhotrvající!\n\n#b [concept_empire_stability] a [concept_court_intrigue]#!\nZemě [ROOT.GetCountry.GetNameNoFormatting] čelí více než jen vnějším hrozbám. Síly uvnitř našeho dvora se mohou spiknout, aby svrhly našeho [concept_ruler] ve prospěch svého vybraného kandidáta. Pokud náš #b $sikh_empire_intrigue_bar$#! dosáhne #v 100 %#!, náš [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ($concept_ruler$) bude zavražděn, #b $sikh_empire_progress_bar$#! bude #bold resetována#! na #v 0#!, $concept_court_intrigue_short$ se sníží a na trůn nastoupí nový kandidát."
