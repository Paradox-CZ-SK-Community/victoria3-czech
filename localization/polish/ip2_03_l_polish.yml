 princely_states.1.t: "Odlišný osud"
 princely_states.1.d: "Touhu po nezávislosti lze cítit ve všech koutech země [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] se musí rozhodnout, jak v této chvíli jednat."
 princely_states.1.f: "Touha vymanit se z vlády země [SCOPE.sCountry('overlord_scope').GetNameNoFormatting] vytrvale sílí. Je v myslích [ROOT.GetCountry.GetAdjectiveNoFormatting] ze všech vrstev společnosti. Tento neklid mezi lidmi vyvolává otázku, jak by [ROOT.GetCountry.GetNameNoFormatting] mohla převzít kontrolu nad svým vlastním osudem.\n\nCestovatel procházející městem [ROOT.GetCountry.GetCapital.GetCityHubName] nemůže uniknout šepotu o tom, že lidé již nechtějí žít pod palcem země [SCOPE.sCountry('overlord_scope').GetNameNoFormatting]."
 princely_states.1.a: "[ROOT.GetCountry.GetNameNoFormatting] bude jednoho dne svobodná."
 princely_states.1.b: "Někdo se musí zemi [SCOPE.sCountry('overlord_scope').GetNameNoFormatting] postavit."
 liberty_desire_boost: "Knížecí povstání"
 improve_relations_every_princely_state: "[concept_relations] země [ROOT.GetCountry.GetNameNoFormatting] s každým [concept_princely_state] se zvýší o #g [SCOPE.ScriptValue('basic_princely_state_relations_change')]#!"
 princely_states.2.t: "Už žádný knížecí stát"
 princely_states.2.d: "Po tvrdém boji za nezávislost už [ROOT.GetCountry.GetNameNoFormatting] není pouhým knížecím státem. Lid slaví a [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] se chystá rozšířit moc země [ROOT.GetCountry.GetNameNoFormatting]."
 princely_states.2.f: "Mubarak Ho!\n\nDne [TimeKeeper.GetCurrentDate.GetString] oslavil [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] svou nově nabytou moc okázalým průvodem, který vyvrcholil dělovou salvou. Ve vzduchu panovala všeobecná veselost, zatímco se mezi lid rozdávalo jídlo a sliboval se nový věk hojnosti. Jen čas ukáže, zda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] své sliby splní!"
 princely_states.2.a: "Pod vedením titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nás čeká světlá budoucnost."
 princely_states.2.b: "Úspěchy země [ROOT.GetCountry.GetNameNoFormatting] budou velkolepé!"
 increase_autonomy_prestige_success: "Důvěryhodný vůdce"
 increase_autonomy_auth_success: "Skutečná autorita"
 annex_neighbor_princely_state: "Sousední knížecí stát se sdíleným rysem #bold dědictví#! a #green #bold srdečnými#!#! nebo lepšími vztahy bude anektován zemí [ROOT.GetCountry.GetName]."
 princely_states.3.t: "Nedostatek soumarů"
 princely_states.3.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] plánuje poslat několik našich nejlepších velbloudů na pomoc [SCOPE.sCountry('top_overlord_scope').GetAdjective], kterým se nedostává soumarů."
 princely_states.3.f: "Dvůr nad touto záležitostí strávil hodiny debatami. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] tiše naslouchal, nasadil zachmuřený výraz a přikyvoval argumentům [ROOT.GetCountry.GetRuler.GetHerHis] rádců. Pro [ROOT.GetCountry.GetRuler.GetHerHim] však byla volba jen iluzí pro ty, kdo popírali, kdo má skutečně moc. Pomoci Britům, či nepomoci, nebyla volba mezi loajalitou k bývalým spojencům a penězi; byla to volba mezi strádáním a prosperitou."
 princely_states.3.a: "Dokud nám zaplatí, je to v pořádku."
 princely_states.3.b: "Jejich boj není náš boj."
