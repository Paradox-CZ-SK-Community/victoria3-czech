 erode_venkatappa_ramasamy_appears_tt: "E. V. Ramasamy se objeví v zemi [ROOT.GetCountry.GetNameNoFormatting]"
 an_agitator_appears_tt: "V zemi [ROOT.GetCountry.GetNameNoFormatting] se objeví [concept_agitator]"
 caste_conflict.2.t: "Konečně rovnost"
 caste_conflict.2.d: "Úspěch agendy drávidského hnutí dohlédl na přijetí nového zákona a zlepšení kvality života nebráhmanů."
 caste_conflict.2.f: "Boj zdaleka neskončil, to Praveen Pallar věděl. Přesto se neubránil úsměvu, když se posadil v prosté vládní kanceláři a ventilátor nad ním mu jemně ochlazoval zpocená záda.\n\nNaproti sobě viděl pana Iyera a po levici seděl pan Agastya. Oba bráhmani z vysoké kasty. A tady byl on, Pallar, se stejným postavením a platem jako oni. Ani jeden se mu nezdál ochotný pohlédnout do očí. Ano, stále bylo co dělat, ale pro dnešek to stačilo. Poděkoval svým spojencům, kteří s ním pochodovali a protestovali, a otevřel svůj první spis."
 caste_conflict.2.a: "[SCOPE.gsInterestGroup('rural_folk_ig_scope').GetName] prokázali svou schopnost."
 caste_conflict.2.b: "Budoucnost nebráhmanů je zářivá."
