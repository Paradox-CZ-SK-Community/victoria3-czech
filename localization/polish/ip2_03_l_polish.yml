 caste_conflict.5.t: "Nedotknutelní a vyvrženci"
 caste_conflict.5.d: "Aby prosadila svá práva, napila se dalitská komunita z veřejné vodní nádrže, k níž jí byl dosud odpírán přístup. Tento nenásilný protest vedl [SCOPE.sCharacter('character_scope').GetFullName] a následně se setkal s protestem bráhmanských kněží. "
 caste_conflict.5.f: "Mladá dalitská dívka Meena sledovala průvod z dálky, skrytá za velkým stromem. Byla tu předešlého dne se svou matkou a pily z vodní nádrže. Připadalo jí to jako velká událost, i když tehdy jen vynechala práci. To, co viděla teď, ji však vyděsilo: tito kněží lili do vody kravskou moč a hnůj. Pila snad Meena vodu s kravskou močí? Tak či onak, z této znečištěné nádrže už nikdy pít nebude."
 caste_conflict.5.a: "Činy kněží jsou nepřijatelné."
 caste_conflict.5.b: "Nechte je, ať se navzájem zaměstnávají."
 opposition_to_untouchability: "Odpor proti nedotknutelnosti"
 priestly_polluted_water: "Znečištěná vodní nádrž"
