 five_deaths_in_a_row_tt: "#v 5#! [ROOT.GetCountry.GetAltAdjective('yych')|l] $RULER_TITLE_MAHARAJA$ zemřeli bez dokončení tohoto [concept_journal_entry] (aktuálně [ROOT.GetCountry.MakeScope.Var('sikh_dead_maharajas_var').GetValue|V0])"
 ig_granthis: "Granthíové"
 ig_granthis_desc: "Granthíové jsou náboženští představitelé sikhismu, monoteistické víry, podle níž jsou světské záležitosti rozptýlením od jednoty Boha."
 ig_trait_rehat: "Rehat"
 ig_trait_rehat_desc: "Od časů prvních Pandž Pjáré naše víra podněcovala největší válečníky, aby se přidali k naší spravedlivé věci. V těchto náročných časech jsou vojáci opět pohnuti vírou, aby sloužili pod našimi prapory."
 ig_khalsaji: "Khalsaji"
 ig_khalsaji_desc: "Významná bojová síla Sikhské říše, Khalsaji, spojuje sikhské tradice Khalsy s modernizovanými francouzsko-britskými principy."
 ig_trait_khalsa: "Khalsa"
 ig_trait_khalsa_desc: "Máme povinnost cvičit se ve zbrani a chránit nevinné. Jako válečníci musíme bojovat statečně bez ohledu na vyhlídky a žít věrně tradicím Rehatu."
 ig_jats: "Džátové"
 ig_jats_desc: "Džátové jsou tradiční farmáři a rolníci z oblasti Paňdžábu s původem v pastevectví. Jejich zájmy mají převážně agrární povahu. "
 ig_trait_khalsa_panth: "Khalsa Panth"
 ig_trait_khalsa_panth_desc: "Pravdivý život a tvrdá práce. Žijeme cestou svatých, vyhýbáme se krajnostem a kráčíme střední cestou. Zboží, které vyrábíme, se dostává k lidem, kteří ho potřebují."
 princely_state_decision: "Usilovat o suverenitu"
 princely_state_decision_desc: "Britové příliš dlouho podceňovali a podrývali naši autoritu. Zahajte kampaň za zajištění nezávislosti."
 je_princely_states: "Boj za suverenitu"
 je_princely_states_reason: "Náš velký [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] možná vládne zemi [ROOT.GetCountry.GetNameNoFormatting], ale stále jsme vydáni na milost rozmarům a pošetilosti země [SCOPE.sCountry('top_overlord_scope').GetNameNoFormatting]. Moc země [SCOPE.sCountry('overlord_scope').GetNameNoFormatting] den ode dne roste, ale svůj osud stále můžeme utvářet sami.\n\nPříliv nám přeje, abychom zvýšili autonomii země [ROOT.GetCountry.GetNameNoFormatting] a vydali se cestou k nezávislosti, než [SCOPE.sCountry('top_overlord_scope').GetAdjectiveNoFormatting] převezmou plnou kontrolu."
 je_princely_states_status: "Získejte nezávislost pro zemi [JournalEntry.GetCountry.GetNameNoFormatting]."
