 sikh_empire.3.t: "Smrt Šér-e-Pandžába"
 sikh_empire.3.d: "Mahárádža náhle zemřel ve spánku. Národ oplakává naši ztrátu."
 sikh_empire.3.f: "Na dvoře titulu [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_country').GetRuler.GetFullNameNoFormatting] byla zpráva o smrti osoby [SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting] oslavována. „Lev je mrtev,“ jásali ministři, „Paňdžáb bude náš.“\n\nMnozí si však všimli, že [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle] se k oslavám nepřipojil. „Lev Paňdžábu po sobě zanechal silná lvíčata, ale obstojí proti Společnosti?“ zaslechla jedna z [SCOPE.sCountry('relevant_country').GetRuler.GetHerHis] manželek, jak [SCOPE.sCountry('relevant_country').GetRuler.GetHerHim] přemítá. „Nebo nám brzy budou na dveře klepat Britové?“"
 sikh_empire.3.a: "Kéž odkaz mahárádži žije dál."
 ranjit_singh_death_tt: "[SCOPE.sCharacter('relevant_ruler').GetFullName] zemře."
 notification_eic_encroaching_pan_message_name: "[SCOPE.sCountry('pan_scope').GetAdjective] pohraniční postoje"
 notification_eic_encroaching_pan_message_desc: "Jednotky [SCOPE.sCountry('pan_scope').GetAdjective] armády vůči nám po smrti Randžíta Singha zaujaly nepřátelský postoj."
 notification_eic_encroaching_pan_message_tooltip: "#header $notification_eic_encroaching_pan_message_name$#!\n$TOOLTIP_DELIMITER$\n$notification_eic_encroaching_pan_message_desc$"
 sikh_empire.4.t: "Hrozba vzpoury"
 sikh_empire.4.d: "[SCOPE.sCharacter('relevant_general').GetFullName] se otevřeně vyjadřuje ke svému nesouhlasu s vládou titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 sikh_empire.4.f: "V kancelářích Britské východoindické společnosti v Dillí muži už celé hodiny rozebírají zprávy zpoza sikhské hranice. Předseda výboru je unavený, ale pak ho napadne myšlenka.\n\n„Nebo možná... neuděláme nic,“ navrhne.\n\n„Nic?“ zeptá se mladý muž.\n\n„Jak jsme se nedávno poučili, jen málo okamžiků je pro říši nebezpečnějších než předání moci. U Sikhů to platí také. Hlava jejich smečky je mrtvá, lvíčata mají co dokazovat a hyeny jim už hryžou do nohou. Proč bychom měli vykládat své karty? Nechme je, ať se vzájemně vyčerpají.“"
 sikh_empire.4.a: "Potlačte [SCOPE.sCharacter('relevant_general').GetHerHis] kritiku."
 sikh_empire.4.b: "Nechte [SCOPE.sCharacter('relevant_general').GetHerHim] vyjádřit [SCOPE.sCharacter('relevant_general').GetHerHis] nesouhlas."
 sikh_empire.5.t: "Předčasný konec"
 sikh_empire.5.d: "Záhadná ochromující nemoc způsobila, že [SCOPE.sCharacter('relevant_ruler').GetFullName] není schopen udržet si [SCOPE.sCharacter('relevant_ruler').GetHerHis] trůn. Mezi vládnoucí elitou kolují intenzivní spekulace o okolnostech."
 sikh_empire.5.f: "Mladý palácový sluha se vrátil domů a našel tam celou svou rodinu. Všichni na něj měli otázky.\n\n„Upil se [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] k smrti?“ zeptala se jeho odsuzující matka.\n\n„Musí to být atentát,“ prohlásil jeho horlivý otec.\n\nAle muži nezáleželo ani na těchto otázkách, ani na otázkách jeho sourozenců, strýců či tet. Přál si jen spát a už se nikdy neprobudit. Jen tehdy by se ho jeho mysl přestala ptát – #italic co bylo v nápoji, který mu vezír nechal doručit? #!"
 sikh_empire.5.a: "Lid bude tuto ztrátu oplakávat."
 kharak_singh_death_tt: "[SCOPE.sCharacter('relevant_ruler').GetFullName] je donucen abdikovat."
 notification_pan_encroaching_eic_message_name: "Strach z agrese země [SCOPE.sCountry('bic_scope').GetName]"
 notification_pan_encroaching_eic_message_desc: "Po potupné abdikaci $Kharak$ $Singh$ vznikly obavy z možného nepřátelství se zemí [SCOPE.sCountry('bic_scope').GetName]."
 notification_pan_encroaching_eic_message_tooltip: "#header $notification_pan_encroaching_eic_message_name$#!\n$TOOLTIP_DELIMITER$\n$notification_pan_encroaching_eic_message_desc$"
 sikh_empire.6.t: "Těžké zranění"
 sikh_empire.6.d: "[SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_ruler').GetFullName] byl po návratu z pohřbu svého otce zasažen padajícím zdivem. Vezír trvá na tom, že [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] je těžce zraněn a nedá se nic dělat."
 sikh_empire.6.f: "Lidé se shromáždili v ulicích. Všem se hlavou honily stejné myšlenky. Smrt mahárádži Randžíta byla skličující, ale byl starý. Smrt Kharaka byla znepokojivá, ale Váhigurú to tak musel určit. Pokud však [SCOPE.sCharacter('relevant_ruler').GetFirstNameNoFormatting] zemře den po svém otci, pak nastal čas zoufalství. Jak je ochrání dítě? Padnou dříve Afgháncům, nebo Společnosti?"
 sikh_empire.6.a: "Poslechněte vezíra."
 sikh_empire.6.b: "Udělejte vše pro záchranu mahárádži."
 nau_nihal_dies_tt: "[SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting] zemře na svá zranění."
 nau_nihal_lives_tt: "[SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting] přežije, sotva."
 notification_neighbor_encroaching_pan_message_name: "Strach z agrese země [SCOPE.sCountry('relevant_country').GetName]"
 notification_neighbor_encroaching_pan_message_desc: "Incident, který smrtelně zranil našeho vládce, zanechal naši zemi zranitelnou. Objevují se obavy, že [SCOPE.sCountry('relevant_country').GetName] proti nám zahájí tažení."
 notification_neighbor_encroaching_pan_message_tooltip: "#header $notification_neighbor_encroaching_pan_message_name$#!\n$TOOLTIP_DELIMITER$\n$notification_neighbor_encroaching_pan_message_desc$"
 nau_nihal_survives: "Přežil pád sloupu"
 sikh_empire.7.t: "Konec dynastie"
 sikh_empire.7.t2: "Odkaz lva se hroutí"
 sikh_empire.7.d: "Naše říše již není nezávislá. To, co Šér-e-Pandžáb vybudoval, je nyní pryč."
 sikh_empire.7.d2: "Smrt straší v sálech našeho dvora. Nyní, po nedávné smrti našeho titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], může být to, co Šér-e-Pandžáb vybudoval, definitivně pryč."
 sikh_empire.7.f: "„Říkali Randžítu Singhovi Šér-e-Pandžáb, Lev Paňdžábu,“ řekl britský generál s úšklebkem, „myslím, že to byla jejich první chyba.“\n\nPřejel prsty po listinách o anexi, jejichž horní část zdobil britský státní znak. „Měli vědět, že lvi se o území nedělí.“"
 sikh_empire.7.f2: "„Říkali Randžítu Singhovi Šér-e-Pandžáb, Lev Paňdžábu,“ řekl generál s úšklebkem, „copak to nevěděli?“\n\nPřejel prsty po seznamu všech sikhských princů a generálů, kteří zemřeli ve vzájemných bojích. „Pád přichází po vzestupu.“"
 sikh_empire.7.a: "Bohužel, odkaz lva je tentam."
 sikh_empire.8.t: "Odkaz lva"
 sikh_empire.8.d: "Naše země přežila roky otřesů a není závislá na jiném národu. Odkaz Šér-e-Pandžába bude žít dál."
 sikh_empire.8.f: "„Zajímalo by mě, co by mahárádža Randžít Singh řekl, kdyby nás teď viděl,“ zeptal se mladý voják v Khalsaji. „Byl by hrdý na naši neochvějnost? Nebo by byl zklamaný z našich úspěchů?“\n\n„Náš lid má domov a budoucnost, doufejme, že pokojnou,“ odpověděl kapitán. „Myslím, že Lev by byl hrdý, že jeho dílo zajistilo domov jeho dětem.“"
 sikh_empire.8.a: "Další dny slávy jsou před námi."
 sikh_sovereignty_success: "Říše obstála"
