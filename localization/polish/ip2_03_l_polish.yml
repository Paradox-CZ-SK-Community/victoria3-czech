 notification_verge_of_collapse_desc: "Agenda drávidského hnutí ztratila dynamiku. [SCOPE.sCharacter('rural_folk_leader_scope').GetFullName] odstoupil z vedení [SCOPE.gsInterestGroup('rural_folk_ig_scope').GetName]."
 notification_verge_of_collapse_tooltip: "#header $notification_verge_of_collapse_name$#!\n$TOOLTIP_DELIMITER$\n$notification_verge_of_collapse_desc$"
 caste_conflict.4.t: "Nebrámanský manifest"
 caste_conflict.4.d: "V [ROOT.GetCountry.GetCapital.GetCityHubName] koluje Nebrámanský manifest, který vyvolává napětí mezi [SCOPE.gsInterestGroup('rural_folk_ig_scope').GetName] a [SCOPE.gsInterestGroup('intelligentsia_ig_scope').GetName]."
 caste_conflict.4.f: "Dva straničtí vůdci seděli naproti sobě a jejich pobočníci napjatě naslouchali, zatímco se tyto dvě mysli střetávaly už druhou hodinu.\n\n„Prosím, musíte přesvědčit Stranu spravedlnosti, aby uznala rozum,“ naléhal [SCOPE.sCharacter('intelligentsia_leader_scope').GetFullNameNoFormatting]. „Musíme bojovat společně, jinak selžeme!“\n\n„Chcete, abychom po vašem boku čelili britským obuškům, ale řekněte mi, až přijde zítřek, dovolíte nám také vládnout po vašem boku? Britové mi neublížili o nic víc než vy. Vždyť mnoho jejich činů bylo vedeno právě vašima rukama.“"
 caste_conflict.4.a: "Ten manifest je nevlastenecký!"
 caste_conflict.4.b: "Možná manifest uvádí oprávněné body."
