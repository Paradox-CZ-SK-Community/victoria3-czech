 india_railway.1.t: "Vlaková loupež ve státě [SCOPE.sState('relevant_state').GetNameNoFormatting]"
 india_railway.1.d: "Mezinárodní tisk přináší zprávy o vlakové loupeži ve státě [SCOPE.sState('relevant_state').GetNameNoFormatting], kterou vedli agitátoři kultury [SCOPE.sCulture('discriminated_culture').GetNameNoFormatting]."
 india_railway.1.f: "„Kdyby to byli dakoité, zemřelo by mnohem víc lidí. Tito mladí muži kradli NAŠE peníze zpět pro NÁS. Udělali chyby, ale jejich úmysly jsou ušlechtilé.“\n\n„Pokud jsou tak ušlechtilí, co tedy dělali, když mávali zbraněmi na své krajany? Teď je nevinný muž mrtvý. Nikdy nezapomenu na zvuk pláče jeho ženy.“"
 india_railway.1.a: "Popřete, že naši strážci kultury [SCOPE.sCulture('not_discriminated_culture').GetNameNoFormatting] byli přemoženi."
 india_railway.1.b: "Nemá smysl zakrývat naše ztráty."
 do_control_the_press: "Kontrola tisku"
 not_control_the_press: "Špatný tisk"
 india_railway.2.t: "Krádež Koruně"
 india_railway.2.d: "Začalo projednávání procesu s obviněnými revolucionáři, kteří jsou obžalováni z loupeže a vraždy."
 india_railway.2.f: "Řev davu shromážděného před soudní síní hřeje obžalované u srdce. Tentýž řev ztěžuje slyšet žalobce. Neúnavně však pokračuje.\n\n„Únos, držení nelegálních střelných zbraní a vražda. To samo o sobě je strašný čin, Vaše Ctihodnosti. Ale tito nestoudní muži to všechno spáchali jen proto, aby se dopustili ještě ohavnějšího zločinu. Pokusili se okrást samotnou Korunu, která se o ně stará. Dav venku by je nazval hrdiny, já věřím, že zákon by je nazval zrádci.“"
 india_railway.2.a: "Učiňte z nich výstražný příklad – vyslechněte je."
 india_railway.2.b: "Dodržujte řádný proces a pořádek."
 railway_trial_authority: "Autoritativní opatření"
 railway_trial_legit: "Řádný proces"
 india_railway.3.t: "Regionální hladomor"
 india_railway.3.d: "Masový vývoz obilí a plodin způsobil, že lidé ve státě [SCOPE.sState('relevant_state').GetNameNoFormatting] jsou během regionálního hladomoru zranitelní."
 india_railway.3.f: "#italic Drahá Elizabeth,\n\nOnehdy jsem doprovázel zásilky Koruny napříč Indií, když jsem spatřil ten nejstrašnější výjev. Muž, hubený jako hůl, kterou držel, stál na stráži před svou hladovějící ženou a dvěma dětmi. Když jsem se svých druhů zeptal, co hlídá, vysvětlili mi, že vesnice se uchýlila ke kanibalismu. #!"
 india_railway.3.a: "Použijte železniční dopravu k zásobování potravinovými přebytky."
 india_railway.3.b: "Taková opatření si nemůžeme dovolit."
