l_polish:
 portuguese_monarchs.1.t: "Dobrá matka"
 portuguese_monarchs.1.d: "Navzdory letům varování královských lékařů zemřela [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] během svého třináctého porodu ve věku [ROOT.GetCountry.GetRuler.GetAge] let."
 portuguese_monarchs.1.f: "„Její Veličenstvo [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] začalo včera večer o půl desáté pociťovat známky porodu. Při průběhu téhož porodu se objevily obtíže, které přiměly lékaře uchýlit se k zákrokům, jimiž bylo dosaženo vyjmutí infanta, včas, jenž před vyjmutím přijal křest.\n\nVýsledek těchto zákroků se dostavil v deset hodin dopoledne. Bohužel po hodině a půl Její Veličenstvo, vyčerpáno ze všech sil, odevzdalo svou duši Bohu poté, co přijalo všechny svátosti.\n\n— Francisco Elias Rodrigues da Silveira, dr. Kessler, Ignacio António da Fonseca Benevides, António Joaquim Farto.“\n\n#italic Vládní věstník#!"
 portuguese_monarchs.1.a: "Její odkaz bude pokračovat skrze její potomstvo."
 portuguese_monarchs.1_tt: "Vhodný dědic již byl vybrán, aby nesl korunu."
 portuguese_monarchs.2.t: "Znenadání"
 portuguese_monarchs.2.d: "Fanatičtí viníci dokázali připravit o život [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] i následníka trůnu, zatímco si královská rodina užívala pokojnou cestu v kočáře."
 portuguese_monarchs.2.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] byl přepaden Alfredem Luísem da Costou a Manuelem Buíçou při cestě v otevřeném kočáře. Výstřely ho i jeho dědice tragicky smrtelně zasáhly a zranily jeho mladšího syna, který měl být brzy korunován.\n\nNěkteří vnímali motivy královraždy jako odvážný odpor proti represivní monarchii, zatímco jiní ji považovali za zoufalý pokus zažehnout politickou proměnu.\n\nPo vyšetřování vyšlo najevo, že vrazi byli součástí větší revoluční skupiny zvané „Carbonária“, jejímž cílem bylo nastolit v zemi [ROOT.GetCountry.GetNameNoFormatting] republiku."
 portuguese_monarchs.2.a: "Koruna těžce doléhá na spánky nového [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 portuguese_monarchs.2_tt: "Druhý syn [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], který byl zachráněn s nesmrtelnými zraněními, je jediným rozumným kandidátem na nového vládce."
 portuguese_monarchs.3.t: "Let wyvern"
 portuguese_monarchs.3.d: "Staletá vláda nejjasnějšího rodu Bragança skončila v zemi [ROOT.GetCountry.GetName]. Obyvatelé úspěšně ukázali, že skutečná urozenost sídlí v jejich srdcích a rukou."
 portuguese_monarchs.3.f: "Kdysi žil muž, který začal svůj život jako budoucí zakladatel rodu, jenž dal světu mnoho králů a královen, až po samu půdu, v níž byl vykopán jeho hrob.\n\nJeho otec, portugalský monarcha, mu v gregoriánském roce 1337 dal jméno Alfonso.\n\nDnes tento odkaz dospěl ke svému konci.\n\nZítřek bude znamenat triumf prostého lidu nad těmi, kteří o sobě tvrdili, že jsou vyvolení."
 portuguese_monarchs.3.a: "Vzlétneme naposledy."
 portuguese_monarchs.3_tt: "Aby se předešlo konfliktu a újmě členům rodiny, je král [SCOPE.sCharacter('manuel_scope').GetFullName] nucen opustit zemi a možná se už nikdy nevrátit."
 portuguese_monarchs.4.t: "Epidemie ve státě [SCOPE.sState('outbreak_state').GetName]"
 portuguese_monarchs.4.d: "Přišly zprávy o epidemii cholery ve státě [SCOPE.sState('outbreak_state').GetName]. Lidé otevřeně žádají úředníky o pomoc."
 portuguese_monarchs.4.f: "„...ano, můj [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], noviny byly klíčovým zdrojem šíření vědeckých informací mezi našimi poddanými v oblasti. Ti, kteří neumějí číst, jsou povzbuzováni, aby se ptali přátel a rodiny na nejnovější pokroky v ochraně před neviděným. Městští vyvolávači byli rovněž vysláni do většiny ulic.\n\nJako při všech katastrofách se však ze všech koutů státu vynořili prospěcháři zlého i dobrého rázu, aby si naplnili pokladny strachem, ale to se v takových časech dá očekávat.“"
 portuguese_monarchs.4.a: "Poslat jim pomoc."
 portuguese_monarchs.4.b: "Musíme je navštívit na místě a pozvednout morálku."
 portuguese_monarchs.4.c: "Jsou odkázáni sami na sebe."
