 transfer_ionian_islands_decision_desc: "Jónské ostrovy během napoleonských válek několikrát změnily majitele a po získání nezávislosti nebyly začleněny do řeckého státu. Pokud získáme souhlas jak jónského lidu, tak vlády jejich ochránců, možná budeme schopni vyjednat pokojné předání moci."
 je_kaiserforum: "Innere Stadt"
 je_kaiserforum_reason: "V srdci města [SCOPE.sState('relevant_state').GetCityHubName] leží Ringstrasse - velkolepý bulvár obepínající centrum města. Komise [ROOT.GetCountry.GetAdjectiveNoFormatting] porotců posoudila nespočet návrhů, které mají tuto část města [SCOPE.sState('relevant_state').GetCityHubName] proměnit císařským fórem, novými sídly vlády a vzorovými kulturními institucemi. Nyní, když byly staré městské hradby zbořeny, tato iniciativa uvádí [ROOT.GetCountry.GetNameNoFormatting] do nové éry městskosti.\n\n$building_kaiserforum_3$ bude nutné vybudovat v několika fázích a může být postaven v panelu státu pro [SCOPE.sState('relevant_state').GetName]."
