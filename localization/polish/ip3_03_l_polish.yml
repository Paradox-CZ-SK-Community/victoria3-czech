 austria_events.30.t: "[SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting] abdikuje"
 austria_events.30.d: "Protože se zdraví [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_ruler').GetFullName] zhoršuje, [SCOPE.sCharacter('ig_leader_scope').GetFullName] přesvědčil [SCOPE.sCharacter('relevant_ruler').GetHerHim], aby abdikoval ve prospěch [SCOPE.sCharacter('relevant_ruler').GetHerHis] dědice, [SCOPE.sCharacter('relevant_heir').GetFullName]."
 austria_events.30.f: "[SCOPE.sCharacter('relevant_heir').GetFullNameNoFormatting] pokleká před [SCOPE.sCharacter('relevant_ruler').GetPrimaryRoleTitle] a žádá o požehnání, než [SCOPE.sCharacter('relevant_heir').GetSheHe] usedne na [ROOT.GetCountry.GetAdjectiveNoFormatting] trůn. [SCOPE.sCharacter('relevant_ruler').GetFullNameNoFormatting] pohlédne na [SCOPE.sCharacter('relevant_ruler').GetHerHis] nástupce a položí obě ruce na [SCOPE.sCharacter('relevant_heir').GetHerHis] hlavu. Se znamením svatého kříže [SCOPE.sCharacter('relevant_heir').GetFirstNameNoFormatting] povstává. Dnes začíná nová kapitola pro [ROOT.GetCountry.GetNameNoFormatting]."
