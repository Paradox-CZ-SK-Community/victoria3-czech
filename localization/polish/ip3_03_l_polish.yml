 greece.6.d: "[SCOPE.sCountry('greek_country').GetAdjectiveNoFormatting] zástupci přišli vyjednat podmínky postoupení země [SCOPE.sCountry('ionian_country').GetName] zemi [SCOPE.sCountry('greek_country').GetName]."
 greece.6.f: "[SCOPE.sCountry('greek_country').GetAdjectiveNoFormatting] zástupci předkládají svůj návrh na zasedání [ROOT.GetCountry.GetAdjectiveNoFormatting] kabinetu:\n\n„Abychom podpořili dobrou vůli mezi našimi národy a posílili ducha [SCOPE.sCountry('greek_country').GetAdjectiveNoFormatting] lidu, náš [SCOPE.sCountry('greek_country').GetRuler.GetPrimaryRoleTitle] žádá, aby [SCOPE.sCountry('ionian_country').GetNameNoFormatting] byla propuštěna z přátelského protektorátu, v jehož rámci ostrovy těžily z vaší pravé a spravedlivé pomoci.“"
