 je_kaiserforum_kaisergelb_button_desc: "Po dokončení staveb můžeme posoudit konečné plány centra města a nanést na úřední budovy příjemný nátěr schönbrunnské žluti."
 kaiserforum.1.t: "Rozšíření centra města"
 kaiserforum.1.d: "Byl předložen návrh na rozšíření centra města. Toto úsilí by vyžadovalo několik fází výstavby, ale proměnilo by [SCOPE.sState('relevant_state').GetCityHubName], jak jej známe."
 kaiserforum.1.f: "„Je mou vůlí, aby bylo rozšíření vnitřního města Vídně provedeno v nejbližším možném okamžiku, s náležitým ohledem na vhodné spojení s předměstími. Přitom je třeba myslet na regulaci a zkrášlení mé rezidence a císařského hlavního města. Za tímto účelem schvaluji stržení hradeb obklopujících vnitřní město i suchých příkopů kolem nich.“\n\n— František Josef I."
 kaiserforum.1.a: "Začněte pracovat okamžitě!"
 kaiserforum.1.b: "Takový podnik je nerozumný."
 kaiserforum_1_construct_tt: "$building_kaiserforum_1$ může být postaven v panelu státu pro [SCOPE.sState('relevant_state').GetName]"
