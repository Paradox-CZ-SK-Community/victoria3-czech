 notification_trs_unification_accepted_message_tooltip: "#header $notification_trs_unification_accepted_message_name$#!\n$TOOLTIP_DELIMITER$\n$notification_trs_unification_accepted_message_desc$"
 je_yugoslavia: "Ustavení $YUG$"
 je_yugoslavia_reason: "Vyhlídky země [ROOT.GetCountry.GetNameNoFormatting] na vytvoření jednotného jihoslovanského státu jsou slibné. [SCOPE.sCulture('croatian_scope').GetName], [SCOPE.sCulture('serbian_scope').GetName], [SCOPE.sCulture('slovene_scope').GetName] i [SCOPE.sCulture('bosniak_scope').GetName] lidé vyjádřili podporu tomuto novému cíli [Concept('concept_unification', '$concept_major_unification$')].\n\nÚspěšné [concept_nation_formation] $YUG$ by přineslo nesmírný prospěch, strategicky by naši zemi posílilo na mezinárodní scéně a učinilo z ní maják pro všechny jihoslovanské národy žijící pod cizí vládou."
