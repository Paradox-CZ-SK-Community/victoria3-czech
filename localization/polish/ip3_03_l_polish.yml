 yugoslavia.2.t: "Sjednotitel jihoslovanských národů"
 yugoslavia.2.d: "Díky velkému úsilí [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] je [SCOPE.sCountry('yug_scope').GetName] zavedeným národem sjednocujícím [SCOPE.sCulture('primary_culture_scope').GetName] a další jihoslovanské národy."
 yugoslavia.2.f: "Když se sen o zemi [SCOPE.sCountry('yug_scope').GetNameNoFormatting] stal skutečností, [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullNameNoFormatting] je připraven vést národ do nové éry prosperity a prestiže."
 yugoslavia.2.a: "Budoucnost země [SCOPE.sCountry('yug_scope').GetNameNoFormatting] je zářná."
 unified_yugoslavia: "Maják Balkánu"
 the_unifier_yug: "Schopný vůdce"
 notification_yug_unification_name: "Vznik země [SCOPE.sCountry('yug_scope').GetName]"
 notification_yug_unification_desc: "Vláda [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] ustavila [SCOPE.sCountry('yug_scope').GetName], rozsáhlý superstát sjednocující jihoslovanské národy na Balkáně."
