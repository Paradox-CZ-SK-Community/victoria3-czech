 eastern_crisis.2.t: "Krize zvládnuta"
 eastern_crisis.2.d: "Díky silné [concept_ottoman_integrity] země [SCOPE.sCountry('ottoman_scope').GetName] zvládla narůstající krizi v [GetStrategicRegion('region_balkans').GetName]."
 eastern_crisis.2.f: "Vezíři se shromáždili v kavárně. Nejmladší poznamenal: „Právě na takovém místě bychom našli separatisty. Je moudré slavit ve lví jámě?“ \n\n„İsmaile, děláš si příliš mnoho starostí,“ promluvil nejstarší. „Venku jistě stále jsou lvi, ale krize pominula. Teď už víme, kam nastražit pasti.“\n\n„Přesto,“ zamumlal İsmail. „Možná existovaly okolnosti, za nichž bylo loajální se bouřit...“"
 eastern_crisis.2.a: "[SCOPE.sCountry('ottoman_scope').GetAdjectiveNoFormatting] vláda není něčím, s čím by si bylo radno zahrávat."
 eastern_crisis_controlled: "Zvládnutá východní krize"
 eastern_crisis.3.t: "Krize bez kontroly"
 eastern_crisis.3.d: "Kdysi velká [SCOPE.sCountry('ottoman_scope').GetName] nedokázala zvládnout narůstající nepokoje v [GetStrategicRegion('region_balkans').GetName]. Nepokoje mohou dále sílit."
 eastern_crisis.3.f: "İsmail se stále třásl, když vedl ostatní vezíry skrze kouř z vodních dýmek do zadní místnosti kavárny. \n\n„Co tě tak vyděsilo, mladý psíku?“ zasmál se nejstarší. „Vím, že naše říše jako by upadla do těžkých časů, ale vydržela staletí a vydrží i...“ Vezír se zarazil, když z kouřem zahalených koutů vystoupily statné postavy. \n\nİsmail zavřel dveře na závoru. „Jsou tu tací, kteří nesouhlasí, pašo, a trvali na tom, že se s vámi setkají.“"
 eastern_crisis.3.a: "Toto selhání ohrožuje budoucnost [SCOPE.sCountry('ottoman_scope').GetAdjectiveNoFormatting] vlády."
