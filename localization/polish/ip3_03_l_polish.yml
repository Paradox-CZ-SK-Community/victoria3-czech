 je_great_eastern_crisis_reason: "V [GetStrategicRegion('region_balkans').GetName] se schyluje ke krizi a [Concept('concept_secession','$concept_secessionists$')] ohrožují vládu země [SCOPE.sCountry('ottoman_scope').GetName] nad touto oblastí. Jak se situace zhoršuje, [SCOPE.sCountry('ottoman_scope').GetAdjectiveNoFormatting] se snaží nepokoje stabilizovat dříve, než pohltí celou oblast. Mezitím oportunistické závislé země a cizí mocnosti pokukují po jejích nyní zranitelných balkánských územích.\n\n#b Vlny svárů:#!\nDokud probíhá $je_great_eastern_crisis$, všechna kulturní a náboženská [Concept('concept_political_movement','$concept_political_movements$')] v zemi [SCOPE.sCountry('ottoman_scope').GetNameNoFormatting] budou získávat ještě větší #tooltippable #tooltip:[GetPlayer.GetTooltipTag],eastern_crisis_movement_attraction_tt podporu#!#!."
