 eastern_crisis.1.d: "Budoucnost země [SCOPE.sCountry('ottoman_scope').GetName] je na rozcestí. Rostoucí počet [Concept('concept_secession','$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')] ohrožuje stabilitu našeho národa."
 eastern_crisis.1.d2: "Budoucnost země [SCOPE.sCountry('ottoman_scope').GetName] je na rozcestí. Rostoucí počet [Concept('concept_secession','$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')] ohrožuje stabilitu jejich národa."
 eastern_crisis.1.f: "Nejmladší vezír, İsmail, se při řeči třásl a klopil hlavu: „Už nelze popírat, že v naší kdysi velké říši kvasí nepokoje. Příznivce $concept_secessionist$ lze údajně najít v každé kavárně v [SCOPE.sState('relevant_state_scope').GetCityHubName].“\n\nOstatní vezíři přikývli, nerozrušeni. Nejstarší promluvil. „Musíme prosazovat svůj program, i když [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] nesdílí náš názor. V sázce jsou životy našich rodin.“"
 eastern_crisis.1.a: "Pečlivě sledujte, jak se situace vyvíjí."
