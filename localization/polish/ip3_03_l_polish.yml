 notification_yugoslavia_failed_message_name: "Zásadní nezdary $YUG_ADJ$ programu"
 notification_yugoslavia_failed_message_desc: "[SCOPE.sCountry('root_country_scope').GetName] utrpěla zásadní nezdary v projektu ustavení $YUG$. Možná se tento sen v budoucnu stane skutečností."
 notification_yugoslavia_failed_message_tooltip: "#header $notification_yugoslavia_failed_message_name$#!\n$TOOLTIP_DELIMITER$\n$notification_yugoslavia_failed_message_desc$"
 yugoslavia.1.t: "Argument pro $YUG$"
 yugoslavia.1.d: "S nedávným vývojem začala vláda [SCOPE.sCharacter('ruler_scope').GetFullName] projevovat zájem o poslání sjednotit jihoslovanské národy."
 yugoslavia.1.f: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] stojí před lidem země [SCOPE.sCountry('yugoslavia_seeker_scope').GetNameNoFormatting], aby pronesl vášnivý projev.\n\n„Je nevyhnutelné, abychom usilovali o vytvoření a rozvoj $YUG$, která sjednotí všechny jihoslovanské národy. [SCOPE.sCountry('yugoslavia_seeker_scope').GetNameNoFormatting] může toto úsilí zcela jistě vést.“"
 yugoslavia.1.a: "Náš [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] toto úsilí povede."
 yugoslavia.1.b: "Je zde příliš mnoho nesouladu, než abychom mohli sledovat tento plán."
 je_yug_gain_claim_tt: "#g #b Získá#!#! nároky na #b každý#! [GetCulture('croat').GetName], [GetCulture('serb').GetName], [GetCulture('slovene').GetName] a [GetCulture('bosniak').GetName] [concept_homeland] [concept_state_region], který nevlastní [ROOT.GetCountry.GetNameNoFlag]"
 seeking_yugoslavia: "Sjednocování jižních Slovanů"
