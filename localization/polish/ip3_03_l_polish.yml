l_polish:
 je_greek_nationalism: "Megali idea"
 je_greek_nationalism_reason: "#italic „Řekem není jen ten, kdo obývá království, ale také ten, kdo žije v Janině, Soluni, Seresu, Adrianopoli, Konstantinopoli, Trapezuntu, na Krétě, Samu nebo v kterékoli jiné zemi řeckých dějin či řeckého rodu...“\n—Ioannis Kolettis#!\n\nNavzdory vzniku nezávislého řeckého státu žije většina Řeků stále pod cizí vládou. Je třeba vyvinout soustředěné úsilí, diplomatickými i vojenskými prostředky, abychom celé území [GetGeographicRegion('geographic_region_megali_greece').GetName] začlenili pod naši vládu.[SCOPE.GetRootScope.GetCountry.GetCustom('byzantium_reason_text')]"
 greek_state_possible_tt: "Vlastní alespoň #v [GetPlayer.MakeScope.ScriptValue('greek_homeland_states_owned_to_activate_min')]#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_megali_greece').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('greek_homeland_states_owned_var').GetValue|V0]#!)"
 greek_state_complete_tt: "Vlastní alespoň #v [GetPlayer.MakeScope.ScriptValue('greek_homeland_states_owned_to_complete_min')]#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_megali_greece').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('greek_homeland_states_owned_var').GetValue|V0]#!)"
 greek_state_complete_tt_2: "Vlastní alespoň #v [GetPlayer.MakeScope.ScriptValue('greek_homeland_states_owned_to_complete_max')]#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_megali_greece').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('greek_homeland_states_owned_var').GetValue|V0]#!)"
 greek_state_complete_tt_3: "Vlastní alespoň #v [GetPlayer.MakeScope.ScriptValue('byzantium_state_region_owned_to_complete')]#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_historic_byzantium').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('byzantium_states_owned_var').GetValue|V0]#!)"
 byz_is_this_tt: "Zformovala zemi #bold $BYZ$#! v rámci [concept_nation_formation]"
 greek_homeland_states_tt: "#title Následující [Concept('concept_state_region','$concept_state_regions$')] jsou [GetCulture('greek').GetName] [Concept('concept_homeland','$concept_homelands$')]:#! #indent_newline:3 \n• $STATE_EASTERN_THRACE$\n• $STATE_IONIAN_ISLANDS$\n• $STATE_PELOPONNESE$\n• $STATE_ATTICA$\n• $STATE_SKOPIA$\n• $STATE_MACEDONIA$\n• $STATE_THESSALIA$\n• $STATE_WESTERN_THRACE$\n• $STATE_HUDAVENDIGAR$\n• $STATE_AYDIN$\n• $STATE_CYPRUS$\n• $STATE_TRABZON$\n• $STATE_CRETE$\n• $STATE_WEST_AEGEAN_ISLANDS$\n• $STATE_EAST_AEGEAN_ISLANDS$"
 byzantium_state_regions_tt: "#title Následující položky jsou $BYZ$ [Concept('concept_state_region','$concept_state_regions$')]:#! #indent_newline:3 \n• $STATE_EASTERN_THRACE$\n• $STATE_ATTICA$\n• $STATE_THESSALIA$\n• $STATE_MACEDONIA$\n• $STATE_SKOPIA$\n• $STATE_WESTERN_THRACE$\n• $STATE_NORTHERN_THRACE$\n• $STATE_HUDAVENDIGAR$\n• $STATE_AYDIN$\n• $STATE_WEST_AEGEAN_ISLANDS$\n• $STATE_EAST_AEGEAN_ISLANDS$\n• $STATE_ALBANIA$"
 byzantium_snippet_text: "\n\n#b Byzantské ambice:#!\nPokud dosáhneme vysoké [concept_legitimacy] a zajistíme si kontrolu nad [GetStateRegion('STATE_IONIAN_ISLANDS').GetName], získáme možnost ucházet se o titul #b Východního Říma#!."
 greek_nationalism_status_loc: "Ve snaze rozšířit řecký stát"
 megali_idea_status_loc: "Ve snaze uskutečnit #b Megali ideu#!"
 byzantium_status_loc: "Ve snaze získat #b titul Východního Říma#!"
 byzantium_button_check_tt: "Přijali jsme návrh ucházet se o titul #b Východního Říma#!"
 greece.1.t: "Řecký stát"
 greece.1.d: "Vzestup nacionalismu vyvolal mezi našimi občany iredentistickou touhu začlenit všechny země [SCOPE.sCulture('greek_culture_scope').GetName] lidu pod jediný řecký stát."
 greece.1.f: "„Odvrhli jsme staletí osmanské vlády, abychom přivedli řecký stát k životu. Přesto to nestačí. Mnozí naši krajané stále žijí pod tíživým jhem cizí vlády a touží po zemi, kterou by mohli nazývat svou vlastní. Tento sen lze uskutečnit pouze anexí všech řeckých zemí, čehož dosáhneme se souhlasem jejich okupantů, nebo bez něj.“"
 greece.1.a: "Náš nárok na tuto zemi je nepopiratelný."
 greece.1.b: "Expanze prozatím není prioritou."
 embrace_megali_idea_tt: "#r #b Výběr této možnosti změní požadavky na dokončení [concept_journal_entry] $je_greek_nationalism$ následovně:#!#! #indent_newline:3 \n• [ROOT.GetCountry.GetName] bude muset vlastnit #b všechny#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_megali_greece').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('greek_homeland_states_owned_var').GetValue|V0]#!)\n• [ROOT.GetCountry.GetNameNoFlag] je v míru\n• [ROOT.GetCountry.GetNameNoFlag] #b není#! [concept_subject] jiné země\n• [concept_rank] země [ROOT.GetCountry.GetNameNoFlag] je větší nebo roven [concept_minor_power]\n• [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_gold_reserves] jsou vyšší než #v @money![GetPlayer.MakeScope.ScriptValue('greek_nationalism_gold_min')|2]#!\n• [concept_legitimacy] musí být #v [GetPlayer.MakeScope.ScriptValue('greek_nationalism_legitimacy_min')]#! nebo vyšší"
 not_embrace_megali_idea_tt: "#r #b Požadavky na dokončení [concept_journal_entry] $je_greek_nationalism$ zůstanou stejné:#!#! #indent_newline:3 \n• [ROOT.GetCountry.GetName] bude muset vlastnit alespoň #b #v [GetPlayer.MakeScope.ScriptValue('greek_homeland_states_owned_to_complete_min')]#!#! [Concept('concept_state','$concept_states$')] v [GetGeographicRegion('geographic_region_megali_greece').GetName] (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('greek_homeland_states_owned_var').GetValue|V0]#!)\n• [ROOT.GetCountry.GetNameNoFlag] je v míru\n• [ROOT.GetCountry.GetNameNoFlag] #b není#! [concept_subject] jiné země\n• [concept_rank] země [ROOT.GetCountry.GetNameNoFlag] je větší nebo roven [concept_minor_power]\n• [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_gold_reserves] jsou vyšší než #v @money![GetPlayer.MakeScope.ScriptValue('greek_nationalism_gold_min')|2]#!\n• [ROOT.GetCountry.GetNameNoFlag] nemá #b žádné#! [Concept('concept_insurrection', '$concept_insurrectionary$')] [Concept('concept_political_movement', '$concept_political_movements$')]"
 greece.2.t: "Titul Východního Říma"
 greece.2.d: "Rozšíření řeckého státu přivedlo některé z nejzapálenějších nacionalistů k návrhu ještě ambicióznějšího projektu: obnovy Byzantské říše dobytím [SCOPE.sState('thrace_scope').GetStateRegion.GetName] a [SCOPE.sState('aydin_scope').GetStateRegion.GetName]."
 greece.2.f: "„To, co by se ještě včera zdálo absurdním snem, máme nyní na dosah. Purpurový fénix znovu povstane!“"
 greece.2.a: "Byzanc bude obnovena."
 greece.2.b: "Tento program je příliš ambiciózní."
 embrace_ambitious_agenda_tt: "#r #b Výběr této možnosti změní požadavky na dokončení [concept_journal_entry] $je_greek_nationalism$ následovně:#!#! #indent_newline:3 \n• [ROOT.GetCountry.GetName] bude muset zformovat $BYZ$ v rámci [concept_nation_formation]\n• [ROOT.GetCountry.GetName] musí mít aktivní zákon [GetLawType('law_monarchy').GetName]\n• [ROOT.GetCountry.GetName] musí vlastnit #v všechny#! #tooltippable #tooltip:[GetPlayer.GetTooltipTag],byzantium_state_regions_tt $BYZ$ State Regions#!#! (aktuálně tento požadavek splňuje #v [ROOT.GetCountry.MakeScope.Var('byzantium_states_owned_var').GetValue|V0]#!)\n• [concept_legitimacy] musí být #v [GetPlayer.MakeScope.ScriptValue('greek_nationalism_legitimacy_min')]#! nebo vyšší\n• [ROOT.GetCountry.GetNameNoFlag] je v míru\n• [ROOT.GetCountry.GetNameNoFlag] #b není#! [concept_subject] jiné země\n• [concept_rank] země [ROOT.GetCountry.GetNameNoFlag] je větší nebo roven [concept_minor_power]\n• [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_gold_reserves] jsou vyšší než #v @money![GetPlayer.MakeScope.ScriptValue('greek_nationalism_gold_min')|2]#!"
 not_embrace_ambitious_agenda_tt: "#r #b Požadavky na dokončení [concept_journal_entry] $je_greek_nationalism$ zůstanou stejné#!#!"
 greece.3.t: "Londýnská smlouva"
 greece.3.d: "Pečlivým vyjednáváním [SCOPE.sCountry('ionian_overlord').GetName] postoupila [SCOPE.sCountry('ionian_country').GetName] zemi [ROOT.GetCountry.GetName]."
 greece.3.f: "„Abychom podpořili dobrou vůli mezi našimi národy a posílili ducha [ROOT.GetCountry.GetAdjectiveNoFormatting] lidu, [SCOPE.sCountry('ionian_overlord').GetRuler.GetPrimaryRoleTitle] milostivě postoupil Jónské ostrovy. Náš přátelský protektorát, v jehož rámci ostrovy těžily z naší pravé a spravedlivé pomoci, je považován za ukončený a věříme, že lid těchto ostrovů bude prosperovat pod laskavou péčí našich důvěryhodných přátel.“"
 greece.3.a: "Nanejvýš přijatelné řešení."
 greece.4.t: "[ROOT.GetCountry.GetNameNoFormatting] znovu povstává"
 greece.4.d1: "Náš ambiciózní iredentistický program zaznamenal výrazný úspěch. V zemi [ROOT.GetCountry.GetNameNoFormatting] nastává úsvit nové éry."
 greece.4.d2: "Náš iredentistický program byl úspěšný. Lid země [ROOT.GetCountry.GetNameNoFormatting] slaví."
 greece.4.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFormatting] pronáší projev, který bude po celé generace znít v srdcích všech [ROOT.GetCountry.GetAdjectiveNoFormatting] lidí:\n\n„Národ, který svým pádem osvítil mnoho jiných národů, dnes znovu povstává - a ne jako dříve, kdy byl rozdělen na mnoho malých států, nýbrž jako jednotný stát s vlastní vládou, náboženstvím a politickou existencí navždy zaručenou ústavou.“"
 greece.4.a: "[ROOT.GetCountry.GetNameNoFormatting] bude nadále vzkvétat."
 greece.4.b: "[ROOT.GetCountry.GetNameNoFormatting] si vydobylo respekt, který si zaslouží."
 greece.4.c: "Repatriovat náš lid do [ROOT.GetCountry.GetNameNoFormatting]."
