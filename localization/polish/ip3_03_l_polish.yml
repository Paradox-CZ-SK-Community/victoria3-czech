 je_eastern_crisis_tracker_reason: "V [GetStrategicRegion('region_balkans').GetName] se schyluje ke krizi a [SCOPE.sCountry('ottoman_scope').GetNameNoFormatting] se snaží udržet kontrolu nad svým územím, zatímco [Concept('concept_secession','$concept_secessionists$')] ohrožují její vládu. Jak se situace zhoršuje, snaží se stabilizovat současný nárůst nepokojů dříve, než se rozšíří po celé oblasti. Dokud probíhá $je_great_eastern_crisis$, všechna kulturní a náboženská [Concept('concept_political_movement','$concept_political_movements$')] v zemi [SCOPE.sCountry('ottoman_scope').GetNameNoFormatting] budou získávat ještě větší #tooltippable #tooltip:[GetPlayer.GetTooltipTag],eastern_crisis_movement_attraction_tt podporu#!#!."
