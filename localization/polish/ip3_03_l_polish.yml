 greece.5.d: "Agresivní prosazování iredentistického projektu země [ROOT.GetCountry.GetNameNoFormatting] již není udržitelné."
 greece.5.f: "Napětí v místnosti je hmatatelné. Politici a poradci se přou o udržitelnost pokračování v ambiciózním programu země [ROOT.GetCountry.GetNameNoFormatting]. Každý požaduje, aby byla určena odpovědná strana, která ponese vinu za špatné nakládání s [ROOT.GetCountry.GetAdjectiveNoFormatting] zdroji použitými v tomto iredentistickém úsilí, jež se nepodařilo uskutečnit."
 greece.5.a: "Naše selhání je ostudou."
 greece.5.b: "[ROOT.GetCountry.GetRuler.GetFullName] musí nést odpovědnost."
