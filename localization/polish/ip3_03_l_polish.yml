 kaiserforum_accepted: "Přijata výstavba fóra"
 kaiserforum_rejected: "Odmítnuta výstavba fóra"
 kaiserforum.2.t: "Kulturní vliv"
 kaiserforum.2.d: "První fáze výstavby byla dokončena a u Ringstrasse nyní stojí muzeum umění a přírodovědné muzeum. Pokrok kultury a vzdělanosti ve státě [SCOPE.sState('relevant_state').GetName] bude nepopiratelný."
 kaiserforum.2.f: "„Pokud jde o město Vídeň, nachází se nyní v tom, co lze označit za přechodný stav, způsobený zničením a stržením dalších opevnění a výstavbou bulvárů na jejich místě, nikterak horších než těch, které v Paříži vybudoval baron Haussmann za existence napoleonské dynastie. Vídeň lze vpravdě přirovnat k druhé Paříži v malém, s Dunajem namísto Seiny. A pokud Rakouské císařství zůstane neporušené, což se podle všeho zdá nanejvýš pravděpodobné, bude se moci do dvaceti let chlubit jedním z nejlépe naplánovaných a nejlépe vystavěných měst v Evropě.“ — Australský kolonista"
 kaiserforum.2.a: "To se stane součástí odkazu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 modifier_kunsthistorisches: "Kunsthistorisches Museum Wien"
 modifier_naturhistorisches: "Naturhistorisches Museum Wien"
 kaiserforum.3.t: "Proměňující se krajina"
 kaiserforum.3.d: "Výstavba podél Ringstrasse výrazně zlepšila přepravu zboží i lidí v [SCOPE.sState('relevant_state').GetCityHubName]. Význam tohoto projektu rozhodně není zanedbatelný. Mnozí dychtí po tom, aby další fáze rozvoje začala ihned."
 kaiserforum.3.f: "Nyní, když je centrum města propojeno se západními předměstími, doprava plynule proudí srdcem [SCOPE.sState('relevant_state').GetCityHubName]. Nová dlažba mírně tlumí hlučný ruch zesíleného provozu, který tudy prochází.\n\nV obnovených zdech komplexu vyjadřuje [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] architektovi [ROOT.GetCountry.GetRuler.GetHerHis] spokojenost: „Rozvoj $building_kaiserforum_2$ pokračuje velmi pěkně. Nuže povězte mi, co ještě zbývá instalovat?“"
 kaiserforum.3.a: "Pokrok na $building_kaiserforum_2$ je zásluhou píle [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [SCOPE.gsInterestGroup('relevant_ig').GetName]."
 je_kaiserforum_kaisergelb_button_tt: "Posuďte návrh #b $je_kaiserforum_kaisergelb_button$#! pro další fázi rozvoje v [concept_journal_entry] #b $je_kaiserforum$#!"
 modifier_neue_burg: "Neue Burg"
 modifier_influential_improvements: "Vlivná zlepšení"
 kaiserforum.4.t: "Schönbrunnská žluť"
 kaiserforum.4.d: "V této závěrečné fázi rozvoje zbývá poslední otázka: Bude v tomto rozšíření metropole [SCOPE.sState('relevant_state').GetCityHubName] použita charakteristická císařská žluť země [ROOT.GetCountry.GetNameNoFormatting]?"
 kaiserforum.4.f: "Zlatý okr jemných odstínů schönbrunnské žluti vykresluje majestátní vizi.\n\n„Tento trvalý znak rozhodně zanechá dlouhotrvající dojem,“ zvolá jeden malíř při hodnocení barvy.\n\nJiný umělec přihlíží skepticky a namítá: „Ale chceme se držet takových ozvěn minulosti?“"
 kaiserforum.4.a: "To můžeme ponechat minulosti tohoto města."
 kaiserforum.4.b: "Musíme fórum natřít zlatým okrem!"
 kaiserforum_second_stage_tt: "Byla postavena #b druhá fáze#! $building_kaiserforum_2$"
 kaiserforum.5.t: "Budovy nádhery"
 kaiserforum.5.d: "Po mnoha letech rozvoje byla vize fóra plně uskutečněna. Nádhera proměňujícího návrhu je působivá. Výstavba v centru města [SCOPE.sState('relevant_state').GetCityHubName] je nyní dokončena."
 kaiserforum.5.f: "„Umění nemůže být moderní. Umění je od pradávna věčné.“\n\n—Egon Schiele"
 kaiserforum.5.a: "Přínosy našeho úsilí budou dlouhodobé."
 kaiserforum.5.b: "Náš architektonický výkon bude vysoce ceněn."
 kaiserforum_loc_efforts: "Přetvořená Ringstrasse"
 kaiserforum_int_acclaim: "Architektonický počin"
