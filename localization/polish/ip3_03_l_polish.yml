 austria_events.34.t2: "Japonský pavilon"
 austria_events.34.d: "Účast země [SCOPE.sCountry('japan_scope').GetName] na naší Světové výstavě jistě přispěje k úspěchu našeho podniku. Výstavba [SCOPE.sCountry('japan_scope').GetAdjective] pavilonu je nyní v plném proudu."
 austria_events.34.f: "Kupolová střecha hlavního areálu Světové výstavy se třpytí složitou, ručně vyráběnou výzdobou. Na místě se staví svatyně a [SCOPE.sCountry('japan_scope').GetAdjectiveNoFormatting] zahrada. V pavilonu byla také zřízena dřevěná brána torii, svatyně a zakřivený most.\n\nVzorky něčeho, čemu se říká #italic sójová omáčka#!, jsou rozdávány spolu s poutavým [SCOPE.sCountry('japan_scope').GetAdjectiveNoFormatting] uměním a vysoce kvalitními výrobky, které zástupci země [SCOPE.sCountry('japan_scope').GetNameNoFormatting] přivezli pro zařazení do výstavy."
