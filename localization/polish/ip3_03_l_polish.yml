 austria_events.33.d: "[SCOPE.sCountry('austria_scope').GetName] bude pořádat Světovou výstavu v [SCOPE.sState('relevant_state_scope').GetCityHubName]. Poradci podporují účast země [SCOPE.sCountry('japan_scope').GetName] na této velké kulturní a hospodářské výměně za účelem navázání diplomatických vztahů mezi našimi zeměmi."
 austria_events.33.f: "Mluvčí stojící v čele výboru pro kulturní záležitosti s velkým nadšením hovoří o výhodách účasti země [SCOPE.sCountry('japan_scope').GetNameNoFormatting] na [SCOPE.sCountry('austria_scope').GetAdjectiveNoFormatting] výstavě.\n\n„Tyto Světové výstavy byly přínosné pro prestiž a růst jiných národů. Mohlo by to velmi dobře být první z mnoha výstav, kterých se naše vláda oficiálně zúčastní. Jistě z toho bude mít prospěch celé [SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Pomyslete na pokrok naší země.“"
