l_polish:
  japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] Velká zemětřesení" # todo: NEW TRANSLATION
  japan_earthquakes.1.d: "Během čtyř dnů způsobila tři zemětřesení u pobřeží škody na rozsáhlém území a v pobřežních oblastech je svou silou ještě znásobily následné přílivové vlny." # todo: CHANGED
  japan_earthquakes.1.f: "Za velmi krátkou chvíli si celé městečko toho jevu všimlo. Zdá se, že předchozí pohyb země nikdo necítil, ale všichni byli očividně ohromeni pohybem vody. Utíkali na pláž a dokonce za hranici pláže, aby to pozorovali. Takový ústup vody nebyl na tom pobřeží v paměti živých zaznamenán. Objevovaly se věci dosud nevídané; neznámá místa rýhovaného písku a pásy řasami obalených skal zůstala odkrytá i když Hamaguchi zíral. A žádný z lidí dole se nezdál tušit, co ten ohromný ústup znamená.\n\n—Lafcadio Hearn, #italic A Living God #!" # todo: CHANGED
  japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] [SCOPE.sState('japan_earthquake_state').GetCityHubName] Zemětřesení" # todo: NEW TRANSLATION
  japan_earthquakes.2.d: "U pobřeží v [SCOPE.sState('japan_earthquake_state').GetName] udeřilo silné zemětřesení, které způsobilo rozsáhlé škody ve městě [SCOPE.sState('japan_earthquake_state').GetCityHubName] a jeho hradu." # todo: CHANGED
  japan_earthquakes.2.f: "Když se po zemětřesení začaly šířit tisky s velkým sumcem Namazu, zdály se odpovídat tradičním příběhům. Tvor byl zobrazen jako zkrocený bohy, aby nemohl způsobit další zemětřesení.\n\nS postupem času se však vyobrazení proměnila. Jeden tisk ukazoval Namazu, jak rozřízne břicho a z něj tečou mince. Jiný zobrazoval stavitele, jak s ním připíjejí. Do umění se vplížil satirický tón, naznačující, že navzdory katastrofě přinášené tímto tvorem možná zároveň něco napravoval." # todo: CHANGED
  japan_earthquakes.2.a: "Naši vazalové v [SCOPE.sState('japan_earthquake_state').GetCityHubName] potřebují pomoc!" # todo: NEW TRANSLATION
  japan_earthquakes.2.b: "Majetek musí plynout k těm, kdo mohou obnovit." # todo: CHANGED
  earthquake_vassal_support: "Podpora vazalů" # todo: NEW TRANSLATION
  earthquake_rebuilding_focus: "Obnova po zemětřesení" # todo: NEW TRANSLATION
  earthquake_rebuilding_redistribution: "Napravení světa" # todo: CHANGED
  japan_earthquakes.3.t: "Zemětřesení Mino–Owari" # todo: NEW TRANSLATION
  japan_earthquakes.3.d: "Silné zemětřesení zasáhlo samotné srdce [ROOT.GetCountry.GetName], zabilo tisíce lidí a vytvořilo neobvykle rozsáhlé zlomy v zemi." # todo: CHANGED
  japan_earthquakes.3.f: "\"Reakce lidí vždy bývala v tom, že katastrofy vnímají jako zločiny, často se ptají 'kdo' a tím rodit množství příšer a démonů z mytologie, jimž se přisuzuje vznik zemětřesení.\n\nModerní seizmolog musí odmítnout pověry, ale ironicky se někdy ocitne v roli policejního detektiva vyšetřujícího místo činu. Které předměty spadly? Jak spadly? Všechny tyto otázky nakonec sledují nikoli 'kdo', ale 'jak' a 'proč'.\" # todo: CHANGED
  japan_earthquakes.3.a: "Pozvat zahraniční vědce, aby studovali tyto zlomy." # todo: CHANGED
  japan_earthquakes.3.b: "Využít tyto znalosti k zřízení dalších meteorologických observatoří." # todo: CHANGED
  japan_earthquakes.3.c: "Připravit se na možné následné otřesy." # todo: NEW TRANSLATION
  meteorological_observatories: "Meteorologické observatoře" # todo: NEW TRANSLATION
  meteorological_observatories_cost: "$meteorological_observatories$" # todo: NEW TRANSLATION
  earthquake_bracing_for_aftershocks: "Příprava na následné otřesy" # todo: NEW TRANSLATION
  japan_earthquakes.4.t: "Zemětřesení Sanriku" # todo: NEW TRANSLATION
  japan_earthquakes.4.d: "Obrovská přílivová vlna zasáhla [SCOPE.sState('japan_earthquake_state').GetName], vyvolaná zemětřesením u pobřeží Sanriku. Po jejím zničujícím dopadu se navrhuje postavit památníky varující před budoucími tsunami." # todo: CHANGED
  japan_earthquakes.4.f: "\"Stavět památníky mrtvým nestačí. Ani živí nepotřebují taková připomenutí pohromy, která je postihla. Kdo najde zprávu vyrytou do kamene, pozná, že mu jeho předci sdělovali něco, co nesmí být zapomenuto. Jsou to památníky pro ty, kteří se teprve narodí.\" # todo: CHANGED
  japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] potřebuje takové památníky." # todo: CHANGED
  japan_earthquakes.4.b: "Postavme tyto kameny všude tam, kde tsunami udeřila!" # todo: NEW TRANSLATION
  japan_earthquakes.4.c: "Musíme se soustředit na tady a teď." # todo: CHANGED
  tsunami_stones: "Tsunami kameny" # todo: CHANGED
  tsunami_relief_efforts: "Pomoc při tsunami" # todo: CHANGED
  japan_earthquakes.5.t: "Velké zemětřesení v Kantó" # todo: CHANGED
  japan_earthquakes.5.d: "Obrovské zemětřesení, bezprecedentní v žijící paměti, udeřilo poblíž [SCOPE.sState('japan_earthquake_state').GetCityHubName]. Během několika minut katastrofa zničila velkou část města a zabila stovky tisíc lidí." # todo: CHANGED
  japan_earthquakes.5.f: "Kdyby se zdálo, že největší hrozbou je stěna vody, která následovala po otřesech, nic to nebylo v porovnání s požáry. Brzy nebylo zapáleno jen celé město, ale zdálo se, že i země a vítr hoří.\n\nLidé, kterým se podařilo uniknout z hořících budov, byli uvězněni tornádem plamenů, jako by požár hodlal nikoho nenechat naživu. [SCOPE.sState('japan_earthquake_state').GetCityHubName] se stalo vizí pekla." # todo: CHANGED
  japan_earthquakes.5.a: "Japonci musí v této pohromě stát jednotně!" # todo: CHANGED
  japan_earthquakes.5.b: "Tento úder našemu majetku je varováním před dekadencí." # todo: CHANGED
  japan_earthquakes.5.c: "Musíme tuto příležitost využít k obnově modernějšího [SCOPE.sState('japan_earthquake_state').GetCityHubName]." # todo: CHANGED
  earthquake_national_tragedy: "Národní tragédie" # todo: NEW TRANSLATION
  earthquake_divine_punishment: "Boží trest" # todo: CHANGED
  earthquake_modernization: "Modernizovaná obnova" # todo: CHANGED
  earthquake_modernization_land_confiscation: "Přerozdělení půdy" # todo: NEW TRANSLATION
  shinbutsu_bunri_decision: "$je_shinbutsu_bunri$" # todo: NEW TRANSLATION
  shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$" # todo: NEW TRANSLATION
  elevate_buddhism_decision: "$je_elevate_buddhism$" # todo: NEW TRANSLATION
  elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$" # todo: NEW TRANSLATION
  je_shinbutsu_bunri: "Shinbutsu Bunri" # todo: NEW TRANSLATION
  je_shinbutsu_bunri_reason: "S obnovením moci císaře musíme rozlišit a povýšit domácí náboženské tradice, které považují císařskou linii za posvátnou. Abychom toho dosáhli, musí být odděleny od cizího vlivu buddhismu, který byl po stovky let nerozlučně spojen s uctíváním kami skrze synkretické tradice. Využitím nespokojenosti s buddhistickými institucemi kvůli jejich vazbám na šógunát můžeme udělat místo pro šintoismus jako vyšší řídicí princip." # todo: CHANGED
  je_taikyo_proclamation_button: "Taikyō Proclamation" # todo: NEW TRANSLATION
  je_taikyo_proclamation_button_desc: "Učinit šintoismus, uctívání kami a úctu k císaři principem státu" # todo: CHANGED
  je_elevate_buddhism: "Povýšit buddhismus" # todo: CHANGED
  je_elevate_buddhism_reason: "Buddhistické náboženské instituce v $JAP$ mají silné historické vazby na administrativní aparát šógunátu. Když jsme jednou odvrátili konec šógunátu, posílení těchto institucí by nám mohlo pomoci udržet jeho moc a posílit náboženské tradice v $JAP$, které se nesoustředí na uctívání císaře." # todo: CHANGED
  je_elevate_buddhism_goal: "$je_communism_2_goal$" # todo: NEW TRANSLATION
  arahitogami: "Arahitogami" # todo: NEW TRANSLATION
  extended_danka_system: "Rozšířený systém Danka" # todo: CHANGED
  japan_religion.1.t: "Jingū-ji" # todo: NEW TRANSLATION
  japan_religion.1.d: "V chrámových svatyních je běžné, že buddhističtí mniši provádějí rituály společně se šintoistickými praktikami. S oddělením buddhismu od šintoismu je role těchto mnichů zpochybňována." # todo: CHANGED
  japan_religion.1.f: "\"Jaký je účel těchto rituálů? Vést kami k osvícení? Zlepšit jejich karmu? Narážka je zřetelně taková, že místo toho, aby byli hodni uctívání, jsou to ztracené bytosti, které potřebují vedení. Takovým narážkám už nebudeme přihlížet!\" # todo: CHANGED
  japan_religion.1.a: "Požadovat, aby se mniši konvertovali a stali se šintoistickými kněžími." # todo: CHANGED
  japan_religion.1.b: "Odebrat mnichům jejich tituly." # todo: CHANGED
  japan_religion.1.c: "Nechat mnichy vykonávat jejich povinnosti." # todo: CHANGED
  forced_monk_conversions: "Nucené konverze mnichů" # todo: NEW TRANSLATION
  monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$" # todo: NEW TRANSLATION
  monks_stripped_of_titles: "Mnichy zbavené titulů" # todo: CHANGED
  monks_left_to_duties: "Mnichy ponecháni u povinností" # todo: CHANGED
  japan_religion.2.t: "Honji Suijaku" # todo: NEW TRANSLATION
  japan_religion.2.d: "Je ustálená představa, že se Buddhové v Japonsku zjevili jako kami, což se odráží v termínech jako gongen, které je považují za dvě části téže entity. Taková terminologie posiluje vliv buddhismu." # todo: CHANGED
  japan_religion.2.f: "\"Dříve to možná dávalo smysl. Amaterasu je slunce. Dainichi Nyorai, Vairocana, je slunce. Slunce se však nedělí, ani není odrazem či projevem světla někoho jiného. Září samo a vlastní mocí. A dnes má [ROOT.GetCountry.GetNameNoFormatting] místo pouze pro jedno slunce.\" # todo: CHANGED
  japan_religion.2.a: "Zakázat pojem gongen." # todo: NEW TRANSLATION
  japan_religion.2.b: "Zakázat označování Hachimana za bódhisattvu." # todo: NEW TRANSLATION
  japan_religion.2.c: "Zdržet se regulace terminologie." # todo: NEW TRANSLATION
  banned_syncretic_terminology: "Zakázaná synkretická terminologie" # todo: NEW TRANSLATION
  retained_syncretic_terminology: "Zachovaná synkretická terminologie" # todo: CHANGED
  japan_religion.3.t: "Zvony bijí pro tebe" # todo: NEW TRANSLATION
  japan_religion.3.d: "Pokus vystrnadit vliv buddhismu vyvolal obecné protibuddhistické nálady. Chrámový majetek je zabavován a poškozován, některé objekty jsou přímo zničeny, jiné jsou zbaveny buddhistické ikonografie." # todo: CHANGED
  japan_religion.3.f: "Když se blížil ke svatyni, zastavil se. Dva Niō, mocné sochy, které hlídaly vchod, byly odstraněny. Na jejich místě nebylo nic.\n\nKdyž prošel dovnitř, nemohl se zbavit pocitu, že navzdory své čistotě už svatyně není tak bezpečná jako dřív. Nehlídaná brána." # todo: CHANGED
  japan_religion.3.a: "Roztavit chrámové zvony na děla!" # todo: NEW TRANSLATION
  japan_religion.3.b: "Zničit nebo odstranit sochy Buddhy z chrámů." # todo: NEW TRANSLATION
  japan_religion.3.c: "Nechat chrámy nedotčené." # todo: NEW TRANSLATION
  smelted_temple_bells: "Roztavené chrámové zvony" # todo: NEW TRANSLATION
  smelted_temple_bells_opinion: "$smelted_temple_bells$" # todo: NEW TRANSLATION
  removed_buddha_statues: "Odstraněné sochy Buddhy" # todo: NEW TRANSLATION
  removed_buddha_statues_opinion: "$removed_buddha_statues$" # todo: NEW TRANSLATION
  retained_buddhist_iconography: "Zachovaná buddhistická ikonografie" # todo: CHANGED
  japan_religion.4.t: "Úřad pro záležitosti šintoismu" # todo: CHANGED
  japan_religion.4.d: "Snahy standardizovat šintoistické praktiky a zajistit, aby státní kami byly součástí místních rituálů, narazily na odpor místních mnichů a kněží svatyní, kteří považují tyto nauky za porušení tradice." # todo: CHANGED
  japan_religion.4.f: "\"Šintoismus není jen o pokračování existujících rituálů a praktik, jak mohou existovat ve svatyních po celé zemi, zmatených a kontaminovaných vnějšími vlivy. Tradice císařského rodu, potomků nebe, musí být vyučovány napříč [ROOT.GetCountry.GetNameNoFormatting], aby se šintoismus vrátil ke své čisté podobě.\" # todo: CHANGED
  japan_religion.4.a: "Prosazovat státní výklady." # todo: CHANGED
  japan_religion.4.b: "Místní kněží nejlépe znají, co vyhovuje místním rituálům." # todo: CHANGED
  standardized_priest_training: "Standardizované školení kněží" # todo: CHANGED
  standardized_priest_training_opinion: "$standardized_priest_training$" # todo: NEW TRANSLATION
  deferred_to_local_priests: "Ponecháno na místních kněžích" # todo: CHANGED
  deferred_to_local_priests_opinion: "$deferred_to_local_priests$" # todo: NEW TRANSLATION
  japan_religion.5.t: "Konfucianismus a šintoismus" # todo: CHANGED
  japan_religion.5.d: "V procesu oddělování buddhismu a šintoismu byla zpochybňována role konfucianismu. Mnozí učenci považují tuto filozofii za vysoce kompatibilní se šintoismem, zatímco jiní ji zavrhují jako další cizí vliv." # todo: CHANGED
  japan_religion.5.f: "\"Konfucianismus možná přišel podobnými cestami jako buddhismus, ale mezi touto filosofií a uctíváním kami není rozpor. Naopak, obě se vzájemně posilují, zahrnují stejné principy nebe a země, vládce a poddaného.\" # todo: CHANGED
  japan_religion.5.a: "Konfucianismus je důležitým doplňkem šintoismu." # todo: CHANGED
  japan_religion.5.b: "Musíme obnovit šintoismus do jeho starodávných tradic." # todo: CHANGED
  fukko_shinto: "Fukko Shintō" # todo: NEW TRANSLATION
  japan_religion.6.t: "Křesťanství v otevřené zemi" # todo: NEW TRANSLATION
  japan_religion.6.d: "Ačkoli se [ROOT.GetCountry.GetName] otevřelo cizincům, náboženství zůstává regulováno. Křesťanské země mohou považovat volný dovoz své víry za stejně důležitý jako dovoz svého zboží." # todo: CHANGED
  japan_religion.6.f: "\"Křesťanství nejvíce miluje své následovníky v smrti, v smrti pro víru nade vše. Každý misionář položený na kříž nebo do ohně se stává další kapitolou příběhu, který začal mužem na kříži. Možná je čas přestat jim dávat mučedníky?\" # todo: CHANGED
  japan_religion.6.a: "Misionářům musí být dovoleno hlásat svou víru." # todo: CHANGED
  japan_religion.6.b: "Může být praktikováno, ale nemělo by se šířit." # todo: NEW TRANSLATION
  japan_religion.6.c: "Křesťanství bylo a zůstává cizím nebezpečím." # todo: CHANGED
  permitted_christianity: "Povolené křesťanství" # todo: NEW TRANSLATION
  christianity_disallowed: "Křesťanství zakázáno" # todo: NEW TRANSLATION
  japan_religion.7.t: "Školy myšlení" # todo: NEW TRANSLATION
  japan_religion.7.d: "[ROOT.GetCountry.GetName] má dlouhou tradici různých škol buddhismu, z nichž mnohé dodnes vykazují vliv. S rostoucí politickou silou [SCOPE.gsInterestGroup('devout_ig').GetName] vyniká jedna škola." # todo: CHANGED
  japan_religion.7.f: "\"Nové školy buddhismu vznikaly v průběhu staletí v [ROOT.GetCountry.GetNameNoFormatting]. Není důvod se domnívat, že by jedna z nich umlčela ostatní. Současný okamžik však vyžaduje vedení a politický směr a je pravděpodobné, že některé tuto šanci uchopí více než jiné.\" # todo: CHANGED
  japan_religion.7.a: "Škola čisté země." # todo: NEW TRANSLATION
  japan_religion.7.b: "Škola Zen." # todo: CHANGED
  japan_religion.7.c: "Škola Nichiren." # todo: NEW TRANSLATION
  japan_religion.7.e: "Škola Shingon." # todo: CHANGED
  pure_land_buddhism: "Škola čisté země" # todo: NEW TRANSLATION
  zen_buddhism: "Zen" # todo: CHANGED
  shingon_buddhism: "Škola Shingon" # todo: CHANGED
  japan_religion.8.t: "Slova Buddhy" # todo: NEW TRANSLATION
  japan_religion.8.d: "S tím, jak se [ROOT.GetCountry.GetName] otevírá světu, buddhističtí učenci projevili zájem překládat více cizích textů, aby do moderního buddhismu začlenili jejich myšlenky." # todo: CHANGED
  japan_religion.8.f: "\"Neměli bychom nechat ortodoxie vyvinuté izolací nás brzdit, ani bychom se neměli bát najít pravdu na nečekaných místech. Učení Buddhy k nám došlo dlouhou cestou. Studovat, kudy prošla, stejně jako kam by mohla směřovat, může přinést jen další vhled.\" # todo: CHANGED
  japan_religion.8.a: "Texty v sanskrtu a páli, kořeny buddhismu." # todo: CHANGED
  japan_religion.8.b: "Čínské texty, nejblíže našim školám myšlení." # todo: CHANGED
  japan_religion.8.c: "Díla evropské filozofie pro komparativní studium." # todo: NEW TRANSLATION
  japan_religion.9.t: "Váleční mniši" # todo: NEW TRANSLATION
  japan_religion.9.d: "Probíhající válečné úsilí vyvolalo u [SCOPE.gsInterestGroup('devout_ig').GetName] debaty o roli buddhismu v podpoře země během ozbrojeného konfliktu." # todo: CHANGED
  japan_religion.9.f: "\"Staří mniši neváhali bránit své chrámy. Měli bychom váhat bránit naši zemi? Život by se neměl brát lehkomyslně, ale šel by [ROOT.GetCountry.GetAdjective] stát do války, která by nevedla k delšímu míru, která by nezachránila více životů, než kolik jich vezme?\" # todo: CHANGED
  japan_religion.9.a: "Síla je nezbytná k nastolení trvalého míru." # todo: NEW TRANSLATION
  japan_religion.9.b: "Nenásilí nade vše." # todo: NEW TRANSLATION
  war_buddhism: "Buddhismus ve válce" # todo: NEW TRANSLATION
  peaceful_buddhism: "Pokojný buddhismus" # todo: CHANGED
  japan_religion.10.t: "Yōshoku" # todo: NEW TRANSLATION
  japan_religion.10.d: "Od konce sakoku se v přístavních městech stále častěji objevují restaurace zaměřené na maso, aby vyhověly cizincům. To zpochybňuje trvající zákaz pojídání masa v [ROOT.GetCountry.GetName]." # todo: CHANGED
  japan_religion.10.f: "\"Promiňte, ale hovězí je rozhodně nesmírně chutné, že? Jakmile si zvyknete na jeho chuť, už se nevrátíte k jelenovi nebo divokému praseti. Zajímá mě, proč jsme v Japonsku dříve tak čistou věc nejedli?\"\n\n—Kanagaki Robun, #italic The Beefeater #!" # todo: CHANGED
  japan_religion.10.a: "Musíme tento zákaz zrušit, pro výživu a rozšíření kulinářství!" # todo: CHANGED
  japan_religion.10.b: "Nenecháme, aby se tento barbarský zvyk ujal!" # todo: CHANGED
  maintained_meat_ban: "Zachovaný zákaz masa" # todo: CHANGED
  maintained_meat_ban_opinion: "$maintained_meat_ban$" # todo: NEW TRANSLATION
