l_polish:
 japan_earthquakes.1.t: "Velká zemětřesení éry [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.1.d: "Během čtyř dnů způsobila tři zemětřesení u pobřeží škody v rozsáhlé oblasti a následné přílivové vlny jejich dopad v pobřežních oblastech ještě zhoršily."
 japan_earthquakes.1.f: "Během velmi krátké chvíle si tohoto jevu všimla celá vesnice. Zdálo se, že předchozí pohyb země nikdo nepocítil, ale pohyb vody všechny zjevně ohromil. Běželi na pláž, a dokonce až za ni, aby ho sledovali. Takový odliv na tomto pobřeží nepamatoval nikdo z žijících lidí. Objevovaly se věci dosud neviděné; neznámé plochy rýhovaného písku a pásy skal porostlých chaluhami zůstávaly obnažené právě ve chvíli, kdy na ně Hamaguči hleděl. A nikdo z lidí dole zřejmě netušil, co ten obludný odliv znamená.\n\n—Lafcadio Hearn, #italic Živoucí bůh #!"
 japan_earthquakes.2.t: "Zemětřesení v [SCOPE.sState('japan_earthquake_state').GetCityHubName] éry [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.2.d: "Poblíž pobřeží v [SCOPE.sState('japan_earthquake_state').GetName] udeřilo velké zemětřesení, které způsobilo rozsáhlé škody v [SCOPE.sState('japan_earthquake_state').GetCityHubName] a na jeho hradu."
 japan_earthquakes.2.f: "Když po zemětřesení začaly získávat oblibu tisky velkého sumce Namazu, zdály se být v souladu s tradičními příběhy. Tvor byl zobrazován, jak jej bohové podrobují, aby mu zabránili způsobit další zemětřesení.\n\nPostupem času se však jeho vyobrazení proměňovala. Jeden tisk ukazoval Namazua, jak si rozřezává břicho a krvácí mince. Jiný jej ukazoval, jak sdílí nápoje se staviteli. Do umění pronikl satirický tón naznačující, že navzdory pohromě, kterou tato bestie přinesla, možná také něco napravovala."
 japan_earthquakes.2.a: "Naši vazalové v [SCOPE.sState('japan_earthquake_state').GetCityHubName] potřebují pomoc!"
 japan_earthquakes.2.b: "Bohatství musí proudit k těm, kdo dokážou znovu stavět."
 earthquake_vassal_support: "Podpora vazalů"
 earthquake_rebuilding_focus: "Obnova po zemětřesení"
 earthquake_rebuilding_redistribution: "Náprava světa"
 japan_earthquakes.3.t: "Zemětřesení Mino-Owari"
 japan_earthquakes.3.d: "V srdci [ROOT.GetCountry.GetAltAdjective('G')] udeřilo velké zemětřesení, které zabilo tisíce lidí a vytvořilo v zemi neobvykle rozsáhlé zlomové trhliny."
 japan_earthquakes.3.f: "„Reakcí lidských bytostí vždy bylo vnímat katastrofy jako zločiny, často se ptát ‚kdo‘, a tím dávat vzniknout zástupům příšer a démonů z mytologie, o nichž se říká, že stojí za zemětřesením.\n\nModerní seismolog musí pověru odmítnout, ale ironicky se někdy ocitá v roli policejního detektiva vyšetřujícího místo činu. Které předměty spadly? Jak spadly? Všechny tyto otázky nakonec nesměřují k ‚kdo‘, ale k ‚jak‘ a ‚proč‘.“"
 japan_earthquakes.3.a: "Pozvěte cizí učence, aby tyto zlomy studovali."
 japan_earthquakes.3.b: "Využijte tyto poznatky ke zřízení dalších meteorologických observatoří."
 japan_earthquakes.3.c: "Připravte se na možné následné otřesy."
 meteorological_observatories: "Meteorologické observatoře"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Příprava na následné otřesy"
 japan_earthquakes.4.t: "Zemětřesení Sanriku"
 japan_earthquakes.4.d: "[SCOPE.sState('japan_earthquake_state').GetName] zasáhla velká přílivová vlna vyvolaná zemětřesením u pobřeží Sanriku. Po jejím ničivém dopadu byly navrženy památníky varující před budoucími tsunami."
 japan_earthquakes.4.f: "„Stavět památníky mrtvým nestačí. Ani živí nepotřebují takové připomínky pohromy, která na ně dolehla. Každý, kdo najde poselství v kameni, pozná, že k němu jeho předkové promlouvají o něčem, co nesmí být zapomenuto. Jsou to památníky těm, kdo se teprve narodí.“"
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] takové památníky potřebuje."
 japan_earthquakes.4.b: "Vztyčte tyto kameny všude, kam tsunami udeřila!"
 japan_earthquakes.4.c: "Musíme soustředit své úsilí na tady a teď."
 tsunami_stones: "Kameny tsunami"
 tsunami_relief_efforts: "Pomoc po tsunami"
 japan_earthquakes.5.t: "Velké zemětřesení v Kantó"
 japan_earthquakes.5.d: "Nedaleko města [SCOPE.sState('japan_earthquake_state').GetCityHubName] udeřilo mohutné zemětřesení, jaké živá paměť nepamatuje. Během několika minut katastrofa srovnala se zemí velkou část města a zabila stovky tisíc lidí."
 japan_earthquakes.5.f: "Pokud se vodní stěna, která následovala po otřesech, zdála být největší hrozbou, nebyla ničím ve srovnání s požáry. Brzy nejenže hořelo celé město, ale zdálo se, že v plamenech je i samotná země a vítr.\n\nLidé, kterým se podařilo uniknout z hořících budov, byli uvězněni ohnivým tornádem, jako by se požár rozhodl nenechat nikoho naživu. [SCOPE.sState('japan_earthquake_state').GetCityHubName] se proměnilo ve výjev pekla."
 japan_earthquakes.5.a: "Japonský lid musí proti takové zkáze stát jednotně!"
 japan_earthquakes.5.b: "Tato rána našemu hmotnému bohatství je varováním před dekadencí."
 japan_earthquakes.5.c: "Musíme využít tuto příležitost k obnově modernějšího [SCOPE.sState('japan_earthquake_state').GetCityHubName]."
 earthquake_national_tragedy: "Národní tragédie"
 earthquake_divine_punishment: "Boží trest"
 earthquake_modernization: "Modernizovaná obnova"
 earthquake_modernization_land_confiscation: "Pozemkové úpravy"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Šinbucu bunri"
 je_shinbutsu_bunri_reason: "S obnovením moci císaře musíme odlišit a povznést domácí náboženské tradice, které považují císařskou linii za posvátnou. Abychom toho dosáhli, musí být odděleny od cizího vlivu buddhismu, který byl po stovky let prostřednictvím synkretických tradic neoddělitelně spjat s uctíváním kami. Využitím nespokojenosti s buddhistickými institucemi kvůli jejich vazbám na šógunát můžeme otevřít cestu šintó jako vyššímu vůdčímu principu."
 je_taikyo_proclamation_button: "Proklamace Taikjó"
 je_taikyo_proclamation_button_desc: "Učinit šintó, uctívání kami a úctu k císaři, principem státu"
 je_elevate_buddhism: "Povznést buddhismus"
 je_elevate_buddhism_reason: "Buddhistické náboženské instituce v $JAP$ mají silné historické vazby na správní rameno šógunátu. Když jsme jednou odvrátili konec šógunátu, posílení těchto institucí by nám mohlo pomoci udržet jeho moc a posílit náboženské tradice $JAP$, které se nesoustředí na uctívání císaře."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Rozšířený systém danka"
 japan_religion.1.t: "Džingúdži"
 japan_religion.1.d: "Ve svatyňových chrámech je běžné, že buddhističtí mniši provádějí rituály vedle šintoistických praktik. S oddělením buddhismu od šintó je role těchto mnichů zpochybňována."
 japan_religion.1.f: "„Jaký je účel těchto rituálů? Vést kami k osvícení? Zlepšit jejich karmu? Důsledek je jasný: místo aby byli hodni uctívání, jsou to zbloudilé bytosti potřebující vedení. Takové náznaky už nebudeme trpět!“"
 japan_religion.1.a: "Požadujte, aby mniši konvertovali a stali se šintoistickými kněžími."
 japan_religion.1.b: "Zbavte mnichy jejich titulů."
 japan_religion.1.c: "Ponechte mnichy jejich povinnostem."
 forced_monk_conversions: "Donucení mniši ke konverzi"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Mniši zbavení titulů"
 monks_left_to_duties: "Mniši ponecháni svým povinnostem"
 japan_religion.2.t: "Hondži suidžaku"
 japan_religion.2.d: "Je dobře zavedenou představou, že buddhové se v Japonsku zjevili jako kami, což se odráží v terminologii, jako je gongen, která je pokládá za dvě části téže bytosti. Taková terminologie posiluje vliv buddhismu."
 japan_religion.2.f: "„Kdysi to muselo dávat smysl. Amaterasu je slunce. Dainiči Nyorai, Vairóčana, je slunce. Slunce však není rozdělené, ani není odrazem či projevem světla někoho jiného. Září sama a vlastní silou. A dnes má [ROOT.GetCountry.GetNameNoFormatting] místo jen pro jedno slunce.“"
 japan_religion.2.a: "Zakažte pojem gongen."
 japan_religion.2.b: "Zakažte označovat Hačimana za bódhisattvu."
 japan_religion.2.c: "Zdržte se regulace terminologie."
 banned_syncretic_terminology: "Zakázaná synkretická terminologie"
 retained_syncretic_terminology: "Zachovaná synkretická terminologie"
 japan_religion.3.t: "Komu zvoní hrana"
 japan_religion.3.d: "Pokus vytlačit vliv buddhismu zmobilizoval obecné protibuddhistické nálady. Chrámový majetek je zabavován a poškozován, některé chrámy jsou přímo ničeny, zatímco jiné jsou zbavovány buddhistické ikonografie."
 japan_religion.3.f: "Když se přiblížil ke svatyni, zarazil se. Dva Nió, mocné Buddhovy sochy, které stály na stráži před vchodem, byly odstraněny. Na jejich místě nebylo nic.\n\nKdyž vešel dovnitř, nemohl se zbavit pocitu, že přes veškerou svou čistotu už svatyně není tak bezpečná jako kdysi. Nestřežená brána."
 japan_religion.3.a: "Přetavte chrámové zvony na děla!"
 japan_religion.3.b: "Zničte nebo odstraňte Buddhovy sochy z chrámů."
 japan_religion.3.c: "Nechte chrámy nedotčené."
 smelted_temple_bells: "Přetavené chrámové zvony"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Odstraněné Buddhovy sochy"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Zachovaná buddhistická ikonografie"
 japan_religion.4.t: "Úřad pro šintoistické záležitosti"
 japan_religion.4.d: "Snahy standardizovat šintoistické praktiky a zajistit, aby státní kami byli součástí místních rituálů, narazily na odpor místních mnichů a svatyňových kněží, kteří tato učení považují za odklon od tradice."
 japan_religion.4.f: "„Šintó není pouhým pokračováním existujících rituálů a praktik, jak mohou existovat ve svatyních po celé zemi, zmatených a znečištěných vnějšími vlivy. Tradice císařského domu, potomků nebes, musí být vyučovány po celém [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')], aby se šintó vrátilo do své čisté podoby.“"
 japan_religion.4.a: "Prosazujte státní výklady."
 japan_religion.4.b: "Místní kněží nejlépe vědí, co se hodí k místním rituálům."
 standardized_priest_training: "Standardizovaný výcvik kněží"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Ponecháno místním kněžím"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Konfucianismus a šintó"
 japan_religion.5.d: "V procesu oddělování buddhismu a šintó byla zpochybněna role konfucianismu. Mnozí učenci považují tuto filozofii za vysoce slučitelnou se šintó, zatímco jiní ji odmítají jako další cizí vliv."
 japan_religion.5.f: "„Konfucianismus možná přišel podobnými cestami jako buddhismus, ale mezi touto filozofií a uctíváním kami není žádný rozpor. Naopak, oba se navzájem posilují a zahrnují stejné principy nebe a země, vládce a poddaného.“"
 japan_religion.5.a: "Konfucianismus je důležitým doplňkem šintó."
 japan_religion.5.b: "Musíme obnovit šintó v jeho starobylých tradicích."
 fukko_shinto: "Fukko šintó"
 japan_religion.6.t: "Křesťanství v otevřené zemi"
 japan_religion.6.d: "Ačkoli se [ROOT.GetCountry.GetName] otevírá cizincům, náboženství zůstává regulováno. Křesťanské země mohou svobodný dovoz své víry považovat za stejně důležitý jako dovoz svého zboží."
 japan_religion.6.f: "„Křesťanství nejvíce miluje své následovníky ve smrti, ve smrti především pro víru. Každý misionář přibitý na kříž či vydaný ohni se stává další kapitolou příběhu, který začal mužem na kříži. Možná je čas přestat jim dávat mučedníky?“"
 japan_religion.6.a: "Misionářům musí být dovoleno hlásat svou víru."
 japan_religion.6.b: "Smí být praktikováno, ale nemělo by se šířit."
 japan_religion.6.c: "Křesťanství bylo a zůstává cizí hrozbou."
 permitted_christianity: "Povolené křesťanství"
 christianity_disallowed: "Křesťanství zakázáno"
 japan_religion.7.t: "Linie myšlení"
 japan_religion.7.d: "[ROOT.GetCountry.GetName] má dlouhou tradici různých škol buddhismu, z nichž mnohé mají vliv dodnes. S rostoucí politickou mocí [SCOPE.gsInterestGroup('devout_ig').GetName] jedna škola vystupuje do popředí."
 japan_religion.7.f: "„V [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')] po staletí vznikaly nové školy buddhismu. Není důvod si myslet, že by jedna z nich vytlačila ostatní. Současný okamžik však vyžaduje vedení a politické směřování a je pravděpodobné, že někteří se jej chopí více než jiní.“"
 japan_religion.7.a: "Škola Čisté země."
 japan_religion.7.b: "Škola zenu."
 japan_religion.7.c: "Škola Ničiren."
 japan_religion.7.e: "Škola Šingon."
 pure_land_buddhism: "Škola Čisté země"
 zen_buddhism: "Škola zenu"
 shingon_buddhism: "Škola Šingon"
 japan_religion.8.t: "Buddhova slova"
 japan_religion.8.d: "S otevřením [ROOT.GetCountry.GetAltAdjective('G')] světu projevili buddhističtí učenci zájem o překlad dalších cizích textů, aby jejich myšlenky začlenili do moderního buddhismu."
 japan_religion.8.f: "„Neměli bychom se nechat brzdit ortodoxiemi vzniklými v izolaci, ani bychom se neměli bát nalézt pravdu na nečekaných místech. Buddhovo učení k nám urazilo dlouhou cestu. Studium míst, kudy prošlo, i míst, kam by mohlo směřovat, nám může přinést jen hlubší vhled.“"
 japan_religion.8.a: "Sanskritské a pálijské texty, kořeny buddhismu."
 japan_religion.8.b: "Čínské texty, nejbližší našim vlastním myšlenkovým školám."
 japan_religion.8.c: "Díla evropské filozofie pro srovnávací studium."
 japan_religion.9.t: "Váleční mniši"
 japan_religion.9.d: "Probíhající válečné úsilí vedlo mezi [SCOPE.gsInterestGroup('devout_ig').GetName] k debatám o roli buddhismu při podpoře země během násilného konfliktu."
 japan_religion.9.f: "„Mniši dávných časů neváhali bránit své chrámy. Měli bychom váhat s obranou svého národa? Život by neměl být brán na lehkou váhu, ale vedl by [ROOT.GetCountry.GetAdjective|l] stát válku, která by nevedla k delšímu míru, která by nezachránila více životů, než kolik jich vezme?“"
 japan_religion.9.a: "Síla je nezbytná k nastolení trvalého míru."
 japan_religion.9.b: "Nenásilí nade vše."
 war_buddhism: "Buddhismus ve válce"
 peaceful_buddhism: "Mírumilovný buddhismus"
 japan_religion.10.t: "Jóšoku"
 japan_religion.10.d: "Od konce sakoku se v přístavních městech staly stále běžnějšími restaurace zaměřené na maso, aby obsloužily cizince. To zpochybnilo trvající zákaz pojídání masa v [ROOT.GetCountry.GetAltAdjective('L')]."
 japan_religion.10.f: "„Promiňte, ale hovězí je rozhodně velmi lahodná věc, není-liž pravda? Jakmile si zvyknete na jeho chuť, už se nikdy nemůžete vrátit k jelenovi nebo divokému kanci. Divím se, proč jsme v Japonsku tak čistou věc nejedli už dříve?“\n\n—Kanagaki Robun, #italic Pojídač hovězího #!"
 japan_religion.10.a: "Musíme tento zákaz zrušit kvůli výživě a kulinářskému rozvoji!"
 japan_religion.10.b: "Nedovolíme, aby se tato barbarská praktika uchytila!"
 maintained_meat_ban: "Zachovaný zákaz masa"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"


