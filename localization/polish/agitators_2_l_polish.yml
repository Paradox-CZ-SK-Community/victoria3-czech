 land_ownership_law_events.1.t: "Zákon o přidělování půdy v [SCOPE.sState('homesteading_act_state_scope').GetNameNoFormatting]"
 land_ownership_law_events.1.d: "S tvrzením, že nejlepší půda [SCOPE.sState('homesteading_act_state_scope').GetName] by měla připadnout ctnostným drobným rolníkům, jako jsou oni sami, zaznamenává návrh zákona [SCOPE.sLaw('current_law_scope').GetName] prudký nárůst popularity mezi členy [SCOPE.gsInterestGroup('rural_folks_scope').GetName], kteří vidí příležitost na hranici osídlení—k velké nelibosti [SCOPE.gsInterestGroup('landowners_scope').GetName], jež v současnosti dominují zemědělskému sektoru."
 land_ownership_law_events.1.f: "Debaty zuřily celé dny v soudní síni. Obvinění létala stejně rychle jako prohlášení o tomto dědičném právu či onom přirozeném nároku. Krádež, squatting a nelegální držba byly zbraněmi volby. Práva krve, rodinná jména a obskurní vyhlášky, které ve výsledku znamenaly, že rozhoduje ten, kdo byl první, byly jejich štíty."
 land_ownership_law_events.1.a: "Získejte si hlasováním vlastní farmu v [SCOPE.sState('homesteading_act_state_scope').GetName]!"
 land_ownership_law_events.1.b: "Nejprve je třeba získat zákonodárce, až poté hranici."
 land_ownership_law_events.1.c: "Ujistěte [SCOPE.gsInterestGroup('landowners_scope').GetName], že peníze jsou stále rozhodující."
