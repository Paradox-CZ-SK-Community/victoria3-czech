 hispaniola_events.1.t: "Dekolonizace pokladny"
 hispaniola_events.1.d: "Poslední frank dlužný [SCOPE.sCountry('france_scope').GetAltAdjective('D')] za naši emancipaci byl splacen. Ulice zachvátilo veselí."
 hispaniola_events.1.f: "#bold Do posledního centimu!#!\nFinanční okovy, které nás poutaly k našim bývalým koloniálním pánům, byly konečně zlomeny, když byla dnes odpoledne s velkou slávou uložena poslední splátka našim [SCOPE.sCountry('france_scope').GetAdjectiveNoFormatting] věřitelům u #italic Caisse des dépôts et consignations#!, čímž skončily desítky let finančního ponížení."
 hispaniola_events.1.a: "Za předky, za vlast."
 hispaniola_events.1.b: "Buďme jedinými pány této půdy."
 pearl_of_the_antilles_modifier: "Znovuzrozená perla Antil"
 the_country_of_our_ancestors_modifier: "Země našich předků"
 hispaniola_events.2.t: "Zázrak Svatého Dominga"
 hispaniola_events.2.d: "[SCOPE.sCountry('haiti_scope').GetName] splatilo své odškodnění i dluhy v plné výši. Podle podmínek dohody je nyní zbaveno všech závazků."
 hispaniola_events.2.f: "Když bylo roku 1825 uvaleno [SCOPE.sCountry('haiti_scope').GetAdjectiveNoFormatting] odškodnění, jen málokterý Francouz věřil, že bude někdy plně splaceno. Přesto se Haiti navzdory všem překážkám podařilo dosáhnout tohoto cíle, když dnes odpoledne provedlo poslední platbu u #italic Caisse des dépôts et consignations#! v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 hispaniola_events.2.a: "Vydejte oficiální gratulaci haitské vládě."
 end_of_haitian_payments_modifier: "Haitská finanční nezávislost"
 hispaniola_events.3.t: "Haiti žádá o přehodnocení odškodnění"
 hispaniola_events.3.d: "[SCOPE.sCountry('haiti_scope').GetName] sužované obrovským odškodněním, které nám dluží výměnou za svou svobodu, žádá o přehodnocení podmínek."
 hispaniola_events.3.f: "„Jako pokorný služebník Národního shromáždění [SCOPE.sCountry('haiti_scope').GetNameNoFormatting] a státní pokladny této země vás musím informovat, že odškodnění, k němuž jsme zavázáni, je nad naše možnosti. Prostředky, které nás měly zbavit železných okovů, se proměnily jen v pouta papírová. Jistě chápete, jaké to je mít křídla rozdrcená dluhem. Prosím vás, jako [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetNameNoFormatting], ulehčete utrpení našeho lidu.“"
 hispaniola_events.3.a: "Schváleno. Vliv je také formou měny."
 hispaniola_events.3.b: "Zamítnuto. Haiťané zaplatí, co dluží."
 hispaniola_events.4.t: "Francie souhlasí se snížením odškodnění"
 hispaniola_events.4.d: "Naše jednání s [SCOPE.sCountry('france_scope').GetName] přinesla ovoce. V oficiálním komuniké podepsaném [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle]em [SCOPE.sCountry('france_scope').GetRuler.GetFullName] bylo odpuštěno čtvrtina dlužného odškodnění, i když s určitými diplomatickými podmínkami."
 hispaniola_events.4.f: "Váš dopis jsem obdržel v dobré víře a musím říci, že mě zarmoutil. Byli jsme ujištěni, že váš ostrovní stát je schopen uhradit naše ztráty. Ujišťuji vás však, že jsem se tím osobně zabýval já, [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('france_scope').GetRuler.GetFullNameNoFormatting]. Parlament dospěl k nové dohodě pro váš lid."
 hispaniola_events.4.a: "#italic Trè byen, gras a Dye!#!"
 hispaniola_events.5.t: "Francie odmítá snížení odškodnění"
 hispaniola_events.5.d: "V dalším projevu koloniální arogance [SCOPE.sCountry('france_scope').GetName] odmítla jakékoli návrhy na snížení odškodnění—[SCOPE.sCountry('france_scope').GetAdjectiveNoFormatting] zástupce místo toho spustil tirádu o finančních závazcích a hrůzách Svatého Dominga."
 hispaniola_events.5.f: "„Co teď řekneme lidu? Že je vysáváme stejně jako Francouzi?“\n\n„Ne... to nemůžeme. Už si vytrpěli dost.“\n\n„Nemůžeme přestat splácet, jinak pozveme Francouze zpět. A kdokoli jiný, koho bychom prosili, nás může spoutat ještě rychleji než oni.“"
 hispaniola_events.5.a: "#italic Bondye modi li!#!"
 crushed_algerian_resistance: "Potlačený alžírský odpor"
