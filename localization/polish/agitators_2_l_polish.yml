 notification_haiti_stops_paying_france_desc: "Haiti odmítlo provádět další platby naší zemi a jednostranně zrušilo veškeré dluhy vůči nám.\n\nPožadavky na trestnou výpravu jsou rozšířené a nyní máme [concept_claim|l] na naši bývalou kolonii."
