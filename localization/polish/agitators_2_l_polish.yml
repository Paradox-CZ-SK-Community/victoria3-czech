 dreyfus_subject_of_inquiry: "Předmět vyšetřování"
 dreyfus_autonomous_army: "Semknutí kolem armády"
 anti_semitic_demonstrations: "Antisemitské demonstrace"
 dreyfus.2.t: "Proces s [SCOPE.sCharacter('ferdinand_esterhazy_scope').GetLastNameNoFormatting]m"
 dreyfus.2.d: "Zastánci [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] trvají na tom, že byl neprávem odsouzen, a označili [SCOPE.sCharacter('ferdinand_esterhazy_scope').GetFullName] za pravděpodobného viníka. [SCOPE.sCharacter('ferdinand_esterhazy_scope').GetLastNameNoFormatting] byl však [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] v neveřejném procesu zproštěn viny — poté si oholil knír a uprchl ze země."
 dreyfus.2.f: "„Shrnutí: Nejenže jsme zachytili dopis vojenského atašé adresovaný přímo Esterhazymu, nejenže jeho rukopis odpovídá bordereau mnohem lépe než rukopis [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting], a nejenže je až po krk zadlužen. Ten muž navíc písemně vyjádřil své opovržení Francií i její armádou! Ctihodní generálové, opravdu nevidíte to, co vidím já?“\n\n„Pane kapitáne, vidíme pouze muže, který překračuje své pravomoci.\nSkutečný viník již byl dopaden a jeho zrádná povaha odhalena. Považujte věc za uzavřenou.“"
 dreyfus.2.a: "Velmi podezřelé."
 dreyfus.2.b: "Jistě [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] vědí, co dělají."
 dreyfus_wavering_army: "Kolísající podpora armády"
 dreyfus.3.t: "J'accuse...!"
 dreyfus.3.d: "V novinách L'Aurore byl publikován ostrý článek [SCOPE.sCharacter('emile_zola_scope').GetFullName], který obviňuje francouzskou vládu a [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] z antisemitismu a nezákonného odsouzení [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName]."
 dreyfus.3.f: "„#bold Obviňuji#! tři znalce písma z toho, že vypracovali nepravdivé a podvodné posudky, ledaže by lékařské vyšetření prokázalo, že trpí chorobou zraku a úsudku.\n\n#bold Obviňuji#! ministerstvo války z toho, že vedlo v tisku ohavnou kampaň s cílem zmást veřejné mínění a zakrýt svou vinu.\n\nNakonec #bold obviňuji#! první válečný soud z porušení zákona, když odsoudil obžalovaného na základě utajených důkazů,\n\na #bold obviňuji#! druhý válečný soud z toho, že tuto nezákonnost zakryl tím, že vědomě zprostil viníka viny.“"
 dreyfus.3.a: "Jiskra zažehnuta. Nyní přijde požár."
 dreyfus.3.b: "Pravda je na pochodu a nic ji nezastaví."
 dreyfus.3.tt_1: "Vzhledem k předčasnému vyšetřování se síla případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] zvýší o další #bold 1#!."
 dreyfus.3.tt_2: "Vláda provedla předběžné vyšetřování."
 dreyfus.4.t: "Udušení v domácnosti"
 dreyfus.4.d: "Služebnictvo v domě předního zastánce [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] [SCOPE.sCharacter('zola_asphyxiation_leader').GetFullName] nalezlo svého zaměstnavatele mrtvého v jeho ložnici. Tragédie, řekl jeden. Vražda, tvrdil druhý. Přirozená smrt, doufal třetí. Ať tak či onak, rána pro případ [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName]."
 dreyfus.4.f: "Koroner téhož odpoledne potvrdil, že nešlo o cizí zavinění. Na žádost pozůstalé rodiny bylo provedeno zvláštní vyšetřování. Viníkem byla otrava oxidem uhelnatým z nevyčištěného komína.\n\nPřesto přetrvávají zvěsti: intriky a atentát se skloňují všude, aniž by se kdokoliv hlásil k činu."
 dreyfus.4.a: "Tragédie."
 dreyfus.4.b: "Uspořádat státní pohřeb."
 dreyfus.4.c: "Nechat zvěsti kolovat. Možná na nich něco je."
 zola_state_funeral_positive: "Uspořádaný státní pohřeb"
 zola_state_funeral_negative: "Uspořádaný státní pohřeb"
 zola_state_funeral_expenses: "Náklady na pohřeb"
 dreyfus.5.t: "[SCOPE.sCharacter('emile_zola_scope').GetFullNameNoFormatting] obviněn z pomluvy"
 dreyfus.5.d: "Rozzuřen tím, co [SCOPE.sCharacter('dreyfus_armed_forces_leader_scope').GetSheHe] považuje za očerňování dobrého jména a pověsti [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName], [SCOPE.sCharacter('dreyfus_armed_forces_leader_scope').GetFullName] obvinil autora „J'Accuse...!“, [SCOPE.sCharacter('emile_zola_scope').GetFullName], z trestné pomluvy a požaduje, aby byl [SCOPE.sCharacter('emile_zola_scope').GetWomanMan] uvězněn za [SCOPE.sCharacter('emile_zola_scope').GetHerHis] drzost."
 dreyfus.5.f: "Výkřiky hněvu, rozhořčení, triumfu i zklamání přehlušily monotónní hlas soudce. Jeho odpůrci tvrdili, že si zaslouží přísnější trest. Jeho stoupenci volali po mučednictví, stejně jako tomu bylo u Dreyfuse. Skandál, který pošpinil Francii, říkali jedni; škoda, že nebyl po ruce provaz, říkali druzí. Na jedné věci se však shodli všichni: Émile Zola dostal špatný trest."
 dreyfus.5.a: "Soud rozhodl: Vinen ve všech bodech obžaloby."
 dreyfus.5.b: "Vinen, ale bude uložena pouze pokuta."
 dreyfus.5.c: "Nevinen. Svoboda projevu je nedotknutelná."
 dreyfus.5.tt_1: "[SCOPE.sCharacter('emile_zola_scope').GetFullName] se pokusí uprchnout do exilu, aby se vyhnul vězení."
 dreyfus.5.tt_2: "[SCOPE.sCharacter('emile_zola_scope').GetFullName] je uvězněn."
 dreyfus_outraged_by_court_desicion: "Pobouřen rozhodnutím soudu"
 dreyfus_imperfect_compromise: "Neuspokojivé kompromisy"
 dreyfus_pleased_with_court_desicion: "Spokojen s rozhodnutím soudu"
 dreyfus.6.t: "[SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]ovská desková hra se šíří"
 dreyfus.6.d: "Zámožný společenský prominent spojený s [SCOPE.gsInterestGroup('dreyfus_parlor_game_ig_scope').GetName] nedávno vytvořil společenskou hru s názvem „Aféra [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] a pravda“, která dále podporuje myšlenku, že [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] byl mezi [ROOT.GetCountry.GetAdjectiveNoFormatting] vyšší společností neprávem odsouzen."
 dreyfus.6.f: "„Tak jak vyhraju?“\n„No, vidíš tu nahou dámu na konci cesty, jak vylézá ze studny? To je Pravda. Posouváš svou figurku směrem k ní, přes rozbité desky zákonů, dopisy, památky a noviny.“\n„Aha. A ten koště a ty odporné masky?“\n„Masky předsudků, příteli. Zametené do popelnice dějin, kam patří.“\n„Tak proč jedna z nich vypadá jako moje drahá matka?“\n„Vidím, že máš prázdnou sklenici, příteli. Dovol, abych pomohl.“"
 dreyfus.6.a: "Je to jen hra, proč se rozčilovat?"
 dreyfus.6.b: "To zavání pomluvou. Pořádně je potrestat."
 dreyfus_not_fun_and_games: "Ne všechno je jen zábava"
 parlor_game_aggresive_censorship: "Zakázaná společenská hra"
 dreyfus.7.t: "Protidreyfusovské nepokoje v [SCOPE.sState('anti_dreyfusard_riot_state').GetName]"
 dreyfus.7.d: "Podníceny obzvlášť pobuřujícím článkem v novinách napojených na [SCOPE.gsInterestGroup('anti_dreyfusard_riot_ig').GetName], konkrétně v [SCOPE.sState('anti_dreyfusard_riot_state').GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')], vyšly do ulic velké davy, pálí podobizny [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] a vykřikují proti-[SCOPE.sCharacter('alfred_dreyfus_scope').GetReligion.GetName] hesla."
 dreyfus.7.f: "„Zase jsou tady, křičí ‚Ať žije armáda‘ a ‚Pryč s Židy‘ z plných plic. Dnes v noci přijdou ohně, zítra úklid. Pořád ta samá písnička.“\n\n„Tolika problémů kvůli jedné židovské duši? Začínám si myslet, že by bylo lepší nechat toho muže ve vězení, ať už je vinen nebo ne.“"
 dreyfus.7.a: "Hlas lidu je hlasem Božím."
 dreyfus.7.b: "Pokusit se tuto hysterii potlačit."
 dreyfus.7.c: "Nechat policii zakročit proti těmto surovcům."
 dreyfus_vox_populi: "Vox Populi"
 dreyfus_vox_dei: "Vox Dei"
 dreyfus_street_brawls: "Pouliční střety s policií"
 dreyfus_slipping_public_order: "Slábnoucí veřejný pořádek"
 dreyfus.8.t: "Obnovený proces"
 dreyfus.8.d_1: "V tom, co mnozí významní [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]ovci nazvali „procesem století“, byl [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] plně zproštěn viny, což znamená úplnou porážku protidreyfusovského hnutí a odstranění jeho členů z mnoha klíčových institucí Francie."
 dreyfus.8.d_2: "Proces probíhal v atmosféře extrémního napětí a soud v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] znovu potvrdil vinu [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName], avšak s „polehčujícími okolnostmi“, a nabídl [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]ovi milost výměnou za přiznání viny: milost, kterou viditelně vyhladovělý [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] po určitém váhání přijal."
 dreyfus.8.d_3: "V široce odsuzovaném procesu, téměř zcela ovládaném členy vyšších kruhů [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName], byl [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] znovu odsouzen na doživotí, což znamená úplnou porážku dreyfusovského hnutí a další upevnění pozice francouzského konzervativního establishmentu."
 dreyfus.8.f_1: "„Mimořádné vydání! Mimořádné vydání!\n[SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] zproštěn viny! Čtěte více v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]!\n[SCOPE.sCharacter('ferdinand_esterhazy_scope').GetLastNameNoFormatting] a vysocí důstojníci armády čelí obvinění! [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] navrácen do armády se všemi poctami!\n\nMimořádné vydání!“"
 dreyfus.8.f_2: "„Mimořádné vydání!\n\n[SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] znovu odsouzen a omilostněn! Čtěte více v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]!\nVýznamní odpůrci i zastánci Dreyfuse odsuzují verdikt a volají po skutečné spravedlnosti!\n\nMimořádné vydání!“"
 dreyfus.8.f_3: "„Mimořádné vydání!\n\nZrádce [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] zpět ve vězení! Čtěte více v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]!\nArmádní hrdina [SCOPE.sCharacter('ferdinand_esterhazy_scope').GetLastNameNoFormatting] se vrací z exilu! Židovští a jakobínští senátoři hromadně rezignují!\n\nMimořádné vydání!“"
 dreyfus.8.a: "Nakonec pravda vždy zvítězí."
 dreyfus.8.b: "Triumf sil osvícenství."
 dreyfus.8.c: "Zdá se, že dreyfusovské strašidlo nás bude ještě nějakou dobu pronásledovat."
 dreyfus.8.e: "Neuspokojivý konec neuspokojivé aféry."
 dreyfus.8.g: "Zdá se, že pochod „pravdy“ se náhle zastavil."
 dreyfus.8.h: "Triumf sil tradice."
 dreyfus.8.tt_1: "Všechny [Concept('concept_interest_group', '$concept_interest_groups$')] budou mít vyšší šanci generovat konzervativní a reakční [Concept('concept_leader', '$concept_leaders$')]."
 dreyfus.8.tt_2: "Všechny [Concept('concept_interest_group', '$concept_interest_groups$')] budou mít vyšší šanci generovat liberální a radikální [Concept('concept_leader', '$concept_leaders$')]."
