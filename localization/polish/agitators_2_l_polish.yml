 paris_commune_pulse_events.14.t: "Kdo dřív přijde, ten líp oblečen"
 paris_commune_pulse_events.14.d: "Po doplňovacích volbách v Pařížské komuně uspořádala Národní garda přehlídku hlavními bulváry."
 paris_commune_pulse_events.14.f: "Jean-Pierre má boty. Jean-Pierre má kabát. Jean-Pierre má pušku. Velká revoluce se blíží. A Jean-Pierre je obklopen přáteli a rodinou, které zná celý život. Paříž má slavnou revoluční tradici a jeho srdce plesá.\n\nJenže Jean-Pierre si není jistý, zda si to ostatní uvědomují: používají stejné kulky jako francouzská armáda. A ta na ně brzy začne střílet."
 paris_commune_pulse_events.14.a: "Naše loajalita patří Výboru a Komuně."
 paris_commune_pulse_events.14.b: "Za Francii a Internacionálu."
 paris_commune_pulse_events.14.c: "Pochodujeme za Paříž."
