 dreyfus_unsatisfying_conclusion: "Dreyfusovské strašidlo"
 dreyfus_legacy_modifier: "Nevyřešená aféra"
 dreyfus_legacy_disc_modifier: "Nevyřešená aféra"
 dreyfus.9.t: "[SCOPE.sCharacter('ferdinand_esterhazy_scope').GetLastNameNoFormatting] přiznává vinu v rozhovoru"
 dreyfus.9.d: "V rozhovoru s místním novinářem [SCOPE.sCharacter('ferdinand_esterhazy_scope').GetFullName], nyní žijící v exilu v [SCOPE.sCountry('ferdinand_esterhazy_country_scope').GetNameNoFlag], a mnohými považovaný za skutečného viníka Dreyfusovy aféry, zjevně přiznal svou vinu a uvedl, že byl skutečným autorem bordereau."
 dreyfus.9.f: "„Napsal jsem bordereau na žádost plukovníka Sandherra, který dnes zemřel. Je nešťastné, že plukovník Sandherr zemřel, protože znal pravdu. Přesto mohu dokázat, že jsem lístek napsal já, navzdory zmizení tohoto svědka.\n\nBordereau mělo sloužit jako hmotný důkaz viny [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting], protože zpravodajská služba měla proti němu pouze morální důkazy. Bylo však známo prostřednictvím francouzské špionáže, že generální štáb [SCOPE.sCountry('dreyfus_rival_country_scope').GetAdjectiveNoFormatting] měl k dispozici dokumenty, které mu mohl předat pouze [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting].“"
 dreyfus.9.a: "Skutečně světlo do případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]."
 dreyfus.9.b: "Nic než lži z [SCOPE.sCountry('ferdinand_esterhazy_country_scope').GetAdjectiveNoFormatting], které mají zasít rozkol."
 dreyfus.9.c: "Tato aféra je nyní větší než „pravda“. Nevěnujte tomuto přiznání pozornost."
 dreyfus_truth_relative: "Ignorované důkazy"
 dreyfus_truth_relative_positive: "Ignorované důkazy"
 dreyfus_aknowledged_evidence: "Uznané důkazy"
 slave_revolt_events.1.t: "Ústava svobody"
 slave_revolt_events.1.d: "Po staletí lid [SCOPE.sCulture('freed_slave_culture_scope').GetName] dřel pod jařmem biče a neustále toužil po svobodě. Se vznikem nezávislé [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] je tato slabá naděje nyní jen krůček od naplnění, neboť [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]ovi byl předložen návrh osvobozující ústavy."
 slave_revolt_events.1.f: "(1) Lid obývající [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting('A')] se tímto usnáší vytvořit svobodný stát, svrchovaný a nezávislý na jakékoli jiné moci ve vesmíru.\n\n(2) Každý obyvatel území [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] je plně svobodný.\n\n(3) Otroctví v [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] je navždy zrušeno."
 slave_revolt_events.1.a: "Svoboda od otroctví bude zakotvena v ústavě."
 slave_revolt_events.1.b: "A kdo pak bude pracovat na polích? To rozhodně ne."
 revolution_pulse2_events.1.t: "V zájmu národa"
 revolution_pulse2_events.1.d: "S důrazem na nutnost držet krok s moderními vojenskými pokroky vláda navrhla vyslat [SCOPE.sCharacter('army_lad_leader_scope').GetFullName] na průzkumnou vojenskou misi do [SCOPE.sCountry('fact_finding_mission_country_scope').GetName]—jen slabě zastřený pokus, jak vzdálit hašteřivého generála od jeho stále více vzpurných stoupenců."
 revolution_pulse2_events.1.f: "Přibližně ve chvíli, kdy pára zmizela ze zrcadla, došlo [SCOPE.sCharacter('army_lad_leader_scope').GetHerHim], že vláda po [SCOPE.sCharacter('army_lad_leader_scope').GetHerHim] vlastně chce něco stejně nemožného jako najít sníh v poušti. Kdyby na to přišel dříve, [SCOPE.sCharacter('army_lad_leader_scope').GetSheHe] by měl dost rozumu prostě říct „Ne.“ Říct to teď by z něj jen udělalo hlupáka."
 revolution_pulse2_events.1.a: "Ať si [SCOPE.sCharacter('army_lad_leader_scope').GetHerHim] sbalí kufry. Vlastně mu je sbalte vy."
 revolution_pulse2_events.1.b: "Platiti [SCOPE.sCharacter('army_lad_leader_scope').GetHerHim] cestování po [SCOPE.sCountry('fact_finding_mission_country_scope').GetCapital.GetCityHubName]? Děkuji, nechci."
 revolution_pulse2_events.1.tt: "[SCOPE.sCharacter('army_lad_leader_scope').GetFullName] je vyslán na roční průzkumnou misi."
 ig_amassing_strength: "Shromažďování síly"
