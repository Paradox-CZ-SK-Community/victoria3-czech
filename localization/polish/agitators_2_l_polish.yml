 homestead_favouring_planters_pos: "Náklonnost k plantážníkům"
 homestead_favouring_planters_neg: "Náklonnost k plantážníkům"
 homestead_favouring_farmers_pos: "Náklonnost k malým farmářům"
 homestead_favouring_farmers_neg: "Náklonnost k malým farmářům"
 surge_of_popular_support_modifier: "Na bedrech drobných rolníků"
 bowing_to_the_plantocracy: "Ústup plantážnické elitě"
 land_ownership_law_events.2.t: "Spoutaná duše národa"
 land_ownership_law_events.2.d: "V poněkud překvapivém kroku, s tvrzením, že [ROOT.GetCountry.GetAdjectiveNoFormatting] [GetLawType('law_serfdom').GetName] vytvořil propast mezi duchovní páteří země, [SCOPE.gsInterestGroup('rural_folks_scope').GetName], a stále více zahraničně ovlivněnou vyšší třídou, vystoupila řada konzervativních myslitelů na podporu [SCOPE.sLaw('current_law_scope').GetName]—čímž porušili jednotu se svými tradičněji smýšlejícími kolegy z [SCOPE.gsInterestGroup('landowners_scope').GetName] a [SCOPE.gsInterestGroup('devout_scope').GetName]."
 land_ownership_law_events.2.f: "„Náš národ je ve svém současném stavu tvořen dvěma společenskými skupinami, které mají jen málo společného.\nMoji kolegové z [SCOPE.gsInterestGroup('landowners_scope').GetNameNoFormatting], kteří nosí cizí oděvy, následují cizí módu, někteří dokonce hovoří cizími jazyky, se příliš odtrhli od svého vlastního [ROOT.GetCountry.GetAdjectiveNoFormatting] dědictví—jejich [ROOT.GetCountry.GetAdjectiveNoFormatting]-ství je jen rodinné jméno a přísaha věrnosti [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\n\nNatolik se vzdálili základním [ROOT.GetCountry.GetAdjectiveNoFormatting] hodnotám prostého bratrství a pospolitosti, které charakterizují venkovany, jež drží v poddanství.“"
 land_ownership_law_events.2.a: "[ROOT.GetCountry.GetAltAdjectiveNoFormatting('aa')] společnost musí být znovu sjednocena a společný duch obnoven."
 land_ownership_law_events.2.b: "Ať se ti unavení staří muži hádají, jak chtějí."
 cultural_custodians_modifier: "Idealizovaní strážci kultury"
 dissenter_support_for_law: "Podpora zákona od konzervativních disidentů"
 internal_discord_modifier: "Vnitřní rozkol"
 land_ownership_law_events.3.t: "Příliš mnoho akrů"
 land_ownership_law_events.3.d: "V bouřlivém parlamentním projevu [SCOPE.sCharacter('anti_kulak_leaders_scope').GetFullName], vůdce [SCOPE.gsInterestGroup('anti_kulak_ig_scope').GetName] a hlavní zastánce prosazení [SCOPE.sLaw('current_law_scope').GetName], prohlásil, že „konec krvesajících, tučných farmářů se blíží“. [SCOPE.sCharacter('anti_kulak_leaders_scope').GetHerHis|U] radikální poselství vyděsilo mnohé členy [SCOPE.gsInterestGroup('rural_folks_scope').GetName], kteří se obávají, že by tak mohli být označeni i oni, přestože vlastní jen o pár akrů více než jejich sousedé."
 land_ownership_law_events.3.f: "„Dimo, slyšel jsi zprávy od [SCOPE.sCharacter('anti_kulak_leaders_scope').GetFullNameNoFormatting]? Prý má spadeno na farmáře. Nechci, aby se [SCOPE.sCharacter('anti_kulak_leaders_scope').GetHerHim] přibližoval k mému žitu.“\n\n„Jen na ty velké, a jen na ty, které si [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] rád zve. [SCOPE.sCharacter('anti_kulak_leaders_scope').GetLastNameNoFormatting] není Baba Jaga.“\n\n„Stejně nechci, aby se [SCOPE.sCharacter('anti_kulak_leaders_scope').GetHerHim] přibližoval k mému žitu. Moje žena letos zase peče sladké pečivo.“"
 land_ownership_law_events.3.a: "Všichni bohatí farmáři jsou třídní zrádci..."
 land_ownership_law_events.3.b: "...ale jen ti nejbohatší stanou před soudem."
 land_ownership_law_events.3.c: "Jejich osud ještě není rozhodnut. Nevydávejte žádná oficiální prohlášení."
 rural_hysteria_modifier: "Venkovská hysterie"
 rural_paranoia_modifier: "Venkovská paranoia"
 confused_collectivization_program: "Zmatený kolektivizační program"
 concise_collectivization_program: "Jasný kolektivizační program"
 land_ownership_law_events.4.t: "Úděl druhorozených synů"
 land_ownership_law_events.4.d: "S tím, jak se v [SCOPE.sState('commercialized_agriculture_state_scope').GetName] stává panenská půda pro druhorozené syny stále vzácnější, mnozí farmáři zapojení do místního [SCOPE.sBuilding('commercialized_agriculture_building_scope').GetName] doufají, že přechod na [SCOPE.sLaw('current_law_scope').GetName] přinese příjmy potřebné k zajištění všech jejich potomků po smrti—nebo alespoň zanechá jedinou ziskovou farmu, kterou bude možné prodat."
 land_ownership_law_events.4.f: "Pole nejsou v nových modelech zcela udržitelná. Každý farmář by byl ponechán sám sobě při správě jednotlivých polí. Předpokládá se, že každá další sklizeň půdu nadměrně vyčerpá. Pro zajištění hladkého přechodu je zapotřebí středního managementu. Nutné je také odpovídající školení pro každého farmáře, který chce využít nové zákony [SCOPE.sLaw('current_law_scope').GetNameNoFormatting].\n\nDoporučení: přerozdělit půdu těm, kteří si ji již mohou dovolit koupit, a zajistit firemní instrukce ohledně osvědčených postupů."
 land_ownership_law_events.4.a: "Jejich obavy jsou skvělým argumentem."
 land_ownership_law_events.4.b: "[SCOPE.gsInterestGroup('landowners_scope').GetName] je #italic nadšeně#! vykoupí."
 land_ownership_law_events.4.c: "[SCOPE.gsInterestGroup('industrialists_scope').GetName] a síla kapitálu zasáhnou."
 farmland_consolidation_modifier_pos: "Konsolidace zemědělské půdy"
 farmland_consolidation_modifier_neg: "Konsolidace zemědělské půdy"
 for_the_nations_second_sons_modifier: "Ve prospěch druhorozených synů"
 land_ownership_law_events.5.t: "Zemědělské družstvo podporuje [SCOPE.sLaw('current_law_scope').GetName]"
 land_ownership_law_events.5.d: "S cílem odstranit potřebu prostředníků spojením [GetPopType('farmers').GetName], [GetPopType('laborers').GetName] a [GetPopType('shopkeepers').GetName] do družstevně vlastněného podniku využilo nově vzniklé zemědělské družstvo v [SCOPE.sState('farmer_coops_state_scope').GetName]—usilující o zlepšení podmínek svých členů—svůj značný místní vliv k prosazení [SCOPE.sLaw('current_law_scope').GetName]."
 land_ownership_law_events.5.f: "Každá rodina se zapojila, ať už vyráběla židle, sbírala ovoce nebo vedla záznamy o prodeji. Shodli se, že nejlepší šancí na budoucnost je převzít kontrolu nad tím, kam vše směřuje. Ovoce i nábytek zůstanou dostupné všem. Zelenina i zboží se bude prodávat za spravedlivou cenu a zisky se spravedlivě rozdělí mezi ty, kdo plní regály. Nikdy to nebude „mnoho“, ale nikdo nebude hladovět."
 land_ownership_law_events.5.a: "Rolníci ovlivňují [ROOT.GetCountry.GetCapital.GetCityHubName]? Jak roztomilé."
 land_ownership_law_events.5.b: "Oceňme jejich model podnikání jako vizi světa zítřka."
 land_ownership_law_events.5.c: "Venkov i město, farmáři i dělníci, spojte se!"
 co_operatively_backed: "Družstevní spolupráce"
 the_cooperative_movement: "Družstevní hnutí"
 land_ownership_law_events.6.t: "Půda tomu, kdo ji obdělává"
 land_ownership_law_events.6.d: "Návrh na přijetí [SCOPE.sLaw('current_law_scope').GetName], který by fakticky přerozdělil půdu od [GetPopType('farmers').GetName] k [GetPopType('aristocrats').GetName], vyvolal nepřekvapivě masové protesty mezi [SCOPE.gsInterestGroup('rural_folks_scope').GetName], jelikož jej mnozí vnímají jako první krok k zavedení [GetLawType('law_serfdom').GetName]."
 land_ownership_law_events.6.f: "„To myslíš vážně? Opravdu vážně? Předat tuhle půdu nějakému hlupákovi, co nepozná motyku od krumpáče?“\n\n„Vládní nařízení od [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Je mi líto, pane, ale musíte tyto pozemky opustit.“\n\n„Pche! Sleduj, jak ten hedvábný panáček všechno zničí, a pak se ke mně bude plazit, abych to zachránil! Pamatuj si má slova.“"
 land_ownership_law_events.6.a: "Rolníci jsou jen synové půdy, ne její přirození vlastníci."
 land_ownership_law_events.6.b: "Chcete revoluci? Takhle ji dostanete."
 estates_claims_backed_modifier: "Podpora nároků statků"
 limited_land_redistribution_proposal: "Omezený návrh pozemkové reformy"
 land_ownership_law_events.7.t: "Dohody ze stodoly"
 land_ownership_law_events.7.d: "V době, kdy vláda intenzivně prosazuje [SCOPE.sLaw('current_law_scope').GetName], nabídla skupina majetných farmářů, kteří se stali vlastníky půdy v [SCOPE.sState('farmer_wealth_concentration_state_scope').GetName] díky své blízkosti k hlavním obilným trhům v [SCOPE.sState('farmer_wealth_concentration_state_scope').GetCityHubName], že podpoří návrh zákona svou značnou politickou vahou, pokud jim vláda poskytne určité „ústupky“."
 land_ownership_law_events.7.f: "Otázka spojení půdy s bohatstvím je jednoduchá: kdo ovládá půdu s hodnotnými zdroji, má silnější hlas ve společnosti. Ať už jde o pšenici, bavlnu či opium, vždy to vede ke snaze si tento vliv udržet. A tak přicházejí vášnivé kompromisy: dočasná oběť hrdosti výměnou za o něco delší udržení moci."
 land_ownership_law_events.7.a: "Určitě bychom mohli poskytnout nějaké zemědělské „dotace“."
 land_ownership_law_events.7.b: "Udělit jim přednostní práva k půdě v [SCOPE.sState('farmer_wealth_concentration_state_scope').GetName]."
 land_ownership_law_events.7.c: "Bez takových intrik se obejdeme. Zákon je dostatečně zajištěn."
 rural_financial_inducements: "Venkovské finanční pobídky"
 big_farmer_corruption: "Korupce velkostatkářů"
 land_ownership_law_events.8.t: "Tragédie na společných pastvinách"
 land_ownership_law_events.8.d: "V době, kdy se v [SCOPE.sState('a_tragedy_in_the_commons_state_scope').GetName] vede intenzivní debata o přijetí [SCOPE.sLaw('current_law_scope').GetName], přerostl místní spor mezi vlastníkem půdy v oblasti [SCOPE.sState('a_tragedy_in_the_commons_state_scope').GetFarmHubName] a několika farmáři v krveprolití. Tváří v tvář možnosti, že společné pastviny budou vykoupeny a uzavřeny, jeden obzvlášť rozhořčený farmář zastřelil vlastníka půdy v záchvatu vzteku."
 land_ownership_law_events.8.f: "Jedna smrt je tragédie, milion je statistika. Statistikou jsou v tomto případě akry půdy a životy zničené chamtivostí. Zabít viníka je rychlé řešení. Samotný akt vraždy však odsoudil jednu stranu k utrpení. Otázkou tedy je, co je skutečnou tragédií: smrt jednoho, které se dalo předejít, nebo stovky hladovějících kvůli chamtivosti jednotlivce?"
 land_ownership_law_events.8.a: "Barbarství. Takhle vypadají odpůrci reformy."
 land_ownership_law_events.8.b: "Zvrácený čin zvrácené mysli. Nic víc."
 land_ownership_law_events.8.c: "Tento čin je příznakem hlubší nemoci. Řešme ji."
 wave_of_sympathy_for_law: "Vražda posiluje podporu zákona"
 narratives_of_victimhood: "Narativy oběti"
 peasant_crackdowns_modifier: "Zásahy proti rolníkům"
 land_ownership_law_events.9.t: "Poddanství v osvíceném věku"
 land_ownership_law_events.9.d: "Snaha vlády zavést [SCOPE.sLaw('current_law_scope').GetName] narazila v [SCOPE.sState('serfdom_enactment_state_scope').GetName] na nevíru a rozsáhlé protesty. Svobodní [GetPopType('farmers').GetName], neochotní vstoupit do područí [GetPopType('aristocrats').GetName], se spojili s městskými reformátory, kteří tuto instituci považují za přežitek minulosti."
 land_ownership_law_events.9.f: "„Bez dohledu pána nechají rolníci naše pole ladem. Když je obdělávají teď, jakou máme záruku, že to budou dělat i zítra?\n\nJen pevná ruka může řídit vrtkavou mysl rolníka a zajistit, že bude orat s odhodlanou pílí.“"
 land_ownership_law_events.9.a: "Tak jako [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] vede své stádo, povedou [GetPopType('aristocrats').GetName] to své."
 land_ownership_law_events.9.b: "Ale kdepak, nestanou se z nich #italic nevolníci#!, jen „nájemci s plným vlastnickým právem“."
 legal_jargon_complicates_reform: "Právní terminologie komplikuje reformu"
 the_return_of_the_good_old_days: "Návrat starých dobrých časů"
 anti_feudal_opposition: "Odmítnutí neofeudalismu"
 garibaldi_popularity_modifier_tier_1: "Neprověřený idealista"
 garibaldi_popularity_modifier_tier_2: "Gaučo"
 garibaldi_popularity_modifier_tier_3: "Lev"
 garibaldi_popularity_modifier_tier_4: "Generál"
 garibaldi_popularity_modifier_tier_5: "Hrdina dvou světů"
 garibaldi_events.1.t: "Garibaldi nabízí své služby"
 garibaldi_events.1.d: "Italský revolucionář a nacionalista [SCOPE.sCharacter('garibaldi_scope').GetFullName] považuje náš boj proti [SCOPE.sCountry('garibaldi_spawn_foe_scope').GetName] za spravedlivý, a proto se rozhodl připojit k naší věci a nabídnout své služby jako generál."
 garibaldi_events.1.f: "„Nenabízím ani žold, ani ubytování, ani jídlo;\nnabízím jen hlad, žízeň, nucené pochody, bitvy a smrt.\nKdo miluje svou vlast srdcem, a ne jen slovy, ať mě následuje.“"
 garibaldi_events.1.a: "Pověřte [SCOPE.sCharacter('garibaldi_scope').GetFullName], aby vedl naše armády."
 garibaldi_events.1.b: "Takového buřiče nepotřebujeme."
 rejected_garibaldi_modifier: "Odmítnuta pomoc Garibaldiho"
 garibaldi_events.2.t: "Garibaldi se loučí"
 garibaldi_events.2.d_1: "Po vypuknutí války mezi [SCOPE.sCountry('garibaldi_italian_nation_scope').GetName] a [SCOPE.sCountry('garibaldi_foreign_nation_scope').GetName] se [SCOPE.sCharacter('garibaldi_scope').GetFullName] rozhodl opustit [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] a chopit se zbraní proti nepřátelům Itálie."
 garibaldi_events.2.d_2: "Vzhledem k tomu, že v [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] panuje mír a boj proti tyranům je alespoň prozatím u konce, rozhodl se [SCOPE.sCharacter('garibaldi_scope').GetFullName] zemi opustit a hledat další hodnou věc."
 garibaldi_events.2.f: "„Kdekoliv bratři bojují za svobodu Itálie – tam musíme spěchat.“"
 garibaldi_events.2.a: "Šťastnou cestu, generále [SCOPE.sCharacter('garibaldi_scope').GetLastName]."
 garibaldi_events.3.t: "Italská dobrovolnická legie"
 garibaldi_events.3.d: "Generál [SCOPE.sCharacter('garibaldi_scope').GetFullName], čerpající z italské populace v [SCOPE.sState('italian_legion_state_scope').GetName], zorganizoval legii podobně smýšlejících krajanů, aby se připojili k [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] boji proti tyranii [SCOPE.sCountry('italian_legion_foe_scope').GetAdjective]."
 garibaldi_events.3.f: "„Moji muži!\nJsme v menšině, nepřítel je početný,\ntím slavnější bude vítězství.\nVytrvejte, šetřete střelivo, dokud se nepřiblíží,\npak palte\na vrhněte se na ně s bodáky!“"
 garibaldi_events.3.a: "Jejich schopnosti a zápal jsou na bojišti velmi potřebné."
 garibaldi_events.3.b: "Využijte jejich zkušeností k výcviku a náboru dalších mužů."
 italian_legion_barracks_modifier: "Kasárna italské legie"
 italian_legionaries_modifier: "Dobrovolníci italské legie"
 garibaldi_events.4.t: "Garibaldi burcuje rolnictvo"
 garibaldi_events.4.d: "Zatímco schopnost [SCOPE.sCharacter('garibaldi_scope').GetFullName] oslovit lid se ukázala jako užitečná v boji proti [SCOPE.sCountry('garibaldi_peasants_foe_scope').GetAdjective], jeho radikální projevy začínají obracet některé [GetPopType('farmers').GetName] v [SCOPE.sState('garibaldi_peasants_state_scope').GetName] i proti naší vládě—několik ministrů nyní požaduje, aby byl umlčen."
 garibaldi_events.4.f: "„Až budou rolníci poučeni o pravdě, tyrani i otroci zmizí ze světa.“"
 garibaldi_events.4.a: "Je pro naši věc příliš důležitý. Vyhněme se konfliktu."
 garibaldi_events.4.b: "Nařiďte mu, aby zmírnil svou rétoriku."
 emboldened_peasantry_modifier: "Povzbuzené rolnictvo"
 luddite_law_events.1.t: "Darwin mezi stroji"
 luddite_law_events.1.d: "Článek publikovaný v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] si získává pozornost v literárních kruzích země a přiživuje probíhající debatu o [SCOPE.sLaw('current_law_scope').GetName]. Tvrdí, že stroje jsou formou mechanického života podléhajícího neustálému vývoji, a varuje, že pokud lidstvo nebude jednat obezřetně, mohou jednou stroje nahradit člověka jako dominantní druh."
 luddite_law_events.1.f: "„Zabýváme se otázkou: jaký tvor se pravděpodobně stane nástupcem člověka v nadvládě nad Zemí. O tom jsme již mnohokrát slyšeli; zdá se nám však, že si své nástupce vytváříme sami.\n\nDen za dnem nad námi stroje získávají převahu; den za dnem se jim stáváme podřízenějšími; stále více lidí je zotročeno, aby je obsluhovali, a stále více lidí zasvěcuje celý svůj život rozvoji mechanického života.\n\nVýsledek je prostě jen otázkou času.“"
 luddite_law_events.1.a: "Stroje nás nenahradí."
 luddite_law_events.1.b: "Zní to, jako by někdo trávil až příliš času ve svém zatuchlém ateliéru."
 luddite_law_events.1.c: "Fascinující myšlenka. Opravdu fascinující."
 machine_men_with_machine_minds_modifier: "Strach ze strojového člověka"
 time_to_go_outside_modifier: "Je čas jít ven"
 luddite_law_events.2.t: "Prostý život"
 luddite_law_events.2.d: "[SCOPE.sCharacter('simple_living_leader_scope').GetFullName], neochvějně antimodernistický vůdce [SCOPE.gsInterestGroup('simple_living_ig_scope').GetName], vyzdvihl návrh [SCOPE.sLaw('current_law_scope').GetName] s tvrzením, že odvede lid [SCOPE.sCulture('simple_living_primary_culture_scope').GetName] od zkaženého pochodu modernity zpět do laskavé náruče [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]."
 luddite_law_events.2.f: "„Lidé dneška se chlubí stále rostoucím rozsahem změn, které vnucují světu, a důsledkem je, že se vše stává stále umělejším.“"
 luddite_law_events.2.a: "[SCOPE.sCharacter('simple_living_leader_scope').GetHerHis|U] slova mají váhu a naše cíle jsou v souladu."
 luddite_law_events.2.b: "Nezabývejme se fanatiky."
 a_zealot_scorned_modifier: "Pohrdnutý fanatik"
 a_zealot_endorsed_modifier: "Podpořený fanatik"
 zealous_advocates_modifier: "Horliví zastánci"
 widespread_dogmatic_intolerance: "Rozšířená dogmatická nesnášenlivost"
 luddite_law_events.3.t: "Furor Technophobicus"
 luddite_law_events.3.d: "To, co začalo jako protest proti možné automatizaci některých pracovních činností v [SCOPE.sBuilding('technophobic_fury_building_scope').GetName] v [SCOPE.sState('technophobic_fury_state_scope').GetName], se rychle změnilo v nepokoje, když radikalizovaný předák s palicí odemkl dveře tovární haly. Zprávy o rozbitých strojích i zlomených kostech se rychle šíří po [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] a zhoršují debatu o [SCOPE.sLaw('current_law_scope').GetName]."
 luddite_law_events.3.f: "„Až bude naše síť hotova,\na člunek vyměněn za meč,\nvrhneme rubáš\nna despotu u našich nohou\na zbarvíme jej krví, kterou prolil.“"
 luddite_law_events.3.a: "Nešťastná událost v nevhodnou dobu."
 luddite_law_events.3.b: "Zatkněte jak výtržníky, tak jejich vůdce. Nereprezentují nás."
 rage_against_the_machine_modifier: "Hněv proti strojům"
 anti_worker_crackdowns_modifier: "Zásahy v továrnách"
 a_reputation_for_violence_modifier: "Pověst násilníků"
 yeet_agitator_events.1.t: "Neúrodná půda"
 yeet_agitator_events.1.d: "Poté, co zjistil, že jak [ROOT.GetCountry.GetAdjectiveNoFlag] veřejnost, tak i domnělí političtí spojenci nejsou vnímaví k jeho myšlenkám, se [SCOPE.sCharacter('yeeted_agitator_scope_1').GetFullName] rozhodl znechucen odejít z politiky a strávit zbytek svých dnů psaním zatrpklých úvah o tom, co mohlo být."
 yeet_agitator_events.1.f: "„Dávám těmhle balíkům pravdu, a jaká je má odměna?\nOhlušující ticho!\nA oni nazývají [ROOT.GetCountry.GetCapital.GetCityHubName] městem myšlenek? Městem #italic kultury#!?\nJediný důkaz kultivace, který jsem v té stokě našel, pocházel z polí za městem— a i #italic ta#! byla zanedbaná.\nTáhněte k čertu, pánové!\nTáhněte k čertu všichni!“"
 yeet_agitator_events.1.a: "Nechte [SCOPE.sCharacter('yeeted_agitator_scope_1').GetHerHim], ať si své myšlenky šíří v klidu, daleko od [ROOT.GetCountry.GetCapital.GetCityHubName]."
 yeet_agitator_events.1.b: "Zdvořile mu sdělte, že jeho přítomnost není v [ROOT.GetCountry.GetNameNoFormatting] žádoucí."
 yeet_agitator_events.1.c: "Tenhle [SCOPE.sCharacter('yeeted_agitator_scope_1').GetWomanMan] potřebuje jen malé „postrčení“, aby se vrátil do hry."
 yeet_agitator_events.1.tt_1: "[SCOPE.sCharacter('yeeted_agitator_scope_1').GetFullName] odchází z politiky a usazuje se doma."
 yeet_agitator_events.1.tt_2: "[SCOPE.sCharacter('yeeted_agitator_scope_1').GetFullName] odchází z politiky a usazuje se v zahraničí."
 embittered_writings_modifier: "Usazená agitace"
 agitator_exiled_modifier: "Vyhnaný agitátor"
 yellow_press_adovacte_modifier: "Podpora žlutého tisku"
 newspaper_campaign_modifier: "Financování tiskové kampaně"
 yeet_agitator_events.2.t: "Na zelenější pastviny"
 yeet_agitator_events.2.d: "Spokojen se stavem politiky v [ROOT.GetCountry.GetNameNoFlag] a hledající nové příležitosti k agitaci v zahraničí oznámil [SCOPE.sCharacter('yeeted_agitator_scope_2').GetFullName] svůj záměr opustit zemi—přeje jejím současným správcům hodně štěstí do budoucna."
 yeet_agitator_events.2.f: "„Přátelé, to, čeho jsme zde v [ROOT.GetCountry.GetNameNoFormatting] dosáhli, je nic menšího než ohromující. Věc [SCOPE.sCharacter('yeeted_agitator_scope_2').GetIdeology.GetNameNoFormatting] je věcí [ROOT.GetCountry.GetNameNoFormatting] a naše úsilí i výsledky jsou toho důkazem.\n\nAle v oslavě našeho úspěchu nesmíme zapomínat na ty v zahraničí, jejichž [SCOPE.sCharacter('yeeted_agitator_scope_2').GetIdeology.GetNameNoFormatting] aspirace jsou stále jen slabou nadějí, drcenou pod botami našich nepřátel.\n\nDokud jejich věc trvá, trvá i ta moje. Nemohu s čistým svědomím odpočívat na vavřínech v [ROOT.GetCountry.GetNameNoFormatting] a ignorovat jejich volání po spravedlnosti.“"
 yeet_agitator_events.2.a: "Sbohem, [SCOPE.sCharacter('yeeted_agitator_scope_2').GetLastNameNoFormatting]. Ať vaše myšlenky najdou v zahraničí vnímavé uši."
 agitator_proof_modifier: "Konec dějin?"
 yeet_agitator_events.3.t: "Plody tvé práce"
 yeet_agitator_events.3.d: "Spokojen s novým stavem věcí v [ROOT.GetCountry.GetNameNoFlag] a neochoten či neschopen čelit nejistotám života v zahraničí oznámil [SCOPE.sCharacter('yeeted_agitator_scope_3').GetFullName] svůj odchod z politického života."
 yeet_agitator_events.3.f: "„Tak už je pryč. Do [SCOPE.sState('retirement_state_scope').GetFarmHubName], pokud jsou zvěsti pravdivé—malovat, pít a chovat slepice. Zdá se, že vedení lidí člověku dá chuť starat se i o jednodušší tvory [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')].“\n\n„Možná má prostě rád slepice, [SCOPE.sCharacter('walter_scope').GetFirstNameNoFormatting]?“\n\n„Drž svou #bold zatracenou#! hubu, [SCOPE.sCharacter('donny_scope').GetFirstNameNoFormatting].“"
 yeet_agitator_events.3.a: "Zdá se, že i ti největší radikálové nakonec vychladnou."
 yeet_agitator_events.3.b: "Uctěme jeho památku. Možná busta v [ROOT.GetCountry.GetCapital.GetCityHubName]?"
 agitator_legacy_modifier: "Odkaz agitace"
 honouring_agitator_modifier: "Okázalé busty"
 commune_progress_subtract_5: "Postup #bold Pařížské komuny#! se #bold sníží#! o #bold 5#!"
