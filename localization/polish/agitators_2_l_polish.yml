 je_conquest_of_algeria: "Dobytí Alžírska"
 je_conquest_of_algeria_reason: "V roce 1827 vedla takzvaná #bold Aféra s vějířem#! k francouzské vojenské blokádě #bold Alžírského deyliku#!. O tři roky později naše vojska ve velké síle přistála na pobřeží Alžírska a rozhodně porazila armádu #bold Husajna deje#! v bitvě u Staouéli. Po jeho porážce se starý deylik zhroutil, avšak prázdný prostor po něm rychle zaplnili oportunisté a samozvaní nárokovatelé.\n\nNaše dobytí však ještě není dokončeno. Dokud francouzský prapor nebude vlát nad každou alžírskou vesnicí a každý rebel nebude zlomen v písku, neustaneme.\n\nAť žije Francie!"
 je_conquest_of_algeria_tt: "Události o rozsáhlých nájezdech se již nebudou objevovat."
 je_the_algerian_departements: "Alžírské departementy"
 je_the_algerian_departements_reason: "Proměna Alžírska z koloniálního pohraničí ovládaného šavlí v nedílnou součást metropolitní země [ROOT.GetCountry.GetNameNoFormatting] započala.\n\nJak však naši správci zjistili již během dobývání, loajalita domorodého obyvatelstva je draze vykoupená a nestálá. Abychom mohli plně využít bohaté zdroje Alžírska, musíme buď přivést loajálnější populaci, nebo přijmout drastická opatření k zajištění věrnosti té stávající."
 je_the_algerian_departements_tt_1: "Státní regiony [SCOPE.sState('je_algiers_state_scope').GetStateRegion.GetName], [SCOPE.sState('je_oran_state_scope').GetStateRegion.GetName] a [SCOPE.sState('je_constantine_state_scope').GetStateRegion.GetName] musí být plně vlastněny a [Concept('concept_incorporated_state','$concept_incorporated$')|l], s hodnotou [concept_turmoil|l] pod #bold 10%#!."
 je_the_algerian_departements_tt_3: "Podíl [SCOPE.sCulture('french_culture_scope').GetName] [Concept('concept_pop','$concept_population$')|l] v regionech [SCOPE.sState('je_algiers_state_scope').GetStateRegion.GetName], [SCOPE.sState('je_oran_state_scope').GetStateRegion.GetName] a [SCOPE.sState('je_constantine_state_scope').GetStateRegion.GetName] je alespoň #bold 20%#!."
 je_reconquest_of_algeria: "Alžírská válka odporu"
 je_reconquest_of_algeria_reason: "V roce 1830 padl #bold Alžírský bejlik#! do rukou prokletých Francouzů. Jejich vítězství však nebylo úplné a vnitrozemí Alžírska zůstává nepokořené. S pomocí Boží zatlačíme vetřelce zpět do moře a sjednotíme tři #bold bejliky#! pod naší dobrotivou vládou."
 je_reconquest_of_algeria_tt: "Vytvořili jsme Alžírsko."
 algeria_events.1.t: "Prohlášení v Alžíru"
 algeria_events.1.d: "Stojíc na palubě [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_ship_name')] — vlajkové lodi středomořské eskadry — oznamuje [SCOPE.sCharacter('algerian_parade_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('algerian_parade_general_scope').GetLastName] konec rozsáhlých vojenských operací v Alžírsku."
 algeria_events.1.f: "Pestrý průvod vojska se pomalu vine podél alžírského nábřeží. Pestrobarevně odění zuávové pochodují v sevřeném kroku k zakotveným [ROOT.GetCountry.GetAdjectiveNoFormatting] lodím v přístavu a nesou potrhané bojové prapory poražených alžírských pluků. Za nimi následují kopiníci, řadové jednotky i domorodí tirailleuři.\n\nKdyž [SCOPE.sCharacter('algerian_parade_general_scope').GetFullNameNoFormatting] z [SCOPE.sCharacter('algerian_parade_general_scope').GetHerHis] pozice na zádi hledí na mohutné shromáždění [ROOT.GetCountry.GetAdjectiveNoFormatting] vojenské síly, [SCOPE.sCharacter('algerian_parade_general_scope').GetHerHis] myšlenky přeruší jemné odkašlání. „Je to guvernér, pane. Chce vědět, co bude dál na programu.“"
 algeria_events.1.a: "Dnes vzdáváme hold hrdinům Afriky!"
 algeria_events.1.b: "Dotovat společnosti vykupující půdu pro evropské osadníky."
 algeria_events.1.c: "Vláda šavle skončila. Kontaktujte šejchy."
 algerian_migration: "Společnosti pro výkup půdy"
 vanquished_barbary: "Poražené Barbarsko"
 algeria_events.2.t: "Dekret [SCOPE.sCharacter('cremieux_decree_leader_scope').GetLastNameNoFormatting]"
 algeria_events.2.d: "[SCOPE.sCharacter('cremieux_decree_leader_scope').GetFullName], vůdce [SCOPE.sCharacter('cremieux_decree_leader_scope').GetInterestGroup.GetName], projevil pochopení pro jejich situaci a navrhl udělit [ROOT.GetCountry.GetAdjectiveNoFormatting] občanství domorodé populaci vyznávající [SCOPE.sPop('cremieux_decree_pop_scope').GetReligion.GetName] v Alžírsku."
 algeria_events.2.f: "Č. 136. – Prohlášení domorodých Židů v Alžírsku za [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yy')|l] občany.\n\nDomorodí Židé v departementech Alžírska jsou prohlášeni za [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yy')|l] občany; jejich osobní status se tedy po vyhlášení tohoto dekretu bude řídit [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yym')|l] právem, přičemž dosud nabytá práva zůstávají nedotčena.\nVeškerá ustanovení, dekrety, nařízení či výnosy odporující tomuto se ruší.\n\nDáno v [SCOPE.sState('cremieux_decree_sign_state_scope').GetCityHubName]\nPodepsán [SCOPE.sCharacter('cremieux_decree_leader_scope').GetFullNameNoFormatting]"
 algeria_events.2.a: "Schváleno. Dobrá vůle v regionu se nám bude hodit."
 algeria_events.2.b: "Zamítnuto. Příliš by to rozkolísalo situaci."
 algeria_events.3.t: "Alžírské fiasko"
 algeria_events.3.d: "Se ztrátou poslední [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yy')|l] opěrné pozice v Alžírsku skončil velkolepý koloniální projekt započatý roku 1830 neslavným koncem."
 algeria_events.3.f: "Bušení na dveře pracovny [SCOPE.sCharacter('algerian_fiasco_ig_leader').GetFullNameNoFormatting] sílí každou minutou — každá rána rezonuje v hlavě generála jako fyzický úder.\n\nPřed [SCOPE.sCharacter('algerian_fiasco_ig_leader').GetHerHim] leží hromada zpráv, každá horší než ta předchozí.\n„Neschopnost.“ „Ponížení.“ „Katastrofa.“\nMnohokrát přemýšlel [SCOPE.sCharacter('algerian_fiasco_ig_leader').GetLastNameNoFormatting] o svém odkazu. Nyní jej zná. Je to [SCOPE.sCharacter('algerian_fiasco_ig_leader').GetWomanMan], který ztratil Alžírsko.\n\nRány sílí.\nBudou očekávat vyjádření.\n\n[SCOPE.sCharacter('algerian_fiasco_ig_leader').GetSheHe|U] by jim ho měl dát."
 algeria_events.3.a: "S rozechvělou rukou si [SCOPE.sCharacter('algerian_fiasco_ig_leader').GetLastName] přikládá pistoli ke spánku."
 the_algerian_fiasco: "Alžírské fiasko"
 widespread_condemnation_modifier: "Rozsáhlé odsouzení"
 algeria_events.4.t: "Francouzské Alžírsko"
 algeria_events.4.d: "Desetiletí tvrdé práce přinesla své plody. Tam, kde kdysi rolníci a otroci dřeli pod nadvládou orientálních despotů, odhalila osvěcující pochodeň [ROOT.GetCountry.GetAdjectiveNoFormatting] civilizace novou zemi: naši zemi."
 algeria_events.4.f: "Ó, lítost nad Alžírem a jeho poklady,\njejich stopy již neexistují!\nJaké nepravosti spáchali ti prokletí!\nAl-Qaisariya byla přejmenována na Plaza\na pomyslete, že se tam prodávaly a vázaly svaté knihy.\nProhledali hroby našich otců\na jejich kosti rozházeli,\naby přes ně mohly jezdit jejich vozy."
 algeria_events.4.a: "Civilizace dorazila na barbarské pobřeží."
 algeria_events.4.b: "Alžírsko bude stejně francouzské jako Champagne."
 algeria_events.4.c: "Co [ROOT.GetCountry.GetNameNoFormatting] požaduje, to Alžírsko poskytne."
 evolues_focus: "Podpora Évolués"
 colons_focus: "Podpora kolonistů"
 algerian_industry_focus: "Podpora využívání zdrojů"
 the_algerian_dream: "Alžírský sen"
 algeria_events.5.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.sState('algerian_raided_state_scope').GetStateRegion.GetName] zpustošili nájezdíci"
 algeria_events.5.d: "Nájezdníci pod vlajkou země [SCOPE.sCountry('algerian_raider_scope').GetName] přepadli naše osady v oblasti [SCOPE.sState('algerian_raided_state_scope').GetStateRegion.GetName] a pobili jak [ROOT.GetCountry.GetAdjectiveNoFormatting] posádku, tak několik významných kolaborantů."
 algeria_events.5.f: "„Byl to klamný manévr, pane. Mysleli jsme si, že pronásledujeme malou nájezdní skupinu, protože bylo hlášeno jen odcizení několika kusů dobytka, ale jakmile jsme vstoupili do rokle, rozpoutal se chaos výkřiků a střelby. Kapitán padl jako první a poté se vše zhroutilo.\n\nOd té chvíle si pamatuji jen mlhu krveprolití a ohně, pane.“"
 algeria_events.5.a: "Obnovit. Jejich den přijde."
 algeria_events.5.b: "[SCOPE.sCharacter('algerian_raid_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('algerian_raid_general_scope').GetLastName] nese odpovědnost, svolat tribunál."
