 french_pretenders.10.f_1: "„Spoluobčané! V přítomnosti Boha přísahám, že budu věrně plnit povinnosti, které ode mne země očekává; vládnout pouze podle zákonů a v souladu se zákony; poskytovat spravedlivou a rovnou spravedlnost každému podle jeho práva a jednat ve všem pouze s ohledem na zájmy, štěstí a slávu francouzského lidu.“"
 french_pretenders.10.d_2: "V rámci čtyřdenní podívané plné tradic a okázalosti, jaká nebyla k vidění od zlatého věku Ancien Régime, byl [ROOT.GetCountry.GetRuler.GetFullName] pomazán a korunován [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]em země [ROOT.GetCountry.GetName] v katedrále v Remeši."
 french_pretenders.10.f_2: "„Božská prozřetelnost, když nás znovu povolala na toto posvátné místo, na nás vložila velké povinnosti. Jako král Francie slibujeme věrnost chartě země a vyhrazujeme si ji stvrdit novou slavností před oltáři Toho, který váží stejnou měrou krále i národy.“"
