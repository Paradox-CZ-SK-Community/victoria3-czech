 je_haitian_debt: "Ohavný dluh"
 je_haitian_debt_reason: "Vyhlášená roku 1804, nezávislost Haiti na [SCOPE.sCountry('france_scope').GetName] byla nejen těžce vybojována, ale také draze zaplacena. Diplomaticky izolovaná a obávající se další invaze se haitská vláda roku 1825 zavázala odškodnit Francii za její ztracený majetek, včetně lidských životů, a za škody vzniklé během #bold Haitského masakru roku 1804#!. Na oplátku Haiti získalo diplomatické uznání.\n\nObrovská náhrada ve výši 150 milionů #italic franků#! donutila zemi přijmout vysoce úročené půjčky od francouzských soukromých bank, a od té doby se Haiti ocitá ve spirále rostoucího odškodnění, dluhu a úrokových plateb.\n\nMá-li být Haiti opět známo jako #bold Perla Antil#!, musí být naše finanční závazky vyřešeny, tak či onak."
 je_haitian_debt_status_4: "Naše současná úroveň dluhu je: #bold Obrovská#!"
 je_haitian_debt_status_3: "Naše současná úroveň dluhu je: #bold Velká#!"
 je_haitian_debt_status_2: "Naše současná úroveň dluhu je: #bold Významná#!"
 je_haitian_debt_status_1: "Naše současná úroveň dluhu je: #bold Malá#!"
 je_haitian_debt_negotiation_button: "Vyjednat snížení odškodnění"
 je_haitian_debt_negotiation_button_desc: "Pokud budou diplomatické podmínky příznivé, můžeme zahájit jednání s [SCOPE.sCountry('france_scope').GetNameNoFlag] o snížení odškodnění dlužného jejich věřitelům. O to lze požádat pouze #bold jednou#! a v případě souhlasu [SCOPE.sCountry('france_scope').GetNameNoFormatting] to bude za cenu [concept_obligation|l]."
 je_haitian_debt_payment_button: "Uhradit část dluhu"
 je_haitian_debt_payment_button_desc: "Schválit velkou platbu [SCOPE.sCountry('france_scope').GetAdjectiveNoFlag] #italic Caisse des dépôts et consignations#!."
 je_haitian_cancel_debt_button: "Jednostranně zrušit dluh"
 je_haitian_cancel_debt_button_desc: "Dost bylo dost. Raději zaplatíme za svou nezávislost krví, než abychom vykrváceli naše pokladny kvůli zatraceným [SCOPE.sCountry('france_scope').GetAdjectiveNoFlag]."
 je_haitian_cancel_debt_button_tt: "Toto rozhodnutí nebude v [SCOPE.sCountry('france_scope').GetName] přijato dobře a jejich ochota vést proti nám válku výrazně vzroste."
