 sent_leader_on_military_mission_ig: "Záludná průzkumná mise"
 revolution_pulse2_events.2.t: "Důstojník a gentleman"
 revolution_pulse2_events.2.d: "Po návratu z průzkumné mise do [SCOPE.sCountry('fact_finding_mission_country_scope').GetName] s hlavou plnou nápadů a kufrem plným drahého alkoholu je [SCOPE.sCharacter('army_lad_leader_scope').GetFullName] opět volný věnovat se svým domácím ambicím."
 revolution_pulse2_events.2.f: "Když člověk dostatečně dlouho honí divokou husu, něco se přece jen naučí: zaprvé, že většina tvorů se unaví dříve než člověk. A zadruhé, že je víc než jen jedna věc, kterou lze lovit. V tomto případě všechno požadované a ještě víc na stříbrném podnose.\n\nA se správným nápojem by každý rozumný vůdce chtěl slyšet o těchto nových a hrozivých zázracích."
 revolution_pulse2_events.2.a: "Ať už v dobrém či zlém, [SCOPE.sCharacter('army_lad_leader_scope').GetLastName] je zpět."
 results_of_the_fact_finding_mission: "Výsledky průzkumné mise"
 revolution_pulse2_events.3.t: "Naši přátelé za hranicemi"
 revolution_pulse2_events.3.d: "Jak se plameny revoluce šíří do [SCOPE.sState('transnational_unrest_squashing_state_scope').GetName], násilná stávka zachvátila [SCOPE.sState('transnational_unrest_squashing_state_scope').GetCityHubName] [SCOPE.sBuilding('transnational_unrest_squashing_factory_scope').GetName]. V obavách z eskalace a dalších ztrát zisků požádala skupina [SCOPE.sCountry('transnational_unrest_squashing_country_scope').GetAdjective] akcionářů vládu o okamžitou pomoc a nabídla podporu neaktivních [SCOPE.sCountry('transnational_unrest_squashing_country_scope').GetAdjectiveNoFlag] četníků rozmístěných za hranicemi."
 revolution_pulse2_events.3.f: "Mám připraveno dvě stě mužů."
 revolution_pulse2_events.3.a: "Tohle se vymyká kontrole. Přijmout jejich pomoc."
 revolution_pulse2_events.3.b: "Naše vlastní bezpečnostní složky si s tím poradí."
 revolution_pulse2_events.3.c: "Vyhněme se krveprolití. Zvolme smířlivý přístup."
 transnational_unrest_squashing_strike: "Rozsáhlé tovární stávky"
 transnational_requested_foreign_intervention: "Požadována zahraniční intervence"
 transnational_negotiations_not_fusillations: "Vyjednávání místo střelby"
 transnational_bloody_suppression: "Krvavé potlačení"
 revolution_pulse2_events.4.t: "Skripty pustoší [SCOPE.sState('company_store_strike_state').GetNameNoFormatting]"
 revolution_pulse2_events.4.d: "Na protest proti vyplácení mezd ve formě skriptů — kreditů směnitelných pouze v podnikové prodejně—zahájili dělníci hlavního [SCOPE.sBuilding('company_store_strike_building').GetName] v [SCOPE.sState('company_store_strike_state').GetName] nepokoje, zapálili sporný obchod a pochodují na hlavní sídlo společnosti s požadavkem zavedení hotovostních mezd."
 revolution_pulse2_events.4.f: "„Naložíš 16 tun, co dostaneš?\nO den starší a hlouběji v dluzích\nSvatý Petře, nevolej mě, nemůžu jít\nDlužím svou duši podnikovému obchodu“"
 revolution_pulse2_events.4.a: "Způsob vyplácení je věcí firmy, rozežeňte nepokoje."
 revolution_pulse2_events.4.b: "Nepřilévejme olej do ohně. Požadavky dělníků mají opodstatnění."
 revolution_pulse2_events.4.tt: "Přijmout legislativu zakazující nahrazování hotovostních mezd podnikovým kreditem."
 sided_with_workers_over_scrips: "Podpora dělníků ve věci kreditů"
 sided_with_capitalists_over_scrips: "Podpora průmyslníků ve věci kreditů"
 abolished_scrip_wages: "Zrušeny skriptové mzdy"
 revolution_pulse2_events.5.t: "Posádka v [SCOPE.sState('garrison_refusal_state').GetCityHubName] odmítá rozkaz"
 revolution_pulse2_events.5.d: "Prapor posádky ze [SCOPE.sState('garrison_refusal_state').GetName], který byl pověřen násilným potlačením lidového nepokoje v [SCOPE.sState('garrison_refusal_state').GetCityHubName], odmítl splnit rozkazy s tvrzením, že vykonání takového příkazu by bylo v rozporu se zákony lidí i [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]."
 revolution_pulse2_events.5.f: "„Vlastenectví? Rád pozvednu pušku proti nepřátelům [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]. Pokud [SCOPE.sCountry('garrison_refusal_rival').GetAdjectiveNoFormatting] zaklepe na dveře, splním svou povinnost, stejně jako my všichni.\nAle pozvednout zbraň proti vlastním? Proti bratrům krve a víry? Pane, tohle, tohle nemůžeme udělat.“"
 revolution_pulse2_events.5.a: "Vzpoura! Vůdce pověsit a ostatní uvěznit."
 revolution_pulse2_events.5.b: "Ututlat to. Posádku časem vystřídáme."
 seditious_garrison: "Vzbouřená posádka"
 revolution_pulse2_events.7.t: "Spor [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')]"
 revolution_pulse2_events.7.d: "Pokus o zatčení místního [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')|l] v [SCOPE.sState('hatmakerfeud_state').GetName]—obviněného z podněcování násilí proti vládě, pokud nebudou splněny jeho požadavky na rozšíření práv dělníků—se rychle zvrhl, když se místní obyvatelstvo postavilo na jeho stranu a hodilo vyslaného šerifa do řeky."
 revolution_pulse2_events.7.f: "„Nechat šerifa odvést [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')|l]? To určitě ne. Říkám, že šerif i všichni jemu podobní v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] si můžou trhnout.\nJestli se chceš dostat k [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')|l], budeš muset projít přes mě. A bez urážky, chlapče, ale mám o třicet liber víc než ta tvoje vyzáblá kostra.“"
 revolution_pulse2_events.7.a: "Pošlete armádu, ať to zkusí znovu."
 revolution_pulse2_events.7.b: "Nechte [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')|l] být a doufejme, že to zůstane lokální záležitost."
 hatmakersfeud_emboldened_commoners: "Posílení dělníci"
 revolution_pulse2_events.8.t: "Postoj, který zastává [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')]"
 revolution_pulse2_events.8.d: "Posílen svým předchozím úspěchem proti zákonu se [SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')|l] spolu se stovkami svých stoupenců postavil proti armádní jednotce přicházející do [SCOPE.sState('hatmakerfeud_state').GetName] – velká část jejich dřívějšího nadšení však opadla, když spatřili vojáky, kteří proti davu připravili dva kanóny."
 revolution_pulse2_events.8.f: "„Slíbili jsme, že tě udržíme dál od toho zatraceného šerifa, a to jsme splnili. Ale tohle by byla sebevražda. Máme třináct mužů s puškami a asi sto dvacet s nářadím. To by nestačilo ani proti odhodlanému davu, natož proti zatracené armádě.\nMusíš utéct. Bojovali bychom za tebe, všichni, ale nejsem si jistý, že bychom pro tebe i zemřeli.“"
 revolution_pulse2_events.8.a: "Palte. Do útoku. Rozehnat chátru."
 revolution_pulse2_events.8.b: "Dejte jim jeden den na vydání zločince a rozpuštění."
 revolution_pulse2_events.8.tt_1: "[SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')] je zajat živý, což povede k výslechům a hromadným zatýkáním."
 revolution_pulse2_events.8.tt_2: "[SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')] je zabit, čímž se stane mučedníkem své věci."
 revolution_pulse2_events.8.tt_3: "[SCOPE.GetRootScope.GetCountry.GetCustom('generic_worker_profession')] uprchne, což mu umožní pokračovat v činnosti v utajení."
 hatmakersfeud_martyrs_for_the_cause: "Významný mučedník"
 revolution_pulse2_events.9.t: "V rukou státu"
 revolution_pulse2_events.9.d: "Rozbil si hlavu o zeď cely? Byl umučen k smrti? Oficiální verze, že revolucionář napojený na [SCOPE.gsInterestGroup('jailtime_blues_ig').GetName] zemřel na choleru, přesvědčí jen důvěřivé a ty, kteří nechtějí vidět pravdu. Jisté je jen jedno: jeho stoupenci zuří a touží po krvi."
 revolution_pulse2_events.9.f: "„Byli to svobodní zednáři, říkám ti. Slyšel jsem od řezníka odnaproti, že dozorce je členem té prokleté kliky. Jsou to oni nebo [SCOPE.sCulture('jailtime_blues_pop').GetNameNoFormatting]ové. Nebo obojí. I [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] je jeden z nich, proto ho zabili.“\n\n„[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] je [SCOPE.sCulture('jailtime_blues_pop').GetNameNoFormatting]?“\n\n„Poslouchej, chlapče,“ říká a vypouští oblak hustého kouře do šeré místnosti. „Je spousta věcí, které tě ve škole nenaučí.“"
 revolution_pulse2_events.9.a: "„Vrazi!“, křičí dav."
 revolution_pulse2_events.9.b: "Jen [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] a dozorce znají pravdu. Pojďme se #italic zdvořile#! zeptat toho druhého."
 jailtime_blues_jail_stormed: "Věznice dobyta davem"
 jailtime_blues_martyr: "Smrt mučedníka"
 revolution_pulse2_events.10.t: "Revolucionáři přepadli zbrojnici"
 revolution_pulse2_events.10.d: "Skupina revolucionářů napojených na [SCOPE.gsInterestGroup('arms_depot_raided_ig').GetName] přemohla menší posádku v [SCOPE.sState('arms_depot_raided_state').GetName], zanechala po sobě dvě desítky mrtvých vojáků a odvezla bedny plné pušek a munice – dokonce i lehký kanón."
 revolution_pulse2_events.10.f: "#bold Hledáni: Zloději ze zbrojnice#! \n\nVíce než 30 mužů podezřelých z krádeže dělostřelectva a výzbroje v [randomState]. £200 za každého dopadeného či zabitého; £50 za informace vedoucí k dopadení nebo smrti pachatelů.\n\nPovažováni za ozbrojené a nebezpečné. Spolupracovníci budou považováni za stejně vinné."
 revolution_pulse2_events.10.a: "Prohledejte venkov."
 revolution_pulse2_events.10.b: "Prohledejte raději města."
