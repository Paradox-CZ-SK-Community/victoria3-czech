 algeria_events.6.t: "Arabské úřady"
 algeria_events.6.d: "Na základě zkušeností získaných během pacifikace Alžíru požádal [SCOPE.sCharacter('arab_bureaux_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('arab_bureaux_general_scope').GetLastName] o zřízení úřadu obsazeného etnografy, orientalisty a zpravodajskými důstojníky, který by pomáhal koloniálním úřadům při styku s domorodým obyvatelstvem."
 algeria_events.6.f: "„Před dvěma lety jste se vydal do vnitrozemí hledat lepší způsob, jak zkrotit tuto zemi. A teď se vracíte s tím, že máme omezit Evropany, nikoli domorodce?\nMůj příteli, strávil jste příliš mnoho času mimo městské hradby — slunce vám zřejmě spálilo mozek.“"
 algeria_events.6.a: "Jejich schopnosti budou klíčové pro pacifikaci země."
 algeria_events.6.b: "Lepší porozumění znamená lepší využití."
 algeria_events.6.c: "Zrušit tuto iniciativu, jen by brzdila naše osadníky."
