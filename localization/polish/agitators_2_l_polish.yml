 paris_commune_pulse_events.1.t: "Zabavení církve i státu"
 paris_commune_pulse_events.1.d: "[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] gardisté napojení na [SCOPE.gsInterestGroup('seize_church_ig_scope').GetName] obsadili další významný kostel. Požádali Ústřední výbor o pokyny."
 paris_commune_pulse_events.1.f: "Národní garda dorazila do opuštěného kostela.\n„Důkaz jejich zrady,“ zamumlá jeden. „Zbabělci,“ odfrkne si druhý. Každý gardista prohledává věž kvůli trofejím, kořisti a dřevu na barikády.\n\nPokud Bůh skutečně vládl této stavbě, již tomu tak není. Nyní patří lidu."
 paris_commune_pulse_events.1.a: "Uzavřít kostel, dokud nebude komuna lépe upevněna."
 paris_commune_pulse_events.1.b: "Najděte veškeré zlato a stříbro."
 paris_commune_pulse_events.1.c: "Přenechat jej [SCOPE.gsInterestGroup('seize_church_ig_scope').GetName] pro jejich schůze."
 secret_clubhouse_modifier: "Tajné sídlo"
 capital_gains_modifier: "Kapitálové zisky"
 divine_forclosure_modifier: "Božská konfiskace"
 the_riches_of_the_church_modifier: "Bohatství církve"
 paris_commune_pulse_events.2.t: "Čtyřicet varovných výstřelů"
 paris_commune_pulse_events.2.d: "Komunardi několikrát zastřelili generála [SCOPE.sCharacter('executed_general_scope').GetLastName] nedaleko Paříže. Ačkoli Versailles doufá, že přežil, Komuna to považuje za morální vítězství."
 paris_commune_pulse_events.2.f: "Jeden po druhém ho jeho muži opustili.\nDva po dvou gardisté zvedli pušky.\nTři po třech zazněly výstřely.\nČtyři po čtyřech se hromadily rány.\nPět po pěti by to nikdo nepřežil."
 paris_commune_pulse_events.2.a: "Splnili svou povinnost zabitím nepřátelského generála."
 paris_commune_pulse_events.2.b: "Uspořádat spravedlivý proces. Nejsme barbaři."
 paris_commune_pulse_events.2.c: "Za jejich odvahu je zařaďte mezi Enfants Perdus."
 paris_commune_pulse_events.2.tt: "Generál [SCOPE.sCharacter('executed_general_scope').GetLastName] je zajat Komunardy a může přežít, pokud budou poraženi."
 one_hydra_head_claimed_modifier: "Jedna hlava hydry sražena"
 miraculous_survival_modifier: "Zázračné přežití"
 airs_of_civility_modifier: "Zdání civilizovanosti"
 war_is_the_answer_modifier: "Válka je odpověď"
 paris_commune_executes_general: "Generál [SCOPE.sCharacter('executed_general_scope').GetLastName] je zajat Komunardy a popraven."
 paris_commune_pulse_events.3.t: "Kvůli jednomu hřebu"
 paris_commune_pulse_events.3.d: "Tváří v tvář hrozbě kontrarevoluce se pařížské obvody přou o to, kdo potřebuje více opevnění."
 paris_commune_pulse_events.3.f: "„Posledních 40 sudů vína jste si vzali vy! Máte dost dřeva, abyste přežili zimu po kontrarevoluci. Já se zatím musím spokojit s pískem.“\n\n„Ten písek má cenu zlata a ty ho používáš na výrobu skla. Stejně bys dřevo spálil ve svých pecích!“\n\n„Ty čtyřoká ropucho, na to je uhlí!“"
 paris_commune_pulse_events.3.a: "Lidé znají své obvody nejlépe."
 paris_commune_pulse_events.3.b: "Centralizovat obranu."
 paris_commune_pulse_events.3.c: "Posílit vnější obvody."
 wishful_initiative_modifier: "Naivní iniciativa"
 communard_citadel_modifier: "Komunardská pevnost"
 wages_of_pragmatism_modifier: "Pragmatická obrana"
 modifier_popular_defense_commune: "Občanská milice"
 paris_commune_pulse_events.4.t: "Petrolejové ženy"
 paris_commune_pulse_events.4.d: "Veřejné budovy, sochy a domy spojené s monarchií jsou zapalovány. Svědci přičítají vinu ženám v [SCOPE.sCountry('paris_commune_nation_scope').GetName]."
 paris_commune_pulse_events.4.f: "Nad Paříží se černají oblaka kouře. Mnozí to považují za velké vítězství Komuny.\nJiní za bezohledné znesvěcení dlouhé historie Francie.\nPopel ve vzduchu je nepopiratelný: vládne chaos, zatímco lidé propadají ničení."
 paris_commune_pulse_events.4.a: "Vedlejší škody se ve válce stávají."
 paris_commune_pulse_events.4.b: "V takových časech vzplanou mužské vášně."
 paris_commune_pulse_events.4.c: "I ženy chtějí dát průchod svému hněvu."
 cries_of_havoc_modifier: "Výkřiky zkázy"
 rallying_cries_ignored_modifier: "Ignorovaná výzva k boji"
 accusations_of_hysterical_mania_modifier: "Obvinění z hysterie"
 paris_commune_pulse_events.5.t: "Nepřátelští bojovníci"
 paris_commune_pulse_events.5.d: "Vláda ve Versailles umožnila [SCOPE.gsInterestGroup('armed_forces_scope').GetName], aby do 24 hodin soudila a odsuzovala zajaté komunardy. V odvetě Ústřední výbor v Paříži nařídil popravu tří mužů za každou smrt způsobenou vojenským tribunálem."
 paris_commune_pulse_events.5.f: "„Tak jsme my, občané Paříže, sevřeni mezi dvě hrozivé zákony; zákon o podezřelých zavedený Komunou a zákon o rychlých popravách, který jistě schválí Shromáždění.\n\nNebojují dělovými ranami, ale navzájem se vraždí dekrety.“"
 paris_commune_pulse_events.5.a: "Střílet s cílem zabít. Jsou to nepřátelští bojovníci."
 paris_commune_pulse_events.5.b: "Jsou to zrádci. Popravit každého podezřelého."
 paris_commune_pulse_events.5.c: "To sotva lze nazvat vzpourou. Neozbrojené podezřelé uvěznit."
 unacceptable_losses_modifier: "Nepřijatelné ztráty"
 moral_high_ground_modifier: "Morální převaha"
 divisive_instigation_modifier: "Rozdělující podněcování"
 modifier_slaughter_with_decrees: "Vraždění dekrety"
 paris_commune_pulse_events.6.t: "Kněz za vašeho kapitána"
 paris_commune_pulse_events.6.d: "Oddíly Národní gardy zajaly skupinu kněží, kteří odmítli opustit Paříž. Připravují jejich přesun do vězení."
 paris_commune_pulse_events.6.f: "„Řekni nám, kde schováváte zlato, nebo ti ustřelíme hlavu, knězi!“\n\n„Ne, ne, Jacquesi, měl jsi říct ‚nebo‘.\nŘekni nám, kde je zlato, nebo ti ustřelíme hlavu.“\n\n„Zadrhl jsem se snad? Kdyby nám to neřekl, umlátil bych ho k smrti.“"
 paris_commune_pulse_events.6.a: "Reakcionáře nelze tolerovat. Zabavte je všechny!"
 paris_commune_pulse_events.6.b: "Povolit jim opustit Paříž s jedním zavazadlem."
 paris_commune_pulse_events.6.c: "Pohřbít duchovní v troskách jejich kostela."
 to_strike_god_modifier: "Udeřit na Boha"
 virtue_of_mercy_modifier: "Ctnost milosrdenství"
 a_boldered_tomb_modifier: "Zasypaná hrobka"
 paris_commune_pulse_events.7.t: "Spoutáni železy"
 paris_commune_pulse_events.7.d: "Potyčky na okraji Paříže vedly k tomu, že jednotky francouzské armády zajaly členy [SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Národní gardy."
 paris_commune_pulse_events.7.f: "Muži v tmavomodrých a červených uniformách byli zajímáni na místě. Byli jasně Národní gardou.\nNěkteří odhodili většinu výstroje a pokusili se uprchnout zpět do města. Ti už byli méně zjevně gardou.\nArmáda měla jednodušší pravidlo. Nezáleželo na tom, jestli drží nůž na máslo nebo pušku: pokud měli zbraň, zastřelit je."
 paris_commune_pulse_events.7.a: "Vzdali se. Zahájit tribunály."
 paris_commune_pulse_events.7.b: "Žádné slitování pro zradu."
 paris_commune_pulse_events.8.t: "Čtyřstovková salvová pocta"
 paris_commune_pulse_events.8.d: "Stovky bronzových polních děl v Paříži zůstaly bez dozoru. Vláda ve Versailles vyzývá k opatrnosti. Generál [SCOPE.sCharacter('cannon_seizing_general_scope').GetLastName] ujišťuje, že má dostatek mužů k jejich zabavení."
 paris_commune_pulse_events.8.f: "„Chápete, jaké škody by mohlo napáchat čtyři sta děl? Kolik našich mužů by zemřelo?\nAno, jsou zastaralá. Ano, špatně se nabíjejí. Ale jedna železná koule rozbije formace a oslabí opevnění.\nNabijte ji dostatečným množstvím šrapnelu a máte dost střepin na to, abyste proměnili armádu v masovou kaši.\n\nDává to smysl, nebo vám to komunardi předvedou na vlastní kůži?“"
 paris_commune_pulse_events.8.a: "Odejděme hned, dokud máme moment překvapení."
 paris_commune_pulse_events.8.b: "Na jejich zabavení je příliš málo mužů."
 paris_commune_pulse_events.8.c: "Máme k dispozici lepší děla."
 paris_commune_pulse_events.8.tt_1: "Armáda získá část děl, ale jiná padnou do rukou komunardů."
 paris_commune_pulse_events.8.tt_2: "Komunardi získají děla a dochází k masovým dezercím v našich řadách."
 first_blood_modifier: "První krev"
 military_defectors_modifier: "Vojenští dezertéři"
 humiliation_upon_humiliation_modifier: "Ponížení za ponížením"
 paris_commune_pulse_events.9.t: "Naše těla, naše pravidla"
 paris_commune_pulse_events.9.d: "Ženská unie shromáždila po celém městě davy s cílem ukončit existenci legálních nevěstinců. Mnozí za jejich vznik viní přísnou legislativu."
 paris_commune_pulse_events.9.f: "Účelem regulace prostituce je omezit pohlavní nemoci, zabránit zneužívání a zajistit skutečný souhlas.\nV teorii to zní rozumně, většina prostitutek si je však rizik svého povolání dobře vědoma.\nNové zákony je však nutí do špatného zacházení, nedostatečné péče a vystavují je právnímu zneužívání."
 paris_commune_pulse_events.9.a: "Ženské tělo patří ženě."
 paris_commune_pulse_events.9.b: "Mužské pudy je nejlepší držet za těmi zdmi."
 paris_commune_pulse_events.9.c: "Mají pravdu. Postavme tyto hříšné domy mimo zákon."
 assertion_of_rights_modifier: "Prosazení práv"
 lingering_male_gaze_modifier: "Přetrvávající mužský pohled"
 fruit_of_the_loin_modifier: "Plod lůna"
 possible_feminist_agitator_spawn: "V [SCOPE.sCountry('france_scope').GetAltAdjective('L')] se může objevit #bold feministický#! agitátor"
 paris_commune_pulse_events.10.t: "Pád pevnosti"
 paris_commune_pulse_events.10.d: "Střety u jedné z pevností obklopujících Paříž vedly k nabídce kapitulace. Komunardi v posádce souhlasili, že pevnost opustí a vrátí se do města."
 paris_commune_pulse_events.10.f: "„Tady proti nim bojovat nemůžeme. Mají nás třikrát víc a mají více jídla, střeliva, prachu, nožů i uniforem než my.“\n\n„Pche. A co chceš dělat? Nadělat si do kalhot?“\n\n„Pro začátek s nimi bojovat tam, kde máme víc zbraní a lidí.“"
 paris_commune_pulse_events.10.a: "Povolit posádce ústup."
 paris_commune_pulse_events.10.b: "Rozdrtit je všechny. Žádný únik."
 paris_commune_pulse_events.10.tt_1: "Komunardi znovu obsadí pevnost."
 paris_commune_pulse_events.10.tt_2: "Komunardi ji opustí a přesunou síly jinam."
 an_olive_branch_modifier: "Olivová ratolest"
 guidelines_of_engagement_modifier: "„Pravidla“ střetnutí"
 paris_commune_pulse_events.11.t: "Dělnické družstvo"
 paris_commune_pulse_events.11.d: "Dekret Ústředního výboru umožňuje zaměstnancům převzít podnik, pokud jej původní majitel opustí. Někteří chtějí tento proces urychlit."
 paris_commune_pulse_events.11.f: "„Konečně skutečné družstvo. Můžeme dělat cokoli. Pracovat čtyři hodiny denně a v poledne jít na pivo.“\n\n„A nezapomeň na nové nástroje každý rok.“\n\n„Pierre, nikdo nezničí za rok tolik nářadí jako ty, ty leváku od mastnoty.“"
 paris_commune_pulse_events.11.a: "Dělníci mají nárok na plody své práce."
 paris_commune_pulse_events.11.b: "Měli bychom povzbudit další majitele k odchodu."
 dominating_narratives_modifier: "Proaktivní přerozdělení bohatství"
 a_rapturous_promise_modifier: "Opěvovaný slib"
 to_inherit_the_earth_modifier: "Zdědit Zemi"
 paris_commune_pulse_events.12.t: "Do školy"
 paris_commune_pulse_events.12.d: "[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Ústřední výbor nařídil, že dětem nebude dovoleno pracovat. Spory však pokračují o tom, jak mají naložit se svým nově nabytým volným časem."
 paris_commune_pulse_events.12.f: "Myšlenkou práce dětí byl levný a poslušný zdroj pracovní síly. Samozřejmě ti, kdo to prosazovali, neposílali pracovat vlastní děti. Kdo by dobrovolně odsoudil své dítě k deformacím kyčlí, pokřivené páteři a nemocem z uhelného prachu?\n\nKdyž se naskytla příležitost, Komuna to zrušila. Nyní mají všechny děti šanci vyrůst."
 paris_commune_pulse_events.12.a: "Dejte nám dítě; vrátíme vám dospělého."
 paris_commune_pulse_events.12.b: "Barikády z nich udělají muže."
 paris_commune_pulse_events.12.c: "I rozbité hodiny #italic mají#! dvakrát denně pravdu."
 strong_borders_modifier: "Pevné hranice"
 child_soldiery_modifier: "Dětští vojáci"
 a_learning_future_modifier: "Vzdělaná budoucnost"
 to_inherit_the_earth_char_modifier: "Zastánce vzdělání"
 possible_radical_agitator_spawn: "V [SCOPE.sCountry('france_scope').GetName] se může objevit #bold radikální#! agitátor"
 paris_commune_pulse_events.13.t: "Trest smrti"
 paris_commune_pulse_events.13.d: "Navzdory dekretu [SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Ústředního výboru, který trest smrti zrušil, se mnozí zadržení duchovní obávají, že se na ně toto pravidlo nevztahuje."
 paris_commune_pulse_events.13.f: "Modlitba. To bylo jediné, co biskup doporučil, když byli duchovní uvrženi do cel plných blech a dostávali zkažené jídlo.\nVenku se ozýval jásot: trest smrti byl zrušen.\nUvnitř vězení však byly chtivé pohledy mužů dychtících sledovat smrt kněží."
 paris_commune_pulse_events.13.a: "Jsou cennými vyjednávacími prostředky. Nechte je tam."
 paris_commune_pulse_events.13.b: "Mohli bychom jim dopřát lepší podmínky..."
 paris_commune_pulse_events.13.c: "Je naší povinností urychlit jejich cestu k Bohu."
