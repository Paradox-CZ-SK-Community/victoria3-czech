 paris_commune_pulse_events.15.t: "Vyloučení republikánů"
 paris_commune_pulse_events.15.d: "Volby do vedení pařížských obvodů odhalily problém: někteří zvolení jsou zároveň členy Národního shromáždění. [SCOPE.sCharacter('commune_leftist_leader').GetFullName] prohlásil, že republikanismus je s Komunou neslučitelný."
 paris_commune_pulse_events.15.f: "„Buď stojíte s Komunou, nebo proti ní! Paříž nemůže, nesmí a nikdy nebude znovu přijímat podmínky statkářů, průmyslníků či maloburžoazie. Žádný pravý Pařížan by se s tím nespokojil. A tito muži jsou nepřátelé revoluce! Nejsou-li zrádci nyní, stanou se jimi!“"
 paris_commune_pulse_events.15.a: "Budoucnost nesmí určovat jen úřednictvo."
 paris_commune_pulse_events.15.b: "Vůle lidu musí být zachována."
