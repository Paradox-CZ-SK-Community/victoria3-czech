 french_pretenders.2.t: "Mravní řád"
 french_pretenders.2.d: "Zatímco věc [SCOPE.gsInterestGroup('moral_order_government_ig_scope').GetLeader.GetIdeology.GetName] vedená [SCOPE.gsInterestGroup('moral_order_government_ig_scope').GetLeader.GetFullName] má v rámci [SCOPE.gsInterestGroup('moral_order_opposition_ig_scope').GetName] řadu odpůrců, [SCOPE.gsInterestGroup('moral_order_opposition_ig_scope').GetLeader.GetFullName] projevil zájem hnutí podpořit, neboť v něm vidí zdroj řádu vhodný k navrácení země [ROOT.GetCountry.GetName] na správnou cestu."
 french_pretenders.2.f: "„S pomocí Boží, oddanosti naší armády a podpory všech poctivých lidí budeme pokračovat v díle obnovy mravnosti naší země. Zachováme a ochráníme principy, na nichž je náš národ založen, a povedeme nekompromisní boj proti všem nepřátelům společnosti.“"
 french_pretenders.2.a: "Věc [SCOPE.gsInterestGroup('moral_order_government_ig_scope').GetLeader.GetIdeology.GetNameNoFormatting] ponechává jen malý prostor pro kompromis."
 french_pretenders.2.b: "Naším cílem je náboženské znovudobytí země [ROOT.GetCountry.GetNameNoFormatting]."
 french_pretenders.2.c: "Pouze [SCOPE.gsInterestGroup('moral_order_government_ig_scope').GetLeader.GetIdeology.GetNameNoFormatting]ové nás mohou ochránit před radikalismem."
 french_pretenders.2.e: "Společně budeme... ehm, pane, jsme to opravdu my?"
 french_pretenders.2.tt: "[SCOPE.gsInterestGroup('moral_order_opposition_ig_scope').GetLeader.GetFullName] má [SCOPE.gsInterestGroup('moral_order_opposition_ig_scope').GetLeader.GetIdeology.GetName] [concept_ideology]"
 empowered_by_monarchists: "Dynastické přízně"
 controversial_compromises: "Kontroverzní kompromisy"
 french_pretenders.3.t: "Země v rozkolu"
 french_pretenders.3.d: "Snahy prosadit rod [SCOPE.GetRootScope.GetCountry.GetCustom('french_dynasty')] jako jedinou legitimní dynastii země [SCOPE.GetRootScope.GetCountry.GetName] jsou mařeny významným představitelem [SCOPE.gsInterestGroup('oppoisition_french_monarchist_ig_scope').GetLeader.GetIdeology.GetName] [SCOPE.gsInterestGroup('oppoisition_french_monarchist_ig_scope').GetLeader.GetFullName], který tvrdí, že [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] není nic jiného než zbohatlý bandita."
 french_pretenders.3.f: "„Řádný národ musí být vystavěn na pevných základech. Na tomto rodu není #italic nic#! ‚pevného‘. Podívejte se na ně… samí pomýlení hlupáci a oportunisté!“"
 french_pretenders.3.a: "Schválit protipropagandu."
 french_pretenders.3.b: "„Legitimisté“ promarnili svůj mandát v roce 1830."
 french_pretenders.3.c: "A nějaký španělský pastýř v baretu má mít lepší nárok?"
 french_pretenders.3.h: "Zbohatlí bandité? Zapomněli ti hlavy děravé na Červencovou revoluci?"
 french_pretenders.3.e: "Má snad potomek Korsického obra větší legitimitu?"
 french_pretenders.3.g: "Urážka majestátu, říkáte? Tak [SCOPE.gsInterestGroup('oppoisition_french_monarchist_ig_scope').GetLeader.GetHerHim] umlčte!"
 french_pretenders.3.tt: "[SCOPE.gsInterestGroup('oppoisition_french_monarchist_ig_scope').GetLeader.GetFullName] má [SCOPE.gsInterestGroup('oppoisition_french_monarchist_ig_scope').GetLeader.GetIdeology.GetName] [concept_ideology]"
 accused_of_lese_majeste: "Oběť právního přehmatu"
 shaky_dynastic_foundation: "Křehké dynastické základy"
 victim_of_legal_overreach: "Vůdce obviněný z urážky majestátu"
 financing_monarchist_propaganda: "Financování monarchistické propagandy"
 french_pretenders.4.t: "Skutečná země"
 french_pretenders.4.d: "Členové tradičních tříd země, stavějící se proti tomu, co považují za uměle vnucené politické ideály revoluce, začínají podporovat věc [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_french_pretender')|l]ů."
 french_pretenders.4.f: "„Byli jste nedávno ve městě? Je to odporné, jak se tam chovají. Jako by byl řád postaven na hlavu, podle toho, co tam lidé dělají. Tady venku alespoň každý stále ví, jak se má chovat a kým je.“"
 french_pretenders.4.a: "Přípitek pracujícímu rolníkovi a jeho rodině!"
 french_pretenders.4.b: "Bůh žehnej faráři a jeho věřícím."
 french_pretenders.4.c: "Společně ochráníme [ROOT.GetCountry.GetAltAdjectiveNoFormatting('A')] před bezbožnými radikály."
 backbone_of_the_real_country_modifier: "Páteř skutečné země"
