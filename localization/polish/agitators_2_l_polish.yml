 je_dreyfus_affair: "Dreyfusova aféra"
 je_dreyfus_affair_reason: "Od vydání „J'accuse...!“ narůstá rozkol, který hrozí roztrhnout společenskou a politickou strukturu Francie. To, co začalo jako debata o vině či nevině jednoho muže, nabylo mnohem širších rozměrů:\n\nMonarchisté proti republikánům, liberálové proti konzervativcům a zbožní katolíci proti sekularistům. Všichni se snaží jednou provždy vyřešit #bold otázku#!: Je naše země Francií svatého Ludvíka, nebo Francií Voltaira?"
 je_dreyfus_status: "Aktuální síla případu je [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_dreyfus_case_strength')]"
 je_dreyfus_affair_tt.1: "Osud Dreyfuse bude záviset na důkladnosti případu budovaného na jeho podporu.\n\n- Síla případu #bold 10#! nebo více povede k plnému očištění.\n- Síla případu mezi #bold 5#! a #bold 9#! povede k mírnějšímu trestu.\n- Síla případu #bold 4#! nebo méně povede k opětovnému uvěznění.\n"
 je_dreyfus_affair_tt.3: "Podpora pro nové projednání případu v zemi [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] postupně roste a pravděpodobně k němu dojde během #bold 5 let#!, pokud jej neovlivní jiné události.\n"
 je_dreyfus_affair_tt.4: "Výsledek nového procesu bude mít širší dopady na francouzskou společnost."
 je_dreyfus_affair_goal: "Cíl je nám jasný."
 custom_dreyfus_case_weak: "#bold Slabý#!.\nTo pravděpodobně povede k #bold opětovnému uvěznění#!"
 custom_dreyfus_case_medium: "#bold Střední#!.\nTo pravděpodobně povede k #bold mírnějšímu trestu#!"
 custom_dreyfus_case_strong: "#bold Silný#!.\nTo pravděpodobně povede k #bold očištění#!"
 dreyfus_case_strength_increase_by_1: "Síla případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] se zvýší o #bold 1#!."
 dreyfus_case_strength_increase_by_2: "Síla případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] se zvýší o #bold 2#!."
 dreyfus_case_strength_decrease_by_1: "Síla případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] se sníží o #bold 1#!."
 dreyfus.1.t: "[SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] odsouzen za velezradu"
 dreyfus.1.d: "Důstojník vyznání [SCOPE.sCharacter('alfred_dreyfus_scope').GetReligion.GetName] [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] byl obviněn z předání tajných vojenských informací [SCOPE.sCountry('dreyfus_rival_country_scope').GetAdjective] velvyslanci v [ROOT.GetCountry.GetCapital.GetCityHubName] a na základě analýzy rukopisu a obsahu tajného spisu shledán vinným z velezrady ze strany [SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName]."
 dreyfus.1.f: "„Pánové, předkládám zachycený bordereau, adresovaný přímo [SCOPE.sCountry('dreyfus_rival_country_scope').GetAdjectiveNoFormatting] velvyslanci. Ačkoliv rukopis dopisu není ‚jasnou‘ shodou s rukopisem pana [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting], žádný špion by nikdy nepsal tajný dopis vlastní rukou.\n\nObžalovaný musel bezpochyby svůj rukopis napodobit či obkreslit, přičemž v něm zanechal dostatek přirozených znaků pro rozpoznání, avšak pro větší bezpečnost jej upravil prvky převzatými z rukopisů svého bratra a švagrové, v jednom z nichž jsem objevil stejné zdvojené s jako v bordereau!“"
 dreyfus.1.a: "Degradovat ho a poslat na Ďáblův ostrov."
 dreyfus.1.b: "Velezrada? Kéž bychom ještě měli trest smrti."
 dreyfus.1.c: "Samofalšování? Tajné spisy? Nařídit diskrétní vyšetřování."
 dreyfus.1.tt_1: "[SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] odsuzují [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] k doživotnímu vězení na nechvalně proslulém Ďáblově ostrově."
 dreyfus.1.tt_2: "[SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] odsuzují [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] k doživotnímu vězení."
 dreyfus.1.tt_3: "[SCOPE.gsInterestGroup('dreyfus_armed_forces_scope').GetName] odsuzují [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName] k doživotnímu vězení."
 dreyfus.1.tt_4: "Vláda zahajuje omezené vyšetřování případu [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastName]."
