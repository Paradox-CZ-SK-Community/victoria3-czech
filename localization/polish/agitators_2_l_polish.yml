 french_pretenders.1.t: "Restaurace [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_french_pretender')]ů"
 french_pretenders.1.d_1: "Kvůli selhání předchozího režimu legitimizovat se rychlý převrat vynesl [ROOT.GetCountry.GetRuler.GetFullName] k moci. Na rozdíl od některých [ROOT.GetCountry.GetRuler.GetHerHis] předchůdců se [ROOT.GetCountry.GetRuler.GetSheHe] rozhodl pro střídmější a modernější korunovaci a byl korunován [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]em [ROOT.GetCountry.GetAltAdjective('G')] v katedrále v Remeši."
 french_pretenders.1.f_1: "„Spoluobčané! V přítomnosti Boha přísahám, že budu věrně plnit povinnosti, které ode mne země očekává; vládnout pouze podle zákonů a v souladu se zákony; poskytovat spravedlivou a rovnou spravedlnost každému podle jeho práva a jednat ve všem pouze s ohledem na zájmy, štěstí a slávu francouzského lidu.“"
 french_pretenders.1.d_2: "Kvůli selhání předchozího režimu legitimizovat se rychlý převrat vynesl [ROOT.GetCountry.GetRuler.GetFullName] k moci. V rámci čtyřdenní podívané plné tradic a okázalosti, jaká nebyla k vidění od zlatého věku Ancien Régime, byl [ROOT.GetCountry.GetRuler.GetSheHe|U] pomazán a korunován [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]em [ROOT.GetCountry.GetAltAdjective('G')] v katedrále v Remeši."
 french_pretenders.1.f_2: "„Božská prozřetelnost, když nás znovu povolala na toto posvátné místo, na nás vložila velké povinnosti. Jako král Francie slibujeme věrnost chartě země a vyhrazujeme si ji stvrdit novou slavností před oltáři Toho, který váží stejnou měrou krále i národy.“"
 french_pretenders.1.d_3: "Kvůli selhání předchozího režimu legitimizovat se rychlý převrat vynesl [ROOT.GetCountry.GetRuler.GetFullName] k moci. Oděn do roucha a insignií svého předchůdce Napoleona Velikého se [ROOT.GetCountry.GetRuler.GetSheHe] korunoval [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]em [ROOT.GetCountry.GetAltAdjective('G')] při velkolepém obřadu v katedrále Notre-Dame."
 french_pretenders.1.f_3: "„Po poradě s Francií s pokorou přijímám pocty, které mi vděčný národ udělil. Přísahám lidu, že toto císařství bude císařstvím míru. Dobytí budou, ano — ale budou to dobytí smíření, náboženství a morálky! Toto je naše císařství, má-li nějaké být.“"
 french_pretenders.1.a: "Ať žije [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName]!"
 french_pretenders.1.b: "Ať žije rod Orléanů!"
 french_pretenders.1.c: "Ať žije [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName]!"
 french_pretenders.1.d: "Ať žije dědic svatého Ludvíka!"
 french_pretenders.1.e: "Ať žije [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName]!"
 french_pretenders.1.f: "Ať žije rod Bonapartů!"
