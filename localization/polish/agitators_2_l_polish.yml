 algeria_events.8.t: "Písek se usazuje"
 algeria_events.8.d: "S vetřelci vyhnanými z alžírských břehů a pořádkem obnoveným v celé zemi zvažuje [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] svůj další krok. Jaká bude budoucnost země [ROOT.GetCountry.GetName]?"
 algeria_events.8.f: "[ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting] sesedá z koně před starým palácem deje, jehož rozpadající se zdi jsou posety stopami po střelách — některé čerstvé, jiné starší než sám [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] [ROOT.GetCountry.GetRuler.GetHerselfHimself].\nZa branou je vidět skupina [ROOT.GetCountry.GetAdjectiveNoFormatting] vojáků, jak nakládají ukořistěná francouzská děla na povozy pod dohledem zachmuřeného kapitána s výrazným tureckým přízvukem, zatímco skupina kabylských bojovníků v nádvoří hází kostky a hraje o kapesní hodinky nějakého důstojníka."
 algeria_events.8.a: "Obnovit Alžírský pašalík."
 algeria_events.8.b: "Obnovit pašalík a znovu se podřídit Vysoké portě."
 algeria_events.8.c: "Obracím svou tvář k Němu, jenž stvořil nebesa."
 algeria_events.8.e: "Éra Arabů skončila. Nastal čas Berberů."
 algeria_events.8.g: "Pryč se starým. Vybudujeme nové Alžírsko."
