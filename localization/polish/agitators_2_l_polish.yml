 paris_commune_pulse_events.16.t: "Jděte a bojujte!"
 paris_commune_pulse_events.16.d: "[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Výbor veřejné bezpečnosti zakázal ženám vstup na bojiště. Ženská unie vydala manifest, v němž tvrdí, že mnohé Pařížanky by rády bojovaly."
 paris_commune_pulse_events.16.f: "„Ne mír, ale totální válku požadují pracující ženy Paříže! Smíření by dnes bylo zradou!“"
 paris_commune_pulse_events.16.a: "Povolit jim pomocné role."
 paris_commune_pulse_events.16.b: "Zcela je držet mimo bojiště."
 paris_commune_pulse_events.16.c: "Dejte jim pušku a bodák."
