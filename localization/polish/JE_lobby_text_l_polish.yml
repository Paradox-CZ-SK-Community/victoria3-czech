l_polish:
 je_unify_afghanistan_lobby: "#v Odemčeno DLC: Sphere of Influence#!\nNástupnická krize vyvolaná smrtí Tímúra Šáha Durráního v roce 1793 uvrhla bývalou Durránskou říši do období nekonečných občanských bojů. S hrozbou evropských mocností, které se tlačí ze všech stran, se musíme sami ujmout úkolu ukončit toto období válčících knížectví a obnovit sjednocený Afghánistán."
 je_matter_of_hungary_lobby: "Rakouská kontrola nad Uherskem musí být zachována, ať už železnou vládou, nebo kompromisem."
 je_metternich_lobby: "#v Odemčeno DLC: National Awakening#!\nZachovejte ideály kancléře Klemense von Metternicha, nebo dovolte, aby jeho pečlivě vystavěný konzervativní řád upadl v zapomnění."
 je_austrian_neo_absolutism_lobby: "#v Odemčeno DLC: National Awakening#!\nHrozba revoluce zdola si vyžádala, aby Vídeň provedla svou vlastní revoluci shora. Zřízením centralizovaného, racionálního a účinného státního aparátu – obsazeného loajálními a schopnými byrokraty – bude země modernizována, aby obstála před výzvami dnešní doby."
 je_patagonia_lobby: "Jižní končiny kontinentu zůstávají mimo kontrolu jakéhokoli národa. Ačkoli nám domorodá populace rozhodně nic neusnadní, je nezbytné, abychom toto území zajistili dříve, než padne do rukou našich soupeřů."
 je_conference_of_london_lobby: "Velmoci vyslaly své delegace do Londýna, aby rozhodly o řešení nevyřešených hraničních otázek mezi Nizozemskem a Belgií."
 je_consolidate_colonial_rule_lobby: "Abychom zajistili bezpečnost našich hlavních držav, musí být domorodí vládci, kteří se dosud vyhýbají naší vládě, přivedeni k poslušnosti a jakýkoli náznak lidového odporu rozdrcen dříve, než se vymkne kontrole."
 je_dravidian_movement_lobby: "#v Odemčeno DLC: Pivot of Empire#!\nProstý lid Indie zareagoval na nepřiměřené zastoupení a politickou moc bráhmanů. Po sérii protibráhmanských konferencí vzniklo drávidské hnutí, které si stanovilo nový program odporu proti bráhmanské dominanci. Usiluje o odstranění kastovních rozdílů ze zákonů a vládní správy."
 je_india_non_cooperation_movement_lobby: "#v Odemčeno DLC: Pivot of Empire#!\nHnutí za nezávislost v Indii nabírá na síle a jeho vůdci přišli s novou kampaní s jasným cílem: ekonomickou a politickou nespoluprací, odmítáním spolupráce s britskými úřady. Doufají, že sílu svého hnutí prokážou ochromením britského obchodu."
 je_acre_dispute_lobby: "#v Odemčeno DLC: Colossus of the South#!\nOblast Acre se stala předmětem ostrého sporu. Oportunističtí osadníci se snaží tuto zemi získat pro sebe. Musíme kout železo, dokud je žhavé, jinak tento stát navždy ztratíme."
 je_agricultural_development_lobby: "#v Odemčeno DLC: Colossus of the South#!\nBrazílie je obdařena obrovským množstvím úrodné zemědělské půdy a vhodným podnebím pro zemědělství. To nabízí velkou příležitost obohatit národ a vynést brazilskou produkci na světový výsluní."
 je_pedro_brazil_lobby: "#v Odemčeno DLC: Colossus of the South#!\nPedro II. usiluje o zachování demokratické vlády a ochranu občanských svobod zaručených ústavou, stejně jako o konečné ukončení instituce otroctví, která hyzdí Brazílii – navzdory síle konzervativních sil shromážděných proti jeho liberální věci."
 je_brazilian_nation_building_lobby: "#v Odemčeno DLC: Colossus of the South#!\nBrazílie je kolonie bez mateřské země; stát bez národa. Vytvořit jedinou identitu ze všech národů obývajících tuto rozlehlou zemi si vyžádá pečlivé úvahy, splnění herkulovských úkolů a pevnou ruku. Je jednotná Brazílie skutečně možná?"
 ragamuffin_war_minors_lobby: "Lhostejnost brazilské císařské vlády k utrpení jejího lidu již nelze dál snášet. Zvolili jsme si vlastní vládu a prohlásili se za nezávislou republiku!"
 je_canada_can_lobby: "Tím, že získáme ekonomickou převahu nad našimi sousedními koloniemi a zároveň udržíme dobré vztahy s centrální vládou, může náš národ navrhnout anexi jednoho z našich sousedů."
 central_america_falls_apart_lobby: "Středoamerické státy volají po nezávislosti. Dáme jim ji? Brzy nám předloží ultimátum."
 je_reunify_central_america_lobby: "Pokud se Střední Amerika rozpadne na nesourodá léna, bude jen otázkou času, než se některý stát pokusí oblast znovu sjednotit a vést její lid do moderní éry."
 je_gran_colombia_lobby: "#v Odemčeno DLC: Colossus of the South#!\nRozpad státu Velká Kolumbie, rozervaného separatismem ve 30. letech 19. století, byl tragédií. Snaha o jeho obnovení může vyvolat hněv těch, kteří jsou ze sjednocení méně nadšení – úspěšná obnova Velké Kolumbie by však přinesla obrovský užitek všem jejím zakládajícím národům."
 je_boxer_rebellion_lobby: "Ponižující ztráta čínských území ve prospěch cizích „barbarů“ vedla ke vzniku četných milicí inspirovaných bojovými uměními, které hodlají zemi očistit od jakéhokoli cizího vlivu."
 je_opium_obsession_lobby: "Obrovské množství našich lidí propadlo závislosti na opiu. Je to národní hanba, kterou je třeba řešit, ale zároveň si musíme dát pozor na cizí mocnosti, které z obchodu s opiem značně těží."
 je_warlord_china_lobby: "Pokud bude autorita centrální vlády dostatečně podkopána, místní vojenské mocnosti roztrhají zemi na malá léna. Možná však ještě není vše ztraceno. Jedné z těchto mocností se může podařit obnovit Čínu z trosek."
 je_age_of_princes_lobby: "Etiopie byla roztříštěna na tucet válčících lén. Je na nás, abychom říši znovu sjednotili a obnovili mír a prosperitu našeho lidu."
 je_consolidate_afghanistan_lobby: "#v Odemčeno DLC: Sphere of Influence#! \nPropustné a nejasně vymezené hranice afghánských států sloužily jako ohnisko konfliktů v oblasti Pamíru. Vyjednávání s našimi soupeři o vymezení mezinárodně uznávaných hranic Afghánistánu výrazně přispěje ke snížení rizika války."
 je_india_nationalism_britain_lobby: "#v Odemčeno DLC: Pivot of Empire#! \nV celé Indii mezi domorodým obyvatelstvem sílí národní vědomí. Domorodí Indové vzdělaní v britských školách a zaměstnaní koloniální vládou začali agitovat za rovné postavení v rámci imperiálních institucí, větší ekonomické příležitosti a samosprávu."
 je_canada_gbr_lobby: "Přejeme si, aby byly všechny kanadské kolonie sloučeny v jednu a aby vznikl kanadský národ. Abychom toho dosáhli, musíme místní koloniální správy přesvědčit, že sjednocení je v jejich nejlepším zájmu."
 je_conquest_of_algeria_lobby: "#v Odemčeno DLC: Voice of the People#! \nNaše dobytí Alžírska ještě není dokončeno. Dokud francouzská zástava nezavlaje nad každou alžírskou vsí a každý povstalec nebude zlomen v písku, neustaneme. Vive la France!"
 je_divided_monarchists_lobby: "#v Odemčeno DLC: Voice of the People#! \nNa francouzský trůn si činí nárok tři dynastické linie: #bold orléanisté#!, kteří podporují konstituční Červencovou monarchii zřízenou roku 1830, #bold legitimisté#!, kteří podporují sesazeného Karla X. Bourbonského a jeho potomky, a #bold bonapartisté#!, kteří usilují o návrat rodiny Napoleona Bonaparta k moci. Všichni tři dynastičtí monarchisté soupeří o dosazení svých pretendentů na francouzský trůn."
 je_the_paris_commune_france_lobby: "#v Odemčeno DLC: Voice of the People#! \nSkupina socialistických, anarchistických a radikálně republikánských revolucionářů obsadila Paříž a vyhlásila konkurenční vládu nad Francií."
 je_greek_nationalism_lobby: "#italic „Řek není jen ten, kdo obývá království, ale také ten, kdo žije v Janině, Soluni, Seresu, Adrianopoli, Konstantinopoli, Trapezuntu, na Krétě, na Samu nebo v jakékoli jiné zemi řeckých dějin či řeckého rodu...“\n—Ioannis Kolettis#!\n\nJe třeba vyvinout soustředěné úsilí k osvobození a začlenění ostatních řeckých států."
 je_bavarocracy_lobby: "#v Odemčeno DLC: National Awakening#!\nUpevněte moc krále Oty a jeho bavorské kliky, nebo přiveďte rodící se Řecké království k politické změně."
 je_hawaii_lobby: "Poloha Havaje v Tichém oceánu z ní činí mimořádně cenné místo pro transpacifický obchod. Musíme rozvíjet svou ekonomiku dříve, než se některá velmoc pokusí využít naše ostrovy ve svůj prospěch."
 je_haitian_debt_lobby: "Diplomaticky izolovaná a v obavách z další invaze souhlasila haitská vláda v roce 1825 s odškodněním Francie za cenu své nezávislosti. Má-li být Haiti znovu známo jako Perla Antil, musíme se se svými finančními závazky nějak vypořádat."
 je_la_trinitaria_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nNešťastné manželství západní a východní poloviny Hispanioly se hroutí pod tlakem revolučních společností v Santo Domingu. Dokáže je Port-au-Prince vyčistit, nebo bude sjednocené Haiti existovat jen jako historická poznámka pod čarou?"
 je_hungarian_revolution_lobby: "#v Odemčeno DLC: National Awakening#!\nAčkoli se neshodují na přesné povaze budoucího vztahu Uherska s habsburskou monarchií, vlna liberálních vůdců se sjednocuje za společnou touhou po politické a ekonomické reformě s cílem proměnit relativně zaostalé Uhersko v moderní a dynamický národní stát."
 je_risorgimento_lobby: "Jak se Evropou šíří nacionalismus, osobnosti uvnitř naší vlády i mimo ni upírají zrak k obnově jednotné, sjednocené Itálie."
 je_meiji_restoration_lobby: "Šógunát po staletí vládl izolovanému a stagnujícímu Japonsku. Pokud si přejeme mít místo v rychle se modernizujícím světě, musíme obnovit moc právoplatného císaře."
 je_meiji_economy_lobby: "Pokud setrváme na cestě tradice, je jen otázkou času, než nás cizí mocnosti porazí a podrobí si nás. Místo toho musíme náš národ industrializovat, přijmout nové způsoby vlády a ovládnout nová válečná umění, abychom se sami povznesli mezi velmoci."
 je_ryukyu_rivalry_lobby: "Po staletí bylo království Rjúkjú uvězněno mezi dvěma velmocemi. Ačkoli bylo formálně tributářem Číny, po dobytí Sacumou zároveň skládalo věrnost Japonsku, čímž vznikla křehká rovnováha vlivu."
 je_donghak_movement_lobby: "#v Odemčeno DLC: Sphere of Influence#!\nDonghak neboli Východní učení se začalo šířit mezi korejskými rolníky. Nese se na vlně hněvu nad otevřením země okolnímu světu. Prosazuje rovnost a práva pro všechny a odmítnutí cizího vlivu. Může být jen otázkou času, než hnutí propukne v otevřenou vzpouru."
 je_mon_serb_unity_lobby: "#v Odemčeno DLC: National Awakening#!\nČernohorci se považují za Srby odloučené od svých soukmenovců tyranskými Osmany. Pokud by se hranice jejich zemí setkaly, možná by se mohli sjednotit jako bratři."
 je_mon_state_formation_lobby: "#v Odemčeno DLC: National Awakening#!\nDokáže si Černá Hora vydobýt respekt velmocí tím, že se z uskupení bojovných kmenů vyvine v moderní stát?"
 je_montenegrin_raiding_lobby: "#v Odemčeno DLC: National Awakening#!\nKvůli nedostatku orné půdy jsou černohorské kmeny při přežití odkázány na nájezdy na osmanské území."
 je_mughal_hindustan_lobby: "#v Odemčeno DLC: Pivot of Empire#!\nNaši páni kdysi vládli od Kábulu až po karnátacké pobřeží. Každým rokem však takzvané „velmoci“ upírají našemu dvoru autoritu, prestiž a tradice, kterým se kdysi těšil. Potomci Tímúra nyní sotva vládnou za zdmi dillíské Červené pevnosti!\n\n#N #bold Musíme jednat, abychom zachránili naši říši, jinak upadne v zapomnění.#!#!"
 je_land_reclamation_lobby: "Nizozemsko je hustě osídlené a orná půda je stále vzácnější. Prostřednictvím velkých inženýrských děl můžeme získat novou půdu z moře."
 je_splitting_oman_lobby: "Po smrti sultána Saída Ál Busaídího si jeho synové zemi jistě rozdělí mezi její arabské a africké državy, zatímco budou soupeřit o nadvládu."
 je_christ_of_nations_lobby: "Jako byl Kristus umučen Římany, tak bylo i Polsko umučeno rukama svých nepřátel; a jako je Kristu souzeno znovu přijít ve své slávě, tak je tomu souzeno i Polsku."
 je_poland_lithuania_lobby: "Hranice staré Republiky sahaly daleko za země Poláků a Litevců až do širé Rusi. Tak tomu bude znovu."
 je_amazonas_lobby: "Je třeba podniknout kroky k přeměně Amazonie z nehostinné džungle na intenzivně rozvinutou zemi schopnou uspokojit požadavky obchodu."
 je_andean_federation_lobby: "#v Odemčeno DLC: Colossus of the South#!\nNejzazším rozsahem ambicí Simóna Bolívara byla jeho navrhovaná Federace And, velká konfederace celé Latinské Ameriky. Navzdory jejímu počátečnímu neúspěchu na Panamském kongresu se vítr obrátil a hrozba evropského a amerického pronikání vytvořila prostředí pro možné oživení této myšlenky."
 je_philippines_development_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nNárůst mezinárodního obchodu připravil půdu pro rozvíjející se střední třídu, která navzdory pokračujícím politickým otřesům získává větší vliv. Díky jednomu z nejnavštěvovanějších přístavů v oblasti jsou ostrovy plné příležitostí pro ty, kdo je hledají."
 je_philippines_main_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nNapětí na Filipínách roste. Španělští duchovní ovládají světský i náboženský život, zatímco místní kněží vedou vzpoury proti jejich autoritě. Od generálního guvernéra se nakonec očekává, že nad souostrovím udrží železnou vládu. Převládne španělská vláda, nebo se filipínskému lidu podaří získat větší svobody?"
 je_filipino_ethnogenesis_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nFilipíny byly dlouho domovem mnoha různorodých národů. Chceme-li vybudovat silný a moderní stát, musí vzniknout nová panfilipínská identita."
 je_unite_the_principalities_lobby: "Podunajská knížectví se probudila ze své dlouhé letargie. Práva a zájmy vlasti volají po osvobození; dobro a štěstí rumunského národa!"
 je_great_reformer_lobby: "Nástup Alexandra II. na ruský trůn mnozí reformátoři oslavují jako příležitost zcela přetvořit zastaralé struktury našeho mocného státu."
 je_pacify_the_steppes_lobby: "#v Odemčeno DLC: Sphere of Influence#!\nNavzdory nominální ruské kontrole nad kazašskou stepí od 18. století sužují toto území banditismus a neloajalita. Kazašští povstalci začali znovu a znovu útočit na naše zásobovací konvoje a pevnosti v oblasti. Musí být vypátráni a zpacifikováni."
 je_conquest_of_central_asia_lobby: "#v Odemčeno DLC: Sphere of Influence#!\nAbychom zajistili naši jižní hranici, čelili britské moci v Indii a otevřeli trasy, jimiž můžeme rozšířit ruský vliv na Blízký východ, car vydal pověření zřídit protektoráty po celé Střední Asii a rozšířit naši říši do vlastního Turkestánu."
 je_francocracia_lobby: "#v Odemčeno DLC: Colossus of the South#!\nS podporou svých obávaných Pyraguës, formy tajné policie, vládl doktor Francia zemi pevnou rukou a kdykoli bylo třeba, vyměnil hedvábnou rukavici za železnou pěst. Stárne však a není jisté, zda Franciova vize izolacionistického, rousseauovského ráje přežije samotného dobrého doktora."
 je_modernizing_paraguay_lobby: "#v Odemčeno DLC: Colossus of the South#!\nCarlos Antonio López zahájil ambiciózní program modernizace a rozšíření našich ozbrojených sil. Koneckonců jen ony mohou skutečně chránit zájmy národa, ať už leží kdekoli."
 je_expanding_paraguay_lobby: "#v Odemčeno DLC: Colossus of the South#!\nKolem nás naši sousedé manévrují a kují pikle, aby nám vyrvali kontrolu nad našimi posvátnými zeměmi. Máme snad pokorně čekat, až nepřítel učiní první krok? Ne. Stejně jako naši předkové si musíme vytvořit vlastní štěstí."
 je_eastern_frontier_lobby: "#v Odemčeno DLC: Sphere of Influence#!\nJe třeba podniknout rozhodné kroky k opětovnému začlenění vzpurných zemí na našem východě. Dobytí těchto oblastí nám umožní osvobodit a znovu usadit zotročené perské komunity, pokud si to budeme přát."
 je_portugal_regeneration_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nVe snaze napravit staletý úpadek a nastolit nový liberální řád představila vláda plány na rozsáhlé institucionální reformy."
 je_the_pink_map_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nKoloniální správci se již dlouho zabývají myšlenkou pozemního propojení portugalské západní a východní Afriky. Nastal čas tuto vizi uskutečnit."
 je_second_liberalism_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nKonec liberálních válek přinesl Portugalsku ústavní vládu. Dokážou reformátoři upevnit své postavení a dovést svou vizi do konce, nebo se Portugalsko obrátí k reakci či radikalismu?"
 je_schleswig_holstein_question_lobby: "Šlesvicko-holštýnská otázka nyní zaměstnává myšlenky a síly německých nacionalistů. Aby Německo mohlo postoupit k národnímu sjednocení, musí být německý lid Holštýnska nejprve osvobozen od svých dánských vládců."
 je_german_unification_idea_lobby: "Myšlenky nacionalismu se mezi německým lidem šíří jako požár. Jakmile tyto ideály dosáhnou kritického množství stoupenců v různorodých státech Německého spolku, nevyhnutelně přijde tlak na národní sjednocení."
 je_german_unification_lobby: "Nastal čas podniknout rozhodný krok k německému sjednocení. Jako jeden z předních německých států máme povinnost tento cíl uskutečnit."
 je_princely_states_lobby: "#v Odemčeno DLC: Pivot of Empire#!\nPříliv je nám nakloněn, abychom zvýšili svou autonomii a vydali se cestou k nezávislosti, jinak Britové převezmou plnou kontrolu."
 je_serbian_throne_lobby: "#v Odemčeno DLC: National Awakening#!\nPodle informátorů chystá rod Karađorđevićů, rodina, jejíž zakladatel byl kdysi znám jako hrdina srbského lidu, sesazení vládnoucího rodu Obrenovićů."
 je_the_balkan_league_lobby: "#v Odemčeno DLC: National Awakening#!\nPokud balkánské národy získají svobodu ze sevření Osmanské říše, panuje shoda na vytvoření aliance, která je jednou provždy zatlačí zpět. Balkán patří svým autentickým obyvatelům, navzdory staletím poroby."
 je_sikh_sovereignty_lobby: "#v Odemčeno DLC: Pivot of Empire#!\nNaše rozvíjející se království dosáhlo v letech od chvíle, kdy Šér-e-Paňdžáb dobyl bývalé mughalské císařské hlavní město, velkých úspěchů. V této chvíli je zásadní, abychom chránili své území před vnější agresí a ctili zásady naší sikhské víry. Kéž je odkaz této dynastie dlouhotrvající!"
 je_the_two_spains_lobby: "#v Odemčeno DLC: Iberian Twilight#!\n„Zde leží polovina Španělska. Zemřela rukou té druhé.“\n— Mariano José\n\nRozdělení mezi liberály a konzervativci je obzvlášť citelné ve Španělsku, kde jsou obě strany uvězněny v neúprosném boji o ideologickou převahu."
 je_the_first_carlist_war_lobby: "Smrt Ferdinanda VII. by způsobila, že ve Španělsku znovu vystrčí svou ohyzdnou hlavu válka. Bratr zesnulého krále Carlos zpochybňuje platnost pragmatické sankce z roku 1830 a shromáždil konzervativní frakce proti liberální vládě dětské královny Isabely. Osud Španělska nyní visí na vlásku."
 je_spa_economic_regeneration_master_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nZastaralá a vytlačovaná konkurencí, španělská ekonomika nutně potřebuje reformu. Zahájením rozsáhlého a ambiciózního reformního programu se země může povznést k novým výšinám."
 je_sick_man_main_lobby: "Osmanská říše je po staletí v úpadku. Musíme rychle jednat, modernizovat se a obnovit své místo mezi velmocemi. Je toho mnoho k vykonání: modernizace armády, potlačení separatismu, prosazení vzdělávacích a byrokratických reforem a znovuzískání Sýrie."
 je_tur_raided_lobby: "#v Odemčeno DLC: National Awakening#!\nČernohorské kmeny podnikající nájezdy na naši hranici musí být vykázány do patřičných mezí, ale dokážeme tyto násilné křesťany potlačit, aniž bychom čelili hněvu velmocí?"
 je_great_eastern_crisis_lobby: "#v Odemčeno DLC: National Awakening#!\nNa Balkáně se schyluje ke krizi a my musíme udržet kontrolu nad svým územím, zatímco secesionisté ohrožují naši vládu. Současné nepokoje musí být potlačeny dříve, než se rozšíří po celé oblasti."
 je_unite_the_nations_lobby: "Abychom my i naši bratři přežili, musíme se spojit. Jen sjednoceni budeme schopni odolat diplomatickému i násilnému postupu kolonizačních mocností u našich prahů."
 je_acw_war_lobby: "Pokud otázku otroctví nebude možné vyřešit mírovou cestou, může naši požehnanou zemi postihnout velká občanská válka."
 je_indian_removal_lobby: "Prezident v rozporu s Nejvyšším soudem nařídil, aby se národ Čerokíů přesunul na Indiánské teritorium."
 je_acw_equality_lobby: "Jak náš národ rozšiřuje své hranice, snem mnohých je žít v systému, který uznává všechny muže, ze Severu i Jihu, černé i bílé, za skutečně rovné."
 je_cuba_espanol_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nKuba zůstává věrná Španělsku. Tak věrná, že reformisté mezi statkáři usilují o uznání ostrova nikoli jako kolonie, ale jako formální provincie Španělska."
 je_cuba_la_vida_dulce_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nKuba ovládla obchod s cukrem, především díky pokračujícímu pašování otroků. Dlouhodobá prosperita země bude záviset na rozšíření těchto zavedených obchodních tras. A pokud bude otroctví zrušeno, možná jednoho dne budou moci všichni Cubanos těžit ze sladšího života."
 je_cuba_independencia_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nKubánská touha po svobodě je rozdělená. Někteří hledají spojence za Mexickým zálivem a doufají, že svobodu ostrova koupí americkými mincemi místo kubánskou krví. Na podlahách doutníkových továren si zatím muži šeptají o svobodné Kubě, nespoutané žádnou mocí kromě vášně a vůle svého lidu."
 je_lands_of_anarchy_lobby: "#v Odemčeno DLC: Iberian Twilight#!\nMaroko bylo dlouho rozděleno mezi takzvané země vlády, kde je autorita sultána silně pociťována, a země anarchie, kde jsou vazby na Dár al-Machzen přinejlepším jen nominální. Má-li Maroko odolat svým stále bojovnějším sousedům, musí anarchie ustoupit pořádku."
