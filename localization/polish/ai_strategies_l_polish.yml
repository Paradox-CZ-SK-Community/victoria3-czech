  OUR_ENTIRE_COUNTRY: "naše celá [concept_country|l]"
  ai_attitude_aloof: "#V Vzdálený#!"
  ai_attitude_aloof_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za svého #bold de jure vládce#! v geopolitických záležitostech, ale spokojeně akceptuje stávající stav. Je nepravděpodobné, že by aktivně usilovali o zvýšení autonomie, ale také nepravděpodobné, že by se shodli na požadavcích na další integraci."
  ai_attitude_aloof_tooltip: "#header $ai_attitude_aloof$ [concept_attitude]#!\n$ai_attitude_aloof_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_antagonistic: "#V #N Antagonistický#!#!"
  ai_attitude_antagonistic_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #N #bold hrozivou sílu#!#! v geopolitických záležitostech. Je pravděpodobné, že vyhledají bližší vztahy se svými nepřáteli a mohou se připojit k [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] k odporu proti jejich expanze."
  ai_attitude_antagonistic_tooltip: "#header $ai_attitude_antagonistic$ [concept_attitude]#!\n$ai_attitude_antagonistic_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_belligerent: "#V #N Nepřátelský#!#!"
  ai_attitude_belligerent_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #N #bold cíl dobytí#!#! v geopolitických záležitostech. Je pravděpodobné, že zahájí [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] proti [TARGET_COUNTRY.GetName], pokud se domnívají, že mají výhodu."
  ai_attitude_belligerent_tooltip: "#header $ai_attitude_belligerent$ [concept_attitude]#!\n$ai_attitude_belligerent_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_cautious: "#V Opatrný#!"
  ai_attitude_cautious_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #bold neznámý faktor#! v geopolitických záležitostech. Považují [TARGET_COUNTRY.GetName] za relevantní pro své zájmy, ale dosud se nerozhodli, zda je vidí jako přítele nebo nepřítele."
  ai_attitude_cautious_tooltip: "#header $ai_attitude_cautious$ [concept_attitude]#!\n$ai_attitude_cautious_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_conciliatory: "#V #P Smířlivý#!#!"
  ai_attitude_conciliatory_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #P #bold omylného nepřítele#!#! v geopolitických záležitostech. Je pravděpodobné, že se pokusí napravit [concept_relations] a ukončit jakoukoli probíhající [concept_rivalry]."
  ai_attitude_conciliatory_tooltip: "#header $ai_attitude_conciliatory$ [concept_attitude]#!\n$ai_attitude_conciliatory_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_cooperative: "#V #P Kooperativní#!#!"
  ai_attitude_cooperative_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #P #bold potenciálního přítele#!#! v geopolitických záležitostech. Mohou usilovat o bližší [concept_relations] s [TARGET_COUNTRY.GetName] a pravděpodobně budou otevřeni diplomatickým návrhům."
  ai_attitude_cooperative_tooltip: "#header $ai_attitude_cooperative$ [concept_attitude]#!\n$ai_attitude_cooperative_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_defiant: "#V #N Vzdorovitý#!#!"
  ai_attitude_defiant_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za jejich #N #bold despota#!#! v geopolitických záležitostech. Pokusí se posílit sami sebe a získat větší autonomii, ale nebudou usilovat o úplnou nezávislost."
  ai_attitude_defiant_tooltip: "#header $ai_attitude_defiant$ [concept_attitude]#!\n$ai_attitude_defiant_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_disinterested: "#V Nezávislý#!"
  ai_attitude_disinterested_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #bold zemi s malým zájmem#! v geopolitických záležitostech. Je nepravděpodobné, že se zapojí do jakékoli formy diplomatické interakce s námi."
  ai_attitude_disinterested_tooltip: "#header $ai_attitude_disinterested$ [concept_attitude]#!\n$ai_attitude_disinterested_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_domineering: "#V #N Dominantní#!#!"
  ai_attitude_domineering_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #N #bold přirozený subjekt#!#! v geopolitických záležitostech. Je pravděpodobné, že se pokusí učinit z nás [concept_subject], nebo dále integrovat [TARGET_COUNTRY.GetName], pokud jsme již jejich [concept_subject]."
  ai_attitude_domineering_tooltip: "#header $ai_attitude_domineering$ [concept_attitude]#!\n$ai_attitude_domineering_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_genial: "#V #P Přívětivý#!#!"
  ai_attitude_genial_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #P #bold žádoucího spojence#!#! v geopolitických záležitostech. Je pravděpodobné, že budou usilovat o bližší [concept_relations] a chtějí vytvořit [concept_defensive_pact] nebo [concept_alliance] s námi."
  ai_attitude_genial_tooltip: "#header $ai_attitude_genial$ [concept_attitude]#!\n$ai_attitude_genial_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_human: "#V Člověk#!"
  ai_attitude_human_desc: "[COUNTRY.GetName] je řízen lidským hráčem a jejich postoj vůči [TARGET_COUNTRY.GetName] je zcela na nich."
  ai_attitude_human_tooltip: "#header $ai_attitude_human$#!\n$ai_attitude_human_desc$"
  ai_attitude_loyal: "#V #P Loajální#!#!"
  ai_attitude_loyal_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za jejich #P #bold spravedlivého suveréna#!#! v geopolitických záležitostech. Je pravděpodobné, že vyhoví žádostem na snížení [concept_autonomy] a mohli by dokonce souhlasit s anexí svým [concept_overlord]."
  ai_attitude_loyal_tooltip: "#header $ai_attitude_loyal$ [concept_attitude]#!\n$ai_attitude_loyal_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_protective: "#V #P Ochranný#!#!"
  ai_attitude_protective_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #P #bold potřebující jejich ochranu#!#! v geopolitických záležitostech. Je pravděpodobné, že zasáhnou na naší straně v [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] a mohou navrhnout [TARGET_COUNTRY.GetName], aby se stalo jejich [concept_subject]."
  ai_attitude_protective_tooltip: "#header $ai_attitude_protective$ [concept_attitude]#!\n$ai_attitude_protective_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_rebellious: "#V #N Rebelantský#!#!"
  ai_attitude_rebellious_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za jejich #N #bold tyranského utlačovatele#!#! v geopolitických záležitostech. Je pravděpodobné, že se pokusí o [concept_diplomatic_play] pro nezávislost, pokud věří, že mohou vyhrát."
  ai_attitude_rebellious_tooltip: "#header $ai_attitude_rebellious$ [concept_attitude]#!\n$ai_attitude_rebellious_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
  ai_attitude_wary: "#V #N Opatrný#!#!"
  ai_attitude_wary_desc: "[COUNTRY.GetName] považuje [TARGET_COUNTRY.GetName] za #N #bold potenciální hrozbu#!#! v geopolitických záležitostech. Zmíněný stát bude méně otevřený diplomacii a mohl by vyhledávat aliance k ochraně proti nám."
  ai_attitude_wary_tooltip: "#header $ai_attitude_wary$ [concept_attitude]#!\n$ai_attitude_wary_desc$\n$TOOLTIP_DELIMITER$\n$ATTITUDE_DETAILS$"
