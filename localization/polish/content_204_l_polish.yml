 je_positivist_movement_reason: "Stoupenci společenské teorie pozitivismu se v zemi [ROOT.GetCountry.GetName] začali organizovat za politickou reformu. Pozitivisté se chtějí soustředit na budoucnost země [ROOT.GetCountry.GetNameNoFormatting] a na to, aby se národ rozvíjel a industrializoval pod správou technických odborníků.\n\nÚčinky po dokončení tohoto [concept_journal_entry] budou záviset na míře vlivu, kterou si #bold pozitivisté#! zajistí.\n\n#italic Pozitivismus je filosofická teorie, podle níž lze všechny věci odvodit pomocí logiky a rozumu ze smyslového poznání. Pozitivistické hnutí prosazuje reformy založené na vědeckých principech, aby překročilo teoretizovaná „teologická“ a „metafyzická“ stadia lidského vývoje a vytvořilo společnost založenou na úplném poznání přírodního světa.#!"
 is_democratic_tt: "Tento národ umožňuje [Concept('concept_votes','$concept_voting$')] v [Concept('concept_election','$concept_elections$')]"
