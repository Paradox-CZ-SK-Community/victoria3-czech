 positivism.1.t: "Uctívat lidstvo"
 positivism.1.d: "[SCOPE.sCharacter('comte_scope').GetFullName], filozof věd na École Polytechnique ve státě [SCOPE.sState('paris_scope').GetName], vydal pojednání o reorganizaci společnosti podle pozitivistických principů."
 positivism.1.f: "„Z morálního, vědeckého či básnického hlediska je stejně cenný; a je to jediný princip, který může lidstvo bezpečně provést nejhrozivější krizí, jakou dosud prošlo. Nyní bude všem jasné, že síla důkazu, síla příznačná pro moderní dobu, která si stále uchovává mnoho ze své ničivé povahy, pozitivismem dozrává a povznáší se.“\n\n—Auguste Comte, #italic Všeobecný pohled na pozitivismus#!" #- Auguste Comte
 positivism.1.a: "Zajímavý přínos pro akademickou obec země [ROOT.GetCountry.GetAdjective]."
 positivism.1.b: "Jeho myšlenka sociální fyziky si zaslouží bližší pohled."
 positivism.1.c: "Přeje-li si změnit společnost, může to zkusit."
 comte_recruited_tt: "[SCOPE.sCharacter('comte_scope').GetFullName] bude dostupný jako [concept_agitator]"
