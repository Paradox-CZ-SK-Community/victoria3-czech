 andean_federation.1.t: "Návrh federace"
 andean_federation.1.d: "Růst země [ROOT.GetCountry.GetName] v mocný, sjednocený národ inspiroval radikální stoupence ambice Simóna Bolívara. Tito vizionáři navrhují znovu se vrátit k cíli Panamského kongresu: založit sjednocenou federaci táhnoucí se podél celých And."
 andean_federation.1.f: "Sjednocená Jižní Amerika: žádná šelma není tak divoká a žádný člověk tak velký jako nová #italic patria.#! Rozptýlené děti Španělska přivedené pod jedinou zástavu. Nová konfederace vybudovaná na bratrské krvi, nikoli na smlouvě s dalekým králem vynucené hlavní děla.\n\nCesta ke sjednocení bude dlouhá a zrádná. Ale nic, co stálo za vykonání, nebylo nikdy snadné."
 andean_federation.1.a: "Národy Jižní Ameriky budou společně silnější."
 andean_federation.1.b: "Tento plán je lehkovážný a arogantní."
 andean_federation_b_tt: "[concept_journal_entry] #bold Bolívarova ambice#! bude zrušen"
 andean_federation.2.t: "Velké sjednocení"
 andean_federation.2.d: "Naše roky úsilí konečně přinesly ovoce a panandský sen byl konečně uskutečněn. Síla země [ROOT.GetCountry.GetName] zajistí, že nás žádný cizí nepřítel nebude moci dobýt."
 andean_federation.2.f: "Pero opustilo papír. Kladívko udeřilo a poté přišlo oznámení. Jásot propukl napříč kontinentem, od nejvyšších vrcholů až po nejhlubší údolí. Ačkoli se toho nikdy nedožil, velký sen Simóna Bolívara se konečně naplnil. Sen o sjednocené, hispanofonní jihoamerické federaci, neústupné a pravé. Kéž Andská federace stojí pevně jako samotné hory."
 andean_federation.2.a: "Stůjme společně a oslavme tento úspěch."
 andean_federation.2.b: "Musíme pokračovat ve své práci na odstrašení zahraniční agrese."
 je_la_plata: "Río de la Plata"
 je_la_plata_reason: "Anarchie dvacátých let pohřbila veškeré naděje, které staré Spojené provincie Río de la Plata měly na sjednocení platinských států pod jedinou vládou, a vedla ke vzestupu země [ROOT.GetCountry.GetName] z jejich popela. Snaha o jejich návrat může vyvolat hněv těch, kdo nejsou sjednocením tolik nadšeni - úspěšná obnova Río de la Plata by však byla nesmírným přínosem pro všechny její zakládající národy."
