 je_war_of_the_confederation: "Válka konfederace"
 je_war_of_the_confederation_reason: "Díky většímu obyvatelstvu evropského původu, nevyužitým zdrojům a strategické poloze představuje upevněná #bold Peruánsko-bolivijská konfederace#! existenční hrozbu pro národní zájmy země [SCOPE.sCountry('home_country_scope').GetAdjective]. Aby byla zachována rovnováha moci, musí být #bold konfederace#! buď učiněna přátelskou vůči našemu státu, nebo silou rozložena.\n\nAmbicím #bold Peruánsko-bolivijské konfederace#! lze zabránit tím, že ji donutíme propustit její [Concept('concept_subject', '$concept_subjects$')] předtím, než ukazatel postupu dosáhne #variable 100 %#!."
