 je_gran_colombia: "Velká Kolumbie"
 je_gran_colombia_reason: "Rozpad Velké Kolumbie, rozervané separatismem ve 30. letech 19. století, byl tragédií jak pro [ROOT.GetCountry.GetName], tak pro naše sesterské bolívarovské národy. Snaha o jeho návrat může vyvolat hněv těch, kdo nejsou sjednocením tolik nadšeni - úspěšná obnova Velké Kolumbie by však byla nesmírným přínosem pro všechny její zakládající národy."
