 je_coffee_with_milk: "Káva s mlékem"
 je_coffee_with_milk_reason: "Rozvoj zemědělského odvětví země [ROOT.GetCountry.GetAdjective] soustředil značnou míru bohatství do rukou zemědělských baronů „kávy a mléka“. Nedávný kávový rozmach vytvořil velkou příležitost k růstu — ale také velké riziko soustředěného politického vlivu v rukou agrární skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName].\n\nÚčinky po dokončení tohoto [concept_journal_entry] budou záviset na stavu zákonů #bold Pozemkové reformy#! země [ROOT.GetCountry.GetName]"
 coffee_with_milk_0_tt: "Ukazatel postupu #variable Káva s mlékem#! dosáhl #variable 0 %#! přijetím a udržováním zákona #bold Pozemkové reformy#! jiného než [GetLawType('law_serfdom').GetName] nebo [GetLawType('law_tenant_farmers').GetName] a držením skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] mimo vládu"
