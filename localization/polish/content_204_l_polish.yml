 je_south_american_national_identity_emergence: "[ROOT.GetCountry.GetAltAdjective('yy')] národ"
 je_south_american_national_identity_emergence_reason: "Nezávislost země [ROOT.GetCountry.GetName] na Španělsku vyvolala v celém národě první projevy nacionalismu. Jak náš národ postupuje do budoucnosti, naši intelektuálové se snaží formulovat novou identitu, která je zřetelně a výhradně kulturou [SCOPE.sCulture('new_national_culture').GetName].\n\nNásledující podmínky prospějí procesu rozvoje naší #bold národní identity#!:\n• [Concept('concept_interest_group','$concept_interest_groups$')] s ideologií [GetIdeology('ideology_patriotic').GetName] nebo [GetIdeology('ideology_liberal').GetName], které jsou [concept_in_government] nebo mají vysoký [concept_clout]\n• Probíhající [Concept('concept_war','$concept_wars$')] s vysokou [concept_war_support]\n• Budovy [GetBuildingType('building_university').GetName], [GetBuildingType('building_art_academy').GetName] a [GetBuildingType('building_government_administration').GetName] s vysokou [concept_occupancy]\n• Vysoká národní [concept_prestige]\n• Nevlastnění [Concept('concept_homeland','$concept_homelands$')] nepatřících kultuře [SCOPE.sCulture('old_national_culture').GetName]\n\nPostup tohoto #bold národního probuzení#! by měl příští měsíc postoupit o #tooltippable;tooltip:[Country.GetTooltipTag],je_south_american_national_identity_emergence_special_tooltip [Country.MakeScope.Var('national_identity_progress_var_next').GetValue|+=]#!.\n\n@warning! Dokončení tohoto [concept_journal_entry] vyloučí zemi [ROOT.GetCountry.GetName] z usilování o #bold větší pannárodní ambice#!"
 je_south_american_national_identity_emergence_special_tooltip: "Tato míra je určena následovně:\n#variable [Country.MakeScope.Var('national_identity_progress_from_igs').GetValue|+=]#! z [concept_clout] [Concept('concept_interest_group','$concept_interest_groups$')] s ideologiemi [GetIdeology('ideology_patriotic').GetName] a [GetIdeology('ideology_liberal').GetName]\n#variable [Country.MakeScope.Var('national_identity_progress_from_wars').GetValue|+=]#! z probíhajících [Concept('concept_war','$concept_wars$')]\n#variable [Country.MakeScope.Var('national_identity_progress_from_universities').GetValue|+=]#! z budov [GetBuildingType('building_university').GetName], [GetBuildingType('building_art_academy').GetName] a [GetBuildingType('building_government_administration').GetName]\n#variable [Country.MakeScope.Var('national_identity_progress_from_prestige').GetValue|+=]#! z [concept_prestige]\n#variable [Country.MakeScope.Var('national_identity_progress_from_homelands').GetValue|+=]#! z vlastnění [Concept('concept_homeland','$concept_homelands$')] nepatřících [Concept('concept_primary_cultures','$concept_primary_culture$')]\n#variable [Country.MakeScope.Var('national_identity_progress_var_add').GetValue|+=]#! z dalších účinků"
