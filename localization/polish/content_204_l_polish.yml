 communism.10.t: "Utlačovatel a utlačovaní"
 communism.10.d: "Jak se naše průmyslová odvětví stávala stále zásadnějšími pro budoucnost národa země [ROOT.GetCountry.GetAdjective], rostla i dělnická třída. Roztříštěná dělnická hnutí se začala sjednocovat pod věcí socialismu."
 communism.10.f: "„...rozvoj moderního průmyslu tedy pod nohama buržoazie podřezává samotný základ, na němž buržoazie vyrábí a přivlastňuje si výrobky. Buržoazie tak vyrábí především své vlastní hrobaře. Její pád i vítězství proletariátu jsou stejně nevyhnutelné.“" #- The Communist Manifesto
 communism.10.a: "Blíží se bouře."
 communism.10.b: "Svět bude jednou svobodný."
 communism_var_tick_05_tt: "#bold Socialistické#! nepokoje se budou každý měsíc #bold zvyšovat#! o #variable 0,5#!"
 communism.11.t: "Protipožární pás"
 communism.11.d: "Ať už díky důvěře našeho lidu, nebo obuškům našich vojáků, [ROOT.GetCountry.GetName] vyšla nezlomena z vlny socialistické agitace, která ji ohrožovala."
 communism.11.f: "Stále občas vídali pamflety - zetlelé papírové mrtvoly uvězněné ve stokách, obalené sazemi a blátem, s výrazným červeným a černým inkoustem odřeným drsnými kameny a ještě drsnějšími kroky. Policie se neobtěžovala je sbírat, protože je považovala za urážku svých rukavic - nebo si snad uvědomovala, že jejich padlé zbytky působí jako silnější prohlášení než jejich úplné zmizení."
 communism.11.a: "Triumf pro celou zemi [ROOT.GetCountry.GetNameNoFormatting]."
 communism.11.b: "Věci už nikdy nebudou stejné."
 communism_je_1_fail_tt: "Postavy s ideologiemi [GetIdeology('ideology_communist').GetName], [GetIdeology('ideology_anarchist').GetName] a [GetIdeology('ideology_vanguardist').GetName] se budou v zemi [ROOT.GetCountry.GetNameNoFlag] objevovat mnohem častěji"
 communism_je_1_complete_tt: "Socialistické hnutí země [ROOT.GetCountry.GetAdjectiveNoFlag] bude v blízké budoucnosti oslabeno"
 modifier_defeated_initial_socialist_movement: "Vítězství proti socialismu"
 modifier_defeated_initial_socialist_movement_worries: "Nadcházející válka"
 culture_south_america.4.t: "Náš vlastní národ"
 culture_south_america.4.d: "Dědictví nezávislosti našeho národa na Španělsku podnítilo počátky rozvinuté národní identity. Začaly konflikty mezi vizí jedinečné a nezávislé země [ROOT.GetCountry.GetName] a snem o nedělitelné Latinské Americe."
 culture_south_america.4.f: "Po staletí hřměla děla, nejprve namířená proti těm, kdo vzdorovali dobytí, a poté proti těm, kdo chtěli připoutat národ k jeho bývalému pánovi. Neformální mír nastal s útěkem španělských armád - ale děla ve skutečnosti nikdy neutichla. Zůstávají na ramenou, namířená dovnitř i ven, čekající na konec tohoto chvilkového zmatku a na jediný cíl, který budou pronásledovat."
 culture_south_america.4.a: "Naše vlast učinila další krok ke svobodě."
 culture_south_america.4.b: "Jsme jen jedním národem mezi mnoha."
