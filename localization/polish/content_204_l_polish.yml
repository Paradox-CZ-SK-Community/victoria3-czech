 gran_colombia.1.t: "Velká Kolumbie"
 gran_colombia.1.d: "Vzhledem k nedávnému vývoji se určité osobnosti ve vládě [ROOT.GetCountry.GetRuler.GetLastName] začaly zajímat o snahu sjednotit severní bolívarovské státy a obnovit bývalý stát Velká Kolumbie."
 gran_colombia.1.f: "Uhlíky snu Simóna Bolívara jsou stále v živé paměti. V nejstarších obyvatelích země [ROOT.GetCountry.GetNameNoFormatting] se probouzí nacionalistické pohnutky. Ti, kdo mají dost bystrý sluch, aby naslouchali, se nyní obracejí ke svým sousedům. Možná není tak přitažené za vlasy vidět v sousedovi bratra.\n\nMožná nastal čas, s čerstvou myšlenkou národa. Jediné, co je třeba udělat, je zničit ty, kdo by se jí postavili."
 gran_colombia.1.a: "Naše síla, kdysi ztracená, bude znovu nalezena."
 gran_colombia.1.b: "Respektujeme suverenitu svých sousedů."
 gran_colombia_b_tt: "[concept_journal_entry] #bold Velká Kolumbie#! bude zrušen"
 gran_colombia.2.t: "Znovukování snu"
 gran_colombia.2.d: "Díky velkému úsilí byl stát [ROOT.GetCountry.GetName] obnoven. S jeho vzestupem se dříve nezávislé státy severních And staly jedním nedělitelným národem."
 gran_colombia.2.f: "Po nesčetných dnech nepokojů a krvi tisíců se na světové scéně objevuje nový hráč. Jeden národ, jeden účel, všichni bratři konečně zbavení španělské koruny. V Jižní Americe nadešel nový den. Před Bohem i lidmi nechť všichni vědí, že Velká Kolumbie stojí vzpřímeně."
 gran_colombia.2.a: "Tento den bude zapsán do dějin!"
 gran_colombia.2.b: "Nezapomněli jsme na své karibské přátele."
 radicalise_haitian_caribenos_tt: "Haiti zasáhne vlna nacionalistické agitace kultury [SCOPE.sCulture('caribeno_scope').GetName]"
 je_andean_federation: "Bolívarova ambice"
 je_andean_federation_reason: "Největším rozsahem ambicí Simóna Bolívara byla jím navrhovaná Andská federace, velká konfederace celé Latinské Ameriky. Navzdory jejímu počátečnímu neúspěchu na Panamském kongresu se vítr obrátil a hrozba evropského a amerického pronikání vytvořila prostředí pro možné oživení této myšlenky."
