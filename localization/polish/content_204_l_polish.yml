 positivism.2.t: "Pozitivistická církev"
 positivism.2.d: "[SCOPE.sCharacter('positivist_agitator').GetFullName], student filozofie pozitivismu, založil ve státě [SCOPE.sState('positivist_church_state').GetName] Pozitivistickou církev země [ROOT.GetCountry.GetNameNoFormatting]. Události církve se staly místem setkávání pozitivistických intelektuálů."
 positivism.2.f: "Pamflety poletovaly z rukou do ulic nového kostela. Jedna strana slibuje konec morální anarchie a druhá zvěstuje nový věk emancipace skrze vzdělání. Učení teoretici od stolu, skuteční učenci, úředníci i bankéři nalezli ideál hledící vpřed. Ideál pokroku jako cíle, řádu jako základu a lásky jako vládnoucí pravdy."
 positivism.2.a: "Zajímavá instituce."
 positivism.2.b: "Další eklektický, krátkodechý kult."
 positivism.3.t: "Pozitivní epocha"
 positivism.3.d: "Práce pozitivistů hluboce zakotvila jejich principy v odborných kruzích země [ROOT.GetCountry.GetName]. Principy pozitivismu budou po mnoho dalších let zaručeně vést odborné instituce země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 positivism.3.f: "„Velký den. Slavný den! Jeden kolektiv, jeden účel. Dnes zde v tomto chrámu máme knihovníky a dělníky, obchodníky a staré panny, tesaře a úředníky. Jak velký den, když vidíme tolik lidí pracovat na zlepšení údělu bližního. Změňme tedy pořad dnešních událostí: začněme tím, že si navzájem nabídneme znamení pokoje.“"
 positivism.3.a: "Blížíme se k dalšímu stupni svého vývoje."
 positivism.3.b: "Mohou udělat víc, aby nás vedli vpřed."
 positivist_leaders_spawn_tt: "Pozitivistické postavy se v budoucnu budou v zemi [SCOPE.sCountry('home_country_scope').GetName] objevovat mnohem častěji"
 positivism.4.t: "Podivný kult"
 positivism.4.d: "Po krátkém období významu začal pozitivistický trend v zemi [ROOT.GetCountry.GetName] upadat, protože reformátoři ze střední třídy hledají jiné rámce pro analýzu svých problémů. Se slábnoucí popularitou bude Pozitivistická církev brzy považována jen za další pomíjivý kult."
 positivism.4.f: "Na prodej: Chrám humanity, odsvěcený.\n\nKrásná poloha v srdci [SCOPE.sState('capital_scope').GetCityHubName]. Pevná konstrukce a prostorný interiér, vhodný pro stovky stejně smýšlejících lidí při jakémkoli shromáždění. Ideální pro vznikající školu.\n\nDotazy vítány."
 positivism.4.a: "Další velkolepý plán, který upadl v zapomnění."
 positivism.4.b: "Budou své nemožné sny pronásledovat navěky."
 remove_positivism_vars_tt: "[Concept('concept_interest_group', '$concept_interest_groups$')] již nebudou mít vyšší pravděpodobnost výběru pozitivistických postav"
 positivism_pulse.1.t: "Praktičtí pozitivisté"
 positivism_pulse.1.d: "Filozofie pozitivismu se rozšířila za hranice Pozitivistické církve a mnozí [GetPopType('engineers').GetName], [GetPopType('academics').GetName] a [GetPopType('officers').GetName] přijali její vědecké principy, aby naplnili své reformní ambice."
 positivism_pulse.1.f: "Přirozené právo bylo jednou z prvních věcí, které za tohoto nového soudce padly. Jedno úderem kladívka tak skončily veškeré nároky na „přirozenost“ u každého člověka usilujícího o náhradu za poškozené zboží. Pokud k tomu neexistoval výslovný příkaz vlády, nebyl to zákon, jímž by se bylo třeba řídit. Pouze pokyny k výkladu, dokud nebudou vydány příkazy."
 positivism_pulse.1.a: "Velký přínos pro reformní věc."
 positivism_pulse.1.b: "Pro politiku jistě existují rozumnější fóra."
 positivist_leaders_spawn_increase_tt: "Pozitivistické postavy se budou v zemi [SCOPE.sCountry('home_country_scope').GetName] po příštích 10 let objevovat častěji"
 positivist_leaders_spawn_increase_small_tt: "Pozitivistické postavy se budou v zemi [SCOPE.sCountry('home_country_scope').GetName] po příštích 10 let objevovat o něco častěji"
 positivism_pulse.2.t: "Vojenská věda"
 positivism_pulse.2.d: "Praktická a vědecká povaha pozitivismu vedla k rostoucí oblibě pozitivistického myšlení ve skupině [SCOPE.gsInterestGroup('armed_forces_ig').GetName]. Mnozí profesoři a důstojníci ve vojenských akademiích země [ROOT.GetCountry.GetAdjective] začali tuto filozofii přijímat."
 positivism_pulse.2.f: "Racionálním pozorováním a osobním porozuměním může velitel otesat válečné stroje do jemně vyladěného výpočtu. Přesného výpočtu, které dělostřelectvo dokáže dodat na cíl správné množství munice, se započtením proměnných, pro maximální účinek a minimální ztráty. Muži zásobení a vyzbrojení přesně tím, co budou potřebovat, plus něco navíc, a s právě dostatečnou motivací k útoku na pevnost.\n\nVálky daleké budoucnosti se mohou stát krvavějšími, ale budou alespoň efektivní."
 positivism_pulse.2.a: "Základ pro novou vojenskou doktrínu."
 positivism_pulse.2.b: "Akademie by měla tento trend dále přijmout."
 positivism_pulse.2.c: "Tento postoj by mohl podpořit reformní návrhy [SCOPE.sCharacter('armed_forces_leader').GetFullName]."
 military_academy_positivist_tt: "Pozitivisté získají vliv v akademiích skupiny [SCOPE.gsInterestGroup('armed_forces_ig').GetName]"
 positivism_pulse.3.t: "Nová generace"
 positivism_pulse.3.d: "Rozšíření pozitivistického učení ve vojenských akademiích země [ROOT.GetCountry.GetAdjective] vedlo k tomu, že generace důstojnických kadetů ve skupině [SCOPE.gsInterestGroup('armed_forces_ig').GetName] je vzdělávána v jeho principech."
 positivism_pulse.3.f: "„Kapitáne, doufám, že mi dokážete pár věcí vysvětlit. Vaši muži čtou o republikanismu místo výcviku. Místo nácviku na přehlídky krákorají o teorii. Když dostanou volno na bohoslužbu, malují. Proč ve jménu Božím děláte z mých vojáků nedělní debutantky?“\n\n„Aby byli v poli pružnější, pane. Přeji si, aby muži pod mým velením přežili i beze mě. Musí umět myslet, kdybych byl příliš mrtvý na to, abych myslel za ně.“"
 positivism_pulse.3.a: "Měli by se držet vojenských záležitostí."
 positivism_pulse.3.b: "Skupinu [SCOPE.gsInterestGroup('armed_forces_ig').GetName] by mohli jen zlepšit."
 armed_forces_positivists_tt: "Skupina [SCOPE.gsInterestGroup('armed_forces_ig').GetName] bude v budoucnu s větší pravděpodobností vybírat pozitivistické vůdce"
 armed_forces_positivists_large_tt: "Skupina [SCOPE.gsInterestGroup('armed_forces_ig').GetName] bude mnohem pravděpodobněji vybírat pozitivistické vůdce, když bude [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement]"
 positivism_pulse.4.t: "Teorie a praxe"
 positivism_pulse.4.d: "Několik významných pozitivistických zastánců reforem se zapletlo do sporu s Pozitivistickou církví ohledně svých politických aktivit. Ortodoxní stanovisko církve zní, že její členové by neměli vykonávat politické aktivity mimo ni samotnou."
 positivism_pulse.4.f: "Na ředitelově stole ležely dva stohy dopisů: jeden od duchovních Pozitivistické církve a druhý od volného uskupení praktiků kdesi ve vládě. Všechny spadaly do jedné z několika málo skupin témat: odsouzení tohoto soupeře, podpora tohoto spojence, prosba o podporu nebo varování, aby se držel dál od nějaké intriky.\n\nSáhl po karafě rumu. Zdá se, že politika je vlastní každé církvi."
 positivism_pulse.4.a: "Církev není jediným arbitrem této věci."
 positivism_pulse.4.b: "Jejich praktiky představují porušení pozitivistických principů."
 positivism_pulse.5.t: "Chrámy humanity"
 positivism_pulse.5.d: "Pozitivistická církev země [ROOT.GetCountry.GetNameNoFormatting] požádala o povolení postavit další chrám ve státě [SCOPE.sState('temple_of_humanity_state').GetName]. Navrhovaný „Chrám humanity“ bude sloužit jako významné centrum pozitivistických aktivit."
 positivism_pulse.5.f: "„Už jeden chrám v [SCOPE.sState('capital_scope').GetCityHubName] je a teď chtějí další v [SCOPE.sState('temple_of_humanity_state').GetCityHubName]? To na nás jistě všechny přivolá inkvizici.“\n\n„Nebojil bych se. Stejně znějí jako katolíci. Pokud vůbec nějaká inkvizice bude, prostě vezmou kněze a pokřtí je. Možná by to byl skutečný důvod jít v neděli na mši.“\n\n„Ty nechodíš v neděli na mši? Co si o tom myslí tvoje matka?“"
 positivism_pulse.5.a: "Není na tom nic škodlivého."
 positivism_pulse.5.b: "Do státu [SCOPE.sState('temple_of_humanity_state').GetName] nebudou šířit nepořádek."
 je_positivist_movement_embrace_positivism_button: "Podpořit pozitivistickou filozofii"
 je_positivist_movement_embrace_positivism_button_desc: "Poskytněte politickou podporu postavám šířícím pozitivistickou filozofii v ozbrojených silách a středních třídách."
 je_positivist_movement_suppress_positivism_button: "Potlačit pozitivistické organizace"
 je_positivist_movement_suppress_positivism_button_desc: "Potlačte činnost pozitivistických organizací, abyste zabránili šíření této nebezpečné filozofické tendence."
 positivist_cooldown_tt: "V uplynulém #bold roce#! nebylo použito žádné rozhodnutí #bold Pozitivního stadia#!"
 cooldown_year_tt: "Rozhodnutí #bold Pozitivního stadia#! budou znovu dostupná za #bold jeden rok#!"
 modifier_cristo_redentor_rejected: "Odmítnutá socha Krista"
 modifier_cristo_redentor_accepted: "Přijatá socha Krista"
 modifier_cristo_redentor_funds: "Přesměrované prostředky Týdne památníku"
 modifier_cr_devout_bonus: "Kristus Spasitel"
 modifier_cr_symbol_of_rio: "Kristus Spasitel"
 je_cristo_redentor: "Kristus Spasitel"
 je_cristo_redentor_reason: "Přívrženci skupiny [SCOPE.gsInterestGroup('devout_ig').GetName], usilující o prokázání své víry a odpor vůči domnělé „bezbožnosti“ ve společnosti země [ROOT.GetCountry.GetAdjective], vybrali prostředky na vytvoření sochy Ježíše Krista na vrcholu hory Corcovado ve státě [SCOPE.sState('rio_state').GetName]."
 cristo_redentor.1.t: "Týden památníku"
 cristo_redentor.1.d: "Katolický kroužek státu [SCOPE.sState('rio_state').GetName] předložil návrh na výstavbu sochy Ježíše Krista na vrcholu hory Corcovado. Skupina vybrala významnou částku peněz, která má být použita na její výstavbu."
 cristo_redentor.1.f: "„Svět patří Kristu a Svatému otci. Jsme součástí Stvoření a socha by to měla odrážet. Určitě by nebylo tak obtížné dát mu do ruky glóbus.“\n\n„Silvo, tyto projekty vždy stojí víc času, pracovní síly i peněz, než plánuješ. Nebylo by jednodušší mít znamení míru? Paže roztažené a vítající? Stavební čety nám za to poděkují.“\n\n„Ano, Carlosi, ale... ach, samozřejmě. Křížové objetí. Jeho poselství bylo o míru; tato socha bude také o míru.“"
 cristo_redentor.1.a: "Jejich dílo bude velkým symbolem města."
 cristo_redentor.1.b: "Peníze lépe poslouží na dobročinné účely."
 cristo_redentor_construct_tt: "Cristo Redentor lze postavit pomocí [concept_political_lens] ve státě [SCOPE.sState('rio_state').GetName]"
 cristo_redentor.2.t: "Vysvěcení"
 cristo_redentor.2.d: "Socha Krista Spasitele na hoře Corcovado byla dokončena a vysvěcena zástupci skupiny [SCOPE.gsInterestGroup('devout_ig').GetName]. Dokončená třicetimetrová socha nyní hrdě stojí nad státem [SCOPE.sState('rio_state').GetName]."
 cristo_redentor.2.f: "Uprostřed rozptýlené mlhy v horách odhalila baterie reflektorů konečné dílo. Beránek Boží stojící na velkém podstavci nad [SCOPE.sState('rio_state').GetCityHubName], s roztaženýma rukama připravenýma vítat všechny. Ať už věřící, nebo obdivovatel řemesla, každý nyní může spatřit tento triumf inženýrství."
 cristo_redentor.2.a: "Socha bude sloužit jako trvalý symbol země [ROOT.GetCountry.GetName]."
 cristo_redentor.2.b: "Velkolepý projev oddanosti skupiny [SCOPE.gsInterestGroup('devout_ig').GetName]"
 je_agricultural_development: "Řeka kávy"
 je_agricultural_development_reason: "[ROOT.GetCountry.GetName] je požehnána obrovským množstvím úrodné zemědělské půdy a klimatem vhodným pro pěstování vysoce výnosných tržních plodin. To poskytuje velkou příležitost obohatit národ a vynést produkty země [ROOT.GetCountry.GetAdjectiveNoFormatting] do celosvětového povědomí."
