l_polish:
 je_the_krakow_uprising: "Krakovské povstání"
 je_the_krakow_uprising_reason: "[concept_revolution], která zachvacuje svobodné město [SCOPE.sCountry('krakow_scope').GetName], hrozí rozpoutat další vlnu polské nacionalistické agitace v Haliči. Město musí být pacifikováno a začleněno jako plnohodnotná součást země [ROOT.GetCountry.GetName]."
 krakow_uprising_happened_tt: "Krakov nedávno zažil [concept_revolution]"
 krakow.1.t: "Manifest k polskému národu"
 krakow.1.d: "Když ve svobodném městě [SCOPE.sCountry('krakow_scope').GetName] propuká revoluce, radikální polští nacionalisté vydali manifest vyzývající k všeobecnému volebnímu právu, zrušení nevolnictví a znovusjednocení Polska."
 krakow.1.f: "Poláci!\n\nHodina povstání udeřila - celé Polsko povstává a srůstá v jedno - naši bratři v Poznaňském knížectví, v Kongresovém Polsku, v Litvě a v Rusíni již povstali a bojují s nepřítelem.\n\nOd nynějška mezi sebou neznáme žádný rozdíl. Jsme nyní bratři, synové jedné vlasti, s jedním otcem, Bohem na nebesích! Volejme k němu o pomoc a on požehná našim zbraním a dá nám vítězství!"
 krakow.1.a: "Musíme okamžitě obnovit kontrolu nad Krakovem."
 krakow.1.b: "Jsme zavázáni zachovat stav daný Vídeňskou smlouvou."
 krakow.2.t: "Velkovévodství krakovské"
 krakow.2.d: "Po rozdrcení revoluce v Krakově bylo bývalé svobodné město začleněno do Království haličsko-vladiměřského jako Velkovévodství krakovské. Tento čin v Evropě vyvolal kontroverzi kvůli porušení Vídeňské smlouvy."
 krakow.2.f: "„Každý plán pojatý umírněně musí selhat, když jsou okolnosti dovedeny do krajnosti.“\n\n— Klemens von Metternich"
 krakow.2.a: "Zaměřte se na zmírnění diplomatických následků."
 krakow.2.b: "Pokračujte v potlačování jejich radikální ideologie."
 je_the_krakow_uprising_annex_button: "Obsaďte Krakov"
 je_the_krakow_uprising_annex_button_desc: "Obsadíme svobodné město Krakov, abychom je proměnili v nedílnou součást našeho státu"
 modifier_repressing_polish_nationalism: "Potlačování polského nacionalismu"
 modifier_mitigating_diplomatic_consequences: "Zmírňování porušení smlouvy"
 je_the_red_scare: "Rudá panika"
 je_the_red_scare_reason: "Vznik mocného komunistického režimu v cizí zemi vyvolal v určitých vrstvách obyvatelstva obavy, že [ROOT.GetCountry.GetName] bude další zemí, která padne komunismu.\n\nDomácí politické proudy s levicovými programy se dostaly pod dohled protikomunistických sil, neboť jsou obviňovány z toho, že jsou předzvěstmi krvavé revoluce a agenty cizích mocností."
 red_scare_unlock_tt: "Jakákoli [concept_country] s [concept_rank] vyšší než #variable Lokální mocnost#!, o kterou máme [concept_interest], přijala [concept_law] [GetLawType('law_council_republic').GetName]"
 red_scare.1.t: "Rudá panika"
 red_scare.1.d: "Vzestup komunistického režimu v zemi [SCOPE.sCountry('red_scare_target_nation').GetName] vyvolal v celé společnosti země [ROOT.GetCountry.GetAdjective] pocit hrůzy a nedůvěry. Mnozí se bojí, že [ROOT.GetCountry.GetNameNoFormatting] bude další zemí, která padne komunismu."
 red_scare.1.f: "Každé noviny ve stánku nesly titulek extrémnější než ty předchozí. Ječící kameloti je nabízeli na nárožích a vysílali do ulic soupeřící tvrzení o zvěrstvech a hrůze.\n\n„Vrazi a šílenci se chopili moci v zemi [SCOPE.sCountry('red_scare_target_nation').GetNameNoFormatting]!“ křičel jeden z nich. „Nalezená „Rudá bible“ odhaluje program světových revolucionářů!“ volal další. A mezi nimi všemi pochodovalo deset tisíc doširoka otevřených uší, nasávajících každé senzační slovo, zatímco spěchaly ke svým stanicím."
 red_scare.1.a: "Může se to stát i tady!"
 red_scare.1.b: "Panika by byla zcela neopodstatněná."
 red_scare.2.t: "Znárodnění žen"
 red_scare.2.d: "Po vládních slyšeních o činnosti komunistického režimu v zemi [SCOPE.sCountry('red_scare_target_nation').GetName] přinesly noviny po celé zemi [ROOT.GetCountry.GetName] senzační příběhy o tom, že všechny dospělé ženy v zemi [SCOPE.sCountry('red_scare_target_nation').GetName] byly znárodněny jako společný majetek."
 red_scare.2.f: "„Viděl jsem to na vlastní oči, než jsem uprchl. Rudé úřady nařídily kolektivní orgie, při nichž není žádná úcta k ctnostným ženám. Ministerstvo volné lásky je všechny nutí účastnit se pod hrozbou bajonetu.“\n\n„Aby bylo jasno, tvrdíte, že dívka v zemi [SCOPE.sCountry('red_scare_target_nation').GetNameNoFormatting] se dosažením osmnáctého roku okamžitě stává majetkem státu?“\n\n„Ano, ano. Jejich jména jsou vyvěšena na nástěnce v jejich městech a všichni způsobilí muži si je smějí libovolně brát za ženy, kolik jen chtějí...“\n\n„Ale i když jsou provdané, stále se musí účastnit orgií?“"
 red_scare.2.a: "Komunisté si jdou pro naše ženy!"
 red_scare.2.b: "Toto svědectví se zdá být velmi podezřelé."
 red_scare.3.t: "Komunistická zločinnost"
 red_scare.3.d: "Zvěsti o zvěrstvech komunistů v zemi [SCOPE.sCountry('red_scare_target_nation').GetName] dorazily do tisku země [ROOT.GetCountry.GetAdjective] a zprávy o zločinech proti lidskosti a navršených mrtvolách zaplnily titulní strany novin."
 red_scare.3.f: "„Slyšel jste o těch bombových útocích onehdy? Tentokrát to byl právník. Jeden z těch velkých, kteří radí vládě.“\n\n„Další? Nebesa, to je už třetí tento měsíc. Tohle má být bezpečná země.“\n\n„Bezpečná? Pche, ne s těmi komunistickými krysami pobíhajícími kolem. Zabijí nás všechny, pokud před nimi nejdřív nepoklekneme.“"
 red_scare.3.a: "Kdo by tušil, že lidé mohou být tak barbarští?"
 red_scare.3.b: "Měli by pro změnu jednou vydat něco jiného."
 red_scare.4.t: "Rudá revoluce; žluté titulky"
 red_scare.4.d: "Noviny sympatizující se zájmy skupiny [SCOPE.gsInterestGroup('anticommunist_press_ig').GetName] otiskly četné příběhy o revolučních touhách komunistů v zemi [ROOT.GetCountry.GetName]. Články líčí křiklavé obrazy stávek a plánovaného terorismu."
 red_scare.4.f: "#bold Rudý mor hnisá#! \n\nDopisovatelé z celého světa hlásili nepřirozené záchvěvy myšlenky nejodpornější: že člověk už nemá mít nárok na pot své tváře. Že mnozí pracovití občané země [SCOPE.sCountry('red_scare_target_nation').GetAdjectiveNoFormatting] už nemají přirozená práva ke svému majetku. A že jeho soukromí není víc než pomíjivá touha.\n\nTouto myšlenkou je komunismus a přichází si pro všechny v zemi [ROOT.GetCountry.GetNameNoFormatting]."
 red_scare.4.a: "Musíme dostat tuto situaci pod kontrolu!"
 red_scare.4.b: "Nemůžeme si dovolit mít na rukou paniku."
 red_scare.5.t: "Nebezpečné hodiny"
 red_scare.5.d: "[SCOPE.sCharacter('anticommunist_person').GetFullName], obzvlášť významná postava ve skupině [SCOPE.gsInterestGroup('anticommunist_ig').GetName], vznesl ostrá obvinění z komunistického pronikání do tisku země [ROOT.GetCountry.GetAdjective] i do samotné vlády."
 red_scare.5.f: "„Co navrhujete, abychom udělali? Ztrácíme lid. Jsem si jistý, že vám jejich nálady nemusím diktovat.“\n\n„Ne... ne, to nemusíte. Dal bych své království za pořádné odvedení pozornosti od neduhů naší vlády. Nejlépe nějaké, které bude věrohodněji krvežíznivé než my.“\n\n„U Jova, to je ono! Jak se jmenovala ta hrozná ideologie? Ať už je to kterákoli, svolejte ihned noviny!“"
 red_scare.5.a: "Předvolejte obviněné před vyšetřovací výbor."
 red_scare.5.b: "[SCOPE.sCharacter('anticommunist_person').GetSheHe|U] by měl pro tato tvrzení předložit nějaké důkazy."
 red_scare.6.t: "Nativistická nespokojenost"
 red_scare.6.d: "Nativisté v řadách skupiny [SCOPE.gsInterestGroup('nativist_ig').GetName] vydali prohlášení označující lidi kultury [SCOPE.sCulture('council_republic_culture').GetName] v zemi [ROOT.GetCountry.GetName] za komunistické infiltrátory. Tato rétorika už vedla ke zločinům proti lidem kultury [SCOPE.sCulture('council_republic_culture').GetName]."
 red_scare.6.f: "Byli nevinní. Všech šest bylo zproštěno viny. Nebo alespoň polovina z nich byla, než zaslechli výkřiky o zmatečném procesu. Nyní je tu měl zabít justiční omyl vykonaný rukama samozvanců. Pokud nebyli zastřeleni ve svých celách, byli vytaženi za krk ven, pověšeni a poté zastřeleni. Popraveni za zločin, že se narodili jako [SCOPE.sCulture('council_republic_culture').GetNameNoFormatting]. A země za to davu poděkuje."
 red_scare.6.a: "Co se s tím dá dělat?"
 red_scare.6.b: "Zastavte toto chování, než se rozšíří."
 red_scare.7.t: "Hon na rudé"
 red_scare.7.d: "Na vlně rudé paniky se v zemi [ROOT.GetCountry.GetName] zformovalo nové a zuřivě reakční politické hnutí pod vedením horlivého antikomunisty [SCOPE.sCharacter('fascist_agitator').GetFullName], které volá po neúnavném odporu vůči řádění komunistů v zahraničí i doma."
 red_scare.7.f: "Dunění bubnů se stalo novým rysem víkendů. Posměšné výkřiky a demonstrace síly v ulicích byly měsíc od měsíce hlasitější a větší. V jejich čele stála vycházející hvězda jakési politické frakce příliš malé na to, aby přitáhla větší pozornost. Ale [SCOPE.sCharacter('fascist_agitator').GetSheHe] si rychle získal pozornost médií závislých na pobouření."
 red_scare.7.a: "[SCOPE.sCharacter('fascist_agitator').GetFullName] je skutečný vlastenec země [ROOT.GetCountry.GetAdjective]!"
 red_scare.7.b: "Tato rétorika se zdá být stejně extremistická."
 anticommunists_more_fascist_tt: "Skupina [SCOPE.gsInterestGroup('anticommunist_ig').GetName] bude mít o něco vyšší pravděpodobnost výběru postav typu #variable fašista#!"
 red_scare.8.t: "Pochod proti míru"
 red_scare.8.d: "Protestující inspirovaní prudkou rétorikou [SCOPE.sCharacter('anticommunist_leader').GetFullName] uspořádali pochod v [SCOPE.sState('capital_scope').GetCityHubName] a volají po vojenské intervenci proti komunistickému režimu v zemi [SCOPE.sCountry('red_scare_target_nation').GetName]."
 red_scare.8.f: "To, co začalo jako několik desítek křičících mužů v ulicích, narostlo v těleso čítající tisíce. To, co začalo jako pokojná demonstrace, přerostlo ve skandování ohně a hněvu, všechno lačnící po krvi. To, co začalo jako projev strachu, se proměnilo ve výzvu k akci.\n\nJejich požadavky byly jednoduché: vytrhnout [SCOPE.sCountry('red_scare_target_nation').GetAdjectiveNoFormatting] hrozbu, ať to stojí cokoli."
 red_scare.8.a: "Musíme zachránit lid země [SCOPE.sCountry('red_scare_target_nation').GetAdjectiveNoFormatting] před ním samým."
 red_scare.8.b: "Energii lidu je nejlepší využít k něčemu konstruktivnějšímu."
 red_scare.9.t: "Tváří v tvář revoluci"
 red_scare.9.d: "Policisté pronásledující zvěsti o údajně plánovaném komunistickém povstání ve státě [SCOPE.sState('communist_uprising_state').GetName] vyvolali mezi místní veřejností značný strach. Místní skeptici odsuzují toto narušení pořádku jako terorismus sám o sobě."
 red_scare.9.f: "„Nejsem si jistý, že tomu rozumím, superintendente. Chcete, abychom šli v hluboké noci, zatímco všichni spí, do tohohle bloku a provedli razii v tom skladišti na základě #italic podezření#!, že by to #italic mohlo#! být komunistické shromaždiště?“ \n\n„Přesně to po vás chci, seržante. Mohu se tedy spolehnout, že tento úkol splníte, nebo vám mám dobrovolně přidělit nějaké muže?“"
 red_scare.9.a: "Pokud se nic nestane, znamená to, že jsme odvedli svou práci."
 red_scare.9.b: "Není důvod věřit, že je to věrohodné."
 red_scare.10.t: "Bílí emigranti"
 red_scare.10.d: "Proud bohatých emigrantů kultury [SCOPE.sCulture('council_republic_culture').GetName], prchajících před komunistickým režimem v zemi [SCOPE.sCountry('red_scare_target_nation').GetName], hledá útočiště v zemi [ROOT.GetCountry.GetName] a přináší s sebou příběhy o revoluční hrůze a nespoutaných proletářských výstřelcích."
 red_scare.10.f: "„Nejhorší byla ta nová tajná policie, úplně jako ta stará. Sbírali lidi, které neměli rádi, obvykle když byla všude tma a ticho. Někdy i ve dne. A když jsme kdy viděli vozy s alkoholem mířit k jejich kancelářím... no, naše sousedy jsme už nikdy neviděli. Museli jsme pryč.“\n\n„Velmi statečné. Tady se o vás dobře postaráme. Cokoli pro nejřádnější občany země [SCOPE.sCountry('red_scare_target_nation').GetNameNoFormatting].“"
 red_scare.10.a: "Dejte jim platformu, aby mohli vyprávět své příběhy."
 red_scare.10.b: "Tragický průvod."
 red_scare.11.t: "Progresivní dilemata"
 red_scare.11.d: "Odpor proti politice komunistů země [SCOPE.sCountry('red_scare_target_nation').GetAdjective] vedl k rostoucímu tlaku na progresivní vůdce skupiny [SCOPE.gsInterestGroup('progressive_ig').GetName], aby výslovně odsoudili vládu země [SCOPE.sCountry('red_scare_target_nation').GetName]."
 red_scare.11.f: "Tyčili se nad ním, nejméně půl tuctu mužů, všichni stavění na zvedání cisteren. Zpočátku šlo jen o zdvořilostní návštěvu napajedla. Jakýsi kluk čerstvě z polí ho poznal nad půllitrem. Pak si výčepní vzpomněla na jeho chválu vlády země [SCOPE.sCountry('red_scare_target_nation').GetNameNoFormatting]. Teď už to byl početný dav se šesti siláky v čele.\n\n„No... věc se [SCOPE.sCountry('red_scare_target_nation').GetNameNoFormatting] je...“"
 red_scare.11.a: "Za věc [SCOPE.gsInterestGroup('progressive_ig').GetLeader.GetIdeology.GetName], ne za tu [SCOPE.sCountry('red_scare_target_nation').GetAdjective]!"
 red_scare.11.b: "Tato cesta nevede k ničemu než k dalším vynuceným ústupkům."
 red_scare.11.c: "Socialistická věc v zemi [ROOT.GetCountry.GetName] je beznadějná."
 red_scare.12.t: "Anarchisté před soudem"
 red_scare.12.d: "Obzvlášť krvavá ozbrojená loupež ve státě [SCOPE.sState('red_scare_victim_state').GetName] vedla k zatčení a odsouzení dvou mužů kultury [SCOPE.sCulture('sacco_and_vanzetti_culture').GetName], o nichž je známo, že jsou anarchisté. Důkazy proti mužům jsou chatrné a soudce byl obviněn z rasových i ideologických předsudků."
 red_scare.12.f: "Vystřelené nábojnice na místě loupeže: to bylo podle orgánů činných v trestním řízení usvědčující spojení. Nalezení anarchistické literatury byla třešnička na kaši. Hodil by se kdokoli, ale tito muži kultury [SCOPE.sCulture('sacco_and_vanzetti_culture').GetNameNoFormatting] byli příhodnou mašlí. Netrvalo by dlouho, než je porota odsoudí."
 red_scare.12.a: "Vrazi si zaslouží ochutnat vlastní medicínu."
 red_scare.12.b: "Dlouhý trest vězení postačí."
 red_scare.13.t: "Tváří v tvář křeslu"
 red_scare.13.d: "Jak se blíží poprava dvou anarchistů kultury [SCOPE.sCulture('sacco_and_vanzetti_culture').GetName] odsouzených za vraždu, ve velkých městech vypukly protesty jak skeptiků vůči odsouzení, tak komunit kultury [SCOPE.sCulture('sacco_and_vanzetti_culture').GetName] po celé zemi."
 red_scare.13.f: "Města z celého světa pozvedla prapory široko daleko za dva odsouzené vrahy. Dokonce i města napříč zemí [ROOT.GetCountry.GetNameNoFormatting] povstala na protest proti rozsudku. Titulky a dopisy z každého centra protestu mají jedno společné vlákno: násilí. Násilí proti násilí. A další násilí je téměř jisté, pokud popravy nebudou odloženy."
 red_scare.13.a: "Protesty nezmění to, co udělali."
 red_scare.13.b: "Povolte jim odklad a nový proces."
 red_scare.14.t: "[SCOPE.sCountry('red_scare_target_nation').GetAdjective] archa"
 red_scare.14.d: "Když zatčení komunisté začínají proudit do věznic země [ROOT.GetCountry.GetAdjective], představitelé vlády navrhli deportovat ty z nich, kteří nejsou občany, do země [SCOPE.sCountry('red_scare_target_nation').GetName] na palubě pronajaté nákladní lodi."
 red_scare.14.f: "„Stejně jako plavba archy, kterou postavil Noe, byla příslibem zachování lidského rodu, tak je plavba [SCOPE.sCountry('red_scare_target_nation').GetAdjectiveNoFormatting] archy příslibem zachování země [ROOT.GetCountry.GetNameNoFormatting].“" #- NY Evening Journal
 red_scare.14.a: "Nádherně poetický návrh."
 red_scare.14.b: "Odpykají si své tresty na naší půdě."
 red_scare.15.t: "Levicoví zástupci ohroženi"
 red_scare.15.d: "Skupině místních zástupců ve shromáždění státu [SCOPE.sState('red_scare_victim_state').GetName] bylo pohroženo vyloučením z tohoto orgánu kvůli jejich spojení se stranou [SCOPE.sParty('red_scare_victim_party').GetName]. Jejich obhájci toto opatření odsoudili jako nepřátelské demokracii."
 red_scare.15.f: "„Pět mužů před námi bylo zvoleno na platformě, která je naprosto nepřátelská zájmům tohoto orgánu i země [ROOT.GetCountry.GetNameNoFormatting]. Jsou příznivci revoluční tyranie, cizí agenti a spojenci nepřátelských národů. Proto nemají právo stát v mocenském postavení. Okamžitě vyhlašuji hlasování o jejich vyloučení z tohoto orgánu...“"
 red_scare.15.a: "Strana [SCOPE.sParty('red_scare_victim_party').GetName] si zaslouží vše, co dostane."
 red_scare.15.b: "Je chybou připravit je o příležitosti k pokojné diskusi."
 red_scare.20.t: "Jemnější teror"
 red_scare.20.d: "Po letech soupeřící propagandy a společenské nedůvěry rudá panika opadla na zvládnutelnější úroveň. Ačkoli mnozí zůstávají ostražití vůči komunistické činnosti, dny bezkonkurenčního strachu v zemi [ROOT.GetCountry.GetName] relativně skončily."
 red_scare.20.f: "„Překročili jsme ve svém politickém vývoji fázi, kdy je hon na kacíře povoleným sportem.“\n\n— Charles Evans Hughes"
 red_scare.20.a: "Náš národ bude učiněn bezpečným."
 red_scare.20.b: "Musíme činit pokání za vlastní výstřelky."
