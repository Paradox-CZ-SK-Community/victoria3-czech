 coffee_with_milk.1.t: "Pramínek kávy"
 coffee_with_milk.1.d: "[ROOT.GetCountry.GetName] má obrovský potenciál - rozsáhlou plochu orné půdy a dokonalé klima pro pěstování cenných tržních plodin. Toto bohatství může být klíčem k vyřešení nejisté situace hospodářství země [ROOT.GetCountry.GetAdjectiveNoFormatting] po získání nezávislosti."
 coffee_with_milk.1.f: "V největším rozsahu se celková oblast kdysi ovládaná Portugalskem rozkládala přes pětinu kontinentu. Brazílie se nyní rozprostírá po těchto zemích, s vodními tepnami napájejícími savany, mokřady, deštné pralesy, zvlněné kopce i hory. Při správném životním poli by zde někde mohlo růst cokoli, co člověk zná. Taková rozlehlost by však potřebovala čas, úsilí a řeku krve, aby byla zkrocena k užitku. Řád a pokrok dlouho čekat nebudou."
 coffee_with_milk.1.a: "Vývozní hospodářství nás přivede do modernity."
 coffee_with_milk.1.b: "Úsilí našich plantážníků by mělo pokračovat."
 coffee_with_milk.2.t: "Kávové pokladnice"
 coffee_with_milk.2.d: "Místní vlády ve státě [SCOPE.sState('reinvestment_state').GetName], velmi bohatém státě zapojeném do plantážního hospodářství, zahájily program reinvestování výnosů z obchodu s kávou. To jeho rozvoj posílilo ještě více oproti jiným státům země [ROOT.GetCountry.GetAdjective]."
 coffee_with_milk.2.f: "„Kolik kávových plantáží dokáže jeden národ nacpat do jediné oblasti? Zdá se, že každý muž i jeho pes tu buď pracuje na kávové plantáži, nebo nějakou vlastní.“\n\n„Měl bys vidět další správu. Krávy kam oko dohlédne. Každý slušný Brazilec musí mít ke kávě mléko.“\n\n„To vysvětluje, proč je tam vzduch tak zatuchlý.“"
 coffee_with_milk.2.a: "[SCOPE.sState('reinvestment_state').GetName] je tepajícím srdcem země [ROOT.GetCountry.GetNameNoFormatting]."
 coffee_with_milk.2.b: "Ústřední vláda musí dostat svůj podíl."
 coffee_with_milk.3.t: "Nelítostná pole"
 coffee_with_milk.3.d: "Kvůli nedostatku ochotných pracovníků pro obsluhu budovy [SCOPE.sBuilding('population_building').GetName] ve státě [SCOPE.sState('population_state').GetName] hledají místní [GetPopType('aristocrats').GetName] řešení, jak pro svá pole získat více levné pracovní síly."
 coffee_with_milk.3.f: "P. M., přístavnímu správci,\nJistě vám nemusím při psaní tohoto listu připomínat bedny kávy proudící z našich přístavů do úst Američanů a Evropanů všeho druhu. Říkají mi, že tuny putují na naše lodě, aby navštívily všechny kouty světa. A jistě víte, že sběr těchto drahocenných zrn je pod naším sluncem práce lámající záda. Ostatní vlastníci plantáží a já jsme dospěli k jakémusi vzájemnému porozumění: potřebujeme více masa, abychom nakrmili nemilosrdné slunce a naše krvežíznivé plodiny. Co Britové nevědí, to jim jistě neublíží."
 coffee_with_milk.3.a: "Podpořte evropskou migrující pracovní sílu."
 coffee_with_milk.3.b: "Usilujte o rozšíření otroctví, aby se mezera zaplnila."
 coffee_with_milk.4.t: "Café com leite"
 coffee_with_milk.4.d: "S růstem zemědělství země [ROOT.GetCountry.GetAdjective] se agrární plantážnická třída výrazně obohatila. Tuto třídu ztělesňují baroni „kávy a mléka“ ze států [SCOPE.sState('coffee_state').GetName] a [SCOPE.sState('milk_state').GetName], kteří se nyní snaží svůj vliv ještě více rozšířit."
 coffee_with_milk.4.f: "„Měl bys vědět, že je to méně demokratické, než si myslíš. Jde spíš o volbu, jaký druh břečky chceme víc: kravince, nebo připálenou kávu.“\n\n„Jak zlé by to mohlo být, člověče? Nemůže to být horší než volit mezi toryi v prohnilém obvodu.“\n\n„Coronelové napříč státy... ehm... užívají si ve své moci mnoho svobod. Chovají se spíše jako loupeživí baroni než jako osvícení muži.“"
 coffee_with_milk.4.a: "Důsledky růstu."
 coffee_with_milk.5.t: "Strom peněz"
 coffee_with_milk.5.d: "Úspěšný rozvoj zemědělství země [ROOT.GetCountry.GetAdjective] výrazně posílil hospodářství našeho národa. Plody našeho obchodu lze vidět na každém kontinentu, kde ochucují čaj v Londýně a popíjejí se z kouřících hrnků v New Yorku."
 coffee_with_milk.5.f: "Nejnovější daňové zprávy byly nezpochybnitelné: mléko a káva tvořily většinu, ne-li všechny produkty některých správ. Tytéž daně a přístavní cla platily nejméně třiceti brazilským studentům v zahraničí a jen čtyřem vědeckým institutům. Silnice, nemocnice a knihovny koupené a zaplacené kravami a kávou.\n\nNebo spíše coronely, kteří obchod ovládali."
 coffee_with_milk.5.a: "Přípitek těm, kteří to umožnili!"
 coffee_with_milk.5.b: "Jednoho dne se musíme rozšířit za hranice zemědělství."
 coffee_with_milk.6.t: "Oligarchické třenice"
 coffee_with_milk.6.d: "Zemědělští oligarchové méně významného severovýchodního státu [SCOPE.sState('northeast_state').GetName] ostře protestují proti domnělé nadvládě států [SCOPE.sState('coffee_state').GetName] a [SCOPE.sState('milk_state').GetName] nad politickým systémem země [ROOT.GetCountry.GetAdjective]."
 coffee_with_milk.6.f: "„Zdá se, že všechno, co dnes děláme, diktuje jen [SCOPE.sState('coffee_state').GetNameNoFormatting]. A kvůli čemu? Kávě? Pche, k čemu je jejich káva ve srovnání s potravinami, natož s cukrem a masem?“\n\n„Lidé za kávu rádi platí. Za cukr a maso ne. Kromě toho, o co ti jde? Vezmete odhozené krávy a uděláte boty. Lidé přežijí docela dobře i bez bot.“\n\n„Jde mi o to, že [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] by měl [SCOPE.sState('coffee_state').GetNameNoFormatting] a [SCOPE.sState('milk_state').GetNameNoFormatting] zbavit drápů, než nás převálcují. A o botách bys smýšlel lépe, kdybys musel chodit bosý na slunci, hlupáku!“"
 coffee_with_milk.6.a: "Měli by se naučit podávat lepší výkon."
 coffee_with_milk.6.b: "Nemůžeme mít vládu, která si jde sama po krku."
 coffee_with_milk.7.t: "Kávová mašinérie"
 coffee_with_milk.7.d: "Impozantní politické mašiny států [SCOPE.sState('coffee_state').GetName] a [SCOPE.sState('milk_state').GetName] se prosadily v probíhajících volbách a podporují kandidáty strany [SCOPE.sParty('republicans_scope').GetName] do všech federálních úřadů."
 coffee_with_milk.7.f1: "„Místo abychom volili podle schopností, volíme jen podle toho, kdo má nejhlubší pokladnice a největší půdu. Zdá se, že jsme od revoluce udělali jeden krok vpřed a třicet zpět.“\n\n„Revoluce? Ty pořád věříš těm divadelním zkouškám? Sotva to byla revoluce. Nějací vojáci pochodovali ulicí a jeden muž se svou rodinou odešel. Ach, ale máš pravdu, že jsme odtud šli zpět.“\n\n„Přes všechny jeho chyby mi starý císař chybí...“"
 coffee_with_milk.7.f2: "Znovu zmařen, a tentokrát zahnán do kouta. Každý další coronel napříč Brazílií byl jako baron ve vlastním léně. Místo aby pracovali pro zlepšení národa, pracovali na zlepšení vlastních pokladnic. Armáda s nimi prakticky spolupracovala, když důstojníci ovládali vlastní lány půdy. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nepotřeboval poradce, aby věděl, co [ROOT.GetCountry.GetRuler.GetSheHe] potřebuje: radikální sázku, která přivede guvernéry k poslušnosti, nebo čekat, až uklouznou sami."
 coffee_with_milk.7.a: "Coronelové vždycky splní, co je třeba."
 coffee_with_milk.7.b: "Musíme mít volební integritu."
 coffee_with_milk.8.t: "Politika guvernérů"
 coffee_with_milk.8.d: "Guvernéři mocných států „kávy a mléka“, [SCOPE.sState('coffee_state').GetName] a [SCOPE.sState('milk_state').GetName], usilují o dohodu s federální vládou země [ROOT.GetCountry.GetName], která by zajistila kontrolu jejich místních oligarchií i naší současné správy."
 coffee_with_milk.8.f: "Rovnováha moci vyžaduje mírné přenastavení. Více dlaní promazaných mlékem, oslazených kávou, a nakonec vše pro zisk. Vlastníci plantáží a rančů by požadovali prosté ústupky: šíření a podporu svých zájmů za cenu jakékoli skutečné opozice. Ochabující Senát by na oplátku získal ve svých řadách větší soudržnost. Všechno však končí stejně: spiknutím proti veřejnosti."
 coffee_with_milk.8.a: "Tato politika zajistí stabilitu země [ROOT.GetCountry.GetNameNoFormatting]."
 coffee_with_milk.8.b: "Federální vláda si musí nad státy zachovat určitou autoritu."
 coffee_with_milk.9.t: "Cangaço"
 coffee_with_milk.9.d: "Rozšířená bída ve státě [SCOPE.sState('bandits_state').GetName] vedla k propuknutí zločinnosti a „sociálního banditismu“. Ve vnitrozemí státu získávají bandité mezi venkovskou chudinou nechvalnou proslulost svými smělými a násilnými činy."
 coffee_with_milk.9.f: "„‚Lucerna?‘ Ha, co je to za jméno, ‚Lucerna‘? To člověka zrovna nevyděsí.“\n\n„Měl by ses bát. Ten muž dokáže zacházet s opakovačkou tak rychle, že s ním žádný kulomet neudrží krok. My bychom byli mrtví a šéf by byl během pár minut rozpáraný peixeirou. Nebo když víme, jak moc má rád peníze, nechal by ho sledovat, jak je Lucerna rozhazuje chudým, a pak by toho chudáka rozpáral.“\n\n„Dává peníze žebrákům? To nezní zas tak špatně. ‚Lucerna.‘ Víš co, potřu ho olejem a škrtnu sirkou, jestli tě to přiměje přestat si počurávat kalhoty.“"
 coffee_with_milk.9.a: "Cangaceiros se hodí pro coronelovy... zvláštní úkoly."
 coffee_with_milk.9.b: "Musíme tuto pohromu vykořenit!"
 coffee_with_milk.10.t: "Lampa v temnotě"
 coffee_with_milk.10.d: "Nechvalně proslulý bandita [SCOPE.sCharacter('bandit_scope').GetFullName] shromáždil velkou bandu cangaceirů a udeřil na velké [SCOPE.gsInterestGroup('landowners_scope').GetName] ve státě [SCOPE.sState('bandits_state').GetName]. [SCOPE.sCharacter('bandit_scope').GetHerHis|U] činnost inspirovala venkovskou chudinu k zesílení požadavků na pozemkovou reformu."
 coffee_with_milk.10.f: "Ačkoli to zabralo větší část dne, fotograf nakonec přesvědčil [SCOPE.sCharacter('bandit_scope').GetLastNameNoFormatting], aby se nechal vyfotografovat. [SCOPE.sCharacter('bandit_scope').GetSheHe|U] měl podezření, že ve fotoaparátu je zbraň. Bylo to rozumné, vzhledem k směšným metodám, které zákon používal v minulosti. Nikdo z bandy nebyl nikdy předtím vyfotografován. Teď si na to budou muset zvyknout: byli víc než bandité. Byli hrdinové a museli si získat další srdce a mysli."
 coffee_with_milk.10.a: "[SCOPE.sState('bandits_state').GetNameNoFormatting] je v naprostém chaosu!"
 coffee_with_milk.10.b: "Okamžitě pošlete policii za [SCOPE.sCharacter('bandit_scope').GetHerHim]."
 coffee_with_milk.10.c: "Víme, kam [SCOPE.sCharacter('bandit_scope').GetSheHe] uteče."
 coffee_with_milk.11.t: "Vzpoura osmnácti"
 coffee_with_milk.11.d: "Skupina poručíků ve státě [SCOPE.sState('capital_scope').GetName] zahájila nezdařený převrat s cílem dosadit modernizovanější, liberální vládu. Přestože spiknutí selhalo, incident odhalil trhliny ve struktuře země [ROOT.GetCountry.GetName]."
 coffee_with_milk.11.f: "#bold Pevnost obsazena, tenentes pochodují!#!\n\nMěsto Rio de Janeiro zachvátil šok, když skupina důstojnických kadetů a několik jejich vzpurných vyšších důstojníků obsadili pevnost poblíž hlavního města. Ke vzpouře se připojili zrádní občané, monarchističtí sympatizanti i odpůrci republiky. Reportéři poblíž města tvrdí, že plná síla vzpoury není známa. Zmocnili se dělostřelectva pevnosti a začali postupovat do... (pokračování na str. 4)"
 coffee_with_milk.11.a: "To je vina velení skupiny [SCOPE.gsInterestGroup('armed_forces_scope').GetName]!"
 coffee_with_milk.11.b: "Musíme [SCOPE.sState('capital_scope').GetCityHubName] sledovat pozorněji."
 coffee_with_milk.12.t: "Kávové království"
 coffee_with_milk.12.d: "Udržením moci skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] nad politikou země [ROOT.GetCountry.GetAdjective] se oligarchie kávy a mléka plně a pevně zakořenila. Konzervativní politické mašinérie států [SCOPE.sState('coffee_state').GetName] a [SCOPE.sState('milk_state').GetName] budou v dohledné budoucnosti skutečnými vládci země."
 coffee_with_milk.12.f: "A posledním škrtem pera bylo hotovo: bossové přísahali doživotně, křesla se získávala a ztrácela pouze na základě půdy a Senát se stal nedobytným. Armáda, která kdysi pomohla svrhnout umírající monarchii, byla nyní přivedena k poslušnosti. Jako poslední záruka si státy z policie vytvořily armády a ponížené námořnictvo příliš dychtilo znovu získat přízeň.\n\nSláva Brazílii. Naše statečná hruď se postaví samotné smrti!"
 coffee_with_milk.12.a: "Na století řádu a pokroku!"
 coffee_with_milk.12.b: "Jednoho dne budou věci jiné."
 coffee_with_milk.13.t: "Proti coronelismu"
 coffee_with_milk.13.d: "Přijetí a prosazování zákona [SCOPE.sLaw('land_reform_law').GetName] vládou úspěšně omezilo vliv skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] v politice země [ROOT.GetCountry.GetAdjective]. Éra oligarchie kávy a mléka pomalu končí."
 coffee_with_milk.13.f: "Káva s mlékem mu vystříkla z úst. Pobočník ji setřel kapesníkem prosáklým potem. Poté coronelovi zopakoval, co řekl: reformy voleb a guvernérství snížily jeho politickou hodnotu na úroveň pouhého knihovníka. Coronel vychrlil proud nadávek, zatímco v ruce rozdrtil sklenici s kávou a mléko s kávou se smísily s krví."
 coffee_with_milk.13.a: "Lid bude vládnout!"
 coffee_with_milk.13.b: "Musíme se usmířit s bývalými coronely."
 coffee_with_milk.14.t: "Vyvlastnění s důvodem"
 coffee_with_milk.14.d: "Politika [GetLawType('law_collectivized_agriculture').GetName] vlády [ROOT.GetCountry.GetRuler.GetLastName] zasadila skupině [SCOPE.gsInterestGroup('landowners_ig').GetName] těžkou ránu. Systém kávy a mléka byl pod záštitou lidu učiněn zastaralým."
 coffee_with_milk.14.f: "„Vidíte to zde a nyní, dobří lidé Brazílie? Tento majetek kdysi vlastněný chovatelem dobytka? Tento chovatel dobytka i jeho otec byli kdysi krutí otrokáři. Nezáleží na tom, jak se jmenoval, protože je teď pryč. Ale jeho ranč? Vyvlastněn. Všechny ty krávy, které nechal hladovět? Vyvlastněny. Jeho pozemky? Vyvlastněny. Tak je tomu od Minas Gerais po Amazonas. V Brazílii nastal velký den. Kéž je to jediný velký den, který kdy budeme potřebovat.“"
 coffee_with_milk.14.a: "Pryč s třídou statkářů!"
 coffee_with_milk.15.t: "Cangaceiros přepadli plantáže ve státě [SCOPE.sState('bandits_state').GetName]"
 coffee_with_milk.15.d: "V čím dál běžnějším projevu násilí známého jako cangaço přepadli bandité domovy několika bohatých [SCOPE.gsInterestGroup('landowners_ig').GetName] ve státě [SCOPE.sState('bandits_state').GetName]. Jejich rodiny byly povražděny a část kořisti rozdělena místní venkovské chudině."
 coffee_with_milk.15.f: "V noci přišli s ohněm a sekerami. Za svítání našli coronelovi muži zbytky noční hlídky. V poledne našli na trhu podezřele podobné napodobeniny některých levnějších coronelových věcí. Po západu slunce vrátil špinavý muž vonící pařížskými parfémy nad své postavení jednomu rolníkovi osla. S rukou na pistoli zmizelého dozorce cangaceiro mrkl na coronelovy muže, když odcházel zpět do lesa."
 coffee_with_milk.15.a: "Museli se opozdit se svými platbami."
 coffee_with_milk.15.b: "Tento teror nemůže obstát. Prohledejte místní."
 coffee_with_milk.16.t: "Romantizovaný teror"
 coffee_with_milk.16.d: "Uprostřed bouře banditského násilí známého jako cangaço se části místní skupiny [SCOPE.gsInterestGroup('rural_folk_ig').GetName] ve státě [SCOPE.sState('bandits_state').GetName] nechaly inspirovat romantizovanými příběhy o komunitách cangaceirů. Volání po větší autonomii a nespokojenost se skupinou [SCOPE.gsInterestGroup('landowners_ig').GetName] hrozí přerůst v násilí."
 coffee_with_milk.16.f: "„To je dnes už patnáctý rolník, kterého jsme z těchto síní vyhodili. Upřímně, ta drzost těch hnojařů. Neříká jim řádný proces vůbec nic?“\n„Senhore?“\n„Teď ne. ‚Zkroťte coronely, nebo to udělají za nás.‘ Pche! Měli bychom sepsat novou legislativu, která jim zabrání v návratu-“\n„Senhore!“\n„Co je? Jsou teď těch chuligánů už dvě desítky? Přiveďte stráže a zatkněte i tuhle chátru!“\n„Senhore, podívejte! Jsou jich stovky!“"
 coffee_with_milk.16.a: "Lidé státu [SCOPE.sState('bandits_state').GetNameNoFormatting] se nechali nebezpečně inspirovat."
 coffee_with_milk.16.b: "Teror drží celou zemi [ROOT.GetCountry.GetName] ve svých čelistech."
