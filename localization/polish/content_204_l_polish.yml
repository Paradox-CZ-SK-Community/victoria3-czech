 notification_la_plata_seeking_warning_tooltip: "#header $notification_la_plata_seeking_warning_name$#!\n$TOOLTIP_DELIMITER$\n$notification_la_plata_seeking_warning_desc$"
 la_plata.1.t: "Duch Tucumánu"
 la_plata.1.d: "Nedávné znovuoživení vojenské moci země [ROOT.GetCountry.GetName] vyvolalo nostalgii po solidaritě válek za nezávislost. Výzvy k obnově Spojených provincií Río de la Plata začaly znít celou zemí [ROOT.GetCountry.GetNameNoFormatting]."
 la_plata.1.f: "„Je to opravdu tak pošetilé, otče? La Plata je velké místo a kolem nás jsou větší tyrani. Brzy se budeme navzájem potřebovat, ne?“\n\n„Ne. Když se to stalo naposledy, La Plata byla pro nás všechny příliš malá. Jeden z těch větších tyranů nám s ní vyrazil dveře. Udržíme je venku tím, že budeme malí a chytří, ne velcí a hašteřiví.“\n\n„Tvoji bratři selhali, otče. Ty jsi selhal také. Ale my se můžeme poučit z vašich chyb a tentokrát to udělat správně.“"
 la_plata.1.a: "La Plata bude jednotná."
 la_plata.1.b: "Naši sousedé si už zvolili sebeurčení."
 la_plata.2.t: "Od řeky k průlivům"
 la_plata.2.d: "Obnovením sjednocené země [ROOT.GetCountry.GetName] se dříve rozptýlené platinské národy staly jedním nedělitelným celkem."
 la_plata.2.f: "Muži v čerstvě ušitých uniformách a dobře promazaných botách pochodovali v sevřeném kroku. Podél ulic a oken je vítal jásot a mávání vlajkami nově zrozené unie. Nejmladší v rotě zahlédl na kraji cesty svého otce. V jednom oku starého muže byla slza hrdosti a v druhém nádech lítosti. Rty se mu zachvěly, když se připojil k potlesku pro svého vítězného syna."
 la_plata.2.a: "Ať vládne posvátná svoboda a jednota!"
 la_plata.2.b: "Naše vláda musí sahat až k Pacifiku."
