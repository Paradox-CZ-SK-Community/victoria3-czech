 je_populist_unrest_reason: "Nadvláda skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] nad politikou země [ROOT.GetCountry.GetAdjective] vyvolala nespokojenost napříč národem. Populistické osobnosti podporované skupinou [SCOPE.gsInterestGroup('pb_ig').GetName] agitují v ulicích proti současné vládě a liberální vojenské organizace vzhlížejí k příkladu tenentes, kteří se v minulosti postavili agrární oligarchii. Pokud se tyto nepokoje nepodaří úspěšně zvládnout, churavějící [ROOT.GetCountry.GetGovernment.GetName] čeká násilné přesměrování moci."
