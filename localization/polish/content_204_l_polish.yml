 from_populist_discontent: "Z populistických nepokojů"
 new_petit_bourgeois_leader_tt: "V [SCOPE.sCountry('brazil_scope').GetAltAdjectiveNoFormatting('L')] se objeví vůdce skupiny [SCOPE.gsInterestGroup('pb_ig').GetName] s ideologií [GetIdeology('ideology_authoritarian').GetName]"
 BRZ_populism.1.t: "Svoboda bez rozdílu"
 BRZ_populism.1.d: "Rostoucí populistický a promodernizační trend mezi skupinou [SCOPE.gsInterestGroup('pb_ig').GetName] ji vedl k tomu, aby zpochybnila vliv skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] na politický systém země [ROOT.GetCountry.GetAdjective]."
 BRZ_populism.1.f: "„A co tu všichni děláte? Tohle je schůze dílenských důvěrníků o akciích #italic coronelů#!. Pro vás univerzitní povaleče se víc hodí divadla.“\n\n„No, pár ptáčků nám povědělo o vaší radikální myšlence, ehm, vyvážet něco jiného než kávu a mléko. Možná spolu s tím i změna vedení?“\n\n„Ach... dobrá tedy: schůze dílenských důvěrníků a novinářů.“"
 BRZ_populism.1.a: "Skupina [SCOPE.gsInterestGroup('landowners_ig').GetName] má nového vyzyvatele."
 BRZ_populism.2.t: "Kolona [SCOPE.sCharacter('prestes_scope').GetLastNameNoFormatting]"
 BRZ_populism.2.d: "Kapitán [SCOPE.sCharacter('prestes_scope').GetFullName], inspirovaný tenentistickou vzpourou ve státě [SCOPE.sState('inspiration_state').GetName], zahájil rozsáhlé povstání a pochoduje se svými jednotkami přes několik států, aby unikl vládním silám."
 BRZ_populism.2.f: "Rozkaz přišel právě ve chvíli, kdy vládní jednotky začaly opevňovat své pozice. Spolu s povýšením byl směr jasný: pochodovat na sever a najít povstalce u řeky Paraná. Pochod byl ta snadná část. Pochodovat s více než 14 000 vojáky v patách bylo téměř neproveditelné. Ale bez odvahy není zisku. [SCOPE.sCharacter('prestes_scope').GetSheHe|U] se rozhodl, že nastal čas k průlomu."
 BRZ_populism.2.a: "Musíme rebely zahnat do kouta a zničit."
 BRZ_populism.2.b: "Pronásledujte kolonu k vnitrozemské hranici."
 prestes_as_agitator_tt: "[SCOPE.sCharacter('prestes_scope').GetFullName] se stane aktivním jako [concept_agitator]"
 BRZ_populism.3.t: "Padlé naděje"
 BRZ_populism.3.d: "Díky úsilí našich institucí se sílící populistické hnutí rozplynulo v nic. Vláda skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] nad zemí [ROOT.GetCountry.GetName] bude v dohledné budoucnosti pokračovat."
 BRZ_populism.3.f: "„#italic Coroneli,#! dorazily poslední zprávy. Většina policejních a vojenských snah sevřela všechny hlavní uzly do kleští. Žádní aktivní disidenti se nebudou moci pohnout, aniž bychom o tom věděli.“\n\n„Výborně, #italic tenente.#! Řekněte svým mužům, ať si vyberou vůdce. Ostatním neubližujte. Jsem si jistý, že jsou tu kávová pole, která by využila jejich... ‚veřejně prospěšné práce.‘“"
 BRZ_populism.3.a: "Stále existují ti, kdo vědí, kdo jim prospívá."
 BRZ_populism.3.b: "Další hrozba byla prozatím potlačena."
 BRZ_populism.4.t: "Oceán kávy"
 BRZ_populism.4.d: "Propad ceny $coffee$ vedl k rozsáhlé bídě ve státě [SCOPE.sState('coffee_ocean_state').GetName], který je silně závislý na kávě. Obavy z šířící se hospodářské deprese vzrostly po celé zemi [ROOT.GetCountry.GetName]."
 BRZ_populism.4.f: "Osvoldo,\n\nPíši ti s nejpokornějšími úmysly a nejtěžším srdcem. Jak ceny kávy po celém světě padají, zůstal jsem v bídě. Jako by nestačilo prodat rodinné stříbro, musel jsem rozdělit další část své plantáže k prodeji. Chtěl bych tě jako předsedu našeho country klubu požádat, abys svolal schůzi. Musíme zastavit volný pád cen kávy po celém světě, než nás všechny stáhne s sebou."
 BRZ_populism.4.a: "Ať jedí kávu."
 BRZ_populism.4.b: "Lid musí dostat úlevu."
 BRZ_populism.5.t: "Liberální třídy"
 BRZ_populism.5.d: "Městské „liberální třídy“, zastoupené skupinami [SCOPE.gsInterestGroup('pb_scope').GetName] a [SCOPE.gsInterestGroup('intelligentsia_scope').GetName], se začaly organizovat, aby svrhly monopol skupiny [SCOPE.gsInterestGroup('landowners_scope').GetName] nad politikou země [ROOT.GetCountry.GetAdjective]."
 BRZ_populism.5.f: "#bold Větší republika ve jménu pokroku!#!\n\nTajné hlasování! Právníci pro všechny! Povinné základní vzdělání!\n\nŘád a pokrok to vyžadují!\n\n#italic Strava z mléka a kávy nám může sloužit jen do určité míry. Brazílie požaduje ocel, služby, sůl a víc! Hlasujte pryč od mléka a kávy!#!"
 BRZ_populism.5.a: "Nesou semeno nové Brazílie."
 BRZ_populism.5.b: "Nikdy z toho nic nebude."
 BRZ_populism.6.t: "Tenentistická vzpoura ve státě [SCOPE.sState('revolt_state').GetName]"
 BRZ_populism.6.d: "[GetPopType('officers').GetName] podporující modernizační ideologii tenentismu obsadili město [SCOPE.sState('revolt_state').GetCityHubName] a několik odlehlých měst ve státě [SCOPE.sState('revolt_state').GetName]. Rebelové požadují tajné hlasování a nezávislé soudy."
 BRZ_populism.6.f: "#bold Nové propuknutí tenentistidy#!\n\nDalší vojenská formace porušila věrnost vládě a začala vydávat tentýž seznam požadavků jako ostatní rozdrcení zrádci. Sympatizanti v [SCOPE.sState('revolt_state').GetCityHubName] naléhali, aby byli tentokrát spravedlivě vyslyšeni. Některé vyšetřované zprávy uvádějí, že tato skupina může být podobně nakloněna násilí jako předchozí skupiny. Svědci poblíž [SCOPE.sState('revolt_state').GetCityHubName]... (pokrač. str. 2)"
 BRZ_populism.6.a: "Pošlete loajální jednotky, aby tuto vzpouru potlačily."
 BRZ_populism.6.b: "Bombardujte rebely, dokud se nepodrobí."
 BRZ_populism.7.t: "Válka podvodů"
 BRZ_populism.7.d: "Nedávné volby vedly k bouři obvinění z podvodů mezi stranami [SCOPE.sParty('liberal_party_scope').GetName] a [SCOPE.sParty('republican_party_scope').GetName]. Tato tvrzení výrazně vyhrotila napětí mezi třídami."
 BRZ_populism.7.f: "Obvinění z podvodu a manipulace se dala očekávat. Protože #italic coronelové#! tak dlouho přikazovali věrnost, podporovaný vyzyvatel působil neslýchaně. Dvojnásob, když některé odlehlé státy nabídly tomuto vyzyvateli 100 % hlasů. Některá čísla se musela přikrášlit. Koneckonců jen někdo vinný stejnými taktikami by mohl získat 100 % hlasů nějakého státu."
 BRZ_populism.7.a: "Prázdná slova nás nezlomí."
 BRZ_populism.7.b: "Umlčte tato falešná obvinění."
 BRZ_populism.8.t: "Liberální aliance"
 BRZ_populism.8.d: "Několik menších stran zastupujících městské střední třídy se rozhodlo podpořit [SCOPE.sCharacter('vargas_scope').GetFullName] a stranu [SCOPE.sParty('liberal_alliance_scope').GetName] v jejich snaze sesadit oligarchii skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] z vlády."
 BRZ_populism.8.f: "Režim držený pouze tradicí je obzvlášť náchylný k hnilobě. Tato hniloba může mít mnoho podob, ale tentokrát jí bylo očekávání. Očekávalo se, že káva se vystřídá s mlékem a mléko zase s kávou. Stačilo jedno prosté porušení této tradice, aby se aliance začala třepit. Odmítnutá polovina této dohody se obrátila k nové tváři z relativního zapadákova. Možná by mohl získat zpět to, co jim právem patřilo."
 BRZ_populism.8.a: "Lid stojí jednotně za [SCOPE.sCharacter('vargas_scope').GetLastName]."
 BRZ_populism.8.b: "Pošlete coronelovy muže po jejich tiskárnách."
 BRZ_populism.9.t: "Manauská komuna"
 BRZ_populism.9.d: "Posádka skupiny [SCOPE.gsInterestGroup('armed_forces_ig').GetName] ve státě [SCOPE.sState('amazonas_state').GetName], sympatizující s tenentismem, obsadila město Manaus a vydala několik radikálních populistických dekretů. Vláda komuny si mezi místními rychle získala obrovskou popularitu."
 BRZ_populism.9.f: "Dědečku,\n\nRád vzpomínám na tvé příběhy o tom, jak pradědeček v Amazonii bojoval proti mužům starého císaře. Teď se já a moji přátelé chystáme udělat totéž zde. Jeden z kapitánů tady slyšel vyprávět o městě ve Francii, které dělalo něco podobného tomu, co děláme my.\n\nTentokrát víme, co děláme. Nebude to jako stará válka. Nebude to jako Francie. Uděláme to správně. Vím to."
 BRZ_populism.9.a: "Musíme být opatrní, abychom nepodnítili další vzpoury."
 BRZ_populism.9.b: "Komuna musí být rozdrcena s veškerým spěchem."
 BRZ_vargas.1.t: "Nová [ROOT.GetCountry.GetCustom('brz_republic_or_state')]"
 BRZ_vargas.1.d: "Po rychlém uchopení moci prvky armády sympatizujícími s reformní věcí byl [SCOPE.sCharacter('vargas_scope').GetFullName] prohlášen prezidentem země [ROOT.GetCountry.GetNameNoFormatting]. [SCOPE.sCharacter('vargas_scope').GetHerHis|U] program vyzývá k modernizaci a rychlému obnovení pořádku v národě."
 BRZ_vargas.1.f: "Začalo to v malém státě, zbaveném podílu na oligarchii. Poté to díky obratným slovům po atentátu rozkvetlo. Teprve když byla samotná oligarchie podvedena jednou ze svých polovin, vzpoura zesílila. Nyní byli její aktéři shromážděni: První republika byla připravena padnout. Jen rychlá akce mohla zabránit krvavé občanské válce."
 BRZ_vargas.1.a: "Vzniká nová Brazílie."
 BRZ_vargas.2.t: "Estado Novo"
 BRZ_vargas.2.d: "Sérií zásahů proti levici a četnými dekrety posilujícími moc státu [SCOPE.sCharacter('vargas_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('vargas_scope').GetFullName] plně upevnil [SCOPE.sCharacter('vargas_scope').GetHerHis] vládu nad zemí [ROOT.GetCountry.GetName]."
 BRZ_vargas.2.f: "#bold [SCOPE.sCharacter('vargas_scope').GetFullNameNoFormatting]: Jeho Excelence na celý život#!\n\nSlunce září na proměněnou Brazílii: prezident [SCOPE.sCharacter('vargas_scope').GetLastNameNoFormatting] zavedl novou ústavu. V jejích stopách přišlo rozpuštění Národního kabinetu a vypovězení všech ministrů. Prvním bodem jeho programu bylo rozšíření pro něj typických zákonů na ochranu práce. (Pokrač. str. 3)"
 BRZ_vargas.2.a: "Ať žije brazilský národ!"
 BRZ_vargas.2.b: "Musíme přiznat zásluhy našim integralistickým partnerům."
 BRZ_vargas.3.t: "Konec revoluce"
 BRZ_vargas.3.d: "Odstranění [SCOPE.sCharacter('vargas_scope').GetFullName] od moci přislíbilo novou éru pro zemi [ROOT.GetCountry.GetName]. Zda tato nová éra bude érou svobody, nebo pokračující diktatury pod jiným jménem, se teprve ukáže."
 BRZ_vargas.3.f: "„Tak to je tedy všechno?“\n\n„Ano, [SCOPE.sCharacter('vargas_scope').GetFirstNameNoFormatting]. Ironické, že? Přemýšlel jste někdy, co si starý císař myslel, když byl sesazen? Nějaké poslední rozkazy? Lítost nad svou vládou?“\n\n„Ne. Žádné úvahy ani lítost. Budu jako starý císař: ustoupím stranou. V příštích volbách nebudu kandidovat na prezidenta.“"
 BRZ_vargas.3.a: "Budeme usilovat o svobodnější éru."
 BRZ_vargas.3.b: "Musíme se poučit z [SCOPE.sCharacter('vargas_scope').GetHerHis] lekcí."
 BRZ_vargas.4.t: "Federální intervenční správci"
 BRZ_vargas.4.d: "Nepokoje ve státě [SCOPE.sState('intervenor_state').GetName] přerostly jakoukoli přijatelnou mez. Vláda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] požádala o vyslání federálního intervenčního správce k obnovení pořádku."
 BRZ_vargas.4.f: "„Představuji si, #italic senhores#!, že vás má přítomnost v těchto síních mate. Dovolte mi objasnit svůj účel: můžete mě považovat za vykonavatele. Vyhledávám potíže a odstraňuji je. Vaše místní vláda se podle federálních mužů, kteří mě vyslali, v poslední době stala sobeckou a zahleděnou do sebe. Nechte své pobočníky, ať mi zítra podají hlášení: začnu důkladným auditem.“"
 BRZ_vargas.4.a: "Vyšlete nejlepšího byrokrata, kterého najdeme."
 BRZ_vargas.4.b: "Jmenujte kandidáta napojeného na skupinu [SCOPE.gsInterestGroup('intervenor_ig').GetName]."
 BRZ_vargas.5.t: "Konstitucionalistická vzpoura ve státě [SCOPE.sState('dissent_state').GetName]"
 BRZ_vargas.5.d: "Disidentské síly povstaly ve státě [SCOPE.sState('dissent_state').GetName] a požadují, aby [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] obnovil ústavní vládu a demokratické volby."
 BRZ_vargas.5.f: "Dějiny se nikdy neopakují, a přece se často rýmují. Právě tímto paradoxem začíná revoluce ve státě [SCOPE.sState('dissent_state').GetNameNoFormatting], jako tolikrát dříve a ještě mnohokrát poté, krví studentů. Požadavky byly záviděníhodně prosté: nevojenský guvernér státu, Ústavodárné shromáždění a federální vláda podřízená nové ústavě. Rým je však vždy stejný: řeka krve následující po prvních pramíncích."
 BRZ_vargas.5.a: "Obnovte pořádek, ale slibte budoucí ústupky."
 BRZ_vargas.5.b: "Teď nemůže být žádné slitování."
 BRZ_vargas.6.t: "Integralistická akce"
 BRZ_vargas.6.d: "[SCOPE.sCharacter('integralist_agitator').GetFullName] založil [ROOT.GetCountry.GetAdjective] integralistickou akci, krajně pravicovou a tradicionalistickou stranu, jejímž cílem je potlačit levičáctví a zakotvit katolické učení do struktury státu."
 BRZ_vargas.6.f: "„Revoluce vlastního já nemůže v Brazílii začít, dokud stále vládne režim sobectví. My, předvoj integralismu, rozdrtíme sobectví marxismu a překročíme hranice materialismu. Musíme, protože Brazílie to vyžaduje!“\n\nUprostřed nadšeného potlesku pravověrných stál jediný muž se zápisníkem. Navenek novinář, ve skutečnosti však měl patrona, kterého více zajímali příležitostní spojenci. Tito štváči se takovými spojenci měli stát."
 BRZ_vargas.6.a: "[SCOPE.sCharacter('integralist_agitator').GetSheHe|U] by byl užitečným spojencem."
 BRZ_vargas.6.b: "Šťastný vývoj."
 brz_integralist_action_tt: "Budeme mít příležitost dále přijmout #bold integralistickou#! ideologii, pokud bude #v $je_new_republic$#! úspěšně dokončen"
 BRZ_vargas.7.t: "Aliance národního osvobození"
 BRZ_vargas.7.d: "Koalice levicových organizací stojících v opozici vůči vládě [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] se zformovala a vydala svůj manifest. Hlavním zastáncem hnutí je [SCOPE.sCharacter('anl_leader_scope').GetFullName], významný [SCOPE.sCharacter('anl_leader_scope').GetIdeology.GetName]."
 BRZ_vargas.7.f: "„Musíme jednat hned! Země je připravena padnout do rukou #italic fašistů#!. Máme podporu Kominterny. S nimi je možné cokoli.“\n\n„Zapomínáš na sebe. Možná jsme pro dělníky, ale dělníci nám nedali své požehnání.“\n\n„Záleželo by na každém soustružníkovi a zedníkovi? Polovina z nich nedokáže najít ani cestu z hospody! Teď, nebo nikdy!“"
 BRZ_vargas.7.a: "Za chléb, půdu a svobodu!"
 BRZ_vargas.7.b: "Jsou nepřátelé státu."
 anl_more_leftists_tt: "Levicové postavy se budou objevovat mnohem častěji, dokud nebude #v $je_new_republic$#! úspěšně dokončen"
 BRZ_vargas.8.t: "Integralistický pochod ve státě [SCOPE.sState('integralist_state').GetName]"
 BRZ_vargas.8.d: "Integralisté pod vedením [SCOPE.sCharacter('integralist_leader_scope').GetFullName] pochodovali ve státě [SCOPE.sState('integralist_state').GetName] v reakci na stávku vyvolanou levicovými nepokoji. Pochod po sobě zanechal mnoho zraněných stávkujících."
 BRZ_vargas.8.f: "Armáda zelenokošiláčů se svým hrubým důstojenstvím podobala svým evropským protějškům. Skandování rétoriky v ulicích bylo stejně běžné jako jejich militantní mávání rukama. Předmětem jejich hněvu byla dnes skupina průmyslových stávkujících. Integralisté věřili, že stávkující dělníci jsou větším nepřítelem vlády. Žádný takový slib věrnosti jim však nikdy nebyl zaručen."
 BRZ_vargas.8.a: "Jdou tam, kam se naši policisté bojí vkročit."
 BRZ_vargas.8.b: "Stíhejte je za toto nesmyslné násilí."
 bp1_misc.3.t: "Moderní oligarchie"
 bp1_misc.3.d: "Vliv filozofie pozitivismu na společnost země [ROOT.GetCountry.GetAdjective] se rozšířil až na postoje skupiny [SCOPE.gsInterestGroup('landowners_ig').GetName] vůči státní moci."
 bp1_misc.3.f: "To heslo už viděl, ale nikdy ne takhle. Bylo vyvedeno zlatem na bohatém mramoru u dveří panského domu plantáže a třpytilo se ještě čerstvou instalací.\n\n„Láska jako princip a řád jako základ; pokrok jako cíl.“"
 bp1_misc.3.a: "Brazílie se vyvíjí s dobou."
 south_america_formables_tt: "[SCOPE.sCountry('south_america_nation_scope').GetName] odmítne tuto národní ideu a přijme #bold širší ambice#!\n[concept_journal_entry] #bold Nová národní identita#! bude zrušen"
 rejected_south_american_national_culture_tt: "Nedokončili jsme [concept_journal_entry] #bold národ země [ROOT.GetCountry.GetAdjective]#!"
 not_rejected_south_american_national_culture_tt: "Dokončili jsme [concept_journal_entry] #bold národ země [ROOT.GetCountry.GetAdjective]#!"
 peru_bolivia_events.1.t: "Pakt z [SCOPE.sState('arequipa_state').GetCityHubName]"
 peru_bolivia_events.1.d: "Navzdory machinacím našich rivalů Peruánsko-bolivijská konfederace vydržela celé desetiletí. Nyní existuje možnost skutečného sjednocení našeho národa pod jedinou, racionalizovanou vládou."
 peru_bolivia_events.1.f: "Hory jsou odsud jen vzdáleným nožem protínajícím večerní oblohu. Jejich zubatá čepel, bledá mezi mraky.\n\n„Jako nástupci Incké říše musíme anektovat její bývalá území, následovat linii moře a jít dál, dál, dál.“"
 peru_bolivia_events.1.a: "Podepište unii!"
 peru_bolivia_events.2.t: "Zajetí [SCOPE.sCharacter('salaverry_scope').GetFullName]"
 peru_bolivia_events.2.d: "Zajetím samozvaného nejvyššího náčelníka Peru [SCOPE.sCharacter('salaverry_scope').GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] konečně upevnil [ROOT.GetCountry.GetRuler.GetHerHis] kontrolu nad Peru i Bolívií. Zajetí [SCOPE.sCharacter('salaverry_scope').GetLastName] představuje závěrečný akt peruánské občanské války."
 peru_bolivia_events.2.f: "Předveden před [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], v okovech a s nasazenými bajonety po obou stranách, držel [SCOPE.sCharacter('salaverry_scope').GetFullNameNoFormatting] [SCOPE.sCharacter('salaverry_scope').GetHerHis] hlavu tak vysoko, jak jen [SCOPE.sCharacter('salaverry_scope').GetSheHe] dokázal. Poprava byla nyní téměř jistá.\n\n[ROOT.GetCountry.GetRuler.GetLastNameNoFormatting] však spatřil příležitost. Po porážce [SCOPE.sCharacter('salaverry_scope').GetLastNameNoFormatting] se naskytla nová šance na konfederaci. Jedinou otázkou bylo, jaká cesta přivede Peru do svazku nejrychleji."
 peru_bolivia_events.2.a: "Trestem za [SCOPE.sCharacter('salaverry_scope').GetHerHis] zradu je smrt."
 peru_bolivia_events.2.b: "[SCOPE.sCharacter('salaverry_scope').GetSheHe|U] se už nikdy nesmí vrátit do Peru."
 peru_bolivia_events.3.t: "Pád konfederace"
 peru_bolivia_events.3.d: "Ztráta většiny států Peruánsko-bolivijské konfederace vedla ke kolapsu navrhovaného národa. Formálním odtržením posledního zbývajícího státu od konfederace byla ztracena veškerá naděje pro velký projekt Nejvyššího protektora."
 peru_bolivia_events.3.f: "Nejvyšší protektor, sužován ze všech stran, zevnitř i zvenčí, byl nakonec obrácen na útěk. Sen byl mrtvý, mrtvý, a oni jej zabili se zlobou vůči svým bratrům. Zdálo se, že Peru-Bolívie nikdy nebude. A přesto mezi těmi, kdo zůstali v Peru, přetrvávala naděje: konfederace se může znovu vrátit."
 peru_bolivia_events.3.a: "Řítí se to k zemi."
 peru_bolivia_events.3.b: "Kapitola našich dějin končí dřív, než začne."
 peru_bolivia_events.4.t: "Pád Salaverryho"
 peru_bolivia_events.4.d: "Porážka pokusu Felipeho Salaverryho o převrat vedla k úplnému upevnění bolivijské nadvlády nad Peru. [SCOPE.sCharacter('santa_cruz_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('santa_cruz_scope').GetFullName] oznámil bezprostřední vytvoření konfederace mezi oběma národy."
 peru_bolivia_events.4.f: "„Takže je to tedy jisté? Pak je konfederace zaručena.“\n\n„Už máme jednoho nenasytného souseda. Bůh nám pomáhej, jestli se po nás vrhnou oba.“\n\n„Tak se tedy vrhneme na konfederaci první. Pošlete zprávu našim přátelům a řekněte jim, ať nasadí bajonety.“"
 peru_bolivia_events.4.a: "Tato konfederace musí navždy zmizet."
 peru_bolivia_events.4.b: "Stále existuje potenciál pro plodné partnerství."
 peru_bolivia_events.4.c: "O tuto záležitost nemáme zájem."
 ignore_peru_bol_tt: "Rozhodneme se nebránit vzniku #bold Peruánsko-bolivijské konfederace#!"
 peru_bolivia_events.5.t: "Rozprášena do všech větrů"
 peru_bolivia_events.5.d: "Rozpuštěním Peruánsko-bolivijské konfederace byl poražen rodící se rival zájmů země [ROOT.GetCountry.GetAdjective] v Andách. Rovnováha moci v Jižní Americe byla znovu napravena."
 peru_bolivia_events.5.f: "#Bold Santa Cruz kapituluje: konfederace se hroutí!#!\n\nKonfederace podél naší severní hranice, tak sužovaná už při svém zamýšleném zrodu, že sám Bůh nařídil její kapitulaci, konečně padla. Statečné muže, kteří ji skolili, čeká v [SCOPE.sState('capital_scope').GetCityHubName] přivítání hodné šampionů."
 peru_bolivia_events.5.a: "Strašlivá věc byla udušena v kolébce."
 peru_bolivia_events.6.t: "Vládnoucí mír"
 peru_bolivia_events.6.d: "Navázáním trvalých diplomatických vztahů s rostoucí Peruánsko-bolivijskou konfederací byla zajištěna vzájemná bezpečnost jak země [ROOT.GetCountry.GetName], tak konfederace. "
 peru_bolivia_events.6.f: "„Takže teď s konfederací uzavíráme #italic mír#!? A co náš obchod? Dva rostoucí sousedé? Konsolidovaná hrozba na severní hranici?“\n\n„Někdo rozhodl, že jejich obchod nás neohrožuje a jejich armády jsou uklidňující víc než Britové. Ach, tady jsou první vozy s kakaem. Možná o nich budete smýšlet lépe, až budete mít v břiše čokoládu?“"
 peru_bolivia_events.6.a: "Vydrží toto uspořádání?"
 peru_bolivia_events.7.t: "Triumf konfederace"
 peru_bolivia_events.7.d: "[SCOPE.sCountry('peru_bolivia_scope').GetName] úspěšně upevnila svou moc, stabilizovala svou politiku a přijala ústavu. Postavit se rozvíjejícímu titánovi se zdá být brzy marné."
 peru_bolivia_events.7.f: "Špioni posílali dopisy — rozzuřené, poražené i zděšené — že veškeré bouře v nové konfederaci už dávno utichly. Bez přetrvávající zášti, kterou by bylo možné rozdmychat, nejistot, které by bylo možné vyvolat, či rozdělení mezi jejími zákonodárnými sbory uvidí lid Peru-Bolívie v zemi [ROOT.GetCountry.GetNameNoFormatting] jen jedno: žárlivé útočníky."
 peru_bolivia_events.7.a: "Jsme nuceni čelit novému rivalovi."
 all_restorers_lose_prestige_tt: "Všechny zapojené [Concept('concept_country', '$concept_countries$')] nepřátelské vůči #b konfederaci#! ztratí [concept_prestige] a získají [Concept('concept_radical', '$concept_radicals$')]"
 peru_bolivia_events.8.t: "Za svobodné Peru"
 peru_bolivia_events.8.d: "Náš stát získal nezávislost na konfederaci. Se svou nově nabytou suverenitou se můžeme rozhodnout obnovit svou předchozí ústavu a usilovat o obnovu sjednoceného Peru, nebo si jako nezávislá země [ROOT.GetCountry.GetName] razit vlastní novou cestu."
 peru_bolivia_events.8.f: "Někteří by řekli, že revoluce, která zanechá národ rozdělený vedví, musí být považována za neúplnou. Jiní říkají, že nezávislost stojí za jakoukoli oběť, kterou může vyžadovat. Jelikož polovina Peru zůstává mimo náš dosah, tato otázka těžce doléhá na čelo našeho národa."
 peru_bolivia_events.8.a: "Peru bude jednotné a nedělitelné."
 peru_bolivia_events.8.b: "Náš národ bude sjednocen pod naší současnou ústavou."
 peru_bolivia_events.8.c: "Peruánský národ nikdy neměl vzniknout."
 peru_bolivia_events.9.t: "Osamění"
 peru_bolivia_events.9.d_1: "Těžké územní ztráty zmenšily zemi [ROOT.GetCountry.GetName] na území [GetGeographicRegion('geographic_region_bolivia').GetName]. Jelikož zůstala pouze jedna polovina jejích složek, konfederace se stala zbytečnou."
 peru_bolivia_events.9.d_2: "Těžké územní ztráty zmenšily zemi [ROOT.GetCountry.GetName] na území [GetGeographicRegion('geographic_region_peru').GetName]. Jelikož zůstala pouze jedna polovina jejích složek, konfederace se stala zbytečnou."
 peru_bolivia_events.9.f_1: "Obsazena byla jen čtvrtina křesel Generálního kongresu. Polovina místnosti, kterou kdysi zabírali bolivijští poslanci, zůstala neosvětlená — tím lépe se šetřilo svíčkami. Na skrovném ostrůvku světla, kterým byla peruánská čtvrtina, senátoři hlasem schválili jednací řád.\n\nRáno byl návrh zákona předložen výboru obsazenému jen z poloviny. Odpoledne prošel komorou. Večer doputoval na stůl [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a konfederace přestala existovat."
 peru_bolivia_events.9.f_2: "Obsazena byla jen čtvrtina křesel Generálního kongresu. Polovina místnosti, kterou kdysi zabírali bolivijští poslanci, zůstala neosvětlená — tím lépe se šetřilo svíčkami. Na skrovném ostrůvku světla, kterým byla peruánská čtvrtina, senátoři hlasem schválili jednací řád.\n\nRáno byl návrh zákona předložen výboru obsazenému jen z poloviny. Odpoledne prošel komorou. Večer byl položen na stůl [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a konfederace přestala existovat."
 peru_bolivia_events.9.a: "$BOL$ je vše, co zůstalo."
 peru_bolivia_events.9.b: "$PEU$ je vše, co zůstalo."
 peru_bolivia_complete_tt: "Účinky budou záviset na tom, zda se tato země rozhodla #bold rozložit#!, nebo #bold spřátelit#! s #bold Peruánsko-bolivijskou konfederací#!"
