l_polish:
 law_state_atheism: "Státní ateismus"
 law_state_atheism_desc: "Náboženství je ve veřejném životě zakázáno a stát prosazuje protináboženskou politiku. Všechna náboženství čelí diskriminaci a duchovenstvu je ve společnosti ponechána jen velmi malá nebo žádná role."
 atheist: "Ateista"
 pm_no_urban_clergy: "Státní ateismus"
 state_atheism.1.t: "Opium mas"
 state_atheism.1.d: "S prosazením zákona [SCOPE.sLaw('current_law_scope').GetName] se objevují obavy, že bez víry v [ROOT.GetCountry.GetStateReligion.GetName|l] náboženství, které by poskytovalo duchovní naplnění, mohou stísněné masy upadnout do zoufalství."
 state_atheism.1.f: "Náboženství je vzdechem utlačovaného tvora, srdcem bezcitného světa a duší bezduchých poměrů. Je opiem mas."
 state_atheism.1.a: "Bůh je mrtev."
 state_atheism.1.b: "Nasytíme jejich břicha, ne jejich duše."
 state_atheism.1.c: "Opium je opiem mas."
 opium_of_the_masses_enactment: "Opium mas"
 opium_of_the_masses_mod: "Opium mas"
 state_atheism.2.t: "Společnost bezbožníků"
 state_atheism.2.d: "[SCOPE.sPop('godless_pop').GetName] v [SCOPE.sBuilding('godless_uni').GetName] v [SCOPE.sState('godless_state').GetName] jsou silnými podporovateli zákona [SCOPE.sLaw('current_law_scope').GetName]. Založili Společnost bezbožníků jako prostředek k šíření protináboženského myšlení."
 state_atheism.2.f: "„Slyšel jsem, že nás očerňují jako rváče, kteří ‚útočí na nejvyšší výdobytek lidské kultury‘. Jestli je to to nejvyšší, čeho lidstvo dosáhlo, pak se musím smát - abych dosáhl větší výšky, stačilo by mi přeskočit louži.“"
 state_atheism.2.a: "Osvícená iniciativa."
 state_atheism.2.b: "Napadejte teisty v ulicích."
 state_atheism.2.c: "Povzneste Společnost na univerzitách."
 state_atheism.3.t: "Charitativní činnost"
 state_atheism.3.d: "Charity spojené s #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('works_of_charity_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('works_of_charity_ig').GetCustom('IG_ADJ_I')|l]#!#! se dostaly pod palbu podporovatelů zákona [SCOPE.sLaw('current_law_scope').GetName]#!#!, protože v nich působí duchovní a zbožní laici. Mnoho lidí se postavilo na obranu těchto oblíbených charit, čímž ohrožují úspěch zákona [SCOPE.sLaw('current_law_scope').GetName]."
 state_atheism.3.f: "„Je mi jedno, kolik lidí tomu říká ‚charita‘. Je to náboženská sekta a má agendu jako každá jiná sekta. Nezáleží na tom, jestli tvrdí, že se změnili - ty i já víme, že nezměnili! Ať si veřejnost trhne, po těchto lidech musíme jít.“"
 state_atheism.3.a: "Pokračujte v útocích na charity."
 state_atheism.3.b: "Propagujte státní sociální péči, abyste je podkopali."
 state_atheism.3.c: "Zřiďte konkurenční podpůrné charity, abyste je podkopali."
 state_atheism.3.dd: "Prostě nechte charity být."
 godless_ig_leader: "[SCOPE.sCharacter('godless_leader').GetFullName] z #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('godless_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('godless_ig').GetCustom('IG_ADJ_G')|l]#!#! je nahrazen ateistickým vůdcem"
 society_of_the_godless_mod: "Společnost bezbožníků"
 antireligious_policies: "Protináboženská politika"
