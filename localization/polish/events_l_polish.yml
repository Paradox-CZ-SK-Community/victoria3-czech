 commander_events.6.t: "Generálův výstřel vedle"
 commander_events.6.d: "K našim uším se donesla aféra mezi [SCOPE.sCharacter('seducer_commander').GetFullName] a manželkou [SCOPE.sCharacter('cheated_leader').GetFullName], která hrozí poškodit [SCOPE.sCharacter('cheated_leader').GetHerHis] veřejný obraz, pokud generála nezbavíme funkce."
 commander_events.6.f: "Jako by přistižení při činu nestačilo, [SCOPE.sCharacter('seducer_commander').GetFullNameNoFormatting] vystoupil z lázně a spatřil, jak se mu šíří zrádná vyrážka. [SCOPE.sCharacter('seducer_commander').GetSheHe] se vídal jen s jednou známostí. Teď už to nešlo popřít, ne poté, co samotné generálovo tělo prozradilo aféru."
 commander_events.6.a: "Generála stále potřebujeme a tohle jsou osobní záležitosti."
 commander_events.6.a.tt: "Prostě řekneme, že [SCOPE.sCharacter('cheated_leader').GetFullNameNoFormatting] seděl na špatném záchodě."
 commander_events.6.b: "Takovému [SCOPE.sCharacter('seducer_commander').GetWomanMan] nemůžeme důvěřovat."
 commander_events.6.b.tt: "[SCOPE.sCharacter('seducer_commander').GetFullName] odstoupí."
 commander_events.6.c: "Měli by si účty vyřídit sami."
 covered_affair_modifier: "Ututlaná aféra"
 punished_commander_modifier: "Vychválen za integritu"
 punched_commander_modifier: "Dostal pěstí"
 punching_leader_modifier: "Udeřil velitele"
 unable_to_enact.1.t: "Legislativní selhání"
 unable_to_enact.1.d: "Navzdory mnoha snahám vlády úspěšně vyvést zákon [SCOPE.sLaw('current_law_scope').GetName] z jeho současné šlamastyky začal být tento zákon považován za nic jiného než nevyhnutelné selhání."
 unable_to_enact.1.f: "„#italic Tenhle#! návrh? Prosím, o tom se se mnou nebavte.“\n\n„Řekl bych, že bude lepší prostě předstírat, že se to nikdy nestalo, souhlasíte?“\n\n„Jistě, ale tomu hlupákovi to nezabrání, aby se na něj ptal každý den…“"
 unable_to_enact.1.a: "Musíme podpořit úplné přepracování návrhu."
 unable_to_enact.1.b: "Tak tedy s celou tou myšlenkou do ohně."
 unable_to_enact.2.t: "Legislativní hřbitov"
 unable_to_enact.2.d: "Po sérii nákladných a trapných nezdarů se úřadující [ROOT.GetCountry.GetAdjective] vláda rozhodla zastavit snahu o prosazení zákona [SCOPE.sLaw('current_law_scope').GetName]. Nějakou dobu potrvá, než se znovu objeví politická vůle to zkusit."
 unable_to_enact.2.f: "Porážka visela ve vzduchu spolu se zápachem spáleného tabáku a kazícího se alkoholu. Naděje rozdrcené, myšlenky roztříštěné a touha zkažená. Ať už v dobrém, nebo ve zlém, poselství bylo jasné: [SCOPE.sLaw('current_law_scope').GetNameNoFormatting] nechtěl nikdo kromě mužů v místnosti.\n\nPřed nimi ležela dlouhá a zrádná cesta, jak myšlence znovu získat přízeň."
 unable_to_enact.2.a: "Politováníhodné a trapné."
