 notification_west_america_expedition_progress_average_name: "Expedice do Západní Ameriky pokračuje."
 notification_west_america_expedition_progress_average_desc: "Expedice do Západní Ameriky pokračuje bez problémů."
 notification_west_america_expedition_progress_average_tooltip: "Expedice do Západní Ameriky pokračuje bez problémů."
 expedition_events.200.t: "Expedice za zmapováním západního pohraničí"
 expedition_events.200.d: "Vyšlete expedici, aby zmapovala neznámou geografii západního pohraničí."
 expedition_events.200.f: "„Přímo na našem prahu leží země překypující přísliby! Měli bychom se těch příslibů chopit, dokud můžeme. A pokud ne teď, předstihnou nás orli a lvi a, chraň Bůh, hlemýždi!“"
 expedition_events.200.a: "Znám osobu vhodnou pro tento úkol."
 expedition_events.200.b: "Teď ne."
 expedition_events.201.a: "[SCOPE.sCharacter('expedition_leader_1').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_1').GetFullName]"
 expedition_events.201.b: "[SCOPE.sCharacter('expedition_leader_2').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_2').GetFullName]"
 expedition_events.201.c: "[SCOPE.sCharacter('expedition_leader_3').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_3').GetFullName]"
 expedition_events.202.t: "Výběr rozpočtu"
 expedition_events.202.d: "Kolik peněz chcete vyčlenit na rozpočet expedice?"
 expedition_events.202.f: "„Nebudu vám lhát: vydáme se daleko od krbu a domova. Lhát o nebezpečí by vůči vám všem byla medvědí služba. Můžeme narazit na nejrůznější překážky a čím více prostředků budeme mít, tím lépe budeme připraveni. Připomínám vám však, že až se vítězoslavně vrátíme, čeká nás sláva!“"
 expedition_events.202.a: "Malou částku."
 expedition_events.202.b: "Střední částku."
 expedition_events.202.c: "Velkou částku."
 expedition_events.205.t: "Neúspěšná expedice"
 expedition_events.205.d: "Po několika týdnech ticha se expedice za zmapováním západního pohraničí vedená [SCOPE.sCharacter('expedition_leader').GetFullName] vrátila s prázdnýma rukama."
 expedition_events.205.f: "„Čekáme jeden den v táboře. Muži jsou unavení a už jsme ušli tolik. Čekáme další den. „Možná bychom tu prostě mohli zůstat,“ zamumlá jeden z nich, zašklebí se a vrátí se k táborovému ohni. Možná bychom mohli. „Poznáváte tyto hory, [SCOPE.sCharacter('expedition_leader').GetCustom('getSirMadam')]?“ ptají se. Další den. Je to už tak dlouho, že sotva poznávám sám sebe. Možná bychom tu prostě mohli zůstat.“"
 expedition_events.205.a: "Strašná škoda."
 expedition_events.300.t: "Řeka Buenaventura"
 expedition_events.300.d: "Po dlouhé a namáhavé cestě expedice konečně dospěla ke konci. Nejzajímavějším objevem této cesty bylo, že dlouho opředená řeka Buenaventura ve skutečnosti neexistuje!"
 expedition_events.300.f: "„Zklamání. A těžké. Znovu a znovu jsme revidovali mapy, ověřovali je u místních, sledovali značky, mapy - znovu. Jak je možné, aby řeka neexistovala? Aby měla tolik svědků, a přesto nebyla?\n\nCo tedy františkánští misionáři viděli? Snad jezero. Jinou řeku. Na člověka dolehl pocit porážky s takovou silou, že se třesou hory a mysl se chvěje. „Nic,“ řekne muž vedle mě, oči bolavé netečnou slušností, „nenašli jsme nic.“"
 expedition_events.300.a: "Zklamání, ale poučné."
 expedition_events.301.t: "Oregonská stezka"
 expedition_events.301.d: "Po dlouhé a namáhavé cestě expedice konečně dospěla ke konci. Expedici se podařilo zmapovat celou délku Oregonské stezky."
 expedition_events.301.f: "„Nově nakreslená mapa byla rozložena na korbě dřevěného vozu. Inkoust se leskne, stále mokrý, a jeho zářivé křivky sledují právě objevené stezky jako přítoky řeky.\n\nMladý chlapec přichází s šálkem čaje; tichý, skromný, zvědavý. Pokusí se pohlédnout na mapu, ale jeho vychování ho zastaví. Položí čaj na stůl a tiše odejde. „Jeho otec se v těch horách ztratil,“ řekne jiný člen, „ještě že je teď máme všechny zmapované.“"
 expedition_events.301.a: "Skvělé zprávy."
 expedition_events.302.t: "Velké Solné jezero"
 expedition_events.302.d: "Po dlouhé a namáhavé cestě expedice konečně dospěla ke konci. Expedici se podařilo najít a zmapovat celé Velké Solné jezero."
 expedition_events.302.f: "„Vždy si budu pamatovat náš odraz ve vodě. Jak tam triumfální silueta expedice byla namalována jako olejové plátno. Barvy, všechny smíšené dohromady a přesto tak pronikavé. Tváře se vznášely v jezeře s nerozpoznatelnými rysy. Byli jsme to my. Mohl to být kdokoli jiný. Ach, ale byli jsme to my.“"
 expedition_events.302.a: "Skvělé zprávy!"
 expedition_events.220.t: "Rozvodněná řeka"
 expedition_events.220.d: "Členové expedice narazí na řeku, která se vylévá z břehů. Mohou se pokusit přeplout ji na voru, což by bylo rychlé, ale nebezpečné. Případně mohou hledat vhodnější místo k přechodu, i když to může nějakou dobu trvat."
 expedition_events.220.f: "„Krátká krajina zachycená v okamžiku, který nás zastihl. Odvážné šedi, vyhlížená řeka uvězněná v kleci násilí a prudkosti. Tyto bloudící stromy, unášené pryč, dekapitované. Občas nějaký druh zvířete. Jinak samota.“"
 expedition_events.220.a: "Kupředu!"
 expedition_events.220.b: "Lepší je být v bezpečí."
 expedition_events.220.c: "Skočte! Skočte! Skočte!"
 expedition_events.221.t: "Bezpečný přechod"
 expedition_events.221.d: "Expedice úspěšně překročila řeku, téměř bez obtíží."
 expedition_events.221.f: "„S tak snadným přechodem dnes urazíme pořádný kus cesty. Troufám si říct, že bychom toho zvládli mnohem víc, kdybychom vory ještě trochu naložili.“\n\n„Jsi snad praštěný do hlavy, synku? Máme štěstí, že se dnes vody rozhodly být mírné. Dostaňme vory ven, než voda přestane být tak laskavá.“"
 expedition_events.221.a: "Dobrá zpráva."
 expedition_events.222.t: "Převrácený vor"
 expedition_events.222.d: "Bohužel se vor expedice při překonávání řeky převrátil a několik zásob bylo ztraceno."
 expedition_events.222.f: "„Voda byla příliš rychlá, sotva jsme se dostali na druhý břeh. A my jsme byli ti šťastní. Když druhý vor zmizel pod hladinou, poslední, co jsem ze svého bratra viděl, byla jeho ruka pohlcená peřejemi.“"
 expedition_events.222.a: "Politováníhodné."
 expedition_events.230.t: "Spatřen medvěd"
 expedition_events.230.d: "Před námi byl spatřen velký grizzly. Mohli bychom se držet zpátky a počkat, až odejde, nebo ho můžeme ulovit."
 expedition_events.230.f: "„Zdejší medvědi jsou vyhublí a vyhladovělí. Tím to ale není o nic lepší; bystré oči, lačné čelisti, kapky slin stékající po zažloutlých tesácích. Tady jsou vždy tak ostražití. Tak bdělí.\n\nAch, ale potravy je v těchto horách málo nejen pro ně.“"
 expedition_events.230.a: "Ulovíme ho."
 expedition_events.230.b: "Bude lepší počkat, až odejde."
 expedition_events.231.t: "Úspěšný lov na medvěda"
 expedition_events.231.d: "Expedice úspěšně ulovila a zabila medvěda grizzlyho."
 expedition_events.231.f: "„Opatrně jsme ho stopovali, ale neúnavně. Několik dobrých ran stačilo, aby padl. Právě v takových chvílích si přeji, aby můj sluha nebyl tak dobrý střelec. Taková trofej by se mi do budoáru hodila.“"
 expedition_events.231.a: "Neúspěch by byl k neunesení."
 expedition_events.232.t: "Neúspěšný lov na medvěda"
 expedition_events.232.d: "Expedice se pokusila medvěda ulovit, ale lov se zvrhl."
 expedition_events.232.f: "„Lov začal dost dobře, ale příliš pozdě jsme si uvědomili, že jde o medvědici s mláďaty. Je dobře známým faktem, že se nikdy nesmíte dostat mezi medvědici a její mláďata.“"
 expedition_events.232.a: "Kupředu!"
 expedition_events.233.t: "Medvěd útočí"
 expedition_events.233.d: "Medvěd grizzly, kterého jsme dříve ignorovali, zaútočí na expedici."
 expedition_events.233.f: "„Vyřítil se z lesa rychleji než uhánějící [SCOPE.GetRootScope.GetCountry.GetCustom('fast_object_type')]. Řval tak, jak jste ještě nikdy nic neslyšeli. Bylo potřeba několik salv, než padl, a to až poté, co jsme ztratili dva vlastní muže.“"
 expedition_events.233.a: "Zatracená škoda."
 custom_fast_object_horse: "kůň"
 custom_fast_object_train: "vlak"
 custom_fast_object_motor_carriage: "motorový kočár"
 expedition_events.240.t: "Fotografování divoké zvěře"
 expedition_events.240.d: "Jeden člen expedice si přeje zastavit se na den či dva a pořídit fotografie divoké zvěře."
 expedition_events.240.f: "„Bizoni drželi hlavy skloněné a pokojně se pásli. Nerušeně se jejich prošedivělá těla pohybovala mořem trávy, větší než ti v Evropě. I z dálky jsme viděli spletité chodby, které poblíž nich vyhrabali králíci a lišky, a řídké stromy tančily s půvabem mladé debutantky.“"
 expedition_events.240.a: "Skvělý nápad."
 expedition_events.240.b: "Na to není čas."
 expedition_events.250.t: "Spatřena hora"
 expedition_events.250.d: "Jeden člen expedice navrhl, abychom si udělali odbočku, vystoupili na horu a zabrali ji jménem [ROOT.GetCountry.GetName]."
 expedition_events.250.f: "„Jeden z členů expedice upírá oči na horu. „Je to dobré riziko, příteli,“ říká, „myslím, že tuhle si ještě nikdo nenárokoval, chápete, představte si, jak by nám doma zaplatili - to všechno za tuhle bezvýznamnou skálu.“ Sníh klouže po úbočí hory, rozpuštěný jako vlákna šedé bavlny.“"
 expedition_events.250.a: "Výborný nápad"
 expedition_events.250.b: "Nemůžeme si dovolit ztrácet čas."
 expedition_events_mountain_claim_tt: "Naše expedice dosáhne vrcholu."
 expedition_events.251.t: "Hora již nárokována"
 expedition_events.251.d: "Po příchodu na vrchol hory vidíte, že si ji již nárokovala země [SCOPE.sCountry('mountain_claim_country').GetName]."
 expedition_events.251.f: "„Měli jsme vědět, že tu nebudeme první.“\n\n„U vás všech cítím opakující se motiv. Vy a vaši lidé jdete na západ v domnění, že jste našli něco velkolepého, jen abyste zjistili, že tam někdo jiný dorazil první.“\n\n„Jestli je to další přednáška o tom, jak se dějiny opakují, pošlu vás nahoru, abyste tu horu zabral. Sám. S ohnutou vidličkou. To jsme ještě nezkoušeli, že ne?“"
 expedition_events.251.a: "Politováníhodné."
 expedition_events.252.t: "Hora nárokována"
 expedition_events.252.d: "Expedice zdolala horu a nárokovala ji jménem [ROOT.GetCountry.GetName]. Také se rozhodli pojmenovat ji „Mount [SCOPE.sCharacter('expedition_leader').GetLastName]“."
 expedition_events.252.f: "S jedním posledním vypětím se [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting] přehoupl přes okraj posledního útesu. Když [SCOPE.sCharacter('expedition_leader').GetSheHe] narovnal postoj i zasněžené šaty, za nimi prorazilo první světlo nového dne. Hrdinské přivítání na západě a hora nárokována. A jako třešnička na dortu vlajka [ROOT.GetCountry.GetAdjectiveNoFormatting], kterou přinesl mladší člen expedice."
 expedition_events.252.a: "Výborně."
 expedition_events.253.t: "Potíže na úbočí"
 expedition_events.253.d: "Při výstupu na horu zasáhl jednoho člena expedice pád kamenů a uvedl ho do bezvědomí. Skupina byla nucena se vrátit."
 expedition_events.253.f: "Když se kameny řítily dolů z hory a sníh se za nimi valil v kaskádách, přes římsu, kde ležel zasažený člen expedice, kapala krev. Pára unikající z jeho rozražených rtů byla jedinou známkou života toho ubohého chlapce. Se záchvěvem viny si [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting] přehodil chlapce přes [SCOPE.sCharacter('expedition_leader').GetHerHis] ramena a sestoupil z hory."
 expedition_events.253.a: "Škoda."
 expedition_events.260.t: "Sníh na zemi"
 expedition_events.260.d: "Někteří členové expedice vyjádřili obavy, že se počasí obrací proti nim. Trvají na tom, že se mají ukrýt a přečkat to nejhorší."
 expedition_events.260.f: "„Vrstvy sněhu dál rostly jako neléčené nádory. Obrovská běloba, veliká běloba, a její odraz nás pálil a bolel v očích. Pokud se nezastavíme teď, možná už se nebudeme schopni zastavit vůbec. Jeden z mužů se zachvěje, když si tře paže - rty bledé jako náš stín na sněhu. Neřekne ani slovo.“"
 expedition_events.260.a: "Pokračujte dál."
 expedition_events.260.b: "Dbejte jejich varování."
 expedition_events.261.t: "Přežili sníh"
 expedition_events.261.d: "Ačkoli to bylo obtížné, expedici se podařilo úspěšně prorazit sněhem."
 expedition_events.261.f: "„Museli jsme postupovat dvojnásobným tempem a bezpochyby to nebylo příjemné, ale konečně jsme z nejhoršího venku.“"
 expedition_events.261.a: "Dobře."
 expedition_events.262.t: "Ztraceni ve sněhu"
 expedition_events.262.d: "Bohužel expedici zastihla sněhová bouře, několik členů zemřelo a několik zásob bylo ztraceno."
 expedition_events.262.f: "„Špatná viditelnost, kousavý chlad a k tomu všemu hlodavý pocit, že jsem se dopustil chyby v úsudku.“"
 expedition_events.262.a: "Politováníhodné."
 expedition_events.263.t: "Sníh ustává"
 expedition_events.263.d: "Po nějaké době sníh ustoupil natolik, že lze pokračovat."
 expedition_events.263.f: "„Je dobře, že jsme se do toho nepokusili vyrazit. Byla by to katastrofa.“"
 expedition_events.263.a: "Skvělé zprávy."
 expedition_events.270.t: "Neobjevený druh rostliny"
 expedition_events.270.d: "Jeden člen expedice požádal o několik dní zastávky, aby mohl nasbírat vzorky dosud neznámého druhu rostliny."
 expedition_events.270.f: "„Barevné okvětní lístky této rostliny jistě ještě nikdo nikdy neviděl: nádech nejjasnější šarlatové, pár stop dobrodružného azuru. Trny! Ale tak malé, že riziko je žádoucí.\n\nBrzy budou nejluxusnější salony [ROOT.GetCountry.GetNameNoFormatting] překypovat vázami s těmito květinami a každá žena si bude přát, aby jí její milý nějaké přinesl. Fascinující! A jistě výnosné.“"
 expedition_events.270.f2: "„Barevné okvětní lístky této rostliny jistě ještě nikdo nikdy neviděl: nádech nejjasnější šarlatové, pár stop dobrodružného azuru. Trny! Ale tak malé, že riziko je žádoucí.\n\nVůně je však povědomá. Dětství na venkově. Léto, zcela jistě. Za úsvitu, nebo snad za soumraku. To první, ano, za soumraku. Viděl jsem na polích jasné barvy, jed, ostatní děti křičely, ty rostliny byly jedovaté. Oči členů expedice, ach, jejich oči upřené na květy.“"
 expedition_events.270.a: "Samozřejmě."
 expedition_events.270.b: "Co jsme zač, zahradníci?!"
 expedition_events.280.t: "Expedice v kruhu"
 expedition_events.280.d: "Expedice za zmapováním západu cestovala v kruzích. [SCOPE.sCharacter('expedition_leader').GetFullName] si může buď vybrat náhodný směr a pokračovat dál, nebo počkat na setmění a řídit se hvězdami."
 expedition_events.280.f: "„Poznal jsem značky, které jsme zanechali na trojúhelníkovém kameni. Pokračovali jsme v chůzi, protože jsem se rozhodl o nich nezmínit, ale podle šepotu mezi členy a jejich znepokojivých očí jsem si byl jistý, že to vědí také.\n\nProcházíme lesem jako podzimní listí, zlomené větve, zanedbaná toulavá zvířata; jako ty děti z pohádek, které zlé macechy poslaly do lesa. Kruh je kruh je kruh.“"
 expedition_events.280.f2: "„Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni. Jsme ztraceni.“"
 expedition_events.280.a: "Pokračujte dál."
 expedition_events.280.b: "Počkejte na soumrak."
 expedition_events.281.t: "Beznadějně ztraceni"
 expedition_events.281.d: "Členům expedice se podařilo ztratit ještě víc. Nakonec našli správnou cestu, ale až poté, co promarnili velké množství zásob a času."
 expedition_events.281.f: "„Vyrazili jsme náhodným směrem a nevyplatilo se to.“"
 expedition_events.281.a: "Jak otravné."
 expedition_events.282.t: "Zpět na správné cestě"
 expedition_events.282.d: "Expedici se podařilo znovu najít správnou stezku a vyrazila dál, přičemž ztratila poměrně málo času."
 expedition_events.282.f: "„Vybrali jsme si směr, téměř náhodně. Ještě že se ukázal jako ten správný.“"
 expedition_events.282.a: "Skvělé zprávy"
 expedition_events.400.t: "Suezská šíje prozkoumána"
 expedition_events.400.d: "Náš průzkum Suezské šíje je dokončen. Potvrdili jsme, že by bylo možné vybudovat průplav spojující Středozemní moře s Rudým mořem."
 expedition_events.400.f: "„Dlouho panovalo přesvědčení, že hladiny vody na obou stranách Suezské šíje se výrazně liší. Nyní jsme prokázali, že tomu tak není.“"
 expedition_events.400.a: "Velmi dobře!"
 notification_suez_survey_started_desc: "Průzkum Suezské šíje zahájen"
 notification_suez_survey_started_tooltip: "Průzkum Suezské šíje zahájen"
 suez_survey_complete_tooltip: "Průzkum Suezu dokončen"
 expedition_events.410.t: "Panamská šíje prozkoumána"
 expedition_events.410.d: "Náš průzkum Panamské šíje je dokončen. Potvrdili jsme, že by bylo možné vybudovat průplav spojující Atlantský a Tichý oceán."
 expedition_events.410.f: "„Rychlejší cesta mezi Atlantikem a Pacifikem byla dlouho vyhledávána, ale nyní si ji vytvoříme sami.“"
 expedition_events.410.a: "Velmi dobře!"
 notification_panama_survey_started_desc: "Průzkum Panamské šíje zahájen"
 notification_panama_survey_started_tooltip: "Průzkum Panamské šíje zahájen"
 panama_survey_complete_tooltip: "Průzkum Panamy dokončen"
 ig_revolutions.1.t: "Na hraně"
 ig_revolutions.1.d: "[SCOPE.gsInterestGroup('ig_on_the_edge').GetName], vedená prohnaným [SCOPE.sCharacter('ig_on_the_edge_leader').GetFullName], pohrozila, že se přidá k revolučním silám, pokud nebudou splněny její požadavky. Ačkoli ústupky, které požadují, jsou malé, moc, kterou získají, pokud jim přiznáme svou slabost, bude ohromná."
 ig_revolutions.1.f: "„V dobách zmatků a bojů opatrní vždy tvrdí, že některé ideály musí být obětovány, některé reformy odloženy, aby se země nerozpadla. Ptám se jich: jakou cenu má země bez ideálů?\n\nAť se rozpadne, říkám! Z jejích vláken utkáme lepší zemi, kde budou naše ideály vnímány jako základ, nikoli jako hrozba.“"
 ig_revolutions.1.a: "Dejte jim, oč žádají."
 ig_revolutions.1.b: "Nedáme jim nic než chladnou ocel!"
 ig_revolutions.2.t: "[SCOPE.gsInterestGroup('ig_lo_on_the_edge').GetName] mají požadavky!"
 ig_revolutions.2.d: "[SCOPE.gsInterestGroup('ig_lo_on_the_edge').GetName] stojí na pokraji vzpoury a hrozí, že se přidají k revoluci, pokud nebudou splněny určité požadavky."
 ig_revolutions.2.f: "„Vláda nad [ROOT.GetCountry.GetNameNoFormatting] proklouzává mezi prsty této slabé a netečné vlády. Někdo ji musí získat zpět. Víme, jak vládnout, ale pokud nedáte na naše rady, věc je ztracena.“"
 ig_revolutions.2.a: "Ať už uspokojí jejich takzvanou „důstojnost“ cokoli, dejte jim to."
 ig_revolutions.2.b: "Směšné! Nemají právo o cokoli žádat."
 ig_revolutions.2.c: "Důstojní mohou být v poutech."
 ig_revolutions.3.t: "[SCOPE.gsInterestGroup('ig_rf_on_the_edge').GetName] rozsévají svár!"
 ig_revolutions.3.d: "[SCOPE.gsInterestGroup('ig_rf_on_the_edge').GetName] zuří na vládu a zdá se, že se mohou přidat k současné revoluci, pokud je nedokážeme uchlácholit."
 ig_revolutions.3.f: "„My lépe než kdokoli jiný známe cenu války, zpustošená vypálená pole a vyrabované chalupy. Nechopili bychom se zbraní, kdybychom neměli jinou možnost. Nepoužívejte to jako záminku ke zkoušení naší trpělivosti - bez nás [ROOT.GetCountry.GetNameNoFormatting] vyhladoví.“"
 ig_revolutions.3.a: "Doufejme, že nynější ústupky mohou být semenem budoucího míru."
 ig_revolutions.3.b: "Od nás nedostanou nic!"
 ig_revolutions.3.c: "Když sejí vítr, ať sklidí vichřici!"    
 ig_revolutions.4.t: "[SCOPE.gsInterestGroup('ig_dv_on_the_edge').GetName] volají po zásahu!"
 ig_revolutions.4.d: "[SCOPE.gsInterestGroup('ig_dv_on_the_edge').GetName] tvrdí, že pod naší „amorální“ vládou trpěli příliš dlouho, a nyní přibili seznam požadavků na dveře vládního úřadu."
 ig_revolutions.4.f: "„[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l], který vládne bez morálky, není nic než despota, bez ohledu na to, odkud [ROOT.GetCountry.GetRuler.GetSheHe] čerpá [ROOT.GetCountry.GetRuler.GetHerHis] světskou moc. Nepodceňujte, jak snadno může být svržen režim, který ztratil svou morální autoritu.“"
 ig_revolutions.4.a: "Poskytněme jim tyto ústupky a modleme se za mír."
 ig_revolutions.4.b: "Je mi úplně jedno, co chtějí!"
 ig_revolutions.4.c: "Ve vězení si mohou věřit, čemu chtějí."    
 ig_revolutions.5.t: "[SCOPE.gsInterestGroup('ig_af_on_the_edge').GetName] začínají být bojovní!"
 ig_revolutions.5.d: "Důstojníci úzce spojení s [SCOPE.gsInterestGroup('ig_af_on_the_edge').GetName] veřejně vydali seznam stížností a požadují od vlády okamžité kroky. Temné zvěsti naznačují, že se mohou přidat k revoluci, pokud nebudou uspokojeni."
 ig_revolutions.5.f: "„Přísahali jsme bránit [ROOT.GetCountry.GetNameNoFormatting], ale musíme se ptát, v jakém okamžiku je sama vláda největší hrozbou pro celistvost země, které vládne. Přichází válka. Věřte mi, skutečné vojáky budete chtít mít na své straně.“"
 ig_revolutions.5.a: "Vzdáváme čest obětem, které naši vojáci přinesli, a uznáváme jejich potřebu podpory."
 ig_revolutions.5.b: "Tady máte rozkazy: zmizte!"
 ig_revolutions.5.c: "Myslím, že nastal čas, aby naši chlapci v modrém sloužili zemi."
 ig_revolutions.6.t: "[SCOPE.gsInterestGroup('ig_in_on_the_edge').GetName] se bouří!"
 ig_revolutions.6.d: "Nespokojené konsorcium [SCOPE.gsInterestGroup('ig_in_on_the_edge').GetName], rozzlobené na vládu, požaduje „odškodnění“. Pokud odmítneme, hrozí, že spojí svůj osud s revolucí."
 ig_revolutions.6.f: "„Povstání by bylo nezdarem, zastavením [ROOT.GetCountry.GetNameNoFormatting] na cestě k moderní zemi, ale možná nevyhnutelným. Pokud má dojít k válce, rozhodně by bylo lepší, aby byla rychlá. Dokázali byste ji udělat rychlou?“"
 ig_revolutions.6.a: "Přijměme tuto dohodu."
 ig_revolutions.6.b: "Odmítněme - jejich cena je příliš vysoká."
 ig_revolutions.6.c: "Jediné, co dostanou, je čas ve vězení."    
 ig_revolutions.7.t: "[SCOPE.gsInterestGroup('ig_it_on_the_edge').GetName] vydali požadavky!"
 ig_revolutions.7.d: "[SCOPE.gsInterestGroup('ig_it_on_the_edge').GetName] sepsali manifest, v němž požadují, aby vláda učinila určité ústupky na ochranu veřejného blaha a zachování svobody. Pokud ne, naznačují, že mohou být podniknuty ráznější kroky."
 ig_revolutions.7.f: "„Raději vítězíme slovy, ale slova mohou prosit rozum nebo vychvalovat čin. Praxe následuje teorii. Pokud potřebujete myšlenky, máme je; pokud ne, někdo jiný je jistě potřebuje.“"
 ig_revolutions.7.a: "Předkládají silné argumenty pro ústupky."
 ig_revolutions.7.b: "Nepředkládají silné argumenty pro vůbec nic."
 ig_revolutions.7.c: "Předkládají silné argumenty pro své vlastní uvěznění."    
 ig_revolutions.8.t: "[SCOPE.gsInterestGroup('ig_pb_on_the_edge').GetName] požadují okamžitý zásah!"
 ig_revolutions.8.d: "Zdá se, že [SCOPE.gsInterestGroup('ig_pb_on_the_edge').GetName] jsou odhodláni v této krizi vynutit si na vládě ústupky. Pokud se odmítneme podvolit, hrozí, že spojí svůj osud s revolucí."
 ig_revolutions.8.f: "„Je to velmi prosté - právě teď potřebujeme pevnou ruku u kormidla, a pokud ji [ROOT.GetCountry.GetRuler.GetFullNameWithTitle] nedokáže poskytnout, najdeme někoho, kdo to dokáže.“"
 ig_revolutions.8.a: "Jejich požadavkům můžeme vyhovět."
 ig_revolutions.8.b: "To je směšné! Ať zkusí to nejhorší."
 ig_revolutions.8.c: "Pokud chtějí sílu, můžeme jim ji ukázat."    
 ig_revolutions.9.t: "[SCOPE.gsInterestGroup('ig_tu_on_the_edge').GetName] stupňují své požadavky!"
 ig_revolutions.9.d: "Zástupci [SCOPE.gsInterestGroup('ig_tu_on_the_edge').GetName], mimořádně nespokojení s vládou, nyní vystupňovali situaci a požadují od vlády okamžité ústupky. Pokud se nic neudělá, jejich zástupci lehkovážně naznačují, že kroky se mohou dále stupňovat."
 ig_revolutions.9.f: "„Čas vyjednávání pominul. Nastal čas, aby dělníci vznesli požadavky! Naše ruce kují ocel hlavně pušky i olovo kulky. Přidejte se k nám! Těmito rukama budeme ničit a těmito rukama budeme znovu budovat.“"
 ig_revolutions.9.a: "Dobrá, ať [SCOPE.gsInterestGroup('ig_tu_on_the_edge').GetName] získají své ústupky."
 ig_revolutions.9.b: "Této lůze neposkytneme nic!"
 ig_revolutions.9.c: "Právě pro takové časy tu máme policii."
