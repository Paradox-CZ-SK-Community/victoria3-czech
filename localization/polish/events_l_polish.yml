 government_conflicts.1.t: "Původ a vzdělání"
 government_conflicts.1.d: "Neshody mezi [SCOPE.gsInterestGroup('landowners_ig').GetName] a [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.1.f: "„Mému argumentu byste rozuměl mnohem lépe, kdybyste četl cokoli napsaného za posledních sto let!“\n\n„Odmítám číst cokoli z éry, v níž se nevzdělaní lidé učí psát.“"
 government_conflicts.1.a: "Inovátoři by měli otázku „proč“ nechat jiným a soustředit se na „jak“."
 government_conflicts.1.b: "Šlechta musí přijmout, že zaostává za dobou."
 government_conflicts.1.c: "Intelektuální a dědičné elity musí spolupracovat." 
 government_conflicts.2.t: "Všechny dosavadní společnosti"
 government_conflicts.2.d: "Neshody mezi [SCOPE.gsInterestGroup('landowners_ig').GetName] a [SCOPE.gsInterestGroup('trade_unions_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.2.f: "„Za mých časů by vás takový návrh stál hlavu.“\n„Modlete se tedy, aby cena, kterou si od vás vyžádáme, nebyla tak vysoká, až přijdou mé časy.“"
 government_conflicts.2.a: "Odbory musí prokázat loajalitu své zemi."
 government_conflicts.2.b: "Vlastníci půdy musí přijmout moc dělníků."
 government_conflicts.2.c: "Nemůžeme dopustit, aby třídní konflikt roztrhal tuto vládu." 
 government_conflicts.3.t: "Ucho jehly"
 government_conflicts.3.d: "[SCOPE.gsInterestGroup('devout_ig').GetName] jsou nespokojeni se zařazením [SCOPE.gsInterestGroup('industrialists_ig').GetName] do [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády."
 government_conflicts.3.f: "„Říkáte, že bohatství může dosáhnout kdokoli, pokud má dostatek schopností, tvrdé práce a trochu štěstí. Není tedy třeba ctnosti ani víry, pokud věříte sami v sebe. Co mají ti, kdo touto zkouškou projdou, společného kromě chamtivosti a lásky k hmotným věcem?“"
 government_conflicts.3.a: "Nesuďte, abyste nebyli souzeni."
 government_conflicts.3.b: "Moc peněz je třeba držet na uzdě."
 government_conflicts.3.c: "Prosperita a dobročinnost by měly být družkami, ne nepřáteli." 
 government_conflicts.4.t: "Víra a rozum"
 government_conflicts.4.d: "Neshody mezi [SCOPE.gsInterestGroup('devout_ig').GetName] a [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.4.f: "„Jak může někdo stavět rozum nad víru, když právě rozum přece otevírá člověku oči k boží prozřetelnosti působící ve světě?“\n„Vy nechápete, že když má člověk oči otevřené, jen těžko se může vrátit ke slepotě.“"
 government_conflicts.4.a: "Pověrčivé nesmysly patří minulosti."
 government_conflicts.4.b: "Pohrdání tradicí je vrcholem arogance."
 government_conflicts.4.c: "Věda určuje fakta, víra určuje morálku." 
 government_conflicts.5.t: "Vzdušné zámky"
 government_conflicts.5.d: "[SCOPE.gsInterestGroup('devout_ig').GetName] jsou nespokojeni se zařazením [SCOPE.gsInterestGroup('trade_unions_ig').GetName] do [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády."
 government_conflicts.5.f: "„Chudoba je strašlivá rána lidstva a je třeba s ní bojovat soucitem a dobročinnými srdci. Bojovat proti těm šťastnějším, hledat odměnu za svou chudobu v tomto životě místo toho, abychom ji nesli tak, jako musíme nést všechna břemena, znamená zříci se vlastní spásy.“"
 government_conflicts.5.a: "Ani všechna dobročinnost světa chudobu nevyřeší."
 government_conflicts.5.b: "Dělnickému hnutí by neuškodilo trochu více pokory."
 government_conflicts.5.c: "Nedovolte, aby různé metody stály v cestě vašim společným cílům."
 government_conflicts.6.t: "Muž z ulice"
 government_conflicts.6.d: "Neshody mezi [SCOPE.gsInterestGroup('petty_bourgeoisie_ig').GetName] a [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.6.f: "„Možná vám to připadá radikální, ale kdybyste si přečetl teorii, překvapilo by mě, kdybyste v ní našel jedinou chybu.“\n„Jedna věc, kterou jsem se naučil při vedení podniku, je, že zkušenost překoná i bezchybnou teorii, když se ji pokusíte uvést do praxe.“"
 government_conflicts.6.a: "Žádného pokroku nebylo nikdy dosaženo bez uvedení teorie do praxe."
 government_conflicts.6.b: "Takzvaní intelektuálové by měli stát nohama pevně na zemi."
 government_conflicts.6.c: "Potřebujeme pokrok, ale bezpečným a spolehlivým tempem." 
 government_conflicts.7.t: "Těžká práce a těžce pracující"
 government_conflicts.7.d: "Neshody mezi [SCOPE.gsInterestGroup('petty_bourgeoisie_ig').GetName] a [SCOPE.gsInterestGroup('trade_unions_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.7.f: "„Jak čekáte, že vás někdy budou brát vážně, když jen ničíte věci a požadujete větší podíl z toho, co vybudovali jiní?“\n„Pokud si myslíte, že jste něco vybudoval tím, že jste řídil jiné lidi, nejste způsobilý vést podnik, natož národ.“"
 government_conflicts.7.a: "Dělníky by měli vést dělníci."
 government_conflicts.7.b: "Ti, kdo si úspěch vydělají, si zaslouží sklízet jeho plody."
 government_conflicts.7.c: "Důležité je, aby byla práce hotová, ne jak." 
 government_conflicts.8.t: "Tyto temné satanské mlýny"
 government_conflicts.8.d: "[SCOPE.gsInterestGroup('rural_folk_ig').GetName] jsou nespokojeni se zařazením [SCOPE.gsInterestGroup('industrialists_ig').GetName] do [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády."
 government_conflicts.8.f: "„Něco mi říká, že až postaví všechny ty továrny a stroje, které nás mají zbavit břemen, pořád budeme sklízet hrozny my a víno budou pořád pít oni.“"
 government_conflicts.8.a: "Ať se nám to líbí, nebo ne, industrializace je budoucnost."
 government_conflicts.8.b: "Nesmíme zapomenout na ty, kdo živí obyvatele měst."
 government_conflicts.8.c: "Továrny i farmy budou v budoucnosti [ROOT.GetCountry.GetName] stejně potřebné." 
 government_conflicts.9.t: "Země, nebo třída"
 government_conflicts.9.d: "[SCOPE.gsInterestGroup('trade_unions_ig').GetName] jsou nespokojeni se zařazením [SCOPE.gsInterestGroup('armed_forces_ig').GetName] do [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády."
 government_conflicts.9.f: "„V jakém okamžiku poté, co prohlásíte, že zasvětíte svůj život obraně své země, si uvědomíte, jak absurdní je lež, kterou jste namluvili sami sobě? Když namíříte zbraně na své bratry a sestry, kteří se staví proti nespravedlnosti, nebo až když stisknete spoušť?“"
 government_conflicts.9.a: "Armáda udržuje mír. Narušte jej na vlastní nebezpečí."
 government_conflicts.9.b: "Vnitřní boj je důležitější než boj vnější."
 government_conflicts.9.c: "Doufejme, že konflikt nikdy nedojde tak daleko." 
 government_conflicts.10.t: "Myšlenka a čin"
 government_conflicts.10.d: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] jsou nespokojeni se zařazením [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] do [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády."
 government_conflicts.10.f: "„Pořád mluvíte o riskování, o smělosti, o odvaze snít. Víte vůbec, co to znamená? Riskoval jste někdy něco jiného než svou vlastní prohnilou pověst?“"
 government_conflicts.10.a: "Respektujte vojáky, kteří chrání vaše právo mudrovat."
 government_conflicts.10.b: "Dělejte to, co umíte nejlépe, vojáci, a plňte rozkazy."
 government_conflicts.10.c: "Národ potřebuje ochranu před armádami i špatnými myšlenkami." 
 government_conflicts.11.t: "Politická ekonomie"
 government_conflicts.11.d: "Neshody mezi [SCOPE.gsInterestGroup('trade_unions_ig').GetName] a [SCOPE.gsInterestGroup('industrialists_ig').GetName] způsobují konflikty ve vládě."
 government_conflicts.11.f: "„Věříte, že vytváříte hodnotu čistě ze svých vlastních vizí? V těchto bludech můžete setrvávat jen proto, že nikdy nevidíte ruce pod sebou, které odvádějí práci.“\n„Ty ruce by zahálely, nebýt pracujících myslí, které nad sebou nikdy nevidíte působit.“"
 government_conflicts.11.a: "Kapitál pohání pokrok."
 government_conflicts.11.b: "Dělníci si zaslouží plody své práce."
 government_conflicts.11.c: "Pokuste se odložit třídní konflikt stranou ve prospěch společných věcí."
 ig_petitions.1.t: "Příliš mnoho demokracie?"
 ig_petitions.1.d: "Muži spojení s vlivnou [SCOPE.gsInterestGroup('landowners_ig').GetName] se obrátili na vládu a žádají reformy. Tvrdí, že volební práva se rozšířila příliš mnoho a příliš rychle, a žádají vládu, aby zvážila zrušení přijetí zákona [SCOPE.sLaw('current_law_scope').GetName]."
 ig_petitions.1.f: "„Masy mohou podporovat své lepší, pokud si to přejí, ale neměly by se zapojovat do záležitostí, do nichž jim nic není.“"
 ig_petitions.1.a: "Budeme se jejich stížnostmi zabývat."
 ig_petitions.1.b: "Omezit volební právo? Nepřichází v úvahu!"
 landowners_petition_rejected_modifier: "Nedostatek demokracie"
 landowners_petition_acepted_modifier: "Příliš mnoho demokracie"
 tarnished_reputation_modifier: "Pošramocená pověst" 
 ig_petitions.4.t: "Víra země"
 ig_petitions.4.d: "Stoupenci [SCOPE.gsInterestGroup('devout_ig').GetName] vyjádřili podporu vládnímu úsilí uznat víru věřících jako jedinou pravou církev státu a formálně zavést zákon [SCOPE.sLaw('current_law_scope').GetName]."
 ig_petitions.4.f: "„V nejtemnější části noci září víra, neposkvrněná ve svém početí, jako proměnlivá, věčná svíce. Hned žlutá, hned oranžová, načervenalá. Jaký jiný maják nás kdy povede? Kněz byl vždy ve svých slovech tak horlivý. Celé jeho tělo se zmítá, posedlé kázáním, jeho tvář se rozzáří, stále jasněji!“"
 ig_petitions.4.a: "To naši věc výrazně podpoří."
 ig_petitions.4.b: "Nesmíme dovolit, aby [SCOPE.gsInterestGroup('devout_ig').GetNameNoFormatting] získali příliš velký vliv."
 devout_state_support_modifier: "Podpora státního náboženství"
 devout_state_influence_modifier: "Vliv státního náboženství" 
 ig_petitions.7.t: "Svoboda projevu?"
 ig_petitions.7.d: "[SCOPE.sCharacter('intelligentsia_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('intelligentsia_ig').GetName], veřejně podpořil vládní úsilí o přijetí zákona [SCOPE.sLaw('current_law_scope').GetName]. Někteří si však myslí, že [SCOPE.sCharacter('intelligentsia_leader').GetSheHe] to dělá pouze ve svůj vlastní prospěch."
 ig_petitions.7.f: "Učenec celý den seděl v tom sametem vyloženém křesle. Mumlal o tom, co se děje na východě. Na východě se vždycky něco děje.\n\n„Zabránit lidem mluvit nezabrání lidem mluvit. Zastaví to lidi.“"
 ig_petitions.7.a: "Bylo by dobré zajistit, aby [SCOPE.sCharacter('intelligentsia_leader').GetSheHe] získal potřebnou podporu."
 ig_petitions.7.b: "Nemůžeme zákon zosobňovat jen v jedné osobě."
 intelligentsia_free_speech_modifier: "Podpora svobody projevu"
 intelligentsia_free_speech_leader_modifier: "Obhájce svobody projevu"
 intelligentsia_free_speech_leader_bad_modifier: "Odmítnutý projev" 
 ig_petitions.10.t: "Přiveďte naše chlapce domů!"
 ig_petitions.10.d: "[SCOPE.gsInterestGroup('rural_folk_ig').GetName] už myslí na příští sklizeň. Odvod pravidelně odvádí ty nejschopnější ruce z farem právě ve chvíli, kdy jsou nejvíce potřeba. Dorazila delegace, která žádá zastavení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 ig_petitions.10.f: "Jejich pevné ruce jsou zpocené, občas se třesou. „Ne, ne, to byla jen vaše představivost, dobrý pane, jsme tu docela klidní, vidíte, ale máme obavy. Samozřejmě klidné, ale máme obavy.“\n\nVálka se vždy vyvíjí špatně, říkají, ale se sklizní to tak být nemusí."
 ig_petitions.10.a: "Budeme se jejich stížnostmi zabývat."
 ig_petitions.10.b: "Armáda potřebuje muže víc než farma ruce."
 rural_folk_conscription_concerns_ignored_modifier: "Obavy z odvodu ignorovány"
 less_conscription_rural_folk_modifier: "Obavy z odvodu řešeny" 
 ig_petitions.13.t: "Omezené vzdělání"
 ig_petitions.13.d: "Zástupci [SCOPE.gsInterestGroup('trade_unions_ig').GetName] se obrátili na vládu a vyjádřili své zklamání z přijetí zákona [SCOPE.sLaw('current_law_scope').GetName]."
 ig_petitions.13.f: "„Přivedli s sebou své děti. Ach, [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], to mi připomíná, proč děti nenávidím. Takový hluk, moje hlava, takový hluk. Tyhle už žádné vzdělání nikdy nenapraví, tím jsem si jistý.\n\n„Ano, ano, slyšíme vás, rozhodně vás slyšíme. Zůstaňte prosím za stolem, zpracováváme vaši petici.“\n\n#italic Povzdech#!.“"
 ig_petitions.13.a: "Měli bychom tyto lidi uklidnit, než budeme pokračovat."
 ig_petitions.13.b: "Nemůžeme dovolit, aby veřejné mínění ovlivňovalo naše rozhodnutí."
 trade_unions_placation_modifier: "Uklidnění veřejnosti"
 no_public_schools_modifier: "Veřejné mínění ignorováno"
 public_schools_petition_modifier: "Tlak na veřejné školy"
 public_schools_petition_denied_modifier: "Veřejné školy odmítnuty"
 ig_petitions.16.t: "Daňové reformy"
 ig_petitions.16.d: "Skupina vlivných [SCOPE.gsInterestGroup('industrialists_ig').GetName] se obrátila na vládu, nespokojená s navrhovaným daňovým systémem, který podle nich klade nepřiměřenou zátěž na nejúspěšnější členy společnosti, a žádá zrušení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 ig_petitions.16.f: "„Vytváříte národ povalečů a lenochů, národ, kde bude na počest hrdých obyvatel našich ulic neprodleně vztyčeno Náměstí darmošlapů!“\n\nMužova krční tepna je na pokraji prasknutí. Ve tvářích mu teď září zdravý ruměnec jako skromné tanečnici. Lékař přihlíží v pozorném tichu. Fascinující."
 ig_petitions.16.a: "Úspěch by neměl být trestán!"
 ig_petitions.16.b: "Chtějí jen, aby bohatí ještě víc zbohatli."
 industralists_tax_denied_modifier: "Obavy ze zdanění ignorovány"
 industralists_tax_agreed_modifier: "Obavy ze zdanění řešeny" 
 ig_petitions.19.t: "Služba národu"
 ig_petitions.19.d: "Důstojníci z [SCOPE.gsInterestGroup('armed_forces_ig').GetName] vyjádřili podporu prosazení nového zákona [SCOPE.sLaw('current_law_scope').GetName]. Někteří však také vyjádřili obavy, že to sníží celkovou kvalitu armády."
 ig_petitions.19.f: "„Tito důstojníci mají v sobě něco jiného. Říkají to všichni. A těmi všemi myslí dámy z venkova. Zvláště ty mladé. Něčí neteř utekla s jedním z nich a skandál dorazil až do hlavního města. Její strýc byl prý hrabě.“\n\nVojáci přihlížejí, opření o zábradlí lemující pole. Mají nepřítomný pohled; klepy jsou luxusní zábavou."
 ig_petitions.19.a: "Více mužů znamená více mužů."
 ig_petitions.19.b: "Měli bychom investovat do vytvoření spolehlivé armády."
 conscription_efforts_modifier: "Úsilí o odvod"
 conscription_law_modifier: "Služba národu"
 army_resources_modifier: "Armádní zdroje"
 army_resources_ig_modifier: "Armádní zdroje" 
 ig_petitions.22.t: "Práva člověka"
 ig_petitions.22.d: "Členové [SCOPE.gsInterestGroup('petty_bourgeoisie_ig').GetName] důrazně vyjádřili podporu zákonu [SCOPE.sLaw('current_law_scope').GetName] a píší články v jeho prospěch."
 ig_petitions.22.f: "„Nejjednodušší, nejpraktičtější a nejúčinnější způsob, jak vládnout národu“\n\n„Pro blaho národu je nezbytné, aby se jeho občané přizpůsobili jako při pečení v jednotnou hmotu. Přidá-li se příliš mnoho vajec, soli nebo vody, těsto bude křehké, příliš tažné, nebo dokonce rozmočené. Jinými slovy, chceme-li dosáhnout dobrého koláče, nemůžeme si dovolit špatné poměry.“"
 ig_petitions.22.a: "Jsou zapotřebí přísnější omezení občanství."
 ig_petitions.22.b: "Ne, [ROOT.GetCountry.GetAdjectiveNoFormatting] se může stát kdokoli!"
 petty_bourgeoisie_national_supremacy: "Práva člověka" 
 goldrush.1.t: "Zlatá horečka!"
 goldrush.1.d: "Ve státě [SCOPE.sState('goldrush_state').GetName] bylo objeveno zlato. Sjíždějí se tam lidé ze všech koutů světa v přesvědčení, že objeví další velké naleziště a pohádkově zbohatnou."
 goldrush.1.f: "Stačil jediný špatný krok v řece. Jeho syn byl okamžitě po jeho boku a vytáhl ho z vody dřív, než si ho proudy stačily vzít. A pak, když se s jeho nohou i holí zvedl sediment, spatřili to: nezaměnitelný třpyt samotné Plútovy krve. Do druhého rána už byli oba u řeky se síty a lopatami. A do večera se k nim přidalo celé město."
 goldrush.1.a: "Rozhlaste to!"
 goldrush.1.b: "Moje! Je to všechno moje!"
 goldrush.1.c: "Vždy to rozhlaste."
 goldrush.1.e: "Vždy je to moje!"
 state_gold_rush_less_migration: "Zlatá horečka"
 state_gold_rush_exploitation: "Vykořisťování zlaté horečky"
 gold_always_attract_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí při každé zlaté horečce."
 gold_always_exploit_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí při každé zlaté horečce."
 goldrush.2.t: "Vyčerpaná zlatá naleziště"
 goldrush.2.d: "Bohatá ložiska nerostů ve státě [SCOPE.sState('goldrush_no_more_state').GetName] byla vyčerpána. Doly se zavírají a všichni prospektoři, kteří se sem přistěhovali, se začínají rozcházet pryč při hledání dalšího velkého nálezu."
 goldrush.2.f: "#bold Náplavové zlato vyschlo: horníci se vracejí domů#!\n\nŘeka vyschla kvůli činnosti horníků. Šachty odsouzeny jako životu nebezpečné.\n\n#italic Vstup na vlastní nebezpečí. Vetřelci budou zastřeleni. Přeživší budou zastřeleni znovu.#!"
 goldrush.2.a: "Politováníhodné."
 goldrush.2.b: "Nemůžeme je jen tak nechat odejít!"
 goldrush.2.c: "Vždy je nechte jít."
 goldrush.2.e: "Nikdy bychom je neměli nechat odejít!"
 state_gold_depleted_palliative: "Vyčerpané zlaté doly"
 gold_always_let_go_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí na konci každé zlaté horečky."
 gold_always_make_stay_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí na konci každé zlaté horečky." 
 goldrush.3.t: "Příliv cizinců vyvolává pobouření"
 goldrush.3.d: "[SCOPE.gsInterestGroup('petty_ig').GetName] se vyslovili proti migrantům přicházejícím do státu [SCOPE.sState('pb_gold_state').GetName] a naléhají na vládu, aby podpořila „domácí“ horníky tím, že odradí od migrace do tohoto státu."
 goldrush.3.f: "„Opravdu si myslíte, že se stěhují jen proto, že chtějí pracovat? Jen se rozhlédněte! Co tu vidíte? Přesně tak! Zlato! Mají v očích chamtivost, povídám vám, přicházejí nám všechno sebrat a nenechají tu ani haléř. A co je vůbec špatného na tom, že se snažíme chránit budoucnost našeho lidu?“"
 goldrush.3.a: "Ve státě [SCOPE.sState('pb_gold_state').GetNameNoFormatting] potřebujeme každou volnou ruku."
 goldrush.3.b: "Omezte migraci do státu [SCOPE.sState('pb_gold_state').GetNameNoFormatting]." 
 goldrush.4.t: "Doly se organizují"
 goldrush.4.d: "Horníci i majitelé dolů se ve státě [SCOPE.sState('gr4_gold_state').GetName] snaží chránit své zájmy tím, že formálně organizují sebe i svou práci. Přístupy [SCOPE.gsInterestGroup('trade_unions_ig').GetName] a [SCOPE.gsInterestGroup('industrialists_ig').GetName] však nemohou fungovat společně."
 goldrush.4.f: "„Jeden z [SCOPE.gsInterestGroup('industrialists_ig').GetNameNoFormatting] lehce poklepe na sklo okna; zvuk zesílí prázdnota skladiště. „Chcete snad, abych jim předal i zlato? Část svého domu?“ zeptá se velkoryse, stále zády ke dveřím. „Co je moje, je moje, a co je vaše, je vaše. Doly jsou moje.““"
 goldrush.4.a: "Podpořte [SCOPE.gsInterestGroup('trade_unions_ig').GetName]."
 goldrush.4.b: "Podpořte [SCOPE.gsInterestGroup('industrialists_ig').GetName]." 
 goldrush.5.t: "[SCOPE.sCountry('owner_country_scope').GetAdjective] sen"
 goldrush.5.d: "Koluje příběh o horníkovi, který narazil na bohaté naleziště a stal se nejbohatším mužem ve svém městě. Lidé ve státě [SCOPE.sState('gold_rush_state').GetName] začínají žít nad poměry, přesvědčeni, že brzy všichni zbohatnou."
 goldrush.5.f: "„Viděli jste jeho nový dům? Jídelna je celá obložená a rámovaná borovicí, dokončená bílým emailem, s nábytkem z teaku. Dovezený lustr od nějakého neznámého řemeslníka, jehož jméno už nikdo nedokáže vyslovit. A všechno to pochází z dolů! Všechno!“"
 goldrush.5.a: "Tak škodlivé to být nemůže."
 goldrush.5.b: "Ne všechno, co je zlaté, se třpytí."
 expecting_riches: "Nákupní horečka"
 expecting_riches_angry: "Nákupní horečka potlačena"
 expecting_riches_forever: "Nerealistická očekávání."
 ig_leaders.20.t: "Riskantní sázka"
 ig_leaders.20.d: "[SCOPE.sCharacter('reckless_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('reckless_ig').GetName], otevřeně káže o výhodách, které může naší vládě přinést tajemná a utajená politická sázka. Když je požádán o podrobnosti, [SCOPE.sCharacter('reckless_leader').GetSheHe] se potutelně usměje a odmítne to rozvést."
 ig_leaders.20.f: "[SCOPE.sCharacter('reckless_leader').GetFullNameNoFormatting] měl vždycky slabost pro dobrodružství a podezřele vysoké klobouky. [SCOPE.sCharacter('reckless_leader').GetHerHis|U] nejbližší přátelé těmto nebezpečným vlastnostem podle všeho nevěnují pozornost, ale nejváženější pánové vyjádřili své obavy mírně pasivně-agresivním způsobem.\n\n„Nikdo by přece nikdy nepochyboval o bezúhonném občanovi, jako jsem já, nemyslíte?“"
 ig_leaders.20.a: "Jak špatné by to mohlo být?"
 ig_leaders.20.b: "To je naprosto směšná představa."
 gamble_denied_modifier: "Sázka zamítnuta" 
 ig_leaders.1.t: "Riskantní sázka: úspěch"
 ig_leaders.1.d: "Dramatický plán v našem hlavním městě právě přinesl ovoce. Teď, když byl odhalen, je zřejmé, že měl svá rizika i slabiny, ale nikdo nemůže popřít, že se tentokrát [SCOPE.gsInterestGroup('reckless_ig').GetName] bohatě vyplatil."
 ig_leaders.1.f: "„Vždycky jsem věděl, že jsem předurčen k velkým věcem, víte, má vlastní babička na tom vždy velmi trvala. Kéž by tu ještě byla a mohla to vidět... ach, alespoň to teď uvidí svět, a zvlášť vy, můj nejdražší příteli.“"
 ig_leaders.1.a: "[SCOPE.gsInterestGroup('reckless_ig').GetName] sklidí odměnu."
 ig_leaders.1.b: "Země sklidí odměnu." 
 ig_leaders.2.t: "Riskantní sázka: neúspěch"
 ig_leaders.2.d: "Dramatický plán [SCOPE.gsInterestGroup('reckless_ig').GetName] v našem hlavním městě právě skončil katastrofou. Rizika byla vysoká od samého začátku, ale [SCOPE.sCharacter('reckless_leader').GetFullName] se přesto rozhodl, že stojí za to ho uskutečnit. Výsledky byly samozřejmě pohromou pro všechny zúčastněné."
 ig_leaders.2.f: "Soudce třikrát udeřil kladívkem. Soudní síň alespoň na okamžik potlačila výkřiky rozhořčení. Žádný spojenec [SCOPE.sCharacter('reckless_leader').GetFullNameNoFormatting] nepřicházel na odvážnou záchranu. A pak v tichu předtím, než soudce promluvil, bylo obžalovanému všechno jasné... tento podnik byl od začátku odsouzen k zániku."
 ig_leaders.2.a: "[SCOPE.gsInterestGroup('reckless_ig').GetName] nelze svěřit moc."
 ig_leaders.2.b: "Nechte [SCOPE.sCharacter('reckless_leader').GetFullName], ať vezme vinu na sebe."
 ig_leaders.2.c: "Klid, ponechte [SCOPE.gsInterestGroup('reckless_ig').GetName] ve vedení."
 ig_leaders.2.b.tt: "[SCOPE.sCharacter('reckless_leader').GetFullName] odstoupí." 
 ig_leaders.3.t: "Velký plán se vyplatil"
 ig_leaders.3.d: "[SCOPE.sCharacter('meticulous_leader').GetFullName], metodický vůdce [SCOPE.gsInterestGroup('meticulous_ig').GetName], pilně pracoval na zvýšení kreditu země. Konečně se všechna [SCOPE.sCharacter('meticulous_leader').GetHerHis] práce vyplatila, ale pro [SCOPE.gsInterestGroup('meticulous_ig').GetName], nebo pro [ROOT.GetCountry.GetName]?"
 ig_leaders.3.f: "[SCOPE.sCharacter('meticulous_leader').GetWomanMan] je svými činy tak potěšen, že [SCOPE.sCharacter('meticulous_leader').GetSheHe] vypadá, jako by měl co nevidět vzplanout zadržovanými emocemi. Jak okouzlující. Z profesionálního hlediska to však není zrovna nejchytřejší tah.\n\n„Ano! Přesně podle plánu!“"
 ig_leaders.3.a: "[SCOPE.gsInterestGroup('meticulous_ig').GetNameNoFormatting] sklidí odměnu."
 ig_leaders.3.b: "[ROOT.GetCountry.GetNameNoFormatting] sklidí odměnu."
 custom_herself: "ona sama"
 custom_himself: "on sám" 
 ig_leaders.4.t: "Diplomatické turné"
 ig_leaders.4.d: "Vládnoucí [SCOPE.gsInterestGroup('charismatic_ig').GetName], vedená charismatickým [SCOPE.sCharacter('charismatic_leader').GetFullName], zahájila velké propagační turné. Rozhodnutí, zda zaměřit úsilí doma, nebo v zahraničí, však bylo ponecháno na poslední chvíli a není jasné, zda [SCOPE.gsInterestGroup('charismatic_ig').GetName] udělá více pro sebe, nebo pro zemi jako celek."
 ig_leaders.4.f: "„Na troše sebepropagace není nic špatného, pokud je to pro dobrou věc.“\n\n„A jak byste určil povahu té věci? Podle toho, jak vám dozrává měšec?“\n\n„Ale podle její samé podstaty! Vždyť i věc otrhanců může mít na stát blahodárný účinek, pokud má srdce na správném místě.“"
 ig_leaders.4.a: "Turné by mělo získat podporu pro [SCOPE.gsInterestGroup('charismatic_ig').GetName]."
 ig_leaders.4.b: "Turné by mělo získat podporu pro [ROOT.GetCountry.GetName]." 
 ig_leaders.5.t: "Buď já, nebo oni"
 ig_leaders.5.d: "[SCOPE.sCharacter('smug_leader').GetFullName], vůdce vládnoucí [SCOPE.gsInterestGroup('smug_ig').GetName], už má dost kompromisů se svými koaličními partnery. [SCOPE.sCharacter('meticulous_leader').GetSheHe|U] požaduje, aby buď [SCOPE.sCharacter('smug_leader').GetHerHis] spolupracovníci následovali [SCOPE.sCharacter('smug_leader').GetHerHis] rozkazy, nebo [SCOPE.gsInterestGroup('smug_ig').GetName] nikdy neschválí jejich změny."
 ig_leaders.5.f: "„K tomu přece vůdci jsou, ne? Já vedu, vy následujete. Mně to zní docela jednoduše. Kdyby chtěli vést, mohli být vůdci sami, ale asi si nikdo jiný nemyslel, že by to dokázali.\n\nBuď bude po mém, nebo můžete jít!“"
 ig_leaders.5.a: "To je směšné prohlášení."
 ig_leaders.5.b: "Dobrá, [SCOPE.gsInterestGroup('smug_ig').GetName] bude vedoucí silou."
 imperious_leader_modifier: "Panovačný vůdce odmítnut"
 imperious_leader_good_modifier: "Panovačný vůdce podpořen"
 imperious_leader_dont_agree_modifier: "Požadavky panovačného vůdce zamítnuty"
 imperious_leader_agree_modifier: "Požadavky panovačného vůdce schváleny"
 ig_leaders.6.t: "Hra o moc"
 ig_leaders.6.d: "[SCOPE.sCharacter('reckless_out_of_govt_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('reckless_out_of_govt_ig').GetName], učinil v hlavním městě pozoruhodný tah o moc, aby zajistil [SCOPE.gsInterestGroup('reckless_out_of_govt_ig').GetName] místo ve vládě. Není však zcela jasné, zda by měli být za své... novátorské taktiky odměněni."
 ig_leaders.6.f: "V ulici vedoucí k sídlu [SCOPE.gsInterestGroup('reckless_out_of_govt_ig').GetNameNoFormatting] svítí jen jedna lampa. Uvnitř svítí také jen jedna. Tam [SCOPE.sCharacter('reckless_out_of_govt_leader').GetFullNameNoFormatting] odpočívá mezi přepychovým mahagonovým nábytkem a sametovými polštáři. Lampa je totožná s těmi, které byly poslány z Východu.\n\n„Účel světí prostředky a naše prostředky jsou velmi, velmi ospravedlněné.“\n\nJe těžké [SCOPE.sCharacter('reckless_out_of_govt_leader').GetHerHim] nevěřit, když [SCOPE.sCharacter('reckless_out_of_govt_leader').GetSheHe] nabízí lákavé místo po [SCOPE.sCharacter('reckless_out_of_govt_leader').GetHerHis] boku."
 ig_leaders.6.a: "[SCOPE.sCharacter('reckless_out_of_govt_leader').GetFullName] za to bude uznán."
 ig_leaders.6.b: "V lásce a válce není dovoleno všechno."
 play_for_power_good_modifier: "Podpořené mocenské spiknutí" 
 neighbor_events.1.t: "Víra nezná hranic"
 neighbor_events.1.d: "[SCOPE.gsInterestGroup('devout_ig').GetName] si přejí posílit naše vazby s [SCOPE.sC('neighbor_country').GetName] skrze naši společnou víru."
 neighbor_events.1.f: "Na okamžik se zastavil a otřel si čelo, když si všiml, že [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting] čeledín na sousedním poli zřejmě klečí v brázdě.\n\nZmateně se naklonil, aby lépe viděl, a konečně si všiml, že se muž hluboce modlí. Měl to poznat, ale nikdy ho nenapadlo, co by mohli mít společného: několik těžkých let a víru, že se věci zlepší."
 neighbor_events.1.a: "Navzdory rozdílům si musíme vážit společných hodnot."
 neighbor_events.1.b: "Jsme nejprve [ROOT.GetCountry.GetAdjectiveNoFormatting] a teprve potom [ROOT.GetCountry.GetStateReligion.GetName]!"
 notification_neighbor_events_1_tooltip: "#header $notification_neighbor_events_1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_neighbor_events_1_desc$"
 notification_neighbor_events_1_name: " [concept_relations] s [SCOPE.sC('originator').GetName ] se zlepšily"
 notification_neighbor_events_1_desc: "[SCOPE.sC('originator').GetName] zlepšil naše [concept_relations] tím, že se odvolal na naši společnou víru [SCOPE.sC('originator').GetStateReligion.GetName]." 
 neighbor_events.2.t: "Chceš-li mír"
 neighbor_events.2.d: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] kvůli našim špatným vztahům navrhují tvrdší zahraniční politiku vůči [SCOPE.sC('neighbor_country').GetName]."
 neighbor_events.2.f: "„Jestli je pravda jen polovina toho, co říkáš, nechtěla bych tě mít poblíž té hranice,“ řekla, „ale nemyslím si, že je.“\n„Matko, vždycky jsi říkala, že [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting] nelze věřit. Proč bys jim věřila, že budou respektovat naše hranice? Nikdo nechce, aby to dělal jeho syn, protože ví, že je to nebezpečné. Právě proto to musíme udělat.“"
 neighbor_events.2.a: "Odložte zdvořilé formality. Jsou to nepřátelé."
 neighbor_events.2.b: "Navzdory vzájemné nelibosti není třeba to vyhrocovat."
 if_you_want_peace_bad_modifier: "Pasivní postoj" 
 neighbor_events.3.t: "Proletáři všech zemí"
 neighbor_events.3.d: "Internacionalistické nálady uvnitř [SCOPE.gsInterestGroup('trade_unions_ig').GetName] vyvolaly návrhy oslovit dělníky v [SCOPE.sC('neighbor_country').GetName]."
 neighbor_events.3.f: "„Nechápu, jak jsi mohl někoho jako on pustit do našeho domu. To teď máme hostit lidi ze všech koutů světa?“\n„Tenhle muž drží každý den v dole můj život ve svých rukou. Už mu svým životem důvěřuji. A když už jsme u toho, mnohem raději ho přivítám tady než kteréhokoli z těch [ROOT.GetCountry.GetAdjectiveNoFormatting] parchantů, kteří nás tam posílají.“"
 neighbor_events.3.a: "Třída nad národem!"
 neighbor_events.3.b: "Tyto nevlastenecké myšlenky vyprchají." 
 neighbor_events.4.t: "Přeshraniční investice"
 neighbor_events.4.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('industrialists_ig').GetName] mají zájem investovat do průmyslu sousední [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting]."
 neighbor_events.4.f: "Vstal, nasadil si klobouk a zamířil ke dveřím. Zpočátku to vypadalo, že odejde beze slova, ale pak se otočil a promluvil se sotva potlačovaným hněvem.\n„Obviňovat mě z nedostatku vlastenectví kvůli tomu, kde se snažím vydělat peníze, není jen urážka. Prozrazuje to naprosté nepochopení toho, jak se peníze vydělávají. Myslíte si, že jsem toho, co už mám, dosáhl provinčním uvažováním?“"
 neighbor_events.4.a: "Výborná investice!"
 neighbor_events.4.b: "Donuťte je investovat doma." 
 neighbor_events.5.t: "Zastavte tisk"
 neighbor_events.5.d: "Noviny zakázané podle [ROOT.GetCountry.GetAdjectiveNoFormatting] zákona se začaly znovu tisknout pod shovívavými zákony země [SCOPE.sC('neighbor_country').GetName] a pašovat přes hranici."
 neighbor_events.5.f: "„Pořád máš svůj výtisk, že? Zaplatím ti polovinu toho, cos za něj dala ve státě [SCOPE.sState('neighbor_state').GetNameNoFormatting].“\nJejí přítelkyně jí neochotně podala noviny.\n„Víš, můj táta říká, že všechno, co se tam píše o [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], jsou nesmysly.“\n„Jo. No, on neumí číst, že ne?“"
 neighbor_events.5.a: "Tentokrát nad tím můžeme přimhouřit oči."
 neighbor_events.5.b: "Tvrdě zakročte proti všem, kdo šíří tuhle špínu!"
 neighbor_events.6.t: "[SCOPE.sC('neighbor_country').GetName], bez cenzury"
 neighbor_events.6.d: "Kniha odmítnutá k vydání v [SCOPE.sC('neighbor_country').GetName] kvůli tamním restriktivním zákonům byla přijata [ROOT.GetCountry.GetAdjectiveNoFormatting] nakladatelem."
 neighbor_events.6.f: "Tiskařský učeň zvedl neznámé písmo. Jeho mistr si všiml jeho zvědavosti a kývl k němu.\n„To je pro [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting] knihu, kterou tiskneme.“\n„Proč tady tiskneme [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting] knihy?“\nTiskař pokrčil rameny.\n„Je to svobodná země.“"
 neighbor_events.6.a: "Nakladatel by měl projevit více taktu a respektovat naše sousedy."
 neighbor_events.6.b: "Podle zákonů [ROOT.GetCountry.GetName] mají právo ji vytisknout." 
 neighbor_events.7.t: "Na druhé straně plotu"
 neighbor_events.7.d: "Lidé si stěžují na rozdíl v životní úrovni mezi námi a našimi sousedy v [SCOPE.sC('neighbor_country').GetName]."
 neighbor_events.7.f: "Když se dveře obchodu zavřely, vyměnili si významný pohled.\n\n„Ani si nevšimla, že jsi jí špatně vrátil.“\n\n„Proč myslíš, že to dělám? Její sorta si to může dovolit. Ať mě vezme čert, jestli si [SCOPE.sC('neighbor_country').GetAdjectiveNoFormatting] myslí, že sem mohou přijít, okázale dávat najevo své bohatství a čekat, že to budeme prostě trpět.“"
 neighbor_events.7.a: "To je prostě příklad globální ekonomické nerovnosti."
 neighbor_events.7.b: "Je zřejmé, že jsou to lháři, kteří okrádají cizince o peníze."
 neighbor_events.7.c: "Takové věci prostě jsou, nestojí za to o nich přemýšlet."
 commander_events.2.t: "Samá zábava a žádná práce"
 commander_events.2.d: "Osobní návyky [SCOPE.sCharacter('commander_with_addiction').GetPrimaryRoleTitle] [SCOPE.sCharacter('commander_with_addiction').GetFullName] začínají překážet [SCOPE.sCharacter('commander_with_addiction').GetHerHis] roli jako [SCOPE.sCharacter('commander_with_addiction').GetPrimaryRoleTitle]."
 commander_events.2.f: "[SCOPE.sCharacter('commander_with_addiction').GetFullNameNoFormatting] se na důstojníka usmívá vítězoslavně a dychtivě. [SCOPE.sCharacter('commander_with_addiction').GetHerHis|U] oči už zjevně zažily lepší časy. Pečlivě uvelebený ve [SCOPE.sCharacter('commander_with_addiction').GetHerHis] koženém křesle, [SCOPE.sCharacter('commander_with_addiction').GetHerHis] hlas zní stejně gumově jako jeho materiál:\n\n„Je to stresující práce, víte. Není třeba ji dělat ještě stresující.“"
 commander_events.2.a: "Propusťte [SCOPE.sCharacter('commander_with_addiction').GetHerHim]."
 commander_events.2.b: "[SCOPE.sCharacter('commander_with_addiction').GetSheHe|U] je příliš cenný."
 commander_events.2.a.tt: "[SCOPE.sCharacter('commander_with_addiction').GetPrimaryRoleTitle] [SCOPE.sCharacter('commander_with_addiction').GetFullName] je propuštěn"
 commander_events.4.t: "Protest generála"
 commander_events.4.d: "[SCOPE.sCharacter('arguing_commander_one').GetFullName] odhalil pochybné návyky, kterým se oddává [SCOPE.sCharacter('arguing_commander_two').GetFullName], a požaduje [SCOPE.sCharacter('arguing_commander_two').GetHerHis] propuštění."
 commander_events.4.f: "„Už samotná představa, že patřím do stejné instituce jako ten darebák, je pro mě nemyslitelná. Jsou skvrnou na uniformě, kterou sdílíme. Odmítám uznat, že takové chování je přijatelné pro někoho v jejich postavení. Nebudu s nimi pracovat už ani den.“"
 commander_events.4.a: "[SCOPE.sCharacter('arguing_commander_two').GetFullName] nemůže být propuštěn."
 commander_events.4.b: "[SCOPE.sCharacter('arguing_commander_two').GetFullName] nemá v našich řadech místo!"
 commander_events.4.b.tt: "[SCOPE.sCharacter('arguing_commander_two').GetFullName] je propuštěn."
 commander_fired: "Velitel propuštěn"
 commander_kept: "Velitel ponechán"
 commander_events.5.t: "Válka pokroku"
 commander_events.5.d: "[SCOPE.sCharacter('commander_invention').GetFullName] přišel na to, jak vylepšit vynález #bold opakovaček#!."
 commander_events.5.f: "„[SCOPE.sCharacter('commander_invention').GetFullNameNoFormatting] si upraví brýle naplněné sebedůvěrou.\n\n„No, bylo to vlastně docela jednoduché, víte. Jen jsem pozoroval technologii, s níž muži právě pracovali, a uvědomil si, že bychom mohli tu a tam něco změnit.“\n\nNa způsobu, jakým [SCOPE.sCharacter('commander_invention').GetSheHe] mluví, je něco, co [SCOPE.sCharacter('commander_invention').GetHerHim] propůjčuje vznešené vystupování a značnou oblibu mezi masami, když [SCOPE.sCharacter('commander_invention').GetSheHe] drží tu pušku. Taková sebedůvěra!“"
 commander_events.5.a: "Zaměřte se na palebnou sílu."
 commander_events.5.b: "Zaměřte se na přesnost."
 law_events.1.t: "Odpírači z důvodu svědomí"
 law_events.1.d: "[SCOPE.gsInterestGroup('anti_conscription_ig').GetName] tvrdí, že občané s morálními nebo náboženskými námitkami proti násilí by měli být vyňati ze zákona [SCOPE.sLaw('current_law_scope').GetName]."
 law_events.1.f: "„Odvod je prostě další formou nucené práce, a vlastně jednou z nejhorších, protože nás nutí pozvednout zbraně proti bližnímu bez ohledu na naše osobní morální názory.“"
 law_events.1.a: "Odpírači jsou z odvodu vyloučeni."
 law_events.1.b: "Bojovat musí každý."
 law_events.2.t: "Světlo na cestu"
 law_events.2.d: "Nově zřízený policejní sbor požádal o osvětlení ulic, aby si výrazně usnadnil práci."
 law_events.2.f: "„Každou noc ztrácíme zločince v těch temných ulicích. Jak máme dělat svou práci bez náležitých podmínek?“"
 law_events.2.a: "Osvětlení bude povinné."
 law_events.2.b: "Příliš nákladné."
 law_events.4.t: "Tajný výzkum"
 law_events.4.d: "Tajná policie požádala, abyste vyzkoumali $identification_documents$."
 law_events.4.f: "„Potřebujeme lepší způsob, jak sledovat potížisty, které zadržíme. Kdyby u sebe museli mít průkaz totožnosti, bylo by to mnohem snazší.“"
 law_events.4.a: "Výborný nápad."
 law_events.4.b: "Není to priorita."
 law_events.5.t: "Nespokojení majitelé dolů"
 law_events.5.d: "Několik majitelů dolů ze státu [SCOPE.sState('state_with_mine').GetName] žádá o výjimku z důlních předpisů."
 law_events.5.f: "„Je prostě směšné myslet si, že budeme schopni udržet ziskový důl jen s desetihodinovými pracovními dny, nemluvě o dalších mimořádných nákladech, které nám vzniknou zavedením všech těchto bezpečnostních opatření.“"
 law_events.5.a: "Jedna malá výjimka nemůže uškodit."
 law_events.5.b: "Žádné výjimky."
 law_events.6.t: "Světská výuka"
 law_events.6.d: "[SCOPE.gsInterestGroup('intelligentsia_ig').GetName] dali najevo svou nespokojenost s přijetím zákona [SCOPE.sLaw('current_law_scope').GetName] a tvrdí, že vzdělání a náboženství by měly být oddělené záležitosti."
 law_events.6.f: "„Jak můžeme očekávat, že se naše děti naučí cokoli smysluplného, když jsou od samého počátku indoktrinovány?“"
 law_events.6.a: "Zvážíme to."
 law_events.6.b: "Nepřichází v úvahu."
 modifier_religious_schools_abolished_intelligentsia: "Vyslyšené obavy ohledně náboženských škol"
 religious_schools_bad_modifier: "Náboženské školy podpořeny"
 religious_schools_good_modifier: "Náboženské školy zpochybněny"
 notification_expedition_progress_average_desc: "Vaše současná expedice postupuje bez incidentů"
 notification_expedition_progress_average_tooltip: "Vaše expedice pokračuje stálým tempem"
 notification_expedition_progress_average_name: "Současná expedice"
 expedition_event_ongoing_tt: "Expedice pokračuje."
 expedition_events.1.t: "Expedice za zmapováním řeky Niger"
 expedition_events.1.d: "Navzdory mnoha pokusům o její splutí zůstává celý tok této řeky záhadou. Máme vyslat expedici, která se pokusí zmapovat průběh řeky?"
 expedition_events.1.f: "„Členové obchodních společností vyjádřili zájem prosazovat politiku „Nové Afriky“, založenou na rozšířeném obchodu a šíření [ROOT.GetCountry.GetAdjectiveNoFormatting] hodnot v této zemi.\n\nZdůraznili nutnost zmapovat řeku Niger kvůli jejímu využití jako obchodní tepny a navrhli za tímto účelem expedici.“"
 expedition_events.1.a: "Znám osobu vhodnou pro tento úkol."
 expedition_events.1.b: "Teď ne."
 expedition_events.2.t: "Výběr vůdce"
 expedition_events.2.d: "Skupina silných kandidátů vyjádřila zájem vést expedici. Toto rozhodnutí bychom však neměli dělat lehkovážně."
 expedition_events.2.f: "Jako první dorazil dobře oblečený, svěží, téměř mladý gentleman, jehož horlivosti zapůsobit se vyrovnala jen jeho ochota vyhovět. Jeho úsměv, široký, jak si jen lze představit, byl módně upravený: „Smím-li...,“ řekl zdvořile a předložil své pověřovací listiny."
 expedition_events.2.a: "[SCOPE.sCharacter('expedition_leader_1').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_1').GetFullName]"
 expedition_events.2.b: "[SCOPE.sCharacter('expedition_leader_2').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_2').GetFullName]"
 expedition_events.2.c: "[SCOPE.sCharacter('expedition_leader_3').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_3').GetFullName]"
 expedition_events.3.t: "Výběr rozpočtu"
 expedition_events.3.d: "Kolik peněz chcete vyčlenit na rozpočet expedice?"
 expedition_events.3.f: "„Nebudu vám lhát: vydáme se daleko od krbu a domova. Lhát o nebezpečí by vůči vám všem byla medvědí služba. Můžeme narazit na nejrůznější překážky a čím více prostředků budeme mít, tím lépe budeme připraveni. Připomínám vám však, že až se vítězoslavně vrátíme, čeká nás sláva!“"
 expedition_events.3.a: "Malou částku."
 expedition_events.3.b: "Střední částku."
 expedition_events.3.c: "Velkou částku."
 expedition_events.4.t: "Expedice vyráží"
 expedition_events.4.d: "Po několika týdnech příprav a cestování dorazila expedice vedená [SCOPE.sCharacter('expedition_leader').GetFullName], jejímž cílem je zmapovat tok řeky Niger, do svého výchozího bodu."
 expedition_events.4.f: "„Příliv byl tak časně ráno nízký. Náš parník zpomalil, když se mezi přístavními budovami jako skromné smaragdy objevily první záblesky vegetace. Vzduch naplněný solí byl zvolna nahrazen rajskými zrny, anýzem a hřebíčkem. Na jedné ze střech mladá dívka sušila prádlo.“"
 expedition_events.4.a: "Kupředu!"
 expedition_events.30.t: "Místní průvodci"
 expedition_events.30.d: "Jeden člen expedice navrhl, abychom se zastavili v některých blízkých osadách a pokusili se najmout místní průvodce. Ostatní členové skupiny vyjádřili obavy, že by to mohlo chvíli trvat."
 expedition_events.30.f: "„Roviny se táhly, kam až naše oči dohlédly. Nebyla tu žádná možná hora ani vyvýšenina, kde by se naše unavená expedice mohla zastavit a zorientovat. Nic - a pak džungle. Vždycky džungle. Občas řeka (občas). A pak džungle. Viridiánové hedvábí; lákavý, prizmatický lesk mokrých květů nad zapomenutými potoky.“"
 expedition_events.30.a: "Výborný nápad."
 expedition_events.30.b: "Ne, zabere to příliš dlouho."
 expedition_events.31.t: "Místní průvodci nalezeni"
 expedition_events.31.d: "Po několika hodinách se podařilo najít průvodce a byla dohodnuta odměna."
 expedition_events.31.f: "„Zdá se, že průvodci vědí, co dělají. A co je důležitější, kam jdou.“\n\n„Bystrý postřeh, a takový, jaký by zvládl i můj malý chlapec. Kolik žádali? Zlato? Zásoby? Zlaté zásoby?“\n\n„No, pane, ehm... nežádali nic. Stejně měli namířeno tím směrem.“"
 expedition_events.31.a: "Skvělá zpráva."
 expedition_events.32.t: "Místní průvodci nenalezeni"
 expedition_events.32.d: "Sotva uplynuly dvě hodiny, došlo navigátorovi [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastNameNoFormatting], že jsou naprosto a neodvolatelně ztraceni. Jeden horlivý sluha pak rychle přišel s nápadem zanechat hledání místních průvodců a místo toho znovu najít břeh řeky."
 expedition_events.32.f: "„Strašlivý nápad od začátku do konce.“"
 expedition_events.32.a: "To nás zdrží."
 expedition_events.40.t: "Člen expedice se utopil"
 expedition_events.40.d: "V noci spadl jeden člen expedice z lodi. Mohli bychom strávit čas jeho hledáním, nebo pokračovat dál."
 expedition_events.40.f: "„Nejprve přišel křik. Pak tonutí. A ta dlouhá, šťavnatá skvrna na vodě. Rudá jako jahodový sirup nebo poslední okamžiky úsvitu, když je obzor jasný a mraky vypadají jako obnošené obvazy.\n\n„Nejsem zrovna dobrý plavec, víte?“ pohlédl před několika dny na řeku s pokřiveným úsměvem, „je dobře, že už je to skoro za námi.““"
 expedition_events.40.a: "Řekněte jim, ať pokračují."
 expedition_events.40.b: "Najděte ho!"
 expedition_events.41.t: "Expedici sužuje malárie"
 expedition_events.41.d: "Nejnovější zpráva z expedice nás informuje, že několik členů posádky onemocnělo malárií."
 expedition_events.41.f: "„Za úsvitu tam nebyli. Většina našich mužů byla stále ve stanech a ti nemnozí, kteří za mnou přišli, se k nim báli byť jen přiblížit. „Mají tu nemoc, [SCOPE.sCharacter('expedition_leader').GetCustom('getSirMadam')].“ Zamlžený vzduch kolem jejich siluet mi připomínal ducha. Jejich bledé tváře se třásly horečkou a v jejich hlasech nebylo nic, co by se byť vzdáleně zdálo živé.“"
 expedition_events.41.a: "Řekněte jim, ať pokračují."
 expedition_events.41.b: "Řekněte jim, ať si chvíli odpočinou."
 expedition_events.50.t: "Útok na řece"
 expedition_events.50.d: "Během cesty po řece je expedice napadena místními."
 expedition_events.50.f: "„Opatrně, [SCOPE.sCharacter('expedition_leader').GetCustom('getSirMadam')]!“ Ostrý zvuk přehlušil hluk posádky. Do dřevěné stěny těsně vedle mé hlavy se teď chvěl zapíchnutý šíp. „K zemi! Všichni k zemi!“\n\nNa okraji džungle stála řada mužů; jako strážné sochy drželi kopí a luky namířené přímo na nás. Jejich opatrné pohyby, to pomalé šourání tam - překročili jsme jejich hranice. „K zemi!“ slyšel jsem muže křičet."
 expedition_events.50.a: "Zůstaňte stát a bojujte."
 expedition_events.50.b: "Utíkejte!"
 expedition_events.51.t: "Úspěšná obrana"
 expedition_events.51.d: "Expedici se podařilo úspěšně ubránit útoku."
 expedition_events.51.f: "„Vzpamatujte se! Hm... zdá se, že jejich primitivní zbraně se naší palebné síle nevyrovnaly. Ještě neusínejme na vavřínech. Dva muži vyčistí prach ze zbraní. Další tři chci na hlídce a zbytek připraví naše postavení na další návštěvu té chátry.“"
 expedition_events.51.a: "Dobrá práce."
 expedition_events.52.t: "Neúspěšná obrana"
 expedition_events.52.d: "Expedici se nepodařilo ubránit útoku a musí ustoupit."
 expedition_events.52.f: "„Ty! Jsi náš nejrychlejší běžec. Dostaň se do nejbližšího námořního přístavu a připrav následující dopis pro [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Stali jsme se terčem náhlého útoku ze zálohy od neznámého nepřítele. Pokusili jsme se je od nás odstrašit, ale bylo jich příliš mnoho. Ztratili jsme několik mužů, než se nám konečně podařilo uniknout po řece. Jejich jména jsou následující...“"
 expedition_events.52.a: "Zatracená škoda."
 expedition_events.53.t: "Taktický ústup"
 expedition_events.53.d: "Expedice opouští oblast tak rychle, jak jen může."
 expedition_events.53.f: "„Spěchali jsme, abychom se odtamtud dostali, odbočili jsme na říčním rameni; nebyla to správná cesta, ale byla to bezpečná cesta.“"
 expedition_events.53.a: "Alespoň jsou všichni naživu."
 expedition_events.60.t: "Film z expedice"
 expedition_events.60.d: "Jeden člen expedice požádal, aby se na den zastavili a mohli natočit místní divokou zvěř."
 expedition_events.60.f: "„Blátěné domy vystupovaly jako čokoládové pudinky vytažené přímo z řeky. Potoky se splétaly jako dlouhé vlasy mladé dívky; bažiny, velká jezera. Zeleň na břehu řeky pokrývala jejich siluety jako vrstva průsvitné máty. Voda byla všude - náš vlastní soukromý oceán.“"
 expedition_events.60.a: "Dobrý nápad."
 expedition_events.60.b: "Nemůžeme si dovolit ztrácet čas."
 expedition_events.70.t: "Úplavice v expedici"
 expedition_events.70.d: "Nejnovější zpráva z expedice říká, že několik členů posádky onemocnělo úplavicí. Jeden člen dokonce zemřel."
 expedition_events.70.f: "„S polovinou expedice, která každou čtvrthodinu běhá do křoví a zpátky, sotva můžeme postupovat. Měli bychom je opustit a pokračovat.“\n\n„Opustit je? Nechat za sebou jen našeho ordonance, podkováře, navigátora, krejčího, ševce, dva střelce a tři veslaře? A jak si plánujete uvařit čaj, když se neodvažujete dotknout vody?“\n\n„Máte pravdu.“"
 expedition_events.70.a: "Řekněte jim, ať pokračují."
 expedition_events.70.b: "Řekněte jim, ať si chvíli odpočinou."
 expedition_events.80.t: "Spatřen hroch"
 expedition_events.80.d: "Dále po řece byl spatřen hroch. Možná bude bezpečnější počkat, až odejde, než se pokoušet kolem něj proplout."
 expedition_events.80.f: "„Jeho kulatý vzhled může naznačovat veselou povahu, ale nenechte se zmást, hroch je kruté zvíře.“"
 expedition_events.80.a: "Pokusíme se kolem něj proplout."
 expedition_events.80.b: "Počkáme."
 expedition_events.81.t: "Hroch útočí"
 expedition_events.81.d: "Dříve spatřený hroch narazil do jedné z expedičních lodí a převrátil ji. Dva členové posádky zemřeli a část zásob byla ztracena."
 expedition_events.81.f: "„Stalo se to tak rychle. Ta obluda převrátila loď, jako by nic nevážila. Někteří měli štěstí, jiní méně.“"
 expedition_events.81.a: "Ach bože."
 expedition_events.82.t: "Hroch spí"
 expedition_events.82.d: "Hroch se při našem pokračování po proudu nepohnul a podařilo se nám projet bez incidentu. Jeho oči byly k naší přítomnosti lhostejné."
 expedition_events.82.f: "„Jaké nádherné stvoření. Řekněte mi, nebyl to snad záblesk slonoviny, který jsem zahlédl v jeho čelistech?“\n\n„Jeho zuby mají hodnotu i využití, pokud právě takovou odpověď hledáte.“\n\n„Právě tak! Pušky ke mně. Příští hroší hlava, kterou spatřím, bude moje. A miřte nízko: neponičte tlamu.“"
 expedition_events.82.a: "Díky bohu."
 expedition_events.83.t: "Hroch odchází"
 expedition_events.83.d: "Expedice několik hodin čekala a hroch se nakonec vydal dál."
 expedition_events.83.f: "„Tohle malé vyrušení nás ovšem stálo denní světlo, budeme se muset utábořit tady.“"
 expedition_events.83.a: "To je úleva."
 expedition_events.90.t: "Hrob padlých"
 expedition_events.90.d: "Expedice narazí na několik hrobů vykopaných na břehu řeky. Cetky a předměty zanechané na nich naznačují, že jde o vše, co zbylo z předchozí expedice."
 expedition_events.90.f: "„Malý zarámovaný obrázek dítěte, pokrytý hlínou. Známé jméno vyryté na zadní straně. Relikviář s pramenem světlých vlasů. Několik stránek deníku, které jsme se laskavě rozhodli nečíst. Dopis. Možná bychom ho měli vzít. Není dokončený. Jeden z mužů tiše promluví: „toho muže jsem znal.“ Vezme ho a složí si ho do kapsy.\n\nI tady pořád slyším jejich živé, jasné hlasy. „Pramen najdeme za méně než měsíc!“ Ano, i tady.“"
 expedition_events.90.a: "I v Arkádii je stále zde."
 expedition_events.100.t: "Uneseni"
 expedition_events.100.d: "Z expedice dorazila zpráva, že několik jejích členů, včetně [SCOPE.sCharacter('expedition_leader').GetFullName], unesl místní král, který požaduje výkupné."
 expedition_events.100.f: "„Světlo v noci je jen zřídka dobrým znamením. Středověká představivost, která přiměla lidi mluvit o bludičkách, ignis fatuus, nebezpečných stvořeních vedoucích je na smrt, se nemýlila.\n\nPochodeň se změnila v lucernu a lucerna v člověka. Člověk se změnil v tucet a brzy nato nás drželi v zajetí. Kov jejich zbraní se v noci také leskl, nemohli jsme se jim postavit, ne za takových podmínek.“"
 expedition_events.100.a: "Zaplatíme."
 expedition_events.100.b: "Budou si s tím muset poradit."
 expedition_leader_kidnap_modifier: "Výkupné za vůdce expedice"
 expedition_events.101.t: "Unesená posádka propuštěna"
 expedition_events.101.d: "Po zajištění zaplacení výkupného je posádka expedice propuštěna bez újmy a dokonce vyslána správným směrem."
 expedition_events.101.f: "„Nebyl to zrovna nejpříjemnější zážitek, ale večeřeli jsme pečené jamy a celkově s námi zacházeli dobře.“"
 expedition_events.101.a: "Výborně."
 expedition_events.102.t: "Unesená posádka uniká"
 expedition_events.102.d: "Navzdory nezaplacení výkupného se několika členům expedice podařilo získat svobodu. Mnohem více členů posádky však zůstalo za nimi."
 expedition_events.102.f: "„Čekali jsme v chladných celách z mokrého kamene. Krmili nás beze slova a pak odešli dřív, než jsme se je vůbec mohli pokusit uplatit. Když přišly nejtemnější hodiny, začali se hádat. Jeden z našich mužů říkal, že se přou o noční směnu. A o peníze. Když se dveře znovu otevřely, konečně jsme unikli.“"
 expedition_events.102.a: "Politováníhodné."
 expedition_events.110.t: "Smrt vůdce"
 expedition_events.110.d: "Během malé potyčky se [SCOPE.sCharacter('dead_expedition_leader').GetHerHis] do nohy zaryla mušketová koule. Samotné zranění nebylo vážné, ale infekce ano. [SCOPE.sCharacter('expedition_leader').GetFullName] převzal vedení jako nový vůdce."
 expedition_events.110.f: "„Teplo mě překvapilo. Bolest také. Po výstřelu jsem nemohl chodit a věděl jsem, že později už také nebudu. Tohle je poslední šance, kdy mohu psát o tom, co jsem vykonal. Jako Marco Polo ležím na lůžku a vyprávím o neviditelných městech, nesmrtelných divech; tomu, co jsem viděl, nikdo neuvěří. To mě rmoutí. Jako příčetný muž odložím pero.\n\nDžungle vás může překvapit stejně jako kulka, ale moudrý, jak jste se stal, říká básník, nakonec pochopíte, co cesta znamená.“"
 expedition_events.110.a: "Doufejme, že nový vůdce je kompetentní."
 expedition_events.11.t: "Úspěšná expedice"
 expedition_events.11.d: "[SCOPE.sCharacter('expedition_leader').GetFullName] se triumfálně vrátil a tok i ústí řeky Niger byly zmapovány."
 expedition_events.11.f: "„Vždy jsem si představoval, že pocítím nesmírné štěstí. Štěstí tak jasné a hlasité, že byste ho téměř dokázali slyšet. Všechny řeky se tu sbíhají. Možná jsem očekával příval vody, sílu tak zjevnou, že by ji nešlo přehlédnout.\n\nAle Niger se rozbíhal do menších proudů a téměř ztrácel svou totožnost. Který z nich byl tou skutečnou řekou? Nebyly by skutečnými řekami všechny? Možná žádný. Jako u Théseovy lodi: kdy přestává být věc tou věcí?“"
 expedition_events.11.a: "Výborné zprávy!"
 expedition_events.12.t: "Neúspěšná expedice"
 expedition_events.12.d: "Po mnoha měsících bez jakýchkoli zpráv je jasné, že vaše expedice za nalezením pramene řeky Niger selhala a [SCOPE.sCharacter('expedition_leader').GetFullName] se ztratil spolu s ní."
 expedition_events.12.f: "„Myslím, že hluboko uvnitř jsme všichni věděli, že to přijde. I teď pořád mluvíme o tom, že dorazíme k ústí řeky. „Ještě pár dní,“ říkáme si a pokračujeme dál. Zpočátku někteří muži poznamenávali něco o přídělovém jídle. Teď už o tom nemluví. Řeku jsme dávno ztratili. „Ještě pár dní.““"
 expedition_events.12.a: "Zatraceně!"
 civil_war_events.1.t: "Separatisté vítězí"
 civil_war_events.1.d: "Navzdory našim pesimistickým očekáváním naši národní soukmenovci vyhráli vlastní boj za nezávislost - bez naší pomoci."
 civil_war_events.1.f: "„Duše národa je rozpolcena! Hranice mezi našimi zeměmi je krutým řezem přímo do srdce našeho lidu. Všem je zřejmé, že nyní nastal čas sjednocení!“"
 civil_war_events.1.a: "Anektujte zemi"
 civil_war_events.1.b: "Nechte je být"
 diplomatic_events.1.t: "Porušení suverenity"
 diplomatic_events.1.d: "[SCOPE.sC('initiator').GetName] zaslal [SCOPE.sC('target_country').GetName] ultimátum požadující, aby se k nim připojili ve válce [SCOPE.sW('war').GetName|v].\nOdmítli a postavili se na stranu [SCOPE.sW('war').GetLeaderOfOppositeSide( SCOPE.sC('initiator') ).GetName]!\nCo uděláme?"
 diplomatic_events.1.f: "Kouř z krbu stačí k tomu, aby zbarvil okna kanceláře bledým smogem, když se už blíží západ slunce. Pouliční lampy se rozsvěcují a dva muži si vymění znepokojený pohled.\n\n„Lampy zhasínají po celém světě a my je za svého života už znovu rozsvícené nespatříme.“"
 diplomatic_events.1.a: "Musíme pomoci [SCOPE.sC('target_country').GetName]!"
 diplomatic_events.1.b: "To není naše věc."
 violate_sovereignty_tt: "Připojit se k [concept_war] na obranu [SCOPE.sC('target_country').GetName]"
 cultural_homeland_events.1.t: "Nezasloužená vina"
 cultural_homeland_events.1.d: "Někteří [SCOPE.sCulture('state_majority_culture').GetName] lidé nespravedlivě svalují špatné životní podmínky ve státě [SCOPE.sState('culture_state').GetName] na své [SCOPE.sCulture('state_minority_culture').GetName] sousedy."
 cultural_homeland_events.1.f: "„Říkají, že jsme jim vzali všechnu práci, že jim znemožňujeme vydělat si spravedlivou mzdu, ale trpíme stejně jako oni.“"
 cultural_homeland_events.1.a: "Všichni se musíme naučit žít společně."
 cultural_homeland_events.1.b: "Ignorujte to."
 cultural_homeland_events.10.t: "Pomlouvačný článek"
 cultural_homeland_events.10.d: "Noviny zvané [SCOPE.sState('culture_state').GetNameNoFormatting] [SCOPE.GetRootScope.GetCountry.GetCustom('newspaper_type')] otiskly bigotní článek o [SCOPE.sCulture('state_minority_culture').GetName] lidech, kteří tam žijí. Můžeme článek potlačit, nebo ho nechat vyjít."
 cultural_homeland_events.10.f: "S odfrknutím hodil bulvární plátek přes stůl. „Naprosté odporné lži, všechno do jedné! Bohužel na tom těm, kdo si to přečtou, nebude záležet. Zhltnou to i s navijákem.“ Pohlédl na šokovanou tvář služebné a pak se narovnal. Samozřejmě tomu uvěří. Nedal jim žádný důkaz o opaku."
 cultural_homeland_events.10.a: "Potlačte to."
 cultural_homeland_events.10.b: "Ignorujte to."
 cultural_homeland_events.20.t: "Nespravedlivě odepřený vstup"
 cultural_homeland_events.20.d: "[SCOPE.sCulture('state_minority_culture').GetName] lidem ve státě [SCOPE.sState('culture_state').GetName] někteří místní [SCOPE.sCulture('state_majority_culture').GetName] lidé brání ve vstupu do určitých podniků."
 cultural_homeland_events.20.f: "„Do tohoto obchodu chodím už roky! Proč je najednou ve výloze cedule, že lidé jako já tu už nejsou vítáni?“"
 cultural_homeland_events.20.a: "Vstup musí být umožněn každému."
 cultural_homeland_events.20.b: "Obchodníci mohou prodávat - nebo neprodávat - komu chtějí."
 cultural_homeland_events.30.t: "Předpojatí zaměstnavatelé"
 cultural_homeland_events.30.d: "[SCOPE.sCulture('state_minority_culture').GetName] lidé mají ve státě [SCOPE.sState('culture_state').GetName] potíže najít zaměstnání kvůli předsudkům některých [SCOPE.sCulture('state_majority_culture').GetName] zaměstnavatelů."
 cultural_homeland_events.30.f: "„Šel jsem se ucházet o práci ve skladu. Jen se na mě podívali a řekli mi, že ta práce není pro „můj druh“.“"
 cultural_homeland_events.30.a: "Práce je pro každého."
 cultural_homeland_events.30.b: "Je na šéfech, aby rozhodli, koho najmou."
 cultural_homeland_events.40.t: "Pronásledování [SCOPE.sCulture('state_minority_culture').GetName] lidí"
 cultural_homeland_events.40.d: "Podniky a domovy [SCOPE.sCulture('state_minority_culture').GetName] lidí byly po celém státě [SCOPE.sState('culture_state').GetName] napadeny skupinami [SCOPE.sCulture('state_majority_culture').GetName] lidí."
 cultural_homeland_events.40.f: "„Naházeli cihly do oken našeho obchodu! Byl k nim připevněn vzkaz, že máme „jít domů“, ale... tohle je jediný domov, který jsme kdy znali.“"
 cultural_homeland_events.40.a: "Tento vandalismus musí přestat."
 cultural_homeland_events.40.b: "Máme svázané ruce z... důvodů."
 cultural_homeland_events.50.t: "Násilí vůči [SCOPE.sCulture('state_minority_culture').GetName] lidem"
 cultural_homeland_events.50.d: "[SCOPE.sCulture('state_minority_culture').GetName] lidé jsou ve státě [SCOPE.sState('culture_state').GetName] napadáni a zabíjeni některými členy [SCOPE.sCulture('state_majority_culture').GetName] lidí. "
 cultural_homeland_events.50.f: "„Vypukly nepokoje - ačkoli nazývat to tak je slabé slovo. Chodili od domu k domu, bili, okrádali a dokonce zabíjeli každého, koho našli.“"
 cultural_homeland_events.50.a: "Pořádek a morálka musí být obnoveny!"
 cultural_homeland_events.50.b: "Obávám se, že nemůžeme nic dělat."
