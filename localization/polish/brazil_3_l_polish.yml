 je_brazilian_nation_building_integrate_amazonic: "Integrovat Amazonce"
 je_brazilian_nation_building_integrate_amazonic_past_tense: "Amazonci jsou Brazilci"
 je_brazilian_nation_building_integrate_amazonic_desc: "Naše severní území jsou plná nepokojů a jsou odtržená od obchodu i politiky zbytku Brazílie. Integrace Amazonie bude vyžadovat uklidnění rozhádaného severu a stabilizaci regionu rozvráceného povstáními."
 je_brazilian_nation_building_integrate_amazonic_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('amazonic_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('amazonic_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_pop', '$concept_pop$')|l] na světě se stane #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ou')|l]#!#!."
 je_brazilian_nation_building_integrate_amazonic_complete_tt: "#tooltippable_name #tooltip:[SCOPE.sCulture('amazonic_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('amazonic_culture').GetCustom('CUL_ADJ_aa')]#!#! kultura byla integrována do #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ee')|l]#!#! kultury"
 je_brazilian_nation_building_integrate_amazonic_removal_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('amazonic_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('amazonic_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_homeland', '$concept_homeland$')|l] bude odstraněna z našich zemí."
 culture_brazil.1.t: "Nový národní hrdina"
 culture_brazil.1.d: "[SCOPE.sCharacter('brazilian_national_hero').GetFullName] se osvědčil na bojišti a po ohromujícím vítězství v [SCOPE.sState('state').GetName] se stal symbolem pro celý národ i pro #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_national_hero_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_national_hero_culture').GetCustom('CUL_ADJ_yy')|l]#!#! lid."
 culture_brazil.1.f: "„Od Porto Alegre až po Belém se jistě shodneme, že to, čeho [SCOPE.sCharacter('brazilian_national_hero').GetFullNameNoFormatting] dnes dosáhl, nebylo nic menšího než zázrak. Na jeho počest navrhuji přípitek! Ať žije [SCOPE.sCharacter('brazilian_national_hero').GetLastNameNoFormatting]!“"
 culture_brazil.1.a: "[SCOPE.sCharacter('brazilian_national_hero').GetPrimaryRoleTitle] [SCOPE.sCharacter('brazilian_national_hero').GetLastName] je [Concept('concept_brz_national_hero', '$concept_brz_national_hero$')|l] Brazílie!"
 culture_brazil.1.hero_clarification: "[SCOPE.sCharacter('brazilian_national_hero').GetFullName] může využít svůj status [Concept('concept_brz_national_hero', 'národního hrdiny')] k integraci #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_national_hero_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_national_hero_culture').GetCustom('CUL_ADJ_eeho')|l]#!#! lidu"
 culture_brazil.1.b: "Raději tuto výjimečnou postavu odsoudíme."
 culture_brazil.2.t: "Brasilidade"
 culture_brazil.2.d: "Naše snahy upevnit jednotnou národní identitu byly po mnoha útrapách úspěšné. Tento koncept brazilství, tato #italic Brasilidade#!, se nyní rozprostírá po celé zemi."
 culture_brazil.2.f: "„Naše země, náš lid, je něčím soudržnějším než jen složenou mozaikou. Ne, národ plyne jako přítoky vlévající se do Amazonky - Brazílie není mozaika, je to #italic akvarel#!.“"
 culture_brazil.2.a: "Ó, má brazilská Brazílie!"
 culture_brazil.2.b: "Tato Brazílie může být i vaše!"
 culture_brazil.3.t: "Integrace Paulistů"
 culture_brazil.3.d: "#tooltippable_name #tooltip:[SCOPE.sCulture('paulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('paulista_culture').GetCustom('CUL_ADJ_yy')]#!#! lid, obyvatelé São Paula i venkovští Caipiři, se smířili s centrální vládou a rostoucím #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_yym')|l]#!#! národním hnutím."
 culture_brazil.3.f: "„#italic Klidné břehy Ipirangy slyšely,\nzvučný hlas hrdinského lidu,\na slunce svobody ve svém jasu\nzazářilo v té chvíli na nebi vlasti.#!“"
 culture_brazil.3.a: "Ó milovaná, zbožňovaná vlasti! Sláva, sláva!"
 culture_brazil.4.t: "Integrace Sulistů"
 culture_brazil.4.d: "#tooltippable_name #tooltip:[SCOPE.sCulture('sulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('sulista_culture').GetCustom('CUL_ADJ_yy')]#!#! lid z Paraná a Iguazú i kovbojové jihu se smířili s centrální vládou a rostoucím #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_yym')|l]#!#! národním hnutím."
 culture_brazil.4.f: "„Nebe, slunce, země a barva. To je na naší zemi nejkrásnější. A navíc to, co činí Brazílii místem, kde vše zasazené roste.“\n\n„Ale otče, proč si nemůžeme nechat své výdělky? Vždyť si je odpracujeme.“\n\n„A kdo ti vyrábí nástroje? Mé boty? Šaty tvé matky? Brazílie potřebuje naši bavlnu a kávu stejně jako my potřebujeme jejich železo a mléko. Společně jsme silnější, synu.“"
 culture_brazil.4.a: "Ó milovaná, zbožňovaná vlasti! Sláva, sláva!"
 culture_brazil.5.t: "Integrace Amazonců"
 culture_brazil.5.d: "#tooltippable_name #tooltip:[SCOPE.sCulture('amazonic_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('amazonic_culture').GetCustom('CUL_ADJ_yy')]#!#! lid severu a osadníci pohraničí Amazonie se smířili s centrální vládou a rostoucím #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_yym')|l]#!#! národním hnutím."
 culture_brazil.5.f: "„Severní státy stojí při nás a následují nás!“\n\nZ davu se ozvalo víc než jen jásot. Úleva, jako když se sestra strachuje o bratra? Nebo zadostiučinění otce, který měl pravdu? Možná na tom nezáleží - celý dům se přiblížil jednotě."
 culture_brazil.5.a: "Ó milovaná, zbožňovaná vlasti! Sláva, sláva!"
 culture_brazil.6.t: "Integrace Nordestinů"
 culture_brazil.6.d: "#tooltippable_name #tooltip:[SCOPE.sCulture('nordestino_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('nordestino_culture').GetCustom('CUL_ADJ_yy')]#!#! lid z Bahie, Pernambuca a celého severovýchodu se smířil s centrální vládou a rostoucím #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_yym')|l]#!#! národním hnutím."
 culture_brazil.6.f: "„Náboženství, nezávislost, jednota, svoboda - to jsou hesla Brazílie. A teď jsem si jistý, že vás zajímá, co tu dělá kněz a sběrač kávy. Má někdo odpověď?“\n\n„Jsme Brazilci. Tohle od nás země žádá.“\n\n„Dal bych půl bodu. Ano, jsme všichni Brazilci. Ale ne - země žádá, abychom si vážili všeho, co máme. Protože my jsme #italic vše#!, co máme.“"
 culture_brazil.6.a: "Ó milovaná, zbožňovaná vlasti! Sláva, sláva!"
 brz_perfido: "Pérfido"
 brz_brasil_brasileiro: "Brasil Brasileiro"
 brz_brasil_pra_mim: "Brasil! Prá mim!"
 je_south_american_national_identity: "Nová národní identita"
 je_south_american_national_identity_reason: "Ačkoliv jsme kdysi byli součástí širšího celku a sdíleli společnou koloniální vládu i vedení s našimi sousedy, od získání nezávislosti jsme se výrazně odlišili. Je načase plně přijmout novou #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ou')|l]#!#! identitu."
 je_south_american_national_identity_integrate_a_state: "Podpořit národní identitu"
 je_south_american_national_identity_integrate_a_state_desc: "Zahájí kampaň za prosazení nové národní kultury napříč zemí, čímž vzniknou nové #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ee')|l]#!#! domoviny v našich #tooltippable_name #tooltip:[SCOPE.sCulture('old_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('old_national_culture').GetCustom('CUL_ADJ_yych')|l]#!#! [Concept('concept_incorporated_state', 'začleněných státech')]."
 new_culture_has_25_percent_tt: "Populace tohoto státu je alespoň z #variable 25%#! #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_aa')|l]#!#!"
 culture_south_america.1.t: "Základy národa"
 culture_south_america.1.d: "Národní obrození v naší zemi vedlo ke vzniku svébytné #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ee')|l]#!#! identity mezi předními nacionalisty."
 culture_south_america.1.f: "„Náš posvátný výkřik patří jen nám! Slyšte zvuk zlomených řetězů a spatřete chrám zasvěcený právu, míru a jednotě! Jak modrá je obloha, jak slavná je vlast!“"
 culture_south_america.1.a: "Již ne [SCOPE.sCulture('old_south_american_culture').GetCustom('getPluralDemonym')] - nyní jsme [SCOPE.sCulture('new_national_culture').GetCustom('getPluralDemonym')]!"
 culture_south_america.1.b: "Jsme dědici vyššího ideálu!"
 culture_south_america.2.t: "Národní hodnoty"
 culture_south_america.2.d: "Nárůst počtu lidí v regionech sousedících s [SCOPE.sState('south_american_culture_state').GetName] vedl k tomu, že přijali svou novou #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ou')|l]#!#! identitu."
 culture_south_america.2.f: "„Jak vznešená je tato země, která ukrývá tak skvělý lid? Milovaný národe, milovaná země, patřím tobě!“\n\nDav zdvořile zatleskal básníkovým vzletným slovům. I když byla... poněkud květnatá, myšlenka byla oceněna."
 culture_south_america.2.a: "Vítejte v #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_eem')|l]#!#! národě!"
 culture_south_america.3.t: "[SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_yy')] národ"
 culture_south_america.3.d: "Ze všech koutů země lidé hovoří o své #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ee')|l]#!#! vlasti. #tooltippable_name #tooltip:[SCOPE.sCulture('old_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('old_national_culture').GetCustom('CUL_ADJ_aa')]#!#! identita již neexistuje."
 culture_south_america.3.f: "Vlajka vlála na centrálním náměstí, zatímco průvod pochodoval kolem za zvuku trubek a bubnů. „Ať slunce ztratí svůj svit dříve, než bychom porušili slavnostní slib, který jsme dali své vlasti!“ burácel dav s větší upřímností než kdy dříve."
 culture_south_america.3.a: "Sláva #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_eemu')|l]#!#! lidu!"
 every_pop_converts_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('old_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('old_national_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_pop', '$concept_pop$')|l] v této zemi se [Concept('concept_assimilation','asimiluje')] na #tooltippable_name #tooltip:[SCOPE.sCulture('new_national_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('new_national_culture').GetCustom('CUL_ADJ_ou')|l]#!#!"
