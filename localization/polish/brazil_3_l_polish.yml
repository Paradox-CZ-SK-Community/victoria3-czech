l_polish:
 je_brazilian_nation_building: "Integrace brazilského národa"
 je_brazilian_nation_building_reason: "Brazílie je kolonie bez mateřské země; stát bez národa. Vytvořit jednotnou identitu ze všech národů obývajících tuto rozlehlou zemi bude vyžadovat pečlivé úvahy, splnění herkulovských úkolů a pevnou ruku. Je skutečně možné vytvořit jednotnou Brazílii?"
 je_brazilian_nation_building_ragamuffin_war_south: "#bold $ragamuffin_war$#! skončila a #tooltippable_name #tooltip:[SCOPE.sCulture('sulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('sulista_culture').GetCustom('CUL_ADJ_ee')|l]#!#! kulturní nepokoje v jejich domovinách klesly pod #bold 10%#!."
 je_brazilian_nation_building_ragamuffin_war_done: "#bold $ragamuffin_war$#! skončila a [Concept('concept_devastation', '$concept_devastation$')|l] ve všech státech s #tooltippable_name #tooltip:[SCOPE.sCulture('amazonic_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('amazonic_culture').GetCustom('CUL_ADJ_yymi')|l]#!#! domovinami klesla pod #bold 5#!."
 je_brazilian_nation_building_brazilian_national_hero_owned: "Byl vyhlášen regionální #bold [Concept('concept_brz_national_hero', '$concept_brz_national_hero$')|l]#! a může být využit v propagandě."
 concept_brz_national_hero: "Národní hrdina"
 concept_brz_national_hero_desc: "#bold Národní hrdina#! je generál, který vyhrál bitvu proti státu, jenž není brazilský, a byl oslavován jako hrdina v události '#bold Nový národní hrdina#!'."
 je_brazilian_nation_building_integrate_nordestino: "Integrovat Nordestinos"
 je_brazilian_nation_building_integrate_nordestino_past_tense: "Nordestinos jsou Brazilci"
 je_brazilian_nation_building_integrate_nordestino_desc: "Abychom přivedli obyvatele severovýchodu do národní jednoty a skutečně je smířili s novým národním řádem, musíme zničit jeden z hlavních zdrojů nepokojů v regionu - instituci, která vyvolává jak odsouzení, tak výzvy k jejímu zachování."
 je_brazilian_nation_building_integrate_nordestino_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('nordestino_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('nordestino_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_pop', '$concept_pop$')|l] na světě se stane #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ou')|l]#!#!."
 je_brazilian_nation_building_integrate_nordestino_complete_tt: "#tooltippable_name #tooltip:[SCOPE.sCulture('nordestino_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('nordestino_culture').GetCustom('CUL_ADJ_aa')]#!#! kultura byla integrována do #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ee')|l]#!#! kultury"
 je_brazilian_nation_building_integrate_nordestino_removal_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('nordestino_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('nordestino_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_homeland', '$concept_homeland$')|l] bude odstraněna z našich zemí."
 je_brazilian_nation_building_integrate_sulista: "Integrovat Sulistas"
 je_brazilian_nation_building_integrate_sulista_past_tense: "Sulistas jsou Brazilci"
 je_brazilian_nation_building_integrate_sulista_desc: "Gaučové z jihu mají zjevně pocit, že jejich zájmy nejsou v souladu se zájmy Brazílie. Povstání Farrapů jasně ukázalo, jak hluboká je tato propast. Uklidnění farroupilhského odporu bude vyžadovat jak cukr, tak i bič."
 je_brazilian_nation_building_integrate_sulista_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('sulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('sulista_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_pop', '$concept_pop$')|l] na světě se stane #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ou')|l]#!#!."
 je_brazilian_nation_building_integrate_sulista_complete_tt: "#tooltippable_name #tooltip:[SCOPE.sCulture('sulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('sulista_culture').GetCustom('CUL_ADJ_aa')]#!#! kultura byla integrována do #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ee')|l]#!#! kultury"
 je_brazilian_nation_building_integrate_sulista_removal_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('sulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('sulista_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_homeland', '$concept_homeland$')|l] bude odstraněna z našich zemí."
 je_brazilian_nation_building_integrate_paulista: "Integrovat Paulistas"
 je_brazilian_nation_building_integrate_paulista_past_tense: "Paulistas jsou Brazilci"
 je_brazilian_nation_building_integrate_paulista_desc: "Hrdý lid São Paula si razí vlastní cestu a obchoduje na vlastních trzích. Vytvoření ekonomické role pro region, která zapadne do širšího brazilského trhu, bude klíčové pro vytvoření společné národní identity."
 je_brazilian_nation_building_integrate_paulista_tt: "Každá #tooltippable_name #tooltip:[SCOPE.sCulture('paulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('paulista_culture').GetCustom('CUL_ADJ_aa')|l]#!#! [Concept('concept_pop', '$concept_pop$')|l] na světě se stane #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ou')|l]#!#!."
 je_brazilian_nation_building_integrate_paulista_je_tt: "Záznam v deníku #bold Řeka kávy#! je aktivován a dokončen"
 je_brazilian_nation_building_integrate_paulista_complete_tt: "#tooltippable_name #tooltip:[SCOPE.sCulture('paulista_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('paulista_culture').GetCustom('CUL_ADJ_aa')]#!#! kultura byla integrována do #tooltippable_name #tooltip:[SCOPE.sCulture('brazilian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('brazilian_culture').GetCustom('CUL_ADJ_ee')|l]#!#! kultury"
