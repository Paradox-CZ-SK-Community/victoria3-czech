 je_indian_famines_button_relief_kitchens: "Zřídit vývařovny"
 je_indian_famines_button_relief_kitchens_desc: "Ačkoli je to nákladné, logickým a možná nejúčinnějším způsobem boje proti hladomorům je prostě nasytit hladovějící.\n\nTakové výdaje si nás však nejspíš neoblíbí u dobrých mužů státní pokladny a účinnost jakékoli pomoci bude omezena kapacitou státu a místní infrastrukturou.\n\n#bold Železnice#!\nPřítomnost [GetBuildingType('building_railway').GetName] v [Concept('concept_state','$concept_states$')] postižených [concept_famine] zdvojnásobí účinky tohoto opatření."
 je_indian_famines_button_relief_kitchens_tt: "V uplynulém #bold roce#! nebylo použito rozhodnutí #bold $je_indian_famines_button_relief_kitchens$#!"
