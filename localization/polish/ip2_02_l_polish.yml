 je_indian_famines: "[ROOT.GetCountry.GetCustom('get_indian_famine_name')]"
 je_indian_famines_reason: "#italic „Smrt a hlad na každé straně, a po dešti nikde ani stopy\nKosti těch, kdo hladem zemřeli, nepohřbené leží na pláni.“#!\n\nIndii postihla veliká a strašlivá pohroma. Kvůli sérii špatných sklizní, zhoršené všeobecnou chudobou a špatnou správou vlády, se podmínky zhoršily natolik, že v zemi [ROOT.GetCountry.GetName] byl oficiálně vyhlášen stav hladomoru.\n\nDokud bude #bold [ROOT.GetCountry.GetCustom('get_indian_famine_name')]#! přetrvávat, můžeme očekávat #tooltippable #tooltip:je_indian_famines_tt #bold vyšší míru agitace#!#!#! ze strany sil nepřátelských naší vládě.\n\n#bold Hladomor v Indii#!\nVelká část Indie je kvůli své vysoké závislosti na příznivých monzunových deštích pro zavlažování obzvláště zranitelná vůči suchům a dalším nepříznivým [Concept('concept_harvest_condition', '$concept_harvest_conditions$')]. Abychom tomu čelili, ministerstvo vnitra doporučilo, abychom #tooltippable #tooltip:je_indian_famines_tt_2 #bold zavlažili vnitrozemské suché oblasti#!#!#! a zmírnili tak dopady sucha."
 je_indian_famines_tt: "Hladomor bude mít po dobu svého trvání následující účinky, pokud budou použitelné:\n• [concept_journal_entry] #bold $je_uneasy_raj$#! bude negativně ovlivněn\n• [concept_journal_entry] #bold $je_india_home_rule$#! bude negativně ovlivněn"
 je_indian_famines_completion_tt: "Země [ROOT.GetCountry.GetName] již nebude trpět #tooltippable #tooltip:je_indian_famines_tt #bold vyšší mírou agitace#!#!#!"
