 je_indian_famines_button_work_camps: "Zavést pracovní tábory"
 je_indian_famines_button_work_camps_desc: "Nevytvoříme třídu závislých žijících ze státní almužny. Zřídíme pracovní tábory, kde si chudáci bez prostředků budou moci vydělat životní mzdu, aby si mohli koupit vlastní jídlo.\n\n#bold Železnice#!\nPřítomnost [GetBuildingType('building_railway').GetName] v [Concept('concept_state','$concept_states$')] postižených [concept_famine] zdvojnásobí účinky tohoto opatření."
 work_camps_costs_modifier: "Organizace pracovních táborů"
 je_indian_famines_button_work_camps_tt: "V uplynulém #bold roce#! nebylo použito rozhodnutí #bold $je_indian_famines_button_work_camps$#!"
 work_camps_effect_modifier: "Základní pracovní tábory"
 improved_work_camps_effect_modifier: "Vylepšené pracovní tábory"
 je_indian_famines_button_epidemic_control: "Očkování a karanténní tábory"
 je_indian_famines_button_epidemic_control_desc: "Ačkoli hlad a podvýživa zůstávají hlavní příčinou, většina chudáků bez prostředků přijde o život kvůli nemocem, jako jsou mor a cholera.\n\nZavedením systémů hromadného očkování a přísné karantény můžeme zmírnit některé z nejhorších nárůstů úmrtnosti.\n\n#bold Železnice#!\nPřítomnost [GetBuildingType('building_railway').GetName] v [Concept('concept_state','$concept_states$')] postižených [concept_famine] zdvojnásobí účinky tohoto opatření."
