 india_events.18.t: "Správa Beraru"
 india_events.18.d: "S odvoláním na vysokou míru banditismu a nepokojů v Beraru požádala země [SCOPE.sCountry('bic_scope').GetName], aby mohla naším jménem spravovat stát [SCOPE.sState('berar_scope').GetName] výměnou za značnou každoroční platbu."
 india_events.18.f: "„Jaká je odměna za hlavu toho vůdce banditů?“ zeptal se britský důstojník.\n\n„Pět tisíc rupií, pane.“\n\n„Pět tisíc! Opravdu má tenhle Gabbar takovou cenu?“\n\n„Ve všech těchto vesnicích,“ odpověděl úředník a nakreslil na mapě před nimi velký kruh, „když dítě v noci pláče, matky mu říkají: „Spi, nebo si pro tebe přijde Gabbar.“\n\n„Pokud on a jemu podobní nahánějí takovou hrůzu, možná bude nejlepší, když nám dovolíte se o to postarat.“ odpověděl důstojník s úsměvem. „Koneckonců jsme odborníci na vykořeňování teroristů z našeho dvorku.“"
 india_events.18.a: "Dobrá tedy. Ať se [SCOPE.sCountry('bic_scope').GetCapital.GetCityHubName] vypořádá s Berarem."
 india_events.18.b: "Berar patří titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a nikomu jinému."
