 pressure_to_sell_berar_province_desc: "Hajdarábád dlouho zanedbával řádné prosazování své vlády v Beraru, takže provincie trpí banditismem a obecnou bezprávností. Ministerstvo vnitra doporučuje, abychom v Beraru převzali přímou kontrolu výměnou za každoroční platbu jeho současnému vládci."
