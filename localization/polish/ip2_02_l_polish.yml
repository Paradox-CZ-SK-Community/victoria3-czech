 je_avert_sepoy_mutiny: "Nestabilní Rádž"
 je_avert_sepoy_mutiny_reason: "Odpor vůči vládě Společnosti na indickém subkontinentu sílí, a to dokonce i v řadách našich vlastních místních vojáků. Povstání lze ještě odvrátit."
 je_avert_sepoy_mutiny_tt_1: "Dokončete záznam v deníku #BOLD $je_consolidate_colonial_rule$#!"
 je_sepoy_mutiny: "Sipáhíjské povstání"
 je_sepoy_mutiny_reason: "Proti Společnosti vypukla vzpoura a povstání. Máme-li si udržet autoritu, musí být zcela rozdrceno."
 je_uneasy_raj_tt_1: "Zreformovali jsme svou koloniální správu"
 je_uneasy_raj_tt_2: "[Concept('concept_presidency_stability','$concept_presidency_stability_short$')] kterékoli [concept_presidency] byla #bold střední#! ([GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_medium_upper_bound')]) nebo nižší po dobu #variable 100#! měsíců"
 je_uneasy_raj_tt_3: "#bold Bengálské prezidentství#!\nSkládá se z [Concept('concept_georegion','$concept_georegions$')] [GetGeographicRegion('geographic_region_bengal').GetName], [GetGeographicRegion('geographic_region_central_india').GetName] a [GetGeographicRegion('geographic_region_punjab').GetName].\n\n#bold Bombajské prezidentství#!\nSkládá se z [concept_georegion] [GetGeographicRegion('geographic_region_bombay').GetName].\n\n#bold Madráské prezidentství#!\nSkládá se z [concept_georegion] [GetGeographicRegion('geographic_region_madras').GetName]."
 je_uneasy_raj_tt_4: "Závažnost povstání bude určena podle [Concept('concept_presidency_stability','$concept_presidency_stability_short$')] každé ze tří [Concept('concept_presidency', '$concept_presidencies$')], od menších nepokojů a dezercí až po úplný kolaps britské autority.\n\nAž povstání vypukne, [Concept('concept_princely_state','$concept_princely_states$')] s #bold vysokou#! [concept_liberty_desire] se přidají ke vzbouřencům, ty se #bold střední#! zůstanou neutrální a ty s #bold nízkou#! budou aktivně bojovat na naší straně."
 je_uneasy_raj: "Nestabilní Rádž"
 je_uneasy_raj_reason: "Ve třech [Concept('concept_presidency', '$concept_presidencies$')] země [SCOPE.sCountry('raj_scope').GetName] doutnají nepokoje.\n\nIndický odpor vůči vládě Společnosti v posledních letech sílí kvůli tvrdým režimům [Concept('concept_taxes','$concept_taxation$')], rostoucí neúctě k místním zvyklostem a územní expanzi na úkor domorodých knížat.\n\nJeště horší je, že rozkol lze nalézt dokonce i v hrdých řadách domorodých sipáhíjských pluků, které nelibě nesou jakékoli ohrožení svého tradičního postavení a výsad.\n\n#bold Sipáhíjské povstání#!\nPokud [Concept('concept_presidency_stability','$concept_presidency_stability_short$')] kterékoli $concept_presidency$ bude #bold střední#! ([GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_medium_upper_bound')]) nebo nižší po dobu #variable 100#! měsíců, Indie propukne v #tooltippable #tooltip:je_uneasy_raj_tt_4 #bold otevřené povstání#!#!#!. V současnosti to platí již #variable [SCOPE.sCountry('raj_scope').MakeScope.Var('sepoy_mutiny_timer_var').GetValue]#! měsíců."
