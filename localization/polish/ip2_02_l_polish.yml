 sepoy_mutiny_events.1.t: "Ve jménu péšvy"
 sepoy_mutiny_events.1.d: "Rodina Bhatů, která vládla jako dědiční předsedové vlády Maráthské říše, byla v prestiži a moci hned druhá po čhatrapatim. Nyní [SCOPE.sCharacter('nana_saheb_scope').GetFirstName], adoptivní syn posledního péšvy, přichází nabídnout svůj meč a slibuje vyhnat Brity a obnovit říši."
 sepoy_mutiny_events.1.f: "Voják si odkašlal, ale nijak mu to nepomohlo zbavit se knedlíku v krku. Jeho předkové byli trnem v oku Aurangzébovi. Mocnou silou, kterou čhatrapati dovedl ke svobodě proti mughalské tyranii.\n\nZdálo se však, že to všechno bylo k ničemu, protože teď tu stáli a chystali se bojovat s dalším nelítostným nepřítelem. Bude na něj jeho předci hrdí, nebo jeho činy selžou? Ta myšlenka mu vypadla z hlavy, když jeho kapitán vykřikl: „VPŘED POCHODEM.“"
 sepoy_mutiny_events.1.a: "Veď nás k vítězství, péšvo."
 sepoy_mutiny_events.1.b: "Může sloužit titulu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], ale pouze na bojišti."
 sepoy_mutiny_events.1.c: "Pošlete ho pryč, věk bhatských péšvů skončil."
 sepoy_mutiny_events.1.e: "Bádží Ráo stále žije, nabídněte pozici poslednímu právoplatnému péšvovi."
 sepoy_mutiny_peshwa_power: "Legitimní péšva"
 sepoy_mutiny_reinstated_peshwa: "Obnovení bhatských péšvů"
 sepoy_mutiny_turned_away_peshwa: "Naná Sáhib odmítnut"
 sepoy_mutiny_bhat_family_generals: "Bhatští velitelé"
 sepoy_mutiny_events.2.t: "Poslední rána"
 sepoy_mutiny_events.2.d: "Katastrofální vítězství indických vzbouřenců vyvolalo v kancelářích správy Společnosti prudké debaty. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] musí nyní rozhodnout, zda Indii zcela opustit, nebo soustředit ubývající zdroje na udržení opěrného bodu na kontinentu."
 sepoy_mutiny_events.2.f: "Generální guvernér přecházel po celé délce své kanceláře a zdi sotva zadržovaly jeho hněv. Jeho pobočník stál dokonale nehybně. Nechtěl skončit jako obsah generálova čajového podnosu, rozplácnutý po mapě Indie.\n\nIndie, zlatá husa, kterou přibili za křídla, hlavu i ocas, se jim zhroutila pod rukama a všechny jejich možnosti páchly. Kdyby bylo po jeho, vzal by Kalkatu, jejich první opěrný bod, a zbytek by opustil. Na druhou stranu je Bombaj stála draze a Madrás měl stále co nabídnout. Těžká volba – PRÁSK!\nPobočník sebou trhl; generál vystřelil z pistole do zdi. Možná nastal čas, aby se šel podívat, zda pro generála nepřišly další zprávy."
 sepoy_mutiny_events.2.a: "Indie je ztracena. Ať se Whitehall pře o náš zbývající majetek."
 sepoy_mutiny_events.2.b: "Fort William nesmí padnout. Přesměrujte všechny síly do Kalkaty."
 sepoy_mutiny_events.2.c: "Vláda Společnosti přetrvá na jihu. Stáhněte se do Madrásu."
 sepoy_mutiny_events.2.e: "Bombaj odolává! Nasměrujte všechny zbývající síly na západ."
 india_retreat_to_bengal_tt: "Všechny [concept_subject] mimo [concept_georegion] [GetGeographicRegion('geographic_region_bengal_old').GetName] získají nezávislost a všechny [Concept('concept_state', '$concept_states$')], které tam držíme, budou mezi ně rozděleny."
 india_retreat_to_bombay_tt: "Všechny [concept_subject] mimo [concept_georegion] [GetGeographicRegion('geographic_region_bombay_old').GetName] získají nezávislost a všechny [Concept('concept_state', '$concept_states$')], které tam držíme, budou mezi ně rozděleny."
 india_retreat_to_madras_tt: "Všechny [concept_subject] mimo [concept_georegion] [GetGeographicRegion('geographic_region_madras_old').GetName] získají nezávislost a všechny [Concept('concept_state', '$concept_states$')], které tam držíme, budou mezi ně rozděleny."
 sepoy_mutiny_events.3.t: "Vzpoura!"
 sepoy_mutiny_events.3.d: "Bylo dosaženo bodu zlomu. Po celé Indii sipáhíové opouštějí své plukovní zástavy a chopí se zbraní proti Společnosti. Přidali se k nim nespokojení místní všech hodností a společně převzali moc ve městech po celém subkontinentu."
 sepoy_mutiny_events.3.f: "Když sipáhí z Puné vystřelí na svého kapitána, muslimský mladík mu podá další náboje. Sikhský sipáhí, krvácející ze svých ran, ten výjev sleduje. Co by řekli jejich předkové, kdyby je viděli bojovat bok po boku, místo proti sobě? A pak, když z něj vyprchává život, ho napadne naléhavější myšlenka: co o jejich dnešních činech řeknou jejich vnuci? Váhigurú, budou hrdí? Budou se stydět? Budou si vůbec pamatovat?"
 sepoy_mutiny_events.3.a: "Shromážděte všechny loajální jednotky. Rozdrťte tyto vzbouřence."
 sepoy_mutiny_events.3.b: "[SCOPE.sCountry('mughals_scope').GetRuler.GetFirstName] Zindibad! Ať žije právoplatný císař!"
 sepoy_mutiny_events.3.c: "Har Har Mahádév! Vpřed se zástavou čhatrapatiho!"
 sepoy_mutiny_events.3.e: "Vandé Mátaram! Vyžeňte Lal Patan z našich břehů!"
 sepoy_mutiny_events.3.g: "Khalsa Ji Di Sarkar! Sikhská říše znovu povstane!"
 sepoy_mutiny_events.3.h: "Vpřed, očistěme Dakšin od firangijské metly. "
 sepoy_mutiny_events.3.tt_1: "Indičtí vzbouřenci vyhlásí [concept_war] zemi [ROOT.GetCountry.GetName]"
 sepoy_mutiny_events.3.tt_2: "Následující bude platit pro všechny [Concept('concept_presidency', '$concept_presidencies$')] na základě jejich [Concept('concept_presidency_stability','$concept_presidency_stability_short$')]:\n• Indičtí vzbouřenci převezmou kontrolu nad příslušnými [Concept('concept_state', '$concept_states$')]\n• Ve všech tvořících [Concept('concept_state', '$concept_states$')] budou přidáni radikálové a negativní [Concept('concept_modifier','$concept_modifiers$')]\n• Náhodná nehlavní $building_barrack$ bude zničena"
 sepoy_mutiny_events.4.t: "Indie v plamenech"
 sepoy_mutiny_events.4.d: "Sipáhíové ve službách země [SCOPE.sCountry('eic_scope').GetName] se vzbouřili proti svým starým pánům a uvrhli Britskou Indii do zmatku. Jestřábí členové [ROOT.GetCountry.GetAdjective] dvora hlasitě prosazují, abychom se přidali k věci vzbouřenců a společně vyhnali Brity z Indie."
 sepoy_mutiny_events.4.f: "Málokdo chápe tíhu koruny. I když se každý člen jeho dvora pře, princ ví, že čekají na jeho rozhodnutí. Mohou volat po válce nebo si přát žádat o mír, ale činí tak svobodně, protože vědí, že pokud to selže, vždy to mohou svalit na něj. A na koho to může svalit on? Kdo ho utěší, až bude ležet vzhůru a slyšet výkřiky vojáků, kteří zemřeli pro jeho slib svobody?"
 sepoy_mutiny_events.4.a: "Společně zaženeme firangije do moře."
 sepoy_mutiny_events.4.b: "Přísahejme věrnost císaři v Dillí."
 sepoy_mutiny_events.4.c: "Maráthové znovu povstanou, vztyčte zástavu čhatrapatiho."
 sepoy_mutiny_events.4.e: "To je chyba. Znovu potvrďme svou loajalitu Společnosti."
 sepoy_mutiny_events.6.t: "Otázka chuti"
 sepoy_mutiny_events.6.d: "Od přijetí nové standardní pušky-muškety Enfield si vojáci napříč prezidentskými armádami stěžují, že nové střelné náboje chutnají odporně."
 sepoy_mutiny_events.6.f: "Jako podplukovník 13. pluku bengálské domorodé pěchoty jsem stál před dilematem. Jako velitel pluku jsem očekával, že mí vojáci budou plnit rozkazy, kdykoli jim je vydám. Jenže sám jsem se do nového náboje zakousl a sotva jsem potlačil dávení. Bylo by správné je trestat, když ani já sám jsem se nedokázal k tomu úkolu přinutit?"
 sepoy_mutiny_events.6.a: "Život vojáka je už tak dost těžký, prozkoumejte zlepšení munice."
 sepoy_mutiny_events.6.b: "Pokud tohle nedokážou strávit, jak snesou zkoušky války?"
 sepoy_mutiny_cartridge_grease_exploration: "Pokusy s mazivem nábojů"
 sepoy_mutiny_events.7.t: "Chutné řešení"
 sepoy_mutiny_events.7.d: "Jako alternativa k mazivu používanému na nábojích byl navržen včelí vosk. Vojáci jsou s touto změnou spokojeni. Někteří se však ptají, co se vlastně změnilo."
 sepoy_mutiny_events.7.f: "Vojáci toho večera seděli v kantýně a byli spokojení, že jim Společnost poskytla lepší náboje.\n\n„Takže když tyhle nové náboje používají včelí vosk,“ zeptal se sipáhí, zatímco žvýkal své rótí, „co tedy používaly ty staré?“\n\n„Na tom snad nezáleží,“ odpověděl mladý sipáhí, „dokud nepáchnou jako tvoje matka, zakousnu se do nich.“"
 sepoy_mutiny_events.7.a: "Vysvětlete vojákům, že včelí vosk nahradil továrně vyráběné mazivo."
 sepoy_mutiny_events.8.t: "První známky potíží"
 sepoy_mutiny_events.8.d: "Vojáci v Bengálské prezidencii zaslechli zvěsti, že mazivo používané na nábojích je živočišný tuk."
 sepoy_mutiny_events.8.f: "Mladý subédár celou noc nespal. Znovu se pozvracel, zatímco mu panika svírala vnitřnosti. „Co když byly ty zvěsti pravdivé? Opravdu se zakousl do kravského tuku?“ Podíval se na chrám přes cestu. „Budou ho tam ještě vítat? A co doma? Co se stane s jeho ženou? S jejich synem? Nebo snad nebyl důvod k obavám – kapitán je ujistil, že je to jen chemikálie. Kapitán by jim nelhal!“"
 sepoy_mutiny_events.8.a: "Ujistěte vojáky, že to není živočišný tuk."
 sepoy_mutiny_events.8.b: "Navrhněte vojákům, aby náboje otevírali rukama, pokud jim vadí jejich chuť."
 sepoy_mutiny_timer_decrease_5_months: "Posune časovač [concept_journal_entry] $je_uneasy_raj$ o #variable 5#! měsíců."
 sepoy_mutiny_alternative_cartridge_handling: "Alternativní zacházení s náboji"
 sepoy_mutiny_alternative_cartridge_debacle: "Ústupek požadavkům sipáhíů"
 sepoy_mutiny_events.9.t: "Nevyhnutelný zmatek"
 sepoy_mutiny_events.9.d: "Zvěsti zapustily kořeny a někteří vojáci věří, že náboje byly nebo jsou pokusem o nucenou konverzi. Během cvičení odmítají střílet ze zbraní."
 sepoy_mutiny_events.9.f: "Kapitán měl obavy; byl si jistý, že viděl několik vojáků mimo službu, jak ho sledují, když odcházel z kostela. Nad táborem viselo napětí, domorodé pluky se chovaly podivně, porušovaly večerku, držely se pohromadě ve velkých skupinách, nosily pušky i mimo službu a někteří zřejmě odmítli poslouchat rozkazy.\n\nSpočítal ostatní britské důstojníky v táboře. Bylo jich dost, ale dokázali by se ubránit, kdyby se domorodci vzbouřili? Z úst mu unikl nervózní smích. Ne, kdyby k tomu došlo, byli by mrtví ještě před prvním přebitím."
 sepoy_mutiny_events.9.a: "Potrestejte vojáky těžkou prací."
 sepoy_mutiny_events.9.b: "Zbavte je služby, ale ostatním dovolte pokračovat."
 sepoy_mutiny_breakdown_of_morale: "Selhávání disciplíny"
 sepoy_mutiny_loss_of_authority: "Neposlušné pluky"
 sepoy_mutiny_events.10.t: "První domino padá"
 sepoy_mutiny_events.10.d: "Když sipáhíové z jiných pluků uslyšeli, že vojáci byli odsouzeni k těžké práci, porušili formaci a pokusili se své spolubojovníky osvobodit."
 sepoy_mutiny_events.10.f: "Posádka v Kánpuru.\nGenerálu [SCOPE.sCharacter('sepoy_general_scope').GetLastNameNoFormatting]\n\nNaléhavé.\n\nAsi 50 sipáhíů se zabarikádovalo ve skladu munice a střílí na všechny důstojníky, kteří se přiblíží. Potíže začaly o půlnoci, když se opili a napadli svého nadřízeného důstojníka. Zbývající pluky byly odzbrojeny a požádány, aby zůstaly v kasárnách. Loajální mezi nimi sdělili, že vzbouřenci hodlají osvobodit vojáky odsouzené k těžké práci.\n\nProsím o radu!"
 sepoy_mutiny_events.10.a: "Potrestejte všechny, kdo se zapojili."
 sepoy_mutiny_events.10.b: "Potrestejte všechny vojáky."
