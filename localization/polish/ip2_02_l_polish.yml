 je_communal_divides_federal_solution: "Zřídit Indickou konfederaci"
 je_communal_divides_federal_solution_desc: "Konflikt mezi hinduisty a muslimy zakořenil příliš hluboko na polovičatá opatření. Zřízení dvou výslovně muslimských autonomních států v Bengálsku a na západě vytvoří oblasti, kde se muslimové nemusí obávat pronásledování, a zároveň bude představovat minimální riziko pro naši územní celistvost."
 make_delhi_capital: "Založit Nové Dillí"
 make_delhi_capital_desc: "Ačkoli naše současné hlavní město dosud dobře plnilo svou úlohu, nedávná nacionalistická agitace odhalila jeho zranitelnost vůči protispolečenským hnutím. Měli bychom v Dillí zřídit novou vládní čtvrť a přesunout tam náš vládní aparát."
 delhi_made_capital_modifier: "Vládní úřady zabezpečeny"
 new_delhi_modifier: "Místodržitelský palác"
 new_delhi_cost_modifier: "Výstavba Nového Dillí"
 communal_divides_events.1.t: "Teorie jednoho národa"
 communal_divides_events.1.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] ve svém projevu z [ROOT.GetCountry.GetCapital.GetCityHubName] formálně odmítl takzvanou teorii dvou národů a místo toho přislíbil věčné bratrství mezi všemi Indy, bez ohledu na vyznání či přesvědčení."
 communal_divides_events.1.f: "Obě ženy seděly na prazích svých domů, jedna v modrém sárí a druhá v barevné burce. Každá byla zaměstnána krájením zeleniny na večerní večeři, zatímco si jejich synové na ulici před nimi hráli gillí-dandu.\n\n„Vydrží to?“ zeptala se Hasrat a pohlédla na Jaya.\n\nNež však stačila odpovědět, jejich synové se začali prát. Obě matky se nenechaly vyvést z míry, ostře vykřikly a synové ztuhli. „Omluvte se!“ pokárala je Jaya. Oba synové se jeden druhému omluvili a přitom se drželi za uši. Spokojené ženy se vrátily k rozhovoru a synové se zase vrátili ke hře.\n\n„Vydrží to?“ zopakovala Jaya. Pohlédla na jejich syny a řekla: „Doufám.“"
 communal_divides_events.1.a: "Ať žije Velká Indie, sjednocená v rozmanitosti!"
 communal_divides_events.1.b: "Se stejnými právy přichází stejná odpovědnost."
 united_in_diversity_modifier: "Sjednoceni v rozmanitosti"
 communal_divides_events.1_tt: "#bold $movement_muslim_nationalist$#! a #bold $movement_hindu_nationalist$#! obdrží významné postihy k přitažlivosti."
 marching_as_one_modifier: "Pochodují jako jeden"
 communal_divides_events.2.t: "Velké rozdělení"
 communal_divides_events.2.d: "S rozdělením Indie podle etnonáboženských linií jako nešťastnou skutečností se přívrženci teorie dvou národů zdají být téměř potvrzeni ve svém přesvědčení, zatímco se veřejné vztahy mezi hinduisty a muslimy zhoršují až k rozsáhlému násilí."
 communal_divides_events.2.f: "Dva staří politici kráčeli po staré dillíské cestě, zatímco zapadalo slunce. „Musíš být šťastný,“ řekl jeden druhému.\n\n„Nedělej, jako bys to nechtěl. Teď můžeš vládnout, aniž bych ti překážel na každém kroku.“\n\n„Ach, starý příteli, pokud si myslíš, že jsi byl můj jediný problém, hluboce se mýlíš.“ Muž pohlédl nahoru po cestě, kde žebrala žena bez domova a prodavač ovoce se snažil prodat něco ze svého ubohého zboží. „Ne, obávám se, že jsme své problémy nerozpůlili, pouze své zdroje.“"
 communal_divides_events.2.a: "Tento 400 let starý experiment dospěl ke konci. Je čas přijmout, že nemohou zůstat jednotní."
 communal_divides_events.2.b: "Možná se oddělení uzdraví a časem se znovu sjednotí."
 modifier_intercommunal_violence: "Rozsáhlé mezikomunitní násilí"
 modifier_intercommunal_violence_2: "$modifier_intercommunal_violence$"
 communal_divides_events.3.t: "Nebezpečná myšlenka"
 communal_divides_events.3.d: "Řečník [SCOPE.sPoliticalMovement('india_congress_scope').GetName] na protestním shromáždění ve státě [SCOPE.sState('relevant_state').GetName] vyzval posluchače, aby bojkotovali britský životní styl a vrátili se ke svým hinduistickým kořenům, pokud chtějí vybudovat svobodný hinduistický národ. To vyvolalo obavy z náboženského útlaku mezi členy [SCOPE.sPoliticalMovement('muslim_league_scope').GetName] a vedlo k dalšímu nepřátelství mezi oběma skupinami."
 communal_divides_events.3.f: "Muhammad Khan nemohl uvěřit řečníkově drzosti. Ten muž se odvážil říct: „Jsem rád, že tu vidím pana Khana, který zastupuje muslimskou větev naší strany.“ Byl tu dřív než on! Bojoval proti Britům u soudu! A vyhrál! A teď byl jen zástupcem muslimské větve?\n\nA pak se ten povýšenec odvážil navrhnout hinduistický národ. Co si myslel, že udělají všichni muslimové a sikhové, až to uslyší? Konvertují?"
 communal_divides_events.3.a: "Oba se musí naučit, kde je jejich místo."
 communal_divides_events.3.b: "Lepší, když svůj hněv obrátí proti sobě než proti nám."
 communal_divides_events.3.c: "Dokončeme rozdělení a rozdělme i zemi."
 sectarian_infighting_modifier: "Sektářské vnitřní boje"
 inc_congress_influx: "Příliv muslimských členů Kongresu"
 exploiting_sectarian_divisions: "Využívání sektářských rozporů"
 communal_divides_events.4.t: "Oko za oko"
 communal_divides_events.4.d: "[SCOPE.sPoliticalMovement('hindu_mahasabha_scope').GetName] vedlo ve státě [SCOPE.sState('relevant_state').GetName] velký a hlučný náboženský průvod, který se zastavil, aby vystoupil před mešitou. Muslimská mládež na posměšky odpověděla vlastním průvodem. Situace mezi oběma skupinami vygradovala v nepokoje a násilí. "
 communal_divides_events.4.f: "Nevěděla, kdo hodil první kámen nebo vytáhl první dýku. Věděla jen, že její syn je mrtvý. Držela jeho tělo v náručí, oči suché a neschopné slz. Její manžel přistoupil k jejímu synovi, aby ho odnesl, ale ona odmítla. Ne, už jí ho jednou vzal, znovu mu to nedovolí. Pokud chtěl lásku, mohl ji hledat mezi davem, s nímž se rozhodl pochodovat."
 communal_divides_events.4.a: "Mahásabhá podněcuje nebezpečnou nesnášenlivost."
 communal_divides_events.4.b: "Muslimská mládež to měla nahlásit úřadům."
 communal_divides_events.4.c: "Možná lze požádat umírněnější vůdce, aby převzali vedení."
 influx_of_recruits: "Povzbuzeni ukázkou síly"
 safety_in_numbers: "Příliv členů kvůli nepokojům"
 mob_violence_modifier: "Rozsáhlé davové násilí"
 communal_divides_events.5.t: "Po našem, nebo nijak"
 communal_divides_events.5.d: "V obydlené oblasti státu [SCOPE.sState('relevant_state').GetName] byla postavena nová mešita, přestože mnoho hinduistů vyjádřilo výhrady proti její výstavbě. Aby [SCOPE.sPoliticalMovement('hindu_mahasabha_scope').GetName] znovu potvrdilo svou nadvládu a víru, vedlo průvod skrz mešitu, což rychle vyvolalo násilný konflikt."
 communal_divides_events.5.f: "#bold Místní konflikt dosahuje nových výšin!#!\nVčera proběhl třetí den komunitního násilí v [SCOPE.sState('relevant_state').GetCityHubName], kde hinduisté a muslimové bojovali kvůli přítomnosti mešity v oblasti, kterou hinduisté považují za svou. Britský agent, který si přál zůstat v anonymitě, k tomu řekl: „Neměli bychom být překvapeni. Byla to naše tvrdá práce, která držela místní na uzdě. Není překvapivé, že nyní, když proti nám bojují jako dospívající děti, se mezi sebou chovají jako rozmazlení sourozenci. Zkrátka to neumějí lépe.“"
 communal_divides_events.5.a: "Správa oblasti by měla být předána britským úřadům."
 communal_divides_events.5.b: "Správa by měla být předána výboru složenému rovným dílem z hinduistů a muslimů."
 communal_divides_events.5.c: "Pokud správa dovolila muslimům postavit mešitu, hinduisté měli toto rozhodnutí respektovat."
 governmental_overreach_modifier: "Vládní zásahy do náboženských záležitostí"
 outraged_over_favouritism: "Rozhořčení kvůli zvýhodňování"
 outraged_over_power_sharing: "Nespokojenost se sdílením moci"
 communal_divides_events.6.t: "Bez hlasu, bez práva"
 communal_divides_events.6.d: "Přestože obyvatelstvo [SCOPE.sState('relevant_state').GetCityHubName] ve státě [SCOPE.sState('relevant_state').GetName] tvoří hinduistická většina, většina jeho správců jsou muslimové. To vyvolalo protesty hinduistů, kteří mají pocit, že jejich potřeby jsou ignorovány."
 communal_divides_events.6.f: "„Nepochybujeme, že většina muslimů to myslí dobře,“ řekl starý bráhman davu. „Ale během Bakrí Ídu někteří lidé obětovali kozu nedaleko mého chrámu a pak ji jedli, když překračovali naše stopy! Samozřejmě jsem se pokusil promluvit s úřady, ale tady se mi vysmáli muslimští muži, kteří mi řekli, ať si prostě užívám slavnosti. A právě v tom spočívá problém!“\n\nNež mohl kněz pokračovat, ozval se jiný muž: „Pokud je to pravda, kde jsou tedy ti muži? Kdo může říct, že nelžete jen proto, abyste pošpinil jméno nějakého muslima?“\n\nA než mohli vůdci cokoli říct, začal křičet tisícihlavý dav a následovala kakofonie."
 communal_divides_events.6.a: "Zaveďte poměrné zastoupení při najímání vládních úředníků."
 communal_divides_events.6.b: "Oddělte oblasti pouze pro muslimy nebo pouze pro hinduisty."
 communal_divides_events.6.c: "Možná se hinduisté budou v oblastech s hinduistickou většinou cítit bezpečněji, pokud budou ve vedení oni."
