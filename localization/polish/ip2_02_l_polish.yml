 indian_famines.1.t: "Nic nazbyt"
 indian_famines.1.d: "[SCOPE.sState('indian_famine_state_scope').GetName] je v zoufalé situaci a letos nemá dost obilí ani na to, aby uživil sám sebe, natož aby zaplatil daně. Samozřejmě má určité zásoby z předchozích let, které se nyní používají k nasycení hladovějících."
 indian_famines.1.f: "Výběrčí daní si farmáře podezřívavě prohlížel. Přišli za ním všichni jako skupina, s rukama sepjatýma, jako by prosili. Obvykle by jejich prosby o daňovou úlevu odmítl. Každý rok byl těžký, pokud jste dali na řeči farmářů.\n\nTentokrát však cestou sem viděl mrtvé krávy a pole bez života. I kdyby měli nějaké obilí uskladněné, nejspíš by jim nevystačilo po celý rok. A od koho by pak vybíral daně?"
 indian_famines.1.a: "Dohoda je dohoda. [SCOPE.sState('indian_famine_state_scope').GetName] musí zaplatit daně v plné výši."
 indian_famines.1.b: "Stát může platit snížené daně, dokud bude hladomor trvat."
 indian_famines.1.c: "Doufejme, že si tento laskavý čin zapamatují. Odpusťte daně a místo toho poskytněte potravinovou pomoc."
 not_recently_had_war: "Země [SCOPE.GetRootScope.GetCountry.GetName] žije v míru alespoň #variable 5#! let."
 reduced_taxation_due_to_famine: "Snížené daně"
 no_taxation_due_to_famine: "Daňové výjimky a pomoc při hladomoru"
 famine_relief_aid_costs: "Místní programy pomoci při hladomoru"
 indian_famines.2.t: "Peníze se jíst nedají"
 indian_famines.2.d: "Tváří v tvář hladomoru, který sužuje [SCOPE.sState('indian_famine_state_scope').GetName], předložil [SCOPE.sCharacter('hunger_strike_agitator_scope').GetFullName] petici požadující, aby země [SCOPE.GetRootScope.GetCountry.GetName] dovolila farmářům pěstovat potravinářské plodiny místo tržních plodin."
 indian_famines.2.f: "Starý farmář hleděl na osobu [SCOPE.sCharacter('hunger_strike_agitator_scope').GetLastNameNoFormatting] s úctou, která důstojníka znepokojovala. Horliví následovníci byli nebezpeční a těžko se krotili. Byl rád, že prozatím pouze předkládají petici, přesto ho napadlo, co by se stalo, kdyby se někdy rozhodli máchat svými srpy po mase místo po obilí."
 indian_famines.2.a: "Rozumný požadavek. Dovolte vybraným farmářům změnit plodiny."
 indian_famines.2.b: "Pšenici může pěstovat každý na světě. My jsme sem přišli pro indigo a bavlnu."
 temporary_switch_to_food_crops: "Povolení potravinářských plodin"
 bowed_to_food_crop_demands: "Povoleno omezení tržních plodin"
 indian_famines.2.tt: "Následující se bude vztahovat na každý #bold indický#! [concept_state], který trpí [concept_famine]:"
 following_applied_to_every_owned_state: "Následující se bude vztahovat na každý vlastněný [concept_state]:"
 indian_famines.3.t: "Půst za ukončení hladu"
 indian_famines.3.d: "[SCOPE.sCharacter('hunger_strike_agitator_scope').GetFullName] zahájil hladovku až do smrti, aby přesvědčil zemi [SCOPE.GetRootScope.GetCountry.GetName], aby dovolila nahradit tržní plodiny potravinářskými."
 indian_famines.3.f: "Když se generální guvernér procházel po celé délce kanceláře, jeho tajemník se nemohl ubránit úsměvu. Generál velel armádě tisíců mužů, a přesto jeho největší hrozbou byl hladovějící muž. Pokud ten muž zemře, bude to mít strašlivé následky. Pokud přežije, bude je stejným způsobem šikanovat znovu. Takovou váhu měly jen životy králů a královen. Jak dopustili, aby se obyčejný člověk stal tak důležitým?"
 indian_famines.3.a: "Možná mohou půst praktikovat i farmáři."
 indian_famines.3.b: "Přistupme na kompromis."
 bowed_to_hunger_strike: "Ústupek hladovce"
 food_crop_system_modifier: "Omezení tržních plodin"
 indian_famines.4.t: "Mor lidí"
 indian_famines.4.d: "Hladomor ve státě [SCOPE.sState('indian_famine_state_scope').GetName] zanechal mnoho lidí bez prostředků. Aby nějak vyšli, zbídačení farmáři z [SCOPE.sState('indian_famine_state_scope').GetFarmHubName] došli celou cestu až do [SCOPE.sState('indian_famine_state_scope').GetCityHubName]. Čekají na vstup u městských bran."
 indian_famines.4.f: "Dítě zívlo. Bylo ospalé, hladové a vzduch ve městě páchl. Otec mu ale řekl, že sem musí přijít, pokud chtějí zajistit, aby se jeho sestra dožila dvou let. A tak tu po celém týdnu na cestě byli.\n\nPřesto však nikde neviděl žádné jídlo. Žádná pole k obdělávání. Jen velké cihlové domy, které působily chladně a byly plné ještě chladnějších lidí. Jak tohle mělo pomoci mámě a Didi?"
 indian_famines.4.a: "Město není místo pro farmáře."
 indian_famines.4.b: "Továrny a sklady by je možná byly ochotny zaměstnat výměnou za snížené daně."
 kept_farmers_out_of_city_modifier: "Zbídačení farmáři vykázáni z měst"
 tax_breaks_for_warehouses: "Daňové úlevy pro sklady"
 allowed_farmers_into_cities: "Příliv zbídačených farmářů"
 je_communal_divides: "Komunitní rozpory"
 je_communal_divides_reason: "#italic „Je možné, aby dva národy – muslimové a hinduisté – seděly na témže trůnu a zůstaly si rovny v moci?“#!\n\nDějiny #bold hinduisticko-muslimských#! vztahů v Indii jsou bohaté i složité, s obdobími spolupráce a soužití propletenými s obdobími nesnášenlivosti a krutosti. Po celá staletí však obě komunity nějak přežívaly pod záštitou svých feudálních pánů.\n\nS nástupem nových #bold národních identit#! a rostoucím šířením #bold etnonáboženského nacionalismu#! je však zřejmé, že staré způsoby musí ustoupit novým. Jen málokteré hlasy se ovšem shodnou na tom, co by takové nové způsoby měly obnášet.\n\nNárod v rozkolu nemůže doufat, že přetrvá. Tak či onak musí být dosaženo jednoty.\n\n#bold Teorie dvou národů#!\nTakzvaná teorie dvou národů, založená na přesvědčení, že ani muslimové, ani hinduisté nemohou vládnout, aniž by utlačovali ty druhé, v posledních letech získává na síle. Dokud je [concept_journal_entry] #bold $je_communal_divides$#! aktivní, přitažlivost #tooltippable #tooltip:religious_nationalist_groups_tt #bold nábožensky nacionalistických#!#!#! [Concept('concept_political_movement','$concept_political_movements$')] bude zvýšena."
 je_communal_divides_goal_tt: "Indickým provinciím s muslimskou většinou byla udělena autonomie v rámci konfederativního systému."
 create_indusstan_bangla_tt: "#tooltippable #tooltip:indusstan_tt #bold Indusstan#!#!#! a #tooltippable #tooltip:bengal_tt #bold Bengálsko#!#!#! budou zřízeny jako autonomní [Concept('concept_subject','$concept_subjects$')] v rámci země [SCOPE.GetRootScope.GetCountry.GetName]"
 break_confederation_promise_tt: "#bold Konec konfederace#!\nPokud bychom porušili svůj slib a násilně znovu začlenili #bold $dyn_c_indusstan_federation$#! nebo #bold $dyn_c_bengal_federation$#!, můžeme očekávat #bold masivní nepokoje#! mezi našimi muslimskými [Concept('concept_pop','$concept_pops$')]."
 indusstan_tt: "Industán se bude skládat ze [Concept('concept_state','$concept_states$')] $STATE_PUNJAB$, $STATE_SINDH$, $STATE_KASHMIR$, $STATE_PASHTUNISTAN$, $STATE_BALUCHISTAN$ a $STATE_QUETTA$."
