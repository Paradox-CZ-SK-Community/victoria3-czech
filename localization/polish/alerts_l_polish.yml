l_polish:
 alert_country_default_name: "V [Concept('concept_default','platební neschopnosti')]"
 alert_country_default_desc: "[GetPlayer.GetName] je v [Concept('concept_default','platební neschopnosti')] kvůli neschopnosti splatit naše půjčky. Dokud nedosáhneme pozitivního zůstatku, budeme trpět penalizaci, která se bude postupně zhoršovat, jak čas plyne.\n\n#title Aktuální účinky:#!\n[GetPlayer.GetInDefaultEffectsDesc]"
 alert_country_default_hint: "Můžete zlepšit svou finanční situaci zvýšením svých příjmů nebo snížením výdajů. Pro zvýšení příjmů můžete krátkodobě zvýšit současnou daňovou sazbu, zavést nové spotřební daně, nebo zvýšit cla, abyste generovali nové příjmy. Pro snížení výdajů můžete zvážit snížení mezd buď u vojenských, nebo vládních budov, snížení cen zboží, které konzumují, nebo pozastavení výstavby, dokud se vaše finance neuzdraví. Pokud nic z toho není dost, také máte možnost vyhlásit [concept_bankruptcy|l]"
 alert_country_default_action: "Panel rozpočtu"
 alert_has_no_research_alert_name: "Žádný aktivní výzkum"
 alert_has_no_research_alert_desc: "V současnosti se aktivně nesoustředíme na žádný [concept_technology|l]. V důsledku toho bude veškerá [concept_innovation|l], kterou generujeme, směřovat ke našemu pasivnímu [concept_technology_spread|l]."
 alert_has_no_research_alert_hint: "Nastavte, kterou technologii zkoumat v jedné ze tří technologických větví v panelu #b Technologie#!."
