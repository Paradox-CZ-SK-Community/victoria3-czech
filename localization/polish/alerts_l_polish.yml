 alert_free_government_reform_action: "Panel vlády"
 alert_revolution_alert_name: "[concept_revolution]"
 alert_revolution_alert_desc: "Začala [Concept('concept_revolution', 'revolucionářská')] [concept_diplomatic_play|l] a naša [Concept('concept_country','země')] je na pokraji [Concept('concept_civil_war','občanské války')]."
 alert_revolution_alert_hint: "Můžete si vybrat, kterou stranu konfliktu podporujete v občanské válce a začít [Concept('concept_sway','ovlivňovat')] ostatní národy (pokud je potřeba), aby viděli vaši stranu k úspěchu."
 alert_revolution_alert_action: "Panel diplomatických akcí"
