 alert_power_struggle_leader_desc: "[SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetPowerStruggleContender.GetName] se pokouší [Concept('concept_power_struggle','bojem o moc')] o kontrolu nad [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetName] (#v [SCOPE.GetRootScope.GetCountry.GetCurrentPowerStruggleMonth]/[SCOPE.GetRootScope.GetCountry.GetMaxPowerStruggleMonth] měsíců#!). To znamená, že [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetPowerStruggleContender.GetName] má alespoň #v [Subtract_CFixedPoint(GetDefine('NPowerBlocs','POWER_STRUGGLE_PRESTIGE_THRESHOLD_FAIL'), '(CFixedPoint)1')|0%]#! více [Concept('concept_prestige','prestiže')] než vy. Pokud to bude pokračovat po celkovou dobu #v [SCOPE.GetRootScope.GetCountry.GetMaxPowerStruggleMonth]#! měsíců, stanou se novým [Concept('concept_power_bloc_leader','lídrem mocenského bloku')] [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetName].\n\n@prestige! #v #tooltippable #tooltip:[SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetPowerStruggleContender.GetTooltipTag],COUNTRY_PRESTIGE_BREAKDOWN [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetPowerStruggleContender.GetPrestige]#!#!#! prestíž pro [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetPowerStruggleContender.GetName]\n@prestige! #v #tooltippable #tooltip:[SCOPE.GetRootScope.GetCountry.GetTooltipTag],COUNTRY_PRESTIGE_BREAKDOWN [SCOPE.GetRootScope.GetCountry.GetPrestige]#!#!#! $concept_prestige$ pro [SCOPE.GetRootScope.GetCountry.GetName] $YOU$"
