 alert_invasion_hint: "Můžete poslat další [Concept('concept_army','armády')] do #v [SCOPE.GetRootScope.GetInvasion.GetFront.GetName]#! a/nebo poslat [Concept('concept_mobilize_army','mobilizované')] [Concept('concept_army','armády')] chránit [SCOPE.GetRootScope.GetInvasion.GetDefenderHQ.GetName]."
