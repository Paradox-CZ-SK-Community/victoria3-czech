 alert_can_abdicate_alert_hint: "Můžete použít nabídku #bold Interakce se znakem#! k #bold abdikaci#! vašeho [concept_ruler|l], a uklidnit vznikající [Concept('concept_insurrection','vzpouru')] v vaší [Concept('concept_country','zemi')]"
