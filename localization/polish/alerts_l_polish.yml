 alert_naval_hostilities_alert_desc: "Jsme ve stavu [concept_naval_hostilities] s jiným [concept_country], aniž bychom s nimi byli ve stavu [concept_war]. Během trvání budou naše [Concept('concept_fleet','$concept_fleets$')] schopny provádět nepřátelské akce (např. [Concept('concept_blockade','$concept_blockades$')]) proti sobě navzájem.\n\n$concept_naval_hostilities$ s:\n[GetPlayer.GetNavalHostilitiesCountriesDesc]" # todo: NEW TRANSLATION
