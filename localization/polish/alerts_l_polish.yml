 alert_secession_alert_hint: "Můžete začít [Concept('concept_sway','ovlivňovat')] ostatní národy (pokud je to potřeba), aby viděli vaši stranu k úspěchu."
 alert_secession_alert_action: "Panel diplomatických akcí"
 alert_is_losing_rank_alert_name: "Ztráta [concept_rank]"
 alert_is_losing_rank_alert_desc: "Máme nedostatečnou [concept_prestige|l] k udržení naší [GetPlayer.GetRank|v] úrovně a staneme se [GetPlayer.GetTargetRank|v] za [GetPlayer.GetDaysUntilRankLoss|v] den/dny, pokud se naše postavení neobnoví.\n\nPotřebujeme #P #b [GetPlayer.GetPrestigeToMaintainRank]#!#! [Concept('concept_prestige','prestíže')] k udržení našeho postavení a aktuálně máme #b #N [GetPlayer.GetPrestige]#!#!."
 alert_is_losing_rank_alert_hint: "Můžete získat více [Concept('concept_prestige','prestíže')] zvýšením [concept_gdp] vaší země, zvýšením [concept_power_projection|l] vaší armády a námořnictva (zvýšením jejich velikosti nebo poskytnutím silnějšího vybavení) nebo tím, že budete vedoucím producentem [concept_good|l]. Také získáte část prestíže vašich [Concept('concept_subject', 'závislých zemí')] tímto způsobem."
 alert_is_losing_rank_alert_action: "Panel diplomacie"
 alert_has_no_war_goal_alert_name: "Žádný [concept_war_goal|l] proti [SCOPE.GetRootScope.GetDiplomaticPlay.GetInitiator.GetName]"
 alert_has_no_war_goal_alert_desc: "V současnosti nemáme nastaven žádný [Concept('concept_war_goal', 'válečný cíl')] v jedné z našich [Concept('concept_diplomatic_play', 'diplomatických her')].\n\nPokud během fáze [Concept('concept_opening_moves','počátečních kroků')] nepřidáme žádný válečný cíl, automaticky za nás bude vygenerován [concept_war_goal|l] na [concept_war_reparations|l]."
 alert_has_no_war_goal_alert_hint: "Můžete přidat válečný cíl na účastníka [Concept('concept_diplomatic_play','diplomatické hry')] na jeho přehledové obrazovce. Můžete rozšířit vaše válečné cíle, jak více se účastníků přidá na jednu stranu v diplomatické hře, ale to bude na úkor [Concept('concept_maneuver', 'manévrú')] které můžete vynaložit na nalákání dalších účastníků k vaší straně."
 alert_has_no_war_goal_alert_action: "Diplomatický tah"
 alert_vulnerable_front_name: "Nechráněná [Concept('concept_front','fronta')]: [SCOPE.GetRootScope.GetFront.GetName]"
 alert_vulnerable_front_desc: "Nemáme žádné [Concept('concept_general', 'generály')] ani [Concept('concept_battalion', 'bataliony')] bránící [SCOPE.GetRootScope.GetFront.GetName] a je zde alespoň jeden nepřátelský generál přidělený k tomu."
