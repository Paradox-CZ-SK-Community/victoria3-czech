 alert_low_organization_idle_hint: "Můžete zvýšit [Concept('concept_organization','organizaci')] [concept_military_formation|l] tím, že zajistíte dostatečný [concept_command_limit|l] pro všechny její [Concept('concept_unit','jednotky')]. Zatímco formace s dostatečným velitelským limitem je nehybná se jí v průbehu času zvýší organizace. Přepínání [Concept('concept_mobilization_option','mobilizačních možností')] zatímco je formace v terénu může vést k dočasné ztrátě organizace."
