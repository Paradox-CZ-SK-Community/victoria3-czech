 korea_colonization.2.t: "Nadějná budoucnost" # todo: NEW TRANSLATION
 korea_colonization.2.d: "Svět nyní ví, že [GetGeographicRegion('geographic_region_korea').GetName] je součástí [ROOT.GetCountry.GetName] a pevně pod úplnou kontrolou naší země. Zřízením naší přítomnosti na poloostrově náš úspěch dále ukazuje význam našeho postavení na světové scéně." # todo: CHANGED
 korea_colonization.2.f: "S vizí sjednocení národů právě uskutečněnou roste ambice [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Ze svého sídla v [ROOT.GetCountry.GetCapital.GetCityHubName] [ROOT.GetCountry.GetRuler.GetSheHe] skládá tanka o úspěchu tohoto podniku a je potěšen událostmi na poloostrově.\n\nVe stejný okamžik, v $STATE_SEOUL$, [GetCulture('korean').GetNameNoFormatting] úředník potlačuje veřejný rozruch občanů, kteří protestují proti novému společenskému řádu. Mluví k nim s velkou vyrovnaností a trvá na tom, že toto spojení zajistí prosperitu všech." # todo: CHANGED
 korea_colonization.2.a: "Budoucí prosperita a bezpečí poloostrova vypadá slibně." # todo: CHANGED
 korea_colonization.2.b: "Obchod byl nedílnou součástí našeho programu." # todo: CHANGED
 modifier_peninsula_control_prestige_authority: "Prestiž poloostrova" # todo: CHANGED
 modifier_peninsula_control_assimilation_migration: "Zrychlená asimilace" # todo: NEW TRANSLATION
 modifier_peninsula_control_loyal_prominence: "Vynikající dohled" # todo: NEW TRANSLATION
 modifier_peninsula_control_company_bonus: "Ocenění společnosti" # todo: NEW TRANSLATION
 korea_colonization.3.t: "Promarněná příležitost" # todo: NEW TRANSLATION
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] už není pod naší kontrolou. Ekonomické a diplomatické dopady pocítí [ROOT.GetCountry.GetName] ještě mnoho let." # todo: CHANGED
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] úředníci se scházejí, panují pocity frustrace a nespokojenosti, aby projednali selhání vlády udržet pořádek na poloostrově. Mnozí odmítají jakýkoli kompromis ohledně toho, jak postupovat po tomto úderu proti značné moci, kterou si [ROOT.GetCountry.GetNameNoFormatting] v posledních letech nashromáždila.\n\nPán vstane a promluví přes hluk diskuse: „Určitě [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] může převzít odpovědnost za tento neúspěch.\" # todo: CHANGED
 korea_colonization.3.a: "Musíme si všichni nést břemeno selhání našeho podniku." # todo: CHANGED
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] a [SCOPE.gsInterestGroup('relevant_ig').GetName] musí převzít odpovědnost za toto selhání." # todo: NEW TRANSLATION
