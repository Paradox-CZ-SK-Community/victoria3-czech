 korea_colonization.2.t: "Slibná budoucnost"
 korea_colonization.2.d: "Svět nyní ví, že [GetGeographicRegion('geographic_region_korea').GetName] je součástí země [ROOT.GetCountry.GetName] a pevně pod úplnou kontrolou naší země. Zřízením naší přítomnosti na poloostrově náš úspěch dále dokazuje význam našeho místa na světové scéně."
 korea_colonization.2.f: "Když se vize sjednocení národů nyní naplnila, ambice [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] rostou. Ze svého sídla v [ROOT.GetCountry.GetCapital.GetCityHubName] skládá [ROOT.GetCountry.GetRuler.GetSheHe] poezii tanka, v níž rozjímá o úspěchu tohoto úsilí a raduje se z vývoje na poloostrově.\n\nV tutéž chvíli venku ve státě $STATE_SEOUL$ [GetCulture('korean').GetNameNoFormatting] byrokrat potlačuje veřejné pobouření civilistů, kteří odmítají nový společenský řád. S velkou vyrovnaností jim vysvětluje, že toto spojení zajistí prosperitu všem."
 korea_colonization.2.a: "Budoucí prosperita a bezpečnost poloostrova vypadají slibně."
 korea_colonization.2.b: "Obchod byl nedílnou součástí naší agendy."
 modifier_peninsula_control_prestige_authority: "Prestiž poloostrova"
 modifier_peninsula_control_assimilation_migration: "Zrychlená asimilace"
 modifier_peninsula_control_loyal_prominence: "Vynikající dohled"
 modifier_peninsula_control_company_bonus: "Pochvala společnosti"
 korea_colonization.3.t: "Promarněná příležitost"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] již není pod naší kontrolou. Ekonomické a diplomatické dopady pocítí [ROOT.GetCountry.GetName] ještě celé roky."
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] úředníci se shromažďují, plni frustrace a nelibosti, aby projednali selhání vlády při udržení pořádku na poloostrově. Mnozí odmítají jakýkoli kompromis v otázce, jak se pohnout dál po této ráně pro značnou moc, kterou [ROOT.GetCountry.GetNameNoFormatting] v posledních letech nashromáždila.\n\nJeden gentleman povstane, aby promluvil přes hluk debaty: „[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] za tento nezdar jistě mohou převzít odpovědnost.“"
 korea_colonization.3.a: "Všichni musíme nést břemeno selhání našeho úsilí."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] a [SCOPE.gsInterestGroup('relevant_ig').GetName] musí za toto selhání převzít odpovědnost."
