l_polish:
 japan_events.31.t: "Divadlo v [SCOPE.sState('kabuki_theatre_state').GetCityHubName] vyhořelo"
 japan_events.31.d: "Požár zničil oblíbené divadlo kabuki ve státě [SCOPE.sState('kabuki_theatre_state').GetName]. Zatímco divadelní soubor plánuje obnovu, členové [SCOPE.gsInterestGroup('relevant_ig').GetName] – zejména [SCOPE.sCharacter('relevant_leader').GetFullName] – v tom vidí příležitost regulovat zábavu v [SCOPE.sState('kabuki_theatre_state').GetCityHubName] a donutit umělce, aby své divadlo znovu postavili za hranicemi města."
 japan_events.31.f: "Na plošině požární hlásné věže stojí neklidný hlídač, který bedlivě dohlíží na [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Pozdě večer ze svého stanoviště spatří neklamné známky požáru. Jak se valí kouř a vzduch naplňuje štiplavý pach ohně, spěchá rozeznít poplašný zvon.\n\nNic netušící měšťané jsou varováni před nebezpečím a hasičské sbory se dávají do pohybu, lezou po střechách a snaží se dostat plameny pod kontrolu. Když jsou ohně uhašeny, je zřejmé, že škody už jsou značné. Z jednoho významného divadla kabuki po ničivém požáru zbyly jen uhlíky a popel."
 japan_events.31.a: "Musí ho znovu postavit za hranicemi města."
 japan_events.31.b: "Dovolte divadelnímu souboru obnovu."
 modifier_kabuki_regulated: "Zásah proti divadlům kabuki"
 modifier_theatre_affronted_official: "Uražený úředník"
 modifier_shogunate_opposition_ig_approval: "Oportunistická opozice"
 japan_events.32.t: "Obrazy plovoucího světa"
 japan_events.32.d: "Dílo plodného umělce ukijo-e v [SCOPE.sState('ukiyo_e_state').GetCityHubName] podnítilo představivost umělců v [ROOT.GetCountry.GetName] i v zahraničí."
 japan_events.32.f: "Oblíbený dřevoryt zachycuje rušnou divadelní čtvrť na okraji [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Stříbrný měsíční svit dopadá na hlavní ulici plnou lidí, jejichž siluety vrhají stíny. Východní stranu ulice lemují čajovny a loutková divadla. Naproti, na západě, stojí tři divadla kabuki, každé s bubnovou věží.\n\n„Jen mistrná ruka mohla vytvořit tahy tak pevné a pravdivé a tak jemně stínované přesně tam, kde mělo stínování přijít. A jen mistrná mysl mohla pojmout postavu tak rytmicky uspořádanou v celku, tak silnou a zároveň tak nádherně křehkou.“\n— F.W.G., #italic Bulletin Institutu umění v Chicagu#!"
 japan_events.32.a: "Není pochyb, že [ROOT.GetCountry.GetAltAdjectiveNoFormatting('ee')|l] umění bude dál získávat světový význam."
 japan_events.32.b: "Výborně. Podpořte tvorbu dalších takových děl."
 modifier_ukiyo_e_prestige: "Plodné dřevoryty"
 modifier_ukiyo_e_production: "Výroba dřevorytů"
 japan_events.33.t: "Zápas s tradicí"
 japan_events.33.d: "Dopad westernizace na [ROOT.GetCountry.GetAltAdjectiveNoFormatting('ou')|l] kulturu je značný. Zatímco se zvyky rychle mění, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] sponzoruje turnaj v zápase sumó v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], aby čelil veřejnému odporu vůči této tradici."
 japan_events.33.f: "Davy se začínají shromažďovat u nově postavené haly sumó na chrámovém pozemku, plné zvědavosti na událost, kterou podporuje [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]. Mezi přítomnými jsou i někteří aristokraté a státníci, jejichž zaujetí západní kulturou je přivedlo ke skepsi vůči zachování vazeb na tuto tradici. Ačkoli zlatý věk sumó už dávno pominul, účast [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] může v očích lidu obnovit kulturní význam tohoto sportu."
 japan_events.33.a: "Úsilí [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] obnoví veřejný obraz tohoto sportu."
 japan_events.33.b: "Tradice tohoto [ROOT.GetCountry.GetAltAdjectiveNoFormatting('eeho')|l] sportu přetrvá po dlouhý čas."
 modifier_restored_sumo_popularity: "Obnovená popularita sumó"
 modifier_traditional_sports_movement_support: "Národní sport"
 japan_events.34.t: "Velrybářské neštěstí v [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Loď plující u pobřeží státu [SCOPE.sState('whaling_state').GetName] spatřila dvě velryby černé – matku a mládě. Velrybářská skupina, hnaná zoufalstvím po sezóně špatných úlovků, se vydala na moře navzdory nepříznivému počasí. Více než 100 lidí je hlášeno jako pohřešovaných."
 japan_events.34.f: "Táborový oheň na lodi už dávno zmizel z dohledu a flotilu už ze břehu není vidět, což v [SCOPE.sState('whaling_state').GetPortHubName] vyvolává velký rozruch.\n\n„Ať byly časy jakkoli těžké, vždy jsme se vyhýbali lovu matky s mládětem,“ namítá jeden muž. „Měli jsme ty velryby nechat odplout.“\n\n„Nesmysl,“ odpovídá jeho bratranec. „Velryby jsou požehnáním. Jsem si jistý, že se výprava brzy vrátí s hojným úlovkem.“"
 japan_events.34.a: "$bg_whaling$ je ve státě [SCOPE.sState('whaling_state').GetNameNoFormatting] klíčovým odvětvím."
 japan_events.34.b: "Místo toho zaměřte naše budoucí úsilí na $bg_fishing$ ve státě [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 modifier_whaling_deaths: "Oběti velrybářství"
 modifier_redouble_on_whaling: "Budoucnost ve velrybářství"
 modifier_fishing_not_whaling: "Budoucnost v rybolovu"
 japan_events.35.t: "Opatření proti žhářství"
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName] se obávají, že četnost žhářských případů v hranicích města [SCOPE.sState('relevant_state').GetCityHubName] zvýšila ceny zboží [SCOPE.sGoods('expensive_good').GetName] v [ROOT.GetCountry.GetName]. Tvrdí, že je nutné zdvojnásobit přísná opatření proti žhářství."
 japan_events.35.f: "Z požární hlásné věže se rozezní poplašný zvon a varuje všechny před bezprostředním nebezpečím, když další požár v [SCOPE.sState('relevant_state').GetCityHubName] zachvátí obytné domy a podniky. Když dorazí hasičské sbory, aby požár uhasily, $strata_commoners_townspeople$ se shromažďují ve velkém davu na ulici. Někteří hledí na své sousedy s podezřením a jiní začínají spekulovat, zda šlo o nehodu, nebo zda za to může žhář. Jedno je jisté: ceny zboží [SCOPE.sGoods('expensive_good').GetNameNoFormatting] brzy prudce vzrostou."
 japan_events.35.a: "Přísná opatření jsou oprávněná. Popravte podezřelé žháře."
 japan_events.35.b: "Omilostněte nevyřešené zločiny těch, kdo pomohou při zatýkání."
 modifier_arson_measure_strict_ig: "Přísná opatření proti žhářství"
 modifier_arson_measure_strict_pop: "Popravy žhářů"
 modifier_arson_measure_lenient_ig: "Mírná opatření proti žhářství"
 je_colonize_korea: "Vláda v Čosonu"
 je_colonize_korea_reason: "#italic „Průmysl a obchod zaznamenají pod dobrou správou a mírem výrazný rozvoj. Jsme si naprosto jisti, že mír ve východní Asii tak bude mít pevnější základy než kdy dříve.“\n— Záznamy císaře Meidžiho, svazek 12#!\n\nNastal čas zřídit trvalou přítomnost na Korejském poloostrově. Teprve pak můžeme zajistit budoucí prosperitu a bezpečnost [JournalEntry.GetCountry.GetName] i celé oblasti [GetGeographicRegion('geographic_region_east_asia').GetName]. Abychom řádně zabezpečili kontrolu, musíme dohlížet na rozvoj [GetGeographicRegion('geographic_region_korea').GetName] a neochabovat ve svých ambicích."
