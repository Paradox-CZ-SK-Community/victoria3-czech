l_polish:
 japan_events.31.t: "Divadlo v [SCOPE.sState('kabuki_theatre_state').GetCityHubName] vyhořelo" # todo: NEW TRANSLATION
 japan_events.31.d: "Požár zničil oblíbené kabuki divadlo v [SCOPE.sState('kabuki_theatre_state').GetName]. Zatímco divadelní soubor plánuje jeho obnovu, členové [SCOPE.gsInterestGroup('relevant_ig').GetName] — zejména [SCOPE.sCharacter('relevant_leader').GetFullName] — to vnímají jako příležitost regulovat zábavu v [SCOPE.sState('kabuki_theatre_state').GetCityHubName] a přinutit herce postavit divadlo znovu mimo městské hranice." # todo: CHANGED
 japan_events.31.f: "Na plošině požární strážní věže bdí neklidný hlídač, který pečlivě dohlíží na [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Pozdě večer ze svého vyvýšeného místa zaznamená typické známky požáru. Jakmile se začnou valit dýmy a ostrý zápach spáleniny zaplní vzduch, spěchá uhodit na poplachový zvon.\n\nNic netušící měšťané jsou varováni před nebezpečím a hasičské sbory vyjíždějí, vyšplhávají na střechy, aby zkrotily plameny. Když jsou ohně uhašeny, je zřejmé, že škody jsou již značné. Z jednoho významného kabuki divadla zůstaly po tomto ničivém požáru jen žhavé uhlíky a popel." # todo: CHANGED
 japan_events.31.a: "Musí se znovu postavit mimo městské hranice." # todo: CHANGED
 japan_events.31.b: "Dovolit divadelnímu souboru obnovit divadlo." # todo: CHANGED
 modifier_kabuki_regulated: "Razantní zásah proti kabuki" # todo: CHANGED
 modifier_theatre_affronted_official: "Urazený úředník" # todo: CHANGED
 modifier_shogunate_opposition_ig_approval: "Opportunistická opozice" # todo: NEW TRANSLATION
 japan_events.32.t: "Obrazy plovoucího světa" # todo: CHANGED
 japan_events.32.d: "Dílo plodného ukiyo-e umělce v [SCOPE.sState('ukiyo_e_state').GetCityHubName] inspirovalo představivost umělců jak v [ROOT.GetCountry.GetName], tak i v zahraničí." # todo: CHANGED
 japan_events.32.f: "Populární dřevoryt zachycuje živou divadelní čtvrť na okraji [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Stříbrné měsíční světlo padá na hlavní ulici plnou lidí, jejichž siluety vrhají stíny. Východní stranu ulice lemují čajovny a loutková divadla. Naproti, na západě, stojí tři kabuki divadla s bubnovou věží nad každým z nich.\n\n„Jen mistrovská ruka by dokázala tahy tak pevné a pravdivé a přitom tak jemně stínované právě tam, kde má stín vzniknout. A jen mistrovská mysl by mohla vytvořit postavu tak rytmicky uspořádanou v celku, tak silnou a zároveň tak nádherně něžnou.“\n— F.W.G., #italic Bulletin of the Art Institute of Chicago#!" # todo: CHANGED
 japan_events.32.a: "Není pochyb, že [ROOT.GetCountry.GetAdjectiveNoFormatting] umění bude nadále získávat světový význam." # todo: CHANGED
 japan_events.32.b: "Výborně. Podporujte tvorbu dalších takových děl." # todo: CHANGED
 modifier_ukiyo_e_prestige: "Plodné dřevoryty" # todo: NEW TRANSLATION
 modifier_ukiyo_e_production: "Produkce dřevorytů" # todo: CHANGED
 japan_events.33.t: "Zápas s tradicí" # todo: NEW TRANSLATION
 japan_events.33.d: "Vliv westernizace na [ROOT.GetCountry.GetAdjectiveNoFormatting] kulturu je výrazný. Jak se zvyky rychle mění, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] sponzoruje turnaj v sumo v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], aby potlačil veřejnou nepřízeň vůči této tradici." # todo: CHANGED
 japan_events.33.f: "Dav se začíná shromažďovat v nově postavené sumo hale v areálu chrámu, plný zvědavosti ohledně této události, která má podporu [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]. Mezi přítomnými jsou někteří aristokraté a státníci, jejichž posedlost západní kulturou je učinila skeptickými k udržení vazeb na tuto tradici. Ačkoli zlatý věk sumo je dávno pryč, účast [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] může znovu potvrdit kulturní význam tohoto sportu v očích lidu." # todo: CHANGED
 japan_events.33.a: "Snaha [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] obnoví veřejný obraz tohoto sportu." # todo: NEW TRANSLATION
 japan_events.33.b: "Tradice tohoto [ROOT.GetCountry.GetAdjectiveNoFormatting] sportu bude dlouho přetrvávat." # todo: CHANGED
 modifier_restored_sumo_popularity: "Obnovená obliba sumo" # todo: CHANGED
 modifier_traditional_sports_movement_support: "Národní sport" # todo: NEW TRANSLATION
 japan_events.34.t: "Velrybářská katastrofa v [SCOPE.sState('whaling_state').GetPortHubName]" # todo: NEW TRANSLATION
 japan_events.34.d: "Loď plavící se u pobřeží [SCOPE.sState('whaling_state').GetName] spatřila dva plejtváky — matku a mládě. Poháněni zoufalstvím po sezóně špatných úlovků se skupina velrybářů vydala na moře i přes nepříznivé počasí. Je hlášeno více než 100 nezvěstných." # todo: CHANGED
 japan_events.34.f: "Ohnisko na lodi už dávno zmizelo z dohledu a flotilu už z pevniny nelze spatřit, což způsobuje velký rozruch v [SCOPE.sState('whaling_state').GetPortHubName].\n\n„Ať už byly časy jakkoli těžké, vždy jsme se vyhýbali lovu matky s mládětem,“ nadhodí jeden muž. „Měli jsme velryby nechat jít.“\n\n„Blbost,“ odvětí jeho bratranec. „Velryby jsou požehnáním. Jsem si jistý, že výprava brzy přinese bohatý úlovek.\" # todo: CHANGED
 japan_events.34.a: "$bg_whaling$ je klíčové odvětví v [SCOPE.sState('whaling_state').GetNameNoFormatting]." # todo: NEW TRANSLATION
 japan_events.34.b: "Místo toho zaměřme naše budoucí úsilí na $bg_fishing$ v [SCOPE.sState('whaling_state').GetNameNoFormatting]." # todo: CHANGED
 modifier_whaling_deaths: "Oběti při lovu velryb" # todo: NEW TRANSLATION
 modifier_redouble_on_whaling: "Budoucnost velrybaření" # todo: CHANGED
 modifier_fishing_not_whaling: "Budoucnost rybolovu" # todo: CHANGED
 japan_events.35.t: "Opatření proti žhářství" # todo: NEW TRANSLATION
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName] se obávají, že četnost případů žhářství v rámci městských hranic [SCOPE.sState('relevant_state').GetCityHubName] zvýšila ceny [SCOPE.sGoods('expensive_good').GetName] v [ROOT.GetCountry.GetName]. Argumentují, že je nutné důsledněji prosazovat přísná opatření proti žhářství." # todo: CHANGED
 japan_events.35.f: "Poplachový zvon z požární věže zazvoní a varuje všechny před bezprostředním nebezpečím, když další požár v [SCOPE.sState('relevant_state').GetCityHubName] zachvátí obydlí a podniky. Když hasiči dorazí uhasit plameny, $strata_commoners_townspeople$ se shromáždí v davu na ulici. Někteří pohlížejí na své sousedy se podezřením, jiní začínají spekulovat, zda šlo o nehodu, nebo zda je vinen žhář. Jedno je jisté: ceny [SCOPE.sGoods('expensive_good').GetNameNoFormatting] se brzy začnou násobit." # todo: CHANGED
 japan_events.35.a: "Přísná opatření jsou na místě. Popravit podezřelé žháře." # todo: NEW TRANSLATION
 japan_events.35.b: "Prominout nevyřízené zločiny těm, kteří pomáhají při zatýkání." # todo: CHANGED
 modifier_arson_measure_strict_ig: "Přísná opatření proti žhářství" # todo: NEW TRANSLATION
 modifier_arson_measure_strict_pop: "Popravy žhářů" # todo: NEW TRANSLATION
 modifier_arson_measure_lenient_ig: "Mírná opatření proti žhářství" # todo: NEW TRANSLATION
 je_colonize_korea: "Vláda Chōsen" # todo: NEW TRANSLATION
 je_colonize_korea_reason: "#italic „Průmysl a obchod zažijí značný rozvoj za dobré správy a míru. Jsme naprosto přesvědčeni, že mír ve Východní Asii tak získá pevnější základy než kdy předtím.“\n— Záznam císaře Meidži, svazek 12#!\n\nNastal čas založit trvalou přítomnost na Korejském poloostrově. Jen tak můžeme zajistit budoucí prosperitu a bezpečí [JournalEntry.GetCountry.GetName] a celé [GetGeographicRegion('geographic_region_east_asia').GetName]. Abychom správně zajistili kontrolu, musíme dohlížet na rozvoj [GetGeographicRegion('geographic_region_korea').GetName] a nevzdat se našich ambicí." # todo: CHANGED
