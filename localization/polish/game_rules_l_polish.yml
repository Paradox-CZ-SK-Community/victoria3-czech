 setting_allow_dynamic_naming_desc: "[Concept('concept_state', '$concept_states$')] a #bold města#! budou měnit svá jména podle [concept_culture] [concept_country], která je vlastní."
 setting_no_dynamic_naming: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_dynamic_naming_desc #high Vypnuto#!#!#!"
 setting_no_dynamic_naming_desc: "[Concept('concept_state', '$concept_states$')] a #bold města#! nebudou měnit svá jména podle [concept_culture] [concept_country], která je vlastní."
 rule_ruler_selector: "Výběr vládce"
