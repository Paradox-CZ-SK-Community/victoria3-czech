l_polish:
 GAME_RULES_PRESET_AI_BEHAVIOR: "Chování AI: [GameRuleSetting.GetName]"
 rule_ai_behavior: "AI chování vůči hráčům"
 setting_lenient_ai_behavior: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_lenient_ai_behavior_desc #high Mírné#!#!#!"
 setting_lenient_ai_behavior_desc: "AI země budou jednat přátelštěji vůči hráčským zemím a budou je v [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] posuzovat shovívavěji."
 setting_standard_ai_behavior: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_standard_ai_behavior_desc Standardní#!#!"
 setting_standard_ai_behavior_desc: "AI země budou hodnotit jak hráčské, tak AI země stejným způsobem, bez zvláštních ohledů na hráče."
 setting_harsh_ai_behavior: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_harsh_ai_behavior_desc #high Přísná#!#!#!"
 setting_harsh_ai_behavior_desc: "AI země budou více podezřívat úmysly hráčských států a budou je v [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] posuzovat přísněji."
 rule_ai_aggression: "Agrese AI"
 setting_low_ai_aggression: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_low_ai_aggression_desc #high Nízká#!#!#!"
 setting_low_ai_aggression_desc: "AI země budou zahajovat méně [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] a jsou méně nakloněny dobýt území."
 setting_standard_ai_aggression: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_standard_ai_aggression_desc Standardní#!#!"
 setting_standard_ai_aggression_desc: "AI země mají standardní agresivní nastavení založené na svých strategiích."
 setting_high_ai_aggression: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_high_ai_aggression_desc #high Vysoká#!#!#!"
 setting_high_ai_aggression_desc: "AI země budou zahajovat více [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] a budou více nakloněny dobýt území."
 rule_subject_flags: "Vlajky pro subjekty"
 setting_no_subject_flags: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_subject_flags_desc #high Žádné změny vlajek#!#!#!"
 setting_no_subject_flags_desc: "Vlajky [concept_subject] [Concept('concept_country', '$concept_countries$')] se #b nezmění#! podle toho, kdo je jejich $suzerain$."
 setting_allow_subject_flags: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_allow_subject_flags_desc Umožnit změny vlajek#!#!"
 setting_allow_subject_flags_desc: "Vlajky [concept_subject] [Concept('concept_country', '$concept_countries$')] se mohou změnit podle toho, kdo je jejich $suzerain$."
 rule_subject_map_color: "Barva mapy pro subjekty"
 setting_no_subject_map_color: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_subject_map_color_desc #high Žádné změny barev mapy#!#!#!"
 setting_no_subject_map_color_desc: "Barva mapy [concept_subject] [Concept('concept_country', '$concept_countries$')] se #b nezmění#! podle toho, kdo je jejich $suzerain$."
 setting_allow_subject_map_color: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_allow_subject_map_color_desc Umožnit změny barev mapy#!#!"
 setting_allow_subject_map_color_desc: "Barva mapy určitých typů [concept_subject] [Concept('concept_country', '$concept_countries$')] se změní podle toho, kdo je jejich $suzerain$."
 rule_achievements: "Úspěchy"
 setting_achievements_allowed: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_achievements_allowed_desc Umožněno#!#!"
 setting_achievements_allowed_desc: "Úspěchy mohou být odemknuty během této kampaně."
 setting_achievements_blocked: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_achievements_blocked_desc Zablokováno#!#!"
 setting_achievements_blocked_desc: "Úspěchy se #b neodemknou#! během této kampaně."
 rule_formable_nations: "Tvoritelné národy"
 setting_all_formable_nations: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_all_formable_nations_desc Všechny#!#!"
 setting_all_formable_nations_desc: "Umožnit vytvoření nepravděpodobných a fantazijních národů."
 setting_plausible_formable_nations: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_plausible_formable_nations_desc Historicky pravděpodobné#!#!"
 setting_plausible_formable_nations_desc: "Povolit pouze historicky pravděpodobné národy k vytvoření."
 rule_releasable_nations: "Uvolnitelné národy"
 setting_all_releasable_nations: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_all_releasable_nations_desc Všechny#!#!"
 setting_all_releasable_nations_desc: "Umožnit uvolnění nepravděpodobných a fantazijních zemí"
 setting_plausible_releasable_nations: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_plausible_releasable_nations_desc Historicky pravděpodobné#!#!"
 setting_plausible_releasable_nations_desc: "Umožnit pouze historicky pravděpodobné národy k uvolnění."
 rule_investment_pool: "Investiční fond"
 setting_autonomous_investment_pool: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_autonomous_investment_pool_desc Autonomní investiční fond#!#!"
 setting_autonomous_investment_pool_desc: "Investiční fond [concept_investment_pool] bude použit k autonomnímu financování [Concept('concept_private_construction', '$concept_private_constructions$')] vhodných [Concept('concept_building','$concept_buildings$')] v závislosti na [Concept('concept_country', '$concept_country_possessive$')] [Concept('concept_law','$concept_laws$')]."
 setting_directly_controlled_investment_pool: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_directly_controlled_investment_pool_desc Přímo kontrolovaný investiční fond#!#!"
 setting_directly_controlled_investment_pool_desc: "Investiční fond [concept_investment_pool] je přímo využíván každou [concept_country] a může být použit k financování [Concept('concept_government_construction', '$concept_government_constructions$')] vhodných [Concept('concept_building','$concept_buildings$')] v závislosti na [Concept('concept_country', '$concept_country_possessive$')] [Concept('concept_law','$concept_laws$')]."
 rule_monument_effects: "Efekty monumentů"
 setting_allow_monument_effects: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_allow_monument_effects_desc Povolené#!#!"
 setting_allow_monument_effects_desc: "[Concept('concept_monument', '$concept_monuments$')] může produkovat různé efekty v závislosti na své povaze a někdy angažovat [Concept('concept_pop', '$concept_pops$')] k jeho dosažení."
 setting_prestige_only_monument_effects: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_prestige_only_monument_effects_desc $concept_prestige$ Pouze#!#!"
 setting_prestige_only_monument_effects_desc: "Všechny [Concept('concept_monument', '$concept_monuments$')] generují fixní množství [concept_prestige] pro svou zemi. Žádné $concept_monument$ nezaměstnávají [Concept('concept_pop', '$concept_pops$')]."
 setting_no_monument_effects: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_monument_effects_desc Zakázáno#!#!"
 setting_no_monument_effects_desc: "[Concept('concept_monument', '$concept_monuments$')] jsou pouze dekorativní. Odměna za jejich stavbu je čistě vizuální."
 rule_loyalties_grace_period: "Období milosti loajalit"
 setting_loyalties_grace_period_none: "Žádná"
 setting_loyalties_grace_period_none_desc: "Od samého začátku nesete plnou tíhu jak [Concept('concept_radical','$concept_radicals$')] tak [Concept('concept_loyalist','$concept_loyalists$')]."
 setting_loyalties_grace_period_short: "Krátká"
 setting_loyalties_grace_period_short_desc: "[concept_radical] a [concept_loyalist] získání začíná nízko, ale postupně roste, s plným efektem #v 1 rok#! po začátku hry."
 setting_loyalties_grace_period_long: "Dlouhá"
 setting_loyalties_grace_period_long_desc: "[concept_radical] a [concept_loyalist] získání začíná nízko, ale postupně se zvyšuje, s plným efektem #v 5 let#! po začátku hry."
 setting_loyalties_grace_period_extra_long: "Extrémně dlouhá"
 setting_loyalties_grace_period_extra_long_desc: "[concept_radical] a [concept_loyalist] získání začíná nízko, ale postupně se zvyšuje s plným efektem #v 10 let#! po začátku hry."
 rule_free_construction: "Základní kapacita výstavby"
 setting_free_construction_scaled_all: "Škálováno (všechny)"
 setting_free_construction_scaled_all_desc: "Všechny [Concept('concept_country', '$concept_countries$')] začínají se základní kapacitou [concept_construction] škálovanou podle jejich [concept_gdp]."
 setting_free_construction_scaled_player_exemption: "Škálováno (výjimka pro hráče)"
 setting_free_construction_scaled_player_exemption_desc: "Státy ovládané hráčem vždy dostanou maximální množství základní [concept_construction], zatímco státy ovládané AI ([Concept('concept_country', '$concept_countries$')]) mají tuto hodnotu škálovanou podle jejich [concept_gdp]."
 setting_free_construction_unscaled: "Maximální"
 setting_free_construction_unscaled_desc: "Všechny státy obdrží maximální množství základní [concept_construction], bez ohledu na jejich [concept_gdp]."
 rule_pop_consolidation: "Konsolidace populace (výkon)"
 setting_no_consolidation: "Žádná"
 setting_no_consolidation_desc: "[Concept('concept_pop', '$concept_pops$')] se nikdy nebudou konsolidovat mimo pravidla [concept_assimilation] nebo [concept_conversion], bez ohledu na velikost.\n@warning! To by mohlo výrazně poškodit výkon ve střední až pozdní fázi hry."
 setting_minor_consolidation: "Menší"
 setting_minor_consolidation_desc: "[Concept('concept_pop', '$concept_pops$')] se budou konsolidovat pouze tehdy, pokud jsou velmi malé a neúčinné.\nMůže poškodit výkon ve střední až pozdní fázi hry."
 setting_moderate_consolidation: "Mírná"
 setting_moderate_consolidation_desc: "[Concept('concept_pop', '$concept_pops$')] se mohou konsolidovat, pokud jsou celkově malé a mají omezený dopad na hru."
 setting_aggressive_consolidation: "Agresivní"
 setting_aggressive_consolidation_desc: "Za správných podmínek mohou dokonce [Concept('concept_pop', '$concept_pops$')] střední velikosti konsolidovat.\n@warning! Může zlepšit výkon, ale ovlivní rovnováhu hry."
 DELETE_SELECTED_PRESET_BUTTON_TOOLTIP: "Smazat tento předvoleb"
 SAVE_PRESET_BUTTON_TOOLTIP: "Uložit tento předvoleb"
 rule_fantastical_content: "Fantastický obsah"
 setting_allow_fantastical_content: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_allow_fantastical_content_desc #high Povolené#!#!#!"
 setting_allow_fantastical_content_desc: "Umožnit nadpřirozený nebo fantastický obsah během této kampaně."
 setting_no_fantastical_content: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_fantastical_content_desc #high Zakázáno#!#!#!"
 setting_no_fantastical_content_desc: "Umožnit žádný nadpřirozený nebo fantastický obsah během této kampaně."
 rule_custom_rng_seed: "Vlastní RNG seed"
 setting_no_custom_rng_seed: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_custom_rng_seed_desc #high Vypnuto#!#!#!"
 setting_no_custom_rng_seed_desc: "Hra automaticky nastaví náhodný seed (RNG), což povede k odlišným výsledkům při každém průchodu hrou."
 setting_use_custom_rng_seed: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_use_custom_rng_seed_desc #high Zapnuto#!#!#!"
 setting_use_custom_rng_seed_desc: "Umožňuje nastavit konkrétní RNG seed, takže většina náhodných výsledků se bude řídit tímto seedem. Díky tomu budou spuštění hry bez zásahu hráče (např. v režimu pozorovatele) poskytovat stejné výsledky při opakovaném použití stejného seedu."
 CHANGE_RNG_SEED: ""
 RNG_SEED_CLICK_TO_CHANGE: "Kliknutím změňte seed..."
 rule_dynamic_naming: "Dynamické pojmenovávání"
