l_polish:
 je_lands_of_anarchy: "Bilaad al-Siba"
 je_lands_of_anarchy_reason: "Po staletí svatý machzen a necivilizované kmeny roztroušené po našich zemích koexistovaly ve vzájemně diplomatickém vztahu bez větších starostí.\n\nS ambiciózním snem stát se #b $dyn_c_ottoman_empire$#! Západu si náš národ uvědomuje význam silné centrální vlády, která má prostředky dosáhnout do každé části své říše.\n\nNedávno začal náš [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad těmito usedlými kmeny pouští a vysočin slábnout. Musíme mezi oběma zeměmi vytvořit vazby a důvody ke spolupráci a vyvést je z jejich stanů do městského života."
 je_lands_of_anarchy_complete_tt: "Všechny ukazatele [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] vlastněných [Concept('concept_state','$concept_states$')] jsou nad #bold 400#!."
 je_lands_of_anarchy_fail_tt: "Všechny ukazatele [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] vlastněných [Concept('concept_state','$concept_states$')] jsou pod #bold 100#!."
 je_lands_of_anarchy_harka_activate_button: "Shromáždit harka"
 je_lands_of_anarchy_harka_activate_button_desc: "Vydat se na královskou expedici do států anarchie a promítnout auru dobře spravovaného národa. Osobním vedením těchto výprav je cílem proměnit [ROOT.GetCountry.GetGovernment.GetName] v symbol disciplinované a všeobjímající autority.\n\n #italic - Trůnem marockého císaře je jeho kůň; jeho baldachýnem je nebe.#!"
 je_lands_of_anarchy_harka_deactivate_button: "Rozpustit harka"
 je_lands_of_anarchy_harka_deactivate_button_desc: "Vrátit se z expedice do Bilaad al-Makhzen, zemí vlády."
 je_lands_of_anarchy_colonize_sahara_button: "Rozšířit náš dosah"
 je_lands_of_anarchy_colonize_sahara_button_desc: "Od kmenů Tekna po Tafilalt, od oázy Tuat po doly Mali. Kdysi Maroko ovládalo pohyb obchodu a lidí napříč celou oblastí a nyní nastal čas znovu obrátit pohled ven."
 lands_of_anarchy_tribes_of_marrakech_bar: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_MARRAKECH').GetName]"
 lands_of_anarchy_tribes_of_marrakech_bar_desc: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_MARRAKECH').GetName]: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/500)"
 lands_of_anarchy_tribes_of_al_rif_bar: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_AL_RIF').GetName]"
 lands_of_anarchy_tribes_of_al_rif_bar_desc: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_AL_RIF').GetName]: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/500)"
 lands_of_anarchy_tribes_of_inner_morocco_bar: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_INNER_MOROCCO').GetName]"
 lands_of_anarchy_tribes_of_inner_morocco_bar_desc: "[Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] nad kmeny [GetStateRegion('STATE_INNER_MOROCCO').GetName]: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/500)"
 lands_of_anarchy.1.t: "Země anarchie"
 lands_of_anarchy.1.d: "Letité kmeny v odlehlých koutech našeho národa je stále obtížnější ovládat. Pokud neprokážeme svou autoritu, mohou nám vyklouznout z rukou."
 lands_of_anarchy.1.f: "„...zadruhé, požadovat tak vysoký mahr je poněkud netradiční a dost nezdvořilé. Můj synovec zvažuje, že od sňatku ustoupí, pokud na tom bude trvat.“\n\n„Ayrade, můj starý příteli, odkdy posuzuješ naše manželské smlouvy podle zvyků městských lidí? Ve svém věku jsem ještě neslyšel šajcha, který by ve fiqhu kázal o limitech požadavků nevěsty na ženicha.“\n\nKdyž stařešina Ayrad viděl, že jeho pokus selhal, znovu zvážil své možnosti."
 lands_of_anarchy.1.a: "Budou čelit moci machzenu."
 lands_of_anarchy.1_tt: "[SCOPE.sState('al_rif_state_scope').GetName], [SCOPE.sState('marrakech_state_scope').GetName] a [SCOPE.sState('inner_morocco_state_scope').GetName] obdržely modifikátor nazvaný #bold Stav anarchie#!, se škálovanými postihy podle jejich hodnot [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] zobrazených v #bold $je_lands_of_anarchy$#! [concept_journal_entry]."
 lands_of_anarchy.2.t: "Země harmonie"
 lands_of_anarchy.2.d: "Všechny bezprávné kmeny se podrobily naší autoritě, dobrovolně či nikoli. Naše vláda nad pevninou zůstává nezpochybněna, což nám umožňuje do těchto zemí více investovat."
 lands_of_anarchy.2.f: "Machzen není jediným příjemcem nedávných změn v marocké společnosti. Staré nenávisti a kulturní rozdíly většinou zmizely a ustoupily novým sousedům, sdíleným tradicím a odborníkům ve všech oborech, kteří přispívají vrozeným sklonem k městskému životu.\n\nTi, kdo odmítli stát se součástí centrálního davu a zůstali na venkově, rovněž našli obecnou blaženost díky moderním komunikačním metodám poskytovaným vládou. Obchodníci, výběrčí daní i ozbrojené síly se mimo jiné mohou bezpečněji pohybovat po zemi a plnit své úkoly."
 lands_of_anarchy.2.a: "Byla to dobrá lekce o pokladnách a tom, jak je naplnit."
 lands_of_anarchy.2.b: "Civilizaci určují její způsoby."
 lands_of_anarchy.2.c: "Ať světlo poznání zazáří na náš lid."
 lands_of_anarchy.2_tt: "[SCOPE.sState('al_rif_state_scope').GetName], [SCOPE.sState('marrakech_state_scope').GetName] a [SCOPE.sState('inner_morocco_state_scope').GetName] obdrží následující modifikátor:"
 lands_of_anarchy.3.t: "Zakořeněný chaos"
 lands_of_anarchy.3.d: "Protože se nám nepodařilo udržet kontrolu, několik kmenů se vymklo z rukou a stalo se pro naši autoritu téměř nedosažitelnými."
 lands_of_anarchy.3.f: "„...stát neměl úplnou kontrolu nad svým územním prostorem, což mimořádně ztěžovalo správu odlehlých oblastí, přičemž venkov představoval zvláštní soubor problémů. Klišé o „kmenové mozaice“ obsahuje více než jen zrnko pravdy.\n\nVenkovský svět, rozdrobený obrovskými regionálními rozdíly v klimatu, jazyce, etnicitě a geografii, byl vesmírem sám pro sebe.“\n\n— prof. Susan Gilson Miller, Cambridgeská univerzita"
 lands_of_anarchy.3.a: "Zaměřit to, co zbylo, na vzdělávání."
 lands_of_anarchy.3.b: "Ať se stane cokoli, musíme vždy budovat."
 lands_of_anarchy.3.c: "Alespoň ochraňme naše výběrčí daní."
 lands_of_anarchy.3_tt: "[SCOPE.sState('al_rif_state_scope').GetName], [SCOPE.sState('marrakech_state_scope').GetName] a [SCOPE.sState('inner_morocco_state_scope').GetName] obdrží následující modifikátor:"
 lands_of_anarchy.4.t: "Kmenové gesto"
 lands_of_anarchy.4.d: "Během posledních několika týdnů poradci shromáždili zprávy o vazbách mezi několika zájmovými skupinami a určitými známými kmenovými rodinami."
 lands_of_anarchy.4.f: "Pár, izolovaný od rozhovorů v sále, měl upřímné nejistoty, neboť vyrůstal mezi #italic necivilizovanými#!.\n\nPři poslechu mdlého vystoupení na oud jim vůně mátového čaje a královských parfémů rozzářila smysly, zatímco čekali na svůj lstivý kontakt. V posledních měsících na ně ve městě nikdy nebylo tolik šeptáno."
 lands_of_anarchy.4.a: "Kmeny státu [SCOPE.sState('marrakech_state_scope').GetName] jsou známé tím, že dobře bojují."
 lands_of_anarchy.4.a_tt: "Vhodný válečník ze státu [SCOPE.sState('marrakech_state_scope').GetName] bude představen jako nový vůdce [SCOPE.gsInterestGroup('armed_forces_scope').GetName], který bude nad státem vytvářet #bold 1,5#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] měsíčně, dokud postava zůstane vůdcem."
 lands_of_anarchy.4.b: "Kdo je nejučenější alim ve státě [SCOPE.sState('al_rif_state_scope').GetName]?"
 lands_of_anarchy.4.b_tt: "Vhodný učenec ze státu [SCOPE.sState('al_rif_state_scope').GetName] bude představen jako nový vůdce [SCOPE.gsInterestGroup('devout_scope').GetName], který bude nad státem vytvářet #bold 1,5#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] měsíčně, dokud postava zůstane vůdcem."
 lands_of_anarchy.4.c: "Nikdo nezná tyto země lépe než domorodci ze státu [SCOPE.sState('inner_morocco_state_scope').GetName]."
 lands_of_anarchy.4.c_tt: "Vhodný amghar ze státu [SCOPE.sState('inner_morocco_state_scope').GetName] bude představen jako nový vůdce [SCOPE.gsInterestGroup('rural_folk_scope').GetName], který bude nad státem vytvářet #bold 1,5#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] měsíčně, dokud postava zůstane vůdcem."
 lands_of_anarchy.4.e: "Jsme tu, abychom vládli jim, ne oni nám."
 lands_of_anarchy.4.e_tt: "#bold -0,3#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] pro všechny státy anarchie po dobu #bold 5 let#!."
 lands_of_anarchy.5.t: "Městská medicína"
 lands_of_anarchy.5.d: "Konkrétní kmen ve státě [SCOPE.sState('anarchy_state_scope').GetName] nás požádal o pomoc kvůli pandemii, která je jejich prostředky nevyléčitelná."
 lands_of_anarchy.5.f: "Z centrálního ohně zoufalství stoupá kouř beznaděje a snaží se přilákat cizince na pomoc.\n\nPřes kašel slabých lze snadno zaslechnout recitace duá, o nichž se věří, že ulevují bolesti nemocných z různých trpících rodin, když prosí Stvořitele o cestu z této zkoušky víry.\n\nNezasažení mladí muži občas vystoupají na nedaleké duny, aby se podívali, zda nepřijíždí královská družina s dobrou zprávou, avšak zatím bez úspěchu."
 lands_of_anarchy.5.a: "Neváhejte."
 lands_of_anarchy.5.a_tt: "Královští chemici připraví balíčky léků pro [SCOPE.sState('anarchy_state_scope').GetName], čímž za naše milosrdné gesto vytvoří nad státem #bold 1#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] měsíčně."
 lands_of_anarchy.5.b: "Ať to odnesou privilegovaní."
 lands_of_anarchy.5.b_tt: "Bohatí lidé ve státě [SCOPE.sState('fez_scope').GetName] budou muset sponzorovat pomoc pro [SCOPE.sState('anarchy_state_scope').GetName], čímž za záchranu jejich životů vytvoří nad státem #bold 1#! [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] měsíčně."
 lands_of_anarchy.5.c: "Koneckonců mají způsoby alternativní medicíny."
 lands_of_anarchy.5.c_tt: "Odmítnutí vynaložit naše zdroje na neukázněné kmeny potěší část naší populace ve státě [SCOPE.sState('fez_scope').GetName], ale kmenoví příslušníci na to dlouho nezapomenou, což sníží [Concept('concept_lands_of_anarchy_control','$concept_lands_of_anarchy_control_short$')] pro [SCOPE.sState('anarchy_state_scope').GetName] o #bold 0,5#! měsíčně"
