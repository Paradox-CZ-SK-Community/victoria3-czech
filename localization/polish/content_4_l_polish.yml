 production_tech_events.102.t: "Výbušná poptávka"
 production_tech_events.102.d: "Vývoj stabilnějších [SCOPE.sGoods('explosives_goods').GetName] vedl k nárůstu poptávky po výbušných materiálech. Náš vojenský i průmyslový sektor se pustily do dražební války o podíl na naší produkci."
 production_tech_events.102.f: "„‚Civilní využití‘? Opravdu? Na co civilní firma potřebuje dva tisíce tun dynamitu?“ generální intendant přecházel sem a tam a svíral složku u hrudi. „Kdybych měl dva tisíce tun dynamitu, vybavím dělostřelecký sbor na celý rok. Zaplním sklady granáty.“\n\n„Je to... politováníhodné,“ řekl úředník a opatrně volil každé slovo. „Kolem materiálu se rozpoutala nákupní horečka. Náš současný rozpočet by nám zajistil jen zlomek potřebného množství.“\n\nNení to ideální, pomyslel si intendant, ale přežijeme to. „Zadejte objednávku a sdělte mi částku. Požádám kabinet o dvojnásobek.“"
 production_tech_events.102.a: "Zvýšení nabídky pozvedne všechny."
 production_tech_events.102.b: "Průmysl to využije nejlépe."
 production_tech_events.102.c: "Armáda musí dostat svůj podíl."
 production_tech_events.103.t: "Burácející motory"
 production_tech_events.103.d: "S vynálezem a zavedením motorové dopravy vyvstává otázka: máme se zaměřit na veřejnou, nebo soukromou dopravu?"
 production_tech_events.103.f: "„Proč bych měl sedět v autobuse nebo ve vlaku se smradlavým chudákem? Měl bych mít vlastní dopravní prostředek.“\n\n„Tempo národa nesmí být ponecháno v rukou hrstky bohatých, musíme myslet i na chudé.“"
 production_tech_events.103.a: "Potřebujeme více automobilů!"
 production_tech_events.103.b: "Více veřejné dopravy!"
 canal_events.1.t: "Žádost o území na Sinaji"
 canal_events.1.d: "Po dokončení průzkumu šíje bychom nyní měli jednat o možnosti získání území na Sinaji pro výstavbu průplavu."
 canal_events.1.f: "„Představte si to — pokud se nám podaří prorazit průplav přes Suez, nebudeme muset plout kolem Mysu Dobré naděje, abychom dosáhli kolonií a zemí Dálného východu.“"
 canal_events.1.a: "Nabídnout výstavbu průplavu."
 canal_events.2.t: "Spojení moří"
 canal_events.2.d: "[SCOPE.sCountry('suez_scope').GetAltAdjective('sti')] velvyslanci nás oslovili s možností získat území na Sinaji za účelem zahájení výstavby průplavu."
 canal_events.2.f: "„Spojení Rudého moře se Středozemním by bylo nesmírně přínosné nejen pro nás, ale pro celý svět. Už by nebylo nutné obeplouvat celou Afriku a my bychom stáli v centru veškerého obchodu.“"
 canal_events.2.a: "Žádné náklady a veškerý zisk."
 canal_events.2.b: "Nevydáme ani píď naší země."
 canal_events.3.t: "[SCOPE.sCountry('suez_owner_scope').GetName] přijímá naši nabídku"
 canal_events.3.d: "[SCOPE.sCountry('suez_owner_scope').GetAltAdjective('aa')] vláda přijala naši žádost o získání území na Sinaji pro zahájení výstavby průplavu."
 canal_events.3.f: "„Konečně, po roce průzkumů, plánování a vyjednávání máme příležitost začít stavět. Brzy budeme moci obchodovat s Východní Indií bez nutnosti plout kolem Mysu Dobré naděje.“"
 canal_events.3.a: "Je čas začít stavět."
 canal_events.4.t: "[SCOPE.sCountry('suez_owner_scope').GetName] odmítá naši nabídku"
 canal_events.4.d: "[SCOPE.sCountry('suez_owner_scope').GetAltAdjective('aa')] vláda odmítla naši žádost o získání území na Sinaji."
 canal_events.4.f: "„Jak mohou takovou nabídku odmítnout? Prakticky jsme jim nabídli, že to postavíme za ně — a po veškerém tom průzkumu! Jak mohou být tak slepí vůči potenciálu tohoto projektu?“\n\n„Víte, jak se říká: když selže diplomacie, nastupuje síla.“"
 canal_events.4.a: "Diplomacie tentokrát selhala."
 canal_events.5.t: "Žádost o území v Panamě"
 canal_events.5.d: "Po dokončení průzkumu šíje bychom nyní měli jednat o možnosti získání území poblíž Panamy pro výstavbu průplavu."
 canal_events.5.f: "„Vytvoření zkratky mezi Atlantským a Tichým oceánem bude historickou událostí. Už nebude nutné obcházet kontinenty, budeme moci proplout přímo.“"
 canal_events.5.a: "Nabídnout výstavbu průplavu."
 canal_events.6.t: "Spojení oceánů"
 canal_events.6.d: "[SCOPE.sCountry('panama_scope').GetAltAdjective('sti')] velvyslanci nás oslovili s možností získat území poblíž Panamy pro výstavbu průplavu."
 canal_events.6.f: "„Měli bychom jim to alespoň dovolit zkusit. Už investovali úsilí do průzkumu. Kdo říká, že nás nenapadnou, pokud odmítneme?“\n\n„Už samotná otázka, zda bychom měli cizincům předat část našeho území, je nepřijatelná. Pokud chtějí naši zemi, musí si ji vzít silou.“"
 canal_events.6.a: "Žádné náklady a veškerý zisk."
 canal_events.6.b: "Nevydáme ani píď naší země."
 canal_events.7.t: "[SCOPE.sCountry('panama_owner_scope').GetName] přijímá naši nabídku"
 canal_events.7.d: "[SCOPE.sCountry('panama_owner_scope').GetAltAdjective('aa')] vláda přijala naši žádost o získání území poblíž Panamy. Můžeme zahájit výstavbu průplavu."
 canal_events.7.f: "„Konečně, po více než roce průzkumů, plánování a vyjednávání máme možnost začít stavět. Brzy budeme moci plout mezi Atlantským a Tichým oceánem skrz kontinent, nikoli kolem něj.“"
 canal_events.7.a: "Je čas začít stavět."
 canal_events.8.t: "[SCOPE.sCountry('panama_owner_scope').GetName] odmítá naši nabídku"
 canal_events.8.d: "[SCOPE.sCountry('panama_owner_scope').GetAltAdjective('aa')] vláda odmítla naši žádost o získání území pro výstavbu průplavu spojujícího Atlantský a Tichý oceán."
 canal_events.8.f: "„Jak mohou takovou nabídku odmítnout? Prakticky jsme jim nabídli, že průplav postavíme za ně — a po veškerém tom průzkumu! Jak mohou být tak slepí vůči jeho potenciálu?“\n\n„Víte, jak se říká: když selže diplomacie, nastupuje síla.“"
 canal_events.8.a: "Diplomacie tentokrát selhala."
 suez_canal_purchase: "Získat území na Sinaji"
 suez_canal_purchase_desc: "Zahájit jednání o možnosti získání území na Sinaji za účelem zahájení výstavby průplavu."
