 decree_events.100.t: "Průmyslový rozmach"
 decree_events.100.d: "Naše [SCOPE.sBuilding('manufacturing_building_production').GetName] v [SCOPE.sState('decree_manufacturing_industry').GetName] hlásí menší přebytek průmyslového zboží. Měli bychom zvážit jeho reinvestování zpět do státu."
 decree_events.100.f: "„Co víc ještě potřebujete jako důkaz? Průmysl je cesta vpřed. Právě zažíváme druhou vlnu průmyslové revoluce. Továrny v každém městě, dílny v každé obci. Brzy zindustrializujeme celý národ!“"
 decree_events.100.a: "Dále posilme náš průmysl."
 decree_events.100.b: "Měli bychom reinvestovat do pracovníků."
 decree_events.101.t: "Komu patří zásluhy"
 decree_events.101.d: "Nedávné investice do výroby ve [SCOPE.sState('decree_manufacturing_politics').GetName] v naší [SCOPE.sBuilding('manufacturing_building_production_politics').GetName] vyvolaly otázku, kdo by měl získat zásluhy za nárůst produkce."
 decree_events.101.f: "„Kde bychom byli bez našich peněz, továren a zboží? Ať celý národ ví, kolik práce a úsilí stálo za tímto velkým úspěchem.“"
 decree_events.101.a: "Zásluhy patří [SCOPE.gsInterestGroup('industrialists_ig_focus').GetName]."
 decree_events.101.b: "Je to vítězství pracujících."
 decree_events.101.c: "Připisujme zásluhy někomu jinému."
 decree_events.102.t: "Zemědělský rozmach"
 decree_events.102.d: "Podpora zemědělského rozvoje v [SCOPE.sState('decree_agricultural_industry').GetName] vedla k menšímu nárůstu produkce v naší [SCOPE.sBuilding('agricultural_building_production').GetName]. Měli bychom toho využít, než to přijde vniveč."
 decree_events.102.f: "„Naši lidé budou jíst jako králové! Hlad bude pro naše občany minulostí. Využijme toho ve svůj prospěch a pomozme nejen sobě, ale i ostatním — samozřejmě za cenu. Ať vědí, že jsme cesta vpřed.“"
 decree_events.102.a: "Dále posilme naše farmy."
 decree_events.102.b: "Pracující si to zaslouží více."
 decree_events.103.t: "Komu náleží zásluhy"
 decree_events.103.d: "Nedávné investice v [SCOPE.sState('decree_agricultural_politics').GetName] do naší [SCOPE.sBuilding('agricultural_building_production_politics').GetName] vyvolaly otázku, kdo by měl získat zásluhy za tento nárůst investic. Názory jsou však rozdělené."
 decree_events.103.f: "„Otázka, komu náleží zásluhy, trápí mnohé. Majitelům půdy a organizátorům sklizně? Nebo obyčejným lidem, kteří pracují na polích dnem i nocí a jejichž pot a krev zavlažují půdu?“"
 decree_events.103.a: "[SCOPE.gsInterestGroup('landowners_ig_focus').GetName] si zaslouží uznání."
 decree_events.103.b: "Zásluhy patří farmářům."
 decree_events.103.c: "Najděme někoho jiného."
 decree_events.104.t: "Surovinový rozmach"
 decree_events.104.d: "Průmysl surovin v [SCOPE.sState('decree_resource_industry').GetName] hlásí menší nárůst produkce v naší [SCOPE.sBuilding('resource_building_production').GetName], což vedlo k vytvoření zásob, které lze znovu investovat do tohoto státu."
 decree_events.104.f: "„Samozřejmě bychom měli tento nárůst investovat zpět do průmyslu. Bez něj bychom nic takového neměli.“ „Zbláznil ses? Bez pracovníků bys neměl kdo by ty podniky provozoval. Odměnit bychom měli je, ne tebe.“"
 decree_events.104.a: "Dále posilme průmysl surovin."
 decree_events.104.b: "Odměňme pracovníky v [SCOPE.sState('decree_resource_industry').GetName]."
 decree_events.105.t: "Na uznání úspěchu"
 decree_events.105.d: "Po nedávných investicích v [SCOPE.sState('decree_resource_politics').GetName] vykazuje průmysl surovin v [SCOPE.sBuilding('resource_building_production_politics').GetName] pozitivní bilanci. Zájmové skupiny se rychle snaží přivlastnit si zásluhy."
 decree_events.105.f: "„Často mluvíme o pokroku dosaženém tvrdou prací, která nás dovedla až sem. Méně se však mluví o těch, kteří nám to umožnili — bez jejich přispění bychom takových úspěchů nedosáhli.“"
 decree_events.105.a: "[SCOPE.gsInterestGroup('industrialists_ig_focus').GetName] si zaslouží veškeré uznání."
 decree_events.105.b: "[SCOPE.gsInterestGroup('landowners_ig_focus').GetName] by měli získat zásluhy."
 decree_events.105.c: "Uznání patří pracujícím."
 decree_events.106.t: "Nevraživost v plucích"
 decree_events.106.d: "Upřednostňování našich pluků v [SCOPE.sState('decree_enlistment_origin').GetName] vedlo k nespokojenosti pluků v sousedním státě [SCOPE.sState('decree_enlistment').GetName]. Požadují rovné zacházení."
 decree_events.106.f: "„Tihle vojáci jsou jen banda ufňukaných stěžovatelů, kteří chtějí víc peněz za málo práce. Jejich úkolem je bojovat a naším rozhodovat proti komu. Vojákům nelze svěřit taková rozhodnutí.“"
 decree_events.106.a: "To je to, co chce [SCOPE.gsInterestGroup('armed_forces_ig_focus').GetName]."
 decree_events.106.b: "Měli bychom více investovat do organizace těchto jednotek."
 decree_events.107.t: "Výcvik se vyplácí"
 decree_events.107.d: "Dodatečný výcvik se vyplatil. Jednotky v [SCOPE.sState('decree_elite_research').GetName] si osvojily nové taktiky, které nám mohou pomoci v budoucí válce."
 decree_events.107.f: "„Naši vojáci jsou nejlepší na světě. Obránci našeho národa vždy čelili výzvám a obstáli. Toto je jen další důkaz.“"
 decree_events.107.a: "Nechat si to pro sebe."
 decree_events.107.b: "Podporovat další válečné manévry."
 decree_events.107.c: "Podporovat výcvik poddůstojníků."
 decree_events.107.e: "Rozvíjet taktiku útočné pěchoty."
 decree_events.108.t: "Násilí eskaluje"
 decree_events.108.d: "Pokojný pochod v [SCOPE.sState('decree_violent_supp').GetName] se náhle změnil v násilný střet mezi demonstranty a policií."
 decree_events.108.f: "„Potlačte je silou, použijte jakékoli prostředky. Tihle buřiči musí znát své místo. Nechápou snad, že policie je tu pro jejich bezpečnost? Nesmíme před radikály působit slabě.“"
 decree_events.108.a: "Nechat policii ustoupit."
 decree_events.108.b: "Dát policii volnou ruku."
 decree_events.109.t: "Násilné potlačení zvyšuje diskriminaci"
 decree_events.109.d: "Radikálové v [SCOPE.sState('decree_increased_violence').GetName] získávají podporu od diskriminovaných obyvatel kultury [SCOPE.sCulture('violent_suppression_discriminated').GetName]."
 decree_events.109.f: "„Pokud chtějí protestovat, nechme je. Zásah by situaci jen zhoršil. Alespoň budou všichni pohromadě a později se s nimi vypořádáme snáz.“"
 decree_events.109.a: "My rozhodujeme, kde se smí protestovat."
 decree_events.109.b: "Nechme je protestovat, kde chtějí."
