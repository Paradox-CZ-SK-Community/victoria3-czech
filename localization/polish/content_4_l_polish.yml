 canal_events.6_tt: "Toto poskytne [SCOPE.sCountry('panama_scope').GetAltAdjective('L')] nárok na Panamu a může v budoucnu vést ke konfliktu."
 society_tech_events.104.t: "Vzestup do nových výšin"
 society_tech_events.104.d: "Se zavedením výtahů do každodenního života nyní můžeme těžit z výhod rozšířeného průmyslu."
 society_tech_events.104.f: "„Jede to nahoru a jede to dolů. Proč chodit deset nebo dvacet pater po schodech, když se můžete jednoduše vyvézt výtahem?“\n\n„V budoucnu budeme mít budovy se stovkami pater a jediným limitem bude nebe.“"
 society_tech_events.104.a: "Pokračujme v posilování průmyslu."
 society_tech_events.104.b: "Pokračujme v zajišťování potřeb našich občanů."
 society_tech_events.105.t: "Vzájemně výhodné"
 society_tech_events.105.d: "Nyní, když máme více veřejně obchodovaných společností, bychom se měli zaměřit na další krok."
 society_tech_events.105.f: "„Nevidím problém. Co je špatného na větším množství peněz? Říkáte mi, že kdyby vám nabídli víc, odmítl byste?“\n\n„Nejde o to mít víc peněz. Jde o to, kdo je dostane. Zdá se, že bohatí bohatnou.“"
 society_tech_events.105.a: "To může ovlivnit naši politiku."
 society_tech_events.105.b: "Možná to dokážeme využít i jinde."
