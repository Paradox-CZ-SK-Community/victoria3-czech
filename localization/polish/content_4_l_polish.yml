 republic_laws.1.t: "[ROOT.GetCountry.GetRuler.GetFirstName] zmeškal zasedání kabinetu"
 republic_laws.1.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] se nedostavil na zasedání kabinetu své vlády a její členové tak nebyli schopni dospět k žádnému závěru, jak dále postupovat."
 republic_laws.1.f: "„Jak mají mít občané důvěru ve vládu, když se náš [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ani neobtěžuje dorazit na zasedání, kde se rozhoduje o budoucnosti země? Prý byl venku na večírku s jinými šlechtici a šel spát jen pár hodin před začátkem jednání.“"
 republic_laws.1.a: "Takové chování je pro našeho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nepřijatelné."
 republic_laws.1.b: "Možná jen nechtěně zaspal."
 republic_laws.1.c: "Otiskněte to v novinách."
 republic_laws.2.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [ROOT.GetCountry.GetRuler.GetHerHis] osud"
 republic_laws.2.d: "[SCOPE.sCharacter('monarchist_supporter').GetFullName] ze [SCOPE.gsInterestGroup('rulers_fate').GetName] se ptá, co se stane s [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], pokud se vláda změní na [SCOPE.sLaw('current_law_scope').GetName]."
 republic_laws.2.f: "„Monarchie je jedním ze základních pilířů této země. Nemůžeme vážně uvažovat o jejím zrušení.“\n\n„Nemůžeme mít spravedlivý a rovný stát, pokud budeme jednoho člověka stavět nad ostatní. Pokud si chce ponechat šlechtický titul, pošleme ho někam daleko. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] už v naší společnosti nemá místo.“"
 republic_laws.2.a: "Nechť [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] abdikuje."
 republic_laws.2.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] půjde do exilu."
 republic_laws.3.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [ROOT.GetCountry.GetRuler.GetHerHis] projev"
 republic_laws.3.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] pronesl vášnivý projev ve snaze zabránit tomu, aby se [ROOT.GetCountry.GetName] stala [SCOPE.sLaw('current_law_scope').GetName]."
 republic_laws.3.f: "„Členové vlády, jako [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] vás žádám, abyste nahlédli do svých srdcí a položili si otázku — máme být těmi, kdo toto rozhodnutí učiní? Máme na to vůbec právo? Jsme skutečně ochotni ukončit léta tradice? Role, kterou zastává [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l], je s touto zemí spjata stejně jako kdokoli z nás.“"
 republic_laws.3.a: "To by mohlo věci zkomplikovat."
 republic_laws.3.b: "Zpochybnit tento projev."
