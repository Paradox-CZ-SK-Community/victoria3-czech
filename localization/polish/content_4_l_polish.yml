 hawaii_events.1.t: "Smrt krále"
 hawaii_events.1.d: "Po smrti krále se místní podnikatelé a zahraniční vyslanci snaží zvýšit svůj vliv na Havaji."
 hawaii_events.1.f: "„Naši nezávislost jsme si udrželi už nějakou dobu, ale oči velkých mocností nás hladově sledují a čekají na vhodný okamžik k útoku. Obávám se, že ten čas se rychle blíží.“"
 hawaii_events.1.a: "Musíme podniknout kroky k zachování naší nezávislosti."
 hawaii_events.2.t: "Posílení naší pozice"
 hawaii_events.2.d: "Poté, co jsme prokázali svou sílu a uklidnili místní podnikatele, se nyní můžeme zaměřit na posílení našeho postavení na mezinárodní scéně."
 hawaii_events.2.f: "„Ukázali jsme odhodlání těm, kteří by nejraději převzali kontrolu nad Havají. I když jsme nyní silnější, stále nejsme z nejhoršího venku.“"
 hawaii_events.2.a: "To nejhorší máme za sebou."
 hawaii_events.2.b: "Vyhostit neloajální."
 hawaii_events.3.t: "Zahraniční převrat"
 hawaii_events.3.d: "Skupiny protestujících a místní milice vedené koalicí podnikatelů a [SCOPE.sCountry('hawaiian_coup').GetAltAdjective('yych')] vyslanců úspěšně převzaly vládu a nyní žádají o připojení země."
 hawaii_events.3.f: "„Naše nezávislost a svoboda jsou nyní ohroženy. Ležíme bezmocně u nohou [SCOPE.sCountry('hawaiian_coup').GetAltAdjectiveNoFormatting('G')] a musíme přijmout novou realitu. Naše země je držena jako rukojmí!“"
 hawaii_events.3.a: "Jak k tomu vůbec došlo?"
 hawaii_events.4.t: "Území Havaj"
 hawaii_events.4.d: "Místní podnikatelé s pomocí našeho vyslance na Havaji provedli převrat proti místní vládě a žádají, abychom ostrovy začlenili dříve, než situace využijí jiné mocnosti."
 hawaii_events.4.f: "„Havaj je klíčem k Tichému oceánu. Nyní, když máme kontrolu nad její budoucností, máme kontrolu i nad oceánem. Budeme moci snáze řídit obchod v celém regionu.“"
 hawaii_events.4.a: "Obsadit ostrovy, ale ponechat jim autonomii."
 hawaii_events.4.b: "Pokud to neuděláme my, udělá to někdo jiný."
 hawaii_events.4.c: "Nebudeme se na tomto převratu podílet."
 hawaii_events.5.t: "Vyhoštění podnikatelé"
 hawaii_events.5.d: "Havajská vláda vyhostila naše občany z ostrovů a zabavila jejich majetek. Musíme na to náležitě reagovat."
 hawaii_events.5.f: "„Jak se opovažují vyhostit naše občany a převzít kontrolu nad soukromým podnikáním? Takové zabavení majetku je nejen bezprecedentní, ale i nepřijatelné. Toto ponížení nebudeme tolerovat.“"
 hawaii_events.5.a: "Je to jejich vlastní vina."
 hawaii_events.5.b: "To je nepřijatelné!"
 je_hawaii: "Zahraniční zájmy"
 je_hawaii_reason: "Poloha Havaje v Tichém oceánu z ní činí mimořádně cenný bod pro transpacifický obchod. Musíme zajistit spokojenost místních podnikatelů a odradit velmoci od pokusů využít naše ostrovy."
 national_defence_modifier: "Národní obrana"
 interest_in_hawaii: "Investice na Havaji"
 interest_in_hawaii_desc: "Po smrti havajského panovníka vzniklo mocenské vakuum, které nám dává příležitost zvýšit náš vliv na ostrovech."
 death_of_kamehameha: "Smrt krále"
 hawaii_interest_tt: "Vyhlášení zájmu o Havaj může vést k získání kontroly nad ostrovy."
 influence_hawaii_tt: "Přijali jsme rozhodnutí aktivně ovlivňovat Havaj."
 je_hawaiian_interest_tt: "Zahájili jsme převrat proti havajské vládě. Nyní jde jen o čas."
 deporting_disloyal_igs: "Vyhoštění podnikatelé"
 influence_over_hawaii: "Vliv na Havaji"
 je_hawaiian_interest: "Ovlivňování Havaje"
 je_hawaiian_interest_reason: "Nedávný vývoj na Havaji otevřel možnost získat kontrolu nad ostrovy a posílit náš vliv v regionu. Pokud havajská vláda nedokáže situaci zvládnout, můžeme zasáhnout a ostrovy získat pro sebe."
 invalid_influence_hawaii_tt: "Došlo k převratu na Havaji NEBO havajská vláda situaci ustála."
 hawaii_coup_happened_tt: "[SCOPE.sCountry('hawaii_scope').GetAltAdjective('aa')] vláda byla svržena převratem"
 hawaii_government_secured_tt: "[SCOPE.sCountry('hawaii_scope').GetAltAdjective('aa')] vláda si upevnila svou pozici"
 conscription_laws.1.t: "Doplňování řad"
 conscription_laws.1.d: "Členové [SCOPE.gsInterestGroup('rural_folk_conscription').GetName] oslovili vládu ohledně zavedení zákona [SCOPE.sLaw('current_law_scope').GetName]. Domnívají se, že ještě potřebujeme více času, než budeme připraveni tento zákon prosadit."
 conscription_laws.1.f: "„Ocenili byste svobodu, kterou všichni máme? Ne! Ale oceňujete úrodu, kterou ti lidé pěstují. Naše svoboda a národní bezpečnost nejsou předmětem diskuse a nelze je vyčíslit. Musíme zajistit přežití našeho národa a každý muž musí být připraven udělat, co je třeba.“"
 conscription_laws.1.a: "Pokračujme v prosazení zákona."
 conscription_laws.1.b: "Dejme tomu více času."
 conscription_laws.2.t: "Profesionální vojáci"
 conscription_laws.2.d: "Mnozí z našich profesionálních vojáků vyjádřili obavy, že míchání odvedenců s pravidelnou pěchotou během války výrazně sníží kvalitu a schopnosti našich jednotek."
 conscription_laws.2.f: "„Očekáváte, že půjdu bojovat a riskovat život za tuto zemi, a zároveň mám bojovat po boku nějakého farmáře nebo dělníka, který nikdy nedržel pušku? Jak mají naše jednotky fungovat jako celek, když jen část z nich ví, co dělá?“"
 conscription_laws.2.a: "Potřebujeme každého vojáka."
 conscription_laws.2.b: "Měli bychom to ještě promyslet."
 conscription_laws.3.t: "Nepřipraveni na odvod"
 conscription_laws.3.d: "[SCOPE.sCharacter('anti_conscription_advocate').GetFullName], vůdce [SCOPE.gsInterestGroup('anti_conscription_ig').GetName], pronesl vášnivý projev o rizicích příliš rychlého zavedení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 conscription_laws.3.f: "„Nemůžeme ignorovat, že na to nejsme připraveni. K čemu to bude, když se nám země zhroutí pod rukama? Pokud vyhlásíme mobilizaci nepřipraveni, nejenže budeme muset platit nové vojáky, ale zároveň přijdeme o pracovníky v továrnách i na polích. To znamená nižší produkci, nižší zisky a nakonec i nižší daňové příjmy. Jak ty nové vojáky zaplatíme?“"
 conscription_laws.3.a: "Vláda to zvládne."
 conscription_laws.3.b: "Držme kurz."
