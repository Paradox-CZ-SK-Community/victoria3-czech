 healthcare_laws.1.t: "Zranění farmáři"
 healthcare_laws.1.d: "Farmáři v [SCOPE.sState('farming_accidents_state').GetName] se obracejí na vládu kvůli nebezpečí spojenému s používaným vybavením a žádají o zavedení nějaké formy zdravotní péče, která by zmírnila jejich útrapy."
 healthcare_laws.1.f: "„Soused ke mně nedávno přišel domů. Stál ve dveřích a levou rukou svíral pravou — a tehdy jsem si všiml, že si čistě uřízl tři prsty. Nejsem lékař, ale potřeboval pomoc, tak jsem udělal, co jsem mohl. Jen bych si přál, aby měl kam jít za někým, kdo tomu rozumí víc.“"
 healthcare_laws.1.a: "Zkusme nabídnout pomoc."
 healthcare_laws.1.b: "Zaměřme se na zavedení zdravotní péče."
 healthcare_laws.1.c: "To stejně není pro chudé."
 healthcare_laws.2.t: "Zdravotní daně"
 healthcare_laws.2.d: "S rostoucími požadavky na zavedení systému zdravotní péče se mnozí ptají, odkud vezmeme prostředky na jeho financování. Někteří navrhují využít daňové příjmy, jiní trvají na tom, že vláda musí najít jiné řešení."
 healthcare_laws.2.f: "„Takže to chápu správně? Máme platit nejen vlastní zdravotní péči, ale i cizí? Nechci, aby moje daně šly na nějaké náhodné farmáře. To není moje odpovědnost. Mám vlastní zdraví a rodinu. Nemůžu se starat o všechny v [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')].“"
 healthcare_laws.2.a: "Vezměme to z daňových příjmů."
 healthcare_laws.2.b: "Náklady by měla nést vláda."
 healthcare_laws.2.c: "Obejdeme se bez toho."
 healthcare_laws.3.t: "Nemocná vláda"
 healthcare_laws.3.d: "Jak ironické — právě v den debaty o zdravotní péči onemocnělo mnoho členů vlády. Jen málokdo má sílu se dostavit."
 healthcare_laws.3.f: "„To je opravdu ironie. V den, kdy máme řešit zdravotní péči, je polovina kabinetu nemocná a sotva vstane z postele. Možná je to požehnání v přestrojení. Dnes se ale rozhodně nic nerozhodne.“"
 healthcare_laws.3.a: "Dnes hlasovat nemůžeme."
 healthcare_laws.3.b: "Zkusme hlasování prosadit i tak."
 healthcare_laws.4.t: "Nedostatečná zdravotní péče"
 healthcare_laws.4.d: "Kvůli nedostatku veřejných zdravotních služeb začali občané, kteří si nemohou dovolit vlastní péči, požadovat dostupnější zdravotnictví."
 healthcare_laws.4.f: "„Zkusil jste někdy sklízet úrodu nebo těžit kámen? To je těžká dřina a nehody se stávají. Chceme jistotu, že když se zraníme, někdo se o nás postará. Máme rodiny. Když se neuzdravíme, kdo se o ně postará?“"
 healthcare_laws.4.a: "Uvolněme trochu byrokracie."
 healthcare_laws.4.b: "Zaměřme se na prosazení zákona."
 healthcare_laws.5.t: "Dostupnost versus přístupnost"
 healthcare_laws.5.d: "[SCOPE.sCharacter('anti_public_healthcare_advocate').GetFullName], vůdce [SCOPE.gsInterestGroup('anti_public_healthcare_ig').GetName], dnes upozornil na riziko, že rozšíření přístupu ke zdravotní péči může snížit její dostupnost pro ty, kteří ji již mají."
 healthcare_laws.5.f: "„Co si myslíte, že se stane? Nemůžete čekat, že dostupnost zůstane stejná, když péči otevřeme všem. Lidé budou čekat dny, týdny, možná i měsíce na lékaře. Jak budeme určovat priority mezi pacienty?“"
 healthcare_laws.5.a: "Jejich obavy jsou neopodstatněné."
 healthcare_laws.5.b: "Jejich obavy je třeba zvážit."
 healthcare_laws.6.t: "Nedostatečná podpora zdravotnictví"
 healthcare_laws.6.d: "Vláda byla upozorněna, že nemáme dostatek byrokratů pro zavedení veřejného zdravotního systému."
 healthcare_laws.6.f: "„Svět nefunguje jen na ideálech. Musíme čelit realitě a vyřešit to dřív, než se to stane problémem. Otevření zdravotnictví bez přípravy se nám může rychle vymstít.“"
 healthcare_laws.6.a: "Prosadit to i tak."
 healthcare_laws.6.b: "Dejme dohromady, co můžeme."
