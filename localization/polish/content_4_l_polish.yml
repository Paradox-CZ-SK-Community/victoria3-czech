 je_raise_exports_value_reason: "Pokud se zaměřujeme na export hodnotného zboží, měli bychom zvýšit jeho cenu, abychom maximalizovali zisky."
 je_lower_production_costs: "Snižování výrobních nákladů"
 je_lower_production_costs_reason: "S růstem průmyslu musíme nejen zajistit stabilní přísun vstupních surovin, ale také hlídat jejich cenu, aby nepoškozovala výrobu hodnotnějších produktů."
 tt_lower_production_costs_sub_obj: "Mějte [GetGoods('iron').GetName], [GetGoods('coal').GetName] a [GetGoods('steel').GetName] na [AccessPlayer.AccessFirstMarket.GetName] o 20 % levnější než jejich [concept_base_price]"
 tt_raise_exports_value_sub_obj: "Mějte [GetGoods('engines').GetName] na [AccessPlayer.AccessFirstMarket.GetName] o 50 % dražší než jejich [concept_base_price]"
 tt_utilizing_our_strength_sub_obj: "Mějte [GetGoods('engines').GetName] na [AccessPlayer.AccessFirstMarket.GetName] o 20 % levnější než jejich [concept_base_price]"
 je_african_colonies_own_a_colony: "Je [concept_colony|l] na africkém kontinentu"
 je_african_colonies_own_whole_state_region: "Zabírá celý [concept_state_region|l]"
 je_objective_encourage_liberal_ideas: "Podpořit liberální myšlení"
 je_objective_encourage_liberal_ideas_reason: "Prvním krokem k vytvoření jakékoli rovnostářské společnosti je dostat správné lidi do vlády. Jakmile budou v pozici prosazovat změny, můžeme začít budovat rovnější společnost."
 je_pass_laws: "Prosazování zákonů"
 je_pass_laws_reason: "Nyní, když máme ve vládě silnější liberální prvek, měli bychom využít jeho vliv k prosazení rovnostářštějších zákonů.\n\nPOZNÁMKA: Zrušení kteréhokoli z těchto zákonů po dokončení tohoto záznamu způsobí jeho skrytí, dokud nebude zákon znovu přijat."
 je_public_services: "Veřejné služby"
 je_public_services_reason: "Po zavedení zákonů bychom měli rozšířit naše [Concept('concept_institution','$concept_institutions$')], aby byly dostupnější a přístupnější pro naši populaci.$egalitarian_objective_note_loc$"
 je_liberate_the_slaves: "Osvobodit otroky"
 je_liberate_the_slaves_reason: "Jak se můžeme nazývat rovnostářskou společností, když stále aktivně využíváme otroctví? Je zásadní, aby naším prvním krokem bylo ukončení této zastaralé a nemorální praxe."
 je_women_and_children: "Ženy a děti"
 je_women_and_children_reason: "Učinili jsme mnoho kroků k vytvoření rovnostářské společnosti, ale musíme zajistit, aby tato práva byla dostupná všem. Měli bychom ukončit nespravedlivé praktiky vůči ženám a dětem.$egalitarian_objective_note_loc$"
 je_egalitarian_society: "Rovnostářská společnost"
 je_egalitarian_society_reason: "Nyní, když máme zavedené zákony i instituce, bychom měli zajistit skutečně rovnou společnost poskytující stejné příležitosti všem občanům. Naše země by měla být zářným příkladem vedoucím svět cestou rovnosti.$egalitarian_objective_note_loc$"
 liberalizing_the_government_complete: "Liberální myšlení"
 liberalizing_the_government_complete_desc: "Nyní, když jste dokončili první záznam v deníku, jste na dobré cestě k dokončení tohoto cíle a vytvoření rovnostářské společnosti."
 egalitarian_society_welcome: "Rovnostářská společnost"
 egalitarian_society_welcome_desc: "Vítejte v cíli Rovnostářská společnost. V tomto cíli budete plnit sérii [Concept('concept_journal_entry', '$concept_journal_entries$')], které vás povedou k vytvoření rovnostářské společnosti."
 liberalizing_the_government_complete_1: "Liberální smýšlení"
 liberalizing_the_government_complete_1_desc: "Výborně! Dokončili jste svůj první úkol a jste na dobré cestě k vytvoření rovnostářské společnosti."
 egalitarian_society_complete: "Rovnostářská společnost dokončena"
 egalitarian_society_complete_desc: "Výborně! Dokončili jste cíl Rovnostářská společnost. Můžete pokračovat ve hře nebo zkusit jiný cíl."
 je_liberate_the_slaves_invalid_tooltip: "Pokud [JournalEntry.GetTarget.GetCountry.GetName] již neexistuje."
 egalitarian_objective_note_loc: "\n\nPOZNÁMKA: Zrušení jakéhokoli zákona přijatého v předchozích záznamech způsobí skrytí tohoto záznamu a znemožní další postup, dokud nebude zákon znovu přijat."
 je_colonization_laws: "Koloniální mocnost"
 je_colonization_laws_reason: "Prvním krokem k vybudování naší hegemonie by mělo být rozšíření hranic do zámoří. Měli bychom upravit naše zákony tak, aby umožňovaly kolonizaci a podpořily naše cíle."
 je_african_colonies: "Africké kolonie"
 je_african_colonies_reason: "Nyní, když naše zákony umožňují zakládání kolonií, měli bychom se zaměřit na získávání nových území v Africe jako první krok k rozšiřování naší hegemonie."
 je_expand_navy_and_army: "Posílení armády"
 je_expand_navy_and_army_reason: "S prvními koloniemi bychom měli být připraveni na nejhorší. Naše armáda nemusí být nejsilnější na světě, ale měla by odrazovat ostatní od zahájení [concept_diplomatic_play] proti nám."
 je_form_alliance: "Uzavírat aliance"
 je_form_alliance_reason: "Silná armáda je důležitá, ale není jediným prostředkem bezpečnosti. Měli bychom navázat aliance s dalšími mocnostmi, které nám mohou pomoci v případě ohrožení."
 je_take_subject: "Udržovat závislé země"
 je_take_subject_reason: "Po upevnění naší moci bychom měli rozšířit sféru vlivu nad dalšími zeměmi. Podrobení několika států výrazně posílí náš vliv na mezinárodní scéně."
 je_increase_technology: "Upevnit technologickou převahu"
 je_increase_technology_reason: "Počet vojáků je důležitý, ale neměli bychom se na něj spoléhat. Musíme zajistit, aby naši vojáci měli správné vybavení pro své úkoly."
 je_greatest_power: "Největší mocnost"
 je_greatest_power_reason: "Jsme uznáváni jako velmoc, ale měli bychom světu ukázat, že jsme největší mocností a nemáme sobě rovné."
 je_greater_power: "Velmoc"
 je_greater_power_reason: "Byli jsme regionální mocností, nyní bychom měli upevnit své postavení a zařadit se mezi velmoci."
 je_great_power: "Významná mocnost"
 je_great_power_reason: "Nikdy jsme nebyli nejsilnější, ale to se nyní změní! Ukážeme světu, že nejsme bezvýznamná země, kterou lze ignorovat."
 je_unrecognized_power: "Uznaná mocnost"
 je_unrecognized_power_reason: "Odmítáni takzvanými „civilizovanými“ mocnostmi, prokážeme svou hodnotu a zajistíme si respektované místo mezi národy."
 je_the_hegemon: "Hegemon"
 je_the_hegemon_reason: "Ukázali jsme světu, čeho jsme schopni. Nyní musíme zajistit dostatečnou populaci, která podpoří naše globální postavení."
 colonization_law_passed_complete_1: "Koloniální mocnost"
 colonization_law_passed_complete_1_desc: "Výborně! Dokončili jste první cíl a jste na dobré cestě k vytvoření vlastní hegemonie."
 hegemon_welcome: "Hegemonie"
 hegemon_welcome_desc: "Vítejte v cíli Hegemonie. V tomto cíli budete plnit sérii [Concept('concept_journal_entry', '$concept_journal_entries$')], které vás povedou k vytvoření vlastní hegemonie."
 hegemon_complete: "Hegemonie dokončena"
 hegemon_complete_desc: "Výborně! Dokončili jste cíl Hegemonie. Můžete pokračovat ve hře nebo zkusit jiný cíl."
