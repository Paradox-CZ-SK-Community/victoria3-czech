 je_acw_war: "Americká občanská válka"
 je_acw_war_reason: "Válka mezi státy je tu. Nyní je čas zachovat Unii, nebo při tom zemřít."
 acw_war_tt_complete: "[Concept('concept_secession','$concept_secessionists$')] byli poraženi a znovu anektováni."
 acw_je_events.1.t1: "Jižní deklarace secese"
 acw_je_events.1.t2: "Severní deklarace secese"
 acw_je_events.1.d1: "Konvent otrokářských států vyhlásil nezávislost na nás jako [SCOPE.sCountry('csa_scope').GetName]. Unie byla vyzvána, ale tak snadno neustoupí."
 acw_je_events.1.d2: "Konvent abolicionistických států vyhlásil nezávislost na nás jako [SCOPE.sCountry('fsa_scope').GetName]. Unie byla vyzvána, ale tak snadno neustoupí."
 acw_je_events.1.f1: "„V tomto závažném kroku, který jsme učinili rozvázáním svého spojení s vládou, jejíž součástí jsme tak dlouho byli, je jen spravedlivé, abychom vyložili hlavní důvody, které nás k tomuto postupu vedly.\n\nNaše postavení je důkladně ztotožněno s institucí otroctví – velkým hmotným zájmem světa.“"
 acw_je_events.1.f2: "„V tomto závažném kroku, který jsme učinili rozvázáním svého spojení s vládou, jejíž součástí jsme tak dlouho byli, je jen spravedlivé, abychom vyložili hlavní důvody, které nás k tomuto postupu vedly.\n\nNaše postavení je důkladně ztotožněno s institucí otroctví – institucí bezpříkladného zla, která musí být zrušena.“"
 acw_je_events.1.a: "Dům rozdělený proti sobě nemůže obstát. Za Unii!"
 acw_je_events.1.b: "Raději bych naši věc nazval otázkou práv států."
 acw_je_events.2.t: "Rekonstrukce země"
 acw_je_events.2.d: "Ačkoli vojenský boj skončil, boj o duši země nikoli. [ROOT.GetCountry.GetName] se musí po svém rozdělení ve dví znovu vybudovat."
 acw_je_events.2.f: "„Neočekávám, že tato země padne. Ať už vítaně, či nevítaně, ať se stane celá jedním či celá druhým, tato země přestane být rozdělena tělem i duší.“"
 unreconstructed_state: "Nerekonstruovaný stát"
 acw_je_events.3.t: "Země rekonstruována"
 acw_je_events.3.d: "Naše země se znovu vybudovala a vytvořila něco odlišného, něco nového a především něco jednotného."
 acw_je_events.3.f: "„Přes všechny naše chyby jsme svou zemi znovu ukovali a vybudovali jsme si vládu, která z této země nezmizí.“"
 acw_je_events.3.a: "Znovu jsme jednotní."
 acw_je_events.4.t: "Proklamace emancipace"
 acw_je_events.4.d: "Když jsou stoupenci otroctví ve vzpouře, můžeme vydat proklamaci osvobozující všechny otroky na vzbouřených územích. Je to první, ale nejvýznamnější krok k úplnému zrušení otroctví."
 acw_je_events.4.f: "„Mocí, která mi byla svěřena v této době skutečné ozbrojené vzpoury, nařizuji a prohlašuji, že všechny osoby držené od nynějška jako otroci budou svobodné. Pro tento čin se dovolávám uvážlivého soudu lidstva a milostivé přízně Všemohoucího Boha.“"
 acw_je_events.4.a: "Tímto úderem zachráníme Unii!"
 acw_je_events.4.b: "Odmítáme emancipovat mimo obvyklé prostředky."
