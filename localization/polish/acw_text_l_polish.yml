l_polish:
 acw_events.1.t: "Mučednictví abolicionisty"
 acw_events.1.d: "Zapálený abolicionistický spisovatel zemřel při přestřelce s otrokářským davem, který se shromáždil před jeho domem. Příběh se rozšířil po celé zemi a zradikalizoval dříve lhostejné jedince ve vyšších i nižších vrstvách."
 acw_events.1.f: "Jeho přítel si povzdechl. Pohřeb byl malý, aby se dav znovu nesešel v plné síle. Samotný náhrobek byl prostý a nijak na sebe neupozorňoval. Jedinou ozdobou, která byla povolena, byl jednoduchý nápis:\n\n„Zde leží statečný muž: nyní ušetřete jeho hrob.“"
 acw_events.1.a: "Hrůza! Násilí otrokářů je třeba vzdorovat."
 acw_events.1.b: "Tuto abolicionistickou agitaci je třeba zastavit!"
 acw_events.2.t: "Uprchlý otrok"
 acw_events.2.d: "Otrok patřící [SCOPE.sCharacter('slaver_ig_leader').GetFullName] uprchl z [SCOPE.sCharacter('slaver_ig_leader').GetHerHis] panství do severního svobodného státu. [SCOPE.sCharacter('slaver_ig_leader').GetLastName] požaduje jeho navrácení, ale abolicionisté vyzývají, aby byly [SCOPE.sCharacter('slaver_ig_leader').GetHerHis] požadavky ignorovány."
 acw_events.2.f: "„Na málokteré věci mi záleží víc než na spravedlnosti. Když člověk ztratí kabát, je přece přirozené, že mu bude vrácen, ne? Žádám jen, aby mi bylo vráceno to, co je moje. Proč to vyvolává takový poprask?“"
 acw_events.2.a: "Najdeme a vrátíme uprchlého otroka [SCOPE.sCharacter('slaver_ig_leader').GetFullName]."
 acw_events.2.b: "Svobodná půda osvobozuje každého. [SCOPE.sCharacter('slaver_ig_leader').GetFullName] od vlády žádnou pomoc nedostane."
 acw_events.3.t: "Dodatek [SCOPE.sCharacter('wilmot_proviso_ig_leader').GetLastName]"
 acw_events.3.d: "[SCOPE.sCharacter('wilmot_proviso_ig_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('wilmot_proviso_ig').GetName], navrhl přímo zakázat otroctví ve všech našich nových západních teritoriích. Někteří odpůrci požadují prostou umírněnost, jiní však požadují legalizaci otroctví ve všech nových teritoriích."
 acw_events.3.f: "„Tato nesnesitelná instituce nesmí dále šířit svůj vliv! Svobodná země potřebuje svobodnou půdu, má-li vzkvétat!“"
 acw_events.3.a: "Odmítněte dodatek, zůstává to otázkou jednotlivých států."
 acw_events.3.b: "Přijměte dodatek a zrušte otroctví na Západě."
 acw_events.3.c: "Odmítněte dodatek a rozšiřte otroctví na Západě."
 acw_events.4.t: "Zapomenutá událost"
 acw_events.5.t: "Krvácející [SCOPE.sState('bleeding_kansas').GetName]"
 acw_events.5.d: "Abolicionisté i zastánci otroctví proudí do [SCOPE.sState('bleeding_kansas').GetName] v naději, že utvoří vládu tohoto teritoria podle svých představ. Polovojenské skupiny začaly páchat násilí proti sobě navzájem i proti civilistům."
 acw_events.5.f: "„Před Bohem a v přítomnosti těchto svědků od této chvíle zasvěcuji svůj život zničení otroctví. Zločiny této provinilé země nemohou být nikdy smyty jinak než krví.“" # two separate quotes by John Brown.
 acw_events.5.a: "Pohraniční rváči nemohou diktovat zákon! [SCOPE.sState('bleeding_kansas').GetName] musí být svobodným státem."
 acw_events.5.b: "Jayhawkeři nerozhodují o tom, co je správné! [SCOPE.sState('bleeding_kansas').GetName] bude otrokářským státem."
 acw_events_5_free_state_tt: "[SCOPE.sState('bleeding_kansas').GetName] zůstane svobodným teritoriem."
 acw_events_5_slave_state_tt: "Malý počet otroků se přesune do [SCOPE.sState('bleeding_kansas').GetName]."
 acw_events.6.t: "Zbití [SCOPE.sCharacter('charles_sumner_leader').GetFullName] holí"
 acw_events.6.d: "[SCOPE.sCharacter('charles_sumner_leader').GetFullName], otevřený abolicionista, byl zbit holí [SCOPE.sCharacter('preston_brooks_leader').GetFullName], majitelem otroků. [SCOPE.sCharacter('charles_sumner_leader').GetLastName]ova zranění ho nutí zotavovat se a odejít z veřejné funkce, zatímco [SCOPE.sCharacter('preston_brooks_leader').GetLastName] dosud chodí svobodně."
 acw_events.6.f: "„Takové barbarství! Bohužel nevidím, jak by dvě tak rozdílné komunity mohly stále tvořit jeden stát.“"
 acw_events.6.a: "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] jen bránil svou čest. Neuděláme nic."
 acw_events.6.a.tt: "[SCOPE.sCharacter('charles_sumner_leader').GetFullName] odejde z funkce."
 acw_events.6.b: "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] napadl občana! Musí být odvolán z funkce a zatčen."
 acw_events.6.b.tt: "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] je odvolán z funkce."
 acw_events.7.t: "Svobodný stát [SCOPE.GetRootScope.GetCountry.GetCustom('random_free_state_of_place')]"
 acw_events.7.d: "Proticesesionističtí agitátoři ve státě [SCOPE.sState('free_state_of_county').GetName] shromáždili podporu a vyhlásili ustavení unionistické vlády."
 acw_events.7.f: "„Na odpor secesionistům se my, usnesením lidu, odtrháváme od těchto zrádců a prohlašujeme se za svobodné a nezávislé, stále věrné [SCOPE.sCountry('unionist_usa').GetNameNoFormatting].“"
 acw_events.7.a: "Ukázka síly je přivede k poslušnosti."
 acw_events.7.b: "Právě teď si nemůžeme dovolit proti nim zakročit."
 acw_events.8.t: "Velká lokomotivní honička"
 acw_events.8.d: "Nepřátelským nájezdníkům se podařilo ukrást lokomotivu a zničit míle kolejí a telegrafních linek ve státě [SCOPE.sState('great_locomotive_chase_state').GetName], než byli zastaveni."
 acw_events.8.f: "Chomáčky kouře slábly s každým odfouknutím jejich unavené lokomotivy [SCOPE.GetRootScope.GetCountry.GetCustom('random_csa_acw_locomotive')]. Nájezdníkům došlo palivo už před mnoha mílemi a koleje, které strhali, nestačily k jejich záchraně. V dálce se stále víc přibližovaly sloupce kouře jejich pronásledovatelů. Honička se chýlila ke konci."
 acw_events.8.a: "K čertu se vším ostatním, obnovte ty koleje a linky hned!"
 acw_events.8.b: "Držet vojáky ve vlacích je zpomalí, ale zvýší jejich bezpečnost."
 acw_events.8.c: "Příště nájezdníky zajmeme dřív, než začnou."
 acw_events_low_tt: "Napětí občanské války mírně vzroste."
 acw_events_med_tt: "Napětí občanské války vzroste středně."
 acw_events_high_tt: "Napětí občanské války výrazně vzroste."
 acw_followup_events.1.t: "Pokus o atentát na [SCOPE.sCharacter('lincoln_proxy').GetLastName]"
 acw_followup_events.1.d: "Sympatizant nedávné vzpoury vzal život [SCOPE.sCharacter('lincoln_proxy').GetFullName]. Ačkoli byl po činu dopaden a jeho spoluspiklenci odhaleni, smrt [SCOPE.sCharacter('lincoln_proxy').GetLastName] zůstává pochmurným koncem této tragické éry amerických dějin."
 acw_followup_events.1.f: "„[SCOPE.sCharacter('lincoln_proxy').GetFullNameNoFormatting] šel z povinnosti na nebezpečné místo, a ačkoli byl zničen, [SCOPE.sCharacter('lincoln_proxy').GetHerHis] život rozhodně nebyl ztracen. Velká skvrna na naší zemi, velká poskvrna našeho národního charakteru, velký zdroj sváru a rozbrojů mezi naším lidem byl díky [SCOPE.sCharacter('lincoln_proxy').GetHerHis] odvaze a vytrvalosti setřen a odstraněn. Jméno [SCOPE.sCharacter('lincoln_proxy').GetFullNameNoFormatting] se zapsalo do dějin.“"
 acw_followup_events.1.a: "Země bude tento den truchlit."
 acw_followup_events.2.t: "Pokus o atentát na [SCOPE.sCharacter('lincoln_proxy').GetLastName]"
 acw_followup_events.2.d: "Sympatizant nedávné vzpoury se pokusil zavraždit [SCOPE.sCharacter('lincoln_proxy').GetFullName]. Byl dopaden při pokusu o vloupání a jeho plán i spoluspiklenci byli odhaleni. [SCOPE.sCharacter('lincoln_proxy').GetLastName] využil této příležitosti, aby znovu shromáždil lid ke [SCOPE.sCharacter('lincoln_proxy').GetHerHis] věci."
 acw_followup_events.2.f: "„Jak si ti hlupáci mohou myslet, že ještě někdy povstanou, když nedokážou ani správně vystřelit jedinou ránu?“"
 acw_followup_events.2.a: "Tragédie odvrácena!"
 acw_followup_events.3.t: "Pokus o atentát na [SCOPE.sCharacter('lincoln_proxy').GetLastName]"
 acw_followup_events.3.d: "Sympatizant nedávné vzpoury se pokusil zavraždit [SCOPE.sCharacter('lincoln_proxy').GetFullName]. Pokus nevyšel tak, jak atentátník plánoval."
 acw_followup_events.3.f: "[SCOPE.sCharacter('lincoln_proxy').GetFullNameNoFormatting] zaslechl, jak za [SCOPE.sCharacter('lincoln_proxy').GetHerHim] zavrzala podlahová prkna. Než [SCOPE.sCharacter('lincoln_proxy').GetHerHis] útočník stačil vůbec vytáhnout derringer, [SCOPE.sCharacter('lincoln_proxy').GetLastNameNoFormatting] se na něj vrhl. „Netvore! Podlče! Nemáš žádnou slušnost?“ zvolal [SCOPE.sCharacter('lincoln_proxy').GetSheHe] a každé slovo doprovodil další ranou holými pěstmi do člověka, který se pokusil [SCOPE.sCharacter('lincoln_proxy').GetLastNameNoFormatting] zavraždit."
 acw_followup_events.3.a: "Tak vždycky atentátníkům!"
 acw_followup_events.4.t: "Čtyřicet akrů a mula"
 acw_followup_events.4.d: "Ve válce proti secesionistům mnoho zotročených lidí věřilo, že jakmile budou osvobozeni, budou mít právo vlastnit půdu, na níž byli jako otroci nuceni pracovat. Lidé ve státě [SCOPE.sState('land_redistribution_state').GetName] na tuto otázku tlačí u místních úřadů, které se obracejí na nás o pokyny."
 acw_followup_events.4.f: "„Půdu! Půdu potřebujeme! Volební urnou se nenakrmím – dejte mi pozemek, na kterém už pracuji, abych mohl uživit svou rodinu.“"
 acw_followup_events.4.a: "Povolte omezené přerozdělení půdy."
 acw_followup_events.4.b: "Ekonomická opatření mohou snadno způsobit potíže."
 acw_followup_events.5.t: "Násilí bělošských supremacistů v [SCOPE.sState('supremacist_violence_state').GetName]"
 acw_followup_events.5.d: "Násilí mezi bělošskými výtržníky a černošskými propuštěnci vyvolalo ve státě [SCOPE.sState('supremacist_violence_state').GetName] značné napětí."
 acw_followup_events.5.f: "„Výtržníci nemilosrdně šlapali po druhých, kopali do nich a bili je obušky. Ulice se staly kluzkými krví nevinných mužů. Vyprázdněné revolvery rachotily o zem, když útoky dosáhly takového běsnění, že už se nikdo neobtěžoval znovu nabíjet. Teprve když bylo vyhlášeno stanné právo a vpochodovalo vojsko, mohl se vrátit alespoň zdánlivý pořádek.“"
 acw_followup_events.5.a: "Použijte plnou moc vlády k ochraně propuštěnců."
 acw_followup_events.5.b: "Nemůžeme si znepřátelit místní vůdce nasazením vojska."
 acw_followup_events.6.t: "Vykupitelé"
 acw_followup_events.6.d: "Koalice bývalých Konfederátů a sympatizantů Konfederace získala poctivými i nepoctivými prostředky kontrolu nad vládou státu [SCOPE.sState('redeemer_state').GetName], čímž ohrožuje probíhající proces rekonstrukce."
 acw_followup_events.6.f: "„Nakreslete čáru, na jejíž jedné straně uvidíte inteligenci, ctnost, sebeúctu a demokracii; a na druhé absolutní, nekontrolovanou politickou nadvládu hrubé síly a teroru, a tam nespatříte jediný znak svobodné vlády, nýbrž nejsmutnější tyranii Starého Jihu, která se zoufale drápe zpět k moci, jež kdy proklela tuto zemi.“" # this is an inversion of Lucius Quintus Cincinnatus Lamar II's horrible racist diatribe.
 acw_followup_events.6.a: "Usmíření vyžaduje dohodu s těmito muži."
 acw_followup_events.6.b: "Zatkněte tyto muže a dosáhněte ustavení nové státní vlády."
 acw_followup_events.7.t: "Polovojenské zastrašování"
 acw_followup_events.7.d: "Politické skupiny vystupující proti rekonstrukci zorganizovaly ozbrojené oddíly, aby zastrašovaly voliče ve státě [SCOPE.sState('paramilitary_intimidation_state').GetName] a navrátily se k moci."
 acw_followup_events.7.f: "„Ačkoli chápu, že naše organizace vyvolává u některých vrstev obyvatelstva znepokojení, mohu vás ujistit, že naše bodáky a pušky slouží výhradně k předváděcím účelům.“"
 acw_followup_events.7.a: "Loajální státní vláda je jediné, na čem záleží."
 acw_followup_events.7.b: "Hrůza! Okamžitě tyto oddíly rozpusťte!"
 acw_followup_events.8.t: "Carpetbaggeři"
 acw_followup_events.8.d: "Seveřané ve státě [SCOPE.sState('carpetbagger_state').GetName] se stali terčem místních, kteří je odsuzují jako potížisty a vykořisťovatele. Spisovatelé a řečníci ve státě [SCOPE.sState('carpetbagger_home').GetName] však požadují, aby vláda tyto Seveřany chránila."
 acw_followup_events.8.f: "„Přišel jsem sem pomoci vybudovat něco lepšího po svržení otrokářské moci, a jistě, nevadilo mi přitom něco získat i pro sebe, ale co jsem získal? Jsem tu s prázdnýma rukama a nemám nic než záplavu pomluv a hrozeb vržených na mé jméno.“"
 acw_followup_events.8.a: "Nechte lid státu [SCOPE.sState('carpetbagger_state').GetName], ať si dělá, co chce."
 acw_followup_events.8.b: "Musíme chránit všechny Američany, i kdyby to některé rozhněvalo."
 wild_west.1.t: "Psanci ve státě [SCOPE.sState('bank_robbery_state').GetName]!"
 wild_west.1.d: "Nechvalně proslulá banda psanců terorizuje počestné osady ve státě [SCOPE.sState('bank_robbery_state').GetName]."
 wild_west.1.f: "Drsný muž zasunul revolver do pouzdra a odkopl tělo zástupce šerifa stranou. „Říkal jsem jim,“ zahalekal, „říkal jsem jim, že jestli se někdy dostanu na svobodu, [SCOPE.GetRootScope.GetCountry.GetCustom('american_outlaw_gang')] jim všem ukážou, co #Sopravdu#! znamená být zlý.“"
 wild_west.1.a: "Ať to vyřeší místní šerif."
 wild_west.1.b: "Najměte Pinkertony – ti vědí, jak být tvrdí."
 wild_west.1.c: "Zbraně národní gardy psance zastaví."
 wild_west.2.t: "Nájezdy na železného oře"
 wild_west.2.d: "Domorodé nájezdy jsou stále častější a železnice se stávají velmi běžným cílem. Občané ve státě [SCOPE.sState('raided_railroad').GetName] požadují od vlády zásah."
 wild_west.2.f: "„Postavili jsme tu trať napříč nedotčenou zemí, ale stejně na nás přišli útočit! Jak máme něco dokázat, když jsou vlaky pořád napadány a koleje pořád trhány?“"
 wild_west.2.a: "Pošlete armádu!"
 wild_west.2.b: "Nemůžeme si dovolit poskytnout žádnou pomoc."
 wild_west.2.c: "Promluvme si s vůdci [SCOPE.sCulture('native_people_infringed').GetName] a uzavřeme dohodu."
 wild_west.3.t: "Přestřelka u O. K. Corralu"
 wild_west.3.d: "Strážci zákona ve státě [SCOPE.sState('OK_corral_state').GetName] se zapletli do přestřelky s několika kovboji. Následné vyšetřování odhalilo, že přestřelku pravděpodobně způsobila osobní rozepře mezi americkými maršály a zúčastněnými občany, nikoli prosazování zákona. Lidé požadují spravedlnost – proti strážcům zákona."
 wild_west.3.f: "„Tak co, chce ještě někdo zkusit štěstí? Vidíte tenhle odznak? Znamená, že tady velím já! Já jsem spravedlnost! A teď běžte, tady není nic k vidění.“"
 wild_west.3.a: "Strážci zákona jsou zákon a zákon nemůžeme zastavit."
 wild_west.3.b: "Dočasně odvolejte maršály ze státu [SCOPE.sState('OK_corral_state').GetName]."
 fsa_events.1.t: "Dokonalejší unie"
 fsa_events.1.d: "Abolicionističtí myslitelé z celé země se spojili s návrhem, že pouhé zrušení otroctví nestačí k rozšíření svobody na ty, kdo byli kdysi v okovech. Navrhují plán desegregace a reparací, který má zacelit propasti mezi rasami."
 fsa_events.1.f: "Ačkoli byly v této vznešené zemi okovy otroctví rozlomeny, stále existují pouta, která svazují náš lid. Staletí podrobení znamenala, že naši afroameričtí občané žijí věčně ve stínu plantáže, bez moci nad vlastními osudy. Jen aktivním úsilím státu zmírnit chyby minulosti můžeme doufat ve vytvoření skutečné země rovných a utvoření ještě dokonalejší unie."
 fsa_events.1.a: "Mají přece tkaničky u bot, za které se mohou vytáhnout, ne?"
 fsa_events.1.b: "Tyto problémy nelze vyřešit bez přerozdělení politické a ekonomické moci."
 fsa_reparation_cost: "Sociální výdaje"
 fsa_reparation_reward: "Reparace"
 every_yankee_state_in_root: "Každý [GetCulture('yankee').GetName] [Concept('concept_homeland','domovský')] [concept_state|l] v [GetPlayer.GetAltAdjective('L')]"
 je_acw_countdown: "Debata o otroctví"
 je_acw_countdown_reason: "Otrokáři a abolicionisté vedou po celé zemi stále vyhrocenější debatu. Dříve či později se přestanou argumenty vést slovy a začnou se vést kulkami."
 je_acw_countdown_complete: "Americká občanská válka začala."
 je_acw_reconstruction: "Rekonstrukce"
 je_acw_reconstruction_status: "Obnovte zemi po rozdělující občanské válce."
 je_acw_reconstruction_reason: "Občanská válka je za námi a nyní nastal čas znovu začlenit bývalé secesionistické státy do Unie."
 je_acw_reconstruction_goal: "Rekonstruujte dříve vzbouřené státy."
 je_acw_reincorporate: "Znovu přijmout odtržené státy"
 je_acw_reincorporate_status: "Přiveďte bývalé secesionistické státy zpět do lůna země jako plnohodnotné začleněné státy."
 je_acw_reincorporate_reason: "Opětovné přijetí vzbouřených států zpět do Unie je nezbytné pro obnovení otřeseného ducha země a může pomoci vytvořit nové mocenské základny pro vládu."
 acw_reincorporate_loyalist_tt: "Alespoň #v [GetPlayer.MakeScope.ScriptValue('acw_reincorporate_dixie_loyalist_min')|0%]#! [GetCulture('dixie').GetName] [Concept('concept_pop','$concept_pops$')] ve [concept_state] jsou [concept_loyalist]"
 je_acw_equality: "Rovnost pro všechny"
 je_acw_equality_status: "Vytvořte systém, který uznává všechny muže, ze Severu i Jihu, černé i bílé, za skutečně rovné."
 je_acw_equality_reason: "Tato země vedla válku kvůli hlubokým problémům, které byly po generace zakrývány, dokud se nestaly příliš velkými na to, aby je bylo možné ignorovat. Musíme se vyhnout opakování této katastrofy a postavit se problémům čelem, aby nebyly ponechány hnít další století."
 je_acw_wild_wild_west: "Divoký, divoký západ"
 je_acw_wild_wild_west_reason: "Západní pohraničí bylo rozníceno nepokoji ve zbytku země. Musíme najít způsob, jak je uklidnit."
 ACW_DIXIE_STATES_HEADER: "Všechny tyto [Concept('concept_state', '$concept_states$')] jsou [Concept('concept_incorporated_state','$concept_incorporated$')] a mají alespoň [GetPlayer.MakeScope.ScriptValue('acw_reincorporate_dixie_loyalist_min')|0v%] [GetCulture('dixie').GetName] [Concept('concept_loyalist', '$concept_loyalists$')]:"
