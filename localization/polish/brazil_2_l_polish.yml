 indians_exploitation_modifier: "Nasazeni do práce"
 amazon_exploitation_devout_upset: "Mlčící kazatelny"
 amazon_exploitation_landowners_upset: "Nesplněné kvóty"
 je_francocracia: "Já, Nejvyšší"
 je_francocracia_reason: "Výstřední a nekompromisní vláda Nejvyššího a [SCOPE.sCharacter('francia_character_scope').GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag], doktora [SCOPE.sCharacter('francia_character_scope').GetFullName], dominovala většině období po nezávislosti Paraguaye. S podporou své [GetLawType('law_secret_police').GetName], obávaných #bold Pyraguës#!, vládl doktor Francia pevnou rukou a podle potřeby měnil sametovou rukavici za železnou pěst.\n\nVěk [SCOPE.sCharacter('francia_character_scope').GetPrimaryRoleTitle]a se však začíná projevovat. A tak se v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] šíří šeptanda. Šeptanda, že Franciova vize izolacionistického, rousseauovského ráje nemusí přežít samotného dobrého doktora."
 je_francocracia_tt: "[SCOPE.sCharacter('francia_character_scope').GetFullName] #bold není#! [concept_ruler] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag]"
 hairy_feet_modifier: "Pyraguës"
 reinstated_hairy_feet_modifier: "Reorganizovaní Pyraguës"
 karai_guazu_modifier: "Karai Guasu"
 je_modernizing_paraguay: "Srdce Ameriky"
 je_modernizing_paraguay_reason: "Národ [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] dlouho strádal pod svévolnou vládou Francii. Zatímco starý tyran chtěl Paraguay stáhnout ze světové scény, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] si přeje, aby na ní zazářila.\n\nZnepokojen chatrným vojenským i ekonomickým stavem země zahájil [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastNameNoFormatting] ambiciózní program modernizace a rozšíření ozbrojených sil. Koneckonců právě ony mohou skutečně chránit zájmy národa, ať už jsou kdekoliv."
 je_modernizing_paraguay_goal: "Dosáhnout [concept_gdp] ve výši [JournalEntry.GetTotalGoalValue|D]"
 je_modernizing_paraguay.tt_1: "Postavit #bold pevnost Humaitá#!"
 je_modernizing_paraguay.tt_2: "Založit #bold slévárnu Rosado#!"
 je_modernizing_paraguay.tt_3: "Reformovat #bold paraguayskou armádu#!"
 je_modernizing_paraguay.tt_4: "Podpořit růst populace"
 je_paraguayan_war: "Paraguayská válka"
 je_paraguayan_war_reason: "[SCOPE.sCountry('paraguay_scope').GetAdjective] had zvedl svou ošklivou hlavu. [SCOPE.sCountry('paraguay_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('paraguay_scope').GetRuler.GetLastName] odhalil své ambice, které by výrazně narušily rovnováhu sil v Jižní Americe.\n\nShoda je jasná: pouze ozbrojená reakce může nyní [SCOPE.sCountry('paraguay_scope').GetRuler.GetLastNameNoFormatting] odradit. Otázkou zůstává, zda ji poskytneme."
 je_paraguayan_war_tt_1: "#bold vyhráli#! jsme [concept_war] proti [SCOPE.sCountry('paraguay_scope').GetName]."
 je_paraguayan_war_tt_2: "#bold prohráli#! jsme [concept_war] proti [SCOPE.sCountry('paraguay_scope').GetName]."
 humanita_fortress_button: "Postavit pevnost Humaitá"
 humanita_fortress_button_desc: "Naši nejlepší vojenští inženýři navrhli vybudovat velkou pevnost na podkovovitém ohybu poblíž ústí řeky Paraguay.\n\nNavrhovaná pevnost s posádkou téměř 20 000 mužů, řetězovou zábranou a přibližně 400 děly umístěnými na barbetách, v kasematách a zemních opevněních zajistí, že jakákoli nepřátelská síla pokoušející se proniknout proti proudu bude zastavena na místě."
 humanita_fortress_modifier: "Pevnost Humaitá"
 establishing_humanity_modifier: "Výstavba Humaitá"
 ybycui_iron_works_button: "Založit slévárnu Rosada"
 ybycui_iron_works_button_desc: "Strategicky umístěné poblíž hlavních nalezišť [SCOPE.sGoods('iron_scope').GetName] v [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] a obklopené [SCOPE.sGoods('wood_scope').GetName] vhodným pro výrobu dřevěného uhlí, je Arroyo de Ybycuí ideálním místem pro vybudování velké moderní železárny.\n\nPozváním zahraničních odborníků k její výstavbě a provozu zajistíme, že paraguayské ozbrojené síly nebudou v případě války postrádat domácí kvalitní železo."
 good_health_prg_button: "Podpořit růst populace"
 good_health_prg_button_desc: "Po staletí se paraguayský lid spoléhal na tradiční léčitele, zatímco nemoci jako neštovice decimovaly populaci, zejména v chudších čtvrtích.\n\nMá-li se Paraguay modernizovat a její populace růst podle potřeb státu, musí být do [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] pozváni lékaři vzdělaní na Západě a musí být vybudován nový zdravotnický systém."
 army_git_good_button: "Reformovat paraguayskou armádu"
 army_git_good_button_desc: "Jsme obklopeni potenciálními nepřáteli, jejichž populace mnohonásobně převyšují tu naši. Má-li Paraguay chránit svou nezávislost a zájmy, je nutné přijmout zásadní opatření k rozšíření a modernizaci armády."
 je_expanding_paraguay: "Si Vis Pacem, Fac Bellum"
 je_expanding_paraguay_reason: "„Chceš-li mír, připravuj válku.“\n\nPro někoho možná rozpor, pro [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] však prostý fakt. Kolem nás naši sousedé manévrují a intrikují, snaží se nám vyrvat kontrolu nad našimi posvátnými zeměmi.\nMáme tedy pokorně čekat, až nepřítel učiní první krok? Nebo se modlit, aby tak nikdy neučinil?\n\nNe. Stejně jako naši předkové si musíme vytvořit vlastní štěstí. Pokud má válka přijít do [SCOPE.GetRootScope.GetCountry.GetNameNoFlag], ať přijde za našich podmínek."
 choose_one_of_tt: "Vyberte #bold jednu#! z následujících možností:"
 paraguay.1.t: "Setkání v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 paraguay.1.d: "Po smrti doktora Francii je celé [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] v pohybu, zatímco civilní i vojenské kliky manévrují, aby si zajistily otěže moci."
 paraguay.1.f: "„To je ono? Ten paranoidní troska je konečně mrtvý?“\n\n„Stejně mrtvý jako El Cid i moje babička. Bůh jim odpusť.“\n\n„Bylo na čase. Nehodní už měli svůj den. Teď mohou správní lidé vrátit Paraguayi její slávu.“"
 paraguay.1.a: "Posádka v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] zajistí město pro [SCOPE.sCharacter('carlos_antonio_lopez_scope').GetFullName]."
 paraguay.1.b: "Sr. [SCOPE.sCharacter('go_policarp_go_scope').GetLastName], neoblíbený Franciův tajemník, se drží u moci."
 paraguay.1.tt_1: "Přikloněním se k reformátorům [SCOPE.sCharacter('go_policarp_go_scope').GetIdeology.GetName] [concept_ideology] navždy zmizí z politiky [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]."
 paraguay.1.tt_2: "Pokračováním odkazu doktora Francii se uzavřete před mocnými #bold modernizačními#! a #bold expanzními#! [Concept('concept_journal_entry','$concept_journal_entries$')] [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 paraguay.2.t: "Napoleon Ameriky"
 paraguay.2.d_1: "[SCOPE.sCharacter('francisco_solano_lopez_scope').GetFullName], syn [SCOPE.sCharacter('carlos_antonio_lopez_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('carlos_antonio_lopez_scope').GetLastName], zaznamenal raketový vzestup v řadách [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] armády, z velké části díky vlivu svého otce. Tento mladý generál, až příliš ctižádostivý, udělá pro povznesení Paraguaye cokoli — bez ohledu na cenu."
 paraguay.2.d_2: "[SCOPE.sCharacter('francisco_solano_lopez_scope').GetFullName] zaznamenal raketový vzestup v řadách [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] armády. Tento mladý generál, až příliš ctižádostivý, udělá pro povznesení Paraguaye cokoli — bez ohledu na cenu."
 paraguay.2.f_1: "„Takže syn [SCOPE.sCharacter('carlos_antonio_lopez_scope').GetPrimaryRoleTitle]a si myslí, že je císař, co? Kolik obléhání vedl, která neproběhla u jídelního stolu?“\n\n„Dost na to, aby zčernal oči každému z našich sousedů. Co tě tak rozčílilo?“\n\n„Ještě se neodstřihl od svého otce. Slyšel jsem také, že si nechal vyrobit repliku koruny Malého kaprála.“"
 paraguay.2.f_2: "#bold [SCOPE.sCharacter('francisco_solano_lopez_scope').GetFullNameNoFormatting]: Napoleon z [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]!#!\n\nV naší milované [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] se objevil velitel ohromujícího talentu. Jeho dovednosti s velkými i malými zbraněmi proměnily naše hranice v nedobytné zdi. Modeluje své strategie podle samotného Napoleona Bonaparta a [SCOPE.sCharacter('francisco_solano_lopez_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('francisco_solano_lopez_scope').GetLastNameNoFormatting] může dovést [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] armádu ke stejné velikosti."
 paraguay.2.a: "Jednoho dne tento „Napoleon“ dovede Paraguay ke slávě."
 paraguay.2.b: "Generál by měl znát své místo — a tím jsou kasárna."
 paraguay.2.c: "Na tom muži je něco #italic nepatřičného#!, propusťte ho."
 paraguay.2.tt_1: "Účinky tohoto modifikátoru se #bold zdvojnásobí#!, pokud se [SCOPE.sCharacter('francisco_solano_lopez_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('francisco_solano_lopez_scope').GetLastName] stane [concept_ruler] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag]."
 paraguay.2.tt_2: "[SCOPE.sCharacter('francisco_solano_lopez_scope').GetFullNameNoFormatting] je propuštěn z armády."
 paraguay.3.t: "Porúří tropů"
 paraguay.3.d: "S velkou slávou [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] oficiálně zahájil provoz nového průmyslového komplexu v Ybycuí a zdůraznil jeho modernost a obrovský průmyslový potenciál před shromážděným davem."
 paraguay.3.f: "#bold Záznam ředitele: O železárnách v Ybycuí#!\nTakto vyrobené železo se ukázalo být nejvyšší kvality a již nějakou dobu se pro veřejné stavby nepoužívá žádné jiné. Železo tavené dřevěným uhlím je, jak známo, mnohem pevnější a kvalitnější než železo tavené uhlím.\n\nExistuje důvod doufat, že jakmile budou paraguayské doly řádně využívány a provozovány ve vhodném rozsahu, bude země schopna zásobovat La Platu železem nejvyšší kvality za nižší cenu než dosud dovážené méně kvalitní železo z Evropy..."
 paraguay.3.a: "Jeho uhlíkové pece zajistí nejvyšší kvalitu [SCOPE.sGoods('iron_scope').GetName]."
 paraguay.3.b: "Železo je dobré, ale budoucnost patří [SCOPE.sGoods('steel_scope').GetName]."
 paraguay.3.c: "Naše věznice jsou plné nevyužitých mužů — nabídněme jim „práci“."
 ybycui_prisoner_workforce_modifier: "Nucené pracovní tábory El Rosado"
 ybycui_iron_works_modifier: "Železárny El Rosado"
 ybycui_steelworks: "Ocelárna El Rosado"
 paraguay.4.t: "Sevastopol Jižní Ameriky"
 paraguay.4.d: "Mocná pevnost Humaitá, ovládající ostrý meandr řeky Paraguay, se stala pečlivě střeženým klíčem k [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] a horním tokům řek."
 paraguay.4.f: "„Šestnáct ponurých otvorů mířilo svým temným pohledem — a čímkoli, co skrývaly — na nás; a podobně jako oči na obraze sledovaly pohyb lodi… Tyto otvory patří kasematové baterii, postavené z cihel, avšak velmi hluboké, a chráněné impozantní baterií šestnácti osmipalcových děl.“"
 paraguay.4.a: "¡No pasarán!"
 paraguay.5.t: "Co doktor předepsal"
 paraguay.5.d: "Příliš dlouho připravovaly nemoci jako neštovice náš národ o muže i ženy. Ačkoli tomu tak může být ještě po desetiletí, zavedení očkovacích programů vedených zahraničními lékaři zmírní závažnost budoucích epidemií."
 paraguay.5.f: "Její tělo bylo poseto jizvami. Věčnými ranami a nezapomenutelnými stopami po neštovicích. Vzaly jí dvě nejstarší děti, které jí naposledy vydechly v náručí. Její nejmladší, dosud nedotčené nemocí, možná přežije další vlnu. To vše díky jediné malé jehle."
 paraguay.5.a: "Zdraví je bohatství."
 vaccinations_prg_modifier: "Venkovské očkovací programy"
 paraguay.6.t: "Zvítězit, nebo zemřít"
 paraguay.6.d: "V charakteristických červeno-bílých uniformách pochodují muži nových praporů [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]a [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] hrdě po náměstí Plaza de Armas v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Mezitím se jejich generálové neustále přou o to, jak je vlastně nejlépe využít."
 paraguay.6.f: "„Můžete podporovat návrh použít děla na vyvýšeninách, ale my nemáme ani děla, ani ty vyvýšeniny.“\n\n„Jako bychom neměli prostředky si obojí opatřit. Možná vaše rty zeslábly stejně jako vaše brada?“\n\n„Ne víc než vaše lebka. Slibujeme to, co nemáme.“"
 paraguay.6.a: "Hmotu nad mysl."
 paraguay.6.b: "Mysl nad hmotou."
 barracks_boost_paraguay_quantity_modifier: "Jednoduché návrhy"
 barracks_boost_paraguay_quality_modifier: "Neohrožení vojáci"
 paraguay.7.t: "Sic Semper Tyrannis"
 paraguay.7.d_1: "Postavena proti nemožným přesilám byla [SCOPE.sCountry('paraguay_scope').GetName] poražena naší silou. Světové mocnosti již připravily nové mapy."
 paraguay.7.d_2: "Postavena proti nemožným přesilám byla Paraguay poražena naší silou. Světové mocnosti již připravily nové mapy."
 paraguay.7.f_1: "„Můj lide, děti Argentiny: dnes na obloze vychází zlatý úsvit. Naše hranice jsou zajištěny; náš lid může dnes v noci spát o něco klidněji. Paraguayský vyzyvatel byl za svou zpupnost rozdrcen železnou patou. Jeho lid už nyní volá po naší armádě, aby jej zachránila před jeho osudem. A my musíme — a také to učiníme!“"
 paraguay.7.f_2: "#bold Paraguayský škůdce zničen#!\nParaguayský násilník a jeho legie leží poraženi na bitevním poli. Jakékoli jejich ambice zemřely s nimi a Paraguay se opět vrací ke své přirozené bezvýznamnosti. (pokračování str. 4)"
 paraguay.7.f_3: "Nejmenší z vrhu. Nejslabší článek řetězu. Sláma mezi ocelí. A přesto přežil svého souseda. Ne díky oceli, vojákům či učencům, ale prostým přežitím. Možná by s časem a trpělivostí dokázal vzkvétat i nadále."
 paraguay.7.f_4: "Paraguay rozdrcena; ostrov pohlcen ze všech stran. Přílivy ji sevřely a život v nich ji roztrhal mezi nesčetnými mladými. Poselství malým národům bylo jasné: expanduj a buď rozdrcen, nebo se skryj a buď pohlcen."
 paraguay.7.a: "Sláva hrdinům vlasti!"
 victor_against_paraguay_modifier: "Vítězství nad Paraguayí"
 sack_of_paraguay_modifier: "Vydrancování Paraguaye"
 paraguay.8.t: "Bitva u Cerro Corá"
 paraguay.8.d: "Osobně vedouc zbytky [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] armády byl [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] zabit v boji poté, co odmítl všechny výzvy ke kapitulaci."
 paraguay.8.f: "Nebylo těžké sledovat stopu [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]a: cesta vyrabovaných vesnic a pobitých stád končila u chatrného opevnění. Nepřátelští vojáci se přiblížili ze všech stran bez odporu. Bitva skončila sotva začala — nedůstojný konec [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]a [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 paraguay.8.a: "A s jeho smrtí umírá i jeho sen o Velké Paraguayi."
 thus_unto_tyrants_modifier: "Vydrancování Asunciónu"
 thus_unto_tyrants_capture_modifier: "Vydrancování Asunciónu"
 a_broken_land_modifier: "Zlomená země"
 paraguay.9.t: "Mír a spravedlnost"
 paraguay.9.d: "Jako David, jenž skolil Goliáše, zvítězila [SCOPE.GetRootScope.GetCountry.GetName] nad svými sousedy a nyní prosazuje [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] mír od suchého Chaca až po břehy Atlantiku."
 paraguay.9.f: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullNameNoFormatting] seděl u svého stolu, osvětlen jedinou svící. Vedle inkoustu a čistého pera stál nedotčený pohár vítězství. Oslavy mohly počkat, stejně jako jásající muži a omdlévající ženy venku.\n\nParaguay potřebovala povzbudivý projev. Ale kde začít?"
 paraguay.9.a: "Vzdejte hold tomuto nepřemožitelnému bastionu hrdinství..."
 paraguay.9.b: "... tomuto nádhernému ráji bohatství."
 paraguay_victory_mil_modifier: "Bastion hrdinství"
 paraguay_victory_civ_modifier: "Pozemský ráj"
 paraguay.10.t: "[SCOPE.sCountry('paraguay_scope').GetNameNoFormatting] triumfuje"
 paraguay.10.d: "Naše armády byly rozdrceny a [SCOPE.sCountry('paraguay_scope').GetName] dokázala to, co málokterý pozorovatel považoval za možné. Vyhrála válku. Mezinárodní tisk již informuje o nové rovnováze sil v Jižní Americe."
 paraguay.10.f: "Generálové i admirálové hledali odpovědi. Za každého muže, kterého stáhli, padlo deset tisíc jiných. Za každou loď, kterou odvolali, se potopila celá eskadra, často bez jediného přeživšího. Paraguay, mravenec, který bojoval se sluncem. Paraguay, rosomák, který bojoval s jaguáry a hady. Paraguay, nový kolos Jižní Ameriky."
 paraguay.10.a: "Bůh s námi."
 army_shaken_modifier: "Otřeseni porážkou"
 paraguay.11.t: "Paraguayská válka"
 paraguay.11.d: "Po nashromáždění značné vojenské síly pod vedením [SCOPE.sCharacter('paraguay_leader_scope').GetPrimaryRoleTitle]a [SCOPE.sCharacter('paraguay_leader_scope').GetLastName] je [SCOPE.sCountry('paraguay_scope').GetName] připravena udeřit na [SCOPE.sCountry('paraguay_target_scope').GetName] ve snaze dosáhnout velikosti. Zdá se, že nyní mohou [SCOPE.sCountry('paraguay_scope').GetAdjectiveNoFormatting] ambice zkrotit jen připravené mušketové hlavně."
 paraguay.11.f: "„Pane, zprávy z [SCOPE.sCountry('paraguay_scope').GetAdjectiveNoFormatting] hranic. Prapory vztyčeny a děla připravena.“\n\n„Tak rychle? Plánují snad—“\n\n„Útok hned, pane. Kapitáni už organizují své muže.“"
 paraguay.11.a: "Musíme jednat."
 paraguay.12.t: "Sen [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle]a"
 paraguay.12.d: "Roky namáhavé práce přinesly ovoce. S [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] armádou silnější než kdy dříve a podporou domácího průmyslu je Paraguay připravena uchopit svůj osud jako jedna z hlavních mocností Jižní Ameriky."
 paraguay.12.f: "„Dobří lidé z [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] i [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]ové v zahraničí, já, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastNameNoFormatting], přicházím s mečem v jedné ruce a vahami v druhé. Dnes hovořím o snu pro [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]: o zlaté budoucnosti, svobodné od jařma imperialistických sousedů. Kladivem, mušketou a vůlí těchto statečných mužů zaujme náš lid své právoplatné místo na světové scéně!“"
 paraguay.12.a: "¡Adelante!"
