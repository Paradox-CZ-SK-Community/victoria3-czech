l_polish:
 party_pcb: "Komunistická strana Brazílie"
 royal_navy_loc: "Královské námořnictvo"
 adjective_navy_loc: "[SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFormatting('ee')] námořnictvo"
 je_aberdeen_act: "Obchod s otroky v jižním Atlantiku"
 je_aberdeen_act_reason: "Navzdory podpisu #bold britsko-brazilské smlouvy z roku 1826#!, v níž se [SCOPE.sCountry('brazil_scope').GetName] zavázala k zrušení afrického obchodu s otroky, vynaložily [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] úřady jen malé úsilí na jeho skutečné prosazení.\n\nMísto toho [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] otrokáři nadále každoročně převážejí přes Atlantik desítky tisíc afrických duší v řetězech, čímž znevažují dobré jméno a pověst Whitehallu.\n\nTo nemůže pokračovat. Tak či onak, [SCOPE.sCountry('brazil_scope').GetNameNoFlag] ustoupí."
 je_aberdeen_act_button: "Vynucovat Aberdeen Act"
 je_aberdeen_act_button_desc: "Pokud [SCOPE.sCountry('brazil_scope').GetCapital.GetCityHubName] odmítne jednat, budiž. Ukažme jim, jak si [SCOPE.GetRootScope.GetCountry.GetCustom('royal_navy_loc')] poradí s otrokáři."
 brazilian_slave_trade_modifier: "Nesplněné smluvní závazky"
 brazilian_slavery.1.t: "Poslední plavba Andorinhy"
 brazilian_slavery.1.d: "Jakmile je zákaz obchodu s otroky v [SCOPE.sCountry('brazil_scope').GetAltAdjectiveNoFlag('L')] nyní skutečně vynucován místními úřady, utrpěl obchod s otroky v jižním Atlantiku poslední smrtelnou ránu — z velké části díky neúnavnému úsilí [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')]."
 brazilian_slavery.1.f: "Posádko, do pozoru. Depeše dorazily dnes ráno.\nAberdeen Act již není v platnosti. Brazílie konečně ustoupila v otázce obchodu s otroky.\nOd této chvíle se můžeme vrátit k důležitějším záležitostem. Na oslavu dostanete dnes večer dvojnásobnou dávku rumu."
 brazilian_slavery.1.a: "Rule, Britannia! Britannia rules the waves!"
 brazilian_slavery.1.b: "Britové nikdy, nikdy, nikdy nebudou otroky."
 the_west_african_squadron_modifier: "Západoafrická stanice"
 champions_of_abolition_modifier: "Dědicové Wilberforce"
 anti_slavery_society_legacy: "Britská a zahraniční protiotrokářská společnost"
 brazilian_slavery.2.t: "[SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] otrokářská loď zadržena u [SCOPE.sState('slaver_coastal_state_scope').GetNameNoFormatting]"
 brazilian_slavery.2.d: "Po krátkém pronásledování válečná loď [SCOPE.GetRootScope.GetCountry.GetCustom('royal_navy_loc')] [SCOPE.GetRootScope.GetCountry.GetCustom('royal_navy_ship_names')] zajala [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] otrokářskou loď [SCOPE.GetRootScope.GetCountry.GetCustom('slaver_ship_names')]. V jejím podpalubí byly nalezeny stovky spoutaných afrických duší, určených pro trhy s otroky v [SCOPE.sState('enslaved_destination_state_scope').GetCityHubName]."
 brazilian_slavery.2.f: "„V manifestu stojí dobytek. Nevidím tu ani jednu krávu, kozu nebo slepici. Vy… jak to říct, příteli? Zdá se, že máte dobytek dvounohý a bohabojný.“\n\n„To je přesně to, co máme, pane. Mnohé kávové plantáže na tomto dobytku závisí.“\n\n„Sundejte jim okovy. A dejte jim trochu vzduchu, proboha. Alespoň než se rozhodnu, co s vámi, ‚farmáři kávy‘.“"
 brazilian_slavery.2.a: "Soudit posádku jako piráty, zabavit loď a osvobodit otroky."
 brazilian_slavery.2.b: "Osvobodit otroky, ale posádku i loď ponechat bez zásahu."
 approves_of_slave_hunting_modifier: "Schvaluje lov otrokářů"
 brazilian_slavery.3.t: "[SCOPE.sCountry('britain_scope').GetNameNoFormatting] zadržuje [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] otrokářskou loď"
 brazilian_slavery.3.d_1: "Loď převážející otroky pod brazilskou obchodní vlajkou byla zajata a zabavena [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')] u [SCOPE.sState('slaver_coastal_state_scope').GetName], loď byla odsouzena a její posádka souzena jako piráti u britského soudu."
 brazilian_slavery.3.d_2: "Loď převážející otroky pod brazilskou obchodní vlajkou byla zastavena [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')] u [SCOPE.sState('slaver_coastal_state_scope').GetName] a její lidský náklad byl zabaven a osvobozen."
 brazilian_slavery.3.f_1: "Každý bulletin, noviny i plátek v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], ať už abolicionistický či prootrokářský, hlásal totéž:\n\n#bold [SCOPE.sCountry('britain_scope').GetNameNoFormatting] si vynucuje právo silou na cizí lodi!#!\n\nKaždý námořník i důstojník byl souzen v cizině u soudu, kde neměl šanci uspět. A nyní každý, kdo profitoval z obchodu s otroky, volal po odškodnění, řešení a odplatě."
 brazilian_slavery.3.f_2: "Posádka lodi [SCOPE.GetRootScope.GetCountry.GetCustom('slaver_ship_names')] vystoupila na břeh. Zatímco většina byla ráda, že je zpět na brazilské půdě, několik z nich zamířilo do všech hospod v [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nDruhý den ráno hledali novou práci. Důvod byl stejný: nikdo z nich nechtěl střet s [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting]."
 brazilian_slavery.3.a: "Zrádný Albion."
 brazilian_slavery.3.b: "Věděli, jaká rizika taková plavba obnáší."
 slave_flow_disrupted_modifier: "Zadržená otrokářská loď"
 pursuing_end_of_slave_trade_modifier: "Vládní odpor proti obchodu s otroky"
 brazilian_slavery.4.t: "Otrokářská loď spatřena v [SCOPE.sCountry('brazil_scope').GetAltAdjectiveNoFormatting('yych')] vodách"
 brazilian_slavery.4.d: "Obávaná [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFlag] otrokářská loď [SCOPE.GetRootScope.GetCountry.GetCustom('slaver_ship_names')] byla spatřena válečnou lodí [SCOPE.GetRootScope.GetCountry.GetCustom('royal_navy_ship_names')] právě při vplouvání do [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] teritoriálních vod. Kapitán chce pokračovat v pronásledování, ale na palubě zaznívají hlasy varující před zjevným porušením vod [SCOPE.sCountry('brazil_scope').GetNameNoFormatting]."
 brazilian_slavery.4.f: "„Kapitáne, možná bychom to měli nechat být, co říkáte? Brzy budou ve svých vodách. Nestojí to za střet s celou jejich flotilou.“\n\n„No, je dobře, že vy jste mariňák a já kapitán. Plují těžce naložení a zatím jsem neviděl, že by na palubě splachovali zvířecí trus. A mají příliš mnoho zásob na to, aby šlo o dobytek. Dostihneme je brzy. Připravte muže na nalodění do hodiny.“\n\n„Ano, kapitáne. Dá-li Bůh, nebudeme se muset střetnout s více loděmi než s touhle.“"
 brazilian_slavery.4.a: "Zabavit ji. Brazilské vody jsou vodami nepřátelské mocnosti."
 brazilian_slavery.4.b: "Prozatím respektovat jejich vody. Nařídit kapitánovi stáhnout se."
 committed_abolitionists_modifier: "Oddaní abolicionisté"
 impotent_anti_slavery_squadron_modifier: "Neúčinná protiotrokářská eskadra"
 brazilian_slavery.5.t: "[SCOPE.sCountry('britain_scope').GetNameNoFormatting] zabavuje otrokářskou loď v [SCOPE.sCountry('brazil_scope').GetAltAdjectiveNoFormatting('yych')] vodách"
 brazilian_slavery.5.d: "Při pronásledování a zajetí otrokářské lodi pod [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] vlajkou u [SCOPE.sState('slaver_coastal_state_scope_2').GetName] porušila válečná loď [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')] územní svrchovanost [SCOPE.sCountry('brazil_scope').GetNameNoFormatting]. Plantážníci i občané jsou pobouřeni a požadují okamžitou reakci brazilské vlády."
 brazilian_slavery.5.f: "#bold Británie si vynucuje právo silou na suverénní lodi!#!\nV zvrácené demonstraci moci zabavila loď britského Královského námořnictva HMS [SCOPE.GetRootScope.GetCountry.GetCustom('royal_navy_ship_names')] obchodní plavidlo u pobřeží Brazílie. Toto šokující porušení imperiální svrchovanosti nemůže zůstat bez odezvy. Podle ustanovení tohoto nechutného zákona, Aberdeen Act, může jakákoli britská loď zatknout a soudit naše občany podle britského práva. Proč naše… (pokračování na str. 2)"
 brazilian_slavery.5.a: "Nejdřív zneuctí naši vlajku a teď i naše vody?"
 brazilian_slavery.5.b: "Zachřestit zbraněmi proti těm drzým Britům."
 weakness_in_the_face_of_albion_modifier: "Slabost tváří v tvář Albionu"
 brazilian_slavery.6.t: "Poslední plavba Andorinhy"
 brazilian_slavery.6.d: "S konečným zákazem a potlačením [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] obchodu s otroky pominul mandát — skutečný či domnělý — [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')] obtěžovat naše lodě, což výrazně zlepšilo diplomatické vztahy mezi naší zemí a [SCOPE.sCountry('britain_scope').GetNameNoFlag]."
 brazilian_slavery.6.f: "Pozor, námořníci. Náš velkorysý [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] a Cortes ratifikovali nový zákon zakazující dovoz nových otroků.\nDnes jsme dokázali, že jsme Británii ve všem rovnocenní. Proto již nemá právo chovat se k našim lodím jako k obětem školního tyrana.\nNa oslavu tohoto dne dostane každý muž dnes večer dvojnásobnou dávku rumu."
 brazilian_slavery.6.a: "Konec jedné éry."
 brazilian_slavery.6_tt: "Naše lodě již nebudou v době míru obtěžovány [SCOPE.sCountry('britain_scope').GetCustom('royal_navy_loc')]."
 golden_law_button: "Vyhlásit Zlatý zákon"
 golden_law_button_desc: "Pod vlivem širších mezinárodních trendů se v posledních letech mnoho členů brazilské vyšší společnosti přiklání k abolicionismu.\n\nPokud bude mít Brazílie #bold abolicionistickou#! nebo #bold humanitární#! postavu blízko moci, nebo pokud budou [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] dostatečně pod kontrolou, může být zrušení [concept_slavery] výrazně urychleno, i když za určitou cenu."
 golden_law_button_tt: "Okamžitě prosadí zákon [GetLawType('law_slavery_banned').GetName] za cenu rozhořčení všech prootrokářských [Concept('concept_interest_group', '$concept_interest_groups$')]."
 golden_law_button_tt_2: "[concept_enactment_phase] je větší nebo rovno #bold 1#!"
 outraged_over_golden_law_modifier: "Pobouření nad Zlatým zákonem"
 brazilian_slavery.7.t: "Zlatý zákon, zlatá růže"
 brazilian_slavery.7.d: "Ačkoli se „zvláštní instituce“ [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] mohla někdy zdát nedotknutelná, nyní lze tuto instituci konečně považovat za definitivně ukončenou. Její dopady budou nepochybně cítit po staletí, tento den však vyžaduje oslavu, neboť sám papež udělil [SCOPE.sCharacter('golden_rose_recipient_scope').GetFullName] zlatou růži na počest úspěchu [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 brazilian_slavery.7.f: "#bold Zlatá růže za zlatý čin#!\nSlunce vychází nad novým dnem v nyní svobodné Brazílii. Jak se zpráva dostala až do Říma a zpět, sám papež udělil [SCOPE.sCharacter('golden_rose_recipient_scope').GetFullNameNoFormatting] dva zlaté dary: čestný titul a jednu zlatou růži na památku #italic Lei Áurea#!. S koncem otroctví… (pokračování na str. 2)"
 brazilian_slavery.7.a: "Vpřed, od zlatého zákona ke zlatému věku."
 brazilian_slavery.7.b: "Jsme jeden národ, jeden lid."
 unfettered_pride_modifier: "Nespoutaná hrdost"
 less_racist_brazil_modifier: "Rasová harmonizace"
 old_order_upset_positive: "Abolicionistická avantgarda"
 old_order_upset_negative: "Narušení starého řádu"
 black_guard_male_modifier: "Černá garda Vykupitele"
 black_guard_female_modifier: "Černá garda Vykupitelky"
 brazilian_slavery.8.t: "Otroci odmítají pracovat v [SCOPE.sState('slave_plantation_state_scope').GetNameNoFormatting]"
 brazilian_slavery.8.d: "Skupina otroků pracujících na [SCOPE.sState('slave_plantation_state_scope').GetName] [SCOPE.sBuilding('slave_plantation_scope').GetName] uprchla ze svých pracovišť s odkazem na otřesné pracovní podmínky a špatné zacházení ze strany svého pána. Nabízejí návrat pouze za předpokladu záruk lepších podmínek."
 brazilian_slavery.8.f: "„Mezi dalšími podmínkami, které požadujeme před návratem do práce, je stanovení maximální kvóty pěti věder kávových zrn na osobu pro muže. Muži i ženy na poli mají být dozorováni osobami, které si sami zvolíme.\n\nDále požadujeme dva dny odpočinku, abychom mohli pěstovat více rýže a lovit ryby v blízké řece. Také žádáme, abyste méně vhodné práce, jako lov krabů a sběr mušlí, přidělili jiným otrokům z pobřeží.“"
 brazilian_slavery.8.a: "Nabídnout #italic určité#! ústupky, zboží musí proudit."
 brazilian_slavery.8.b: "Vyjednávání je výsadou svobodných. Zamítnuto."
 brazilian_slavery.8.c: "Na tom nezáleží, lze je nahradit."
 slave_shortages_modifier: "Dočasný nedostatek otroků"
 masters_upset_over_concessions: "Páni pobouřeni ústupky"
 unrestrained_masters: "Neomezení páni"
 brazilian_slavery.9.t: "Otroci podezřelí ze sabotáže"
 brazilian_slavery.9.d: "V [SCOPE.sState('slowdown_slave_plantation_state_scope').GetName] [SCOPE.sBuilding('slowdown_slave_plantation_scope').GetName] dochází k vážnému zpomalování práce, přičemž vedení viní z úmyslné sabotáže nespokojené otroky."
 brazilian_slavery.9.f: "Některé věci jsou mimo lidskou kontrolu: žár slunce, střídání ročních období a výnos rostlin. To, co lze ovlivnit — kvalita půdy a množství sklizně — však není zkoumáno tak přísně jako práce otroka.\nA tak, když tělo nevyhnutelně selže, dozorce sáhne po biči jako po jediné odpovědi."
 brazilian_slavery.9.a: "Výprasky budou pokračovat, dokud se morálka nezlepší."
 brazilian_slavery.9.b: "Nakonec se podřídí."
 brazilian_slavery.9.c: "Svobodná pracovní síla by byla motivovanější."
 plantation_slowdowns_slavery_modifier: "Zpomalení plantáží"
 widespread_slave_abuse: "Drakonické tresty pro otroky"
 brazilian_slavery.10.t: "Otroci utíkají z plantáží v [SCOPE.sState('escape_slave_plantation_state_scope').GetNameNoFormatting]"
 brazilian_slavery.10.d: "Z [SCOPE.sBuilding('escape_slave_plantation_scope').GetName] v [SCOPE.sState('escape_slave_plantation_state_scope').GetName] v poslední době mizí stále více otroků. Dozorci se domnívají, že uprchli do vnitrozemí do dosud neobjevených quilombů — komunit bývalých otroků mimo dosah zákona."
 brazilian_slavery.10.f: "„Senhor, chybí nám otroci. Sedm se nedostavilo ke sčítání. Nikdo je neviděl. Tři muži, dvě ženy a chlapec s dívkou.“\n\n„Je mezi nimi někdo důležitý? Maso je maso. Dá se nahradit.“\n\n„Jeden z nejsilnějších sběračů. A jedna žena byla oblíbená vaší paní. Mám svolat stopaře?“"
 brazilian_slavery.10.a: "Okamžitě svolat lovecké skupiny."
 brazilian_slavery.10.b: "Zavést „bezpečnostní opatření“, aby se to neopakovalo."
 brazilian_slavery.10.c: "Díky Bohu za trhy s otroky v [SCOPE.sState('escape_slave_plantation_state_scope').GetCityHubName]."
 disastrous_slave_hunt: "Katastrofální hon na otroky"
 quilombo_destroyed_modifier: "Quilombo zničeno"
 slave_purchases_modifier: "Nákup otroků"
 brazilian_slavery.13.t: "Zvláštní instituce"
 brazilian_slavery.13.d: "Po vítězství [SCOPE.GetRootScope.GetCountry.GetAltAdjective('ee')] otrokářské lobby je zákaz [GetLawType('law_slave_trade').GetName] formálně zrušen a tato již rozšířená praxe je právně zakotvena navzdory mezinárodnímu odporu."
 brazilian_slavery.13.f: "„Proč by zahraniční rozmary měly určovat brazilskou realitu? Pokud se [SCOPE.sCountry('anti_slavery_great_power_scope').GetNameNoFormatting] rozhodne, že jí otroctví nevyhovuje, budiž, ale znamená to automaticky, že totéž musí platit pro Brazílii? Jsme snad podřízeni zákonům [SCOPE.sCountry('anti_slavery_great_power_scope').GetAdjectiveNoFormatting] [SCOPE.sCountry('anti_slavery_great_power_scope').GetRuler.GetPrimaryRoleTitle|l], nebo zde stále vládne [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullNameNoFormatting]?“"
 brazilian_slavery.13.a: "Opět jsme pevně spojeni s otroctvím."
 brazil_slaving_pariah_modifier: "Obnovený africký cyklus"
 je_matter_of_slavery: "Otázka otroctví"
 je_matter_of_slavery_reason: "Stav #bold Ukazatele postupu#! bude určen různými #tooltippable;tooltip:[Country.GetTooltipTag],je_brazilian_slavery_tooltip_advance pozitivními#! nebo #tooltippable;tooltip:[Country.GetTooltipTag],je_brazilian_slavery_tooltip_deplete negativními#! podmínkami. Dosažení #bold 0#! u #bold Ukazatele postupu#! povede k oficiálnímu zrušení zákazu obchodu s otroky a dalšímu #bold upevnění#! této instituce v brazilském kulturním a politickém životě.\n\nOdpůrci ji označují za zhoubu ohrožující samotné základy [SCOPE.GetRootScope.GetCountry.GetNameNoFlag], zatímco její zastánci ji vyzdvihují jako přirozenou, nezbytnou a legitimní instituci — [concept_slavery] po staletí utvářelo politickou scénu [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting].\n\n#bold Obchod s otroky v jižním Atlantiku#!\nAčkoli se Brazílie oficiálně zavázala ukončit [GetLawType('law_slave_trade').GetName] v rámci #bold britsko-brazilské smlouvy z roku 1826#!, od té doby bylo učiněno jen málo kroků k jeho skutečnému prosazení a obchod fakticky nadále pokračuje.\n\nDokud Brazílie zachovává zákon [GetLawType('law_slave_trade').GetName] [concept_law], může se [SCOPE.sCountry('britain_scope').GetName] cítit oprávněna narušovat brazilská plavidla převážející otroky na volném moři."
 matter_of_slavery_progress_bar: "Otázka otroctví"
