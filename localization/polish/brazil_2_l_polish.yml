 brazilian_minors.1.t: "Gaučský pokřik"
 brazilian_minors.1.d: "Vítězství! Naše statečné jednotky nejenže porazily [SCOPE.sCountry('brazil_scope').GetAdjective] „caramurus“ na bojišti, ale také osvobodily naše [SCOPE.sCulture('sulista_culture_scope').GetName] bratry v [SCOPE.sCountry('santa_catarina_scope').GetName] z ubohého jha [SCOPE.sCountry('brazil_scope').GetCapital.GetName]."
 brazilian_minors.1.f: "Mezi trofejemi a suvenýry získanými v bitvě spatřil v blátě ležet pár hadrových panenek. Kapitán si k nim klekl.\nKdyž je otočil, poznal jejich podobu: muži rodu Bragança. Ti, komu patřily, byli už dávno pryč. Hodil je do nejbližšího ohně za jásotu svých mužů."
 brazilian_minors.1.a: "Ať žije „Svobodná a nezávislá“ republika Catarinense!"
 brazilian_minors.1.b: "Zasloužili si svobodu stejně jako my."
 brazilian_minors.1.c: "Současná situace bohužel nepřipouští idealismus."
 brazilian_minors.1.e: "Vpřed, do [SCOPE.sState('santa_catarina_state_scope').GetCityHubName]!"
 brazilian_minors.2.t: "Potlačení Cabanagemu"
 brazilian_minors.2.d: "Navzdory kapitulaci hlavní cabanské vlády v [SCOPE.sState('para_state_scope').GetCityHubName] pokračuje bezpočet povstalců v odporu proti naší vládě proti proudu. [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] armáda, zocelená lety brutálních bojů, zaujala mimořádně tvrdý postoj vůči povstaleckým skupinám, tvořeným především svobodnými bojovníky [SCOPE.sCulture('afro_brazilian_culture_scope').GetName] a [SCOPE.sCulture('amazonian_culture_scope').GetName]."
 brazilian_minors.2.f: "„Muži! Nemusím vám říkat, jak velké vítězství to je.\nAle sny vašich krásných žen a milovaných dětí musí počkat. Povstalec uprchl proti proudu a bude bojovat, dokud ho stáří nepřipraví o sílu. Naše nové rozkazy jsou jasné:\npokud se skryjí za stromy, spálíme je.\nPokud se ukryjí za vysokými zdmi bez opory, navršíme jejich mrtvé a vyšplháme po nich.\n\nNenechte kámen na kameni, trávu nepošlapanou. Ve jménu Boha a rodu Bragança, vpřed!“"
 brazilian_minors.2.a: "Žádné slitování se zrádci. Spalte tu chátru."
 crushing_the_cabaganem_modifier: "Vyčištění Amazonie"
 brazilian_minors.3.t: "Smlouva zeleného ponča"
 brazilian_minors.3.d: "Po porážce polní armády republiky Rio Grande navrhl generál [SCOPE.sCharacter('gaucho_amnesty_general_scope').GetFullName] udělení amnestie a rozsáhlých ústupků, aby se [SCOPE.sState('rio_grande_state_scope').GetName] znovu začlenil a předešlo se dlouhodobé partyzánské válce."
 brazilian_minors.3.f: "„Generále, moji muži bojovali tvrdě a statečně. Ale teď jsou to jen lidé. Nechceme se k sobě chovat jako Francouzi k britským zajatcům. A pokud musíte, dopřejte jim důstojnou smrt.“\n\n„Kdyby to bylo na mně, #italic coronel#!. Mohu jen slíbit, že promluvím s těmi, kdo je mohou ušetřit. Pokud mají rozum, uvidí to, co já: farmáře, obchodníky a řemeslníky.“"
 brazilian_minors.3.a: "Nabídnout ústupky, plnou amnestii a splacení válečných dluhů."
 brazilian_minors.3.b: "Kdyby chtěli shovívavost, měli se vzdát už v roce 1835."
 gaucho_amnesty_modifier: "Gaučská amnestie"
 paying_off_gaucho_war_debts_modifier: "Splacení válečných dluhů Rio Grande"
 gaucho_guerillas_modifier: "Gaučské guerilly"
 upgrade_amazon_button_1: "Rozvíjet amazonský stát"
 upgrade_amazon_button_1_desc: "Bohaté amazonské lesy jsou nevyužitým zdrojem bohatství. Je naší povinností tyto oblasti rozvíjet pro dobro národa a naši budoucí prosperitu."
 amazon_1_cooldown_tt: "Rozhodnutí #bold Rozvíjet amazonský stát#! nebylo použito v posledním #bold roce#!"
 upgrade_amazon_button_2: "Využít amazonský stát"
 upgrade_amazon_button_2_desc: "Lesy, ač zkrocené, stále skrývají své největší poklady. Abychom plně využili potenciál Amazonie, musíme tuto zemi využívat ještě intenzivněji."
 amazon_2_cooldown_tt: "Rozhodnutí #bold Využít amazonský stát#! nebylo použito v posledním #bold roce#!"
 amazon_border_treaty_button_1: "Podepsat smlouvu z Ayacucha"
 amazon_border_treaty_button_1_desc: "Západní amazonské hranice [SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFlag('G')] dlouhodobě trpí nejasným vymezením, což vede k zbytečným sporům a osadám s nejasnou jurisdikcí.\n\nKomplexní hraniční smlouva s naším amazonským sousedem by tento problém vyřešila. Samozřejmě ve prospěch [SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFormatting('G')]."
 amazon_border_treaty_button_2: "Podepsat smlouvu z Bogoty"
 amazon_border_treaty_button_2_desc: "Severní amazonské hranice [SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFlag('G')] jsou vágní a otevřené zneužívání cizími státy i bandity. Jasně vymezené hranice a dohody se sousedy by výrazně posílily naši bezpečnost a přinesly řád do této pohraniční oblasti.\n\nJedna rozsáhlá smlouva by tento problém elegantně vyřešila pro [SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFormatting('A')]."
 je_amazonas: "Využití Amazonie"
 je_amazonas_reason: "Ačkoli jsou nám [SCOPE.sGoods('rubber_scope').GetName] a jeho vlastnosti známy již dlouho, jeho využití bylo tradičně omezené, a tudíž i komerční poptávka nízká. S #bold průmyslovou revolucí#! v plném proudu a novými způsoby využití [SCOPE.sGoods('rubber_scope').GetNameNoFormatting], které vznikají každým týdnem, však volání po zvýšení produkce prudce vzrostlo.\n\nJe nutné podniknout kroky k přeměně Amazonie z nehostinné džungle na intenzivně rozvinutou oblast schopnou uspokojit požadavky obchodu."
 je_amazonas_tt: "Všechny amazonské [Concept('concept_state','$concept_states$')] produkující kaučuk musí mít svůj #bold státní rys#! vylepšen na #bold Využitý amazonský prales#!."
 amazon_development_cooldown_modifier: "Zkrocení Amazonie"
 amazonas.1.t: "Zkrocení Amazonie"
 amazonas.1.d: "V současnosti vlastníme rozsáhlé plochy nedotčené a nevyužité amazonské krajiny. Zatímco někteří obdivují její divokou krásu, jiní v ní vidí pouze nezkrocené pohraničí překypující [SCOPE.sGoods('rubber_scope').GetName] — toužící po jemném doteku pokroku a kapitálu."
 amazonas.1.f: "„Zapište si toto: stojíme na okraji něčeho, co by mohlo být samotnými plícemi této planety. Hrozivé divy, které se v ní skrývají, jsou naše — k obdivu, dobytí i podrobení. Tak jako Temná Afrika podlehla—“\n\n„Eh, pane, myslím, že jsem zapomněl pero. Možná bych to mohl nadiktovat po návratu do tábora?“\n\n„Imbécile. Bah, vezměte si moje. A začněte znovu, a nepřerušujte!“"
 amazonas.1.a: "Štěstí přeje odvážným..."
 amazonas.1.tt: "... a plivne na zbabělce."
 amazonas.2.t: "Smlouva z Ayacucha"
 amazonas.2.d: "Po intenzivních jednáních bylo dosaženo dohody mezi [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] a [SCOPE.sCountry('bolivia_border_treaty_country_scope').GetAdjective] delegacemi, která vymezuje hranici mezi našimi zeměmi v [SCOPE.sState('amazonas_state_scope').GetName] a vede k postoupení rozsáhlých území [SCOPE.GetRootScope.GetCountry.GetNameNoFlag]."
 amazonas.2.f: "A posledním tahem pera se smlouva stala závaznou a pevnou. Nové mapy byly zadány tak rychle, jak jen mohly [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] a [SCOPE.sCountry('bolivia_border_treaty_country_scope').GetAdjectiveNoFormatting] vlády vydávat příkazy. Nová hranice byla vytyčena podél povodí Amazonky.\n\nSamozřejmě, ačkoli se shodli teoreticky, nikdo přesně nevěděl, #italic kde#! povodí Amazonky začíná. To bude na místních úřadech. Snad zvítězí zdravý rozum."
 amazonas.2.a: "Ve jménu Svaté trojice, podepsat."
 amazonic_indemnities_brazil_1: "Odškodnění ze smlouvy z Ayacucha"
 amazonic_indemnities_recipient_1: "Odškodnění ze smlouvy z Ayacucha"
 amazonas.3.t: "Smlouva z Bogoty"
 amazonas.3.d: "Po intenzivních jednáních bylo dosaženo dohody mezi [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] a [SCOPE.sCountry('colombia_border_treaty_country_scope').GetAdjective] delegacemi, která vymezuje hranici mezi našimi zeměmi v [SCOPE.sState('amazonas_state_scope').GetName] a vede k postoupení rozsáhlých území [SCOPE.GetRootScope.GetCountry.GetNameNoFlag]."
 amazonas.3.f: "„Jižně od Tabatingy a přes Javari. Na severu pak soutok řek Apaporis a Japurá. Je to férová dohoda, pane velvyslanče.“\n\n„A co ta pohraniční města? Snad netvrdíte, že mluvíte za dvě země najednou? To by byla katastrofa, kterou nikdo nepotřebuje.“\n\n„Ale ovšem! Nikdy bych si nedovolil mluvit za jiného. Ale možná by to byl váš další nejmoudřejší krok, nemyslíte?“"
 amazonas.3.a: "Ve jménu Svaté trojice, podepsat."
 amazonic_indemnities_brazil_2: "Odškodnění ze smlouvy z Bogoty"
 amazonic_indemnities_recipient_2: "Odškodnění ze smlouvy z Bogoty"
 amazonas.4.t: "Manaus, srdce Amazonie"
 amazonas.4.d: "Město [SCOPE.sState('amazonas_state_scope').GetCityHubName] v [SCOPE.sState('amazonas_state_scope').GetName] se díky ziskům z rozvíjejícího se odvětví [SCOPE.sGoods('rubber_scope').GetName] stalo významným obchodním centrem s vybavením a infrastrukturou dosud v deštném pralese nevídanou."
 amazonas.4.f: "#bold Míza roztáčí svět [SCOPE.sState('amazonas_state_scope').GetCityHubName]#!\nRostoucí obchod s kaučukem, získávaným přímo ze stromů amazonského pralesa, poskytl [SCOPE.sState('amazonas_state_scope').GetCityHubName] stabilní ekonomickou oporu. Zatímco káva a mléko dominují jiným částem [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting], využitelnost kaučuku umožnila rozkvět dalších odvětví. Ševci, výrobci nástrojů i nemocnice dosahují nových zázraků s touto lepkavou látkou... (pokračování str. 68–69)"
 amazonas.4.a: "Stane se základem našeho [SCOPE.sGoods('rubber_scope').GetNameNoFormatting] impéria..."
 amazonas.4.b: "... a tropickou metropolí #italic sans pareil#!."
 rubber_hub_modifier: "Kaučukový přístav Manaus"
 mercado_adolpho_lisboa_modifier: "Mercado Adolpho Lisboa"
 rubber_baron_palaces_modifier: "Paláce kaučukových baronů"
 amazonas.5.t: "Manaus, Paříž tropů"
 amazonas.5.d: "Město [SCOPE.sState('amazonas_state_scope').GetCityHubName], ležící v srdci kdysi nehostinné džungle, se hemží pohádkově bohatými kaučukovými barony a stalo se stejně velkolepým a okázalým jako kterékoliv evropské město. Nové prestižní stavby vznikají téměř každý týden."
 amazonas.5.f: "V [SCOPE.sState('amazonas_state_scope').GetCityHubName] nechybí žádný luxus. Kaučukoví baroni jsou soutěživí a každá nová móda či výstřelek se mění v závod v přepychu. Při procházce ulicemi by si člověk téměř mohl myslet, že je v Paříži — nebýt toho horka."
 amazonas.5.a: "„Mám jeden sen: operu. Velkou operu v džungli!“"
 amazonas.5.b: "Co by byla tropická Paříž bez světel?"
 amazonic_city_of_lights_modifier: "Tropické město světel"
 amazonas.6.t: "Výspa pokroku"
 amazonas.6.d: "Uprostřed deštných pralesů [SCOPE.sState('amazon_development_level_one_state_scope').GetName] se dříve ospalá vesnice [SCOPE.sState('amazon_development_level_one_state_scope').GetCityHubName] rozrostla v hlavní centrum těžby a přepravy [SCOPE.sGoods('rubber_scope').GetName]."
 amazonas.6.f: "„Teď spát. Slunce zapadá. Ty i tvůj otec budete zítra potřebovat sílu na lov.“\n\n„Ale já jsem Señor Ramirez a stále mu poroučím—“\n\n„To jméno už nikdy nevyslovuj, chlapče. Nikdy. Nepřiváděj sem ty lidi… pokud vůbec ještě nějací zůstali.“"
 amazonas.6.a: "... a kaučukoví ‚baroni‘ potřebují více pracovní síly."
 amazonas.6.b: "Jejich obchodní důvtip zajistí rozkvět [SCOPE.sState('amazon_development_level_one_state_scope').GetCityHubName]."
 rubber_entrepot_modifier: "Kaučukový překladiště"
 rubber_barons_modifier: "Noví kaučukoví baroni"
 amazonas.7.t: "Perly v hrubém"
 amazonas.7.d: "Jako perly na niti se nyní podél železničních a říčních sítí [SCOPE.sState('amazon_development_level_two_state_scope').GetName] řadí města a překladiště [SCOPE.sGoods('rubber_scope').GetName], která přinášejí do džungle planoucí pochodeň civilizace výměnou za její bohatství."
 amazonas.7.f: "„Tentokrát jste si vzal pero? Ano, zapisujte vše. Eh… Amazonie, jak jsem předpověděl, se podvolila stejně jako kdysi Temná Afrika. Nic z kůry ani z lávy nezastaví kola pokroku. V této mocné— Proboha, ptal jsem se vás na pero? Ne, tohle #bold nepište#!! Přestaňte!“"
 amazonas.7.a: "Jsme předzvěstí řádu..."
 amazonas.7.b: "... a hlasateli pokroku."
 harbingers_of_order_modifier: "Předzvěsti řádu"
 heralds_of_progress_modifier: "Hlasatelé pokroku"
 amazonas.8.t: "Krok za krokem"
 amazonas.8.d: "Kaučukoví baroni, místní úřady i část [SCOPE.gsInterestGroup('devout_scope').GetName] se neshodují na tom, jak nejlépe formovat [SCOPE.sCulture('amazonian_culture_scope').GetName] obyvatelstvo v [SCOPE.sState('amazon_indian_exploitation_state').GetName]. Každý argument je však zakořeněn ve vlastním zájmu."
 amazonas.8.f: "Ruce jejího muže i syna byly zčervenalé. Kněží a jeptišky bili chlapce holí za tanec v chodbách a vyprávění starých příběhů. Dozorcové patrona věřili, že muž falšoval kaučuk, který sbíral. Pokud by je muži s biči neudřeli k smrti, pomyslela si, pak by jim muži jediného Boha zničili duši."
 amazonas.8.a: "Vzdělání je rozptýlení, jejich ruce jsou určeny k práci, ne k psaní."
 amazonas.8.b: "Ještě z nich uděláme [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]y."
