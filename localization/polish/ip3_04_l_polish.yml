 shelved_too_soon_ago_tt: "Tento návrh jsme #b nedávno#! neodložili"
 je_danubian_federation: "Federální řešení"
 je_danubian_federation_reason: "Tření mezi nesčetnými národnostmi země [ROOT.GetCountry.GetName] je již dlouho hrozbou pro celistvost říše. Zastánci práv různých národností již dlouho volají po různých formách federalizace říše a v posledních letech se dostali do styku s členy [SCOPE.gsInterestGroup('armed_forces_ig').GetName], kteří mají zájem o radikální reformu ve jménu zachování dynastie. Navrhované #b $dyn_c_usga$#!, nejnovější z těchto návrhů, by zrušilo staré korunní země a nahradilo je souborem samosprávných států vymezených podle etnických hranic.\n\nTento návrh narazil na odpor [GetCulture('hungarian').GetName] politiků, kteří odmítají navrhované rozdělení historického Maďarska, stejně jako [GetCulture('south_german').GetName] obyvatel, kteří by se pravděpodobně stali menšinami v neněmeckých státech."
 austria_federation.1.t: "[SelectLocalization(SCOPE.sCharacter('relevant_character').IsValid, SCOPE.sCharacter('relevant_character').GetLastName, 'Federální')] návrh"
 austria_federation.1.d: "[SCOPE.sCharacter('relevant_character').GetFullName], [SCOPE.sCharacter('relevant_character').GetCulture.GetName] zastánce národnostních práv, předložil návrh na reorganizaci říše na federální, mnohonárodnostní stát. [SCOPE.sCharacter('relevant_character').GetHerHis|U] návrh si získal oblibu mezi podobně smýšlejícími spolupracovníky [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 austria_federation.1.d_mil: "[SCOPE.sCharacter('relevant_character').GetFullName], vlivná osobnost v rámci [SCOPE.sCharacter('relevant_character').GetInterestGroup.GetName], předložil návrh na obnovu autority [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] prostřednictvím federalizace říše. [SCOPE.sCharacter('relevant_character').GetHerHis|U] návrh si získal oblibu mezi podobně smýšlejícími členy dvora."
 austria_federation.1.f: "„Z tohoto hlediska tedy nejde o otázku „zániku“, nýbrž o reorganizaci, o znovuzrození země [ROOT.GetCountry.GetNameNoFormatting]. Kéž by si všichni, jimž na této říši upřímně záleží, dokázali i ve své temné touze plně uvědomit správnou cestu vpřed. Zaprvé není pravda, že právo na existenci mají pouze nezávislé národní státy. $SWI$, často a právem uváděný příklad, je typem smíšeně národního politického útvaru a nikdo rozumný by mu nechtěl upírat právo na existenci. V naší říši ve skutečnosti historický proces pouze zápasí o moderní podobu vztahů mezi národem a státem, která odpovídá jeho nově probuzeným potřebám.“\n\n— Aurel Popovici, #italic Spojené státy Velkého Rakouska#!"
 austria_federation.1.a: "To je reforma, kterou [ROOT.GetCountry.GetNameNoFormatting] potřebuje."
 austria_federation.1.b: "Nemůžeme doufat, že to nyní zvládneme."
 modifier_endorse_popovici_proposal: "Podpořený návrh"
 modifier_shelve_popovici_proposal: "Odložený návrh"
 austria_federation.2.t: "Jiný směr"
 austria_federation.2.d: "Vyhlášení země [ROOT.GetCountry.GetName] ustanovilo anárodní unii jako pevnou alternativu k převládajícímu modelu národního státu. Zatímco jiní mohou čerpat legitimitu ze společné krve, my budeme čerpat sílu z dynastie a rozmanitosti našich národů."
 austria_federation.2.f: "„Radosti, ty jiskro boží,\ndcero, již nám ráj dal sám!\nSrdce vzňaté žárem touží,\nnebeský tvůj krásy chrám.\n\nKouzlo tvé teď opět váže,\nco kdy čas tak dělil rád,\nzástup lidstva sbratřen blíže\ncítí van tvých křídel vát.“\n\n— Friedrich Schiller, „Óda na radost“" 
 austria_federation.2.a: "Říše sjednocuje všechny své národy."
 austria_federation.2.b: "Třikrát sláva císaři lidu!"
 austria_federation.3.t: "Česká otázka"
 austria_federation.3.desc: "Země bývalé Koruny české byly po stovky let obývány jak [SCOPE.sCulture('czech_culture').GetName], tak [GetCulture('south_german').GetName] obyvatelstvem. Má-li být v rámci federace vytvořen [GetCulture('czech').GetNameNoFormatting] stát, je třeba vyřešit otázku českých a moravských Němců."
 austria_federation.3.f: "„Proč ta mapa vypadá takhle? Má zvláštní tvar, nemyslíte?“\n\n„Češi je sem pozvali před nějakými sto lety. Tehdy nezáleželo na tom, zda je člověk Němec nebo Čech, všichni si byli rovni pod Bohem a králem. Podle mě by za to obě strany měly vinit protestanty.“"
 austria_federation.3.a: "Čeští a moravští Němci musí mít své státy."
 austria_federation.3.b: "Čechy budou sjednoceny, s Němci jako rovnoprávnými občany."
 austria_federation.3.c: "Pokud mohou mít Němci autonomii, Češi mohou mít Slovensko."
 austria_federation.3.d: "Československo bude sjednoceno bez jakýchkoli výhrad."
 austria_federation.4.t: "Osud Slovenska"
 austria_federation.4.desc: "Země obývané [SCOPE.sCulture('slovak_culture').GetName] lidem byly dlouho spjaty s Maďarskem. Už jen uvažovat o oddělení [SelectLocalization(SCOPE.sState('slovakia_state').IsValid, SCOPE.sState('slovakia_state').GetName, 'STATE_SLOVAKIA')] od Maďarska jistě rozhněvá [GetCulture('hungarian').GetName] nacionalisty, avšak může zajistit důvěryhodnost našeho projektu u ostatních západoslovanských národů."
 austria_federation.4.f: "„Bylo to maďarské hlavní město. V této věci byste měli opravdu postupovat opatrně.“\n\n„A žádali Slováci, aby bylo maďarským hlavním městem? Proč by měli být kvůli Maďarsku znevýhodněni? Měli bychom brát v úvahu názory těch, kteří v té oblasti žijí, a jen jejich. Už mám realpolitiky plné zuby.“"
 austria_federation.4.a: "Zorganizovat [SCOPE.sCulture('slovak_culture').GetName] stát."
 austria_federation.4.b: "Podmínit [SCOPE.sCulture('slovak_culture').GetName] stát autonomií pro spišské Němce."
 austria_federation.4.c: "Slovensko zůstane součástí Maďarska."
 austria_federation.4.d: "Podpořit společný stát Čechů a Slováků."
 austria_federation.5.t: "Budoucnost Haliče"
 austria_federation.5.desc: "Oblast Haliče představuje kořist země [ROOT.GetCountry.GetNameNoFlag] z dělení Polska. Ačkoli území tradičně ovládali [SCOPE.sCulture('polish_culture').GetName] aristokraté, velká část jeho východu má [GetCulture('ukrainian').GetName] většinu. Abychom si zajistili [SCOPE.sCulture('polish_culture').GetNameNoFormatting] podporu, musíme zařídit příznivé rozdělení."
 austria_federation.5.f: "„Co myslíte? Kde nakreslíme hranici?“\n\n„Rusíni mají nižší očekávání než Poláci. Čisté oddělení východu od západu je potěší, ale rozhněvá Poláky, kteří přirozeně očekávají víc. Předejte Lemberg Polákům a Rusíni nám možná budou stále ochotni vyjít vstříc výměnou za nějaký jiný ústupek. Nezávidím vám váš úkol, ale dost možná se ukáže jako proveditelný.“"
 austria_federation.5.a: "Omezit [GetCulture('polish').GetName] stát na západní Halič."
 austria_federation.5.b: "Rozdělit Halič, s Lvovem pod [GetCulture('polish').GetName] správou."
 austria_federation.5.c: "Ponechat celou Halič jako [GetCulture('polish').GetName] stát."
 austria_federation.6.t: "Rozdělení Maďarska"
 austria_federation.6.desc: "Tradiční hranice Maďarska zahrnují mnoho rozsáhlých ne-[SCOPE.sCulture('hungarian_culture').GetName] oblastí. Musíme se rozhodnout, zda si [SCOPE.sCulture('hungarian_culture').GetName] lid usmíříme, nebo Maďarsko rozdělíme a vyvoláme [SCOPE.sCulture('hungarian_culture').GetNameNoFormatting] odpor vůči federálnímu projektu."
 austria_federation.6.desc_dual: "[SCOPE.sCulture('hungarian_culture').GetName] národ byl dlouho rovnocennou polovinou naší říše a vládl v podstatě bez omezení nad velmi rozmanitým územím. Musíme se rozhodnout, zda si usmíříme zemi [SCOPE.sCountry('hungary_scope').GetNameNoFlag], nebo jejím národnostem udělíme vlastní státy a vyvoláme [SCOPE.sCulture('hungarian_culture').GetNameNoFormatting] reakci."
 austria_federation.6.f: "„Často se obávám, že tento plán je neproveditelný. Nevzbouří se Maďaři?“\n\n„Čínského generála zdrží déšť a on se zeptá svého pobočníka, jaký je trest za zpoždění. „Smrt,“ odpoví. A pak se zeptal na trest za vzpouru - samozřejmě tentýž. A tak padla dynastie. Situace, kterou máme s Maďary, je úplně stejná. Pokud se vzbouří kvůli nejmenšímu ústupku, proč bychom neměli prosadit ten největší?“"
 austria_federation.6.a: "Zachovat historické Maďarsko v rámci federace."
 austria_federation.6.b: "[GetCulture('hungarian').GetCustom('getPluralDemonym')] se musí vzdát pouze Slovenska."
 austria_federation.6.c: "Oddělit Chorvatsko a Sedmihradsko od Maďarska."
 austria_federation.6.d: "Omezit Maďarsko na země s maďarskou většinou."
 austria_federation.7.t: "Slovinské země"
 austria_federation.7.desc: "[SCOPE.sCulture('slovene_culture').GetName] lid, soustředěný převážně v oblasti [SCOPE.sState('slovenia_scope').GetName], je jednou z několika jihoslovanských národností naší říše. Musíme zvážit, zda bude [SCOPE.sCulture('slovene_culture').GetName] stát jedním z mnoha jihoslovanských států, nebo zda bude uveden do unie s jinými, podobnými národy."
 austria_federation.7.desc_istria: "[SCOPE.sCulture('slovene_culture').GetName] nároky na [SelectLocalization(SCOPE.sState('istria_scope').IsValid, SCOPE.sState('istria_scope').GetName, 'STATE_ISTRIA')] na jihu naší říše se střetávají s nároky [GetCulture('croat').GetName] i [GetCulture('north_italian').GetName] lidu. Navíc vyvstává otázka, zda bude [SCOPE.sCulture('slovene_culture').GetName] stát jedním z mnoha jihoslovanských států, nebo zda bude uveden do unie s jinými, podobnými národy."
 austria_federation.7.f: "„Když se teď podíváte na pobřeží, uvidíte, že jih je převážně chorvatský a sever italský. Slovinská část je někde uprostřed. Je to trochu uzel, ale myslím, že ho dokážeme rozmotat ještě před obědem. Sistiana je dost dobrý přístav, ne?“"
 austria_federation.7.a: "Slovinský stát bude sahat až k moři."
 austria_federation.7.b1: "Upřednostnit chorvatské a italské nároky na [SelectLocalization(SCOPE.sState('istria_scope').IsValid, SCOPE.sState('istria_scope').GetName, 'STATE_ISTRIA')]."
 austria_federation.7.b2: "Vytvořit slovinský stát v [SCOPE.sState('slovenia_scope').GetName]."
 austria_federation.7.c: "V naší říši už je slovanských států dost."
 austria_federation.7.d: "Udělit slovinsko-chorvatskou unii bez německých a italských zemí."
 austria_federation.7.e: "Podpořit stát pro všechny jižní Slovany v rámci federace."
 austria_federation.8.t: "Trojí monarchie"
 austria_federation.8.desc: "Korunní země obývané [SCOPE.sCulture('croat_culture').GetName] lidem byly od našeho získání někdejších benátských území rozděleny mezi jurisdikci země [ROOT.GetCountry.GetNameNoFlag] a [GetCulture('hungarian').GetName]. Chceme-li uspokojit [SCOPE.sCulture('croat_culture').GetCustom('getPluralDemonym')], musíme sjednotit všechny [SCOPE.sCulture('croat_culture').GetNameNoFormatting] lidi pod [SCOPE.sCulture('croat_culture').GetNameNoFormatting] státem."
 austria_federation.8.desc_triune: "Ustavení země [SelectLocalization(SCOPE.sCountry('croatia_scope').IsValid, SCOPE.sCountry('croatia_scope').GetName, 'CRO')] uspokojilo dlouhodobý [SCOPE.sCulture('croat_culture').GetName] požadavek na sjednocení jejich lidu pod jedním politickým útvarem. Nyní musíme zvážit, zda bude [SCOPE.sCulture('croat_culture').GetName] stát jedním z mnoha jihoslovanských států, nebo zda bude uveden do unie s jinými, podobnými národy."
 austria_federation.8.f: "Otázka jižních Slovanů byla dost složitá na to, aby člověku přivodila vřed. Maďarsko bylo [ROOT.GetCountry.GetCapital.GetCityHubName] trnem v oku už dost dlouho na to, aby se zeměměřič zdráhal navrhnout další mocnou správu. Ale vyhlídka na Ilýrii, která by byla mocná a neochvějně loajální... možná. Možná, pokud by všechno vyšlo naprosto přesně."
 austria_federation.8.a: "Omezit chorvatský stát na [ROOT.GetCountry.GetAdjective] Chorvatsko."
 austria_federation.8.b: "Zachovat stávající Trojí monarchii v rámci federace."
 austria_federation.8.c: "Sjednotit chorvatské země pod Trojí monarchií."
 austria_federation.8.d: "Zorganizovat unii mezi slovinskými a chorvatskými zeměmi."
 austria_federation.8.e: "Podpořit stát pro všechny jižní Slovany v rámci federace."
 austria_federation.9.t: "Za lesem"
 austria_federation.9.desc: "Korunní země obývané [SCOPE.sCulture('romanian_culture').GetName] patří k nejrozmanitějším v naší říši. Ustavení jakéhokoli [SCOPE.sCulture('romanian_culture').GetNameNoFormatting] území zcela jistě znepokojí [GetCulture('hungarian').GetName] nacionalisty a rozptýlené skupiny [GetCulture('south_german').GetName] lidí v celém regionu se obávají o autonomii."
 austria_federation.9.f: "„Budeme zde potřebovat alespoň tři autonomie. Možná i víc. Odkud se tu všichni ti Němci vzali?“\n\n„Usadili jsme je sem - poměrně nedávno, po poslední válce s Turky. Zdá se, že se nám ještě naposledy vracejí jako přízrak.“"
 austria_federation.9.a: "Udělit rumunskému státu Banát a celé Sedmihradsko."
 austria_federation.9.b: "Udělit rumunskému státu vše kromě Sikulské země."
 austria_federation.9.c: "Sedmihradsko je rumunské, ale Banát je německý."
 austria_federation.9.d: "Omezit rumunský stát na jih Sedmihradska."
 austria_federation.9.e: "Celé Sedmihradsko je neodvolatelně maďarské."
 austria_federation.10.t: "Západní okraj"
 austria_federation.10.desc: "Nacionalistické proudy ženoucí se Apeninským poloostrovem nás již připravily o velkou část našich italských území. Má-li být zajištěna podpora zbývající [SCOPE.sCulture('north_italian_culture').GetName] populace, musí být vyřešeny přetrvávající spory mezi italskými, [GetCulture('slovene').GetName] a [GetCulture('south_german').GetName] územími."
 austria_federation.10.desc_lomven: "[SCOPE.sCulture('north_italian_culture').GetName] lid je jednou z nejvlivnějších národností v říši díky populaci a hospodářské síle italských korunních zemí. Má-li být jejich podpora federalizaci zajištěna, musí být vyřešeny přetrvávající spory mezi italskými, [GetCulture('slovene').GetName] a [GetCulture('south_german').GetName] územími."
 austria_federation.10.f: "„Dostal jsem dopis od námořnictva. Žádají mě, abych byl k Italům velkorysý, kvůli počtům rekrutů.“\n\n„To mě nepřekvapuje. Je to docela italská instituce.“\n\n„Dostal jsem také dopis z Palerma. Ten mě žádá, abych... nu, tady to opakovat nebudu.“\n\n„Nerad to říkám, ale to je ještě italštější.“"
 austria_federation.10.a: "Trento i Terst budou italské."
 austria_federation.10.b: "Trento bude italské, ale Terst slovanský."
 austria_federation.10.c: "Terst sám o sobě stačí."
 austria_federation.10.d: "Lombardsko-Benátsko je dostatečným zastoupením."
 austria_federation.10.e: "Takto nepatrné populace si nezaslouží vlastní státy."
 austria_federation.11.t: "Pohraničí"
 austria_federation.11.desc: "[SCOPE.sCulture('ukrainian_culture').GetName] populace v [SelectLocalization(SCOPE.sState('east_galicia_state').IsValid, SCOPE.sState('east_galicia_state').GetName, 'STATE_EAST_GALICIA')] byla od dob Republiky obou národů ovládána [GetCulture('polish').GetName] elitami. Převážně [GetCulture('polish').GetNameNoFormatting] populace města [SelectLocalization(SCOPE.sState('east_galicia_state').IsValid, SCOPE.sState('east_galicia_state').GetCityHubName, 'HUB_NAME_STATE_EAST_GALICIA_city_polish')] požádala o autonomii pod [GetCulture('polish').GetNameNoFormatting] státem. Přijetí by uspokojilo [GetCulture('polish').GetCustom('getPluralDemonym')], ale připravilo by [SCOPE.sCulture('ukrainian_culture').GetNameNoFormatting] stát o životně důležitý hospodářský motor."
 austria_federation.11.f: "„Halič? Tam je zvláštní dynamika. Aristokraté [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nenávidí, ale rolníci [ROOT.GetCountry.GetRuler.GetHerHim] zbožňují. Když se aristokraté - většinou Poláci - naposledy pokusili o vzpouru, rolníci vtrhli do jejich sídel a pověsili je. Byli jsme nuceni poslat armádu, aby ochránila rádoby rebely. Kdybyste se ptali mě, řekl bych, že Rusíni si tím svůj stát zasloužili hned tehdy a tam.“"
 austria_federation.11.a: "Udělit ukrajinskému státu celou východní Halič."
 austria_federation.11.b: "Vytvořit ukrajinský stát ve východní Haliči, s Lvovem pod polskou správou."
 austria_federation.11.c: "Nabídnout Ukrajincům Bukovinu výměnou za polský Lvov."
 austria_federation.11.d: "Celá Halič je polským územím."
 austria_federation.12.t: "Srbové z [SelectLocalization(SCOPE.sState('vojvodina_state').IsValid, SCOPE.sState('vojvodina_state').GetName, 'STATE_DELVIDEK_serbian')]"
 austria_federation.12.desc: "Stát [SCOPE.sState('vojvodina_state').GetName] dlouho sloužil jako centrum [SCOPE.sCulture('serb_culture').GetName] kultury. [SCOPE.sCulture('serb_culture').GetNameNoFormatting] populace regionu požádala o vytvoření [SCOPE.sCulture('serb_culture').GetNameNoFormatting] státu s hlavním městem v [SCOPE.sState('vojvodina_state').GetCityHubName]. Návrh narazil na odpor místních [GetCulture('hungarian').GetName] a [GetCulture('south_german').GetName] komunit."
 austria_federation.12.f: "„Až ten návrh zveřejníte, pamatujte, že Újvidék tomu říkají jen Maďaři. Všichni ostatní tomu říkají Novi Sad. Pro nás Neusatz.“\n\nZeměměřič jméno přeškrtl. „Dost nepřehledný region, nemyslíte?“\n\n„Víc, než si dokážete představit. Kdysi tomu městu říkali srbské Athény - pokud rozhodneme v jejich prospěch, může jimi být znovu.“"
 austria_federation.12.a: "Oddělit [SCOPE.sState('vojvodina_state').GetNameNoFormatting] od Maďarska jako srbský stát."
 austria_federation.12.b: "[SCOPE.sState('vojvodina_state').GetNameNoFormatting] musí zůstat v rámci Maďarska."
 austria_federation.12.c: "Podpořit stát pro všechny jižní Slovany v rámci federace."
 croats_are_fine_tt: "Protože byla ustavena #b Trojí monarchie#!: #indent_newline:3 \n• [GetCulture('croat').GetName] #b nebudou#! [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z budoucího [Concept('concept_integrated_culture','$concept_integrated_culture_process$')]#!"
 because_hungarian_anger_is_low_tt: "Protože #b maďarská#! [concept_liberty_desire] nebo [Concept('concept_radical', '$concept_radicalism$')] je nízká: #indent_newline:3 \n• [GetCulture('hungarian').GetName] #b nebudou#! [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z budoucího [Concept('concept_integrated_culture','$concept_integrated_culture_process$')]"
 because_hungarian_anger_is_high_tt: "Protože #b maďarská#! [concept_liberty_desire] nebo [Concept('concept_radical', '$concept_radicalism$')] je vysoká: #indent_newline:3 \n• [GetCulture('hungarian').GetName] budou [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z budoucího [Concept('concept_integrated_culture','$concept_integrated_culture_process$')]\n• [GetPlayer.MakeScope.ScriptValue('small_radicals')|-=1%] [GetCulture('hungarian').GetName] [Concept('concept_pop', '$concept_pops$')] v zemi [ROOT.GetCountry.GetNameNoFlag] a jejích nemaďarských [concept_personal_union] a [concept_crown_land] [Concept('concept_subject', '$concept_subjects$')] se stane více [concept_radical]#!#!"
 because_lombardy_venetia_tt: "Protože si [ROOT.GetCountry.GetName] ponechává #b Lombardii#! nebo #b Benátsko#!: #indent_newline:3 \n• [GetCulture('north_italian').GetName] budou úspěšně [Concept('concept_integrated_culture','$concept_integrated_culture_short$')] a stanou se [Concept('concept_primary_cultures','$concept_primary_culture$')] země [ROOT.GetCountry.GetNameNoFlag]#!"
 promised_slovakia_to_hungary_tt: "Protože #b Slovensko#! již bylo přislíbeno #b Maďarsku#!, účinky této možnosti se #r zhorší#!"
 promised_bukovina_to_romania_tt: "Protože #b Bukovina#! již byla přislíbena #b Sedmihradsku#!: #indent_newline:3 \n• [GetCulture('romanian').GetName] budou [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z budoucího [Concept('concept_integrated_culture','$concept_integrated_culture_process$')]\n• [GetPlayer.MakeScope.ScriptValue('large_radicals')|-=1%] [GetCulture('romanian').GetName] [Concept('concept_pop', '$concept_pops$')] se stane více [concept_radical]#!"
 danubian_tradition_traits_tt: "Všechny #bold evropské#! [Concept('concept_culture', '$concept_cultures$')] s [Concept('concept_homeland','$concept_homelands$')] v našich [Concept('concept_state', '$concept_states$')] v [Concept('concept_georegion','$concept_georegions$')] [GetGeographicRegion('region_danubia').GetName], [GetGeographicRegion('region_balkans').GetName], [GetGeographicRegion('region_poland').GetName] nebo [GetGeographicRegion('region_south_germany').GetName] přijmou #b dunajský#! [concept_tradition_trait]"
 danubian_federation_button_cooldown_tt: "Za posledních #v 180 dní#! nebyla #b integrována#! žádná [concept_culture]"
