 je_danubian_federation_slovak_button: "Řešit [GetCulture('slovak').GetName] obavy"
 je_danubian_federation_slovak_button_desc: "Země obývané [GetCulture('slovak').GetName] lidem byly dlouho organizovány pod #b $HUN_ADJ$#! korunou, a byly tak vystaveny intenzivním maďarizačním politikám, které zbrzdily růst jejich národní identity. Kromě toho [GetCulture('czech').GetName] a [GetCulture('slovak').GetNameNoFormatting] nacionalisté historicky udržovali úzké vztahy a někteří prosazovali vytvoření [GetCulture('czech').GetNameNoFormatting]-[GetCulture('slovak').GetNameNoFormatting] entity. Abychom [GetCulture('slovak').GetCustom('getPluralDemonym')] úspěšně integrovali do federace, je nutné oddělit tuto oblast od #b Maďarska#! a vymyslet řešení nevyřešené otázky [GetCulture('czech').GetNameNoFormatting]-[GetCulture('slovak').GetNameNoFormatting] unie."
 je_danubian_federation_polish_button: "Řešit [GetCulture('polish').GetName] obavy"
 je_danubian_federation_polish_button_desc: "Oblast #b Haliče#! obývají dva národy, [GetCulture('polish').GetCustom('getPluralDemonym')] a [GetCulture('ukrainian').GetCustom('getPluralDemonym')]. Tato oblast, dlouho označovaná za agrární zapadákov, byla také místem velkých svárů mezi oběma národy. Zatímco západ #b Haliče#! má [GetCulture('polish').GetName] většinu, východ má [GetCulture('ukrainian').GetName] většinu s tradičně [GetCulture('polish').GetNameNoFormatting] vládnoucí třídou. Abychom [GetCulture('polish').GetNameNoFormatting] země úspěšně integrovali, musíme rozhodnout, zda #b Halič#! rozdělíme - a jak zajistíme [GetCulture('polish').GetNameNoFormatting] enklávy na východě."
 je_danubian_federation_hungarian_button: "Řešit [GetCulture('hungarian').GetName] obavy"
 je_danubian_federation_hungarian_button_desc: "[GetCulture('hungarian').GetName] lid se v říši dlouho těšil vysokému postavení, přičemž celé historické #b $HUN$#! bylo organizováno jako jedna rozsáhlá korunní země. Tradiční [GetCulture('hungarian').GetNameNoFormatting] země zahrnují velké množství slovanských, germánských a rumunských národů, které všechny byly nacionalistickou [GetCulture('hungarian').GetNameNoFormatting] správou vystaveny maďarizačním politikám. Abychom #b Maďarsko#! úspěšně integrovali, musíme rozhodnout, jak budou jeho historické země rozděleny mezi své různé národy - nebo zda zůstanou nedotčeny na úkor svých menšin."
 je_danubian_federation_slovene_button: "Řešit [GetCulture('slovene').GetName] obavy"
 je_danubian_federation_slovene_button_desc: "Země obývané [GetCulture('slovene').GetName] lidem leží blízko hospodářského srdce země [ROOT.GetCountry.GetNameNoFlag], v korunních zemích #b Přímoří#!, #b Kraňsko#! a #b Štýrsko#!. Někteří [GetCulture('slovene').GetNameNoFormatting] nacionalisté jsou dlouho spojeni se širším hnutím za jihoslovanskou jednotu a volají po autonomní entitě zahrnující země [GetCulture('slovene').GetCustom('getPluralDemonym')], [GetCulture('croat').GetCustom('getPluralDemonym')] a [GetCulture('serb').GetCustom('getPluralDemonym')]. Abychom tuto oblast úspěšně integrovali, musíme vymezit [GetCulture('slovene').GetNameNoFormatting] stát ze tří existujících korunních zemí a odpovědět na otázku potenciálního jednotného jihoslovanského státu."
 je_danubian_federation_croat_button: "Řešit [GetCulture('croat').GetName] obavy"
 je_danubian_federation_croat_button_desc: "[GetCulture('croat').GetName] země byly dlouho rozděleny - nejprve do tří korunních zemí #b $STATE_CROATIA$#!, #b $STATE_SLAVONIA$#! a #b $STATE_DALMATIA$#! a poté rozděleny mezi #b $AUS_ADJ$#! a #b $HUN_ADJ$#! správní celky. [SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not')] Kromě toho bylo [GetCulture('croat').GetNameNoFormatting] nacionalistické hnutí dlouho spojeno s „ilyrismem“, směrem, který si přeje sjednotit [GetCulture('slovene').GetCustom('getPluralDemonym')], [GetCulture('croat').GetCustom('getPluralDemonym')] a [GetCulture('serb').GetCustom('getPluralDemonym')] pod jedním státem. Abychom Chorvatsko integrovali do federace, musíme [SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not_goal')]"
 TRIUNE_KINGDOM_NOT_EXISTS: "Ustavení „Trojí monarchie“ všech tří tradičních [GetCulture('croat').GetNameNoFormatting] zemí bylo dlouhodobým cílem [GetCulture('croat').GetNameNoFormatting] nacionalistů."
 TRIUNE_KINGDOM_EXISTS: "Nedávné ustavení „Trojí monarchie“ všech tří tradičních [GetCulture('croat').GetNameNoFormatting] zemí uspokojilo [GetCulture('croat').GetNameNoFormatting] nacionalisty, kteří si nyní přejí rozšíření svého státu."
 TRIUNE_KINGDOM_NOT_EXISTS_GOAL: "vymyslet řešení k uskutečnění „Trojí monarchie“ a zároveň dospět k závěru v otázce jihoslovanské jednoty."
 TRIUNE_KINGDOM_EXISTS_GOAL: "zavázat se k zachování „Trojí monarchie“ a zároveň dospět k závěru v otázce jihoslovanské jednoty."
 je_danubian_federation_romanian_button: "Řešit [GetCulture('romanian').GetName] obavy"
 je_danubian_federation_romanian_button_desc: "[GetCulture('romanian').GetName] země patří k nejsložitějším v říši, včetně mimořádně rozmanité oblasti #b Banátu#!, četných [GetCulture('south_german').GetName] enkláv a velké [GetCulture('hungarian').GetName] enklávy #b Sikulská země#!. Existují prudké spory o rozdělení území mezi [GetCulture('romanian').GetNameNoFormatting] a [GetCulture('hungarian').GetNameNoFormatting] nacionalisty i mezi nesčetnými dalšími menšinami přítomnými v regionu. [SCOPE.GetRootScope.GetCountry.GetCustom('danubian_principalities_exists_or_not')] Abychom tuto oblast integrovali do federace, musíme vyřešit otázku hranic budoucího [GetCulture('romanian').GetNameNoFormatting] státu a zároveň vyjasnit status #b Banátu#! a zdejších [GetCulture('south_german').GetNameNoFormatting] a [GetCulture('hungarian').GetNameNoFormatting] enkláv."
 ROMANIA_EXISTS: "Kromě těchto sporů existuje snaha o sjednocení oblasti s ostatními [GetCulture('romanian').GetNameNoFormatting] státy."
 ROMANIA_NOT_EXISTS: ""
 je_danubian_federation_north_italian_button: "Řešit [GetCulture('north_italian').GetName] obavy"
 je_danubian_federation_north_italian_button_desc: "[GetCulture('north_italian').GetName] korunní země patřily dlouho k nejprosperujícím v říši a poskytovaly většinu [ROOT.GetCountry.GetAdjectiveNoFlag] obchodu a námořních znalostí. Tyto země se také ukazovaly jako trvale neklidné, přičemž italští nacionalisté silně tlačili na sjednocení se [SCOPE.GetRootScope.GetCountry.GetCustom('italy_or_italian_states')]. Mají-li být [GetCulture('north_italian').GetNameNoFormatting] země integrovány do federace, musí být sjednocovací sentiment potlačen a otázka [GetCulture('north_italian').GetNameNoFormatting] menšin v [GetCulture('south_german').GetName] a [GetCulture('slovene').GetName] oblastech vyřešena způsobem uspokojivým pro [GetCulture('north_italian').GetNameNoFormatting] nacionalisty."
 ITALY_EXISTS: "#b Itálie#!"
 ITALY_NOT_EXISTS: "ostatní italské státy"
 disqualify_culture_tt: "[SCOPE.sCulture('relevant_culture_scope').GetName] budou [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z budoucího [Concept('concept_integrated_culture','$concept_integrated_culture_process$')]"
 extra_culture_anger_tt: "Protože tato volba by zradila #b předchozí sliby#! dané [SCOPE.sCulture('relevant_culture_scope').GetName] [concept_culture]:"
 extra_culture_anger_separatism_tt: "$extra_culture_anger_tt$ #indent_newline:3 \n• Všechny [SCOPE.sCulture('relevant_culture_scope').GetName] [Concept('concept_subject', '$concept_subjects$')] získají #v [GetPlayer.MakeScope.ScriptValue('annex_subject_max_liberty_desire_change')]#! [concept_liberty_desire]\n•  [concept_relations] se všemi [SCOPE.sCulture('relevant_culture_scope').GetName] [Concept('concept_subject', '$concept_subjects$')] se výrazně #r zhorší#!#!"
 extra_culture_anger_radicals_tt: "$extra_culture_anger_tt$ #indent_newline:3 \n• [GetPlayer.MakeScope.ScriptValue('large_radicals')|-=1%] [SCOPE.sCulture('relevant_culture_scope').GetName] [Concept('concept_pop', '$concept_pops$')] se stane více [concept_radical]#!"
 je_danubian_federation_ukrainian_button: "Řešit [GetCulture('ukrainian').GetName] obavy"
 je_danubian_federation_ukrainian_button_desc: "Oblast #b Haliče#!, kterou [ROOT.GetCountry.GetNameNoFlag] zabrala #b Polsko-litevské unii#!, je rozdělena mezi převážně [GetCulture('ukrainian').GetName] východ a [GetCulture('polish').GetName] západ. Celému regionu dlouho vládly [GetCulture('polish').GetNameNoFormatting] elity a ve velkých městech #b $STATE_EAST_GALICIA$#! existují [GetCulture('polish').GetNameNoFormatting] enklávy. Mají-li být [GetCulture('ukrainian').GetNameNoFormatting] země hladce integrovány do federace, musí být #b Halič#! spravedlivě rozdělena a musí být dosaženo dohody ohledně těchto [GetCulture('polish').GetNameNoFormatting] enkláv."
 je_danubian_federation_serb_button: "Řešit [GetCulture('serb').GetName] obavy"
 je_danubian_federation_serb_button_desc: "[GetCulture('serb').GetName] populace říše, soustředěná kolem oblasti #b Vojvodiny#!, dlouho existovala pod #b maďarskou#! jurisdikcí. Vojvodina hostí nesmírně rozmanitou populaci a [GetCulture('hungarian').GetName] nacionalisté ji považují za jádrové území #b Maďarska#!. [GetCulture('serb').GetNameNoFormatting] populace je do značné míry vstřícná federalizaci buď pod [GetCulture('serb').GetNameNoFormatting], nebo panslovanským státem - ale jakýkoli krok tímto směrem jistě vyvolá nespokojenost mezi různými ne-[GetCulture('serb').GetNameNoFormatting] populacemi regionu."
 no_active_secession_movement_tt: "[ROOT.GetCountry.GetName] nemá žádnou aktivní [THIS.GetCulture.GetName] [concept_secession]"
