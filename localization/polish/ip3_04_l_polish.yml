 ukrainian_culture_loss_warning_krakow_tt: "@warning! [Concept('concept_unification','Zformování')] #v $POL$#! odstraní [GetCulture('ukrainian').GetName] [Concept('concept_primary_cultures','$concept_primary_culture$')]"
 ruler_is_romance_tt: "[concept_ruler] země [ROOT.GetCountry.GetNameNoFlag] má [concept_culture] s [Concept('concept_discrimination_trait','$concept_discrimination_trait_short$')] #v $language_hispanophone$#!"
 subjecthood_events.1.t: "Od mnohých k jednomu"
 subjecthood_events.1.d_1: "Přijetí [SCOPE.sCulture('relevant_primary_culture').GetName] nacionalismu [ROOT.GetCountry.GetAdjectiveNoFlag] státem vyvolalo mezi komunitami [SCOPE.sCulture('relevant_minority_culture').GetName] obavy z nucené asimilace. Přislíbily odpor vůči jakémukoli pokusu prosadit [SCOPE.sLaw('current_law_scope').GetName]."
 subjecthood_events.1.d_2: "Přijetí [SCOPE.sCulture('relevant_primary_culture').GetName] a [SCOPE.sCulture('relevant_primary_culture_2').GetName] nacionalismu [ROOT.GetCountry.GetAdjectiveNoFlag] státem vyvolalo mezi komunitami [SCOPE.sCulture('relevant_minority_culture').GetName] obavy z nucené asimilace. Přislíbily odpor vůči jakémukoli pokusu prosadit [SCOPE.sLaw('current_law_scope').GetName]."
 subjecthood_events.1.d_3: "Přijetí nacionalismu [ROOT.GetCountry.GetAdjectiveNoFlag] státem vyvolalo mezi komunitami [SCOPE.sCulture('relevant_minority_culture').GetName] obavy z nucené asimilace. Přislíbily odpor vůči jakémukoli pokusu prosadit [SCOPE.sLaw('current_law_scope').GetName]."
 subjecthood_events.1.f: "Lidé z vesnice byli dlouho loajálními poddanými [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Jistě, potíže tu byly - daňové úniky, jednotlivé vzpoury, obvyklé reptání nespokojených rolníků - ale nakonec byli loajální. A pak přišly zprávy z [ROOT.GetCountry.GetCapital.GetCityHubName] a s nimi i velký pocit neklidu. Vláda bude nyní vydávat své dekrety v jazyce [SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting], kterým mluvilo jen málo z nich a ještě méně z nich jej umělo číst. Jazyk [SCOPE.sCulture('relevant_minority_culture').GetNameNoFormatting] už nebude dost dobrý. „Učte se,“ jako by říkala. „Mluvte naším jazykem, nebo neříkejte vůbec nic.“"
 subjecthood_events.1.a: "Proč musí tak trvat na odporu vůči pokroku?"
 subjecthood_events.1.b: "Člověk může být zároveň [SCOPE.sCulture('relevant_minority_culture').GetName] i [ROOT.GetCountry.GetAdjectiveNoFlag]."
 subjecthood_events.2.t: "Ideální občanstvo"
 subjecthood_events.2.d_1: "V salonech města [SCOPE.sState('relevant_state').GetCityHubName] se objevily debaty o povaze národního občanství. Vize [SCOPE.sCulture('relevant_primary_culture').GetName] nadřazenosti v rámci [SCOPE.sLaw('current_law_scope').GetName] se dostala do střetu s univerzalističtějšími ideály."
 subjecthood_events.2.d_2: "V salonech města [SCOPE.sState('relevant_state').GetCityHubName] se objevily debaty o povaze národního občanství. Vize [SCOPE.sCulture('relevant_primary_culture').GetName] a [SCOPE.sCulture('relevant_primary_culture_2').GetName] nadřazenosti v rámci [SCOPE.sLaw('current_law_scope').GetName] se dostala do střetu s univerzalističtějšími ideály."
 subjecthood_events.2.d_3: "V salonech města [SCOPE.sState('relevant_state').GetCityHubName] se objevily debaty o povaze národního občanství. Vize nadřazenosti oficiálních státních národností v rámci [SCOPE.sLaw('current_law_scope').GetName] se dostala do střetu s univerzalističtějšími ideály."
 subjecthood_events.2.f: "„Major [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting] zase spřádá pikle.“\n\n[SCOPE.sCharacter('name_b_scope').GetFirstNameNoFormatting] otočil hlavu za palcem svého přítele. A skutečně, tam stál major, oděný jako vždy do téže uniformy. Nakláněl se, aby něco probral se svým společníkem, spíše kvůli zdání než z opravdové touhy po utajení.\n\n„To tedy ano. „Čest a loajalita,“ říká pořád, „čest a loajalita“. Minulý týden jsme mluvili o tom, co dělá dobrého občana, a on řekl totéž.“\n\n„A co jste řekl vy?“"
 subjecthood_events.2.a: "„Aby byl člověk dobrým občanem, musí být dobrým [SCOPE.sCulture('relevant_primary_culture').GetCustom('getSingularDemonym')].“"
 subjecthood_events.2.b: "„Že měl samozřejmě pravdu. Ale především loajalita.“"
 subjecthood_events.2.c: "„Být [ROOT.GetCountry.GetAdjectiveNoFormatting] je národností samo o sobě.“"
 subjecthood_events.3.t: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]"
 subjecthood_events.3.d: "Povzbuzeni vládním úsilím prosadit [SCOPE.sLaw('current_law_scope').GetName], nacionalisté [SCOPE.sCulture('relevant_primary_culture').GetName] slavnostně nabídli [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] titul „[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]“. Přijetí titulu by legitimizovalo tvrzení, že [SCOPE.sCharacter('ruler_scope').GetHerHis] moc v konečném důsledku vychází z národa."
 subjecthood_events.3.f: "„Když Napoleon přijal korunu, přísahal, že bude vládnout ve „výhradním zájmu, štěstí a slávě“ $french$ lidu. Právě to mu dalo moc a umožnilo mu zvítězit nad všemi jeho nepřáteli. Kdyby [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] chtěl, [SCOPE.sCharacter('ruler_scope').GetSheHe] by mohl učinit totéž, s lidem [SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting] na mysli.“\n\n[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] si žadatele prohlížel s přemýšlivým výrazem ve tváři.\n\n„A co se stalo s Napoleonem?“\n\n„Stal se nesmrtelným, můj [SCOPE.sCharacter('ruler_scope').GetCustom('getLadyLordSpouse')|l].“"
 subjecthood_events.3.a: "Sláva, [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]!"
 subjecthood_events.3.b: "Moc vychází z [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], nikoli z národa."
 subjecthood_events.4.t: "Od poddaných k občanům"
 subjecthood_events.4.d_1: "Postupná přeměna [ROOT.GetCountry.GetName] v národní stát vytvořila potřebu nových osnov občanské výchovy ve školách. Nové osnovy vyzdvihnou dějiny lidu [SCOPE.sCulture('relevant_primary_culture').GetName] nad dějiny jiných národů."
 subjecthood_events.4.d_2: "Postupná přeměna [ROOT.GetCountry.GetName] v národní stát vytvořila potřebu nových osnov občanské výchovy ve školách. Nové osnovy vyzdvihnou dějiny lidů [SCOPE.sCulture('relevant_primary_culture').GetName] a [SCOPE.sCulture('relevant_primary_culture_2').GetName] nad dějiny jiných národů."
 subjecthood_events.4.d_3: "Postupná přeměna [ROOT.GetCountry.GetName] v národní stát vytvořila potřebu nových osnov občanské výchovy ve školách. Nové osnovy vyzdvihnou dějiny oficiálních státních národností nad dějiny jiných národů."
 subjecthood_events.4.f: "„A co mám na mysli, když řeknu „být [SCOPE.sCulture('relevant_primary_culture').GetCustom('getSingularDemonym')]“?“ zeptal se učitel.\n\nJeden ze studentů vstal, aby odpověděl. „Být [SCOPE.sCulture('relevant_primary_culture').GetCustom('getSingularDemonym')] znamená být hrdý, znamená to být čestný a bránit náš lid. Znamená to sloužit [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] a národu [SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting] a ctít našeho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] i [ROOT.GetCountry.GetRuler.GetHerHis] ministry.“\n\nStudent stál zcela nehnutě, dokud portrétista v rohu místnosti nevykoukl zpoza svého plátna.\n\n„Výborně, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Můžete se posadit.“"
 subjecthood_events.4.a: "Poskytněte na tyto změny veškeré potřebné finance."
 subjecthood_events.4.b: "Pomalejší proces by ulevil naší pokladně."
 subjecthood_events.4.c: "Dějiny [SCOPE.sState('claim_state').GetName] mohou být jejich první lekcí."
 neighbouring_state_claimable_tt: "Jakýkoli nevlastněný sousední [concept_state] je [concept_homeland] jakékoli [ROOT.GetCountry.GetAdjectiveNoFlag] [Concept('concept_primary_cultures','$concept_primary_culture$')]"
 subjecthood_events.5.t: "Vzpomínky na gilotinu"
 subjecthood_events.5.d: "Vládní reforma občanství probudila mezi [GetPopType('aristocrats').GetName] a [GetPopType('clergymen').GetName] přízrak revolučních excesů. Obávají se, že jejich tradiční tituly budou odstraněny ve prospěch rovného občanství."
 subjecthood_events.5.f: "„Je to naprosto nepřirozené. Hříšné, řekl bych - hříšné, a je to #italic cizácké#!. Moji předkové vládli této zemi tisíc let a ti vměšovači v [ROOT.GetCountry.GetCapital.GetCityHubName] chtějí svrhnout celý řád věcí. Přejí si snad, aby mě znali jako „#italic Občan#! [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]“? Tohle je konec všeho.“\n\nKočí přikývl, oči pevně upřené na cestu před nimi. Snad je příští výmol oba pohltí.\n\n„Řekl bych,“ pokračoval pán, „že [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] byl naprosto sveden z cesty těmi zatracenými novými ministry. Takhle to dopadá, když se jmenují neurození!“"
 subjecthood_events.5.a: "Pro ně je až příliš typické omdlévat před přízraky."
 subjecthood_events.5.b: "Jsou první mezi národem [SCOPE.sCulture('relevant_primary_culture').GetName]."
 subjecthood_events.5.c: "Ano, všechny tyto věci zmizí."
