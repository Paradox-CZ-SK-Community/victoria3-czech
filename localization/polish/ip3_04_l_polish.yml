 event_effects_technocracy.4_tt: "Možné účinky #b události#!:\n• [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] ztratí [concept_ideology] [GetIdeology('ideology_republican').GetName] nebo [GetIdeology('ideology_constitutionalist').GetName] a získá $concept_ideology$ [GetIdeology('ideology_technocratic').GetName]\n• Vyberte jednu z následujících možností:\n$TAB$• [ROOT.GetCountry.GetNameNoFormatting] získá #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_technocracy_brave_new_world_tt $modifier_technocracy_brave_new_world$#!\n$TAB$• [ROOT.GetCountry.GetNameNoFormatting] získá #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_technocracy_scientific_management_tt $modifier_technocracy_scientific_management$#!"
