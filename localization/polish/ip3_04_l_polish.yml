 peoples_springtime.71.t: "Mír, svoboda a svornost"
 peoples_springtime.71.d: "Liberální vláda v zemi [ROOT.GetCountry.GetName] úspěšně překonala dvojí hrozbu obnoveného absolutismu a sociální revoluce. Období revolučního otřesu dospělo k pokojnému konci."
 peoples_springtime.71.f: "„Nic není plodnější na zázraky než umění být svobodný; ale nic není těžší než učednictví ve svobodě.“\n\n—Alexis de Tocqueville, #italic Demokracie v Americe#!"
 peoples_springtime.71.a: "V zemi [ROOT.GetCountry.GetNameNoFormatting] svítá věk svobody."
 peoples_springtime.71.b: "[SCOPE.sCulture('primary_culture_scope').GetName] lid si svou svobodu zasloužil."
 modifier_age_of_liberty: "Věk svobody"
 modifier_red_summer: "Revoluční zmatek"
 king_in_parliament_tt: "Přidá #b Král v parlamentu#! do deníku této [concept_country]"
 je_king_in_parliament: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] v parlamentu"
 je_king_in_parliament_reason: "Konec absolutistické vlády v zemi [ROOT.GetCountry.GetName] nevyřešil otázku rovnováhy moci mezi [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Aby se nový parlamentní řád upevnil, musí stanovit, že vůle lidu stojí nad vůlí [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 je_king_in_parliament_goal: "Následující musí platit celkem #v 10#! let:"
 je_king_in_parliament_complete_tt: "[GetIdeology('ideology_absolutist_movement').GetName] [Concept('concept_political_movement','$concept_political_movements$')] budou nahrazena hnutími [GetIdeology('ideology_royalist_movement').GetName] $concept_political_movements_short$"
 autocracy.4.t: "Odpovědná vláda"
 autocracy.4.d: "Stabilita [ROOT.GetCountry.GetAdjectiveNoFlag] parlamentního řádu vedla k tomu, že royalisté opustili své naděje na obnovený absolutismus. Ústavní monarchie byla ustanovena jako nový status quo."
 autocracy.4.f: "„Parlament je tou svrchovanou a absolutní mocí, která dává vládě život a pohyb. Řídí a uvádí v činnost všechny její rozmanité postupy jako rodič našeho míru, ochránce naší víry a základ našeho majetku; a jak je ústava tohoto velkého pramene a prvního hybatele věcí silná a krásná, tak budou i všechny činy a výkony z ní odvozené nést odpovídající poměr a podobnost.“"
 autocracy.4.a: "Přípitek na [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]!"
 autocracy.4.b: "[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] ochraňuj [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]!"
 modifier_constitutional_monarch: "Milovaný symbol státu"
 modifier_constitutional_monarch_movement_support: "Milovaný panovník"
 modifier_constitutional_order: "Ústavní řád"
 je_balkan_national_awakenings: "Národní obrození"
 je_balkan_national_awakenings_reason: "Ačkoli [ROOT.GetCountry.GetName] učinila první kroky k národní státnosti, zůstává zemí rolníků. Velká část naší populace stále nahlíží na svět optikou vesnice a klanu, nikoli národního bratrství. Musíme mezi naší populací pěstovat kulturní [concept_fervor] a z [SCOPE.sCulture('primary_culture_scope').GetName] lidu vybudovat jednotný národ.\n\n[concept_fervor] kultury [SCOPE.sCulture('primary_culture_scope').GetName] ovlivňují následující podmínky:\n• Průměrná [concept_literacy] [SCOPE.sCulture('primary_culture_scope').GetName] [Concept('concept_pop', '$concept_pops$')]\n• Počet [SCOPE.sCulture('primary_culture_scope').GetName] [GetPopType('academics').GetName]\n• [SCOPE.sCulture('primary_culture_scope').GetName] země zkoumající #b $nationalism$#! a #b $pan-nationalism$#!\n• Průměrné [concept_acceptance] [SCOPE.sCulture('primary_culture_scope').GetName] Pop\n• Nezávislé nebo dříve nezávislé [SCOPE.sCulture('primary_culture_scope').GetName] země"
 claims_on_all_homelands_tt: "[ROOT.GetCountry.GetName] získá [Concept('concept_claim', '$concept_claims$')] na všechny [SCOPE.sCulture('primary_culture_scope').GetName] [Concept('concept_homeland','$concept_homelands$')]"
 has_formed_yugoslavia_tt: "Zformovala #v $YUG$#!"
 national_awakening.1.t: "[SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting] obrození"
 national_awakening.1.d: "Úsilí [ROOT.GetCountry.GetAdjective] státu o podporu národního zápalu vedlo ke kulturní renesanci. Dokonce i v nejodlehlejších vesnicích státu [SCOPE.sState('rural_state').GetName] naši občané nyní chápou své místo jako součást [SCOPE.sCulture('primary_culture_scope').GetName] národa."
 national_awakening.1.f: "Sčítací komisař sledoval, jak se dveře chatrče otevřely. Byla to nejodlehlejší vesnice, kterou dosud navštívil - místo se dvěma koňmi a jedinou klikatou cestou. Ve dveřích stál muž a při pohledu na jeho mosazné knoflíky rázně zasalutoval.\n\n„Jak se jmenujete?“\n\n„[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting],“ odpověděl muž ve dveřích.\n\n„A odkud pocházíte?“\n\n„Jsem [SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting], pane, stejně jako můj otec a jeho otec před ním.“"
 national_awakening.1.a: "Ať žije [SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting] lid!"
 national_awakening.1.b: "Velký národ si zaslouží velkou armádu."
 modifier_fervour_military_bonus: "Nacionalistický zápal "
 modifier_fervour_military_bonus_ig: "Rozdmýchaný nacionalistický zápal"
 2TAB: "    "
 national_awakening.2.t: "Vesnické školství"
 national_awakening.2.d: "[GetPopType('academics').GetName] placení vládou založili vesnické školy po venkově státu [SCOPE.sState('relevant_state').GetName]. Tyto vesnické školy usilují o zvýšení gramotnosti a pěstování pocitu [SCOPE.sCulture('relevant_culture').GetName] národní identity mezi rolnictvem."
 national_awakening.2.f: "„Náš národ měl smůlu,“ začala učitelka. „Dosud nebyl zcela sjednocen. V těchto zemích je náš lid závislý na cizincích.“\n\nUkázala na mapu na stěně, na několik oblastí vyznačených černě.\n\n„V těchto provinciích vládne cizinec a pro naše bratry je to velmi těžké...“"
 national_awakening.2.a: "Výborná iniciativa."
 national_awakening.2.b: "Nabídněte jim dodatečné financování."
 national_awakening.3.t: "Národní epos"
 national_awakening.3.d: "Nedávno vydaná sbírka tradičních [SCOPE.sCulture('relevant_culture').GetName] básní a písní uchvátila stále gramotnější populaci země [ROOT.GetCountry.GetName]. Dobře očtený výtisk díla [SCOPE.GetRootScope.GetCountry.GetCustom('country_national_epic_name')] lze nyní najít v každé knihovně v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 national_awakening.3.f: "Tiskárna nikdy nebyla tak vytížená. Dělníci nesoucí náruče teplého papíru spěchali ke stanovištím, kde se měl lepit a vázat do kůže. Vzadu mohutné lisy chrlily stránku za stránkou, každou zdobenou elegantními pletenci a obrazy květin. Tento stoh padesáti kusů mířil do [ROOT.GetCountry.GetCapital.GetCityHubName], tento do [ROOT.GetCountry.GetCapital.GetFarmHubName]. Dopisy od soukromých osob i knihkupců byly navršeny na pultě a čekaly na zapsání do účetní knihy.\n\nZepředu se ozval výkřik od místa, odkud právě odešel muž v uniformě. „Objednávka z ministerstva - chtějí dvě stě kusů do pátku!“"
 national_awakening.3.a: "Dílo, které spojí náš národ."
 national_awakening.3.b: "Přípitek našim velikánům!"
 national_awakening.4.t: "V lidovém jazyce"
 national_awakening.4.d: "Proslulý učenec [SCOPE.sCharacter('intelligentsia_leader').GetFullName] přeložil Nový zákon do [SCOPE.sCulture('relevant_culture').GetName] jazyka. Rostoucí soubor děl v [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] jazyce zvýšil prestiž tohoto jazyka mezi kněžími a intelektuály."
 national_awakening.4.f: "„Objednal jsem výtisk #italic Principia#! v [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] a jeden z mých kolegů si vyžádal celou Bibli ve stejném jazyce. Pokud dokážeme každý rok přeložit jedno hodnotné dílo a každý překlad provede student, který pak bude učit další, budeme mít do konce století značný korpus. A mnohem víc, pokud dodavatelé rozpoznají poptávku.“\n\n„Vskutku ambiciózní podnik. Myslíte, že byste dokázal přebudovat celé oddělení?“\n\n„Sním o budoucnosti, kdy náš jazyk bude jazykem, který se ostatní budou chtít učit - kdy Švéd požádá o eseje od [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] nakladatele. A navíc sním o tom, že autorem těch esejů bude jeden z mých vlastních studentů.“"
 national_awakening.4.a: "Brzy bude celá Evropa vydávat v [SCOPE.sCulture('relevant_culture').GetNameNoFormatting]!"
 national_awakening.4.b: "Musíme se snažit vytvářet i původní díla."
 national_awakening.5.t: "Národní romantismus"
 national_awakening.5.d: "[SCOPE.sState('arts_academy_state').GetCityHubName] [SCOPE.sBuilding('arts_academy_building').GetName], inspirovaná sílící vlnou [SCOPE.sCulture('relevant_culture').GetName] nacionalismu, nedávno vytvořila velkolepý romantický obraz zobrazující zakladatelský mýtus našeho národa."
 national_awakening.5.f: "Personifikace [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] národa stála v popředí, oděná v roucho a nesoucí [ROOT.GetCountry.GetAdjectiveNoFormatting] vlajku. Od kotníku se jí táhl přetržený řetěz mizící ve stínu neslavné minulosti. V pozadí se rozprostírala krajina krásy, jakou lze nalézt pouze v zemi [ROOT.GetCountry.GetNameNoFormatting], ozářená zářivým vycházejícím sluncem, jehož světlo planulo v národních barvách.\n\nNesl poselství, kterému mohl porozumět každý, a přesto je dokázal napodobit jen málokdo. Z temné minulosti zářivé nové jaro. Z útlaku svoboda."
 national_awakening.5.a: "Dílo, které překoná mistrovská díla Paříže."
 national_awakening.5.b: "Ať se stane nejnovějším symbolem našeho národa."
 national_awakening.6.t: "Folklór"
 national_awakening.6.d: "Hledání sdílené národní identity obrátilo zájem [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] k venkovu. Studium tradic [SCOPE.gsInterestGroup('rural_folk_ig').GetName] je široce vnímáno jako pohled do prapůvodní [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] kultury, nedotčené cizí vládou."
 national_awakening.6.f: "„Říkají, že Alexandr Veliký byl první [SCOPE.sCulture('relevant_culture').GetCustom('getSingularDemonym')]. Že když se jeho říše rozpadla, jeho generálové vytvořili první [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] království.“\n\n„Opravdu?“\n\n„Že to říkají, nebo že je to pravda?“\n\n„To druhé.“\n\n„Je v tom snad rozdíl? Pokud to bude říkat dost lidí, uděláme z toho pravdu.“"
 national_awakening.6.a: "Tak rostou semena národa."
 national_awakening.6.b: "Od skutečné země se máme mnoho co učit."
 national_awakening.7.t: "Jeden národ, jeden lid"
 national_awakening.7.d: "Úsilí státu definovat národ na základě sdílené [SCOPE.sCulture('primary_culture').GetName] identity vyvolalo znepokojení mezi jeho [SCOPE.sCulture('minority_culture').GetName] populací. Mnoho [SCOPE.sCulture('minority_culture').GetNameNoFormatting] lidí se obává, že budou nuceni asimilovat se do dominantní kultury."
 national_awakening.7.f: "„Pokud chce odmaturovat, musí se naučit [SCOPE.sCulture('primary_culture').GetNameNoFormatting] jazyk a složit zkoušku psanou v [SCOPE.sCulture('primary_culture').GetNameNoFormatting]. V tuto chvíli nemůžeme dělat výjimky.“\n\nŽena odpověděla v [SCOPE.sCulture('minority_culture').GetNameNoFormatting]. Její syn s omluvným výrazem ve tváři tlumočil její slova do úředníkova vlastního jazyka.\n\n„A co výuka [SCOPE.sCulture('minority_culture').GetNameNoFormatting]? Je nás tu mnoho a tímto jazykem mluvíme doma. Bez hodin [SCOPE.sCulture('minority_culture').GetNameNoFormatting] jej po odchodu z domova zapomene a ztratí veškeré pouto se svou rodinou.“\n\n„Moje rada pro vás, madam, je naučit se [SCOPE.sCulture('primary_culture').GetNameNoFormatting]. Jste přece [ROOT.GetCountry.GetAdjectiveNoFormatting] občankou, ne?“"
 national_awakening.7.a: "Skutečně se musí stát [SCOPE.sCulture('primary_culture').GetCustom('getPluralDemonym')]."
 national_awakening.7.b: "Nemají se čeho bát."
