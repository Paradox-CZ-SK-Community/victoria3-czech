 austrian_fascism.2.t: "Rakousko se probudilo"
 austrian_fascism.2.d: "Úsilí [SCOPE.sCharacter('ruler_scope').GetFullName] a [SCOPE.sParty('fascist_party_scope').GetName] úspěšně přetvořilo [ROOT.GetCountry.GetName] v [SCOPE.GetRootScope.GetCountry.GetCustom('social_monarchy_or_corporate_state')]. S umlčeným nebo kooptovaným dělnickým hnutím byl konečně nastolen pocit společenského míru."
 austrian_fascism.2.f: "„Nejvyšší touhou dělnické třídy je právo pracovat pro Boha a vlast. Přesně toho se komunisté bojí nejvíce.“\n\nNáborář Fronty s uhlazenými vlasy přecházel sem a tam, zatímco mluvil. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stál v pozoru, spolužáci po jeho stranách. Osmačtyřicet očí sledovalo každý jeho pohyb.\n\n„Jejich zbraní je sabotáž a rozkol a rozsévají je všude, kam přijdou. Právě proti tomu budete bojovat. Do tohoto sálu jste vstoupili jako studenti, jedni z nejlepších ve třídě. Opustíte jej jako úderníci.“"
 austrian_fascism.2.a: "Österreich!"
 austrian_fascism.2.b: "Vůle Fronty se stane zákonem."
 austrian_fascism.3.t: "Jen sen"
 austrian_fascism.3.d: "[SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')] nedokázalo převzít kontrolu nad [ROOT.GetCountry.GetName]. Ačkoli přízrak radikálního nacionalismu jistě přetrvá, vize $gov_corporate_state_austrofascist$ se vytratila do dějin."
 austrian_fascism.3.f: "[ROOT.GetCountry.GetCapital.GetCityHubName] jako by se v těchto dnech dýchalo volněji. Mladíci s tvrdým pohledem v uniformách zmizeli z nároží a plakáty odborů lepené pšeničným klihem se znovu staly běžným pohledem. Ze svého místa na verandě kavárny hleděl [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] na skupinu dělníků procházejících kolem. Uprostřed zahlédl tvář, kterou poznával.\n\n„Pan [SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting]?“ odhadl muž sedící naproti němu. „Myslím, že jsem ho viděl na letáku.“\n\n„Na čím letáku?“\n\n„Asi nikoho důležitého. Ani si nevzpomínám, kdy jsem je naposledy viděl někde kolem.“"
 austrian_fascism.3.a: "[ROOT.GetCountry.GetNameNoFormatting] je zachráněno!"
 austrian_fascism.3.b: "Kam se odsud můžeme vydat?"
 je_standestaat_eliminate_parliament: "Zrušit parlament"
