 je_danubian_federation_czech_button: "Řešit [GetCulture('czech').GetName] obavy"
 je_danubian_federation_czech_button_desc: "Rozdělení staré #b Koruny české#! na korunní země #b Čechy#!, #b Moravu#! a #b Slezsko#! je již dlouho zdrojem zášti [GetCulture('czech').GetName] nacionalistů. Přítomnost početné [GetCulture('south_german').GetName] menšiny v [GetCulture('czech').GetNameNoFormatting] zemích navíc slouží jako zdroj trvalého etnického napětí. Abychom oblast úspěšně integrovali do federace, musíme vymyslet řešení, které znovu sjednotí Čechy, aniž by marginalizovalo [GetCulture('south_german').GetNameNoFormatting] menšinu."
 je_danubian_federation_czech_button_integrate_tt: "Následující [Concept('concept_culture', '$concept_cultures$')] mohou být touto událostí [Concept('concept_integrated_culture','$concept_integrated_culture_short$')]:\n• [GetCulture('czech').GetName]\n• [GetCulture('slovak').GetName]"
