 je_eastern_question_austria: "Bosenská otázka"
 je_eastern_question_austria_reason: "Naše lobby nás požádala, abychom obsadili [GetStateRegion('STATE_BOSNIA').GetName], které je v současnosti územím země [SCOPE.sCountry('bosnia_owner_scope').GetName]. Pokud podle jejich návrhu budeme jednat, pomůže to zastavit postup [SelectLocalization(SCOPE.sCountry('relevant_country').IsValid, SCOPE.sCountry('relevant_country').GetAdjectiveNoFlag, 'dyn_c_rsfsr_adj')] vlivu ve [GetStrategicRegion('region_balkans').GetName].\n\nZatímco úspěšné splnění jejich žádosti nám získá přízeň [Concept('concept_political_lobby','$concept_political_lobby_short$')], pokud tak ve vyhrazeném čase neučiníme, velmi je to rozhněvá."
 eastern_question_austria.1.t: "Posouvání hranice"
 eastern_question_austria.1.d: "Snahy země [SCOPE.sCountry('relevant_country').GetName] rozšířit svůj vliv v balkánské oblasti znepokojily [SCOPE.sPoliticalLobby('relevant_lobby').GetName]. Navrhly preventivní akci proti zemi [SCOPE.sCountry('bosnia_owner_scope').GetName], aby zabránily [SCOPE.sCountry('relevant_country').GetNameNoFormatting] zajistit si vliv nad [GetStateRegion('STATE_BOSNIA').GetName]."
 eastern_question_austria.1.f: "„Dovolte mi předložit návrh,“ začal [SCOPE.sCharacter('lobby_politician_scope').GetLastNameNoFormatting].\n\n[SCOPE.sCharacter('lobby_politician_scope').GetSheHe|U] zahnal generála do kouta v restauraci v [ROOT.GetCountry.GetCapital.GetCityHubName] a slíbil, že zaplatí účet výměnou za půlhodinu jeho času. Generál odložil sklenici nejdražšího vína z jídelního lístku a přikývl.\n\n„Týká se [SCOPE.sCulture('relevant_country_culture').GetCustom('getPluralDemonym')] a jejich současného úsilí. Předpokládám, že sledujete noviny a víte o nejisté situaci Slovanů i o agresivní rétorice [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle] v této věci...“"
 eastern_question_austria.1.a: "Převezmeme břemeno civilizace [GetStateRegion('STATE_BOSNIA').GetNameNoFormatting]."
 eastern_question_austria.1.b: "Tento návrh chutná po válce."
 eastern_question_austria.2.t: "Okupační vláda"
 eastern_question_austria.2.d: "S [GetStateRegion('STATE_BOSNIA').GetName] pod kontrolou můžeme nyní rozhodnout o budoucnosti oblasti. Okupace, která nominálně zachová [SCOPE.sCountry('bosnia_owner_scope').GetAdjective] autoritu, si pravděpodobně zajistí mezinárodní souhlas, ale omezí naše praktické zisky."
 eastern_question_austria.2.d_2: "S [GetStateRegion('STATE_BOSNIA').GetName] pod kontrolou můžeme nyní rozhodnout o budoucnosti oblasti. Okupace, která nominálně zachová suverenitu oblasti, si pravděpodobně zajistí mezinárodní souhlas, ale omezí naše praktické zisky."
 eastern_question_austria.2.f: "„Doporučil bych následující,“ řekl ministr. „Pro naše počáteční posouzení [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting] v [SCOPE.sState('bosnia_state_scope').GetCityHubName], [SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting] v [SCOPE.sState('bosnia_state_scope').GetFarmHubName] a [SCOPE.sCharacter('name_c_scope').GetLastNameNoFormatting] v [SCOPE.sState('bosnia_state_scope').GetForestryHubName]. Vyšleme administrativní pracovní skupiny na základě konkrétních nedostatků každé oblasti.“\n\n[SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting|U], sedící v první řadě, zvedl ruku. „Zprávy armády mi dosud nebyly doručeny. Co můžeme očekávat?“\n\n„Rozhořčené obyvatelstvo a úředníky posedlé propachtováním daní. Propusťte jich tolik, kolik bude třeba. Turci si nikdy nezískali pověst dobré správy.“"
 eastern_question_austria.2.a: "Obsadit území a reorganizovat jeho správu."
 eastern_question_austria.2.b: "Anektovat [GetStateRegion('STATE_BOSNIA').GetName] jako nedílnou součást našeho impéria."
 eastern_question_austria.2.c: "Začlenit [GetStateRegion('STATE_BOSNIA').GetName] do našeho impéria pod záštitou společného ministerstva financí."
 eastern_question_austria.2.e: "Anektovat [GetStateRegion('STATE_BOSNIA').GetName] jako součást země [SCOPE.sCountry('croatia_scope').GetName]."
 bosnian_protectorate_tt: "Území [GetStateRegion('STATE_BOSNIA').GetName] bude zorganizováno jako [GetCulture('bosniak').GetName] [concept_protectorate]"
 bosnian_puppet_tt: "Území [GetStateRegion('STATE_BOSNIA').GetName] bude zorganizováno jako [GetCulture('bosniak').GetName] [concept_puppet]"
 eastern_question_russia.1.t: "Ochránce jižních Slovanů"
 eastern_question_russia.1.t2: "[SelectLocalization(SCOPE.sCountry('bulgaria_scope').IsValid, SCOPE.sCountry('bulgaria_scope').GetAdjective, 'BUL_ADJ')] obrození"
 eastern_question_russia.1.d: "Náš příspěvek k nezávislosti [SCOPE.sCountry('bulgaria_scope').GetName] nám dodal věrohodnost coby ochránci jihoslovanských národů. Nyní máme dostatek příležitostí upevnit svůj vliv na Balkáně."
 eastern_question_russia.1.d2: "Nezávislost [SCOPE.sCountry('bulgaria_scope').GetName] odhalila trhliny v osmanské sféře. Získali jsme šťastnou příležitost rozšířit svou sféru vlivu na Balkáně."
 eastern_question_russia.1.f: "Zazněly tóny dechové kapely, když nově postavené [SCOPE.sCountry('bulgaria_scope').GetAdjectiveNoFormatting] pluky vyrazily na pochod. Jak zajímavé, pomyslel si [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting], že nové [SCOPE.sCountry('bulgaria_scope').GetAdjectiveNoFormatting] uniformy vypadaly téměř totožně jako [SCOPE.sCharacter('name_a_scope').GetHerHis] vlastní. Zelenomodrá látka, červené lemování. Dojemné, jako když dítě napodobuje svého otce.\n\n[SCOPE.sCharacter('name_a_scope').GetHerHis|U] poslání však vyžadovalo víc než dojetí. Jednoho dne budou možná tito vojáci muset pochodovat ve jménu zájmů [SCOPE.sCharacter('name_a_scope').GetHerHis] vlastní země. [ROOT.GetCountry.GetNameNoFormatting] bude potřebovat záruku od [SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle]. Bylo třeba sjednat vojenskou spolupráci a vznést nárok na osmanské spisy. Na každou hodinu radosti připadal den práce."
 eastern_question_russia.1.a: "Nabídnout [SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('bulgaria_scope').GetRuler.GetLastName] naše blahopřání a velvyslanectví."
 eastern_question_russia.1.b: "Dál v cizině se nabízí více příležitostí."
 eastern_question_russia.1.c: "Nabídnout [SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('bulgaria_scope').GetRuler.GetLastName] naše blahopřání a velvyslanectví."
 eastern_question_russia.1.e: "Možná by byl na místě delší pobyt."
