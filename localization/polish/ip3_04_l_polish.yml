 galicia_formation.1.t: "První krok"
 galicia_formation.1.d: "Znovusjednocením [SCOPE.sState('west_galicia_state').GetName] a [SCOPE.sState('east_galicia_state').GetName] jsme se výrazně vzdálili svému někdejšímu postavení pouhého svobodného města. Tlačí se však otázka - bude [ROOT.GetCountry.GetNameNoFlag] základnou pro [GetCulture('polish').GetName] sjednocení, nebo přijme svůj mnohonárodnostní charakter?"
 galicia_formation.1.f: "Kdyby se člověk soustředil na ohňostroje v [SCOPE.sState('west_galicia_state').GetCityHubName], pomyslel si Kiril, mohl by téměř zapomenout na problém na východě. Jediným státem, který si kdy nárokoval jméno „Halič“, bylo staré habsburské království - nádoba pro polské statkáře a německé byrokraty. Polští nacionalisté by ty druhé jistě nahradili, ale dalo se jim věřit, že přinesou rovnost jeho lidu? Kiril si po svém příjezdu město důkladně prošel a viděl jen málo, co by ho uklidnilo. Ve svém zápalu obnovit Republiku obou národů byli až příliš ochotni zapomenout na její nedostatky."
 galicia_formation.1.a: "[ROOT.GetCountry.GetNameNoFlag] je [GetCulture('polish').GetName] a vždy jí bude."
 galicia_formation.1.b: "[GetCulture('polish').GetCustom('getPluralDemonym')] a [GetCulture('ukrainian').GetCustom('getPluralDemonym')] naleznou jednotu pod naší vládou."
 galicia_formation.1.c: "Můžeme být mnohem víc."
