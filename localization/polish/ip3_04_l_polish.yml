 austrian_fascism.1.t: "Noví konzervativci"
 austrian_fascism.1.d: "Tradiční třídy, inspirované nespokojeností s [ROOT.GetCountry.GetAdjective] parlamentní demokracií, se začaly orientovat na [SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName]. Jejich platforma se odvolává na [GetReligion('catholic').GetName] sociální učení a pacifikaci dělnického hnutí v rámci [SCOPE.GetRootScope.GetCountry.GetCustom('social_monarchy_or_corporate_state')]."
 austrian_fascism.1.f: "„Spojuje nás také druhá věc, společný praktický cíl: chtít to nejlepší, přivést lidské společenství do co nejpříjemnějšího stavu.\n\nTen, kdo stojí napravo a v činech levicových socialistů nevidí nic než zkázu, stejně jako ten, kdo stojí nalevo a v činech pravičáků vidí jen temnou pohromu - ti všichni si mohou a musí navzájem přiznat přesvědčení, že je vede totéž ušlechtilé úsilí.“\n\n— Othmar Spann, #italic Pravý stát#!"
 austrian_fascism.1.a: "Tohle je budoucnost konzervatismu."
 austrian_fascism.1.b: "Nyní čelíme nejčernější reakci."
