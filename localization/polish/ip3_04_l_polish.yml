 je_eastern_question_russia: "Krize a příležitost"
 je_eastern_question_russia_reason: "Krize, která zmítá #v $dyn_c_ottoman_empire$#!, nám poskytla příležitost zajistit si další vliv ve [GetStrategicRegion('region_balkans').GetName]. Tím, že dohlédneme na vytvoření [GetCulture('bulgarian').GetName] státu, můžeme zároveň oslabit $dyn_c_ottoman_empire_adj$ sféru a dodat si věrohodnost coby ochránce [GetReligion('orthodox').GetName] lidí v celé Evropě."
