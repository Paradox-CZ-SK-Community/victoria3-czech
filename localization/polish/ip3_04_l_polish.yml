 austria_germany.1.t: "Sedmdesátimilionová říše"
 austria_germany.1.d: "Začlenění celé někdejší #b Rakouské říše#! do země [ROOT.GetCountry.GetName] vyvolalo mezi [GetCulture('north_german').GetName] nacionalisty velké znepokojení. Mnozí požadují, aby tato území získala nezávislost, jinak se Němci stanou menšinou ve vlastním státě."
 austria_germany.1.d1: "Začlenění celé někdejší #b Rakouské říše#! do země [ROOT.GetCountry.GetName] vyvolalo velké znepokojení mezi jejím neněmeckým obyvatelstvem. Mnozí se obávají diskriminace nebo nucené asimilace pod německým nacionalistickým státem."
 austria_germany.1.f: "„Musíte pochopit,“ řekl pruský delegát, „že lidé mají strach. Bojí se, že zhruba čtyřicet milionů obyvatel bývalého Rakouska rozředí charakter našeho národa, a bojí se, že jejich začlenění učiní z Německa jen jakési Velké Rakousko.“\n\nRakušan zavrtěl hlavou. „Jsou to dobří katoličtí poddaní, poslušní, pokud je nepodnítí cizí agitace. Ujišťuji vás, že tyto obavy jsou zcela neopodstatněné.“\n\n„Právě v tom je problém, ne? Tohle není katolická říše.“"
 austria_germany.1.a: "Propustit neněmecké regiony jako závislé země."
 austria_germany.1.b: "Udělit neněmeckým regionům nezávislost."
 austria_germany.1.c: "Držet se kurzu sedmdesátimilionového plánu."
