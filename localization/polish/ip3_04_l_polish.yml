 has_been_integrated_by_austria_tt: "Byli uspokojivě [Concept('concept_integrated_culture','$concept_integrated_culture_short$')] do federace"
 austria_federation.13.t: "Federální impérium"
 austria_federation.13.d: "Vláda země [SCOPE.sCountry('austria_scope').GetName] oficiálně podpořila návrh na reorganizaci impéria ve federální stát. Pokud bude úspěšně prosazen, znamenalo by to konec současné autonomie země [ROOT.GetCountry.GetNameNoFlag] a možnou ztrátu našich historických území."
 austria_federation.13.f: "„Z tohoto hlediska tedy nejde o otázku „zániku“, nýbrž o reorganizaci, o znovuzrození [SCOPE.sCountry('austria_scope').GetNameNoFormatting]. Kdyby si jen všichni ti, kdo se o toto impérium upřímně starají, dokázali i ve své temné touze plně uvědomit správnou cestu vpřed. Zaprvé není pravda, že právo na existenci mají pouze nezávislé národní státy. $SWI$, tolik a právem citovaný příklad, je typem smíšeně národnostního politického útvaru a nikdo rozumný by mu nechtěl upírat právo na existenci. Ve skutečnosti se v našem impériu historický proces pouze snaží nalézt moderní podobu vztahů mezi národními státy, která odpovídá jeho nově probuzeným potřebám.“\n\n— Aurel Popovici, #italic Spojené státy Velkého Rakouska#!"
 austria_federation.13.a: "Ve federaci je pro [ROOT.GetCountry.GetNameNoFlag] místo."
 austria_federation.13.b: "Pokud musíme bránit svou suverenitu, budiž."
 austria_federation.14.t: "Ze sinking ship pryč"
 austria_federation.14.d: "Naše nezávislost na [SCOPE.sCountry('austria_or_danubia_scope').GetName] navždy ukončila riziko vměšování z [SCOPE.sCountry('austria_or_danubia_scope').GetCapital.GetCityHubName]. Ať už [SCOPE.sCountry('austria_or_danubia_scope').GetAdjectiveNoFlag] vláda bude ve svém projektu pokračovat, nebo ne, my jeho součástí nebudeme."
 austria_federation.14.f: "[ROOT.GetCountry.GetCapital.GetCityHubName] se začalo měnit. Bylo to mnohem hlubší než nové vlajky a konfety v příkopech - [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] to viděl v jídelních lístcích kaváren, vyvěšených pamfletech i rozhovorech, které [SCOPE.sCharacter('name_a_scope').GetSheHe] slýchal na ulicích. Při své každodenní procházce narazil na skupinu dělníků natírajících budovu ministerstva, kteří starou schönbrunnskou žluť pohřbívali pod novou vrstvou rezavě rudé.\n\n„Tohle bylo habsburské město,“ jako by říkala, a tak se o to postarali. Přemýšlel, zda si přijdou i pro modré dveře."
 austria_federation.14.a: "Ať žije nezávislá země [ROOT.GetCountry.GetName]!"
 austria_federation.14.b: "Odpuštění můžeme nabídnout i z dálky."
 austria_federation.15.t: "[SCOPE.sCountry('relevant_subject').GetAdjective] vláda slibuje spolupráci"
 austria_federation.15.d: "Vláda země [SCOPE.sCountry('relevant_subject').GetName] přislíbila plnou spolupráci s naším plánem federalizovat impérium. Velká část naší [SCOPE.sCulture('primary_culture_scope').GetName] populace za jejich rozhodnutím stojí."
 austria_federation.15.f: "„Ministr se předtím usmíval. Slyšel jste?“\n\nHlas [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] byl sotva hlasitější než cinkání lžičky jeho souseda o porcelán. Jeden z jeho kolegů se ohlédl a nad tou poznámkou pozvedl obočí.\n\n„Skoro tomu nevěřím,“ řekl. „Kde jste to slyšel?“\n\n„Viděl jsem to na vlastní oči. Byl v hale s nějakým plukovníkem.“\n\n„[SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')], vsadil bych se,“ řekl muž na konci stolu. „Včera večer přijel kočár z [SCOPE.sCountry('relevant_subject').GetCapital.GetCityHubName] a nechtěli říct, kdo byl uvnitř. Něco vzrušujícího se chystá.“"
 austria_federation.15.a: "Duch přátelství kvete na Dunaji."
 austria_federation.15.b: "Jejich příspěvek není nezbytný."
 inform_vienna_tt: "[ROOT.GetCountry.GetTopOverlord.GetName] bude mít příležitost [Concept('concept_integrated_culture','$concept_integrated_culture_present$')] všechny naše způsobilé [concept_primary_cultures]"
 austria_federation.16.t: "[SCOPE.sCountry('relevant_subject').GetAdjective] vláda odmítá integraci"
 austria_federation.16.d: "Vláda země [SCOPE.sCountry('relevant_subject').GetName] přislíbila odpor vůči našemu plánu federalizovat impérium. Velká část naší [SCOPE.sCulture('primary_culture_scope').GetName] populace se za ně pravděpodobně postaví."
 austria_federation.16.f: "Dopis byl plný obvyklých řečí. Národní suverenita, přehmaty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], dávná práva a privilegia [SCOPE.sCountry('relevant_subject').GetAdjectiveNoFormatting] zemí. Nebyl to první takový dopis, který byl odeslán, a pravděpodobně nebude ani poslední, přesto byl zdaleka nejnepříjemnější. Torpédo do boku velkolepého vládního plánu. Úředník jej položil na tác k odeslání ministrovi.\n\nJeho pohled spočinul na kolegovi, který na druhé straně místnosti popíjel kávu. „Máme jiný plán?“\n\n„To nedokážu říct.“\n\n„Protože to nevíte, nebo protože je to vojenské tajemství?“\n\n„To nedokážu říct.“"
 austria_federation.16.a: "Budeme se muset obejít bez nich."
