 change_tag_to_KUK_republic_tt: "[ROOT.GetCountry.GetName] bude reorganizována na #v $KUK$#!"
 je_technocracy: "Nový stroj"
 je_technocracy_reason: "Zřízení [GetLawType('law_technocracy').GetName] v zemi [ROOT.GetCountry.GetName] představovalo obrovský krok k uskutečnění kompetentní, spořádané a bohaté společnosti. Samotná přítomnost [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] však nestačí k odstranění chyb a neefektivity starého řádu. K uskutečnění naší proměny společnosti zbývá ještě mnoho práce a masy zůstávají vůči našemu projektu skeptické.\n\nAbychom nový režim upevnili, musíme dokončit svůj program a ukázat, že $law_technocracy$ uskuteční éru míru a hojnosti, po které touží."
 je_technocracy_progress_bar: "Nový stroj"
 je_technocracy_progress_bar_desc: "Postup: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/[GetPlayer.MakeScope.ScriptValue('technocracy_upper_bound')])"
 je_technocracy_complete_tt: "#variable $je_technocracy_progress_bar$#! ukazatel postupu dosáhl #variable 100 %#!"
 technocracy.4.t: "Zlepšení pod vládou vědy"
 technocracy.4.d: "[ROOT.GetCountry.GetName] zažila období vnitřní stability a soustavného zlepšování pod vládou [GetIdeology('ideology_technocratic').GetName]. Dříve skeptické části společnosti široce přijaly [GetLawType('law_technocracy').GetName] jako ideální formu vlády."
 technocracy.4.f: "„V technokracii vidíme, jak věda nahrazuje ekonomiku nedostatku ekonomikou hojnosti.\nV technokracii vidíme, jak funkční způsobilost vytlačuje groteskní a plýtvavou nezpůsobilost, fakta vytlačují dohady, řád vytlačuje nepořádek a průmyslové plánování vytlačuje průmyslový chaos.\nTechnokracie je pokusem vědy vybudovat civilizaci hodnou inteligence člověka.“\n\n— Howard Scott, „Technocracy: Science vs. Chaos“"
 technocracy.4.a: "Nový svět nikdy nebyl blíže."
 technocracy.4.b: "Naše metody se musí rozšířit do všech oblastí společnosti."
