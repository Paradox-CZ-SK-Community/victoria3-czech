 peoples_springtime.9.t: "[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] revoluce"
 peoples_springtime.9.d: "Revolucionáři v [SCOPE.sState('relevant_state').GetCityHubName], inspirovaní revoluční vlnou šířící se Evropou, se shromáždili, aby vznesli požadavky vůči [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]. Volají po zákonu [GetLawType('law_universal_suffrage').GetName], demokratické ústavě a zřízení [GetLawType('law_national_guard').GetName]."
 peoples_springtime.9.f: "Dav se nyní valil k sídlu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], zadržovaný jen tenkou zdí vojáků s kamennými tvářemi. Urážky a pouliční smetí létaly proti řadě bajonetů a děl, až koně švihali ocasy. V obchodních čtvrtích maloobchodníci, kteří se rozhodli nepřipojit k pochodu, zabedňovali své obchody. Ještě dál za improvizovanými liniemi dělníci vytrhávali lampové sloupy, aby jimi prorazili městské brány. Rozbité trubky vrhaly na ulice zlověstný polojas."
 peoples_springtime.9.a: "Nemůžeme riskovat občanskou válku."
 peoples_springtime.9.b: "Přistupte na kompromis ve volebním právu, ale dotáhněte to."
 peoples_springtime.9.c: "Okamžitě pošlete armádu."
 had_springtime_revolution_tt: "[ROOT.GetCountry.GetNameNoFlag] byla donucena uzákonit demokratickou ústavu"
 had_springtime_revolution_tt_no_scope: "Tato [concept_country] byla donucena uzákonit demokratickou ústavu"
 has_liberal_or_radical_in_government_tt: "Má jakoukoli #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_ideologies_list_tt liberální#!, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],progressive_ideologies_list_tt progresivní#! nebo #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_ideologies_list_tt socialistickou#! [concept_interest_group] [concept_in_government]"
 has_census_voting_or_universal_suffrage_tt: "Uzákonila jakoukoli variantu zákona [GetLawType('law_census_voting').GetName] nebo [GetLawType('law_universal_suffrage').GetName]"
 peoples_springtime.10.t: "Rudé [SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name_dynamic')]"
 peoples_springtime.10.d: "Revoluční vlna v Evropě vynesla v zemi [ROOT.GetCountry.GetName] k moci liberální vládu. Tento křehký liberální řád ohrožují jak konzervativní síly, které chtějí zvrátit jeho výdobytky, tak radikálové hrozící novou revolucí."
 peoples_springtime.10.f: "„V hlavním městě jsem našel sto tisíc ozbrojených dělníků, zformovaných do pluků, bez práce a umírajících hlady, avšak s hlavami přeplněnými marnými teoriemi a vidinami. Viděl jsem společnost rozdělenou na dvě části: ty, kdo nic nevlastnili, sjednocené společnou chtivostí; a ty, kdo něco vlastnili, sjednocené společným strachem. Mezi těmito dvěma velkými částmi nebyla žádná pouta ani soucit; všude se zdála být na dosah myšlenka nevyhnutelného a okamžitého boje.“\n\n—Alexis de Tocqueville, #italic Vzpomínky Alexise de Tocquevilla#!"
 peoples_springtime.10.a: "Ať žije ústava!"
 peoples_springtime.10.b: "Této frašce musí být učiněn konec."
