 je_the_hungry_forties_reason: "Vlna chorob plodin zasáhla [GetGeographicRegion('geographic_region_europe').GetName], což vyvolalo špatné sklizně a nedostatek potravin. Choroba je obzvlášť smrtící pro brambory, které se rychle rozpadají v odporně páchnoucí, nepoživatelnou kaši.\n\n#b Evropská bramborová plíseň#!:\nDokud je tento [concept_journal_entry] aktivní, míra výskytu [concept_harvest_condition] $disease_outbreak$ v evropských státech bude výrazně zvýšena."
