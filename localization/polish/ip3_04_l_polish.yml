 labour_associations_events.1.t: "Bez odborů"
 labour_associations_events.1.d: "[SCOPE.gsInterestGroup('industrialists_ig').GetName], ohroženi posilováním dělnických spolků podle zákona [SCOPE.sLaw('current_law_scope').GetName], zveřejnili četné zprávy o nebezpečích odborově organizované pracovní síly."
 labour_associations_events.1.f: "#bold Je život v odborech pro mě?#!\n\n• Příspěvky strhávané z vaší mzdy\n• Žádné záruky mzdy, výhod ani pracovních pravidel\n• Žádná možnost individuálního vyjednávání\n\n#italic Vaše SPOLEČNOST vám poskytuje práci a vyplácí mzdu - ODBORY to nikdy nedělaly a nikdy dělat nebudou!#!"
 labour_associations_events.1.a: "Musí být vyděšení."
 labour_associations_events.1.b: "Každý má právo sledovat své zájmy."
 labour_associations_events.2.t: "Preventivní stávky"
 labour_associations_events.2.d: "Zprávy o snaze vlády zakotvit zákon [SCOPE.sLaw('current_law_scope').GetName] se rychle rozšířily mezi dělnickými komunitami. [SCOPE.gsInterestGroup('industrialists_ig').GetName] si začali stěžovat na odpovídající nárůst nezákonné odborové činnosti."
 labour_associations_events.2.f: "Ve chvíli, kdy vláda oznámila svou iniciativu, začaly se objevovat plakáty. Marné úsilí nočních hlídačů dopadnout pachatele nepřineslo žádné výsledky, což firmu donutilo omezovat škody. Každou noc byly zdi polepeny - a ráno společnost plnila koše výsledky práce předchozí noci.\n\nHned následující týden oznámili popeláři vznik svých nových odborů."
 labour_associations_events.2.a: "Nařiďte soudům, aby tyto stížnosti ignorovaly."
 labour_associations_events.2.b: "Současné zákony zůstávají v platnosti."
 labour_associations_events.3.t: "Komise pro odbory"
 labour_associations_events.3.d: "Po peticích pracovních skupin sestavil [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] komisi pro zákon [SCOPE.sLaw('current_law_scope').GetName]. Komise vládě předložila dvě zprávy - většinovou zprávu sepsanou skupinou [SCOPE.gsInterestGroup('opposed_ig').GetName] a menšinovou zprávu nakloněnou skupině [SCOPE.gsInterestGroup('unions_ig').GetName]."
 labour_associations_events.3.f: "„Ve skutečnosti byl zákon ve své tehdejší podobě jednostranný a nespravedlivý. Zatímco téměř každé sdružování dělníků na podporu jejich cílů bylo považováno za spiknutí omezující obchod, a tudíž trestně postižitelné, naprosto podobné činy spáchané mistrem unikaly pozornosti zákona, neboť se nepovažovaly za trestný čin spiknutí. Ve skutečnosti však zaměstnavatel několika tisíc dělníků byl sám o sobě sdružením.“"
 labour_associations_events.3.a: "Přijměte menšinovou zprávu."
 labour_associations_events.3.b: "Většinová zpráva je přesvědčivější."
 labour_associations_events.4.t: "Umírající odvětví"
 labour_associations_events.4.d: "Vládní útoky na zákon [GetLawType('law_guild_system').GetName] podnítily nepokoje mezi těmi, kdo cítí, že je ohrožena jejich obživa. Ve státě [SCOPE.sState('relevant_state').GetName] rozbouření řemeslníci a kvalifikovaní dělníci rozbíjeli stroje a zastrašovali dodavatele."
 labour_associations_events.4.f: "Prokletí Bohu, k němuž jsme své prosby\nmarně vysílali v hladové tísni;\nmarně jsme doufali a marně čekali,\njen se vysmíval a tupil náš smutný úděl -\ntkáme, tkáme!"
 labour_associations_events.4.a: "Pokud nedokážou svobodně soutěžit, mohou si najít práci jinde."
 labour_associations_events.4.b: "Pošlete armádu chránit majetek."
 labour_associations_events.5.t: "Poslední obrana"
 labour_associations_events.5.d: "Snahy vlády prosadit zákon [SCOPE.sLaw('current_law_scope').GetName] se setkaly s téměř všeobecným odporem ze strany [SCOPE.gsInterestGroup('trade_unions_ig').GetName]. Odborové vedení vyhlásilo generální stávku ve snaze přimět vládu k ústupkům."
 labour_associations_events.5.f: "Odbory vyšly do ulic v plné síle. Každý sloup veřejného osvětlení v okruhu jedné míle od [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] byl ověšen rudými stuhami a pohyb pěšky byl beznadějným podnikem. Několik vládních zákonodárců se rozhodlo spát ve svých kancelářích, než aby čelili lidským přílivům. Jiní, radikálové z opozice, se k nim rozhodli připojit. Cestu zpět jim odřízla řada policistů, která se vinula kolem celé budovy.\n\nObě strany to nyní považovaly za stav obležení. Protestující vypracovali skutečně působivý logistický systém pro rozdělování chleba a vody mezi sebou, zatímco zákonodárci využívali jídelnu a vinný sklep [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')].\n\n„Jak dlouho?“ zeptal se mladší člen. Jeho kolega už nedokázal sebrat sílu k odpovědi."
 labour_associations_events.5.a: "Jejich reakce tento návrh zákona ospravedlňuje."
 labour_associations_events.5.b: "Nabídněte vyjednávání."
 labour_associations_events.5.c: "Zachyťte jejich komunikační prostředky."
 labour_associations_events.6.t: "Nesnesitelné sváry"
 labour_associations_events.6.d: "Kniha podrobně popisující děsivé podmínky, jimž jsou průmysloví dělníci běžně vystaveni, se přes noc stala úspěchem. Úspěch knihy zvýšil veřejný zájem o zákon [SCOPE.sLaw('current_law_scope').GetName] a zároveň zahanbil [SCOPE.gsInterestGroup('industrialists_ig').GetName]."
 labour_associations_events.6.f: "„Společenský řád tak činí rodinný život dělníka téměř nemožným. V nepohodlném, špinavém domě, sotva dost dobrém jako pouhý noční úkryt, bídně zařízeném, často nechráněném před deštěm ani teplém, v odporném ovzduší místností přeplněných lidmi není žádné domácí pohodlí možné. Manžel pracuje celý den, možná i žena a starší děti, všichni na různých místech; setkávají se jen ráno a večer, všichni pod neustálým pokušením pít; jaký rodinný život je za takových podmínek možný?“"
 labour_associations_events.6.a: "Dělníci by měli mít možnost hájit své zájmy."
 labour_associations_events.6.b: "Nesmíme dále rozrušovat vlastníky."
 labour_associations_events.7.t: "Litera zákona"
 labour_associations_events.7.d: "Povzbuzeni obratem vlády proti organizované práci začali [SCOPE.gsInterestGroup('relevant_bourgeois_ig').GetName] preventivně zasahovat proti odborům ve svých provozech. [SCOPE.gsInterestGroup('unions_ig').GetName] požadují reakci, dokud staré zákony stále platí."
 labour_associations_events.7.f: "Byla to absurdita. Úředník to věděl, jeho nadřízení to věděli a odborový zástupce stojící před ním to pravděpodobně věděl také. Petice na poslední chvíli, opírající se o zákon, který zmizí z knih dříve, než by se vůbec dostal k soudci.\n\nA přesto byla dokonalá. Neobsahovala žádnou zjevnou chybu, která by mu umožnila ji rovnou odmítnout. Jeho jedinou možností bylo nechat ji ucpat schránku někoho jiného. Koutky úst se mu stáhly do neradostného úsměvu.\n\n„Děkuji, pane. Ministerstvo vás bude kontaktovat poštou.“"
 labour_associations_events.7.a: "Už nemají žádné právní postavení."
 labour_associations_events.7.b: "Musíme dodržovat stávající legislativu."
 labour_associations_events.8.t: "Svobodný trh práce"
 labour_associations_events.8.d: "Jak vláda podniká kroky k odstranění zákona [GetLawType('law_guild_system').GetName], povzbuzení [GetPopType('laborers').GetName] a [GetPopType('machinists').GetName] začali pronikat do oborů, z nichž byli dříve vyloučeni."
 labour_associations_events.8.f: "„Odcházím. Chtěl jsem to říct dřív. Našel jsem si práci v [SCOPE.sState('relevant_state').GetCityHubName], v továrně. Nabídli mi půjčku na cestu, palandu...“\n\nOdmlčel se a postupně pohlédl do tváří svých přátel.\n\n„Děkuji. Za všechno. Napíšu, nebo někoho požádám, aby napsal. Bylo to... bylo to nádherné. Jednou vás zase uvidím. Slibuji.“"
 labour_associations_events.8.a: "Naše úsilí je náležitě odměněno."
 labour_associations_events.8.b: "Velké vítězství svobody."
 labour_associations_events.9.t: "Postranní úmysly"
 labour_associations_events.9.d: "Významní členové [SCOPE.gsInterestGroup('landowners_ig').GetName] vycítili příležitost znevýhodnit své hospodářské rivaly ve městech a vyslovili se pro prosazení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 labour_associations_events.9.f: "„Odbory jsou činitelé nepořádku - ale především činitelé, kteří svou největší nevraživost vyhrazují našim bezprostředním konkurentům. Budou požadovat ústupky od svých nadřízených, ústupky, které hluboce zasáhnou kapsy magnátů z [SCOPE.sState('relevant_state').GetCityHubName]. Aby tyto ztráty vyrovnali, budou nuceni zvýšit své ceny, čímž se naše vlastní produkce ocitne v mimořádně výhodném postavení.“\n\n„A co naše vlastní obyvatelstvo? Musíme se bát rolnických odborů?“\n\n„Mohou dýchat čistý vzduch a cítit slunce na šíji. Mnozí vlastní své pozemky. K čemu by potřebovali odbory?“"
 labour_associations_events.9.a: "Dokonale funkční uspořádání."
 labour_associations_events.9.b: "Musíme být vůči takovým nabídkám obezřetní."
