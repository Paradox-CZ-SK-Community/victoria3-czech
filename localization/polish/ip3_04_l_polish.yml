 hungry_forties.1.t: "Hladov[SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]"
 hungry_forties.1.d: "Propuknutí choroby plodin ve státě [SCOPE.sState('relevant_state').GetName] se začalo šířit po velké části evropského kontinentu. S hrozící neúrodou se začínají šířit obavy z hladomoru."
 hungry_forties.1.f: "Lékař šťouchl do brambory svým nástrojem a naklonil se stranou, aby jeho kolega viděl. Tupý hrot nástroje se zaryl centimetr hluboko do zbarvené skvrny v její dužině.\n\n„Obávám se, že je to plíseň. Kdybych prohlédl jakoukoli jinou hlízu z pole, výsledek by byl pravděpodobně stejný. Za těchto okolností bych doporučil mimořádná opatření.“"
 hungry_forties.1.a: "Pohroma!"
 hungry_forties.1.b: "Zřídit fondy na nákup zahraničního obilí."
 hungry_forties.2.t: "Snazší časy"
 hungry_forties.2.d: "Vlny chorob plodin, které sužovaly evropský kontinent po celé „hladové [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')]“, ustoupily. Ačkoli napadená pole možná už nikdy nebudou schopna hostit postiženou odrůdu brambor, u ostatních plodin se očekává úplné zotavení."
 hungry_forties.2.f: "„Slyšel jsi? Prodávají nový druh sadbových brambor. Prý je plíseň nenapadá.“\n\nMuž opřený o druhou stranu plotu pozvedl obočí. „Už bylo načase. Dokonce pozdě. Musel jsem dětem dávat jíst seno, abychom přečkali zimu.“\n\n„Ty jsi z toho vyvázl snadno. Rodina dole u cesty o ty svoje přišla. Zatraceně pozdě, to tedy ano.“"
 hungry_forties.2.a: "Díkybohu."
 hungry_forties.2.b: "Můžeme si být jistí, že je po všem?"
