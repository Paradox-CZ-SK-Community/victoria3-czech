 je_standestaat_reason: "Vzestup masové politiky v [ROOT.GetCountry.GetName] podnítil vzestup protihnutí mezi tradičními třídami. [SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')] usiluje o zrušení [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] a vícestranické demokracie ve prospěch [SCOPE.GetRootScope.GetCountry.GetCustom('social_monarchy_or_corporate_state')], neboli „Ständestaat“.\n\nDokud je tento [concept_journal_entry] aktivní, zvýší se četnost, s jakou se objevují postavy s ideologií [GetIdeology('ideology_corporatist_leader').GetName]."
