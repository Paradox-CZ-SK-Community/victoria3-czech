 capital_is_in_danubian_states_tt: "[concept_capital_state] se nachází v [concept_georegion] [GetGeographicRegion('region_danubia').GetName], [GetGeographicRegion('region_balkans').GetName], [GetGeographicRegion('region_poland').GetName] nebo [GetGeographicRegion('region_south_germany').GetName]"
