 je_metternich: "Metternichův věk"
 je_metternich_reason: "Následky #b napoleonských válek#! ustanovily [ROOT.GetCountry.GetName] jako přední konzervativní mocnost v Evropě. Hlavní architekt ponapoleonského řádu, [SCOPE.sCharacter('metternich_scope').GetFullName], slouží jako kancléř země [ROOT.GetCountry.GetNameNoFormatting] od bouřlivého roku 1821. [SCOPE.sCharacter('metternich_scope').GetHerHis|U] program požaduje zachování [ROOT.GetCountry.GetAdjectiveNoFormatting] [GetLawType('law_autocracy').GetName], udržování konzervativního míru v Evropě a podporu umění a věd.\n\n#b Metternichův program:#!\nUskutečnění různých bodů programu kancléře [SCOPE.sCharacter('metternich_scope').GetLastName] zlepší účinky tohoto [concept_journal_entry]. Tyto úspěchy budou vyhodnoceny při úspěšném #b dokončení#! tohoto záznamu v deníku.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_ita_checkbox')] Zabráněno #b $ITA_ADJ$#! [Concept('concept_unification', '$concept_unification_short$')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_ger_checkbox')] #b $GER$#! nebylo [Concept('concept_unification', 'sjednoceno')] žádnou jinou [concept_country]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_art_checkbox')] [ROOT.GetCountry.GetNameNoFlag] je předním producentem zboží [GetGoods('fine_art').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_krakow_checkbox')] [ROOT.GetCountry.GetNameNoFlag] vlastní celou [concept_state_region] [GetStateRegion('STATE_WEST_GALICIA').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_tech_checkbox')] [ROOT.GetCountry.GetNameNoFlag] vyzkoumala #v [GetPlayer.MakeScope.ScriptValue('metternich_tech_target')|v0]#! [Concept('concept_technology', '$concept_technologies$')] (aktuálně [GetPlayer.MakeScope.ScriptValue('techs_researched_script')|v0])[SCOPE.GetRootScope.GetCountry.GetCustom('metternich_system_entry')][SCOPE.GetRootScope.GetCountry.GetCustom('metternich_system_cohesion_entry')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_movement_checkbox')] Všechna #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt liberální#! nebo #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt socialistická#! [Concept('concept_political_movement','$concept_political_movements$')] mají #b marginální#! podporu\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_laws_checkbox')] [ROOT.GetCountry.GetNameNoFlag] má [GetLawType('law_autocracy').GetName], [GetLawType('law_censorship').GetName] a [GetLawType('law_secret_police').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_institution_checkbox')] #b $institution_home_affairs$#! a #b $institution_police$#! [Concept('concept_institution', '$concept_institutions$')] jsou na úrovni #v 2#! nebo vyšší"
 metternich_system_box_tt: "\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_bloc_checkbox')] [ROOT.GetCountry.GetPowerBloc.GetName] má více než #v [GetPlayer.MakeScope.ScriptValue('metternich_bloc_target')|v0]#! [Concept('concept_power_bloc_member','$concept_power_bloc_members_extra_short$')] (aktuálně [GetPlayer.MakeScope.ScriptValue('num_power_bloc_members_script')|v0])"
