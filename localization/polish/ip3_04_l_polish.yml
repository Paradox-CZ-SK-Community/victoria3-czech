 slave_revolt.4.t: "Na domácí půdě"
 slave_revolt.4.d: "Skupina uprchlých [GetPopType('slaves').GetName] z naší kolonie [SCOPE.sState('fleeing_slaves_state').GetName] úspěšně dorazila na [ROOT.GetCountry.GetAdjectiveNoFlag] pevninu poté, co se ukryla na obchodní lodi. Podle zákona jsou všichni zotročení lidé, kteří vstoupí na [ROOT.GetCountry.GetAdjectiveNoFormatting] půdu, osvobozeni."
 slave_revolt.4.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] seděl na okraji mola a houpal [SCOPE.sCharacter('name_a_scope').GetHerHis] nohama nad hladinou vody. Západ slunce barvil vodu do ruda. Příhodné, vzhledem k dnešním zprávám. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] je viděl v novinách, vyvěšené na zdech, na rtech kolemjdoucích.\n\nZpoza [SCOPE.sCharacter('name_a_scope').GetHerHim] se ozval hlas. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] ho poznal - [SCOPE.sCharacter('name_b_scope').GetFirstNameNoFormatting], další úředník od soudu.\n\n„Na co myslíš?“\n\n„V [SCOPE.sState('port_state').GetPortHubName] se otřásají při představě lidí v řetězech. Ale na ty za obzorem ani nepomyslí. Jednoho dne nás [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] potrestá všechny.“"
 slave_revolt.4.a: "Mají nárok na všechna práva svobodných mužů."
 slave_revolt.4.b: "Svobodní nebo ne, musí se vrátit do [SCOPE.sState('fleeing_slaves_state').GetName]."
