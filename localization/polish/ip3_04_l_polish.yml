 metternich_resignation_and_flee_tt: "[SCOPE.sCharacter('metternich_scope').GetFullName] podá [SCOPE.sCharacter('metternich_scope').GetHerHis] rezignaci"
 metternich.1.t: "Konec jedné doby"
 metternich.1.d: "S nástupem [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] na trůn oznámil dlouholetý kancléř [SCOPE.sCharacter('metternich_scope').GetFullName] [SCOPE.sCharacter('metternich_scope').GetHerHis] odchod do výslužby. Kapitola dějin vymezená [SCOPE.sCharacter('metternich_scope').GetHerHis] státnictvím se uzavřela."
 metternich.1.f: "„Ale myšlenka, kterou koneckonců tajně chovám, je, že stará Evropa stojí na počátku konce. Jelikož jsem odhodlán zahynout spolu s ní, budu vědět, jak splnit svou povinnost; a toto není jen mé heslo - je to i heslo císařovo. Nová Evropa naproti tomu svou existenci dosud nezačala a mezi koncem a počátkem bude chaos.“\n\n— Klemens von Metternich"
 metternich.1.a: "Velký dirigent odchází z jeviště."
 metternich.2.t: "Neslavný konec"
 metternich.2.d_revolution: "Země [ROOT.GetCountry.GetNameNoFlag] zmítaná revolučním zmatkem a vláda již neschopná zaručit [SCOPE.sCharacter('metternich_scope').GetHerHis] bezpečnost donutily [SCOPE.sCharacter('metternich_scope').GetFullName], aby rezignoval na [SCOPE.sCharacter('metternich_scope').GetHerHis] funkci. [SCOPE.sCharacter('metternich_scope').GetSheHe|U] uprchl z [ROOT.GetCountry.GetCapital.GetCityHubName] a odešel do exilu."
 metternich.2.d_gov_change: "Vyloučení [SCOPE.gsInterestGroup('aristocracy_ig').GetName] z vlády ponechalo [SCOPE.sCharacter('metternich_scope').GetFullName] bez jiné možnosti než rezignovat na [SCOPE.sCharacter('metternich_scope').GetHerHis] funkci. Zbaven značné části svého někdejšího vlivu se [SCOPE.sCharacter('metternich_scope').GetSheHe] uchýlil do ústraní na [SCOPE.sCharacter('metternich_scope').GetHerHis] statku."
 metternich.2.f: "„Už nejsem nikým. Nemám už co dělat, nemám už o čem jednat.“\n\n— Klemens von Metternich"
 metternich.2.a: "[SCOPE.sCharacter('metternich_scope').GetSheHe|U] nás již nebude určovat."
 metternich.3.t: "Malý puč"
 metternich.3.d: "Kancléř [SCOPE.sCharacter('metternich_scope').GetFullName] navrhl soubor reforem struktury Geheime Staatskonferenz, které mají zlepšit fungování tohoto orgánu a zároveň ustavit [SCOPE.sCharacter('metternich_scope').GetHerselfHimself] jako jeho nespornou hlavu. [SCOPE.sCharacter('kolowrat_scope').GetFullName] se spojil s královskou rodinou, aby toto opatření zastavil."
 metternich.3.f: "„Je jen málo mužů, kterým by další moc prospěla méně než Metternichovi,“ začal posel, „a prosím arcivévodu, aby mi odpustil, že to říkám. Pokud budete do konce měsíce k dispozici...“\n\nArcivévoda mu pokynul, aby se zarazil, s podrážděným výrazem ve tváři. Měl boty napůl obuté a chtěl jim věnovat plnou pozornost. „Do konce měsíce? Kde je teď Kolovrat?“\n\n„V Čechách, můj pane. Posílá zvěsti o chřipce.“"
 metternich.3.a: "Kolowratovo vměšování ohrožuje stabilitu říše."
 metternich.3.b: "Kancléř udělá nejlépe, když se omezí na zahraniční záležitosti."
