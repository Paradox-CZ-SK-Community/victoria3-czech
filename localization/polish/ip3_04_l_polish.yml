 austria_trialism.1.t: "[SCOPE.sCountry('austria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('austria_scope').GetRuler.GetFirstName] vydává trialistický manifest"
 austria_trialism.1.d: "[SCOPE.sCountry('austria_scope').GetRuler.GetPrimaryRoleTitle] v [SCOPE.sCountry('austria_scope').GetCapital.GetCityHubName] vydal manifest na podporu ustavení [GetCulture('croat').GetName] království. Ustavení tohoto království by vyžadovalo narušení celistvosti [ROOT.GetCountry.GetAdjectiveNoFlag] korunních zemí a oslabilo by naše relativní postavení v říši."
 austria_trialism.1.f: "Posel bušil na dveře předsedy sněmu a přestal až ve chvíli, kdy se objevil tajemník. V jedné ruce svíral svazek papírů a druhou se opíral o rám dveří, aby udržel rovnováhu. Mezi zalapáními po dechu se mu podařilo vyslovit první věty.\n\n„Právě jsem dostal zprávy. [SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getEmpressEmperor')]-“\n\n„Myslíte [SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getQueenKing')]?“\n\n„Ach, ano. [SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getQueenKing')] nás chce rozčlenit.“"
 austria_trialism.1.a: "Vetujte tuto urážku země [ROOT.GetCountry.GetNameNoFlag]."
 austria_trialism.1.b: "Ať jsou naše chyby pomstěny. Podepište manifest."
 possible_dp_with_austria_scope_tt: "#r#b Může vést k [concept_diplomatic_play] proti zemi [SCOPE.sCountry('austria_scope').GetName]#!#!"
 austria_trialism.2.t: "[SCOPE.sCountry('hungary_scope').GetName] vetuje trialistický manifest"
 austria_trialism.2.d: "Vláda země [SCOPE.sCountry('hungary_scope').GetName] vetovala manifest [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], který sliboval rovnocennou monarchii pro [GetCulture('croat').GetName] lid. Odmítnutí ze strany [SCOPE.sCountry('hungary_scope').GetNameNoFormatting] vyvolalo nespokojenost mezi jihoslovanským obyvatelstvem obou polovin říše."
 austria_trialism.2.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] se rozlehl hluboký povzdech. Neměli důvod k optimismu - a přesto se to jaksi zdálo tak blízko. Na okamžik si dovolili doufat, jen aby byli rázně vyvedeni z omylu.\n\nŘešení samozřejmě existovalo, takové, které se v dané chvíli nikdo z nich neodvážil vyslovit. Teprve večer, až se jejich myšlenky obrátí od rozčarování k pomstě, bude možné něco takového vyjádřit. [SCOPE.sCountry('hungary_scope').GetNameNoFormatting] mělo právo veta, ale [ROOT.GetCountry.GetNameNoFormatting] mělo těžké dělostřelectvo. Odváží se znovu doufat?"
 austria_trialism.2.a: "Udělali jsme vše, co rozumně můžeme."
 austria_trialism.2.b: "Mobilizujte armádu k vynucení jeho podmínek."
 austria_trialism.3.t: "Trojí monarchie"
 austria_trialism.3.d_peace: "Ratifikací manifestu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zemí [SCOPE.sCountry('hungary_scope').GetName] bylo z [GetCulture('croat').GetName] území říše zorganizováno rovnocenné Království [SCOPE.sCountry('croatia_scope').GetName]. Duální monarchie se stala Trojí monarchií."
 austria_trialism.3.d_war: "Poté, co byla země [SCOPE.sCountry('hungary_scope').GetName] vojenskou silou přivedena k poslušnosti, bylo z [GetCulture('croat').GetName] území říše zorganizováno rovnocenné Království [SCOPE.sCountry('croatia_scope').GetName]. Duální monarchie se stala Trojí monarchií."
 austria_trialism.3.f: "„Když se noviny dozvěděly o manifestu,“ začal úředník, „v [SCOPE.sCountry('croatia_scope').GetCapital.GetCityHubName] se konaly dva průvody. První oslavoval konec Duální monarchie a druhý vítal Trojí monarchii. Řekl bych, že to je sdělení stejně jasné jako jakékoli jiné.“\n\n„Říkal jste, že jste byl přítomen u prvního. Měl jste někdy obavy, že se vymkne kontrole?“\n\n„Přemýšlel jsem o tom, to musím přiznat. Takové věci jsou žalostně běžné. Ale mohli ukazovat prstem na Maďary. Místo abychom byli jejich utlačovateli, udělali jsme ze sebe jejich hrdiny.“"
 austria_trialism.3.a: "Omezit [SCOPE.sCountry('croatia_scope').GetNameNoFlag] na historické [GetCulture('croat').GetName] země."
 austria_trialism.3.b: "Svěřit mu správu části [GetCulture('slovene').GetName] zemí."
 austria_trialism.3.c: "[SCOPE.sCountry('croatia_scope').GetNameNoFlag] bude královstvím pro všechny jižní Slovany."
 aus_hun_civil_war_warning_tt: "#r Pokud žádná strana neustoupí, mezi polovinami říše vypukne otevřená válka.#!"
