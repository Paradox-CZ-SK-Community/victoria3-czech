 je_red_summer: "Rud[SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name')]"
 je_red_summer_reason: "Revoluční vlna #b $je_springtime_of_the_peoples$#! vynesla v zemi [ROOT.GetCountry.GetName] k moci novou liberální vládu. Získat moc však není totéž jako ji udržet. Liberální vládu ohrožují jak #b konzervativní síly#!, které si přejí zrušit nový parlamentní řád, tak #b radikálové#!, kteří hrozí druhou, mnohem rozsáhlejší revolucí.\n\n#b Kontrarevoluce#!\nDokud liberální vláda neupevní svou vládu, budou ji ohrožovat pomstychtivé zbytky starého řádu. Pokud #b postup kontrarevoluce#! dosáhne #v 100#!, revoluční vláda bude #b odstraněna od moci#! a bude znovu nastolen konzervativní řád."
