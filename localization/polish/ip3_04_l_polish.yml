 notification_danubian_federation_culture_disqualified_desc: "Jak postupuje proces federalizace impéria, [SCOPE.sCountry('austria_scope').GetAdjective] vláda učinila rozhodnutí, které vedlo k tomu, že [SCOPE.sCulture('relevant_culture_scope').GetName] [concept_culture] byla trvale [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] z integrace.\n\n[SCOPE.sCountry('austria_scope').GetName] již nebude moci dokončit [concept_journal_entry] #v $je_danubian_federation$#!, aniž by snížilo naši [concept_liberty_desire] pod #v 25#! a zvýšilo naše vzájemné vztahy nad #v 50#!"
