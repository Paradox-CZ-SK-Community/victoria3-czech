 je_danubian_federation_observer: "Federální projekt"
 je_danubian_federation_observer_reason: "Vláda země [SCOPE.sCountry('austria_scope').GetName] podpořila návrh na reorganizaci území [SCOPE.sCountry('austria_scope').GetAdjectiveNoFormatting] impéria do federace samosprávných států vymezených podle etnických linií. Tento návrh by zrušil složitou síť korunních zemí a personálních unií, které v současnosti tvoří impérium, a nahradil by je federální strukturou v konečném důsledku odpovědnou Vídni.\n\nPokud [SCOPE.sCountry('austria_scope').GetNameNoFlag] dokončí [concept_journal_entry] #v $je_danubian_federation$#!, budou tradiční práva a privilegia země [ROOT.GetCountry.GetName] zrušena a naše země přímo začleněny do [SCOPE.sCountry('austria_scope').GetCustom('future_kuk_name')|v]."
