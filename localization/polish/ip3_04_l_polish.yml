 austria_events.40.t: "Zachránit impérium"
 austria_events.40.d: "Rozšíření volebního práva v [ROOT.GetCountry.GetName] vyvolalo ostrou reakci mezi tradičně konzervativními [SCOPE.gsInterestGroup('armed_forces_ig').GetName]. Mnozí [GetPopType('officers').GetName] začali považovat [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] za přítěž pro stabilitu impéria."
 austria_events.40.f: "„Politici se snaží proměnit impérium ve frašku,“ začal plukovník. „Každé rozšíření hlasovacího práva činí [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] stále nezvládnutelnější. Tráví čas rozdmýcháváním zmatků a průtahů a každý odložený čin vrhá na Korunu novou skvrnu.“\n\nViděl kolem sebe přikyvování. Každý z mužů u stolu pocítil rozpočtové škrty provedené ve jménu zajištění podpory nějakého provinčního sněmu. Pokračoval.\n\n„Naše impérium vstoupilo do let soumraku a právě uprostřed této zkázy stojíme. Pokud to bude pokračovat - pokud tomu bude #italic dovoleno#! pokračovat - obávám se, že budeme všichni smeteni do zapomnění.“"
 austria_events.40.a: "Jejich slova hrozí diktaturou."
 austria_events.40.b: "Můžeme opravdu říci, že se mýlí?"
 modifier_military_absolutist_bonus: "Impérium nad ústavou"
