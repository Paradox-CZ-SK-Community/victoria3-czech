 metternich_memory_text_tt: "[SCOPE.sCharacter('metternich_scope').GetFullName] bude připomínán jako [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_performance_text')]"
 metternich_memory_level_0: "muž, který svou neschopností zasel semena nevyhnutelného pádu země [ROOT.GetCountry.GetNameNoFormatting]."
 metternich_memory_level_1: "zdiskreditovaný pramen reakce, jehož vize se ukázala být zhoubnou pro vše, čeho se dotkla."
 metternich_memory_level_2: "vybledlý státník, který se držel moci dávno po svém čase."
 metternich_memory_level_3: "poskvrněný kolos zašlé éry, jehož skutečné úspěchy zastínily jeho pozdější pošetilosti."
 metternich_memory_level_4: "vizionář staré společnosti, nositel ideálu stejně lákavého jako odsouzeného k zániku."
 metternich_memory_level_5: "udatný šampion reakce, nenáviděný i romantizovaný stejnou měrou."
 metternich_memory_level_6: "důstojný protivník pokrokářů, ikona udatné aristokracie, která může ještě přetrvat."
 metternich_memory_level_7: "velký skeptik modernity, a přesto jeden z jejích nedoceněných architektů."
 metternich_memory_level_8: "stratég a vizionář, jemuž [ROOT.GetCountry.GetNameNoFormatting] vděčí za svůj úspěch."
 metternich_memory_level_9: "vzor moderního státnictví, k němuž by si člověk přál být přirovnáván."
 metternich_memory_level_10: "postava srovnatelná s Napoleonem, kterou si každý politický proud nárokuje jako jednu ze svých."
