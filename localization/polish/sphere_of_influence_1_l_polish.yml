l_polish:
 tibet_expedition_events.1.t: "Do Tibetu!"
 tibet_expedition_events.1.d: "Rozhodli jsme se vydat do Tibetu a zajistit tyto země pro naše vlastní zájmy. Budeme muset prozkoumat trasu do himálajské oblasti, poté předvést sílu a následně donutit Tibeťany k jednacímu stolu."
 tibet_expedition_events.1.f: "„Je to vlastně jednoduché.“ Doutníkový kouř se vznášel ve vzduchu, zatímco muž žhnoucím doutníkem ukazoval na mapu na zdi. Bodl do místa uprostřed. „#italic To#! je naše slabina. Pokud ten bod drží kdokoli jiný, má nůž u našeho hrdla. Musíme zajistit, ehm…“ Odmlčel se, když se snažil prohlédnout skrz tabákový opar, „Tibet! Musíme zajistit Tibet, abychom se zachránili.“"
 tibet_expedition_events.1.a: "Znám pro tu práci toho správného člověka!"
 tibet_expedition_events.3.t: "Expedice vyráží"
 tibet_expedition_events.3.d: "S [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetFullName] ve vedení je naše expedice do Tibetu připravena začít.\n\n#N Protože [SCOPE.sCharacter('expedition_leader').GetSheHe] je ve velení, pokud [SCOPE.sCharacter('expedition_leader').GetSheHe] zemře, expedice skončí neúspěchem.#!"
 tibet_expedition_events.3.f: "[SCOPE.sCharacter('expedition_leader').GetLastNameNoFormatting] se zamračil, když procházel hlášení. Pokud by byla pravdivá každá zvěst o důležitém horském průsmyku, byly by Himálaje děravější než švýcarský sýr. Nezbývalo než vyrazit a zjistit, který z nich je skutečný."
 tibet_expedition_events.3.a: "Kupředu, do Tibetu!"
 tibet_expedition_events.4.t: "Jak nepřekročit hranice"
 tibet_expedition_events.4.d: "Skupina místních pastevců jaků překročila hranici a svou chybu si uvědomila až tehdy, když je zadržela tibetská hlídka a zahnala je zpět. Pastevci si stěžovali na hrubé zacházení, což přimělo [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName], aby to označil za akt svévolné agrese, na který je třeba odpovědět stejnou měrou."
 tibet_expedition_events.4.f: "„Jde o princip, na detailech nezáleží! Byla narušena mezinárodní hranice a je třeba přijmout náležitá opatření, aby byla tato urážka diplomacie a naší suverenity vyřízena! Mohl bych tam mít regiment mužů pochodující #italic právě teď#!, stačí, když mi dáte slovo.“"
 tibet_expedition_events.4.a: "Jak si to dovolují? Musíme jednat!"
 tibet_expedition_events.4.b: "Klid! Hlavně nepodlehnime stádovitému chování."
 tibet_expedition_events.5.t: "Velké horské mapování"
 tibet_expedition_events.5.d: "Zeměměřiči začali zkoumat hory a průsmyky obklopující Tibet. Vydávat se do nezmapovaného terénu a zdolávat neprozkoumané hory je nebezpečná práce, ale [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName] se chce přesto zapojit."
 tibet_expedition_events.5.f: "„Viděli jste ten vrchol? Ten #italic musíme#! zdolat!“\n\n„Ale proč?“\n\n„Protože… tam #italic je#!!“"
 tibet_expedition_events.5.a: "Nemůžeme riskovat [SCOPE.sCharacter('expedition_leader').GetLastName], pošlete někoho jiného."
 tibet_expedition_events.5.b: "Andrew Scott Waugh je pro tuto práci nanejvýš kvalifikovaný."
 tibet_expedition_events.5.c: "Žádný vrchol není pro Charlese Granvilla Bruce příliš hrozivý!"
 tibet_expedition_events.5.dd: "[SCOPE.sCharacter('expedition_leader').GetLastName] je náš člověk na místě a měl by se toho ujmout."
 tibet_expedition_events.6.t: "Pijavice!"
 tibet_expedition_events.6.d: "Podhůří Himálaje je plné zrádné flóry a fauny. Jedna slibná trasa na Tibetskou náhorní plošinu vede oblastí plnou odpudivé divoké zvěře. Pokud má být tato trasa využita, [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName] ji bude muset [SCOPE.sCharacter('expedition_leader').GetHerselfHimself] prohlédnout."
 tibet_expedition_events.6.f: "„Ne.“\n\n„Ne. Ne ne ne.“\n\nZvěd se ještě naposledy podíval na vodu v bažině. Z úst mu uniklo zahihňání. „Hahahahahaaa, #italic ne!#!“\n\nTohle bude problém někoho jiného, ne jeho."
 tibet_expedition_events.6.a: "[SCOPE.sCharacter('expedition_leader').GetLastName] to může udělat a musí to udělat."
 tibet_expedition_events.6.b: "Možná by byl lepší odpočinek v horském vzduchu."
 tibet_expedition_events.7.t: "Budování expedičního sboru"
 tibet_expedition_events.7.d: "S dostatečnou znalostí země před sebou [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName] prohlásil, že [SCOPE.sCharacter('expedition_leader').GetSheHe] je připraven shromáždit vojsko a pokračovat vpřed na Tibetskou náhorní plošinu."
 tibet_expedition_events.7.f: "Nemělo to být tak obtížné. Byla to práce jako každá jiná, ale nějak… nějak se ukazovalo, že sehnat pro ni ty správné muže je těžší, než kdokoli čekal. Po ruce bylo samozřejmě dost řadových vojáků, ale proč nepoužít smetánku? Mělo by se přibrat i nějaké dělostřelectvo? A co koně? Důstojníci?\n\nPo dlouhém váhání si [SCOPE.sCharacter('expedition_leader').GetSheHe] konečně vybral [SCOPE.sCharacter('expedition_leader').GetHerHis] oblíbené cínové figurky a rozmístil je na stůl. [SCOPE.sCharacter('expedition_leader').GetSheHe|U] se k řešení problémů expedice dostane později toho večera."
 tibet_expedition_events.7.a: "Expedici nesmí, nemůže, chybět muži."
 tibet_expedition_events.7.b: "Jen ti nejodolnější vojáci mohou čelit tomu, co přijde."
 tibet_expedition_events.7.c: "Tady potřebujeme neortodoxní přístup."
 tibet_expedition_events.8.t: "Do Himálaje"
 tibet_expedition_events.8.d: "S připravenými mapami a muži v pohotovosti se [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName] konečně může vydat do Tibetu."
 tibet_expedition_events.8.f: "„Nejsme tu proto, abychom hledali slávu ani zlato.“ Důstojník pomalu kráčel podél řady shromážděných zde. „Alespoň ne pro sebe. Nikdo si nás nezapamatuje.“\n\nNamířil prst k rozlehlým horám v dálce. „Ale #italic to#! si budou pamatovat. Chceme stát tady, na tomhle zapomenutém chomáči trávy, nebo stát vzpřímeně #italic tam#!, na skalách, které přetrvají všechnu paměť?“"
 tibet_expedition_events.8.a: "Na střechu světa!"
 tibet_expedition_events.9.t: "[SCOPE.sCountry('expedition_country').GetAdjective] vměšování v Tibetu"
 tibet_expedition_events.9.d: "Náš vyslanec ve Lhase předal zprávy, že [SCOPE.sCountry('expedition_country').GetAdjective] jednotky vedené [SCOPE.sCharacter('expedition_leader').GetFullName] narušily hranice Tibetu a postupují směrem k hlavnímu městu."
 tibet_expedition_events.9.f: "Velvyslancův klidný hlas prozrazovalo zpocené čelo. „Ujišťuji vás,“ diktoval poslu a nervózně bubnoval prsty do stolu, „že v Tibetu je naprosto všechno pod kontrolou.“\n\nOdmlčel se a s pečlivostí mistra taktika si připravil další slova. „Nicméně by bylo ku prospěchu věci, kdyby vláda na tuto akci rychle reagovala jakýmikoli prostředky, které uzná za vhodné, a to co nejvčasněji.“\n\nZhluboka vydechl. Teď byla řada #italic na nich#!, aby tenhle nepořádek vyřešili."
 tibet_expedition_events.9.a: "Tato nepříjemnost je pouhá maličkost. K záchraně Tibetu není třeba žádná akce."
 tibet_expedition_events.9.b: "Podejte protest na velvyslanectví země [SCOPE.sCountry('expedition_country').GetName]."
 tibet_expedition_events.9.c: "To je nepřijatelné! Pošlete posily do Lhasy a řekněte jim, že mají naši podporu."
 tibet_expedition_events.10.t: "[SCOPE.sCountry('expedition_country').GetCustom('getPluralDemonym')] přicházejí!"
 tibet_expedition_events.10.d: "Přicházejí zprávy o [SCOPE.sCountry('expedition_country').GetAdjective] jednotkách, které překročily hranici a postupují k hlavnímu městu. Jde o nestoudné narušení naší suverenity, ale vzdorovat zemi [SCOPE.sCountry('expedition_country').GetName] může být nad naše síly."
 tibet_expedition_events.10.f: "„Ne, neodvážili jsme se na ně střílet!“ vykoktal strážný. „Vy jste tam nebyli! Neviděli jste, kolik mužů přicházelo! Neviděli jste jejich zbraně! Bylo nás jen tucet – museli jsme ustoupit!“"
 tibet_expedition_events.10.a: "Prozatím musíme přimhouřit oko."
 tibet_expedition_events.10.b: "Bez ohledu na jejich sílu musíme vzdorovat hned!"
 tibet_expedition_events.11.t: "Zablokovat [SCOPE.sCountry('expedition_country').GetAdjective] jednotky?"
 tibet_expedition_events.11.d: "[SCOPE.sCountry('expedition_country').GetAdjective] vpád dál postupuje k našemu hlavnímu městu. Abychom získali čas, mohli bychom nařídit hlídkám, aby zřídily jednoduché zátarasy na nejzřejmějších trasách [SCOPE.sCountry('expedition_country').GetAdjective] jednotek.\n\n#N To může vést k incidentům se zemí [SCOPE.sCountry('expedition_country').GetNameNoFormatting].#!"
 tibet_expedition_events.11.f: "Na první pohled šlo o jednoduchý návrh. Pokud měl být nepřítel zastaven, musel narazit na skutečný odpor. Ale… mohli jsme si dovolit přímý střet? To byla otázka, která strašila v myslích každého ministra a generála, jenž se tímto problémem zabýval."
 tibet_expedition_events.11.a: "Nemůžeme riskovat boj. Nechte je projít."
 tibet_expedition_events.11.b: "Zátaras nemůže uškodit. Zdržte je při nejbližší příležitosti."
 tibet_expedition_events.12.t: "Expedice [SCOPE.sCharacter('expedition_leader').GetLastName] byla zablokována"
 tibet_expedition_events.12.d: "[SCOPE.sCountry('tibet_scope').GetAdjective] hlídka zřídila zátaras na trase expedice, kterou vede [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName]. Jakékoli zdržení postupu expedice by mohlo být pro celý podnik katastrofální."
 tibet_expedition_events.12.f: "[SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting] se zamračil na výjev před [SCOPE.sCharacter('expedition_leader').GetHerHim]. Masa tibetských vojáků stojících přes cestu před [SCOPE.sCharacter('expedition_leader').GetHerHim] vypadala hrozivě, ale [SCOPE.sCharacter('expedition_leader').GetSheHe] věděl, jaké zbraně [SCOPE.sCharacter('expedition_leader').GetSheHe] s expedicí přivezl. Projít zátarasem nebyl problém – problémem byla cena, kterou by to stálo."
 tibet_expedition_events.12.a: "Nadělejte co největší škodu! Vpřed!"
 tibet_expedition_events.12.b: "Tohle by byl masakr – stáhněte se."
 tibet_expedition_events.13.t: "[SCOPE.sCountry('expedition_country').GetAdjective] střet v Tibetu"
 tibet_expedition_events.13.d: "Dorazily zprávy o krvavém střetu mezi [SCOPE.sCountry('expedition_country').GetAdjective] expedicí a místními tibetskými silami. Naše povinnost vůči zemi [SCOPE.sCountry('tibet_scope').GetName] nás zavazuje jí ulevit, ale někteří ministři vyjádřili neklid nad samotnou představou, že bychom vládu v [SCOPE.sCountry('tibet_scope').GetCapital.GetName] jakkoli posílili."
 tibet_expedition_events.13.f: "„To, co se stalo v tom průsmyku, je hanba, tragédie!“\n\n„Je to těžká urážka jich i nás!“\n\n„Nuže, pánové, jaký bude náš další krok? Máme jim přímo pomoci? Táhnout k hranici? Dodat zbraně?“\n\nRozpačité ticho, které následovalo, přerušilo jen suché zakašlání."
 tibet_expedition_events.13.a: "Nemůžeme poskytnout žádnou materiální pomoc."
 tibet_expedition_events.13.b: "Podpoříme [SCOPE.sCountry('tibet_scope').GetAdjective] armádu."
 tibet_expedition_events.14.t: "Himálajská vánice"
 tibet_expedition_events.14.d: "Expedici, kterou vede [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetLastName], zdrželo kruté a nečekané počasí na jedné ze zrádnějších cest k [SCOPE.sCountry('tibet_scope').GetCapital.GetName]. Zdržení by mohlo být nákladné, ale prodírat se tímto počasím by mohlo být ještě nákladnější."
 tibet_expedition_events.14.f: "Ledový vítr foukal pod botami [SCOPE.sCharacter('expedition_leader').GetLastNameNoFormatting] a kolem jeho prstů. Mráz se zakusoval do země pod nimi. Bylo hluboko pod nulou, a přesto [SCOPE.sCharacter('expedition_leader').GetSheHe] slyšel vojáka vykřiknout. [SCOPE.sCharacter('expedition_leader').GetSheHe|U] předpokládal, že jde o sníh, ale sotva viděl za špičku [SCOPE.sCharacter('expedition_leader').GetHerHis] nosu a nedokázal říct, kde ten voják je, natož co se kolem nich děje."
 tibet_expedition_events.14.a: "Musíme se sněhu postavit a pokračovat dál!"
 tibet_expedition_events.14.b: "Lepší bude hrát na jistotu a přečkat tuto bouři."
 tibet_expedition_events.18.t: "Gyantse Dzong"
 tibet_expedition_events.18.d: "Před námi se z tibetského kamene tyčí rozlehlý opevněný klášter – Gyantse Dzong, žulový strážce údolí Tsangpo a jeden z klíčových přístupů ke Lhase. Dokud tuto pevnost nedrží vojáci expedice, nemůže existovat žádná bezpečná cesta k hlavnímu městu."
 tibet_expedition_events.18.f: "Nedobytná pevnost se tyčila nad okolní krajinou. Nedaleké vesnice byly jen smítky prachu ve srovnání s kamenným obrem, který se nad nimi vznášel. Ctihodné zdi a starobylé síně se ozývaly staletími zápasů, hrdosti, nesčetných modliteb, bitev a intrik. Stála jako vytrvalé svědectví vůle generací vůdců.\n\nSalva z děl [SCOPE.sCharacter('expedition_leader').GetLastNameNoFormatting] by to mohla ukončit za jediný den."
 tibet_expedition_events.18.a: "Dobýt tu pevnost hned!"
 tibet_expedition_events.18.b: "Nejsme tu kvůli krveprolití – vyjednejte jejich kapitulaci."
 tibet_expedition_events.19.t: "Neschválené plenění"
 tibet_expedition_events.19.d: "Jak se vojáci [SCOPE.sCharacter('expedition_leader').GetLastName] blíží k zemi [SCOPE.sCountry('tibet_scope').GetName], někteří z nich se utrhli ze řetězu. Dorazily zprávy o tlupách našich mužů, kteří vnikají do domů a klášterů a berou si vše, co se jim zalíbí."
 tibet_expedition_events.19.f: "„Ujišťuji vás, pane, že to zcela spadá do přijatelných mezí. Koneckonců nám kladli odpor a dá se očekávat, že po takových událostech budou následovat určité kroky. Ačkoli zprávy z tamtoho jednoho kláštera jsou samozřejmě jistě přehnané.“"
 tibet_expedition_events.19.a: "A co? Tak už to u armád chodí."
 tibet_expedition_events.19.b: "Potrestat vojáky a nabídnout omluvu místním úředníkům."
 tibet_expedition_events.20.t: "Vydání ultimáta"
 tibet_expedition_events.20.d: "S naší expedicí poblíž [SCOPE.sCountry('tibet_scope').GetCapital.GetCityHubName] nastal čas vyřešit ožehavou otázku diplomatických kanálů. Musíme promluvit s tím, kdo má nad těmito zeměmi nejvyšší autoritu."
 tibet_expedition_events.20.f: "Našel důstojníka zhrouceného nad stolem, jak křičí do dlaní.\n\n„Promluvíte s jedním úředníkem a ten vás pošle za dalším. Pak promluvíte s #italic tímhle#! chlapíkem a #italic on#! řekne, že máte špatného člověka, a odkáže vás na třetího. A pak tenhle chlapík – ten chlapík řekne, že jste to celé špatně pochopili a že všechnu autoritu má ten #italic první#! chlapík.“\n\n„Ach, kde to končí? Kdo tomu velí? Velím tomu vůbec #italic já#!?“"
 tibet_expedition_events.20.a: "Samozřejmě předložte naše požadavky zemi [SCOPE.sCountry('tibet_scope').GetName]."
 tibet_expedition_events.20.b: "Promluvte přímo se zemí [SCOPE.sCountry('overlord_of_tibet').GetName]."
 sending_tibet_ultimatum_tt: "[SCOPE.sCharacter('expedition_leader').GetFullName] vstupuje do jednání se zemí [SCOPE.sCountry('tibet_scope').GetName]."
 sending_tibet_overlord_ultimatum_tt: "[SCOPE.sCharacter('expedition_leader').GetFullName] vstupuje do jednání se zemí [SCOPE.sCountry('overlord_of_tibet').GetName]."
 tibet_expedition_events.21.t: "[SCOPE.sCountry('expedition_country').GetAdjective] ultimátum"
 tibet_expedition_events.21.d: "[SCOPE.sCountry('expedition_country').GetAdjective] expedice navzdory našemu nejlepšímu úsilí dorazila až k našemu hlavnímu městu. Jejich nákladné požadavky jsou přímočaré: podrobit se jejich autoritě."
 tibet_expedition_events.21.f: "„Je to vlastně docela jednoduché,“ ušklíbl se [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] vyslanec. „Štíra už znáte. Proč se místo toho neobrátit na nás? Přerušte vztahy s ostatními cizími mocnostmi a zbytek nechte na nás.“"
 tibet_expedition_events.21.a: "Podrobíme se zemi [SCOPE.sCountry('expedition_country').GetName]."
 tibet_expedition_events.21.b: "Vaše demonstrace síly nic neznamená! #bold Okamžitě odsud odejděte s prázdnou!#!"
 tibet_expedition_events.22.t: "[SCOPE.sCountry('expedition_country').GetAdjective] ultimátum"
 tibet_expedition_events.22.d: "[SCOPE.sCountry('expedition_country').GetAdjective] expedice do Tibetu podkopala naši autoritu v této oblasti a nyní požadují, abychom jim formálně postoupili kontrolu. Je to těžká urážka, ale odvážíme se jim teď postavit?"
 tibet_expedition_events.22.f: "„Je to vlastně docela jednoduché,“ ušklíbl se [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] vyslanec. „Vy jste byli štírem, ale teď je čas, abychom žihadlo třímali my. Nechte nás spravovat tento kus himálajské skály a my vás necháme být, aby tato záležitost konečně dospěla ke konci.“"
 tibet_expedition_events.22.a: "Podrobíme se požadavkům země [SCOPE.sCountry('expedition_country').GetName]."
 tibet_expedition_events.22.b: "Vaše demonstrace síly nic neznamená! #bold Okamžitě odsud odejděte s prázdnou!#!"
 tibet_expedition_events.26.t: "Konvence z [SCOPE.sCountry('tibet_scope').GetCapital.GetCityHubName]"
 tibet_expedition_events.26.d: "[SCOPE.sCountry('expedition_country').GetAdjective] expedice přímo oslovila [SCOPE.sCountry('tibet_scope').GetAdjective] úředníky a donutila je uznat [SCOPE.sCountry('expedition_country').GetAdjective] svrchovanost. Nyní jsou závislou zemí země [SCOPE.sCountry('expedition_country').GetName]."
 tibet_expedition_events.26.f: "„Je to vlastně docela jednoduché,“ ušklíbl se [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] vyslanec. „Vedli jsme prostou rozpravu s lidmi, na kterých záleželo, a teď jsou naši. Znali štíra a nyní je čas, aby poznali nás.“ Zasmál se a mávnutím poslal [SCOPE.sCountry('ex_tibetan_overlord').GetAdjectiveNoFormatting] úředníky pryč."
 tibet_expedition_events.26.a: "[SCOPE.sCountry('tibet_scope').GetAdjective] země bude vždy naše!"
 tibet_expedition_events.26.b: "[SCOPE.sCountry('expedition_country').GetName] musí zemi [SCOPE.sCountry('tibet_scope').GetNameNoFormatting] vrátit #bold okamžitě.#!"
 tibet_expedition_events.27.t: "Konvence z [SCOPE.sCountry('tibet_scope').GetCapital.GetCityHubName]"
 tibet_expedition_events.27.d: "Expedice do Tibetu vedená [SCOPE.sCharacter('expedition_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader').GetFullName] dosáhla ohromujícího úspěchu a tato strategická oblast je nyní pod naším palcem. [SCOPE.sCharacter('expedition_leader').GetLastName] je už oslavován v [ROOT.GetCountry.GetCapital.GetCityHubName] a [SCOPE.sCharacter('expedition_leader').GetSheHe] má před sebou zářnou budoucnost."
 tibet_expedition_events.27.f: "„Je to vlastně jednoduché.“ Doutníkový kouř se vznášel ve vzduchu, zatímco muž žhnoucím doutníkem ukazoval na mapu na zdi. „#italic To#! byla naše slabina. Bylo životně nezbytné, abychom vynaložili tolik mužů a zlata, kolik bylo třeba k zajištění, ehm…“ Odmlčel se, když se snažil prohlédnout skrz tabákový opar, „Tibetu! Museli jsme zajistit Tibet, abychom se zachránili.“\n\nOtočil se zpět k ostatním mužům v klubu. „Tak! Kdo si dá kulečník?“"
 tibet_expedition_events.27.a: "Třikrát hurá pro [SCOPE.sCharacter('expedition_leader').GetFullName]!"
 tibet_expedition_events.29.t: "Divoká tvář"
 tibet_expedition_events.29.d: "Naše expedice při přechodu zrádného horského průsmyku narazila na zvířecí doupě. Průzkum odhalil, že ho obývá vzácné zvíře – kočka manul."
 tibet_expedition_events.29.f: "Když spustil lucernu, aby nahlédl do hlubin doupěte, upřely se na něj zlověstné zlaté oči. Jejich kulaté zornice a kresba kolem nich působily podivně lidsky, jako kníratý muž se svraštělým obočím. Kočka ho soudila, pomyslel si člen expedice, a byla zakopaná stejně obratně jako kterýkoli voják ve svém zákopu.\n\nZměnil úhel světla a zpět na něj zlostně pohlédly tři menší páry očí. Matka ve svém doupěti, střežící tři koťata, která už byla dost stará na to, aby syčela na světlo. Botanické zahrady by za ně štědře zaplatily, ale vyvážilo by to prsty, které by ho to stálo?"
 tibet_expedition_events.29.a: "Chyťte je a nechte je dopravit do [ROOT.GetCountry.GetCapital.GetCityHubName]."
 tibet_expedition_events.29.b: "Nádherná kožešina, připravená k získání!"
 tibet_expedition_events.29.c: "Pořiďte si poznámky, ale nechte je být."
