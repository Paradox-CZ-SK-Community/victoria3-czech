 je_government_petition_reason: "Jako loajální součást vlády [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] podávají [SCOPE.gsInterestGroup('government_petition_ig').GetName] petici za přijetí zákona [SCOPE.sLaw('government_petition_law').GetName].\n\nPokud bude zákon [SCOPE.sLaw('government_petition_law').GetName] úspěšně přijat, [SCOPE.gsInterestGroup('government_petition_ig').GetName] budou velmi spokojeni. Pokud však bude petice ignorována, země bude čelit postihům, až po odchod [SCOPE.gsInterestGroup('government_petition_ig').GetName] z vlády."
