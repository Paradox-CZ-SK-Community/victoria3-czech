 je_nihilist_movement: "Nihilistické hnutí"
 je_nihilist_movement_goal: "Jedno z následujících:\n[SCOPE.GetRootScope.GetCountry.GetName] prosadila [GetLawType('law_censorship').GetName] nebo [GetLawType('law_outlawed_dissent').GetName] a všechny nihilistické zájmové skupiny jsou potlačeny po dobu delší než 5 let\n[SCOPE.GetRootScope.GetCountry.GetName] si udržela #bold pozitivní#! podporu [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], nebo je držela marginalizované po dobu delší než 5 let"
 je_nihilist_movement_trigger_tt_1: "[SCOPE.GetRootScope.GetCountry.GetName] prosadzuje [GetLawType('law_censorship').GetName] nebo [GetLawType('law_outlawed_dissent').GetName] a #b $movement_nihilist$#! je potlačeno po dobu delší než 5 let"
 je_nihilist_movement_trigger_tt_2: "[SCOPE.GetRootScope.GetCountry.GetName] si udržuje #bold pozitivní#! podporu [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], nebo je držela marginalizované po dobu delší než 5 let"
 je_nihilist_movement_reason: "Hnutí radikální [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], které tvrdí, že usiluje o zrušení všeho považovaného za posvátné, začalo šířit spisy odsuzující božsky ustanovenou vládu. Toto hnutí svými kritikami ohrožuje samotné základy naší vlády."
 has_no_nihilist_movement_tt: " #b Nemá#! aktivní #v $movement_nihilist$#!"
