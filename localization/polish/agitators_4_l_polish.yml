 pretenders_7_orleanist_tt: "[SCOPE.sCountry('reflexive_reference_france').GetAltAdjective('yy')] bude svěřen uchazeči [SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]"
 pretenders_7_bonapartist_tt: "[SCOPE.sCountry('reflexive_reference_france').GetAltAdjective('yy')] trůn bude svěřen uchazeči [SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName]"
