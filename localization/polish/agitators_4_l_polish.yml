 notification_paris_commune_automation_pulse_1_c_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] předala řadu bývalých pařížských kostelů skupině [SCOPE.gsInterestGroup('seize_church_ig').GetName] k organizaci politických shromáždění.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
