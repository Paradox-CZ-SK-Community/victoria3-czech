 agitators_election_events.1.t: "Plodná podpora"
 agitators_election_events.1.d: "Jako gesto solidarity s [SCOPE.sParty('agitator_party_scope').GetName] vyzval [SCOPE.sCharacter('agitator_scope').GetFullName] své příznivce, aby pro ni hlasovali v probíhajících volbách."
 agitators_election_events.1.f: "V zájmu všech zásadových lidí - [SCOPE.sParty('agitator_party_scope').GetNameNoFormatting] má dlouhodobě konzistentní výsledky vynikající kvality. Nemohu dostatečně vychválit ty statečné muže a ženy, kteří posouvají [ROOT.GetCountry.GetNameNoFormatting] vpřed pod jejím jménem."
 agitators_election_events.1.a: "[SCOPE.sCharacter('agitator_scope').GetSheHe|U] si jistě zaslouží náš dík."
 agitators_election_events.1.b: "Tato podpora by měla být konkrétnější."
 agitators_election_events.2.t: "Neplánovaná debata"
 agitators_election_events.2.d: "Při práci na podpoře [SCOPE.sParty('agitator_party_scope').GetName] v [SCOPE.sState('debate_state').GetName] narazil [SCOPE.sCharacter('agitator_scope').GetFullName] na [SCOPE.sCharacter('agitator_scope_2').GetFullName], zastupujícího [SCOPE.sParty('agitator_2_party_scope').GetName]. Mezi nimi se rozpoutala vášnivá debata."
 agitators_election_events.2.f: "Upraviv [SCOPE.sCharacter('agitator_scope').GetHerHis] působivý kabát, [SCOPE.sCharacter('agitator_scope').GetSheHe] vykročil vpřed a pohlédl na svého nového protivníka s neochotným respektem.\n\n„Jen abyste věděl...“"
 agitators_election_events.2.a: "[SCOPE.sCharacter('agitator_scope').GetFullName] je mnohem přesvědčivější."
 agitators_election_events.2.b: "Lepší argumenty má zjevně [SCOPE.sCharacter('agitator_scope_2').GetFullName]."
 agitators_election_events.3.t: "Falešná demokracie"
 agitators_election_events.3.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] odsoudil volební systém [ROOT.GetCountry.GetAdjective] a podpořil zdržení se hlasování v tom, co [SCOPE.sCharacter('agitator_scope').GetSheHe] označuje za frašku určenou k uklidnění lidu."
 agitators_election_events.3.f: "V diktatuře reakcionářů, bohatých a mocných, skryté před zraky lidu fasádou demokracie, je nejlepší ukázat marnost takového přetvářky, aby byl lid podnícen k činu bez ohledu na ústupky."
 agitators_election_events.3.a: "Vláda musí vědět, že jejich systém prohlédneme."
 agitators_election_events.3.b: "Zdiskreditování systému je dalším krokem k revoluci!"
 agitators_election_events.3.c: "Jejich příznivci nehlasují? Naši rozhodně ano."
 agitators_election_events.4.t: "Agresivní kampaň"
 agitators_election_events.4.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] po projevu, v němž odsoudil [SCOPE.sParty('opposition_party_scope').GetName], začal mobilizovat oddané stoupence, aby se mu postavili ve volbách."
 agitators_election_events.4.f: "„Bezzásadová bažina,“\n„Patří spíše do vězení než do [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')],“\n„Bez jakéhokoli pozitivního přínosu,“\n„Kolektivní karikatura sebe sama,“\n„Ostuda pro [ROOT.GetCountry.GetAdjectiveNoFormatting] národ,“\n„Pryč s [SCOPE.sParty('opposition_party_scope').GetNameNoFormatting]!“"
 agitators_election_events.4.a: "Rozhodně existuje lepší alternativa."
 agitators_election_events.4.b: "Skutečná banda darebáků!"
 agitators_election_events.5.t: "Nevhodná umírněnost"
 agitators_election_events.5.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] kritizoval řadu rozhodnutí vedení své vlastní [SCOPE.sParty('agitator_party_scope').GetName] a označil [SCOPE.sCharacter('agitator_ig_leader_scope').GetFullName] za přehnaně opatrného a neochotného řešit zásadní problémy."
 agitators_election_events.5.f: "„Často si kladu otázku, když sleduji činnosti, které vykonáváme - zejména ty nejdůležitější pro rozšíření naší základny podporovatelů - zda si je [SCOPE.sCharacter('agitator_ig_leader_scope').GetLastNameNoFormatting] skutečně vědom jejich významu, nebo je jim oddán. Naše financování je obecně uspokojivé - pokladna strany si nestěžuje a ani naši účetní - avšak tyto prostředky dosud nebyly využity způsobem, který by prospíval obecnému blahu.“\n\n„A proto zní má teze takto - co má [SCOPE.sCharacter('agitator_ig_leader_scope').GetLastNameNoFormatting] v úmyslu a jak nejlépe změnit [SCOPE.sCharacter('agitator_ig_leader_scope').GetHerHis] názor?“"
 agitators_election_events.5.a: "Nejlepší bude prostě udělat to, co si [SCOPE.sCharacter('agitator_scope').GetSheHe] přeje."
 agitators_election_events.5.b: "Zaměřme se na zvýšení naší aktivity."
 agitators_election_events.5.c: "Vyloučit [SCOPE.sCharacter('agitator_scope').GetHerHim] ze schůzí, dokud se neomluví."
 agitators_election_events.6.t: "Povstání žen"
 agitators_election_events.6.d: "Aktivity [SCOPE.sCharacter('agitator_scope').GetFullName] vedly k tomu, že [SCOPE.sParty('agitator_party_scope').GetName] získala mezi ženami větší volební popularitu, přičemž ty se hrnou využít svá nově nabytá volební práva."
 agitators_election_events.6.f: "Jak kráčíme, kráčíme v kráse dne,\nMilion potemnělých kuchyní, tisíc šedých dílen\nZáří náhle světlem, jež odhalí slunce,\nNeboť lid slyší náš zpěv: „Chléb a růže, chléb a růže.“\n\nJak kráčíme, kráčíme, bojujeme i za muže —\nJsou dětmi žen a znovu je vychováváme.\nNaše dny nebudou dřinou od narození až do smrti —\nHladoví nejen těla, ale i srdce: dejte nám chléb, ale dejte nám i růže."
 agitators_election_events.6.a: "Za vítězství [SCOPE.sParty('agitator_party_scope').GetName] ve volbách!"
 agitators_election_events.6.b: "Za posílení [ROOT.GetCountry.GetAdjective] demokracie!"
 agitators_election_events.7.t: "Produkce a agitace"
 agitators_election_events.7.d: "Ve spolupráci s [SCOPE.sParty('agitator_party_scope').GetName] zajistil [SCOPE.sCharacter('agitator_scope').GetFullName] dohodu na levných a rychle distribuovaných letácích na podporu strany."
 agitators_election_events.7.f: "Interiér vozu skrýval příjemné překvapení — bednu s několika tisíci letáků, vytištěných v průmyslovém měřítku, každý s pokyny k volebnímu procesu a levně napodobeným logem [SCOPE.sParty('agitator_party_scope').GetNameNoFormatting]. Měly značnou váhu — a [SCOPE.sCharacter('agitator_scope').GetSheHe] doufal, že přinesou stejně významný užitek."
 agitators_election_events.7.a: "Pohřbíme naše soupeře pod mořem papíru!"
 agitators_election_events.7.b: "Tato spojení by se mohla hodit později."
 agitators_election_events.8.t: "Straničtí oblíbenci"
 agitators_election_events.8.d: "Křídlo [SCOPE.sParty('agitator_party_scope').GetName] napojené na [SCOPE.gsInterestGroup('snubbed_ig_scope').GetName] si stěžuje na to, že výběr podpory od [SCOPE.sCharacter('agitator_scope').GetFullName] opomíjí jejich příznivce."
 agitators_election_events.8.f: "„Musím vyjádřit obavy, nyní když jsem si toho všiml. Ačkoli kroky [SCOPE.sCharacter('agitator_scope').GetFullNameNoFormatting] jsou nepochybně dobře míněné, zdá se, že tato doporučení vylučují některé členy strany, kteří prokázali více než dostatek odhodlání, dobré vůle a jasného cíle.“"
 agitators_election_events.8.a: "Vyslechněme jejich obavy a uklidněme [SCOPE.gsInterestGroup('snubbed_ig_scope').GetName]."
 agitators_election_events.8.b: "Uklidňování? Copak nevědí, že to bylo zcela záměrné?"
 agitators_election_events.9.t: "Demokratická solidarita"
 agitators_election_events.9.d: "V rámci podpory volebního práva vydal [SCOPE.sCharacter('agitator_scope').GetFullName] pozitivní podporu [SCOPE.sParty('agitator_party_scope').GetName] za její neochvějnou podporu volebních práv v [ROOT.GetCountry.GetName]."
 agitators_election_events.9.f: "„Neexistuje důležitější otázka v naší [ROOT.GetCountry.GetGovernment.GetName] než volební právo — prostředek, kterým může lid rozhodovat o všech budoucích otázkách, které přijdou. S tímto na paměti by moje podpora neměla být žádným překvapením...“"
 agitators_election_events.9.a: "[SCOPE.sParty('agitator_party_scope').GetName] je strážcem [ROOT.GetCountry.GetAdjective] volebního práva!"
 agitators_election_events.9.b: "Možná někteří členové strany více než jiní."
 agitators_election_events.10.t: "Bouřlivá kampaň"
 agitators_election_events.10.d: "Při kampani za [SCOPE.sParty('agitator_party_scope').GetName] v nepokoji zmítaném [SCOPE.sState('tumultuous_state_scope').GetName] byl [SCOPE.sCharacter('agitator_scope').GetFullName] napaden a brutálně zbit skupinou neznámých útočníků."
 agitators_election_events.10.f: "Když se dav rozptýlil a křik utichl, zůstalo na ulici jen [SCOPE.sCharacter('agitator_scope').GetHerHis] bezvládné tělo, pohmožděné, pořezané a sotva k poznání jako ten titán, kterého [SCOPE.sCharacter('agitator_scope').GetSheHe] představoval ještě před několika minutami."
 agitators_election_events.10.a: "Trocha odpočinku a zotavení bude nejlepší."
 agitators_election_events.10.b: "Okamžitě zpět do kampaně."
 agitators_election_events.10.c: "Samozřejmě víme, kdo to byl. Byli jsme to my."
 agitators_election_events.11.t: "Hlasovací lístek, nebo kulka"
 agitators_election_events.11.d: "Mimořádně účinná agitace, kterou [SCOPE.sCharacter('agitator_scope').GetFullName] provádí v [SCOPE.sState('communist_agitation_state').GetName], vyvolala otázky ohledně konečného cíle [SCOPE.sParty('agitator_party_scope').GetName] v tomto volebním cyklu."
 agitators_election_events.11.f: "„Prvořadým úkolem komunistické strany je vést dělnickou třídu k revolučnímu boji o moc. Při určování své taktické linie musí brát v úvahu konkrétní vnitřní i vnější situaci, poměr třídních sil, míru stability a síly buržoazie, stupeň připravenosti proletariátu, postavení různých mezivrstev atd. ve své zemi. Strana určuje hesla a metody boje v souladu s těmito okolnostmi, s cílem organizovat a mobilizovat masy v co nejširším měřítku a na co nejvyšší úrovni tohoto boje.“\n\n— #italic Program Komunistické internacionály#!, 1929"
 agitators_election_events.11.a: "Zvolení [SCOPE.sParty('agitator_party_scope').GetName] je předehrou k revoluci."
 agitators_election_events.11.b: "Moci dělníků bude dosaženo prostřednictvím parlamentu [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.11.c: "[SCOPE.sParty('agitator_party_scope').GetName] nepředstavuje dělnickou třídu."
 agitators_election_events.12.t: "Revoluční linie"
 agitators_election_events.12.d: "S dobře zajištěnými prostředky kampaně [SCOPE.sParty('agitator_party_scope').GetName] navrhl [SCOPE.sCharacter('agitator_scope').GetFullName] vedení strany, aby část těchto financí byla převedena na skrytější aktivity strany."
 agitators_election_events.12.f: "„My, jako strana proletariátu, jsme povinni následovat cestu, která povede k uskutečnění socialismu v [ROOT.GetCountry.GetNameNoFormatting] a nakonec i ve světě. Vyšší třída se pokojně nestáhne stranou — i když musíme postupovat parlamentní cestou, musíme vybudovat síly, které zabrání nevyhnutelnému převratu, jenž bude následovat po našem vítězství.“"
 agitators_election_events.12.a: "Prostředky mohou být využity na výcvik našich Rudých gard."
 agitators_election_events.12.b: "Riziko zapletení do skandálu je příliš vysoké."
 agitators_election_events.12.c: "Všechny dostupné zdroje musí směřovat k podpoře revoluce."
 agitators_election_events.13.t: "Mezi lidem"
 agitators_election_events.13.d: "Organizátoři [SCOPE.sParty('agitator_party_scope').GetName] vedení [SCOPE.sCharacter('agitator_scope').GetFullName] vyrazili na venkov, aby budovali třídní uvědomění mezi [ROOT.GetCountry.GetAdjective] rolnictvem."
 agitators_election_events.13.f: "Zde, ztraceni v rozlehlém prostoru mezi kouřem poznamenanými sídly, žili ti, jejichž život se nezměnil po pět set let.\n\nRýpali se v půdě, zasévali semena, aby dosáhli pouhého přežití, a odevzdávali veškerý přebytek svým feudálním pánům; hleděli jen na své současné postavení, netušíce o rudě zbarveném slunci, které se nad jejich mírnými kopci vyhoupne už následujícího rána."
 agitators_election_events.13.a: "Odvážný krok k posílení dělnicko-rolnické aliance."
 agitators_election_events.13.b: "Zaměřit jejich úsilí na organizaci proti statkářství."
 agitators_election_events.14.t: "Komunistické shromáždění v [SCOPE.sState('capital_scope').GetName]"
 agitators_election_events.14.d: "V [SCOPE.sState('capital_scope').GetName] se konalo masové shromáždění vedené [SCOPE.sCharacter('agitator_scope').GetFullName] na podporu [SCOPE.sParty('agitator_party_scope').GetName], které přilákalo komunistické příznivce z celého regionu. Použitá rétorika vyvolala obavy z bezprostředního násilí."
 agitators_election_events.14.f: "[SCOPE.sCharacter('agitator_scope').GetLastNameNoFormatting] v čele davu pohlédl na tenkou linii modrých a černých na konci ulice a poté zpět na rozlehlou masu zbarvenou do ruda za [SCOPE.sCharacter('agitator_scope').GetHerHim]. [SCOPE.sCharacter('agitator_scope').GetSheHe|U] nezaváhal. S vážností toho, kdo se nebojácně hlásí k propasti, učinil [SCOPE.sCharacter('agitator_scope').GetSheHe] další krok vpřed do divoké vřavy."
 agitators_election_events.14.a: "Nádherný den pro lid [SCOPE.sState('capital_scope').GetName]!"
 agitators_election_events.14.b: "Ukážeme rudým, jak vypadá násilí."
 agitators_election_events.14.c: "Stoupenci [SCOPE.sParty('fascist_party_scope').GetName] si s těmito darebáky poradí."
 agitators_election_events.15.t: "Jednotná fronta"
 agitators_election_events.15.d: "Vzestup [SCOPE.sParty('fascist_party_scope').GetName] v nedávných [ROOT.GetCountry.GetAdjective] volbách vedl [SCOPE.sCharacter('agitator_scope').GetFullName] a vedení [SCOPE.sParty('agitator_party_scope').GetName] k návrhu vytvořit jednotnou frontu levicových a liberálních stran proti fašismu."
 agitators_election_events.15.f: "A protože je jen člověk,\nchce si dát něco k jídlu;\nnechce plané řeči a spoustu slov,\nco nedají ani chléb, ani maso."
 agitators_election_events.15.a: "Cokoli je lepší než vize [SCOPE.sParty('fascist_party_scope').GetName]."
 agitators_election_events.15.b: "Sociální demokracie je jen levým křídlem fašismu."
 agitators_election_events.16.t: "Praktická opozice"
 agitators_election_events.16.d: "Považujíc [SCOPE.sParty('communist_party_scope').GetName] za zásadní hrozbu pro [ROOT.GetCountry.GetAdjective] národ, [SCOPE.sParty('agitator_party_scope').GetName] vyzvala své příznivce, aby se organizovali do skupin a napadali domnělé komunisty v ulicích."
 agitators_election_events.16.f: "„Jsou tací i v naší vlastní vládě, kteří věří, že [SCOPE.sParty('communist_party_scope').GetNameNoFormatting] je strana jako každá jiná. Není! Tato klika není skutečnou politickou stranou, ale zástěrkou pro tajnou společnost, která do svých řad přijímá cizince, špiony a nezletilé. Její pokusy zahnízdit se v temných zákoutích našich měst musí být potlačeny jedinou věcí, které tato zvířata rozumějí — silou dobra, pěstmi [ROOT.GetCountry.GetAdjectiveNoFormatting] národa!“"
 agitators_election_events.16.a: "Napadejte komunistické stoupence, kdekoliv se objeví."
 agitators_election_events.16.b: "Zaměřte se na vůdce komunistů a zlomte morálku mas."
 agitators_election_events.16.c: "Toto násilí bude zkázou demokracie!"
 agitators_election_events.17.t: "Spolupráce a kapitál"
 agitators_election_events.17.d: "Aby [SCOPE.sCharacter('agitator_scope').GetFullName] zajistil další podporu pro [SCOPE.sParty('agitator_party_scope').GetName], obrátil se spolu s několika vysoce postavenými členy strany na [SCOPE.gsInterestGroup('industrialists_scope').GetName], aby prosadili politiku spolupráce mezi kapitálem a vládou [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.17.f: "„Fašismus by měl být správněji nazýván korporativismem, protože jde o spojení státní a korporátní moci.“\n\n— Benito Mussolini"
 agitators_election_events.17.a: "[SCOPE.sParty('agitator_party_scope').GetName] se ukáže jako vynikající spojenec."
 agitators_election_events.17.b: "[SCOPE.gsInterestGroup('industrialists_scope').GetName] taková ujištění nepotřebují."
 agitators_election_events.18.t: "Za národní jednotu"
 agitators_election_events.18.d: "Poukazujíc na bezprostřední hrozbu pro [ROOT.GetCountry.GetAdjective] národ ze strany „komunistů a jim nakloněných skupin“, vyzval [SCOPE.sCharacter('agitator_scope').GetFullName] k tažení za národní jednotu proti komunismu, organizovanému pod vedením [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.18.f: "„V těchto časech se my, jako loajální občané [ROOT.GetCountry.GetAdjectiveNoFormatting] národa, musíme sjednotit a zůstat neustále ostražití. V našich hranicích existují nepřátelé vlády, cizí agenti, kteří chtějí zničit vše, co činí naši zemi velkou. Ale je jich málo, přátelé, a nás je mnoho...“"
 agitators_election_events.18.a: "Rudé hrozbě nesmí být dovoleno zde zakořenit!"
 agitators_election_events.18.b: "Národní jednota ano, ale ne pod [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.19.t: "Rudý teror v zahraničí"
 agitators_election_events.19.d: "V nedávném projevu [SCOPE.sCharacter('agitator_scope').GetFullName] přímo poukázal na situaci v [SCOPE.sCountry('scary_communist_country').GetName] jako na příklad toho, co čeká [ROOT.GetCountry.GetAdjective] společnost, pokud se [SCOPE.sParty('agitator_party_scope').GetName] nedostane k moci. Podle [SCOPE.sCharacter('agitator_scope').GetHerHim] může národ před komunismem zachránit pouze [SCOPE.sCharacter('agitator_scope').GetSheHe]."
 agitators_election_events.19.f: "„V určitých kruzích se hovoří o stávce — o pokusu komunistů uchopit moc a proměnit [ROOT.GetCountry.GetNameNoFormatting] v krvavě rudou noční můru! Připomeňme si, co chtějí. V [SCOPE.sCountry('scary_communist_country').GetNameNoFormatting] udělali ze žen majetek státu! Upalovali kněze zaživa! Útočili na banky i drobné podnikatele!\n\nNedovolíme komunistům v této zemi, aby nás nahradili a vládli našim záležitostem. Tohle je [ROOT.GetCountry.GetNameNoFormatting], ne [SCOPE.sCountry('scary_communist_country').GetNameNoFormatting]!“"
 agitators_election_events.19.a: "Celý národ se musí sjednotit proti [SCOPE.sCountry('scary_communist_country').GetAdjectiveNoFormatting] hrozbě!"
 agitators_election_events.19.b: "Možná by se měl [SCOPE.sCharacter('agitator_scope').GetSheHe] více soustředit na domácí rétoriku."
 agitators_election_events.19.c: "Tohle je jen nesmyslné strašení."
 agitators_election_events.20.t: "Nenávist v praxi"
 agitators_election_events.20.d: "Stoupenci napojení na [SCOPE.sParty('agitator_party_scope').GetName] spáchali v [SCOPE.sState('hate_crime_state').GetName] sérii násilných a ponižujících činů proti lidem kultury [SCOPE.sCulture('hate_crime_culture').GetName]. Odpůrci [SCOPE.sParty('agitator_party_scope').GetName] obvinili [SCOPE.sCharacter('agitator_scope').GetFullName], že útok inspiroval svou extrémní rétorikou."
 agitators_election_events.20.f: "Rozbité sklo a popel křupaly pod nohama. Nápisy zohavené symboly fašismu. Těla ohořelá plameny ležela tam, kde je paramilitární jednotky zanechaly. Inspektor věděl, že je nikdy nebude možné uspokojivě identifikovat pro vznesení obvinění.\n\nKdyž se posadil na blízkou lavičku a prohlížel si scénu, napadla ho trpká myšlenka. Kolik z mužů pověřených vyšetřováním tohoto případu to vidělo na vlastní oči — skrze černé masky?"
 agitators_election_events.20.a: "[SCOPE.sParty('agitator_party_scope').GetName] jsou odporní šiřitelé bezdůvodné nenávisti."
 agitators_election_events.20.b: "Může někdo skutečně prokázat, že k tomu [SCOPE.sCharacter('agitator_scope').GetSheHe] vyzval?"
 agitators_election_events.20.c: "[SCOPE.sCharacter('agitator_scope').GetSheHe|U] je skutečným obráncem [ROOT.GetCountry.GetName] a [SCOPE.sCulture('hate_crime_culture').GetName] jsou jeho nepřátelé."
 agitators_election_events.21.t: "Volební právo pro rolníky"
 agitators_election_events.21.d: "Jménem [SCOPE.sParty('agitator_party_scope').GetName] se [SCOPE.sCharacter('agitator_scope').GetFullName] vydal na cestu po různých venkovských a odlehlých oblastech [ROOT.GetCountry.GetName], aby registroval voliče a zajistil sběr hlasů v těžko dostupných komunitách."
 agitators_election_events.21.f: "„Usazeni na vrcholcích hor, v srdcích temných lesů, obklopeni prázdnými pláněmi, neoznačeni na žádné mapě... a přesto i zde žijí lidé. Naší povinností je dát moc každému z nich.“"
 agitators_election_events.21.a: "Každý by měl slyšet o poslání [SCOPE.sParty('agitator_party_scope').GetName]!"
 agitators_election_events.21.b: "Jeden člověk, jeden hlas — bez ohledu na vzdálenost!"
 agitators_election_events.22.t: "Venkovské hodnoty"
 agitators_election_events.22.d: "[SCOPE.sParty('agitator_party_scope').GetName], vedená organizačním úsilím [SCOPE.sCharacter('agitator_scope').GetFullName], zahájila populární kampaň zaměřenou na zachování venkovských hodnot v době rychlých a znepokojivých změn."
 agitators_election_events.22.f: "„Můžete říkat, že je to nové a lepší, že nám to dá více ke koupi nebo obohatí naše děti. Ale podstatné je, že je to cizí a odlišné, připravuje nás to o práci — a nikdo se nás na to neptal.“"
 agitators_election_events.22.a: "Stůjte při své komunitě — volte [SCOPE.sParty('agitator_party_scope').GetName]!"
 agitators_election_events.22.b: "Musíme vybudovat širší koalici proti těmto cizorodým tendencím."
 agitators_election_events.23.t: "Meče a pluhy"
 agitators_election_events.23.d: "Spor o roli lidu ve vojenském velení mezi [SCOPE.sCharacter('armed_forces_leader').GetFullName] a [SCOPE.sCharacter('agitator_scope').GetFullName] vyvolal konflikt mezi [SCOPE.sParty('agitator_party_scope').GetName] a [SCOPE.sParty('armed_forces_party_scope').GetName]."
 agitators_election_events.23.f: "„Vážený [SCOPE.sCharacter('agitator_scope').GetLastNameNoFormatting], s veškerým respektem, nemá ponětí, o čem mluví. Existuje důvod, proč [SCOPE.gsInterestGroup('armed_forces_scope').GetNameNoFormatting] spravují své záležitosti samy — jsme k tomu speciálně vycvičeni a od běžných lidí nelze očekávat stejnou úroveň znalostí.“"
 agitators_election_events.23.a: "Ano, lid ví!"
 agitators_election_events.23.b: "Vojenské záležitosti patří generálům."
 agitators_election_events.24.t: "Protikoloniální agitace"
 agitators_election_events.24.d: "Nečekaně populární agitace vedená [SCOPE.sCharacter('agitator_scope').GetFullName] proti koloniální politice [ROOT.GetCountry.GetAdjective] vlády výrazně zvýšila veřejný zájem o program [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.24.f: "Ze všech výjevů byly zdaleka nejpůsobivější obrazy vzdálených zvěrstev. Dospělí muži stáli s vytřeštěnýma očima, když sledovali zdroj řek rudé barvy, a děti se schovávaly za matky, aby unikly obviňujícím pohledům probodnutých mužů.\n\nNebyl to žádný složitý slogan ani chytrý obrat řeči, co rozhodlo — bylo to jediné, co člověk potřeboval říct při pohledu na něco takového.\n\n„Jak tomu můžeme zabránit?“"
 agitators_election_events.24.a: "Využijme tuto energii k podpoře protikoloniální politiky."
 agitators_election_events.24.b: "Pouze [SCOPE.sParty('agitator_party_scope').GetName] stojí proti nesmyslné válce!"
 agitators_election_events.25.t: "Hlasy za čisté nebe"
 agitators_election_events.25.d: "Po nedávném rozšíření průmyslu do venkovských oblastí v [SCOPE.sState('industry_enroachment_state').GetName] zahájil [SCOPE.sCharacter('agitator_scope').GetFullName] místní kampaň pro [SCOPE.sParty('agitator_party_scope').GetName], v níž zdůrazňuje potřebu řešení nepříjemného smogu, který je nyní v okolí továren běžný."
 agitators_election_events.25.f: "Závoj kouře, který zakrýval oblohu, se zdál odrážet v očích vesničanů, když [SCOPE.sCharacter('agitator_scope').GetSheHe] projížděl kolem. Namísto jasného slunečného dne, který [SCOPE.sCharacter('agitator_scope').GetSheHe] očekával, doprovázela tento projev všudypřítomná šeď.\n\nNa tom však nezáleželo. Když [SCOPE.sCharacter('agitator_scope').GetFullNameNoFormatting] pohlédl k nebi a představil si mrak zahalující srdce lidí, zrodila se v [SCOPE.sCharacter('agitator_scope').GetHerHis] mysli vize nové rétoriky. Zatímco dělníci začali stavět pódium, [SCOPE.sCharacter('agitator_scope').GetSheHe] vzal pero a začal psát."
 agitators_election_events.25.a: "[SCOPE.sParty('agitator_party_scope').GetName] vrátí slunce!"
 agitators_election_events.25.b: "Nestojí za ničím, jsou jenom proti pokroku."
 agitators_election_events.26.t: "Proti extremismu"
 agitators_election_events.26.d: "Jako klíčovou součást svého volebního programu zahájili [SCOPE.sCharacter('agitator_scope').GetFullName] a vedení [SCOPE.sParty('agitator_party_scope').GetName] agresivní kampaň, jejímž cílem je distancovat se od revoluční socialistické ideologie [SCOPE.sParty('communist_party_scope').GetName]."
 agitators_election_events.26.f: "„Komunismus je smrtí míru a smrtí svobody.“"
 agitators_election_events.26.a: "Musíme lidu nabídnout přitažlivou alternativu."
 agitators_election_events.26.b: "Zaměřme kampaň na boj proti komunistům."
 agitators_election_events.27.t: "Zapojení lidu"
 agitators_election_events.27.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] zahájil cílenou kampaň za organizaci chudých městských dělníků v [SCOPE.sState('socdem_agitation_state').GetName] a formuje z nich soudržný a silný pro-[SCOPE.sParty('agitator_party_scope').GetName] volební blok."
 agitators_election_events.27.f: "„Je-li jakýkoli muž, žena či dítě opomíjeni, opuštěni a zbaveni hlasu i naděje... jak můžeme tvrdit, že [ROOT.GetCountry.GetAdjectiveNoFormatting] národ je skutečně civilizovaný?“"
 agitators_election_events.27.a: "Lid [SCOPE.sState('socdem_agitation_state').GetName] procitl."
 agitators_election_events.27.b: "Tuto strategii je třeba zopakovat po celé zemi."
 agitators_election_events.28.t: "Odborová kampaň"
 agitators_election_events.28.d: "Díky kontaktům [SCOPE.sCharacter('agitator_scope').GetFullName] v [SCOPE.gsInterestGroup('trade_union_ig').GetName] získala [SCOPE.sParty('agitator_party_scope').GetName] mnohem větší podíl oddaných a ideologicky přesvědčených odborářských voličů."
 agitators_election_events.28.f: "Stohy plakátů opouštěly tiskárnu, každý nesl logo [SCOPE.sParty('agitator_party_scope').GetNameNoFormatting] a slogan. Muži s kladivy, výzvy k solidaritě a kýble červené barvy zaplavovaly papíry, připravené k vylepení po městě skutečnou armádou stoupenců.\n\nNa okamžik se zastavil a s hrdostí pohlédl na návrh ležící na pracovním stole, zkoumal tvary vytištěné na papíře, zářivé červené, černé a bílé barvy. A pak především pravý dolní roh, kde se objevil ten zásadní symbol:\n„Vyrobeno odborovou prací“."
 agitators_election_events.28.a: "Mobilizujme odborové hlasy pro [SCOPE.sParty('agitator_party_scope').GetName]!"
 agitators_election_events.28.b: "Silné [SCOPE.gsInterestGroup('trade_union_ig').GetName] nám budou sloužit po mnoho let."
 agitators_election_events.29.t: "Obavy buržoazie"
 agitators_election_events.29.d: "Aby [SCOPE.sCharacter('agitator_scope').GetFullName] rozptýlil obavy vyšších vrstev z možné vlády [SCOPE.sParty('agitator_party_scope').GetName], uskutečnil sérii setkání s vlivnými bohatými osobnostmi a zdůraznil význam reforem, které zůstávají v souladu s [ROOT.GetCountry.GetAdjective] hodnotami."
 agitators_election_events.29.f: "„Je prostě faktem, že pokud nedojde k reformám [ROOT.GetCountry.GetAdjectiveNoFormatting] společnosti, nastane sociální revoluce. Tu nepodporuji — naopak ji nenávidím. Ale to je realita — musíte ji vidět stejně jasně jako já. A tak se ptáme — jak tomu zabránit?“"
 agitators_election_events.29.a: "Reformy místo revoluce!"
 agitators_election_events.29.b: "Ať se snaží sebevíc, vždy zůstanou rudí."
 agitators_election_events.30.t: "Boj za volební právo"
 agitators_election_events.30.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] zahájil kampaň zdůrazňující program [SCOPE.sParty('agitator_party_scope').GetName] podporující volební právo a slibuje výrazné rozšíření hlasovacích práv pro všechny vrstvy společnosti v případě volebního vítězství."
 agitators_election_events.30.f: "„Vážení kolegové! Čeho se bojíte na posíleném lidu? Můžete říci, že vítáte pohled lidu na to, co jste vykonali, a že jsou na to stejně hrdí jako vy?“"
 agitators_election_events.30.a: "Vytvořme volební koalici s dalšími zastánci volebního práva."
 agitators_election_events.30.b: "Pouze [SCOPE.sParty('agitator_party_scope').GetName] může skutečně sloužit lidu!"
 agitators_election_events.31.t: "Autorský záměr"
 agitators_election_events.31.d: "Menší skandál se rozvířil kolem [SCOPE.sParty('agitator_party_scope').GetName], protože se znovu začalo šířit reformistické beletristické dílo, které [SCOPE.sCharacter('agitator_scope').GetFullName] napsal v mládí. Přestože je psáno s nadšením, to je jeho jediná přednost."
 agitators_election_events.31.f: "„‚Mor pověr a dogmat‘ byl koncem [ROOT.GetCountry.GetNameNoFormatting]? Pokud ano, proč stále jezdí vlaky? Jak by mohli získat uhlí, které je pohání? Vaše tendence obětovat postavy pro lacinou tragédii je ostudná. A co hůř... proč by [SCOPE.GetRootScope.GetCountry.GetCustom('fiction_cliche')]“"
 agitators_election_events.31.a: "Tragický příběh, ale není důvod obtěžovat [SCOPE.sCharacter('agitator_scope').GetHerHim]."
 agitators_election_events.31.b: "Tohle je problém [SCOPE.sCharacter('agitator_scope').GetFullName], ne strany."
 agitators_election_events.31.c: "Kvalita odráží... konzervativní potlačování umění."
 fanfic_ship_west: "Proč by Victor nikdy neusiloval o přízeň Estrid, když se znají tak dlouho? Nemáte cit pro vykupující romanci?"
 fanfic_ship_japan: "Proč by Kazuo lhal o svém postavení válečníka, když věděl, že jeho přátelé potřebují ochránce? Chcete snad zlehčit neohroženého ducha armády?"
 fanfic_ship_south_america: "Proč by doktorka Conceição náhle pocítila výčitky svědomí, když po sedm set stran žádné neprojevila, a hledala vlastní smrt rukou církve?"
 fanfic_ship_china: "Proč by byl Jié na konci tak potupně zabit bandity a odsoudil své druhy, poté co jim dal tolik naděje?"
 fanfic_ship_russia: "Proč by Natalja odmítla nabídku kapitána Preobraženského — a navíc, proč by se on po tom jednoduše vzdal? Nemá snad žádnou vášeň?"
 fanfic_ship_generic: "Proč by inženýr odmítl svěřit těm, kdo mu zachránili život, znalosti potřebné k opravě vlaku, na němž záviseli, a ponechal je bezbranné po své popravě?"
 agitators_election_events.32.t: "Prokletí okovů"
 agitators_election_events.32.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] pronesl jménem [SCOPE.sParty('agitator_party_scope').GetName] projev před stovkami lidí v jednom z parků [SCOPE.sState('capital_scope').GetCityHubName]. Na jeho konci se dav obrátil proti jakékoli představě otroctví."
 agitators_election_events.32.f: "„Desítky, ne-li stovky lidí přivlečených loděmi ze svých domovů. Uneseni v noci nebo prodáni k vyrovnání dluhu — na tom nezáleží. Poté jsou naskládáni, jako byste skládali koberce či židle, do podpalubí na měsíce.“\n\nDáma si přiložila kapesník k tváři. Její manžel sevřel rty.\n\n„Odvracejte zrak, jak chcete, ale vaše srdce zná pravdu.“"
 agitators_election_events.32.a: "Lidé už jednou rozhodli; rozhodnou znovu."
 agitators_election_events.32.b: "Okamžitě to předložme k projednání!"
 agitators_election_events.33.t: "Racionální diskuse"
 agitators_election_events.33.d: "Při setkání za účelem výměny názorů vedli [SCOPE.sCharacter('agitator_scope').GetFullName] a [SCOPE.gsInterestGroup('opposition_ig_scope').GetLeader.GetFullName] civilizovaný a podnětný rozhovor. Většina očekávala rvačku."
 agitators_election_events.33.f: "Někteří říkají, že se protiklady přitahují, jiní že se odpuzují. Jen málokdo chápe, že jednou z vlastností protikladů je změna: oheň a voda tvoří páru, jiskra a střelný prach výbuch, teplo a ruda kov. A tak je tomu i s poctivou debatou: skok v myšlení, z něhož vznikají nové myšlenky."
 agitators_election_events.33.a: "Liberální zdvořilost je cesta vpřed."
 agitators_election_events.33.b: "Chování [SCOPE.sCharacter('agitator_scope').GetFullName] si zaslouží uznání."
 agitators_election_events.33.c: "I opozice by měla být vyslyšena."
 agitators_election_events.34.t: "Náš velký národ"
 agitators_election_events.34.d: "Ve snaze obrátit vlnu nacionalismu ve prospěch [SCOPE.sParty('agitator_party_scope').GetName] uspořádal [SCOPE.sCharacter('agitator_scope').GetFullName] vlastenecký projev v jednom z parků [SCOPE.sState('capital_scope').GetCityHubName]."
 agitators_election_events.34.f: "Nacionalismus je často předpokládaná a nezasloužená nadřazenost místa narození. Lze jej snadno zaměnit za vlastenectví, ale bystré oko rozdíl pozná. Ještě bystřejší mysl ví, jak jej využít."
 agitators_election_events.34.a: "Skutečně hrdina lidu."
 agitators_election_events.34.b: "Měli bychom zajistit pevné ukotvení zákonů."
 agitators_election_events.34.c: "Ukončete toto nestydaté podbízení!"
 agitators_election_events.35.t: "O svobodě projevu"
 agitators_election_events.35.d: "Dnešní projev [SCOPE.sCharacter('agitator_scope').GetFullName] se zaměřuje na [GetLawType('law_right_of_assembly').GetName] a snahy [SCOPE.sParty('agitator_party_scope').GetName] jej zajistit. Zástupy lidí se shromáždily ze všech koutů, aby jej vyslechly."
 agitators_election_events.35.f: "„Žádná skutečná diskuse nemůže probíhat, dokud nás zákon nutí mlčet! Jak se můžeme nazývat ‚velkými‘ a ‚osvícenými‘, když se bojíme samotného zákona? A kvůli čemu? Kvůli vlastním slovům? ‚Velcí‘ a ‚osvícení‘... říkám, že je to lež! Podvod! Hanebná fraška!“"
 agitators_election_events.35.a: "[SCOPE.sCharacter('agitator_scope').GetFullName] má pravdu..."
 agitators_election_events.35.b: "Přineste papír a inkoust. Je třeba sepsat zákon!"
 agitators_election_events.35.c: "Kdo chce mluvit, musí nejprve vědět jak a kdy."
 agitators_election_events.36.t: "Vrána k vráně sedá"
 agitators_election_events.36.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] a [SCOPE.gsInterestGroup('devout_ig').GetLeader.GetFullName] byli spatřeni při rozhovorech o nadcházejících volbách. Následující den kazatelé vyzdvihovali ctnosti [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.36.f: "První stav a druhý stav ruku v ruce od nejstarších sláv impéria. Modernější označení tohoto posvátného spojení zní „srdce a mysl“ — vznešený vůdce, který si získá jejich srdce, a velkolepý bůh, který zaplní jejich mysl."
 agitators_election_events.36.a: "[SCOPE.gsInterestGroup('devout_ig').GetName] jsou mimo náš dosah."
 agitators_election_events.36.b: "Doufejme, že nerozhodnou volby."
 agitators_election_events.36.c: "Pravověrným nelze ve světských záležitostech věřit."
 agitators_election_events.37.t: "Obránce slušnosti"
 agitators_election_events.37.d: "[SCOPE.sCountry('revolutionary_nation_scope').GetName] padla do rukou revoluce vedené [SCOPE.gsInterestGroup('revolutionary_ig').GetName]. V materiálech kampaně [SCOPE.sParty('agitator_party_scope').GetName] [SCOPE.sCharacter('agitator_scope').GetFullName] okamžitě odsoudil místní [SCOPE.gsInterestGroup('patsy_ig').GetName], aby předešel podobnému povstání."
 agitators_election_events.37.f: "„Chceš mě označit za zrádce?“\n\n„Tím si jsem jist. Mnozí v [SCOPE.sCountry('revolutionary_nation_scope').GetNameNoFormatting] by smýšleli stejně jako ty. Kdo říká, že už zrádcem nejsi? Snad kujíš spiknutí se členy svého čtenářského klubu?“\n\n„Zbláznil ses!“"
 agitators_election_events.37.a: "Někdo se musí postavit revoluční vlně!"
 agitators_election_events.37.b: "[SCOPE.sCountry('revolutionary_nation_scope').GetNameNoFormatting] je daleko — a tohle je tady."
 agitators_election_events.37.c: "Revoluce nesmí být démonizována!"
 agitators_election_events.38.t: "Staré dobré časy"
 agitators_election_events.38.d: "Když byl [SCOPE.sCharacter('agitator_scope').GetFullName] pozván k projevu jménem [SCOPE.sParty('agitator_party_scope').GetName], začal vychvalovat ctnosti silného domova, pevných hranic a silných mužů. Reakce veřejnosti byly smíšené."
 agitators_election_events.38.f: "„Vpravdě, řekl bych, že muži už nejsou muži! Jsou rozmazlováni knihami, jako by mohly nahradit #italic skutečné#! dobrodružství! Jejich matky je balí do bavlny a hedvábí, aby je pak ovládaly jejich ženy! A nedej bože, aby si dali půllitr piva: #italic jeden lok#! — a už potřebují, aby je otcové nesli domů!“"
 agitators_election_events.38.a: "Copak nikdo nemyslí na děti?"
 agitators_election_events.38.a1: "Copak nikdo nemyslí na děti?"
 agitators_election_events.38.b: "Staré způsoby pro staré časy — a ještě starší hlupáky."
 agitators_election_events.38.c: "Rétorika nemůže zakrýt, co [SCOPE.sCharacter('agitator_scope').GetLastName] skutečně chce."
 agitators_election_events.39.t: "Odvody"
 agitators_election_events.39.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] učinil kroky k získání podpory [SCOPE.gsInterestGroup('rf_scope').GetName] pro [SCOPE.sParty('agitator_party_scope').GetName]. [SCOPE.sCharacter('rf_leader_scope').GetFullName] jednání alespoň vzal na vědomí."
 agitators_election_events.39.f: "Apely na „přirozené spojence“ jsou sázkou s malou šancí na úspěch. Ti, kdo jsou těmto apelům nakloněni, často již sdílejí stejné názory. Ti ostatní půjdou zdvořile dál svou cestou. Méně zdvořile se mohou smát, pohrdat — nebo, pokud jsou skutečně vychytralí, proměnit hráče ve svého užitečného idiota."
 agitators_election_events.39.a: "Staré mysli myslí podobně."
 agitators_election_events.39.b: "Tráva roste, jak sama chce."
 agitators_election_events.39.c: "Měli by si dát pozor na prozíravost [SCOPE.sCharacter('rf_leader_scope').GetFullName]."
 agitators_election_events.40.t: "Střelec bere černého pěšce"
 agitators_election_events.40.d: "Na večírku pro nejbohatší podporovatele [SCOPE.sParty('agitator_party_scope').GetName] spustil [SCOPE.sCharacter('agitator_scope').GetFullName] dlouhý výlev o přednostech otroctví a diskriminace."
 agitators_election_events.40.f: "„Jak je zcela zřejmé, vývoj lebky přímo souvisí s civilizovaností člověka. Správným změřením jejího obvodu lze spolehlivě určit jeho způsobilost pro dobrou společnost—“\n\n„A jak hodláte dokázat, že člověk myslí kostmi?“\n\n„Jak jsem řekl, způsobilost člověka pro dobrou společnost lze určit správným měřením jeho lebky.“"
 agitators_election_events.40.a: "Lidé mají právo na svůj názor, i když je mylný."
 agitators_election_events.40.b: "Civilizace je prostředkem naší rovnosti."
 agitators_election_events.40.c: "Člověk by se skoro ptal, zda byl [SCOPE.sCharacter('agitator_scope').GetLastName] někdy zbičován..."
 agitators_election_events.41.t: "Nájem v této ekonomice?"
 agitators_election_events.41.d: "[SCOPE.gsInterestGroup('devout_ig').GetName] formálně pokáraly [SCOPE.sCharacter('agitator_scope').GetFullName] kvůli nekonvenčnímu článku v novinách [SCOPE.sParty('agitator_party_scope').GetName], který prosazoval narušující sociální politiky."
 agitators_election_events.41.f: "„Rád bych se upřímně omluvil za svůj článek v čtvrtečním vydání. V té době jsem hovořil s několika kolegy o žalostném stavu bydlení v nájmu v [SCOPE.sState('capital_scope').GetNameNoFormatting]. Možná je přece jen příliš brzy navrhovat polygamii jako životaschopné řešení pro dělnickou třídu.“"
 agitators_election_events.41.a: "Posvátnost manželství musí být chráněna!"
 agitators_election_events.41.b: "Cokoli, co učiní nájem snesitelnějším..."
 agitators_election_events.41.c: "Mohli byste jim prostě dát peníze."
 agitators_election_events.42.t: "Soutěž o popularitu"
 agitators_election_events.42.d: "[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('monarch_scope').GetFullName] se zoufale snaží získat přízeň svých poddaných, což inspirovalo [SCOPE.sCharacter('agitator_scope').GetFullName] k dalšímu prosazování názorů [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.42.f: "„Podívejte se na tohoto neúspěšného vládce! Na tohoto Bohem dosazeného muže! Člověka, který sotva ví, jaký je den, natož jak si zavázat boty. Obsluhovaného na každém kroku vámi, pekaři a ševci, krejčí a řezníci. A teď odměňuje své oblíbence potem z vašich čel. Vašimi vlastními životy! Jestli ho dosadil Bůh, pak říkám, že Bůh je hlupák! Ne, ne, říkám... říkám, že Bůh je mrtev!“"
 agitators_election_events.42.a: "Svolejme lid na náměstí."
 agitators_election_events.42.b: "Oslovme loajální „myslitele“ [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]."
 agitators_election_events.42.c: "Přímo poučme kolísajícího [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]."
 agitators_election_events.43.t: "Jiné způsoby hlasování"
 agitators_election_events.43.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] vyšel do ulic a povzbuzuje příslušníky kultury [SCOPE.sCulture('discriminated_culture_scope').GetName], aby využili méně konvenční prostředky demokracie k podpoře [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.43.f: "Nepokoje mohou být hlasem nevyslyšených, ale jsou jen jedním z mnoha způsobů, jak být slyšen. Nejjednodušší je vlídné slovo u sklenky. Dalším je umění. Mnozí, kdo si umění neváží, zapomínají, jak silný může být dobře navržený plakát. A samozřejmě tu vždy zůstává možnost vlídného slova a zbraně v temné uličce. Možností je nekonečně mnoho, pokud se do toho pustíte."
 agitators_election_events.43.a: "A budou vyslyšeni, až přijde čas."
 agitators_election_events.43.b: "Všichni buřiči by měli být uvězněni."
 agitators_election_events.43.c: "Žádná demokracie není skutečná bez hlasu všech."
 agitators_election_events.44.t: "Práva pro mě i pro tebe"
 agitators_election_events.44.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] se ostře postavil proti tvrzení [SCOPE.sParty('anti_democratic_party').GetName], že demokracie má být vyhrazena osvícené menšině. Přestože jednoduchý, byl tento argument účinnou podporou postoje [SCOPE.sParty('agitator_party_scope').GetName] k [GetLawType('law_universal_suffrage').GetName]."
 agitators_election_events.44.f: "„Zvyklosti demokracie znemožňují hlasovat komukoli jinému než osvíceným mužům mezi námi. Vyzývám kohokoli, aby tento přirozený průběh demokracie vyvrátil.“\n\n„Ehm. Nabídnu jednoduché vyvrácení. Může každý muž či žena, kteří nevlastní majetek, zvednout ruku, pokud souhlasí: dítě by se mělo naučit číst a psát, jakmile je to možné.“\n\nVšechny ruce se zvedly.\n\n„A právě jste se zúčastnili demokracie.“"
 agitators_election_events.44.a: "Jednoduché a pravdivé. Pozoruhodné!"
 agitators_election_events.44.b: "Tvorba zákonů je složitější než tohle."
 agitators_election_events.44.c: "A co ženy?"
 agitators_election_events.45.t: "Setnout hlavu hadovi"
 agitators_election_events.45.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] přerušil královské vystoupení v [SCOPE.sState('capital_scope').GetCityHubName] jednoduchým prohlášením: [SCOPE.sParty('agitator_party_scope').GetName] jsou plně oddáni vytvoření republiky."
 agitators_election_events.45.f: "Božské právo králů je jedním z ospravedlnění, proč panovník nemá být nikdy zpochybňován. Dalším je Mandát nebes. Druhá sloka, stejná jako první — princip je totožný: nezpochybňujte panovníka. Zajímavé je, že jakmile je Bůh mrtev, kdo pak zaručuje božské právo?"
 agitators_election_events.45.a: "[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] musí prokázat své spojení s lidem."
 agitators_election_events.45.b: "Pobuřování nelze tolerovat."
 agitators_election_events.45.c: "Naše oddanost patří republice, demokracii!"
 agitators_election_events.46.t: "Bohatí bohatnou"
 agitators_election_events.46.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] uspořádal večírek pro smetánku [SCOPE.gsInterestGroup('industrialists_ig').GetName]. Úplatky, jen slabě maskované jako dary, proudily do [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.46.f: "„S vaší pomocí v nadcházejících volbách zajistíme, že vaše stroje poběží naplno a přístavy zůstanou otevřené!“\n\nV sále bylo sotva dvě stě rukou, ale každý potlesk zněl jako hrom, ohlašující vyplutí tisíců lodí."
 agitators_election_events.46.a: "Stejně to všechno utratí za šampaňské."
 agitators_election_events.46.b: "Někdo by se měl na ty dary podívat blíž."
 agitators_election_events.46.c: "Nemohli bychom ty korupční peníze využít lépe?"
 agitators_election_events.47.t: "Přátelé v zahraničí"
 agitators_election_events.47.d: "Při snaze získat další podporu poukázal [SCOPE.sCharacter('agitator_scope').GetFullName] na [SCOPE.sCountry('friendly_country_scope').GetName] jako na příklad, jak by [SCOPE.sParty('agitator_party_scope').GetName] posílila zahraniční vztahy."
 agitators_election_events.47.f: "Podstata obchodu je jednoduchá: jedna strana má něco, co druhá potřebuje, a poskytne to na základě vzájemné výměny. Nejčastěji knihu za knihu, jídlo za jídlo, službu za službu. Méně často, a možná nebezpečněji, je to obchod, jaký vedou státy: lidský život za materiální bohatství. Jinak řečeno ekonomika."
 agitators_election_events.47.a: "Vítáme naše přátele z [SCOPE.sCountry('friendly_country_scope').GetName]."
 agitators_election_events.47.b: "[SCOPE.sCharacter('agitator_scope').GetSheHe|U] tam určitě má továrnu."
 agitators_election_events.47.c: "Když [SCOPE.sCharacter('agitator_scope').GetLastName] tolik miluje [SCOPE.sCountry('friendly_country_scope').GetName], měl by tam žít!"
 agitators_election_events.48.t: "Řinčení šavlí"
 agitators_election_events.48.d: "Volební napětí mezi [SCOPE.sParty('agitator_party_scope').GetName] a [SCOPE.sParty('armed_forces_party').GetName] vzrostlo poté, co [SCOPE.sCharacter('agitator_scope').GetFullName] obvinil [SCOPE.gsInterestGroup('armed_forces_ig').GetName] z okázalého válečného štvaní."
 agitators_election_events.48.f: "„Generále! Mám pár slov pro vás a vaše řinčící plecháče. Vy a vaši poskoci plánujete v blízké době rozpoutat válku. Co na to říkáte?“\n\n„A jak jinak máme využít kulky a obvazy, které nám dodáváte, pane? Válka zvyšuje poptávku po vašem zboží.“\n\n„To... to není podstatné! Naše továrny jsou v palebné linii!“"
 agitators_election_events.48.a: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] mají až příliš velký vliv na rozhodování."
 agitators_election_events.48.b: "[SCOPE.sCharacter('agitator_scope').GetFullName] by se měl starat výhradně o záležitosti [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.48.c: "Možná nově vytvořený pluk uklidní obavy [SCOPE.sCharacter('agitator_scope').GetFullName]."
 agitators_election_events.49.t: "Volný obchod, volnější práce"
 agitators_election_events.49.d: "[SCOPE.sCharacter('agitator_scope').GetFullName] ve své kampani pro [SCOPE.sParty('agitator_party_scope').GetName] prosazuje myšlenky [GetLawType('law_free_trade').GetName] a [GetLawType('law_no_migration_controls').GetName], aby se i ostatní mohli podílet na [ROOT.GetCountry.GetAdjective] úspěchu. [SCOPE.sCharacter('trade_union_leader_scope').GetFullName] jej obvinil z vykořisťování přistěhovalců."
 agitators_election_events.49.f: "Jedno pravidlo platí všude: vždy čtěte drobné písmo. Každý bez skrupulí vás může připravit o cokoli: o šaty, peníze, koně, dům, půdu i o život. A zvlášť si dejte pozor, když vám někdo nabízí všechno, co potřebujete."
 agitators_election_events.49.a: "Naše hranice hlídáme z nějakého důvodu."
 agitators_election_events.49.b: "Úspěchy [ROOT.GetCountry.GetName] patří všem."
 agitators_election_events.49.c: "Všichni přistěhovalci by měli být vzděláváni už na hranicích."
 agitators_election_events.50.t: "Zkušenosti od mládí!"
 agitators_election_events.50.d: "Odvážný krok [SCOPE.sCharacter('agitator_scope').GetFullName] rozdělil veřejnost v otázce blízké každodennímu životu: otevřená podpora dětské práce ze strany [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.50.f: "„Pojďte blíž, děti, a užijte si den na slunci! Ano, dostanete pět šilinků denně za sběr ovoce a hraní v trávě. A budete mít čas venku, o kterém vám rodiče pořád říkají! Pryč od nich, na slunce, budujte silné svaly a boky, které jednou budete potřebovat pro vlastní rodiny. Pomozte starému Jenkinsovi ještě dnes!“"
 agitators_election_events.50.a: "Pokud budou drženy dál od skutečně nebezpečné práce."
 agitators_election_events.50.b: "Neposlouchejte [SCOPE.sCharacter('agitator_scope').GetHerHim], děti. Do školy!"
 agitators_election_events.50.c: "Možná by [SCOPE.sCharacter('trade_union_leader_scope').GetFullName] mohl poslat delegaci do podniků [SCOPE.sCharacter('agitator_scope').GetFullName]"
