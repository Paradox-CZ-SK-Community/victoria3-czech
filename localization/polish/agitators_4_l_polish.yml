 ig_type_matches_former_tt: "[SCOPE.sCharacter('exile_temp').GetFullName] má stejný typ zájmové skupiny jako [SCOPE.gsInterestGroup('exile_ig_scope').GetName]"
 exiles_events.1.t: "Lid bez naděje"
 exiles_events.1.d: "Tváří v tvář nedostatku podpory pro své myšlenky opustil [SCOPE.sCharacter('agitator_scope').GetFullName] [ROOT.GetCountry.GetName] a odešel do exilu za hranice."
 exiles_events.1.f: "„Hlubší studium mě nyní přesvědčilo o opaku. [ROOT.GetCountry.GetAdjectiveNoFormatting] dělnická třída nikdy ničeho nedosáhne.“"
 exiles_events.1.a: "Jednoho dne se snad věci zlepší."
 exiles_events.1.b: "Naděje je první krok na cestě ke zklamání."
 exiles_events.2.t: "Slavná kavárna"
 exiles_events.2.d: "Po náhodném setkání v kavárně a podnětném rozhovoru doporučil [SCOPE.sCharacter('friend_scope').GetFullName], aby [SCOPE.sCharacter('exile_scope').GetFullName], nyní pobývající v [ROOT.GetCountry.GetName], získal trvalý pobyt."
 exiles_events.2.f: "„Pokud potřebujete místo k pobytu, sotva bych vám mohl nenabídnout pozvání. Bylo by ostudné po tak skvělé korespondenci nepodpořit váš talent.“"
 exiles_events.2.a: "Lepší doporučení jsme si ani nemohli přát."
 exiles_events.2.b: "Rozhodování [SCOPE.sCharacter('friend_scope').GetFullName] je zjevně pochybné."
 exiles_events.3.t: "Podpora ze zahraničí"
 exiles_events.3.d: "Vůdci [SCOPE.sPoliticalMovement('movement_scope').GetName] napsali [SCOPE.sCharacter('exile_scope').GetFullName] a vyzvali ho k návratu, aby posunul hnutí vpřed."
 exiles_events.3.f: "„Od chvíle, kdy jste musel opustit [ROOT.GetCountry.GetNameNoFormatting], pronásledován vládou, se lid postupně probouzí... nyní je vhodnější čas než kdy dříve k návratu a dokončení změn, které jste kdysi prosazoval.“"
 exiles_events.3.a: "Není lepší chvíle než nyní."
 exiles_events.3.b: "Tuto možnost nepřipustíme."
 exiles_events.4.t: "Zdiskreditovaný exulant"
 exiles_events.4.d: "Po násilném boji o moc v [ROOT.GetCountry.GetName] skončila [SCOPE.gsInterestGroup('failed_revolution_ig').GetName] na straně poražených. [SCOPE.sCharacter('failed_revolution_agitator').GetFullName] se pokusil uprchnout ze země, aby unikl odvetě."
 exiles_events.4.f: "Byl to plán, který si přál nikdy nerealizovat. Útěk oknem, průchod temným bahnitým tunelem — a pak do lesů a přes vzdálené hranice."
 exiles_events.4.a: "[SCOPE.sCharacter('failed_revolution_agitator').GetSheHe|U] může přehodnotit svůj život v cizí chatrči."
 exiles_events.4.b: "Pronásledujme ho na každém kroku."
 exiles_events.5.t: "Kající exulant"
 exiles_events.5.d: "Spokojen s nedávnými kroky vlády oznámil [SCOPE.sCharacter('exile_scope').GetFullName] svůj záměr vrátit se do [ROOT.GetCountry.GetName]. Jeho zbývající spojenci v [SCOPE.gsInterestGroup('exile_ig').GetName] to oslavují."
 exiles_events.5.f: "„Ve svých dřívějších snahách jsem hledal výjimečného vůdce pro [ROOT.GetCountry.GetNameNoFormatting]... byla to jen má tvrdohlavost, která mi bránila vidět to, co nyní vidím. Tím výjimečným vůdcem jste se stal vy.“"
 exiles_events.5.a: "Přijměme jeho podporu i návrat."
 exiles_events.5.b: "Můžeme si být opravdu jisti jeho úmysly?"
 exiles_events.6.t: "Politická migrace"
 exiles_events.6.d: "Bohaté a nestabilní politické prostředí v [ROOT.GetCountry.GetName] se ukázalo být přitažlivé pro politické exulanty a osoby bez státní příslušnosti, kteří se začali shromažďovat v kavárnách [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]."
 exiles_events.6.f: "Ach, [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], nedokonalý, ale vášnivý klenot... kde jinde lze během pěti minut vidět tři různé demonstrace?"
 exiles_events.6.a: "Jsou vítáni v moři hlasů."
 exiles_events.6.b: "Tito lidé si dělají z [ROOT.GetCountry.GetName] posměch."
 exiles_events.7.t: "Exulant u bran"
 exiles_events.7.d: "Relativně mírný imigrační systém [ROOT.GetCountry.GetAdjective] dlouhodobě přitahuje ty, kteří prchají ze svých domovských zemí. Nedávno [SCOPE.sCharacter('exile_scope').GetFullName] požádal o připojení k proudu lidí směřujících do [ROOT.GetCountry.GetName]."
 exiles_events.7.f: "Bylo to jedno jméno na velmi, velmi dlouhém seznamu — takové, které prošlo mnoha úrovněmi byrokracie, než si ho někdo všiml. Jednoho osudového dne však jeden úředník na konci své směny ukázal na jméno a pronesl ta osudová slova.\n\n„Mám pocit, že jsem o [SCOPE.sCharacter('exile_scope').GetHerHim] už slyšel.“"
 exiles_events.7.a: "Nakonec se i [SCOPE.sCharacter('exile_scope').GetFullName] stane [ROOT.GetCountry.GetAdjective]."
 exiles_events.7.b: "Takovou osobu nepřijmeme, bez ohledu na precedenty."
 exiles_events.8.t: "Zahraniční manifest"
 exiles_events.8.d: "Nedávno přeložená díla [SCOPE.sCharacter('exile_scope').GetFullName] se stala populární v rámci [SCOPE.sPoliticalMovement('movement_scope').GetName]. Vztah dospěl do bodu, kdy [SCOPE.sCharacter('exile_scope').GetFullName] hnutí otevřeně podporuje."
 exiles_events.8.f: "„A pro celou velkou třídu neexistuje jiná cesta, zvláště pro národ tak praktický, jako je [ROOT.GetCountry.GetAdjectiveNoFormatting]. Hlavní je přimět dělnickou třídu jednat jako celek; jakmile se to podaří, brzy najde správný směr a všichni odpůrci zůstanou stranou.“"
 exiles_events.8.a: "Náš boj je mezinárodní!"
 exiles_events.8.b: "Takové zahraniční zasahování musí být potrestáno."
 exiles_events.9.t: "Amnestie pro disidenty"
 exiles_events.9.d: "[SCOPE.gsInterestGroup('government_ig_scope').GetName] požádali vládu o amnestii pro bývalé disidenty v zahraničí, včetně [SCOPE.sCharacter('exile_scope').GetFullName], jejich bývalého spojence."
 exiles_events.9.f: "Dlouhodobě zastáváme názor, že činy minulých vlád nemají vliv na podstatu [ROOT.GetCountry.GetAdjectiveNoFormatting] národa. V tomto duchu vás žádáme, abyste odpustili některým osobám vyhnaným do exilu a jednou provždy tuto kapitolu uzavřeli."
 exiles_events.9.a: "Zaslouží si odměnu za svou věrnou podporu."
 exiles_events.9.b: "Kdybychom je nevyhnali, nikdy by nás nepodporovali."
 exiles_events.10.t: "Zdravotní krize"
 exiles_events.10.d: "Významný [ROOT.GetCountry.GetAdjective] politický exulant [SCOPE.sCharacter('exile_scope').GetFullName] během svého pobytu v zahraničí vážně onemocněl. Požádal o návrat domů na dobu potřebnou k lékařskému ošetření."
 exiles_events.10.f: "Povaha člověka nehraje roli — nemoc si může přijít pro každého."
 exiles_events.10.a: "[SCOPE.sCharacter('exile_scope').GetSheHe|U] by měl nést důsledky svých činů."
 exiles_events.10.b: "Nemocným můžeme projevit milosrdenství."
 exiles_events.10.c: "[SCOPE.sCharacter('exile_scope').GetSheHe|U] může po léčbě zůstat."
