 single_party_state.1.t: "Strana [ROOT.GetCountry.GetAltAdjectiveNoFormatting('G')]"
 single_party_state.1.d: "Jako projev podpory a národní jednoty se [SCOPE.gsInterestGroup('party_switch_ig').GetName] rozhodly podpořit kandidátku [SCOPE.sParty('ruling_party').GetName] ve všech nadcházejících volbách namísto své vlastní strany."
 single_party_state.1.f: "„V této době neustálé krize není nikdo, za koho bych raději stál, než [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], a žádná strana, kterou bych podpořil více než [SCOPE.sParty('ruling_party').GetNameNoFormatting]. Tak pravíme všichni.“"
 single_party_state.1.a: "Časem se za nás postaví všichni."
 single_party_state.1.b: "Vyzdvihněme [SCOPE.gsInterestGroup('party_switch_ig').GetName] jako příklad pro nás všechny."
 single_party_state.2.t: "Lid a strana"
 single_party_state.2.d: "Jak pokračuje proces budování [SCOPE.sLaw('current_law_scope').GetName], mnozí členové [SCOPE.sParty('ruling_party').GetName] začali klást otázky, jak nejlépe zvýšit zapojení lidu do stranické činnosti."
 single_party_state.2.f: "„Musíme věřit masám a musíme věřit straně. To jsou dva základní principy. Pokud o nich budeme pochybovat, nedosáhneme ničeho.“"
 single_party_state.2.a: "Nejprve musíme vytvořit pevný rámec, teprve poté můžeme rozšiřovat."
 single_party_state.2.b: "Je zásadní, aby strana zahrnovala celý lid."
 single_party_state.3.t: "Ulice žijí"
 single_party_state.3.d: "Na protest proti snahám [SCOPE.sParty('ruling_party').GetName] zavést [SCOPE.sLaw('current_law_scope').GetName] zahájili demonstranti převážně spojení s [SCOPE.gsInterestGroup('protester_ig').GetName] několikadenní okupaci ulic měst v [SCOPE.sState('capital_scope').GetName]."
 single_party_state.3.f: "Ulice [SCOPE.sState('capital_scope').GetCityHubName] byly mořem hlasů, slogany sílily a slábly, jak organizátoři vedli dav. Jejich hlasy se nesly ulicemi, odrážely se od oken a leskly se v odznacích policistů stojících proti nim.\n\nDnes v noci byly ulice [ROOT.GetCountry.GetNameNoFormatting] živé — ale v očích každého demonstranta bylo vidět i něco jiného: chmurné odhodlání a strach, že tato noc může být poslední."
 single_party_state.3.a: "Povoláme naše loajalisty, aby vyjádřili podporu."
 single_party_state.3.b: "Na takové věci platí obušek — a nic jiného."
 single_party_state.3.c: "Musíme lid lépe poučit o našem systému."
 single_party_state.4.t: "Zastavení revoluce"
 single_party_state.4.d: "Snahy [SCOPE.sParty('ruling_party').GetName] zlikvidovat zbývající buržoazní strany v [ROOT.GetCountry.GetName] narazily na tvrdý odpor krajně pravicových sil sympatizujících s [SCOPE.gsInterestGroup('fascist_ig').GetName]."
 single_party_state.4.f: "Saze pokryly průčelí sídla [SCOPE.sParty('ruling_party').GetNameNoFormatting], zanechané krátkým požárem způsobeným hořícím olejem vrženým na fasádu. Pod nohama křupalo rozbité sklo, zatímco milicionáři znovu zajišťovali budovu.\n\nBylo jasné, že nejde o obyčejný vandalismus. Byla to reakce na probíhající revoluci — akt války proti proletariátu."
 single_party_state.4.a: "Musíme se soustředit především na vlastní program."
 single_party_state.4.b: "Zničme fašisty dřív, než se ukryjí!"
 single_party_state.5.t: "Jen pro lid"
 single_party_state.5.d: "Pokusy [SCOPE.sParty('ruling_party').GetName] upevnit svou moc nad [ROOT.GetCountry.GetName] narazily na tvrdý odpor socialistických sil sympatizujících s [SCOPE.gsInterestGroup('socialist_ig').GetName]."
 single_party_state.5.f: "„Nesmíme připustit toto bezohledné posilování reakčních sil ve společnosti! Úkolem strany proletariátu je sjednotit pracující lid do jednotné fronty celého proletariátu. Pojďte, dělníci, rolníci, milovníci svobody a demokracie... postavte se fašistické vlně a zachraňte sami sebe!“\n\nRoztrhaný plakát byl jen na okamžik viditelný v kalné vodě louže, než jej další bota zatlačila pod hladinu."
 single_party_state.5.a: "Cesta národa patří jen nám."
 single_party_state.5.b: "Potlačte komunisty za každou cenu!"
 single_party_state.6.t: "Reforma skrze revoluci"
 single_party_state.6.d: "Zatímco mnohé státní záležitosti ochromily kroky [SCOPE.sParty('ruling_party').GetName], komunistické milice pod velením [SCOPE.sCharacter('communist_leader_scope').GetFullName] obsadily klíčové budovy v [SCOPE.sState('capital_scope').GetName] a vyhlásily konec „buržoazní diktatury“."
 single_party_state.6.f: "Naším úkolem je zrušit starý řád a zavést vyšší formu demokracie, která povzbudí vykořisťovaný proletariát k tvorbě nových dějin.\n\nTi, kdo zaměstnávají jiné pro zisk; ti, kdo žijí z příjmů nepocházejících z vlastní práce — úroků z kapitálu, průmyslových podniků či pozemkového vlastnictví; soukromí podnikatelé, agenti, prostředníci; mniši a kněží všech vyznání; bývalí příslušníci starých policejních složek; šílenci a zločinci... ti všichni nemají ve straně lidu místo."
 single_party_state.6.a: "Všechnu moc proletariátu!"
 single_party_state.6.b: "Zastavte tento převrat u bran!"
 single_party_state.7.t: "Zmocňovací zákony"
 single_party_state.7.d:1 "[SCOPE.sParty('ruling_party').GetName] uzamkli dveře [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] s poslanci uvnitř a okamžitě předložili návrh na radikální rozšíření pravomocí současné vlády. Opozice byla umlčena fašistickými paramilitárními oddíly v hledišti."
 single_party_state.7.f:1 "Oddíl 1:\nKromě postupu stanoveného ústavou mohou být zákony [ROOT.GetCountry.GetNameNoFormatting] přijímány také vládou [ROOT.GetCountry.GetNameNoFormatting].\n\nOddíl 2:\nZákony přijaté vládou [ROOT.GetCountry.GetNameNoFormatting] se mohou odchýlit od ústavy, pokud neovlivňují instituce [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Práva [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zůstávají nedotčena."
 single_party_state.7.a: "Pouze [SCOPE.sParty('fascist_party_scope').GetName] může zachránit [ROOT.GetCountry.GetName]!"
 single_party_state.7.b: "K čertu s následky, tohle není demokracie!"
