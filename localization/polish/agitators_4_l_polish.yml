 notification_paris_commune_automation_pulse_2_c_name: "Komunardi popravují [SCOPE.sCharacter('executed_general_scope').GetRankName] [SCOPE.sCharacter('executed_general_scope').GetFullName]"
 notification_paris_commune_automation_pulse_2_c_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] oficiálně vyznamenala jednotku Národní gardy, která zajala a zastřelila [SCOPE.sCharacter('executed_general_scope').GetRankName] [SCOPE.sCharacter('executed_general_scope').GetFullName] mimo Paříž.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
