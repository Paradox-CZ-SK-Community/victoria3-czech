 notification_paris_commune_automation_pulse_13_a_desc: "Nejmilitantnější a nejtvrdší složky [SCOPE.sCountry('paris_commune_nation_scope').GetName] obsadily kostely v rozsáhlém obvodu a zajaly stovky vězňů."
 notification_paris_commune_automation_pulse_13_a_tooltip: "#header $notification_paris_commune_automation_pulse_13_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_13_a_desc$"
