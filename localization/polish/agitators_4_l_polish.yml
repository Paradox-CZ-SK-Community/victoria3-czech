 historical_agitators.1.t: "Návrat ze Sibiře"
 historical_agitators.1.d: "Čerstvě po návratu z tříletého exilu na Sibiři se [SCOPE.sCharacter('historic_agitator_scope').GetFullName] setkal s kolegy z odborů, aby prodiskutovali další postup."
 historical_agitators.1.f: "„Iljiči! Vypadáš promrzle. A máš na prstu pěkný prsten. Exil ti prospěl.“\n\n„Dost na to, abych viděl, kolik práce nás čeká. Naděžda a já jsme vedli mnoho diskusí o tom, kam by se strana měla ubírat.“\n\n„Ha! Mluvíš, jako bys chtěl zítra svrhnout buržoazii! Rád tě zase vidím, starý příteli.“"
 historical_agitators.1.a: "Proletariát Evropy existuje i mimo [ROOT.GetCountry.GetAltAdjective('G')]."
 historical_agitators.1.b: "Revoluce bude pokračovat, ať už Okhrana sleduje, nebo ne."
 historical_agitators.1.c: "#italic Iskra#! bude nejvíce těžit z jeho přímého vedení."
 historical_agitators.2.t: "Zadržen při návratu"
 historical_agitators.2.d: "Při návratu ze zahraničí, kam odešel, aby se vyhnul vězení, byl [SCOPE.sCharacter('historic_agitator_scope').GetFullName] zadržen při pokusu o vstup do [ROOT.GetCountry.GetName]."
 historical_agitators.2.f: "Saint-Pélagie, Belle-Île a Carte. Hrozby stále horších a nepřátelštějších věznic narůstaly. A šeptanda o novém Ďáblově ostrově kdesi v Guyaně zní stejně hrozivě, jak název napovídá. Delescluze mohl zůstat v exilu, ale revoluce lidu nemůže čekat."
 historical_agitators.2.a: "Znovu ho zatkněte. Skrývání v jiné zemi není skutečný exil."
 historical_agitators.2.b: "Trest si odpykal jinde. Nechte ho být."
 historical_agitators.3.t: "Útěk před zákonem"
 historical_agitators.3.d: "Při výkonu trestu za revoluční činnost [SCOPE.sCharacter('historic_agitator_scope').GetFullName] tiše uprchl z vězení. Znovu se připojil k bezpočtu revolucionářů v [ROOT.GetCountry.GetName]."
 historical_agitators.3.f: "„Pane? Ten revolucionář je pryč.“\n\n„Mon dieu, který? Máme celé věznice plné těch zrádných krys!“\n\n„Blanqui, pane. Byl propašován ven a věříme, že mu pomohli jeho přátelé. Touhle dobou už bude na půli cesty do Belgie.“"
 historical_agitators.3.a: "Znovu ho dopadněte a pošlete na Ďáblův ostrov."
 historical_agitators.3.b: "Máme jiné politické hlavy k odchycení."
 historical_agitators.4.t: "Ženy víc než jen přadleny"
 historical_agitators.4.d: "Rostoucí feministické hnutí v [ROOT.GetCountry.GetName] se rozštěpilo. [SCOPE.sCharacter('historic_agitator_scope').GetFullName] po tomto rozkolu založila novou, militantní organizaci."
 historical_agitators.4.f: "Napojení na Nezávislou labouristickou stranu, tři samostatné návrhy zákonů, dvacet let práce a veškerá podpora oddané komunity nestačily — ani zdaleka — k dosažení byť jen malého pokroku ve volebním právu žen. Bylo třeba nových metod. Právo žen volit nebude patřit jen svobodným a vdovám.\n\nOhněm, pěstí a hladem získají všechny ženy volební právo."
 historical_agitators.4.a: "Pár dní na venkově by je mohlo uklidnit."
 historical_agitators.4.b: "Setkejme se s jejími stoupenci včas."
 historical_agitators.4.c: "Její charita v chudobincích jí slouží ke cti."
 historical_agitators.5.t: "Pocit osudovosti"
 historical_agitators.5.d: "Nespokojen s pomalým pokrokem v otázce zrušení otroctví začal [SCOPE.sCharacter('historic_agitator_scope').GetFullName] svolávat ozbrojené odpůrce otroctví, aby pomáhali otrokům prchajícím od svých pánů."
 historical_agitators.5.f: "„Do postele, děti. Určitě jste unavené.“\n\n„Mami, je sotva poledne. Ještě jsme ani neprovdali Julii za Romea.“\n\n„Okamžitě dovnitř a držte se dál od toho vozu! Ten John Brown a jeho synové sem míří a jejich křížová výprava nás všechny utopí v krvi. Pamatuj si má slova, chlapče!“"
 historical_agitators.5.a: "Nechť kráčí s Božím požehnáním."
 historical_agitators.5.b: "Nechť jeho pozemské dílo pokračuje bez překážek."
 historical_agitators.6.t: "Francouzská akce"
 historical_agitators.6.d1: "Pod vedením [SCOPE.sCharacter('historic_agitator_scope').GetFullName] se objevila nová publikace. Mimo jiné uvádí, že [SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName] by měl být obětován ve jménu [ROOT.GetCountry.GetAdjective] národního zájmu."
 historical_agitators.6.d2: "Pod vedením [SCOPE.sCharacter('historic_agitator_scope').GetFullName] se objevila nová publikace. Ve svém programu pro [ROOT.GetCountry.GetName] podporuje radikální státní antisemitismus a reakční absolutistický nacionalismus."
 historical_agitators.6.f1: "Mimo jiné byli odpůrci [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] sjednoceni společnou nenávistí k [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]. Ať už byl Žid, Alsasan nebo prostě zrádce, na tom jim nezáleželo. Někdo musel nést vinu za pošpinění slavného impéria Francie. Většině nestačilo nic menšího než jeho život.\n\nNěkteří však požadovali víc. Požadovali homogenitu nového národa."
 historical_agitators.6.f2: "Mimo jiné byla Action Française sjednocena společnou nenávistí ke čtyřem skupinám „vnitřních cizinců“. Ať už šlo o Židy, svobodné zednáře, hugenoty nebo cizí agenty, na tom nezáleželo. Někdo byl odpovědný za pošpinění slavného impéria Francie a někdo musí být odstraněn, aby mohl vzniknout homogenní nový národ."
 historical_agitators.6.a: "Pozitivní přehodnocení monarchie je na místě."
 historical_agitators.6.b: "Jedinou pravdou je Dreyfusova vina!"
 historical_agitators.6.c: "Národ pod diktátorem a králem je jediná cesta vpřed."
 historical_agitators.7.t: "Mladý Joseph"
 historical_agitators.7.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] dorazil do [ROOT.GetCountry.GetName], kde se setkal s rozporuplným přijetím. Někteří jej označují za škůdce, jiní za vizionáře."
 historical_agitators.7.f: "Volal ho sen: společenství nezávislých států. Evropa, jednotná a silná. Evropa, spojená v bratrství. Evropa, bašta demokracie a osvícenství.\n\nSen, který byl znovu a znovu drcen. A přesto stále volal — a on vždy odpovídal. Jediné, co může tuto republiku vytvořit, je zničení všeho, co by se jí postavilo."
 historical_agitators.7.a: "Univerzitní přednášky a cesty, nic víc."
 historical_agitators.7.b: "Pozorně sledujme vznik hnutí Mladá [ROOT.GetCountry.GetName]."
 historical_agitators.8.t: "Třetí Bonaparte"
 historical_agitators.8.d: "Po svých cestách do zahraničí a neúspěšném puči se [SCOPE.sCharacter('historic_agitator_scope').GetFullName] vrátil na území [ROOT.GetCountry.GetAdjective]."
 historical_agitators.8.f: "„Tatínku, tatínku! Napoleon se vrátil!“\n\n„Který Napoleon, Jacquesi? Malý kaprál, vládnoucí král, nebo ten švýcarský?“\n\n„Ten švýcarský důstojník, tatínku!“"
 historical_agitators.8.a: "Nezaslouží si žádné zvláštní zacházení."
 historical_agitators.8.b: "Možná se poučil."
 historical_agitators.8.c: "A tak se mistr plánu odhaluje."
 notification_napoleon_iii_leaves_country_name: "Napoleon III opouští [ROOT.GetCountry.GetAltAdjective('A')]"
 notification_napoleon_iii_leaves_country_desc: "Ve snaze podpořit francouzskou roajalistickou věc opustil samozvaný Napoleon III [ROOT.GetCountry.GetName] a vydal se za lepšími vyhlídkami."
 notification_napoleon_iii_leaves_country_tooltip: "#header $notification_opium_wars_british_response_passive_name$#!\n$TOOLTIP_DELIMITER$\n$notification_opium_wars_british_response_passive_desc$"
 historical_agitators.9.t: "Ten, kdo by byl králem"
 historical_agitators.9.d: "Obyvatel oblasti [SCOPE.sState('california_scope').GetName], [SCOPE.sCharacter('historic_agitator_scope').GetFullName], se prohlásil císařem. Začal vydávat vlastní nařízení a lidé dokonce tisknou měnu s jeho podobiznou."
 historical_agitators.9.f: "„Na naléhavou žádost a přání velké většiny občanů těchto Spojených států já, [SCOPE.sCharacter('historic_agitator_scope').GetFullNameNoFormatting], dříve z Algoa Bay na Mysu Dobré naděje a nyní již 9 let a 10 měsíců obyvatel San Francisca v Kalifornii, prohlašuji sám sebe císařem těchto Spojených států...“"
 historical_agitators.9.a: "Ať si vyhlašuje. Lidi to alespoň pobaví."
 historical_agitators.9.b: "Cizí hlava státu nemůže zůstat na svobodě."
 historical_agitators.10.t: "Buď k něčemu užitečný"
 historical_agitators.10.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName], vyděděný syn knížecí rodiny, se vrátil do [ROOT.GetCountry.GetName]. Jeho činnost působí podvratně."
 historical_agitators.10.f: "„Rád tě zase vidím, Dmitriji. Vidím, že Petrohrad znovu ožil.“\n\n„To ano, Pjotre. Poslyš, tohle není zdvořilostní návštěva. Jsem rád, že jsi zpátky ve vlasti... a myslím, že i někteří moji přátelé by byli.“\n\n„Přátelé? Neříkej mi, že Čajkovskij... ach, ty to myslíš vážně.“"
 historical_agitators.10.a: "Pošlete ho na Sibiř jako ostatní."
 historical_agitators.10.b: "Co by takový neúspěšný princ mohl dokázat?"
 historical_agitators.10.c: "Měl by se držet dál od měst."
 historical_agitators.11.t: "Bakunin v Berlíně"
 historical_agitators.11.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] opustil vojenskou službu a požádal o povolení studovat v Berlíně."
 historical_agitators.11.f: "„Synu, jsi prvorozený a neseš břímě našeho rodu. Žádám tě, abys zůstal a sloužil svými schopnostmi.“\n\n„A já bych si raději oloupal čelo jako bramboru, než razítkoval formuláře. To není budoucnost. To, co mám v hlavě, si žádá víc.“"
 historical_agitators.11.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] potřebuje velké myslitele stejně jako velké generály."
 historical_agitators.11.b: "Své vzdělání si užije — a nikdy ho nepřinese zpět."
 historical_agitators.12.t: "Muž jménem „Lvov“"
 historical_agitators.12.d: "Při razii v [SCOPE.sState('trotsky_state').GetName] bylo odhaleno přes 200 členů Jihoruského dělnického svazu. Mezi nimi i mladý muž jménem [SCOPE.sCharacter('historic_agitator_scope').GetFullName]."
 historical_agitators.12.f: "Z [SCOPE.sState('trotsky_state').GetCityHubName] se šíří zvěsti o tiskařském stroji. Ne o obyčejném tisku novin či schválených knih. Tento tisk se soustředil na několik myšlenek: slogany hájící práva proletariátu a výzvy vzdělaným, aby šířili poselství — revoluce se blíží."
 historical_agitators.12.a: "Zatkněte je všechny a pošlete na Sibiř."
 historical_agitators.12.b: "Zatkněte vůdce. Ostatní se podřídí."
 historical_agitators.13.t: "Dąbrowského útěk"
 historical_agitators.13.d: "Kapitán [SCOPE.sCharacter('historic_agitator_scope').GetFullName], bývalý dělostřelecký důstojník zatčený za pobuřování, uprchl ze sibiřského zajetí. Jeho strážci se domnívají, že prchá na jih."
 historical_agitators.13.f: "Je skutečně vlastenecké postavit se tyranovi, který vládne milované vlasti, nebo je to jen sobecká zrada? To je otázka, která by si zasloužila odpověď — kdyby byl čas se zastavit a odpočinout. Jih, někde, kamkoli na jih od Moskvy, by byl ten správný čas. Právě teď však stáli v cestě psi [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 historical_agitators.13.a: "Najděte ho, než rozšíří svou zradu."
 historical_agitators.13.b: "Ať ho pohltí nekonečné Rusko."
 historical_agitators.13.c: "Teď je to problém Polska."
 historical_agitators.14.t: "Dickensovský příběh"
 historical_agitators.14.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] je stále více unaven vedením novin [SCOPE.sState('capital_scope').GetCityHubName] Daily News a rozhodl se trávit čas v zahraničí."
 historical_agitators.14.f: "„Řekl bych, Johne, že spolumajitelé Daily News mě jednou zabijí. Ty noviny měly být něčím mnohem víc. Připadá mi, že už nemám čas — ani na lásku, ani na peníze.“\n\n„A já poznám, když mi chceš něco předat, Charlie. Je to tvůj podnik a já ti své zkušenosti dávám zdarma, ale dobře zvaž, co navrhuješ. Přijmu to, pokud si to přeješ, ale rozhodnutí za tebe neudělám.“"
 historical_agitators.14.a: "Neměl by být svazován nevědomostí a nouzí."
 historical_agitators.14.b: "Jeho práce tam ještě není u konce."
 historical_agitators.15.t: "Mladý Spartakus"
 historical_agitators.15.d: "Katastrofální stávka v Polsku vedla k popravě vůdců Strany proletariátu za velezradu. Někteří členové, včetně [SCOPE.sCharacter('historic_agitator_scope').GetFullName], uprchli."
 historical_agitators.15.f: "Stávku přežilo mnohem méně členů strany, než kdokoli doufal. Ti, kdo zůstali, se rozhodli scházet tajně, protože byli postaveni mimo zákon. Všem bylo jasné: za svou činnost budou pronásledováni zákonem. V Polsku nebylo mnoho míst k úkrytu a pařáty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] sahaly do milionů."
 historical_agitators.15.a: "Nesmí být žádné kompromisy, ani pro ni."
 historical_agitators.15.b: "Je přehnané trestat ženu, která má celý život před sebou."
 historical_agitators.16.t: "Destrukce: tvůrčí impuls"
 historical_agitators.16.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] nedávno publikoval dílo „Úvahy o násilí“, čímž signalizoval jak své přiklonění k radikální levici, tak odklon od ortodoxní socialistické teorie."
 historical_agitators.16.f: "„Marx předpokládal, že buržoazie nepotřebuje být podněcována k použití síly; dnes však čelíme novému a zcela nečekanému faktu: buržoazii, která se snaží oslabit vlastní sílu.“"
 historical_agitators.16.a: "Dostaňte ho z Francie, než se stane obtíží!"
 historical_agitators.16.b: "Socialismus může pokračovat jen s ohledem na národ."
 historical_agitators.16.c: "Některé myšlenky by měly zůstat jen myšlenkami."
 historical_agitators.17.t: "Etika pomsty"
 historical_agitators.17.d: "V návaznosti na nálady v ozbrojených silách vyzval [SCOPE.sCharacter('historic_agitator_scope').GetFullName] k pomstě proti [SCOPE.sCountry('revenge_country').GetName], což vyvolalo bouřlivý potlesk."
 historical_agitators.17.f: "Pomsta je v zásadě potřebou obnovit pošramocenou čest. Člověk může hledat odplatu stejně za ukradenou drobnost jako za vyražené oko. Když je hodnota národa spjata s velikostí jeho armády, může každá porážka tuto představu rozbít. A běda těm, kdo na tuto hodnotu zaútočí."
 historical_agitators.17.a: "Vive la France! Nikdo se jí nepostaví!"
 historical_agitators.17.b: "Každý má právo pomstít svou zemi."
 historical_agitators.17.c: "Odstraňte toho válečného štváče z úřadu."
 lv_4_general_tt: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] bude povýšen na [Concept('concept_commander_rank', 'hodnost')] $commander_rank_4_general$"
 lv_2_general_tt: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] bude povýšen na [Concept('concept_commander_rank', 'hodnost')] $commander_rank_2_general$"
 historical_agitators.18.t: "Syn obchodníka s hedvábím"
 historical_agitators.18.d: "Po návratu do politiky byl [SCOPE.sCharacter('historic_agitator_scope').GetFullName] pozván k veřejným projevům o ústavě [ROOT.GetCountry.GetAdjective] státu."
 historical_agitators.18.f: "Revoluce, bez ohledu na své mírové úmysly či míru násilí, si vždy vybírá svou daň. Pro některé je cena jednoduchá: boty a krev. Jiní nesou méně zjevné ztráty: vyhaslé vášně, pohaslé radosti a ideály proměněné v pouhé vzpomínky. Přesto s dostatkem času a péče existuje naděje na obnovu."
 historical_agitators.18.a: "Mravní prvenství zákona náleží dělníkovi."
 historical_agitators.18.b: "Ústavní otázky jsou jen otázkami moci."
 historical_agitators.19.t: "Partnerství Chromého ďábla"
 historical_agitators.19.d: "V São Paulu se šíří zvěsti o nových novinách #italic Diablo Coxo#!. Jsou jen jednou z mnoha publikací, do nichž píše samouk právník [SCOPE.sCharacter('historic_agitator_scope').GetFullName]."
 historical_agitators.19.f: "Nové partnerství mezi osvobozeným otrokem a zahraničním karikaturistou vzalo město útokem. Bylo ostré, vtipné a vizuálně přitažlivé — a bylo předurčeno rozčepýřit pera každého „páva“ v São Paulu. [SCOPE.sCharacter('historic_agitator_scope').GetFullNameNoFormatting] měl před sebou velký úkol: nic menšího než svobodu pro každého otroka v [ROOT.GetCountry.GetNameNoFormatting]."
 historical_agitators.19.a: "Democracia začíná."
 historical_agitators.19.b: "Vyhrožování smrtí je pro osvobozeného muže až příliš běžné."
 historical_agitators.20.t: "Útěk Valjeana"
 historical_agitators.20.d: "Jak [SCOPE.sCharacter('ruler_scope').GetFullName] hromadí stále větší moc, [SCOPE.sCharacter('historic_agitator_scope').GetFullName] označuje [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] za zrádce [ROOT.GetCountry.GetName]."
 historical_agitators.20.f: "Vojenské boty pochodovaly po přehlídce. Moc se opět přesouvá. Každý krok zněl jako umíráček další republiky. Muž, který se stavěl proti trestu smrti, sociální nespravedlnosti i chudobě, nemohl pokorně sklonit hlavu před rozmarem privilegovaného dědice. Ale jak tomu čelit a zároveň ochránit rodinu?"
 historical_agitators.20.a: "Lepší odejít, než zemřít zbytečně."
 historical_agitators.20.b: "Všichni Bonapartové padli. Tento nebude výjimkou."
 historical_agitators.20.c: "Francie už nebude poslouchat slova Orléanů."
 imprison_hugo_tt: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] bude poslán na Ďáblův ostrov"
 historical_agitators.21.t: "Pod Atari"
 historical_agitators.21.d: "Informátoři odhalili existenci Reformní společnosti Číny. Únik informací odhalil plány povstání v [SCOPE.sState('sunyatsen_state').GetName] a její členové byli zatčeni. [SCOPE.sCharacter('historic_agitator_scope').GetFullName], jeden z vůdců, unikl."
 historical_agitators.21.f: "„Bratře, kéž bych ti mohl psát za lepších okolností. Reformy se nevyvíjejí dobře. [SCOPE.sState('sunyatsen_state').GetNameNoFormatting] zůstává v rukou [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] a já si nedokážu vydělat na živobytí. Potřebuji, co můžeš postrádat ze svých statků...“"
 historical_agitators.21.a: "Měl by se pokusit dostat do Japonska nebo Anglie."
 historical_agitators.21.b: "Pokud unikl, může být kdekoli v Číně."
 historical_agitators.22.t: "Mrazivý zrádce"
 historical_agitators.22.d: "Chartistický pochod v Newportu přerostl v krvavé násilí. Příslušníci ozbrojených sil zajali dav včetně jednoho z jeho vůdců, Johna Frosta."
 historical_agitators.22.f: "£100 byla cena za okovy Johna Frosta, doručeného živého a neporušeného. Významný den si žádal starý trest: oběšení, vykuchání a rozčtvrcení. A přesto měl lid co říci. Barbarská smrt za pochod za spravedlivější volební právo byla nepřijatelná. Po osvícenství byl na místě mírnější trest."
 historical_agitators.22.a: "Ať je posledním zrádcem popraveným tímto způsobem."
 historical_agitators.22.b: "Vyhostěte ho z Británie."
 historical_agitators.22.c: "Van Diemenova země je dost daleko."
 historical_agitators.23.t: "Dáma s lampou"
 historical_agitators.23.d: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] dorazila do [ROOT.GetCountry.GetName] a vyvolala smíšené reakce. Její průkopnická práce v ošetřovatelství vyvolala rozsáhlé debaty o jejím úsilí změnit zákony týkající se žen na pracovišti."
 historical_agitators.23.f: "Je bez nadsázky „andělem milosrdenství“ v našich nemocnicích a jak její štíhlá postava tiše prochází chodbami, tváře raněných se při jejím pohledu rozzáří vděčností.\n\nKdyž lékaři odejdou a ticho i tma zahalí dlouhé řady nemocných, lze ji spatřit samotnou s malou lampou v ruce, jak vykonává své noční obchůzky."
 historical_agitators.23.a: "Dáma s kladivem! Vloupala se do skladu, aby získala léky pro raněné."
 historical_agitators.23.b: "Její návrhy získávají v [ROOT.GetCountry.GetName] na síle."
 jaroslaw_in_prison_tt: "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] bude vrácen do mnohem tvrdšího vězení"
 paris_commune.1.t: "Pařížská komuna"
 paris_commune.1.d: "Dlouhodobá nespokojenost s požadavky vlády vůči [SCOPE.gsInterestGroup('national_guard_scope').GetName] v [SCOPE.sState('paris_scope').GetStateRegion.GetCityHubName] přerostla v otevřené povstání ve městě. Revolucionáři popravili několik armádních důstojníků a vyhlásili konkurenční vládu pod hlavičkou [SCOPE.sCountry('paris_commune_scope').GetName]."
 paris_commune.1.f: "„Proletáři Paříže, uprostřed selhání a zrad vládnoucích tříd, pochopili, že nadešla hodina, kdy musí zachránit situaci tím, že vezmou řízení veřejných záležitostí do svých rukou. Pochopili, že je jejich neodkladnou povinností i absolutním právem stát se pány svého osudu tím, že se zmocní vládní moci.“\n\n— Karl Marx, #italic Občanská válka ve Francii#!"
 paris_commune.1.a: "Toto šílenství musí skončit!"
 paris_commune.1.b: "Odzbrojená Paříž je poražená Paříž — ozbrojená Paříž je revoluce!"
 commune_progress_start_at_40: "Postavíme se na stranu vlády [SCOPE.sCharacter('ruler_scope').GetLastName]\n#bold Pařížská komuna#! začne s mírnou nevýhodou"
 commune_progress_start_at_60: "Postavíme se na stranu #bold Pařížské komuny#!\n#bold Pařížská komuna#! začne s mírnou výhodou"
 paris_commune_on_cooldown_tt: "Toto rozhodnutí nebylo použito během posledních #bold tří měsíců#!"
 paris_commune.2.t: "Krvavý týden"
 paris_commune.2.d: "Síly loajální vládě [ROOT.GetCountry.GetRuler.GetLastName] vytáhly na Paříž a během týdenních bojů ve městě rozhodně porazily síly [SCOPE.sCountry('paris_commune_scope').GetName]. Již jsou hlášeny hromadné popravy zajatých členů Národní gardy věrných Komuně."
 paris_commune.2.f: "„Komuna, obklíčená ze všech stran, měla před sebou jen smrt. Mohla být jen statečná — a byla. A svou smrtí otevřela dokořán dveře budoucnosti. To byl její osud.“\n\n— Louise Michel"
 paris_commune.2.a: "Pro komunu vrahů nebude žádné slitování."
 paris_commune.2.b: "Musíme postupovat opatrně, jinak nám Paříž nikdy neodpustí."
 paris_commune.3.t: "Pochod na Versailles"
 paris_commune.3.d: "Několikatisícový oddíl Národní gardy věrný [SCOPE.sCountry('paris_commune_scope').GetName] vytáhl na palác ve Versailles a zajal ministry vlády [ROOT.GetCountry.GetRuler.GetLastName]. Nad hlavní pevností konzervativního odporu byla vztyčena vlajka Komuny."
 paris_commune.3.f: "„Komunální revoluce, započatá lidovou iniciativou, zahajuje novou éru experimentální, pozitivní, vědecké politiky.\n\nJe to konec starého vládního a církevního světa, militarismu a byrokratismu, vykořisťování, spekulací, monopolů a privilegií, jimž proletariát vděčí za své poddanství a vlast za své neštěstí a katastrofy.“\n\n— #italic Manifest Pařížské komuny#!"
 paris_commune.3.a: "Vláda ve Versailles bude souzena jako zločinci."
 paris_commune.3.b: "Musíme oslavit vítězství a usmířit se."
 communards_seize_power_tt: "[SCOPE.sCountry('paris_commune_scope').GetAdjective] síly převezmou kontrolu nad #bold Francií#!"
 paris_commune.4.t: "Revoluce komunardů"
 paris_commune.4.d: "Dlouhodobé napětí mezi [ROOT.GetCountry.GetAdjective] lidem a vládou [ROOT.GetCountry.GetRuler.GetLastName] dosáhlo bodu varu. Revolucionáři po celé zemi vyhlásili loajalitu k [SCOPE.sCountry('paris_commune_scope').GetName] a pochodují proti oslabené centrální vládě."
 paris_commune.4.f: "„Uvolněte cestu lidu, bojovníkům s holýma rukama! Hodina revoluční války udeřila! Do zbraně, občané! Do zbraně!“\n\n— Louis Delescluze"
 paris_commune.4.a: "Smrt zrádcům!"
 paris_commune.4.b: "Ať žije Komuna!"
 commune_progress_subtract_10: "Postup #bold Pařížské komuny#! se #bold sníží#! o #bold 10#!"
 commune_progress_subtract_monthly_1: "Postup #bold Pařížské komuny#! se bude #bold snižovat#! o #bold 1 %#! každý měsíc"
 commune_progress_add_10: "Postup #bold Pařížské komuny#! se #bold zvýší#! o #bold 10#!"
 commune_progress_add_monthly_1: "Postup #bold Pařížské komuny#! se bude #bold zvyšovat#! o #bold 1 %#! každý měsíc"
 ig_national_guard: "Národní garda"
 ig_national_guard_desc: "Národní garda je součástí francouzské armády, sloužící jako záložní vojenská a četnická síla tvořená běžnými občany. Historicky loajální liberálním a republikánským myšlenkám jako armáda lidu, se Národní garda stala hlavní silou stojící za vznikem Komuny."
 communard_effects_header_tt: "#header Na [SCOPE.sCountry('paris_commune_nation_scope').GetName] se uplatní následující efekty:#!"
 lost_war_tt: "Tato [concept_country] byla nedávno poražena ve [concept_war]"
 wargoal_pressed_by_recognized_power_tt: "Na tuto [Concept('concept_country','zemi')] byl vynucen [Concept('concept_war_goal','$concept_pops$')|l] [Concept('concept_recognized_power','uznanou mocností')]."
 lacks_homeland_tt: "Tato [concept_country] nemá kontrolu nad žádným [concept_homeland] svého [concept_primary_cultures]"
 socialist_revolution_ongoing_tt: "V této zemi právě probíhá #bold socialistická#! [concept_revolution]"
 liberal_revolution_ongoing_tt: "V této zemi právě probíhá #bold liberální#! [concept_revolution]"
 reactionary_revolution_ongoing_tt: "V této zemi právě probíhá #bold reakční#! [concept_revolution]"
 je_the_paris_commune_france_spawned: "Město #bold Paříž#! povstalo proti naší vládě"
 je_the_paris_commune_france: "Pařížská komuna"
 je_the_paris_commune_france_reason: "Skupina socialistických, anarchistických a radikálně republikánských revolucionářů obsadila město Paříž a vyhlásila konkurenční vládu nad [SCOPE.sCountry('france_scope').GetName].\n\nDokud [SCOPE.sCountry('commune_scope').GetName] existuje, představuje zásadní hrozbu pro naši vládu. Pokud postup Komuny klesne na #bold 0#!, naše síly ji budou schopny potlačit, ale pokud dosáhne #bold 100#!, revolucionáři provedou pochod na Versailles a zcela ukončí naši vládu. Pokud během existence této vlády vypukne [concept_revolution], přísahá věrnost [SCOPE.sCountry('commune_scope').GetName].\n\nPostup #bold Pařížské komuny#! se mění o #tooltippable;tooltip:[Country.GetTooltipTag],je_paris_commune_drift_special_tooltip [GetGlobalVariable( 'paris_commune_drift_final_var' ).GetValue]#! každý měsíc.\n\n#italic Efekty tohoto záznamu v deníku odečítají @money! #variable [Country.MakeScope.Var('PRC_money_transfer').GetValue|-D]#! z naší pokladny každý týden.#!"
 je_the_paris_commune_communards: "Pařížská komuna"
 je_the_paris_commune_communards_reason: "Proletariát Paříže povstal a obsadil hlavní město, čímž vyhlásil konkurenční vládu nad [SCOPE.sCountry('france_scope').GetName].\n\nDokud naše [SCOPE.sCountry('commune_scope').GetName] existuje, představuje zásadní hrozbu pro buržoazní vládu ve Versailles. Pokud postup Komuny dosáhne #bold 100#!, naše síly budou schopny provést pochod na Versailles a zcela ukončit nepřátelskou vládu, ale pokud klesne na #bold 0#!, vláda ve Versailles napadne Paříž a zcela ukončí naši vládu.\n\n#italic Efekty tohoto záznamu v deníku přidávají @money! #variable [Country.MakeScope.Var('PRC_money_transfer').GetValue|+D]#! do naší pokladny každý týden.#!"
 je_paris_commune_drift_special_tooltip: "Tato míra je určena následujícím:\n#variable [Country.MakeScope.Var('PRC_recognition_level').GetValue]#! ze zahraničního uznání #bold Pařížské komuny#!\n#variable [GetGlobalVariable('paris_commune_progress_drift').GetValue]#! z událostí a dalších efektů"
