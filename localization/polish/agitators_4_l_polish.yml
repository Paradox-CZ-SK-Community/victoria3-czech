 state_atheism.4.t: "Exteritorialita v Boží zemi"
 state_atheism.4.d: "Pokus o vyhoštění misionářů, duchovních, léčitelů vírou a podobných vyvolal v zahraničí pobouření. [SCOPE.sCountry('missionary_nation').GetName] odmítá nucené vydání svých občanů v [ROOT.GetCountry.GetName]."
 state_atheism.4.f: "„Ne, tyto zákony neuznávám! Jsem muž [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] a nenechám se zastrašit ve svém vznešeném poslání. Můžete mě odvést v okovech a stejně budu mít právo sem vstoupit. Pokud mě k tomu donutíte, dovolám se této frašky skrze exteritorialitu!“"
 state_atheism.4.a: "Měli bychom to přehodnotit, než vypukne válka."
 state_atheism.4.b: "Vyžeňte je silou, pokud bude třeba."
 state_atheism.4.c: "Mohou zůstat, pokud se zřeknou své víry."
 state_atheism.5.t: "Nový směr řeky"
 state_atheism.5.d: "Jak se [ROOT.GetCountry.GetName] vydává na cestu zpochybňování tradiční náboženské morálky, členové [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] předkládají své teze."
 state_atheism.5.f: "„Dále bych poznamenal, že má-li být Bůh skutečně mrtev, musí zmizet z uctívání. Buďme odsouzeni ke svobodě, abychom mohli psát své dějiny. Ne v kameni ani v krvi, jak tomu bylo pod Bohem, ale inkoustem a skutky. Bůh nemůže být — a nesmí být nadále přijímán jako — pohodlná výmluva, lež posilující rozmary mocných!“"
 state_atheism.5.a: "Tradice má ve společnosti stále své místo."
 state_atheism.5.b: "Pryč s vírou. Pryč se vším, co k ní patří."
 state_atheism.5.c: "Není nic, co by nemělo být zpochybněno."
 state_atheism.6.t: "Zlaté odpustky"
 state_atheism.6.d: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] zahájily konfiskace ze všech míst uctívání [SCOPE.sPop('majority_religion').GetReligion.GetName] v [SCOPE.sState('religion_seizures_state').GetName]. Každá budova, umělecké dílo i kus zlata jsou evidovány k likvidaci."
 state_atheism.6.f: "„Dobře, to je všechno z fary. Co má ve svých komnatách?“\n\n„Pane, tohle všechno jsme našli v jedné z ambulantních kaplí.“\n\n„Sakra, je tam dost zlata na otevření nového dolu. Zavolejte další čtyři muže a prohledejte zbývající kaple, okamžitě!“"
 state_atheism.6.a: "Roztavte zlato a znovu ho vyražte."
 state_atheism.6.b: "Dopřejme našim statečným silám „rizikový příplatek“."
 state_atheism.6.c: "Poskytněte duchovním stipendium na nový začátek."
 luddite_law_events.4.t: "Touha po lesích"
 luddite_law_events.4.d: "Nová populární kniha, plná živých popisů práce na poli a bohatých detailů o přírodě [ROOT.GetCountry.GetName], vzbudila velký zájem o přijetí [SCOPE.sLaw('current_law_scope').GetName]."
 luddite_law_events.4.f: "„A křoví má své přátele, kteří ho vítají\nv šepotu větru a v proudu řeky,\na on vidí nádhernou vizi sluncem zalitých plání\na v noci zázračnou slávu věčných hvězd.“"
 luddite_law_events.4.a: "Jak poutavé čtení."
 luddite_law_events.4.b: "Nabídněte autorovi zakázku jako projev uznání."
 luddite_law_events.5.t: "Hlupáci!"
 luddite_law_events.5.d: "Odpůrci navrhovaných zákonů [SCOPE.sLaw('current_law_scope').GetName] napojení na [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] rozzuřili lid, který chtěli ovlivnit. Mnozí volají po tvrdé odvetě za tento rozruch."
 luddite_law_events.5.f: "„Jak máme postupovat, když je naše země zaplavena krvežíznivými hlupáky?“\n\n„Hlupáky? Ano, jsem hlupák! A ty? Postavíme město a nazveme ho Hloupé Město, protože do té doby všichni ti chytráci, co nás připravili o práci, budou mrtví!“"
 luddite_law_events.5.a: "Když jsou tak chytří, ať se naučí žít bez strojů."
 luddite_law_events.5.b: "Možná bychom měli vyslechnout [SCOPE.sCharacter('intelligentsia_leader').GetFullName]."
 luddite_law_events.6.t: "Kolektivní antagonismus"
 luddite_law_events.6.d: "Zprávy o zákonech [SCOPE.sLaw('current_law_scope').GetName] dorazily k [SCOPE.gsInterestGroup('industrialists_ig').GetName] a [SCOPE.gsInterestGroup('trade_unions_ig').GetName]. Namísto vyjednávání smluv se snaží vynutit změny zákonů silou."
 luddite_law_events.6.f: "Žádný rozumný politik by nepovažoval zásadu „nepřítel mého nepřítele je můj přítel“ za dobré vodítko. Existují koalice, spojenectví z nutnosti a zoufalé dohody. V nejhorších chvílích se může spojit i oheň s kamenem proti společnému nepříteli. A pokud se spojí, ti nejblíže výbuchu by měli utéct, jak jen mohou."
 luddite_law_events.6.a: "Možná jsme jednali ukvapeně."
 luddite_law_events.6.b: "Stačí jednoho odlákat od druhého."
 luddite_law_events.6.c: "Peníze rozhýbou každé soukolí."
