 notification_paris_commune_automation_pulse_11_a_desc: "Ústřední výbor [SCOPE.sCountry('paris_commune_nation_scope').GetName] vydal dekret, který umožňuje zaměstnancům převzít společné vlastnictví svých pracovišť v případě nepřítomnosti majitele.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
