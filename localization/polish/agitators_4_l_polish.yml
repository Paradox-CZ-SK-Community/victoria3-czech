 notification_paris_commune_automation_pulse_3_a_name: "Komunardi decentralizují obranu"
 notification_paris_commune_automation_pulse_3_a_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] svěřila kontrolu nad obranou Paříže místním komunitám v jednotlivých čtvrtích. Tento populistický přístup posílil morálku obránců.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 10#!."
 notification_paris_commune_automation_pulse_3_a_tooltip: "#header $notification_paris_commune_automation_pulse_3_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_a_desc$"
 notification_paris_commune_automation_pulse_3_b_name: "Komunardi centralizují obranu Paříže"
 notification_paris_commune_automation_pulse_3_b_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] centralizovala obranu Paříže pod Ústředním výborem a vytvořila z Národní gardy [GetLawType('law_professional_army').GetName] za cenu přesměrovaných zdrojů a odcizení populistů.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 10#!."
 notification_paris_commune_automation_pulse_3_b_tooltip: "#header $notification_paris_commune_automation_pulse_3_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_b_desc$"
 notification_paris_commune_automation_pulse_3_c_name: "Komunardi opevňují pařížské okraje"
 notification_paris_commune_automation_pulse_3_c_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] vytvořila prstenec obrany na okrajích Paříže, obsazený Národní gardou, čímž výrazně posílila své pozice za cenu podpory místních obyvatel.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_3_c_tooltip: "#header $notification_paris_commune_automation_pulse_3_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_c_desc$"
 notification_paris_commune_automation_pulse_4_a_name: "Komunardi provádějí žhářské útoky"
 notification_paris_commune_automation_pulse_4_a_desc: "Stoupenci [SCOPE.sCountry('paris_commune_nation_scope').GetName] provedli řadu žhářských útoků na okrajích Paříže a zapálili budovy, které by mohly být strategicky využity v boji.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 10#!."
 notification_paris_commune_automation_pulse_4_a_tooltip: "#header $notification_paris_commune_automation_pulse_4_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_a_desc$"
 notification_paris_commune_automation_pulse_4_b_name: "Komunardi provádějí masové žhářské útoky"
 notification_paris_commune_automation_pulse_4_b_desc: "Stoupenci [SCOPE.sCountry('paris_commune_nation_scope').GetName] provedli řadu žhářských útoků v Paříži, zaměřených na budovy spojené s církví a konzervativními institucemi. Ulice zachvacují plameny.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 10#!."
 notification_paris_commune_automation_pulse_4_b_tooltip: "#header $notification_paris_commune_automation_pulse_4_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_b_desc$"
 notification_paris_commune_automation_pulse_4_c_name: "Komunardky provádějí žhářské útoky"
 notification_paris_commune_automation_pulse_4_c_desc: "Ženy podporující [SCOPE.sCountry('paris_commune_nation_scope').GetName] byly obviněny z provedení četných žhářských útoků na okrajích Paříže, zaměřených na budovy spojené s církví, armádou a dalšími konzervativními institucemi.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_4_c_tooltip: "#header $notification_paris_commune_automation_pulse_4_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_c_desc$"
 notification_paris_commune_automation_pulse_5_a_name: "Versailleská vláda nařizuje použití smrtící síly"
 notification_paris_commune_automation_pulse_5_a_desc: "Versailleská vláda schválila soudy, odsouzení a popravy zajatých komunardů vojenskými tribunály. Militanti a socialisté v [SCOPE.sCountry('paris_commune_nation_scope').GetName] byli těmito rozhodnutími povzbuzeni.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_5_a_tooltip: "#header $notification_paris_commune_automation_pulse_5_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_a_desc$"
 notification_paris_commune_automation_pulse_5_b_name: "Versailleská vláda nařizuje popravy vězňů"
 notification_paris_commune_automation_pulse_5_b_desc: "Versailleská vláda schválila soudy, odsouzení a popravy zajatých komunardů vojenskými tribunály, což vedlo k hromadným popravám podezřelých sympatizantů Komuny. Militanti a socialisté v [SCOPE.sCountry('paris_commune_nation_scope').GetName] byli těmito krutostmi výrazně povzbuzeni.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 10#!."
 notification_paris_commune_automation_pulse_5_b_tooltip: "#header $notification_paris_commune_automation_pulse_5_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_b_desc$"
 notification_paris_commune_automation_pulse_5_c_name: "Versailleská vláda provádí zatýkání"
 notification_paris_commune_automation_pulse_5_c_desc: "Versailleská vláda zahájila soudy a vynášení rozsudků nad podezřelými komunardy, slibujíc dlouhé tresty odnětí svobody, ale bez uplatnění trestu smrti. Krvavé předpovědi militantů a socialistů v [SCOPE.sCountry('paris_commune_nation_scope').GetName] se zatím nenaplnily.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_5_c_tooltip: "#header $notification_paris_commune_automation_pulse_5_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_c_desc$"
 notification_paris_commune_automation_pulse_6_a_name: "Komunardi zadržují pařížské kněze"
