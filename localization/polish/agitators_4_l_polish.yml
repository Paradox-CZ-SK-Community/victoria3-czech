 notification_pebrine_spread_notification_name: "Epidemie pébriny se šíří do [SCOPE.sCountry('pebrine_country_scope').GetName]."
 notification_pebrine_spread_notification_desc: "Chovy bource morušového v [SCOPE.sCountry('pebrine_country_scope').GetName] začínají být zasaženy epidemií pébriny."
 notification_pebrine_spread_notification_tooltip: "Chovy bource morušového v [SCOPE.sCountry('pebrine_country_scope').GetName] začínají trpět epidemií pébriny"
 silkworm_diseases.1.t: "Epidemie pébriny"
 silkworm_diseases.1.d: "[SCOPE.sBuilding('pebrine_building').GetName] v [SCOPE.sState('pebrine_state').GetName] začaly čelit epidemii pébriny, smrtelné nemoci bource morušového. Nemoc decimuje celé chovy a ohrožuje celý [ROOT.GetCountry.GetAdjective] hedvábnický průmysl."
 silkworm_diseases.1.f: "„Ano, každý jeden z poslední várky. Pokrytí hnědými skvrnami a umírají jeden po druhém. Není mezi nimi ani vlákno hedvábí.“\n\nStejná zpráva začala přicházet z téměř každé farmy v [SCOPE.sState('pebrine_state').GetNameNoFormatting]. Tisíce a tisíce nakažených housenek. Scvrklé, apatické, špatně se vyvíjející — a ani stopa po životodárném, cenném hedvábí."
 silkworm_diseases.1.a: "Musíme jednat okamžitě."
 silkworm_diseases.2.t: "Propuknutí pébriny v [SCOPE.sState('pebrine_state').GetName]"
 silkworm_diseases.2.d: "Pokračující epidemie pébriny se rozšířila do [SCOPE.sBuilding('pebrine_building').GetName] v [SCOPE.sState('pebrine_state').GetName]. Rychlé šíření nemoci mezi [ROOT.GetCountry.GetAdjective] chovy bource představuje stále větší hrozbu pro hedvábnický průmysl."
 silkworm_diseases.2.f: "První várka vajíček vylíhnutých tento týden měla jen mírně zvýšenou úmrtnost, což částečně otupilo pozornost těch, kteří dohlíželi na svůj bezobratlý chov.\n\nNa další je to však nepřipravilo. Tam, kde se dříve spřádalo kvalitní hedvábí, se nyní v buňkách svíjely zvadlé, skvrnité larvy — nevyhnutelně směřující k nehybnosti."
 silkworm_diseases.2.a: "Dále investujme do hledání řešení."
 silkworm_diseases.2.b: "Nemoc časem sama odezní."
 silkworm_diseases.3.t: "Propuknutí pébriny v [SCOPE.sState('pebrine_state').GetName]"
 silkworm_diseases.3.d: "Epidemie pébriny, která vznikla v [SCOPE.sCountry('pebrine_origin').GetName], se rozšířila na území [ROOT.GetCountry.GetAdjective]. [SCOPE.sBuilding('pebrine_building').GetName] v [SCOPE.sState('pebrine_state').GetName] hlásí masivní úhyny bource."
 silkworm_diseases.3.f: "„Ano, každý jeden z poslední várky. Pokrytí hnědými skvrnami a umírají jeden po druhém. Není mezi nimi ani vlákno hedvábí.“\n\nStejná zpráva začala přicházet z téměř každé farmy v [SCOPE.sState('pebrine_state').GetNameNoFormatting]. Tisíce a tisíce nakažených housenek. Scvrklé, apatické, špatně se vyvíjející — a ani stopa po životodárném hedvábí."
 silkworm_diseases.3.a: "Musíme jednat okamžitě."
 silkworm_diseases.3.b: "Proklatá nedbalost [SCOPE.sCountry('pebrine_origin').GetAdjective]!"
 silkworm_diseases.4.t: "[SCOPE.gsInterestGroup('landowners_scope').GetName] žádají kompenzace"
 silkworm_diseases.4.d: "[SCOPE.gsInterestGroup('landowners_scope').GetName], kteří vlastní [SCOPE.sBuilding('pebrine_building').GetName] v [SCOPE.sState('pebrine_state').GetName], požádali vládu o náhradu ztrát způsobených epidemií pébriny."
 silkworm_diseases.4.f: "„Po dlouhou dobu jsme vynakládali značné prostředky a práci, abychom zajistili úspěch našich podniků — a nyní jsou postiženy nemocí, za kterou nikdo nemůže, a která ohrožuje samotné základy prostředí [SCOPE.sState('pebrine_state').GetNameNoFormatting]. Nečinnost by byla katastrofální pro budoucnost obecného blaha...“"
 silkworm_diseases.4.a: "Jejich odvětví je pro národ zásadní."
 silkworm_diseases.4.b: "Nedbalost odměňovat nebudeme."
 silkworm_diseases.5.t: "Syntetické řešení"
 silkworm_diseases.5.d: "Skupina zastupující [SCOPE.gsInterestGroup('industrialists_scope').GetName] požádala stát o investici do vývoje syntetického hedvábí jako alternativy k pébrinou zasaženému průmyslu."
 silkworm_diseases.5.f: "„...a co když příčinu této nemoci nenajdeme dříve, než se celý průmysl zhroutí? Žádám vás alespoň o zvážení této možnosti.“\n\n„Jednoho dne budeme schopni vyrábět cokoli z chemických procesů — a neměli bychom promarnit příležitost začít co nejdříve.“"
 silkworm_diseases.5.a: "Vhodná investice v době krize."
 silkworm_diseases.5.b: "Nebudeme dále ohrožovat hedvábnický průmysl."
 silkworm_diseases.6.t: "Pomoc chovatelům bource"
 silkworm_diseases.6.d: "[GetPopType('laborers').GetName] v [SCOPE.sBuilding('pebrine_building').GetName] v [SCOPE.sState('pebrine_state').GetName] byli výrazně postiženi ztrátou bource kvůli pébrině. Požádali vládu o finanční pomoc k nahrazení ztracených příjmů."
 silkworm_diseases.6.f: "„Člověk se stává velkým právě tehdy, když pracuje pro blaho svých bližních.“\n\n— Mahátma Gándhí"
 silkworm_diseases.6.a: "Kdo jsme, abychom jim pomoc odepřeli?"
 silkworm_diseases.6.b: "Brzy si najdou jinou práci."
 silkworm_diseases.7.t: "Kořen problému"
 silkworm_diseases.7.d: "Výzkum pébriny odhalil jak houbu způsobující nemoc, tak metodu, jak zabránit jejímu šíření. Nyní můžeme tyto metody využít k očištění našich chovů."
 silkworm_diseases.7.f: "„...znovu vzniká ze špatných vajíček, která jsou připravena nebo dovezena, a v den, kdy budeme chovat pouze vajíčka bez těchto částic, budou téměř všechny generace chráněny před pébrinou...“\n\n— Louis Pasteur"
 silkworm_diseases.7.a: "Opět stojíme v čele světové vědy."
 silkworm_diseases.7.b: "Podělme se o lék s ostatními zeměmi."
 pebrine_foreign_aid_tt: "Všechny země postižené #bold pébrinou#! obdrží prostředky k vyřešení epidemie výměnou za zlepšení [concept_relations] a možnost vzniku [Concept('concept_obligation', '$concept_obligations$')]"
 silkworm_diseases.8.t: "[SCOPE.sCountry('cure_sponsor_scope').GetName] sdílí řešení pébriny"
 silkworm_diseases.8.d: "Po objevu metody spolehlivého oddělování vajíček nakažených pébrinou zveřejnila [SCOPE.sCountry('cure_sponsor_scope').GetName] tento postup mezinárodně. Dodržováním kroků uvedených v publikovaných materiálech jsme nyní schopni napodobit [SCOPE.sCountry('cure_sponsor_scope').GetAdjectiveNoFormatting] úspěchy v této oblasti."
 silkworm_diseases.8.f: "„Od 4 do 6 hodin večer jsou všechny páry odděleně umístěny na malé látky, poté jsou samci okamžitě odstraněni, aniž by se přihlíželo k jejich více či méně zrnitému stavu. Poté, co samice nakladou vajíčka, jsou jednotlivě upevněny v rohu svého plátna pomocí špendlíku, nejlépe propíchnutím křídel, aby se motýl nemohl pohybovat.“\n\n— Louis Pasteur"
 silkworm_diseases.8.a: "Pošleme jejich vědcům poděkování."
 silkworm_diseases.8.b: "Nebudeme se jim zavazovat."
 silkworm_diseases.9.t: "Konec epidemie pébriny"
 silkworm_diseases.9.d: "Díky usilovné práci našich vědců i chovatelů bource, kteří aplikovali jejich řešení, se náš hedvábnický průmysl zotavil z epidemie pébriny. Nové poznatky o příčinách nemoci nám budou přínosem po mnoho let."
 silkworm_diseases.9.f: "Buňky byly opět naplněny kokony, v nichž housenky nevědomky podstupovaly proměnu, která měla být brzy ukončena lázní vařící vody. Dělník procházel mezi řadami dřevěných buněk, stín napětí téměř zmizel z jeho čela.\n\nSeznam jeho úkolů se sice prodloužil a mzda vzrostla jen nepatrně — ale bylo to rozhodně lepší než nemít práci vůbec."
 silkworm_diseases.9.a: "Připijme na naše vědce!"
 silkworm_diseases.9.b: "Obnovme hedvábnický průmysl — není čas ztrácet čas."
