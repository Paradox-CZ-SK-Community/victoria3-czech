 notification_paris_commune_automation_pulse_7_a_desc: "Versailleská vláda zajala jednotku Národní gardy loajální k [SCOPE.sCountry('paris_commune_nation_scope').GetName] na okrajích Paříže. Zajatci byli postaveni před soud a uvězněni v očekávání vojenského tribunálu.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_7_a_tooltip: "#header $notification_paris_commune_automation_pulse_7_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_7_a_desc$"
