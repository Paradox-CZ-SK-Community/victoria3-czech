 land_ownership_law_events.10.t: "Výprodej čeledínů"
 land_ownership_law_events.10.d: "Bohatí příslušníci [SCOPE.gsInterestGroup('landowners_ig').GetName] ve státě [SCOPE.sState('kulaks_state').GetName] v reakci na [SCOPE.sLaw('current_law_scope').GetName] nařídili vybít přebytečný dobytek a spálit nadúrodu."
 land_ownership_law_events.10.f: "„Vidíš to? Prostě to všechno pálí... z jednoho takového ohně bych uživil celou rodinu na měsíc.“\n\n„Myslíš, že je k tomu přemluvili ti bohatí měšťáci z vedlejšího města?“\n\n„Ne... starej je sice parchant, ale tohle by neudělal.“"
 land_ownership_law_events.10.a: "O to větší důvod pokračovat."
 land_ownership_law_events.10.b: "Proces nemůže pokračovat, pokud hrozí hladomor."
 land_ownership_law_events.11.t: "Urážka řádu světa"
 land_ownership_law_events.11.d: "Duchovní vyznání [SCOPE.sPop('majority_religion').GetReligion.GetName] rozdávají pamflety, v nichž tvrdí, že [SCOPE.sCharacter('ruler_scope').GetFullName] a jeho práce na [SCOPE.sLaw('current_law_scope').GetName] jsou urážkou přirozeného řádu světa."
 land_ownership_law_events.11.f: "Neexistuje skutečný způsob, jak určit, kterým bohům záleží na tom, jak roste úroda. Každý rozumný člověk by měl důvěřovat půdě, kterou obdělává. Hnojit dobrou půdu, pečovat o ni a pěstovat jen rostliny, které si navzájem neškodí. A přesto ti, kdo mají světskou moc, tvrdí, že vědí, co jejich bůh žádá, když je tato moc ohrožena."
 land_ownership_law_events.11.a: "O to větší důvod pokračovat."
 land_ownership_law_events.11.b: "Proces nemůže pokračovat, pokud se naše populace [SCOPE.sPop('majority_religion').GetReligion.GetName] vzbouří."
 land_ownership_law_events.11.c: "Zabavte tyto pamflety a použijte je jako palivo do luceren."
 land_ownership_law_events.12.t: "Pozdní příjezd"
 land_ownership_law_events.12.d: "Státní plánovači se předčasně vrátili z inspekce farem převedených na [SCOPE.sLaw('current_law_scope').GetName] ve státě [SCOPE.sState('collectivised_state').GetName]. Domnívají se, že farmy nedokážou správně podporovat těžkou mechanizaci."
 land_ownership_law_events.12.f: "„Mohli bychom vyrábět náhradní díly do zásoby. Dostatek oceli by vydržel déle než bláto. Jsem si tím jistý.“\n\n„A dokážeš těmhle polním rolníkům zaručit, že díly vždy dorazí včas? Bez výjimky? Já ne. A nehodlám nechat životy městských dělníků zničit kvůli bahnu z polí. Budeme muset vymyslet něco chytřejšího.“"
 land_ownership_law_events.12.a: "Stroje existují pouze k podpoře lidské práce."
 land_ownership_law_events.12.b: "Provizorní ocelárna by měla stačit."
 land_ownership_law_events.12.c: "Poraďte se s [SCOPE.sCharacter('rural_folk_leader').GetFullName], co dělat."
 land_ownership_law_events.13.t: "Silní pomocníci"
 land_ownership_law_events.13.d: "Zemědělští dělníci mezi sklizněmi se zorganizovali, aby pomohli procesu kolektivizace. Ti nejoddanější chodí dům od domu a pomáhají urychlit každý proces, který najdou."
 land_ownership_law_events.13.f: "„Viděl jsi ty statné muže u dveří? Voní po zemi a slané vodě, a přitom nám pochodují salónem s... psacími potřebami, zdá se.“\n\n„Ano. Ten urostlý si prozpěvoval pěknou melodii. A byl to odborář. Nepije ani kapku alkoholu. Vypadal nadšeně, když jsem ho požádala, aby mi napsal.“\n\n„Proboha, tys... tys mě vůbec zmínila?“"
 land_ownership_law_events.13.a: "Vítáme jejich podporu."
 land_ownership_law_events.13.b: "Zajistěte, aby byli za svou práci placeni."
 land_ownership_law_events.14.t: "Malebná obec, nyní podivná"
 land_ownership_law_events.14.d: "Akademik známý svými izolacionistickými názory zveřejnil článek odsuzující [SCOPE.sLaw('current_law_scope').GetName]. Tvrdí, že zničí venkovský idyl."
 land_ownership_law_events.14.f: "„Bez vlastních polí k obdělávání přestanou naši pracující být lidmi. Nahradí je skřípot strojů, rachot motorů a neustálá dusivá mlha továrních čtvrtí. Klidný život odplavený nekonečným pochodem urbanizace!“"
 land_ownership_law_events.14.a: "Pokračujme v kurzu."
 land_ownership_law_events.14.b: "Je čas otevřít nový sud inkoustu..."
 land_ownership_law_events.15.t: "Zahraniční akvizice farem, a. s."
 land_ownership_law_events.15.d: "Debaty mezi [SCOPE.gsInterestGroup('landowners_ig').GetName] a [SCOPE.gsInterestGroup('industrialists_ig').GetName] se přelily do [ROOT.GetCountry.GetAdjective] tisku. Hlavní téma: zahraniční investice do [SCOPE.sLaw('current_law_scope').GetName]."
 land_ownership_law_events.15.f: "„S ohledem na extraterritorialitu — jaké máme právní záruky, že [ROOT.GetCountry.GetAdjectiveNoFormatting] zákony platí pro [SCOPE.sCountry('neighbour_country').GetAdjectiveNoFormatting] občany zde?“\n\n„Podstatnější je, kdo na té půdě pracuje. Je to [ROOT.GetCountry.GetAdjectiveNoFormatting] půda, měli by na ní pracovat [ROOT.GetCountry.GetAdjectiveNoFormatting] lidé!“\n\n„Ale pokud si přivezou vlastní pracovní sílu a zákony, může to být pro domácí trhy výhodné...“"
 land_ownership_law_events.15.a: "Všichni zahraniční investoři budou podléhat [ROOT.GetCountry.GetAdjective] občanským zákonům."
 land_ownership_law_events.15.b: "[SCOPE.sCountry('neighbour_country').GetAdjective] zákony jsou to, na co jsou zvyklí."
 land_ownership_law_events.15.c: "Tato přehnaná opatrnost nikomu neslouží."
 land_ownership_law_events.16.t: "Totální řízení shora dolů"
 land_ownership_law_events.16.d: "[SCOPE.gsInterestGroup('industrialists_ig').GetName] projevili zájem o [SCOPE.sLaw('current_law_scope').GetName]. Mnozí průmysloví vůdci chtějí zajistit celý dodavatelský řetězec pro své podniky."
 land_ownership_law_events.16.f: "„Pánové, představuji vám model budoucnosti: [SCOPE.sCharacter('industrialists_leader_scope').GetLastNameNoFormatting]landie. Toto diorama, sestavené z částí tohoto projektu, má zachytit celý výrobní řetězec. Odstraňme prostředníky, jak říkají obchodníci na hlavní třídě. Vlastníme farmy, které živí dělníky, doly zásobující naše pece i bavlnu pro naše uniformy. Jeden ucelený řetězec zaměřený na prodej a distribuci finálního produktu. Dotazy?“"
 land_ownership_law_events.16.a: "Střední management se stane minulostí."
 land_ownership_law_events.16.b: "Dělníci budou potřebovat dodatečnou ochranu."
 land_ownership_law_events.16.c: "Zajímavý návrh. Přijímáme ho."
 land_ownership_law_events.17.t: "Rodina na prvním místě"
 land_ownership_law_events.17.d: "Soudní spor o [SCOPE.sLaw('current_law_scope').GetName] propukl mezi několika rodinami. První osadníci si nárokují stejnou půdu ve státě [SCOPE.sState('claimed_state').GetName]. Spor zpochybnil platnost legislativy."
 land_ownership_law_events.17.f: "Tři nároky, všechny vydané stejným úřadem, přistály na stole soudce. Podrobnosti seděly: všechny tři měly právní listiny na tentýž pozemek. Každá nesla jiný podpis. Soudce dobře znal tahy per těchto úředníků. Jistě došlo k omylu. Tak prosté vysvětlení by však neuspokojilo divoké pohledy v očích rodinných matriarch."
 land_ownership_law_events.17.a: "Zneplatněte listiny a zorganizujte reparace."
 land_ownership_law_events.17.b: "Najděte nejstarší podpis a přidělte půdu jemu."
 land_ownership_law_events.17.c: "Rozdělte půdu mezi všechny tři."
 land_ownership_law_events.18.t: "Rolnictvo, nově označené"
 land_ownership_law_events.18.d: "Ve státě [SCOPE.sState('capital_scope').GetName] propukl ideový střet. Venkovští radikálové kritizují zákony [SCOPE.sLaw('current_law_scope').GetName] za podporu vztahu pán-sluha s [SCOPE.gsInterestGroup('landowners_ig').GetName]."
 land_ownership_law_events.18.f: "„Pche. Makáme pro tu paní až moc. Říkám jen, že kdybych chtěl, aby mi nějaká ženská brala všechno, co vydělám, připoutala mě k posteli a říkala si paní, radši bych jí nejdřív opravdu dlužil peníze.“\n\n„Nejbližší nevěstinec je tři města odsud.“\n\n„Já měl na mysli věno při svatbě.“"
 land_ownership_law_events.18.a: "Možná je na místě revize."
 land_ownership_law_events.18.b: "Lidé budou pracovat podle své hodnoty."
 land_ownership_law_events.18.c: "Ústupky nesmí odvrátit revoluci."
