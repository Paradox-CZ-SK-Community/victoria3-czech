 revolution_pulse_events.1.t: "Národní sebeobrana"
 revolution_pulse_events.1.d: "S rostoucími násilnými náladami mezi [ROOT.GetCountry.GetAdjective] [SCOPE.gsInterestGroup('self_defense_threat_ig').GetName] začalo několik komunit [SCOPE.sCulture('self_defense_threat_culture').GetName] vytvářet ozbrojené milice, aby chránily své obyvatelstvo."
 revolution_pulse_events.1.f: "„Duše dávných hrdinů [SCOPE.sCulture('self_defense_threat_culture').GetNameNoFormatting], bloudící ve světě chaosu, konečně našla své místo.“" #- Anonymní židovský bundista, 1906
 revolution_pulse_events.1.a: "Úřady mají mnohem důležitější starosti."
 revolution_pulse_events.1.b: "[SCOPE.sCulture('self_defense_threat_culture').GetName] překračují meze a musí být ukázněni."
 revolution_pulse_events.2.t: "Stochastický teror"
 revolution_pulse_events.2.d: "Po nedávném bombovém útoku provedeném radikálním stoupencem [SCOPE.gsInterestGroup('blatant_fedposting_ig').GetName] ve státě [SCOPE.sState('blatant_fedposting_state').GetName] byl u pachatelů nalezen výtisk děl [SCOPE.sCharacter('fedposting_agitator').GetFullName]."
 revolution_pulse_events.2.f: "„...a pokud udeří tragická hodina a budeme se jí muset odevzdat, vědomí toho nás podpoří a posílí. Neříkáme jen „ne“, ale z hloubi srdce prohlašujeme, že jsme připraveni obětovat vše.“\n\n— Jean Jaurès"
 revolution_pulse_events.2.a: "[SCOPE.gsInterestGroup('blatant_fedposting_ig').GetName] představují hrozbu pro občanskou společnost."
 revolution_pulse_events.2.b: "Prezentujte tento incident jako výzvu [SCOPE.sCharacter('fedposting_agitator').GetFullName] k terorismu proti nevinným."
 revolution_pulse_events.3.t: "Dvojvládí"
 revolution_pulse_events.3.d: "Revoluční [SCOPE.gsInterestGroup('dual_power_ig').GetName] zřídili v [SCOPE.sState('dual_power_state').GetName] dělnickou a rolnickou radu, která soupeří s naší vlastní správou a tvrdí, že lépe reprezentuje vůli lidu v regionu."
 revolution_pulse_events.3.d2: "[SCOPE.gsInterestGroup('dual_power_ig').GetName] v [SCOPE.sState('dual_power_state').GetName], inspirováni slovy [SCOPE.sCharacter('dual_power_agitator').GetFullName], zřídili dělnickou a rolnickou radu soupeřící s naší správou a tvrdí, že lépe reprezentuje vůli lidu v regionu."
 revolution_pulse_events.3.f: "„Lze přímo říci, že vláda [ROOT.GetCountry.GetAdjectiveNoFormatting] existuje jen tak dlouho, jak jí to lidová rada dovolí.“"
 revolution_pulse_events.3.a: "[ROOT.GetCountry.GetAdjective] stát má výhradní autoritu nad [SCOPE.sState('dual_power_state').GetName]!"
 revolution_pulse_events.3.b: "Lidé v [SCOPE.sState('dual_power_state').GetName] se naučili držet při sobě proti tyranii vlády."
 revolution_pulse_events.3.c: "Uveďte [SCOPE.sState('dual_power_state').GetName] pod přímou kontrolu armády."
 revolution_pulse_events.4.t: "Řadové vojsko"
 revolution_pulse_events.4.d: "[GetPopType('soldiers').GetName] z [SCOPE.sState('soldiers_council_state').GetName] v budově [SCOPE.sBuilding('soldiers_council_building').GetName] se začali organizovat do rady, aby prosazovali vyšší mzdy a lepší zacházení. [SCOPE.gsInterestGroup('armed_forces_ig').GetName] to vnímají jako přímou hrozbu své legitimity."
 revolution_pulse_events.4.f: "Vytáhl z kapsy své uniformy ručně psaný pamflet a podal jej svému druhovi.\n\n„Seržant a já jsme mluvili o platu, který dostáváme — a vím, že to cítíš stejně. Jak máme plnit své povinnosti, když generálové cpou všechny peníze, které nám dluží, do svých krásných bílých koní?“"
 revolution_pulse_events.4.a: "Ukázněte je všechny a přiveďte náhrady z jiných regionů."
 revolution_pulse_events.4.b: "Naši [GetPopType('soldiers').GetName] by měli mít možnost hájit své vlastní zájmy."
 revolution_pulse_events.5.t: "Sebeorganizace"
 revolution_pulse_events.5.d: "Postavy sympatizující s revolucí mezi [SCOPE.gsInterestGroup('rural_folk_ig').GetName] ve státě [SCOPE.sState('self_organization_state').GetName] začaly vytvářet rolnické rady, aby čelily moci [SCOPE.gsInterestGroup('landowners_ig').GetName] v regionu."
 revolution_pulse_events.5.f: "„Chci zatížit svědomí blahobytných veškerým utrpením a všemi skrytými, hořkými slzami.“\n\n— Rosa Luxemburg"
 revolution_pulse_events.5.a: "[SCOPE.gsInterestGroup('rural_folk_ig').GetName] se musí naučit držet na svém místě."
 revolution_pulse_events.5.b: "[SCOPE.gsInterestGroup('landowners_ig').GetName] musí učinit ústupky, aby byl zachován klid."
 revolution_pulse_events.6.t: "Útěk bitevní lodi [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName]"
 revolution_pulse_events.6.d: "Posádka bitevní lodi #bold [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName]#!, dříve umístěné v [SCOPE.sBuilding('potemkin_naval_administration').GetName] ve státě [SCOPE.sState('potemkin_state').GetName], se vzbouřila a uprchla se svou lodí do [SCOPE.sCountry('potemkin_final_destination').GetName]. Vláda [SCOPE.sCountry('potemkin_final_destination').GetName] odmítla námořníky vydat."
 revolution_pulse_events.6.f: "Velká ocelová loď vplula do přístavu, nevěsíce svou původní [ROOT.GetCountry.GetAdjectiveNoFormatting] vlajku, nýbrž vlajku [SCOPE.sCountry('potemkin_final_destination').GetNameNoFormatting]. Námořníci na palubě jásali, zatímco se chystali uprchnout do útrob svého nového domovského města, konečně svobodní od hrůz zkažených přídělů a rezavějících kajut.\n\nA když chudí lidé ve státě [SCOPE.sState('potemkin_state').GetNameNoFormatting] sledovali, jak pronásledovací lodě zahajují hon na [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName], probleskla jim hlavou myšlenka;\n\n„Nezapomeneme!“"
 revolution_pulse_events.6.a: "Vyjednávejte s vládou [SCOPE.sCountry('potemkin_final_destination').GetAdjective] o navrácení lodi."
 revolution_pulse_events.6.b: "[SCOPE.sCountry('potemkin_final_destination').GetAdjective] stát spolupracuje se zrádci!"
 revolution_pulse_events.7.t: "Petiční pochod"
 revolution_pulse_events.7.d: "Skupina petentů zastupujících [SCOPE.gsInterestGroup('petition_march_ig').GetName], vedená [SCOPE.sCharacter('petition_march_leader').GetFullName], uspořádala pochod k aktuálně prázdnému sídlu [SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle] ve městě [SCOPE.sState('petition_march_state').GetStateRegion.GetCityHubName]. Odmítají odejít, dokud [SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle] nepřijme jejich delegaci."
 revolution_pulse_events.7.f: "„Vládce, toto je to, čemu čelíme, a proto jsme se shromáždili před zdmi vašeho paláce.\nZde hledáme svou poslední záchranu.\nNeodmítejte přijít na pomoc svému lidu; vyveďte jej z hrobu chudoby, nevědomosti a bezpráví; dejte mu možnost rozhodovat o svém osudu a zbavte jej nesnesitelného jha byrokratů.“ # -1905 Petice carovi"
 revolution_pulse_events.7.a: "Vyšlete člena královské rodiny, aby je uklidnil."
 revolution_pulse_events.7.b: "Rozežeňte tuto zjevnou hrozbu pro život [SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle] silou!"
 revolution_pulse_events.7.c: "[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle] nastoupí do rychlovlaku směrem na [SCOPE.sState('petition_march_state').GetStateRegion.GetCityHubName]."
 revolution_pulse_events.8.t: "Bohatství lidu"
 revolution_pulse_events.8.d: "Skupina revolucionářů provedla loupež [ROOT.GetCountry.GetAdjective] státní banky ve státě [SCOPE.sState('revolutionary_robbery_state').GetName]. Byla odcizena značná suma peněz, která byla převedena do pokladny revolucionářů."
 revolution_pulse_events.8.f: "Ozval se výstřel a mramorový strop narušila nová prasklina. Křik bankovních úředníků doprovázel prach a třísky dopadající na podlahu.\n\n„Jménem revolučního výkonného výboru prohlašuji všechny za zatčené! Ruce vzhůru! Jinak budou všichni zabiti!“"
 revolution_pulse_events.8.a: "Nařiďte zvýšené zabezpečení bank napříč [ROOT.GetCountry.GetName]."
 revolution_pulse_events.8.b: "Spolehněte se na místní obyvatele, že nahlásí podezřelé z loupeže."
 revolution_pulse_events.8.c: "Pověřte [SCOPE.sLaw('secret_police_law').GetName], aby tyto zločince dopadla."
 revolution_pulse_events.9.t: "Skrytá agitace"
 revolution_pulse_events.9.d: "Sympatizanti revoluce začali agitovat za protivládní cíle v budově [SCOPE.sBuilding('agitation_af_building').GetName] ve státě [SCOPE.sState('agitation_af_state').GetName]."
 revolution_pulse_events.9.d2: "Sympatizanti revoluce začali v budově [SCOPE.sBuilding('agitation_af_building').GetName] ve státě [SCOPE.sState('agitation_af_state').GetName] šířit letáky obsahující výzvy [SCOPE.sCharacter('agitation_af_agitator').GetFullName] k revoluční akci."
 revolution_pulse_events.9.f: "„Stát se vzdal veškerého práva na to prolévat vaši krev, to si musíte uvědomit. I mimo [SCOPE.sState('agitation_af_state').GetNameNoFormatting] se lidé jako my organizují, aby požadovali konec této noční můry.“\n\n„A začíná to u nás! U nás, obyčejných vojáků, kterým důvěřují, že vykonají jejich vůli... co se stane, až konečně zjistí, že za nimi nikdo nestojí?“"
 revolution_pulse_events.9.a: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] musí být nade vše loajální státu."
 revolution_pulse_events.9.b: "Kdo ovládá vojáky, ovládá národ."
 revolution_pulse_events.10.t: "Reformy pod hlavněmi pušek"
 revolution_pulse_events.10.d: "S revolučními náladami vřoucími napříč zemí doporučili poradci [SCOPE.sCharacter('reforms_at_gunpoint_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('reforms_at_gunpoint_ruler').GetFullName] ze [SCOPE.gsInterestGroup('reforms_at_gunpoint_ig').GetName] balík reforem, který má uklidnit revolucionáře."
 revolution_pulse_events.10.f: "„Situace je vážná. Hlavní město je ve stavu anarchie. Vláda je paralyzována. Doprava i zásobování potravinami a palivem jsou zcela narušeny. Všeobecná nespokojenost roste... Nesmí dojít k žádnému odkladu. Jakékoli otálení se rovná smrti.“\n\n— Michail Rodzjanko"
 revolution_pulse_events.10.a: "Tento návrh zachrání [ROOT.GetCountry.GetNameNoFormatting] před drancováním radikálů."
 revolution_pulse_events.10.b: "[SCOPE.gsInterestGroup('reforms_at_gunpoint_ig').GetName] budou našimi největšími obránci proti revoluci."
 revolution_pulse_events.10.c: "Revolucionáře nelze uspokojit — musí být rozdrceni."
 revolution_pulse_events.11.t: "Zákopokracie"
 revolution_pulse_events.11.d: "Zklamaní členové [SCOPE.gsInterestGroup('armed_forces_ig').GetName] začali psát básně a příběhy oslavující kamarádství zažité v nedávné válce s [SCOPE.sCountry('most_recent_opponent_scope').GetName]. Tento sdílený vojenský duch propagují jako řešení současných společenských nepokojů."
 revolution_pulse_events.11.f: "„Brutální a krvavé učení v zákopech bude mít význam. Přinese více odvahy, více víry, více houževnatosti.“\n\n— Benito Mussolini"
 revolution_pulse_events.11.a: "Tohle je duch, který potřebujeme, abychom čelili našim nepřátelům."
 revolution_pulse_events.11.b: "Nic než blouznění lidí šílených z války."
 revolution_pulse_events.12.t: "Žlutá internacionála"
 revolution_pulse_events.12.d: "Navzdory revoluční agitaci [SCOPE.sCharacter('communist_agitator_scope').GetFullName] má [SCOPE.gsInterestGroup('trade_union_ig').GetName] stále některé vůdce se silně reformistickými sympatiemi. Pomoc jim získat kontrolu nad [SCOPE.gsInterestGroup('trade_union_ig').GetName] pomůže čelit revolucionářům."
 revolution_pulse_events.12.f: "„Žádný vysoce rozvinutý proletariát nepřijme diktaturu, jakkoli proletářskou barvu má, jako nástroj emancipace.“\n\n— Karl Kautsky"
 revolution_pulse_events.12.a: "Je lepší, když naši nepřátelé usilují o reformy než o revoluci."
 revolution_pulse_events.12.a1: "Do čela [SCOPE.gsInterestGroup('trade_union_ig').GetName] se postaví vůdce s ideologií [SCOPE.gsInterestGroup('trade_union_ig').GetLeader.GetIdeology.GetName]."
 revolution_pulse_events.12.b: "Socialista je socialista, bez ohledu na to, jak přívětivě se snaží působit."
 revolution_pulse_events.13.t: "Bezplatná pomoc"
 revolution_pulse_events.13.d: "S rostoucí nespokojeností mezi [SCOPE.gsInterestGroup('attacked_ig').GetName] začali neuniformovaní členové [SCOPE.gsInterestGroup('paramil_ig').GetName] ve státě [SCOPE.sState('attacked_state').GetName] vytvářet oddíly k přímému potlačení revolucionářů."
 revolution_pulse_events.13.f: "Noviny ležely na stole jako mrtvý pták, jeden jejich roh nasáklý rozlitou kávou. „Masy nesmí zůstat ani minutu v klidu...“, hlásal tučný černý tisk na titulní straně, „...všichni zásadoví pracující lidé musí dnes projevit svou podporu...“\n\nJejich čtenář vstal ze židle, otočil se ke dveřím a sáhl po podomácku vyrobeném obušku ležícím vedle novin."
 revolution_pulse_events.13.a: "V těchto těžkých časech oceňujeme věrohodnou popíratelnost."
 revolution_pulse_events.13.b: "Nasměrujte je, aby ukázali [SCOPE.sCharacter('communist_revolutionary_scope').GetFullName] omyl [SCOPE.sCharacter('communist_revolutionary_scope').GetHerHis] jednání."
 revolution_pulse_events.13.c: "Pouze stát má právo použít sílu proti svým nepřátelům."
 revolution_pulse_events.14.t: "Svaz [ROOT.GetCountry.GetAdjectiveNoFlag] lidu"
 revolution_pulse_events.14.d: "Nedávné nepokoje v [ROOT.GetCountry.GetName] vedly skupinu občanů z [SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName] k vytvoření nacionalistické organizace zaměřené na obranu země a [SCOPE.sCharacter('nation_ruler').GetPrimaryRoleTitle] před revoluční činností."
 revolution_pulse_events.14.f: "Řečníkova slova se z jeho úst valila jako proud ohně a přinášela nejpřísnější odsouzení Rudých, nepřátel [ROOT.GetCountry.GetNameNoFormatting] i těch národů, které muži v černém u stožáru považovali za nehodné, jejich klopy poseté symboly oddanosti.\n\n„A jak dáte najevo, že jste stáli při [SCOPE.sCharacter('nation_ruler').GetPrimaryRoleTitle] a spravedlivém [ROOT.GetCountry.GetAdjectiveNoFormatting], proti přívalu špíny?“\n\nTvrdé pohledy probodávaly dav a hledaly prvního, kdo uteče."
 revolution_pulse_events.14.a: "[ROOT.GetCountry.GetAdjectiveNoFlag] lid se postavil proti revoluci."
 revolution_pulse_events.14.b: "O tento demagogický podvod nemáme zájem."
 revolution_pulse_events.15.t: "Přiklonění"
 revolution_pulse_events.15.d: "S tím, jak se revoluční aktivity v posledních dnech zdají stále horší, nabízí se vládě příležitost sblížit se s nacionalistickým hnutím [SCOPE.sCharacter('reactionary_agitator').GetFullName] a více přijmout [SCOPE.sCharacter('reactionary_agitator').GetHerHis] vliv na [SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName]."
 revolution_pulse_events.15.f: "„Toto setkání nemusí být střetem protivníků, ale lidí, jejichž láska k [ROOT.GetCountry.GetNameNoFormatting] přesahuje všechny smrtelné hranice. I když máme odlišné vize, věřím, že dokážete uznat, že to, co ohrožuje naši zemi, ohrožuje nás všechny...“"
 revolution_pulse_events.15.a: "S pomocí [SCOPE.sCharacter('reactionary_agitator').GetHerHis] pohřbíme revoluci."
 revolution_pulse_events.15.b: "Nepotřebujeme pomoc těchto buřičů."
 revolution_pulse_events.16.t: "Inovace a loajalita"
 revolution_pulse_events.16.d: "Mezi odpůrci revolucionářů se objevily různé směry uvažování o budoucnosti jejich hnutí. Radikální prvky v rámci [SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName] začaly volat po vytvoření nové totalitní nacionalistické vlády, která by čelila komunistické hrozbě."
 revolution_pulse_events.16.f: "„Během dvou týdnů lze stádovité masy jakékoli země novinami vyburcovat do takového stavu rozvášněnosti, že lidé jsou připraveni obléknout uniformy a zabíjet i být zabiti kvůli ubohým cílům několika zainteresovaných stran.“\n\n— Albert Einstein"
 revolution_pulse_events.16.a: "Obránci národa musí přijmout novou podobu."
 revolution_pulse_events.16.b: "Tyto myšlenky jsou jen další modernistickou úchylkou."
 revolution_pulse_events.17.t: "Monstrum příležitosti"
 revolution_pulse_events.17.d: "Připisujíce vinu za současné revoluční nepokoje lidu [SCOPE.sCulture('pogrom_culture').GetName], provedli stoupenci [SCOPE.sCharacter('reactionary_agitator').GetFullName] v rámci [SCOPE.gsInterestGroup('pogrom_ig').GetName] masové násilné útoky proti populaci [SCOPE.sCulture('pogrom_culture').GetName] ve státě [SCOPE.sState('pogrom_state').GetName] a okolních regionech."
 revolution_pulse_events.17.f: "„Jaké monstrum vytváří z obyčejných občanů rozvášněné davy a používá strach jako návnadu? Ve skutečném světě to nejsou vlastnosti nestvůr. Jsou to vlastnosti lidí toužících po moci.“ #- GennaRose Nethercott
 revolution_pulse_events.17.a: "Kultura [SCOPE.sCulture('pogrom_culture').GetName] je skutečně hrozbou pro [ROOT.GetCountry.GetName]."
 revolution_pulse_events.17.b: "Tyto bezprávné činy již dávno překročily hranici užitečnosti."
 revolution_pulse_events.18.t: "Zbraň nepřítele"
 revolution_pulse_events.18.d: "Jak nacionalistické hnutí [SCOPE.sCharacter('fascist_agitator').GetFullName] nabývá na síle, bývalí socialisté zklamaní „protivlasteneckými“ tendencemi [SCOPE.gsInterestGroup('internationalist_ig').GetName] začali přecházet na nacionalistickou stranu. Hodnoty fašismu se mezi kontrarevolucionáři v [ROOT.GetCountry.GetName] stále více upevňují."
 revolution_pulse_events.18.f: "„Práva státu jako vyjádření skutečné podstaty jednotlivce. A má-li být svoboda vlastností živých lidí a ne abstraktních figur vymyšlených individualistickým liberalismem, pak fašismus stojí za svobodu — a za jedinou svobodu, která má cenu, svobodu státu a jednotlivce v jeho rámci. Fašistické pojetí státu je všeobsahující; mimo něj nemohou existovat žádné lidské ani duchovní hodnoty, natož aby měly nějakou hodnotu.“\n\n— Benito Mussolini"
 revolution_pulse_events.18.a: "Fašisty lze ovládat. Socialisty ne."
 revolution_pulse_events.18.b: "Fašismus je budoucností [ROOT.GetCountry.GetName]."
 revolution_pulse_events.19.t: "Metody modernity"
 revolution_pulse_events.19.d: "[SCOPE.sCharacter('fascist_regime_agitator').GetFullName] a skupina jeho stoupenců z řad [SCOPE.gsInterestGroup('fascist_agitator_ig').GetName] uspořádali pochod na [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] a požadují podíl na vládní moci."
 revolution_pulse_events.19.d2: "[SCOPE.sCharacter('fascist_regime_leader').GetFullName] pronesl projev k shromážděné [ROOT.GetCountry.GetAdjective] vládě za podpory [SCOPE.sCharacter('fascist_regime_agitator').GetFullName] a [SCOPE.gsInterestGroup('fascist_agitator_ig').GetName], v němž požaduje vládní postavení."
 revolution_pulse_events.19.f: "„Politici a kapitalisté tvrdí, že dokážou tuto krizi uklidnit a zachránit [ROOT.GetCountry.GetAdjectiveNoFormatting] národ před morem socialismu. V lepším případě jsou to pošetilí idealisté. V horším případě nejsou o nic lepší než sami Rudí. Jen okamžité obnovení národní síly může zachránit [ROOT.GetCountry.GetNameNoFormatting] v této hodině nebezpečí...“"
 revolution_pulse_events.19.a: "Sláva [SCOPE.sCharacter('fascist_regime_leader').GetFullName], pravému hrdinovi národa!"
 revolution_pulse_events.19.a2: "Sláva [SCOPE.sCharacter('fascist_regime_agitator').GetFullName], prvnímu mezi lidem!"
 revolution_pulse_events.19.b: "Vyžeňte tyto samozvance z ulic [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]!"
 revolution_pulse_events.20.t: "Ideál minulosti"
 revolution_pulse_events.20.d: "Aby se předešlo revoluci, [SCOPE.sCharacter('reactionary_regime_ig_leader').GetFullName] předložil petici [SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle], aby obnovil autokratickou vládu. Shromáždění [SCOPE.gsInterestGroup('reactionary_regime_ig').GetName] již vyjádřili podporu těmto nouzovým opatřením."
 revolution_pulse_events.20.f: "„Jaký je základ slávy [ROOT.GetCountry.GetNameNoFormatting]? Je to ochota našich minulých vůdců činit obtížná rozhodnutí a převzít odpovědnost v těžkých časech.“\n\n[SCOPE.sCharacter('reactionary_regime_ig_leader').GetLastNameNoFormatting] mávl [SCOPE.sCharacter('reactionary_regime_ig_leader').GetHerHis] rukou směrem k oknu a ukázal na sloupy kouře v dálce.\n\n„Tento duch byl dočasně oslaben. Ale může být znovu probuzen...“"
 revolution_pulse_events.20.a: "[SCOPE.sCharacter('reactionary_regime_ig_leader').GetFullName] bude zachráncem našeho národa."
 revolution_pulse_events.20.b: "Tento návrh napáchá více škody než užitku."
 revolution_pulse_events.21.t: "Prolití šlechtické krve"
 revolution_pulse_events.21.d: "Menší člen [ROOT.GetCountry.GetAdjectiveNoFormatting] šlechty byl zavražděn revolučními silami na svém panství ve státě [SCOPE.sState('assassination_state').GetName]. Přeživší členové jeho rodiny požadují odvetu."
 revolution_pulse_events.21.f: "Ozval se výstřel, výkřik a pak bylo ticho — až na vzlyky zdrcené ženy, které se o chvíli později ozvaly ze salonu."
 revolution_pulse_events.21.a: "Nesmíme dovolit, aby nás tento teror odvedl od našeho cíle."
 revolution_pulse_events.21.b: "Vyhlaste státní smutek."
 revolution_pulse_events.22.t: "Ministr zajat jako rukojmí"
 revolution_pulse_events.22.d: "Jeden z důvěryhodných ministrů [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [SCOPE.sCharacter('hostage_char').GetFullName], byl unesen rebely a odvezen na neznámé místo. Rebelové prohlásili, že [SCOPE.sCharacter('hostage_char').GetLastName] bude popraven, pokud jim vláda neposkytne výkupné."
 revolution_pulse_events.22.f: "POCHOPTE TOTO: život [SCOPE.sCharacter('hostage_char').GetFirstNameNoFormatting] je pouze ve vašich rukou. Pokud [SCOPE.sCharacter('hostage_char').GetSheHe] zemře, [SCOPE.sCharacter('hostage_char').GetHerHis] krev bude pouze na vašich rukou, stejně jako krev mnoha dalších obyvatel [ROOT.GetCountry.GetNameNoFormatting].\n\nMáte čtyřicet osm hodin od doručení tohoto dopisu, abyste nám poskytli požadované ústupky. Pokud tak neučiníte, nemůžeme zaručit bezpečnost ministra."
 revolution_pulse_events.22.a: "Musíme zaplatit požadované výkupné."
 revolution_pulse_events.22.b: "Pokud z něj chtějí udělat mučedníka, budiž."
 revolution_pulse_events.22.c: "Vyšlete armádu, aby [SCOPE.sCharacter('hostage_char').GetHerHim] zachránila."
 revolution_pulse_events.23.t: "Slzy slonovinové věže"
 revolution_pulse_events.23.d: "Vyšetřování budovy [SCOPE.sBuilding('university_terror_building').GetName] ve státě [SCOPE.sState('university_terror_state').GetName] odhalilo věrohodné důkazy o revoluční činnosti mezi studenty, podporované alespoň částí akademického sboru."
 revolution_pulse_events.23.f: "„Vina, kterou neseme, je nekonečně stará — vina utlačovatelů lidu. Naší povinností je ji odčinit tím, že zasvětíme celý svůj život, každý svůj čin, posílení rolnictva...“\n\nNázory profesorů se zde, v tomto sklepě, sdílely otevřeněji, pomyslel si mladý student, ale nebyly o nic podvratnější než obvykle."
 revolution_pulse_events.23.a: "Uzavřete univerzitu a zatkněte akademiky."
 revolution_pulse_events.23.b: "Pro tato obvinění neexistují žádné důkazy."
 revolution_pulse_events.24.t: "Pokus o atentát na [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
 revolution_pulse_events.24.d: "Při události na počest otevření okrasné zahrady ve městě [SCOPE.sState('capital_scope').GetCityHubName] odpálil revolucionář výbušné zařízení poblíž [ROOT.GetCountry.GetRuler.GetFullName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] přežil, ale atentátník zemřel na svá zranění dříve, než mohl vypovídat."
 revolution_pulse_events.24.f: "Jakmile bomba explodovala a výbuch rozťal vzduch, dav už byl na útočníkovi, nedbaje vlastních zranění, sráželi ho k zemi a bili taškami i pěstmi.\n\n„Lidé [ROOT.GetCountry.GetNameNoFormatting]! Udělal jsem to pro vás!“, křičel atentátník, ale bylo to marné."
 revolution_pulse_events.24.a: "Pomstu na všech zrádcích a vrazích!"
 revolution_pulse_events.24.b: "Přesně víme, kdo to zosnoval — a kdo musí zemřít."
 revolution_pulse_events.25.t: "Zmizel v záblesku"
 revolution_pulse_events.25.d: "Když [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] cestoval kočárem mezi [SCOPE.sState('capital_scope').GetCityHubName] a jedním ze svých venkovských sídel, vrhl se pod kočár revolucionář s živým granátem a zabil jak [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], tak sebe."
 revolution_pulse_events.25.f: "Pak, jako ve snu, v mlze, se mi zdálo, že nějaký mladík menší postavy spěchá z chodníku na vozovku směrem ke kočáru panovníka a vrhá se k němu — načež zazněl ohlušující výbuch. Jakmile se ozvala rána, panovník, důstojníci kolem něj i přihlížející na chodníku — všichni najednou padli a zahalil je oblak bílého kouře."
 revolution_pulse_events.25.a: "Rozptylte popel vraha do řeky a truchlete za naším milovaným [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 revolution_pulse_events.25.b: "[SCOPE.sCharacter('heir_scope').GetFullName] vykoná pomstu za vrahy svého [SCOPE.GetRootScope.GetCountry.GetCustom('mother_father')]."
 custom_father: "otec"
 custom_mother: "matka"
 revolution_pulse_events.26.t: "Pobuřování mezi [SCOPE.gsInterestGroup('devout_ig').GetName]"
 revolution_pulse_events.26.d: "Významní členové [SCOPE.gsInterestGroup('devout_ig').GetName] byli přistiženi, jak využívají své privilegované postavení ve společnosti k podpoře radikálně protivládních aktivit."
 revolution_pulse_events.26.f: "„[ROOT.GetCountry.GetNameNoFormatting] je rozdělena mezi dva nesmiřitelné tábory,“ řekl kněz. „Jeden z nich prosazuje politiku proti-[ROOT.GetCountry.GetAdjectiveNoFormatting] a protináboženského teroru! Druhá strana usiluje o úctu k [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] a snaží se obnovit národní pořádek. S ohledem na to... za kým jiným by měl každý dobrosrdečný člověk stát?“"
 revolution_pulse_events.26.a: "Nejsou nedotknutelní, pokud se nadále vměšují do politiky."
 revolution_pulse_events.26.b: "Nemůžeme být vnímáni jako kati kněží."
 revolution_pulse_events.27.t: "Revoluční patová situace ve státě [SCOPE.sState('standoff_state').GetName]"
 revolution_pulse_events.27.d: "Skupina militantů ve státě [SCOPE.sState('standoff_state').GetName] se zabarikádovala v kostele se zásobami munice a střelných zbraní. Zahájili palbu na všechny vládní jednotky, které se pokusily budovu obsadit."
 revolution_pulse_events.27.f: "Dřevo kostela bylo zjizveno kulkami, přesto jeho dubové dveře pevně odolávaly. Propletená těla ležela na ulici venku, kde schytala první salvu. Z každého okna šlehaly výstřely a nutily policisty i vojáky krčit se za barikádami. Muž v uniformě se otočil k druhému a hledal řešení situace."
 revolution_pulse_events.27.a: "Udělejte z nich odstrašující příklad — ostřelujte budovu."
 revolution_pulse_events.27.b: "Vyšlete vyjednavače, aby se s okupanty dohodl."
 revolution_pulse_events.28.t: "Ženský řád ve státě [SCOPE.sState('feminine_brigades_state').GetName]"
 revolution_pulse_events.28.d: "Skupina žen spojených s [SCOPE.gsInterestGroup('devout_ig').GetName] ve státě [SCOPE.sState('feminine_brigades_state').GetName] založila organizaci s cílem zajišťovat zdravotní a materiální podporu protivládním revolucionářům."
 revolution_pulse_events.28.f: "„Nenáviděný tyran [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting] nemá v našich chrámech žádnou autoritu ani místo po boku našeho boha!“ prohlásila zahalená žena na tribuně.\n\n„Neuznáváme zákony lidí, neboť jsou stejně chybné jako ti, kdo je tvoří!“"
 revolution_pulse_events.28.a: "Nemůžeme si dovolit udělat z žen mučednice."
 revolution_pulse_events.28.b: "Zakročte proti ženským náboženským organizacím."
 revolution_pulse_events.29.t: "Zločin a božství"
 revolution_pulse_events.29.d: "Reakcionářské sklony mnoha [GetPopType('clergymen').GetName] spojených s [SCOPE.gsInterestGroup('devout_ig').GetName] vedly k požadavkům na omezení politického vlivu [ROOT.GetCountry.GetAdjective] náboženských organizací."
 revolution_pulse_events.29.f: "„Svůj názor jsem vyjádřil jasně. Všechny kláštery ve městě [SCOPE.sState('capital_scope').GetCityHubName] nestojí za život jediného [ROOT.GetCountry.GetAdjectiveNoFormatting] občana.“"
 revolution_pulse_events.29.a: "Jsou to svatí muži a ženy a mohou říkat, co chtějí."
 revolution_pulse_events.29.b: "Zamkněte jejich chrámy a zatkněte duchovní, kteří budou odporovat."
 revolution_pulse_events.29.c: "Spravedlivý národ lze nejlépe nalézt skrze revoluční cestu."
 revolution_pulse_events.30.t: "Dělnické brigády ve státě [SCOPE.sState('workers_brigade_state').GetName]"
 revolution_pulse_events.30.d: "Ozbrojení dělníci spojení s progresivními frakcemi [SCOPE.gsInterestGroup('workers_militia_ig').GetName] se přihlásili, aby pomohli vládním silám čelit reakčním silám ohrožujícím [ROOT.GetCountry.GetName]."
 revolution_pulse_events.30.f: "Jeden po druhém pozvedli zbraň, otec i syn, a hle, pod nebem bez slunce přibývá další stránka dějin, zatímco teče další krev."
 revolution_pulse_events.30.a: "Budeme potřebovat veškerou podporu, jakou můžeme získat."
 revolution_pulse_events.30.b: "Požadujte, aby tato organizace okamžitě složila zbraně."
 revolution_pulse_events.31.t: "Stanné právo"
 revolution_pulse_events.31.d: "Masové vzpoury ve státě [SCOPE.sState('martial_laws_state').GetName] v rámci [SCOPE.gsInterestGroup('armed_forces_ig').GetName] pod dohledem [SCOPE.sCharacter('armed_forces_ig_leader').GetFullName] vedly k tomu, že důstojníci pochodují za vytvoření nové vlády."
 revolution_pulse_events.31.f: "To, co začalo jako několik nespokojených zásobovacích důstojníků a příbuzných plukovníků, se rozšířilo napříč celými řadami. Ať už donuceni svými vůdci nebo jako dobrovolní spolupachatelé, celé brigády se přidaly ke vzpouře. Jejich přísahy leží pošlapané v bahně spolu s každým, kdo se jim postaví do cesty."
 revolution_pulse_events.31.a: "Zatkněte zrádce."
 revolution_pulse_events.31.b: "Pošlete je domů. Připomeňte jim jejich povinnost."
 revolution_pulse_events.31.c: "Zastřelte každého desátého muže."
 revolution_pulse_events.32.t: "Vox Diaboli"
 revolution_pulse_events.32.d: "Ve státě [SCOPE.sState('vox_diaboli_state').GetName] vyzvali věřící [SCOPE.sReligion('majority_religion').GetName] pod vedením [SCOPE.sCharacter('devout_ig_leader').GetFullName] k násilnému povstání, přičemž lidé vyznání [SCOPE.sReligion('minority_religion').GetName] jsou obviňováni z jejich současných problémů."
 revolution_pulse_events.32.f: "Abychom si byli jisti, že si nepleteme hlas lidu s hlasem Boha, je třeba mít na paměti, že arcinepřítel zná písmo lépe než oni. Právě tato sladká, líbivá kázání podněcují sváry. Jejich cenou je vždy příval krve."
 revolution_pulse_events.32.a: "Umlčte vůdce."
 revolution_pulse_events.32.b: "Rozmístěte vojáky před shromážděními [SCOPE.sReligion('minority_religion').GetName]."
 revolution_pulse_events.32.c: "Zohledněte některé obavy [SCOPE.sReligion('majority_religion').GetNameNoFormatting]."
 revolution_pulse_events.33.t: "Chamtivost je dobrá"
 revolution_pulse_events.33.d: "[SCOPE.sCharacter('industrialists_ig_leader').GetFullName] a [SCOPE.gsInterestGroup('industrialists_ig').GetName] ve státě [SCOPE.sState('greed_is_good_state').GetName] oznámili svůj záměr: veškerá průmyslová výroba bude zastavena, dokud nebude nastolena vyhovující vláda."
 revolution_pulse_events.33.f: "Nepřátelské převzetí, v nejjednodušším smyslu, nastává, když velká společnost převezme menší proti její vůli. Pro dostatečně velký podnik je překážející vláda jen další společností, kterou lze začlenit. Až na to, že nyní si tato firma může psát všechna pravidla.\n\nStačí se podívat na Východoindickou obchodní společnost."
 revolution_pulse_events.33.a: "Vyjednávejte alespoň o omezeném provozu."
 revolution_pulse_events.33.b: "Otevřete nové továrny s našimi vlastními správci."
 revolution_pulse_events.33.c: "Pošlete tam těžkooděnce."
 revolution_pulse_events.34.t: "Nové zatemnění"
 revolution_pulse_events.34.d: "Titulek novin [SCOPE.sCharacter('intelligentsia_ig_leader').GetFullName] oznamuje, že každý spisovatel, umělec, performer i pedagog ve státě [SCOPE.sState('little_dark_age_state').GetName] ukončil svou činnost. [ROOT.GetCountry.GetAdjective] populace má pro své strasti už jen jediné východisko: vzpouru."
 revolution_pulse_events.34.f: "„Osvícenství“ byl název pro dobu velkých myslitelů a umělců. Jeho příslibem byl pokrok všech lidí z okovů nevědomosti a pověr.\n\nNyní přichází „Zatemnění“, doba násilné nevědomosti a úzkostného mysticismu. Jeho příslibem je zkáza kultury, smrt naděje a možná pro ty, kdo přežijí, šance začít znovu."
 revolution_pulse_events.34.a: "Vláda bude provozovat vlastní tisk."
 revolution_pulse_events.34.b: "Možná je čas věnovat více peněz umění."
 revolution_pulse_events.34.c: "Univerzita musí být znovu obsazena."
 revolution_pulse_events.35.t: "Trable obecného lidu"
 revolution_pulse_events.35.d: "Veškeré nájmy spravované [SCOPE.gsInterestGroup('landowners_ig').GetName] ve státě [SCOPE.sState('tragedy_of_commons_state').GetName] překračují rozumné meze. Nájemníci obracejí svůj hněv na vládu za to, že je nechrání."
 revolution_pulse_events.35.f: "Lidé mají v dobách strádání dvě reakce: hledat viníka svých potíží a podle toho jednat. Znamení síly, nebo osudová hloupost — filozofové by se mohli přít až do konce věků. Shodují se však, že to není známka inteligence. Vinu lze přenést a ti skutečně viní na tom nakonec vydělají nejvíce."
 revolution_pulse_events.35.a: "Zatkněte vůdce!"
 revolution_pulse_events.35.b: "Měli by být obviněni z vydírání."
 revolution_pulse_events.35.c: "Nájemné musí mít pevný strop."
 revolution_pulse_events.36.t: "Pohřbeni v byrokracii"
 revolution_pulse_events.36.d: "Zfalšované zprávy ze všech soukromých i veřejných složek ve státě [SCOPE.sState('red_tape_state').GetName] postavily vládu proti sobě samé. [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFullName] má jednoduchý požadavek: předat vládu těm, kdo vědí, jak věci zařídit."
 revolution_pulse_events.36.f: "Ne každý odpor spočívá v úderu obuškem do lebky nebo zapálení stroje. Účinným prostředkem je prostě nedodržovat „gentlemanské dohody“, na nichž stojí účetnictví. Pár upravených čísel tu, pár opožděných podání tam; v očích nadřízeného samé nevinné chyby. Dohromady to však může působit jako bezhlavá chyba — nebo promyšlená destrukce."
 revolution_pulse_events.36.a: "Musíme tyto zprávy nahradit."
 revolution_pulse_events.36.b: "Měli by být obviněni z podvodu!"
 revolution_pulse_events.36.c: "Začněme znovu od těchto zfalšovaných údajů."
 revolution_pulse_events.37.t: "Hniloba na vinici"
 revolution_pulse_events.37.d: "Navzdory bohaté sklizni ve státě [SCOPE.sState('rot_on_vine_state').GetName] přinesl [SCOPE.sCharacter('rural_folk_ig_leader').GetFullName] zprávu o dodávkách — nula všeho — spolu s ostrým ultimátem: nový řád sloužící [SCOPE.gsInterestGroup('rural_folk_ig').GetName], nebo masový hladomor."
 revolution_pulse_events.37.f: "„Máme zatracený hlad. Hlad mají i krysy. Ani na králíky už se nedá jít.“\n\n„Podívej se na to ovoce... jen tam leží a láká nás. Čeká, až ho někdo utrhne.“\n\n„Proč vláda něco neudělá? Radši bych riskoval s nimi než se brokovnicí starého Jenkinse.“"
 revolution_pulse_events.37.a: "Zabavte všechny farmy, které se na tom podílejí."
 revolution_pulse_events.37.b: "Zajistěte zásoby z [SCOPE.sCountry('neighbour_country').GetName]."
 revolution_pulse_events.37.c: "Prodávejte semena a návody na domácí pěstování."
 revolution_pulse_events.38.t: "Za žádných okolností"
 revolution_pulse_events.38.d: "Po přepadení armádních kasáren ve státě [SCOPE.sState('shall_not_be_infringed_state').GetName] začali [SCOPE.gsInterestGroup('trade_unions_ig').GetName] pod vedením [SCOPE.sCharacter('trade_unions_ig_leader').GetFullName] obracet své zbraně proti vládě [ROOT.GetCountry.GetName]."
 revolution_pulse_events.38.f: "„Vidíš, tak to s tímhle nacionalistickým máváním šavlemi chodí. Většina si myslí, že jejich zbraně pocházejí jen z jednoho zákona. Ale kniha říká, že odbory vám zbraně neberou. Naopak — říká, abyste si jich pořídili víc.“\n\n„Vždyť neumíš číst!“\n\n„To je Engels, za snahu máš bod.“"
 revolution_pulse_events.38.a: "Soustřeďte se na obranu měst."
 revolution_pulse_events.38.b: "Zažeňte je do hor."
 revolution_pulse_events.38.c: "Policie musí být lépe vyzbrojena!"
 agitator_spawn_tt: "V [SCOPE.sCountry('agitator_country_scope').GetName] se objeví [concept_agitator] z [SCOPE.gsInterestGroup('trade_unions_ig').GetName]"
 revolution_pulse_events.39.t: "Supové nad mršinou"
 revolution_pulse_events.39.d: "Oportunističtí členové [SCOPE.gsInterestGroup('defecting_ig').GetName] přešli na stranu [SCOPE.gsInterestGroup('revolting_ig').GetName]."
 revolution_pulse_events.39.f: "Mrchožravé vrány klovou do čerstvých mrtvol bez ohledu na příčinu. Některé však vycítí, když se ještě živé zvíře chystá zemřít. Takový tvor pak čeká, jak dlouho bude třeba, než kořist zahyne. Je však lepší být u toho první a vybrat si nejlepší kusy masa, než doufat ve zbytky."
 revolution_pulse_events.39.a: "Budiž."
 revolution_pulse_events.39.b: "Zkuste některé přilákat zpět."
 revolution_pulse_events.40.t: "Přehnaná tvrdost"
 revolution_pulse_events.40.d: "[SCOPE.sCharacter('governor_person').GetFullName] si spletl nepřítele v rámci [SCOPE.gsInterestGroup('defecting_ig').GetName]. Po vznesení falešných obvinění přešli umírnění členové [SCOPE.gsInterestGroup('defecting_ig').GetName] na stranu [SCOPE.gsInterestGroup('revolting_ig').GetName]."
 revolution_pulse_events.40.f: "I krátký záblesk hněvu může z přátelské tváře udělat nepřítele. Dokáže rozdělit i ty nejpevnější spojence kvůli nedorozumění. A jakmile k tomu dojde, není cesty zpět."
 revolution_pulse_events.40.a: "Jejich noví spojenci nemusí být tak vstřícní."
 revolution_pulse_events.40.b: "[SCOPE.sCharacter('governor_person').GetFullName] by měl odstoupit."
 provisional_government_events.1.t: "Konec prozatímní vlády"
 provisional_government_events.1.d: "Po našem vítězství v revoluci může prozatímní vláda pod vedením [ROOT.GetCountry.GetRuler.GetLastName] konečně formalizovat požadovanou podobu vlády nad [ROOT.GetCountry.GetName]."
 provisional_government_events.1.f: "Kouř revoluční války se z větší části rozptýlil a s ním i hluboká nejistota ohledně toho, kam chce prozatímní vláda národ vést. Jak kabinet mezi sebou debatuje, otevírá se před [ROOT.GetCountry.GetNameNoFormatting] několik cest — upevnit revoluční strukturu, převzít odkaz starého režimu, nebo vyrazit zcela novou cestou dějinami."
 provisional_government_events.1.a: "Moc prezidenta nás provede budoucími krizemi."
 provisional_government_events.1.b: "Nastal čas předat moc [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]."
 provisional_government_events.1.c: "Stavíme se proti svrženému panovníkovi, ne proti monarchii jako takové."
 provisional_government_events.1.e: "Nejsme nepřátelé [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], pouze předchozího režimu."
 provisional_government_events.1.g: "Zrádci dělníků byli pouze představitelé předchozího režimu."
