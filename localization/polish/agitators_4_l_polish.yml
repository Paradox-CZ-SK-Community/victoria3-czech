 modifier_censored_letters: "Cenzurované dopisy"
 agitators_law_events.1.t: "Obstrukce v [SCOPE.gsInterestGroup('opposing_ig').GetName]"
 agitators_law_events.1.d: "Rétorika [SCOPE.sCharacter('supporting_agitator').GetFullName] přitáhla negativní pozornost k představitelům [SCOPE.gsInterestGroup('opposing_ig').GetName], které odsoudil za blokování prosazení [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.1.f: "„[SCOPE.gsInterestGroup('opposing_ig').GetNameNoFormatting]! Shluk krys sedících na pozlacených sedadlech a vydávajících se za služebníky lidu. A přitom lid promluvil — a právě tento lid žádá, aby okamžitě přestali!“"
 agitators_law_events.1.a: "Zatlačme [SCOPE.gsInterestGroup('opposing_ig').GetName] ke spolupráci alespoň prozatím."
 agitators_law_events.1.b: "Kvůli jednomu zákonu nebudeme poškozovat naše vztahy."
 agitators_law_events.2.t: "Politické věznění"
 agitators_law_events.2.d: "[SCOPE.sCharacter('supporting_agitator').GetFullName] a jeho podporovatelé veřejně protestovali u věznice v [SCOPE.sState('imprisoned_state').GetName] za propuštění demonstranta podporujícího [SCOPE.sLaw('current_law_scope').GetName], který je zde zadržován kvůli narušení pořádku."
 agitators_law_events.2.f: "Vězeň seděl ve své temné cele a otupěle hleděl do zdi. Hlasy se mu znovu začaly vkrádat do mysli, opakovaly jeho jméno a dávaly hlas jeho utrpení.\n\nZavřel oči a zacpal si uši, snaže se to zastavit. Teprve když se rozhostilo ticho, uvědomil si, že pokřiky nepřicházely z jeho hlavy."
 agitators_law_events.2.a: "Jeho uvěznění již splnilo svůj účel."
 agitators_law_events.2.b: "Spravedlnost nebude zvrácena diktátem davu."
 agitators_law_events.3.t: "Zahraniční inspirace"
 agitators_law_events.3.d: "Úspěchy, kterých [SCOPE.sCountry('emulated_country').GetName] dosáhla se svou politikou [SCOPE.sLaw('current_law_scope').GetName], neunikly pozornosti podporovatelů [SCOPE.sCharacter('supporting_agitator').GetFullName], kteří ji uvádějí jako příklad ideální vlády."
 agitators_law_events.3.f: "[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting] pozvedl noviny s pobaveným výrazem.\n\n„Vidíte tohle? To je přiznání vítězství. Mohou nás nazývat špiony nebo agenty cizích mocností, ale zároveň připouštějí, že změna, o kterou usilujeme, není nic cizího — nemá precedens...“"
 agitators_law_events.3.a: "Co fungovalo v [SCOPE.sCountry('emulated_country').GetName], bude fungovat i v [ROOT.GetCountry.GetName]."
 agitators_law_events.3.b: "[ROOT.GetCountry.GetName] není [SCOPE.sCountry('emulated_country').GetName]."
 agitators_law_events.3.c: "Proč nepoužít příslušný [SCOPE.sCountry('emulated_country').GetAdjective] zákon jako vzor?"
 agitators_law_events.4.t: "Kompromisy na úkor lidu"
 agitators_law_events.4.d: "Zástupci [SCOPE.gsInterestGroup('opposing_ig').GetName] ve vládě požadují několik kompromisů při prosazování [SCOPE.sLaw('current_law_scope').GetName]. Tato opatření již byla podporovateli [SCOPE.sCharacter('supporting_agitator').GetFullName] odsouzena jako rozkladná pro reformu jako celek."
 agitators_law_events.4.f: "„Slova davu na ulici nezmění podstatu národního zájmu. Rozhodli jsme se stát za svými zásadami a zabránit této vládě v osudové chybě. To je vše — a víc k tomu není co dodat.“"
 agitators_law_events.4.a: "Podpora [SCOPE.gsInterestGroup('opposing_ig').GetName] nestojí za způsobené škody."
 agitators_law_events.4.b: "[SCOPE.sCharacter('supporting_agitator').GetLastName] bude protestovat, ale my budeme jednat."
 agitators_law_events.5.t: "Zmatek a zdržení"
 agitators_law_events.5.d: "Podporovatelé [SCOPE.sLaw('current_law_scope').GetName] z řad [SCOPE.gsInterestGroup('agitator_ig').GetName], vedení [SCOPE.sCharacter('supporting_agitator').GetFullName], veřejně zpochybnili, jak dlouho má trvat přijetí zákona."
 agitators_law_events.5.f: "„Vláda se nyní dopouští zvěrstva prostřednictvím chladné byrokracie. Upřednostňuje procedury před životy, papíry před hladem. Kolik lidí musí trpět kvůli pocitům úředníků, kteří nikdy nezažili hlad? Dokumenty mohou počkat, dámy a pánové — utrpení lidu nikoli!“"
 agitators_law_events.5.a: "Zákon bude přijat, až bude proces dokončen."
 agitators_law_events.5.b: "Dokumenty mohou počkat. Lidé nemohou."
 agitators_law_events.6.t: "Lidová opozice"
 agitators_law_events.6.d: "Aktivity [SCOPE.sCharacter('opposing_agitator').GetFullName] vyvolaly značnou veřejnou opozici proti prosazení [SCOPE.sLaw('current_law_scope').GetName]. Některé osobnosti v [SCOPE.gsInterestGroup('concerned_ig').GetName] mají obavy, jak to ovlivní jejich podporu mezi lidmi."
 agitators_law_events.6.f: "Moře letáků pokrylo zdi hlavního města navzdory nočním snahám úklidových služeb je odstranit. [SCOPE.sCharacter('concerned_ig_leader').GetFullNameNoFormatting] ukázal prstem na náhodnou budovu.\n\n„Vidíte to? Jak mám zajistit podporu pro tento návrh, když příště může být poničen můj dům?“"
 agitators_law_events.6.a: "Otevřeme dialog s opozicí."
 agitators_law_events.6.b: "Obavy [SCOPE.gsInterestGroup('concerned_ig').GetName] jsou zcela neopodstatněné."
 agitators_law_events.7.t: "Opovrženíhodná neutralita"
 agitators_law_events.7.d: "Veřejná agitace, kterou [SCOPE.sCharacter('opposing_agitator').GetFullName] rozpoutal proti [SCOPE.sLaw('current_law_scope').GetName], vedla [SCOPE.gsInterestGroup('neutral_ig').GetName] k odmítnutí podpory zákona v jeho současné podobě."
 agitators_law_events.7.f: "„S politováním vám sdělujeme, že jsme se v této věci rozhodli. Je zřejmé, že veřejná podpora je proti zákonu v jeho současné podobě silně nepřátelská, a nemáme zájem podporovat návrh, který se ukázal být zcela toxický.“"
 agitators_law_events.7.a: "Upravme zákon, aby byl přijatelnější."
 agitators_law_events.7.b: "Ukažme [SCOPE.gsInterestGroup('neutral_ig').GetName], že jsou zbyteční."
 agitators_law_events.8.t: "Lavina urážek"
 agitators_law_events.8.d: "[SCOPE.sCharacter('opposing_agitator').GetFullName] zahájil sérii ostrých urážek proti [SCOPE.sCharacter('supporting_ig_leader').GetFullName] za jeho podporu [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.gsInterestGroup('supporting_ig').GetName] požadují, aby vláda zasáhla na obranu jeho cti."
 agitators_law_events.8.f: "„[SCOPE.sCharacter('supporting_ig_leader').GetFullNameNoFormatting] má mentalitu zvlášť pomalého dítěte. To je prostě realita jeho situace. Silně pochybuji, že plně chápe důsledky toho, co údajně chce. Spíše mám podezření, že jeho nosní projevy, některými považované za řeč, byly jednoduše přeloženy jako ten nejhorší možný názor.“\n\n„Není překvapivé, že takové výroky vyšly z jeho úst — je zřejmé, že postrádá mentální schopnosti k účasti v poctivé politice...“"
 agitators_law_events.8.a: "[SCOPE.sCharacter('supporting_ig_leader').GetFullName] si musí zvyknout na tvrdší zacházení."
 agitators_law_events.8.b: "Připomeňme [SCOPE.sCharacter('opposing_agitator').GetFullName] naše zákony proti pomluvě."
 agitators_law_events.9.t: "Zastaralá slova"
 agitators_law_events.9.d: "Noviny sympatizující s [SCOPE.sCharacter('opposing_agitator').GetFullName] vytáhly několik let staré články a výroky současných vládních činitelů, kteří dříve vystupovali proti [SCOPE.sLaw('current_law_scope').GetName]. To vedlo k obviněním z oportunismu ze strany odpůrců i podporovatelů zákona."
 agitators_law_events.9.f: "„Musíme se nyní vypořádat s minulými postoji v této věci. Před pouhými třemi lety jeden ze spolupředkladatelů zákona publikoval komentář, v němž tento návrh označil za ‚beznadějnou ztrátu času‘, ‚špatně promyšlenou a irelevantní záležitost‘ a dalšími ostrými výrazy. A přesto se v posledních dnech, nepochybně s pomocí značných finančních prostředků, zdá, že tento údajně ctihodný muž své názory zcela obrátil...“"
 agitators_law_events.9.a: "Jaká lenivá absence zásad!"
 agitators_law_events.9.b: "Lidé mohou své názory časem změnit."
 agitators_law_events.10.t: "Dopisy odsouzenému"
 agitators_law_events.10.d: "Po zatčení významného odpůrce [SCOPE.sLaw('current_law_scope').GetName] zahájil [SCOPE.sCharacter('opposing_agitator').GetFullName] veřejnou kampaň psaní dopisů na jeho podporu."
 agitators_law_events.10.f: "„Doufám, že se máte dobře...“\n\n„Modlíme se za vaše brzké propuštění...“\n\n„Tato nespravedlnost byla nemilosrdně odhalena...“\n\nTo vše a mnohé další se hromadilo v poštovním pytli, zatímco kurýr se blížil ke svému cíli."
 agitators_law_events.10.a: "Dopisy musí proudit bez omezení."
 agitators_law_events.10.b: "Zajistěme, aby se žádný z těchto nesmyslů do věznice nedostal."
 agitators_law_events.11.t: "Občanský spolek [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]"
 agitators_law_events.11.d: "Společenský klub oblíbený mezi vzdělanou třídou uspořádal salon v [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], kde jako čestný host vystoupil [SCOPE.sCharacter('supporting_agitator').GetFullName] na podporu [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.11.f: "„To je nepochybně pravda. Ale uvažovali jste, jak by taková věc byla přijata?“\n\n[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting] přikývl řečníkovi a rozhlédl se po dřevem obložené místnosti. [SCOPE.sCharacter('supporting_agitator').GetSheHe|U] odložil [SCOPE.sCharacter('supporting_agitator').GetHerHis] šálek.\n\n„Strávil jsem nějaký čas přemýšlením o tom — ve všem musíme zvažovat pohled těch, kteří věc vidí poprvé. První pohled je pohledem nevinného, s myslí otevřenou novým možnostem...“"
 agitators_law_events.11.a: "Zdá se, že vědí, co je nejlepší."
 agitators_law_events.11.b: "Podpořme další rozvoj těchto salonů."
 agitators_law_events.12.t: "Umělecké projevy"
 agitators_law_events.12.d: "Populární zpravodaj [SCOPE.sCulture('poet_culture').GetName] zveřejnil prohlášení [SCOPE.sCharacter('supporting_agitator').GetFullName], které vyjadřuje podporu několika básníkům sympatizujícím se zájmy [SCOPE.gsInterestGroup('poet_ig').GetName]."
 agitators_law_events.12.f: "„Ideály lásky a soudržnosti jsou v tom přítomny, ale když se podíváme pod povrch, narazíme na konkrétní podmínky, které to umožňují. Na věci, které podporují ty nejvyšší ideály a mohou se projevit v každodenním životě...“"
 agitators_law_events.12.a: "Ikony [SCOPE.sCulture('poet_culture').GetName] kultury stojí za našimi reformami."
 agitators_law_events.12.b: "Věrnou podporu [SCOPE.gsInterestGroup('poet_ig').GetName] je třeba odměnit."
 agitators_law_events.13.t: "Oslovení lidu"
 agitators_law_events.13.d: "[SCOPE.sCharacter('supporting_agitator').GetFullName] se vydal na týdenní cestu po venkově, aby mezi [SCOPE.gsInterestGroup('peasants_ig').GetName] šířil povědomí o potřebě [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.13.f: "„Jak šťastný jsem, že mé srdce dokáže cítit stejnou prostou a nevinnou radost jako rolník, jehož stůl je pokryt plody jeho vlastní práce, a který si nejen užívá jídlo, ale s potěšením vzpomíná na dny, kdy jej zasel, na tiché večery, kdy jej zaléval, i na radost, s níž sledoval jeho růst.“\n\n— Johann Wolfgang von Goethe, #italic Utrpení mladého Werthera#!"
 agitators_law_events.13.a: "Ušlechtilá věc — a snad i populární."
 agitators_law_events.13.b: "Jak [SCOPE.sCharacter('supporting_agitator').GetFullName] oslovuje lid, tak lid oslovuje jeho."
 agitators_law_events.13.c: "Proč naslouchat cizinci, který nabízí jen slova?"
 agitators_law_events.13.e: "Připomeňme [SCOPE.sCharacter('supporting_agitator').GetHerHim], že mimo své město není vítán!"
 agitators_law_events.14.t: "Kampaň banketů"
 agitators_law_events.14.d: "Účast [SCOPE.sCharacter('supporting_agitator').GetFullName] na buržoazním fundraisingovém banketu v [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] vedla ke zvýšení prostředků na podporu [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.14.f: "Když organizátor na konci stolu pozvedl sklenici na přípitek na moudrost reformy, nemohl si nevšimnout, jak zvuk příboru o sklo připomíná dopad mince do pokladny nebo vystřelenou nábojnici dopadající na zem."
 agitators_law_events.14.a: "Výživa pro tělo i rozpočet."
 agitators_law_events.14.b: "Do politiky proudí obrovské sumy peněz, říkáte?"
 agitators_law_events.15.t: "Podpora médií"
 agitators_law_events.15.d: "Hlas [SCOPE.sState('newspaper_scope').GetStateRegion.GetCityHubName], populární noviny čtené třídou [SCOPE.gsInterestGroup('newspaper_ig').GetName] po celé [ROOT.GetCountry.GetName], zveřejnil článek [SCOPE.sCharacter('supporting_agitator').GetFullName] podporující prosazení [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.15.f: "„Vydávat noviny bez propagace je jako mrkat na dívku ve tmě — dobře míněné, ale neúčinné.“\n\n— William Randolph Hearst"
 agitators_law_events.15.a: "Kdo jsme, abychom odporovali hlasu lidu?"
 agitators_law_events.15.b: "Poděkujme vydavateli."
 agitators_law_events.16.t: "Opozice v tisku"
 agitators_law_events.16.d: "V populárních opozičních novinách vycházejících po celé [ROOT.GetCountry.GetName] se objevil jen lehce zastřený pamflet proti [SCOPE.sLaw('current_law_scope').GetName], jehož autorem je [SCOPE.sCharacter('opposing_agitator').GetFullName]."
 agitators_law_events.16.f: "„Měl byste si přečíst dnešní noviny, pane. Je tam...“\n\n„Ano?“\n\n„No, článek od [SCOPE.sCharacter('opposing_agitator').GetLastNameNoFormatting]. Na třetí straně.“\n\nÚředník si sáhl na spánek. V tu chvíli věděl, že ho čeká čtení, které mu ubere několik let života."
 agitators_law_events.16.a: "[SCOPE.sCharacter('supporting_agitator').GetSheHe|U] je pohroma, jako vždy."
 agitators_law_events.16.b: "Podpořme naše spojence v publikování protičlánků."
 agitators_law_events.17.t: "Uměle vytvořená podpora"
 agitators_law_events.17.d: "Díky skandálnímu odhalení bývalého vydavatele bylo vládě oznámeno, že vlna nedávných článků proti [SCOPE.sLaw('current_law_scope').GetName] byla ve skutečnosti napsána [SCOPE.sCharacter('opposing_agitator').GetFullName] pod různými jmény a styly."
 agitators_law_events.17.f: "„Domníváme se, že žádný jednotlivec ani skupina nemůže oprávněně stanovovat normy vyjadřování pro ostatní.“\n\n— William Randolph Hearst"
 agitators_law_events.17.a: "Zdá se, že opozice je zároveň jednotnější i roztříštěnější, než se zdá."
 agitators_law_events.17.b: "Veřejnost by si o tom ráda přečetla víc."
 agitators_law_events.18.t: "Řídnoucí opozice"
 agitators_law_events.18.d: "V projevu nejednoty mezi odpůrci vlády zveřejnil [SCOPE.sCharacter('opposing_agitator').GetFullName] ve svém pamfletu jména některých konkurenčních opozičních osobností. Odhalení těchto identit dává policii vítanou příležitost."
 agitators_law_events.18.f: "„Bez silné organizace schopné vést politický boj za všech okolností a vždy nemůže existovat systematický plán činnosti, vedený pevnými zásadami a důsledně prováděný, který by si zasloužil označení taktika.“\n\n— Vladimir Lenin"
 agitators_law_events.18.a: "Jak příhodné."
 agitators_law_events.18.b: "Nebudeme podporovat jeho dětinské intriky."
 agitators_law_events.19.t: "Rodinné záležitosti"
 agitators_law_events.19.d: "Během studia na [SCOPE.sState('uni_state').GetName] [SCOPE.sBuilding('uni_scope').GetName] začal syn [SCOPE.sCharacter('supporting_ig_leader').GetFullName] zastávat názory podobné těm, které podporují stoupenci [SCOPE.sCharacter('opposing_agitator').GetFullName]."
 agitators_law_events.19.f: "„No, vlastně dnes profesor mluvil o jedné opravdu zajímavé věci...“\n\nZatímco mluvil dál a dál, zcela nevědomky, pěst [SCOPE.sCharacter('supporting_ig_leader').GetLastNameNoFormatting]a se pod stolem stále více svírala."
 agitators_law_events.19.a: "Rodiny by měly respektovat názory ostatních."
 agitators_law_events.19.b: "Srovnejme toho drzého spratka do latě."
 agitators_law_events.19.c: "Možná by měl chodit do jiného typu školy."
 problem_child_barracks_tt: "Kasárna v [SCOPE.sState('problem_child_barracks').GetName] mu vštípí rozum."
 agitators_law_events.20.t: "Původní nespokojenost"
 agitators_law_events.20.d: "Spolupracovník [SCOPE.sCharacter('opposing_agitator').GetFullName] oslovil významné noviny v [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] s žádostí o zveřejnění původní básně, která nenápadně vyjadřuje odpor proti prosazení [SCOPE.sLaw('current_law_scope').GetName]."
 agitators_law_events.20.f: "„Je to od mého otce, pane, ještě z doby před jeho smrtí. Byl tomu velmi oddaný, víte...\n\n„Ne, ne. Když to říká, nemyslí tím současnost. Odkazuje na poslední pokus o něco takového — jde o cyklické... vzorce v dějinách. Ne o samotný čin.“"
 agitators_law_events.20.a: "Rozhodně ne. Všichni známe skutečného autora."
 agitators_law_events.20.b: "Kdo jsme, abychom odmítli kvalitní dílo?"
 agitators_law_events.21.t: "Dědictví osvícenství"
 agitators_law_events.21.d: "[SCOPE.sCharacter('supporting_agitator').GetFullName] pronesl mimořádně přesvědčivý veřejný projev na podporu [SCOPE.sLaw('current_law_scope').GetName], v němž spojil egalitářské ideály s odkazy na antimonarchistickou literaturu."
 agitators_law_events.21.f: "„Chceme-li, aby republika byla pevná, musíme nejprve vybudovat její základy. Tyto základy nemusíme hledat v zahraničí; měli bychom je hledat v srdcích všech lidí národa.“\n\n— Sunjatsen"
 agitators_law_events.21.a: "Velkolepý projev!"
 agitators_law_events.21.b: "Žádná slova nemohou svrhnout božský řád."
 agitators_law_events.22.t: "Případ urážky majestátu"
 agitators_law_events.22.d: "Při své agitaci proti monarchii pronesl [SCOPE.sCharacter('supporting_agitator').GetFullName] řadu výroků, které byly vyloženy jako urážka majestátu. Podporovatelé [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] požadují jeho stíhání."
 agitators_law_events.22.f: "„A pokud jde o otázku [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]...“\n\nDav zadržel dech, očekávaje něco mimořádného.\n\n„Nevidím žádný důvod předstírat úctu k někomu, jehož postavení plyne pouze z toho, že má více prokřížené krve než my ostatní! Kdyby nebe seslalo někoho hodného titulu vládce [ROOT.GetCountry.GetNameNoFormatting], rozhodně by to nebyl někdo, v jehož žilách koluje voda!“"
 agitators_law_events.22.a: "[SCOPE.sCharacter('supporting_agitator').GetHerHis|U] chování konečně překročilo hranici."
 agitators_law_events.21.a.tt: "[SCOPE.sCharacter('supporting_agitator').GetFullName] bude odsouzen a uvězněn za zločiny proti koruně."
 agitators_law_events.22.b: "Opravdu chceme riskovat hněv jeho podporovatelů?"
 agitators_law_events.23.t: "Demokratický republikanismus"
 agitators_law_events.23.d: "Aktivity [SCOPE.sCharacter('supporting_agitator').GetFullName] vedly k významnému spojenectví mezi republikány a zastánci širšího volebního práva. Ti, kdo podporují demokratičtější [ROOT.GetCountry.GetGovernment.GetName] místo republiky, jsou rychle vytlačováni na okraj."
 agitators_law_events.23.f: "„Republika musí být vytvořena a udržována celým lidem, jinak bude slabá od svého zrodu až po svůj brzký a potupný konec.“"
 agitators_law_events.23.a: "Koalice, která otřese světem."
 agitators_law_events.23.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] musí ukázat, že dokáže vládnout v demokracii."
 agitators_law_events.23.c: "Všichni liberálové nakonec zradí korunu i národ."
 agitators_law_events.24.t: "Republika vojáků?"
 agitators_law_events.24.d: "Blízcí spolupracovníci [SCOPE.sCharacter('supporting_agitator').GetFullName] byli spatřeni ve společnosti několika reformně smýšlejících důstojníků, včetně [SCOPE.sCharacter('suspected_general_scope').GetFullName]. Tyto aktivity vyvolávají obavy z násilného převratu proti [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 agitators_law_events.24.f: "„Bez ohledu na jakékoli důvody, které může [SCOPE.sCharacter('suspected_general_scope').GetSheHe] uvést, jeho přítomnost po boku této nenáviděné osoby svědčí o nebezpečných sklonech. Předal jsem vám vše, co se mi podařilo zjistit. Pro zachování integrity trůnu vás žádám o rychlé posouzení této záležitosti.“"
 agitators_law_events.24.a: "Udělejme z [SCOPE.sCharacter('suspected_general_scope').GetLastName] příklad za pobuřování."
 agitators_law_events.24.b: "Nemůžeme oslabovat armádu na základě pouhého podezření."
 agitators_law_events.25.t: "Pochod mas"
 agitators_law_events.25.d: "Agitace [SCOPE.sCharacter('supporting_agitator').GetFullName] vedla k pochodu v [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], který vyjadřuje podporu širšímu volebnímu právu a rozšíření politických práv lidu."
 agitators_law_events.25.f: "Pochod se táhl přes několik bloků — průvod jasných očí a rozjitřených srdcí, který naplňoval město zvláštní energií.\n\nV čele stál [SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting], větší než život sám, a vedl jej s neomezenou nadějí."
 agitators_law_events.25.a: "Ukázka podpory pro skvělý zákon."
 agitators_law_events.25.b: "Odeberme mu licenci k veřejnému projevu pod hrozbou zatčení."
 agitators_law_events.26.t: "Nepřátelé lidu"
 agitators_law_events.26.d: "Během projevu v reformním salonu v [SCOPE.sState('capital_scope').GetName] pronesl [SCOPE.sCharacter('supporting_agitator').GetFullName] vášnivou řeč odsuzující [SCOPE.gsInterestGroup('landowners_ig').GetName] jako odpůrce demokracie i lidu jako celku."
 agitators_law_events.26.f: "„Musím se nyní vyjádřit k charakteru určitých osob, které se zcela oddaly potlačování lidu. Jsou to kruté a zahálčivé bytosti, jejichž existence je prosycena privilegiem — relikty stagnující éry, jejichž mysl se bouří při představě národa, kde je jejich moc zpochybněna.“"
 agitators_law_events.26.a: "Pryč s nepřáteli svobody!"
 agitators_law_events.26.b: "Lid bude vždy potřebovat vedení svých nadřízených."
 agitators_law_events.26.c: "Všichni víme, koho tím „privilegovaným“ myslel."
 agitators_law_events.27.t: "Kontroverzní přátelé"
 agitators_law_events.27.d: "Účast [SCOPE.sCharacter('supporting_agitator').GetFullName] na setkání radikální reformní organizace v [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] zvýšila povědomí o této skupině a značně ztížila policejní zásah proti ní."
 agitators_law_events.27.f: "Úředník se s překvapením zadíval na dokument na svém stole — jméno skupiny, která se hrdě hlásila k organizaci poslední demonstrace. Nenáviděná a jistě zakázaná organizace spojená se jménem problematického [SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting], který v posledních letech způsobil tolik potíží.\n\n„Nevydali jsme už na tyto lidi zatykač?“"
 agitators_law_events.27.a: "Možná je čas jim dát oficiální uznání."
 agitators_law_events.27.b: "Veřejné mínění není omluva."
 agitators_law_events.28.t: "Romance v cenzurním úřadě"
 agitators_law_events.28.d: "Pod rouškou zvlášť nudného romantického románu propašoval [SCOPE.sCharacter('supporting_agitator').GetFullName] skrze cenzuru text s nenápadně protivládním podtextem. Ten obhajuje svobodu slova a odmítání „despotismu“."
 agitators_law_events.28.f: "„Není to vždy tak? Když člověk něco hledá, najde to všude. I když to vůbec neexistuje, vidí jasné důkazy. I bez stínu vidí nejen jeho obrys, ale vše, co hledá. Vidí to naprosto zřetelně — a s každým pohledem a myšlenkou se to stává ještě jasnější.“\n\n— Nikolaj Černyševskij, #italic Co dělat?#!"
 agitators_law_events.28.a: "Nebudeme znovu číst pětisetstránkovou knihu jen tak!"
 agitators_law_events.28.b: "Stáhnout román a nařídit odevzdání všech výtisků."
 agitators_law_events.29.t: "Nedostatečné vymáhání"
 agitators_law_events.29.d: "Anonymní zdroj z policie předal seznam důstojníků, kteří údajně sympatizují s [SCOPE.sCharacter('supporting_agitator').GetFullName]. Podle dopisu tito policisté potají odmítají vykonávat cenzurní povinnosti."
 agitators_law_events.29.f: "„...ano, ten. Slyšel jste, co řekl, když jsme mu dali ten román?“\n\nÚředník sledoval směr ukázaný prstem informátora — k nic netušícímu muži při obědě.\n\n„Ne. Poučte mě,“ odpověděl klidně.\n\n„Řekl něco jako ‚rada už je z poloviny mrtvá...‘“"
 agitators_law_events.29.a: "Nač se snažit? Cenzura stejně končí."
 agitators_law_events.29.b: "Zákon budeme vymáhat až do jeho zrušení."
 agitators_law_events.30.t: "Hra na kuře"
 agitators_law_events.30.d: "Populární noviny spojené s [SCOPE.gsInterestGroup('newspaper_ig').GetName] zveřejnily odvážný článek [SCOPE.sCharacter('supporting_agitator').GetFullName], který vyzývá ke zrušení cenzury. Jejich popularita i mezi vládními příznivci činí jejich zákaz riskantním."
 agitators_law_events.30.f: "Když vedoucí vstoupil do kanceláře, unavený po bezesné noci, okamžitě si všiml napjatých výrazů svých zaměstnanců. Pohled na nástěnku vše vysvětlil — titulky tučně vytištěné.\n\n„K ZAMYŠLENÍ: OBHAJOBA SVOBODY PROJEVU“"
 agitators_law_events.30.a: "I někteří z nás s nimi souhlasí."
 agitators_law_events.30.b: "Jestli teď ustoupíme, bude to jen horší."
 je_silkworm_diseases: "Epidemie pébriny"
 je_silkworm_diseases_goal: "[ROOT.GetCountry.GetName] má po dobu alespoň jednoho roku aktivní výnos [GetDecreeType('decree_encourage_agricultural_industry').GetName] alespoň v 75 % států postižených #BOLD pébrinou#! po objevení řešení\n\nŘešení epidemie lze získat výzkumem #BOLD pasterizace#! nebo převzetím od jiné země, která řešení objevila."
 je_silkworm_diseases_reason: "[ROOT.GetCountry.GetAdjective] hedvábnický průmysl byl ve velkém rozsahu zasažen #BOLD pébrinou#!, epidemií, která hrozí zničit naše chovy bource morušového, pokud nebude zastavena."
 pebrine_cure_tt: "Zjistili jsme, jak vyřešit epidemii #BOLD pébriny#!, buď vlastním výzkumem, nebo od jiné země"
 pebrine_cure_acquire_tt: "Byla objevena metoda, jak zmírnit epidemii #BOLD pébriny#! pomocí výnosu [GetDecreeType('decree_encourage_agricultural_industry').GetName]."
 pebrine_je_fail_tt: "[SCOPE.sCountry('pebrine_country_scope').GetAdjective] hedvábnický průmysl bude v dohledné době ochromen."
