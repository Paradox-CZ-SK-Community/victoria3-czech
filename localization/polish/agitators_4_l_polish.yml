 notification_paris_commune_automation_pulse_1_b_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] zabavila a zpeněžila relikvie mnoha pařížských kostelů, čímž si krátkodobě zajistila více zdrojů.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 10#!."
