 notification_paris_commune_automation_pulse_2_b_desc: "Příslušníci Národní gardy [SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] zajali [SCOPE.sCharacter('executed_general_scope').GetRankName] [SCOPE.sCharacter('executed_general_scope').GetFullName] mimo Paříž. Byl převezen do vězení ve městě.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
