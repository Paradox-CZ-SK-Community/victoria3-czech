 government_petition_2_tt: "[SCOPE.gsInterestGroup('government_petition_ig').GetName] očekávají, že vláda přijme zákon [SCOPE.sLaw('government_petition_law_2').GetName] během následujících pěti let."
 government_petition_events.1.t: "[SCOPE.gsInterestGroup('government_petition_ig').GetName] žádají vládu"
 government_petition_events.1.d: "[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetFullName], zastupující své příznivce v [SCOPE.gsInterestGroup('government_petition_ig').GetName], předložil formální petici [ROOT.GetCountry.GetAdjective] vládě za přijetí zákona [SCOPE.sLaw('government_petition_law').GetName]."
 government_petition_events.1.d2: "Nespokojeni se svou omezenou rolí ve vládě podali [SCOPE.gsInterestGroup('government_petition_ig').GetName] petici vyzývající vládu k okamžitému přijetí zákona [SCOPE.sLaw('government_petition_law').GetName]."
 government_petition_events.1.d3: "[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetFullName], [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetCustom('petition_trait_descriptor')] vůdce [SCOPE.gsInterestGroup('government_petition_ig').GetName], předložil vládě plán na přijetí zákona [SCOPE.sLaw('government_petition_law').GetName]. Úspěšné prosazení by výrazně posílilo jeho pověst schopného politika."
 government_petition_events.1.f: "„Eh, ještě jedna záležitost na dnešek, pane. Členové vašeho volebního obvodu dorazili dnes ráno. Jsou... poněkud hlasití a neodbytní... chtějí se s vámi setkat ohledně nové legislativy.“\n\n„To je vše? Proboha, tváříte se, jako byste viděl ducha. Jistě jim mohu věnovat poslední hodiny dne, nemyslíte?“\n\n„M-myslím, že ano, pane. Nehodlali přijmout „ne“ jako odpověď.“"
 government_petition_events.1.f2: "„Obdržel jsem prohlášení od [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetCustom('getMsMr')] [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting],“ začal tajemník. „[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe|U] zdůrazňuje, že nejde o ultimátum.“\n\nMinistr pozvedl obočí. „Rozveďte to?“\n\n„[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe|U] uvádí, že by nebyl schopen nadále ujišťovat své spojence, že vláda zastupuje jejich zájmy, pokud nepřijme „smysluplná a okamžitá opatření k potvrzení tohoto tvrzení“.“\n\n„Takže ultimátum?“\n\n„Zdá se, že ano.“"
 government_petition_events.1.f3: "„Mohu na slovíčko?“\n\nMinistr, napůl na odchodu, se při tom oslovení zarazil. Na chodbě stál [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetWomanMan] s koženou složkou v ruce. [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting], poznal ho — jeho vzhled byl nezaměnitelný.\n\n„Ano, samozřejmě,“ řekl. „Mám...?“\n\n[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting] přikývl a podal mu složku. Podle váhy měla nejméně sto stran. „Zítra chci předložit první návrh,“ řekl. „Byl bych poctěn vaší podporou.“"
 government_petition_events.1.a: "Uvidíme, co se dá dělat."
 government_petition_events.1.b: "Nabídněte jim jako kompromis zákon [SCOPE.sLaw('government_petition_law_2').GetName]."
 government_petition_events.1.c1: "Musí pochopit, že současná situace to neumožňuje."
 government_petition_events.1.c2: "Musí pochopit, že současná situace to neumožňuje."
