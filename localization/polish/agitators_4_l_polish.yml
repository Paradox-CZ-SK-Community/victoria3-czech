 notification_paris_commune_automation_pulse_9_b_desc: "Ústřední výbor [SCOPE.sCountry('paris_commune_nation_scope').GetName] odmítl petici Ženské unie na uzavření pařížských nevěstinců. Zastánci rozšíření práv žen v Paříži byli tímto rozhodnutím značně zklamáni.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
