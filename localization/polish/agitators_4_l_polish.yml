 french_pretenders_pulse.10.t: "Dědicové Velké armády"
 french_pretenders_pulse.10.d: "Dobrá nálada [ROOT.GetCountry.GetAdjective] vojáků v našem současném konfliktu vyvolává vzpomínky na vítězné armády Napoleona I. Hnutí [SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName] zaznamenalo na frontě nárůst popularity."
 french_pretenders_pulse.10.f: "Nepokoj mezi lidem i vojáky se šířil ulicemi. Od nejvlhčích koutů hostinců po rozšlapaná pole ožívají vzpomínky na Napoleonova první rozhodná vítězství. Velké francouzské pluky by mohly znovu pochodovat [SCOPE.sState('capital_scope').GetCityHubName] na rozkaz nového Bonaparta."
 french_pretenders_pulse.10.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nás dovede k mnoha dalším vítězstvím."
 french_pretenders_pulse.10.b: "Podpořte vojáky za jejich dobrý výkon."
 french_pretenders_pulse.10.c: "To je dobré znamení pro hnutí [SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName]."
 french_pretenders_pulse.11.t: "Plody průmyslu"
 french_pretenders_pulse.11.d: "Prosperita [ROOT.GetCountry.GetAdjective] obchodu výrazně prospěla bohatým patronům hnutí [SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]. Ti znovu investovali své prostředky do podpory nároků svého kandidáta."
 french_pretenders_pulse.11.f: "Čím více se věci mění, tím více zůstávají stejné. Staří baroni vlastnili kovárny a pole. Dnes vlastní stroje a obchodní sklady. Moudrému králi nezáleží na tom, jaké klíče baroni drží, pokud zůstávají ve správných rukou."
 french_pretenders_pulse.11.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] je patronem [ROOT.GetCountry.GetAdjectiveNoFormatting] prosperity."
 french_pretenders_pulse.11.b: "Naši magnáti si zaslouží uznání za svou tvrdou práci."
 french_pretenders_pulse.11.c: "To je dobré znamení pro hnutí [SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]."
 french_pretenders_pulse.12.t: "Slova církve"
 french_pretenders_pulse.12.d: "Rostoucí prestiž a vliv [SCOPE.gsInterestGroup('devout_ig').GetName] vedly k odpovídajícímu vzestupu hnutí [SCOPE.sCharacter('legitimist_character').GetIdeology.GetName]. Nostalgicky naladění duchovní opěvují krále minulosti."
 french_pretenders_pulse.12.f: "Mosazné zvony v Remeši byly toho rána vyleštěny do zrcadlového lesku. Už je to dlouho, co se zde konala korunovace. Kdysi zvony ohlašovaly dny králů, jmenovaných Bohem jako zářící klenot v jeho koruně. Dnes zvony doprovázejí jen duchové a pavučiny. Království Boží je však věčné a je jen otázkou času, než zvony zazní pro nového krále."
 french_pretenders_pulse.12.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] si jejich podporu zapamatuje."
 french_pretenders_pulse.12.b: "Církev je základ, na němž stojíme."
 french_pretenders_pulse.12.c: "To je dobré znamení pro hnutí [SCOPE.sCharacter('legitimist_character').GetIdeology.GetName]."
 french_pretenders_pulse.13.t: "[SCOPE.sCharacter('partisan_character').GetFullName] podporuje hnutí [SCOPE.sCharacter('partisan_character').GetIdeology.GetName]"
 french_pretenders_pulse.13.d: "[SCOPE.sCharacter('partisan_character').GetFullName] plně zasvětil [SCOPE.sCharacter('partisan_character').GetInterestGroup.GetName] věci [SCOPE.sCharacter('partisan_character').GetIdeology.GetName]. Přestože je tento krok ambiciózní, jeho prohlášení vyvolala kontroverze jak uvnitř [SCOPE.sCharacter('partisan_character').GetInterestGroup.GetNameNoFormatting], tak mimo něj."
 french_pretenders_pulse.13.f: "#bold [SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting]: „Mé srdce pro rod [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]!“#!\n\nPříznivý den nastal pro rod [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]. Plodný roajalista a otevřený komentátor za [SCOPE.sCharacter('partisan_character').GetInterestGroup.GetNameNoFormatting], [SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting], vyjádřil podporu nároku tohoto rodu na Karlův trůn. Obyvatelé [SCOPE.sState('capital_scope').GetCityHubName] dnes ráno rychle reagovali jak podporou, tak pomluvami na oznámení [SCOPE.sCharacter('partisan_character').GetLastNameNoFormatting]. (pokračování na str. 2)"
 french_pretenders_pulse.13.a: "[SCOPE.sCharacter('partisan_character').GetSheHe|U] by si měl zachovat decorum."
 french_pretenders_pulse.13.b: "K čemu je pověst, když ji nelze využít?"
 french_pretenders_pulse.14.t: "Armáda [SCOPE.sCharacter('partisan_character').GetIdeology.GetName]?"
 french_pretenders_pulse.14.d: "[SCOPE.sCharacter('partisan_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('partisan_character').GetFullName] učinil řadu prohlášení na podporu věci [SCOPE.sCharacter('partisan_character').GetIdeology.GetName] a využívá své postavení v armádě k šíření svých názorů."
 french_pretenders_pulse.14.f: "„Má rodina krvácela za Napoleona a jeho velké sny o Evropě pod Francií. A teď přichází nový pretendent a žádá mě, abych krvácel za ten samý sen.“\n\n„Ne ledajaký pretendent, generále. A ani ne ledajaký sen. Obnovený trůn, větší než jakákoli republika předtím i potom. A vy v jeho čele. Jinak to ani nepřipadá v úvahu.“"
 french_pretenders_pulse.14.a: "Naši vojáci opěvují věc [SCOPE.sCharacter('partisan_character').GetIdeology.GetName]."
 french_pretenders_pulse.14.b: "[SCOPE.sCharacter('partisan_character').GetIdeology.GetName] by prospěla důsledná podpora."
 french_pretenders_pulse.14.c: "Jeho slova hrozí převratem. Okamžitě ho odvolejte."
 french_pretenders_pulse.15.t: "Lid pro [SCOPE.sCharacter('partisan_character').GetIdeology.GetName]"
 french_pretenders_pulse.15.d: "[SCOPE.sCharacter('partisan_character').GetFullName], zkušený a výrazně populistický politický agitátor, zahájil kampaň na podporu nároku svého hnutí [SCOPE.sCharacter('partisan_character').GetIdeology.GetName] mezi obyčejnými lidmi."
 french_pretenders_pulse.15.f: "#bold Remeš zvoní pro rod [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]!#!\n\nNový král; nový Karel Veliký! Ať žije Francie! Ať žije [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]!\n\n#italic Občanský pochod v [SCOPE.sState('capital_scope').GetCityHubName] za [SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting]. Účastníci jsou vyzváni, aby nosili barvy rodu [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')].#!"
 french_pretenders_pulse.15.a: "Výrazná posila pro jeho věc."
 french_pretenders_pulse.15.b: "Jeho práce postaví vůdce [SCOPE.sCharacter('partisan_character').GetIdeology.GetName] do nového světla."
 french_pretenders_pulse.16.t: "Spor rodů"
 french_pretenders_pulse.16.d: "[SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetFullName], oddaný stoupenec [SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetIdeology.GetName], zahájil sérii slovních útoků a obvinění z oportunismu proti vedoucímu hnutí [SCOPE.sCharacter('monarchist_leader').GetIdeology.GetName]."
 french_pretenders_pulse.16.f: "„Předpokládám, že rozumíte dnešnímu předvolání, monsieur. Tato zdržení trvají příliš dlouho.“\n\n„Samozřejmě, vůle Jeho Veličenstva bude naplněna s nejvyšší péčí a pohotovostí. Avšak vzhledem k historii našeho slavného národa by snad nebylo v zájmu Jeho Veličenstva, aby jeho rozhodnutí byla přijata všemi?“\n\n„Vaše hry nás nebaví, [SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetLastNameNoFormatting].“"
 french_pretenders_pulse.16.a: "Vyzvěte [SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetHerHim], aby mlčel, jinak může zajít příliš daleko."
 french_pretenders_pulse.16.b: "Ohnivá a zábavná podívaná."
 french_pretenders_pulse.17.t: "Vířící nespokojenost"
 french_pretenders_pulse.17.d: "S nárůstem radikalismu v [ROOT.GetCountry.GetName] padla vina za nejistotu, které země čelí, přímo na bedra [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('monarch_scope').GetFullName] a hnutí [SCOPE.sCharacter('monarch_scope').GetIdeology.GetName]."
 french_pretenders_pulse.17.d1: "Uprostřed revolučních proudů Jara národů padla vina za nejistotu v [ROOT.GetCountry.GetName] přímo na bedra [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('monarch_scope').GetFullName] a hnutí [SCOPE.sCharacter('monarch_scope').GetIdeology.GetName]."
 french_pretenders_pulse.17.f: "Francii nebylo královraždění cizí. Její revoluce byly vedeny ohněm a střelbou, uvolňující vlnu vroucího hněvu. Stejně tak se její vládci naučili rozpoznávat varovné signály. Zlý pohled zde, vražedný pohled tam; troud čekající na správnou jiskru."
 french_pretenders_pulse.17.a: "Vůle lidu je přinejlepším vrtkavá."
 french_pretenders_pulse.17.b: "Vláda [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] stojí za pár zlomených žeber."
 french_pretenders_pulse.17.a1: "Musíme se připravit a přečkat bouři."
 french_pretenders_pulse.17.b1: "Tyto proudy musí být zastaveny hned teď."
 french_pretenders_pulse.18.t: "Smrt Karla X."
 french_pretenders_pulse.18.d: "Král Karel X., vládce [ROOT.GetCountry.GetAltAdjective('G')] před červencovou revolucí, zemřel v exilu v [SCOPE.sCountry('slovenia_owner_scope').GetName]. Stoupenci legitimistů požadují navrácení jeho těla do [ROOT.GetCountry.GetNameNoFormatting] k pohřbení."
 french_pretenders_pulse.18.f: "Král byl mrtev, ale jen málokdo byl připraven opakovat staré refrény. Tisíce žádaly návrat těla exilového krále do Francie k pohřbu. „Tradice,“ říkali. Tisíce dalších přísahaly, že jeho tělo spálí. „Cholera,“ říkali."
 french_pretenders_pulse.18.a: "Vzdal se svého práva v roce 1830."
 french_pretenders_pulse.18.b: "Můžeme se pokusit zacelit rány července."
 french_pretenders_pulse.19.t: "Návrat ostatků"
 french_pretenders_pulse.19.d: "Tělo Napoleona Bonaparta bylo navráceno z [SCOPE.sCountry('saint_helena_owner_scope').GetName] a převezeno ze Svaté Heleny na [ROOT.GetCountry.GetAdjective] půdu. Pohřbení císařova těla představuje příležitost rehabilitovat imperiální minulost."
 french_pretenders_pulse.19.f: "„Považuji se za šťastného, že mi bylo dopřáno navrátit na půdu Francie smrtelné ostatky toho, kdo tolik přispěl ke slávě našeho národa, a splatit dluh naší společné vlasti tím, že jeho rakev obklopíme všemi poctami, které mu náleží.“"
 french_pretenders_pulse.19.a: "Císař konečně spočinul."
 french_pretenders_pulse.19.b: "Využijme této příležitosti k získání bonapartistů."
 french_pretenders.7.t: "Nová monarchie"
 french_pretenders.7.d: "Po obnovení [ROOT.GetCountry.GetAdjective] monarchie a dočasném obsazení trůnu regentem nastal čas rozhodnout, která dynastie bude pověřena obnovenou korunou Francie."
 french_pretenders.7.f: "Zvony v Remeši zvoní, ale na trůně nesedí žádný král. Tři velké rody stojí odděleně, jejich pretendenti váhají uchopit moc. Kdo by jednal příliš rychle, čelil by válce na dvou frontách. Zdálo se, že samotná Francie nespěchá s výběrem „správného“ krále — jen aby na trůně někdo seděl."
 french_pretenders.7.a: "Rod Bonapartů nás povede ke slávě."
 french_pretenders.7.b: "Rod Orléans přinese Francii prosperitu."
 french_pretenders.7.c: "Rod Bourbonů pomstí zločiny revoluce."
 french_pretenders.7.d1: "Staré dynastie se ukázaly jako příliš chybující."
