 notification_paris_commune_automation_pulse_8_b_desc: "Versailleská vláda, vědoma si neudržitelné situace, stáhla všechny síly z hranic [SCOPE.sCountry('paris_commune_nation_scope').GetName]. Tento ústup byl Národní gardou oslavován jako velké vítězství.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 5#!."
