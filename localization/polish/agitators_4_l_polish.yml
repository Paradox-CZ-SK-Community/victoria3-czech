 notification_paris_commune_automation_pulse_8_a2_desc: "Při ústupu z Paříže se vojáci loajální versailleské vládě pokusili zabavit dělostřelecké zásoby [SCOPE.sCountry('paris_commune_nation_scope').GetName]. Útok byl odražen Národní gardou, což vedlo k přeběhnutí části sil ke Komuně.\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 10#!."
