 modifier_nihilist_movement_enhancement: "Nihilistické konspirace"
 nihilism.2.t: "Nic nekončí"
 nihilism.2.d: "Důsledné potlačování nihilistického hnutí konečně přineslo výsledky a slovo „nihilismus“ se opět stává pouhou nadávkou."
 nihilism.2.f: "„Vaším největším hříchem je, že jste se zničil a zradil pro nic.“\n\n—Fjodor Dostojevskij, #italic Zločin a trest#!"
 nihilism.2.a: "Dělali víc problémů, než na jaké měli právo."
 nihilism.2.b: "Využijme toho k opětovnému upevnění naší kontroly nad akademií."
 nihilism.3.t: "Do zapomnění"
 nihilism.3.d: "Konflikt uvnitř nihilistického hnutí jej nakonec vyčerpal, avšak duch radikalismu nezmizel. Bývalí nihilisté se ve velkém přidali k jiným radikálním hnutím."
 nihilism.3.f: "„...myslíte si, že na ně útočím proto, že mluví nesmysly? Ani v nejmenším! Mám rád, když mluví nesmysly. To je jediná výsada člověka nad vším stvořením. Skrze omyl docházíte k pravdě! Jsem člověk, protože se mýlím! K žádné pravdě se nedostanete, aniž byste udělali čtrnáct chyb, a velmi pravděpodobně sto čtrnáct. A je to svým způsobem dobrá věc; jenže my si nemůžeme ani dělat chyby na vlastní účet! Mluvte nesmysly, ale mluvte své vlastní nesmysly, a já vás za to políbím. Jít špatně vlastní cestou je lepší než jít správně po cizí.“\n\n— Fjodor Dostojevskij, #italic Zločin a trest#!"
 nihilism.3.a: "Jen ochutnávka konfliktu, který přijde."
 nihilism.3.b: "Nechme je odeznít v minulosti."
 nihilism.4.t: "Odsouzení dětí"
 nihilism.4.d: "Populární člen [ROOT.GetCountry.GetAdjective] [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] vydal román odsuzující trend nihilistických excesů mezi mládeží. Hlavní postava, která se otevřeně hlásí k nihilismu, se podobá [SCOPE.sCharacter('nihilist_scope').GetFullName]."
 nihilism.4.f: "„Ve skutečnosti byli dříve prostě hlupáci a teď se najednou stali nihilisty.“\n\n—Ivan Turgeněv, #italic Otcové a děti#!"
 nihilism.4.a: "Aspoň jeden z nich má rozum."
 nihilism.4.b: "Ale hlavní postava je docela charismatická, že?"
 nihilism.5.t: "Černé kabáty a Feuerbach"
 nihilism.5.d: "Studenti přijímající estetiku a postoje nihilismu jsou stále běžnější na [SCOPE.sState('university_nihilist_affected_state').GetName] [SCOPE.sBuilding('university_nihilist_affected_building').GetName] a řada stran vyjádřila obavy z radikalismu v akademickém prostředí."
 nihilism.5.f: "„Ten nepatrný prostor, který zaujímám, je nekonečně malý ve srovnání se zbytkem prostoru, kde nejsem a který se mě netýká; a doba, po kterou je mi dáno žít, je tak nepatrná vedle věčnosti, ve které jsem nebyl a nebudu... A v tomto atomu, v tomto matematickém bodě, koluje krev, mozek pracuje a něco chce... Není to odporné? Není to malicherné?“\n\n—Ivan Turgeněv, #italic Otcové a děti#!"
 nihilism.5.a: "Jediné vzdělání, které si tito lidé zaslouží, je škola tvrdých ran!"
 nihilism.5.b: "Tohle je záležitost pro vedení univerzity."
 nihilism.6.t: "Nedostatek respektu"
 nihilism.6.d: "Žena spojená s [GetPopType('aristocrats').GetName] ze [SCOPE.gsInterestGroup('landowners_ig').GetName] rozhořčeně nahlásila incident, kdy jí skupina studentů odmítla uhnout na kraji cesty a ještě se jí posmívala, když procházela kolem."
 nihilism.6.f: "„Nemáte vůbec žádnou úctu?“\n\n„Co na tom záleží, že se vaše sukně vleče sněhem? Její hodnota je stejná, ať je špinavá nebo ne — stejná jako u jakéhokoli takového oděvu.“\n\n„Úřady se o tom dozvědí!“\n\nPosměšky studentů s rozcuchanými vlasy a černými kabáty ji provázely, zatímco spěšně odcházela s rudým obličejem."
 nihilism.6.a: "Kam až může zajít zvrhlost těchto nihilistů?"
 nihilism.6.b: "Sotva záležitost pro právní systém."
 nihilism.7.t: "Chaos na nádvoří"
 nihilism.7.d: "Při návštěvě [SCOPE.sState('courtyard_chaos_affected_state').GetName] [SCOPE.sBuilding('courtyard_chaos_affected_building').GetName] vyvolal [SCOPE.sCharacter('nihilist_scope').GetFullName] impozantní shromáždění studentů a narušil činnost několika osob spojených se [SCOPE.gsInterestGroup('wronged_by_nihilists_ig').GetName]."
 nihilism.7.f: "Řečník na improvizovaném pódiu obrátil svou pozornost k několika nešťastníkům v oděvu vyšších vrstev a napřáhl ruku.\n\n„Podívejte se na ně, jak procházejí — na ty agenty zvrácené pověry! Ano, podívejte se, jak skrývají své tváře hanbou! Pravda je taková, že nejsou o nic lepší než kdokoli z nás!“"
 nihilism.7.a: "Dost bylo těch nesmyslů! Rozpustit demonstraci."
 nihilism.7.b: "Nedá se popřít, že to byla dobrá podívaná."
 nihilism.8.t: "Bezbožné aktivity"
 nihilism.8.d: "Skupina nihilistických studentů uspořádala obscénní a výstřední protest před kostelem, což vedlo k požadavkům [SCOPE.gsInterestGroup('devout_ig').GetName], aby byly tyto aktivity zastaveny silou."
 nihilism.8.f: "Farář, který stál venku a zametal cestu ke vchodu do kostela, mohl jen šokovaně přihlížet, jak jásající studenti převlečení za duchovní rozvazují a odhazují své hábity do vzduchu. Tmavá látka na okamžik vytvořila oblaka ve vzduchu. Při pohledu na jejich nahá těla odvrátil hlavu a zakryl si zrak rukama.\n\n„To nemáte vůbec žádný rozum?!“"
 nihilism.8.a: "Vypátrat všechny zúčastněné a obvinit je z rouhání!"
 nihilism.8.b: "Jak máme vůbec pachatele identifikovat?"
 nihilism.9.t: "Daně a pochodně"
 nihilism.9.d: "Uprostřed noci spáchala skupina nihilistů žhářský útok na [SCOPE.sBuilding('kissed_by_fire_building').GetName] v [SCOPE.sState('kissed_by_fire_state').GetName], což vedlo k jeho vážnému poškození požárem."
 nihilism.9.f: "„Křičíte vztekem, když hoří prázdné budovy, ale kde jsou vaše slzy, když muži a ženy s plnými srdci hynou hlady?“"
 nihilism.9.a: "Pachatelé v žaláři znovu postaví to, co zničili."
 nihilism.9.b: "Učebny zůstanou uzavřené, dokud nebude budova opravena."
 nihilism.10.t: "Klín v akademii"
 nihilism.10.d: "S rostoucí nespokojeností v akademickém prostředí se dostal do popředí nový, hrdě [SCOPE.gsInterestGroup('intelligentsia_ig').GetLeader.GetIdeology.GetName] vůdce [SCOPE.gsInterestGroup('intelligentsia_ig').GetName]."
 nihilism.10.f: "„Život omezeného člověka plyne téměř vždy hladčeji a příjemněji než život génia nebo byť jen inteligentního člověka. Chytří lidé si nerozumějí s jevy, na které si masy zvykají bez sebemenších potíží. Inteligentní lidé jsou v závislosti na povaze a vývoji ve velmi různorodém vztahu k těmto jevům.“\n\n—Dmitrij Pisarev"
 nihilism.10.a: "Bedlivě sledujme [SCOPE.sCharacter('nihilist_leader').GetFullName]."
 nihilism.10.b: "Možná je [SCOPE.sCharacter('nihilist_leader').GetSheHe] jen produktem našich činů."
 nihilism.11.t: "Hádka na fóru"
 nihilism.11.d: "[SCOPE.sCharacter('nihilist_scope').GetFullName] a [SCOPE.sCharacter('communist_scope').GetFullName] se ocitli v spontánní veřejné hádce o přednostech svých ideologií."
 nihilism.11.f: "„Jak chcete získat podporu pro své hnutí mimo důvěřivé potomky buržoazie?“ vykřikl muž v červeném šátku. „Nemáte nic než estetiku — právě tu věc, kterou odsuzujete!“\n\nS otočením černého kabátu se oči nihilisty setkaly s protivníkem. „Zjevně nevěříte ve vůli lidu, jakmile se probudí...“"
 nihilism.11.a: "[SCOPE.sCharacter('nihilist_scope').GetFullName] vítězí nad svým protivníkem!"
 nihilism.11.b: "[SCOPE.sCharacter('communist_scope').GetFullName] má zjevně silnější argumenty."
 nihilism.11.c: "Mají potenciál pro něco většího než součet svých částí."
 nihilism.12.t: "Rudá a černá se spojují"
 nihilism.12.d: "Podníceny úzkými vazbami mezi svými agitátory začaly [SCOPE.gsInterestGroup('communist_ig').GetName] a [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] spolupracovat proti vlivu [SCOPE.gsInterestGroup('devout_ig').GetName]."
 nihilism.12.f: "Tvořili podivnou dvojici — bystrozrací studenti se zjevně snažili napodobit otrhaný styl dělníků, a přesto se navzájem doplňovali. V mihotavém světle svíček ve sklepě působilo ošuntělé oblečení nihilistů téměř autenticky, neboť zde věděli, že uzavřeli dohodu trpět stejně, pokud budou dopadeni."
 nihilism.12.a: "Součin nuly a dvou je stále nula."
 nihilism.12.b: "Sotva mohou být [SCOPE.gsInterestGroup('communist_ig').GetName] skutečně jednotní za touto absurditou."
 nihilism.13.t: "Spirálovitý vzestup"
 nihilism.13.d: "Sílicí sympatie k nihilistům ve vládě připravily manévr k zrušení a násilné likvidaci veškerého majetku [SCOPE.gsInterestGroup('devout_ig').GetName] a k okamžitému prosazení [SCOPE.sLaw('current_law_scope').GetName]."
 nihilism.13.f: "„Co lze rozbít, musí být rozbito. To, co úder vydrží, je hodno přežít; co se rozpadne na kusy, je bezcenné. V každém případě udeřte napravo i nalevo — nic zlého z toho nevzejde.“\n\n—Dmitrij Pisarev"
 nihilism.13.a: "[SCOPE.gsInterestGroup('devout_ig').GetName] zaniknou, neboť stojí proti samotné realitě!"
 nihilism.13.b: "Tato cesta je odsouzena k nezdaru!"
