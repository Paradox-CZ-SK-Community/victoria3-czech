 notification_paris_commune_automation_pulse_6_a_tooltip: "#header $notification_paris_commune_automation_pulse_6_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_6_a_desc$"
 notification_paris_commune_automation_pulse_6_b_name: "Komunardi deportují pařížské kněze"
 notification_paris_commune_automation_pulse_6_b_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] zadržela kněze katolické církve v Paříži a umožnila jim opustit město pouze s jedním zavazadlem. Uprchlíci spojení s církví zaplavili komunikace na okrajích Komuny.\n\nPostup #bold Pařížské komuny#! se #bold snížil#! o #variable 5#!."
 notification_paris_commune_automation_pulse_6_b_tooltip: "#header $notification_paris_commune_automation_pulse_6_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_6_b_desc$"
 notification_paris_commune_automation_pulse_6_c_name: "Komunardi popravují pařížské kněze"
 notification_paris_commune_automation_pulse_6_c_desc: "[SCOPE.sCountry('paris_commune_nation_scope').GetName] provedla řadu poprav katolických kněží na území Paříže. Tyto radikálně antiklerikální kroky posílily radikální frakce komunardů prosazující [GetLawType('law_state_atheism').GetName].\n\nPostup #bold Pařížské komuny#! se #bold zvýšil#! o #variable 10#!."
