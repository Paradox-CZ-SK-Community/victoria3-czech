 coup_pulse_events.1.t: "Generál obviněn ze spiknutí"
 coup_pulse_events.1.d: "[SCOPE.sCharacter('accused_general').GetFullName], generál spojený se [SCOPE.gsInterestGroup('accused_general_ig').GetName], byl obviněn ze závažné neloajality. [SCOPE.sCharacter('accused_general').GetFullName] tvrdí, že jde pouze o spiknutí podvratných živlů s cílem odstranit překážku jejich vládě."
 coup_pulse_events.1.f: "„Ujišťuji vás, pánové, že nemám žádné povědomí o činech popsaných v těchto údajných dopisech. Pokud musíte prohledat mé osobní věci, abyste mě očistili, vítám to.“"
 coup_pulse_events.1.a: "Nemůžeme riskovat loajalitu našich generálů."
 coup_pulse_events.1.a.tt: "[SCOPE.sCharacter('accused_general').GetFullName] bude penzionován."
 coup_pulse_events.1.b: "Kdo přesně toto obvinění vznesl?"
 coup_pulse_events.2.t: "Rostoucí rozkol"
 coup_pulse_events.2.d: "[SCOPE.gsInterestGroup('conflicted_loyalty_ig').GetName], přestože jsou úzce spojeni s [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle]em [SCOPE.sCharacter('golpista_general').GetLastName]a ze [SCOPE.sParty('conflicted_loyalty_party').GetName], odmítají myšlenku svrhnout vládu silou."
 coup_pulse_events.2.f: "„Jaký je důvod pokračovat v našem partnerství? Nejprve se odcizíte a nyní se mluví o odporu vůči samotným základům státního řádu. Žádám vás, abyste tato obvinění okamžitě vysvětlil, jinak bude dalším návrhem na programu má rezignace.“"
 coup_pulse_events.2.a: "Tvrzení o dobrých úmyslech může přesvědčit i tu nejčistší duši."
 coup_pulse_events.2.b: "Jejich náklonnost není nutná. Stačí jejich poslušnost."
 coup_pulse_events.3.t: "Kritická podpora"
 coup_pulse_events.3.d: "Skupina zastupující obvyklou opozici [SCOPE.gsInterestGroup('critical_support_ig').GetName] oslovila vládu s návrhem na spolupráci proti „silám, které by podvrátily vládu v [ROOT.GetCountry.GetName]“."
 coup_pulse_events.3.f: "„Musíme držet pohromadě, jinak budeme zcela jistě viset každý zvlášť.“\n\n— Benjamin Franklin"
 coup_pulse_events.3.a: "Přijměme jejich podporu... prozatím."
 coup_pulse_events.3.b: "Nebudeme posilovat jejich vlastní spiknutí proti nám."
 coup_pulse_events.4.t: "Strach mezi investory"
 coup_pulse_events.4.d: "S rostoucími obavami o stabilitu v [ROOT.GetCountry.GetName] pohrozili investoři spojení se [SCOPE.gsInterestGroup('investor_ig').GetName], že stáhnou své investice z několika továren v [SCOPE.sState('investor_affected_state').GetName]."
 coup_pulse_events.4.f: "Strach byl patrný v ulicích, šířil se mezi kolemjdoucími jako jedovatá mlha. Jejich kroky byly rychlé, pohledy uhýbavé a rozhovory tiché.\n\nMuž v cylindru se obrátil ke svému kolegovi, který stále hleděl z okna restaurace.\n\n„Takhle se země nevede — a není to země pro podnikání.“"
 coup_pulse_events.4.a: "Uklidněme [SCOPE.gsInterestGroup('investor_ig').GetName] přijetím zvýšení úrokových sazeb."
 coup_pulse_events.4.b: "Kdyby měli skutečné obavy, postavili by se za [ROOT.GetCountry.GetName]."
 coup_pulse_events.5.t: "Zakouřená zadní místnost"
 coup_pulse_events.5.d: "Osoby spojené s [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle]em [SCOPE.sCharacter('golpista_general').GetLastName]em a se [SCOPE.gsInterestGroup('golpista_ig').GetName] oslovily prvky [SCOPE.gsInterestGroup('approached_ig').GetName] s žádostí o podporu v hypotetickém spiknutí proti vládě."
 coup_pulse_events.5.f: "„Dobře vím, že naše vztahy byly v minulosti napjaté, ale doufám, že radikální hrozba čelící naší zemi a potřeba rozhodného jednání nás dokáže v této významné chvíli spojit...“"
 coup_pulse_events.5.a: "Partnerství by mohlo být pro obě strany výhodné."
 coup_pulse_events.5.b: "[SCOPE.gsInterestGroup('approached_ig').GetName] o tyto intriky nestojí."
 coup_pulse_events.6.t: "Přeplněné ulice"
 coup_pulse_events.6.d: "S rostoucími zvěstmi o spiknutí za účelem svržení vlády mobilizovali [SCOPE.gsInterestGroup('pro_government_ig').GetName] podporu pro zvolenou vládu. Demonstranti vyjadřující podporu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zaplnili ulice [SCOPE.sState('protest_state').GetCityHubName]."
 coup_pulse_events.6.f: "„Postavte se za své zásady, zbabělci, než vám nezbude nic, za co se schovat!“"
 coup_pulse_events.6.a: "Postavili se do čela spravedlnosti."
 coup_pulse_events.6.b: "Chaotická masa nízkých pudů."
 coup_pulse_events.7.t: "Výstřel do tmy"
 coup_pulse_events.7.d: "Významný úředník a podporovatel [SCOPE.gsInterestGroup('assassination_ig').GetName] byl zastřelen za bílého dne v ulicích [SCOPE.sState('assassination_state').GetCityHubName]. Místní policie nejeví zájem incident dále vyšetřovat."
 coup_pulse_events.7.f: "Policista stojící na rohu se snažil ani nepohnout, když výstřel rozťal vzduch a výkřiky přihlížejících se rozezněly ulicemi. Nakonec se uklidnil — nová a těžká váha v jeho měšci byla více než dostatečná, aby potlačila veškeré pochybnosti."
 coup_pulse_events.7.a: "Spravedlnosti musí být učiněno zadost."
 coup_pulse_events.7.b: "Stojíme nad propastí a nesmíme do ní spadnout."
 coup_pulse_events.8.t: "Nepřítel mého nepřítele"
 coup_pulse_events.8.d: "Spojenci [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle]a [SCOPE.sCharacter('golpista_general').GetLastName]a v diplomatickém sboru nabídli, že osloví vládu [SCOPE.sCountry('coup_sponsor_country').GetAdjective] pro podporu jejich snahy o převzetí moci výměnou za budoucí závazky."
 coup_pulse_events.8.f: "„Říká se, že se tu nic neobejde bez souhlasu [SCOPE.sCountry('coup_sponsor_country').GetAdjectiveNoFormatting]. Já... rád věřím, že to není pravda. Ale pokud chceme zajistit, aby věci proběhly podle plánu...“\n\nMuž v obleku pomalu přikývl koktajícímu úředníkovi.\n\n„A co jejich návrh?“"
 coup_pulse_events.8.a: "Toto uspořádání je zatím přijatelné."
 coup_pulse_events.8.b: "Kdy se kdy vměšování [SCOPE.sCountry('coup_sponsor_country').GetAdjective] vyplatilo?"
 coup_pulse_events.9.t: "Informátor"
 coup_pulse_events.9.d: "Člen štábu [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle]a [SCOPE.sCharacter('golpista_general').GetLastName]a vypadl z okna [SCOPE.sBuilding('informant_building').GetName] v [SCOPE.sState('informant_state').GetName] a při dopadu utrpěl vážná zranění. Nabídl vládě informace výměnou za svou bezpečnost."
 coup_pulse_events.9.f: "Ozval se výkřik, jekot a tupý náraz něčeho těžkého na dlážděnou ulici. V náhle otevřeném okně bylo sotva vidět siluetu, která se otočila a zmizela. Tam, kde dříve byly jen ošlapané kameny, nyní leželo tělo v kaluži rozlévající se krve."
 coup_pulse_events.9.a: "Mohl by být neocenitelným zdrojem."
 coup_pulse_events.9.b: "Nepřežije, aby mohl vypovídat."
 coup_pulse_events.10.t: "Ve zbrani"
 coup_pulse_events.10.d: "[SCOPE.sBuilding('barracks_theft_building').GetName] v [SCOPE.sState('barracks_theft_state').GetName] v poslední době hlásí značné a záhadné ztráty střelných zbraní."
 coup_pulse_events.10.f: "„Armáda denně na střelnici promrhá dost munice na vyzbrojení celého pluku. Co je sto nábojů ve srovnání s tak obludnými výdaji? A co tisíc?“\n\n„Rozdíl je v tom, že na střelnici si můžeme být jisti, že neletí naším směrem.“"
 coup_pulse_events.10.a: "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] mají své vlastní potřeby."
 coup_pulse_events.10.b: "To je zjevný důkaz nějakého spiknutí."
 coup_pulse_events.11.t: "Na obranu [SCOPE.sState('military_exercises_state').GetName]"
 coup_pulse_events.11.d: "[SCOPE.gsInterestGroup('golpista_ig').GetName] si s ohledem na nedávné nepokoje vyžádali provedení série neplánovaných vojenských cvičení v [SCOPE.sState('military_exercises_state').GetName]."
 coup_pulse_events.11.f: "Kolona vojáků se vinula po cestě, čtyři ramena široká a tak dlouhá, že cestovatel nedohlédl na její konec. Důstojník na koni projel kolem a s jasným úmyslem napřáhl obušek.\n\n„Tato trasa je uzavřena pro průchod do [SCOPE.sState('military_exercises_state').GetNameNoFormatting]!“"
 coup_pulse_events.11.a: "Nemají k tomu žádný oprávněný důvod."
 coup_pulse_events.11.b: "Bezpečnost [SCOPE.sState('military_exercises_state').GetName] je zásadní, i když je to neobvyklé."
 coup_pulse_events.12.t: "Státní představitelé pozváni na bohoslužbu"
 coup_pulse_events.12.d: "Mnozí významní státní představitelé byli pozváni na zvláštní bohoslužbu pořádanou [SCOPE.gsInterestGroup('golpista_ig').GetName]. Toto pozvání přišlo nečekaně a narušilo jejich program."
 coup_pulse_events.12.f: "„Každý nový a úspěšný příklad dokonalého oddělení církevních a světských záležitostí má velký význam. A nepochybuji, že každý nový příklad — stejně jako všechny předchozí — ukáže, že náboženství i vláda budou existovat v čistší podobě, čím méně se budou prolínat.“\n\n— James Madison"
 coup_pulse_events.12.a: "Máme vlastní program a budeme se ho držet."
 coup_pulse_events.12.b: "Na bohoslužbu se čas najde vždy."
 coup_pulse_events.13.t: "Soukromé armády"
 coup_pulse_events.13.d: "Několik členů [SCOPE.gsInterestGroup('golpista_ig').GetName] požádalo o povolení rozšířit své ozbrojené bezpečnostní složky s odvoláním na rostoucí kriminalitu a hrozbu nepokojů mezi zaměstnanci."
 coup_pulse_events.13.f: "„Je mi líto toho člověka, který chce kabát tak levný, že muž nebo žena, kteří látku vyrobí, při tom musí hladovět.“\n\n— Benjamin Harrison"
 coup_pulse_events.13.a: "Stát musí mít monopol na násilí."
 coup_pulse_events.13.b: "Podnikání je mečem i štítem [ROOT.GetCountry.GetName]."
 coup_pulse_events.14.t: "Páky moci"
 coup_pulse_events.14.d: "Státní byrokracie, z velké části ovládaná [SCOPE.gsInterestGroup('golpista_ig').GetName], v poslední době výrazně zpomaluje. Odpovědné osoby požadují záruky bezpečnosti svých pozic."
 coup_pulse_events.14.f: "Naplnila je jakási horečná energie — tyto potomky vážených rodin zaplňující kanceláře. Vznikla mezi nimi solidarita, jaká tu dosud nebyla, a všechny síly dříve soupeřících privilegií se spojily ve jménu jediné věci, která je všechny sjednocovala."
 coup_pulse_events.14.a: "Nezvolení lidé by neměli mít takový vliv na stát."
 coup_pulse_events.14.b: "Prokázali, že jsou nepostradatelní."
 coup_pulse_events.15.t: "Věc hodná podpory?"
 coup_pulse_events.15.d: "Mnoho policistů bylo viděno, jak ve službě podporují politické ambice [SCOPE.gsInterestGroup('golpista_ig').GetName]. Někteří policejní velitelé dokonce vyzvali k obnovení pořádku v zemi silou, pokud to bude nutné."
 coup_pulse_events.15.f: "„Neřest může na čas zvítězit, zločin se může chlubit svými úspěchy před poctivými lidmi, ale nakonec zákon dostihne viníka a hanba i trest postihnou ty, kdo hřeší.“\n\n— Allan Pinkerton"
 coup_pulse_events.15.a: "Jejich úkolem je zákon dodržovat, ne ho určovat."
 coup_pulse_events.15.b: "Kým jsme, pokud nemáme ani důvěru policie?"
 state_radicals_increase_coup_tt: "[Concept('concept_pop', '$concept_pops$')] ve státech s více než 20% politickou silou [SCOPE.gsInterestGroup('golpista_ig').GetName] se stanou více [concept_radical]"
 coup_pulse_events.16.t: "Nový Prométheus"
 coup_pulse_events.16.d: "[SCOPE.sCharacter('enlightened_despot_scope').GetFullName], významný člen [SCOPE.gsInterestGroup('golpista_ig').GetName], vydal politický manifest předpovídající blízký kolaps společnosti a nutnost osvíceného režimu, který by jej odvrátil."
 coup_pulse_events.16.f: "„Cílem našeho založení je poznání příčin a skrytých pohybů věcí a rozšiřování hranic lidské říše až k uskutečnění všeho možného.“\n\n— Francis Bacon, #italic Nová Atlantida#!"
 coup_pulse_events.16.a: "[SCOPE.sCharacter('enlightened_despot_scope').GetFullName] není žádný filozof-král, i když by jím chtěl být."
 coup_pulse_events.16.b: "V těžkých časech by nás měli vést ti nejkvalifikovanější."
 coup_pulse_events.17.t: "Armáda práce"
 coup_pulse_events.17.d: "Zástupci [SCOPE.gsInterestGroup('golpista_ig').GetName] oznámili svůj záměr vyhlásit generální stávku, pokud nebudou splněny určité požadavky. Ty zahrnují represivní opatření proti jejich politickým oponentům a další znepokojivé body."
 coup_pulse_events.17.f: "„Jedna věc je však jasná — příroda nevytváří na jedné straně vlastníky peněz či zboží a na druhé straně lidi, kteří nevlastní nic než svou pracovní sílu.“\n\n— Karl Marx, #italic Kapitál#!"
 coup_pulse_events.17.a: "Stroje lze opravit, ale mrtvé nelze oživit."
 coup_pulse_events.17.b: "Abychom odvrátili katastrofu, musíme učinit ústupky."
 coup_pulse_events.18.t: "Srpy a pochodně"
 coup_pulse_events.18.d: "Nespokojenost mezi [SCOPE.gsInterestGroup('golpista_ig').GetName] dosáhla bodu, kdy se otevřeně volá po pochodu na [SCOPE.sState('peasant_march_state').GetName] za účelem vynucení politických ústupků."
 coup_pulse_events.18.f: "„Podívejte se na ně! Nafoukaná prasata v hlavním městě nám poroučejí, jako bychom byli jejich otroci!“\n\nZchátralý starý muž otočil hlavu za projíždějícím kočárem, v očích planoucí opovržení.\n\n„Říkají nám, ať je odvolíme, když se nám nelíbí, ale jaký má smysl vybírat mezi lidmi, kteří chtějí, abychom hladověli?“"
 coup_pulse_events.18.a: "Vláda davu není náhradou za řádnou společnost."
 coup_pulse_events.18.b: "Ti, kdo nás živí, by měli mít právo chodit po našich ulicích, jak chtějí."
 coup_aftermath_events.1.t: "Dědictví demokracie"
 coup_aftermath_events.1.d: "V [SCOPE.sState('legacy_of_democracy_state').GetName] vypukl násilný protest, pravděpodobně organizovaný [SCOPE.gsInterestGroup('legacy_of_democracy_ig').GetName], požadující konec vlády [SCOPE.sCharacter('coup_leader').GetFullName]a a obnovení demokracie v [ROOT.GetCountry.GetName]."
 coup_aftermath_events.1.f: "Když viděla, jak se náměstí pomalu zaplňuje lidmi s jiskrou v očích — muži a ženami, kteří jako by v sobě nesli veškerou naději i hněv světa — nedokázala potlačit tíživý pocit v žaludku.\n\nKolik z nich zůstane na konci týdne naživu nebo na svobodě?"
 coup_aftermath_events.1.a: "Další zbytek mrtvé vlády, který je třeba smést."
 coup_aftermath_events.1.b: "Rychle se sami vyčerpají."
 coup_aftermath_events.2.t: "V ostrém kontrastu"
 coup_aftermath_events.2.d: "Radikální skupina zastupující [SCOPE.gsInterestGroup('harsh_contrast_ig').GetName], která původně náš převrat odmítala, se odtrhla od svých bývalých spojenců a odsoudila je jako „podřízené mrtvému, nelegitimnímu systému“. Obrátila se na [SCOPE.sCharacter('coup_leader').GetFullName]a s žádostí, aby jí dovolil pomoci jeho nové vládě."
 coup_aftermath_events.2.f: "„My, jako loajální občané, kteří podporují vaše úsilí od samého počátku, bychom vás rádi pokorně požádali o přijetí naší žádosti, abychom mohli pomoci této nové, spravedlivější vládě.“\n\nKdyž posel tato slova pronášel, snažil se vytěsnit vzpomínky na dokumenty, které ještě před nedávnem tiše shořely."
 coup_aftermath_events.2.a: "Čím dříve obnovíme pořádek, tím lépe."
 coup_aftermath_events.2.b: "V naší vládě není místo pro oportunisty."
 coup_aftermath_events.3.t: "Národní nespokojenost"
 coup_aftermath_events.3.d: "Skupina lidí [SCOPE.sCulture('national_discontent_culture').GetName] v [SCOPE.sState('national_discontent_state').GetName] otevřeně odsoudila novou vládu [ROOT.GetCountry.GetName] jako hrozbu pro národ [SCOPE.sCulture('national_discontent_culture').GetNameNoFormatting]."
 coup_aftermath_events.3.f: "„Náš národ prošel mnoha útrapami během let podřízenosti [ROOT.GetCountry.GetAdjectiveNoFormatting] státu. Tento nový režim neuhasí naše odhodlání zajistit práva všem [SCOPE.sCulture('national_discontent_culture').GetNameNoFormatting] lidem...“"
 coup_aftermath_events.3.a: "Jejich země má hodnotu, jejich názory nikoli."
 coup_aftermath_events.3.b: "Pošleme zástupce, aby je uklidnil."
 coup_aftermath_events.4.t: "Pobuřování v akademii"
 coup_aftermath_events.4.d: "Pedagogové [SCOPE.sState('university_state').GetName] [SCOPE.sBuilding('university_state_building').GetName] umožnili studentům vydat množství pamfletů šířících pomluvy a vyzývajících k „demokratické revoluci“ proti vládě [SCOPE.sCharacter('coup_leader').GetFullName]a. Identita těchto studentů byla univerzitním personálem utajena."
 coup_aftermath_events.4.f: "„Svobodu nelze zachovat bez všeobecného vzdělání mezi lidem, který má právo... a touhu vědět; a kromě toho má nezpochybnitelné, nezcizitelné, neodvolatelné, božské právo na ten nejobávanější a nejzáviděnější druh poznání — poznání charakteru a jednání svých vládců.“"
 coup_aftermath_events.4.a: "Uzavřít [SCOPE.sState('university_state').GetName] [SCOPE.sBuilding('university_state_building').GetName], dokud se viníci nepřihlásí."
 coup_aftermath_events.4.b: "Zabavit pamflety, kdekoliv budou nalezeny."
