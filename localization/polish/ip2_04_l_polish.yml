 india_events.2.t: "Dillíský darbár"
 india_events.2.d: "[ROOT.GetCountry.GetTopOverlord.GetAdjective] správa naplánovala velkolepý darbár v [SCOPE.sState('delhi_scope').GetCityHubName], aby oficiálně prohlásila [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('monarch_scope').GetFullName] za [SCOPE.sCharacter('monarch_scope').GetCustom('getEmpressEmperor')] Indie. K účasti byli pozváni hodnostáři z celé [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] Indie."
 india_events.2.f: "„Když už všichni hosté seděli, fanfára trubačů přesně v poledne oznámila příjezd místokrále. Vojenské kapely zahrály pochod a [SCOPE.sCharacter('ruler_scope').GetCustom('getLadyLord')] [SCOPE.sCharacter('viceroy_scope').GetLastNameNoFormatting], doprovázený [SCOPE.sCharacter('ruler_scope').GetCustom('getLadyLordSpouse')] [SCOPE.sCharacter('viceroy_scope').GetLastNameNoFormatting], svými dcerami a [SCOPE.sCharacter('viceroy_scope').GetHerHis] štábem, zamířil do pavilonu. [SCOPE.sCharacter('viceroy_scope').GetHerHis|U] Excelence usedla na trůn oděna v [SCOPE.sCharacter('viceroy_scope').GetHerHis] roucha velmistra Řádu Indické hvězdy, zazněla národní hymna, čestné stráže vzdaly poctu zbraní a celé obrovské shromáždění povstalo jako jeden muž. Hlavnímu heroldovi bylo poté nařízeno přečíst proklamaci. Znovu zazněla fanfára trubačů a [SCOPE.sCharacter('monarch_scope').GetHerHis|U] Veličenstvo bylo prohlášeno za [SCOPE.sCharacter('monarch_scope').GetCustom('getEmpressEmperor')] Indie.“" # - Field Marshal Lord Roberts, When Queen Victoria Became Empress of India
 india_events.2.a: "Šáh in šáh pádišáh. Kéž [SCOPE.sCharacter('monarch_scope').GetHerHim] Bůh žehná."
 india_events.2.b: "Příležitost nabídnout [SCOPE.sCharacter('monarch_scope').GetHerHim] naši loajalitu a jednu pokornou žádost."
 indian_independence_request_tt: "„Pokorně prosíme [SCOPE.sCharacter('monarch_scope').GetHerHim|U] Veličenstvo, aby #b Indii#! udělilo stejné politické a společenské postavení, jakému se těší [SCOPE.sCharacter('monarch_scope').GetHerHim] #b britští#! poddaní.“"
 india_events.3.t: "Hora světla"
 india_events.3.d: "Po dobytí [SCOPE.sState('punjab_scope').GetCityHubName] [ROOT.GetCountry.GetAdjectiveNoFormatting] silami jsme získali legendární diamant Koh-i-Noor."
 india_events.3.f: "„Milorde, podrobný soupis pokladnice v [SCOPE.sState('punjab_scope').GetCityHubName] je připraven. Za zmínku stojí tři drahokamy: Daria-i-Noor, Khiraj-i-Alam a samozřejmě Koh-i-Noor.“\n\n„Výborně. Tito Indové se mi zamlouvají mnohem více než ti za Atlantikem. Koneckonců diamant je do čepice daleko lepším doplňkem než pírko, nemyslíte?“\n\n„Zcela jistě, milorde.“\n\n„Připravte je k převozu. Musíme zajistit, aby byly přítomny na Světové výstavě. Důkaz našeho dobytí na východě.“"
 india_events.3.a: "Předložte diamant jako válečnou kořist [SCOPE.sCountry('overlord_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('overlord_scope').GetRuler.GetFirstNameNoFormatting]."
 india_events.3.b: "Převezte diamant do naší pokladnice v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 koh_i_noor_in_europe_tt: "#bold Evropská#! [concept_country] ukořistila diamant #bold Koh-i-Noor#!"
 owns_koh_i_noor_tt: "Vlastní diamant #bold Koh-i-Noor#!"
 demand_return_of_diamond_tt: "Budeme požadovat, aby [SCOPE.sCountry('diamond_country').GetName] vrátila diamant #bold Koh-i-Noor#!"
 returned_koh_i_noor_tt: "Diamant #bold Koh-i-Noor#! bude vrácen Indii"
 india_events.4.t: "[SCOPE.sCountry('india_scope').GetName] požaduje navrácení Koh-i-Nooru"
 india_events.4.d_1: "Země [SCOPE.sCountry('india_scope').GetNameNoFlag], která nedávno získala nezávislost na naší vládě, požádala o navrácení diamantu Koh-i-Noor. Diamant je v současnosti uložen v našich trezorech jako válečná kořist."
 india_events.4.d_2: "Země [SCOPE.sCountry('india_scope').GetNameNoFlag] požádala o navrácení diamantu Koh-i-Noor. Diamant je v současnosti uložen v našich trezorech jako válečná kořist."
 india_events.4.f: "„Pane premiére, Koruně se Koh-i-Noor nezdál přitažlivý, když si ho poprvé nárokovala. Jistě jí nebude vadit jej vrátit?“\n\n„Vysoký komisaři, zjistíte, že dosáhnout nezávislosti je snazší než vypáčit z Koruny klenot.“\n\n„Ale vždyť jich má tolik!“\n\n„My jsme také měli mnoho kolonií. Podívejte, jak to dopadlo.“"
 india_events.4.a: "Patří nám podle smlouvy i práva dobytí."
 india_events.4.b: "Cenné věci jsou od toho, aby se utrácely."
 india_events.5.t: "Dekkánské nepokoje"
 india_events.5.d: "Zadlužení [GetPopType('peasants').GetName] v [SCOPE.sState('riots_site_scope').GetName] zahájili sérii povstání proti místním lichvářům s cílem zničit záznamy o svých dluzích."
 india_events.5.f: "„Pane, rolníci pálí záznamy o svých dluzích. V některých případech útočí i na samotné lichváře. Máme poslat policii, aby zasáhla?“\n\nKoutek guvernérových úst se zachvěl. „Nu, sotva je to překvapivé.“\n\n„Pane?“\n\n„Hindské slovo pro rolníka je ryot. Ryoti se bouří – proč jsme překvapeni?“"
 india_events.5.a: "Pošlete armádu, aby povstání potlačila."
 india_events.5.b: "Zrušte tyto dluhy, než se nepokoje zhorší."
 slaves_freed_in_state_tt: "Všichni [GetPopType('slaves').GetName] v [SCOPE.sState('riots_site_scope').GetName] budou osvobozeni"
 india_events.6.t: "Hindsko-[SCOPE.sCountry('enemy_great_power_scope').GetAdjectiveNoFormatting] spiknutí"
 india_events.6.d: "Naše zpravodajská služba odhalila spiknutí indických revolucionářů spolupracujících s agenty [SCOPE.sCountry('enemy_great_power_scope').GetAdjective] vlády. Mají v úmyslu zosnovat celoindické povstání proti [SCOPE.sCountry('overlord_scope').GetAdjective] vládě."
 india_events.6.f: "„Spiklenci si prý říkali strana Ghadar.“\n\n„To je zábavné.“\n\n„Jak to, milorde?“\n\n„Ghadar znamená vzpoura. Ale gaddari znamená zrada. Zvláštní, že rozdíl je ve skutečnosti jen otázkou pohledu.“"
 india_events.6.a: "Musíme zasáhnout okamžitě."
 india_events.6.b: "Zůstaňme ostražití, ale nesmíme jednat ukvapeně."
 conspiracy_trials_in_30_days_tt: "Podezřelí spiklenci budou postaveni před soud za #v 30#! dní"
 india_events.7.t: "Procesy se spiknutím v [SCOPE.sState('conspiracy_trial_state').GetCityHubName]"
 india_events.7.d: "Ve městě [SCOPE.sState('conspiracy_trial_state').GetCityHubName] bylo několik set členů indických organizací za nezávislost postaveno před soud za spiknutí s [SCOPE.sCountry('enemy_great_power_scope').GetAdjective] agenty s cílem rozvrátit [SCOPE.sCountry('overlord_scope').GetAdjective] vládu."
 india_events.7.f: "Noviny i lidé proces sledovali s velkým zájmem. Pro některé byl známkou rostoucí nespokojenosti. Pro jiné důkazem, že žádné spiknutí se střelným prachem, ať už vedené Angličany nebo Indy, nemůže podkopat Korunu. Pro většinu místních to však bylo prostě tím, čím to bylo. Ponurým průvodem tří set mužů, odsuzovaných jednoho po druhém."
 india_events.7.a: "Doufejme, že tím to končí."
 india_events.7.b: "Dvaačtyřicet rozsudků smrti znamená dvaačtyřicet mučedníků."
 india_events.8.t: "Phool Walon Ki Sair"
 india_events.8.d_1: "Město Dillí vyšlo oslavit soulad mezi hinduisty a muslimy svátkem Phool Walon Ki Sair. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] se podle tradice objevil a sledoval Sair ze Zafar Mahalu."
 india_events.8.d_2: "Město Dillí vyšlo oslavit tradiční indický svátek Phool Walon Ki Sair. Tato příležitost oslavuje pospolitý soulad mezi hinduisty a muslimy."
 india_events.8.d_3: "Město Dillí vyšlo oslavit soulad mezi hinduisty a muslimy svátkem Phool Walon Ki Sair. Na městských svatyních jsou kladeny květinové obětiny a ulice naplňuje tanec a zpěv."
 india_events.8.f: "Vzduchem pulzuje hudba provázená vůní tisíců květů. Lidé z celého města se shromažďují, hinduisté i muslimové. Jejich náboženství není zapomenuto, ale obvyklé napětí nahradila vzájemná láska k tanci, modlitbě a jídlu."
 india_events.8.a: "Krásná ukázka souladu a barev."
 india_events.8.b: "Hrozí zjevné nebezpečí, že svátek bude zpolitizován."
 india_events.8.c: "Nabídněte oficiální příspěvek na výzdobu."
 india_events.9.t: "Indická armáda"
 india_events.9.d: "[SCOPE.gsInterestGroup('government_scope').GetName] vydala rozkaz sjednotit tři [SCOPE.gsInterestGroup('presidency_armies').GetName] do jediného útvaru – [ROOT.GetCountry.GetAdjectiveNoFormatting] armády."
 india_events.9.f: "„Připravovalo se to už pěknou dobu. Nerozumné, jak se říká, a s pořádnou dávkou nadbytečnosti. Překvapuje mě, že to přežilo telegraf.“\n\n„Relikt Společnosti, ano, souhlasím. Myslíte, že jsme si ponechali příliš mnoho z jejich struktury?“\n\n„Co jiného jsme mohli dělat? Indie není zrovna pružná země. U reforem, jako je tato, je čtyřicet let docela rychlé.“"
 india_events.9.a: "Vítězství efektivity."
 india_events.9.b: "Příležitost dále začlenit domorodé jednotky."
 india_events.10.t: "Dohnavurské společenství"
 india_events.10.d: "[SCOPE.sCharacter('carmichael_scope').GetFullName], křesťanská misionářka působící v [SCOPE.sState('dohnavur_state').GetName], se v oblasti stala známou tím, že poskytuje útočiště dětem nuceným k prostituci. Založila misii, aby svou činnost dále rozvíjela."
 india_events.10.f: "„Často jsme žádáni, abychom vyprávěli příběhy konvertitů; a jistě by dojaly, neboť cesta úniku, kterou Bůh někdy otevře, je jako Petrova cesta z vězení, zázračná; a pravda je podivnější než fikce a mnohem zajímavější. Ale my, kteří pracujeme v doupěti Strašlivého a víme, jak bojuje, aby získal svou kořist zpět i poté, co mu unikla, se bojíme tyto příběhy vyprávět příliš často a cítíme, že mlčení je nejbezpečnější a, jakkoli se to některým může zdát zvláštní, prozatím nejvíce oslavuje Boha.“" #- Amy Carmichael, Things As They Are
 india_events.10.a: "Její věc si zaslouží oficiální dar."
 india_events.10.b: "Nemůžeme být viděni jako sponzoři misionářů."
 india_events.11.t: "[SCOPE.sCharacter('simon_scope').GetLastNameNoFormatting], vrať se"
 india_events.11.d: "[SCOPE.sCharacter('mehta_scope').GetFullName], dcera místního soudce, byla spatřena při účasti na protestech proti [SCOPE.sCharacter('simon_scope').GetLastNameNoFormatting]ově komisi ve státě [SCOPE.sState('mehta_state').GetName]. Ona i další dětští protestující čelí policii oděni do barev indické vlajky."
 india_events.11.f: "Jejich věk je neuchránil před pozorností koloniální policie. Před týdnem čelili útoku láthí, při němž desítky dospělých mužů s obušky rozehnaly jejich protestní hlídku a strhly vlajku, kterou si sami vyrobili. Ke svým rodičům se vrátili v slzách, s krví vytékající z odřených dlaní a kolen.\n\nNyní se místo toho, aby drželi vlajku, kterou jim lze vytrhnout z rukou, zahalili do jejích barev. I kdyby byly děti znovu sraženy k zemi, jejich oděv ukáže světu jejich věc."
 india_events.11.a: "Taková statečnost v tak mladém věku."
 india_events.11.b: "Její otec za to ponese následky."
 india_events.12.t: "Bouří k míru"
 india_events.12.d: "[SCOPE.sCharacter('besant_scope').GetFullName], bývalá socialistická aktivistka, z níž se stala teosofka, oznámila svůj záměr odcestovat z [ROOT.GetCountry.GetCapital.GetCityHubName] do Indie. Brzy se připojí ke svým teosofickým kolegům v jejich sídle ve státě [SCOPE.sState('madras_state').GetName]."
 india_events.12.f: "„Neúprosná nutnost mě nutí říkat pravdu tak, jak ji vidím, ať už se má řeč líbí či nelíbí, ať přináší chválu či vinu. Tuto jedinou věrnost Pravdě musím zachovat neposkvrněnou, ať už mě opustí jakákoli přátelství nebo se zpřetrhají lidská pouta. Může mě zavést do pustiny, a přesto ji musím následovat; může mě připravit o veškerou lásku, a přesto za ní musím jít; i kdyby mě zabila, budu v ni doufat; a nežádám na svůj hrob žádný jiný epitaf než:\n\n‚SNAŽILA SE NÁSLEDOVAT PRAVDU.‘“" #- Annie Besant's Autobiography
 india_events.12.a: "Kéž má bezpečnou cestu."
 india_events.12.b: "Společnost ji potřebuje v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 india_events.13.t: "Světový učitel"
 india_events.13.d: "Členové Teosofické společnosti ve státě [SCOPE.sState('madras_state').GetName] prohlásili mladého [SCOPE.sCharacter('krishnamurti_scope').GetFullName] za pravděpodobnou budoucí schránku božské bytosti Pána Maitréji. [SCOPE.sCharacter('besant_scope').GetFullName], teosofická aktivistka, se snaží chlapce adoptovat."
 india_events.13.f: "Monzun dosud nepřišel a obloha byla stále bez mráčku. Chlapec stál na pláži a nepřítomně hleděl na přicházející vlny. Ztracený, odtažitý, izolovaný od všeho kolem nějakou nehmotnou bariérou. Jeho otec se těžce brodil pískem a položil mu ruku na rameno. Chlapec k němu znovu vzhlédl a vzpomínka na moře tiše pominula."
 india_events.13.a: "[SCOPE.sCharacter('besant_scope').GetSheHe|U] mu umožní naplnit celý jeho potenciál."
 india_events.13.b: "Chlapec patří ke svému otci, daleko od okultismu."
 krishnamurti_chain_end_tt: "[SCOPE.sCharacter('krishnamurti_scope').GetFullName] prožije obyčejný život se svou rodinou"
 krishnamurti_chain_adopted_tt: "[SCOPE.sCharacter('krishnamurti_scope').GetFullName] bude adoptován do Teosofické společnosti a vychován, aby se stal #bold Světovým učitelem#!"
 india_events.14.t: "Řád Hvězdy na východě"
 india_events.14.d: "Teosofická společnost založila organizaci zasvěcenou přípravě světa na příchod božského Pána Maitréji. [SCOPE.sCharacter('krishnamurti_scope').GetFullName], považovaný za budoucí schránku této bytosti, byl jmenován do čela organizace."
 india_events.14.f: "#bold Prohlášení zásad#!\n\n1. Věříme, že se ve světě brzy objeví velký Učitel, a přejeme si již nyní žít tak, abychom byli hodni jej poznat, až přijde.\n\n2. Budeme se proto snažit mít jej stále na mysli a konat v jeho jménu, a tedy podle svých nejlepších schopností, veškerou práci, která k nám přichází v našich každodenních povinnostech.\n\n3. Pokud nám to naše běžné povinnosti dovolí, budeme se snažit každý den věnovat část svého času nějaké určité práci, která může pomoci připravit jeho příchod." #- Principles of the Order of the Star in the East
 india_events.14.a: "Prostředek, jak inspirovat svět."
 india_events.14.b: "Řád k uskutečnění naší pozemské agendy."
 india_events.15.t: "Božská inspirace"
 india_events.15.d: "Během duchovního ústraní ve státě [SCOPE.sState('california_state').GetName] zasáhly [SCOPE.sCharacter('krishnamurti_scope').GetFullName] zvláštní fyzické příznaky a silný pocit „jinakosti“. [SCOPE.sCharacter('krishnamurti_scope').GetSheHe|U] i [SCOPE.sCharacter('krishnamurti_scope').GetHerHis] průvodci z Teosofické společnosti věří, že tento proces má mystickou povahu."
 india_events.15.f: "„Je to, jako by se všechno zastavilo. Není tu pohyb, žádné zachvění, naprostá prázdnota veškeré myšlenky, veškerého vidění. Není tu žádný vykladač, který by překládal, pozoroval, cenzuroval. Nesměrná rozlehlost, která je naprosto nehybná a tichá. Není tu prostor ani čas, jenž by tento prostor pokryl. Počátek a konec všech věcí jsou zde. Opravdu o tom nelze říci nic.“" #- Krishnamurti's Notebook
 india_events.15.a: "Mohla by to být pravda? Dotklo se ho božství?"
 india_events.15.b: "Tento muž je pouze ztrápený, nic víc."
 india_events.16.t: "Země bez cest"
 india_events.16.d: "V oznámení na každoročním shromáždění Řádu Hvězdy ve státě [SCOPE.sState('star_camp_state').GetName] se [SCOPE.sCharacter('krishnamurti_scope').GetFullName] zřekl svých následovníků a prohlásil Řád za rozpuštěný. Toto oznámení uvrhlo Teosofickou společnost do zmatku."
 india_events.16.f: "„Tvrdím, že pravda je země bez cest a že se k ní nemůžete přiblížit žádnou cestou, žádným náboženstvím, žádnou sektou. To je můj pohled a toho se držím naprosto a bezpodmínečně. Pravda, protože je neomezená, nepodmíněná a nepřístupná jakoukoli cestou, nemůže být organizována; ani by neměla vzniknout žádná organizace, která by lidi vedla či nutila po určité cestě. Toto není žádný velkolepý čin, protože nechci následovníky, a myslím to vážně. Ve chvíli, kdy někoho následujete, přestáváte následovat Pravdu.“" #- Krishnamurti, 1929
 india_events.16.a: "Věc svobody nevyžaduje žádného vůdce."
 india_events.16.b: "Jen Světový učitel mohl být tak pokorný."
 india_events.16.c: "Možná je čas, aby odešel do ústraní."
 india_events.17.t: "Spiknutí v [SCOPE.sState('khudiram_state').GetFarmHubName]"
 india_events.17.d: "Průvod kočárů ulicemi [SCOPE.sState('khudiram_state').GetFarmHubName] byl přerušen bombovým útokem, při němž byly zabity dvě [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] ženy. Jeden z pachatelů, [SCOPE.sCharacter('khudiram_scope').GetFullName], byl vzat do vazby."
 india_events.17.f: "Na tváři mladého muže nebyla ani stopa po obavách, přestože po jeho boku stál ozbrojený policista a před ním nepřátelský soudce. Záda měl vzpřímená, ramena uvolněná a na tváři blažený úsměv.\n\nO výsledku procesu nebylo nikdy pochyb, a to ani se schopným obhájcem po jeho boku. Jeho omyl byl osudný, jeho konec byl jistý od chvíle, kdy ho spatřili strážníci. Starosti života z něj vyprchaly a nechaly ho bez břemene. Nezbývalo než zajistit, aby se na něj nezapomnělo."
 india_events.17.a: "Jeho zločiny si zaslouží popravu oběšením."
 india_events.17.b: "Doživotní vězení mu zabrání stát se mučedníkem."
 khudiram_in_jail_tt: "[SCOPE.sCharacter('khudiram_scope').GetFullName] bude odsouzen k doživotnímu vězení"
 krishnamurti_exile_tt: "[SCOPE.sCharacter('krishnamurti_scope').GetFullName] odejde do [concept_exile] a stane se naverbovatelným [concept_agitator]"
