 invite_princely_states_cooldown_tt: "Neprovedl tuto akci za poslední #b rok#!"
 je_federation_of_india_invite_princely_states: "Pozvat knížecí státy"
 je_federation_of_india_invite_princely_states_desc: "Podle podmínek naší ústavy může každý knížecí stát, který si přeje přistoupit k [ROOT.GetCountry.GetNameNoFlag], tak učinit podle vlastní vůle. Pokud si to přejeme, můžeme tento proces urychlit hromadným rozesláním pozvánek těm knížecím státům, které s námi udržují obzvláště dobré vztahy."
 federation_of_india.1.t: "[SCOPE.sCountry('india_scope').GetNameNoFlag] nabízí přistoupení"
 federation_of_india.1.d: "Vláda země [SCOPE.sCountry('india_scope').GetNameNoFlag] formálně vyzvala [ROOT.GetCountry.GetName] k přistoupení k [SCOPE.sCountry('india_scope').GetCustom('get_federation_union')] země [SCOPE.sCountry('india_scope').GetNameNoFormatting]. Ačkoli [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a [ROOT.GetCountry.GetRuler.GetHerHis] rodina obdrží vládní apanáž, [ROOT.GetCountry.GetRuler.GetHerHis] doba nezávislé vlády skončí."
 federation_of_india.1.f: "„Já, _______, vládce _______, při výkonu své svrchovanosti ve svém zmíněném státě a nad ním tímto vydávám tuto listinu jako svůj Nástroj přistoupení a,\n\n1. Tímto prohlašuji, že přistupuji k [ROOT.GetCountry.GetCustom('get_federation_union')] země $BHT$ s úmyslem, aby [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], federální zákonodárný sbor, federální soud a jakákoli jiná autorita zřízená pro účely [ROOT.GetCountry.GetCustom('get_federation_union')] na základě tohoto mého Nástroje přistoupení, vždy však za podmínek v něm uvedených a pouze pro účely [ROOT.GetCountry.GetCustom('get_federation_union')], vykonávaly ve vztahu ke státu _______.“"
 federation_of_india.1.a: "Podepište Nástroj."
 federation_of_india.1.b: "Naši svrchovanost nelze koupit."
 federation_of_india.2.t: "Indie nedělitelná"
 federation_of_india.2.d: "Poslední z knížecích států byly začleněny do [SCOPE.sCountry('india_scope').GetCustom('get_federation_union')]. Autorita země [ROOT.GetCountry.GetName] nyní sahá přes celý subkontinent."
 federation_of_india.2.f: "„Ty jsi vládce myslí všeho lidu,\nrozdavatel osudu Indie.\nTvé jméno rozechvívá srdce Paňdžábu, Sindhu, Gudžarátu a Maráthů,\nDrávidů, Urísy a Bengálska.\nOzývá se v pahorcích Vindhji a Himálaje, mísí se s hudbou Jamuny a Gangy\na zpívají je vlny Indického oceánu.\nModlí se za tvé požehnání a pějí tvou chválu.\nSpása všeho lidu čeká v tvých rukou,\nty rozdavateli osudu Indie.\nVítězství, vítězství, vítězství tobě.“\n\n— Rabíndranáth Thákur, „Džana Gana Mana“"
 federation_of_india.2.a: "Vítězství, vítězství, vítězství Tobě!"
 federation_of_india.3.t: "Žádný kompromis"
 federation_of_india.3.d_cr: "Vzestup komunistické vlády v zemi [ROOT.GetCountry.GetName] způsobil zhroucení vztahů se zbývajícími knížecími státy. Pokud mají být tyto koloniální přežitky vymazány z mapy, stane se tak na hrotu bajonetu."
 federation_of_india.3.d_infamy: "Agrese [ROOT.GetCountry.GetAdjective] vlády způsobila zhroucení vztahů se zbývajícími knížecími státy. Pokud mají být začleněny do [SCOPE.sCountry('india_scope').GetCustom('get_federation_union')], stane se tak na hrotu bajonetu."
 federation_of_india.3.f: "„Povaha vlády, která se prohlašuje za zástupkyni celé Indie, je zásadně neslučitelná s povahou státu [SCOPE.sCountry('relevant_country').GetNameNoFormatting]. Prokázala, že není ochotna dosáhnout spravedlivých dohod s ostatními indickými státy. Obávám se, že bez zásadní změny diplomatického postoje vlády [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting] nemůže žádná strana dosáhnout konstruktivního a trvalého urovnání, ať už pro [ROOT.GetCountry.GetCustom('get_federation_union')], nebo jinak.\n\nProto já, svrchovaný [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('relevant_country').GetNameNoFormatting], v souladu se svými rovnocennými protějšky mezi ostatními indickými státy oznamuji svou neurčitou neúčast na dotyčné [ROOT.GetCountry.GetCustom('get_federation_union')].“"
 federation_of_india.3.a: "Indie bude jednotná, perem nebo mečem."
 federation_of_india.3.b: "Revoluci nelze provádět v hedvábných rukavicích."
 federation_of_india.4.t: "[SCOPE.sCountry('relevant_princely_state').GetName] žádá o přistoupení"
 federation_of_india.4.d: "[SCOPE.sCountry('relevant_princely_state').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('relevant_princely_state').GetNameNoFlag] požádal o přistoupení [SCOPE.sCountry('relevant_princely_state').GetRuler.GetHerHis] státu k [ROOT.GetCountry.GetCustom('get_federation_union')] země $BHT$."
 federation_of_india.4.f: "„Já, [SCOPE.sCountry('relevant_princely_state').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('relevant_princely_state').GetRuler.GetLastNameNoFormatting], vládce země [SCOPE.sCountry('relevant_princely_state').GetNameNoFormatting], při výkonu své svrchovanosti ve svém zmíněném státě a nad ním tímto vydávám tuto listinu jako svůj Nástroj přistoupení a,\n\n1. Tímto prohlašuji, že přistupuji k [ROOT.GetCountry.GetCustom('get_federation_union')] země $BHT$ s úmyslem, aby [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], federální zákonodárný sbor, federální soud a jakákoli jiná autorita zřízená pro účely [ROOT.GetCountry.GetCustom('get_federation_union')] na základě tohoto mého Nástroje přistoupení, vždy však za podmínek v něm uvedených a pouze pro účely [ROOT.GetCountry.GetCustom('get_federation_union')], vykonávaly ve vztahu ke státu [SCOPE.sCountry('relevant_princely_state').GetNameNoFormatting].“" #- Lightly modified version of the official Instrument of Accession.
 federation_of_india.4.a: "Moudrá volba."
 federation_of_india.4.b: "Další území nepotřebujeme."
