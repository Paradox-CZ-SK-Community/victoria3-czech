 progressbar_above_50_tt: "Hodnota #b ukazatele postupu#! je vyšší nebo rovna #v 50#!"
 dyer_retire_into_obscurity_tt: "[SCOPE.sCharacter('dyer_scope').GetFullName] odejde do ústraní a upadne v zapomnění"
 dyer_fate_disciplined: "[SCOPE.sCharacter('dyer_scope').GetSheHe|U] se vrací domů v hanbě, zbaven hodnosti a vyznamenání."
 dyer_fate_unrepentant: "[SCOPE.sCharacter('dyer_scope').GetSheHe|U] byl proimperialistickými občany uvítán peněžním darem a mečem cti."
 home_rule_is_over_tt: "Veškeré naděje na #bold smíření#! mezi #bold britskými#! úřady a #bold indickými#! poddanými skončily."
 india_can_change_governance_principles_tt: "[SCOPE.sCountry('india_scope').GetName] bude moci změnit svůj [concept_law] #bold rozdělení moci#!"
 je_india_home_rule_progressbar: "Samospráva"
 je_india_home_rule_progressbar_desc: "Postup: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
