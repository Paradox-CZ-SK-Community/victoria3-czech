 india_nationalism_events.6.t: "Indická liga"
 india_nationalism_events.6.d_1: "Indičtí nacionalisté žijící v [ROOT.GetCountry.GetCapital.GetCityHubName] založili Indickou ligu, organizaci zasvěcenou obhajobě indické nezávislosti. Mezi členy Ligy patří několik poslanců zasedajících za [SCOPE.sParty('india_league_party').GetName]."
 india_nationalism_events.6.d_2: "Indičtí nacionalisté žijící v [ROOT.GetCountry.GetCapital.GetCityHubName] založili Indickou ligu, organizaci zasvěcenou obhajobě indické nezávislosti. Mezi členy Ligy patří významné politické osobnosti, například [SCOPE.sCharacter('india_league_character').GetFullName]."
 india_nationalism_events.6.f: "„Johne, byla jsem s dámami na odpoledním čaji a přistoupila k nám mladá žena s nanejvýš matoucí peticí. Zpočátku jsem si myslela, že je to nějaký podivný žert od Emmy. Víte, jaká je se svými nápady. Ale zdá se, že ta žena to myslela zcela vážně. Řekla, že je součástí Indické ligy a že prosazují indickou nezávislost. Jakmile bylo zřejmé, že nejde o žert, zeptali jsme se jí, kdo podle nich povede Indy místo nás. Jako by celá ta představa už tak nebyla dost směšná, navrhla, že se povedou sami!\n\nNevím, odkud ty děti takové nápady berou. Předpokládám, že to je cena za to, že jsme některým těm Indům dovolili tady studovat a pracovat!“"
 india_nationalism_events.6.a: "Ušlechtilá věc."
 india_nationalism_events.6.b: "Jak... svérázné."
 india_nationalism_events.7.t: "Stav Indie"
 india_nationalism_events.7.d: "Indická liga zveřejnila zprávu o poměrech v zemi [SCOPE.sCountry('india_scope').GetName], v níž upozorňuje na krajní chudobu a politiku represí vůči nacionalistickým aktivistům."
 india_nationalism_events.7.f: "Důstojník si prohlížel telegram na stole a na rtech mu pohrával úšklebek. Generální guvernér mu napsal, aby si stěžoval na Indickou ligu a její obsáhlý dokument o zacházení s Indy v Indii. Guvernér zuřil, že ministerstvo vnitra dalo Lize jakýkoli prostor k nadechnutí. Důstojník s guvernérem soucítil, ale nemohl si pomoct a musel se zasmát. Jistěže indický lid znal svůj stav. Čeho chtěla Liga dosáhnout? Jejich věc by podpořil jen zrádce. Už to, že některým Indům dovolili přijít studovat do této velké země, bylo dostatečnou laskavostí."
 india_nationalism_events.7.a: "S tím se musí něco udělat."
 india_nationalism_events.7.b: "Nařiďte zákaz tohoto díla v Indii."
 notification_prisoner_out_of_jail_name: "[SCOPE.sCharacter('prisoner_scope').GetFullName] propuštěn z vězení"
 notification_prisoner_out_of_jail_desc: "[SCOPE.sCharacter('prisoner_scope').GetFullName], dříve zatčený kvůli obviněním souvisejícím s [SCOPE.sCharacter('prisoner_scope').GetHerHis] politickou činností, byl propuštěn z vězení."
