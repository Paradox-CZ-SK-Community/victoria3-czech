 bic_end_company_rule_desc: "Experiment s vládou soukromé korporace se vyčerpal. Chceme-li normalizovat své vztahy s našimi poddanými, musíme Indii podřídit přímé vládě Parlamentu a [GetPlayer.GetTopOverlord.GetRuler.GetPrimaryRoleTitle]."
