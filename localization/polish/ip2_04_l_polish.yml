 notification_not_combatting_hindu_german_conspiracy_desc: "Naše zpravodajská služba v zemi [SCOPE.sCountry('india_scope').GetName] odhalila spiknutí indických revolucionářů spolupracujících s agenty [SCOPE.sCountry('enemy_great_power_scope').GetAdjective] vlády. [SCOPE.sCountry('india_scope').GetAdjective] správa při vyšetřování nepostupovala právě aktivně."
