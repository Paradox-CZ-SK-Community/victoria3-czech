 notification_koh_i_noor_not_sent_name: "Diamant Koh-i-Noor zůstává v Indii"
 notification_koh_i_noor_not_sent_desc: "Legendární diamant Koh-i-Noor, dříve vlastněný Mughalskou, Perskou a Sikhskou říší, byl ukořistěn našimi silami v Indii. Diamant byl odeslán do pokladnice v [SCOPE.sCountry('india_scope').GetCapital.GetCityHubName] jako válečná kořist."
 notification_koh_i_noor_not_sent_tooltip: "#header $notification_koh_i_noor_not_sent_name$#!\n$TOOLTIP_DELIMITER$\n$notification_koh_i_noor_not_sent_desc$"
 notification_koh_i_noor_returned_name: "[SCOPE.sCountry('koh_i_noor_owner_scope').GetName] vrací diamant Koh-i-Noor"
 notification_koh_i_noor_returned_desc: "[SCOPE.sCountry('koh_i_noor_owner_scope').GetAdjective] vláda souhlasila s vrácením diamantu Koh-i-Noor zemi [ROOT.GetCountry.GetNameNoFlag] jako symbolu usmíření mezi ní a jejími bývalými koloniálními poddanými."
 notification_koh_i_noor_returned_tooltip: "#header $notification_koh_i_noor_returned_name$#!\n$TOOLTIP_DELIMITER$\n$notification_koh_i_noor_returned_desc$"
 notification_koh_i_noor_not_returned_name: "[SCOPE.sCountry('koh_i_noor_owner_scope').GetName] odmítá vrátit diamant Koh-i-Noor"
 notification_koh_i_noor_not_returned_desc: "Současní držitelé diamantu Koh-i-Noor v zemi [SCOPE.sCountry('koh_i_noor_owner_scope').GetName] odmítli diamant Koh-i-Noor vrátit s tvrzením, že jim právem náleží podle podmínek smlouvy podepsané s jeho předchozími vlastníky."
