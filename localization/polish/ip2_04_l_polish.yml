 demand_return_of_koh_i_noor_desc: "Naši bývalí koloniální páni během období své vlády odvezli z Indie legendární diamant Koh-i-Noor a uložili jej do vlastních trezorů. Vzneseme požadavek, aby nám byl ukradený majetek naší země vrácen."
