 to_jail_5_tt: "[SCOPE.sCharacter('prisoner_scope').GetFullName] bude #bold uvězněn#! na #v 5 let#!"
 to_jail_10_tt: "[SCOPE.sCharacter('prisoner_scope').GetFullName] bude #bold uvězněn#! na #v 10 let#!"
 to_jail_exonerated_tt: "Obvinění proti [SCOPE.sCharacter('prisoner_scope').GetFullName] budou stažena"
 send_to_jail: "Uvěznit agitátora"
 send_to_jail_desc: "#lore Soudit a uvěznit [Character.GetFullName] za všechny zločiny, které [Character.GetSheHe] mohl spáchat.#!"
 jail.1.t: "Do vězení"
 jail.1.d: "[SCOPE.sCharacter('prisoner_scope').GetFullName] byl zatčen a postaven před soud za zločiny související s [SCOPE.sCharacter('prisoner_scope').GetHerHis] politickou agitací. [SCOPE.sCharacter('prisoner_scope').GetSheHe|U] čelí nepřívětivému soudci a v případě odsouzení dlouhému trestu vězení."
 jail.1.f: "„[SCOPE.sCharacter('prisoner_scope').GetCustom('getMsMr')] [SCOPE.sCharacter('prisoner_scope').GetLastNameNoFormatting], povstaňte prosím a přistupte k řečništi.“\n\n[SCOPE.sCharacter('prisoner_scope').GetSheHe|U] poslechl. Nemělo valný smysl se vzpírat. Proces nebyl dlouhý, ani nebyl podle žádného rozumného měřítka spravedlivý. Nešlo o to, zda bude [SCOPE.sCharacter('prisoner_scope').GetSheHe] uznán vinným, či nikoli, ale spíše o to, jak snesitelný bude trest.\n\n„[SCOPE.sCharacter('prisoner_scope').GetCustom('getMsMr')] [SCOPE.sCharacter('prisoner_scope').GetLastNameNoFormatting], byl jste uznán vinným ze zločinu pobuřující pomluvy. Po důkladném přezkoumání okolností tohoto případu vás soud tímto odsuzuje...“"
 jail.1.a: "Tříletý trest, aby si [SCOPE.sCharacter('prisoner_scope').GetHerHim] připomněl [SCOPE.sCharacter('prisoner_scope').GetHerHis] místo."
 jail.1.b: "Pětiletý trest dostane [SCOPE.sCharacter('prisoner_scope').GetHerHim] z očí veřejnosti."
 jail.1.c: "[SCOPE.sCharacter('prisoner_scope').GetSheHe|U] zkoušel naši trpělivost příliš dlouho. Deset let."
 jail.1.e: "Nechceme fiasko. Nechte [SCOPE.sCharacter('prisoner_scope').GetHerHim] odejít s varováním."
