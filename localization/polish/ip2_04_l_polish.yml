 CAN_USE_DOCTRINE_OF_LAPSE_INSTEAD: "Místo toho můžete použít [GetDiplomaticActionType('invoke_doctrine_of_lapse').GetName]"
 britain_might_abandon_india_tt: "Pokud vypukne [concept_civil_war], [ROOT.GetCountry.GetTopOverlord.GetName] se může rozhodnout #b opustit Indii#!"
 princely_state_lapsed_tt: "[SCOPE.sCountry('target_country').GetName] obdrží [Concept('concept_diplomatic_demand', '$concept_diplomatic_demand_short$')] za účelem #b anexe#!"
 india_nationalism_events.1.t: "Anarchie"
 india_nationalism_events.1.d: "Nekontrolované nepokoje v zemi [SCOPE.sCountry('india_scope').GetName] vedly k vypuknutí občanské války napříč indickým subkontinentem. Osobnosti napříč [ROOT.GetCountry.GetAdjective] společností navrhují ponechat hroutící se subkontinent jeho osudu."
 india_nationalism_events.1.f: "[SCOPE.sCharacter('british_politician_scope').GetFullNameNoFormatting], vysoce postavený politik a profesor orientálních studií, byl tázán na stav Indie a na to, zda existuje nějaká naděje na obnovení vlády. Řekl toto:\n\n„Jsou to starobylý lid, příliš starý na to, aby se naučil umění vládnout. Vedeni svými takzvanými vůdci, chaos je tím nejlepším, co od nich můžeme očekávat. Byli jsme jejich laskavými průvodci; bez nás jsou očividně ztraceni.“"
 india_nationalism_events.1.a: "Evakuujte náš personál a dejte od této záležitosti ruce pryč."
 india_nationalism_events.1.b: "Indie už byla pacifikována dříve. Bude znovu."
 india_nationalism_events.2.t: "Evakuace"
 india_nationalism_events.2.d: "Vypuknutí otevřené občanské války napříč Indií zlomilo odhodlání [SCOPE.sCountry('overlord_scope').GetAdjective] vlády. Nařídila zrušení naší správy a všem [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] občanům okamžitou evakuaci z Indie."
 india_nationalism_events.2.f: "#bold [TimeKeeper.GetCurrentDate.GetString]#!\n#bold Imperiální gymkhana klub v [ROOT.GetCountry.GetCapital.GetCityHubName]#!\nVšem členům,\ns velkým zármutkem vás musím požádat, abyste opustili svou povinnost vůči Indii. Její nevděčný lid se rozhodl plivnout na samotnou ruku, která jej pozvedla. Rozlučte se s našimi velkými díly a vydejte se k přístavům, které vybudovali naši předkové; naposledy z nich odplujeme."
 india_nationalism_events.2.a: "Spalte naše dokumenty a zamiřte k přístavům."
 india_nationalism_events.2.b: "Oznamte oficiální předání moci [SCOPE.sCountry('revolution_scope').GetRuler.GetFullName]."
 india_nationalism_events.2.c: "Vybojujeme si vlastní zemi z [SCOPE.sState('calcutta_scope').GetCityHubName]."
 is_princely_state_tt: "Je [concept_princely_state]"
 every_indian_subject_made_independent_tt: "Naše #b indické#! [Concept('concept_subject','$concept_subjects$')] se stanou #b nezávislými#!"
 european_pops_may_flee_tt: "[Concept('concept_pop', '$concept_pops$')] v #bold Indii#! s [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_group_short$')] $heritage_group_european$ [Concept('concept_heritage_trait','$concept_heritage_trait_short$')] mohou uprchnout na naše zbývající území"
 most_european_pops_abandon_india_tt: "Velké množství #bold evropských#! [Concept('concept_pop','$concept_pops$')] evakuuje [ROOT.GetCountry.GetName]"
 some_european_pops_abandon_india_tt: "Velká část naší #bold evropské#! [Concept('concept_pop','$concept_population$')] se evakuuje do [SCOPE.sState('calcutta_scope').GetName]"
 bengal_free_state_tt: "Vyhlásíme svou svrchovanost jako #bold $dyn_c_bengal_free_state$#!"
 india_nationalism_events.3.t: "Solný pochod"
 india_nationalism_events.3.d: "Indičtí aktivisté za nezávislost vedení [SCOPE.sCharacter('prisoner_scope').GetFullName] pochodovali k pobřeží státu [SCOPE.sState('salt_march_state').GetName], aby protestovali proti státnímu monopolu na sůl. Po příchodu na břeh úmyslně porušili zákon sběrem soli."
 india_nationalism_events.3.f: "#bold Solné nepokoje v [SCOPE.sState('salt_march_state').GetPortHubName]!#!\n\nDne [TimeKeeper.GetCurrentDate.GetString] dorazila do [SCOPE.sState('salt_march_state').GetPortHubName] velká skupina s jasným úmyslem porušit imperiální zákon. Sbírali mořskou vodu a vařili ji, aby vyrobili sůl. Téměř všichni shromáždění byli zatčeni.\n\nZeptali jsme se vůdce pochodu, vysoce postaveného člena [SCOPE.sPoliticalLobby('anti_overlord_lobby').GetNameNoFormatting], co hodlají se solí dělat. Vysvětlil, že považují daň ze soli za neudržitelnou a chtějí uplatnit své právo na samosprávu prostřednictvím tohoto nenásilného protestu. Pokud to čtenáře pobavilo, není v tom sám! Ale alespoň si může být jistý, že nacionalistické hnutí je v neškodných rukou."
 india_nationalism_events.3.a: "Naše věznice mají místo pro všechny."
 india_nationalism_events.3.b: "Sláva porušovateli zákona!"
 modifier_salt_tax_protests: "Protesty proti dani ze soli"
 india_nationalism_events.4.t: "Natalský indický kongres"
 india_nationalism_events.4.d: "Indický právník jménem [SCOPE.sCharacter('gandhi_scope').GetFullName] založil Natalský indický kongres, organizaci zasvěcenou obhajobě práv [ROOT.GetCountry.GetAdjective] indické populace."
 india_nationalism_events.4.f: "#bold Další zrádný hlas#!\n\nDne [TimeKeeper.GetCurrentDate.GetString] byl založen Natalský indický kongres – další organizace v řadě vzpurných skupin nespokojených se současnou vládou. Vedeni mladým indickým advokátem [SCOPE.sCharacter('gandhi_scope').GetFullNameNoFormatting], zdá se, že se zaměřují na úděl Indů. Naši bystřejší čtenáři to nebudou považovat za překvapivé, neboť nedávno bylo oznámeno, že [SCOPE.sCharacter('gandhi_scope').GetLastNameNoFormatting] požaduje volební právo pro indický lid. Snad můžeme nalézt útěchu ve vědomí, že navzdory svým velkým vzpurným představám zůstávají tyto skupiny nejednotné."
 india_nationalism_events.4.a: "Indická komunita našla svého zastánce."
 india_nationalism_events.4.b: "Uvidíme, jak si poradí s davem v [SCOPE.sState('gandhi_state').GetCityHubName]."
 india_nationalism_events.5.t: "Satjágraha"
 india_nationalism_events.5.d: "Po mnoha letech strávených v zahraničí se [SCOPE.sCharacter('gandhi_scope').GetFullName] vrátil do země [ROOT.GetCountry.GetName]. Svou teorii satjágrahy, neboli „pevného setrvání v pravdě“, využil na podporu indického hnutí za nezávislost."
 india_nationalism_events.5.f: "Když advokát, nedávno navrácený ze svých cest v zahraničí, hovoří už šestou hodinu, shromáždění je netečné.\n\n„Bystrý mladík!“ utrousí člen Kongresu.\n\n„Za koho se považuje?“ odpoví jiný. „Zdá se, že se pokládá za nejchytřejšího v místnosti; každé jeho prohlášení zaručuje našim nepřátelům munici zdarma.“"
 india_nationalism_events.5.a: "Hrdina se vrací do své rodné země."
 india_nationalism_events.5.b: "Nařiďte novinám, aby o tom mlčely."
