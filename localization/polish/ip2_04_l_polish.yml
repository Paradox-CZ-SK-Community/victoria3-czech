 bht_end_privy_purse_payments_desc: "#b $modifier_privy_purse_payments$#!, které vyplácíme bývalým vládnoucím rodinám #b knížecích států#!, jež jsme anektovali, dohromady tvoří značnou část našeho rozpočtu. Tyto platby můžeme předčasně ukončit za cenu rozhněvání aristokratů, kteří se na nich stali závislými."
