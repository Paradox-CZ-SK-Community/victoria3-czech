 india_events.1.t: "Kaisar-i-Hind"
 india_events.1.d_1: "Se zřízením korunní vlády nad Indií požádal [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] předsedu vlády, aby [SCOPE.sCharacter('ruler_scope').GetHerHim] nabídl titul „[SCOPE.sCharacter('ruler_scope').GetCustom('getEmpressEmperor')] Indie“."
 india_events.1.d_2: "Se zřízením korunní vlády nad Indií přijal [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] titul „[SCOPE.sCharacter('ruler_scope').GetCustom('getEmpressEmperor')] Indie“."
 india_events.1.f_1: "„Nechť je tedy uzákoněno nejvznešenějším Veličenstvem [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle], se souhlasem a radou duchovních i světských lordů a Dolní sněmovny, shromážděných v tomto současném Parlamentu, a z jeho moci takto:\n\nBude zákonné, aby [SCOPE.sCharacter('ruler_scope').GetHerHis|U] nejmilostivější Veličenstvo s ohledem na výše zmíněné uznání převodu vlády nad Indií prostřednictvím [SCOPE.sCharacter('ruler_scope').GetHerHis|U] královské proklamace pod Velkou pečetí Spojeného království učinilo takový dodatek ke stylu a titulům nyní náležejícím Imperiální koruně Spojeného království a jeho držav, jak se [SCOPE.sCharacter('ruler_scope').GetHerHis|U] Veličenstvu bude zdát vhodné.“"
 india_events.1.f_2: "„Nechť je tedy uzákoněno nejvznešenějším Veličenstvem [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle], se souhlasem a radou duchovních i světských lordů takto:\n\nBude zákonné, aby [SCOPE.sCharacter('ruler_scope').GetHerHis|U] nejmilostivější Veličenstvo s ohledem na výše zmíněné uznání převodu vlády nad Indií prostřednictvím [SCOPE.sCharacter('ruler_scope').GetHerHis|U] královské proklamace pod Velkou pečetí Spojeného království učinilo takový dodatek ke stylu a titulům nyní náležejícím Imperiální koruně Spojeného království a jeho držav, jak se [SCOPE.sCharacter('ruler_scope').GetHerHis|U] Veličenstvu bude zdát vhodné.“"
 india_events.1.a: "Bůh ochraňuj [SCOPE.sCharacter('ruler_scope').GetCustom('getEmpressEmperor')]!"
 india_events.1.b: "Doporučte [SCOPE.sCharacter('ruler_scope').GetHerHim], aby od tohoto postupu upustil."
 india_events.1.c: "„[SCOPE.sCharacter('ruler_scope').GetCustom('getEmpressEmperor')] Velké Británie, Irska a Indie“ by byl ještě velkolepější titul."
