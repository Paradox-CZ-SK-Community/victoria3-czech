 notification_combatting_hindu_german_conspiracy_name: "Odhaleno hindsko-[SCOPE.sCountry('enemy_great_power_scope').GetName] spiknutí"
 notification_combatting_hindu_german_conspiracy_desc: "Naše zpravodajská služba v zemi [SCOPE.sCountry('india_scope').GetName] odhalila spiknutí indických revolucionářů spolupracujících s agenty [SCOPE.sCountry('enemy_great_power_scope').GetAdjective] vlády. [SCOPE.sCountry('india_scope').GetAdjective] správa zahajuje zátah, aby podezřelé dopadla."
