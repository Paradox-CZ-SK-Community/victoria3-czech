 notification_koh_i_noor_sent_name: "Diamant Koh-i-Noor předán panovníkovi"
 notification_koh_i_noor_sent_desc: "Legendární diamant Koh-i-Noor, dříve vlastněný Mughalskou, Perskou a Sikhskou říší, byl ukořistěn našimi silami a na rozkaz indického [SCOPE.sCountry('india_scope').GetRuler.GetPrimaryRoleTitle] odeslán do [SCOPE.sCountry('overlord_scope').GetCapital.GetCityHubName]. Diamant byl předán [SCOPE.sCountry('overlord_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('overlord_scope').GetRuler.GetFullName] jako válečná kořist."
