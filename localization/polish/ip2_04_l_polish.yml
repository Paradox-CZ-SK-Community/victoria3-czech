 princely_state_creation.1.t: "Balúčistánská agentura"
 princely_state_creation.1.d: "Získáním [SCOPE.sState('baluchistan_state').GetName] jsme zřídili Balúčistánskou agenturu, aby koordinovala správu této oblasti. Byly předloženy návrhy na navrácení částí Balúčistánu pod domorodou vládu."
 princely_state_creation.1.f: "„Jediný stát by zvýšil naši administrativní odpovědnost. Nechme tyto malé muže vládnout jejich malým državám. My se mezitím můžeme soustředit na obsazení naší hranice posádkami. Zajistěte, aby se žádný Afghánec, Peršan ani Rus neodvážil snít o tom, že se k nám přiblíží.“\n\n„Dejte pěti mužům pět států k vládnutí a vytvoříte pět vládců, kteří budou snít o jejich sjednocení. Indie už má více knížat než celá Evropa. Opravdu si přejete jejich počet ještě navýšit?“"
 princely_state_creation.1.a: "Rozdělte jižní oblasti našim loajálním knížatům."
 princely_state_creation.1.b: "Rozdělte oblast s kalátskou svrchovaností nad Makránem."
 princely_state_creation.1.c: "Zřiďte Kalát jako stát s devatenáctidělovým pozdravem."
 princely_state_creation.1.e: "Vysoký komisař může nad provincií převzít plnou kontrolu."
 princely_state_creation.2.t: "Dobytí Sindhu"
 princely_state_creation.2.d: "Před naším získáním [SCOPE.sState('sindh_state').GetName] byla oblast rozdělena mezi různé větve tálpúrské dynastie. Byly předloženy návrhy na zřízení knížecího státu v Sindhu pod poslušnými tálpúrskými vládci."
 princely_state_creation.2.f: "„Peccavi,“ stálo v telegramu. Pobočník pohlédl na svého nadřízeného a pozvedl obočí.\n\n„Zpráva zní: „Peccavi“. Kódová fráze?“\n\nDůstojník zvedl oči od hlášení, které četl. „Zhřešil jsem,“ řekl.\n\n„Má Sindh?“\n\n„Ano, má Sindh.“\n\n„Chápu.“"
 princely_state_creation.2.a: "Dovolte severní tálpúrské dynastii zůstat u moci."
 princely_state_creation.2.b: "Zřiďte celý Sindh jako stát s devatenáctidělovým pozdravem."
 princely_state_creation.2.c: "Začleňte celý Sindh do Bombajského prezidentství."
 princely_state_creation.3.t: "Severozápadní hranice"
 princely_state_creation.3.d: "Naše získání [SCOPE.sState('pashtunistan_state').GetName] posunulo naši hranici až k Pamíru. Byly předloženy návrhy na svěření správy této odlehlé oblasti poslušným domorodým vládcům."
 princely_state_creation.3.f: "„Knížecí státy tak blízko nepřátelských hranic? Nezodpovědné a pošetilé. Území jsme dobyli, teď si ho udržme.“\n\n„Střežit území a spravovat je jsou dvě různé věci. Proč vynakládat muže a prostředky na řízení státu, když můžeme nechat vládnout místní a z jejich daní financovat naše posádky?“"
 princely_state_creation.3.a: "Udělte autonomii loajálním vládcům této oblasti."
 princely_state_creation.3.b: "Rozšiřte území Čitrálu na celý sever."
 princely_state_creation.3.c: "Domorodí vládci se ukázali jako nespolehliví."
 princely_state_creation.4.t: "Amritsarská smlouva"
 princely_state_creation.4.d: "Naše nově získaná provincie [SCOPE.sState('kashmir_state').GetName] byla kdysi sama o sobě mocným královstvím. Byly předloženy návrhy na zřízení nového, mocného knížecího státu, který by tuto oblast spravoval."
 princely_state_creation.4.f: "„Hindové nemají rádi mohamedány, mohamedáni nemají rádi sikhy a sikhové nemají rádi nikoho. Jaké kníže by je všechny vůbec dokázalo zkrotit?“\n\n„Takže místo toho, abyste nechal nějaké pošetilé kníže pokusit se je všechny udržet na uzdě, uděláte z toho náš problém? Tak málo vám záleží na spánku?“"
 princely_state_creation.4.a: "Zřiďte Džammú a Kašmír jako stát s jednadvacetidělovým pozdravem."
 princely_state_creation.4.b: "Žádná taková smlouva není nutná."
 princely_state_creation.5.t: "Šanské státy"
 princely_state_creation.5.d: "Nově získané [SCOPE.sState('shan_state').GetName] jsou uspořádány jako složitá mozaika různých šanských knížectví. Byly předloženy návrhy na jejich uspořádání jako konfederace knížecích států pod jejich současnými formami vlády se společným rezidentem."
 princely_state_creation.5.f: "„Tyto pohraniční oblasti jsou velkým zdrojem příjmů, ale jejich správa je obtížná. Jsou roztříštěné a hornaté, takže potrvá, než se naši lidé obeznámí s terénem.“\n\n„Možná si můžeme vzít příklad z dějin. Svažme šanské Saophy do federace. Mohou vládnout, jak chtějí, dokud centrální fond dostává svůj podíl. Jak časem naši výběrčí poznají cesty, federaci už nebudeme potřebovat.“"
 princely_state_creation.5.a: "Udělte jim autonomii pod jejich vlastními vládci se společným rezidentem."
 princely_state_creation.5.b: "Začleňte je jako Šanský distrikt."
