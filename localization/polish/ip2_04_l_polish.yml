 home_rule_progress_from_pacifist_government: "pacifistická vláda [Concept('concept_overlord','$suzerain$')]"
 home_rule_progress_from_relations: "[concept_relations] suzeréna se závislou zemí"
 home_rule_progress_from_liberty_desire: "[concept_liberty_desire]"
 BIC_not_able_to_change_distribution_of_power_tt: "[ROOT.GetCountry.GetName] má zakázáno měnit svůj [concept_law] #bold rozdělení moci#! bez povolení svého [Concept('concept_overlord','$suzerain$')]"
 je_india_home_rule_request_democracy_permission: "Požádat o vládní reformu"
 je_india_home_rule_request_democracy_permission_desc: "Nacionalistická volání po samosprávě zesílila natolik, že je již nelze ignorovat. Musíme požádat svého suzeréna o povolení poskytnout potřebné ústupky tímto směrem.\nPokud [SCOPE.sCountry('overlord_scope').GetName] souhlasí, budeme moci prosazovat [Concept('concept_law', '$concept_laws$')] #b $lawgroup_distribution_of_power$#!"
 je_india_nationalism_britain_indian_self_governance: "Povolit indickou samosprávu"
 je_india_nationalism_britain_indian_self_governance_desc: "Despotická vláda v Indii je zjevně neudržitelná. Abychom v této oblasti zachovali naši koloniální vládu, musíme Indům nabídnout další příležitosti podílet se na vlastní správě."
 je_india_nationalism_britain_dispatch_simon_commission: "Vyslat statutární komisi"
 je_india_nationalism_britain_dispatch_simon_commission_desc: "Naše dřívější reformy indické správy se v očích mnoha nacionalistů ukázaly jako nedostatečné. Vyslání komise, která prostuduje další ústavní reformu, poslouží jako ukázka našeho trvalého závazku k indické samosprávě."
 has_issued_montagu_chelmsford_reforms_tt: "Povolila #v $BHT_ADJ$#! samosprávu"
 authorise_indian_self_governance_tt: "[SCOPE.sCountry('india_scope').GetName] přijme [GetLawType('law_wealth_voting').GetName] a [GetLawType('law_elected_bureaucrats').GetName]"
 requested_dop_permission_tt: "Nepoužila tuto akci v posledních #Bold 5#! letech"
 india_colonial_government: "Koloniální guvernéři"
 je_india_nationalism: "Indický národ"
 je_india_nationalism_reason: "Zhroucení dobré vůle mezi umírněnými nacionalistickými vůdci a [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] koloniální vládou vedlo k radikalizaci indického národního hnutí směrem k #b úplné nezávislosti#!. Těch několik málo, kteří zůstávají oddáni poslání [SCOPE.gsInterestGroup('government_scope').GetName], se obává, že bez mimořádného úsilí se země [ROOT.GetCountry.GetName] brzy stane #bold neovladatelnou#!."
 india_independent_tt: "#v Indie#! pokojně dosáhla nezávislosti"
 india_independence_movement_defeated_tt: "#b Indické národní hnutí#! se stalo politicky bezvýznamným"
 modifier_syrian_ambitions: "Ambice v Sýrii"
 invoke_doctrine_of_lapse: "Uplatnit doktrínu propadnutí"
 invoke_doctrine_of_lapse_desc: "Anektuje [concept_princely_state] pod záminkou chybějícího mužského dědice nebo neschopné vlády."
 invoke_doctrine_of_lapse_action_name: "Uplatnit doktrínu propadnutí"
 invoke_doctrine_of_lapse_action_notification_name: "[INITIATOR_COUNTRY.GetName] uplatňuje doktrínu propadnutí"
 invoke_doctrine_of_lapse_action_notification_desc: "[INITIATOR_COUNTRY.GetName] prohlásila, že [concept_princely_state] země [TARGET_COUNTRY.GetName] je spravován neschopně, a nařídila jeho anexi podle doktríny propadnutí."
