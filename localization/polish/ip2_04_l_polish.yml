 je_india_home_rule: "Indická samospráva"
 je_india_home_rule_reason: "V celé zemi [SCOPE.sCountry('india_scope').GetName] mezi domorodou indickou populací sílí národní vědomí. Domorodí Indové vzdělaní v [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFlag] školách a zaměstnaní koloniální vládou začali agitovat za rovné postavení v rámci imperiálních institucí, větší ekonomické příležitosti a konečné zřízení samosprávy pro celou Indii.\n\nDokud je tento [concept_journal_entry] aktivní, budeme mít příležitost žádat [SCOPE.sCountry('overlord_scope').GetName] o větší autonomii a další místní reformy. Šance na přijetí těchto žádostí závisí na stavu #bold ukazatele postupu#!."
 je_india_nationalism_britain: "Indické národní hnutí"
 je_india_nationalism_britain_reason: "V celé zemi [SCOPE.sCountry('india_scope').GetName] mezi domorodou indickou populací sílí národní vědomí. Domorodí Indové vzdělaní v [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFlag] školách a zaměstnaní koloniální vládou začali agitovat za rovné postavení v rámci imperiálních institucí, větší ekonomické příležitosti a samosprávu pro Indii.\n\nDokud je tento [concept_journal_entry] aktivní, [SCOPE.sCountry('india_scope').GetAdjective] národní hnutí bude mít příležitost žádat nás o větší autonomii a další místní reformy. Důsledky odmítnutí těchto žádostí závisí na stavu #bold ukazatele postupu#!.\n\n@warning! Pokud [Concept('concept_activism','$concept_activism_short$')] indického národního hnutí vzroste příliš vysoko, hnutí přesune svou pozornost k #bold úplné nezávislosti#!."
 preserve_british_rule_forever_tt: "Zachovejte [ROOT.GetCountry.GetAdjective] vládu nad #v $BHT$#! co nejdéle"
 india_home_rule_events.1.t: "Zákon o indické samosprávě"
 india_home_rule_events.1.d: "Po dlouhém období reforem a vyjednávání s domorodými indickými vůdci přijal [ROOT.GetCountry.GetTopOverlord.GetAdjective] parlament zákon reorganizující bývalý Rádž na Dominium Indie."
 india_home_rule_events.1.f: "„Od tohoto dne bude kolonie Indie, která byla pod přímou vládou Koruny, tvořit Dominium Indie. Toto dominium pod korunou Spojeného království Velké Británie bude mít vlastní zákonodárnou moc, pokud nebude zasahovat do autority samotné Koruny, odporovat jí nebo jí čelit.“"
 india_home_rule_events.1.a: "Využili jsme své příležitosti."
 south_asian_primary_cultures_tt: "Všechny #bold jihoasijské#! [Concept('concept_culture', '$concept_cultures$')] s [Concept('concept_homeland','$concept_homelands$')] v našem národě se stanou [concept_primary_cultures]"
 india_home_rule_events.2.t: "Indická správa žádá o vládní reformu"
 india_home_rule_events.2.d: "Pod tlakem indického národního hnutí požádala vláda země [SCOPE.sCountry('india_scope').GetName] o náš souhlas s povolením demokratických voleb do funkcí v indické správě."
 india_home_rule_events.2.f: "Žádost byla ve Sněmovně lordů přijata s jistým pobavením.\n„Aby člověk mohl volit,“ poznamenal jeden lord, „musí být gramotný. Jak indická správa se svou propastně nízkou gramotností očekává, že lidé rozeznají Rádž od Rámy?“"
 india_home_rule_events.2.a: "Indové nejsou schopni odpovědné vlády."
 india_home_rule_events.2.b: "Nezbytný krok ke stabilizaci naší správy."
 india_home_rule_events.2.c: "Vypracujte reformu sami a nařiďte její prosazení."
 india_home_rule_events.3.t: "Mučednictví"
 india_home_rule_events.3.d: "Během pokojného protestu v [SCOPE.sState('jallianwala_bagh_state').GetFarmHubName] proti našemu potlačování indického národního hnutí zahájila jednotka [ROOT.GetCountry.GetAdjective] armády vedená [SCOPE.sCharacter('dyer_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dyer_scope').GetFullName] palbu do davu. Byly zabity stovky Indů a tisíce dalších byly zraněny."
 india_home_rule_events.3.f: "„Události v [SCOPE.sState('jallianwala_bagh_state').GetFarmHubName] možná potlačily vzpurné nálady ve městě, ale vyvolaly celonárodní pobouření.\n\nKamkoli jdu, vidím protestující lidi, sjednocené. Všichni opakují stejnou mantru, jediné slovo: ‚Azadi‘, ‚svoboda‘.“"
 india_home_rule_events.3.a: "To musí být okamžitě utajeno."
 india_home_rule_events.4.t: "Spirála úpadku"
 india_home_rule_events.4.d: "Navzdory našemu úsilí situaci zvládnout se zprávy o masakru v [SCOPE.sState('jallianwala_bagh_state').GetFarmHubName] rozšířily po celém státě [SCOPE.sState('jallianwala_bagh_state').GetName]. Ve velkých městech začaly propukat nepokoje, zatímco Indové protestují proti zabíjení."
 india_home_rule_events.4.f: "V reakci na potlačení amritsarské vzpoury tuto neděli se lid Indie uchýlil k nepokojům.\n\n„Pryč s britským imperialismem! Pryč s britskými prašivými psy!“ byla slova vrhaná na britské správce, když si v pondělí ráno razili cestu do svých úřadů."
 india_home_rule_events.4.a: "Zadržte [SCOPE.sCharacter('dyer_scope').GetLastName] a slibte, že spravedlnosti bude učiněno zadost."
 india_home_rule_events.4.b: "Pošlete armádu, aby nepokoje zpacifikovala."
 india_home_rule_events.4.c: "Nasaďte letectvo, aby rozehnalo davy."
 india_home_rule_events.5.t: "Výbor pro vyšetřování nepokojů"
 india_home_rule_events.5.d: "Jak roste pobouření nad činy [SCOPE.gsInterestGroup('army_ig').GetName], byla sestavena vládní komise, aby vyšetřila masakr v [SCOPE.sState('jallianwala_bagh_state').GetFarmHubName]. Rozhovor s [SCOPE.sCharacter('dyer_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dyer_scope').GetLastName] odhalil [SCOPE.sCharacter('dyer_scope').GetHerHis] údajný motiv – zachovat [SCOPE.sCharacter('dyer_scope').GetHerHis] čest."
 india_home_rule_events.5.f: "„Myslíte, že jste mohl dav rozehnat bez střelby?“\n\n„Kdybych je rozehnal bez střelby a oni se rozhodli vrátit, vypadal bych jako hlupák. Vysmívali by se mi.“\n\n„Předpokládejme, že průchod do zahrady byl dost široký, aby jím mohla projet obrněná auta. Zahájil byste palbu kulomety?“\n\n„Myslím, že pravděpodobně ano.“\n\n„V takovém případě by byly ztráty mnohem vyšší?“\n\n„Ano.“"
 india_home_rule_events.5.a: "Okamžitě povolejte [SCOPE.sCharacter('dyer_scope').GetLastName] zpět do [ROOT.GetCountry.GetTopOverlord.GetCapital.GetCityHubName]."
 india_home_rule_events.5.b: "Tento muž musí být potrestán."
 dyer_returns_home_tt: "[SCOPE.sCharacter('dyer_scope').GetLastName] bude dovoleno odstoupit bez trestu a vrátit se do země [ROOT.GetCountry.GetTopOverlord.GetName] s [SCOPE.sCharacter('dyer_scope').GetHerHis] ctí nedotčenou"
 dyer_disgraced_tt: "[SCOPE.sCharacter('dyer_scope').GetLastName] bude zbaven [SCOPE.sCharacter('dyer_scope').GetHerHis] hodnosti a vyznamenání a deportován zpět do země [ROOT.GetCountry.GetTopOverlord.GetName]"
 india_home_rule_events.6.t: "Návrat domů"
 india_home_rule_events.6.d: "Bývalý brigádní generál [SCOPE.sCharacter('dyer_scope').GetLastName] se po uzavření vyšetřování masakru v [SCOPE.sState('jallianwala_bagh_state').GetFarmHubName] vrátil do země [ROOT.GetCountry.GetName]. [SCOPE.sCharacter('dyer_scope').GetCustom('dyer_fate')]"
 india_home_rule_events.6.f: "Výčepní nečekal, že jeho obvyklá společnost bude tento páteční večer tak rozdělená; už jen proto, že se toho dne nehrál žádný zápas. Přesto téma [SCOPE.sCharacter('dyer_scope').GetFullNameNoFormatting] všechny rozohnilo. Polovina přítomných chtěla, aby byl nečestně propuštěn; říkali mu řezník z Paňdžábu. Druhá polovina si mezi sebou posílala klobouk na dary. Chtěli se složit na meč cti a měšec, které mu příští týden plánovaly předat nějaké noviny."
 india_home_rule_events.6.a: "Tuto záležitost můžeme považovat za uzavřenou."
 india_home_rule_events.6.b: "Sbírka a meč? Jak zvrácení jsou?"
 india_home_rule_events.7.t: "Indické národní hnutí"
 india_home_rule_events.7.d: "Národní vědomí v Indii začíná růst mezi [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] a [SCOPE.gsInterestGroup('petty_bourgeoisie_ig').GetName] vzdělanými v [ROOT.GetCountry.GetOverlord.GetAdjective] školách, jejichž finanční zájmy se střetávají s [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] podniky. Jejich požadavky sahají od větší samosprávy až po úplnou nezávislost."
 india_home_rule_events.7.f: "Když jsem šel ke skladišti, zjistil jsem, že mi cestu zastoupili všichni dělníci. Nezaútočili na mě, ale jejich záměr byl jasný: dnes se pracovat nebude. Vědom si své křehkosti jsem ustoupil stranou a šel si dát druhý šálek čaje. Tam jsem zaslechl dva dělníky, muže, kteří kdysi sloužili pode mnou.\n\n„Žádali jsme o jídlo a oni nás nechali hladovět. Žádali jsme, aby nás vyslechli, a oni nás umlčeli kulkami. A přesto po nás chtějí, abychom sloužili? Abychom poslouchali? Tak to už ne. Uvidíme, co si počnou s Indií bez Indů.“"
 india_home_rule_events.7.a: "Musíme to sledovat."
 india_home_rule_events.7.b: "Jejich požadavky mohou mít jisté opodstatnění."
 independence_lobby_formed_tt: "Vznikla [SCOPE.sPoliticalLobby('relevant_lobby').GetName], která podporuje větší autonomii na [ROOT.GetCountry.GetOverlord.GetName]"
 india_home_rule_events.8.t: "Indické národní hnutí"
 india_home_rule_events.8.d: "Národní vědomí v Indii začíná růst mezi našimi domorodými [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] a [SCOPE.gsInterestGroup('petty_bourgeoisie_ig').GetName], jejichž finanční zájmy se střetávají s [ROOT.GetCountry.GetAdjectiveNoFormatting] podniky. Jejich požadavky sahají od samosprávy až po úplnou nezávislost."
 india_home_rule_events.8.f: "#bold Indičtí poddaní se obracejí ke zradě! Volají po úplné nezávislosti#!\n\nZatímco mnoho byrokratů zůstává britské vládě loajální, široká veřejnost se obrátila ke zradě. Mnozí své zrádné úmysly ospravedlňují tvrzením, že samospráva je jejich rodným právem.\n\nSněmovna lordů o této věci debatovala. Někteří se domnívají, že jde o přirozené vyústění po neúspěšných debatách o samosprávě. Jiní tvrdí, že jde o dílo několika vzpurných podněcovatelů. Jeden člen, který si přál zůstat v anonymitě, řekl: „[SCOPE.gsInterestGroup('intelligentsia_ig').GetLeader.GetFullNameNoFormatting] nepovede Indii ke schopné samosprávě. Britský Rádž musí pokračovat, pevný a neochvějný ve své správě spravedlnosti pro všechny lidi.“"
 india_home_rule_events.8.a: "Pečlivě to sledujte."
 india_home_rule_events.8.b: "Bouří se proti samotné odpovědné vládě."
 affect_bar_india_policies_tt: "Dokud je #v $je_india_nationalism_britain$#! [concept_journal_entry] aktivní, můžeme obdržet žádosti o reformy od země [SCOPE.sCountry('india_scope').GetName]"
 india_home_rule_events.9.t: "[SCOPE.sCharacter('montagu_scope').GetLastName]-[SCOPE.sCharacter('chelmsford_scope').GetLastName]ovy reformy"
 india_home_rule_events.9.d: "V reakci na rostoucí nacionalistickou agitaci proti [SCOPE.sCountry('overlord_scope').GetAdjective] vládě schválila [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] vláda sérii vládních reforem v zemi [ROOT.GetCountry.GetName]. Zřizují několik volených orgánů, které mají pomáhat se správou Indie."
 india_home_rule_events.9.f: "„VZHLEDEM K TOMU, že vyhlášenou politikou Parlamentu je zajistit rostoucí zapojení Indů do všech odvětví indické správy a postupný rozvoj samosprávných institucí s cílem postupného uskutečnění odpovědné vlády v [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] Indii jako nedílné součásti impéria:\nA vzhledem k tomu, že pokroku v uskutečňování této politiky lze dosáhnout pouze postupnými kroky a že je vhodné nyní v tomto směru učinit podstatné kroky...“"
 india_home_rule_events.9.a: "Ukázka blahovůle."
 india_home_rule_events.9.b: "Příliš málo a příliš pozdě."
 simon_commission_in_ten_years_tt: "Za #v 10#! let posoudí [SCOPE.sCountry('overlord_scope').GetAdjective] vládní komise výsledky těchto reforem"
 india_home_rule_events.10.t: "Indická statutární komise"
 india_home_rule_events.10.d_1: "Vláda se rozhodla okamžitě vyslat do země [SCOPE.sCountry('india_scope').GetName] komisi, aby projednala ústavní reformu. Objevily se politické rozpory ohledně toho, zda by komise měla mít indické členy."
 india_home_rule_events.10.d_2: "Podle plánu začala vláda sestavovat komisi, kterou vyšle do země [SCOPE.sCountry('india_scope').GetName], aby projednala ústavní reformu. Objevily se politické rozpory ohledně toho, zda by komise měla mít indické členy."
 india_home_rule_events.10.f: "„Jak můžete navrhovat takový postup? Pokud tvrdíme, že si přejeme, aby si vládli sami, musíme jim dát příležitost, aby se osvědčili.“\n\n„Musíte chápat, že pokud je zahrneme, celý účel komise bude ohrožen. Stane se z ní nejednotný orgán, rozdělený stranicky i nábožensky. Když posadíte dva Indy do jakéhokoli vládního orgánu, vrátí se se třemi názory a monoklem.“\n\n„Kandidáti, které jsem shromáždil, mají všichni vzdělání z Oxfordu, pane. Pokud je pravda, co říkáte, vina leží pouze na nás.“"
 india_home_rule_events.10.a: "Jsou [ROOT.GetCountry.GetAdjectiveNoFormatting] poddanými a budou mít [ROOT.GetCountry.GetAdjectiveNoFormatting] komisi."
 india_home_rule_events.10.b: "Indové musí mít roli ve své vlastní správě."
 ideology_sympathetic_to_indians_tt: "[concept_leader] této [concept_interest_group] má [concept_ideology] nakloněnou #v indické#! věci"
 commission_sent_conservative_tt: "Do země [SCOPE.sCountry('india_scope').GetName] bude vyslána čistě bělošská komise, aby projednala ústavní reformu"
 commission_sent_liberal_tt: "Do země [SCOPE.sCountry('india_scope').GetName] bude vyslána společná [ROOT.GetCountry.GetAdjectiveNoFormatting]-indická komise, aby projednala ústavní reformu"
 india_home_rule_events.11.t: "[SCOPE.sCharacter('simon_scope').GetLastNameNoFormatting]ova komise"
 india_home_rule_events.11.d_1: "[SCOPE.sCountry('overlord_scope').GetAdjective] vláda vyslala do [ROOT.GetCountry.GetCapital.GetCityHubName] komisi, aby posoudila potřebu dalších ústavních reforem v Indii. Několik místních indických vůdců bylo pozváno, aby v komisi zasedlo."
 india_home_rule_events.11.d_2: "[SCOPE.sCountry('overlord_scope').GetAdjective] vláda vyslala do [ROOT.GetCountry.GetCapital.GetCityHubName] komisi, aby posoudila potřebu dalších ústavních reforem v Indii. Čistě evropská komise vyvolala mezi indickými nacionalisty nespokojenost."
 india_home_rule_events.11.f_1: "[SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] vyslala sedm mužů, z toho tři Indy. Mnozí kongresisté byli šokováni, když se zpráva dostala do [ROOT.GetCountry.GetCapital.GetCityHubName]. Umírnění to oslavovali jako vítězství a už si představovali rovné postavení ve vlastním parlamentním systému. Radikálové namítali, že symbolická indická přítomnost v komisi může sloužit pouze cílům vlády: snížit protesty na zvládnutelnou úroveň, než bodne nadějeplné obyvatelstvo do zad. Poprvé po několika letech se zdálo, že správný postup je skutečně nejasný."
 india_home_rule_events.11.f_2: "Policie sice vyklidila samotný přístav, ale silnice venku byly ztracený případ. Ulici lemovaly černé vlajky popsané nacionalistickými hesly a požadavky, aby se komisaři vrátili do [SCOPE.sCountry('overlord_scope').GetCapital.GetCityHubName]. Kus ovoce narazil do vedoucího automobilu a přilepil se na okno. Těm uvnitř pomalu stékající šťávy připomínaly krev."
 india_home_rule_events.11.a: "Ještě z toho může něco vzejít."
 india_home_rule_events.11.b: "Vyhlašte bojkot této urážlivé podívané."
 india_home_rule_events.11.c: "Pozitivní krok pro [SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting]-indické vztahy."
 india_home_rule_events.11.e: "Vzejde z toho vůbec něco?"
 india_home_rule_events.11.g: "Nespokojíme se s ničím menším než s úplnou nezávislostí!"
 simon_commission_dispatch_timer_tt: "Pokud tato akce nebude provedena, #bold Indická statutární komise#! bude vyslána za [SCOPE.sCountry('overlord_scope').MakeScope.Var('simon_commission_timer_var').GetValue|v0] měsíců"
