 sepoy_mutiny_events.11.t: "Ctihodná společnost"
 sepoy_mutiny_events.11.d: "Laskavý despotismus země [ROOT.GetCountry.GetName] vedl k výraznému zlepšení ve všech aspektech veřejného života. Bezprostřední hrozba domorodé vzpoury byla poražena a vláda Společnosti pevně upevněna."
 sepoy_mutiny_events.11.f: "„Jen málo vlád, dokonce i za mnohem příznivějších okolností, se pokusilo vykonat tolik pro dobro svých poddaných nebo dovedlo tolik svých pokusů ke zdárnému a prospěšnému výsledku. Vláda cizinců nad lidem, který je nanejvýš obtížné pochopit a ještě obtížnější zlepšit, má právo být na sebe hrdá za to, že dokázala tolik; a zcela jistě jí žádná existující vláda ani lid nemohou vytýkat, že nedosáhla ještě více.“\n\n— John Stuart Mill, #italic Memorandum o zlepšeních ve správě Indie během posledních třiceti let#!"
 sepoy_mutiny_events.11.a: "Na rozkaz [ROOT.GetCountry.GetTopOverlord.GetRuler.GetPrimaryRoleTitle] a Parlamentu."
 sepoy_mutiny_events.11.b: "Kéž naše vláda už nikdy nebude ohrožena."
