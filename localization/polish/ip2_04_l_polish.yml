 british_dictates.3.a.1: "Začneme okamžitě."
 british_dictates.3.a.2: "Požadavky [SCOPE.GetRootScope.GetCountry.GetCustom('india_governing_body')] převažují nad potřebou zákona [ROOT.GetCountry.GetLawBeingEnacted.GetName]."
 british_dictates.3.b: "Nyní na to není nejvhodnější doba."
