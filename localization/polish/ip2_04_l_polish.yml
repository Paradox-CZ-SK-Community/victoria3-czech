 british_dictates.1.t: "[SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] nařízení"
 british_dictates.1.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('india_governing_body')] v [SCOPE.sCountry('overlord_scope').GetCapital.GetCityHubName] nám vydal pokyny, abychom v zemi [ROOT.GetCountry.GetName] zvýšili počet [SCOPE.GetRootScope.GetCountry.GetCustom('eic_plantation_type')]."
 british_dictates.1.f: "Do vlastních rukou [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting],\n\nMám tu čest vás pro informaci ctihodného [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] informovat, že po období jednání s [SCOPE.GetRootScope.GetCountry.GetCustom('india_oversight_board')] vydal [SCOPE.GetRootScope.GetCountry.GetCustom('india_governing_body')] následující soubor směrnic, aby objasnil své současné priority v Indii. Další informace k této záležitosti naleznete v přiložených směrnicích.\n\nPodepsán,\n[SCOPE.sCharacter('board_of_control_character').GetFullNameNoFormatting]\n[SCOPE.GetRootScope.GetCountry.GetCustom('india_oversight_board')]"
 british_dictates.1.a: "Začneme okamžitě."
 british_dictates.1.b: "To není v našich současných možnostech."
 british_dictates.2.t: "[SCOPE.sCountry('overlord_scope').GetAdjectiveNoFormatting] nařízení"
 british_dictates.2.d: "Vzhledem k současnému válečnému stavu, jemuž země [SCOPE.sCountry('overlord_scope').GetName] čelí, nám [SCOPE.GetRootScope.GetCountry.GetCustom('india_governing_body')] vydal pokyny, abychom rozšířili naši stálou armádu."
 british_dictates.2.f: "Do vlastních rukou [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting],\n\nMám tu čest vás pro informaci ctihodného [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] informovat, že [SCOPE.GetRootScope.GetCountry.GetCustom('india_governing_body')] vydal následující soubor směrnic, aby objasnil své současné priority v Indii. Další informace k této záležitosti naleznete v přiložených směrnicích.\n\nPodepsán,\n[SCOPE.sCharacter('board_of_control_character').GetFullNameNoFormatting]\n[SCOPE.GetRootScope.GetCountry.GetCustom('india_oversight_board')]"
