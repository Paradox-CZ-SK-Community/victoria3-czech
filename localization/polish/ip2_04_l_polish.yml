 je_federation_of_india_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('get_federation_of_india_intro_text')]\n\nDokud je tento [concept_journal_entry] aktivní, [concept_princely_state] [Concept('concept_subject', '$concept_subjects$')] s nízkou #r touhou po svobodě#! a vysokými #r vztahy#! příležitostně žádají o připojení do [SCOPE.GetRootScope.GetCountry.GetCustom('get_federation_union')].\n\n#b [concept_privy_purse]:#!\nBývalí vládci #b knížectví#! získají státní penzi jako kompenzaci za připojení do [SCOPE.GetRootScope.GetCountry.GetCustom('get_federation_union')]. Platby $concept_privy_purse$ zvýší #b národní výdaje#! o @money![GetPlayer.MakeScope.ScriptValue('privy_purse_multiplier_base')|D-] násobek počtu #b připojených knížectví#! v rámci tohoto [concept_journal_entry].[SCOPE.GetRootScope.GetCountry.GetCustom('get_federation_of_india_diploplay_text')]"
 je_federation_of_india_reason_intro_home_rule: "Podle podmínek #b Indického zákona o domácí správě#! může každé #b knížectví#! žádat o připojení k [ROOT.GetCountry.GetName]."
 je_federation_of_india_reason_intro_independence: "Proces naší nezávislosti zanechal na indickém subkontinentu množství autonomních #b knížectví#!. Pokud tyto koloniální zbytky nebudou integrovány do [ROOT.GetCountry.GetNameNoFlag], může jejich pokračující existence poskytnout záminku k dalšímu dělení našeho národa."
 je_federation_of_india_reason_diploplay_info_tt: "\n\n@information! Nezávislé indické národy lze připojit k [ROOT.GetCountry.GetName] pomocí $dp_unify_india$ [concept_diplomatic_play]"
