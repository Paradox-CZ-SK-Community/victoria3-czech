 colonial_administration_events.2.t: "Oddělená končetina"
 colonial_administration_events.2.d: "Po přerušení správních vazeb s metropolí propukly v celé [ROOT.GetCountry.GetName] rozsáhlé protesty, které naše nedostatečně početné koloniální síly jen stěží zvládají."
 colonial_administration_events.2.f: "„[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] nás stvořil svobodné a neučinil z nás majetek ani dědictví. A tak při [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] již nebudeme ani děděni, ani zotročeni.“"
 colonial_administration_events.2.a: "Kéž [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] ochrání [ROOT.GetCountry.GetNameNoFormatting]."
 colonial_administration_events.2.b: "Koloniální správa již není udržitelná. Musíme zavést vládu většiny."
 colony_alone_modifier: "Kolonie bez pána"
