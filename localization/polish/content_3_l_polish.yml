 je_boxer_rebellion: "Boxerské povstání"
 je_boxer_rebellion_reason: "Ponižující ztráta čínských území ve prospěch cizích „barbarů“ vedla ke vzniku mnoha milicí inspirovaných bojovými uměními, odhodlaných očistit zemi od jakéhokoli zahraničního vlivu.\n\nNeschopnost naplnit vizi těchto milicí by mohla mít dramatické důsledky pro [ROOT.GetCountry.GetAltAdjective('A')]."
 qing_owns_all_han_states_tt: "Vlastní všechny [GetCulture('han').GetName] [Concept('concept_homeland','$concept_homelands$')] a žádná [GetCulture('han').GetName] [concept_homeland] není [concept_split_state]"
 qing_does_not_own_all_han_states_tt: "#b Nevlastní#! všechny [GetCulture('han').GetName] [Concept('concept_homeland','$concept_homelands$')]"
 dyn_c_empire_of_china: "Říše Číny"
 dyn_c_empire_of_china_adj: "čínský"
 boxer_rebellion_events.1.t: "Hnutí I-che-tchuan"
 boxer_rebellion_events.1.d: "Rozzuřeni rostoucí přítomností cizinců v [ROOT.GetCountry.GetAltAdjective('L')] se poddaní [SCOPE.sCulture('han_culture').GetName] organizují do proticizineckých milicí odhodlaných zahnat „barbary“ zpět do moře. Mnozí nyní vyzývají [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], aby hnutí podpořil, jinak by se jejich zápal mohl obrátit proti vládě [SCOPE.sCulture('manchu_culture').GetName]."
 boxer_rebellion_events.1.f: "„Když cizí barbaři káží své náboženství, tvrdí, že vedou lidi k dobru, ale ve skutečnosti narušují naši vládu, vnášejí zmatek do našeho systému, ničí naše zvyky a klamou náš lid — jinými slovy chtějí proměnit lid Číny v barbary.“"
 boxer_rebellion_events.1.a: "Obnovte říši Čching! Zničte cizince!"
 boxer_rebellion_events.1.b: "Tito fanatici by znamenali naši zkázu."
 boxer_rebellion_events.2.t: "Mandát nebes"
 boxer_rebellion_events.2.d: "Žlutá dračí vlajka opět vlaje nad střechami všech měst Říše středu. Od zářících perel jižní delty až po velká města u Východního moře byla skvrna imperialismu smyta z našich břehů."
 boxer_rebellion_events.2.f: "„Až budou všichni cizí ďáblové\n\nvyhnáni do posledního muže\n\n[ROOT.GetCountry.GetNameNoFormatting], sjednocená\n\npřinese mír této naší zemi.“"
 boxer_rebellion_events.2.a: "Ať [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] vládne deset tisíc let!"
 boxer_rebellion_events.2.b: "Ať [ROOT.GetCountry.GetName] trvá deset tisíc let!"
 revere_the_emperor: "Uctívat císaře"
 united_in_righteousness: "Sjednoceni ve spravedlnosti"
 boxer_rebellion_events.3.t: "Čchingové a Chanové"
 boxer_rebellion_events.3.d: "Tam, kde dříve zaznívaly nadšené výkřiky „Obnovte říši Čching“, nyní zaznívají proti-[SCOPE.sCulture('manchu_culture').GetName] slogany. Naše selhání naplnit vizi boxerů nenapravitelně přetrhlo naše vazby s poddanými [SCOPE.sCulture('han_culture').GetName]."
 boxer_rebellion_events.3.f: "„Neustále opakuji, že uvnitř jsme otroky Mandžuů a trpíme jejich tyranií, zatímco navenek jsme obtěžováni cizími mocnostmi — jsme zotročeni dvojnásob.“"
 boxer_rebellion_events.3.a: "Skončí tato ponížení někdy?"
 boxer_rebellion_events.3.b: "Posádka v [ROOT.GetCountry.GetCapital.GetNameNoFormatting] se bouří a dobývá Zakázané město."
 boxer_rebellion_events.3.tt1: "Mandžuové jsou svrženi a vévoda Jan-šeng, hlavní potomek Konfucia, je prohlášen císařem."
 boxer_rebellion_events.4.t: "Pád dynastie Čching"
 boxer_rebellion_events.4.d: "Jedním tahem pera skončila dvě tisíciletí císařské vlády. Zatímco poslední císař [SCOPE.sCulture('manchu_culture').GetName] opouští Zakázané město, svět obrací svůj pohled na východ. Co přinese tato nová éra pro [ROOT.GetCountry.GetName]?"
 boxer_rebellion_events.4.f: "„Abychom obnovili naši národní nezávislost, musíme nejprve obnovit čínský národ. Abychom obnovili čínský národ, musíme zahnat barbarské Mandžuy zpět do pohoří Čchang-paj. Abychom se zbavili barbarů, musíme nejprve svrhnout současnou tyranskou, diktátorskou, ošklivou a zkorumpovanou vládu Čching.“"
 boxer_rebellion_events.4.a: "Jho [SCOPE.sCulture('manchu_culture').GetName] konečně skončilo."
 boxer_rebellion_events.4.b: "Nyní je čas na smíření."
 election_contextual_events.1.t: "Chléb, máslo a volební lístek"
 election_contextual_events.1.d: "S tím, jak ceny [SCOPE.sGoods('basic_foodstuff').GetName] po celé zemi prudce rostou, čelí [SCOPE.sParty('high_food_price_party').GetName] neustálému tlaku opozice — je obviňována z nezodpovědného hazardování s blahobytem svých občanů."
 election_contextual_events.1.f: "„Vysoké ceny [SCOPE.sGoods('basic_foodstuff').GetNameNoFormatting]? Nesmysl! V mém mládí jsme si vystačili s ještě menším množstvím a pracovali jsme dvakrát tolik! Tyhle ‚pobuřující‘ ceny potravin jsou jen výplody hysterických hospodyněk!“"
 election_contextual_events.1.a: "Tak ať jedí něco jiného!"
 election_contextual_events.1.b: "Financovat polévkové kuchyně. Sytý člověk dělá méně chyb."
 alms_for_the_poor: "Almužny pro chudé"
 election_contextual_events.2.t: "Podvodná budoucnost"
 election_contextual_events.2.d: "Tvrzení, že politika rozsáhlého zadlužování [SCOPE.sParty('public_debt_party').GetName] zatížila budoucí generace nepřiměřeným břemenem, způsobila, že strana ztrácí voliče jako děravé síto."
 election_contextual_events.2.f: "„Blahoslavení mladí, neboť zdědí státní dluh.“"
 election_contextual_events.2.a: "Půjčky jsou základem každé zdravé ekonomiky!"
 election_contextual_events.2.b: "Najděte obětního beránka, veřejnost chce oběť."
 fiscally_irresponsible: "Fiskálně nezodpovědní"
 election_contextual_events.3.t: "Pacifista odsuzuje válku"
 election_contextual_events.3.d: "[SCOPE.sCharacter('pacifist_ig_leader').GetFullName], známý pacifista a vůdce [SCOPE.gsInterestGroup('opposition_pacifist_ig').GetName], ostře zaútočil na vládnoucí [SCOPE.sParty('government_war_party').GetName] a tvrdí, že vojáci [ROOT.GetCountry.GetAdjectiveNoFormatting] ve válce [SCOPE.sWar('pacifist_war').GetNameNoFormatting] páchali pod jejím dohledem závažná zvěrstva."
 election_contextual_events.3.f: "„My... dostal jsem rozkaz shromáždit rukojmí, pane. Staré tváře, mladé tváře — někteří nebyli starší než můj vlastní syn. Takzvaní volní střelci napadali naše linie. ‚Vrazi‘ jim říkal můj velitel. ‚Loupežníci‘ se zlými úmysly a puškami v rukou. Rukojmí měli sloužit jako odstrašení!\n\nAle když toho večera padl třetí voják, velitel mi řekl, abych rukojmí odvedl... řekl mi, abych je zavedl do stodoly... a... Pane, odpusť mi.“"
 election_contextual_events.3.a: "Naši vojáci udělali co!? Komu!?"
 election_contextual_events.3.b: "Zajímavý názor. Cenzurujme to."
 election_contextual_events.3.c: "Zajímavý názor. Cenzurujme to."
 principled_pacifist: "Zásadový pacifista"
 martyrized_pacifist: "Umučený pacifista"
 election_contextual_events.3.tt.1: "Nepatriotická pomluva je skryta před veřejností."
 election_contextual_events.3.tt.2: "Informace unikne navzdory našemu úsilí."
 election_contextual_events.4.t: "Komu zvoní hrana"
 election_contextual_events.4.d: "Stárnoucí [SCOPE.sCharacter('decrepit_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('decrepit_leader_ig').GetName], nečekaně zemřel uprostřed kampaně — a připravil tak [SCOPE.sParty('decrepit_leader_party').GetName] o klíčovou politickou postavu. Otázka jeho nástupce je nyní na rtech všech."
 election_contextual_events.4.f: "„Nečekaně? Ale prosím vás! Ta stará kostra už dávno měla potkat svého stvořitele. Je načase, aby ta strana dostala novou krev!“"
 election_contextual_events.4.a: "Zvolit populárního, ale neschopného kandidáta."
 election_contextual_events.4.b: "Odhodlaný, ale arogantní mladík se ujímá vedení."
 well_connected: "Dobře napojený"
 imperious_upstart: "Arogantní kariérista"
 election_contextual_events.5.t: "Země bídy"
 election_contextual_events.5.d: "[SCOPE.sCharacter('low_sol_opposition_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('low_sol_opposition_ig').GetName], hlasitě obviňuje [SCOPE.sParty('low_sol_party').GetName] ze špatné správy vzhledem k nízké životní úrovni v zemi — tvrdí, že pouze [SCOPE.sParty('low_sol_opposition_party').GetName] má vůli situaci napravit."
 election_contextual_events.5.f: "„Cestou sem jsem viděl scény tak bezútěšné, že se téměř nedají popsat. Viděl jsem kdysi vážené vojáky, jak vrčí o zbytky v blátě — viděl jsem zoufalé rodiny namačkané v zaprášených činžácích — viděl jsem podvýživu, chudobu a beznaděj.\n\nObčané, toto je odkaz [SCOPE.sParty('low_sol_party').GetNameNoFormatting].“"
 election_contextual_events.5.a: "Proč bychom za to měli nést vinu? Zkusili být méně chudí?"
 election_contextual_events.5.b: "Jen pár špatných jablek ve správě, nic víc."
 indifferent_to_destitution: "Lhostejní k bídě"
 defender_of_the_downtrodden: "Obhájce utlačovaných"
 election_contextual_events.6.t: "Země hojnosti"
 election_contextual_events.6.d: "Vysoká životní úroveň v zemi vedla k široce rozšířenému pocitu spokojenosti se současným stavem, což v probíhajících volbách nahrává [SCOPE.sCharacter('high_sol_leader').GetFullName] a vládnoucí [SCOPE.sParty('high_sol_party').GetName]."
 election_contextual_events.6.f: "„Změna? Proč bych chtěl změnu? Mám plný žaludek, spokojenou ženu a dobrou práci. Proč bych to měl zahodit kvůli něčemu nejistému?“"
 election_contextual_events.6.a: "Když to funguje, proč to měnit?"
 election_contextual_events.6.b: "Vychvalte úspěchy [SCOPE.sCharacter('high_sol_leader').GetFullNameNoFormatting]."
 champion_of_prosperity: "Zastánce prosperity"
 patrons_of_prosperity: "Patroni prosperity"
 election_contextual_events.7.t: "Válečné dividendy"
 election_contextual_events.7.d: "Vzhledem k tomu, že válka [SCOPE.sWar('ongoing_election_war').GetName] probíhá úspěšně, zemi zachvátila válečná horečka. Vládnoucí [SCOPE.sParty('ongoing_election_war_party').GetName] vydala doporučující dopisy parlamentním kandidátům, které považuje za podporovatele válečného úsilí, čímž přitahuje vlastenecké voliče na svou stranu."
 election_contextual_events.7.f: "„[SCOPE.sCharacter('pacifist_ig_leader').GetSheHe|U] ten dopis nedostal, co? To se dalo čekat — ten zbabělec je bezpáteřní, k ničemu pacifista. Naši kluci tam venku umírají, a co dělá [SCOPE.sCharacter('pacifist_ig_leader').GetSheHe]? Sedí a přehrabuje papíry, čeká na správný okamžik, aby zahodil to, co jsme zaplatili krví. Ne, naši muži potřebují někoho, kdo za ně bude bojovat, stejně jako oni bojují za nás.“"
 election_contextual_events.7.a: "Semkněme se kolem stra… totiž vlajky!"
 election_contextual_events.7.b: "Jste s námi, nebo s našimi nepřáteli?"
 jingoist_rhetoric: "Šovinistická rétorika"
 dove_of_peace_in_time_of_war: "Holubice míru v čase války"
 election_contextual_events.8.t: "Proudy ginu a piva"
 election_contextual_events.8.d: "Protialkoholní politika [SCOPE.sParty('temperance_party').GetName] poškozuje její volební vyhlídky, protože množství žíznivých voličů přechází k [SCOPE.sParty('anti_temperance_party').GetName] — doufají, že změna vlády ukončí protialkoholní opatření."
 election_contextual_events.8.f: "„Odolat pokušení? Řeknu vám, co mě pokouší — narvat tuhle botu těm vašim moralizujícím abstinentům někam. Chci se napít, napiju se, a jestli mi to nedovolíte, půjdu za těmi, kdo dovolí.“"
 election_contextual_events.8.a: "Žádné pivo, žádný hlas!"
 election_contextual_events.8.b: "Spusťme očerňovací kampaň proti těmto nemravným požitkářům."
 je_rifling: "Drážkování hlavní"
 je_rifling_reason: "Ačkoli je koncept drážkovaných hlavní znám již po staletí, teprve nedávný pokrok v průmyslu a technologiích umožnil jejich výrobu a rozšíření ve velkém měřítku — čímž našim ozbrojeným silám poskytl dosud nevídanou přesnost."
 je_machine_guns: "Automatické kulomety"
 je_machine_guns_reason: "Obsluhované jediným mužem a schopné vypálit stovky nábojů za minutu představují automatické kulomety téměř nepřekonatelnou překážku pro jakéhokoli útočníka čelícího opevněným pozicím."
 military_tech_events.401.t: "Modernizace arzenálu"
 military_tech_events.401.d: "Přechod velkovýroby od hladkohlavňových mušket k puškám v [SCOPE.sBuilding('rifle_factory').GetName] ve státě [SCOPE.sState('rifle_state').GetName] zahájil novou éru výroby [SCOPE.sGoods('small_arms_good').GetName] v [ROOT.GetCountry.GetNameNoFormatting]."
 military_tech_events.401.f: "„I na vzdálenost jednoho tisíce yardů lze stále zasáhnout cíl.\n\nPředsunuté dělostřelecké pozice lze ostřelovat, bodákové útoky zastavit ještě před jejich začátkem.\n\nVýhody jsou nespočetné!\n\nPokud nevyvineme dostatečné výrobní kapacity k produkci těchto zbraní, čeká nás na bojišti katastrofa.“"
 military_tech_events.401.a: "Arzenál v [SCOPE.sState('rifle_state').GetCityHubName] bude proslulý po celém světě."
 military_tech_events.401.b: "[ROOT.GetCountry.GetNameNoFormatting] bude stát v čele vojenských inovací."
 modern_rifle_arsenal: "Moderní puškový arzenál"
 arsenal_proving_ground: "Testovací arzenál"
 military_tech_events.402.t: "Ďáblův štětec"
 military_tech_events.402.d: "[SCOPE.sCharacter('machine_gun_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('machine_gun_general').GetFullName] nasadil specializované kulometné jednotky ve válce [SCOPE.sWar('machine_gun_war').GetName], což přineslo výrazné výhody na bojišti — celé nepřátelské oddíly padaly dříve, než se vůbec přiblížily k našim liniím."
 military_tech_events.402.f: "„Kdyby mi někdo řekl, že je možné vytvořit zbraň, která sama přitáhne pás nábojů, vyjme náboj, přesune ho před hlaveň, zasune jej, uzavře závěr, natáhne kohout, stiskne spoušť, vystřelí, vyhodí prázdnou nábojnici a okamžitě připraví další — a to vše během desetiny sekundy — nevěřil bych tomu.\n\nAle nyní jsem to viděl na vlastní oči.“"
 military_tech_events.402.a: "Naši nepřátelé padají jako tráva před kosou."
 military_tech_events.402.b: "Ať se stane cokoli, my máme Maximův kulomet — a oni ne."
 military_tech_events.402.c: "[SCOPE.sCharacter('machine_gun_general').GetFullName] ovládá tuto zbraň bezkonkurenčně."
 machine_gun_expertise_low: "Odborník na kulomety"
 machine_gun_expertise_high: "Odborník na kulomety"
 je_ironclads: "Pancéřové lodě"
 je_ironclads_reason: "Pancéřované parní lodě vyzbrojené těžkými děly schopnými střílet výbušnou munici představují zásadní odklon od éry plachetních válečných lodí."
 je_monitors: "Monitory"
 je_monitors_reason: "Plavidla s malým ponorem určená především pro pobřežní obranu představují monitory cenově dostupné řešení pro státy, které nemají kapitál či průmysl na udržování oceánské flotily pancéřových lodí."
 military_tech_events.403.t: "Doktrína železa a páry"
 military_tech_events.403.d: "Zavedení lodí s kovovým pancéřováním znamená revoluci v námořním boji. Téměř odolné vůči tradiční munici nás [SCOPE.sCharacter('ironclad_admiral').GetPrimaryRoleTitle] [SCOPE.sCharacter('ironclad_admiral').GetFullName] ujišťuje, že nadvláda [ROOT.GetCountry.GetAdjectiveNoFormatting] na moři bude absolutní."
 military_tech_events.403.f: "„Dřevěné lodě s železnými muži mohou porazit železné lodě s dřevěnými muži, ale rozhodně neuškodí mít pancíř na své straně.“"
 military_tech_events.403.a: "Naše bitevní linie bude neporazitelná."
 military_tech_events.403.b: "Kovové přídě? Beranidla! Co by se mohlo pokazit?"
 military_tech_events.403.c: "[ROOT.GetCountry.GetNameNoFormatting] vládne mořím!"
