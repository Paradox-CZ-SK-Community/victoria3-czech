 some_european_pops_abandon_africa_tt: "Část #bold evropské#! [Concept('concept_pop','$concept_pops$')|l] opustí [ROOT.GetCountry.GetAltAdjective('A')]"
 acw_events.9.t_1: "Hvězdy a pruhy"
 acw_events.9.t_2: "Svobody pro mne"
 acw_events.9.d_1: "Tímto konečným vítězstvím obklíčily armády [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] [SCOPE.sState('acw_victory_capital_scope').GetCityHubName]. Nezávislost je naše."
 acw_events.9.d_2: "Revoluce byla potlačena. Zajatci byli zajati a generál [SCOPE.sCharacter('acw_victory_general_scope').GetLastNameNoFormatting] pokračuje s vojenským soudem."
 acw_events.9.f_1: "Deset tisíc mužů s nasazenými bodáky se hnalo ulicemi [SCOPE.sState('acw_victory_capital_scope').GetCityHubName], křičíc a hulákajíc jako šedá vlna dobyvatelů. Pobočník dorazil k generálu [SCOPE.sCharacter('acw_victory_general_scope').GetLastNameNoFormatting] s depeší v ruce. Formální kapitulace byla načmárána ve spěchu a plně uznávala nezávislost."
 acw_events.9.f_2: "„Jste obviněn z velezrady, vraždy spolubojovníka armády [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] a dezerce. Tři svědci potvrdili vaše činy. Jak se přiznáváte?“\n\n„Nevinen. Přísahal jsem hájit ideály této země, jak je zamýšleli otcové zakladatelé: život, svobodu a právo na štěstí pro všechny lidi. Pro všechny — a já nevěřím, že otrok má tuto šanci. Nemohu zradit zemi, která už zradila sama sebe.“\n\n„Tedy vinen. Oběste ho spolu s ostatními.“"
 acw_events.9.a: "Triumf přirozeného řádu."
 acw_events.9.b: "Okamžitě přijmout zákon o obnovení obchodu s otroky."
