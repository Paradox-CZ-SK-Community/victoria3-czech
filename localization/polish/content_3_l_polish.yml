 je_christ_of_nations: "Kristus národů"
 je_christ_of_nations_reason: "#italic Tak jako byl Kristus umučen Římany, tak i Polsko padlo rukou svých nepřátel, a stejně jako je Kristus předurčen znovu přijít ve své slávě, tak i Polsko je předurčeno učinit totéž.#!\n\nZatímco poslední nezávislý stát [SCOPE.sCulture('polish_culture_scope').GetName] zmizel z mapy po #bold trojím dělení Polska#! na konci 18. století, sen o jeho obnovení žije v myslích Poláků od Poznaně po Lvov.\n\n#bold Odkaz Rzeczpospolity#!\nPokud bude nějakým způsobem vytvořen plně nezávislý polský stát, budeme jej moci připojit k našemu, za předpokladu, že [SCOPE.GetRootScope.GetCountry.GetName] je sám nezávislý."
 christ_of_nations_button: "Podporovat polské radikály v zahraničí"
 christ_of_nations_button_desc: "Napříč územími bývalé Rzeczpospolity působí nespočet skupin, buněk a výborů usilujících o obnovení vlády [SCOPE.sCulture('polish_culture_scope').GetName]. Poskytnutím útočiště polským vlastencům a financováním jejich aktivit může [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] připravit polská území mimo naši přímou kontrolu na budoucí osvobození."
 christ_of_nations_button_tt_1: "Vyberte cizí [concept_country] s [SCOPE.sCulture('polish_culture_scope').GetName] [Concept('concept_homeland','$concept_homelands$')] a povzbuďte [SCOPE.sCulture('polish_culture_scope').GetName] [Concept('concept_radical','$concept_radicals$')] v jejich [Concept('concept_state','$concept_states$')]."
 christ_of_nations_button_tt_2: "Tuto akci jste nepoužili během posledních #bold 5#! let"
 poland_events.1.t: "Polsko ještě nezahynulo"
 poland_events.1.d: "Komunity [SCOPE.sCulture('polish_culture_scope').GetName] vlastenců a exulantů v [SCOPE.GetRootScope.GetCountry.GetAdjective] jsou početné a silně motivované. Poskytnutím podpory a jasného vedení můžeme zajistit, že jejich odhodlání nepřijde vniveč."
 poland_events.1.f: "„Zprávy z vlasti, konečně. Možná budeme mít šanci se vrátit. Dobré jídlo, písně, tanec; všechno!“\n\n„Nedoufejme ve víc, než čeho můžeme dosáhnout. Co říkal posel?“\n\n„Do ulic. Budeme skandovat, pochodovat a odmítneme pracovat. A když na to přijde, budeme bojovat.“"
 poland_events.1.a: "Nechte je vyvolat nepokoje v [SCOPE.sCountry('polish_agitation_target_1_scope').GetName]."
 poland_events.1.b: "Dejte jim pokyn působit v [SCOPE.sCountry('polish_agitation_target_2_scope').GetName]."
 poland_events.1.c: "Poláci v [SCOPE.sCountry('polish_agitation_target_3_scope').GetName] touží po svobodě."
 poland_events.1.e: "Propašujte je přes [SCOPE.sCountry('polish_agitation_target_4_scope').GetAdjective] hranici."
 poland_events.1.tt: "Volby cílového státu a jeho [Concept('concept_law','$concept_laws$')] mohou ovlivnit množství radikálů i změnu našich vztahů."
 funding_polish_radicals: "Financování polského odboje"
 poland_events.2.t: "Nezahynulo snad Polsko?"
 poland_events.2.d: "V komunitách [SCOPE.sCulture('polish_culture_scope').GetName] v [SCOPE.GetRootScope.GetCountry.GetName] vypukly rozsáhlé protesty požadující polskou státnost. Poradci se domnívají, že nepokoje mohou souviset s aktivitami vládou podporovaných skupin v [SCOPE.sCountry('sent_polish_agitators_country_scope').GetName]."
 poland_events.2.f: "Národy rozdělené země budou vždy toužit po slávě a identitě, kterou kdysi měly. Taková je moudrost starých říší: podmaněné národy si ponechávaly svá území i zvyky výměnou za poplatky a přijetí nových zákonů. Důsledkem odebrání identity národu je pak nevyhnutelně katastrofa."
 poland_events.2.a: "[SCOPE.sCountry('sent_polish_agitators_country_scope').GetCapital.GetCityHubName] za to musí nést odpovědnost."
 poland_events.2.b: "Infiltrovat je a pokusit se jejich skupiny rozbít."
 poland_events.2.c: "Okamžitě povolat četnictvo."
 poland_events.2.tt: "Zavedením [GetLawType('law_secret_police').GetName] nebo [GetLawType('law_national_guard').GetName] můžeme dopad podobných událostí v budoucnu zmírnit. Úplně je však odstraní pouze zničení [SCOPE.sCountry('sent_polish_agitators_country_scope').GetName] jako samosprávného celku."
 poland_events.3.t: "[SCOPE.GetRootScope.GetCountry.GetAltAdjectiveNoFormatting('o')]-[SCOPE.sCountry('polish_union_target_scope').GetAltAdjectiveNoFormatting('aa')|l] unie"
 poland_events.3.d: "V poslední době sílí výzvy k politické unii mezi dvěma státy [SCOPE.sCulture('polish_culture_scope').GetName], [SCOPE.GetRootScope.GetCountry.GetName] a [SCOPE.sCountry('polish_union_target_scope').GetName]. Z [SCOPE.sCountry('polish_union_target_scope').GetCapital.GetCityHubName] již dorazil oficiální návrh a jejich delegace netrpělivě očekává naši odpověď."
 poland_events.3.f: "„Obviňujete nás z nelegitimity, ale nikdo z vás nemá vazby na starou šlechtu. Bah, lidové povstání a zapomněli jste na mnohé důležité osobnosti!“\n\n„A přesto tu oba sedíme a hádáme se o legitimitu jako děti. Měli bychom se soustředit na společný boj!“\n\n„#bold Bojujeme společně!#!“"
 poland_events.3.a: "Společně, za Polsko!"
 poland_events.3.b: "To není v zájmu [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]"
 integrating_polish_modifier: "Integrace regionálních správ"
 poland_events.4.t: "Druhý příchod"
 poland_events.4.d: "Navzdory dělením se Polsko zázračně vrátilo na světovou scénu. Zatímco se zraky národa upírají k jeho budoucnosti, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] se obrací k jeho minulosti. Polsko bylo znovuzrozeno — ale jaké?"
 poland_events.4.f: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastNameNoFormatting] seděl v pološeru, tvář osvětlenou jedinou svící téměř dohořelou až k pahýlu. Kdyby měla naděje chuť, byla by to chuť vítězství; vítězství znamenalo jásot; jásot byl v tomto případě třicet let starý žitný destilát zrající ve vinných sudech. Ani to však nedokázalo utišit úzkost z nové budoucnosti. Vrátit se do časů Jadwigy či Boleslava, pomyslel si [SCOPE.GetRootScope.GetCountry.GetRuler.GetSheHe], znamenalo určit směr příštích sta let Polska. [SCOPE.GetRootScope.GetCountry.GetRuler.GetSheHe|U] upil z poháru a rozjímal nad stínem tisícileté historie."
 poland_events.4.a: "Jako za časů Piasta Oráče — Polsko Polákům."
 poland_events.4.b: "Jsme dědici korunované republiky, náš osud leží na východě."
 jagiellonian_poland_modifier: "Jagellonská koncepce"
 piast_poland_modifier: "Piastovská koncepce"
 jagiellonian_poland_ig_modifier: "Podpora jagellonské vize"
 piast_poland_ig_modifier: "Podpora piastovské vize"
 poland_events.5.t: "Povstání [SCOPE.sCountry('polish_rebel_country_scope').GetAdjectiveNoFormatting]"
 poland_events.5.d: "Vypuklo rozsáhlé povstání [SCOPE.sCountry('polish_rebel_country_scope').GetAdjective] proti nadvládě [SCOPE.sCountry('polish_rebel_country_enemy_scope').GetAdjective]. Naši bratři [SCOPE.sCulture('polish_culture_scope').GetName] volají o pomoc. Jak odpovíme?"
 poland_events.5.f: "#bold Pouliční střety: Polští partyzáni útočí!#!\nPolští vlastenci vyšli do ulic [SCOPE.sState('polish_rebel_state_scope').GetCityHubName] ve snaze obnovit staré Polsko. V prudkých střetech v ulicích již zahynulo mnoho lidí a nejeden statečný strážník obětoval život při potlačování tohoto povstání. Úřady v [SCOPE.sState('polish_rebel_state_scope').GetCityHubName] se domnívají, že povstání může být během několika týdnů potlačeno. (pokrač. str. 7–8)"
 poland_events.5.a: "Poskytnout jim morální podporu."
 poland_events.5.b: "Poslat dobrovolníky, zbraně a zásoby."
 poland_events.5.c: "Sáhnout hluboko — pošleme vše, co potřebují."
 poland_events.5.tt: "Pokud jsme závislá země, účinky naší pomoci budou poloviční."
 funding_polish_rebels_small_modifier: "Vyzbrojování dobrovolníků"
 funding_polish_rebels_large_modifier: "Vyzbrojování dobrovolníků"
 polish_rebel_funding_modifier: "Polské dobrovolnické legie"
 je_poland_lithuania: "Rozšíření Rzeczpospolity"
 je_poland_lithuania_reason: "Hranice staré Rzeczpospolity sahaly daleko za území Poláků a Litevců až do rozlehlých oblastí Rusi. A učiní tak znovu."
 je_poland_lithuania_tt: "Vytvořili jsme Polsko-litevskou unii"
 poland_events.6.t: "Nová Rzeczpospolita"
 poland_events.6.d: "[ROOT.GetCountry.GetAltAdjective('aa')] Rzeczpospolita byla obnovena a ukončila desetiletí podřízenosti a dělení. Zatímco lidé [SCOPE.sCulture('polish_culture').GetName] a [SCOPE.sCulture('lithuanian_culture').GetName] nyní požívají svobody od ruské a německé nadvlády, musíme zvážit, zda rozšířit naši moc i na osvobození zemí [SCOPE.sCulture('ukrainian_culture').GetName] a [SCOPE.sCulture('byelorussian_culture').GetName]."
 poland_events.6.f: "Velkolepá obnova, připravovaná po staletí. Husarští jezdci v lesklém brnění a hedvábných křídlech stáli v pozoru, zatímco nová vláda vstupovala do síní moci. První rozkaz pro rytíře nové Rzeczpospolity byl jasný: bránit hranice za každou cenu. Ale které hranice?"
 poland_events.6.a: "Polsko a Litva stačí."
 poland_events.6.b: "Obnovíme hranice staré Rzeczpospolity."
 plc_discrimination_tt: "Pokud #bold nemáme#! [GetLawType('law_national_supremacy').GetName] nebo [GetLawType('law_ethnostate').GetName]:"
 plc_discrimination_tt_2: "Pokud #bold máme#! [GetLawType('law_national_supremacy').GetName] nebo [GetLawType('law_ethnostate').GetName]:"
 poland_events.7.t: "Velká Rzeczpospolita"
 poland_events.7.d: "Lidé [SCOPE.sCulture('ukrainian_culture').GetName] a [SCOPE.sCulture('byelorussian_culture').GetName] byli začleněni do naší Rzeczpospolity jako rovnocenní partneři v našem velkém svazku."
 poland_events.7.d2: "Území [SCOPE.sCulture('ukrainian_culture').GetName] a [SCOPE.sCulture('byelorussian_culture').GetName] byla připojena k naší říši, čímž se [ROOT.GetCountry.GetName] opět stává skutečnou evropskou mocností."
 poland_events.7.f: "„Bratři, všichni! Přinášíme vám radostné zprávy. Kdysi jsme sdíleli velkou říši — domov míru a prosperity pod ochranou Páně. Ač jsme byli poraženi, rozptýleni a spoutáni, opět stojíme. Ve staré slávě, obnovení! Ve víře, odměněni! Zbývá nám jen dosáhnout bran nebes. Povstaňte s námi a přinesme znovu Boží mír na zem!“"
 poland_events.7.f2: "„Pozor, rolníci. Možná se ptáte, proč jsem dnes přivedl tolik pánů s puškami. Je to prosté: jsme tu, abychom vás osvobodili. Což začíná nedoplatky, které dlužíte Rzeczpospolitě. Časem možná mocní zváží řádnou správu vašeho kraje. Neodporujte. Nebo odporujte — alespoň to pomůže zbavit tohle hnojiště jeho zápachu.“"
 poland_events.7.a: "Vítejte, bratři."
 poland_events.7.b: "Naše říše roste."
 dyn_c_commonwealth: "Republika obou národů"
 dyn_c_commonwealth_adj: "Polsko-litevský"
 colonial_administration: "$gov_colonial_administration$"
 je_colonial_administration: "Zřídit koloniální správu"
 je_colonial_administration_reason: "Abychom co nejlépe využili naši vládu nad africkými državami, může být v dané oblasti kontinentu zřízena #bold koloniální správa#!. #bold Koloniální správy#! se budou samy rozšiřovat do sousedních [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] a mohou jim být svěřeny i naše další regionální državy.\n\n#lore Takzvaný boj o Afriku je v plném proudu. Každá mocnost, která za něco stojí, si chce ukrojit kus tohoto velkého kontinentu jako další klenot do své koruny. Bohatství nevyužitých zdrojů a lidé, kteří teprve čekají na zapojení do práce, slibují moc i prestiž vítězům. Není pochyb: než tento boj skončí, poteče krev. Afrika čeká.#!"
 je_colonial_administration_button_senegal: "Zřídit kolonii v [SCOPE.sStateRegion('senegal_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_senegal_desc: "Na severozápadě kontinentu se Senegal rozprostírá nad pozůstatky dávno zaniklých říší. Koření a kovy jsou zde hojné, stejně jako kakao a káva."
 je_colonial_administration_button_niger: "Zřídit kolonii v [SCOPE.sStateRegion('niger_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_niger_desc: "Tato oblast je skutečnou obilnicí Afriky, kdysi domovem velkých království a mocných říší. Ovládnutí centra kontinentu znamená nejen získání potravin a dřeva, ale i přístup do všech jeho koutů."
 je_colonial_administration_button_ethiopia: "Zřídit kolonii v [SCOPE.sStateRegion('ethiopia_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_ethiopia_desc: "Africký roh oplývá potravinami a úrodnými planinami schopnými uživit miliony. Ovládnutí této části Afriky nám zajistí přístup k lékům a potravinám, dříve dostupným jen nejbohatším."
 je_colonial_administration_button_zanj: "Zřídit kolonii v [SCOPE.sStateRegion('zanj_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_zanj_desc: "Jihovýchodní část kontinentu, Zandž, byla po dlouhou dobu obchodním centrem se slonovinou, zlatem i otroky. Ovládnutí této oblasti otevře stavidla našim exotičtějším trhům."
 je_colonial_administration_button_southern_africa: "Zřídit kolonii v [SCOPE.sStateRegion('southern_africa_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_southern_africa_desc: "Jižní Afriku pokrývají hory, savany i pouště. Skrývají železo, drahé kovy, diamanty a další bohatství. Ovládnutí této oblasti zajistí naši průmyslovou budoucnost."
 je_colonial_administration_button_congo: "Zřídit kolonii v [SCOPE.sStateRegion('congo_region_scope').GetStrategicRegion.GetName]"
 je_colonial_administration_button_congo_desc: "Oblasti kolem konžské pánve hostí jedny z největších deštných pralesů světa. Dřevo a potraviny odtud významně posílí naši armádu."
