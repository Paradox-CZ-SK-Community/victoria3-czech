 colonial_administration_events.1.t: "Povaha správy"
 colonial_administration_events.1.d: "Po založení [SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAltAdjective('G')] musíme rozhodnout o směřování naší nové koloniální správy."
 colonial_administration_events.1.f: "„Tak dobře, zapisujte. A tentokrát jste si vzal pero? Výborně. V nejtemnější Africe, zde v nyní takzvané [SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAltAdjectiveNoFormatting('A')], začínáme budovat předmostí skutečné civilizace. Odtud bude možné řádně využívat zdroje ke slávě—proboha, člověče, vyškrtněte tu poznámku o peru! Tohle je pro dějiny!“"
 colonial_administration_events.1.a: "Spravovat ji bude privilegovaná [SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjectiveNoFormatting] společnost."
 colonial_administration_events.1.b: "[SCOPE.sPop('majority_religion').GetReligion.GetName] misie povznesou místní obyvatelstvo."
 colonial_administration_events.1.c: "V nejtemnější Africe vznikne nová [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 colonial_administration_events.1.e: "Bič bude práskat a kolonie bude plodit."
 colonial_administration_events.1_tt_1: "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAltAdjective('yy')] [Concept('concept_law', '$concept_laws$')|l] budou zaměřeny na #bold obchod#! a #bold soukromé podnikání.#!"
 colonial_administration_events.1_tt_2: "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAltAdjective('yy')] [Concept('concept_law', '$concept_laws$')|l] budou zaměřeny na #bold konverzi#! a #bold vzdělávání.#!"
