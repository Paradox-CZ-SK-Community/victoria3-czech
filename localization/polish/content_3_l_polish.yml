 armoured_high_seas_fleet: "Pancéřová oceánská flotila"
 military_tech_events.404.t: "Řešení s malým ponorem"
 military_tech_events.404.d: "Monitory navržené pro pobřežní obranu sice postrádají oceánské schopnosti, ale vynikají svou cenovou dostupností. [SCOPE.sCharacter('monitor_admiral').GetPrimaryRoleTitle] [SCOPE.sCharacter('monitor_admiral').GetFullName] informoval admiralitu v [ROOT.GetCountry.GetCapital.GetCityHubName], že jeho flotila udrží nepřátele daleko od vod [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 military_tech_events.404.f: "„Pane, i když to může vypadat jako ‚krabice od sýra na voru‘, ujišťuji vás, že patnáctipalcová děla, která nese, nejsou k smíchu.“"
 military_tech_events.404.a: "Bezpečné pobřeží znamená bezpečný obchod."
 military_tech_events.404.b: "Přizpůsobme tomu naši námořní doktrínu."
 military_tech_events.404.c: "Nevyhráváme nejlepšími loděmi, ale jejich počtem."
