l_polish:
 generic_laws.1.t: "Strhující projev uchvátil veřejnost"
 generic_laws.1.d: "Dnes odpoledne pronesl [SCOPE.sCharacter('orator_ig_leader_scope').GetFullName], vůdce [SCOPE.gsInterestGroup('orator_ig_scope').GetName], vášnivý projev podporující prosazení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 generic_laws.1.f: "Při vystoupení před veřejností na hlavním náměstí města [SCOPE.sCharacter('orator_ig_leader_scope').GetCountry.GetCapital.GetCityHubName] zanechala silná rétorika [SCOPE.sCharacter('orator_ig_leader_scope').GetFullNameNoFormatting] dojem i na [SCOPE.sCharacter('orator_ig_leader_scope').GetHerHis] nejzahořklejší politické odpůrce. Úryvky z projevu se již šíří po celé [ROOT.GetCountry.GetNameNoFormatting] a dále rozdmýchávají již tak bouřlivou debatu."
 generic_laws.1.a: "To by mělo výrazně usnadnit cestu k reformě."
 generic_laws.1.b: "Taková vystoupení vrhají dobré světlo na [SCOPE.sCharacter('orator_ig_leader_scope').GetFullNameNoFormatting] a [SCOPE.sCharacter('orator_ig_leader_scope').GetHerHis] věc."
 rising_support_for_law_minor: "Veřejnost ovlivněna"
 rising_support_for_law_major: "Veřejnost přesvědčena"
 rising_support_for_ig_minor: "Rostoucí podpora veřejnosti"
 skilled_orator: "Uznávaný řečník"
 generic_laws.2.t: "Zákulisní dohody odhaleny"
 generic_laws.2.d: "Významní členové [SCOPE.gsInterestGroup('corrupt_ig_scope').GetName], včetně [SCOPE.gsInterestGroup('corrupt_ig_scope').GetLeader.GetFullName], byli odhaleni v korupčním skandálu, když si vyměňovali politické laskavosti za osobní „dary“."
 generic_laws.2.f: "Stačil jediný pomocník. Jeden mladík, který si ve správný čas a na správném místě mačkal akné, zaslechl burácející smích, ucítil bohatou směs tabáku a všiml si nových zlatých manžetových knoflíčků [SCOPE.sCharacter('corrupt_ig_leader_scope').GetFullNameNoFormatting]. Jedno poctivé svědectví správným uším — a vše bylo odhaleno."
 generic_laws.2.a: "Taková je politika."
 generic_laws.2.b: "Korupce? Žádnou nevidím..."
 generic_laws.2.c: "Jaká hrůza! Ty dary musíme okamžitě zabavit."
 ignored_corruption: "Ignorovaná korupce"
 corrupt_connections_exposed: "Korupční vazby odhaleny"
 corrupt_connections_exposed_minor: "Korupční vazby odhaleny"
 dealing_with_corruption: "Jaká korupce?"
 generic_laws.3.t: "Opozice předkládá požadavky"
 generic_laws.3.d: "Pragmatičtěji smýšlející členové [SCOPE.gsInterestGroup('opposition_demands_ig_scope').GetName], kteří jsou v současnosti proti schválení zákona [SCOPE.sLaw('current_law_scope').GetName], nabídli změnu postoje výměnou za určité politické ústupky. Tyto ústupky by však nebyly populární u [SCOPE.gsInterestGroup('opposition_demands_supporting_ig_scope').GetName]."
 generic_laws.3.f: "„Kompromis je dobrý deštník, ale špatná střecha; je to dočasné řešení, často moudré v stranické politice, ale téměř jistě nemoudré ve státnictví.“"
 generic_laws.3.a: "Ustupme jejich požadavkům, zákon musí projít."
 generic_laws.3.b: "Kompromis je nástroj slabých."
 generic_laws.3.c: "Skvělá příležitost prolomit patovou situaci."
 cross_bench_support: "Podpora napříč lavicemi"
 concessions_obtained: "Získané ústupky"
 political_advances_spurned: "Politické návrhy odmítnuty"
 unpopular_compromises: "Neoblíbené kompromisy"
 steadfast_conviction: "Neochvějné přesvědčení"
 generic_laws.4.t: "Populární dramatik podporuje reformu"
 generic_laws.4.d: "Uprostřed debaty o zákonu [SCOPE.sLaw('current_law_scope').GetName] uvedl jeden z předních dramatiků země, úzce spojený se skupinou [SCOPE.gsInterestGroup('playwright_ig_scope').GetName], velmi úspěšnou hru, jejíž politické poselství jasně vyjadřuje autorovu podporu přijetí zákona."
 generic_laws.4.f: "„Jeho názory mohou být poněkud zaujaté, ale, pane, jeho próze nelze nic vytknout!“"
 generic_laws.4.a: "[SCOPE.sLaw('current_law_scope').GetNameNoFormatting] bude teď na rtech všech."
 generic_laws.4.b: "To staví [SCOPE.gsInterestGroup('playwright_ig_scope').GetNameNoFormatting] do dobrého světla."
 generic_laws.4.c: "Zajistěme, aby se hra dostala i na mezinárodní scénu."
 rising_support_for_ig: "Lichotivé zobrazení"
 popular_support_for_law: "Veřejná podpora zákona"
 renowned_playwright: "Proslulý dramatik"
 generic_laws.5.t: "Byrokratické patálie"
 generic_laws.5.d: "Zákonodárci usilující o prosazení zákona [SCOPE.sLaw('current_law_scope').GetName] se ocitli uvězněni v mimořádně složitém souboru byrokratických postupů, které téměř zastavily postup reformy."
 generic_laws.5.f: "Plně rozvinutý byrokratický aparát se k jiným organizacím má stejně jako stroj k nemekanickým způsobům výroby. Jinými slovy, zuby jeho jednotlivých ozubených kol do sebe zapadají v souladu — nebo se budou skřípat a dřít, dokud se nakonec nerozpadne."
 generic_laws.5.a: "Prokletý labyrintní právní systém!"
 generic_laws.5.b: "Prosekněme alespoň část byrokratických překážek."
 mired_in_bureaucracy: "Uvízlí v byrokracii"
 mired_in_bureaucracy_minor: "Byrokratické překážky"
 cutting_red_tape: "Obcházení systému"
 generic_laws.6.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zasahuje do politického procesu"
 generic_laws.6.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] projevil osobní zájem o probíhající debatu týkající se zákona [SCOPE.sLaw('current_law_scope').GetName] a rozhodl se využít [ROOT.GetCountry.GetRuler.GetHerHis] královské pravomoci k zajištění jeho přijetí."
 generic_laws.6.f: "[ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] jen zřídka zasahuje přímo do zákonodárství a místo toho se spoléhá na systém delegování a osobního vlivu pro efektivní správu své říše. Přestože může [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] právně vykonávat své královské pravomoci dle libosti, takový krok jistě pobouří jak republikány, tak odpůrce daného zákona."
 generic_laws.6.a: "Souhlas [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] je vše, co je třeba."
 generic_laws.6.b: "Vůle [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] bude vykonána!"
 generic_laws.6.c: "Odraďte [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], způsobilo by to více škody než užitku."
 royal_prerogative: "Využita královská pravomoc"
 backed_by_court: "Na základě královského dekretu"
 ruler_restrained: "Vládce omezen"
 generic_laws.7.t: "Podpora zákona zdola"
 generic_laws.7.d: "Politické vůle a přání nižších tříd zůstávají vždy obtížně čitelné. Z nějakého důvodu se podpora zákona [SCOPE.sLaw('current_law_scope').GetName] šíří napříč [ROOT.GetCountry.GetNameNoFormatting] jako požár, podněcovaná charismatickými řečníky a živými debatami v menších společenských klubech."
 generic_laws.7.f: "„Oni to teď podporují? No, kdo jsme my, abychom si stěžovali. Jejich podpora sice nikdy nebyla podmínkou úspěchu, ale rozhodně se hodí.“"
 generic_laws.7.a: "Nadšení veřejnosti urychluje reformu!"
 generic_laws.7.b: "Využijme tento společný základ k uklidnění mas."
 grassroots_support: "Podpora zdola"
 grassroots_support_for_movement: "Podpora zdola"
 wave_of_popular_support: "Vlna veřejné podpory"
 generic_laws.8.t: "Veřejné vystoupení se nepovedlo"
 generic_laws.8.d: "To, co mělo být rutinním projevem o přednostech zákona [SCOPE.sLaw('current_law_scope').GetName] od [SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullName], se rychle změnilo v PR katastrofu pro [SCOPE.gsInterestGroup('publicaddress_ig_scope').GetName]."
 generic_laws.8.f: "Zmateně se prodírající špatně podanými argumenty, [SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullNameNoFormatting] nedokázal obstát — jeho argumenty byly jeho politickými oponenty nemilosrdně a přesvědčivě rozebrány. Otázka, kterou si nyní kladou všichni, zní, zda je toto selhání důsledkem inherentních nedostatků zákona [SCOPE.sLaw('current_law_scope').GetNameNoFormatting], nebo politické neschopnosti [SCOPE.gsInterestGroup('publicaddress_ig_scope').GetNameNoFormatting]."
 generic_laws.8.a: "Může za to tento špatně promyšlený návrh!"
 generic_laws.8.b: "[SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullNameNoFormatting] musí nést odpovědnost."
 generic_laws.8.c: "Zahoďme současný návrh a ukažme, že ho přepracujeme."
 hapless_orator: "Nešťastný řečník"
 poorly_formulated_law: "Špatně formulovaný zákon"
 poorly_formulated_law_minor: "Podporováno neschopnými"
 tainted_by_incompetence: "Poznamenáno neschopností"
 generic_laws.9.t: "Návrh zákona vyvolává pobouření v komunitách [SCOPE.sCulture('non_accepted_culture_scope').GetName]"
 generic_laws.9.d: "Představitelé [SCOPE.sCulture('non_accepted_culture_scope').GetName] tvrdí, že přijetí zákona [SCOPE.sLaw('current_law_scope').GetName] by mělo nepřiměřeně negativní dopad na jejich obyvatele, a podněcují své komunity k odporu proti současnému návrhu."
 generic_laws.9.f: "„Dejte jim prst a budou chtít celou ruku.\n\nDejte jim ruku — a než se nadějete — použijí ji jako zbraň, zničí vše, co znáte, a ještě z toho vytěží další ústupky!“"
 generic_laws.9.a: "A proč by nás jejich názory měly zajímat? Prosadit to silou!"
 generic_laws.9.b: "Udělejme alespoň symbolické ústupky."
 generic_laws.9.c: "Uznat jejich obavy a řešit je."
 displeased_establishment: "Nespokojené elity"
 forceful_approach: "Tvrdý postup"
 minority_protests: "Protesty menšin"
 generic_laws.10.t: "Rozkol v rámci [SCOPE.gsInterestGroup('defectors_ig_scope').GetNameNoFormatting]"
 generic_laws.10.d: "Vlivná frakce uvnitř [SCOPE.gsInterestGroup('defectors_ig_scope').GetName] začala být frustrovaná neutralitou svých kolegů v otázce zákona [SCOPE.sLaw('current_law_scope').GetName]. Jelikož sama zákon podporuje, rozhodla se nyní vytvořit samostatnou politickou frakci s cílem jeho prosazení."
 generic_laws.10.f: "„Jak můžete jen nečinně stát a sledovat, jak vám svět uniká před očima? Nemáte snad žádný smysl pro čest? — pro povinnost vůči bližním? Takový nedostatek ambicí odmítám a troufám si říci, že nejsem sám.“"
 generic_laws.10.a: "S jejich podporou zákon projde."
 generic_laws.10.b: "[SCOPE.gsInterestGroup('defectors_support_ig_scope').GetName] podává těmto odpadlíkům pomocnou ruku."
 member_flight: "Odchod členů"
 member_exodus: "Masový odchod členů"
 member_influx: "Příliv členů"
 pro_law_factionalism: "Prospěšný frakcionismus"
 pro_law_factionalism_minor: "Prospěšný frakcionismus"
 generic_laws.11.t: "Odpůrci opouštějí řady"
 generic_laws.11.d: "Navenek se může zdát, že [SCOPE.gsInterestGroup('dissenters_ig_scope').GetName] pevně podporuje zákon [SCOPE.sLaw('current_law_scope').GetName], avšak za touto fasádou jednoty dlouhodobě bujela neshoda. Nyní už toho skupina odpůrců měla dost a oficiálně se od svých kolegů odtrhla kvůli otázce reformy."
 generic_laws.11.f: "„Jak dlouho jsme stáli při sobě? Kolikrát jsme vám ochotně pomohli? Přesto naše vlastní obavy zůstávají nevyslyšeny a naše přání nenaplněna. Pokud nebudeme vyslyšeni zde, budeme jinde.“"
 generic_laws.11.a: "Rozkolníci! Ať si je vezme ďábel."
 generic_laws.11.b: "Povolme měšce — možná je dokážeme přilákat zpět."
 generic_laws.11.c: "Nabídněme jim dohled nad novým návrhem."
 political_discord: "Politické neshody"
 political_discord_minor: "Politické neshody"
 party_fragmentation: "Fragmentace strany"
 party_fragmentation_minor: "Fragmentace strany"
 greasing_palms: "Podplácení"
 generic_laws.12.t: "Pochybné kontakty"
 generic_laws.12.d: "Frustrován zdlouhavým legislativním procesem kolem zákona [SCOPE.sLaw('current_law_scope').GetName] nás [SCOPE.sCharacter('underhanded_instigator_leader_scope').GetFullName] ze skupiny [SCOPE.gsInterestGroup('underhanded_instigator_ig_scope').GetName] oslovil s nabídkou urychlit celý proces pomocí svých osobních kontaktů ve státním aparátu."
 generic_laws.12.f: "„Stačí pár slov ve správných uších. Samozřejmě vše v mezích zákona, i když nemohu zaručit, že naši protivníci z toho budou mít radost.“"
 generic_laws.12.a: "Dejte [SCOPE.sCharacter('underhanded_instigator_leader_scope').GetHerHim] svolení — čas je klíčový."
 generic_laws.12.b: "Ne, budeme postupovat podle pravidel, nebo vůbec."
 dishonest_methods: "Nečestné metody"
 underhanded_tactics: "Podlé taktiky"
 by_the_book: "Podle pravidel"
 je_sick_man_bureaucracy: "Tanzimat: Byrokratická reforma"
 sick_man.2.e: "Naše říše funguje na papíře."
 je_sick_man_bureaucracy_reason: "Naše byrokracie je směsicí zastaralých zákonů a systémů, přičemž zkorumpovaní a autonomní bejové jen stěží vykonávají kontrolu nad provinciemi říše. Pokud chceme překonat četné výzvy naší vlády, musíme modernizovat náš správní systém."
 outmoded_bureaucracy: "Zastaralá byrokracie"
 cizye_tax: "Daň džizja"
 ottoman_bureaucracy: "Osmanská byrokracie"
 sick_man_of_europe: "Nemocný muž Evropy"
 dead_man_of_europe: "Mrtvý muž Evropy"
 tanzimat_events.1.t: "Systém iltizám"
 tanzimat_events.1.d: "Po staletí naše správa spoléhá na výběr daní prostřednictvím daňového pachtu, avšak tento vysoce neefektivní systém zanechává mnoho nedostatků. Návrhy na reformu zaplavily stůl velkovezíra a národ netrpělivě očekává naši odpověď."
 tanzimat_events.1.f: "Od vlády Mehmeda II. jsou práva na výběr daní dražena nejvyšší nabídce, přičemž vítěz si ponechává část výnosu pro vlastní potřebu. Postupem času to vedlo ke vzniku vrstvy mocných, autonomních a často zkorumpovaných [SCOPE.gsInterestGroup('governors').GetNameNoFormatting], což výrazně snížilo příjmy státu.\n\nAčkoli většina souhlasí, že systém musí být změněn, jen málokdo se shodne jak, a ještě méně jich chce popudit pozemkovou elitu."
 tanzimat_events.1.a: "Zrušit daňový pacht, ale ponechat [SCOPE.gsInterestGroup('governors').GetNameNoFormatting] na místě."
 tanzimat_events.1.b: "Nechme spící psy spát."
 tanzimat_events.1.c: "Zrušit systém jak formálně, tak fakticky."
 iltizam_abolished: "Iltizám zrušen"
 new_system_old_faces: "Nový systém, staré tváře"
 retained_taxation_rights: "Zachována práva na výběr daní"
 rescinded_taxation_rights: "Odebrána práva na výběr daní"
 governors_pleased: "Omezená podpora reformy mezi guvernéry"
 governors_satisfied: "Široká podpora reformy mezi guvernéry"
 tanzimat_events.2.t: "Osmanský pozemkový zákon"
 tanzimat_events.2.d: "Náš současný systém vlastnictví půdy je zastaralý, nejednotný a naléhavě potřebuje reformu. Zastánci modernizace požadují kroky; jak odpoví Vysoká Porta?"
 tanzimat_events.2.f: "Vlastnictví půdy v Osmanské říši je složitou záležitostí, tvořenou překrývající se směsicí dědičných a komunitních pozemků, daňově osvobozených vesnic, výsad dobytí a celé řady dalších kategorií. Klíčové osobnosti v Konstantinopoli si uvědomují negativní dopad tohoto stavu na správu a příjmy státu a tlačí na reformu.\n\nVenkovské obyvatelstvo říše se však obává odvodů a vyššího zdanění, a proto bude jakékoli změny statusu quo pravděpodobně odmítat."
 tanzimat_events.2.a: "Reformovat systém, ale uznat tradiční kategorie půdy."
 tanzimat_events.2.b: "Starý systém nám sloužil dobře."
 tanzimat_events.2.c: "Zavést skutečně moderní pozemkový zákon."
 tanzimat.2.tt1: "Někteří rolníci mohou reformě odporovat."
 traditional_land_system_retained: "Zachován tradiční pozemkový systém"
 reformed_land_code: "Reformovaný pozemkový zákon"
 modern_land_code: "Moderní pozemkový zákon"
 tanzimat_events.4.t: "Islâhat Hatt-ı Hümâyûnu"
 tanzimat_events.4.d: "S postupem zavádění profesionálnějšího byrokratického systému byly vzneseny požadavky na formální zvýšení právního postavení nemuslimů, aby mohli sloužit jako státní úředníci."
 tanzimat_events.4.f: "Zachování Vznešeného státu tváří v tvář nepokojům, povstáním a zahraničním zásahům je hlavním zájmem [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Abychom toho dosáhli, může být nutné učinit kroky k uklidnění našich menšinových poddaných, aby se nestali nástroji nepřátelských zahraničních mocností."
 tanzimat_events.4.a: "Rovnost před zákonem! Alespoň na papíře."
 tanzimat_events.4.b: "Slibme reformy, ale nepřehánějme to."
 tanzimat_events.4.c: "To jsou jen ústupky vydávané za reformu. Zamítnuto!"
 tanzimat.4.tt1: "Zvýšení postavení dhimmí může dále popudit radikální sunnitské hlasy."
 equality_under_the_law: "Rovnost před zákonem"
 promises_of_reform_ott: "Sliby reforem"
 establishment_favours_reform: "Elity podporují reformu"
 tanzimat_events.5.t: "Šepoty povstání"
 tanzimat_events.5.d: "Město [SCOPE.sState('paranoia_state_scope').GetCityHubName] zachvátila atmosféra paranoie poté, co místní imám obvinil komunitu [SCOPE.sReligion('discriminated_religion_scope').GetName] ze spiknutí s [SCOPE.sCountry('neighbor_country').GetName] s cílem podkopat autoritu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 tanzimat_events.5.f: "„Mají být nepřátelé Boha rovni islámu? Někteří zkorumpovaní paši v [ROOT.GetCountry.GetCapital.GetCityHubName] si to možná myslí, ale my pravověrní víme lépe. Zatímco mluvíme, nevěřící mezi námi kují pikle, spikají se se svými zahraničními pány, aby rozparcelovali naši velkou říši jako cukrář krájí baklavu.“"
 tanzimat_events.5.a: "Jsou to jen fámy, že?"
 tanzimat_events.5.b: "Tvrdě zakročit proti podezřelým zrádcům — opatrnosti není nikdy dost."
 tanzimat.5.tt1: "Radikální sunnitské hlasy mohou vzít věci do vlastních rukou."
 tanzimat.5.tt2: "Vaše kroky by měly uspokojit sunnitské radikály."
 tanzimat_events.6.t: "Nepokoje ve čtvrti [SCOPE.sCulture('mob_victim_culture').GetName]"
 tanzimat_events.6.d: "Rozhořčeni rozhodnutím Vysoké porty zvýšit právní postavení dhimmí a podníceni fámami o zahraničně podporovaném povstání, velký dav [SCOPE.sReligion('mob_religion').GetName] zpustošil čtvrť [SCOPE.sCulture('mob_victim_culture').GetName] ve městě [SCOPE.sState('mob_state_scope').GetCityHubName]."
 tanzimat_events.6.f: "„Přišli po polední modlitbě, vyzbrojeni holemi a kyji — bezpochyby podníceni nějakým militantním kazatelem. Zatím jen modřiny a materiální škody, díky Bohu, ale nelíbí se mi ten dav u západní brány.“"
 tanzimat_events.6.a: "Tohle musí vyřešit místní guvernér."
 tanzimat_events.6.b: "Svolejte armádu, okamžitě zasáhněte."
 tanzimat_events.6.c: "Nechte dav, ať si dělá, co chce."
 tanzimat.6.tt1: "Vaše kroky mohou vést k eskalaci situace."
 tanzimat.6.tt2: "Vaše kroky pravděpodobně zabrání eskalaci situace."
 tanzimat.6.tt3: "Vaše nečinnost pravděpodobně povede k eskalaci situace."
 mobilizing_the_militia: "Mobilizace milice"
 deploying_the_army: "Nasazení armády"
 tanzimat_events.7.t: "Masakr v [SCOPE.sState('massacre_state_scope').GetCityHubName]"
 tanzimat_events.7.d: "Hrůza! V záchvatu nelítostného běsnění se velký dav výtržníků [SCOPE.sReligion('sunni_religion').GetName] obrátil proti svým sousedům [SCOPE.sReligion('massacre_victims').GetName]. Ulice [SCOPE.sState('massacre_state_scope').GetCityHubName] se barví krví a velká část města hoří."
 tanzimat_events.7.f: "„Kdo úmyslně zabije věřícího, jeho odměnou bude peklo, v němž setrvá; Bůh ho zavrhne a připraví mu strašné utrpení.“"
 tanzimat_events.7.a: "Rozprášit dav, i střelbou pokud bude třeba."
 tanzimat_events.7.b: "To je udrží ty rádoby zrádce na uzdě."
 tanzimat_events.8.t: "Pořádek obnoven v [SCOPE.sState('orderrestored_state_scope').GetName]"
 tanzimat_events.8.d: "Do ulic [SCOPE.sState('orderrestored_state_scope').GetCityHubName] se vrátil pocit normálnosti. Obchody jsou znovu budovány a zásobovány a projevy nedůvěry a nenávisti jsou postupně nahrazovány smířlivějšími postoji."
 tanzimat_events.8.f: "„Ti bastardi zničili můj obchod a pošpinili mé jméno! Ale aspoň to bylo to nejhorší, co se mi stalo. Můj syn viděl alespoň dva muže, kteří se účastnili nepokojů, jak je vojáci odvádějí — prý je udala jejich vlastní komunita. Možná tu přece jen existuje nějaká spravedlnost. Teď mi podej cukr, ten čaj je hořký jako nezralé olivy.“"
 tanzimat_events.8.a: "Allah'a şükür!"
 tanzimat_events.9.t: "Rolníci odporují registraci půdy"
 tanzimat_events.9.d: "S hrozbou vyššího zdanění a vojenské služby odmítli rolníci z [SCOPE.sState('peasant_state').GetName] registrovat svou půdu, čímž nás připravují o tolik potřebné daňové příjmy."
 tanzimat_events.9.f: "„Po dvě stě let moje rodina obdělává tuto půdu a platí své dávky podle tradice. A teď paši z [ROOT.GetCountry.GetCapital.GetCityHubName] vymysleli další záludný systém, jak nás vysát, a moji synové budou povoláni zemřít na nějakém vzdáleném bojišti.“"
 tanzimat_events.9.a: "Nechte místní šejky vykoupit jejich půdu, daně musí proudit."
 tanzimat_events.9.b: "[SCOPE.sCharacter('peasant_smashing_general').GetFullName] a jeho muži tento neklid potlačí."
 tanzimat_events.9.c: "Nechte je být, koho zajímá [SCOPE.sState('peasant_state').GetNameNoFormatting]?"
 peasant_unrest: "Rolníci odmítají registraci"
 expanding_holdings: "Rozšiřování držby"
 tanzimat_events.10.t: "Odvod dhimmí"
 tanzimat_events.10.d: "Se zavedením vojenského odvodu musí stát rozhodnout o roli nemuslimů v naší armádě, pokud nějaká bude."
 tanzimat_events.10.f: "Nemuslimští poddaní říše byli tradičně osvobozeni od vojenské služby a místo toho odváděli zvláštní daň „cizye“ Vysoké portě. Zastánci modernizace armády nyní navrhují rozšířit odvod na všechny poddané Osmanské říše, což by však připravilo státní pokladnu o důležitý zdroj příjmů."
 tanzimat_events.10.a: "Ti, kdo si to mohou dovolit, zaplatí daň za osvobození od odvodu."
 tanzimat_events.10.b: "Odvod se vztahuje na všechny poddané bez ohledu na víru."
