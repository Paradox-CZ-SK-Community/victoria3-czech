l_polish:
 je_spa_economic_regeneration_master_completion_tt_1: "Dokončili jsme #v 6#! reforem #bold $je_group_spa_economic_regeneration$#!"
 je_spa_economic_regeneration_master_completion_tt_2: "Dokončili jsme #v 3#! reformy #bold $je_group_spa_economic_regeneration$#!"
 je_spa_economic_regeneration_reduce_economic_objectives_button: "Snížit hospodářské cíle"
 je_spa_economic_regeneration_reduce_economic_objectives_button_desc: "Cíle předložené v původní zprávě se zdají být poněkud příliš ambiciózní. Pokud nyní předefinujeme své hospodářské cíle, můžeme se vyhnout nejhorším důsledkům toho, že nedokážeme splnit své sliby."
 je_spa_economic_regeneration_reduce_economic_objectives_button_tt_1: "Dokončili jsme #v 3#! nebo méně reforem #bold $je_group_spa_economic_regeneration$#!"
 je_spa_economic_regeneration_reduce_economic_objectives_button_tt_2: "Budeme muset dokončit pouze #v 3#! reformy #bold $je_group_spa_economic_regeneration$#!"
 je_spa_economic_regeneration_reduce_economic_objectives_button_tt_3: "#bold Účinky#! a #bold trvání#! odměn hlavního [concept_journal_entry] #bold $je_spa_economic_regeneration_master$#! budou #r sníženy na polovinu#!"
 modifier_reduced_economic_objectives: "Snížené hospodářské cíle"
 je_spa_economic_regeneration_cheat_button: "Využít kreativní účetnictví"
 je_spa_economic_regeneration_cheat_button_desc: "Požadavky odtažitých pisálků z #italic Haciendy#! jsou v lepším případě ambiciózní a v horším pomýlené. Pokud účetní knihy jen nepatrně upravíme v náš prospěch, můžeme provádět politiku hospodářských reforem lépe odpovídající skutečným schopnostem země [ROOT.GetCountry.GetName].\n\nMusíme pouze zajistit, aby se do rukou tisku nedostal žádný kompromitující materiál."
 je_spa_economic_regeneration_cheat_button_caught_tt: "Tvůj pokus o #bold manipulaci#! je veřejnosti #r odhalen#!."
 je_spa_economic_regeneration_cheat_button_success_tt: "#bold Kritéria dokončení#! i #bold odměny#! tohoto [concept_journal_entry] jsou #g zmírněny#!"
 je_spa_economic_regeneration_cheat_button_conditions_tt: "Základní šance na úspěch je určena tvým [concept_law] [GetLawGroup('lawgroup_free_speech').GetName]:\n• #v 90 %#! při platnosti [concept_law] [GetLawType('law_outlawed_dissent').GetName]\n• #v 70 %#! při platnosti [concept_law] [GetLawType('law_censorship').GetName]\n• #v 40 %#! při platnosti [concept_law] [GetLawType('law_right_of_assembly').GetName]\n• #v 20 %#! při platnosti [concept_law] [GetLawType('law_protected_speech').GetName]\nTato šance se dále zvyšuje o:\n• #g +10 %#! za #bold každou úroveň#! [GetInstitutionType('institution_home_affairs').GetName], kterou máš"
 modifier_bureaucratic_interference: "Byrokratické machinace"
 je_spa_economic_regeneration_master_status_loc_blank: ""
 je_spa_economic_regeneration_master_status_loc: "Dokončili jsme #variable [ROOT.GetCountry.MakeScope.Var('spa_economic_regeneration_var').GetValue]#!/#variable [ROOT.GetCountry.MakeScope.Var('spa_economic_regeneration_goal_var').GetValue]#! reforem"
 je_group_spa_economic_regeneration: "Hospodářská regenerace"
 modifier_failed_economic_regeneration: "Neúspěšná hospodářská regenerace"
 je_spa_economic_regeneration_master_timeout_tt_1: "Pokud dokončíme #bold více než polovinu#! z #variable [ROOT.GetCountry.MakeScope.Var('spa_economic_regeneration_goal_var').GetValue]#! plánovaných reforem #bold $je_group_spa_economic_regeneration$#!, tento postih bude #g zmírněn#!"
 je_spa_economic_regeneration_master_timeout_tt_2: "Protože jsme dokončili #bold více než polovinu#! z #variable [ROOT.GetCountry.MakeScope.Var('spa_economic_regeneration_goal_var').GetValue]#! plánovaných reforem #bold $je_group_spa_economic_regeneration$#!, tento postih byl #g zmírněn#!"
 je_spa_economic_regeneration_master: "Hospodářské oživení"
 je_spa_economic_regeneration_master_reason: "Dávno pryč jsou časy, kdy byla země [ROOT.GetCountry.GetName] synonymem bohatství. Staletí špatné správy a neštěstí proměnila [ROOT.GetCountry.GetAdjectiveNoFormatting] ekonomiku ve stín jejího někdejšího já - neschopnou uspokojit i ty nejzákladnější požadavky moderní doby. \n\nAle jako Ježíš pozvedl Lazara z hrobu, tak i dobří muži z Haciendy pozvednou [ROOT.GetCountry.GetAdjectiveNoFormatting] ekonomiku z jejího dlouhého spánku. Osud země [ROOT.GetCountry.GetNameNoFormatting] totiž neleží ve zchátralých říších minulosti, nýbrž v síle zítřka."
 modifier_economic_regeneration_reward_greater: "Zázrak Mesety"
 modifier_economic_regeneration_reward_lesser: "Komplexní hospodářské oživení"
 je_spa_economic_regeneration_land_reform: "Oživení: Pozemková reforma"
 je_spa_economic_regeneration_land_reform_reason: "Otázka pozemkové reformy je již dlouho na rtech [ROOT.GetCountry.GetAdjective] politiků; někteří usilují o zlomení moci velkých pozemkových elit na jihu, zatímco jiní ji chtějí ještě více upevnit.\n\nNastal čas, aby se vláda rozhodla a s neochvějným odhodláním šla zvolenou cestou."
 je_spa_economic_regeneration_land_reform_tt_1: "Pokud se rozhodneme postavit #b na stranu#! [SCOPE.gsInterestGroup('landowners_scope').GetName]:"
 je_spa_economic_regeneration_land_reform_tt_2: "Pokud se rozhodneme postavit #b proti#! [SCOPE.gsInterestGroup('landowners_scope').GetName]:"
 modifier_entrepreneurial_latifundistas: "Podnikaví latifundisté"
 modifier_marginalized_latifundistas: "Marginalizovaní latifundisté"
 je_spa_economic_regeneration_modernise_agriculture: "Oživení: Zemědělství"
 je_spa_economic_regeneration_modernise_agriculture_reason: "Procházet méně rozvinutými oblastmi Meseta Central znamená vykročit zpět v čase. Pluhy a nástroje tamních rolníků se jen málo liší od těch, které používali jejich předkové; jejich výnosy dusí postupy, jež byly jinde dávno opuštěny.\n\nBez reformy nemůže země doufat, že udrží prosperitu [ROOT.GetCountry.GetName]."
 je_spa_economic_regeneration_modernise_agriculture_tt_1: "Následující platí po #b 24#! po sobě jdoucích měsíců (aktuálně #v [ROOT.GetCountry.MakeScope.Var('je_spa_economic_regeneration_modernise_agriculture_timer_var').GetValue]#!):"
 je_spa_economic_regeneration_modernise_agriculture_tt_2: "Následující platí po #b 12#! po sobě jdoucích měsíců (aktuálně #v [ROOT.GetCountry.MakeScope.Var('je_spa_economic_regeneration_modernise_agriculture_timer_var').GetValue]#!):"
 modifier_population_boom: "Populační boom"
 modifier_falling_birthrates: "Klesající porodnost"
 je_spa_economic_regeneration_mining: "Oživení: Těžba"
 je_spa_economic_regeneration_mining_reason: "Pyrenejský poloostrov ukrývá velká, nevyužitá ložiska surových nerostů, zralá k využití.\n\nAčkoli tento sektor zatím zůstává nedostatečně rozvinutý, naši hlavní geologové trvají na tom, že půda v sobě skrývá dostatek bohatství, aby národ vynesla do nové zlaté éry těžby - překonávající i časy římské Hispánie."
 je_spa_economic_regeneration_mining_upgrade_state_trait_tt_1: "Budeme moci #g zdvojnásobit#! účinky jednoho z #tooltippable;TOOLTIP:je_spa_economic_regeneration_mining_upgrade_iberian_state_traits_tt #bold státových rysů souvisejících s těžbou#!#! v oblasti [GetGeographicRegion('region_iberia').GetName]"
 je_spa_economic_regeneration_mining_upgrade_state_trait_tt_2: "Budeme moci udělit #g pozitivní#! #b dočasný účinek#!, který doplní jeden z #tooltippable;TOOLTIP:je_spa_economic_regeneration_mining_upgrade_iberian_state_traits_tt #bold státových rysů souvisejících s těžbou#!#! v oblasti [GetGeographicRegion('region_iberia').GetName]"
 je_spa_economic_regeneration_mining_upgrade_iberian_state_traits_tt: "\n• $STATE_BASQUE_COUNTRY$: #bold $state_trait_somorrostro_valley$#!\n• $STATE_ASTURIAS$: #bold $state_trait_cuencas_mineras$#!\n• $STATE_LOWER_ANDALUSIA$: #bold $state_trait_riotinto_basin$#!\n• $STATE_MURCIA$: #bold $state_trait_sierra_minera_de_cartagena$#!"
 modifier_spa_mineral_boom: "Dobytí podzemí"
 modifier_local_mining_boom: "Těžební boom"
 modifier_mineral_investment_dearth: "Nedostatek investic do nerostů"
 je_spa_economic_regeneration_light_industry: "Oživení: Průmysl"
 je_spa_economic_regeneration_light_industry_reason: "Nikde není předmodernost země [ROOT.GetCountry.GetName] cítit tak silně jako v jejím výrobním sektoru. [ROOT.GetCountry.GetAdjectiveNoFormatting] manufaktury, stále převážně řemeslné povahy, mají potíže konkurovat levnému zahraničnímu zboží, s výjimkou několika vybraných lokalit, jako je Barcelona.\n\nVybudováním silného výrobního sektoru na klíčových místech naší říše můžeme zvrátit příliv zahraniční hospodářské nadvlády."
 modifier_industrial_investment_dearth: "Nespokojený výrobní sektor"
 modifier_manufactoring_boom: "Výrobní boom"
 every_state_following_requirements_tt: "Každý [concept_state] splňující požadavky získá následující modifikátor:"
 modifier_facilitated_manufacturing_boom: "Mistři továrny"
 je_spa_economic_regeneration_railways: "Oživení: Železnice"
 je_spa_economic_regeneration_railways_reason: "Z mnoha velkých vynálezů této doby se jen málokterý vyrovná syrovému potenciálu parní lokomotivy. [ROOT.GetCountry.GetAdjective] vnitrozemí zůstávalo dlouho relativně izolované od zbytku země, sevřené hornatým terénem, špatnou silniční sítí a řekami, které jsou splavné jen zčásti.\n\nAle tam, kde selhaly vozy a čluny, parní lokomotiva zvítězí a každý coul [ROOT.GetCountry.GetAdjectiveNoFormatting] půdy bude propojen s širším trhem stejně jako dnes přístav Bilbao."
 modifier_arteries_of_the_nation: "Tepny národa"
 modifier_railway_magnates: "Železniční magnáti"
 modifier_entrenchment_of_local_power: "Izolovaná mocenská centra"
 je_spa_economic_regeneration_ultramar: "Oživení: Kolonie"
 je_spa_economic_regeneration_ultramar_reason: "Během takzvaného Zlatého století pocházela velká část bohatství země [ROOT.GetCountry.GetName] z jejích kolonií. Ačkoli se dynamika kolonialismu od té doby výrazně změnila, některé pravdy platí dnes stejně jako tehdy:\n\nUltramar obsahuje velké bohatství a byli bychom pošetilí, kdybychom ho nevyužili."
 every_colonial_subject_following_requirements_tt: "Každá #b koloniální#! [concept_subject] splňující požadavky získá následující modifikátor:"
 modifier_integrated_colony: "Finančně integrovaná kolonie"
 modifier_neglected_colony: "Zanedbané ministerstvo zámoří"
 spa_economic_regeneration_events.1.t: "O obecném stavu veřejné pokladny"
 spa_economic_regeneration_events.1.d: "Ministr financí zdůraznil nedostatečně rozvinutý stav [ROOT.GetCountry.GetAdjective] ekonomiky a načrtl ambiciózní reformní plán, jehož cílem je znovu zařadit zemi mezi přední světové ekonomiky."
 spa_economic_regeneration_events.1.f: "#bold Hospodářská zpráva o obecném stavu veřejné pokladny pro nejjasnějšího [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFormatting]#!\nVážené pány z města [ROOT.GetCountry.GetCapital.GetCityHubName] by nemělo nijak překvapit, že vlny průmyslových a obchodních inovací, které tak proměnily naše bratry za Pyrenejemi, dosud s plnou vážností nedorazily k břehům našich vlastních držav. Hacienda zastává názor, že bez okamžitých opatření směřujících k nápravě této rostoucí nerovnováhy nebude cesta naší země směřovat k civilizaci a prosperitě, nýbrž k barbarství a bídě. Následující zpráva bude ..."
 spa_economic_regeneration_events.1.a: "Možná skličující. Ale nezbytné."
 spa_economic_regeneration_events.1.b: "V tuto chvíli nejsme v postavení, kdy bychom se tím mohli zabývat."
 spa_economic_regeneration_events.1.tt_1: "#bold Program hospodářského oživení#! požaduje provedení série reforem během #v 20#! let."
 spa_economic_regeneration_events.1.tt_2: "Nesplnění cílů programu včas #r zhorší#! [ROOT.GetCountry.GetAdjective] politickou stabilitu"
 spa_economic_regeneration_events.1.tt_3: "#bold $je_spa_economic_regeneration_master$#! [concept_journal_entry] bude prozatím #r deaktivován#!, ale po #v 5#! letech bude opět #g dostupný#!."
 modifier_economic_regeneration_postponed: "Hospodářské oživení odloženo"
 spa_economic_regeneration_events.2.t: "Vládní manipulace odhalena"
 spa_economic_regeneration_events.2.d: "Neohrožení reportéři pracující pro [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] odhalili naše pokusy o manipulaci a zveřejnili zdrcující zprávu obviňující vládu z neschopnosti a klamu."
 spa_economic_regeneration_events.2.f: "Káva dnes chutnala lépe. Vždycky chutnala lépe, když měl dobrou náladu. A dnes ji dobrou měl. Nic, alespoň nic, co by se dalo otisknout, nedělalo starému muži větší radost než sledovat, jak se současná vláda potácí od skandálu ke skandálu. „Zatracení idioti,“ zamumlal a znovu si usrkl kávy."
 spa_economic_regeneration_events.2.a: "K čertu s nimi všemi. Znovu potvrďte náš závazek k původním cílům."
 spa_economic_regeneration_events.2.b: "Spusťte masivní tiskovou kampaň, která jejich tvrzení zdiskredituje."
 spa_economic_regeneration_events.2.tt_1: "Původní cíle zůstanou nezměněny a už se o to nebudeme moci znovu pokusit."
 modifier_regeneration_target_manipulations_revealed: "Manipulace s cíli oživení odhalena"
 modifier_divisive_press_campaign: "Rozdělující tisková kampaň"
 modifier_press_campaign_expenses: "Financování provládních novin"
 spa_economic_regeneration_events.3.t: "Než se skřivan probudí"
 spa_economic_regeneration_events.3.d: "Rozsáhlé [ROOT.GetCountry.GetAdjective] investice do těžby přinesly ovoce a důlní jámy země kypí činností jako nikdy předtím. Obzvlášť úspěšná společnost nyní oslovila vládu s návrhem na zlepšení těžební infrastruktury jednoho z našich hlavních důlních okrsků."
 spa_economic_regeneration_events.3.f: "Dvě ostrá zaklepání na dveře přerušila horníkovu snídani. Zdržel se příliš dlouho a předákův poskok obcházel domy. #italic Ten zatracený patolízal#!. Políbil ženu na rozloučenou, přehodil si pytel přes záda a vykročil do chladu časného úsvitu. Ponurý průvod se vinul z podnikového městečka vzhůru k ústí šachty, mlčenlivý až na tlumené řinčení kovu o kov. Čekalo ho dvanáct hodin dřiny a tmy."
 spa_economic_regeneration_events.3.a: "Nasměrujte je k bohatým žilám [GetGoods('iron').GetName] v oblasti [SCOPE.sState('basque_country_scope').GetStateRegion.GetName]."
 spa_economic_regeneration_events.3.b: "Jámy na [GetGoods('sulfur').GetName] v oblasti [SCOPE.sState('lower_andalusia_scope').GetStateRegion.GetName] by se mohly rozšířit."
 spa_economic_regeneration_events.3.c: "Starší doly na [GetGoods('lead').GetName] v oblasti [SCOPE.sState('murcia_scope').GetStateRegion.GetName] potřebují modernizaci."
 spa_economic_regeneration_events.3.e: "Co jiného než [GetGoods('coal').GetName], černé zlato oblasti [SCOPE.sState('asturias_scope').GetStateRegion.GetName]."
 spa_economic_regeneration_events.4.t: "Hacienda požaduje činy"
 spa_economic_regeneration_events.4.d: "Ministr financí se odvolává na program hospodářských reforem navržený před několika lety a nyní požaduje, abychom podnikli okamžité kroky k jeho zavedení. Tvrdí, že pokud bude vládní nečinnost pokračovat, [ROOT.GetCountry.GetName] skončí na smetišti dějin."
 spa_economic_regeneration_events.4.f: "$spa_economic_regeneration_events.1.f$"
 spa_economic_regeneration_events.4.a: "Dobrá, proveďte nezbytná oznámení."
 spa_economic_regeneration_events.4.b: "Stále nejsme v postavení, kdy bychom se tím mohli zabývat."
 spa_economic_regeneration_events.4.tt: "Jelikož jsme reformy již #bold jednou odložili#!, #r postihy#! za jejich další odložení budou #r dvojnásobné#!."
 spa_economic_regeneration_events.5.t: "Plus Ultra"
 spa_economic_regeneration_events.5.d: "Po úspěšném provedení reformního programu oživení sklízí vláda chválu i od svých nejzahořklejších odpůrců."
 spa_economic_regeneration_events.5.f: "Pevnou rukou ministr otevřel velkou účetní knihu a ještě jednou pohlédl na čísla uvnitř. Do jaké míry jim lze věřit, si nebyl zcela jist, ale vedle veřejného jásotu, který jistě vyvolají, na tom záleželo jen málo. Ne, pomyslel si. Toto zúčtování lze ponechat dětem zítřka. Dnešek patřil jemu."
 spa_economic_regeneration_events.5.a: "[ROOT.GetCountry.GetName] hrdě kráčí do budoucnosti."
 modifier_great_reformer: "Velký reformátor"
 modifier_capable_reformer: "Schopný reformátor"
 spa_economic_regeneration_events.6.t: "Úpadek"
 spa_economic_regeneration_events.6.d: "Neschopnost vlády prosadit reformy oživení vyvolala veřejné pobouření. Rozzlobené davy se shromažďují před Haciendou, zatímco tisk prohlašuje tento neúspěch za národní ostudu."
 spa_economic_regeneration_events.6.f: "Kolik ponížení musí tato země ještě snést? Nestačily snad události minulého století? Ministr odhrnul závěs a pohlédl do ulice, kde dav vztyčil podobiznu v jeho podobě - hrubou figuru visící na špatně uvázaném provaze. Její tvář nesla pokřivenou parodii téhož kníru, který ho zdravil každé ráno, a pohupovala se nahoru a dolů v rytmu šílených bláznů pod ním.\n\nObrátil se ke svému komorníkovi. „Pošlete prosím pro kočár. A pošlete vzkaz mému holiči, že ho dnes odpoledne musím vidět.“"
 spa_economic_regeneration_events.6.a: "Karty byly rozdány proti nám."
 spanish_new_world_events.1.t: "Španělské državy v Novém světě"
 spanish_new_world_events.1.d: "S obnoveným pořádkem doma musí [ROOT.GetCountry.GetName] rozhodnout o svém postoji vůči svým bývalým vzbouřeným koloniím v Amerikách, jejichž nezávislost zůstává městem [ROOT.GetCountry.GetCapital.GetCityHubName] neuznána."
 spanish_new_world_events.1.f: "„Pánové, je nezbytné, abychom následovali příkladu Anglie. Když si uvědomila, že třináct kolonií je nadobro ztraceno, vytvořila s nimi silné obchodní a kulturní pouto. Dodnes zůstává jedním z jejích největších zdrojů síly.\n\nProč bychom měli zahodit takovou příležitost kvůli zpackané slávě nebo pomstě? Zvlášť s ohledem na to, v jakém stavu se nyní nacházíme?“"
 spanish_new_world_events.1.a: "Stará říše je pryč. Je čas čelit realitě naší situace."
 spanish_new_world_events.1.b: "Zbabělci. Pošlete pro ministra války, zrada nesmí být odměněna."
 spanish_new_world_events.1.tt_1: "Tím se vydáme cestou #g normalizace#! vztahů s našimi bývalými koloniemi."
 spanish_new_world_events.1.tt_2: "Tím se vydáme #b obtížnou#! cestou #r dobývání#! zaměřenou na naše bývalé kolonie."
 spanish_new_world_events.1.tt_3: "[SCOPE.sCountry('britain_scope').GetName] a [SCOPE.sCountry('usa_scope').GetName] pravděpodobně #b zasáhnou proti nám#! v [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] zaměřených na naše bývalé kolonie, pokud s nimi nebudeme mít velmi dobré vztahy."
 spanish_new_world_events.1.tt_4: "[ROOT.GetCountry.GetAdjective] [concept_relations] se zeměmi [SCOPE.sCountry('britain_scope').GetName], [SCOPE.sCountry('usa_scope').GetName] a #b všemi bývalými [ROOT.GetCountry.GetAdjectiveNoFormatting] koloniemi#! se zhorší o #r 30#!"
 spanish_new_world_events.1.tt_5: "#b Zostudíme#! se v očích mezinárodního společenství a všechny jihoamerické země ztratí [concept_modifier] #b $modifier_not_recognized_by_spain$#!"
 modifier_spanish_infamy_reduction: "Diplomatické iniciativy v Novém světě"
 spanish_new_world_events.1.tt_3_event_insight: "#b $GBR$#! a #b $USA$#! pravděpodobně #b zasáhnou proti nám#! v [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] zaměřených na naše bývalé kolonie, pokud s nimi nebudeme mít velmi dobré vztahy."
 spanish_new_world_events.1.tt_4_event_insight: "[ROOT.GetCountry.GetAdjective] [concept_relations] s #b $GBR$#!, #b $USA$#! a #b všemi bývalými [ROOT.GetCountry.GetAdjectiveNoFormatting] koloniemi#! se zhorší o #r 30#!"
 spanish_new_world_events.2.t: "Naše americká říše"
 spanish_new_world_events.2.d: "Nemožné se stalo skutečností: vláda země [ROOT.GetCountry.GetName] nad Novým světem byla obnovena. Na oslavu této významné události byly v hlavních městech obnovených audiencií uspořádány velké triumfy."
 spanish_new_world_events.2.f: "Když toho rána zazněla polnice a nad pevností Castillo de San Felipe de Barajas byla vztyčena [ROOT.GetCountry.GetAdjectiveNoFormatting] vlajka, srdce mladého desátníka naplnila hrdost. I v ospalé asturské vesnici jeho mládí se vzpomínka na obranu Cartageny tyčila vysoko. Nyní z jejích hradeb znovu hrdě vlála [ROOT.GetCountry.GetAdjectiveNoFormatting] korouhev.\n\nTichým slibem sobě i Všemohoucímu přísahal, že dokud mu v těle zůstane dech, tato standarta už nikdy nepadne."
 spanish_new_world_events.2.a: "Naše říše se znovu rozkládá od pobřeží k pobřeží."
 spanish_new_world_events.2.b: "Všichni musí poznat sílu [ROOT.GetCountry.GetAdjective] legií."
 modifier_our_american_empire_reward_military: "Víra v říši"
 modifier_our_american_empire_reward_regular: "Španělské jezero"
 spanish_new_world_events.3.t: "O pánech a služebnících"
 spanish_new_world_events.3.d: "Podpisem poslední smlouvy byly [ROOT.GetCountry.GetAdjective] diplomatické vztahy s jejími bývalými poddanými jasně vymezeny a hlasy srdečnosti a vzájemného prospěchu zvítězily nad hlasy pomsty."
 spanish_new_world_events.3.f: "Když poslední delegát odešel, velvyslancova mysl se od praktických záležitostí zatoulala jinam. Před stoletím by takové setkání probíhalo mezi pánem a služebníkem; nyní se setkali jako rovní. Setrval u té myšlenky, nejistý, zda v něm probouzí hrdost, nebo žal. Jak by tento obrat osudu posoudili jeho dědové a jak jeho vnuci? A především, jak by ho posoudil Všemohoucí? Nebyly snad španělské državy kdysi považovány za Bohem dané?\n\nNa tom nezáleželo, nyní se mohl soustředit jen na jedinou prostou myšlenku:"
 spanish_new_world_events.3.a: "Matka a její děti, konečně usmířené."
 spanish_new_world_events.4.t: "Starý řád"
 spanish_new_world_events.4.d: "S obnovením země [SCOPE.sCountry('relevant_country_scope').GetName] se [ROOT.GetCountry.GetName] ocitá o krok blíže k obnově své dávné nadvlády. Nyní musíme rozhodnout o územním rozsahu naší [SCOPE.sCountry('relevant_country_scope').GetAdjectiveNoFormatting] závislé země."
 spanish_new_world_events.4.d_caribbean: "Když je [SCOPE.sCountry('new_spain_scope').GetName] znovu pod [ROOT.GetCountry.GetAdjective] kontrolou, někteří koloniální úředníci se vyslovili pro konsolidaci našich karibských kolonií."
 spanish_new_world_events.4.f: "Kolem něj se komnatou hemžili poslové, každý nesl listiny, které měly rozhodnout o osudu tisíců. Podepisoval je všechny bez přestávky, každý dekret nesl tíhu říše. Po léta byly pročesávány staré koloniální záznamy, svolávány rady a nasloucháno hlasům ze všech koutů španělských držav.\n\nNyní konečně práce přinesla ovoce: [SCOPE.sCountry('relevant_country_scope').GetNameNoFormatting] se vrátila do lůna říše."
 spanish_new_world_events.4.f_caribbean: "„Promiňte, kolik pesos ročně jste říkal?“\n\n„Přesně to jsem si myslel, Vaše Excelence. Tato struktura paralelní správy slouží jen k vysávání našich pokladen a posilování rozvratníků.“"
 spanish_new_world_events.4.a_1: "Přidělit jim severoamerickou pevninu."
 spanish_new_world_events.4.a_2: "Budou vládnout celé oblasti [GetStrategicRegion('region_gran_colombia').GetName]."
 spanish_new_world_events.4.a_3: "Budou vládnout celé oblasti [GetStrategicRegion('region_andes').GetName]."
 spanish_new_world_events.4.a_4: "Budou vládnout celé oblasti [GetStrategicRegion('region_la_plata').GetName]."
