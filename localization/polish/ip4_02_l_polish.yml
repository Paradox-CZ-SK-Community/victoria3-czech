 subject_interactions.1.t: "Jmenování guvernéra"
 subject_interactions.1.d: "Existuje několik možných typů kandidátů, které můžeme zvážit pro čelo správy v zemi [SCOPE.sCountry('target_country').GetName]. Jaký typ vůdce hledáme?"
 subject_interactions.1.f: "„Vládnutí je velmi křehká věc. Každý stát má své vlastní přesné tlaky, své lobby a své starosti. Naším úkolem je zajistit, aby byly všechny tyto problémy účinně smeteny ze stolu a už nikdy nezasahovaly do našich cílů.“"
 subject_interactions.1.a: "Úřadu se ujme pan [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], [GetCharacterTrait('special_character_colonial_plantation').GetName]."
 subject_interactions.1.b: "Zvolme [GetCharacterTrait('special_character_colonial_local').GetName]: pana [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
 subject_interactions.1.c: "Svěřme úřad panu [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], [GetCharacterTrait('special_character_colonial_extraction').GetName]."
 subject_interactions.1.e: "Pan [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], [GetCharacterTrait('special_character_colonial_business').GetName], je nejlepší volbou."
 subject_interactions.1.g: "[GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] zajistí stabilitu."
 subject_interactions.2.t: "Změna režimů"
 subject_interactions.2.d: "Je naším právem napravit problémy ve správě země [SCOPE.sCountry('target_country').GetName]. Otázkou je pouze to, jaké změny je třeba provést."
 subject_interactions.2.f: "Postavy se tísnily kolem stolu a vyměňovaly si spisy. Bylo to mimořádné - stáli tady, přeskupovali slova a společným přikývnutím a tahem pera měli změnit samotnou podstatu národa."
 subject_interactions.2.a: "Změníme vládnoucí strany v zemi [SCOPE.sCountry('target_country').GetName]."
 subject_interactions.2.b: "Zavést vládu jedné strany."
 subject_interactions.2.c: "Demokratizovat zemi [SCOPE.sCountry('target_country').GetName]."
 subject_interactions.2.dd: "Musíme reformovat trhy země [SCOPE.sCountry('target_country').GetName]."
 subject_interactions.2.e: "[SCOPE.sCountry('target_country').GetName] se stane předvojem revoluce!"
 subject_interactions.3.t: "Žádost o guvernéra"
 subject_interactions.3.d: "Politické zřízení města [ROOT.GetCountry.GetCapital.GetCityHubName] považuje vedení [ROOT.GetCountry.GetAdjective] záležitostí ze strany [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetLastName] za nedostatečné a požádalo zemi [SCOPE.sCountry('relevant_country').GetName], aby jmenovala nového guvernéra lépe sladěného s jeho cíli."
 subject_interactions.3.f: "„Vládnutí je velmi křehká věc. Každý stát má své vlastní přesné tlaky, své lobby a své starosti. Naším úkolem je zajistit, aby byly všechny tyto problémy účinně smeteny ze stolu a už nikdy nezasahovaly do našich cílů.“"
 subject_interactions.3.a: "Úřadu se ujme pan [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], [GetCharacterTrait('special_character_colonial_plantation').GetName]."
 subject_interactions.3.b: "Zvolme [GetCharacterTrait('special_character_colonial_local').GetName]: pana [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
 subject_interactions.3.c: "Svěřme úřad panu [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], [GetCharacterTrait('special_character_colonial_extraction').GetName]."
 subject_interactions.3.e: "Pan [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], [GetCharacterTrait('special_character_colonial_business').GetName], je nejlepší volbou."
 subject_interactions.3.g: "[GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] zajistí stabilitu."
