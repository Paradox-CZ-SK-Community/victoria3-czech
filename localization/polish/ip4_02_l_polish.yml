 vernacular_events.1.t: "O postavení regionálních jazyků"
 vernacular_events.1.d: "Významní politici a intelektuálové, kteří prosazují univerzalizaci jazyka kultury [SCOPE.sCulture('official_culture_scope').GetName], tlačí na tvrdá asimilační opatření namířená proti mluvčím regionálních jazyků země [ROOT.GetCountry.GetName]."
 vernacular_events.1.f: "Ačkoli by existence jediného globálního jazyka byla skutečně osvobozující, politicky to není proveditelné; jediný jazyk uvnitř státu by však byl životaschopným projektem.\n\n— Henri Grégoire, #italic Zpráva o nezbytnosti a prostředcích k vyhlazení patois a k univerzalizaci užívání francouzského jazyka#!"
 vernacular_events.1.a: "Mluvte jazykem [SCOPE.sCulture('official_culture_scope').GetName], buďte čistí."
 vernacular_events.1.b: "Ne. Pracujte na udělení společného úředního postavení pro [ROOT.GetCountry.GetCustom('getRegionalLanguagesType')]."
 vernacular_events.1.c: "Pokračujte ve stávající politice, není třeba rozbouřit vody."
 vernacular_events.1.a_tt: "Pokusíme se #r asimilovat#! mluvčí [ROOT.GetCountry.GetCustom('getRegionalLanguagesType')], aby z nich byli dobří [SCOPE.sCulture('official_culture_scope').GetCustom('getPluralDemonym')]. Tím získáme #b silné bonusy#! týkající se #b centralizace#! a #b homogenizace#! našeho státu"
 vernacular_events.1.b_tt: "Pokusíme se #g integrovat#! mluvčí [ROOT.GetCountry.GetCustom('getRegionalLanguagesType')], což nás odmění dalšími [concept_primary_cultures]. To bude vyžadovat #b vysoké kulturní#! [concept_acceptance] a splnění různých #b regionálních agend#!"
 vernacular_events.1.c_tt: "#b $je_vernacular_policy$#! [concept_journal_entry] bude navždy #r zrušen#!"
