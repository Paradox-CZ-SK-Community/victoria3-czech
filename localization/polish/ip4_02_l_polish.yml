 spanish_new_world_events.5.t: "Uznání"
 spanish_new_world_events.5.d: "Jelikož právní postavení země [ROOT.GetCountry.GetName] již není zpochybňováno, její přítomnost na mezinárodní scéně se nepochybně posílí."
 spanish_new_world_events.5.f: "Ačkoli skutečná nezávislost byla vybojována na hrotech bajonetů statečnými bojovníky osvobozeneckých válek, právní svrchovanost země [ROOT.GetCountry.GetAdjectiveNoFormatting] měla být zajištěna díky práci vzdělanců, jako byl on.\n\nBylo to stejně slavné jako hrdinná obrana nebo velkolepý útok? Možná ne.\n\nNáměstí a plazy města [ROOT.GetCountry.GetCapital.GetCityHubName] pravděpodobně nikdy neponesou jeho jméno, přesto ho naplňovalo velké uspokojení vědomí, že v opředených dějinách země [ROOT.GetCountry.GetNameNoFormatting] zanechal stopu právě #italic on#!."
 spanish_new_world_events.5.a: "Toto datum vstoupí do [ROOT.GetCountry.GetAdjective] dějin."
 je_spanish_new_world_dummy: "Vzpomínky na Indie"
 je_spanish_new_world_dummy_reason: "N/A"
 je_spanish_new_world_dummy_status_desc: "Osud Nového světa dosud nebyl rozhodnut."
 je_spanish_new_world_dummy_tt: "Budeme se muset rozhodnout mezi normalizací a zlepšením vzájemných vztahů mezi námi a našimi bývalými americkými koloniemi, nebo potrestáním těchto národů jako rebelů, jimiž jsou."
 je_reconquista: "Reconquista"
 je_reconquista_reason: "V okamžiku naší největší nouze, kdy armády prokletého maršála vypalovaly cestu našimi zeměmi, se nevděčníci a radikálové nejnižšího druhu chopili příležitosti odvrhnout lásku a ochranu své #italic madre patria#!.\n\nTito pomýlení pošetilci musí poznat následky svých činů. Neboť [ROOT.GetCountry.GetName] je věčná a její vláda nad Novým světem bude obnovena."
 reestablish_new_spain_goal_tt: "Obnovili jsme #b Nové Španělsko#!"
 reestablish_new_grenada_goal_tt: "Obnovili jsme #b Novou Granadu#!"
 reestablish_peru_goal_tt: "Obnovili jsme #b Peru#!"
 reestablish_la_plata_goal_tt: "Obnovili jsme #b Río de la Plata#!"
 je_reconquista_goal_tt: "Pokud tento [concept_journal_entry] dokončíš před #v 1. lednem 1880#!, tento [concept_modifier] bude #g trvalý#!"
 new_world_colonies_cooldown: "V uplynulém #bold roce#! nebyla znovu zřízena žádná americká kolonie"
 button_reestablish_new_spain: "Obnovit Nové Španělsko"
 button_reestablish_new_spain_desc: "Nové Španělsko, první a možná nejdůležitější španělské místokrálovství, bylo založeno roku 1535 na troskách staré aztécké říše. Zahrnovalo všechna španělská území a nároky v Severní Americe a zároveň mělo jurisdikci nad Karibikem a španělskými územími v Asii."
 button_reestablish_new_grenada: "Obnovit Novou Granadu"
 button_reestablish_new_grenada_desc: "Místokrálovství Nová Granada, zrozené roku 1717 z nepraktičnosti správy rozsáhlých španělských držav v karibské pánvi a severních Andách z Limy, mělo krátké a neklidné dějiny. Protože postrádalo rozsáhlé nerostné bohatství Nového Španělska či Peru, čerpalo většinu svých příjmů ze zemědělství a obchodu."
 button_reestablish_peru: "Obnovit Peru"
 button_reestablish_peru_desc: "Peru, druhé nejstarší ze španělských místokrálovství, kdysi zahrnovalo všechna Španělskem držená území v Jižní Americe a bylo svědkem všeho od pádu Incké říše až po revoluce počátku 19. století. Tradičně bylo známé svým bohatým nerostným bohatstvím, avšak v 19. století jeho ekonomice převážně dominuje zemědělský sektor."
 reestablish_peru_tt: "dočasné"
 button_reestablish_la_plata: "Obnovit Río de la Plata"
 button_reestablish_la_plata_desc: "Místokrálovství Río de la Plata, založené roku 1776, bylo posledním svého druhu, které vzniklo před zhroucením španělské autority v Novém světě. Rozkládalo se od bohatých zemědělských oblastí v ústí Río de la Plata až po proslulé stříbrné doly v Potosí a soustřeďovalo část největšího bohatství Nového světa."
 button_reestablish_caribbean: "Reorganizovat Karibik"
 button_reestablish_caribbean_desc: "Španělský Karibik byl místem, kde Španělsko před nějakými čtyřmi staletími poprvé vstoupilo na pevninu, a právě zde španělská vláda přetrvala po pádu pevninských držav.\n\nKdyž byla naše vláda na pevnině znovu obnovena, musíme rozhodnout o osudu našich karibských správ."
 button_proclaim_independence: "Nevšímat si Španělska"
 button_proclaim_independence_desc: "Měsíc nedbá na štěkot psů. Pokud světu ukážeme, že moc Nového světa převyšuje moc Starého, úsudek naší staré, zanedbávající mateřské země nebude mít žádný význam."
 modifier_a_show_of_strength: "Ukázka síly"
 je_hispanoamerica: "Hispanoamerika"
 je_hispanoamerica_reason: "Nebudeme plýtvat muži a zdroji v marném pokusu obnovit to, co kdysi bylo. Místo toho budou srdečnost a vzájemný prospěch určovat [ROOT.GetCountry.GetAdjective] vztah s jejími bývalými koloniemi. Nařídíme svým diplomatům, aby s našimi bývalými poddanými vypracovali [Concept('concept_treaty','$concept_treaties$')] o obchodu a přátelství, čímž světu vyšleme mocné poselství o své velkorysosti.\n\n#b Formální uznání#!\nAčkoli bývalé kolonie země [ROOT.GetCountry.GetNameNoFormatting] v Amerikách získaly #italic de facto#! nezávislost po #b španělsko-amerických válkách za nezávislost#! na počátku 19. století, žádné #italic de jure#! uznání tohoto nového postavení nenásledovalo.\n\nDokud [ROOT.GetCountry.GetNameNoFormatting] formálně neuzná nezávislost svých bývalých kolonií pomocí [concept_article] #b Uznat nezávislost#! v rámci [concept_treaty], zůstanou dvoustranné diplomatické vztahy #b vážně omezeny#!."
 modifier_hispanoamerica_reward: "Nanejvýš zvláštní vztah"
 je_hispanoamerica_improve_relations: "[ROOT.GetCountry.GetAdjective] [concept_relations] se #b všemi bývalými [ROOT.GetCountry.GetAdjectiveNoFormatting] koloniemi#! se zlepší o #g 30#!"
 je_hispanoamerica_improve_leverage: "Pokud jsme vůdcem [concept_power_bloc], [ROOT.GetCountry.GetName] získá #positive_value 100#! [concept_power_bloc_leverage] ve #b všech bývalých [ROOT.GetCountry.GetAdjectiveNoFormatting] koloniích#!"
 modifier_not_recognized_by_spain: "Nezávislost neuznána Španělskem"
 je_spanish_american_independence: "Stará metropole"
 je_spanish_american_independence_reason: "Ačkoli [ROOT.GetCountry.GetName] vypadá i jedná jako plně svrchovaný národ, naše postavení v očích světa zůstane navždy nejisté, dokud nám naši bývalí vládci odpírají uznání. Měli bychom usilovat o navázání dobrých vztahů s Madridem, nebo světu předložit tak mocnou tvář, že se nikdo neodváží zpochybnit naši legitimitu.\n\n#b Formální uznání#!\nAčkoli bývalé španělské kolonie v Amerikách získaly #italic de facto#! nezávislost po #b španělsko-amerických válkách za nezávislost#! na počátku 19. století, žádné #italic de jure#! uznání tohoto nového postavení nenásledovalo.\n\nDokud Španělsko formálně neuzná nezávislost svých bývalých kolonií pomocí [concept_article] #b Uznat nezávislost#! v rámci [concept_treaty], zůstanou dvoustranné diplomatické vztahy #b vážně omezeny#!."
 modifier_renewed_diplomatic_efforts: "Obnovené diplomatické úsilí"
 je_spanish_american_reconquista_tt: "Pokud bude Španělsko prosazovat myšlenku #b americké reconquisty#!, #b zostudí#! se v očích mezinárodního společenství a my tento [concept_modifier] ztratíme"
 je_spanish_american_optional_tt: "Pokud jsou naše [concept_relations] se zemí [SCOPE.sCountry('spain_scope').GetName] rovny #v 80#! nebo vyšší, zahájí se [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] [concept_mass_migration] do našeho národa"
 je_spanish_american_optional_tt_2: "Protože jsou naše [concept_relations] se zemí [SCOPE.sCountry('spain_scope').GetName] rovny #v 80#! nebo vyšší, zahájí se [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] [concept_mass_migration] do našeho národa"
 je_vernacular_policy: "Postavení lidového jazyka"
 je_vernacular_policy_reason: "Po staletí byly [Concept('concept_homeland','$concept_homelands$')] kultury [SCOPE.sCulture('official_culture_scope').GetName] domovem mnoha [ROOT.GetCountry.GetCustom('getRegionalLanguagesType')]. Někteří je považují za svébytné kultury a jazyky, jiní za nic víc než zkažené varianty pravé kultury [SCOPE.sCulture('official_culture_scope').GetName], a jejich rozšíření vyvolalo ve městě [ROOT.GetCountry.GetCapital.GetCityHubName] vášnivé diskuse o „otázce lidového jazyka“.\n\nZatímco někteří tvrdí, že národ nemůže doufat ve skutečné sjednocení, dokud nebude regionalismus vymýcen, jiní oponují argumenty, že [ROOT.GetCountry.GetName] nikdy nebyla a nikdy nemůže být ničím jiným než směsicí regionálních jazyků a identit, z nichž žádná není ze své podstaty nadřazena jiné."
