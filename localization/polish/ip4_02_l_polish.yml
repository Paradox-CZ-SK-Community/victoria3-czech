 vernacular_events.3.t: "Říše mnoha jazyků"
 vernacular_events.3.d: "Když je nyní postavení regionálních jazyků země [ROOT.GetCountry.GetName] uznáno a chráněno zákonem, neklidný vztah země k regionálnímu identitarismu byl konečně urovnán."
 vernacular_events.3.f: "Vyřizování místních petic nikdy nebylo snadné, ale po zavedení nových nařízení se změnilo v noční můru. Každý venkovský balík s grošem u jména mu nyní posílal své myšlenky písemně: zatracenou kakofonii slov a výrazů, které by žádný gentleman z města [ROOT.GetCountry.GetCapital.GetCityHubName] nikdy neráčil vyslovit!\n\n„Ne,“ pomyslel si a zavrtěl hlavou. Za starých dobrých časů by se takoví lidé nikdy neodvážili jednat se státním aparátem."
 vernacular_events.3.a: "V rozmanitosti jednota."
 vernacular_events.3.b: "V jednotě síla."
