 spanish_events.1.t: "La Renaixença"
 spanish_events.1.d: "Ve snaze napravit staletí diglosie začali intelektuálové kultury [GetCulture('catalan').GetName] pracovat na obrození katalánštiny jako literárního a kulturního jazyka."
 spanish_events.1.f: "„Katalánsko může stále usilovat o nezávislost - nikoli politickou, neboť ve srovnání s jinými národy s rozsáhlými armádami a loďstvy váží příliš málo, nýbrž literární, mimo dosah politické rovnováhy.“\n\n— Joaquín Rubió y Ors, „Lo Gayter del Llobregat“"
 spanish_events.1.a: "Velmi zajímavé..."
 spanish_events.1.b: "Rozvratnictví musí být vymýceno."
 spanish_events.1.c: "Co je Španělsko jiného než svazek národů, sjednocených korunou."
 modifier_empowered_catalan_fueros: "Posílené katalánské svobody"
 modifier_catalan_literary_revival: "Katalánské literární obrození"
 spanish_events.2.t: "O Rexurdimento"
 spanish_events.2.d: "Ve snaze napravit staletí diglosie začali intelektuálové kultury [GetCulture('galician').GetName] pracovat na obrození galicijštiny jako literárního a kulturního jazyka."
 spanish_events.2.f: "„Ubohá Galicie, nikdy se nesmíš\nnazývat španělskou,\nneboť Španělsko na tebe zapomíná,\nkdyž jsi tak líbezná.\nJako by ses narodila v hanbě,\nona se ve své pošetilosti stydí tě uznat,\na matka, která pohrdá svým dítětem,\nje vskutku bezcitná matka.“\n\n— Rosalía de Castro, #italic Galicijské dudy#!"
 spanish_events.2.a: "Velmi zajímavé..."
 spanish_events.2.b: "Rozvratnictví musí být vymýceno."
 spanish_events.2.c: "Co je Španělsko jiného než svazek národů, sjednocených korunou."
 modifier_empowered_galician_fueros: "Posílené galicijské obecní listiny"
 modifier_galician_literary_revival: "Galicijské literární obrození"
 spanish_events.3.t: "El Surdimientu"
 spanish_events.3.d: "Ve snaze napravit staletí diglosie začali intelektuálové kultury [GetCulture('asturleonese').GetName] pracovat na obrození asturleonštiny jako literárního a kulturního jazyka."
 spanish_events.3.f: "„Ó prameni Fascura!\nmé čelo je už bílé,\na přece, když na tebe myslím,\nnevím, co se se mnou děje,\nzda spím, či bdím,\nzda je to pravda, či sen.\nSnít! Ach, kdyby štěstí,\ntřeba jen vysněné,\nmohlo trvat bez konce,\nať se z něj nikdy neprobudím!“\n\n— Xuan María Acebal, #italic La Fonte de Fascura#!"
 spanish_events.3.a: "Velmi zajímavé..."
 spanish_events.3.b: "Rozvratnictví musí být vymýceno."
 spanish_events.3.c: "Co je Španělsko jiného než svazek národů, sjednocených korunou."
 modifier_empowered_asturleonese_fueros: "Posílené asturské obecní listiny"
 modifier_asturleonese_literary_revival: "Asturleonské literární obrození"
 dominican_events.1.t: "Přísaha"
 dominican_events.1.d: "Na tajném místě oznámila skupina revolucionářů známá jako Trinitaria svůj záměr osvobodit [SCOPE.sState('santo_domingo_state_scope').GetName] od [ROOT.GetCountry.GetAdjective] špatné správy."
 dominican_events.1.f: "„Jsme přesvědčeni, že mezi Dominikánci a Haiťany není možné žádné sloučení. Jsme a budeme dva odlišné národy. Naším osudem je být nezávislí, naprosto nezávislí.\n\nNaše společnost se bude jmenovat La Trinitaria, protože bude tvořena skupinami po třech a vložíme ji pod ochranu Nejsvětější Trojice.\n\nNaše heslo: Bůh, vlast a svoboda.“\n\n— Juan Pablo Duarte, #italic Úryvek z prvního setkání trinitářů#!"
 dominican_events.1.a: "Chci, aby tyto zrádce našli, a chci, aby je oběsili. Hned!"
 dominican_events.1.b: "Navýšit financování našich východních departementů."
 modifier_birth_of_the_liberation_army: "Dominikánská osvobozenecká armáda"
 modifier_funding_the_haitian_national_guard: "Financování východních posádek"
 modifier_expanding_the_eastern_departments: "Rozšiřování departementů Cibao a Ozama"
 dominican_events.2.t: "Povstalci obsadili Puerta del Conde"
 dominican_events.2.d: "Skupina revolucionářů zcela zaskočila [ROOT.GetCountry.GetAdjective] posádku, vtrhla do hlavní pevnosti Santo Dominga a vztyčila [SCOPE.sCountry('dominican_scope').GetAdjective] vlajku nad jejími hradbami, čímž dala signál k zahájení otevřeného nepřátelství proti městu [ROOT.GetCountry.GetCapital.GetCityHubName]."
 dominican_events.2.f: "Ve stínu velké pevnosti Santo Dominga spiklenci čekali. Bylo jich mnohem méně než těch, kteří se před několika dny slavnostně zavázali k věci, a nyní byli mnohem méně hluční. Náhle přiběhl posel, celý udýchaný: „Myslím, že nás odhalili,“ říká, „pronásledovala mě hlídka a musel jsem udělat dlouhou okliku, abych se sem vůbec dostal.“\n\nZachvátila je panika, ale když to vypadalo, že se skupina rozpadne, přerušilo je pevné „Ne!“ od Melly. „Není čas vracet se: buď budeme svobodní, nebo zemřeme.“ Zvedl svou arkebuzu do vzduchu, hlasitě zvolal: „Ať žije Dominikánská republika!“ a stiskl spoušť."
 dominican_events.2.a: "Jsme snad slepí? Nasaďte armádu!"
 dominican_events.2.b: "Za Boha, vlast a svobodu!"
 modifier_dominican_mutinies: "Vzpoury dominikánských jednotek"
 modifier_rural_peon_levies: "Odvody venkovských peonů"
 modifier_defection_of_dominican_regiments: "Dezerce dominikánských pluků"
 dominican_events.3.t: "Jednota, nikoli trojice"
 dominican_events.3.d: "Naše integrační úsilí přineslo ovoce a kdysi mocní „trinitářští“ revolucionáři ve státě [SCOPE.sState('santo_domingo_state_scope').GetName] ztratili většinu své podpůrné základny. Ostrov je konečně celistvý."
 dominican_events.3.f: "Ovládnout lid je jedna věc, pomyslel si stárnoucí generál. Získat jeho srdce je věc druhá.\n\nTo první se mu dařilo docela dobře. Strach z jeho salv držel doma nejednoho začínajícího rebela. Musel však uznat, že to druhé mu vždy unikalo - skutečnost, kterou mu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting] až příliš ochotně připomínal.\n\nKdyž jeho prapor opouštěl kantonment, zdánlivě naposledy, nemohl si pomoci a pocítil záchvěv hořkosti. Civilisté si mohou nárokovat slávu míru pro sebe, ale za svůj operační prostor vděčí jeho metodám."
 dominican_events.3.a: "Nabídnout olivovou ratolest těm, kdo jsou ochotni ji uchopit."
 dominican_events.3.b: "Musíme zajistit, aby se nic podobného už nikdy nemohlo objevit."
 modifier_breaking_dominicans: "Bičem a cukrem"
 dominican_events.4.t: "Svoboda a bezpečnost"
 dominican_events.4.d: "[ROOT.GetCountry.GetName] je konečně svobodná od haitské tyranie, avšak hrozby číhají na každém rohu. Možná by bylo moudré požádat o ochranu některou velmoc."
 dominican_events.4.f: "„Opravdu pán z La Vegy navrhuje, abychom svou těžce vybojovanou svobodu tak snadno prodali? Má snad krev našich mučedníků menší cenu než láhev levného vína?“\n\n„Lepší pán, kterého známe a sami si zvolíme, než ten, který se vnucuje silou. Ctím oběti našich mučedníků stejně jako vy, pane. Jen chci zajistit, aby naši synové a dcery nemuseli přinášet tytéž oběti.“"
 dominican_events.4.a: "Naše nezávislost je absolutní, nelze ji kompromitovat."
 dominican_events.4.b: "Znovu se staneme generálním kapitanstvím země [SCOPE.sCountry('spain_scope').GetName]."
 dominican_events.4.c: "Moc země [SCOPE.sCountry('france_scope').GetName] nás ochrání."
 dominican_events.4.e: "[SCOPE.sCountry('usa_scope').GetName] nás ochrání."
 modifier_vanguards_of_independence: "Předvoj revoluce"
 modifier_paranoid_landowners: "Paranoidní vlastníci půdy"
 dominican_events.5.t: "Santo Domingo žádá o ochranu"
 dominican_events.5.d_1: "Ze strachu o svou bezpečnost požádala země [SCOPE.sCountry('dominican_scope').GetName], aby se znovu stala generálním kapitanstvím země [ROOT.GetCountry.GetName]."
 dominican_events.5.d_2: "Ze strachu o svou bezpečnost požádala země [SCOPE.sCountry('dominican_scope').GetName] o zřízení [ROOT.GetCountry.GetAdjective] protektorátu nad zemí a nabízí poloostrov Samaná do stoletého pronájmu."
 dominican_events.5.f: "„Jsem jen pokorným nástrojem dominikánského lidu, pane. Každá duše na tom ostrově touží po laskavém doteku města [ROOT.GetCountry.GetCapital.GetCityHubName]. Zbývá jen drobná otázka mého postavení v nové správě.“"
 dominican_events.5.a: "Přijmout [SCOPE.sCountry('dominican_scope').GetAdjective] návrh."
