 vernacular_events.2.t: "V zemi [ROOT.GetCountry.GetNameNoFormatting] se mluví jazykem [SCOPE.sCulture('official_culture_scope').GetNameNoFormatting]"
 vernacular_events.2.d: "Asimilační úsilí přineslo ovoce a kdysi převládající [ROOT.GetCountry.GetCustom('getRegionalLanguagesType')] se nyní objevují už jen na rtech venkovských poustevníků a zarputilých starých bab."
 vernacular_events.2.f: "„Můj dědeček mi jednou vyprávěl o této vesnici, když jí procházel podobně jako já teď: aby sepsal každého muže, ženu, nemluvně i zvíře známé Bohu Všemohoucímu a státu. ‚Tehdy,‘ říkal, ‚byla zvířata i nemluvňata srozumitelnější než jejich starší.‘ Ha! Kolik se toho může změnit za jednu či dvě generace, dobrý pane. Kolik jen...\n\n„...“\n\n„Co?“\n\n„Srozu#italic mitelnější#!, pane.“"
 vernacular_events.2.a: "Jeden lid."
 vernacular_events.2.b: "Jeden jazyk."
