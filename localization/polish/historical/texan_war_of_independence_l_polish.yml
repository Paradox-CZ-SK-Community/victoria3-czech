l_polish:
 texan_war_of_independence.2.title: "Texaská revoluce"
 texan_war_of_independence.2.desc: "Po vítězství odstraníme texaský zájem. Pokud prohrajeme, Texas získá zpět své hranice v plném rozsahu."
 texan_war_of_independence.2.flavor: "Vzpurní Texasané konečně ukázali svou pravou tvář a vyhlásili válku našemu velkému národu. Chtějí se zmocnit naší země, a to bezpochyby s podporou Spojených států amerických. \nPostavíme se těmto zrádcům!"
 modifier_texas_war_of_independence: "Texaská válka za nezávislost"
