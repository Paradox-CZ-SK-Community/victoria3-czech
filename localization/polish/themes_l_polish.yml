 papermap_portugese: "Konzervované sardinky"
 papermap_portugese_desc: "Velmi oceňovaná součást portugalské kuchyně; sardinky jsou zvláště spojovány se svátkem sv. Antonína, který mnohým oznamuje začátek každoroční sezóny lovu sardinek."
 papermap_philippines: "Mango"
 papermap_philippines_desc: "Vyhledávané pro svou výjimečnou sladkost, manilské mango je jedním z nejznámějších produktů souostroví."
 papermap_cigar: "Kubánský doutník"
 papermap_cigar_desc: "Samotný symbol luxusu, kubánské doutníky jsou po celém světě proslulé svou bohatostí a kvalitou."
 papermap_beretyrosary: "Baret"
 papermap_beretyrosary_desc: "Vyrobený z hrubé červené vlny, tento plochý červený klobouk je převážně spojován se španělským karlistickým hnutím."
 THEME_BULK_GROUP_ep2: "$dlc018$"
 THEME_BULK_GROUP_ep2_DESC: "Motivy zahrnuté v DLC $dlc018$"
 gui_skin_ep2: "Lak"
 gui_skin_ep2_desc: "Uživatelské rozhraní s japonským motivem vyrobené z lakovaného dřeva."
 papermap_ep2: "Wakon Yōsai"
 papermap_ep2_desc: "Japonský duch, západní techniky. Mapa, která zobrazuje jak tradici a mytologii, tak i modernizaci japonských ozbrojených sil."
 papermap_tatami_mat: "Tatamiová rohož"
 papermap_tatami_mat_desc: "Rohož k sezení vyrobená z ostřice a konopí nebo bavlny. Historicky luxusní předmět vyhrazený bohatým aristokratům, tatamiové rohože se následně staly dostupnější široké veřejnosti."
 papermap_japanese_dango: "Dango"
 papermap_japanese_dango_desc: "Sladké knedlíčky z rýžové mouky pokryté sladkou polevou. Dango se obvykle podávají k zelenému čaji a konzumují se po celý rok."
 papermap_japanese_bonsai_tree: "Bonsaj bílé borovice"
 papermap_japanese_bonsai_tree_desc: "Pětijehličná borovice, proslulá svou dlouhověkostí a krásou, upravená jako bonsaj. Jeden z nejstarších žijících bonsají na světě, takzvaný Sandai Shōgun, byl poprvé ošetřován Tokugawa Iemitsu na počátku 17. století."
 papermap_japanese_dirk: "Dýka důstojníka císařského námořnictva"
 papermap_japanese_dirk_desc: "Ceremoniální dýka z 19. století, nošená důstojníkem císařského japonského námořnictva. Ceremoniální dýky byly do císařského japonského námořnictva zavedeny koncem éry Meidži a byly založeny na zavedených západních námořních normách."
 papermap_japanese_chabako_tea_set: "Chabako"
 papermap_japanese_chabako_tea_set_desc: "Dřevěná krabička obsahující náčiní potřebné pro tradiční japonský čajový obřad."
 papermap_japanese_lacquerware_box: "Lakovaná krabička"
 papermap_japanese_lacquerware_box_desc: "Lakovaná krabička zdobená #italic ojime#! a #italic netsuke#!, ručně vyřezávanými ozdobnými korálky a figurkami."
