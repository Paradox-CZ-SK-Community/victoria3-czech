 spc_church_compensation: "Církevní odškodnění"
 carlist_war.1.t: "Královská výprava"
 carlist_war.1.d: "[SCOPE.sCharacter('spc_carlos').GetFullName] shromáždil své síly a vyzývá k jednomu silnému, soustředěnému náporu na hlavní město. Cristinos, očekávající jeho útok, se připravili. Budoucnost $SPA$ bude rozhodnuta tady a teď, u bran města [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]."
 carlist_war.1.f: "Kolona se táhla tak daleko, kam Javier dohlédl, vinula se mezi spadlými balvany a řídkým křovím. Dusivý oblak prachu, který zvedalo deset tisíc namáhavě se vlekoucích nohou, zbarvil všechny jejich uniformy do šeda a smyl z nich poslední zbytky modré a bílé. V zadní části kolony jeli kněží a #italic ojalateros#! se svou nenasytnou chutí a nekonečnou zásobou stížností. Před nimi stáli liberálové a veškerá ocel i střelný prach, které dokázali shromáždit.\n\nRáno si zkontroloval bandalír a zjistil, že mu zbývá pět nábojů. Jediné, v co mohl doufat, bylo, že liberálové mají jen čtyři."
 carlist_war.1.a: "Za korunu a vlast!"
 carlist_war.1.a.spc: "Dios, Patria, Rey!"
 carlist_war.2.t_1: "Vergarské objetí"
 carlist_war.2.t_2: "Právoplatný dědic"
 carlist_war.2.d_1: "Po porážce Královské výpravy a rozprášení armád [GetIdeology('ideology_carlist').GetName] podepsal [SCOPE.sCharacter('vergara_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('vergara_general').GetFullName] ve baskickém městě Vergara mír se zbytky karlistických sil. Do [ROOT.GetCountry.GetName] se po dlouhé době vrátil křehký klid."
 carlist_war.2.d_2: "Poté, co byla liberální vláda zahnána do exilu a baskičtí dobrovolníci pochodují ulicemi města [SCOPE.sState('capital_scope').GetCityHubName], může [SCOPE.sCharacter('country_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('country_ruler').GetFullName] konečně usednout na [SCOPE.sCharacter('country_ruler').GetHerHis] právoplatný trůn. Přesto nad námi stále leží Napoleonův stín. Je toho mnoho, co je třeba vykonat, abychom získali zpět svou někdejší slávu."
 carlist_war.2.f_1: "Když důstojníci vyjeli k vyjednávání, armády stály proti sobě napříč polem. Javier si všiml, že liberálové dopředu postavili své nejzachovalejší pluky - přední řady měly všechny vysoké šaka, modro-zelené uniformy a žluté prýmky provinčních pluků. Jeho vlastní velitel samozřejmě udělal totéž. Stál bok po boku se svými druhy #italic erreketes#! a hleděl na své protějšky vzdálené padesát metrů.\n\nPak ho spatřil, na nádherném černém koni, oděného do více zlata, než by se našlo na výstroji celého jeho pluku. [SCOPE.sCharacter('vergara_general').GetPrimaryRole.GetName] [SCOPE.sCharacter('vergara_general').GetLastNameNoFormatting]. Mohl zamířit, vystřelit, rozpálit celé pole a zmařit tento fraškovitý mír? Ne, pomyslel si. Už nemohl udělat nic víc. Zbývalo jen vrátit se domů."
 carlist_war.2.f_2: "Javierův první dojem z města [SCOPE.sState('capital_scope').GetCityHubName] byl, že ve srovnání se Sunbilem jde o futuristickou metropoli. Plynové lampy osvětlovaly ulice poblíž středu města a odhalovaly skutečně ohromující množství odpadků a koňského trusu. Zdi, kdysi bílé, byly zkaženým vzduchem zbarvené do hněda a šeda a kolem dílen chrlících oblaka kouře a prachu k nebi vyrůstaly ubohé činžáky.\n\nKdyž to spatřil, rozhodl se, že budoucnost mu nijak zvlášť k srdci nepřirostla. Mnohem lepší byl čistý horský vzduch, tíha kosy v rukou. Přišel do města [SCOPE.sState('capital_scope').GetCityHubName] se zbraní v ruce, pomyslel si, aby už na [SCOPE.sState('capital_scope').GetCityHubName] nikdy nemusel myslet."
 carlist_war.2.a: "Bez jediného zaváhání."
 carlist_war.3.t: "Král a fueros"
 carlist_war.3.d: "Baskicko, přeměněné vládou Marie Cristiny na pouhou provincii a v roce 1833 obsazené jejími silami pod stanným právem, se rychle stalo baštou karlistické věci. Nyní, když je trůn dona [SCOPE.sCharacter('don_carlos_scope').GetFirstName] zajištěn, nastal čas splnit jeho slib obnovit tradiční výsady baskického lidu."
 carlist_war.3.f: "Javierovi se třásla ruka, když sevřel kliku dveří a rozrazil je. Byla tam - seděla na posteli, nohy zkřížené, klín i ruce zaměstnané pronajatým ručním stavem. Při tom zvuku vzhlédla, odstrčila stav stranou a rozběhla se k němu.\n\nKdyž tu byl naposledy, pomyslel si, jako by v rohu místnosti číhala nějaká přítomnost, zlatem oděný přízrak, který ho dohnal k tomu, aby se chopil zbraně. Teď byl pryč. Baldomero Espartero, démon Navarry, navždy vypuzen dobře mířenou kulí jednoho #italic errekete#!. Ovinul jí paže kolem pasu a konečně nechal slzy téct."
 carlist_war.3.a: "[SCOPE.sCharacter('don_carlos_scope').GetPrimaryRoleTitle] ctí všechny své poddané"
 carlist_war.3.b: "Možná bychom neměli liberály dále popouzet..."
 carlist_war.4.t: "Vše, co je svaté"
 carlist_war.4.d: "Brutální nápor politik prosazených radikálnějšími prvky v isabelinské administrativě vedl k řadě ponížení církve. Od zabírání galicijských #italic minifundias#! až po vypalování kostelů v Zaragoze nebylo ušetřeno nic a nic nebylo svaté."
 carlist_war.4.f: "Kněz, oděný ve smutečním rouchu, přecházel sem a tam po vstupní síni. Nakonec obrátil hlavu k čekajícímu důstojníkovi.\n\n„Toreno a Mendizábal - ten pohan - nám ukradli desátek, zabrali naše země a vyhnali jezuity. Někdo musí tomuto šílenství učinit přítrž! Prosím vás, pošlete mě do Madridu a já na ně sešlu Boží hněv. Psi kacířských Cortes... Pamatuji si jejich jména i tváře. Každého jednoho z nich.“"
 carlist_war.4.a: "Jen restituce mohou smýt tyto hříchy."
 carlist_war.4.b: "Velký dar by měl postačit."
 carlist_war.4.c: "Víte, válka těžce dolehla na královskou pokladnu..."
 carlist_war.5.t: "Obléhání Bilbaa"
 carlist_war.5.d: "Dosud selhaly všechny předchozí pokusy dobýt životně důležitý přístav Bilbao. Jak válka směřuje ke svému vrcholu, možná máme už jen jednu další šanci vynutit si zde vítězství. Rozhodný úder na liberální posádku v Bilbau by nejen pozvedl morálku, ale také otevřel novou, životně důležitou zásobovací trasu k našim zahraničním podporovatelům."
 carlist_war.5.f: "„Právě zde Zumalacárregui krvácel za krále. Snad právě zde můžeme znovu obrátit vývoj války.“"
 carlist_war.5.a: "Připravte děla!"
 carlist_war.5.b: "Další obléhání si nemůžeme dovolit."
 carlist_war.6.t: "Karlismus na pomezí"
 carlist_war.6.d: "Ačkoli může být Andalusie daleko od hlavního válčiště, její chudoba je za liniemi cristinos stálým zdrojem napětí. Bujné banditství a bezpráví lze využít v náš prospěch."
 carlist_war.6.f: "„Pouhá skupina potulných banditů? Možná. Přesto však velmi užitečné rozptýlení.“"
 carlist_war.6.a: "Poslat malý oddíl, aby pomohl vyvolat chaos."
 carlist_war.6.b: "Tohle je ztráta času. Král zde nemá žádné spojence."
 carlist_war.7.t: "Karlistická válka"
 carlist_war.7.d: "Don [SCOPE.sCharacter('don_carlos_scope').GetFirstName], odsunutý dvorem stranou ve prospěch [SCOPE.sCharacter('isabella_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('isabella_scope').GetFirstName] a svým zesnulým bratrem králem Ferdinandem vypovězený do exilu, se vzepřel bratrově závěti a vydal se nárokovat trůn. K věci [GetIdeology('ideology_carlist_movement').GetName] se přidávají tradicionalisté i ti, kdo se staví proti centralizačním sklonům vlády."
 carlist_war.7.f: "Javier Larrañaga seděl s tváří obrácenou ke slunci. Po obou jeho bocích se podél hřebene táhla řada stanů. Kolem nich byli roztroušeni jeho bratři ve zbrani - rozdělávali ohně, čistili muškety, sušili se po koupeli v horském potoce. V dálce se rozléhala střelba. Noví dobrovolníci, ještě zelenáči, poprvé v životě zacházeli se zbraní.\n\nOzvalo se hvízdnutí. Opřel se o pažbu své karabiny, vytáhl se na nohy a pohlédl k jihu. Tam, za Ebrem, ležela odměna jeho krále. Třicet tisíc jeho krajanů stálo ve zbrani, aby ji získalo. Kéž je Boží milosrdenství dovede k vítězství, neboť královna-pretendentka by neušetřila nikoho."
 carlist_war.7.a: "Budoucnost Španělska bude rozhodnuta na těchto kopcích. "
