l_polish:
 je_the_first_carlist_war: "Karlistická válka"
 je_the_first_carlist_war_reason: "@information! Během [concept_guerilla_war] nebudou vítězství udělovat skóre okupace a obě strany místo toho získají skóre za každou vítěznou bitvu. Po zahájení #b Královské expedice#! obdrží pozitivní modifikátor, jehož síla závisí na skóre dosaženém během $concept_guerilla_war$. #b Poté se $concept_guerilla_war$ přemění v běžnou válku#!.\n$TOOLTIP_DELIMITER$\nSmrt #b krále Ferdinanda VII. v roce 1833#! uvrhla Španělsko do nástupnické krize. #b Pragmatická sankce z roku 1830#! otevřela cestu na trůn jeho dceři #b Isabele#! ve španělském království, kde bylo nástupnictví tradičně řízeno sálským právem.\nTento akt rozhněval konzervativní části aristokracie, které místo ní považovaly za právoplatného dědice králova bratra #b Carlose#!.\n\nTo se rychle proměnilo v několik nesourodých povstání pod praporem #b karlismu#!, jehož hlavní mocenská základna se nacházela na severu země, zejména mezi #b baskickými stavy#! #b Navarrského království#!, které po desetiletí bojovaly proti další centralizaci státu a pohlcení svých zvyklostí.\nPod vedením [concept_bio_tomas_de_zumalacarregui] byli tito povstalci přetvořeni v impozantní bojovou sílu a mohli ohrozit hlavní město, pokud by jim bylo dovoleno spojit se se svými spojenci v Maestrazgu a Katalánsku."
 je_the_first_carlist_war_status: "Válka je ve fázi [concept_guerilla_war]"
 je_the_first_carlist_war_status_royal_expedition: "#b Královská expedice#! začala!"
 je_the_first_carlist_war_complete: "Vyhrál Karlistickou válku"
 je_the_first_carlist_war_score_bar: "Partyzánská fáze"
 je_the_first_carlist_war_score_bar_desc: "Skóre cristinos: [GetGlobalVariable('spa_carlist_war_score').GetValue|v0]"
 je_the_first_carlist_war_score_bar_second_desc: "Skóre karlistů: [GetGlobalVariable('spc_carlist_war_score').GetValue|v0]"
 je_the_first_carlist_war_royal_expedition: "Zahájit Královskou expedici"
 je_the_first_carlist_war_royal_expedition_desc: "Situace našich neorganizovaných sil je neudržitelná - s každým dalším dnem cristinos sílí. Král musí sjednotit své nesourodé síly a zvážit, kdy udeřit na nepřítele a znovu získat hlavní město."
 je_the_first_carlist_flush_them_out: "Vyhnat je"
 je_the_first_carlist_flush_them_out_desc: "Povstalecký nápor byl zlomen a nastal čas přejít do útoku."
 concept_bio_tomas_de_zumalacarregui: "Tomás de Zumalacárregui"
 concept_bio_tomas_de_zumalacarregui_desc: "#tooltip_header Tomas Zumalakarregi Imatz#!\n$TOOLTIP_DELIMITER$\nNarozen #v 29. prosince 1788#! v Ormaiztegi, Gipuzkoa\nZemřel #v 24. června 1835#! v Zegamě, Gipuzkoa\n\nTomás de Zumalacárregui e Imaz, svými vojáky nazývaný také „strýček Tomás“, byl baskický vojenský důstojník a jako generální kapitán karlistických sil v Navaře a Baskicku odpovídal za organizaci armády i za rozhodující raná vítězství karlistické věci.\nJeho náhlá smrt v důsledku střelného zranění na bojišti na počátku léta roku 1835 znamenala značnou ránu pro ambice dona Carlose."
 concept_guerilla_war: "Partyzánská válka"
 concept_guerilla_war_desc: "$concept_guerilla_war$ je zvláštní druh [concept_war], který podléhá souboru pravidel odlišných od běžného válčení. Jejich podrobnosti se mohou lišit od jedné $concept_guerilla_war$ k druhé.\n\nBěhem $concept_guerilla_war$ platí následující obecná pravidla:\n#indent_newline:2 $EFFECT_LIST_BULLET$ [Concept('concept_battle', '$concept_battles$')] jsou mnohem menší a vznikají pomaleji#! \n#indent_newline:2 $EFFECT_LIST_BULLET$ Mohou nastat [GetBattleCondition('battle_condition_guerilla_skirmish').GetName], [GetBattleCondition('battle_condition_guerilla_ambush').GetName] a [GetBattleCondition('battle_condition_guerilla_disarray').GetName] jako [Concept('concept_battle_condition', '$concept_battle_conditions$')]#!\n#indent_newline:2 $EFFECT_LIST_BULLET$ Vítězství neudělují skóre [concept_occupation]#!\n#indent_newline:2 $EFFECT_LIST_BULLET$ $concept_guerilla_war$ může eskalovat v běžnou $concept_war$, pokud jsou splněny podmínky specifické pro daný konflikt"
 battle_condition_guerilla_skirmish: "Potyčka"
 battle_condition_guerilla_skirmish_desc: "Tento velitel vede spojenecké jednotky v sérii menších potyček s nepřítelem."
 battle_condition_guerilla_ambush: "Léčka"
 battle_condition_guerilla_ambush_desc: "Tento velitel provádí pečlivě připravenou léčku proti nepříteli."
 battle_condition_guerilla_disarray: "Ve zmatku"
 battle_condition_guerilla_disarray_desc: "Tento velitel byl zcela zaskočen náhlým vypuknutím střetů."
