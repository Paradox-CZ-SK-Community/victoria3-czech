 caudillo_decree_button: "Vládnout dekretem"
 caudillo_decree_button_desc: "Vůdce našeho národa by neměl být zatěžován obtěžujícími vládními procesy, ať už byrokratickými nebo demokratickými. Když je národu přikázáno skočit, měl by se zeptat: „Jak vysoko?“"
 culture_brazil.7.t: "Selhání budování národa"
 culture_brazil.7.d: "Po neúspěchu při vytváření společné národní identity pro obyvatele [ROOT.GetCountry.GetName] se separatisté a nespokojenci v neintegrovaných regionech osmělili. Mnohé ze svých lidí shromáždili k různým protivládním aktivitám."
 culture_brazil.7.f: "Rozdělený dům na shnilých základech - to zůstalo po všech útrapách. Namísto jednoho národa s jedním hlasem kráčela Brazílie jako pět hádajících se bratrů. Vedl je tyran, sám obklopený zablácenými, krví potřísněnými, křičícími a zatrpklými chlapci dychtícími po odplatě, skutečné i domnělé."
 culture_brazil.7.a: "[ROOT.GetCountry.GetNameNoFormatting] musí obstát tváří v tvář této nepřízni."
