 brazilian_slavery.11.t: "Aberdeen Act"
 brazilian_slavery.11.d: "Pobouřena neochotou [SCOPE.sCountry('brazil_scope').GetAltAdjective('G')] zakázat [GetLawType('law_slave_trade').GetName], plánuje [SCOPE.sCountry('britain_scope').GetName] vynucovat Aberdeen Act. Britská plavidla budou pravidelně hlídkovat brazilské námořní trasy, aby narušovala obchod."
 brazilian_slavery.11.f: "„Člověk je jen tak dobrý, jak dobré je jeho slovo,“ praví staré přísloví. Závazek, ať už malý či zdánlivě bezvýznamný, zůstává slibem. Porušení důvěry tak může přivolat pohromu. A zde, nyní, zlomený slib probudil draka, aby ochromil obra."
 brazilian_slavery.11.a: "Otroctví je odporná praxe."
 brazilian_slavery.12.a: "Velmi znepokojivé."
