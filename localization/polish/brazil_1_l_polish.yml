 je_caudillo: "Věk caudillů"
 je_caudillo_reason: "Stav #bold Ukazatele postupu#! bude určen různými #tooltippable;tooltip:[Country.GetTooltipTag],je_caudillo_special_tooltip_advance pozitivními#! nebo #tooltippable;tooltip:[Country.GetTooltipTag],je_caudillo_special_tooltip_deplete negativními#! podmínkami. Dosažení #bold 100#! u #bold Ukazatele postupu#! upevní moc vojenských siláků v [SCOPE.sCountry('caudillo_country_scope').GetName].\n\nSnížení ukazatele postupu a udržení [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] mimo vládu zničí #bold Caudillismo#! v rámci [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] a ukončí hrozbu vojenských siláků v zemi.\n\n$je_coup_loc$\n\nPo naší nezávislosti na Španělsku vzniklo mocenské vakuum po zrušených koloniálních vládách, které bylo rychle zaplněno charismatickými vojenskými vůdci. Tito „caudillové“ začali určovat velkou část politiky v Jižní Americe."
 je_coup_loc: "Po dobu, kdy je tento [concept_journal_entry] aktivní, bude mít naše země zvýšenou šanci na [concept_coup] a jakýkoli přijatý zákon [Concept('concept_votes','$concept_voting$')] získá [concept_amendment] #b $amendment_electoral_clientelism$#!."
 je_electoral_meddling_loc: "Po dobu, kdy je tento [concept_journal_entry] aktivní, získá jakýkoli přijatý zákon [Concept('concept_votes','$concept_voting$')] [concept_amendment] #b $amendment_electoral_clientelism$#!.\n\n"
 je_caudillo_special_tooltip_advance: "[concept_journal_entry] skončí, jakmile bude ukazatel postupu plný nebo prázdný.\n\nTyto faktory #bold zvýší#! ukazatel postupu o #bold 1 měsíčně každý#!:\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] jsou [concept_powerful]\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] jsou [concept_in_government]\n• Máme [GetLawType('law_autocracy').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_technocracy').GetName] nebo [GetLawType('law_single_party_state').GetName]\n• Máme [concept_general]a nebo [concept_admiral]a s [concept_popularity] $POPULARITY_LOVED$\n• Máme [concept_ruler] s ideologií #bold Autoritářství#!"
 je_caudillo_special_tooltip_deplete: "Tyto faktory #bold sníží#! ukazatel postupu o #bold 1 měsíčně každý#!:\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] jsou [concept_marginalized]\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] nejsou [concept_in_government]\n• Máme [GetLawType('law_census_voting').GetName] nebo [GetLawType('law_universal_suffrage').GetName]\n• Máme [concept_politician]a s [Concept('concept_popularity','$loved$')], který patří do jakékoli [concept_powerful] zájmové skupiny, jež nepodporuje [GetLawType('law_autocracy').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_technocracy').GetName] ani [GetLawType('law_single_party_state').GetName]"
