 caudillo.4.d: "Podle [ROOT.GetCountry.GetAdjective] ústavy skončilo funkční období [SCOPE.sCharacter('ruler_scope').GetFullName] a musí být jmenován nový [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]. Ústavu lze však vždy změnit – nebo by tato role mohla připadnout [SCOPE.sCharacter('ruler_scope').GetHerHis] chráněnci [SCOPE.sCharacter('president_successor_scope').GetFullName]."
 caudillo.4.f: "„Vaše funkční období skončilo. Zákony [ROOT.GetCountry.GetNameNoFormatting]-“\n\n„Já jsem zákon v [ROOT.GetCountry.GetNameNoFormatting]!“"
 caudillo.4.a: "Prodloužit funkční období [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]."
 caudillo.4.b: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] musí odstoupit."
