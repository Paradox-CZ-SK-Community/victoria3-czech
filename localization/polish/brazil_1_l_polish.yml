 caudillo.1.t: "Věk caudillů"
 caudillo.1.d: "Po získání nezávislosti [ROOT.GetCountry.GetAdjective] na Španělsku vzniklo po koloniální vládě mocenské vakuum, které bylo rychle zaplněno charismatickými vůdci [SCOPE.gsInterestGroup('army_scope').GetName]. Tito „caudillové“ začali určovat velkou část politiky v Jižní Americe."
 caudillo.1.f: "Kdysi existoval dekret, že všechny kolonie se podřídí vládě své mateřské země. Že veškeré jejich zboží i slova projdou jejími branami a ona je spravedlivě posoudí. Že ona jediná bude vším, co potřebují.\n\nPak přišel Bonaparte a mateřská země se stala jeho loutkou. Možná nadešel čas, aby děti vzlétly. A vzlétnou – pod železnou pěstí otce. Tento příběh však ještě neskončil."
 caudillo.1.a: "Síla dělá právo."
 caudillo.2.t: "Poslední caudillové"
 caudillo.2.d: "Éra politiky caudillů je konečně u konce v [ROOT.GetCountry.GetName]. [SCOPE.gsInterestGroup('army_scope').GetName] zaujali své právoplatné místo služby legitimní vládě."
 caudillo.2.f: "A tak se otec stal, jako všichni lidé, příliš starým a unaveným, aby pokračoval. Nyní, drahé dítě, je země připravena udělat své první skutečné kroky vpřed. Žijeme bez dohledu matky a bez otcova biče. Dnes si každý volí svou cestu. A tví vnuci se na nás podívají a řeknou: „a žili šťastně až do smrti.“"
 caudillo.2.a: "Velký den pro řád a disciplínu."
 caudillo.3.t: "Pěst se svírá"
 caudillo.3.d: "[ROOT.GetCountry.GetName] se plně ponořila do politiky caudillů. Osud národa je řízen rozmary nejvlivnějších členů [SCOPE.gsInterestGroup('army_scope').GetName]."
 caudillo.3.f: "„Ale mami, co ta přehlídka v [SCOPE.sState('capital_scope').GetNameNoFormatting]? Stihneme tam být včas, abychom viděli Alfonse?\n\n„Zdá se, že ten příběh nikdy nedokončím. Dobře, ano, slibuji, že tam budeme včas. Ale co budeš dělat, když nebudeš moct pochodovat se svým bratrem, až vyrosteš? Dojit krávy?“\n\n„Mami, já vím, že mě [SCOPE.sCharacter('general_scope').GetLastNameNoFormatting] přijme. Budu silný pro [ROOT.GetCountry.GetNameNoFormatting]!“"
 caudillo.3.a: "Meč je mocnější než pero."
