 sa_migration.5.t: "Velká migrace"
 sa_migration.5.d: "Průmyslová revoluce v [SCOPE.sCountry('migration_country').GetName] vytvořila nedostatek pracovních míst, což činí migraci do [SCOPE.sState('migration_target_state').GetName] velmi atraktivní pro mnoho lidí [SCOPE.sCulture('migration_culture').GetName]."
 sa_migration.5.f: "Farmáři, kováři, dělníci i vysloužilí vojáci vystupovali z poslední bárky. Desítky tisíc jich přišly před nimi a další desítky tisíc jsou na cestě. Muži jsou nyní potřeba více než kdy dřív v Horní Kanadě. Řím nebyl postaven za den a stejně tak nebude ani Toronto."
 sa_migration.5.a: "Více osadníků je příležitostí pro růst naší ekonomiky."
 sa_migration.5.b: "Pokusme se omezit příliv migrantů."
