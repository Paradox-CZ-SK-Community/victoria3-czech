 sa_migration.2.d: "[ROOT.GetCountry.GetName] je rozsáhlá a požehnaná země, avšak řídce osídlená. Musíme se poohlédnout za moře, zejména do neklidné Evropy, po potenciálních osadnících pro naše pole a továrny."
 sa_migration.2.f: "Federální vláda bude podporovat evropskou imigraci a nebude omezovat, zatěžovat ani daněmi vstup cizinců na [ROOT.GetCountry.GetAdjectiveNoFormatting] území, pokud přicházejí s cílem obdělávat půdu, rozvíjet průmysl a šířit vědy a umění."
 sa_migration.2.a: "Dejte mi své unavené, své chudé, své zástupy."
 sa_migration.2.b: "Zvládáme to dobře sami."
