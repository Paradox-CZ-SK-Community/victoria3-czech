 acre_dispute.1.t: "Spor o Acre"
 acre_dispute.1.d: "Ačkoli formálně pod správou [SCOPE.sCountry('acre_claimant').GetAltAdjective('G')], oblast [SCOPE.sState('acre_state').GetName] se stala silně spornou. Oportunističtí osadníci z [SCOPE.sCountry('acre_claimant').GetAdjective] se snaží území přivlastnit a požadují zásah proti [SCOPE.sCountry('acre_owner').GetName]."
 acre_dispute.1.f: "„Dohoda je taková: vezmeš svou rodinu a hrstku pomocníků a zabereš území. Klidně ho i nelegálně obsadíš, pokud bude třeba, ale Acre má zásadní význam.“\n\n„A co zaberu, to je moje?“\n\n„Ano, v rozumné míře.“"
 acre_dispute.1.a: "Acre právem patří [ROOT.GetCountry.GetAdjective]"
 acre_dispute.3.t: "Desetitisícový les Acre"
 acre_dispute.3.d: "[ROOT.GetCountry.GetName] vychází vítězně ze sporu o [SCOPE.sState('acre_state').GetName]. [ROOT.GetCountry.GetAdjective] osadníci jsou připraveni učinit tento stát svým."
 acre_dispute.3.f: "Jedním tahem pera bylo rozhodnuto. Acre se nyní stalo svěřenou odpovědností [ROOT.GetCountry.GetNameNoFormatting]. Rivalové – jak noví uchazeči, tak původní správci – zuřili nad nepokrytým nadšením delegátů [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 acre_dispute.3.a: "Vítězství pro [ROOT.GetCountry.GetName]!"
 acre_dispute.4.t: "Nepříznivé vyřešení"
 acre_dispute.4.d: "Naše snahy o získání státu [SCOPE.sState('acre_state').GetName] selhaly a příležitost byla promarněna. [ROOT.GetCountry.GetName] již nemůže nárokovat suverenitu nad tímto státem."
 acre_dispute.4.f: "Konzul pro Acre rozrazil dveře své kanceláře. Obrazy na stěnách se rozechvěly. Služebná vykřikla a rychle opustila místnost. Poznamenal si, že se jí později omluví; jeho hněv směřoval jinam. Prozatím mu úlevu poskytla poloprázdná karafa rumu. Oznámení tohoto selhání [SCOPE.sCharacter('acre_claimant_ruler').GetPrimaryRoleTitle] si vyžádá druhou polovinu."
 acre_dispute.4.a: "Rána pro naši prestiž."
