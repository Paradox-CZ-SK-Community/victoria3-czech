 caudillo.5.t: "Tvůrce králů"
 caudillo.5.desc: "Jako vůdce [SCOPE.gsInterestGroup('army_scope').GetName] musí [SCOPE.sCharacter('army_leader').GetFullName] rozhodnout, zda armáda podpoří [SCOPE.sParty('liberal_party').GetName], nebo [SCOPE.sParty('conservative_party').GetName]."
 caudillo.5.f: "Žadatelé. To bylo slovo, které [SCOPE.sCharacter('army_leader').GetLastNameNoFormatting] napadlo, když se na něj obraceli zástupci. Lichotky, dary, odvolávání se na rodinu, skryté hrozby – vše tak sehrané jako přehlídky jednotek, které vedl. Otázka však zněla: co poslouží nejlépe jemu?"
 caudillo.5.a: "Armáda chrání zájmy elit."
 caudillo.5.b: "Reformy přijdou z hlavně pušky."
 caudillo.5.c: "Armáda bude bojovat po boku lidu."
 caudillo.5.d: "Armáda stojí především za řádem."
 south_america_two_party_system: "Jihoamerická dominance dvou stran"
 caudillo_support: "Caudillo - tvůrce králů"
 caudillo_kingmaker_button: "Určit podporu armády pro strany"
 caudillo_kingmaker_button_desc: "Mocní caudillové mají obrovský politický vliv a mohou převážit stranickou politiku tím, že podpoří jednu stranu proti druhé."
