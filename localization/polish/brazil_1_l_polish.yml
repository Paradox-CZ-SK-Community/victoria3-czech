 je_brazil_navy: "Brazilská námořní moc"
 je_brazil_navy_reason: "Od získání nezávislosti hrálo brazilské námořnictvo klíčovou roli při ochraně naší suverenity. Musíme usilovat o to stát se nejvýznamnější námořní mocností v Jižní Americe a jednou z největších na světě."
 je_brazil_navy_goal: "Následující musí platit alespoň 40 let:"
 best_south_american_navy: "Žádná země v Jižní Americe nemá větší námořní [concept_power_projection] než Brazílie"
 brazil_navy.1.t: "Brazilská námořní moc"
 brazil_navy.1.d: "Jménem našich [GetPopType('officers').GetName] připomíná [SCOPE.sCharacter('admiral_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('admiral_scope').GetLastName] vládě důležitost udržování [ROOT.GetCountry.GetAdjective] námořní síly. Musíme usilovat o to stát se nejvýznamnější námořní mocností v Jižní Americe a jednou z největších na světě."
 brazil_navy.1.f: "„Můj [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle], dovolte mi vyzvat vás, abyste zvažoval více než jen vnitřní záležitosti. Pozemní armády vyhrávají bitvy, to ano, ale jsou to vaše lodě, které vám vyhrávají říše. Úspěch Británie stál právě na takové mocné flotile. A takovou flotilu rozhodně nenajdete mezi troskami ubohých lodí našeho otce. Vždyť sotva poslouží i jako palivo! A vaši kapitáni si zaslouží lepší lodě než hnijící vraky.“"
 brazil_navy.1.a: "Námořnictvo chrání naše bohatství a stará se o náš lid."
 brazil_navy.2.t: "Sporné vody"
 brazil_navy.2.d: "V ostré kritice vlády [SCOPE.sCharacter('admiral_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('admiral_scope').GetLastName] veřejně vyjádřil zklamání admirality nad tím, že naše námořnictvo zastínily tak nedůstojné mocnosti jako [SCOPE.sCountry('naval_rival').GetName]. Pro naši [SCOPE.gsInterestGroup('navy_scope').GetName] je to národní ponížení."
 brazil_navy.2.f: "„To je skandál, pane, skandál! Ti nafoukaní [SCOPE.sCountry('naval_rival').GetAdjectiveNoFormatting] hlupáci si dovolují zesměšňovat Brazílii a ponižovat vaše muže. Naše [ROOT.GetCountry.GetGovernment.GetName] je přece hodna respektu, [SCOPE.sCharacter('ruler_scope').GetCustom('get_dom_dona')] [SCOPE.sCharacter('ruler_scope').GetFirstNameNoFormatting]! Vezměte jim to zpět!“"
 brazil_navy.2.a: "Musíme se zlepšit."
 brz_navy_advocate: "Hlas námořnictva"
 brz_eclipsed_navy: "Zastíněné námořnictvo"
 brazil_navy.3.t: "Plnou rychlost vpřed"
 brazil_navy.3.d: "[SCOPE.sCharacter('admiral_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('admiral_scope').GetLastName] se dostavil před vládu, aby oznámil, že [ROOT.GetCountry.GetAdjective] námořnictvo je dostatečně velké a moderní, aby se mohlo řadit mezi největší na světě. To se stalo zdrojem hrdosti pro naši [SCOPE.gsInterestGroup('navy_scope').GetName]."
 brazil_navy.3.f: "„Tato loď, tato parní fregata, admirále... to, co říkáte, je pravda?“\n\n„Samozřejmě. Už jen díky svým schopnostem je ideální volbou pro vaše námořnictvo. Eskadra takových lodí a troufám si říci, že bych porazil jakoukoli flotilu na otevřeném moři.“\n\n„Ach. Vidím pro tyto lodě budoucnost. Vraťte se do Liverpoolu. Chci druhou.“"
 brazil_navy.3.a: "Rád to slyším."
 brz_strong_navy: "Silné námořnictvo"
 brazil_navy.4.t: "Suverenita na moři"
 brazil_navy.4.d: "[ROOT.GetCountry.GetName] se upevnila jako jedna z největších námořních mocností na světě. [GetPopType('officers').GetName] připisují náš úspěch prozíravému vládnutí [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName]."
 brazil_navy.4.f: "Přehlídka přivítala [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle], když projížděl městskými ulicemi. Zeleno-zlaté letáky se snášely na ulice, zatímco deset tisíc námořníků a důstojníků stálo v pozoru podél cesty. Admirál [SCOPE.sCharacter('admiral_scope').GetLastNameNoFormatting] je zavedl po schodišti k velké vyhlídce. U zábradlí spatřili to: desítky válečných i obchodních lodí v zátoce. A další desítky na moři, povolané k různým úkolům."
 brazil_navy.4.a: "Skvělé!"
