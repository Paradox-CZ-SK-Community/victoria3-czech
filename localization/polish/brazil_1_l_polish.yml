 sa_migration.3.t: "Mnohočetný"
 sa_migration.3.d: "Díky našemu úsilí přilákat migranty a zvýšit populaci nyní obývají [ROOT.GetCountry.GetAdjective] národ velké masy lidí."
 sa_migration.3.f: "„Zvláštní přízvuk máte. Ale to nevadí: já jsem Belgičan. Naši hostitelé asi také nerozeznají rozdíl.“\n\n„Sas. Můj přítel je Toskánec. Připluli jsme se Španělem.“\n\n„Myslel jsem, že mi hoří uši. Promiňte, tahal jsem Ira ze studny. Přemýšlel o nesmrtelnosti kraba. Nedali byste si později drink, Belgičane?“"
 sa_migration.3.a: "Naše slova jsou hlasem mnohých."
