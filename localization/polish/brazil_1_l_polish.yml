 sa_migration.1.d: "Přilákáni štědrými nabídkami půdy a práce začali lidé [SCOPE.sCulture('migration_culture').GetName] ze [SCOPE.sCountry('migration_country').GetName] migrovat do [SCOPE.sState('migration_target_state').GetName]."
 sa_migration.1.f: "#Bold V KAŽDÉM MRAKU STŘÍBRNÉ OKRAJE#!\n\nRozlehlá úrodná půda!\n\nPole hledající pracovníky!\n\nTovárny potřebující silné ruce!\n\n#italic [ROOT.GetCountry.GetNameNoFormatting] vítá všechny evropské přistěhovalce k zahájení nového života. Žádné daně, cla ani jiné finanční zátěže při příjezdu. Práce dost pro všechny.#!"
