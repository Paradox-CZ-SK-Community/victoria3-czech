 add_pedropoint: "Ukazatel postupu [Concept('concept_journal_entry','záznamu denníku')] #Bold Velkorysého monarchy#! se zvýší o #Bold 1#!"
 remove_pedropoint: "Ukazatel postupu [Concept('concept_journal_entry','záznamu denníku')] #Bold Velkorysého monarchy#! se sníží o #Bold 1#!"
 je_pedro_brazil: "Velkorysý monarcha"
 je_pedro_brazil_reason: "Stav #bold Ukazatele postupu#! bude určen různými #tooltippable;tooltip:[Country.GetTooltipTag],je_pedro_special_tooltip_advance pozitivními#! nebo #tooltippable;tooltip:[Country.GetTooltipTag],je_pedro_special_tooltip_deplete negativními#! podmínkami. Dosažení #bold 0#! u #bold Ukazatele postupu#! povede ke konci vlády liberálního císaře a k vyhlášení konzervativní #bold Republiky#!.\n\nCísař [SCOPE.sCountry('brazil_scope').GetRuler.GetFullName], druhý vládce říše [SCOPE.sCountry('brazil_scope').GetName], byl do své role uveden v raném věku po abdikaci svého otce. Pedro II usiluje o zachování demokratické vlády a ochranu občanských svobod zaručených ústavou, stejně jako o konečné zrušení otroctví, které poskvrňuje Brazílii – navzdory síle konzervativních sil stojících proti jeho liberální věci."
 je_pedro_special_tooltip_advance: "Následující podmínky #bold zvýší#! #bold Ukazatel postupu#!:\n• Pedro II byl korunován císařem, čímž skončilo období regentství\n• Princezna Isabel byla potvrzena jako [concept_heir] trůnu\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] nebo [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] jsou [concept_marginalized]\n• Dokončen #Bold Brazilská národní identita#! [concept_journal_entry]\n• Dokončen #Bold Brazilská námořní moc#! [concept_journal_entry]\n• Brazílie se stala [concept_great_power]"
 je_pedro_special_tooltip_deplete: "Následující podmínky #bold sníží#! #bold Ukazatel postupu#!:\n• Mužští dědicové Pedra II zemřeli\n• Zdravotní stav Pedra II se zhoršuje\n• Republikánský návrh byl odmítnut nebo neuspěl\n• Brazílie má [GetLawType('law_slavery_banned').GetName]\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] nebo [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] jsou [concept_powerful] a nejsou [concept_in_government]\n• Brazílie nemá [GetLawType('law_tenant_farmers').GetName] ani [GetLawType('law_serfdom').GetName]\n• Neúspěch v #Bold Válka ragamuffinů#! [concept_journal_entry]\n• Neúspěch v #Bold Integrace brazilského národa#! [concept_journal_entry]\n• Brazílie je v [concept_default] nebo vyhlásila [concept_bankruptcy]\n• Jakákoli [concept_revolution] překročila #variable 50%#! postupu"
 je_pedro_button: "Korunovat císaře"
 je_pedro_button_desc: "V zájmu lidu bychom měli ukončit nejistotu regentských vlád a dosadit císaře na jeho právoplatný trůn. Může být rozumné učinit tak ještě před dosažením jeho plnoletosti."
 pedro_heir_empowered_tt: "Nástupce císaře [SCOPE.sCountry('brazil_scope').GetRuler.GetFullName] a [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] zahájí svou vládu ve výrazně výhodné pozici"
 pedro_je_royalists_more_common_tt: "[Concept('concept_interest_group', '$concept_interest_groups$')] budou mít větší sklon v budoucnu volit progresivní [Concept('concept_leader', '$concept_leaders$')]"
 brz_regency: "Období regentství"
 pedro.1.t: "Císařovo regentství"
 pedro.1.d: "Triumvirátní regentství [SCOPE.gsInterestGroup('landowners_scope').GetName] a [SCOPE.gsInterestGroup('armed_forces_scope').GetName] bylo nedávno svrženo a nahrazeno demokraticky zvoleným regentstvím [SCOPE.sCharacter('feijo_regent').GetLastName]. Dokud [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pedro_scope').GetFirstName] nedosáhne plnoletosti, Brazílii pravděpodobně pohltí politické nepokoje."
 pedro.1.f: "Šachy, po více než tisíc let oslavované jako hra králů, zdůrazňují strategickou prozíravost. Dlouhodobé strategie vyžadují oběti, kalkulaci nákladů a bystrý úsudek. A jak jeden hráč zaváhá, druhý získává kontrolu nad šachovnicí.\n\nJenže šachovnicí této hry byl sám mladý císař. Kdo ví, jaké jizvy tyto intriky zanechají na chlapci?"
 pedro.1.a: "Copak se nikdy nepřestanou hádat?"
 pedro_regency_party_tt: "[SCOPE.sCharacter('feijo_regent').GetInterestGroup.GetName] pod vedením [SCOPE.sCharacter('feijo_regent').GetLastName] nebude ochoten vstoupit do politických [Concept('concept_party','$concept_parties$')] dokud období regentství neskončí"
 pedro.2.t: "Případ proti monarchii "
 pedro.2.d: "[SCOPE.gsInterestGroup('landowners_scope').GetName] utrpěli během vlády [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pedro_scope').GetFirstName] řadu křivd. Mnozí nyní otevřeně vystupují proti [GetLawType('law_monarchy').GetName] ve prospěch [SCOPE.sIdeology('elitist_scope').GetName] [GetLawType('law_presidential_republic').GetName]."
 pedro.2.f: "Ještě před chvílí senhor [SCOPE.sCharacter('landowner_leader').GetLastNameNoFormatting] mávl rukou na vozy odvážející poslední z jeho otroků. Jak slunce zapadalo a vozy mizely v dálce, zabouchl dveře. Sedm generací na plantáži zničených pod jeho dohledem. Zdálo se, že císařův úsudek konečně selhal.\n\nNyní, s rumem v jedné ruce a perem v druhé, psal svým sousedům. Možná i ostatní plantážníci cítili, že je třeba změny."
 pedro.2.f2: "Ještě před chvílí ležely po stole senhora [SCOPE.sCharacter('landowner_leader').GetLastNameNoFormatting] rozházené účty a faktury. Imperiální daně byly jedna věc, dovoz a vývoz druhá a bezpečnost kávové plantáže třetí. Dohromady ničily celé panství. Císař nepodal pomocnou ruku, pouze bral. [SCOPE.sCharacter('landowner_leader').GetFirstNameNoFormatting] si byl jistý, že není jediný, kdo se pod tíhou zákonů hroutí.\n\nNyní, s rumem v jedné ruce a perem v druhé, psal svým sousedům. Možná i ostatní plantážníci cítili, že je třeba změny."
 pedro.2.a: "Znepokojivý vývoj."
 pedro.3.t: "Předčasná korunovace"
 pedro.3.d: "Regentství [SCOPE.gsInterestGroup('coronation_ig').GetName] se ve snaze získat politický kapitál rozhodlo korunovat [SCOPE.sCharacter('pedro_scope').GetFullName] jako [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [ROOT.GetCountry.GetName] výrazně dříve, než bylo plánováno."
 pedro.3.f: "„I vlk bude přebývat s beránkem,\nlevhart bude odpočívat s kůzletem,\ntelete, lvíče i žírné dobytče budou spolu;\na malé dítě je povede.“ # Bible"
 pedro.3.a: "Tak začíná jeho vláda."
 pedro.4.t: "Zhoršující se zdraví císaře"
 pedro.4.d: "[SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pedro_scope').GetFullName] již není mladým a zdravým mužem, jakým býval. Jeho schopnost vykonávat panovnické povinnosti slábne. Okolo otázky nástupnictví a budoucnosti [ROOT.GetCountry.GetAdjective] vlády se šíří spekulace a intriky."
 pedro.4.f: "Entropie přichází pro vše, velké i malé. Ať už mečem nebo úpadkem, císař Brazílie byl předurčen ke svému konci. Desítky let odkládaného stresu, vynucených rozhodnutí a dynamického rozvoje si konečně vybraly svou daň. Nemoc si brzy vyžádá své a supi na jeho dvoře se s chutí pustí do tak velké kořisti."
 pedro.4.a: "Nikdo nežije věčně."
 pedro.5.t: "Pouze překážka"
 pedro.5.d: "[SCOPE.gsInterestGroup('marginal_ig_scope').GetName], kdysi velká hrozba pro [GetLawType('law_monarchy').GetName] [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pedro_scope').GetFirstName], se staly politicky marginalizovanými. To je jistě pozitivní znamení pro budoucí stabilitu [ROOT.GetCountry.GetAdjective] vlády."
 pedro.5.f: "Generálové a admirálové stáli v pozoru za svými civilními ministry. Samotní ministři působili méně důstojně než jejich protějšky. Přišel rozkaz: ministerstva uzavřena, úřady omezeny a vazby zpřetrhány. Jakákoli moc, kterou měli, byla nyní jen šepotem uprostřed bouře.\n\nArmáda se samozřejmě znovu pozvedne. Silná ruka je v nebezpečném světě potřeba. Prozatím však stojí po boku Dom Pedra, nikoli proti němu."
 pedro.5.f2: "„Co to má znamenat? Všechny jsem vás koupil, všechny jsem vás ubytoval, dokonce jsem vás za velké náklady své rodiny osvobodil. A takhle se mi odvděčíte? Tím, že mi vezmete vše, co není přibité!“\n\n„Usmějte se, senhor. Řád a pokrok z nás udělaly oba pracující muže. Vaše káva má pro celou Brazílii velkou hodnotu. Imperátor vám děkuje a poskytne vám náhradu.“\n\n„Drobné! Nabízejí mi drobné! Nenechám se takto zesměšnit. Pamatujte na má slova, přijde odplata!“"
 pedro.5.a: "Výborně."
 pedro_powerful_ig: "Vyloučení elit"
 brz_new_monarch_popular: "Populární monarcha"
 brz_new_monarch_popular_ig: "$brz_new_monarch_popular$"
 pedro.6.t: "Mocný nepřítel"
 pedro.6.d: "Rostoucí nevraživost [SCOPE.gsInterestGroup('powerful_ig_scope').GetName] je stále obtížnější přehlížet. Tyto mocné elity mají v [ROOT.GetCountry.GetName] značný vliv a jejich vyloučení z vlády je dále obrací proti [SCOPE.sCharacter('pedro_scope').GetFirstName]ovu [GetLawType('law_monarchy').GetName]."
 pedro.6.f: "Generálové nosí okázalé uniformy a námořní důstojníci se chlubí přepychovými dary přesahujícími jejich postavení. Řadoví vojáci hovoří o civilních ministrech tak pochvalně, že by člověk mohl zpochybnit jejich skutečnou loajalitu. Mezitím titíž ministři začínají překračovat své pravomoci. Pokud jsou ozbrojené síly dostatečně vycvičené na to, aby se dívaly jinam, kdo jim zabrání vzít si, co požadují?"
 pedro.6.f2: "„Synu, pojď. Dospíváš a jednoho dne budu příliš starý na to, abych spravoval toto panství. Podívej se z tohoto balkonu a vnímej, co vidíš. To vše je tvoje. Dělníci na polích jsou tvoji. Káva na tomto poli i krávy na tom dalším jsou také tvoje. Město, jeho lidé i samotné lesy jsou tvoje. A slyším, že se ti na univerzitě daří. To ministerské křeslo, po kterém pokukuješ – pokud na něm budeš tvrdě pracovat – bude také tvoje. A jednou bude patřit i tvému synovi.“"
 pedro.6.a: "To vyžaduje pečlivou pozornost."
 pedro.7.t: "Trvající říše"
 pedro.7.d: "Po smutném úmrtí císaře Pedra II. byl v celé [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')] vyhlášen týden smutku. Jeho vláda bude jistě vzpomínána jako jedno z největších období v dějinách našeho národa. Nyní musí začít přípravy na korunovaci [SCOPE.sCharacter('new_brz_monarch_scope').GetFullName], k němuž lid vzhlíží s obdivem a respektem jako k novému vůdci."
 pedro.7.f: "Staré příběhy tvrdily, že nebesa pláčou, když zemře velký muž. Když zemřel Dom Pedro z Braganzy, téměř nepřetržitě pršelo. Desítky tisíc lidí lemovaly jeho pohřební průvod, oděné v černém a s brazilskými vlajkami. Hodnostáři až z Japonska byli svědky této události a každý z nich vzdal svou poctu.\n\nTěžká koruna, která tížila jeho otce, nyní doléhá na [SCOPE.sCharacter('new_brz_monarch_scope').GetHerHis]. [SCOPE.sCharacter('new_brz_monarch_scope').GetFirstNameNoFormatting] čeká téměř nemožný úkol: vyrovnat se odkazu velkorysého Dom Pedra II."
 pedro.7.a: "Císař je mrtev. Ať žije [SCOPE.sCharacter('new_brz_monarch_scope').GetPrimaryRoleTitle]."
 pedro.8.t: "Vyhlášení republiky"
 pedro.8.d: "Při nekrvavém převratu [SCOPE.gsInterestGroup('armed_forces_ig').GetName] a [SCOPE.gsInterestGroup('landowners_ig').GetName] svrhly [GetLawType('law_monarchy').GetName] [SCOPE.sCharacter('pedro_scope').GetFullName] a vyhlásily [GetLawType('law_presidential_republic').GetName]. Ačkoli si mnozí přáli bojovat za obranu vlády i [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle], bývalý monarcha vyzval k míru a abdikoval."
 pedro.8.f: "„Takže takhle to končí?“\n\n„Ano, Pedro. Ty i tvoje rodina už nejste u moci. Bude republika. Nové vedení chce, abyste byli... přesunuti do Evropy, zatímco upevní svou moc.“\n\n„Dobrá. Pokud je tomu tak, bude to můj odchod do důchodu. Pracoval jsem příliš dlouho a jsem unavený. Půjdu si tedy odpočinout.“"
 pedro.8.a: "Miluji republiku."
 je_pedro_republic: "Republikánský návrh"
 je_pedro_republic_reason: "Pokrokoví republikáni oslovili císaře s plánem na pokojný přechod [ROOT.GetCountry.GetName] k [GetLawType('law_presidential_republic').GetName], přičemž by se Pedro stal prvním prezidentem země."
 pedro.9.t: "Republikánský návrh"
 pedro.9.d: "Při soukromé audienci u [SCOPE.sCharacter('pedro_scope').GetFullName] navrhl ministr [SCOPE.sCharacter('republican_leader').GetFullName], že by [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] mohl pokojně převést [ROOT.GetCountry.GetName] na republikánskou formu vlády. [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] by mohl být po abdikaci poctěn funkcí prvního prezidenta."
 pedro.9.f: "Návrh byl stejně zajímavý jako absurdní: zrušit monarchii a nahradit ji republikou. Ne ledajakou republikou, ale takovou, jejíž hlava by měla moc srovnatelnou s diktátorem. Ústava by byla přepsána, aby tuto změnu umožnila, ale v brazilské politice by se ve skutečnosti změnilo jen málo. Pedro by zůstal připoután k vedení, aby se moci neujal někdo méně schopný."
 pedro.9.a: "Monarchie přetrvá."
 pedro.9.b: "Je-li to vůle lidu, budeme mít republiku."
 pedro.10.t: "Prezident Pedro"
 pedro.10.d: "Po ratifikaci první republikánské ústavy [ROOT.GetCountry.GetName] byl [SCOPE.sCharacter('pedro_scope').GetFullName] potvrzen jako [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle], což zajišťuje širokou podporu novému režimu."
 pedro.10.f: "„Lide Brazílie: dnes k vám nepromlouvám jako císař. Už k vám nebudu promlouvat jako císař, král ani jako kdokoli s korunou. Dnes ráno jsem ratifikoval nový návrh Cortes. Monarchie přestává existovat. Je čas se zbavit těchto zastaralých představ o králích.“"
 pedro.10.a: "Ať žije prezident."
 pedro.11.t: "Velkorysá ústava"
 pedro.11.d: "[SCOPE.sCharacter('pedro_scope').GetFullName] se stal prvním, kdo ratifikoval republikánskou ústavu [ROOT.GetCountry.GetName], a zároveň oznámil svůj úmysl pomoci přechodu tím, že bude sloužit jako první prezident země."
 pedro.11.f: "„Od dnešního dne budu pouze vaším prezidentem, dokud vy, lid Brazílie, nerozhodnete, že nejsem způsobilý vykonávat své povinnosti. Tyto povinnosti neberu na lehkou váhu – kdysi jako císař, nyní jako prezident – neboť odpovědnost je veliká. Prosím vás však: důvěřujte mi nyní tak jako dříve.“"
 pedro.11.a: "Republika brzy zesílí."
 princess_isabel: "Princezna Isabel"
 isabel_heir_popularity: "Princezna Isabel"
 pedro.12.t: "Brazilské nástupnictví"
 pedro.12.d: "Nešťastné úmrtí [SCOPE.sCharacter('heir_scope').GetFullName] zanechalo [ROOT.GetCountry.GetName] bez mužského dědice. Přestože je princezna Isabel podle zákona další v pořadí, mnoho občanů – včetně konzervativní elity – nepovažuje vládu ženy za přijatelnou."
 pedro.12.f: "„To byla nejtvrdší rána, jakou jsem mohl utrpět, a jistě bych ji nepřežil, kdybych stále neměl manželku a dvě děti, které musím vychovat tak, aby zajistily štěstí země, v níž se narodily.“"
 pedro.12.a: "Ženy nejsou způsobilé vládnout."
 pedro.12.b: "Isabel musí být připravena převzít trůn."
 add_2_pedropoint: "Ukazatel postupu [Concept('concept_journal_entry','záznamu denníku')] #Bold Velkorysého monarchy#! se zvýší o #Bold 2#!"
 add_3_pedropoint: "Ukazatel postupu [Concept('concept_journal_entry','záznamu denníku')] #Bold Velkorysého monarchy#! se zvýší o #Bold 3#!"
 pedro.13.t: "Dědička říše"
 pedro.13.d: "Léta příprav konečně připravila [SCOPE.sCharacter('isabel_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('isabel_scope').GetFirstName] na převzetí otcova trůnu. I ti nejzarputilejší odpůrci nyní uznávají, že nástupnictví je zajištěno."
 pedro.13.f: "„Ačkoli mnozí říkali, že to není mé místo, budu sloužit své zemi, jak nejlépe dovedu, a pokračovat v odkazu svého milovaného otce.“"
 pedro.13.a: "Nástupnictví je zajištěno."
 je_isabel: "Brazilské nástupnictví"
 je_isabel_reason: "Přestože [SCOPE.sCharacter('isabel_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('isabel_scope').GetFullName] je zákonnou dědičkou trůnu, mnozí v [ROOT.GetCountry.GetAltAdjective('L')] nepřijmou ženu na trůně. Lid bude potřebovat čas, aby pochopil, že princezna bude důstojnou nástupkyní svého otce."
 je_isabel_goal: "[SCOPE.sCharacter('isabel_scope').GetFullName] je dědičkou trůnu alespoň 10 let"
 isabel_je_tt: "Po dokončení se ukazatel postupu [Concept('concept_journal_entry','záznamu denníku')]  #Bold Velkorysého monarchy#! zvýší o #Bold 3#!"
 is_isabella_tt: "[SCOPE.sCharacter('isabel_scope').GetFullName] není [concept_heir]"
 pedro.14.t: "Na nejvyšší úrovni"
 pedro.14.d: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] očekává od svých ministrů stejnou úroveň schopností a pečlivosti, jakou [SCOPE.sCharacter('ruler_scope').GetSheHe] uplatňuje ve své vlastní práci. Nyní [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] obrací svou pozornost k dohledu nad konkrétní součástí vládního aparátu."
 pedro.14.f: "Oba úředníci byli pečlivě vybráni. Oba byli bezchybně oblečeni podle svých možností, přesto bylo patrné, kdo je podporuje. Zbytky doutníkového kouře, slabá skvrna od brandy na límci – drobné neřesti využívané ve prospěch jiných."
 pedro.14.a: "Nařízení [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] musí být důsledně plněna."
 pedro.14.b: "Byrokracie obchodu by mohla být efektivnější."
 pedro.14.c: "Rozvoj ekonomiky musí postupovat rychleji."
 highest_standards_degrees: "Nejvyšší standardy: Nařízení"
 highest_standards_trade: "Nejvyšší standardy: Obchod"
 highest_standards_construction: "Nejvyšší standardy: Výstavba"
 Orelie_Antoine: "Orélie-Antoine"
 de_Tounens: "de Tounens"
 bp1_patagonia.1.t: "Nepravděpodobné království"
 bp1_patagonia.1.d: "Několik náčelníků z [SCOPE.sCountry('patagonia_country').GetAdjective] přijalo Francouze [SCOPE.sCharacter('patagonia_ruler').GetFullName] za krále v zoufalé naději, že to přinese mezinárodní uznání a konec kolonizace jejich vlasti."
 bp1_patagonia.1.f: "„V této chvíli národy, které mě prohlásily nejen svým králem, ale i svým zachráncem, jen čekají na můj návrat, aby povstaly a následovaly mě na velké cestě pokroku. Mé državy jsou mi otevřeny ze všech stran a můj lid mě volá hlasem svých náčelníků.“"
 bp1_patagonia.1.a: "Naprostý nesmysl."
 bp1_patagonia.1.b: "Uznat je výměnou za loajalitu."
 patagonia_button: "Zahájit vojenské výpravy"
 patagonia_button_desc: "Patagonští domorodci nadále odolávají našim snahám o kolonizaci této země. K jejich pacifikaci bude nutné použít vojenskou sílu."
 bp1_misc.1.t: "Karneval"
 bp1_misc.1.d: "Oslavy letošního karnevalu mají být v [SCOPE.sState('carnaval_state').GetName] obzvláště velkolepé. Může to být příležitost uklidnit masy."
 bp1_misc.1.f: "Ženy pomalované jako duchové tančí ulicemi, zatímco muži bubnují podmanivé rytmy k chraplavým melodiím. Děti mávají vlajkami i tyčkami s smaženým jídlem. Ulice, kdysi šedé každodenním shonem, nyní září mořem barev a radosti.\nNa krátký okamžik se zdálo, že svět je v míru."
 bp1_misc.1.a: "Příjemné rozptýlení."
 bp1_misc.1.b: "Uspořádat skutečně velkolepý festival."
 carnaval_celebrations: "Karnevalové oslavy"
 bp1_misc.2.t: "Střední pražení"
 bp1_misc.2.d: "Klesající cena [SCOPE.sGoods('coffee_scope').GetName] přiměla [SCOPE.gsInterestGroup('plantation_owners').GetName] v [SCOPE.sState('coffee_state').GetName] [SCOPE.sBuilding('coffee_building').GetName] k prosazování radikálních opatření. Hodlají spálit přebytečné zásoby, aby zvýšili ceny."
 bp1_misc.2.f: "Účetní knihy byly dvě věci: stále znepokojivější a stále jasnější. Zisky nejen klesaly, ale do konce roku by nezbyly žádné. Pěstování kávy by se brzy stalo jen výstředním koníčkem bohatých.\n\nNebo, jak zjistil při pohledu do krbu, barbarským řešením složitého problému. Espresso vytvořené přímo pro farmáře i konzumenty."
 bp1_misc.2.a: "Spalte to!"
 bp1_misc.2.b: "Kávu bychom mohli využít jako palivo."
 bp1_misc.2.c: "Důvěřujme neviditelné ruce trhu."
 burning_coffee: "Spalování přebytečné kávy"
 coffee_fuel: "Experimentální palivo"
