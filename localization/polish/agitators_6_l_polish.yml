 agitator_legal_events.11.t: "To je vlastně dobrý postřeh..."
 agitator_legal_events.11.d: "Zatímco debaty o zákonu [SCOPE.sLaw('current_law_scope').GetName] pokračují, polemika od [SCOPE.sCharacter('opposing_agitator').GetFullName] odhalila jednoduchou, ale zásadní chybu v návrhu. Probíhá přepracování."
 agitator_legal_events.11.f: "„Opravdu? Ten zákon zakazoval pouštět draky na veřejnosti, pokud to komukoli vadilo? Není divu, že neprošel.“\n\n„Když to řekneš takhle, zní to dost uboze.“"
 agitator_legal_events.11.a: "Najděte přijatelný kompromis, ať vypadá jakkoli."
 agitator_legal_events.11.b: "Nechte je naletět. Prosadíme jinou věc."
 agitator_legal_events.12.t: "Zoufalí spojenci"
 agitator_legal_events.12.d: "Návrh zákona [SCOPE.sLaw('current_law_scope').GetName] uvízl na mrtvém bodě. [SCOPE.gsInterestGroup('govnas').GetName] navrhují využít pomoc [SCOPE.sCharacter('supporting_agitator').GetFullName] k získání podpory [SCOPE.gsInterestGroup('ambivalent_ig').GetName] pro vládu."
 agitator_legal_events.12.f: "Na prahu hlasování si všichni uvědomují, že nikdo zatím nemá většinu. Postupně jim dochází: nespolehliví jednotlivci, vedení tím nejzuřivějším z nich, mají rozhodující hlasy. Ale kdo z nich sestoupí ze své slonovinové věže jako první, aby si získal jejich přízeň?"
 agitator_legal_events.12.a: "Oslovit nerozhodné."
 agitator_legal_events.12.b: "Pomluvit opozici do zapomnění."
 agitator_legal_events.12.c: "Pokračovat bez nich. Vyhrajeme."
 agitator_legal_events.13.t: "Ultimátum"
 agitator_legal_events.13.d: "[SCOPE.sCharacter('supporting_agitator').GetInterestGroup.GetName] vydali [SCOPE.sCharacter('supporting_agitator').GetFullName] přísné ultimátum, aby dodržoval linii skupiny v opozici vůči zákonu [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.sCharacter('supporting_agitator').GetFullName] je odhodlán odporovat."
 agitator_legal_events.13.f: "Záležitost rozdělila klub, a to jejich vlastní vinou. Samotná otázka ustoupila do pozadí. Pohání to tvrdohlavost, s hrdostí vsazenou do této hry. Nic se nepohne bez rychlého řešení."
 agitator_legal_events.13.a: "Nikdy nepřerušuj protivníka, když dělá chybu."
 agitator_legal_events.13.b: "Uvítáme každého odpůrce v [SCOPE.sCharacter('supporting_agitator').GetInterestGroup.GetName]."
 agitator_legal_events.14.t: "Patová situace"
 agitator_legal_events.14.d: "Debaty o zákonu [SCOPE.sLaw('current_law_scope').GetName] trvají už několik dní. Mezi stoupenci [SCOPE.sCharacter('opposing_agitator').GetFullName] v [SCOPE.gsInterestGroup('agitator_ig').GetName] panují rozpory, přičemž každý má na zákon jiný názor."
 agitator_legal_events.14.f: "Další den debat o tomtéž a každý zástupce se jen líně vrací na své místo. Vzduch je těžký a ochablý. Tuto záležitost je třeba dnes ukončit, jinak vládu ještě více ochromí."
 agitator_legal_events.14.a: "Otevřít otázku ústupků s [SCOPE.gsInterestGroup('govnas').GetName]."
 agitator_legal_events.14.b: "Zjistit, zda [SCOPE.sCharacter('opposing_agitator').GetInterestGroup.GetName] přistoupí na kompromis."
 agitator_legal_events.14.c: "Nechat je, ať si navzájem sbírají body."
 agitator_legal_events.15.t: "Den v tiskárně"
 agitator_legal_events.15.d: "Tiskárny a noviny napojené na [SCOPE.gsInterestGroup('govnas').GetName] zveličily zákon [SCOPE.sLaw('current_law_scope').GetName] a veřejnost si jej od té doby vykládá chybně. [SCOPE.sCharacter('opposing_agitator').GetFullName] této zmatky využil pro svou vlastní agendu."
 agitator_legal_events.15.f: "Stačilo pár špatně pochopených slov a semínko bylo zaseto. Pak pár nechtěných chyb z nedostatku přesných výrazů. Do konce týdne se zákon proměnil v něco jiného. Veřejnost nyní diskutuje o věci, která s režimem sotva souvisí."
 agitator_legal_events.15.a: "Poslat do tisku opravu."
 agitator_legal_events.15.b: "Protlačit zákon silou."
 agitator_legal_events.15.c: "Byla by chyba nenaslouchat našim voličům."
 agitator_legal_events.16.t: "Třetí názor"
 agitator_legal_events.16.d: "Jak debaty o zákonu [SCOPE.sLaw('current_law_scope').GetName] stagnují, [SCOPE.sCharacter('supporting_agitator').GetFullName] navrhl předat návrh komisi odborníků, aby se prolomila patová situace."
 agitator_legal_events.16.f: "Názor jedné frakce je jen gesto. Dvou menšina. Dvě frakce zastupující většinu společnosti jsou stále menšinou. Zvláště když postrádají životní či profesní zkušenosti."
 agitator_legal_events.16.a: "Unese to státní pokladna?"
 agitator_legal_events.16.b: "Vyhlásit otevřenou výzvu pro odborníky."
 agitator_legal_events.16.c: "Zjistit, zda pomohou naše univerzity."
 agitator_legal_events.17.t: "Vzájemná neslučitelnost"
 agitator_legal_events.17.d: "Ačkoliv panuje shoda v principu zákona [SCOPE.sLaw('current_law_scope').GetName], existují dvě vzájemně se vylučující klauzule. [SCOPE.gsInterestGroup('opposing_ig').GetName] a [SCOPE.gsInterestGroup('quarrelling_ig').GetName] chtějí zákon upravit ve svůj prospěch, zatímco [SCOPE.sCharacter('opposing_agitator').GetFullName] oba kritizuje za oportunismus."
 agitator_legal_events.17.f: "Podstatou vůdcovství je kompromis. Paradoxně však může být kompromis vnímán jako slabost. Stejně tak je chybou nikdy neustoupit i ustupovat vždy. Jako ve všem, i zde jde o nalezení rovnováhy."
 agitator_legal_events.17.a: "Zrušit jednu klauzuli. Zákon musí projít."
 agitator_legal_events.17.b: "Je čas na nový sud inkoustu..."
 agitator_legal_events.18.t: "Menšinové zájmy"
 agitator_legal_events.18.d: "Bez ohledu na postoj vládní frakce se nejostřejší spory o zákon [SCOPE.sLaw('current_law_scope').GetName] vedou mezi [SCOPE.gsInterestGroup('opposing_ig').GetName] a populisty podnícenými hnutím [SCOPE.sCharacter('supporting_agitator').GetFullName]. Konec je v nedohlednu."
 agitator_legal_events.18.f: "Občas vláda řeší menší otázku, aby uspokojila spojence nebo uklidnila nepřítele. Vždy to ale překročí něčí hranici. Někdo řekne „nepřítel mého nepřítele“ a čeká spojenectví. Jiní spíše očekávají sametovou pěst."
 agitator_legal_events.18.a: "Nechte je hádat se."
 agitator_legal_events.18.b: "Využít populistický tlak."
 agitator_legal_events.18.c: "Podpořit [SCOPE.gsInterestGroup('opposing_ig').GetName]."
 agitator_legal_events.19.t: "Bez klauzule"
 agitator_legal_events.19.d: "[SCOPE.gsInterestGroup('opposing_ig').GetName] a [SCOPE.gsInterestGroup('angry_ig').GetName] jsou rozděleni kvůli výkladu klauzule týkající se zákona [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.sCharacter('supporting_agitator').GetFullName] zveřejnil články, které mají vtáhnout veřejnost do této hádky."
 agitator_legal_events.19.f: "„Rád bych upozornil na ustanovení zakazující nošení zbroje v této instituci.“\n\n„Jaký je tentokrát problém?“\n\n„Znění neurčuje, zda se zbroj musí nosit, nebo stačí ji mít u sebe. Někdo může nést jen ozdobu a přesto porušovat zákon!“"
 agitator_legal_events.19.a: "Podpořit výklad [SCOPE.gsInterestGroup('opposing_ig').GetName]."
 agitator_legal_events.19.b: "Prosazovat stanovisko [SCOPE.gsInterestGroup('angry_ig').GetName]."
 agitator_legal_events.19.c: "Pohnat [SCOPE.sCharacter('supporting_agitator').GetFullName] k odpovědnosti za podněcování tohoto chování."
 agitator_legal_events.20.t: "Úplný chaos"
 agitator_legal_events.20.d: "Katastrofální první návrh zákona [SCOPE.sLaw('current_law_scope').GetName] přiměl všechny frakce prosazovat své změny. [SCOPE.sCharacter('supporting_agitator').GetFullName] vyvolal masivní veřejnou nespokojenost ve prospěch přepracování."
 agitator_legal_events.20.f: "„Dvojnásobná mzda v sobotu? Myslí si, že se koupeme v penězích?“\n\n„A patnáct minut na... ‚kouřovou přestávku‘? Nesmysl!“\n\n„Zaručená nemocenská by pomohla omezit tuberkulózu...“\n\nPoslíčci nosili nové kalamáře pro každého, kdo si chtěl něco poznamenat. Den už byl dlouhý a večer bude ještě delší. Než se tento nezkrotný návrh uklidní, bude potřeba ještě mnoho inkoustu."
 agitator_legal_events.20.a: "Držet směr a opravit chyby."
 agitator_legal_events.20.b: "Naslouchat stoupencům [SCOPE.sCharacter('supporting_agitator').GetFullName]."
 agitator_legal_events.20.c: "Přijmout některé návrhy [SCOPE.gsInterestGroup('opposing_ig').GetName]."
