 agitator_legal_events.21.t: "Umění nedělat nic"
 agitator_legal_events.21.d: "Ačkoliv dříve vystupoval proti zákonu [SCOPE.sLaw('current_law_scope').GetName], [SCOPE.sCharacter('supporting_agitator').GetFullName] přehodnotil politickou situaci [SCOPE.gsInterestGroup('govnas').GetName] a nyní nabízí svou podporu."
 agitator_legal_events.21.f: "„Při jednání s voliči o zákonech je třeba nejprve ovládnout umění působit, jako by člověk nedělal nic.“\n\n„Zatímco všechno řešíte šeptem a přes nastrčené lidi?“\n\n„Bezesporu.“"
 agitator_legal_events.21.a: "Přijmout jejich podporu."
 agitator_legal_events.21.b: "Dávat si pozor. Něco chystají."
 agitator_legal_events.22.t: "Přiznaná porážka"
 agitator_legal_events.22.d: "[SCOPE.sCharacter('opposing_agitator').GetFullName] byl veřejně poražen v argumentaci, což jej přimělo obrátit pozornost k výhodnějším záležitostem. Část [SCOPE.sCharacter('opposing_agitator').GetInterestGroup.GetName] nyní podporuje zákon [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.22.f: "„Ach dobrá, řekl bych, že mě jednou přivedeš do hrobu, ty proklatě výřečný ďáble.“\n\n„Tak snadno?“\n\n„Tak snadno. Stejně jako nemá smysl bojovat s proudem řeky, nemá smysl vzdorovat moudré radě.“"
 agitator_legal_events.22.a: "Je čas slavit."
 agitator_legal_events.22.b: "Rychle to dejte do novin!"
 agitator_legal_events.23.t: "Spojenci z nutnosti"
 agitator_legal_events.23.d: "Když už zákon [SCOPE.sLaw('current_law_scope').GetName] vypadal na pád, [SCOPE.sCharacter('supporting_agitator').GetInterestGroup.GetName] získala podporu díky [SCOPE.sCharacter('supporting_agitator').GetFullName]. Nyní má dost hlasů, aby prošel bez kompromisů."
 agitator_legal_events.23.f: "Když byla vyžádána podpora, zvedla se ta nejméně pravděpodobná ruka. Pak další a další. Frakce, která měla z přijetí nejméně získat, ale ani co ztratit, souhlasila. Výkřiky nadšení následovaly po nářcích poražených, když zákon prošel vpřed."
 agitator_legal_events.23.a: "Přijmout jejich podporu."
 agitator_legal_events.23.b: "Zaznamenat si tuto laskavost. Oni to určitě udělají."
 agitator_legal_events.24.t: "Zpackaný bojkot"
 agitator_legal_events.24.d: "Ve snaze získat podporu mezi svými příznivci [SCOPE.sCharacter('opposing_agitator').GetFullName] zorganizoval bojkot zákona [SCOPE.sLaw('current_law_scope').GetName]. V den jeho zahájení však téměř nebylo poznat, že vůbec nějaký existuje."
 agitator_legal_events.24.f: "Někteří si vzali ponaučení z třetího stavu: množství je samo o sobě silou. Pokud máte dost lidí, nikdo vás nezastaví. Bohužel zapomněli na jednu věc: lidé vás musí mít rádi - nebo alespoň vaši věc."
 agitator_legal_events.24.a: "Informovat tisk o tomto fiasku."
 agitator_legal_events.24.b: "Každý má svou cenu za loajalitu."
 agitator_legal_events.25.t: "Obyčejná cena"
 agitator_legal_events.25.d: "Ve snaze zdiskreditovat [SCOPE.sCharacter('da_boss').GetFullName] během projevu o zákonu [SCOPE.sLaw('current_law_scope').GetName] se jeden provokatér inspirovaný [SCOPE.sCharacter('opposing_agitator').GetFullName] zeptal na cenu chleba. [SCOPE.sCharacter('da_boss').GetFullName] se obrátil na přítomného obchodníka."
 agitator_legal_events.25.f: "„K tomu zákonu, o kterém tvrdíte, že pomůže obyčejným lidem - kolik stojí chléb? Posloucháte mě vůbec?“\n\n„Zdejší obchodník říká, že dva pence za bochník. A co se týče vaší otázky - je poněkud ubohá, nemyslíte? Laciný trik, jak mě šokovat a zdiskreditovat, místo skutečné argumentace. Další?“"
 agitator_legal_events.25.a: "Šokující taktiky se pro tento národ nehodí."
 agitator_legal_events.25.b: "Měli bychom zákon důkladně prověřit."
 agitator_legal_events.26.t: "Kloboukový trik"
 agitator_legal_events.26.d: "Zatímco vláda debatuje o přednostech zákona [SCOPE.sLaw('current_law_scope').GetName], několik novin zveřejnilo polemiky od [SCOPE.sCharacter('opposing_agitator').GetFullName], které se snaží proti němu použít obskurní zákon. Právníci napojení na [SCOPE.gsInterestGroup('govnas').GetName] však poukázali, že tento zákon je neplatný."
 agitator_legal_events.26.f: "Příkladem obskurního a sporně zastaralého zákona je povinnost nosit klobouk při procedurální námitce. Zákon neupřesňuje jaký klobouk, pouze že má být nasazen. Bylo by tedy zcela na místě nasadit si čepici hlupáka při vznesení neplatné námitky."
 agitator_legal_events.26.a: "Zrušit tento zbytečný zákon."
 agitator_legal_events.26.b: "Modernizovat jej spolu se zákonem [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.27.t: "U sklenky"
 agitator_legal_events.27.d: "Na nenápadném setkání [SCOPE.sCharacter('supporting_agitator').GetFullName] a zástupce [SCOPE.gsInterestGroup('cavalry_ig').GetName] dlouze rozebírali přínosy zákona [SCOPE.sLaw('current_law_scope').GetName]. Naštěstí byl někdo dost střízlivý, aby pořídil zápis."
 agitator_legal_events.27.f: "„To je ten problém nového zákona. Pokud neodstraníte související zákony, někdo může zneužít mezery a uniknout jeho dosahu.“\n\n„Ledaže započítáte ty dva zákony o obcházení bez důvodných pochybností. Pak máte dost chytrou pojistku, která takové jedince zachytí.“"
 agitator_legal_events.27.a: "Pochválit je za dobrou práci."
 agitator_legal_events.27.b: "Správa státu nepatří do hříšných doupat."
 agitator_legal_events.28.t: "Klauzule na obzoru"
 agitator_legal_events.28.d: "[SCOPE.gsInterestGroup('opposing_ig').GetName] a [SCOPE.gsInterestGroup('angry_ig').GetName] soupeří o drobné, ale výhodné ústupky ohledně zákona [SCOPE.sLaw('current_law_scope').GetName]. Stoupenci [SCOPE.sCharacter('supporting_agitator').GetFullName] požadují řešení bez ústupků."
 agitator_legal_events.28.f: "Dvě hašteřivé děti: pohroma rozhodného jednání od nepaměti. Bez ohledu na věk či vzdělání se situace stále opakuje. Dvě skupiny něco chtějí a udělají z toho problém někoho jiného, dokud to nedostanou. Otázkou pak je, komu podat láhev."
 agitator_legal_events.28.a: "Nechte je hádat se."
 agitator_legal_events.28.b: "Hoďte jednomu kost, pokud to pomůže."
 agitator_legal_events.29.t: "Neotřelé řešení"
 agitator_legal_events.29.d: "Mezi publikovanými díly [SCOPE.sCharacter('supporting_agitator').GetFullName] je populární nová kniha, která nabízí vizi podoby zákona [SCOPE.sLaw('current_law_scope').GetName]. Právníci spojení s [SCOPE.gsInterestGroup('govnas').GetName] tvrdí, že její obsah je právně v pořádku."
 agitator_legal_events.29.f: "Většinou je fikce jen zábava. Občas se však objeví skutečná vize možností. Výjimečně dobře napsané dílo může změnit myšlení lidí. A někdy je pak mylně považováno za proroctví."
 agitator_legal_events.29.a: "Zjišťovat názor veřejnosti na tuto četbu."
 agitator_legal_events.29.b: "Obstarat výtisk, s poděkováním autorovi."
 agitator_legal_events.29.c: "Fikce má zůstat zábavou."
 agitator_legal_events.30.t: "Rozhovory u kávy"
 agitator_legal_events.30.d: "O zákonu [SCOPE.sLaw('current_law_scope').GetName] se mluvilo v každé kavárně. Následně byl [SCOPE.sCharacter('supporting_agitator').GetFullName] ochoten jít proti [SCOPE.sCharacter('supporting_agitator').GetInterestGroup.GetName], aby pomohl zákon prosadit."
 agitator_legal_events.30.f: "Moudrá rada varuje před zaměňováním hlasu lidu s hlasem Boha. Moudřejší jej považuje za šílený. Největší moudrost však chápe, že genialita a šílenství jsou dvě strany téže mince. Jde jen o to vědět, kdy naslouchat."
 agitator_legal_events.30.a: "Přivítat tuto změnu postoje."
 agitator_legal_events.30.b: "Chránit [SCOPE.sCharacter('supporting_agitator').GetHerHim] před reakcí [SCOPE.sCharacter('supporting_agitator').GetInterestGroup.GetName]."
