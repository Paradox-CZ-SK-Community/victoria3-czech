 agitator_legal_events.1.t: "Projev na věky věků"
 agitator_legal_events.1.d: "Doprava v [SCOPE.sState('capital_scope').GetCityHubName] byla zastavena, když [SCOPE.sCharacter('opposing_agitator').GetFullName] shromáždil dav na hlavní třídě a vykládal úmorně dlouze o vládním návrhu zákona [SCOPE.sLaw('current_law_scope').GetName]. Blokáda zabránila zákonodárcům dosáhnout usnášeníschopnosti."
 agitator_legal_events.1.f: "„Dále, v kontextu čtvrtého odstavce týkajícího se právní definice ‚mrtvice‘, současné znění zákona neupřesňuje, o jakou mrtvici se jedná. Mnozí si mohou splést tah štětcem či kladivem s mrtvicí, která postihuje staré a nešťastné.“"
 agitator_legal_events.1.a: "Možná je čas uzákonit umlčovací opatření."
 agitator_legal_events.1.b: "Pošpinit toho ukecaného hlupáka. Veřejně."
 agitator_legal_events.2.t: "Umlčení řečníka"
 agitator_legal_events.2.d: "Díky obratnému využívání, či spíše zneužívaní, procedur k umlčení řečníků se stoupencům [SCOPE.sCharacter('opposing_agitator').GetFullName] podařilo zablokovat další debatu o návrhu zákona [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.2.f: "„Navrhuji umlčet řečníka u pultu a následně hlasovat.“\n\n„Jestli mě to uchrání od dalšího sousta odporné břečky od tchánů, tak hlasuji pro. Kdo je pro umlčení řečníka, posaďte se vlevo ode mě.“"
 agitator_legal_events.2.a: "Možná je čas tato umlčovací pravidla zrušit."
 agitator_legal_events.2.b: "Objednejte z Paříže roubík, pro jejich potěšení."
 agitator_legal_events.3.t: "Nemocenská"
 agitator_legal_events.3.d: "Dlouhý projev [SCOPE.sCharacter('supporting_agitator').GetFullName] nabral nečekaný směr po požití zkaženého nápoje. Kvůli jeho indispozici vláda přišla o jednoho ze svých nejúčinnějších zastánců zákona [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.3.f: "Krátce po začátku projevu byl vyslán poslíček, který přinesl sendvič a osudný nápoj. Všichni v publiku viděli, jak se rozvláčný projev mění v boj se vzbouřeným žaludkem. Kdyby řeč skončila, skončila by i řečníkova důstojnost. Kdyby neskončila, lidé by možná žádali hlavu atentátníka."
 agitator_legal_events.3.a: "Popřejte [SCOPE.sCharacter('supporting_agitator').GetFullName] brzké uzdravení."
 agitator_legal_events.3.b: "Okamžitě pročesat okolí a hledat atentátníky!"
 agitator_legal_events.4.t: "Přivolat experta"
 agitator_legal_events.4.d: "Složité otázky vznesené stoupenci [SCOPE.sCharacter('opposing_agitator').GetFullName] vedly vládu k hledání odborníků, kteří by poskytli posudek k zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.4.f: "„Budu upřímný, rozhodnutí přijmout zákon bez konzultace s odborníkem z oboru jej činí nebezpečně neschopným řešit samotný problém, kvůli němuž vznikl. Kdo z vás takového experta přivede, nebo to mám udělat za vás?“"
 agitator_legal_events.4.a: "Spolupracujme na nalezení experta."
 agitator_legal_events.4.b: "Uvidíme, zda [SCOPE.sCharacter('opposing_agitator').GetFullName] dostojí svým slovům."
 agitator_legal_events.4.c: "Najděte někoho z naší nejlepší univerzity."
 agitator_legal_events.5.t: "Skandál!"
 agitator_legal_events.5.d: "Zákonodárce zasáhl skandál, když vyšel najevo článek od [SCOPE.sCharacter('opposing_agitator').GetFullName], obviňující člena [SCOPE.gsInterestGroup('opposing_ig').GetName] z poměru s milenkou. Příhodně uprostřed debat o zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.5.f: "„Uklidníme se! Delegáti se posadí! Říkám uklidníme se, sakra!“\n\nAť předsedající bušil kladívkem jakkoli, veškerý řád v sále byl pryč. Obvinění, výčitky i protiargumenty létaly vzduchem rychleji než sliny. Novináři si brzy zapsali každé zatracené slovo."
 agitator_legal_events.5.a: "Naše vláda musí být držena na nejvyšší úrovni."
 agitator_legal_events.5.b: "Zůstaňme soustředěni na zákon." 
 agitator_legal_events.6.t: "Neposlušnost"
 agitator_legal_events.6.d: "[SCOPE.sCharacter('opposing_agitator').GetFullName] vyzval „všechny zásadové lidi“, aby se shodli na platformě nedodržování zákona [SCOPE.sLaw('current_law_scope').GetName]. Sympatizanti v [SCOPE.sCharacter('opposing_agitator').GetInterestGroup.GetName] zastavili další debatu."
 agitator_legal_events.6.f: "Je to jednoduché, stačí nezvednout ruku. Zvláštní věc, to gesto. Ten malý, zapomenutý pozdrav na ulici nebo široké mávnutí pro upoutání pozornosti. Je až neuvěřitelné, co lze dokázat pouhým pohybem zápěstí. A v tomto případě... jak jeho absence může ochromit celý národ."
 agitator_legal_events.6.a: "Je to jejich právo. Brzy změní názor."
 agitator_legal_events.6.b: "Předat jejich jména, úřady i personál novinám."
 agitator_legal_events.6.c: "Nařídit zástupce, aby jednali místo nich."
 agitator_legal_events.7.t: "Rozdělující politika"
 agitator_legal_events.7.d: "Členové [SCOPE.gsInterestGroup('govnas').GetName] se postavili proti sobě kvůli zákonu [SCOPE.sLaw('current_law_scope').GetName]. Toto vnitřní štěpení je připisováno kampani obtěžování ze strany stoupenců [SCOPE.sCharacter('opposing_agitator').GetFullName]."
 agitator_legal_events.7.f: "Bylo to jednoduché: nemluvit o tom na chodbách, v kancelářích ani na večírcích. Co není na očích, není na mysli. A přesto se téma dostalo na veřejnost a sněmovna vzplála. Přísahy i dohody přestaly něco znamenat tváří v tvář tomuto spornému problému, který jiná frakce vytáhla a rozštěpila."
 agitator_legal_events.7.a: "Najít kompromis mezi frakcemi."
 agitator_legal_events.7.b: "Vrátit se k projednávané věci."
 agitator_legal_events.7.c: "Najít slabý článek v jejich řadách a využít ho."
 agitator_legal_events.8.t: "Zákulisní dohody"
 agitator_legal_events.8.d: "Dříve nerozhodní členové [SCOPE.gsInterestGroup('dirty_dealers').GetName] změnili svůj postoj k zákonu [SCOPE.sLaw('current_law_scope').GetName] přes noc. [SCOPE.gsInterestGroup('dirty_dealers').GetLeader.GetFullName] označil [SCOPE.sCharacter('supporting_agitator').GetFullName] za architekta tajné dohody."
 agitator_legal_events.8.f: "Zákulisní dohody byly až příliš běžné. Financování tohoto projektu, zakázky pro známé známých, „zvláštní poradní výbor“ pro jinou věc — všechno je to v podstatě stejné. Promazat soukolí moci, aby běžela hladčeji. Někdy však někdo zatouží z toho těžit a veřejnost si toho všimne. A pak už nikdo nedostane, co chce."
 agitator_legal_events.8.a: "Informovat tisk. Vyrvat korupci i s kořeny."
 agitator_legal_events.8.b: "Zůstat soustředěni na zákon."
 agitator_legal_events.8.c: "Korupce je nástroj jako každý jiný."
 agitator_legal_events.9.t: "Podněcování davu"
 agitator_legal_events.9.d: "Několik jízlivých poznámek od [SCOPE.sCharacter('opposing_agitator').GetFullName] přimělo [SCOPE.sCharacter('da_boss').GetFullName] k zoufalému kroku za prostou cenu: bochník chleba. Debaty o zákonu [SCOPE.sLaw('current_law_scope').GetName] od té doby uvázly."
 agitator_legal_events.9.f: "Porce mleté pšenice znamená jedno jídlo. Tři taková denně, sedm dní v týdnu, to je základ mzdy. Dej dělníkovi chleba a střechu nad hlavou plus deset procent navíc a má roční živobytí. A přesto mu někdo řekne, ať jí koláče... aniž by si uvědomil, že koláče jsou z pšenice."
 agitator_legal_events.9.a: "Reputace se hojí pomalu."
 agitator_legal_events.9.b: "Udržet debatu u zákona."
 agitator_legal_events.10.t: "Tvrdý postih"
 agitator_legal_events.10.d: "Intrika [SCOPE.gsInterestGroup('opposing_ig').GetName] selhala, když řadový poslanec padl za oběť mocenskému kartelu. Odpůrci zákona inspirovaní taktikou [SCOPE.sCharacter('opposing_agitator').GetFullName] požadují okamžitou cenzuru, čímž zastavili debatu o zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 agitator_legal_events.10.f: "„Tento politováníhodný stav je nedůstojný tohoto shromáždění. Musíme vyslovit odsouzení této hnilobné skvrny na naší cti, jinak poneseme následky všichni.“"
 agitator_legal_events.10.a: "Podpořit návrh na odsouzení a rychle jej schválit."
 agitator_legal_events.10.b: "Najít nějaké kostlivce ve skříni [SCOPE.sCharacter('opposing_agitator').GetInterestGroup.GetName]."
