 je_montenegrin_raiding: "Nájezdy"
 je_montenegrin_raiding_reason: "S malým množstvím orné půdy a bez průmyslu, který by stál za řeč, se černohorské kmeny obracejí k [Concept('concept_raiding', 'nájezdům')] na osmanské území, aby přežily. \n\nZatímco černohorští kmenoví bojovníci hrdě vystavují useknuté hlavy Osmanů, [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetName, 'RUS')] začíná na takové činnosti pohlížet s nelibostí. \n\nPokud však budeme podnikat nájezdy příliš často, [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] toho může využít k ospravedlnění vlastní agresivní akce. \n\n[concept_raiding]:\nDíky [Concept('concept_power_projection', 'projekci moci')] naší armády ve výši #v [SCOPE.GetRootScope.GetCountry.GetArmyPowerProjection|0]#! a [Concept('concept_raiding_frequency', 'frekvenci nájezdů')] ve výši #v [Country.MakeScope.Var('raiding_intensity').GetValue]%#! získáváme #v @money![GetPlayer.MakeScope.ScriptValue('raiding_income')]#!.\n\nČím více z nájezdů získáváme, tím pravděpodobnější je, že [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] podnikne protiútok, pokud není ve válce."
