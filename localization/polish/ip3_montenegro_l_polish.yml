 je_montenegrin_raiding_increase_button: "„Přineste mi více hlav!“"
 je_montenegrin_raiding_increase_button_desc: "Umožněte kmenům podnikat nájezdy častěji, čímž se zvýší [concept_raiding_frequency]. Zvýší to naše příjmy, ale poškodí to [concept_relations] s #v [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetName, 'RUS')]#! a zejména s #v [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')]#!."
 mon_more_raiding_tt: "Musíme počkat alespoň rok, než budeme moci nájezdy znovu zvýšit."
 mon_more_heads_tt: "Zvyšuje [concept_raiding_frequency] o 25 %"
