 je_montenegrin_raiding_decrease_button_desc: "Donuťte kmeny omezit své nájezdy, čímž se [concept_raiding_frequency] sníží o 25 %. #v [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetName, 'RUS')]#! ocení tento krok k civilizovanosti vůči #v [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')]#!."
 mon_less_raiding_tt: "Musíme počkat alespoň šest měsíců, než budeme moci nájezdy znovu snížit."
 mon_discourage_raiding_tt: "Snižuje [concept_raiding_frequency] o 25 %"
