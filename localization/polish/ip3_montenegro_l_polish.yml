 notification_je_montenegrin_raiding_fail_desc: "Bez území sousedícího s Osmany jsou naše kmeny nuceny své nájezdy zastavit."
 notification_je_montenegrin_raiding_fail_tooltip: "#header $notification_je_montenegrin_raiding_fail_name$#!\n$TOOLTIP_DELIMITER$\n$notification_je_montenegrin_raiding_fail_desc$"
 montenegrin_raiding.1.t: "Smrt bratra"
 montenegrin_raiding.1.d: "Smail-aga Čengić z [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] nalákal naše nájezdníky do léčky! Mezi našimi nesčetnými padlými leží i vlastní bratr [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 montenegrin_raiding.1.f: "#italic Můj lid spí hlubokým a bezduchým spánkem; \nžádná rodičovská ruka mi neotře slzy.\nNade mnou se nebesa pevně uzavřela;\nneslyší můj nářek ani mé modlitby.#!\n\n–Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 montenegrin_raiding.1.a: "Sjednotíme se ve smutku."
 montenegrin_raiding.1.b: "Ať mrtví pohřbívají mrtvé. My musíme obnovovat."
 mon_lost_men_tt: "#v [GetPlayer.MakeScope.ScriptValue('barracks_burned')]#! [GetBuildingType('building_barrack').GetName] bude zničeno a zbytek upadne do zmatku."
 montenegrin_raiding.2.t: "Osmanský protiútok"
 montenegrin_raiding.2.d: "Vojáci z [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] dorazili, aby sužovali náš lid a ukončili naše nájezdy."
 montenegrin_raiding.2.f: "„Přímý útok, synu. Nebojácný, neúprosný. To je jediný způsob, jak je zastavit.“ \n\n„Přímo proti jejich dělům? S úctou, šefe, bylo by lepší vtáhnout je do hor. Pak se Cerović může proplížit průsmykem a přepadnout jejich trén.“ \n\n„Ne. Vyplenili by každý klášter a každý statek, který jim přijde do cesty. Pán ti možná odpustí, že jsi to dopustil, ale já ne.“ \n\n„Šefe, co byste raději nechal krvácet – zemi, nebo její lid?“" #\n\n–Rozhovor mezi dvěma černohorskými generály.
 montenegrin_raiding.2.a: "Postavte se jim čelem."
 montenegrin_raiding.2.b: "Využijte terén ve svůj prospěch."
 montenegrin_raiding.2.c: "Je to beznadějné! Vzdejte se Vysoké portě."
 je_mon_state_formation: "Od rebelů k národu"
 je_mon_state_formation_reason: "Rod Njegošů je odhodlán vytvořit národ z násilnických kmenů sídlících v horách a vzdorujících [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')]. Naštěstí je [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetName, 'RUS')] připravena pomoci svým pravoslavným souvěrcům a posílá finanční pomoc. Čím lépe dokážeme udržovat [concept_relations], tím více [Concept('concept_russian_aid', 'ruské pomoci')] můžeme očekávat. \n\nPokud se podaří založit alespoň náznak státu a udržet kmenové nájezdy pod kontrolou, velmoci mohou donutit [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] odstoupit nám území a uznat nás jako nezávislý národ."
 je_montenegrin_russian_aid_income: "Dostáváme #g @money!+[GetPlayer.MakeScope.ScriptValue('russian_aid_income')]#! v rámci [Concept('concept_russian_aid', 'ruské pomoci')]"
 mon_rus_aid_stop_tt: "Už nebudeme dostávat [concept_russian_aid]"
 has_taxation_law_tt: "[ROOT.GetCountry.GetNameNoFlag] má jakýkoli [concept_law] ze skupiny [GetLawGroup('lawgroup_taxation').GetName] kromě [GetLawType('law_consumption_based_taxation').GetName]"
 has_police_law_tt: "[ROOT.GetCountry.GetNameNoFlag] má jakýkoli [concept_law] ze skupiny [GetLawGroup('lawgroup_policing').GetName]"
 montenegrin_compromise_tt: "Velmoci budou s [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] vyjednávat o tom, aby nám poskytla více půdy, i když možná budeme muset zastavit nájezdy."
 je_montenegrin_visit_moscow: "Navštívit Moskvu"
 je_montenegrin_visit_moscow_desc: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] navštíví #v $RUS$#!, aby zlepšil [concept_relations] a požádal o další podporu pro náš směr. Dokud bude [ROOT.GetCountry.GetRuler.GetSheHe] pryč, nebudeme moci schvalovat žádné zákony."
 je_montenegrin_make_saint: "Kanonizovat předka"
 je_montenegrin_make_saint_desc: "Kanonizací [ROOT.GetCountry.GetRuler.GetHerHis] předchůdce Petara I. jako světce může [ROOT.GetCountry.GetRuler.GetFullName] lépe ospravedlnit [ROOT.GetCountry.GetRuler.GetHerHis] vládu i schvalování zákonů."
 mon_visited_moscow_tt: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] bude mít z návštěvy Ruska prospěch jen jednou za desetiletí."
 mon_visiting_moscow_tt: "[ROOT.GetCountry.GetRuler.GetFullName] by již neměl být v zahraničí ani jinak zaneprázdněn."
 biljarda_built_tt: "[ROOT.GetCountry.GetNameNoFlag] [Concept('concept_decision', 'postavila Biljardu')]"
 mon_state_formation.1.t: "Nový život"
 mon_state_formation.1.d: "Velmoci vyjednaly, že nám [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] vrátí část našich domovin, pokud souhlasíme s ukončením nájezdů."
 mon_state_formation.1.f: "„Sní o vybudování velké národní říše, jejímž středem má být Černá Hora... Není taková ambice čirým šílenstvím? Má snad šílenec beztrestně vykřesat jiskru, která by mohla zapálit celý svět?“\n\n–Anonymní autor, #italic Ost Deutsche Post #!"
 mon_state_formation.1.a: "Přijměte dohodu."
 mon_state_formation.1.b: "„Smrt před mírem!“"
 mon_state_formation.1.c: "Jistě, #italic rozhodně#! přestaneme podnikat nájezdy."
 mon_stop_raiding_deal_tt: "Souhlasíme s ukončením nájezdů, čímž se náš příjem sníží o #r @money!-[GetPlayer.MakeScope.ScriptValue('raiding_income')]#!"
 mon_stop_aid_deal_tt: "Jako náhradu za [concept_russian_aid] bude #v $RUS$#! financovat založení naší státní pokladny a trvale nám poskytne #g @money!1000#! z [concept_budget_minting]:"
 mon_stop_aid_nodeal_tt: "#v $RUS$#! ukončí [concept_russian_aid], ale my nepřestaneme s [Concept('concept_raiding', 'nájezdy')]"
 mon_stop_aid_liars_tt: "My s nájezdy #v nepřestaneme#!."
 russia_no_longer_guarantor_tt: "$RUS$ už nebude garantovat naši nezávislost"
 no_more_raids_for_a_while: "[SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')] by proti nám neměla podniknout odvetný nájezd alespoň #v 10#! let."
 mon_state_formation.2.t: "Návštěva Ruska"
 mon_state_formation.2.d: "Po dlouhém čekání na vízum bylo [ROOT.GetCountry.GetRuler.GetFullName] povoleno navštívit Moskvu, kde se [ROOT.GetCountry.GetRuler.GetSheHe] podařilo získat sympatie pro naši věc."
 mon_state_formation.2.f: "„Senátoři, kapitáni, Gvardija, Perjanici, všichni čekají na [ROOT.GetCountry.GetRuler.GetHerHis] pokyn. Nevěřím, že na světě existuje jiná země, kde jsou rozkazy vládce plněny tak přesně a tak rychle, od těch nejnižších až po ty nejvýše postavené.“ \n\n–Ruský vyslanec Ozeretskovsky, zpráva do Petrohradu. \n\n„Na duchovního je prý dost nemnišský.“ \n„Obdivuji [ROOT.GetCountry.GetRuler.GetHerHim]. Není biskupa s lepším šermířským uměním.“ \n„Ano, dámy z hostince to všechny říkaly.“" #\n\n\–Moskevské pouliční klepy
 mon_state_formation.2.a: "Čistě diplomatická mise."
 mon_state_formation.2.b: "Alespoň navštivte chrám Vasila Blaženého."
 mon_state_formation.3.t: "Nový světec"
 mon_state_formation.3.d: "Petar I. byl na příkaz [ROOT.GetCountry.GetRuler.GetFullName] a Srbské pravoslavné církve oficiálně kanonizován."
 mon_state_formation.3.f: "„Jaké zázraky přesně vykonal?“\n„Když můj otec přišel o hlavu kvůli Turkovi, Petar I. ho přivedl zpět k životu.“ \n„Nepřivedl!“ \n„No, možná ne mého otce, ale jeho přítele.“ \n„Na tom nezáleží. Nejsme žádní dramatičtí Italové. Naši svatí nepotřebují zázraky.“ \n„Zázraky jsou ale pěkné.“ \n„Mému strýci se zjevil ve snu, počítá se to? Byla tam velká srbská říše, znovu dobývala Konstantinopol.“ \n„Říše? Nejdřív mi dejte jedno pořádné jídlo denně, pak se můžeme bavit o říši.“ \n„Vážně, šefe. Nevládnou nám Turci. Není už to samo dost velký zázrak?“"
 mon_state_formation.3.a: "Přivítejte poutníky v jeho hrobce."
 mon_state_formation.3.b: "Zdůrazněte jeho vizi pro [ROOT.GetCountry.GetNameNoFlag]."
 mon_state_formation.3.c: "„Největší zázraky se dějí na bojišti.“"
 je_mon_austria_alliance: "Změna kurzu"
 je_mon_austria_alliance_reason: "[SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')] připouští, že drží pobřežní země, které nám právem náleží. Trvá však na tom, že [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetAdjective, 'russian')] vliv musí zůstat mimo Středomoří. \n\nPokud dokážeme Rakušany přesvědčit, že jsme se rozešli se svými [SelectLocalization(SCOPE.sCountry('russia').IsValid, SCOPE.sCountry('russia').GetAdjective, 'russian')] pravoslavnými bratry, mohli by být přesvědčeni, aby nám vrátili naše drahocenné pobřeží."
 je_mon_austria_status_desc: "[concept_relations] s [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')] jsou [SCOPE.sCountry('austria').GetRelationsWithDesc( GetPlayer )]"
 raiding_income_greater_tt: "Náš příjem z [concept_raiding] musí být nižší než @money!+700"
 notification_je_mon_austria_alliance_fail_name: "[SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')] stahuje svou nabídku"
 notification_je_mon_austria_alliance_fail_desc: "Po nedávných událostech už [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetNameNoFlag, 'AUS')] není ochotno zvažovat navrácení našeho přístavu."
 notification_je_mon_austria_alliance_fail_tooltip: "#header $notification_je_mon_austria_alliance_fail_name$#!\n$TOOLTIP_DELIMITER$\n$notification_je_mon_austria_alliance_fail_desc$"
 mon_state_formation.4.t: "Černohorské pobřeží"
 mon_state_formation.4.d: "Černohorská plavidla znovu vyplouvají do Středomoří z přístavního města #v Cattaro#!, které nám vrátili naši noví spojenci [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')]."
 mon_state_formation.4.f: "„Jak štědré od našich přátel, nemyslíte, vrátit nám to, co bylo vždy naše?“ \n\n„Přípitek! Přísahám, že jsem jediný muž z hor, který umí uvázat uzel, a zatraceně dobrý pocit být užitečný.“\n„Už nalévej. Víš, že pod rakouskou okupací žily tisíce dobrých Srbů, ano? Teď jsou s námi. A jejich čluny také.“\n„No ano. Na ně! A na tvé zdraví!“\n„Na Černou Horu! A na to, že se nebudeš vydávat za našeho jediného námořníka.“\n„Mmm. Jediný ne, ne ne. Jen ten nejvděčnější.“"
 mon_state_formation.4.a: "Přivítejte světové obchodníky v [ROOT.GetCountry.GetNameNoFlag]."
 mon_state_formation.4.b: "Mezinárodně pochvalte [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')]."
 mon_state_formation.4.c: "Požádejte naše nové přátele o zbraně."
 je_mon_serb_unity: "Srbsko a Černá Hora"
 je_mon_serb_unity_reason: "Lid [SCOPE.sCountry('montenegro').GetNameNoFlag] se vždy považoval za Srby tragicky oddělené od svých bratří v [SelectLocalization(SCOPE.sCountry('serbia').IsValid, SCOPE.sCountry('serbia').GetName, 'SER')] tyranskou [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')]. \n\nPokud by oba státy byly svobodné a sdílely společnou hranici, mohly by se sjednotit v jeden velký srbský národ."
 mon_serb_unite_tt: "[SCOPE.sCountry('montenegro').GetNameNoFlag] a [SelectLocalization(SCOPE.sCountry('serbia').IsValid, SCOPE.sCountry('serbia').GetName, 'SER')] dostanou příležitost sjednotit se v jediný národ. Budeme si moci zvolit, zákony a vůdce které země přijmeme."
 mon_state_formation.5.t: "Srbsko a Černá Hora"
 mon_state_formation.5.d: "Díky společné hranici mají naše svobodné státy příležitost znovu sjednotit srbský lid v jediný národ."
 mon_state_formation.5.f: "„Říká se, že Černou Horu založili srbští rytíři, kteří se ztratili v krveprolití bitvy na Kosově poli, dostali se k černé hoře a udrželi ji proti Turkům. Jejich synové bojovali dál, a jejich synové, a jejich synové... Tak Černohorci po staletí drželi horu a nikdy se nebáli sestoupit a pomoci svým křesťanským bratřím. Nyní se konečně karta obrátila a ti stateční rytíři, kteří se nikdy nevzdali, se mohou znovu připojit k hlavnímu vojsku, snad je i vést, dokud boj neskončí smrtí nebo vítězstvím!“"
 mon_state_formation.5.a: "Jsme Černá Hora."
 mon_annexes_ser_tt: "Použijeme vládce a zákony [SCOPE.sCountry('montenegro').GetNameNoFlag]"
 mon_state_formation.5.b: "Jsme Srbsko."
 ser_annexes_mon_tt: "Použijeme vládce a zákony [SelectLocalization(SCOPE.sCountry('serbia').IsValid, SCOPE.sCountry('serbia').GetName, 'SER')]"
 mon_state_formation.5.c: "Jsme Srbsko a Černá Hora."
 mon_annexes_ser_mon_tt: "Použijeme naše vládce a zákony, ale změníme název národa na #v Srbsko a Černá Hora#!"
 mon_state_formation.5.e: "Jeden lid, ale dva státy."
 mon_annexes_not_tt: "Zůstaneme oddělenými národy"
 mon_state_formation.6.t: "Smrt básníka-knížete"
 mon_state_formation.6.d: "[SelectLocalization(SCOPE.sCharacter('petar').IsValid, SCOPE.sCharacter('petar').GetFirstName, 'Petar2')] zemřel na tuberkulózu. [SCOPE.sCharacter('danilo').GetFullName] nastupuje na trůn navzdory pokusům svého strýce [SCOPE.sCharacter('betrayer').GetFirstName] zabránit nástupnictví."
 mon_state_formation.6.d2: "[SelectLocalization(SCOPE.sCharacter('petar').IsValid, SCOPE.sCharacter('petar').GetFirstName, 'Petar2')] zemřel. [SCOPE.sCharacter('danilo').GetFullName] nastupuje na trůn navzdory pokusům svého strýce [SCOPE.sCharacter('betrayer').GetFirstName] zabránit nástupnictví."
 mon_state_formation.6.d3: "[SelectLocalization(SCOPE.sCharacter('petar').IsValid, SCOPE.sCharacter('petar').GetFirstName, 'Petar2')] zemřel na tuberkulózu. [SCOPE.sCharacter('danilo').GetFullName] nastupuje na trůn."
 mon_state_formation.6.d4: "[SelectLocalization(SCOPE.sCharacter('petar').IsValid, SCOPE.sCharacter('petar').GetFirstName, 'Petar2')] zemřel. [SCOPE.sCharacter('danilo').GetFullName] nastupuje na trůn."
 mon_state_formation.6.f: "#italic Kéž by mé oči mohly spatřit, \njak Černá Hora znovu získá, co ztratila! \nPak by se mi vskutku zdálo, jako by... \nmá duše byla tehdy opravdu spokojena \njako pokojné jarní jitro, \nkdy mořské větry i temné mraky \ndřímají na prsou moře.#! \n\n Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.6.a: "Kanonizujte [SCOPE.sCharacter('petar').GetFirstName] jako světce."
 mon_state_formation.6.b: "[SCOPE.sCharacter('danilo').GetFirstName] se bude titulovat jako monarcha."
 mon_state_formation.6.c: "Sjednoťme se v zármutku."
 mon_state_formation.6.e: "V této době ani nikdy později nebudeme trpět žádné disidenty."
 forgive_betrayer_tt: "[SCOPE.sCharacter('betrayer').GetFirstName] je odpuštěno"
 danilo_dresses_like_a_prince_tt: "[SCOPE.sCharacter('danilo').GetFirstName] osobně zajistí, že [concept_law] [GetLawType('law_monarchy').GetName] projde, pokud jej začneme prosazovat."
 mon_state_formation.7.t: "Méně biskupa, více knížete"
 mon_state_formation.7.d: "[SCOPE.sCharacter('danilo').GetFullName] si přeje být znám jako monarcha, ale [SCOPE.gsInterestGroup('devout').GetName] trvají na tom, že mu budou říkat biskup. Přemýšlí, jak jim nejlépe dokázat, že se mýlí."
 mon_state_formation.7.f: "„Otče, je možné vykonat zpověď za někoho jiného?“ \n„Co Danilo provedl tentokrát?“ \n„No, začalo to tím, že zmeškal vlastní svěcení–“ \n„Zase? Zítra ho k oltáři dotáhnu sám.“ \n„Ach otče, vy tomu nerozumíte. Tím to neskončilo.“"
 mon_state_formation.7.a: "Biskupové si nezapomínají obléct roucha."
 mon_state_formation.7.b: "Biskupové se nežení."
 mon_state_formation.7.c: "Biskupové nepodporují pracující ženy."
 mon_state_formation.7.e: "Biskupové nepijí krev sťatých Turků."
 mon_state_formation.7.g: "Biskupové neplánují udělat to všechno ve stejný den."
 danilo_will_get_married_tt: "[SCOPE.sCharacter('danilo').GetFullName] začne hledat vhodnou nevěstu"
 mon_state_formation.8.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] chce ženu"
 mon_state_formation.8.d: "Královská svatba má právě začít a celá [ROOT.GetCountry.GetNameNoFlag] přemýšlí, koho si [SCOPE.sCharacter('danilo').GetFullName] vybral za nevěstu."
 mon_state_formation.8.d2: "Nyní, když je [SCOPE.sCharacter('danilo').GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], nadešel čas, aby si [ROOT.GetCountry.GetRuler.GetHerHim] vybral ženu."
 mon_state_formation.8.f: "„Polní maršále Marmulo! Jaká byla ta svatba? Předvedly ty horské kmeny pořádnou podívanou?“ \n\n„Chudák dívka byla bledá jako stěna, když jsme ji doprovázeli z přístavu nahoru. A kdo by se jí divil? Představte si být princeznou mezi těmito vlky. Ale nedlouho poté, co byly sliby vyřčeny, začala mluvit jejich jazykem, posílat muže pro své věci, pít jako duha a klít jako námořník. Některým mužům se to nelíbilo, ale nic jim nedarovala. Pokud si [SCOPE.sCharacter('danilo').GetFirstNameNoFormatting] nedá pozor, brzy povede celý tábor ona a my konečně budeme mít někoho rozumného, s kým jednat.“"
 mon_state_formation.8.f2: "„Nikdy jsem neviděl takové barbarství! [SCOPE.sCharacter('danilo').GetPrimaryRoleTitle] [SCOPE.sCharacter('danilo').GetFirstNameNoFormatting] se objevil oblečený spíš do války než na svatbu a vychloubal se domy, které navštívil předchozí noc. Jezdec mu přinesl čerstvě useknutou hlavu z nájezdu na Turky a Danilo vykřikl: ‚Jak jsem slíbil!‘ Poté – nebesa nám odpusťte – pil z krvácejícího krku za smíchu svých mužů. Oči se konečně obrátily k ubohé dívce, kterou jsme přivedli z přístavu nahoru, aby si vzala toto monstrum. Statečnější než kterýkoli z mých mužů vykročila vpřed a kněz – pod hlavněmi pušek a celou dobu protestující – je oddal před zahanbenýma očima Boha… Upřímně doufám, že už nikdy nebudu poslán zpět na Balkán.“"
 mon_state_formation.8.a: "Vezměte si princeznu Kleopatru Karađorđevićovou ze Srbska, z povinnosti."
 mon_state_formation.8.b: "Vezměte si baronku Anastasii von Sina z Vídně, pro peníze."
 mon_state_formation.8.c: "Vezměte si Darinku Kvekićovou z Terstu, z lásky."
 mon_state_formation.9.t: "Stavba Biljardy"
 mon_state_formation.9.d: "[ROOT.GetCountry.GetRuler.GetFullName] nařídil výstavbu rezidence o pětadvaceti místnostech, doplněné kulatou obrannou věží. Mistři stavitelé chtějí vědět, co mají ve výzdobě paláce zdůraznit."
 mon_state_formation.9.f: "„Na skále, bezprostředně nad klášterem, stojí kulatá věž, proražená střílnami, avšak bez děl, na níž jsem napočítal hlavy dvaceti Turků, upevněné na kůlech kolem parapetu, trofeje černohorského vítězství… podivná podívaná v křesťanské zemi a v bezprostřední blízkosti kláštera a biskupského paláce.“ #–John Gardner Wilkinson, návštěvník Černé Hory"
 mon_state_formation.9.a: "Nechte několik silných mužů vynést od moře kulečníkový stůl."
 mon_state_formation.9.b: "Požehnejte kapli úlomkem lebky svatého Charalamba."
 mon_state_formation.9.c: "Proč napichovat hlavy jen na věž? Dejte je do každé místnosti!"
 mon_state_formation.10.t: "[SCOPE.sCharacter('danilo').GetPrimaryRoleTitle] [SCOPE.sCharacter('danilo').GetFullName] zavražděn"
 mon_state_formation.10.d: "[ROOT.GetCountry.GetRuler.GetFullName] byl při návštěvě pobřeží zastřelen. [SCOPE.sCharacter('nikola').GetFullName] nastupuje na trůn."
 mon_state_formation.10.f: "„Todor Kadić byl vrah, zastřelil ho přímo tam. Jeho žena ho vzala dovnitř a snažila se ho ošetřit, protože nikomu nevěřila. Byl celé dny nezvěstný, tak jsme šli do přístavu, víte? Ptali jsme se, co sakra udělali s naším šefem. Když jsme se konečně dozvěděli, že je mrtvý, Rakušané vypálili z děl na pozdrav a celé město vyšlo do ulic, aby slyšelo zprávy. Někteří říkají, že je to znamení, že přicházejí vetřelci, jiní věří, že nepřítel už je tady.“"
 mon_state_formation.10.a: "Nepřítel je uvnitř. Ať se loajální osvědčí!"
 mon_state_formation.10.b: "Byla to zjevně [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')]."
 mon_state_formation.10.c: "„[SCOPE.sCharacter('danilo').GetFirstName] zemřel jako hříšník, ale pro [SCOPE.sCharacter('nikola').GetFirstName] je naděje.“"
 mon_state_formation.11.t: "První škola"
 mon_state_formation.11.d: "[ROOT.GetCountry.GetRuler.GetFullName] osobně dohlédl na zřízení první školy v Černé Hoře."
 mon_state_formation.11.f: "„Pamatuji si, když nás [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] vítal ve třídě. Nevěděli jsme, co je kniha, natož škola. Ani kněz neuměl číst. Ale tento muž, přes všechny své řeči o statečnosti a válce, se také považoval za básníka – nebo za syna básníka. Mluvil o věcech, jako je národ. O hrdosti. Neměl jsem tušení, co se děje, ale pamatuji si, že jsem cítil, že něco začíná. Že jsem se mohl stát součástí něčeho většího. První poupata stromu v zahradě, která nikdy nezemře.“"
 mon_state_formation.11.a: "[ROOT.GetCountry.GetRuler.GetSheHe|U] by měl uspořádat učební osnovy."
 mon_state_formation.11.b: "[ROOT.GetCountry.GetRuler.GetSheHe|U] by mohl osobně vycvičit více učitelů."
 mon_school_helper: "To časem výrazně zvýší gramotnost národa"
 mon_state_formation.11.c: "[ROOT.GetCountry.GetRuler.GetSheHe|U] zajistí, aby se děti naučily bojovat."
 mon_state_formation.12.t: "Daně?"
 mon_state_formation.12.d: "Po mnoha letech zabíjení osmanských výběrčích daní jsou obyvatelé [ROOT.GetCountry.GetNameNoFlag] odolní vůči samotnému pojmu placení daní, i když peníze jdou [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 mon_state_formation.12.f: "„Takže [ROOT.GetCountry.GetRuler.GetSheHe] nás okrádá?“ \n„Ne, [ROOT.GetCountry.GetRuler.GetSheHe] nás #italic zdaňuje#!.“ \n„Jaký je v tom rozdíl?“ \n„No, daně budou utraceny v náš prospěch.“ \n„Takže nám dají mouku nebo opraví střechu?“ \n„Ne… Podívej, když nezaplatíme, přijdou ozbrojení muži a–“ \n„Takže [ROOT.GetCountry.GetRuler.GetSheHe] nás #italic opravdu#! okrádá!“"
 mon_state_formation.12.a: "Souhlaste s postupným zaváděním daní."
 mon_state_formation.12.b: "Vyslechněte obavy všech."
 mon_state_formation.12.c: "Vyhrožujte každému, kdo se bude vzpírat."
 mon_state_formation.12.e: "„Ne, ne daně. Řekl jsem ‚Na ně‘!“"
 mon_state_formation.13.t: "Přesná muška"
 mon_state_formation.13.d: "Lid [ROOT.GetCountry.GetNameNoFlag] je nesmírně hrdý na svou první [SCOPE.sBuilding('arms').GetName]."
 mon_state_formation.13.f: "#italic Svůj džeferdar, starý, ale dobrý, oplakávám víc, \nnež kdyby mi usekli vlastní paži. \nOplakávám jej, jako bych oplakával jediného syna. \nOplakávám jej, jako bych oplakával vlastního bratra, \nprotože to byla zbraň nad všechny zbraně. \nPřinášela štěstí a byla tak smrtonosná. \nNikdy ji nebylo třeba čistit ani o ni pečovat. \n Vždy byla jako lesklé zrcadlo. \n Když vystřelila, poznali byste ji \n i mezi tisícem jiných zbraní.#! \n\n–Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.13.a: "Vyrábějte dobré zbraně."
 mon_state_formation.13.b: "Vyrábějte levné zbraně."
 mon_state_formation.13.c: "Vyrábějte spoustu zbraní."
 je_tur_raided: "Neposlušná hora"
 je_tur_raided_reason: "Černohorci věří, že jsou nezávislým státem, ačkoli ve skutečnosti jsou našimi poddanými, jimž byla poskytnuta určitá míra autonomie, aby mohli praktikovat svou náboženskou svobodu. Příliš dlouho jsme je tolerovali, zatímco zabíjeli naše výběrčí daní a škodili našemu lidu. \n\nKdybychom je pobili mečem, vyslalo by to jasný vzkaz ostatním rebelům v našich zemích. Musíme však být opatrní, aby se do věci nevložily velmoci a malá [SelectLocalization(SCOPE.sCountry('montenegro').IsValid, SCOPE.sCountry('montenegro').GetNameNoFlag, 'MON')] se nestala sirkou, která zažehne evropský sud prachu. \n\n#v Nájezdy:#! \nPřepadené [Concept('concept_state', '$concept_states$')] trpí postihy k [concept_taxes] a horšími účinky [concept_turmoil]."
 je_tur_raided_target: "[SelectLocalization(SCOPE.sCountry('montenegro').IsValid, SCOPE.sCountry('montenegro').GetNameNoFlag, 'MON')] podniká nájezdy na [GetGlobalVariable('mon_raid_state').GetState.GetName]!"
 je_tur_raided_no_target: "Černohorci prozatím přestali podnikat nájezdy..."
 je_montenegrin_tur_raid_back: "Zahájit protiútok"
 je_montenegrin_tur_raid_back_desc: "Zaútočte na černohorskou armádu, abyste dočasně zastavili jejich nájezdy."
 je_montenegrin_tur_raid_back_condition_tt: "Černá Hora aktivně podniká nájezdy na jeden z našich států"
 je_montenegrin_tur_raid_back_effects_tt: "Černohorská armáda je v rozkladu, což na nějaký čas zabrání jejím nájezdům"
 counterraided_recently_tt: "Tuto interakci nemůžeme použít častěji než jednou za #v 3 roky#!"
 mon_state_formation.14.t: "Goliáš zabíjí Davida"
 mon_state_formation.14.d: "Rebelové v Černé Hoře byli konečně přivedeni k poslušnosti."
 mon_state_formation.14.f: "#italic Co se to děje, černohorští bratři? \nKdo rozdmýchal ten odporný plamen sváru? \nOdkud přišla ta nešťastná myšlenka \nmluvit o změně naší víry? \nNejsme snad bratři navzdory rozdílům? \nNebojujeme snad ve stejných bitvách společně? \nSdílíme dobré i zlé jako bratři. \nNezakrývají snad vlasy tureckých i srbských dívek \nv zármutku hroby padlých hrdinů?#! \n\n–Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.14.a: "Ať je to lekce pro všechny, kdo vzdorují."
 mon_state_formation.14.b: "Potrestat všechen [SCOPE.sCulture('serbian').GetName] lid za hříchy Černé Hory."
 mon_state_formation.14.c: "Chybovat je lidské, odpouštět…"
 mon_state_formation.15.t: "Stát Černá Hora"
 mon_state_formation.15.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] se snaží vykovat národ z kmenů na vzpurné černé hoře."
 mon_state_formation.15.f: "Nejdražší profesore... Ano, jsem ten Bartolomeo Biasoletto, který doprovázel Augusta II. do tohoto kraje a pomáhal mu s botanickým výzkumem. Ale na srbskou fénixovu květinu si mnoho nevzpomínám. Rostliny byly to poslední, co mě zajímalo. Vstoupil jsem do země, kde ženy pracovaly na polích, zatímco muži brousili své nože a bojovali – mezi sebou, pokud zrovna nebyl žádný nájezd. Turecká hlava na kůlu byla vrcholem architektury a její vychrtlý, negramotný a zbídačený lid myslel jen na další jídlo. \n\n Sám kníže-biskup na pokyn cara vyklidil vlastní pokoje pro mého krále. Mužovy oči téměř zeleně žhnuly závistí. Už tehdy jsem poznal, že ten mladík má ambice svázat tyto rebely na kopci dohromady, obléknout jejich náčelníky do něčeho, co připomíná vládu, a vykovat národ, který by mohl otřást světem."
 mon_state_formation.15.a: "Otřást světem, nebo zemřít při pokusu."
 law_women_in_the_fields_is_in_effect_tt: "Dokud je aktivní [concept_law] [GetLawType('law_women_in_the_fields').GetName], bude mít Černá Hora k dispozici více vojáků a pracovníků, ale její lid bude trpět."
 mon_state_formation.16.t: "Barbaři!"
 mon_state_formation.16.d: "Násilná a agresivní pověst země [ROOT.GetCountry.GetName] přiměla velmoci stáhnout svou podporu. Při utváření srbského národa se nyní musí spoléhat na vlastní sílu."
 mon_state_formation.16.f: "#italic Svět se mi nyní proměnil v peklo, \nlidé se změnili v pekelné duchy. \nÓ můj temný dni! Ó můj černý osude! \nÓ můj ubohý srbský národe, zadušený! \nPřežil jsem mnohá tvá trápení, \na přesto musím bojovat proti tomu nejhoršímu ze všech!#! \n\n Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.16.a: "Máme vše, co potřebujeme, zde, ve svých srdcích!"
 mon_state_formation.16.b: "Dobře, ale zvážila by [SelectLocalization(SCOPE.sCountry('austria').IsValid, SCOPE.sCountry('austria').GetName, 'AUS')] vrácení našeho přístavu?"
 mon_state_formation.17.t: "Dobytí!"
 mon_state_formation.17.d: "Naše drahocenná [ROOT.GetCountry.GetName] byla vazalizována [SCOPE.sCountry('overlord').GetAdjective] vládci."
 mon_state_formation.17.f: "#italic Kéž vás Bůh srazí, odporní zvrhlíci,\n proč mezi sebou potřebujeme Turkovo náboženství? \nCo uděláte s kletbou svých předků? \nS čím předstoupíte před Miloše \na před všechny ostatní srbské hrdiny, \njejichž jména budou žít, dokud bude slunce svítit?#! \n\n Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.17.a: "Musíme apelovat na jiné národy."
 mon_state_formation.17.b: "Když je nemůžeš porazit, přidej se k nim."
 mon_get_back_land: "Obdržíme všechny osmanské země ve státě [SCOPE.sStateRegion('state').GetName]."
 mon_state_formation.18.t: "Přezdobení"
 mon_state_formation.18.d: "Civilizovaná mladá žena našeho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] navrhuje, abychom z Biljardy sundali useknuté hlavy."
 mon_state_formation.18.f: "„Jak zdobí tam, odkud pochází ona, šefe?“  \n„Nevím, Mirko. Sloupy, sochy, květiny a podobné nesmysly.“  \n„To zní nudně.“ \n„Velmi nudně! Jak mi sloup pomůže bojovat s Turky?“  \n„Jo, je velmi povzbuzující ukázat na Biljardu a říct: ‚tahle, tahle byla moje.‘“  \n„I když ten zápach…“  \n„Jo, lepší je vyměnit je za čerstvé.“  \n„Pravda... Odpovědí je vždy více hlav.“"
 mon_state_formation.18.a: "Je čas, aby se [SelectLocalization(SCOPE.sCountry('montenegro').IsValid, SCOPE.sCountry('montenegro').GetNameNoFlag, 'MON')] stala civilizovanou."
 mon_state_formation.18.b: "Ne! [SCOPE.sCharacter('danilo').GetFirstName] nesmí před muži ztratit tvář."
 mon_state_formation.18.c: "Když už, potřebujeme pověsit #italic více#! hlav."
 mon_state_formation.19.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] vytržení"
 mon_state_formation.19.d: "Náš národ přežil svého největšího nepřítele. $dyn_c_ottoman_empire$ už neexistuje!"
 mon_state_formation.19.f: "#italic Slyšte, lidé, všichni sejměte čepice!\n Chci sloužit zádušní mši\n za duše\n velkých hrdinů našeho národa.\n Tento den pro ně bude nejvzácnější.#! \n\n Petar II. Petrović-Njegoš, #italic Horský věnec#!"
 mon_state_formation.19.a: "Ať se [SelectLocalization(SCOPE.sCountry('montenegro').IsValid, SCOPE.sCountry('montenegro').GetNameNoFlag, 'MON')] stane rájem na zemi."
 mon_state_formation.19.b: "Inspirujme konec veškeré tyranie!"
 mon_state_formation.19.c: "Známe jen válku."
 all_nations_freedom_tt: "Každá [concept_subject] #v na světě#!, bez ohledu na [concept_overlord], získá #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_mon_freedom_tt $mon_freedom$#!"
 modifier_mon_freedom_tt: "[GetStaticModifier('mon_freedom').GetName|v]\n[GetStaticModifier('mon_freedom').GetDesc]"
 mon_state_formation.20.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], nebo král [ROOT.GetCountry.GetRuler.GetFirstName]"
 mon_state_formation.20.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] navrhl oficiálně změnit naši zemi na království."
 mon_state_formation.20.f: "#italic  Tam, tam za těmi kopci,\nleží prý zelený háj,\npod nímž se tyčí svaté Dečany:\nmodlitba tam pronesená si nárokuje ráj.\n\nTam, tam za těmi kopci,\nkde modré nebe sklání svou klenbu;\nna srbská pole, na bitevní pole,\ntam, bratři, chystejte se k pochodu!#!\n–Nikola I. Petrović-Njegoš, #italic Onamo, 'namo!#!"
 mon_state_formation.20.a: "Dejte to vědět lidu."
 mon_state_formation.20.b: "Dejte to vědět všem národům!"
 mon_state_formation.20.c: "Dejte to vědět vojákům."
 mon_state_formation.20.e: "Nedejte to vědět nikomu."
 mon_change_to_kingdom: "Naše země se stane #v královstvím#!"
 mon_no_change_tt: "Naše země se nezmění."
