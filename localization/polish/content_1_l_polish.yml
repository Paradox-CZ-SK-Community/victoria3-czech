 sale_of_alaska_happened: "Prodej Aljašky proběhl"
 oregon_dispute_happened: "Oregonský hraniční spor byl vyřešen"
 usa_purchase_alaska: "Vyjednat koupi Aljašky"
 usa_purchase_alaska_desc: "Ačkoli někteří pochybují o strategické a ekonomické hodnotě rozsáhlých území Aljašky, neměli bychom promarnit příležitost posunout hranice svobody."
 alaska.1.t: "Nabídka na Aljašku"
 alaska.1.d: "[SCOPE.sCountry('alaska_buyer').GetName] nám učinila nabídku na koupi [SCOPE.sState('alaska_scope').GetName]."
 alaska.1.f_ru: "„Jako zástupce [SCOPE.sCountry('alaska_buyer').GetAltAdjectiveNoFormatting('G')] tímto souhlasíme zaplatit ve státní pokladně v [SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName] diplomatickému zástupci nebo jinému zmocněnci Jeho Veličenstva [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]a všech Rusí částku sedm milionů dvě stě tisíc dolarů ve zlatě.“"
 alaska.1.f: "„Jako zástupce [SCOPE.sCountry('alaska_buyer').GetAltAdjectiveNoFormatting('G')] tímto souhlasíme zaplatit ve státní pokladně v [SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName] diplomatickému zástupci nebo jinému zmocněnci [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]a země [SCOPE.sCountry('alaska_seller').GetNameNoFormatting] částku sedm milionů dvě stě tisíc dolarů ve zlatě.“"
 alaska.1.a: "Země je bezcenná, ať si ji [SCOPE.sCountry('alaska_buyer').GetNameNoFormatting] vezme."
 alaska.1.b: "[SCOPE.sState('alaska_scope').GetName] může ještě skrývat bohatství."
 alaska.2.t: "Koupě [SCOPE.sState('alaska_scope').GetName]"
 alaska.2.d: "[SCOPE.sCountry('alaska_seller').GetName] souhlasila s našimi podmínkami. Smlouva o koupi [SCOPE.sState('alaska_scope').GetName] byla sepsána."
 alaska.2.f: "„Zítra, pokud si přejete, přijdu na ministerstvo a můžeme přistoupit k uzavření smlouvy.“\n„Proč čekat do zítřka, pane Stoeckle? Uzavřeme smlouvu ještě dnes!“"
 alaska.2.a: "Jaké bohatství tato rozsáhlá území skrývají?"
 alaska.3.t: "Neúspěšná koupě [SCOPE.sState('alaska_scope').GetName]"
 alaska.3.d: "Jednání s [SCOPE.sCountry('alaska_seller').GetName] o koupi [SCOPE.sState('alaska_scope').GetName] selhala."
 alaska.3.f: "„Vidíme tedy, že válka není jen politickým aktem, ale i skutečným politickým nástrojem, pokračováním politického styku, jeho uskutečněním jinými prostředky.“"
 alaska.3.a: "Budeme pokračovat v diplomacii jinými prostředky."
 alaska.3.b: "Stálo to za pokus."
 alaska.4.t: "Nabídka na Aljašku"
 alaska.4.d: "[SCOPE.sCountry('alaska_seller').GetName] není schopna chránit svou severoamerickou kolonii [SCOPE.sState('alaska_scope').GetName] a zdá se být ochotna nám toto území prodat za přijatelnou cenu."
 alaska.4.f: "„Zástupce [SCOPE.sCountry('alaska_buyer').GetNameNoFormatting] souhlasí zaplatit ve státní pokladně v [SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName] diplomatickému zástupci nebo jinému zmocněnci Jejího/Jeho Veličenstva [SCOPE.sCountry('alaska_seller').GetRuler.GetPrimaryRoleTitle]a země [SCOPE.sCountry('alaska_seller').GetNameNoFormatting] částku sedm milionů dvě stě tisíc dolarů ve zlatě.“"
 alaska.4.a: "Učinit potřebná opatření."
 alaska.4.c: "Takový výdaj si nyní nemůžeme dovolit."
 alaska.4.tt1: "Nabídneme 3 miliony liber v průběhu 1 roku."
 je_alaska: "Získání Aljašky"
 je_alaska_reason: "Nacházející se na dalekém severu, [SCOPE.sState('alaska_state').GetStateRegion.GetName] je rozsáhlé, neprobádané území, které může skrývat mnohá bohatství. Získání tohoto území výrazně rozšíří naše hranice, zvýší národní prestiž a umožní ovládnout obchod v severním Pacifiku."
 alaska_usa_big_money: "Placení za Aljašku - vysoké platby"
 alaska_usa_medium_money: "Placení za Aljašku - střední platby"
 alaska_usa_small_money: "Placení za Aljašku - nízké platby"
 alaska_rus_big_money: "Prodej Aljašky - vysoké platby"
 alaska_rus_medium_money: "Prodej Aljašky - střední platby"
 alaska_rus_small_money: "Prodej Aljašky - nízké platby"
 je_oregon: "Oregonský hraniční spor"
 je_oregon_reason: "Správné určení hranice Oregonu je již dlouho nevyřešenou otázkou mezi Velkou Británií a Spojenými státy. Je nejvyšší čas tento spor vyřešit."
 oregon_tt: "Objeven Oregonský stezka zmapováním americké západní hranice"
 oregon.2.t: "Oregonský hraniční spor"
 oregon.2.d: "[SCOPE.sCountry('usa_scope').GetName] navrhly rozumný kompromis v oregonském hraničním sporu. Navrhují, že anektují [SCOPE.sState('washington_scope').GetName], [SCOPE.sState('oregon_scope').GetName] a [SCOPE.sState('idaho_scope').GetName], zatímco my si ponecháme nároky na severní oblasti."
 oregon.2.f: "„Pokud se Američané usadí u ústí Kolumbie, bude podle mého názoru nutné opustit pobřeží jižně od řeky. Tuto záležitost je nutné vyřešit bezodkladně.“\n\n„Dokud budou mít obchodníci Britské kožešinové společnosti volný přístup do oblasti Skalnatých hor z různých stanovišť, budou do značné míry monopolizovat obchod s kožešinami západně od Mississippi, téměř s úplným vyloučením našeho obchodu během několika příštích let.“"
 oregon.2.a: "Velmi přijatelný kompromis."
 oregon.2.b: "Nevzdáme ani píď britské půdy!"
 oregon.3.t: "Oregonská smlouva"
 oregon.3.d: "[SCOPE.sCountry('britain_scope').GetName] souhlasí s našimi rozumnými podmínkami a postoupila kontrolu nad [SCOPE.sState('washington_scope').GetName], [SCOPE.sState('oregon_scope').GetName] a [SCOPE.sState('idaho_scope').GetName] [ROOT.GetCountry.GetName]."
 oregon.3.f: "„Tato smlouva bude ratifikována [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]em [ROOT.GetCountry.GetNameNoFormatting] se souhlasem a radou jeho Senátu a ratifikační listiny budou vyměněny v Londýně po uplynutí šesti měsíců od tohoto data, nebo dříve, bude-li to možné.“"
 oregon.3.a: "Velmi přátelská dohoda."
 oregon.4.t: "Neúspěšná oregonská smlouva"
 oregon.4.d: "[SCOPE.sCountry('britain_scope').GetName] odmítá náš rozumný kompromis v oregonském hraničním sporu. Nároky [ROOT.GetCountry.GetName] na tuto oblast jsou nepopiratelné, a proto se může násilnější přechod moci stát nevyhnutelným."
 oregon.4.f: "„Britské impérium stojí v cestě našemu Zjevnému údělu! Náš velký národ se musí rozprostírat od moře k zářícímu moři.“"
 oregon.4.a: "Pokud nám to nepředají, vezmeme si to silou."
 je_conquer_oregon: "Anexe Oregonu"
 je_conquer_oregon_reason: "Jelikož Britové odmítli postoupit Oregon diplomatickou cestou, musíme jej získat silou zbraní."
 oregon_resolved: "Oregonský spor vyřešen"
 plague.1.t: "[ROOT.GetCountry.GetAltAdjectiveNoFormatting('aa')] chřipka"
 plague.1.d: "Ve státě [SCOPE.sState('plague_origin_state').GetName] propukla rozsáhlá epidemie zvláště smrtícího kmene chřipky. Hrozí její rychlé šíření, které může přerůst v celosvětovou pandemii."
 plague.1.f: "„Epidemie chřipky na nás dolehla téměř přes noc jako přízrak smrti a tři dny poté, co byla nemoc zařazena mezi hlášené choroby, byla naše nemocnice přeplněna oběťmi této nákazy.“"
 plague.1.a: "Musíme doufat, že se nerozšíří!"
 plague_decisions_available.tt: "Rozhodnutí „Reakce na pandemii“ je dostupné, což může zmírnit její dopady a šíření."
 plague_state_mortality.tt: "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipka se objevuje ve státě [THIS.GetState.GetName], čímž zvyšuje [Concept('concept_pop_growth', '$concept_pop_growth_mortality$')] na následujících 6 měsíců; stát může být zasažen dalšími vlnami pandemie"
 plague.2.t: "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipka se šíří"
 plague.2.d: "Smrtící [SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipka se objevila ve státě [SCOPE.sState('plague_spread_target').GetName]. Pandemie se rychle stává globální krizí."
 plague.2.f: "„Bylo to jako náhlý příval raněných z bojiště a dům byl téměř okamžitě zaplněn. Během několika dní bylo nutné otevřít oddělení v univerzitní tělocvičně, vybavené lůžky ze studentských kolejí.“"
 plague.2.a: "Kdy tato nákaza skončí?"
 plague.3.t: "Nová vlna [SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipky"
 plague.3.d: "Strašlivá nákaza pokračuje ve státě [SCOPE.sState('new_wave_state').GetName], kde nová vlna infikuje další část populace."
 plague.3.f: "„Kolem dvanácté hodiny jsem začal cítit horko. Byl jsem tak horečnatý, že jsem se bál, že zapálím své šaty. Kašel mi rval útroby, když jsem ho nedokázal potlačit. Byla tma; jistě jsem měl zápal plic a nikdy v životě jsem nebyl tak opuštěný a v takovém nepohodlí.“"
 plague.3.a: "Kéž to nebe brzy ukončí."
 plague.4.t: "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipka"
 plague.4.a: "Doufám, že nedorazí do [ROOT.GetCountry.GetName]!"
 plague.5.t: "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipka: reakce vlády"
 plague.5.d: "Vláda musí rozhodnout o své reakci na chřipkovou pandemii, která hrozí zachvátit celou zemi. Přísnější opatření budou mít jistě své náklady, ale zachrání životy."
 plague.5.f: "„Z ROZHODNUTÍ A NAŘÍZENÍ STÁTNÍ RADY PRO ZDRAVÍ se od dnešního POLEDNE na univerzitě NEKONÁ VÝUKA. Studenti mají ZAKÁZÁNO opouštět město; takové jednání by napomáhalo šíření nákazy.“"
 plague.5.a: "Zavést přísný lockdown a uzavřít nepodstatné podniky."
 plague.5.b: "Nařídit zdravotní opatření jako rozestupy a ochranné masky."
 plague.5.c: "Nemůžeme riskovat poškození ekonomiky."
 plague_lockdown.tt: "Státy mají mnohem menší pravděpodobnost výskytu dalších vln chřipky.\nÚmrtnost chřipky je při dalších vlnách výrazně snížena."
 plague_measures.tt: "Státy mají menší pravděpodobnost výskytu dalších vln chřipky.\nÚmrtnost chřipky je při dalších vlnách snížena."
 plague_no_response.tt: "Státy budou vždy zažívat další vlny chřipky, až čtyři vlny.\nÚmrtnost chřipky může být velmi vysoká."
 spanish_flu_response: "Reakce na pandemii"
 spanish_flu_response_desc: "Smrtící chřipka pustoší zemi a my musíme jednat, abychom ochránili naše občany."
 has_not_taken_plague_decision_for_6_months.tt: "Nezměnil národní reakci na pandemii během 6 měsíců."
 pandemic_response.tt: "Zvolíme, jak reagovat na pandemii.\nPo dobu 6 měsíců nebude možné zvolit jinou reakci."
 plague_modifier: "Pandemie chřipky: úmrtnost"
 plague_lockdown_mod: "Pandemie chřipky: ekonomické uzavření"
 plague_measures_mod: "Pandemie chřipky: ekonomické zpomalení"
 plague.7.t: "Zprávy o chřipce vyvolávají protiválečné nálady"
 plague.7.d: "Zprávy o mnoha úmrtích způsobených [SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] chřipkou ve státě [SCOPE.sState('plague_state').GetName] podkopávají podporu veřejnosti pro naše válečné úsilí."
 plague.7.f: "„Je šílenství posílat muže do války, zatímco tato nákaza pustoší naše domovy. Neměl by stát upřednostnit životy svých občanů před jejich smrtí?“"
 plague.7.a: "Nebudeme zasahovat do svobody tisku."
 plague.7.b: "Šířit uklidňující propagandu podloženou lékařskou vědou."
 plague.7.c: "Cenzurovat zprávy o úmrtnosti a počtech nakažených."
 plague.8.t: "Pandemická opatření přispívají k chudobě"
 plague.8.d: "Kvůli protiepidemickým opatřením nemůže mnoho lidí pracovat a chudší obyvatelé ve státě [SCOPE.sState('plague_poverty_state').GetName] mají potíže s placením nájmu. Nově nezaměstnaní dělníci čelí vystěhování, protože pronajímatelé odmítají jejich žádosti o odklad."
 plague.8.f: "„Řekli mi, že nemohu pracovat, protože továrna je přeplněná. Každá továrna je přeplněná! Pronajímatel, kéž by shořel v věčných plamenech, se o naši situaci vůbec nestará a požaduje nájem do konce týdne pod hrozbou vystěhování. Moje rodina bude jistě vyhnána z našeho domova.“"
 plague.8.a: "Zavést zmrazení nájmů a zákaz vystěhování."
 plague.8.b: "Dočasně zvýšit sociální zabezpečení."
 plague.8.c: "S tímto nemůžeme nic dělat."
 plague.9.t: "Liga proti rouškám"
 plague.9.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] založil Ligu proti rouškám jako opozici vůči našim pandemickým opatřením. Zpochybňují účinnost našich politik a požadují jejich zrušení ve prospěch strádající ekonomiky."
 plague.9.f: "„Noste masku a zachraňte si život! Nouzová situace, které nyní naše země čelí, přesahuje možnosti zdravotního úřadu.\nTi, kdo je nenosí, onemocní. Muž, žena či dítě, kteří nyní odmítají nosit masku, jsou nebezpeční darmošlapové!“"
 plague.9.a: "Ignorovat Ligu."
 plague.9.b: "Zrušit protiepidemická opatření."
 plague.9.c: "Zdiskreditovat Ligu pomocí lékařské vědy."
