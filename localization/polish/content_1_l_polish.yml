 isolation.1.t: "Nerovné smlouvy"
 isolation.1.d: "[SCOPE.sCountry('fraud_country').GetName] navrhla obchodní smlouvu, která na první pohled působí spravedlivě, ale obsahuje nevýhodné podmínky."
 isolation.1.f: "„Nemusíte číst drobné písmo, vše je v pořádku. Stačí podepsat.“"
 isolation.1.a: "To je nepřijatelné!"
 isolation.1.b: "Zdvořile odmítnout."
 isolation.1.c: "Podepsat, i když je nevýhodná."
 isolation.2.t: "Zavražděný vyslanec ze [SCOPE.sCountry('murdered_visitor_country').GetAdjectiveNoFormatting]"
 isolation.2.d: "Vyslanec ze [SCOPE.sCountry('murdered_visitor_country').GetName] byl zavražděn v restauraci v [SCOPE.sState('capital_scope').GetCityHubName]."
 isolation.2.f: "„Můžeme rychle obvinit nevinného, nebo pátrat po pravdě. Spravedlnost není vždy nejrychlejší cesta.“"
 isolation.2.a: "Obvinit obětního beránka."
 isolation.2.b: "Vyšetřit zločin."
