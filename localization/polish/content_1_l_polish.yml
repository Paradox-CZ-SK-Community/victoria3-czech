 je_schleswig_holstein_question_status: "Šlesvicko-holštýnská otázka musí být vyřešena, než bude možné vážně uvažovat o sjednocení Německa."
 je_schleswig_holstein_question: "Šlesvicko-holštýnská otázka"
 je_schleswig_holstein_question_reason: "Šlesvicko-holštýnská otázka nyní zaměstnává myšlenky i energii německých nacionalistů. Aby mohlo Německo pokročit k národnímu sjednocení, musí být německé obyvatelstvo v Holštýnsku nejprve osvobozeno od dánské nadvlády."
 je_schleswig_holstein_question_solved_trigger_desc: "Německá [concept_country] musí vyřešit $je_schleswig_holstein_question$ [concept_journal_entry]"
 je_schleswig_holstein_question_solved_fail_trigger_desc: "Jiná německá [concept_country] vyřeší tento [concept_journal_entry] před námi"
 je_german_unification_sole_candidate_trigger_desc: "Nesmí existovat žádný jiný německý [Concept('concept_unification_candidate', '$concept_unification_candidates$')] kromě [GetPlayer.GetName]"
 je_german_unification_idea_trigger_desc: "Má dokončen $je_german_unification_idea$ [concept_journal_entry]"
 je_german_unification_idea: "Německá národní identita"
 je_german_unification_idea_reason: "Myšlenky nacionalismu se mezi německým lidem šíří jako požár. Jakmile tyto ideály dosáhnou kritického množství příznivců v roztříštěných státech Německého spolku, nevyhnutelně dojde k tlaku na národní sjednocení."
 je_german_unification_idea_status: "Myšlenka německého národa se šíří státy Německého spolku."
 je_north_german_unification: "Severoněmecký spolek"
 je_north_german_unification_reason: "Éra nacionalismu je zde a německý lid touží po sjednocení. Musíme se stát hlavní mocností severního Německa, aby nás lidé vnímali jako vůdce tohoto úsilí."
 je_north_german_status: "Severoněmecké menší státy se k nám připojí, pokud se staneme jediným [concept_unification_candidate]."
 je_german_status: "Pro dokončení sjednocení Německa bychom měli zahájit sjednocovací [concept_diplomatic_play]"
 je_south_german_status: "Jihoněmecké menší státy se k nám připojí, pokud se staneme jediným [concept_unification_candidate]."
 german_unification.1.t: "Německé vedení"
 german_unification.1.d1: "[ROOT.GetCountry.GetName] se nyní považuje za jedinou realistickou možnost sjednocení Německa, a mnoho severoněmeckých států se rozhodlo připojit pod naše prapory. Naděje na vznik sjednoceného Německa rostou."
 german_unification.1.d2: "[ROOT.GetCountry.GetName] se nyní považuje za jedinou realistickou možnost sjednocení Německa, a mnoho jihoněmeckých států se rozhodlo připojit pod naše prapory. Naděje na vznik sjednoceného Německa rostou."
 german_unification.1.f: "Od roztříštěných držav Svaté říše římské po chaos po napoleonských válkách - Německo nikdy nebylo skutečně sjednoceno. To, čeho dnes [ROOT.GetCountry.GetAdjectiveNoFormatting] stát dosáhl, je krokem k nemožnému i nevyhnutelnému."
 german_unification.1.a: "Státníci za tímto úspěchem jsou národní hrdinové."
 german_unification.1.b: "Svět se o našem úspěchu dozví."
 german_unification.2.t: "Konfederace s [SCOPE.sCountry('german_unification_candidate').GetName]"
 german_unification.2.d: "[SCOPE.sCountry('german_unification_candidate').GetName] se nyní považuje za jedinou realistickou možnost sjednocení Německa a mnoho menších německých států se k nim připojuje. Máme se vzdát své nezávislosti ve prospěch jednotného Německa?"
 german_unification.2.f: "„Připojením k této konfederaci se možná vzdáme své suverenity, ale zároveň pomůžeme zajistit suverenitu Německa jako celku. Duch doby je nepopiratelný; německý lid touží po jednotě a [SCOPE.sCountry('german_unification_candidate').GetAdjectiveNoFormatting] ji může uskutečnit.“"
 german_unification.2.a: "Za Německo!"
 german_unification.2.b: "Naše suverenita je nedotknutelná."
 german_unification.3.t: "Železný kancléř"
 german_unification.3.d: "Šlechtic [SCOPE.sCharacter('bismarck_scope').GetFullName] se stal významnou osobností mezi [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('junkers').GetName]. Prosazuje německou jednotu a politický pragmatismus a nabízí své služby státu."
 german_unification.3.f: "„Brzy budu nucen převzít řízení vlády. Nejprve reorganizuji armádu - s pomocí parlamentu nebo bez ní. Jakmile bude armáda dostatečně silná, vyhlásím válku Rakousku, rozpustím Německý spolek, podrobím menší státy a sjednotím Německo pod naším vedením.“"
 german_unification.3.a: "Jmenovat Bismarcka kancléřem."
 german_unification.3.b: "Realpolitik není správná cesta."
 realpolitik: "Triumf realpolitik"
 germany_aggressive_expansion: "Realpolitik odsouzen"
 bismarck_unpopular: "Bismarck neoblíbený"
 bismarck_popular: "Bismarck oblíbený"
 je_german_unification: "Sjednocení Německa"
 je_german_unification_reason: "Nastal čas rozhodně prosadit sjednocení Německa. Jako jedna z hlavních německých mocností máme povinnost tohoto cíle dosáhnout."
 german_unification.4.t: "Sjednocení Německa"
 german_unification.4.d: "Neúnavné úsilí státníků a vojáků bylo odměněno; Německo je sjednoceno v jeden stát."
 german_unification.4.f: "Krev a železo, diplomacie i lest - Německo je sjednoceno. Je to den triumfu i zamyšlení. Ať už budoucnost přinese cokoli, německý stát bude hrát klíčovou roli v osudu lidstva."
 german_unification.4.a: "Ať žije [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 german_unification.4.b: "Vítězství německého lidu."
 german_unification.5.t: "Německá národní identita"
 german_unification.5.d1: "Myšlenky nacionalismu a sjednocení získávají podporu po celém Německém spolku. Obyvatelé hledí k mocnějším státům, jako jsme my, aby vedly tento proces."
 german_unification.5.d2: "Myšlenky nacionalismu a sjednocení získávají podporu po celém Německém spolku. Obyvatelé hledí k mocnějším státům, jako je [SCOPE.sCountry('german_unifier_candidate').GetName]."
 german_unification.5.d3: "Myšlenky nacionalismu a sjednocení získávají podporu, ale není jasné, kdo by měl vést sjednocení."
 german_unification.5.f: "„Německý spolek? To je vtip, přežitek minulosti! Pokud má německý lid prosperovat, musí vzniknout skutečný německý národ!“"
 german_unification.5.a: "Velké časy jsou před námi."
 je_south_german_unification: "Jihoněmecká federace"
 je_south_german_unification_reason: "Éra nacionalismu je zde a německý lid touží po sjednocení. Musíme se stát hlavní mocností jižního Německa."
 partial_german_unification_influence_prestige: "Sjednotitel Německa"
 german_unification_popularity: "Sjednotitel Německa"
 je_age_of_princes: "Éra knížat"
 je_age_of_princes_reason: "Etiopie se rozpadla na desítky válčících držav. Je na nás obnovit jednotu říše."
 je_age_of_princes_is_ethiopia: "Vytvořili jste #b Etiopii#! (viz [concept_nation_formation] v #b deníku#!)"
 ethiopia.1.t: "Psanecký princ"
 ethiopia.1.d: "Menší šlechtic rodu Šalomounova rychle získal moc i popularitu. Formálně psanec, porazil každou armádu vyslanou proti němu a nyní se snaží získat trůn [ROOT.GetCountry.GetName] silou."
 ethiopia.1.f: "Legenda o psanci, který okrádá bohaté a pomáhá chudým, je stará jako svět. Kassa Hailu si získal nejen armádu, ale i srdce lidu."
 ethiopia.1.a: "Tewodros nás povede ke slávě. Dosadit ho!"
 ethiopia.1.b: "Ukážeme mu, jak zacházíme s psanci."
 Tewodros: "Tewodros"
 tewodros_modifier: "Psanecký princ"
 italian_unification.1.t: "Risorgimento"
 italian_unification.1.d: "Pod hrdinským vedením [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] se italský národ zrodil. Sjednocen pod jednou vlajkou bude Itálie nepochybně utvářet budoucnost Evropy i světa."
 italian_unification.1.f: "„Ano, mladí muži, Itálie vám vděčí za čin, který si zasloužil obdiv celého světa. Zvítězili jste a budete vítězit i nadále, protože jste připraveni na taktiku, která rozhoduje o osudu bitev. K této úžasné kapitole našich dějin přibude ještě slavnější a otrok konečně ukáže svým svobodným bratřím meč ukovaný z okovů svého zajetí.“"
 italian_unification.1.a: "Ať žije Itálie!"
 italian_unification.1.b: "Nikdy nezapomeneme na naše statečné [SCOPE.gsInterestGroup('ruler_ig_scope').GetName]."
 italian_unification.2.t: "Sjednocení s [SCOPE.sCountry('italian_annex_country').GetName]"
 italian_unification.2.d: "Povzbuzeni naším vedením na Apeninském poloostrově požádala vláda malého italského státu [SCOPE.sCountry('italian_annex_country').GetName] o připojení k našemu úsilí o sjednocení italského lidu."
 italian_unification.2.f: "„Staré městské státy mají své kouzlo a můžeme se ohlédnout do doby renesance, kdy Itálie vzkvétala. Chceme-li však znovu prosperovat, musíme hledět vpřed, ne zpět. Jednota pod jedním státem povede italský lid opět k velikosti.“"
 italian_unification.2.a: "Diplomacie zvítězila!"
 italian_unification.2.b: "Není správný čas."
 communism.5.t: "Velká čistka"
 communism.5.d: "Reakční prvky politického života byly téměř zcela odstraněny nebo potlačeny. Předvojová strana vládne bez konkurence."
 communism.5.f: "„Strana je předvojem třídy a jejím úkolem je vést masy, nikoli pouze odrážet jejich průměrnou politickou úroveň.“"
 communism.5.a: "Neloajalita je zrada."
 great_purge_modifier: "Velká čistka"
 communism.6.t: "Naše revoluce"
 communism.6.d: "Komunistická vláda splnila svůj slib rozšířit veřejné instituce. Všem [ROOT.GetCountry.GetAdjectiveNoFormatting] občanům je zaručen přístup ke zdravotní péči, sociálnímu zabezpečení, vzdělání a bezpečnému pracovišti."
 communism.6.f: "„Každý podle svých schopností, každému podle jeho potřeb. To je základní princip komunistické společnosti a našeho státu. Jsme zářným příkladem toho, čeho může lidstvo dosáhnout společnou prací pro obecné dobro.“"
 communism.6.a: "Na těchto základech stojí socialismus."
 institutions_of_socialism_modifier: "Instituce socialismu"
 communism.7.t: "Socialistický demagog"
 communism.7.d: "[SCOPE.sCharacter('popular_socialist_leader').GetFullName] z [SCOPE.gsInterestGroup('popular_socialist_ig').GetName] rychle získává popularitu. Jeho radikální poselství rovnosti je zvláště přitažlivé pro nižší třídy."
 communism.7.f: "„Soudruzi, čas jednat nastal! Proč máme žít v bídě, zatímco náš šéf bohatne na naší práci? Proč naše mizerné výdělky končí u chamtivého statkáře?“"
 communism.7.a: "Inspirující!"
 communism.7.b: "Radikální!"
 popular_socialist_leader: "Socialistický demagog"
 communism.8.t: "Rudá armáda"
 communism.8.d: "[SCOPE.sCharacter('red_army_general').GetFullName] reorganizoval [SCOPE.gsInterestGroup('red_army_ig').GetName] na [ROOT.GetCountry.GetAdjectiveNoFormatting] Rudou armádu."
 communism.8.f: "Mezinárodní revoluce nebude vybojována řečmi politiků, ale silou zbraní. Rudá armáda je jedinou silou mezi přežitím a zničením."
 communism.8.a: "Za vlast!"
 red_army_tt: "Ozbrojené síly budou přejmenovány na Rudou armádu"
 communism.9.t: "Výrobní prostředky"
 communism.9.d: "Dělníci v [SCOPE.sState('coop_state').GetName] provozují úspěšné družstvo v [SCOPE.sBuilding('coop_building').GetName]."
 communism.9.f: "Ve výrobním družstvu vlastní výrobní prostředky samotní pracovníci. Pracoviště je demokratické a kolektivně řízené."
 communism.9.a: "Spokojený dělník je loajální dělník."
 communism.9.b: "[SCOPE.sState('coop_state').GetName] je skvělé místo k životu."
 path_to_vanguardism: "Cesta k avantgardismu"
 je_consolidate_colonial_rule: "Upevnit koloniální nadvládu"
 je_consolidate_colonial_rule_reason:3 "Hranice našich indických území představují trvalé riziko. Musíme zajistit stabilitu a potlačit odpor.\n\nPři rozšiřování správy můžeme vytvářet nové [Concept('concept_princely_state', '$concept_princely_states$')]."
 je_consolidate_colonial_rule_goal: "Nejvyšší [Country.GetAdjectiveNoFlag] [concept_secession] méně než #variable 30%#! po dobu #v 120#! měsíců\n• (Aktuálně #variable [ROOT.GetCountry.MakeScope.Var('east_indies_revolt_var').GetValue]#! měsíců)"
 je_reform_indies: "Reformovat Indii"
 je_reform_indies_reason: "Staré metody vykořisťování nejsou udržitelné. Musíme transformovat ekonomiku."
 je_reform_indies_goal: "Zvýšit HDP o 50%"
 je_ethical_policy: "Etická politika"
 je_ethical_policy_reason: "Máme příležitost zlepšit životní podmínky obyvatel kolonií prostřednictvím vzdělání a základního zabezpečení."
 east_indies.1.t: "Pevná hranice"
 east_indies.1.d: "Velký indický subkontinent byl plně podroben vládě [ROOT.GetCountry.GetAdjectiveNoFormatting]. Domorodé síly, které kdysi ohrožovaly bezpečnost naší nadvlády, byly zkroceny."
 east_indies.1.f: "„Koloniální nadvláda stojí na spolupráci Společnosti a indických knížat. Po desetiletí jsme Indy lákali sliby bohatství a prestiže, vojenských hodností a šlechtických titulů. Jejich služby byly odměněny a získáním jejich přízně byl subkontinent uklidněn.“"
 east_indies.1.a: "Loajální knížata udrží pořádek."
 east_indies.1.b: "Kapitál upevní naši nadvládu."
 east_india_company_men: "Muži Společnosti"
 east_indies.2.t: "Reformování Indie"
 east_indies.2.d: "Ekonomika Indie byla pod naší pečlivou správou transformována. S otroctvím a feudalismem zrušenými jsou naše rozsáhlá území připravena k využití prostřednictvím soukromého podnikání."
 east_indies.2.f: "„Hladomory, povstání a epidemie byly běžnou součástí života pod [ROOT.GetCountry.GetAdjectiveNoFormatting] vládou. Jsme však odhodláni to změnit; osvobodili jsme rolníky od povinných dávek, aby nebyli nuceni odevzdávat i tu hrst rýže, kterou potřebují k obživě. Nahrazením těchto tvrdých pravidel soukromým zaměstnáním zajistíme, že bohatství postupně pronikne i k místnímu obyvatelstvu.“"
 east_indies.2.a: "Investoři začínají projevovat zájem."
 east_indies.2.b: "Měli bychom více využít místní pracovní sílu."
 indies_investment: "Investice v Indii"
 indies_qualified_employees: "Místní pracovní síla"
 east_indies.3.t: "Etická politika"
 east_indies.3.d: "[ROOT.GetCountry.GetName] překonává starý koloniální systém. Obyvatelé pod naší správou nyní mají vysokou životní úroveň a přístup ke kvalitnímu vzdělání."
 east_indies.3.f: "„Před padesáti lety by taková politika byla nemyslitelná. Koloniální správci se zajímali pouze o to, co mohou získat - obvykle nátlakem - od nešťastníků žijících v koloniích. Dnes můžeme hrdě říci, že jsme to dokázali lépe a zavedli jsme etickou správu.“"
 east_indies.3.a: "Měli bychom je naučit správným hodnotám [SCOPE.sReligion('indies_religion').GetName]."
 east_indies.3.b: "Toto je země příležitostí."
 east_indies.3.c: "Nejsme snad milosrdní?"
 indies_loyalists: "Dobře živení poddaní"
 indies_conversion: "Konverze Indie"
 indies_migration: "Země příležitostí"
 regicide: "Královražda"
 regicide_averted: "Zmařená královražda"
 1848.1.t: "Proces s [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]"
 1848.1.d: "Radikální vláda uvěznila [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] a narychlo uspořádala soud. Očekávaným výsledkem je odsuzující rozsudek následovaný veřejnou popravou."
 1848.1.f: "„Občane [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting]. [ROOT.GetCountry.GetAdjectiveNoFormatting] národ vás obviňuje z mnoha zločinů spáchaných za účelem nastolení tyranie a zničení jeho svobody. Mezi nejzávažnější patří spiknutí se zahraničními mocnostmi, aristokratická korupce a prolévání krve lidu. Jak se přiznáváte?“"
 1848.1.a: "Vinen! Ať žije republika! Ať žije [ROOT.GetCountry.GetName]!"
 1848.1.b: "Tohle není spravedlnost!"
 je_abolish_monarchy: "Vymýtit monarchismus"
 je_abolish_monarchy_reason: "Je čas opustit zastaralý systém dědičné vlády. Monarchie musí být odstraněna a její příznivci poníženi, aby postupně upadla v zapomnění."
 je_abolish_monarchy_goal: "Následující musí být splněno po dobu 5 let:"
 1848.2.t: "Poslední monarchisté"
 1848.2.d: "[ROOT.GetCountry.GetName] již mnoho let úspěšně udržuje republikánskou formu vlády. Jen málokdo si ještě na starou monarchii vzpomíná s náklonností."
 1848.2.f: "„Časy urozených králů vládnoucích pokornému lidu z pozlaceného trůnu jsou pryč. Ať patří do pohádek a příběhů, kam náleží, a nostalgie po nich ať je jen neškodnou vzpomínkou, nikoli tváří reakce.“"
 1848.2.a: "Musíme nechat minulost za sebou."
 1848.2.b: "Na nostalgii není nic špatného."
 no_more_royalists: "Vůdci [concept_interest_group] již nebudou mít ideologii [GetIdeology('ideology_royalist').GetName]"
 monarchist_nostalgia: "Beznadějná nostalgie"
 1848.3.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] ústava"
 1848.3.d: "Radikální vláda vypracovala novou ústavu, která zaručuje [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.sCharacter('radical_leader_scope').GetFullName] a jeho stoupenci požadují její okamžité přijetí."
 1848.3.f: "„Princip svobody bude základem [ROOT.GetCountry.GetAdjectiveNoFormatting] národa. Každému muži hlas - a každý hlas má stejnou váhu. Vládce nevybíráme podle bohatství či půdy, ale podle mandátu demokracie.“"
 1848.3.a: "Liberté, égalité, fraternité!"
 1848.3.b: "Důvěřujme právnímu procesu."
 radical_constitution: "Radikální ústava"
 no_new_constitution: "Řádný právní postup"
 1848.4.t: "Jaro národů"
 1848.4.d: "Pod vedením [SCOPE.sCharacter('radical_leader_scope').GetFullName] se hnutí [GetIdeology('ideology_radical').GetName] rychle šíří v [ROOT.GetCountry.GetName]. Ať už jej podporujeme či nikoli, přináší dobu velkých změn."
 1848.4.d_no_leader: "Povzbuzeno revolučními náladami v Evropě se hnutí [GetIdeology('ideology_radical').GetName] šíří v [ROOT.GetCountry.GetName]. Ať už jej podporujeme či nikoli, přináší dobu velkých změn."
 1848.4.f: "„Lid [ROOT.GetCountry.GetAdjectiveNoFormatting] národa má právo vládnout sám sobě, bez králů a aristokratů. Naše požadavky byly jasně vyjádřeny - budou splněny, nebo vyjdeme do ulic.“"
 1848.4.a: "Podpořit konzervativní řád."
 1848.4.b: "Podpořit radikální hnutí."
