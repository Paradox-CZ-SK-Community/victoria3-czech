 je_trans_continental_railway_reason: "Železnice nás spojí od oceánu k oceánu!"
 major_railways.2.t: "První transkontinentální železnice"
 major_railways.2.d: "Po dokončení spojení mezi Atlantikem a Pacifikem se otevírá cesta k osídlení amerického západu."
 major_railways.2.f: "„Tímto zlatým hřebem stvrzujeme jednotu naší země, tak jako tato železnice spojuje dva velké oceány světa!“"
 major_railways.2.a: "Osídlíme Velké pláně."
 major_railways.2.b: "Západní pobřeží bude stejně prosperující jako východní."
