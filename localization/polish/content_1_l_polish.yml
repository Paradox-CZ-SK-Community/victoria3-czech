 1848.6.t: "Krajní opatření"
 1848.6.d: "[SCOPE.sLawType('home_affairs_law').GetName] zasely strach mezi radikály. Ukazuje se jejich účinnost."
 1848.6.f: "„Ať nás nenávidí, pokud se nás bojí. Takoví odpůrci nemohou být tolerováni.“"
 1848.6.a: "Zatknout vůdce."
 1848.6.b: "Udeřit plnou silou."
