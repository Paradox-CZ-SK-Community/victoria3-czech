 native_resettlement.6.t: "Národ Čerokíů"
 native_resettlement.6.d: "Přijetím zákona [SCOPE.sLawType('pronativelaw').GetName] je Indian Removal Act zrušen a lid [SCOPE.sCulture('cherokee_culture').GetName] může svobodně žít na svých původních územích."
 native_resettlement.6.f: "„Nějaký pěvec jednou pozvedne hlas k tvé chvále,\nve verších dojímavých světu poví, jak lidé\nse ti posmívali, syčeli na tebe, vinili tě z bláznovství!\nA kdo by ti nakonec neprokázal dostatek cti, když\nnavzdory posměchu, nouzi i nedostatku\ntvůj génius proměnil sen ve skutečnost.“" # Alexander Posey
