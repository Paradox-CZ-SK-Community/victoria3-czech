 1848.5.t: "Radikálové před branami"
 1848.5.d: "Radikální hnutí nabývá na síle, vymyká se kontrole a sílí násilí. Ulicemi zní výzvy k revoluci."
 1848.5.f: "„Slepí, nevzdělaní blázni. Chtějí být rovni, i když nejsou. Pokud trvají na násilí, odpovíme stejným způsobem.“"
 1848.5.a: "Tajná policie to vyřeší."
 1848.5.b: "Potřebujeme Národní gardu."
 1848.5.c: "Tyranie není řešení."
