 raj.1.t: "Klenot v koruně"
 raj.1.d: "Vláda [SCOPE.sCountry('company_country').GetName] skončila a vláda [SCOPE.sCountry('british_raj_country').GetAdjectiveNoFormatting] nyní převezme větší roli v indických záležitostech. Historie označí tento den za počátek Britského rádže."
 raj.1.f: "„Dokud vládneme Indii, jsme největší mocností na světě. Pokud ji ztratíme, okamžitě klesneme na druhořadou mocnost. Pouze despotickými metodami můžeme z Indie získat to, co Říše potřebuje.“"
 raj.1.a: "Konečně jsme se zbavili vlády Společnosti."
 activate_british_raj: "Východoindická společnost bude přeměněna na Britský rádž"
 raj.2.t: "Uplatnění Doktríny zániku"
 raj.2.d1: "[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] rezident uplatnil Doktrínu zániku s odkazem na pokročilý věk našeho vládce a neschopnost zplodit mužského dědice. Na základě výnosu [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] bude území [ROOT.GetCountry.GetName] okamžitě anektováno do [ROOT.GetCountry.GetTopOverlord.GetName]."
 raj.2.d2: "[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] rezident uplatnil Doktrínu zániku s odkazem na údajnou neschopnost našeho [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Na základě výnosu [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] bude území [ROOT.GetCountry.GetName] okamžitě anektováno do [ROOT.GetCountry.GetOverlord.GetName]."
 raj.2.f: "V jednu hodinu přesně rezident vstoupil. V pět minut po jedné byl čaj podán [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a jeho tlumočníkovi. V deset minut po jedné byl předložen výnos. V patnáct minut po jedné už neexistovalo [ROOT.GetCountry.GetNameNoFormatting] ani [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Rezident odešel, pára stále stoupala z jeho nedotčeného šálku."
 raj.2.a: "Nemáme žádnou možnost odporu."
 raj.2.b: "Svolejte naši armádu, zde se postavíme na odpor."
