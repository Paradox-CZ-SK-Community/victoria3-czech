 skyscraper_site: "Staveniště mrakodrapu"
 skyscraper_survey: "Průzkum mrakodrapu"
 je_skyscraper_site: "Průzkum mrakodrapu"
 je_skyscraper_site_reason: "Naši architekti se domnívají, že inovace v oblasti ocelových konstrukcí a betonu umožní stavbu budov vyšších, než si kdy kdo dokázal představit. Schválili jsme průzkum k nalezení nejvhodnějšího místa pro položení základů."
 je_skyscraper_site_goal: "Vyčkejte na dokončení #BOLD 2 roky#! trvajícího průzkumu"
 je_skyscraper_construction: "Postavit mrakodrap"
 je_skyscraper_construction_reason: "Po určení ideálního místa pro náš mrakodrap se musíme pustit do monumentálního úkolu jeho výstavby. Po dokončení očekáváme, že tato stavba bude patřit mezi nejvyšší na světě."
 skyscraper_decision: "Provést průzkum místa pro mrakodrap"
 skyscraper_decision_desc: "Naši architekti se domnívají, že inovace v oblasti ocelových konstrukcí a betonu umožní stavbu budov vyšších, než si kdy kdo dokázal představit. Vyzývají nás, abychom schválili průzkum k nalezení nejvhodnějšího místa pro položení základů."
 skyscraper_modifier: "Dotýkající se nebe"
 first_skyscraper_modifier: "Architektonické průkopnictví"
 skyscraper.1.t: "Místo pro mrakodrap určeno"
 skyscraper.1.d: "Naši architekti a inženýři určili [SCOPE.sState('skyscraper_site').GetCityHubName] v [SCOPE.sState('skyscraper_site').GetName] jako ideální místo pro zahájení výstavby mrakodrapu."
 skyscraper.1.f: "„Pánové, postavíme nejvyšší budovu na světě. Jen základy budou vyžadovat stovky mužů, a ještě více, pokud nebudou pracovat dvanáctihodinové směny. Každý den budeme muset dopravit tisíce pytlů cementu do srdce metropole. Musíme zajistit obrovské množství oceli, která, jako Atlas, ponese tíhu celého světa. Úkol, který nás čeká, je monumentální.“"
 skyscraper.1.a: "Položit základy."
 skyscraper.2.t: "Dotýkající se nebe"
 skyscraper.2.d: "Výstavba [SCOPE.sState('skyscraper_state').GetCityHubName] [SCOPE.sBuilding('skyscraper_building_scope').GetName] v [SCOPE.sState('skyscraper_state').GetName] je dokončena. Dominuje panoramatu města a inspiruje všechny, kdo na ni pohlédnou."
 skyscraper.2.d2: "Výstavba [SCOPE.sState('skyscraper_state').GetCityHubName] [SCOPE.sBuilding('skyscraper_building_scope').GetName] v [SCOPE.sState('skyscraper_state').GetName] je dokončena. Jako první stavba svého druhu na světě dominuje panoramatu města a inspiruje všechny, kdo na ni pohlédnou."
 skyscraper.2.f: "„Můj mrakodrap by nebyl možný bez tvrdé práce a odhodlání tisíců lidí, kteří se jeho výstavbě věnovali. Samozřejmě, jako hlavní architekt jsem měl možná větší vliv než většina ostatních. Dalo by se dokonce říci, že lví podíl zásluh patří mně. Ve skutečnosti tento vrchol lidského úsilí, tento nový Babylón, vznikl výhradně z mé mysli. Pohleďte na mé dílo, vy mocní, a zoufejte!“"
 skyscraper.2.a: "Velkolepý úspěch."
 skyscraper.2.b: "[ROOT.GetCountry.GetAdjective] architektura nemá konkurenci."
 first_skyscraper_tt: "Postavili jsme první mrakodrap na světě"
 war_crimes.1.t: "Válečné zločiny"
 war_crimes.1.d: "[SCOPE.sCharacter('war_crimes_perpetrator').GetFullName] použitím yperitu proti civilnímu obyvatelstvu v [SCOPE.sState('war_crimes_state').GetName] získal pověst válečného zločince. Ozývají se rozsáhlé výzvy k zavedení zákonů vymezujících přijatelné chování ve válce."
 war_crimes.1.f: "„Velké hořčicově zbarvené puchýře, slepé oči, slepené a lepkavé, neustále lapající po dechu, s hlasy sotva slyšitelnými, říkajícími, že se jim svírá hrdlo a že se udusí.“" # Vera Brittain
 war_crimes.1.a: "Ve válce je dovoleno vše."
 war_crimes.1.b: "[SCOPE.sCharacter('war_crimes_perpetrator').GetFullName] bude souzen za své zločiny."
 je_war_crimes: "Chemická válka"
 je_war_crimes_reason: "Nedávný vývoj děsivých chemických zbraní zpochybnil etiku moderního válčení."
 war_criminal: "Válečný zločinec"
 war_criminal_desc: "Tato postava spáchala zločiny proti lidskosti, což výrazně poškodilo její pověst."
 mustard_gas: "Horčiční plyn"
 laws_against_war_crimes: "Zákaz válečných zločinů"
 je_munitions_factories: "Zbrojní průmysl"
 je_munitions_factories_reason: "Pokroky ve střelných zbraních vytvořily potřebu výroby nábojů místo olověných kulek. Pokud vybudujeme průmysl zaměřený na výrobu munice, můžeme zásobovat vlastní vojáky a případně ji prodávat dalším zemím."
 munitions_modifier: "Zbrojní horečka"
 war_crimes.2.t: "Obchod se zbraněmi"
 war_crimes.2.d: "Zřízení [SCOPE.sBuilding('munitions_building').GetName] v [SCOPE.sState('munitions_state').GetName] zajišťuje dostatečné zásoby [SCOPE.sGoods('ammo_scope').GetName] pro [ROOT.GetCountry.GetNameNoFlag]."
 war_crimes.2.f: "„Odmítám označení ‚obchodník se zbraněmi‘. Naznačuje, že jsem jen cynický ziskuchtivec, který těží z utrpení svých bližních. Nic nemůže být dál od pravdy; to, co dělám, zajišťuje mír a bezpečnost nejen v [ROOT.GetCountry.GetNameNoFormatting], ale v celém civilizovaném světě.“"
 war_crimes.2.a: "Chceš-li mír, připravuj se na válku."
 war_crimes.2.b: "Podívejme se na rychlý pokrok ve výzkumu."
 tunguska_research: "Tunguská vědecká expedice"
 tunguska_omen: "Tunguské znamení"
 tunguska_mining: "Tunguská těžební expedice"
 tunguska.1.t: "Tunguská událost"
 tunguska.1.desc: "Mohutná exploze otřásla oblastí Tunguzky v [SCOPE.sState('tunguska_state').GetAltAdjective('L')]. Vědci se domnívají, že do Země narazilo nebeské těleso."
 tunguska.1.f: "„Na okamžik jsem ztratil smysly, ale pak vyběhla má žena a odvedla mě do domu. Poté se ozval takový hluk, jako by padaly kameny nebo pálila děla, země se třásla, a když jsem byl na zemi, přitiskl jsem hlavu dolů, v obavě, že ji kameny rozdrtí. Když se obloha otevřela, mezi domy se prohnal horký vítr, jako z děl, který zanechal v zemi stopy jako cesty a poškodil některé plodiny.“" # S. Semenov
 tunguska.1.a: "Fascinující, ale bezvýznamné."
 tunguska.1.b: "To si zaslouží vědecké zkoumání."
 tunguska.1.c: "Je to znamení!"
 tunguska.1.d: "Můžeme to vytěžit?"
 cholera.1.t: "O způsobu šíření cholery"
 cholera.1.d1: "Zdroj epidemie cholery v [SCOPE.sState('cholera_state').GetCityHubName] byl vystopován důmyslným chirurgem-lékárníkem Johnem Snowem. To vedlo k velkému pokroku v oblasti veřejného zdraví."
 cholera.1.d2: "Zdroj epidemie cholery v [SCOPE.sState('cholera_state').GetCityHubName] byl vystopován důmyslným chirurgem-lékárníkem. To vedlo k velkému pokroku v oblasti veřejného zdraví."
 cholera.1.f: "„Výsledkem šetření tedy je, že v této části Londýna nedošlo k žádnému zvláštnímu propuknutí či rozšíření cholery kromě osob, které měly ve zvyku pít vodu z výše zmíněné pumpy. V důsledku toho, co jsem uvedl, byla následujícího dne odstraněna rukojeť pumpy.“" # John Snow
 cholera.1.a: "Musíme udržet špínu mimo ulice."
 cholera.1.b: "Epidemiologie je slibný obor."
 cholera.1.c: "John Snow nic neví."
 john_snow_knows_nothing: "Zdiskreditovaný epidemiologický výzkum"
 cholera_modifier: "Epidemie cholery"
