 dyn_c_peru_bolivia_adj: "Peruánsko-bolivijský"
 je_autocracy: "Náboženství, autokracie, národnost"
 je_autocracy_reason: "Naše země je definována absolutní autoritou našeho milovaného vládce. Jsme jedna rodina s jedním otcem a jednou vlastí; jednotní a silní. Pokud si přejeme tyto hodnoty zachovat, musí být autokracie udržena."
 je_autocracy_goal: "Následující musí platit po celkem 30 let:"
 autocracy.1.t: "Oficiální národnost"
 autocracy.1.d: "Státní politika náboženství, autokracie a národnosti se stala všeobecně rozšířenou ideologií lidu [ROOT.GetCountry.GetAdjective]. Jen málokdo se odváží zpochybnit absolutní autoritu [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]."
 autocracy.1.f: "„Ve státě, kde láska k [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]ům a oddanost trůnu vychází z přirozených vlastností lidu, kde existují zákony vlasti a pevnost ve správě, budou všechny snahy zlovolných lidí marné a pošetilé.“" # Tsar Nicholas I
 autocracy.1.a: "Sláva [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]ovi!"
 autocracy.1.b: "Lid [SCOPE.sCulture('primary_culture_scope').GetName] je nadřazený."
 autocracy.1.c: "[SCOPE.gsInterestGroup('church_scope').GetName] nám ukazuje cestu."
 autocracy.2.t: "Tajné společnosti"
 autocracy.2.d: "Tajné skupiny akademiků v [SCOPE.sState('secret_societies_state').GetName] kují pikle proti státu, aby prosadily pomýlenou věc [SCOPE.gsInterestGroup('secret_society_ig').GetName]."
 autocracy.2.f: "„Našli jsme vaše rouhačské a zrádné knihy. Vaše pamflety. Obchody, které jste používali jako krytí. Vaše domy. Místa setkání, o nichž jste si mysleli, že zůstala utajena. Vše jsme zapálili. Teď už zbývá jen vaše přiznání.“"
 autocracy.2.a: "Nechte je být, nepředstavují hrozbu."
 autocracy.2.b: "Nesouhlas musí být potrestán."
 autocracy.3.t: "Blahoslavení tiší"
 autocracy.3.d: "[SCOPE.gsInterestGroup('church_scope').GetName] v [SCOPE.sState('religious_serfs_state').GetName] ujišťuje [SCOPE.sPop('religious_serf_pop').GetName], že navzdory tvrdým podmínkám jejich života slouží vyššímu dobru národa [ROOT.GetCountry.GetAdjective]. Nevolníci budou za svou službu odměněni na onom světě."
 autocracy.3.f: "„Blahoslavení tiší,\nneboť oni dostanou zemi za dědictví.\nBlahoslavení, kdo lační a žízní po spravedlnosti,\nneboť oni budou nasyceni.\nBlahoslavení milosrdní,\nneboť oni dojdou milosrdenství.“\n\n-#italic Kázání na hoře#!, Matouš 5: 5-7"
 autocracy.3.a: "Vštípit jim loajalitu ke státu."
 autocracy.3.b: "Očistěte se od nečistých myšlenek."
