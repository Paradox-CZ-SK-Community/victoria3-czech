 warlord_china_events.301.t: "Myšlení [SCOPE.sCharacter('yan_xishan_thinker').GetFullName]"
 warlord_china_events.301.d: "Náš velký [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] vytvořil propracovanou novou ideologii, jejímž cílem je sjednotit národ. Čerpá z mnoha zdrojů, je složitá a může být obtížné ji předat masám."
 warlord_china_events.301.f: "„Naše slavná nová ideologie je zcela komplexní, spojuje vše hodnotné z militarismu, nacionalismu, anarchismu, demokracie, kapitalismu, komunismu, individualismu, imperialismu, univerzalismu, paternalismu a utopismu.“"
 warlord_china_events.301.a: "Šířit učení [SCOPE.sCharacter('yan_xishan_thinker').GetFullName]!"
 warlord_china_events.301.b: "To nedává žádný smysl. Zaměřme se raději na legitimizaci státu."
