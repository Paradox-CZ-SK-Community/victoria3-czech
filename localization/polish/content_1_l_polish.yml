 dreadnought_hoax.1.t: "Podvod s bitevní lodí"
 dreadnought_hoax.1.d: "Skupina akademiků se vydávala za členy královské rodiny a získala přístup k flotile."
 dreadnought_hoax.1.f: "„Důstojníci uvěřili převleku a dokonce vztyčili špatnou vlajku. Podvodníci mluvili nesmysly a předváděli falešné obřady.“"
 dreadnought_hoax.1.a: "Zatknout je!"
 dreadnought_hoax.1.b: "Bunga bunga."
 battleship_hoax: "Podvod s bitevní lodí"
 dual_monarchy.1.t: "Dualismus"
 dual_monarchy.1.d: "Dosáhli jsme dohody s [SCOPE.sCulture('hungarian_culture').GetName] lidem. Budou mít rovnocenné postavení."
 dual_monarchy.1.d2: "Situace v Uhrách je napjatá. Bez kompromisu hrozí vzpoura."
 dual_monarchy.1.f: "„Spojení Rakouska a Uher bude přínosem pro obě strany.“"
 dual_monarchy.1.a: "Rakousko-Uhersko je sjednoceno."
 dual_monarchy.1.b: "Musíme přijmout kompromis."
 dual_monarchy.1.c: "Rakousko zůstane Rakouskem!"
 austria_hungary_tt: "Země bude přejmenována na Rakousko-Uhersko"
 dual_monarchy_compromise: "Rakousko-uherské vyrovnání"
 dual_monarchy_compromise_rejected: "Odmítnuté vyrovnání"
 austria_hunary_invalid: "Nevlastní uherská území"
 je_electric_underground_railway: "Metropolitní železnice"
 je_electric_underground_railway_reason: "S rostoucí populací musíme hledat nové dopravní řešení - podzemní elektrickou železnici."
 metro_system: "Elektrifikovaná metropolitní železnice"
 metro_prestige: "Město světového významu"
 metro.1.t: "Metropolitní železnice"
 metro.1.d: "Otevření metra v [SCOPE.sState('metro_state').GetCityHubName] bylo přijato s nadšením."
 metro.1.f: "„Nejen železnice, ale celé město je elektrizováno. Lidé obdivují technologii.“"
 metro.1.a: "Odměnit inženýry."
 metro.1.b: "Naši železnici nám bude závidět celý svět."
 je_patagonia: "Dobytí pouště"
 je_patagonia_reason: "Jižní části kontinentu zůstávají mimo kontrolu jakéhokoli státu. Přestože domorodé obyvatelstvo nebude snadným protivníkem, je nezbytné toto území zajistit dříve, než padne do rukou našich rivalů."
 patagonia.1.t: "Dobytí pouště"
 patagonia.1.d: "Dokončili jsme dlouhé tažení za dobytím patagonského jihu. Osadníci začínají vyhledávat vhodná místa pro zakládání nových měst a využívání přírodních zdrojů."
 patagonia.1.f: "„Mapučové bojovali po staletí, aby ochránili svou zemi. Nyní jsou konečně poraženi a ta země patří nám. Vítězi náleží kořist. Teď musíme osídlit a spravovat to, co jsme získali.“"
 patagonia.1.a: "Konečně nám patří jih."
 patagonian_settlement: "Patagonské osídlení"
 patagonia.2.t: "Vyzbrojování domorodců"
 patagonia.2.d: "Zjistili jsme, že naši rivalové z [SCOPE.sCountry('rival_country').GetName] vyzbrojují [SCOPE.sCountry('patagonia_country').GetAdjectiveNoFormatting] domorodce v [SCOPE.sState('patagonia_state').GetName]. To pravděpodobně zkomplikuje naše dobývání regionu."
 patagonia.2.f: "„Domorodci nás nikdy nevítali, ale bez prostředků k účinnému odporu jsme jejich námitky přehlíželi. Dodávky zbraní od [SCOPE.sCountry('rival_country').GetAdjectiveNoFormatting] však znamenají, že jim budeme muset čelit jako rovnocennému protivníkovi.“"
 patagonia.2.a: "Měli bychom situaci uklidnit."
 patagonia.2.b: "Pokud chtějí boj, dostanou ho."
 patagonia_slow_down: "Koloniální deeskalace"
 patagonia_supplied_with_weapons: "Vyzbrojeni zbraněmi"
 amazon.1.t: "Ďáblova železnice"
 amazon.1.d: "Dělníci na [SCOPE.sBuilding('devils_railroad').GetName] v [SCOPE.sState('amazon_state').GetName] umírají ve velkém kvůli malárii a extrémním pracovním podmínkám."
 amazon.1.f: "„Každý kilometr je lemován hroby, každá kolej položena v krvi. Nemoci a spalující horko ničí naše těla. Dlázdíme cestu do pekla vlastními životy.“"
 amazon.1.a: "Plnou parou vpřed!"
 amazon.1.b: "To je příliš vysoká cena."
 amazon.1.c: "Zpřísnit bezpečnostní standardy."
 devils_railroad_modifier: "Ďáblova železnice"
 slowed_railway_construction: "Zpomalená výstavba"
 cautious_railway_construction: "Opatrná výstavba železnice"
 amazon.2.t: "Peklo na zemi"
 amazon.2.d: "Dělníci na [SCOPE.sBuilding('rubber_plantation_scope').GetName] v [SCOPE.sState('amazon_state').GetName] jsou brutálně zneužíváni. Mrzačení se stalo běžným trestem."
 amazon.2.f: "„Uváděli, že kvůli krutému zacházení ze strany úředníků a vojáků se jejich život stal nesnesitelným. Nezbývalo jim nic než smrt hladem, vyčerpáním nebo trest za nesplnění kvót.“"
 amazon.2.a: "Nemůžeme zpomalit produkci."
 amazon.2.b: "Zahájit vyšetřování podmínek."
 amazon.2.c: "Viníci zaplatí za své zločiny."
 rubber_mistreatment: "Zneužívání dělníků na plantážích"
 rubber_slowdown: "Vyšetřování zvěrstev"
 rubber_protections: "Ochrana dělníků na plantážích"
 amazon_theatre: "Teatro Amazonas"
 amazon_migration: "Migrace do Amazonie"
 amazon.4.t: "Nejnebezpečnější hra"
 amazon.4.d: "Po návratu ze safari byl [SCOPE.sCharacter('hunted_character').GetFullName] ztroskotán na malém ostrově v [SCOPE.sState('dangerous_game_state').GetName]. Tam byl loven jako zvíře [SCOPE.sCountry('hunter_country').GetAdjectiveNoFormatting] aristokratem [SCOPE.sCharacter('hunter_character').GetFullName]."
 amazon.4.f: "„Skvělé! Jeden z nás poslouží jako potrava pro psy. Druhý se vyspí v této výtečné posteli. Připravte se, [SCOPE.sCharacter('hunted_character').GetFirstNameNoFormatting].“"
 amazon.4.a: "Barbarské!"
 amazon.4.b: "[SCOPE.sCharacter('hunted_character').GetFirstName] nikdy nespal v lepší posteli."
 je_trans_siberian_railway: "Transsibiřská magistrála"
 je_trans_siberian_railway_reason: "Sibiř je bohatá na zdroje, ale chudá na infrastrukturu. Musíme vybudovat velkou železnici spojující Moskvu s Tichým oceánem!"
 major_railways.1.t: "Transsibiřská magistrála"
 major_railways.1.d: "Rozsáhlá železniční trať nyní spojuje [SCOPE.sState('moscow_scope').GetName] s [SCOPE.sState('siberia_end_scope').GetName]. Bohatství Sibiře je na dosah!"
 major_railways.1.f: "To je triumf [ROOT.GetCountry.GetAdjectiveNoFormatting] národa. Vlaky povezou uhlí, síru a železo napříč Eurasií!"
 major_railways.1.a: "Těžit, hoši!"
 major_railways.1.b: "Všichni na palubu!"
