 meiji_timeout_no_progress: "Žádná restaurace není dokončena po #b 12 letech#!"
 meiji.1.t: "Restaurace [ROOT.Var('emperor_var').GetCharacter.GetFirstName]"
 meiji.1.d: "[GetLawType('law_bakufu').GetName] padl a [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] obnovil politickou nadvládu monarchie. Tato přelomová událost ukončuje staletí vojenské vlády v #v $JAP$#! a otevírá novou éru modernizace a reforem. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] si musí pečlivě vybrat své politické spojence."
 meiji.1.f: "Bývalý šógun se sklání s úctou i hanbou, když předává své sídlo moci - mohutný hrad Edo - obnovenému císaři. Okamžitě začínají přestavby; starý hrad bude nahrazen velkolepým císařským palácem. Ačkoli si vnější podoba zachová podobnost s bývalým sídlem v Kjótu, císař plánuje spojit bohaté japonské tradice s podivnými západními prvky. Možná metafora budoucnosti Japonska."
 meiji.1.a: "Průmyslová síla nás povede vpřed."
 meiji.1.b: "Musíme se obrátit k intelektuálům."
 meiji_favored_ig: "Upřednostněni císařem"
 meiji.2.t: "Obnovené Japonsko"
 meiji.2.d: "Reformovaná armáda, otevřená a uznávaná země, nová společnost. [ROOT.GetCountry.GetName] stojí jako rovný mezi světovými mocnostmi a možná začne usilovat o vlastní imperiální ambice."
 meiji.2.f: "„Z milosti nebes sedíme na posvátném trůnu, na němž vládli naši předkové od nepaměti. Civilizace a instituce Japonska se natolik liší od ostatních zemí, že nelze očekávat okamžité dosažení cíle. Naším záměrem je vybrat z institucí osvícených národů ty, které nejlépe odpovídají našim podmínkám, a postupně je přizpůsobit v reformách, abychom dosáhli rovnosti s nimi.“"
 meiji.2.a: "[ROOT.GetCountry.GetAdjectiveNoFormatting] říše povstane."
 meiji.2.b: "Budeme potřebovat silné spojence."
 meiji.2.c: "Železnice jsou klíčem k úspěchu."
 japan_military_reward: "Japonská vojenská reforma"
 japan_diplomatic_reward: "Japonští vyslanci"
 japan_production_reward: "Moderní japonská železnice"
 meiji.3.t: "Pád samurajů"
 meiji.3.d: "[ROOT.GetCountry.GetName] úspěšně reformoval ozbrojené síly a ukončil zastaralý feudální systém. [SCOPE.gsInterestGroup('samurai_ig').GetName] již zřejmě nemají místo v moderní společnosti."
 meiji.3.f: "Šógun si podroboval daimjó, kteří spoléhali na samuraje při udržování moci nad rolníky. To byl základ japonského feudalismu - nyní již minulost. Někteří stále ctí ideály bušidó, a tento odkaz jistě přetrvá. Samurajové však padli a jejich éra skončila."
 meiji.3.a: "Zachovejme jim status důstojníků a šlechty."
 meiji.3.b: "Éra samurajů skončila."
 samurai_rename.tt: "Zájmová skupina samurajů bude přeměněna na ozbrojené síly"
 samurai_officers: "Samurajští důstojníci"
 meiji.4.t: "[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting] vojenští poradci"
 meiji.4.d: "[SCOPE.sCountry('military_consultant_country').GetName] nabízí služby generála [SCOPE.sCharacter('military_consultant_general').GetFullName] jako vojenského poradce. Podmínky jsou výhodné, ale musíme si dát pozor na závislost na cizích mocnostech."
 meiji.4.f: "„Toto je Gatlingův kulomet. Dvě stě ran za minutu. Nic nedokáže odolat této ničivé palbě. Naučíme vaše vojáky tyto stroje používat a dodržovat moderní disciplínu.“"
 meiji.4.a: "Přijímáme jejich pomoc."
 meiji.4.b: "Nechceme jejich jedovatý dar."
 western_military_consultant: "Západní vojenští poradci"
 meiji.5.t: "Mise do [SCOPE.sCountry('japan_embassy_country').GetName]"
 meiji.5.d: "Na diplomatické cestě na Západ jsme se setkali s [SCOPE.sCharacter('japan_embassy_politician').GetFullName]. Byly navrženy dohody pro zlepšení vztahů."
 meiji.5.f: "„Vztahy mezi národy se zdají zdvořilé, ale skrývají soupeření o moc.“"
 meiji.5.a: "Navázat silné vztahy."
 meiji.5.b: "Můžeme se od nich učit."
 meiji.5.c: "Nic nám nepřinesou."
 meiji.6.t: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] investice"
 meiji.6.d: "Bohatý průmyslník vidí v [ROOT.GetCountry.GetName] velký potenciál. Nabízí sdílení technologií výměnou za politické ústupky."
 meiji.6.f: "„Vidím v této zemi budoucnost - dnešní pole budou zítra průmyslovými centry.“"
 meiji.6.a: "Přijmout technologii."
 meiji.6.b: "Nepotřebujeme cizí zásahy."
 ending_isolation: "Konec izolace"
 japan_production_tech_modifier: "Zahraniční investice"
 japan_society_tech_modifier: "Poučení ze Západu"
 JAP_emperor_ninko_loc: "Ninkó"
 JAP_emperor_komei_loc: "Kómei"
 JAP_emperor_meiji_loc: "Meidži"
 JAP_emperor_taisho_loc: "Taišó"
 JAP_emperor_hirohito_loc: "Šówa"
 je_veiled_protectorate: "Zahalený protektorát"
 je_veiled_protectorate_reason: "Náš vliv v Egyptě výrazně vzrostl, avšak naše moc v regionu závisí na vztazích s tímto neuznaným státem. Zřízením protektorátu nad zemí bychom si zajistili nadvládu."
 veiled_protectorate.1.t: "Zahalený protektorát"
 veiled_protectorate.1.d: "[ROOT.GetCountry.GetName] si zajistil nadvládu nad [SCOPE.sCountry('egypt_country').GetName]. Tento stav je stále častěji označován jako Zahalený protektorát, neboť Egypt zůstává formálně podřízen [SCOPE.sCountry('ottoman_country').GetAdjectiveNoFormatting] [SCOPE.sCharacter('ottoman_ruler').GetPrimaryRoleTitle], který situaci bezmocně přihlíží."
 veiled_protectorate.1.f: "Dnes byl Nil zaplaven krví. Ti, kdo se postavili proti novému režimu, byli rychle potlačeni. [SCOPE.sCountry('egypt_overlord_country').GetAdjectiveNoFormatting] diplomaté a politici mají v očích oheň, když ve stínu pyramid diskutují o tom, jak přinesou civilizaci do zemí Egypta."
 veiled_protectorate.1.a: "Nikdo nemůže popřít moc [ROOT.GetCountry.GetAdjectiveNoFormatting] říše."
 veiled_protectorate.1.b: "Ujistit nového [SCOPE.sCountry('egypt_country').GetAdjectiveNoFormatting] [SCOPE.sCharacter('egypt_ruler').GetPrimaryRoleTitle] o naší podpoře."
 veiled_influence: "Zahalený vliv"
 laws.1.t: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] unikl atentátu"
 laws.1.d: "Náš milovaný [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] jen o vlásek přežil pokus o atentát. Útočník měl vazby na [SCOPE.gsInterestGroup('jedi_scope').GetName], kteří se staví proti novým pravomocím, jež by [SCOPE.sLaw('current_law_scope').GetName] udělil [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]."
 laws.1.f: "Z hlavního města přicházejí znepokojivé zprávy o neúspěšném pokusu o život [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]. K útoku došlo uprostřed noci a [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] dokázal útočníka přemoci s pomocí svého mladého chráněnce. Z nemocničního lůžka sdělil [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')], že navzdory zraněním, která mu zanechají doživotní jizvy, je jeho odhodlání silnější než kdy dřív."
 laws.1.a: "Pro bezpečnou a stabilní společnost."
 laws.1.b: "Takto umírá svoboda."
 thunderous_applause: "Bouřlivý potlesk"
 scarred_and_deformed: "Přeživší atentátu"
 hunted_down_and_defeated: "Neúspěšní atentátníci"
 je_heavenly_kingdom_main: "Nebeské království"
 je_heavenly_kingdom_main_reason: "Nebezpeční fanatici podněcují nespokojenost po celé zemi. Představují extrémní hrozbu; pokud získají dostatek stoupenců, pokusí se založit vlastní kacířské království. Tyto šílence musíme za každou cenu zastavit."
 canada_unite_can: "Sjednocení Kanady"
 canada_unite_can_desc: "Sen o kanadské konfederaci musí být naplněn. Ekonomickou dominancí nad ostatními koloniemi a udržením dobrých vztahů s centrální vládou můžeme navrhnout anexi některého ze sousedů."
 canada_test_modifier: "Sjednotitel Kanady"
 canada_unite_gbr: "Sjednocení Kanady"
 canada_unite_gbr_desc: "Chceme sjednotit všechny kanadské kolonie do jednoho celku a vytvořit kanadský národ. K tomu musíme přesvědčit koloniální správu, že sjednocení je v jejich zájmu."
 australia_test_modifier: "Sjednotitel Austrálie"
 australia_unite_aus: "Federace Austrálie"
 australia_unite_aus_desc: "Australskému lidu by nejlépe posloužilo sjednocení malých provinčních vlád do jednoho státu. Musíme spolupracovat s místními správami i koloniálním úřadem na anexi sousedů."
 australia_unite_gbr: "Federace Austrálie"
 australia_unite_gbr_desc: "Australskému lidu by nejlépe posloužilo sjednocení provinčních vlád do jednoho státu. Musíme spolupracovat s místními koloniálními správami na usnadnění federace."
 je_canada_can: "Sjednocení Kanady"
 je_canada_can_reason: "Sen o kanadské konfederaci musí být naplněn. Ekonomickou dominancí nad ostatními koloniemi a dobrými vztahy s centrální vládou můžeme prosadit anexi sousedních území."
 je_australia_aus: "Federace Austrálie"
 je_australia_aus_reason: "Australskému lidu by nejlépe posloužilo sjednocení provinčních vlád do jednoho státu. Musíme spolupracovat s místními správami i koloniálním úřadem."
 je_canada_gbr: "Sjednocení Kanady"
 je_canada_gbr_reason: "Chceme sjednotit všechny kanadské kolonie do jednoho celku. Musíme přesvědčit koloniální správu, že sjednocení je v jejich zájmu."
 je_australia_gbr: "Federace Austrálie"
 je_australia_gbr_reason: "Australskému lidu by nejlépe posloužilo sjednocení do jednoho státu. Musíme spolupracovat s koloniálními správami."
 unite_canada_tt: "Dvě kanadské kolonie budou sjednoceny."
 unite_australia_tt: "Dvě australské kolonie budou sjednoceny."
 can_unified_canada: "Kanadská konfederace"
 gbr_unified_canada: "Kanadská konfederace"
 aus_unified_australia: "Australská federace"
 gbr_unified_australia: "Australská federace"
 can_aus.1.t: "Konfederace s [SCOPE.sCountry('canada_annex_scope').GetName]"
 can_aus.1.d: "[SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('canada_overlord_ruler').GetFullName] podepsal zákon o konfederaci mezi [ROOT.GetCountry.GetName] a [SCOPE.sCountry('canada_annex_scope').GetName]. To představuje velké vítězství v našem úsilí o sjednocení celé Kanady."
 can_aus.1.f: "S každým podepsaným a orazítkovaným dokumentem se přibližujeme k vytvoření národa. Kolonie se ne vždy shodovaly, ale lid Kanady je odhodlán tento cíl naplnit."
 can_aus.1.a: "Bůh ochraňuj [SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle]!"
 can_aus.2.t: "Sjednocení [SCOPE.sCountry('canada_scope_1').GetAltAdjective('G')] a [SCOPE.sCountry('canada_scope_2').GetAltAdjective('G')]"
 can_aus.2.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] podepsal zákon o konfederaci mezi [SCOPE.sCountry('canada_scope_1').GetName] a [SCOPE.sCountry('canada_scope_2').GetName]. To představuje velké vítězství v našem úsilí o sjednocení celé Kanady."
 can_aus.2.a: "Bůh ochraňuj [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 can_aus.3.d: "Sotva oschl inkoust na zákoně o sjednocení, naši byrokraté a politici začali pracovat na integraci [SCOPE.sCountry('canada_annex_scope').GetName]. Se souhlasem [SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('canada_overlord_ruler').GetFullName] jsme o krok blíže k Australské federaci."
 can_aus.3.f: "Byrokracie, jak se říká, roste, aby uspokojila potřeby rostoucí byrokracie. V tomto případě však slouží ušlechtilému cíli; vznik australského národa je na dosah. S podporou Koloniálního úřadu, místních správ a především vůle australského lidu nemůžeme selhat."
 can_aus.4.d: "Sotva oschl inkoust na zákoně o sjednocení, naši byrokraté a politici začali pracovat na integraci [SCOPE.sCountry('canada_scope_1').GetName] s [SCOPE.sCountry('canada_scope_2').GetName]. Se souhlasem [SCOPE.sCharacter('australia_overlord_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('australia_overlord_ruler').GetFullName] jsme o krok blíže k Australské federaci."
 can_aus.5.t: "Kanadská konfederace"
 can_aus.5.d: "Sjednocení Kanady je dokončeno. Různé koloniální vlády byly sjednoceny pod správou [ROOT.GetCountry.GetName] a s nadšeným souhlasem [SCOPE.sCountry('canada_overlord_country').GetName]."
 can_aus.5.f: "Sen o sjednocené Kanadě byl konečně naplněn. Z skromných začátků malé kolonie na rozlehlém severu vyrostli osadníci v jednotný lid. Vytvořili národ."
 can_aus.5.a: "Pravý sever silný a svobodný!"
 can_aus.6.d: "Sjednocení Kanady je dokončeno. Různé koloniální vlády byly sjednoceny pod správou [SCOPE.sCountry('canada_country').GetName] a s nadšeným souhlasem [ROOT.GetCountry.GetName]."
 can_aus.7.t: "Australská federace"
 can_aus.7.d: "Australské kolonie byly sjednoceny do jediné vlády pod vedením [ROOT.GetCountry.GetAltAdjective('G')]. [SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle] z [SCOPE.sCountry('canada_overlord_country').GetAltAdjective('G')] formálně pogratuloval australskému lidu."
 can_aus.7.f: "Dnes začíná éra australského národa. Země na jihu byla pro první osadníky velkou výzvou, plnou nebezpečné přírody a nepřátelského prostředí. Díky důvtipu, odhodlání a víře jsme tuto drsnou zemi zkrotili."
 can_aus.7.a: "Vpřed, Austrálie krásná!"
 can_aus.8.d: "Australské kolonie byly sjednoceny do jediné vlády pod vedením [ROOT.GetCountry.GetAltAdjective('G')]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] formálně pogratuloval [SCOPE.sCharacter('canada_country_ruler').GetPrimaryRoleTitle] ze [SCOPE.sCountry('canada_country').GetAltAdjective('G')] za vedení integračního procesu."
 je_manifest_destiny_mexico: "Manifest destiny: Mexická cese"
 je_manifest_destiny_mexico_reason: "Naším osudem je rozšířit naše území od Atlantiku k Pacifiku. Od moře k zářícímu moři!"
 je_manifest_destiny_frontier_wars: "Manifest destiny: Pohraniční války"
 je_manifest_destiny_frontier_wars_reason: "Velké pláně mají být novým domovem amerického lidu. Jejich současní obyvatelé musí být pevně podrobeni naší kontrole."
 manifest_destiny.1.t: "Mexická cese"
 manifest_destiny.1.d: "Vybojovali jsme kontrolu nad americkým jihozápadem z nelegitimních rukou Mexika. [ROOT.GetCountry.GetName] nyní sahá od Atlantiku k Pacifiku."
 manifest_destiny.1.f: "„Ó krásná vlast, sny vlastenců\njež hledí za roky\nTvé alabastrové města září\nbez slz lidských!\nAmeriko! Ameriko!\nBůh ti žehnej svou milostí\nA korunuj tvé dobro bratrstvím\nod moře k zářícímu moři!“"
 manifest_destiny.1.a: "To byl náš osud!"
 manifest_destiny.2.t: "Pohraniční války"
 manifest_destiny.2.d: "Poslední zbytky vlády původních obyvatel byly rozdrceny, a zůstala jen nadvláda [ROOT.GetCountry.GetName]."
 manifest_destiny.2.f: "„Máme moc začít svět znovu. Situace podobná této nenastala od dob Noema až dodnes. Den zrození nového světa je na dosah.“"
 manifest_destiny.2.a: "Hranice svobody se rozšiřují!"
 labor_rights.1.t: "Špatné zacházení s nevolníky"
 labor_rights.1.d: "[SCOPE.gsInterestGroup('serf_mistreaters').GetName] v [SCOPE.sState('serf_state').GetName] se proslavili brutálním zacházením s nevolníky. Rolníci si stěžují na kruté tresty, nesplnitelné pracovní podmínky a někdy i mučení či vraždy."
 labor_rights.1.f: "„Dostala třicet ran za to, že rozlila čaj.“\n„Na panství na kopci lidé mizí.“\n„Pod sklepem je žalář, můj bratranec na to přísahá! Mučí nás a pijí naši krev!“"
 labor_rights.1.a: "Tyto křivdy musí skončit."
 labor_rights.1.b: "Aristokraty potrestáme plnou silou zákona."
 serf_mistreaters_demonized: "Týrání nevolníků potrestáno"
 serf_mistreaters_demonized_enactment: "Týrání nevolníků"
 anti_serfdom_debate: "Odpor proti nevolnictví"
 anti_serfdom_popularity: "Populární osvoboditel"
 labor_rights.2.t: "Emancipátoři"
 labor_rights.2.d: "Skupina vlivných [SCOPE.gsInterestGroup('anti_serfdom_ig').GetName] vedená [SCOPE.sCharacter('anti_serfdom_advocate').GetFullName] požaduje rychlé zrušení nevolnictví."
 labor_rights.2.f: "„Mohl bych celé dny hovořit o morálních přednostech emancipace, a oprávněně. Pravda je však prostá: nevolnictví je neefektivní. Je to ekonomická pohroma a překážka přirozeného rozvoje našeho státu jak v průmyslu, tak ve společnosti. Nevolníci pracující na polích by byli lépe využiti v továrnách, kde by mohli být řádně zaměstnáni a produktivní.“"
 labor_rights.2.a: "Předkládají výborné argumenty."
 labor_rights.2.b: "Jak inspirativní řečník!"
 labor_rights.3.t: "Vykoupení svobody"
 labor_rights.3.d: "[SCOPE.gsInterestGroup('serf_owners').GetName] odmítají vzdát se svých nevolníků bez odpovídající náhrady. Jejich značný politický vliv činí tento požadavek obtížně odmítnutelným."
 labor_rights.3.f: "„Po generace jsme spoléhali na práci nevolníků. Nemůžete po nás chtít, abychom je propustili bez náhrady! Jak máme udržet naše statky ziskové? Jak máme zachovat životní úroveň, na kterou jsme zvyklí? Naše chudoba by nás učinila terčem posměchu celé [ROOT.GetCountry.GetAdjectiveNoFormatting] aristokracie.“"
 labor_rights.3.a: "Stát uhradí náklady."
 labor_rights.3.b: "Nevolníci si musí vykoupit svobodu sami."
 labor_rights.3.c: "Nikdo nemůže vlastnit člověka."
 government_buying_serfs: "Výkup nevolníků státem"
 serfs_buying_serfs: "Sebevykoupení"
 no_buying_serfs: "Odmítnutí kompenzace"
 labor_rights.4.t: "Přímá akce"
 labor_rights.4.d: "Dělníci organizovaní [SCOPE.gsInterestGroup('unions_scope').GetName] pořádají krátké stávky a zpomalují práci, aby vyvinuli tlak na vládu k prosazení zákona [SCOPE.sLaw('current_law_scope').GetName]. Přestože jsou tyto metody účinné, způsobují značné škody na našem průmyslu."
 labor_rights.4.f: "„Máme právo být v práci v bezpečí! Nikdo by neměl chodit do práce s obavou, zda dnes nepřijde o ruku nebo oko. Dokud nebude naše bezpečnost zaručena, neodpracujeme ani den navíc.“"
 labor_rights.4.a: "Ať stávkují!"
 labor_rights.4.b: "Uklidnit situaci a nabídnout záruky."
 enactment_strikes_modifier: "Stávky kvůli bezpečnosti práce"
 enactment_strikes_deterred_modifier: "Poklidné protesty za bezpečnost práce"
 worker_protection_negotiations: "Vyjednaná bezpečnost práce"
 labor_rights.5.t: "Jednání o bezpečnosti práce"
 labor_rights.5.d: "[SCOPE.gsInterestGroup('capitalists_scope').GetName] souhlasili se státem zprostředkovaným jednáním s [SCOPE.gsInterestGroup('unions_scope').GetName] o zavedení zákona [SCOPE.sLaw('current_law_scope').GetName]."
 labor_rights.5.f: "„Naše zisky tím utrpí, to musíte pochopit. A to nebude dobré pro nikoho, ani pro vás. Možná budeme muset některé z vás propustit - a jak potom uživíte své rodiny?“\n\n„Víte, co je pro podnikání opravdu špatné? Rozzlobení dělníci. Zranění dělníci. Mrtví dělníci.“"
 labor_rights.5.a: "Podpořit [SCOPE.gsInterestGroup('unions_scope').GetName]."
 labor_rights.5.b: "Ustoupit [SCOPE.gsInterestGroup('capitalists_scope').GetName]."
 labor_rights.6.t: "Stávkokazi"
 labor_rights.6.d: "[SCOPE.gsInterestGroup('capitalists_scope').GetName] najali ozbrojené násilníky, kteří se vydávají za soukromou vyšetřovací agenturu, aby potlačili aktivity [SCOPE.gsInterestGroup('unions_scope').GetName] ve prospěch zákona [SCOPE.sLaw('current_law_scope').GetName]."
 labor_rights.6.f: "„Jen dohlížíme na dodržování zákona. Nechceme, aby se některý z rozzuřených dělníků uchýlil k násilí. Jsme tu, abychom udrželi pořádek - za správnou cenu. A když při tom nějaká noha praskne nebo lebka pukne, je to prostě cena veřejné bezpečnosti.“"
 labor_rights.6.a: "Zatknout je za napadení."
 labor_rights.6.b: "Nemůžeme si dovolit rozhněvat [SCOPE.gsInterestGroup('capitalists_scope').GetName]."
 strikebreakers_called_off: "Zatčení stávkokazi"
 strikbreakers_enactment: "Stávkokazi"
 strikebreakers_allowed: "Povolení stávkokazů"
 je_texas_tex: "Texaská nezávislost"
 je_texas_tex_reason: "Po letech kulturních a politických sporů s Mexikem, kdy byla práva našich občanů stále více omezována, nastal čas povstat!\nDny, kdy naše slavná země podléhala tyranskému mexickému režimu, se blíží ke konci."
 je_texas_usa: "Státnost Texasu"
 je_texas_usa_reason: "S velkým zájmem sledujeme konflikt mezi Mexikem a Texasem. Pokud Texaská republika zvítězí, měli bychom ji přimět vstoupit do naší spravedlivé unie."
 texas_je_tt: "Texas se rozhodne, zda přijme status státu USA"
 texan_war_of_independence.1.t: "Stát jediné hvězdy"
 texan_war_of_independence.1.d: "[ROOT.GetCountry.GetName] po těžce vybojované a krvavé válce stojí jako nezávislý stát. V republice je mnoho těch, kteří prosazují začlenění do [SCOPE.sCountry('usa_scope').GetName]. [SCOPE.sCountry('usa_scope').GetAdjectiveNoFormatting] by nás podle všeho rádi přijali do své unie."
 texan_war_of_independence.1.f: "Válka s Mexikem skončila a naši stateční občané začínají skládat zbraně a vracet se k mírovému životu. Jaký má však nezávislost smysl, pokud musíme každý den žít v obavách z návratu našich utlačovatelů? Texas může být silnější jako součást větší unie, společenství podobně smýšlejících států, které nebudou omezovat naše Bohem daná práva."
 texan_war_of_independence.1.a: "Připojíme se k unii!"
 texan_war_of_independence.1.b: "Plná státnost není nutná."
 texan_war_of_independence.1.c: "Nepotřebujeme pomoc Yankeeů."
 lone_star_state: "Stát jediné hvězdy"
 texan_war_of_independence.2.t: "Státnost Texasu"
 texan_war_of_independence.2.d1: "[SCOPE.sCountry('texas_scope').GetName] získává nezávislost na Mexiku a nyní usiluje o přijetí do [ROOT.GetCountry.GetName] jako stát."
 texan_war_of_independence.2.d2: "[SCOPE.sCountry('texas_scope').GetName] získává nezávislost na Mexiku a usiluje o zvláštní vztah s [ROOT.GetCountry.GetName], kdy by nebyl plně integrován jako stát, ale jako autonomní protektorát."
 texan_war_of_independence.2.d3: "[SCOPE.sCountry('texas_scope').GetName] získává nezávislost na Mexiku. Navzdory snahám našich diplomatů odmítl nabídku státnosti v USA."
 texan_war_of_independence.2.f: "„Lid Texasu již při přijetí své ústavy téměř jednomyslně vyjádřil přání stát se součástí Spojených států, a toto přání nadále trvá. Spojené státy, vedeny snahou o bezpečnost a prosperitu, se rozhodly tohoto cíle dosáhnout smlouvou, která zajistí vzájemný a trvalý prospěch.“"
 texan_war_of_independence.2.a: "Vítejte v Americe!"
 texan_war_of_independence.2.b: "Přijatelný kompromis."
 texan_war_of_independence.2.c: "Pobouření!"
 nihilism.1.t: "Nihilismus"
 nihilism.1.d: "Mezi [SCOPE.gsInterestGroup('nihilist_ig').GetName] se rozšířilo antiklerikální a antimonarchistické hnutí známé jako nihilismus. Vedení [SCOPE.sCharacter('nihilist_scope').GetFullName] z něj činí vážnou hrozbu pro současný řád."
 nihilism.1.f: "„Jsou urážkou všeho, co je na našem národě správné! Každé jejich slovo je vlastizrada nejvyššího řádu! Nikdy jsme neviděli tak otevřené pohrdání naším božským právem vládnout. Jsou největší hrozbou pro společnost.“\n\n„Nebojte se, můj pane, jsou to nihilisté. Není se čeho obávat.“"
 nihilism.1.a: "Možná mají pravdu."
 nihilism.1.b: "To je vlastizrada! Kacířství!"
 nihilism.1.c: "Stát musí zakázat nihilistickou literaturu."
 less_popular_nihilist: "Potlačené nihilistické hnutí"
 popular_nihilist: "Rozvíjející se nihilistické hnutí"
 less_popular_nihilist_red: "Potlačené nihilistické hnutí"
 nihilism.1.tt: "V [SCOPE.GetRootScope.GetCountry.GetName] bude vytvořen nihilistický [concept_agitator]."
 bureaucracy.1.t: "Byrokratická zátěž"
 bureaucracy.1.d: "Státní správa vedená [SCOPE.gsInterestGroup('bureaucrat_class').GetName] záměrně zpomaluje chod vlády vytvářením zbytečné administrativy. Požadují ochranu svých pozic prostřednictvím zákona [SCOPE.sLaw('current_law_scope').GetName]."
 bureaucracy.1.f: "„Rád bych pomohl, ale tento formulář byl orazítkován pouze dvakrát. Budete muset podat žádost u regionálního ombudsmana, který je momentálně velmi zaneprázdněn optimalizací našeho nového systému evidence. Odpověď můžete očekávat do šesti až osmi měsíců.“"
 bureaucracy.1.a: "Stávající úředníci si ponechají své pozice."
 bureaucracy.1.b: "Nepřijatelné! Zpátky do práce."
 bureaucracy.1.c: "Tajná policie je udrží na uzdě."
 bureaucracy.1.e: "Využijme situace k vyškolení náhradníků."
 red_tape: "Byrokratická zátěž"
 red_tape_reduced: "Omezená byrokracie"
 red_tape_jobs: "Byrokratická stará garda"
 bureaucracy.2.t: "Meritokracie"
 bureaucracy.2.d: "Nová generace [SCOPE.gsInterestGroup('meritocracy_ig').GetName] úředníků překonává [SCOPE.gsInterestGroup('bureaucrat_class').GetName] ve všech ohledech. Je to povzbudivé znamení účinnosti zákona [SCOPE.sLaw('current_law_scope').GetName]."
 bureaucracy.2.f: "„Myslí si, že protože se narodili se stříbrnou lžičkou v ústech, zaslouží si nejvyšší pozice. Jejich privilegia z nich však činí líné a neschopné jedince. My jsme si vše museli vydobýt sami a neseme důsledky selhání. Postup by měl záviset pouze na zásluhách, ne na původu.“"
 bureaucracy.2.a: "Je zřejmé, že [SCOPE.sLaw('current_law_scope').GetName] je správná politika."
 bureaucracy.2.b: "[SCOPE.gsInterestGroup('bureaucrat_class').GetName] odvádějí špatnou práci."
 bureaucracy.2.c: "Podpořme [SCOPE.gsInterestGroup('meritocracy_ig').GetName] ve vstupu do státní správy."
 meritocracy: "Meritokracie"
 meritocracy_ig: "Meritokracie"
 bureaucracy.3.t: "Byrokratický boj"
 bureaucracy.3.d: "Naše snahy o prosazení zákona [SCOPE.sLaw('current_law_scope').GetName] narážejí na klasické byrokratické překážky. Diskuse se vedou o tak zásadních otázkách, jako je správný tvar archivních skříní."
 bureaucracy.3.f: "„Dobré, rychlé, levné. Vyberte si dvě.“"
 bureaucracy.3.a: "Na nákladech nebudeme šetřit."
 bureaucracy.3.b: "Bude to trvat, jak dlouho bude třeba."
 bureaucracy.3.c: "Hlavně ať už je to hotové."
 good_and_fast: "Dobré a rychlé"
 good_and_cheap: "Dobré a levné"
 cheap_and_fast: "Levné a rychlé"
 colonization.1.t: "Dekolonizace"
 colonization.1.d: "Jak rozebíráme instituci kolonialismu, obyvatelé [SCOPE.sCountry('colony_scope').GetName] očekávají, že jim bude v rámci tohoto ideologického obratu udělena nezávislost."
 colonization.1.f: "„Nemůžete zrušit kolonialismus, aniž byste skutečně zrušili kolonialismus! Nestačí jen slíbit, že nebudete zakládat nové kolonie - musíte se vzdát své odporné nadvlády nad lidmi, které jste již podrobili své tyranii.“"
 colonization.1.a: "Získají svobodu, po které touží."
 colonization.1.b: "Nemáme v úmyslu se vzdát [SCOPE.sCountry('colony_scope').GetName]."
 decolonization: "Dekolonizace"
 refused_to_release_colony: "Koloniální pokrytectví"
 colonization.2.t: "Koloniální outsourcing"
 colonization.2.d: "[SCOPE.sPoliticalMovement('outsourcing_scope').GetName] se obává, že levná koloniální pracovní síla připraví domácí pracovníky o práci."
 colonization.2.f: "„Všichni skončíme v chudobincích, vím to. Jak máme prodávat své výrobky, když musíme soutěžit bez tisíců akrů nevyužité půdy obdělávané extrémně levnou domorodou pracovní silou?“"
 colonization.2.a: "Rozptýlit jejich obavy."
 colonization.2.b: "Samozřejmě budeme kolonie vykořisťovat!"
 slow_colonies: "Zpomalení kolonizace"
 fear_of_outsourcing_alleviated: "Rozptýlené obavy z outsourcingu"
 outsourcing_anger: "Obavy z koloniálního outsourcingu"
 colonization.3.t: "Koloniální nadšení"
 colonization.3.d: "Zprávy o tom, že vláda hodlá přijmout zákon [SCOPE.sLaw('current_law_scope').GetName], vyvolaly velké nadšení mezi těmi, kteří touží po využití nových a vzdálených území."
 colonization.3.f: "„Zisk i dobrodružství čekají na všechny, kdo se odváží vyplout s námi. Nezkrocený svět na nás čeká, jen aby přijal naši [ROOT.GetCountry.GetAdjectiveNoFormatting] civilizaci. A pokud se domorodci postaví na odpor, mějte pušku vždy po ruce.“"
 colonization.3.a: "Zpomalte, zákon ještě nebyl přijat!"
 colonization.3.b: "Zaujmeme své právoplatné místo na světové scéně."
 colonization.3.c: "Naložit lodě, vyrážíme!"
 colonization.4.t: "Etika vykořisťování"
 colonization.4.d: "Snaha vlády prosadit zákon [SCOPE.sLaw('current_law_scope').GetName] přivedla otázku etiky kolonialismu do centra veřejné debaty."
 colonization.4.f: "„Nemáme právo zasahovat, ovládat ani vykořisťovat. Tvrdíme, že přinášíme ‚civilizaci‘, ale ve skutečnosti přinášíme bídu a útlak a přetváříme celé sociálně-ekonomické struktury kolonií tak, aby sloužily našim sobeckým zájmům.“"
 colonization.4.a: "[SCOPE.sLaw('current_law_scope').GetName] je morálně správný."
 colonization.4.b: "Můžeme uznat některé jejich argumenty."
 colonial_ethical_conviction: "Debata o kolonialismu"
 ethically_condemned: "Etické odsouzení"
 ethical_concessions: "Etické ústupky"
 colonial_enthusiasm: "Koloniální nadšení"
 our_place_on_the_world_stage: "Místo na světové scéně"
 colonial_enthusiasm_settlers: "Nadšení osadníci"
 colonial_enthusiasm_time: "$colonial_enthusiasm$"
 anarchy.1.t: "Propaganda činem"
 anarchy.1.d: "Anarchisté se přihlásili k bombovému útoku na pánský klub navštěvovaný členy [SCOPE.gsInterestGroup('anarchy_target_ig').GetName]. Tělo [SCOPE.sCharacter('anarchy_target_leader').GetFullName] bylo nalezeno mezi troskami."
 anarchy.1.f: "„Válka, třídní válka - a byli jste to vy, kdo ji začal pod rouškou mocných institucí, které nazýváte řádem, ve tmě svých zákonů. Krev poteče; neuhneme; bude nutné vraždit - budeme zabíjet, protože to je nutné; bude nutné ničit - budeme ničit, abychom zbavili svět vašich tyranských institucí.“"
 anarchy.1.a: "Nedostali víc, než si zasloužili."
 anarchy.1.b: "Terorismus nemůžeme tolerovat."
 anarchy.2.t: "Rozbití státu"
 anarchy.2.desc: "Jak se [ROOT.GetCountry.GetName] posouvá k [SCOPE.sLaw('current_law_scope').GetName], [SCOPE.gsInterestGroup('anarchists_scope').GetName] požadují zrušení státních institucí."
 anarchy.2.f: "„Jak se můžeme nazývat anarchistickou společností, když stále udržujeme tyranii státu? Pachatelé státního násilí mezi námi nadále působí - policie, úředníci odvodu, koloniální správci - samí zrádci své třídy. Kradou plody naší práce a používají je k financování našeho vlastního útlaku!“"
 anarchy.2.a: "Pryč s policií!"
 anarchy.2.c: "Stát nemá právo nás ovládat!"
 anarchy.2.d: "Kolonialismus je metla lidstva!"
 anarchy.2.e: "Stát postupně odumře."
 law_dismentling_the_state: "Rozbití státu"
 dismantling_the_state: "Rozbití státu"
 withering_away: "Odumírání"
 ig_withering_away: "Odumírání"
 anarchy.3.t: "Vzájemná pomoc"
 anarchy.3.d: "Anarchisté zakládají komunity, které odmítají zisk a zdůrazňují vzájemnou odpovědnost za péči o ostatní. [SCOPE.sCharacter('anarchist_farmer').GetFullName], nový vůdce [SCOPE.gsInterestGroup('farmer_ig').GetName], podporuje zakládání družstevních farem."
 anarchy.3.f: "„Nepotřebujeme statkáře, šéfy ani stát. Společnou prací si dokážeme zajistit vše potřebné, žít svobodně a rovně, každý z nás zároveň závislý na komunitě i odpovědný za její blahobyt.“"
 anarchy.3.a: "Společně jsme silnější."
 anarchy.3.c: "To bude skvělá propaganda."
 anarchy.3.b: "Zajímavý přístup k zemědělství."
 encouraging_mutual_aid: "Podpora vzájemné pomoci"
 mutual_aid: "Vzájemná pomoc"
 anarchist_agriculture: "Anarchistické zemědělství"
 anarchist_terrorism: "Anarchistický terorismus"
 anarchist_assassination: "Anarchistický atentát"
 anarchist_assaination_opposition_approval: "Anarchistický atentát"
 promised_to_lower_taxes: "Krátkodobé snížení daní"
 promised_to_lower_taxes_poll_tax: "Krátkodobé snížení daní"
 tax.1.t: "Zdanění je krádež"
 tax.1.d: "Okrajová skupina [SCOPE.sPoliticalMovement('antitax_rebels').GetName] získala překvapivou podporu. Prosazuje úplné zrušení všech daní a považuje je za formu krádeže ze strany státu. Zdá se, že jejich cílem je zablokovat jakoukoli daňovou reformu kromě úplného zrušení daní."
 tax.1.f: "„Jako svobodný a suverénní občan [ROOT.GetCountry.GetAdjectiveNoFormatting] nedávám souhlas k rabování mých těžce vydělaných prostředků takzvanou ‚vládou‘. Je to porušení nejen mých práv, ale i principů volného trhu, samotného základu ekonomiky.“"
 tax.1.a: "Ale kdo bude stavět silnice?"
 tax.1.b: "Slibme krátkodobé snížení daní."
 tax.2.t: "Vlastenecké zdanění"
 tax.2.d: "[SCOPE.gsInterestGroup('patriotic_military').GetName] mobilizují podporu pro zákon [SCOPE.sLaw('current_law_scope').GetName] a tvrdí, že nová daň je nezbytná pro podporu [ROOT.GetCountry.GetName] v konfliktu [SCOPE.sDiplomaticPlay('war_scope').GetName]."
 tax.2.f: "„Zdrojem války jsou nekonečné peníze. Nemůžeme uspět v boji za naši suverenitu, pokud nedokážeme zajistit prostředky pro naše statečné vojáky. Pošleme je snad do boje jen s holemi a hadry?“"
 tax.2.a: "Odpůrci postrádají loajalitu."
 tax.2.b: "Oceňme [SCOPE.gsInterestGroup('patriotic_military').GetName] za jejich vlastenectví."
 patriotic_taxation: "Vlastenecké zdanění"
 patriocitc_taxation_ig: "Veřejné uznání"
 tax.3.t: "Smrt a daně"
 tax.3.d: "[SCOPE.sCharacter('death_and_taxes_leader').GetFullName] náhle zemřel při přípravě legislativy k zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 tax.3.f: "„Zemřel člověk! Tělo ještě ani nevychladlo a vy už mluvíte o zákonech. Nemůžete na chvíli odložit politiku a dopřát nám klid k truchlení?“"
 tax.3.a: "Uctěme památku velkého vůdce."
 tax.3.b: "Měli bychom splnit jeho poslední přání."
 death_and_taxes_mod: "Smrt a daně"
 tax.4.t: "Sociální banditismus"
 tax.4.desc: "Obyvatelé [SCOPE.sState('bandit_state').GetName] vyprávějí o zbojníkovi, který okrádá bohaté a dává chudým. Legenda se rychle šíří po [ROOT.GetCountry.GetName] a oslabuje podporu pro zákon [SCOPE.sLaw('current_law_scope').GetName]."
 tax.4.f: "„Je tak okouzlující! I když mi kradl perly z krku, nemohla jsem si pomoci a byla jsem z toho rozrušená. Nechal mi na klíně rudou růži a zmizel do noci s ladným gestem svého pláště.“"
 tax.4.a: "Dopadnout banditu."
 tax.4.b: "Policie z něj udělá odstrašující příklad."
 tax.4.c: "Zmírnit chudobu v [SCOPE.sState('bandit_state').GetName]."
 tax.4.d: "Zesílit opatření proti chudobě."
 social_banditry: "Sociální banditismus"
 poverty_relief_mod: "Pomoc chudým"
 tax.5.t: "Filantropie"
 tax.5.d: "[concept_upper_strata] se rozhodly štědře přispět chudým. Mnozí z nich dokonce podporují zákon [SCOPE.sLaw('current_law_scope').GetName] jako spravedlivý způsob přerozdělení bohatství."
 tax.5.f: "„My máme tolik a oni tak málo. I po štědrých darech zůstáváme bohatí - opravdu vám bude chybět pár tisíc liber? Zamyslete se, jak málo to pro vás znamená a jak mnoho to může znamenat pro hladovou matku a její děti.“"
 tax.5.a: "Podporovat charitu."
 tax.5.b: "Využít jejich podporu pro zákon [SCOPE.sLaw('current_law_scope').GetName]."
 philanthropy_law: "Filantropie"
 philanthropy_mod: "Štědré dary"
 tax.6.t: "Dočasné nedorozumění"
 tax.6.d: "Ambiciózní [concept_middle_strata] se staví proti zákonu [SCOPE.sLaw('current_law_scope').GetName], protože se obávají, že až zbohatnou, budou příliš zdaněni."
 tax.6.f: "„Proč odporujete tomuto zákonu, příteli? Nejste bohatý!“\n\n„Zatím ne, ale jakmile se můj další podnikatelský záměr podaří, budu bohatý. A pak bych rozhodně nechtěl být tak vysoko zdaněn.“"
 tax.6.a: "Měli by být realističtější."
 tax.6.b: "Získat je snížením daní."
