 je_land_reclamation: "Získávání půdy"
 je_land_reclamation_reason: "Nizozemsko je hustě osídlené a orná půda je stále vzácnější. Díky rozsáhlým inženýrským projektům můžeme získat novou půdu z moře."
 je_land_reclamation_goal: "Získalo alespoň 20 orné půdy"
 land_reclamation_no_tech: "Každý rok existuje šance, že naše snahy o získávání půdy přinesou výsledky a vytvoří více orné půdy. Proces bude efektivnější, pokud prozkoumáme Concrete Dockyards."
 land_reclamation_tech: "Každý rok existuje šance, že naše snahy o získávání půdy přinesou výsledky a vytvoří více orné půdy. Proces je efektivnější, protože jsme prozkoumali Concrete Dockyards."
 land_reclamation.1.t: "Získávání půdy"
 land_reclamation.1.d2: "Náš projekt získávání půdy v [SCOPE.sState('land_reclamation_state').GetName] přinesl výsledky. Stát nyní může podporovat další zemědělskou půdu."
 land_reclamation.1.d: "Náš projekt získávání půdy v [SCOPE.sState('land_reclamation_state').GetName] přinesl výsledky. Stát nyní může podporovat další zemědělskou půdu. Tímto posledním poldrem je velké inženýrské dílo dokončeno."
 land_reclamation.1.f: "„Říká se, že Nizozemci jsou nejlepší inženýři v Evropě. To není pravda. Nizozemci jsou nejlepší inženýři na světě.“"
 land_reclamation.1.a: "Moře před námi ustupuje."
 land_reclamation.1.b: "Jsme pány pevniny i moře."
 land_reclamation_complete: "Dobývatelé půdy"
 central_america.3.t: "[SCOPE.sCountry('secession_country').GetName] se odtrhuje"
 central_america.3.d: "[SCOPE.sCountry('secession_country').GetName] vyhlašuje své odtržení od [ROOT.GetCountry.GetName]. To vyvolalo další nestabilitu a nepokoje ve zbývajících státech naší křehké unie."
 central_america.3.f: "„[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] podepsal dekret umožňující zbývajícím státům odtrhnout se, ale to byla jen formalita; rozpad naší konfederace byl již realitou. Možná se však to, co bylo, může znovu vrátit, pokud se rány rozdělení časem zahojí.“"
 central_america.3.a: "Ať si vezmou svou nezávislost."
 central_america.3.b: "Budou litovat této zrady."
 central_america_capital_tt: "Po rozpadu Střední Ameriky budete hrát za zemi nejvíce odpovídající vašemu hlavnímu státu. Národní hlavní město můžete změnit prostřednictvím politického přehledu."
 central_america_breakup_status: "Státy Střední Ameriky s vysokými nepokoji se mohou odtrhnout"
 je_peru_bolivia: "Peruánsko-bolivijská konfederace"
 je_peru_bolivia_reason: "Bolivijská intervence do peruánské občanské války roku 1835 vedla k tomu, že území Peru se dostala pod kontrolu [SCOPE.sCountry('bolivia_scope').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('bolivia_scope').GetName]. [SCOPE.sCountry('bolivia_scope').GetNameNoFormatting] se snaží tuto křehkou konfederaci udržet, aby se skutečné a úplné sjednocení jejích poddaných mohlo stát realitou.\n\n@information! Ambice #bold Peruánsko-bolivijské konfederace#! lze odvrátit tím, že je donutíte propustit jejich [Concept('concept_subject', '$concept_subjects$')] dříve, než ukazatel postupu dosáhne #variable 100%#!.\n\n@warning! Zatímco #b $BOL$#! usiluje o upevnění vlády #bold konfederace#!, bude čelit zvýšené agresi ze strany svých sousedů."
 je_peru_bolivia_goal: "[SCOPE.sCountry('bolivia_scope').GetNameNoFlag] úspěšně udržuje své [SCOPE.sCulture('south_andean_culture').GetName] a [SCOPE.sCulture('quechua_culture').GetName] [Concept('concept_subject', '$concept_subjects$')] a zároveň si udržuje [concept_legitimacy] nad #bold 50#! po dobu 10 let"
