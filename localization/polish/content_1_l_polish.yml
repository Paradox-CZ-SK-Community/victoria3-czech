l_polish:
 victoria.1.t: "Korunovace královny Victorie"
 victoria.1.d: "Král je mrtev. S nástupem jeho mladé neteře [SCOPE.sCharacter('queen_victoria').GetFirstName] se říše raduje a koruna Hannoverska přechází mimo britskou kontrolu. Ať žije dlouho!"
 victoria.1.d2: "Král je mrtev. S nástupem jeho mladé neteře [SCOPE.sCharacter('queen_victoria').GetFirstName] se říše raduje. Ať žije dlouho!"
 victoria.1.f: "„Protože Prozřetelnost uznala za vhodné mě postavit do této pozice, vynaložím veškeré úsilí, abych splnila svou povinnost vůči své zemi.“"
 victoria.1.a: "Bože, chraň královnu!"
 victoria.1.tt: "Členové [SCOPE.sCountry('hannover_victoria_scope').GetAdjective] [concept_customs_union] opouštějí naši ekonomickou sféru."
 victoria.2.t: "Korunovace královny Victorie"
 victoria.2.d: "Král je mrtev. S nástupem jeho mladé neteře Victorie přechází koruna Hannoverska mimo britskou kontrolu. Její strýc [SCOPE.sCharacter('ernest_augustus').GetFirstName] nyní vládne Hannoversku."
 victoria.2.f: "„Pro svou neteř bych prolil i poslední kapku své krve.“"
 victoria.2.a: "Bože, chraň krále!"
 britain_monarchy.1.t: "Korunovace krále Jiřího V."
 britain_monarchy.1.d: "Král je mrtev. S nástupem jeho syna [SCOPE.sCharacter('george_v_relevant_ruler').GetFirstName] se říše raduje. Ať žije dlouho!"
 britain_monarchy.1.f: "„Ztratil jsem svého nejlepšího přítele a nejlepšího z otců...“ \n„Nikdy jsme si v životě neřekli křivé slovo.“ \n„Jsem zdrcený a přemožený žalem, ale Bůh mi pomůže v mých povinnostech a má drahá May mi bude oporou, jako vždy byla.“ \n„Kéž mi Bůh dá sílu a vedení v těžkém úkolu, který na mě dopadl.“"
 britain_monarchy.1.a: "Bože, chraň krále!"
 edward_vii_death_tt: "Eduard VII. umírá"
 grand_exhibition_decision_custom_tooltip_2: "Nikdy dříve neuspořádal Světovou výstavu"
 prostitution.1.t: "Zákony o nakažlivých chorobách"
 prostitution.1.d: "[SCOPE.gsInterestGroup('cda_ig').GetName] ve státě [SCOPE.sState('cda_state').GetName], kterou vede [SCOPE.sCharacter('cda_ig_leader').GetFullName], požaduje, aby vláda zaujala postoj k prostituci. Žádají prosazení zákonů, které umožní policii zadržovat ženy podezřelé z prostituce v uzavřených nemocnicích s odůvodněním, že šíří pohlavní choroby."
 prostitution.1.d2: "[SCOPE.gsInterestGroup('cda_ig').GetName] ve státě [SCOPE.sState('cda_state').GetName], kterou vede [SCOPE.sCharacter('cda_ig_leader').GetFullName], požaduje řešení vysokého výskytu pohlavních chorob mezi svými muži. Žádají prosazení zákonů, které umožní policii zadržovat ženy podezřelé z prostituce v uzavřených nemocnicích s odůvodněním, že šíří pohlavní choroby."
 prostitution.1.f: "„Tyto padlé ženy jsou urážkou mravní slušnosti. Musí být izolovány a léčeny, jinak rozšíří své hříšné choroby po celé zemi.“"
 prostitution.1.a: "Prosadit zákony o nakažlivých chorobách."
 prostitution.1.b: "Tyto zákony jsou nelidské."
 prostitution.1.c: "Lékařská věda ukazuje marnost takových opatření."
 prostitution.2.t: "Zrušení zákonů o nakažlivých chorobách"
 prostitution.2.d: "Feministické skupiny vedené [SCOPE.sCharacter('feminist_cda_ig_leader').GetFullName] požadují zrušení zákonů o nakažlivých chorobách ve státě [SCOPE.sState('feminist_cda_state').GetName]. Odsuzují brutální zacházení se ženami ze strany policie a nelidské podmínky v uzavřených nemocnicích. Dokonce i ženy bez jakékoli spojitosti s prostitucí jsou běžně proti své vůli zadržovány."
 prostitution.2.f: "„Policisté na nás sahají. Muži nás vyšetřují, zacházejí s námi, léčí nás. V nemocnici je to opět muž, kdo se za nás modlí a čte nám Bibli. Předstupujeme před soudce, kteří jsou muži, a z jejich rukou se nedostaneme, dokud nezemřeme!“"
 prostitution.2.a: "Zrušit zákony."
 prostitution.2.b: "Obnovit zákony."
 prostitution.2.c: "Zrušit zákony v celé zemi."
 prostitution.3.t: "Skandál ve státě [SCOPE.sState('capital_state').GetName]"
 prostitution.3.d: "Policie uzavřela nechvalně proslulý mužský nevěstinec. Zatčený majitel prozradil, že mezi jeho klienty je i [SCOPE.sCharacter('scandal_character').GetFullName], a tato informace prosakuje do tisku."
 prostitution.3.f: "„Nepopsatelně odporný skandál zasáhl [SCOPE.sState('capital_state').GetNameNoFormatting]! Zadržení chlapci byli donuceni k výpovědi a [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] uvádí, že brzy propukne další senzace kolem této aféry. Dvaadvacet zapletených mužů, modrá krev i ostatní, uprchlo z [ROOT.GetCountry.GetNameNoFormatting].“"
 prostitution.3.a: "[SCOPE.sCharacter('scandal_character').GetFullName] musí okamžitě rezignovat."
 prostitution.3.b: "Pokusit se příběh ututlat."
 prostitution.3.c: "Naši propagandisté minimalizují dopad."
 prostitution.3.a.tt: "[SCOPE.sCharacter('scandal_character').GetFullName] odchází z politického života."
 prostitution.4.t: "Policejní brutalita"
 prostitution.4.d: "Používání extrémního násilí se mezi policisty ve státě [SCOPE.sState('police_brutality_state').GetName] stává stále běžnějším. Dělnická třída a společensky uvědomělí lidé se staví proti policii jako instituci."
 prostitution.4.f: "„Sotva uplyne týden, aniž by spáchali nějaký přestupek, který pobouří všechny kromě soudců. Chlapci jsou zraňováni jejich zuřivostí, ženy uráženy jejich hulvátstvím; a to, co způsobila brutalita, popírá křivá přísaha a soudcovská hloupost nechává bez trestu. Policejní brutalita se stává jednou z našich nejuctívanějších institucí.“"
 prostitution.4.a: "Toto chování nemůžeme tolerovat."
 prostitution.4.b: "Použití síly je oprávněné."
