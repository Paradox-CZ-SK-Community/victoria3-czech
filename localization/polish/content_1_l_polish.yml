 generals.1.d: "[SCOPE.gsInterestGroup('low_rank_general_ig').GetName] požadují povýšení [SCOPE.sCharacter('low_rank_general').GetRankName] [SCOPE.sCharacter('low_rank_general').GetFullName], přičemž vyzdvihují [SCOPE.sCharacter('low_rank_general').GetHerHis] historii loajální a efektivní služby."
 generals.1.f: "Na [SCOPE.sCharacter('low_rank_general').GetHerHis] uniformě se třpytilo tolik medailí, že látka pod nimi byla sotva vidět, ale stále to nestačilo. S hrudí vypjatou pýchou se generál usmíval, když si [SCOPE.sCharacter('low_rank_general').GetSheHe] představoval výraz ve tváři [SCOPE.sCharacter('high_rank_general').GetLastNameNoFormatting], až se [SCOPE.sCharacter('high_rank_general').GetRankName] dozví o [SCOPE.sCharacter('low_rank_general').GetHerHis] blížícím se povýšení; jejich rivalita byla mezi důstojníky legendární.\n\nKonečně se [SCOPE.sCharacter('low_rank_general').GetSheHe] dočká toho, co mu náleží."
