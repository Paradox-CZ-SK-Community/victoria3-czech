 military_bison_hunting: "Vojenské vybíjení bizonů"
 bison_hunting_subsistence: "Zdecimovaná stáda bizonů"
 manifest_destiny.3.t: "Lov bizonů"
 manifest_destiny.3.d: "[SCOPE.sCountry('native_american_country').GetAltAdjective('sti')] obyvatelé [SCOPE.sState('native_american_state').GetName] jsou na bizonech závislí pro mnoho svých základních potřeb. Pro zájmy osadníků v [SCOPE.sState('bison_state').GetName] by bylo výhodné, kdyby byla populace bizonů vyčerpána."
 manifest_destiny.3.f: "„Mnoho tisíc jich bylo každou sezónu bezohledně a hanebně pobito bílými lovci a turisty pouze pro jejich kožešiny a z pouhého rozmaru, zatímco jejich obrovská těla byla ponechána k rozkladu a jejich vybělené kostry pokrývaly pouště a opuštěné pláně.“" # J.M. Baltimore
 manifest_destiny.3.a: "Podporovat komerční lov."
 manifest_destiny.3.b: "Nechat armádu vybíjet bizony."
 manifest_destiny.3.c: "Chránit stáda bizonů."
 communist_elections.1.t: "Rudá hrozba"
 communist_elections.1.d1: "Členové [SCOPE.sParty('anti_leftist_party').GetName] důrazně varují voliče před volební kampaní [SCOPE.sParty('leftist_party').GetName]."
 communist_elections.1.f: "Nejprve vám vezmou dům vašeho zaměstnavatele a vy jim za to ještě poděkujete. Přijmete je jako slíbeného spasitele a pokleknete před nimi. Poté vezmou dům vašeho souseda a vy se je budete snažit přesvědčit, řeknete „ale to je dobrý člověk, znám ho!“ — a nebude to mít sebemenší význam.\n\nPak vám vezmou auto a vy si řeknete „to nevadí, auto vlastně ani nepotřebuji.“ A dokážete si představit, co přijde dál? Víte, co přijde dál."
 communist_elections.1.a: "Tito levičáci jsou zrádci národa."
 communist_elections.1.b: "Tato rétorika je zbytečně poplašná."
 communist_elections.1.c: "Komunistická literatura by měla být zakázána."
 communist_elections.1.d: "Infiltrovat vedení [SCOPE.sParty('leftist_party').GetName]."
 communist_elections.1.e: "[SCOPE.sParty('leftist_party').GetName] má plné právo šířit své myšlenky."
