 je_steam_engines: "Éra parních strojů"
 je_steam_engines_reason: "Lokomotivní průmysl je slibnou cestou nejen pro rozvoj infrastruktury, ale i pro zisk a inovace. Měli bychom vybudovat továrny na výrobu parních strojů a propojit naše města železnicí."
