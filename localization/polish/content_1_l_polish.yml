 adds_mission_to_the_west_je_tt: "Aktivuje [concept_journal_entry] #b Restaurace: Mise na Západ#!"
 je_meiji_economy: "Restaurace: Industrializace Japonska"
 je_meiji_economy_reason: "Japonsko musí modernizovat svůj průmysl, aby mohlo konkurovat národům, které se nás snaží ovládnout a vykořisťovat."
 je_meiji_army: "Restaurace: Konec samurajů"
 je_meiji_army_reason: "Samurajové jsou naše starobylá feudální dědičná válečnická kasta. Po staletí za nás bojovali a veleli našim armádám. V dlouhém období relativního míru však zapomněli na umění války a stali se zátěží pro stát."
 je_meiji_diplomacy: "Restaurace: Konec sakoku"
 je_meiji_diplomacy_reason: "Japonsko se po staletí izolovalo, aby odolalo cizím vlivům. Nyní je však čas otevřít se světu. Naším cílem není pouze otevření Japonska, ale také jeho prosazení jako mocnosti na světové scéně."
 has_completed_meiji_army_je_tt: "Má dokončeno #b $je_meiji_army$#!"
 has_completed_meiji_economy_je_tt: "Má dokončeno #b $je_meiji_economy$#!"
