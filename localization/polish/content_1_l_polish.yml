 strike.1.t: "Stávka!"
 strike.1.d: "Dělníci v [SCOPE.sBuilding('prime_strike_workplace').GetName] už mají dost svých špatných podmínek. Ve spolupráci se [SCOPE.gsInterestGroup('unions_ig').GetName] zahájili odvětvovou stávku v [SCOPE.sState('strike_state').GetName]."
 strike.1.f: "„Zachránit pracujícího z moci sobectví je úkol hodný těch nejušlechtilejších z našeho rodu. Jste ochotni přijmout tuto odpovědnost a s důvěrou v podporu věrných rytířů pracovat podle svých schopností na vítězství těchto zásad mezi lidmi?“"
 strike.1.a: "Zahájit jednání se stávkujícími."
 strike.1.b: "Stávky musí být potlačeny."
 strike.2.t: "Stávka: Jednání s odbory"
 strike.2.desc: "Po důkladných jednáních s odborovými vůdci souhlasili s přerušením stávky, pokud bude splněn alespoň jeden z jejich hlavních požadavků."
 strike.2.flavor: "[SCOPE.gsInterestGroup('industrialist_ig').GetName], kteří nás ve velkém okrádají, mají zároveň moc ovládat vládu a své loupeže legalizovat. My, kdo pracujeme nejvíce a vytváříme nejvíce, máme nejméně; dokážeme provozovat továrny bez nich, ale oni je bez nás provozovat nedokážou!"
 strike.2.a: "Přislíbit prosazení zákona o starobních penzích."
 strike.2.b: "Přislíbit prosazení zákona o regulaci mezd."
 strike.2.c: "Přislíbit prosazení zákona o regulačních orgánech."
 strike.2.d: "Přislíbit prosazení zákona o ochraně pracujících."
 strike.2.e: "Přislíbit rozšíření bezpečnosti na pracovišti."
 strike.2.f: "Přislíbit rozšíření sociálního zabezpečení."
 strike.2.g: "Jejich požadavky jsou nepřijatelné."
 strike.3.t: "Generální stávka!"
 strike.3.d1: "Protože jejich požadavky stále nebyly splněny, stávka přerostla v celostátní generální stávku. Těžba v [SCOPE.sCountry('strike_country').GetName] téměř ustala."
 strike.3.d2: "Protože jejich požadavky stále nebyly splněny, stávka přerostla v celostátní generální stávku. Průmyslové továrny v [SCOPE.sCountry('strike_country').GetName] se téměř zastavily."
 strike.3.d3: "Protože jejich požadavky stále nebyly splněny, stávka přerostla v celostátní generální stávku. Železniční doprava v [SCOPE.sCountry('strike_country').GetName] je téměř paralyzována."
 strike.3.f: "Proletáři všech zemí, spojte se! Nemáte co ztratit než své okovy!"
 strike.3.a: "Katastrofa!"
 strike.4.t: "Stávka: Protiodborová opatření"
 strike.4.d: "Vláda, která není ochotna jednat s odbory, navrhla opatření zaměřená na ukončení stávky."
 strike.4.f: "Vláda má bezpochyby právo ve vlastním zájmu odrazovat a bránit použití síly a násilí k dosažení toho, čeho by mělo být dosaženo, pokud vůbec, parlamentními či politickými prostředky. Není čas ztrácet čas slovíčkařením o porušování svobody."
 strike.4.a: "Udělit policii zvláštní pravomoci."
 strike.4.b: "Podporovat stávkokazectví."
 strike.4.c: "Měli bychom přehodnotit náš přístup."
 strike.5.t: "Odbory slaví úspěch stávky"
 strike.5.d: "Politické změny slíbené stávkujícím dělníkům jsou vládou vážně zvažovány. Zdá se pravděpodobné, že požadavky odborů budou splněny."
 strike.5.f: "Funguje to, chlapci! Co jsem vám říkal? Přímá akce přináší výsledky! Teď to oslavme pintou, všichni jsme si ji víc než zasloužili."
 strike.5.a: "Jen dobře pro ně."
 strike.6.t: "Policie útočí na stávkující"
 strike.6.d: "Při násilném střetu policie využila nově udělené pravomoci a zahájila palbu na stávkující dělníky ve snaze je rozehnat. Mnoho dělníků bylo zabito a několik policistů zraněno, ale dav byl nakonec rozprášen."
 strike.6.f: "Střelba byla neoprávněná a krutá, a řečeno přímo, byla to zbabělá, předem promyšlená vražda."
 strike.6.a: "Pal!"
 strike.7.t: "Odbory demoralizovány stávkokazectvím"
 strike.7.d: "Naše politika podpory stávkokazectví se ukazuje jako mimořádně úspěšná. Mnoho stávkujících dělníků ztrácí bojového ducha a opouští svou věc."
 strike.7.f: "Náš člověk přijde do vaší továrny, seznámí se, pronikne do odborů a postupně se vypracuje v jejich řadách. Požaduje nesmyslné věci a udržuje odbory v neustálých problémech. Pokud dojde ke stávce, bude nejhlasitější ze všech, bude radit k násilí a někoho dostane do potíží. Výsledkem bude rozbití odborů."
 strike.7.a: "Přesně podle plánu."
 strike.8.t: "Stávka: Plnění slibů"
 strike.8.d: "Přijetím nového zákona vláda splnila požadavky stávkujících dělníků."
 strike.8.f: "Přes všechny své nedostatky odbory udělaly pro lidstvo více než jakákoli jiná organizace v dějinách. Přispěly více k slušnosti, poctivosti, vzdělání, zlepšení lidského rodu i rozvoji charakteru než jakékoli jiné sdružení lidí."
 strike.8.a: "Odbory by se měly více zapojit do politiky."
 strike.8.b: "To by je mělo na čas uklidnit."
 strike.9.t: "Stávka: Potlačení stávky"
 strike.9.d: "Duch stávkujících je zcela zlomen. Už nemají vůli pokračovat v boji a stávka byla odbory oficiálně ukončena."
 strike.9.f: "Už jste se pobavili. Teď zpátky do práce; mzda vám byla odpovídajícím způsobem snížena a budete pracovat tolik hodin, kolik společnost uzná za vhodné."
 strike.9.a: "Naučili se bát obušku."
 strike.9.b: "Seberte podněcovatele. Tohle se už nebude opakovat."
