 major_railways.3.t: "Poslední hřeb"
 major_railways.3.d: "Kanadská pacifická železnice byla dokončena a spojuje Atlantik s Pacifikem. Otevírá nové možnosti osídlení."
 major_railways.3.f: "„Úder spustil zvuk, který se nesl napříč kontinentem. Výkřiky dělníků a inženýrů byly jen předehrou k velkému sboru.“"
 major_railways.3.a: "Pobřeží má největší potenciál."
 major_railways.3.b: "Prérie skrývají velké možnosti."
