 je_scotland_yard: "Metropolitní policie"
 je_scotland_yard_reason: "Jak města rostou a nebezpečné ideje se šíří, potřeba udržet veřejný pořádek je stále naléhavější. Policie musí mít dostatek lidí i prostředků, aby mohla zachovat klid, s důrazem na srdce naší země."
 scotland_yard.1.t: "Metropolitní policie"
 scotland_yard.1.d: "Scotland Yard vyřešil sérii významných vražd v [SCOPE.sState('capital_scope').GetCityHubName] díky rozšíření [SCOPE.sLawType('police_law').GetName]. Důvěra veřejnosti v tuto instituci je na historickém maximu."
 scotland_yard.1.d2: "[SCOPE.sLawType('police_law').GetName] vyřešil sérii významných vražd v [SCOPE.sState('capital_scope').GetCityHubName] díky našim investicím. Důvěra veřejnosti v policii je na historickém maximu."
 scotland_yard.1.f: "„[SCOPE.sState('capital_scope').GetCityHubName] osvětlené plynovými lampami může být zrádným místem. Noviny by vás přesvědčily, že nebezpečí číhá na každém rohu. To se však změní; s policistou na každé ulici budou naši občané kráčet s jistotou, že jsou chráněni před zločinem.“"
 scotland_yard.1.a: "Medaile pro všechny naše statečné strážníky!"
 scotland_yard.1.b: "Nejlepší z [SCOPE.sState('capital_scope').GetCityHubName] jsou v akci."
