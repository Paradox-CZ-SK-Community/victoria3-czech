 communist_elections.3.t: "Socialistický internacionalismus"
 communist_elections.3.d: "[SCOPE.sParty('socialist_party').GetName] získává podporu volební kampaně od [SCOPE.sCharacter('foreign_socialist_leader').GetIdeology.GetName] [SCOPE.gsInterestGroup('foreign_socialist_ig').GetName] v [SCOPE.sCountry('socialist_country').GetName]."
 communist_elections.3.f: "„Poslední bitva vzplála,\nDejme se na pochod!\nInternacionála\nje zítřka lidský rod.“" # The Internationale
 communist_elections.3.a: "[SCOPE.sCountry('socialist_country').GetAltAdjective('sti')] socialisté jsou zde vítáni."
 communist_elections.3.b: "Pokusit se omezit zahraniční vliv na volby."
 communist_elections.3.c: "Najít a vyhostit všechny infiltrátory."
 election_socialist_support_tt: "Ideologie [SCOPE.sCharacter('foreign_socialist_leader').GetIdeology.GetName] se bude častěji objevovat v naší zemi."
 communist_elections.4.t: "Černé košile"
 communist_elections.4.desc: "[SCOPE.sCharacter('fascist_leader').GetIdeology.GetName] paramilitární jednotky organizované [SCOPE.sParty('fascist_party_scope').GetName] používají násilí a nátlak k zastrašování voličů loajálních k soupeřícím stranám."
 communist_elections.4.f: "Násilí? Nátlak? Někdo si v poslední době četl slovník, že? Pokud jen říkáme fakta a lidé nemají čím oponovat, proč by se tomu mělo říkat nátlak? Když vám řeknu, že nebude sněžit, pokud není zima, nutím tím snad počasí?"
 communist_elections.4.a: "Tolerovat fašistické paramilitární jednotky."
 communist_elections.4.b: "Posílit paramilitární jednotky armádou a policií."
 communist_elections.4.c: "Pokusit se prosadit zákony o potlačení volební účasti."
 communist_elections.4.d: "Zakročit proti paramilitárním organizacím."
 communist_elections.4.tt: "Fašistický vůdce je ve vládě."
