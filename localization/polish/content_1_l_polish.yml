 meiji.13.t: "Otevření Japonska"
 meiji.13.d: "Donucena otevřít se světu, musí nyní [ROOT.GetCountry.GetName] čelit ekonomickému zasahování jiných mocností. Autorita klanu [SCOPE.sCharacter('shogun_scope').GetLastName] a [SCOPE.gsInterestGroup('shogunate_ig').GetName] byla v důsledku toho výrazně oslabena."
 meiji.13.f: "Proměnlivé větry času buší na naše dveře a abychom zachovali náš řád, musíme se přizpůsobit a otevřít se rozmarům světa."
 meiji.13.a: "Musíme se přizpůsobit novým okolnostem."
 bic_breakup.1.t: "Konec britské nadvlády?"
 bic_breakup.1.d: "Bez vedení a podpory svého koloniálního vládce se [ROOT.GetCountry.GetName] nachází na pokraji zhroucení. Zdá se, že vláda [SCOPE.sCulture('british_culture').GetName] končí."
 bic_breakup.1.f: "„Opustit stanoviště? Jaké stanoviště, jaká armáda? Za pár hodin bude tohle místo zaplaveno hinduisty, nebo v plamenech, nebo obojí. Tak přestaň si stěžovat a vezmi ten pytel. Vezmi všechno cenné, co není přibité, a já zajistím cestu do Londýna.“"
 bic_breakup.1.a: "Indie bude rozdělena mezi knížata."
 bic_breakup.1.b: "Toto je zrození indického národa."
 bic_breakup.1.c: "Britská nadvláda musí být zachována za každou cenu."
 india_princes_independent_tt: "Všechny [concept_subject] země se stanou nezávislými a naše [Concept('concept_state', '$concept_states$')] budou mezi ně rozděleny."
 warlord_china_implosion_tt: "Naše [Concept('concept_state', '$concept_states$')] budou rozděleny mezi válečníky"
 dei_breakup.1.t: "Konec Východní Indie"
 dei_breakup.1.d: "Po ztrátě podpory svého koloniálního vládce se správa [ROOT.GetCountry.GetAltAdjective('G')] napříč indonéským souostrovím začala hroutit. Zdá se, že koloniální nadvláda konečně končí."
 dei_breakup.1.f: "Napříč ostrovy se ticho zvedlo jako vlna. Přerušené telegrafní linky, dezertující policisté, farmy, které už nehlásily své sklizně. A pak se ticho prolomilo a s ním přišlo zničení."
 dei_breakup.1.a: "Národy souostroví si vzaly své právo."
 dei_breakup.1.b: "Jedna vlast, jeden národ, jeden jazyk!"
 dei_breakup.1.c: "Budeme vzdorovat bouři, dokud nebudeme zachráněni."
