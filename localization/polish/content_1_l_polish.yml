 wedding.1.t: "Královská svatba"
 wedding.1.d: "Národ slaví sňatek [SCOPE.sCharacter('royal_marriage_character').GetHerHis|U] milosti [SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFirstName] s půvabným [SCOPE.sCharacter('royal_marriage_character').GetCustom('wedding_son_daughter')]em [SCOPE.sCharacter('foreign_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('foreign_ruler').GetFirstName] z [SCOPE.sCountry('marriage_country').GetName]."
 wedding.1.f: "„Dnes se v [SCOPE.sState('capital_scope').GetCityHubName] konal slavnostní obřad sňatku [SCOPE.sCharacter('royal_marriage_character').GetHerHis|U] milosti [SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFirstNameNoFormatting]. Není divu, že lid této země, přirozeně loajální, přerušil své každodenní činnosti, aby oslavil a projevil svou oddanost trůnu.“"
 wedding.1.a: "Pozvat jen elitu nejvyššího postavení."
 wedding.1.b: "Velkolepá veřejná svatba uklidní masy."
