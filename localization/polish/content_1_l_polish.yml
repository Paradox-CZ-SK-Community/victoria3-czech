 communist_elections.2.t: "Rady volby"
 communist_elections.2.d: "S blížícími se volbami do rad vyjádřili dělníci v celé naší zemi drtivou podporu [SCOPE.sParty('unions_party').GetName]."
 communist_elections.2.f: "Pokud nebudeme volit někoho, kdo hájí naše hodnoty, tak proč vůbec volit? [SCOPE.sParty('unions_party').GetNameNoFormatting] se postará o naše nejlepší zájmy — a jen oni. Kdo jiný by se o nás staral? Armáda? Církev? Ti namyšlení, arogantní spratci z [SCOPE.sParty('anti_union_party').GetNameNoFormatting]? Já vím jistě, že mě nezajímají."
 communist_elections.2.a: "Dělníci mají vždy pravdu."
 communist_elections.2.b: "Loajalita ke straně je povinná."
 communist_elections.2.c: "Je třeba vyslechnout i jiné hlasy."
 communist_elections.2.tt: "Dělnická strana je ve vládě."
 communist_elections.2.c.tt: "Neexistuje dělnická strana."
