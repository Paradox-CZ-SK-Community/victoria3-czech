 theocracy.1.t: "Konatelé zázraků"
 theocracy.1.d1: "Pacienti v charitativní nemocnici v [SCOPE.sState('capital_scope').GetCityHubName] se rychle uzdravují. Přisuzují své uzdravení zázrakům, které vykonali duchovní podporující nemocnici. Takové projevy posilují podporu pro [SCOPE.sLaw('current_law_scope').GetName] v celé [ROOT.GetCountry.GetName]."
 theocracy.1.d2: "Studenti ve škole pro sirotky v [SCOPE.sState('capital_scope').GetCityHubName] slaví štědré dary od členů [SCOPE.gsInterestGroup('priests_scope').GetName]. Takové projevy posilují podporu pro [SCOPE.sLaw('current_law_scope').GetName] v celé [ROOT.GetCountry.GetName]."
 theocracy.1.d3: "Zprávy o zázraku vykonaném duchovními v [SCOPE.sState('capital_scope').GetCityHubName] se šíří. Tyto události podporují náboženskou zbožnost v celé [ROOT.GetCountry.GetName]."
 theocracy.1.f: "„Myslete nejprve na dobro druhých. Dávat je božské a štědrost je pravá ctnost. Následujte cestu spravedlnosti z lásky, ne ze strachu.“"
 theocracy.1.a: "Náboženské instituce jsou páteří státu."
 theocracy.1.b: "[SCOPE.gsInterestGroup('priests_scope').GetName] jsou praví služebníci víry."
 theocracy.1.c: "[SCOPE.sLaw('current_law_scope').GetName] naplní naše srdce vírou."
 theocracy.2.t: "Zákony o rouhání"
 theocracy.2.d: "V rámci přechodu na [SCOPE.sLaw('current_law_scope').GetName] zavedli [SCOPE.gsInterestGroup('priests_scope').GetName] přísné zákony proti rouhání v [SCOPE.sState('blasphemy_state').GetName]. Tyto kroky rozdělují i věřící."
 theocracy.2.f: "„Jak praví písmo: naše cesta je jediná. Nemůžeme tolerovat žádné odchylky ani zpochybnění naší víry.“"
 theocracy.2.a: "Musíme zákon dodržovat."
 theocracy.2.b: "Zákony by měly být zmírněny."
 theocracy.2.c: "Rouhači budou popraveni."
 theocracy.3.t: "Náboženské pogromy"
 theocracy.3.d: "Fanatičtí stoupenci [SCOPE.sLaw('current_law_scope').GetName] páchají pogromy proti [SCOPE.sReligion('target_religion').GetName] v [SCOPE.sState('pogrom_state').GetName]."
 theocracy.3.f: "„Přišli v noci. Schovali jsme se pod podlahu, zatímco ničili domy. Neodvážili jsme se vyjít až do svítání.“"
 theocracy.3.a: "Nemůžeme zasahovat."
 theocracy.3.b: "To není správná cesta víry."
 theocracy.3.c: "Tohle nestrpíme. Zatknout viníky."
