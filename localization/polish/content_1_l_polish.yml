 je_spanish_flu_reason: "Smrtící chřipková pandemie pustoší svět. Reakce vlády na tuto pohromu rozhodne o osudu tisíců, možná milionů životů."
 production_tech_events.700.t: "Motory pokroku"
 production_tech_events.700.d: "Výroba parních strojů se stala výnosným odvětvím v [SCOPE.sState('steam_engine_state').GetName] díky našim investicím do lokomotivních technologií. Tyto stroje jsou již využívány na nových [ROOT.GetCountry.GetAdjectiveNoFormatting] železnicích."
 production_tech_events.700.f: "„Všichni nastupovat do [SCOPE.sState('first_railway_state').GetCityHubName]! Díky společnosti ze [SCOPE.sState('steam_engine_state').GetCityHubName] nebylo nikdy snazší opustit [SCOPE.sState('second_railway_state').GetCityHubName]. Jídelní vůz je pouze pro první třídu, černí pasažéři budou potrestáni!“"
 production_tech_events.700.a: "Nastupovat!"
 production_tech_events.700.b: "Více motorů! Více lokomotiv!"
 production_tech_events.700.c: "Jsme na správné koleji k inovacím."
