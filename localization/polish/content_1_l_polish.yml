 communism_progress_from_movement_activism_tt: "[Concept('concept_activism', '$concept_activism_short$')] [GetIdeology('ideology_socialist').GetName], [GetIdeology('ideology_communist').GetName] a [GetIdeology('ideology_anarchist').GetName] [Concept('concept_political_movement','$concept_political_movements$')]"
 communism_progress_from_events_tt: "události a další efekty"
 je_communism_2: "Revoluce lidu"
 je_communism_2_reason: "Lid stále trpí pod tyranskou patou králů, kněží a kapitalistů. Musíme svrhnout reakční vládu a nastolit dělnický ráj."
 communism.1.t: "Svět k dobytí"
 communism.1.desc: "Se šířením socialistických myšlenek napříč [ROOT.GetCountry.GetName] vláda [ROOT.GetCountry.GetRuler.GetLastName] rozhodla, že je třeba zvážit zásadní ústupky k zastavení jejich postupu. Existuje dostatečná dynamika pro rychlou změnu politiky."
 communism.1.f: "„Proletariát všude zaujímá hrozivý postoj, začíná počítat řady svých nepřátel, početně slabších než on sám, a požaduje uskutečnění svých práv. Všichni lidé jsou naplněni jakousi předtuchou a každý, jehož životní síly nejsou ochromeny, hledí s rozechvěním vstříc blížící se budoucnosti, která pronese vykupující slovo.“"
 communism.1.a: "Nabídnout vyšší mzdy za jejich práci."
 communism.1.b: "Zbavme poslední otrokáře jejich trápení."
 communism.1.c: "Zaručit lepší podmínky pro dělníky."
 communism.1.d: "Nepodvolíme se!"
 communist_unions.tt: "[SCOPE.gsInterestGroup('unions').GetName] budou mnohem častěji volit vůdce s ideologií avantgardismu, komunismu nebo anarchismu, pokud budou [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement].\nOstatní [Concept('concept_interest_group', '$concept_interest_groups$')] budou také častěji volit vůdce s ideologií avantgardismu, komunismu nebo anarchismu za stejných podmínek."
 communist_government_modifier: "Tvrdá nepřízeň"
 communism.2.t: "Dělnická republika"
 communism.2.d: "Dělníci v [ROOT.GetCountry.GetAltAdjective('L')] konečně svrhli buržoazní vládu a vytvořili radovou republiku. Stále však zbývá mnoho práce, než bude socialismus skutečně naplněn."
 communism.2.f: "„Dokud pracovní síla člověka, a tedy i samotný život, zůstávají předmětem koupě a prodeje, vykořisťování a loupeže, zůstává princip „posvátnosti lidského života“ hanebnou lží, pronášenou za účelem udržení utlačovaných v jejich okovech.“"
 communism.2.a: "Avantgardní strana povede cestu!"
 communism.2.b: "Veškerá moc radám!"
 communism.2.b2: "Veškerá moc sovětům!"
 communism.2.c: "Žádní bohové! Žádní páni! Ať žije anarchie!"
 chose_vanguardism.tt: "[SCOPE.gsInterestGroup('unions').GetName] budou mnohem častěji volit [GetIdeology('ideology_vanguardist').GetName] vůdce, pokud budou [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement]."
 chose_communism.tt: "[SCOPE.gsInterestGroup('unions').GetName] budou mnohem častěji volit [GetIdeology('ideology_communist').GetName] vůdce, pokud budou [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement]."
 chose_anarchism.tt: "[SCOPE.gsInterestGroup('unions').GetName] budou mnohem častěji volit [GetIdeology('ideology_anarchist').GetName] vůdce, pokud budou [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement]."
 je_anarchy: "Vzájemná pomoc"
 je_anarchy_reason: "Pokud existuje stát, musí existovat nadvláda jedné třídy nad druhou, a tedy i otroctví; stát bez otroctví je nemyslitelný - proto jsme nepřáteli státu."
 je_vanguard: "Stát a revoluce"
 je_vanguard_reason: "Proletariát potřebuje státní moc, centralizovanou organizaci síly, organizaci násilí, jak k potlačení odporu vykořisťovatelů, tak k vedení obrovských mas obyvatelstva při organizaci socialistické ekonomiky."
 vanguard_custom_tooltip: "Každá mocná zájmová skupina je vedena vůdcem s ideologií [GetIdeology('ideology_vanguardist').GetName], [GetIdeology('ideology_communist').GetName] nebo [GetIdeology('ideology_anarchist').GetName]."
 vanguard_instruction_status: "Inteligence, venkovský lid, odbory a ozbrojené síly přijmou avantgardismus, pokud budou marginalizovány."
 je_communist_welfare: "Naše revoluce"
 je_communist_welfare_reason: "Komunismu nelze dosáhnout, dokud nejsou uspokojeny potřeby všech. Každý podle svých schopností, každému podle jeho potřeb."
 je_5_year_plan: "Pětileté plány"
 je_5_year_plan_reason: "Komunismus je moc dělníků plus elektrifikace celé země."
 je_5_year_plan_goal: "Dosáhněte [JournalEntry.GetTotalGoalValue] [concept_gdp]"
 communism.3.t: "Avantgarda postupuje"
 communism.3.d: "Reakční prvky uvnitř [SCOPE.gsInterestGroup('new_vanguard_ig').GetName] byly konečně odstraněny. Můžeme si být jisti, že jejich nový vůdce, [SCOPE.sCharacter('new_vanguard_leader').GetFullName], bude loajální státu i socialismu."
 communism.3.f: "„Diktatura proletariátu, tedy organizace avantgardy utlačovaných jako vládnoucí třídy za účelem potlačení utlačovatelů, nemůže vést pouze k rozšíření demokracie. Musí zavést řadu omezení svobody utlačovatelů, vykořisťovatelů a kapitalistů.“"
 communism.3.a: "Loajalita musí být absolutní."
 communism.3.b: "Mají důležitou roli."
 new_vanguard.tt: "[SCOPE.gsInterestGroup('new_vanguard_ig').GetName] budou mnohem častěji volit avantgardistické vůdce, pokud budou [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] příslušným [concept_political_movement]."
 new_vanguard_opinion: "Loajální avantgarda"
 new_vanguard_clout: "Integrace do avantgardy"
 communism.4.t: "Dobytí chleba"
 communism.4.d: "[ROOT.GetCountry.GetName] se rychle mění v anarchistickou utopii. Chudoba byla zcela odstraněna a beztřídní společnost založená na vzájemné pomoci začíná zakořeňovat."
 communism.4.f: "„Vzniká nové pojetí společnosti. Pod názvem anarchie usiluje o co nejúplnější rozvoj individuality spojený s nejvyšším rozvojem dobrovolného sdružování ve všech jeho podobách, ve všech možných stupních, pro všechny myslitelné cíle.“"
 communism.4.a: "Matka anarchie miluje své syny."
 anarchist_utopia: "Dobytí chleba"
 je_opium: "Obchod s opiem"
 je_opium_reason: "Poptávka po opiu prudce roste, protože tato nebezpečně návyková látka okouzluje svět. Měli bychom se stát jejím hlavním dodavatelem!"
 opium_events.1.t: "Opiumoví magnáti"
 opium_events.1.d: "Produkce v [SCOPE.sBuilding('opium_building').GetName] prudce roste a zahraniční poptávka po opiu je mimořádně vysoká. Lidé [SCOPE.sCulture('opium_addict_culture').GetName] v [SCOPE.sCountry('opium_addict_country').GetName] si tuto látku natolik oblíbili, že se stala téměř národní zábavou."
 opium_events.1.f: "„Semena této květiny, zdánlivě nevinná, jsou ve skutečnosti semeny pádu říší. Lidé povedou krvavé války, aby uspokojili svou touhu po opiu, prodají vlastní matky za další dávku. A my tu budeme, abychom jim ji prodali.“"
 opium_events.1.a: "Udržujte přísun opia!"
 opium_events.1.b: "Vezmi si mou dýmku, příteli z [SCOPE.sCountry('opium_addict_country').GetAdjectiveNoFormatting]."
 opium_production_modifier: "Boom produkce opia"
 opium_exporter_modifier: "Přední vývozce opia"
 je_qa_test: "QA TEST"
 je_qa_test_reason: "Miluji QA"
 je_dialectics: "Katedra filozofie"
 je_dialectics_reason: "Ačkoli filozofie existuje již po staletí, je načase ji začít brát vážně jako obor. Na všech našich předních vzdělávacích institucích by měla být zřízena plně financovaná katedra filozofie."
 dt_society_events.1.t: "Katedra filozofie"
 dt_society_events.1.d: "Zajistili jsme financování kateder filozofie na všech našich vysokých školách. [SCOPE.sBuilding('philosophy_department').GetName] v [SCOPE.sState('university_state').GetName] se rozhodla zaměřit tyto prostředky na rozvoj hegelovské dialektiky."
 dt_society_events.1.f: "„Teď, když už jsme víceméně usazeni, můžeme začít. Všechno, co na této instituci děláte, začíná i končí tímto složeným slovem: ‚philo‘, znamenající lásku k, a ‚sophia‘, znamenající moudrost. Láska k poznání a myšlení je tím, čím je filozofie. Základem filozofie je pohled, jímž vnímáme život, svět, v podstatě vše. Nemůžeme vás nutně naučit, jak vykonat konkrétní úkol. Co vás však naučit můžeme, je jak se učit a jak o učení přemýšlet samostatně.“"
 dt_society_events.1.b: "Zkoumat dialektický materialismus."
 dt_society_events.1.a: "Teze, antiteze, syntéza!"
 dt_society_events.1.c: "Potřebujeme praktičtější přístup."
 synthesis_modifier: "Syntéza!"
 je_realism: "Podporovat realistické umění"
 je_realism_reason: "Umělci se odklánějí od abstraktního a fantaskního umění směrem k realistickému zobrazení konkrétního světa. Jako mecenáši tohoto hnutí z toho můžeme mnohé získat."
 dt_society_events.2.t: "Realistické hnutí"
 dt_society_events.2.d: "[SCOPE.sBuilding('art_building').GetName] v [SCOPE.sState('art_state').GetName] se stal významným centrem realistického hnutí a vytváří některá z nejlepších děl naší generace."
 dt_society_events.2.f: "Realismus zobrazuje svět takový, jaký je, se všemi jeho nedostatky, nikoli takový, jaký bychom si přáli. Snaží se být věrný nejen tomu, jak věci vypadají, ale i každodenním zkušenostem obyčejných lidí."
 dt_society_events.2.a: "Konečně umění, se kterým se můžeme ztotožnit."
 dt_society_events.2.b: "Dokážeme realitu zachytit ještě dokonaleji?"
 dt_society_events.2.c: "Svět je ponurý a všední."
 realist_art: "Podpora realistického hnutí"
 grim_realism: "Ponurý realismus"
 je_academia: "Založit univerzitu"
 je_academia_reason: "Svět se rychle mění, a pokud nedokážeme držet krok s technologickým, společenským a vojenským pokrokem, upadneme v zapomnění."
 new_academia: "Filozofové-králové"
 dt_society_events.3.t: "Vyšší vzdělání"
 dt_society_events.3.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetHerselfHimself] slavnostně otevřel [SCOPE.sBuilding('university_building').GetName] v [SCOPE.sState('university_state').GetName]. Akademické prostředí v [ROOT.GetCountry.GetName] začíná vzkvétat."
 dt_society_events.3.f: "Filozofie je nejvyšším posláním lidstva. Skrze ni můžeme pochopit samotné základy metafyziky, podstatu božství i smysl ctnosti. Z toho plyne, že pouze ti nejosvícenější hledači moudrosti jsou způsobilí vládnout."
 dt_society_events.3.a: "Společnosti by měli vládnout filozofové-králové."
 dt_society_events.3.b: "Moderní instituce by měly používat moderní metody."
 dt_society_events.3.c: "Formalizovat lékařskou profesi."
 je_opium_obsession: "Opiová krize"
 je_opium_obsession_reason: "Obrovské množství našich obyvatel se stalo závislými na opiu. Je to národní ostuda, kterou musíme naléhavě řešit."
 je_opium_obsession_goal: "Následující podmínky musí být splněny po dobu 5 let (může být přerušeno):"
 opium_wars.1.t: "Opiová krize"
 opium_wars.1.d: "Závislost na opiu pustoší [ROOT.GetCountry.GetName]. Obrovské množství [SCOPE.sCulture('addicted_culture').GetName] se stalo závislými na opiu, což vede k vlně kriminality, chudoby a zahálky. Navzdory zřejmým škodám [SCOPE.sCountry('opium_exporter').GetName] nadále zaplavuje trh."
 opium_wars.1.f: "V každé domácnosti leží na lůžku někdo závislý na opiu, na každém rohu je opiové doupě a každý přístav vítá [SCOPE.sCountry('opium_exporter').GetAdjectiveNoFormatting] obchodníky, kteří valí přebytky opia do hrdla každého, kdo je ochoten zaplatit."
 opium_wars.1.a: "Musíme něco udělat!"
 opium_wars.1.b: "Nemůžeme riskovat hněv [SCOPE.sCountry('opium_exporter').GetName]."
 opium_wars_addiction_modifier: "Rozšířená závislost na opiu"
 opium_wars.2.t: "Opiové války"
 opium_wars.2.d: "[SCOPE.sCountry('opium_wars_target_country').GetAdjectiveNoFormatting] vláda oznámila záměr ukončit obchod s opiem v [SCOPE.sCountry('opium_wars_target_country').GetName]. Jelikož je [ROOT.GetCountry.GetName] významným vývozcem opia, jde o závažnou ekonomickou otázku."
 opium_wars.2.f: "„Někteří odsuzují takzvané morální zlo opiového obchodu; já jim říkám, kdo jste, abyste bránili svobodnému obchodu a svobodné volbě spotřebitele? Poptávka existuje, a tak ji uspokojujeme — pokud ne my, pak by na tom zbohatl někdo jiný na úkor [SCOPE.sCulture('opium_addicted_culture').GetNameNoFormatting] závislých. Má být každý člověk zbaven opia jen proto, že někteří pošetilci ho zneužívají? A má být každá [ROOT.GetCountry.GetAdjectiveNoFormatting] rodina připravena o bohatství, které opium naší zemi přináší?“"
 opium_wars.2.a: "Budou kouřit opium a ještě se jim to bude líbit!"
 opium_wars.2.b: "Máme jiné starosti."
 je_opium_wars: "Opiové války"
 je_opium_wars_reason: "Musíme chránit naše ekonomické zájmy tím, že zajistíme pokračování obchodu s opiem."
 opiumwars_fail_tt: "Je jednou z mocností, které odporují našemu úsilí"
 opium_wars.3.t: "Konec závislosti"
 opium_wars.3.d: "Díky velkému úsilí jsme překonali závislost [SCOPE.sCulture('addicted_culture').GetName] na opiu. Ani intriky [SCOPE.sCountry('opium_wars_aggressor_country').GetName] nám nedokázaly zabránit vrátit zdraví a prosperitu [ROOT.GetCountry.GetName]."
 opium_wars.3.d2: "Díky velkému úsilí jsme překonali závislost [SCOPE.sCulture('addicted_culture').GetName] na opiu. Ani intriky velmocí nám nedokázaly zabránit vrátit zdraví a prosperitu [ROOT.GetCountry.GetName]."
 opium_wars.3.f: "Stejně jako se závislý na opiu zbaví své závislosti a vstane ze svého lože zahálky, tak i náš národ setřese nechtěné jho cizího vlivu a povstane jako suverénní stát. Naše řeky již nebudou zaplaveny opiem, ale stříbrem, a náš lid se vrátí k ctnostnému životu."
 opium_wars.3.a: "Suverenita [ROOT.GetCountry.GetName] je absolutní."
 opium_wars.3.b: "Harmonie se vrátí do [ROOT.GetCountry.GetName]."
 opium_wars_fail_tt: "Žádná [SCOPE.sCountry('target').GetAdjective] [Concept('concept_primary_cultures','$concept_primary_culture$')] nemá [concept_obsession] s opiem"
 china_authority: "Prosazená suverenita"
 china_welfare: "Obnova po opiu"
 opium_wars.4.t: "Opiové války: Porážka"
 opium_wars.4.d: "Naše potupná porážka nás donutila otevřít naše trhy. Tok opia nejenže nepoleví, ale naše suverenita byla narušena a lid je rozhořčen."
 opium_wars.4.d2: "Naše potupná porážka proti [SCOPE.sCountry('opium_wars_treaty_port_winner').GetName] nás donutila postoupit přístav [SCOPE.sState('treaty_port_state').GetName]. Tok opia nejenže nepoleví, ale naše suverenita byla narušena a lid je rozhořčen."
 opium_wars.4.d3: "Naše potupná porážka nás donutila postoupit smluvní přístav. Tok opia nejenže nepoleví, ale naše suverenita byla narušena a lid je rozhořčen."
 opium_wars.4.f: "Kde je národ, který po staletí vládl harmonické zemi? Jsme otroky opia, vydáni na milost cizí chamtivosti. Nemůžeme kontrolovat naše přístavy, cizinci neprojevují žádnou úctu k našemu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a v každé domácnosti sílí šepot nespokojenosti. Přicházejí temné časy; náš mandát může skončit."
 opium_wars.4.a: "Mohou znamenat konec [ROOT.GetCountry.GetName]."
 opium_wars_lost: "Prohrané opiové války"
 opium_wars.5.t: "Opiové války: Vítězství"
 opium_wars.5.d: "Donutili jsme [SCOPE.sCountry('opium_wars_target_country').GetName] otevřít své trhy, čímž jsme zajistili pokračování obchodu s opiem na dlouhá léta."
 opium_wars.5.d2: "Donutili jsme [SCOPE.sCountry('opium_wars_target_country').GetName] postoupit smluvní přístav v [SCOPE.sState('treaty_port_state').GetName], čímž jsme zajistili pokračování obchodu s opiem na dlouhá léta."
 opium_wars.5.f: "„Je konec, pane vyslanče. Řekněte svému [SCOPE.sCountry('opium_wars_target_country').GetRuler.GetPrimaryRoleTitle], ať podepíše smlouvu, jinak budou následky vážné. Otevřete nám své přístavy, budete spolupracovat s našimi úředníky ve všech obchodních záležitostech, zaplatíte naše vojáky, kteří právě přinášejí zkázu vaší zemi. Podřídíte se.“"
 opium_wars.5.a: "[ROOT.GetCountry.GetName] vládne mořím!"
 opium_wars.5.b: "Ať kouří opium."
 opium_wars_navy_modifier: "Opiové války: Vláda nad moři"
 opium_wars_export_modifier: "Opiové války: Mistři obchodu"
 opium_wars.6.t: "Pašeráci opia"
 opium_wars.6.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] hlídky zadržely skupinu [SCOPE.sCountry('smuggler_country').GetAdjectiveNoFormatting] pašeráků převážejících opium do [ROOT.GetCountry.GetName]. Jde o zjevný pokus obejít embargo."
 opium_wars.6.f: "„Pašeráci? Kdepak! Jsme poctiví obchodníci, kteří legálně přepravují zboží do vaší krásné země.“\n\n„Samozřejmě máme všechny potřebné dokumenty. Chcete provést kontrolu lodi? To bohužel nepůjde. V nákladovém prostoru máme... ehm... masožravé jezevce.“\n\n„Ujišťuji vás, že jde o nedorozumění! Dejte ty ruce pryč! Požaduji setkání s [SCOPE.sCountry('smuggler_country').GetAdjectiveNoFormatting] velvyslancem!“"
 opium_wars.6.a: "Popravit pašeráky."
 opium_wars.6.b: "Vrátit je v okovech."
 executed_opium_smugglers: "Poprava pašeráků opia"
 returned_opium_smugglers: "Ponížení pašeráci opia"
 opium_wars.7.t: "Uzdravování ze závislosti"
 opium_wars.7.d: "Opatření přijatá [ROOT.GetCountry.GetAltAdjective('I')] při řešení opiové krize přinášejí výsledky. Obyvatelé [SCOPE.sState('recovry_state').GetName] se plně zotavili a podobný pokrok lze pozorovat v celé oblasti."
 opium_wars.7.f: "„Byl jsem otupělý vůči myšlenkám i pocitům, upoutaný na lůžko a nevnímající svět. Znovu se hýbat, myslet, cítit a milovat všechny radosti života... a přesto stále cítím jeho vábení. Musím odolat.“"
 opium_wars.7.a: "Zdvojnásobme péči o nemocné."
 opium_wars.7.b: "Lásku k opiu nahradí láska k [ROOT.GetCountry.GetName]."
 opium_health_focus: "Léčba závislosti"
 opium_loyalty_focus: "Láska ke státu"
 opium_wars.8.t: "Závislost na opiu"
 opium_wars.8.d: "[SCOPE.sCulture('opium_addiction_pop').GetName] trpí vážnými následky závislosti na opiu. Užívání a zneužívání této látky se rozšířilo po celém [SCOPE.sState('opium_addiction_state').GetName]."
 opium_wars.8.f: "Požírač opia leží pod tíhou nočních můr; vidí vše, co by chtěl vykonat, jako člověk připoutaný k lůžku smrtelnou slabostí, který musí sledovat bezpráví páchané na tom, co miluje nejvíce. Proklíná pouta, která ho drží, dal by život za to, aby mohl vstát - ale je bezmocný jako dítě."
 opium_wars.8.a: "Tragické!"
 opium_wars.8.b: "Možná to můžeme řešit jako zdravotní problém."
 opium_addiction_state_mod: "Závislost na opiu"
 lesser_opium_addiction_state_mod: "Léčba závislosti na opiu"
 je_sick_man_main: "Nemocný muž Evropy"
 je_sick_man_main_reason: "Musíme modernizovat a obnovit Osmanskou říši."
 je_sick_man_main_goal: "Dokončete 4 „Tanzimat“ [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 je_sick_man_main_failure_movements_tt: "Kulturní menšinová [Concept('concept_political_movement','$concept_political_movements$')] na Balkáně získají větší podporu"
 je_sick_man_syria: "Tanzimat: Znovuzískání Sýrie"
 je_sick_man_syria_reason: "Sýrie byla ztracena ve prospěch egyptského tyrana, který si ji uzurpoval z našich právoplatných rukou. Musíme ji získat zpět!"
 je_sick_man_syria_status: "Zahájení diplomatické hry proti Egyptu může přinést podporu evropských [Concept('concept_great_power', '$concept_great_powers$')]."
 je_sick_man_egypt: "Tanzimat: Znovuzískání Egypta"
 je_sick_man_egypt_reason: "Po znovuzískání Sýrie bychom měli obrátit pozornost na Egypt. Právoplatně osmanské území se dostalo do rukou uzurpátora."
 je_sick_man_economy: "Tanzimat: Urbanizace"
 je_sick_man_economy_reason: "Naše ekonomika je zaostalá a málo urbanizovaná. Musíme se vydat na cestu industrializace."
 je_sick_man_education: "Tanzimat: Reforma vzdělávání"
 je_sick_man_education_reason: "Jen málo lidí v naší říši ovládá alespoň základní gramotnost. Měli bychom zřídit školy pro jejich vzdělávání a také vlastní instituce vyššího vzdělání."
 je_sick_man_education_goal: "Zvyšte gramotnost populace o 20 %."
 je_sick_man_separatism: "Tanzimat: Potlačení separatismu"
 je_sick_man_separatism_reason: "Už jsme ztratili Řecko a Srbsko; nesmíme dovolit, aby se naše říše rozpadla pod tlakem separatistických povstalců."
 je_sick_man_separatism_goal: "Následující musí platit po dobu 15 let:"
 je_sick_man_army: "Tanzimat: Modernizace armády"
 je_sick_man_army_reason: "Přestože byli janičáři rozpuštěni, je třeba udělat mnohem více pro modernizaci našich ozbrojených sil."
 finished_sick_man_tt: "Dokončil nebo selhal v záznamu Nemocný muž Evropy [concept_journal_entry]"
 sick_man.1.t: "Nemocný muž Evropy"
 sick_man.1.d: "[ROOT.GetCountry.GetName] se nachází v období postupného úpadku. Pokud znovu neprosadíme [ROOT.GetCountry.GetAdjectiveNoFormatting] suverenitu a nezískáme zpět své místo mezi světovými mocnostmi, hrozí nám katastrofa."
 sick_man.1.f: "Padli jsme, ale můžeme znovu povstat. Při Příznivém incidentu jsme sesadili janičáře, kteří si po staletí udržovali svou lakomou moc, a konečně tak umožnili reformy. Je toho však třeba udělat mnohem více. Především musíme nahradit janičáře skutečně moderní armádou. Kromě toho musíme obnovit postavení Vznešené Porty jako vrcholu civilizace. Vzdělání, urbanizace a suverenita budou hlavními pilíři [ROOT.GetCountry.GetAdjectiveNoFormatting] programu."
 sick_man.1.a: "Velké reformy jsou nutné."
 sick_man.2.t: "Tanzimat: Reorganizace"
 sick_man.2.desc: "[ROOT.GetCountry.GetName] se úspěšně modernizoval a znovu se prosadil na světové scéně. Pro [ROOT.GetCountry.GetAdjectiveNoFormatting] stát začíná nová éra."
 sick_man.2.f: "Vznešené. To je jediné slovo, které to vystihuje. Procházet se ulicemi Istanbulu a vidět moderní továrny a školy, sledovat stráže při vojenském výcviku. Krajina, která byla kdysi ovládána rolníky, je nyní poseta zářícími městy. A pomyslet, že ještě před několika desetiletími byla říše na pokraji zhroucení! Zatímco dříve na nás evropské mocnosti pohlížely s pohrdáním a chtivě usilovaly o rozdělení našich zemí, nyní jejich diplomaté hledí v úžasu na naše úspěchy a jsou nuceni nás uznat jako sobě rovné. Bůh je milosrdný!"
 sick_man.2.a: "Armáda by potřebovala další reformy."
 sick_man.2.b: "Měli bychom znovu dobýt Balkán!"
 sick_man.2.c: "Pokračujme v urbanizaci."
 sick_man.2.d: "Budeme těžit z přínosů vzdělání."
 ottoman_army_reform: "Reorganizace osmanské armády"
 ottoman_urbanization: "Osmanská urbanizace"
 ottoman_education: "Osmanské vzdělávání"
 sick_man.3.t: "Mrtvý muž Evropy"
 sick_man.3.d: "[ROOT.GetCountry.GetName] nedokázal modernizovat ani znovu prosadit své postavení na světové scéně. Supi začínají kroužit, zatímco poslední dny [ROOT.GetCountry.GetName] se blíží."
 sick_man.3.f: "Vznešená Porta umlká. Jen několik dní poté, co oznámil [SCOPE.sCharacter('ottoman_sultan').GetHerHis] úmysl abdikovat, pravděpodobně pod tlakem svých ministrů, byl [SCOPE.sCharacter('ottoman_sultan').GetPrimaryRoleTitle] nalezen mrtvý ve svých komnatách. Stejně jako naše drahocenná říše trpěl dlouhou, plíživou nemocí, která ho nakonec učinila neschopným nést tíhu koruny. Zlomený a pomatený stín svého někdejšího já."
 sick_man.3.a: "Patříme Alláhovi a k Němu se vracíme."
 je_meiji_restoration: "Čestná restaurace"
 je_meiji_restoration_reason: "Otevření #v $JAP$#! uvolnilo síly, které jsou mimo kontrolu vládnoucího #b šógunátu#!. Pobouřeni pronikáním dravých cizích mocností požadují radikálové z [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] sesazení $RULER_TITLE_SHOGUN$, obnovení moci #b $RULER_TITLE_EMPEROR$#! a vyhnání cizinců. Zároveň ambiciózní [SCOPE.gsInterestGroup('daimyo_ig').GetName] usilují využít slabosti šógunátu k prosazení vlastních zájmů.\n\nMá-li Japonsko najít své místo ve světě, musí uskutečnit reformy nezbytné k vlastní obraně a vyřešit konflikt mezi svými de iure a de facto vládci. Ať už sám nebo po boku šóguna, císař musí vládnout.\n\n@warning! Jak roste [Concept('concept_activism', '$concept_activism_short$')] [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')], frakce loajální císařskému dvoru se budou uchylovat k razantnějším prostředkům k obnovení císařovy moci."
 je_meiji_main: "Restaurace [ROOT.Var('emperor_var').GetCharacter.GetFirstName]"
 je_meiji_main_reason: "Císař byl navrácen k moci a proces znovuvybudování $JAP$#! může začít. Čeká nás mnoho práce. Zahraniční mocnosti nás sledují s dychtivým zájmem. Musíme být schopni odolat jejich tlaku nejen vojensky, ale i ekonomicky a politicky:\n\n• [SCOPE.GetRootScope.GetCountry.GetCustom('meiji_je_conditions_army')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('meiji_je_conditions_economy')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('meiji_je_conditions_diplomacy')]\n\nMusíme vybudovat nové $JAP$#!, dokud je železo žhavé, a využít této příležitosti k utváření země způsoby, o nichž naši předkové ani nesnili."
 je_meiji_main_goal: "Dokončete všechny 3 restaurace [Concept('concept_journal_entry', '$concept_journal_entries$')]"
