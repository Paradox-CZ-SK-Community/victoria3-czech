 je_rubber: "Rozšiřte gumárenský průmysl"
 je_rubber_reason: "Využití gumy je nespočetné, zásoby jsou nízké a poptávka vysoká. Máme ideální podmínky stát se jedním z předních světových dodavatelů této pozoruhodné suroviny!"
 rubber_production_modifier: "Gumový boom"
 production_tech_events.1.t: "Gumový boom"
 production_tech_events.1.d: "Nedávné rozšíření [SCOPE.sBuilding('rubber_building').GetName] ve [SCOPE.sState('rubber_state').GetName] přineslo mimořádně slibné výsledky. [ROOT.GetCountry.GetName] má potenciál stát se světovým lídrem ve výrobě gumy."
 production_tech_events.1.f: "„Otázkou není, co lze s gumou dělat, ale co dělat nelze. Její využití nemá konce a jistě se stane základním materiálem moderního světa. Naši nejlepší myslitelé vyvíjejí nové způsoby využití tohoto všestranného materiálu.“"
 production_tech_events.1.a: "Potřebujeme více gumy!"
 production_tech_events.1.b: "Jaké další využití by mohla mít?"
 je_mechanized_farming: "Mechanizujte zemědělství"
 je_mechanized_farming_reason: "Budoucnost zemědělství je tady! Díky moderním technologiím můžeme dramaticky zvýšit zemědělskou produkci. S tak obrovským přebytkem potravin už přece nikdo nebude hladovět!"
 production_tech_events.600.t: "Mechanizace zemědělství"
 production_tech_events.600.d: "Velký projekt mechanizace zemědělství v [ROOT.GetCountry.GetName] je dokončen. Nikdy dříve nebyly zaznamenány tak hojné výnosy."
 production_tech_events.600.f: "„Mám úplně nový kombajn!“\n„To je skvělé! Myslíš, že bych si ho mohl po sklizni půjčit?“\n„Samozřejmě! Dám ti klíče.“\n„Jsem rád, že můžeme spolupracovat v tak dokonalé harmonii.“"
 production_tech_events.600.a: "Rozdělte přebytek potravin chudým."
 production_tech_events.600.b: "Ale mohly by být výnosy ještě vyšší?"
 tractor_food_for_the_poor: "Distribuce potravinového přebytku"
 tractor_production: "Rychlá mechanizace"
 je_atmospheric_engine: "Atmosférický stroj"
 je_atmospheric_engine_reason: "Bylo vynalezeno důmyslné zařízení, které jistě výrazně zvýší výkonnost našich dolů."
 production_tech_events.601.t: "Atmosférický stroj"
 production_tech_events.601.d: "Díky širokému zavedení atmosférického stroje v těžebním průmyslu dosahuje produktivita historického maxima."
 production_tech_events.601.f: "„Když pára začala pohánět stroje a kola se otáčet v tolika otáčkách za minutu, vznikly takzvané pracovní návyky, které měly přizpůsobit život člověka chodu parního stroje a jeho pohyb soupeřit s přesností stroje.“"
 production_tech_events.601.a: "Určitě z těchto strojů dokážeme dostat ještě víc."
 production_tech_events.601.b: "To má velký význam pro dopravu."
 production_tech_events.601.c: "Možná existuje ještě lepší řešení."
 atmospheric_engine_mining: "Využití atmosférického stroje"
 je_communism_1: "Přízrak obcházející svět"
 je_communism_1_reason: "Rostoucí výskyt socialistických nepokojů v [SCOPE.sCountry('root_country').GetName] se začíná sjednocovat v hnutí, které ohrožuje vládu vyšších tříd. Třídní boj nabývá ostřejších obrysů, protože [SCOPE.sCountry('root_country').GetAdjectiveNoFormatting] dělníci přijímají metody a principy socialistického hnutí.\n\n#italic Hlasy proletariátu volají po svobodě, rovnosti a chlebu. Proletáři všech zemí, spojte se!#!"
