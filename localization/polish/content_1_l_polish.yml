 je_strike_promise_reason: "Stávkujícím odborům jsme slíbili, že do deseti let prosadíme konkrétní legislativu. Pokud tento slib nesplníme, můžeme očekávat katastrofální generální stávku."
 je_strike_break: "Stávka: Zlomte stávku!"
 je_strike_break_status: "Měli bychom využít všechny dostupné prostředky ke snížení nepokojů ve státech zasažených stávkou."
 je_strike_break_reason: "Probíhající stávky brzdí produktivitu. Průmyslníci nás požádali, abychom situaci vyřešili v jejich prospěch."
