 cable_street.1.t: "Bitva o [SCOPE.sState('fascist_rally_state').GetCityHubName]"
 cable_street.1.d: "[SCOPE.sCharacter('fascist_leader').GetFullName] a [SCOPE.sParty('fascist_party').GetName] plánují velké shromáždění ve státě [SCOPE.sState('fascist_rally_state').GetName]. Očekávají vášnivý odpor antifašistických skupin volně organizovaných pod hlavičkou [SCOPE.gsInterestGroup('antifa_ig').GetName]."
 cable_street.1.f: "„Na barikády! Pryč s fašisty! Neprojdou!“"
 cable_street.1.a: "Musíme chránit jejich právo pochodovat."
 cable_street.1.b: "Nechme je bojovat, nebudeme zasahovat."
 cable_street.1.c: "Zakázat shromáždění."
 protected_fascist_rally: "Chráněné fašistické shromáždění"
 banned_fascist_rally: "Zakázaná fašistická shromáždění"
 heavenly.1.t: "Misionářská činnost v [SCOPE.sState('missionary_state').GetName]"
 heavenly.1.d: "Zahraniční misionáři sídlící v [SCOPE.sCountry('treaty_port_owner').GetAdjective] [SCOPE.sState('treaty_port_scope').GetName] požádali o povolení stavět školy a nemocnice ve státě [SCOPE.sState('missionary_state').GetName]. Tyto instituce nepochybně využijí k šíření své víry."
 heavenly.1.f: "„Jak lépe šířit slovo Páně než skrze uzdravování? Ti, kdo najdou cestu do naší nemocnice, najdou i cestu k Bohu.“"
 heavenly.1.a: "Povolit výstavbu škol a nemocnic"
 heavenly.1.b: "Nechceme jejich cizí víru."
 missionary_schools_hospitals: "Misionářské školy a nemocnice"
 heavenly.2.t: "Společenství uctívačů Boha"
 heavenly.2.d: "V [SCOPE.sState('cult_state').GetName] se objevila podivná sekta. Kombinuje prvky místních náboženství i křesťanství a její vůdce věří, že je mladším bratrem Ježíše Krista."
 heavenly.2.f: "„Mé oči vidí za západ, sever, řeky i hory,\nMůj hlas otřásá východem, jihem, Sluncem i Měsícem.“"
 heavenly.2.a: "Zvláštní a znepokojivé."
 heavenly.3.t: "Uctívači Boha v [SCOPE.sState('cult_growth_state').GetName]"
 heavenly.3.d: "Společenství uctívačů Boha je fanaticky evangelizační a podařilo se mu získat početné stoupence ve státě [SCOPE.sState('cult_growth_state').GetName]."
 heavenly.3.f: "„Snadno nacházejí nové stoupence mezi chudými a utlačovanými, lidmi, které stát opomíjí nebo zklamal.“"
 heavenly.3.a: "To nemůže dopadnout dobře."
 heavenly.4.t: "Nebeské království"
 heavenly.4.d: "Fanatici ze Společenství uctívačů Boha povstali proti nám v reakci na naši diskriminační politiku. Založili [SCOPE.sState('heavenly_kingdom_spawn').GetName] jako svou základnu a brzy ovládnou i další státy, kde má sekta vliv."
 heavenly.4.f: "„Slavný meč moci byl dán Pánem,\nBásně a knihy jsou důkazem chvály Jahveho.\nTchaj-pching sjednocuje svět světla,\nVládnoucí duch bude radostný po tisíciletí.“"
 heavenly.4.a: "Zničíme je beze zbytku!"
 heavenly.5.t: "Pád nebes"
 heavenly.5.d: "Nebeské království bylo poraženo. Musíme rozhodnout, jak naložit s následky povstání; stoupenci sekty jsou stále aktivní a mohou nám v budoucnu působit potíže."
 heavenly.5.f: "„Domnělý bratr Krista byl sťat a spálen. Jeho popel byl vystřelen z děla. Nenajde věčný klid, neboť zneuctil náš národ. Byl zcela zničen, a takový osud čeká všechny, kdo se nám postaví.“"
 heavenly.5.a: "Povraždit zbývající pohany."
 mass_reconversion_tt: "#variable 10%#! všech ne[SCOPE.sReligion('state_religion_scope').GetName] [Concept('concept_pop', '$concept_pops$')] v [SCOPE.sCountry('china_scope').GetName] konvertuje na [SCOPE.sReligion('state_religion_scope').GetName]."
 heavenly.5.b: "Projevit milost a nabídnout bývalým povstalcům amnestii."
 heavenly.6.t: "Vzestup nebes"
 heavenly.6.d: "[ROOT.GetCountry.GetName] svrháví vládu kultury [SCOPE.sCulture('manchu_culture').GetName]. Náš stát musí přetrvat a šířit slovo Boží po celé Číně."
 heavenly.6.d1: "[ROOT.GetCountry.GetName] si zajistil nezávislost na [SCOPE.sCountry('china_scope').GetAltAdjective('L')]. Náš stát musí přetrvat a být schopen se bránit proti odvetě [SCOPE.sCountry('china_scope').GetAdjective]."
 heavenly.6.f: "Když lidé na této zemi nebudou nic držet pro vlastní potřebu, ale vše odevzdají Bohu k společnému užívání, pak bude mít každé místo stejný podíl a všichni budou oděni i nasyceni."
 heavenly.6.a: "Upřednostnit šíření slova Božího mezi lidem."
 heavenly.6.b: "Reformy Nového pojednání posunou náš stát vpřed."
 heavenly.6.b1: "Nové pojednání [SCOPE.sCharacter('hong_rengan_scope').GetFullName] nás posune vpřed."
 heavenly.6.c: "Připravíme se na novou válku proti [SCOPE.sCulture('manchu_culture').GetName] ďáblům."
 heavenly.6.e: "Nastal čas navázat vztahy se západními mocnostmi."
