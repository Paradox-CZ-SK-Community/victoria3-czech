 je_cuba_la_vida_dulce_reason: "Kuba ovládla obchod s cukrem, z velké části díky pokračujícímu pašování [GetPopType('slaves').GetName]. Dlouhodobá prosperita národa bude záviset na rozšiřování těchto zavedených tras [concept_trade]. \n\nPokud bude otroctví zrušeno, možná se jednoho dne budou moci všichni Cubanos těšit ze sladšího života."
