l_polish:
 je_cuba_espanol: "Cuba es España"
 je_cuba_espanol_reason: "Kuba zůstává věrná zemi [ROOT.GetCountry.GetOverlord.GetNameNoFlag]. Natolik věrná, že reformisté mezi [SCOPE.gsInterestGroup('landholders').GetName] usilují o to, aby byla [ROOT.GetCountry.GetNameNoFlag] uznána jako formální [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] provincie s odpovídajícím zastoupením v cortes a aby bílí [SCOPE.sCulture('caribeno').GetName] gentlemani byli od nynějška považováni za [SCOPE.sCulture('spanish').GetName]. Mnozí ostrovní [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ové jejich nárok podporují.\n\nJak se Cubanos a Španělé stále více politicky i ekonomicky proplétají, existuje šance, že se sen reformistů naplní; Kuba už nebude kolonií, ale skutečnou součástí země [ROOT.GetCountry.GetOverlord.GetNameNoFormatting]."
