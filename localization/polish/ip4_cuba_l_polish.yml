 je_cuba_promise_freedom_button: "Slíbit svobodu otrokům"
 je_cuba_promise_freedom_button_desc: "Slibujeme, že během nadcházející války osvobodíme otroky ostrova, čímž přesvědčíme mnohem více radikálů kultury [GetCulture('afro_caribeno').GetName], aby se přidali k naší věci."
 slave_revolt_adds_ld_tt: "Politické hnutí otrockého povstání nyní bude k naší [concept_liberty_desire] přispívat, namísto toho aby ji snižovalo"
 slaves_will_be_freed_after_war_tt: "Pokud dosáhneme vítězství, [concept_slavery] bude zakázáno"
 je_cuba_promise_freedom_bar_above_50: "Sentiment #v $je_cuba_total_bar$#! musí být vyšší než 50"
 afro_caribeno_fervor_factor_increase_tt: "[concept_fervor] kultury [GetCulture('afro_caribeno').GetName] nás posune ještě dále od připojení k zemi [SelectLocalization(SCOPE.sCountry('csa').Exists, 'CSA', 'USA')] a směrem ke skutečné nezávislosti"
 je_cuba_promise_equality_button: "Slíbit rovnost lidem [GetCulture('afro_caribeno').GetCustom('getPluralDemonym')]"
 je_cuba_promise_equality_button_desc: "Slibujeme, že v nezávislé zemi [ROOT.GetCountry.GetNameNoFormatting] dáme všem národům rovné postavení, čímž přesvědčíme mnohem více radikálů kultury [GetCulture('afro_caribeno').GetName], aby se přidali k naší věci."
 afro_caribeno_future_equality: "[GetCulture('afro_caribeno').GetName] se stane jednou z [Concept('concept_primary_cultures','$concept_primary_culture$')] země [ROOT.GetCountry.GetNameNoFlag], jakmile bude vítězství naše."
 je_cuba_ask_usa_to_buy: "Vyjednat koupi Kuby"
 je_cuba_ask_usa_to_buy_desc: "„Koupě a anexe Louisiany vedla k nezbytnému důsledku v podobě Floridy a obě s neomylnou jistotou ukazují k získání Kuby.“ \n-John Slidell, senátor USA."
 cuba_must_want_to_join_usa_tt: "Hledači svobody se musí chtít připojit k zemi [SelectLocalization(SCOPE.sCountry('csa').Exists, 'CSA', 'USA')], namísto toho aby usilovali o skutečnou nezávislost."
 je_cuba_join_usa_base_price: "Základní cena"
 je_cuba_join_usa_cuba_value_price: "Kubánský [concept_gdp]"
 cuba_must_want_to_fight_tt: "Hledači svobody musí být připraveni bojovat za svou svobodu, namísto toho aby usilovali o odkoupení USA."
 cuba_prepare_for_war: "Připravit se na válku"
 je_cuba_independence_war: "Příprava na válku"
 je_cuba_independence_war_desc: "Nastal čas vybojovat svobodu našeho národa."
 cuba_independencia.1.t: "El Futuro de Cuba"
 cuba_independencia.1.d: "Budoucnost Kuby zůstává nerozhodnutá. Zůstane ostrov se Španělskem, připojí se k USA jako Florida, vyhlásí nezávislost, nebo se promění skrze ohnivé otrocké povstání?"
 cuba_independencia.1.f: "„Blízká budoucnost ukáže, zda je pravděpodobné dosažení nezbytné podmínky spravedlivého míru, stejně spravedlivého pro Kubánce i Španěly... Pokud ne, zůstane nutnost dalších a jiných kroků ze strany USA. Až ten čas přijde, budou tyto kroky určeny v souladu s nesporným právem a povinností.“ \n\n-William McKinley, 25. prezident Spojených států"
 cuba_independencia.1.a: "Kuba bude požehnána, ať už bude její budoucnost jakákoli."
 cuba_independencia.2.t: "Zahájení jednání"
 cuba_independencia.2.d: "S dostatečnou podporou doma jsme nyní v pozici, kdy můžeme usilovat o užší vztahy se zemí [SCOPE.sCountry('cuba_buyer').GetName] a uniknout [SCOPE.sCountry('cuba_overlord').GetAdjective] jhu. Vyjednavači jsou připraveni navrhnout plán [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] získání Kuby."
 cuba_independencia.2.f: "„Naše země není kolonie určená k anexi!“ vykřikl řečník.\n\nTicho, které následovalo v této místnosti spiklenců, bylo smrtelné. Jeden muž se neklidně zavrtěl na židli. „Můj příteli...“ utěšoval ho, „všichni milujeme Kubu, ale co můžeme dokázat sami? Představ si, jakou #italic moc#! bychom mohli mít v té velké rodině států na severu!“\n\n„Moc!“ odfrkl si první řečník. „Možná moc pro #italic tebe#!.“ Temným pohledem přejel místnost. „Pokud je toto naše rozhodnutí, pak ať nás všechny Bůh chrání.“"
 cuba_independencia.2.a: "Uvidíme, zda tato jednání přinesou ovoce!"
 cuba_independencia.2.b: "Nebuďme ukvapení. Měli bychom to přehodnotit."
 cuba_negotiation_warning_tt: "#r Po dobu #b 3#! let se nebudeme moci znovu pokusit o jednání.#!"
 cuba_independencia.3.t: "Nabídka kubánských vyslanců"
 cuba_independencia.3.d: "Vyslanci zastupující mocné zájmy v zemi [SCOPE.sCountry('cuba').GetName] nás oslovili s příležitostí: podpora americké kontroly nad Kubou je dostatečně vysoká na to, že by mohlo být možné Kubu od země [SCOPE.sCountry('cuba_overlord').GetName] #italic odkoupit#!."
 cuba_independencia.3.f: "„Samozřejmě, že bychom to měli udělat!“ zahřměl jeden hlas v zakouřené místnosti. „Kuba je pro nás stejně nezbytná jako kterýkoli člen, který je nyní součástí země, a přirozeně patří do naší velké rodiny států.“\n\nZakašlal a na okamžik jeho mávající ruka proťala kouř, svírajíc doutník. „Kromě toho je tam taková #italic příležitost#!.“"
 cuba_independencia.3.a: "Zajímavá nabídka! Promluvme si se zemí [SCOPE.sCountry('cuba_overlord').GetName] ihned."
 if_spain_accepts_purchase_tt: "#b Pokud bude dohoda přijata:#!"
 cuba_independencia.3.b: "Tento plán je v současnosti v našem zájmu."
 cuba_independencia.4.t: "[SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] nabídka "
 cuba_independencia.4.d: "Diplomaté ze země [SCOPE.sCountry('cuba_buyer').GetName] nás oslovili s nabídkou odkoupit od nás [SCOPE.sCountry('cuba').GetName] za knížecí sumu. Podpora [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] věci je v zemi [SCOPE.sCountry('cuba').GetNameNoFormatting] vysoká a existuje šance, že celý tento plán podnítila nějaká frakce v kolonii. Nejprve však budeme muset zvážit [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] návrh."
 cuba_independencia.4.f: "#italic Kuba byla prvním korunním klenotem říše, Havana srdcem tolika podniků, tolika sláv. Je součástí základů všeho, na čem stojí velikost Španělska!#!\n\n#italic Ale... za tím číslem, které nám [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] diplomaté dali, následuje#! mnoho a mnoho #italic nul.#!"
 if_we_accept_purchase_tt: "#b Pokud Kubu prodáme:#!"
 cuba_independencia.4.a: "Kuba má cenu nečekaného bohatství!"
 cuba_independencia.4.b: "Kuba není na prodej!"
 cuba_independencia.5.t: "Kubánský plán odmítnut"
 cuba_independencia.5.d: "Jednání se zemí [SCOPE.sCountry('cuba_overlord').GetName] o koupi země [SCOPE.sCountry('cuba').GetName] selhala."
 cuba_independencia.5.f: "„Už si nemůžeme dovolit přehlížet mezinárodní rivality, když jsme se sami stali konkurentem v celosvětovém boji o obchod. Příležitost musí být #italic uchopena#! a už nikdy nesmíme dovolit, aby nám tak skvělé šance proklouzly mezi prsty.“"
 cuba_independencia.5.a: "Rozhodnutí země [SCOPE.sCountry('cuba_overlord').GetNameNoFormatting] je zklamáním."
 cuba_independencia.5.b: "Rozhodnutí země [SCOPE.sCountry('cuba_overlord').GetNameNoFormatting] je nešťastné."
 cuba_independencia.6.t: "[SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting] akvizice"
 cuba_independencia.6.d: "[SCOPE.sCountry('cuba_overlord').GetName] přijala nabídku prodat nás. Naše budoucnost nyní patří zemi [SCOPE.sCountry('cuba_buyer').GetName]."
 cuba_independencia.6.f: "Spiklenci tiše seděli v temné místnosti. „Nuže, přátelé,“ zabručel jeden zasmušilý hlas, „dokázali jste to. Kuba je nyní [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting]. Co teď?“\n\nPokračující ticho bylo jedinou odpovědí, které se mu dostalo."
 cuba_independencia.6.a: "Budoucnost je [SCOPE.sCountry('cuba_buyer').GetAdjectiveNoFormatting]!"
 cuba_independencia.6.b: "Připijme na nové partnerství se zemí [SCOPE.sCountry('cuba_buyer').GetNameNoFormatting]!"
 cuba_independencia.7.t: "Smlouva na Kubu"
 cuba_independencia.7.d: "Díky obratné diplomacii a podpoře [SelectLocalization(SCOPE.sCountry('cuba').Exists, SCOPE.sCountry('cuba').GetAdjectiveNoFormatting, 'kubánského')] lidu je [SelectLocalization(SCOPE.sCountry('cuba').Exists, SCOPE.sCountry('cuba').GetNameNoFormatting, 'Kuba')] nyní naše."
 cuba_independencia.7.f: "„Na Kubě se mnohé změní,“ usmál se [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting], „a změní se to díky #italic našemu#! úsilí. Stará říše se dnes hroutí a čeká nás krásný zítřek.“"
 cuba_independencia.7.a: "Třikrát sláva Kubě!"
 cuba_events.1.t: "La Vida Dulce"
 cuba_events.1.d: "Lodě nepřestávají připlouvat a odplouvat z přístavu města [ROOT.GetCountry.GetCapital.GetCityHubName] a zajišťují naše obchodní dědictví pro další generace. Jedinou otázkou je, jak bychom měli ze své prosperity těžit."
 cuba_events.1.f: "„Kdo mluví o hospodářské unii, mluví o politické unii. Národ, který kupuje, poroučí; národ, který prodává, slouží. Obchod musí být vyvážený, aby zajistil svobodu. Národ, který chce zemřít, prodává pouze jednomu národu, a národ, který má být zachráněn, prodává více než jednomu.“ \n\n-José Martí"
 cuba_events.1.independence: "Představte si naše bohatství, kdybychom se odtrhli od země [SCOPE.sCountry('boss').GetName]."
 cuba_events.1.fix: "Představte si naše bohatství, kdybychom se odtrhli od Španělska."
 cuba_events.1.a: "Přípitek na náš trvalý úspěch!"
 cuba_events.1.b: "Výnosy musíme využít k modernizaci."
 cuba_events.1.c: "Prospěch by měli mít všichni Kubánci."
 cuba_events.2.t: "La Siempre Fiel Isla de Cuba"
 cuba_events.2.d: "Reformističtí [SCOPE.gsInterestGroup('landholders').GetName] úspěšně přesvědčili své [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] protějšky, aby formálně začlenili [ROOT.GetCountry.GetNameNoFlag] jako [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] provincii."
 cuba_events.2.f: "[ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] vstoupil do cortes už ne jako [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], nýbrž jako pouhý zástupce nejnovější [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] provincie [ROOT.GetCountry.GetNameNoFormatting]. Přesto navzdory zjevnému snížení [ROOT.GetCountry.GetRuler.GetHerHis] postavení pohlédl na dřevěné lavice půlkruhového sálu, poté vzhůru ke stropu pomalovanému Carlosem Luisem de Riberou, kde byla dokonce malba [ROOT.GetCountry.GetOverlord.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetOverlord.GetRuler.GetFullNameNoFormatting], a nemohl si pomoci, aby ve svém srdci nepocítil záchvěv strnulé hrdosti. \n\n„Viva España,“ zamumlal si pod vousy a poté se pustil do práce, aby svému [ROOT.GetCountry.GetAdjectiveNoFormatting] - ba ne, svému [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] - lidu přinesl co nejlepší život."
 cuba_events.2.a: "¡Viva España!"
 cuba_events.2.b: "Jeden iberský národ."
 cuba_events.2.c: "Měli bychom si ponechat určitou oddělenost."
 cuba_events.2.e: "Vlastně je to hrozný nápad."
 cuba_if_spa_player_tt: "Pokud je [ROOT.GetCountry.GetOverlord.GetName] hráčem, budeme mít také možnost stát se [concept_dominion]"
 cuba_events.3.t: "Un Camino Differente"
 cuba_events.3.d: "Reformističtí [SCOPE.gsInterestGroup('landholders').GetName] nedokázali přesvědčit své [ROOT.GetCountry.GetOverlord.GetAdjectiveNoFormatting] protějšky ani kubánské obyvatelstvo, že unie se zemí [ROOT.GetCountry.GetOverlord.GetName] bude uskutečnitelná. Národ nyní pevně usiluje o větší autonomii."
 cuba_events.3.f: "„Práva se berou, nežádá se o ně; uchvacují se, nevyprošují.“\n\n-José Martí"
 cuba_events.3.a: "¡Viva Cuba!"
 cuba_events.3.b: "Nemůžeme dopustit, aby to ovlivnilo obchod."
 cuba_events.3.c: "Nyní nastal čas, aby otroci kultury [SCOPE.sCulture('afro_caribeno').GetName] povstali."
 cuba_events.3.c.fix: "Je čas rozbít tyto okovy."
