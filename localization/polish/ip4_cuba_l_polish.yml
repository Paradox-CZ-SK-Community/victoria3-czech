 je_cuba_independencia: "Independencia"
 je_cuba_independencia_reason: "Kubánská touha po svobodě je rozdělená. \n\nNěkteří hledají spojence za Mexickým zálivem a doufají, že svobodu ostrova vykoupí americkými mincemi, nikoli kubánskou krví. Mezitím se na podlahách doutníkáren šeptá o svobodné Kubě, nespoutané žádnou mocí kromě vášně a vůle jejího lidu.\n\n#v Která cesta ke svobodě?#!\nNejprve musí národ získat dostatečný [concept_liberty_desire], jinak svoboda od země [ROOT.GetCountry.GetOverlord.GetName] zůstane pouhým snem. Poté různé #tooltippable;tooltip:[GetPlayer.GetTooltipTag],total_factors_tt faktory#! povedou hledače svobody buď k touze být odkoupeni zemí [SelectLocalization(SCOPE.sCountry('csa').Exists, SCOPE.sCountry('csa').GetNameNoFormatting, SCOPE.sCountry('usa').GetDefinition.GetName)], nebo k úsilí o skutečnou nezávislost."
