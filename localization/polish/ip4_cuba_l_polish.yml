 je_cuba_total_drift_tt: "posun od současné hodnoty #variable [ROOT.GetCountry.MakeScope.Var('independencia_current').GetValue|0]#! směrem k cílové hodnotě #tooltippable;tooltip:[GetPlayer.GetTooltipTag],total_factors_tt [SCOPE.ScriptValue('je_cuba_independencia_bar_target')|0]#!:\n\nTato hodnota představuje vůli hledačů svobody, přičemž nižší konec škály (směrem k #v 0#!) znamená proamerické smýšlení a vyšší konec (směrem k #v 100#!) představuje touhu po úplné nezávislosti.\n\nCílová hodnota #v [SCOPE.ScriptValue('je_cuba_independencia_bar_target')|0]#! vychází z následujících faktorů:\n[GetPlayer.MakeScope.GetScriptValueDesc('je_cuba_independencia_bar_target')]"
