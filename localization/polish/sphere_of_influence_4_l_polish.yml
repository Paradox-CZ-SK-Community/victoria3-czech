 objective_great_game: "Velká hra"
 objective_great_game_desc: "Nové století značí začátek dlouhého konfliktu vedeného napříč největším kontinentem světa prostřednictvím intrik, války a obratné diplomacie. Veďte Rusko a Británii k ovládnutí Asie, nebo veďte Afghánistán či Persii po cestě ke svrchovanosti."
