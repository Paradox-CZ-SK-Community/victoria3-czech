 je_donghak_movement: "Hnutí Tonghak"
 je_donghak_movement_reason: "Tonghak neboli východní učení se začalo šířit mezi [GetPopType('peasants').GetName] země [ROOT.GetCountry.GetName] jako reakce na otevření země okolnímu světu. Stoupenci Tonghaku, často napojení na [SCOPE.gsInterestGroup('donghak_ig').GetName], prosazují rovnost a práva pro všechny a odmítání cizího vlivu.\n\nInfrastruktura, kterou stoupenci Tonghaku vytvořili, se šíří po celé zemi a v budoucnu může sloužit jako prostředek k rychlé organizaci povstání."
 donghak_petition_complete_tt: "Dokončilo [concept_journal_entry] #bold Kjodžo sinwon#!"
 je_gyojo_shinwon: "Kjodžo sinwon"
 je_gyojo_shinwon_reason: "Stoupenci Tonghaku mezi [SCOPE.gsInterestGroup('donghak_ig').GetName] předložili vládě petici požadující toleranci doktríny Tonghak, vyhnání cizinců a popravu zkorumpovaných členů [SCOPE.gsInterestGroup('yangban_ig').GetName].\n\nSlib vlády, že vyslechne požadavky hnutí, dočasně snížil společenský neklid mezi jeho stoupenci, ale obrátit se k petentům zády jistě povede k obnovení revoluční činnosti."
 je_korean_rebellion: "Korejské povstání"
 je_korean_rebellion_reason: "Povstání propukající napříč zemí [SCOPE.sCountry('korea_scope').GetName] ohrozilo rovnováhu moci v zemi. Svržení [SCOPE.sCharacter('korea_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('korea_ruler_scope').GetFullName] jistě povede k nezávislosti země [SCOPE.sCountry('korea_scope').GetNameNoFormatting] a k příležitostem pro evropské mocnosti získat vliv na poloostrově."
 korean_ruler_retained_tt: "[SCOPE.sCharacter('korea_ruler_scope').GetFullName] zůstává [SCOPE.sCharacter('korea_ruler_scope').GetPrimaryRoleTitle] země [SCOPE.sCountry('korea_scope').GetName]"
 korean_ruler_deposed_tt: "Vláda země [SCOPE.sCountry('korea_scope').GetName] byla svržena [concept_revolution]"
 japan_demands_korea_tt: "Budeme mít příležitost získat #bold dodatečný vliv#! v zemi [SCOPE.sCountry('korea_scope').GetName]"
 korea_fail_condition_war_tt: "[SCOPE.sCountry('korea_rebellion_scope').GetName] je ve [concept_war] se zemí [SCOPE.sCountry('korea_scope').GetName]"
 korea_fail_condition_rebels_tt: "Nepostavili jsme se na stranu země [SCOPE.sCountry('korea_rebellion_scope').GetName] v její [concept_diplomatic_play] proti zemi [SCOPE.sCountry('korea_scope').GetName]"
 korea_fail_condition_gov_tt: "Nepostavili jsme se na stranu země [SCOPE.sCountry('korea_scope').GetName] v její [concept_diplomatic_play] proti zemi [SCOPE.sCountry('korea_rebellion_scope').GetName]"
 gg_korea.1.t: "Tonghak"
 gg_korea.1.d: "[GetPopType('peasants').GetName] inspirovaní filozofií Tonghaku se začali organizovat napříč zemí [ROOT.GetCountry.GetName]. Jejich volání po sociální rovnosti, náboženské toleranci a vyhnání cizího vlivu je stále obtížnější ignorovat."
 gg_korea.1.f: "Když nastal rok Sinju, přicházeli ke mně učenci ze všech stran a ptali se: „Když sestupuje božský duch, mistře, co to znamená?“\n\nOdpověděl jsem: „Obsahuje princip nevyčerpatelného návratu.“\n\n„Jakým jménem tedy máme tuto cestu nazývat?“\n\n„Je to Cesta nebes.“\n\n„Liší se od západní cesty?“\n\n„Západní učení má své odlišnosti, podobné zaříkávadlům bez podstaty. Přesto je pohyb stejný, cesta je jednotná, ale princip nikoli.“" #- Donggyeong Daejeon
 gg_korea.1.a: "Rýsuje se další rolnická válka?"
 gg_korea_effect_tt: "Dokud je aktivní #v Hnutí Tonghak#!, [SCOPE.gsInterestGroup('donghak_ig').GetName] bude posílena a [Concept('concept_revolution','$concept_revolutions$')] budou pro naši zemi představovat větší hrozbu"
 gg_korea.2.t: "Povstání Tonghak"
 gg_korea.2.d: "Nespokojenost mezi [SCOPE.gsInterestGroup('donghak_ig').GetName] přerostla v počátek otevřeného konfliktu. Napříč zemí [ROOT.GetCountry.GetName] využili rolníci infrastrukturu Tonghaku k organizaci revoluce."
 gg_korea.2.f: "Rozkazy byly rozeslány všem ve městě. Měli co nejrychleji vyrazit do [ROOT.GetCountry.GetCapital.GetCityHubName], vyhnat cizince a zabít každého člena rodiny [SCOPE.sCharacter('gov_leader_scope').GetLastNameNoFormatting].\n\nMěl to být milosrdný pochod, který ušetří nevinné i jejich majetek, zaplatí za zásoby a všem, kdo je uvidí, ukáže jejich loajalitu a zbožnost. Od chování vládních vojáků to bylo tak daleko, jak jen mohlo být."
 gg_korea.2.a: "Povolejte vojska a připravte se k boji."
 gg_korea.3.t: "Východní učení"
 gg_korea.3.d: "V provincii [SCOPE.sState('choi_je_woo_state').GetName] se objevila nová doktrína, Tonghak, kterou prosazuje [SCOPE.sCharacter('choi_je_woo_scope').GetFullName]. Volá po rovnosti pro všechny a nastolení ráje na zemi."
 gg_korea.3.f: "„Se západními vítězstvími a výboji se úspěch zdá nevyhnutelný, a přece přináší zkázu všem, nářek nad nevyhnutelným pádem. Jak tedy můžeme zabezpečit národ a přinést jeho lidu mír? Běda, v této době si lidé nejsou vědomi svého štěstí; když slyší tato slova, někteří mohou souhlasit a jiní odporovat, rozmlouvat v uličkách, ve strachu pramenícím z nedostatku ctnosti.“" #- Donggyeong Daejeon
 gg_korea.3.a: "Balzám na strasti lidu."
 gg_korea.3.b: "Podvodník a hrozba pro svět."
 gg_korea.4.ta: "Petice v Samrje"
 gg_korea.4.tb: "Petice v [SCOPE.sState('petition_state').GetFarmHubName]"
 gg_korea.4.d: "Věřící Tonghaku předložili vládě [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] petici s řadou reforem. Patří mezi ně náboženská tolerance, vyhnání cizinců a poprava zkorumpovaných úředníků."
 gg_korea.4.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] se seznámil se stoupenci Tonghaku prostřednictvím zpráv o jejich organizování na venkově a nesčetných malých petic a dopisů, které byly zaslány jak [ROOT.GetCountry.GetRuler.GetHerselfHimself], tak [ROOT.GetCountry.GetRuler.GetHerHis] úředníkům. Všechny se nesly ve stejném duchu – prohlášení o nejvyšší loajalitě k [ROOT.GetCountry.GetRuler.GetHerHim] následovaná vysvětlením jejich žádostí.\n\nNebyla to první petice svého druhu, uvažoval [ROOT.GetCountry.GetRuler.GetSheHe], ale rozhodně byla nejviditelnější. Měl dvě možnosti. Odcizit si nově organizované rolnictvo, nebo vyvolat hněv vlastního dvora?"
 gg_korea.4.a: "Pohrozte odvetou, pokud se nerozejdou."
 gg_korea.4.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] tuto petici vyslechne."
 gg_korea.5.t: "Nebe skrze trpělivost"
 gg_korea.5.d: "Pečlivými reformami a spoluprací s [SCOPE.gsInterestGroup('donghak_ig').GetName] jsme úspěšně uklidnili hnutí Tonghak. [ROOT.GetCountry.GetName] zůstane izolována od světa, ale bude tak činit v harmonii."
 gg_korea.5.f: "Poslední lodě zmizely z přístavů a brány byly zavřeny. Kdesi za mořem jistě nějaký evropský obchodník upadl do šoku a posílal dopisy každému vládnímu úředníkovi, kterého znal. Zápaďané se vrátí – to bylo jisté, a stejně jisté bylo, že se vrátí těžce ozbrojeni.\n\nNa lidech v [ROOT.GetCountry.GetCapital.GetPortHubName] však bylo něco nového, jakási neviditelná energie, která je provázela při každodenním životě. Už se nebáli lodí a děl a už nepovažovali jeden druhého za svou největší hrozbu. Až se Zápaďané vrátí, nebude zde žádná vnitřní trhlina, kterou by mohli využít – a jaká expediční síla by dokázala dobýt záložní armádu milionů?"
 gg_korea.5.a: "Prosadili jsme spravedlnost a společenství."
 gg_korea.5.b: "Vybudujeme nebe mezi horami."
 gg_korea.6.t: "Ponecháni napospas"
 gg_korea.6.d: "Po nepřijatelně dlouhém čekání na slíbené reformy trpělivost hnutí Tonghak vyschla. Postoj [SCOPE.gsInterestGroup('donghak_ig').GetName] je nyní plný zrady a rašící vzpoury."
 gg_korea.6.f: "Ztratili dalšího posla. Navzdory nadějím jeho rodiny inspektor tušil, že ho už nikdy neuvidí. Výběrčí daní, sčítací komisaři, poslové, policisté – všichni začali v této oblasti mizet, pokud se příliš vzdálili od cest. Nikdy nezmizeli všichni, ale stačilo to – atmosféra v kasárnách se změnila z chladné lhostejnosti v hrůzu a nezdálo se, že by se to mělo změnit.\n\nMísto sjednocené země začala [ROOT.GetCountry.GetNameNoFormatting] připomínat souostroví měst propojených nejtenčími sítěmi, obklopené širým a děsivým mořem opovržení."
 gg_korea.6.a: "Musíme žít s následky."
 gg_korea.7.ta: "Povstání Tonghak"
 gg_korea.7.tb: "Povstání v [SCOPE.sState('korea_rebellion_capital').GetCityHubName]"
 gg_korea.7.d.japan: "Napříč zemí [SCOPE.sCountry('korea_scope').GetName] propuklo povstání, které ohrožuje vládu [SCOPE.sCountry('korea_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('korea_scope').GetRuler.GetFullName]. Povstání představuje skvělou příležitost dále posílit náš vliv v zemi [SCOPE.sCountry('korea_scope').GetNameNoFormatting] na úkor země [SCOPE.sCountry('china_scope').GetName]."
 gg_korea.7.d.china: "Napříč zemí [SCOPE.sCountry('korea_scope').GetName] propuklo povstání, které ohrožuje vládu loajálního [SCOPE.sCountry('korea_scope').GetRuler.GetPrimaryRoleTitle]. Pokud se povstání podaří svrhnout vládu, [SCOPE.sCountry('korea_scope').GetNameNoFormatting] se tváří v tvář cizím mocnostem jistě stane bezbrannou."
 gg_korea.7.f: "Jakmile dorazil telegram, celá místnost se dala do pohybu. Zpráva ze země [SCOPE.sCountry('korea_scope').GetNameNoFormatting] byla dlouhá a bolestná – za běžných okolností by ti, kdo ji četli, měli pocit, jako by jim někdo vysával vzduch z plic. Tentokrát však ne. Věděli, že nejsou jediní, kdo ji čtou, a že na druhé straně Východního moře jejich rivalové provádějí přesně tytéž přípravy. Ať už po souši, nebo po moři, nyní šlo o hru, kdo zmobilizuje nejrychleji."
 gg_korea.7.a: "[SCOPE.sCountry('korea_scope').GetAdjective] vláda musí být udržena."
 gg_korea.7.b: "Vítězství povstání podpoří naše zájmy."
 gg_korea.7.c: "O to nemáme zájem."
 gg_korea.8.t: "Příležitosti v [SCOPE.sCountry('korea_scope').GetAltAdjective('L')]"
 gg_korea.8.d: "Naše porážka povstání v [SCOPE.sCountry('korea_scope').GetAltAdjectiveNoFormatting('L')] nám dala příležitost nadiktovat příznivé poválečné uspořádání. Požadavek, aby [SCOPE.sCountry('china_scope').GetName] oficiálně uznala nezávislost země [SCOPE.sCountry('korea_scope').GetNameNoFormatting], nám umožní mnohem účinněji upevnit vliv v regionu."
 gg_korea.8.f: "„Jangbanové jsou většinou beznadějní, ale někteří ministři jsou vnímaví k modernějším citům.“\n\n„Kdo?“\n\n„[SCOPE.sCharacter('industrialists_leader_scope').GetLastNameNoFormatting], [SCOPE.sCharacter('intelligentsia_leader_scope').GetLastNameNoFormatting], možná [SCOPE.sCharacter('pb_leader_scope').GetLastNameNoFormatting]. Máme spoustu kandidátů na nouzový kabinet. Budou nadšení, že dostanou příležitost prosadit, co se jim zlíbí.“"
 gg_korea.8.a: "Pošlete požadavky."
 gg_korea.8.b: "Neměli bychom ohrozit náš vztah s [SCOPE.sCountry('china_scope').GetAltAdjective('I')]."
 china_demanded_to_cede_korea_tt: "[SCOPE.sCountry('china_scope').GetName] bude muset postoupit #v $KOR$#!, nebo čelit [concept_war]"
 gg_korea.9.t: "[SCOPE.sCountry('japan_scope').GetName] požaduje stažení ze země [SCOPE.sCountry('korea_scope').GetName]"
 gg_korea.9.d: "[SCOPE.sCountry('japan_scope').GetAdjectiveNoFormatting] vláda nám zaslala seznam požadavků, z nichž hlavním je naše stažení ze země [SCOPE.sCountry('korea_scope').GetNameNoFormatting]. Jejich požadavky jsou podpořeny jejich zbývajícími silami na Korejském poloostrově, které se po porážce povstání odmítly stáhnout."
 gg_korea.9.f: "Tiskař hleděl na edikt s jistou hrůzou. Představoval valící se pás kouře, kde každý řádek působil stále zlověstněji. Události směřovaly k temnému crescendu, chaos se stáčel do vzpoury. [SCOPE.sCountry('japan_scope').GetAdjectiveNoFormatting] byli odsouzeni nejpřísnějšími slovy, jejich provinění vyložena jako pušky v popravčí četě.\n\n„Obtížné ospravedlnit“, „nevyprovokované“, „nedostatek uspokojivého vysvětlení“. Mučené eufemismy zneklidněné vlády. Vlády, která se bez náhlé změny kurzu neúprosně unášela k válce."
 gg_korea.9.a: "Korea je přítěž, které se rádi zbavíme."
 gg_korea.9.b: "Nepřijmeme další cizí ústupek."
 korea_monarchy.1.t: "Churavý král"
 korea_monarchy.1.d: "Navzdory svému nízkému věku byl [SCOPE.sCharacter('heonjong_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('heonjong_scope').GetFullName] zasažen záchvatem těžké nemoci. [SCOPE.sCharacter('heonjong_scope').GetHerHis|U] rychlé zhoršení vyvolalo obavy, že [SCOPE.sCharacter('heonjong_scope').GetSheHe] už na tomto světě dlouho nepobude."
 korea_monarchy.1.f: "Nebyl to první záchvat nemoci, kterému čelil, ba ani pátý. Stav krále začal od chvíle, kdy nastoupil na trůn, zrcadlit stav země – tak jako ji sužovaly záplavy a monzuny, jeho sužovaly záchvaty nemoci či zprávy o korupci a zradě u dvora. Někdy se obával, že po sobě nezanechá žádný odkaz, že vládu strávenou výhradně bojem s krizemi budou jeho nástupci považovat za promarněnou. Možná se mýlil, pomyslel si, protože možná nebude mít žádné nástupce vůbec."
 korea_monarchy.1.a: "Linie Čongdža dospěla ke konci."
 korea_monarchy.1.b: "[SCOPE.sCharacter('heonjong_scope').GetHerHis|U] lékaři jistě znají nějakou léčbu."
 korea_monarchy.2.t: "Prázdný dům"
 korea_monarchy.2.d: "Smrt všech mužských dětí [SCOPE.sCharacter('cheoljong_scope').GetFullName] a nedostatek blízkých příbuzných, kteří by si mohli nárokovat trůn, zanechaly nástupnictví churavějícího [SCOPE.sCharacter('cheoljong_scope').GetPrimaryRoleTitle] nejisté. Klan Andong Kim nominoval [SCOPE.sCharacter('gojong_scope').GetFullName] jako [SCOPE.sCharacter('cheoljong_scope').GetHerHis] nástupce."
 korea_monarchy.2.f: "„Zase upoután na lůžko, bez dědice. Je vůbec nějaká naděje?“\n\n„Dělá, co může, ale naše naděje mohou být liché. Slyšel jste o té nedávné příhodě s magistrátem?“\n\n„Neslyšel. Povězte mi.“\n\n„Musel králi připomenout, kým je, a prosil ho, aby si zachoval vládu. Zpočátku mě to rozhněvalo – ale teď mu to vůbec nemohu vyčítat.“"
 korea_monarchy.2.a: "Rod I přetrvá."
 korea_monarchy.3.t: "Královna Min"
 korea_monarchy.3.d: "[SCOPE.sCharacter('myeongseong_scope').GetFullName], politicky otevřená oficiální manželka [SCOPE.sCharacter('gojong_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('gojong_scope').GetFullName], si u [ROOT.GetCountry.GetAdjective] dvora vybudovala silné postavení. Její patronát výrazně prospěje [SCOPE.sCharacter('myeongseong_scope').GetInterestGroup.GetName]."
 korea_monarchy.3.f: "„Pokaždé na mě zapůsobila královnina půvabnost a okouzlující vystupování, její ohleduplná laskavost, její neobyčejná inteligence a síla i její pozoruhodná schopnost konverzace, třebaže prostřednictvím tlumočníka. Nepřekvapoval mě její mimořádný politický vliv ani její moc nad [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a mnoha dalšími. Byla obklopena nepřáteli, všemi zahořklými vůči ní, protože díky svému talentu a síle dokázala dosadit členy své rodiny téměř do všech nejvyšších státních úřadů.\n\nJejí život byl bojem. Bojovala s veškerým svým šarmem, bystrostí a prozíravostí za moc, za důstojnost a bezpečí svého manžela a syna a za pád těch, kdo jí odporovali.“" #- Edited quote of Isabella Bird Bishop.
 korea_monarchy.3.a: "Její patronát bude pro modernizaci zásadní."
 korea_monarchy.3.b: "Měla by se soustředit na své dvorské povinnosti."
