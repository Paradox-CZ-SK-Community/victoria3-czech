 modifier_accepted_blatant_opportunism: "Strana moci"
 fund_lobbies_events.1.t: "Síť nedůvěry"
 fund_lobbies_events.1.d: "Příliv [SCOPE.sCountry('relevant_country').GetAdjective] peněz na lobbying do [ROOT.GetCountry.GetAdjective] politiky výrazně zvýšil domácí napětí. Zvěsti a obvinění, že někteří politici jsou [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] agenty, se staly běžnými."
 fund_lobbies_events.1.f: "„Často mám pocit, že v dnešní době je nemožné cokoli dotáhnout do konce. Ptali se mě na nákup, který provedla moje sestřenice - žena, kterou jsem za celý život potkal jednou.“\n\n„Kdo se ptal?“\n\n„Jeden z lidí ministerstva financí. Řekl jsem mu přesně to, co teď říkám vám.“\n\n„Poslední dobou jsou dost nervózní. Mám sklon vinit toho hlupáka dole. Stříbrné příbory z [SCOPE.sCountry('relevant_country').GetCapital.GetFarmHubName], a on je použil při schůzce s ministrem? Pustili jsme ho k dobré věci a on ji nám ostatním úplně ničí.“"
 fund_lobbies_events.1.a: "Jste [ROOT.GetCountry.GetAdjectiveNoFormatting], pane, nebo jste [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting]?"
 fund_lobbies_events.1.b: "Kdo kdy slyšel o poctivém politikovi?"
 fund_lobbies_events.2.t: "Odpovědní komu?"
 fund_lobbies_events.2.d: "Anonymní autor napojený na [SCOPE.gsInterestGroup('opposing_ig').GetName] napsal polemiku útočící na propojení [SCOPE.gsInterestGroup('relevant_ig').GetName] s [SCOPE.sPoliticalLobby('relevant_lobby').GetName]. Dokument je obviňuje, že jsou cizími agenty sponzorovanými [SCOPE.sCountry('relevant_country').GetAdjective] tajnou službou."
 fund_lobbies_events.2.f: "„Máme sklon předpokládat to nejlepší a je to vlastnost, kterou bychom odsoudili jako poslední. Představme si svět, kde neexistuje [SCOPE.sCountry('relevant_country').GetNameNoFormatting], a tedy ani [SCOPE.sPoliticalLobby('relevant_lobby').GetNameNoFormatting]. V takovém světě věříme, že jednání [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetCustom('getMsMr')] [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetLastNameNoFormatting] by bylo naprosto spravedlivé.\n\n[SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe|U] má nárok na dobrý první dojem. Je však také naší odpovědností být #italic objektivní#! a hlásit nedostatky tam, kde je najdeme. Proto musíme za každou minci, kterou [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe] přijme během [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetHerHis] návštěv [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] vyslanectví, tento dobrý první dojem odpovídajícím způsobem upravit…“"
 fund_lobbies_events.2.a: "Takové pomluvy nemají v občanské společnosti místo."
 fund_lobbies_events.2.b: "Víte, ono je to pravda."
 fund_lobbies_events.2.c: "Vyšetřili jsme sami sebe a nenašli žádné pochybení."
 fund_lobbies_events.3.t: "Prokázalo se, že měli pravdu"
 fund_lobbies_events.3.d: "Zprávy o [SCOPE.sCountry('relevant_country').GetAdjective] penězích přicházejících do rukou domácích aktérů, kteří jsou jim nakloněni, vedly [SCOPE.sPoliticalLobby('relevant_lobby').GetName] k vydání záplavy odsudků namířených proti jejím odpůrcům."
 fund_lobbies_events.3.f: "Zadostiučinění byl pocit, který [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetLastNameNoFormatting] v poslední době zažíval čím dál častěji. Zprávy rozložené po [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetHerHis] stole potvrzovaly to, před čím [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe] varoval už celé roky - pronikání [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] vlivu do nejvyšších pater vlády. O [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetHerHis] rivalech se dalo říci, že jsou podezřelí, a [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetHerHis] spojenci mohli být líčeni jako prozíraví zasvěcenci.\n\nSamozřejmě to dá práci. Tatáž potvrzení budou proudit i ke skupinám jiným než [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetHerHis] a ostatní jistě dostanou stejný nápad. Teď to byl závod a ten, kdo odstartoval nejdřív, měl téměř jistotu, že doběhne první."
 fund_lobbies_events.3.a: "Ustavili se jako svého druhu autorita."
 fund_lobbies_events.3.b: "I rozbité hodiny mají občas pravdu."
 fund_lobbies_events.4.t: "Nad poměry"
 fund_lobbies_events.4.d: "[SCOPE.sCharacter('relevant_character').GetFullName], významný spojenec [SCOPE.sPoliticalLobby('relevant_lobby').GetName], byl nedávno spatřen, jak žije výrazně nad [SCOPE.sCharacter('relevant_character').GetHerHis] poměry. [SCOPE.sCharacter('relevant_character').GetHerHis|U] odpůrci tvrdí, že [SCOPE.sCharacter('relevant_character').GetHerHis] životní styl umožňují [SCOPE.sCountry('relevant_country').GetAdjective] „dary“."
 fund_lobbies_events.4.f: "Nové sídlo [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] bylo možné rozpoznat okamžitě. Jeho čerstvě vyleštěná štuková fasáda se nepodobala zvětralým průčelím [SCOPE.sCharacter('relevant_character').GetHerHis] sousedů, která všechna vyzařovala jakousi nadčasovou, tichou důstojnost. V [SCOPE.sCharacter('relevant_character').GetHerHis] průčelí z toho nebylo nic a uvnitř také ne. Hostilo okázalý večírek, který se zdál rozplývat mezi dny, aniž by kdy ustal.\n\nPohled na něj kladl otázku všem, kdo jej pozorovali. Visela ve vzduchu, hmatatelná a naléhavá. Jak?"
 fund_lobbies_events.4.a: "Nařiďte vyšetřování zdroje tohoto bohatství."
 fund_lobbies_events.4.b: "Možná [SCOPE.sCharacter('relevant_character').GetSheHe] prostě dobře investoval."
 fund_lobbies_events.4.c: "Proč by si někdo vůbec vybíral chudobu?"
 character_sent_to_jail_tt: "[SCOPE.sCharacter('relevant_character').GetFullName] bude uznán vinným z korupce a uvězněn"
 character_exonerated_tt: "[SCOPE.sCharacter('relevant_character').GetFullName] bude zproštěn všech obvinění"
 fund_lobbies_events.5.t: "Bezostyšný oportunismus"
 fund_lobbies_events.5.d: "S přílivem [SCOPE.sCountry('relevant_country').GetAdjective] peněz na lobbying vycítily prvky [SCOPE.gsInterestGroup('relevant_ig').GetName] příležitost obohatit se a posílit své postavení. Začaly se přiklánět k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 fund_lobbies_events.5.f: "Část z nich si vymýšlela omluvy. Menší část z nich si vymýšlela dobré omluvy, eseje představující řetězce logiky rozprostírající se přes stovky stran. Většina z nich to nedělala. Tvrdili, že se rozhodli podle svých přátel, podle zvěrstev nepřátel země [SCOPE.sCountry('relevant_country').GetNameNoFormatting], nebo podle svého neomylného smyslu pro spravedlnost.\n\nProč tedy, říkali jejich kritici, dospěli k tomuto prozření až teď? Proč ne tehdy, když jejich pokladny zely prázdnotou a jediné, co měli, byly jejich zásady?\n\nNikdo z nich nedokázal přijít s odpovědí."
 fund_lobbies_events.5.a: "Měli by se za sebe stydět."
 fund_lobbies_events.5.b: "Nejlepší je předpokládat, že k tomu mají lepší důvod."
 fund_lobbies_events.5.c: "Když se naskytne příležitost - chopte se jí!"
