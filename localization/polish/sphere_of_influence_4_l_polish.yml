 je_unify_afghanistan_objective_reason: "Pád Durránské říše zanechal Afghánistán ve stavu neustálé občanské války mezi drobnými uchazeči o trůn. Abychom odvrátili zasahující evropské mocnosti, musíme vytvořit sjednocený a trvalý afghánský stát."
 je_unify_afghanistan: "Afghánské znovusjednocení"
 je_unify_afghanistan_reason: "Nástupnická krize vyvolaná smrtí Timúra Šáha Durráního v roce 1793 uvrhla bývalou Durránskou říši do období nekonečných vnitřních sporů. Vzhledem k hrozbě evropských mocností, které zasahují ze všech stran, se musíme sami ujmout úkolu ukončit toto období válčících knížectví a obnovit sjednocený Afghánistán.\n\nObrátit se na evropskou [concept_great_power] s žádostí o pomoc při znovusjednocení nám může zajistit její podporu, ale její #bold protivníci#! se vůči našim cílům stanou nepřátelštějšími."
