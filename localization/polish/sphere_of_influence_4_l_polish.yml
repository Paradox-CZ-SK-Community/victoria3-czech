 impressive_cultech_realism: "ým realistickým uměním"
 impressive_cultech_camera: "ou fotografii"
 impressive_cultech_film: "ými filmy"
 lobby_events.13.t: "Nestálý dav"
 lobby_events.13.d: "Populistická základna [SCOPE.gsInterestGroup('relevant_ig').GetName] se obrátila proti podpoře zahraničních závazků. Tlak zevnitř vedl skupinu k tomu, aby se distancovala od [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.13.f: "#bold [ROOT.GetCountry.GetAdjectiveNoFormatting] potřeby především#!\n\nLid říká - NE zahraničním závazkům a NE zahraničním smlouvám!\n\n#italic PROSPERITA doma, nebo CHAOS v zahraničí? ŽÁDNÁ CIZÍ MOCNOST by nedokázala úspěšně zaútočit na opevněnou zemi [ROOT.GetCountry.GetNameNoFormatting]!#!"
 lobby_events.13.a: "Byla chyba se na ně spoléhat."
 lobby_events.13.b: "Musí se držet stranou těchto populistických vln."
 lobby_events.14.t: "Kupte, nebo jinak"
 lobby_events.14.d: "Skupina zastupující členy [SCOPE.gsInterestGroup('relevant_ig').GetName] se zájmem o obchod se zbožím [SCOPE.sGoods('relevant_goods').GetName] začala lobbovat u vlády za kroky proti zemi [SCOPE.sCountry('relevant_country').GetName], přičemž poukazuje na její nepřátelské obchodní praktiky."
 lobby_events.14.f: "Celé dopoledne se střídali v kanceláři ministra zahraničí. Muži bohatství a postavení, všichni ministerstvu známí, všichni odříkávali tytéž stížnosti: „[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] obchodní válka“, „bránění volnému pohybu zboží“ a „zabavení nerealizovaných zisků“.\n\nPrávě když vstal, aby na ten den zamkl, ozvalo se další zaklepání. Energie z něj rázem vyprchala a téměř ho srazila na koberec. S úšklebkem se přinutil udělat další krok vpřed a rozrazit dveře.\n\n„Ano, pane. Posaďte se prosím...“"
 lobby_events.14.a: "Je to jen pochopitelné."
 lobby_events.14.b: "Nebudeme měnit svůj postoj na povel."
 lobby_events.15.t: "Dobré, ne cizí"
 lobby_events.15.d_join: "Příliv zahraničních investic ze země [SCOPE.sCountry('relevant_country').GetName] vyvolal obavy mezi nacionalistickými skupinami. [SCOPE.gsInterestGroup('relevant_ig').GetName], vždy ostražití vůči cizímu podvracení, se v reakci přiklonili k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.15.d_form: "Příliv zahraničních investic ze země [SCOPE.sCountry('relevant_country').GetName] vyvolal obavy mezi nacionalistickými skupinami. [SCOPE.gsInterestGroup('relevant_ig').GetName], vždy ostražití vůči cizímu podvracení, začali lobbovat proti [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zájmům."
 lobby_events.15.f: "„Všechny své továrny staví z lepenky a olověných třísek a jejich ocel se hodí leda na žiletky. A i tehdy, když je použijete, vám nejspíš způsobí modřiny!“\n\nKruh mužů u stolu vybuchl smíchy. Muž s rudou kravatou se vědoucně ušklíbl a pokračoval ve svém výkladu. „Jestli jim dovolíme skupovat naši půdu, do roka bude v každé noclehárně [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] špion. Znám je dobře. Strávil jsem měsíc v [SCOPE.sCountry('relevant_country').GetCapital.GetCityHubName], víte...“"
 lobby_events.15.a: "Co se má dělat?"
 lobby_events.15.b: "Sbírka paranoidních dětí."
 lobby_events.16.t: "Těžko milovat"
 lobby_events.16.d: "Vypuknutí ozbrojeného nepřátelství mezi zemí [ROOT.GetCountry.GetName] a zemí [SCOPE.sCountry('relevant_country').GetName] mělo katastrofální dopady na [SCOPE.sPoliticalLobby('relevant_lobby').GetName]. Její kdysi neochvějní podporovatelé, vedení [SCOPE.gsInterestGroup('relevant_ig').GetName], začali lobby hromadně opouštět."
 lobby_events.16.f: "První výstřely padly, zatímco spali, a oni se probudili do světa cizího tomu, z něhož odešli. Během týdne veškerá solidarita mezi oběma stranami zmizela a kdykoli se přiblížili ke své kanceláři, začali na ulici přitahovat ošklivé pohledy. Po třetím policistovi s tvrdou tváří, který přišel zkontrolovat, zda jsou „v souladu s požárními předpisy“, praskli i ti nejneochvějnější z nich. Skříně byly vyprázdněny, aktovky naplněny a židle zůstaly nakřivo."
 lobby_events.16.a: "Měli by utéct, dokud jejich pověst zůstává nedotčena."
 lobby_events.16.b: "Nejlepší je připravit se na den, kdy tato válka skončí."
 lobby_events.17.t: "Jakoukoli cestou vpřed"
 lobby_events.17.d: "S tím, jak postoje [SCOPE.gsInterestGroup('relevant_ig').GetName] vůči zemi [SCOPE.sCountry('relevant_country').GetName] upadají do apatie, začalo jejich vedení jednat o přehodnocení podpory skupiny pro [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.17.f: "V těchto dnech bylo těžší získat schůzku na ministerstvu zahraničí. Počáteční zájem, který vzbudili, už dávno opadl a aktivity lobby zapadly do šumu pozadí [ROOT.GetCountry.GetCapital.GetCityHubName]. [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] ztratili zájem jako první; jejich zástupci byli nejprve zklamáni nedostatkem zpráv a poté už ani neměli chuť číst noviny, když dorazily.\n\n„Jaký důvod máme zajímat se o dění v [SCOPE.sCountry('relevant_country').GetCapital.GetCityHubName]?“ vyzývali jejich mladší členové. Starší nevěděli, jak odpovědět."
 lobby_events.17.a: "Je čas změnit směr."
 lobby_events.17.b: "Proč měnit něco, co funguje?"
 remains_in_lobby_tt: "[SCOPE.gsInterestGroup('relevant_ig').GetName] zůstane v [SCOPE.sPoliticalLobby('relevant_lobby').GetName]"
 lobby_events.18.t: "Právoplatné hranice"
 lobby_events.18.d_join: "Horlivě nacionalističtí [SCOPE.gsInterestGroup('relevant_ig').GetName] obrátili svou rétoriku proti zemi [SCOPE.sCountry('relevant_country').GetName] a její provincii [SCOPE.sState('revanchist_state').GetName]. Přiklonili se k [SCOPE.sPoliticalLobby('relevant_lobby').GetName] v naději, že uskuteční své územní ambice."
 lobby_events.18.d_form: "Horlivě nacionalističtí [SCOPE.gsInterestGroup('relevant_ig').GetName] obrátili svou rétoriku proti zemi [SCOPE.sCountry('relevant_country').GetName] a její provincii [SCOPE.sState('revanchist_state').GetName]. Začali lobbovat za nepřátelské kroky proti zemi [SCOPE.sCountry('relevant_country').GetNameNoFormatting], aby uskutečnili své územní ambice."
 lobby_events.18.f: "„Je nesporné, že [SCOPE.sState('revanchist_state').GetNameNoFormatting] má výrazně [ROOT.GetCountry.GetAdjectiveNoFormatting] charakter. Ve skutečnosti tato oblast patřila několika předchůdným státům, jejichž odkaz ztělesňujeme. Zaprvé...“\n\nDůstojník zdvořile seděl, zatímco muž v přední části posluchárny přednášel svou disertaci. Když pozvedl starobylou minci, o níž tvrdil, že byla nalezena pod [SCOPE.sState('revanchist_state').GetCityHubName], publikum propuklo v jásot. Tleskal také, ale šlo o čistě mechanické gesto. Jeho mysl už opustila věk mečů a plachet. Znovudobytí [SCOPE.sState('revanchist_state').GetNameNoFormatting] bylo záležitostí přítomnosti, dýmu ze střelného prachu a dělostřeleckých salv. O všem ostatním se mohlo přít až potom."
 lobby_events.18.a: "[SCOPE.sState('revanchist_state').GetNameNoFormatting] je právoplatně [ROOT.GetCountry.GetAdjectiveNoFormatting]!"
 lobby_events.18.b: "Toto chřestění šavlemi rozhodně odmítáme."
 lobby_events.19.t: "Mraky na obzoru"
 lobby_events.19.d_join_country: "Podrobení země [SCOPE.sCountry('relevant_subject').GetName] zemí [SCOPE.sCountry('relevant_country').GetName] vyvolalo mezi [SCOPE.gsInterestGroup('relevant_ig').GetName] obavy, že podobný osud postihne i náš vlastní národ. Tyto obavy je vedly k přiklonění se k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.19.d_form_country: "Podrobení země [SCOPE.sCountry('relevant_subject').GetName] zemí [SCOPE.sCountry('relevant_country').GetName] vyvolalo mezi [SCOPE.gsInterestGroup('relevant_ig').GetName] obavy, že podobný osud postihne i náš vlastní národ. Tyto obavy je vedly k zahájení lobbingu proti [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zájmům."
 lobby_events.19.d_join_state: "Přítomnost blízké [SCOPE.sCountry('relevant_country').GetAdjective] kolonie [SCOPE.sState('relevant_colonial_state').GetName] vyvolala mezi [SCOPE.gsInterestGroup('relevant_ig').GetName] obavy, že podobný osud postihne i náš vlastní národ. Tyto obavy je vedly k přiklonění se k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.19.d_form_state: "Přítomnost blízké [SCOPE.sCountry('relevant_country').GetAdjective] kolonie [SCOPE.sState('relevant_colonial_state').GetName] vyvolala mezi [SCOPE.gsInterestGroup('relevant_ig').GetName] obavy, že podobný osud postihne i náš vlastní národ. Tyto obavy je vedly k zahájení lobbingu proti [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zájmům."
 lobby_events.19.f: "„Je zcela v pořádku být naplněn hrůzou. Není v tom žádná hanba. Jejich dosah se táhne napříč světem jako mořská obluda a pohlcuje vše, co před ní leží zranitelné. Dosahují svých cílů bez selhání a ohrožují nás zdánlivě ze všech směrů. Dosud jsme však nepadli a má to svůj důvod.“\n\nByla to vskutku křehká naděje. [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetLastNameNoFormatting] dokázal myslet jen na jediné stéblo trávy zbylé po požáru.\n\n„Musíme se na tyto důvody zaměřit a použít je jako zbraň. Potřebujeme na to čas a vy nám jej musíte koupit.“"
 lobby_events.19.a: "Mají pravdu, že se mají mít na pozoru před [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] hrozbou."
 lobby_events.19.b: "Nepřátelství by mohlo vyvolat přesně tu reakci, které se obávají."
 lobby_events.20.t: "Příliš rozptýleni"
 lobby_events.20.d: "Omezené politické zdroje [SCOPE.gsInterestGroup('relevant_ig').GetName] přiměly vedení skupiny zpochybnit její členství jak v [SCOPE.sPoliticalLobby('relevant_lobby_1').GetName], tak v [SCOPE.sPoliticalLobby('relevant_lobby_2').GetName]."
 lobby_events.20.f: "„A za kancelářské potřeby v průměru...“ Auditor otočil stránku k příslušné položce a sjel očima dolů po sloupci. „Tři sta korun měsíčně.“\n\nMuži sedícímu naproti němu se začal točit svět. „Jste si jistý?“\n\n„A tisíc dvě stě za pracovní cestovní výdaje.“\n\n„...promiňte,“ dokázal ze sebe dostat. „Mohl bych dostat kopii výkazu? Musím se okamžitě sejít se svými kolegy.“"
 lobby_events.20.a: "Není důvod zůstávat v [SCOPE.sPoliticalLobby('relevant_lobby_1').GetNameNoFormatting]."
 lobby_events.20.b: "Členství v [SCOPE.sPoliticalLobby('relevant_lobby_2').GetNameNoFormatting] už není užitečné."
 lobby_events.20.c: "Opustit kteroukoli z nich by bylo nemoudré."
