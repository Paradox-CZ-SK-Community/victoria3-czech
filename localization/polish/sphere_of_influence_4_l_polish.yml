 movement_events.1.t: "O politice vlády"
 movement_events.1.d1: "[SCOPE.sCharacter('relevant_agitator').GetFullName] jménem [SCOPE.sPoliticalMovement('relevant_movement').GetName] vydal pamflet ostře kritizující současnou politiku vlády. [SCOPE.sCharacter('relevant_agitator').GetHerHis|U] pamflet se stal populárním v reformistických kruzích."
 movement_events.1.d2: "Spojenci [SCOPE.gsInterestGroup('relevant_ig').GetName] v [SCOPE.sPoliticalMovement('relevant_movement').GetName] vydali pamflet ostře kritizující současnou politiku vlády. Pamflet se stal populárním v reformistických kruzích."
 movement_events.1.f: "#bold O politice [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!\n\nVelký projev pronesený před ctihodnou společností pro reformu v [ROOT.GetCountry.GetCapital.GetCityHubName] v polovině října.\n\nCHYBA V SAZBĚ - Po přečtení první strany projevu přejděte na stranu 5 a poté na strany 4 a 6."
 movement_events.1.a: "Musíme respektovat zásadu svobody projevu."
 movement_events.1.b: "Zabavte tento pamflet všude, kde se objeví."
 movement_events.1.c: "Zahajte vyšetřování totožnosti jeho autorů."
 movement_events.2.t: "[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] reformní společnost"
 movement_events.2.d1: "[SCOPE.sCharacter('relevant_agitator').GetFullName] pomohl založit celostátní organizaci zasvěcenou sjednocení [SCOPE.sPoliticalMovement('relevant_movement').GetName] pod národním vedením."
 movement_events.2.d2: "Agenti [SCOPE.gsInterestGroup('relevant_ig').GetName] založili celostátní organizaci zasvěcenou sjednocení [SCOPE.sPoliticalMovement('relevant_movement').GetName] pod národním vedením."
 movement_events.2.f: "„Stojí tedy za zmínku: pokud uspějeme, co máme dělat? Tato struktura, kterou budujeme, může přetrvat po celé generace. Dovolit jí rozpadnout se by byla tragédie.“\n\n„Nemůžeme spoléhat na to, že všichni, kdo se připojí, budou i nadále nést pochodeň vpřed. Náš tábor obsahuje mnoho lidí, každý s vlastními důvody, proč nám naslouchá. Nesmíme jim naznačovat, že po nich požadujeme poslušnost v jakékoli jiné věci.“"
 movement_events.2.a: "V nejhorším jsou neškodní."
 movement_events.2.b: "Pošlete jim důraznou připomínku našeho nesouhlasu."
 movement_events.2.c: "[SCOPE.sCharacter('relevant_agitator').GetFullName] je [SCOPE.sCharacter('relevant_agitator').GetWomanMan], kterého stojí za to sledovat."
 movement_events.3.t: "[SCOPE.sState('relevant_state').GetNameNoFormatting] politická unie"
 movement_events.3.d: "Organizátoři napojení na [SCOPE.sPoliticalMovement('relevant_movement').GetName] založili organizaci věnovanou podpoře lidové účasti v politice v oblasti [SCOPE.sState('relevant_state').GetNameNoFormatting]."
 movement_events.3.f: "„Přímou příčinou strastí naší země,“ prohlásil řečník, „je soustředění moci v rukou třídy, která má sklony k zahálce a spiknutí. Je tedy naší povinností shromáždit úsilí pracovitých tříd proti jejich manipulacím a přivést je k velké morální konfrontaci - zápasu politické pravdy a práva proti politickému olupování a křivdě.“\n\nByla to dobrá myšlenka, pomyslel si jeden posluchač, pokud byl člověk nakloněn shovívavosti. Pokud nebyl... děsil se pomyšlení, jak špatně by se takové spiknutí dalo vyložit."
 movement_events.3.a: "Lid se začal ozývat."
 movement_events.3.b: "Nařiďte její uzavření, než se vymkne kontrole."
 movement_events.4.t: "Petičníci se obracejí na vládu"
 movement_events.4.d: "Několik významných podporovatelů [SCOPE.sPoliticalMovement('relevant_movement').GetName] se obrátilo na vládu s ambiciózní peticí za prosazení svého programu. Petice byla mezi členy hnutí propagována jako nezbytný výchozí bod."
 movement_events.4.f: "Na papíře bylo nejméně sto podpisů, některé nesrozumitelně ozdobné, jiné obyčejná jména, u nichž by úředník musel předvést neuvěřitelné dedukční výkony, aby je zúžil. To byla výhoda petice - od určitého bodu bylo nemožné potrestat každého signatáře.\n\nKdyby nesouhlasil jeden člověk, bylo by snadné jej sebrat, ale když jich bylo tisíc, věci se stávaly mnohem obtížnějšími."
 movement_events.4.a: "Povolte debatu o vznesených otázkách."
 movement_events.4.b: "Formální vládní postupy musí být zachovány."
 movement_events.4.c: "Nařiďte vyšetřování tohoto příhodného seznamu jmen."
 movement_events.5.t: "Občanský sněm v [SCOPE.sState('relevant_state').GetCityHubName]"
 movement_events.5.d: "[SCOPE.sPoliticalMovement('relevant_movement').GetName] se sešlo v [SCOPE.sState('relevant_state').GetCityHubName], aby získalo podporu a veřejně projednalo podrobnosti zákona [SCOPE.sLawType('relevant_law').GetName]. Událost přitáhla velkou pozornost místních."
 movement_events.5.f: "„Rád vás zase vidím. Měl jste dobrou cestu?“\n\n„Měl. Silnice jsou v tomto ročním období hrozné. Popravdě jsem málem dorazil pozdě... vyřiďte mou pochvalu kočímu.“\n\n„To mu přeji. Zaslouží si přidat?“\n\n„Kéž by! Pokud mi v kapsách něco zůstane, až přijde na řadu klobouk, pak snad.“"
 movement_events.5.a: "Jak živá diskuse!"
 movement_events.5.b: "Nařiďte okamžitý zákaz tohoto shromáždění."
 movement_events.6.t: "Protesty napříč [SCOPE.sState('relevant_state').GetNameNoFormatting]"
 movement_events.6.d: "[SCOPE.sPoliticalMovement('relevant_movement').GetName] zorganizovalo masové protesty napříč oblastí [SCOPE.sState('relevant_state').GetName]. Ačkoli protesty zatím zůstaly pokojné, místní úřady vyjádřily obavy z možného násilí."
 movement_events.6.f: "Bylo tam víc lidí, než kdy v životě viděl. [SCOPE.sState('relevant_state').GetFarmHubName], kdysi tiché místo známé téměř venkovským rázem, ožilo křičícími hlasy a mávajícími vlajkami. Přemýšlel, jestli jsou v tom davu někteří z jeho sousedů. Vždycky si myslel, že s nimi nemá nic společného. Možná se mýlil."
 movement_events.6.a: "Dovolte jim vyjádřit své obavy."
 movement_events.6.b: "Úřady musí jednat a tyto projevy zastavit."
 movement_events.7.t: "Zdi a lepidlo"
 movement_events.7.d1: "[SCOPE.sCharacter('relevant_agitator').GetFullName] jménem [SCOPE.sPoliticalMovement('relevant_movement').GetName] zorganizoval celostátní plakátovací kampaň. V některých městech téměř nezůstala zeď, kterou by nepoznamenaly plakáty podporující [SCOPE.sLawType('relevant_law').GetName]."
 movement_events.7.d2: "Podporovatelé [SCOPE.gsInterestGroup('relevant_ig').GetFullName] jménem [SCOPE.sPoliticalMovement('relevant_movement').GetName] zorganizovali celostátní plakátovací kampaň. V některých městech téměř nezůstala zeď, kterou by nepoznamenaly plakáty podporující [SCOPE.sLawType('relevant_law').GetName]."
 movement_events.7.f: "#bold Neděle: Shromáždění za [SCOPE.sLawType('relevant_law').GetNameNoFormatting]#!\n\nSchůze ve VŠECH OBECNÍCH DOMECH, 19:00 až 20:00. VYJÁDŘETE SVOU PODPORU SPRAVEDLIVÉ VĚCI [SCOPE.sLawType('relevant_law').GetNameNoFormatting]!\n\n#italic Občerstvení dostupné v 19:30 pro všechny účastníky. Přihlaste se k odběru místního listu „Advocate“ pro další informace.#!"
 movement_events.7.a: "Déšť je smyje."
 movement_events.7.b: "Nařiďte okamžité očištění těchto zdí."
 movement_events.8.t: "Za mřížemi"
 movement_events.8.d: "Zatčení a údajné špatné zacházení s neukázněným demonstrantem napojeným na [SCOPE.sPoliticalMovement('relevant_movement').GetName] vyvolalo rozhořčení mezi jeho druhy. Byly uspořádány další demonstrace požadující jeho propuštění."
 movement_events.8.f: "Vězení bylo bídné místo. Železné mříže, kamenné zdi a studené podlahy. V posledních několika týdnech si stráže zvykly při obchůzkách ledabyle poklepávat obušky o mříže, takže spánek byl nemožný. Nemohl uniknout ani ve snech, protože napětí, které cítil v bdělém světě, začalo prosakovat i do jeho spánku.\n\nA to všechno za to, že odstrčil policistu? Zpočátku toho litoval. Teď by však možná dokázal říct, že si to každý z nich zasloužil, a ještě víc."
 movement_events.8.a: "Možná lze za dobré chování zařídit předčasné propuštění."
 movement_events.8.b: "Nebudeme dělat výjimky kvůli nějakým chuligánům."
 movement_events.9.t: "Vlna stávek v [SCOPE.sState('relevant_state').GetName]"
 movement_events.9.d: "Vlna dělnických stávek inspirovaná [SCOPE.sPoliticalMovement('relevant_movement').GetName] otřásla průmyslem v [SCOPE.sState('relevant_state').GetName]. Stávkující dělníci se připojili k protestům v několika městech napříč oblastí."
 movement_events.9.f: "Důstojník očekával, že dělníci budou jiní, než byli. Nemytí, potřísnění průmyslovou špínou, promočení potem. Nebyli ničím z toho. Měli na sobě stejné oblečení, jaké by nosili o víkendu, svěží a čisté. V očích měli hrdost. Namísto zkroušeného výrazu vyčerpaných mužů stáli vzdorně, s tvrdými tvářemi a rukama sevřenýma kolem cedulí, které žádaly svět a ještě víc."
 movement_events.9.a: "Dejte najevo, že uznáváme jejich požadavky."
 movement_events.9.b: "Dostaňte je zpátky do práce!"
 movement_events.10.t: "Pošlapáni"
 movement_events.10.d: "Demonstrace uspořádaná [SCOPE.sPoliticalMovement('relevant_movement').GetName] v [SCOPE.sState('relevant_state').GetName] byla policií násilně rozehnána, což vedlo k několika úmrtím a vážným zraněním. Vzpomínky na incident se staly bojovým pokřikem disidentů."
 movement_events.10.f: "Usmíval se, když nařídil svému koni projet davem. Jeho výraz se jí vryl do mysli jako kyselina do kovové desky. Jaký člověk si dokáže udržet tak ohavný klid uprostřed výkřiků, lámaných kostí a gejzírů krve? Zatímco lidé kolem něj prchali, nařídil svým důstojníkům postupovat vpřed... a pak co?\n\nUprostřed rozmazané hrůzy lidí se ocitla v narychlo zavřeném baru. Mnozí jiní takové štěstí neměli. Když procházela místem, kde se demonstrace konala, nedokázala poznat, kolik lidí rozvalených na dlažebních kostkách se ještě hýbe."
 movement_events.10.a: "Pokárejte odpovědné důstojníky."
 movement_events.10.b: "Bylo jim nařízeno se rozejít. Policie za to nemůže."
 movement_events.11.t: "[SCOPE.sState('relevant_state').GetCityHubName] Advocate"
 movement_events.11.d: "Výslovně stranické noviny založené členy [SCOPE.sPoliticalMovement('relevant_movement').GetName] v [SCOPE.sState('relevant_state').GetCityHubName] vydaly své první číslo. Mezi reklamami a politickými karikaturami přinášejí nelítostnou kritiku vládní politiky."
 movement_events.11.f: "Mělo to jistou genialitu. Tiskem na nejlevnější papír, šetřením inkoustem, zaplavením listu reklamami a velkým písmem bylo možné vyrábět výdělečné noviny za jediný penny za výtisk, zatímco konkurenti je prodávali za pětinásobek až desetinásobek. Když se takový list neúnavně a bezostyšně postavil za určitý názor, mohl o něm do večera vědět každý pracující člověk ve městě. Pokud se konkurenti odmítli snížit tak hluboko, byli by sami zodpovědní za své vlastní udušení."
 movement_events.11.a: "Jak dlouho může stranický list vydržet?"
 movement_events.11.b: "Tak je to? Odepřete jim tiskovou licenci."
 movement_events.12.t: "Prázdné kapsy"
 movement_events.12.d: "Řada domněle špatných rozhodnutí [SCOPE.sPoliticalMovement('relevant_movement').GetName] vedla k výraznému poklesu jeho schopnosti získávat peníze. Mnozí bohatí sympatizanti tiše zastavili svou podporu hnutí v jeho současné podobě."
 movement_events.12.f: "„Nechceme působit stranicky.“ Stále stejný refrén. Organizátor přecházel sem a tam ve své maličké kanceláři, pěst sevřenou tak pevně, až měl pocit, že mu klouby každou chvíli protrhnou kůži. Občas kradmo pohlédl na neotevřené obálky na stole, o nichž věděl, že všechny budou opakovat nějakou obměnu téhož.\n\n„Stranicky“ - co to mělo znamenat? Že jim na něčem záleželo? Že se rozhodli udělat něco víc než jen počítat peníze ve svých trezorech? Měl před sebou důležitý úkol, něco, co zlepší samotnou společnost. Oni měli šanci udělat totéž. Jak by v takovém světle mohla být stranickost špatná?"
 movement_events.12.a: "Možná si najde jiné zdroje prostředků."
 movement_events.12.b: "Nakonec zemře vše, jen něco rychleji než jiné."
 movement_events.13.t: "[SCOPE.sPoliticalMovement('relevant_movement').GetName] se organizuje v [SCOPE.sState('relevant_state').GetName]"
 movement_events.13.d: "Organizátoři napojení na [SCOPE.sPoliticalMovement('relevant_movement').GetName] zahájili cílenou kampaň za získání podpory pro [SCOPE.sLawType('relevant_law').GetNameNoFormatting] v [SCOPE.sState('relevant_state').GetName]."
 movement_events.13.f: "Obyvatelé každé oblasti světa rádi říkají, že jejich domov má dlouhou a jedinečnou historii semknuté komunity. Organizátor s tím téměř souhlasil. Problém byl ovšem v tom, že se tato komunita často nevztahovala na cizince. Vyhodili ho na ulici víckrát, než dokázal spočítat, ale přesto vytrval. Pokud dokáže vnést správnou větu do správných kruhů, možná i myšlenka, která byla zpočátku bez okolků odmítnuta, začne zapouštět kořeny."
 movement_events.13.a: "V [SCOPE.sState('relevant_state').GetNameNoFormatting] je spousta ochotných uší."
 movement_events.13.b: "Měli by se zabývat mnohem přízemnějšími věcmi."
 movement_events.14.t: "Studenti se přidávají k [SCOPE.sPoliticalMovement('relevant_movement').GetName]"
 movement_events.14.d: "Skupina studentů navštěvujících [SCOPE.sBuilding('relevant_university').GetName] v [SCOPE.sState('relevant_state').GetName] uspořádala demonstraci na podporu [SCOPE.sPoliticalMovement('relevant_movement').GetName]. Tento projev inspiroval další studenty, aby se přidali k věci."
 movement_events.14.f: "Přednáškový sál zel prázdnotou. Vždy chyběl jeden nebo dva studenti kvůli nemoci, cestování či rodinným záležitostem, ale nikdy v takovém rozsahu. V každé řadě seděli tři nebo čtyři studenti, jejichž přítomnost ostře vynikala vedle prázdných sedadel po stranách. Byl by to materiál na vlastní přednášku, pomyslel si. Jako hromada písku, jejíž zrnka jedno po druhém odvál vítr, až se její tvar náhle změnil, tak dopadlo to, co kdysi bývalo třídou."
 movement_events.14.a: "Mládež povede [ROOT.GetCountry.GetNameNoFormatting] do budoucnosti!"
 movement_events.14.b: "Měli by se raději soustředit na studium."
 movement_events.15.t: "Sporná témata"
 movement_events.15.d: "Akce uspořádaná [SCOPE.sPoliticalMovement('relevant_movement').GetName] se proměnila ve rvačku poté, co do davu pronikli odpůrci hnutí. Když dorazila policie, žádný účastník nebyl ochoten podat souvislou výpověď."
 movement_events.15.f: "Většina z nich měla alespoň jednu modřinu, rozseknutý ret nebo krvavý nos. Ten jeho byl získán mnohem méně čestně než u většiny ostatních. Při útěku k východu narazil bokem do rohu stolu, jen aby vzápětí málem vrazil přímo do blížícího se četníka. V mysli se mu vynořily dvě protichůdné verze. Jedna, kterou řekne detektivovi, a druhá, kterou řekne přátelům."
 movement_events.15.a: "Dejte jim všem den ve vězení, aby vychladli."
 movement_events.15.b: "Vznést obvinění proti organizátorům akce."
