 lobby_proposal.1.t: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] požaduje akci"
 lobby_proposal.1.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] požaduje, abychom [SCOPE.GetRootScope.GetCountry.GetCustom('pro_lobby_demand_text_def')] zemi [SCOPE.sCountry('third_party_country').GetName]. [SCOPE.sCountry('third_party_country').GetNameNoFormatting] je známým protivníkem [SCOPE.sCountry('relevant_country').GetAdjective] zájmů."
 lobby_proposal.1.f: "„Musíme postupovat co nejkomplexněji. Jakýkoli jiný přístup je nezodpovědný. [SCOPE.sCountry('third_party_country').GetAdjectiveNoFormatting] agrese je stará jako svět.“\n\n„Obávám se, že to může působit, jako bychom vlastní národ používali jako figurku na šachovnici ve prospěch cizí mocnosti. Co byste řekl, kdyby na vás naléhali?“\n\n„Okolnostní shoda zájmů nás nepodřídí. V tomto případě jsou [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zájmy náhodou [ROOT.GetCountry.GetAdjectiveNoFormatting] zájmy. Je to tak prosté.“"
 lobby_proposal.1.a: "Podíváme se na to."
 lobby_proposal.1.b: "To není v našem zájmu."
 lobby_proposal.2.t: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] požaduje akci"
 lobby_proposal.2.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] požaduje, abychom [SCOPE.GetRootScope.GetCountry.GetCustom('anti_lobby_demand_text_def')] zemi [SCOPE.sCountry('relevant_country').GetName]. Úspěšné provedení návrhu získá naší vládě značnou přízeň lobby."
 lobby_proposal.2.f: "„A co těm, kteří by odmítli a raději zachovali status quo?“\n\nNezaváhal. Jeho odpověď zněla dobře nacvičeně, protože nacvičená byla. Byl to činorodý muž, který trávil hodiny přecházením po svých komnatách a předvídáním útoků, jež přijdou.\n\n„Odpověděl bych, že jsme jim nikdy neměli dovolit, aby se k nám vůbec tolik přiblížili. Přátelství vybudované na klamu není vůbec ničím a dobrá vůle z něj získaná je iluzorní.“"
 lobby_proposal.2.a: "Podíváme se na to."
 lobby_proposal.2.b: "To není v našem zájmu."
 lobby_proposal.3.t: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] nabízí příležitost"
 lobby_proposal.3.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] nám nabídla příležitost [SCOPE.GetRootScope.GetCountry.GetCustom('pro_lobby_opportunity_text_def')] zemi [SCOPE.sCountry('relevant_country').GetName]. Lobby nabídla, že využije své kontakty k usnadnění vyjednávacího procesu."
 lobby_proposal.3.f: "Jednání vedená pod stolem se zástupcem [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] vlády byla dlouhá a namáhavá. [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zástupce věděl, že jedná se skupinou, která nemá moc srovnatelnou s tou jejich, a podle toho upravil svou strategii. Přesto dospěli k dohodě. Nic písemně, ale na tom sotva záleželo. Až vláda pošle oficiální kopii - pokud ji pošle - zjistí, že v [SCOPE.sCountry('relevant_country').GetCapital.GetCityHubName] už čeká připravená odpověď."
 lobby_proposal.3.a: "Rádi se tím budeme zabývat."
 lobby_proposal.3.b: "To není v našem zájmu."
 lobby_proposal.4.t: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] nabízí příležitost"
 lobby_proposal.4.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName] nám nabídla příležitost [SCOPE.GetRootScope.GetCountry.GetCustom('anti_lobby_opportunity_text_def')] zemi [SCOPE.sCountry('third_party_country').GetName]. Jejich návrh má v případě přijetí čelit [SCOPE.sCountry('relevant_country').GetAdjective] zájmům."
 lobby_proposal.4.f: "Byl to zastřený druh agrese, který by teoreticky mohl oslovit jak zapálené šovinisty, tak ty, kdo dávají přednost zmírňování ztrát. Donutil by nepřítele reagovat a možná by ho vehnal do bezohledného střetu v odpovědi na zdánlivě neškodný manévr.\n\n„Plán bojovat proti [SCOPE.sCountry('relevant_country').GetNameNoFormatting] do posledního [SCOPE.sCountry('third_party_country').GetAdjectiveNoFormatting],“ poznamenal jeden ministr. Zástupce zrudl. Nacvičil si odpovědi pro oba směry, ale žádná se sem docela nehodila."
 lobby_proposal.4.a: "Rádi se tím budeme zabývat."
 lobby_proposal.4.b: "To není v našem zájmu."
