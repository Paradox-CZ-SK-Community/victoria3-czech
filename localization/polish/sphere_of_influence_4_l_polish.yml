 AFG_appeal_accept_tt: "Bude pravděpodobnější, že s vámi budou usilovat o pozitivní vztahy, a budete jim dlužit [concept_obligation]"
 gg_afghanistan.1.t: "[SCOPE.sCountry('gp_scope').GetAdjectiveNoFormatting]-[SCOPE.sCountry('rival_gp_scope').GetAdjectiveNoFormatting] dohoda"
 gg_afghanistan.1.d: "[Concept('concept_great_power','$concept_great_powers$')] zemí [SCOPE.sCountry('gp_scope').GetName] a [SCOPE.sCountry('rival_gp_scope').GetName] se vzájemně dohodly na plánu „vyřešit dlouhodobé hraniční spory v Afghánistánu“. Navrhovaná smlouva požaduje ústupky od našeho národa."
 gg_afghanistan.1.f: "Tón odpovídal dokumentu, který otřese světem a přinese regionu mír na celá staletí. Každý ústupek ze strany [ROOT.GetCountry.GetNameNoFormatting] byl formulován jako laskavost jedné ze soupeřících mocností, jako převod země nárokované jednou z těch dvou lidem, kteří ji už obývali. Velvyslanec přemítal, že je s podivem, že [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] byl o této dohodě vůbec informován."
 gg_afghanistan.1.a: "Nemáme jinou možnost než přijmout."
 gg_afghanistan.1.b: "Vzneseme co nejdůraznější námitku."
 gg_afghanistan.2.t: "Afghánistán odmítá navrhovanou dohodu"
 gg_afghanistan.2.d: "[SCOPE.sCountry('afghanistan_scope').GetRuler.GetPrimaryRoleTitle] zaslal [SCOPE.sCountry('afghanistan_scope').GetRuler.GetHerHis] odpověď na navrhovanou [SCOPE.sCountry('gp_scope').GetAdjectiveNoFormatting]-[SCOPE.sCountry('rival_gp_scope').GetAdjectiveNoFormatting] dohodu - rozhodné odmítnutí. Jelikož afghánská vláda není ochotna smlouvu v její současné podobě vynutit, možná ji budeme muset upravit."
 gg_afghanistan.2.f: "Když kurýr odcházel, plně očekával, že pohledy společníků [SCOPE.sCountry('afghanistan_scope').GetRuler.GetPrimaryRoleTitle] zapálí cípy jeho kabátu. Za zády měl tisíce děl, miliony liber a flotily vznešených lodí - ale na ničem z toho teď nezáleželo, daleko od jakéhokoli pobřeží, s nejbližší základnou míle daleko."
 gg_afghanistan.2.a: "Zpátky k rýsovacímu prknu."
 gg_afghanistan.3.t: "Afghánistán žádá o pomoc"
 gg_afghanistan.3.d: "[SCOPE.sCountry('afghan_nation_scope').GetName] požádal o naši pomoc při znovusjednocení Afghánistánu. Zajištění přátelského afghánského státu se nám bude hodit jako nástroj proti našim rivalům v regionu."
 gg_afghanistan.3.f: "Mapa byla přinejlepším jen volně vymezená. Výběr států vzniklých z rozpadu Durránské říše představoval válčící potomky dynastií Barakzajů a Durráníů, stejně jako pokusy zachytit oblasti ovládané místními kmeny a vzbouřenými provinciemi. Vyslanec položil dopis na nedaleký stůl a pohlédl na obrýleného štábního důstojníka, kterého právě vyrušil.\n\n„[SCOPE.sCountry('afghan_nation_scope').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('afghan_nation_scope').GetNameNoFormatting],“ začal, „to je ten modrý, žádá o naši pomoc při ‚podrobení vzbouřených provincií a obnovení legitimní vlády v Afghánistánu‘. Stojí to za pozornost, nebo mám sepsat obecnou odpověď?“"
 gg_afghanistan.3.a: "Výborná příležitost."
 gg_afghanistan.3.b: "O to nemáme zájem."
 gg_afghanistan.4.t: "Afghánské sjednocení"
 gg_afghanistan.4.d: "Porážkou poslední vzbouřené provincie skončily občanské války rozpoutané pádem Durránské říše. [ROOT.GetCountry.GetRuler.GetFullName] je nyní jediným legitimním [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetName]."
 gg_afghanistan.4.f: "Války byly tou nejsnazší částí, přemítal [ROOT.GetCountry.GetRuler.GetSheHe]. Správa loajality kmenů a [ROOT.GetCountry.GetRuler.GetHerHis] podřízených byla vždy složitější a nyní bude [ROOT.GetCountry.GetRuler.GetSheHe] muset totéž dělat v celonárodním měřítku. Pokud vláda zakolísá, jak dlouho potrvá, než přijde další vlna povstání? Skutečně vzácný je [ROOT.GetCountry.GetRuler.GetWomanMan], který dokáže zvítězit ve válce i v míru.\n\nProzatím však nadešel čas oslav. Lid se radoval a žádal projev. [ROOT.GetCountry.GetRuler.GetSheHe|U] jim jej přednese."
 gg_afghanistan.4.a: "Ještě je třeba znovu dobýt další země."
 gg_afghanistan.4.b: "Udržíme si svou zemi tak dlouho, jak jen budeme moci."
 gg_afghanistan.5.t: "Křížící se linie"
 gg_afghanistan.5.d: "Náš návrh severní hranice země #v $AFG$#! odporuje návrhu [SCOPE.sCountry('sender_scope').GetAdjective] vyjednávacího týmu do té míry, že nelze dosáhnout kompromisu. Aby mohl vyjednávací proces pokračovat, jedna strana musí ustoupit."
 gg_afghanistan.5.f: "Přes severní Afghánistán byly různobarevným inkoustem nakresleny tři linie. Divoko se od sebe rozbíhaly, klikatily se přes Torkestánské hory a Amudarju, turkmenskou poušť i jižní Pamír, zatímco skličujících pár překryvů se jevilo jako duhové skvrny v místech, kde inkoust zcela prosákl papírem.\n\n„Měli bychom to zkusit znovu,“ dokázal ze sebe dostat jeden ze zástupců a ostatní se zaťatými zuby přikývli."
 gg_afghanistan.5.a: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.5.b: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.5.c: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.5.e: "Naše rozhodnutí je konečné. [SCOPE.sCountry('sender_scope').GetCustom('getPluralDemonym')] musí ustoupit."
 gg_afghanistan.6.t: "Křížící se linie"
 gg_afghanistan.6.d: "Náš návrh jihozápadní hranice země #v $AFG$#! odporuje návrhu [SCOPE.sCountry('sender_scope').GetAdjective] vyjednávacího týmu do té míry, že nelze dosáhnout kompromisu. Aby mohl vyjednávací proces pokračovat, jedna strana musí ustoupit."
 gg_afghanistan.6.f: "Přes severovýchodní Indii byly různobarevným inkoustem nakresleny tři linie. Divoko se od sebe rozbíhaly, klikatily se přes řeku Indus a Balúčskou poušť a tvořily svévolné tvary, jak se šíleně vinuly vzhůru přes zvlněné hory pohoří Kakar, zatímco skličujících pár překryvů se jevilo jako duhové skvrny v místech, kde inkoust zcela prosákl papírem.\n\n„Měli bychom to zkusit znovu,“ dokázal ze sebe dostat jeden ze zástupců a ostatní se zaťatými zuby přikývli."
 gg_afghanistan.6.a: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.6.b: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.6.c: "Přijmeme [SCOPE.sCountry('sender_scope').GetAdjective|l] návrh."
 gg_afghanistan.6.e: "Naše rozhodnutí je konečné. [SCOPE.sCountry('sender_scope').GetCustom('getPluralDemonym')] musí ustoupit."
 sg_disrupt_russian_caucasus: "Narušit ruský Kavkaz"
 sg_secure_persian_border: "Narušit ruský Kavkaz"
 je_disrupt_russian_caucasus: "Narušit ruský Kavkaz"
 je_disrupt_russian_caucasus_reason: "Rodící se Čerkesko, ležící u Černého moře v kavkazské oblasti, představuje příležitost zastavit ruskou konsolidaci v regionu. Rozšíření uznání čerkeského státu a zajištění jeho další existence musí být naší prioritou."
 circassia_dead_tt: "#v $CIR$#! bylo poraženo"
 je_secure_persian_border: "Zajistit perskou hranici"
 je_secure_persian_border_reason: "Přítomnost povstaleckých států na severním Kavkaze ohrožuje naši kontrolu nad regionem, a tím i naši schopnost promítat moc na Blízkém východě. Dlouhotrvající kavkazská válka musí skončit způsobem příznivým pro náš národ."
 je_codify_chinese_border: "Kodifikovat čínskou hranici"
 je_codify_chinese_border_reason: "Naše hranice s Čínou je dlouhá a neformalizovaná. Snaha vytyčit formální hranici mezi naším státem a Čínou by mohla umožnit štědré převody území pod naši kontrolu a přinést minimální riziko budoucích hraničních konfliktů."
 china_doesnt_have_claim_tt: "Žádná cizí [concept_country] nemá [concept_claim] na [SCOPE.sStateRegion('amur_scope').GetName], [SCOPE.sStateRegion('primorye_scope').GetName], [SCOPE.sStateRegion('jetisy_scope').GetName] ani [SCOPE.sStateRegion('altai_scope').GetName]"
 je_consolidate_central_asia: "Konsolidovat středoasijské državy"
 je_consolidate_central_asia_reason: "Region Střední Asie byl dlouho mimo naši kontrolu a spravovala jej směsice různorodých chanátů a emirátů. Abychom zajistili přístup k Indii, musíme zajistit podrobení středoasijských států, ať už jako [Concept('concept_subject', '$concept_subjects$')], nebo přímým dobytím."
 owned_by_this_country_or_subjects_tt: "Je vlastněno zemí [ROOT.GetCountry.GetName] nebo jejími [Concept('concept_subject', '$concept_subjects$')]"
 completely_owned_by_this_country_or_subjects_tt: "Je zcela vlastněno zemí [ROOT.GetCountry.GetName] nebo jejími [Concept('concept_subject', '$concept_subjects$')]"
 je_chinese_concessions: "Získat mandžuské koncese"
 je_chinese_concessions_reason: "Region Mandžuska obsahuje několik oblastí, které mohou sloužit jako cenné nezamrzající přístavy. Získání smluvních koncesí a výstavba železnic v regionu nesmírně prospějí našemu promítání moci v Tichém oceánu."
 owned_by_russia_or_chinese_country: "Stát je vlastněn touto zemí nebo jinou zemí s $manchu$ či $han$ [concept_primary_cultures]"
 je_pacify_kazakh_steppes: "Pacifikovat kazašskou step"
 je_pacify_kazakh_steppes_reason: "Přestože jsme na počátku osmnáctého století formálně rozšířili svou autoritu nad různými kazašskými chanáty, účinná správa kazašské stepi se ukázala jako obtížná. Naše reorganizace regionu v roce 1828 oficiálně nahradila každého bývalého chána ruským jmenovaným [Concept('concept_ruler','$RULER_TITLE_SENIOR_SULTAN$')], ale problém banditismu a rozšířené nespokojenosti s jejich vládou přetrvává. Abychom jej vyřešili, musí být tři žüzy úspěšně pacifikovány a převedeny pod přímou ruskou vládu."
 je_acquire_korean_protectorate: "Zajistit korejský protektorát"
 je_acquire_korean_protectorate_reason: "Korejský poloostrov představuje příležitost k dalšímu rozšíření našeho vlivu do východní Asie a Tichého oceánu. Řádně rozvinutá Korea pod naším dohledem by mohla soupeřit s Japonskem a pomoci posílit naše dálněvýchodní državy proti cizí invazi."
 je_counter_russian_pacific_influence: "Čelit ruskému vlivu v Tichomoří"
 je_counter_russian_pacific_influence_reason: "Ruské získání kvalitních přístavů na jejich tichomořském pobřeží představuje nepřijatelné riziko ztráty námořní dominance v severním Pacifiku. Abychom jejich vliv v regionu zadrželi, musíme hledat spolehlivého spojence mezi nezávislými mocnostmi regionu."
 capital_in_various_east_asian_regions_tt: "[concept_capital_state] je ve [concept_strategic_region] #bold Japonsko#!, #bold Mandžusko#!, #bold Severní Čína#!, #bold Jižní Čína#! nebo #bold Indonésie#!"
 je_consolidate_british_india: "Rozšířit Britskou Indii"
 je_consolidate_british_india_reason: "Existence nezávislých států na okrajích země [SCOPE.sCountry('india_scope').GetName] představuje příležitost rozšířit a obohatit naše kolonie v regionu a zároveň odstranit možné cesty, kterými by naši protivníci mohli ohrozit vysoce výnosné země Indie."
 raj_expanded_westward_tt: "Všechny [Concept('concept_country', '$concept_countries$')] v oblasti [GetGeographicRegion('geographic_region_india').GetName] jsou [Concept('concept_subject', '$concept_subjects$')] země [SCOPE.sCountry('britain_scope').GetName] nebo jejích závislých zemí"
 raj_expanded_eastwards_tt: "Všechny [Concept('concept_state', '$concept_states$')] v oblasti [GetGeographicRegion('geographic_region_burma').GetName] jsou kontrolovány zemí [SCOPE.sCountry('britain_scope').GetName] nebo jejími [Concept('concept_subject', '$concept_subjects$')]"
 je_pamir_expedition_objective: "Zpochybnit ruský Pamír"
 je_pamir_expedition_objective_reason: "Nedávná ruská expanze do pamírských hor představuje nesnesitelnou hrozbu pro naše zájmy v Indii. Vytvoření nárazníkového státu v Tádžikistánu by ponížilo Rusko a poskytlo našim zájmům jižně od Pamíru trochu prostoru k nadechnutí, avšak za cenu vysokého rizika #bold přímé války#! mezi #v $RUS$#! a #v $GBR$#!.\n\nTuto možnost je třeba prozkoumat opatrně."
 pamir_expedition_dismissed_tt: "Tuto možnost #bold zavrhneme#!"
 je_pamir_expedition_dismiss_button: "Odmítnout návrh"
 je_pamir_expedition_dismiss_button_desc: "Tento návrh téměř jistě povede ke zhoubné totální válce proti Rusku. Nejlepší bude, když už nikdy nespatří světlo světa."
