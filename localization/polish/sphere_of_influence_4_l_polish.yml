 lobby_events.1.t: "Zrazená revoluce"
 lobby_events.1.d_join: "Vedení [GetIdeology('ideology_social_democrat').GetName] skupiny [SCOPE.gsInterestGroup('relevant_ig').GetName] se ve snaze uniknout obviněním z komunismu vymezením tvrdé zahraničněpolitické linie začalo přiklánět k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.1.d_form: "Vedení [GetIdeology('ideology_social_democrat').GetName] skupiny [SCOPE.gsInterestGroup('relevant_ig').GetName] ve snaze uniknout obviněním z komunismu vymezením tvrdé zahraničněpolitické linie položilo základy lobby namířené proti [SCOPE.sCountry('relevant_country').GetAdjective] zájmům."
 lobby_events.1.f: "„Spojili jsme se, abychom bojovali proti komunismu,“ řekl [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe], „protože se sami postavili do role nepřátel demokracie. Bez demokracie není svoboda. Násilí, bez ohledu na to, kdo jej používá, je vždy reakční.“\n\nOdezva byla mdlá, potlesk tak řídký, že bylo možné rozeznat jednotlivé účastníky. Přesto to bylo více, než [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe] kdy od tohoto publika dostal - mnohem více." #- Two melded-together Friedrich Ebert quotes
 lobby_events.1.a: "Jejich vlastenectví dává dobrý příklad."
 lobby_events.1.b: "Jejich vlastenectví dává dobrý příklad."
 lobby_events.1.c: "Měli by se těmto zahraničním závazkům vyhnout."
 lobby_events.2.t: "Naši utlačovaní sourozenci"
 lobby_events.2.d_join: "Zveřejněné zprávy o diskriminaci lidí vyznávajících [SCOPE.sReligion('relevant_religion').GetName] v zemi [SCOPE.sCountry('relevant_country').GetName] vedly [SCOPE.gsInterestGroup('relevant_ig').GetName] k přiklonění se k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.2.d_form: "Zveřejněné zprávy o diskriminaci lidí vyznávajících [SCOPE.sReligion('relevant_religion').GetName] v zemi [SCOPE.sCountry('relevant_country').GetName] vedly [SCOPE.gsInterestGroup('relevant_ig').GetName] k zahájení lobbingu za nepřátelský postoj vůči zemi [SCOPE.sCountry('relevant_country').GetName]."
 lobby_events.2.f: "„I oni mohou dojít odpuštění, ano, ale něco takového vyžaduje pokání a [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] vláda je samotnou definicí nekajícné arogance.“\n\n„Jak milosrdné.“\n\n„A přesto prokazuji mnohem více milosrdenství, než kdy projevil jejich [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle]!“\n\nVydal se na válečnou stezku - to bylo obleženému atašé zcela zřejmé. A pokud bude po jeho, brzy se po ní vydá i národ."
 lobby_events.2.a: "Když slova selžou, musíme tasit meč."
 lobby_events.2.b: "Když slova selžou, musíme tasit meč."
 lobby_events.2.c: "Chtějí kvůli #italic tomuhle#! vyvolat mezinárodní incident?"
 lobby_events.3.t: "Technické talenty"
 lobby_events.3.d_join: "Technicky zaměření členové [SCOPE.gsInterestGroup('relevant_ig').GetName], inspirovaní schopnostmi [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] [GetPopType('engineers').GetName] a [GetPopType('academics').GetName], se začali přiklánět k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.3.d_form: "Technicky zaměření členové [SCOPE.gsInterestGroup('relevant_ig').GetName], inspirovaní schopnostmi [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] [GetPopType('engineers').GetName] a [GetPopType('academics').GetName], začali lobbovat za užší vazby se zemí [SCOPE.sCountry('relevant_country').GetName]."
 lobby_events.3.f: "„Podle našich měřítek? Díky metodám, které používají ve svých manufakturách, často ušetří půl člověkohodiny na pracovníka při výrobě stejného množství jako my. Budova, kterou jsem si prohlédl, měla navíc velmi inovativní osvětlovací systém. Představte si, chcete-li, směny prodloužené až o hodinu denně...“\n\nJeho kníratý druh už vytahoval papír a kreslil čáru mezi nesourodými sadami výpočtů. Když položil dva součty vedle sebe, tiše hvízdl."
 lobby_events.3.a: "Společně učiníme velké pokroky."
 lobby_events.3.b: "Společně učiníme velké pokroky."
 lobby_events.3.c: "Naše výtvory dalece předčí ty levné [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] hračky."
 lobby_events.4.t: "Už ne stejní"
 lobby_events.4.d: "Porážka [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('relevant_foreign_ig').GetName] v revoluci zlomila zájem [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] podporovat [SCOPE.sPoliticalLobby('relevant_lobby').GetName]. Zastavili svou obhajobu užších vazeb se zemí [SCOPE.sCountry('relevant_country').GetName]."
 lobby_events.4.f: "Dopisy, které poslali, zůstaly všechny bez odpovědi. Nenápadná návštěva potvrdila jejich nejhorší podezření - budova, kterou kdysi vlastnili, byla zabavena a nyní v ní sídlil apaticky znějící právník, jeho praxe a jeho široká rodina. Tento nový muž byl přítelem ministra - takového, který právě bojoval o své postavení ve velmi doslovném smyslu. Letmý pohled na díry po kulkách, které stále tečkovaly průčelí, posloužil jako definitivní prohlášení, že žádné odškodnění poskytnuto nebude."
 lobby_events.4.a: "Veškerá jejich práce, pryč během okamžiku."
 lobby_events.4.b: "Zdá se, že jsou jen první z mnoha."
 many_igs_leave_lobby_tt: "[SCOPE.gsInterestGroup('leaving_ig').GetName] opouští [SCOPE.sPoliticalLobby('relevant_lobby').GetName]"
 lobby_events.5.t: "Zájmy kapitálu"
 lobby_events.5.d_join: "Zájem [SCOPE.gsInterestGroup('relevant_ig').GetName] o výnosný obchod se zbožím [SCOPE.sGoods('relevant_goods').GetName] se zemí [SCOPE.sCountry('relevant_country').GetName] je vedl k přiklonění se k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.5.d_form: "Zájem [SCOPE.gsInterestGroup('relevant_ig').GetName] o výnosný obchod se zbožím [SCOPE.sGoods('relevant_goods').GetName] se zemí [SCOPE.sCountry('relevant_country').GetName] je vedl k zahájení lobbingu za užší vazby se zemí [SCOPE.sCountry('relevant_country').GetNameNoFormatting]."
 lobby_events.5.f: "„Neumožňuje zvýšený objem více rizika?“\n\n„Právě naopak. Když se člověku do kapes valí záplava peněz, začne mít sklony k mánii. Mince navíc pro číšníka, dříve šokující poplatek zaplacený s úsměvem. Pokud si nedá pozor, přestane hledět do účetních knih. Platí #italic víc#! než kdy dřív - a to je cesta ke zkáze.“\n\n„Výborná připomínka. Ospravedlní to nasazení válečných lodí?“\n\n„Raději ano. Pokud ne, možná postačí dar.“"
 lobby_events.5.a: "Přípitek na naši prosperitu."
 lobby_events.5.b: "Přípitek na naši prosperitu."
 lobby_events.5.c: "Náš vztah by měl zůstat čistě transakční."
 lobby_events.6.t: "Bývalí přátelé"
 lobby_events.6.d: "Odpadlíci vedení [SCOPE.gsInterestGroup('relevant_ig').GetName] se rychle snaží opustit [SCOPE.sPoliticalLobby('relevant_lobby').GetName], odcizeni komunistickou vládou v zemi [SCOPE.sCountry('relevant_country').GetName]."
 lobby_events.6.f: "„Během několika měsíců komunisté udusili samotného ducha [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] národa. Vykořenili starobylý společenský řád a strhli památky kultury. Naši muži v [SCOPE.sCountry('relevant_country').GetCapital.GetCityHubName] sotva unikli živí.“\n\nAtašé tomu dokázal uvěřit. Mužova slova jako by sama řezala vzduch do obrazů rudých vlajek, bajonetů a kouře valícího se z komína vyslanectví.\n\n„Chápu,“ řekl tónem zabarveným nacvičenou úctou. „Okamžitě svolám výbor.“"
 lobby_events.6.a: "To by nemělo nikoho překvapit."
 lobby_events.6.b: "Mohli bychom rozsah tohoto odpadlictví prozatím omezit?"
 lobby_events.7.t: "Proletářská solidarita"
 lobby_events.7.d_join_defect: "[SCOPE.sIdeology('relevant_ideology').GetName] [SCOPE.gsInterestGroup('relevant_ig').GetName], odvolávající se na mezinárodní solidaritu s proletariátem země [SCOPE.sCountry('relevant_country').GetName], přeběhli od [SCOPE.sPoliticalLobby('old_lobby').GetName] k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.7.d_join: "[SCOPE.sIdeology('relevant_ideology').GetName] [SCOPE.gsInterestGroup('relevant_ig').GetName], odvolávající se na mezinárodní solidaritu s proletariátem země [SCOPE.sCountry('relevant_country').GetName], se přiklonili k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.7.d_defect: "[SCOPE.sIdeology('relevant_ideology').GetName] [SCOPE.gsInterestGroup('relevant_ig').GetName], odvolávající se na mezinárodní solidaritu s proletariátem země [SCOPE.sCountry('relevant_country').GetName], přeběhli od [SCOPE.sPoliticalLobby('old_lobby').GetName], aby podpořili své [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] spojence."
 lobby_events.7.d_form: "[SCOPE.sIdeology('relevant_ideology').GetName] [SCOPE.gsInterestGroup('relevant_ig').GetName], odvolávající se na mezinárodní solidaritu s proletariátem země [SCOPE.sCountry('relevant_country').GetName], začali lobbovat na podporu svých [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] spojenců."
 lobby_events.7.f: "„Komunisté se štítí skrývat své názory a cíle. Otevřeně prohlašují, že jejich cílů lze dosáhnout pouze násilným svržením všech dosavadních společenských poměrů. Nechť se vládnoucí třídy třesou před komunistickou revolucí. Proletáři nemají co ztratit než své okovy. Mají dobýt celý svět.\n\nProletáři všech zemí, spojte se!“" #- The Communist Manifesto
 lobby_events.7.a: "Solidarita navždy!"
 lobby_events.7.b: "Jejich skutečná loajalita se odhaluje."
 lobby_events.7.c: "Ať si dělají, co chtějí, my je poslouchat nebudeme."
 lobby_events.8.t: "Zařazení do řady"
 lobby_events.8.d: "[SCOPE.gsInterestGroup('first_party_member').GetName], významní podporovatelé strany [SCOPE.sParty('relevant_party').GetName], navrhli, aby se podpora [SCOPE.sPoliticalLobby('relevant_lobby').GetName] stala součástí oficiální stranické platformy."
 lobby_events.8.f: "„Zvážil jsem rizika a jsem ochoten to prosadit. Skutečnost je taková, že voličům nezáleží a nikdy nezáleželo na ničem mimo naše hranice. I kdyby se nálada v příštích měsících silně obrátila proti [SCOPE.sCountry('relevant_country').GetNameNoFormatting], stále můžeme vést kampaň na základě naší vnitřní politiky, aniž bychom ohrozili naše širší zásady.“\n\n„Chápu logiku. Přesto bych se rád dozvěděl více, než se zavážeme k jedné straně. Postoj, který náš národ zaujme, nesmí být utvářen rozmary ideologů, nýbrž tvrdou nutností.“"
 lobby_events.8.a: "Strana v tom stojí jednotně."
 lobby_events.8.b: "A nechat se obvinit z cizího loutkářství?"
 lobby_events.8.c: "To by mohlo prospět stranické kampani."
 lobby_events.9.t: "Použití zbraní"
 lobby_events.9.d_join: "[SCOPE.gsInterestGroup('relevant_ig').GetName], ohromeni tím, jak [SCOPE.sCountry('relevant_country').GetAdjective] armáda používá sofistikované [SCOPE.GetRootScope.GetCountry.GetCustom('impressive_miltech_text')], se začali přiklánět k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.9.d_form: "[SCOPE.gsInterestGroup('relevant_ig').GetName], ohromeni tím, jak [SCOPE.sCountry('relevant_country').GetAdjective] armáda používá sofistikované #v [SCOPE.GetRootScope.GetCountry.GetCustom('impressive_miltech_text')]#!, začali lobbovat za užší vazby se zemí [SCOPE.sCountry('relevant_country').GetNameNoFormatting]."
 lobby_events.9.f: "Zprávy ze země [SCOPE.sCountry('relevant_country').GetNameNoFormatting] kolovaly po místnosti tolikrát, že jejich okraje už začaly měknout. Někteří účastníci byli v úžasu, jiní ve svém názoru zdrženlivější. Někteří jednoduše odmítali věřit tomu, co bylo napsáno.\n\n„Domnívám se,“ řekl důstojník na konci stolu, „že pokud to zvládnou oni, zvládneme to i my. Dokud to však nezvládneme, měli bychom přijmout opatření, aby ty zbraně nemířily na nás.“"
 lobby_events.9.a: "[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] model stojí za následování."
 lobby_events.9.b: "[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] model stojí za následování."
 lobby_events.9.c: "Neměli by se nechat tak snadno ohromit."
 impressive_miltech_tanks: "Mobilní pancéřování"
 impressive_miltech_breech_loading_artillery: "Zadovkové dělostřelectvo"
 impressive_miltech_ironclads: "Pancéřové lodě"
 impressive_miltech_auto_machine_guns: "Automatické kulomety"
 lobby_events.10.t: "Cizí inspirace"
 lobby_events.10.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName] propadli okouzlení zemí [SCOPE.sCountry('relevant_country').GetName], kterou považují za vzor pro modernizaci [ROOT.GetCountry.GetAdjective] státu. Analýzy [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zákonů a technologií plní jejich publikace."
 lobby_events.10.f: "[SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe|U] si vytvořil vizi. Železniční tratě z [ROOT.GetCountry.GetCapital.GetCityHubName] do [ROOT.GetCountry.GetCapital.GetFarmHubName], plánovaná města s širokými bulváry osvětlenými plynovými lampami, zdravá a profesionální byrokracie. Zápaďané a jejich spojenci měli toto vše, spolu s mnoha dalšími věcmi. [ROOT.GetCountry.GetNameNoFormatting] by to mohl mít také - nic jim v tom nebránilo.\n\nTo však nebyla celá pravda a [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe] si toho byl dobře vědom. Každý dovezený vynález si nesl svou zátěž, riziko, že se staneme [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] provincií. Jak měl [SCOPE.gsInterestGroup('relevant_ig').GetLeader.GetSheHe] najít rovnováhu?"
 lobby_events.10.a: "Z užších vazeb na Západ můžeme mnoho získat."
 lobby_events.10.b: "Z užších vazeb na Západ můžeme mnoho získat."
 lobby_events.10.c: "Jejich posedlost ohrožuje naši svrchovanost."
 lobby_events.11.t: "Přerušený koncert"
 lobby_events.11.d_leave: "Dříve pro-[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('relevant_ig').GetName], zděšena agresivním narušením evropského koncertu ze strany země [SCOPE.sCountry('relevant_country').GetName], opustila [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.11.d_join: "[SCOPE.gsInterestGroup('relevant_ig').GetName], zděšeni agresivním narušením evropského koncertu ze strany země [SCOPE.sCountry('relevant_country').GetName], se přiklonili k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.11.d_form: "Vypuknutí války v Evropě, vyvolané agresivními kroky země [SCOPE.sCountry('relevant_country').GetName], vedlo [SCOPE.gsInterestGroup('relevant_ig').GetName] k zahájení lobbingu proti [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] zájmům."
 lobby_events.11.f: "„Ti zatracení hlupáci! Měl jsem tam investice! Myslí si jejich [SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle], že je Napoleon? Kdo toho využije příště?“\n\n„Dánové, očekávám.“\n\n„Ano, ano, Dánové... předpokládám. Každopádně teď víte, co dělat.“\n\nOdešel s prásknutím dveří a zamračeným výrazem. Tajemník, který zůstal za ním, už připravil obálku adresovanou do [SCOPE.sCountry('relevant_country').GetCapital.GetCityHubName]. S trochou štěstí dorazí do měsíce a dovolí z této šlamastyky ještě něco zachránit."
 lobby_events.11.a: "[SCOPE.sCountry('relevant_country').GetNameNoFormatting] měla každou možnost rozhodnout se jinak."
 lobby_events.11.b: "[SCOPE.sCountry('relevant_country').GetNameNoFormatting] měla každou možnost rozhodnout se jinak."
 lobby_events.11.c: "K odčinění jejich chyby bude třeba mnohem víc."
 lobby_events.11.e: "Jak rychle berou nohy na ramena."
 has_war_with_cover_tt: "Je ve válce s touto zemí"
 is_valid_lobby_target_tt: "Je platným cílem [concept_political_lobby]"
 lobby_events.12.t: "Umělecká inspirace"
 lobby_events.12.d_join: "[SCOPE.gsInterestGroup('relevant_ig').GetName], uchváceni nádhern[SCOPE.GetRootScope.GetCountry.GetCustom('impressive_cultech_text')] vytvořeným [SCOPE.sCountry('relevant_country').GetAdjective] umělci, se začali přiklánět k [SCOPE.sPoliticalLobby('relevant_lobby').GetName]."
 lobby_events.12.d_form: "[SCOPE.gsInterestGroup('relevant_ig').GetName], uchváceni krásn[SCOPE.GetRootScope.GetCountry.GetCustom('impressive_cultech_text')] vytvořeným [SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] umělci, začali lobbovat za užší vazby se zemí [SCOPE.sCountry('relevant_country').GetName]."
 lobby_events.12.f: "[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting] impresionismus. Ta slova do sebe nyní zapadala stejně hladce jako francouzské víno či čínské hedvábí a získávala význam větší než součet svých částí. Mohl by v této galerii strávit zbytek života, dovézt dost mistrovských děl, aby pokryla každou zeď jeho domu, a přesto zůstat stejně uchvácený jako ve chvíli, kdy je poprvé spatřil.\n\nKaždý obraz byl oknem do kultury, jejímuž pochopení by mohl zasvětit celý život, každý tah štětce byl veden silou, která vyrostla z cizího semene. Kolik by mohl o [SCOPE.sCountry('relevant_country').GetNameNoFormatting] pochopit skrze tato díla, kdyby na to měl jen čas a schopnosti?"
 lobby_events.12.a: "Jaká kultura!"
 lobby_events.12.b: "Jaká kultura!"
 lobby_events.12.c: "Jaká kultura?"
