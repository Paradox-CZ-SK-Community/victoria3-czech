 je_consolidate_afghanistan_southeast_status_quo_desc: "Uznání současných faktických hranic Afghánistánu pomůže zajistit afghánskou spolupráci za cenu možných územních zisků."
 je_consolidate_afghanistan_torkestan_line: "Požadovat Torkestánské hory"
 je_consolidate_afghanistan_torkestan_line_desc: "Vymezení hranice podél Torkestánských hor nám zajistí větší část jižního Pamíru a tádžicky mluvící část Afghánistánu, a to za cenu přímé hranice s oblastí Kašmíru."
 je_consolidate_afghanistan_amu_darya_line: "Navrhnout hranici na Amudarji"
 je_consolidate_afghanistan_amu_darya_line_desc: "Vymezení hranice podél řeky Amudarja poskytne pevný nárazník mezi Tádžikistánem a Kašmírem za cenu opuštění jakéhokoli území, které můžeme ovládat jižně od řeky."
