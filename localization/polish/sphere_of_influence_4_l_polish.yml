 all_pashtun_or_tajik_countries_puppeted_tt: "Všechny [GetCulture('pashtun').GetName] nebo [GetCulture('tajik').GetName] [Concept('concept_country', '$concept_countries$')] ve [Concept('concept_strategic_region', 'strategické oblasti')] [SCOPE.sStrategicRegion('persia_region').GetName] jsou našimi [Concept('concept_subject', '$concept_subjects$')]"
 je_maintain_afghan_protectorate: "Zajistit afghánský protektorát"
 je_maintain_afghan_protectorate_reason: "Hornaté pohraničí mezi indickým subkontinentem a středoasijskými stepmi je klíčem k vytvoření pevné a výhodné hranice proti našemu rivalovi. Abychom zajistili ochranu svých zájmů a trasu k útoku na naše protivníky, musíme v celém afghánském regionu získat stabilní [Concept('concept_subject', '$concept_subjects$')]."
 je_maintain_afghan_protectorate_goal: "Navázat a udržet vztah [concept_subject] se všemi afghánskými národy po dobu #variable 10 let#!"
 je_consolidate_afghanistan_objective: "Konsolidovat Afghánistán"
 je_consolidate_afghanistan_objective_reason: "Nejasně vymezené hranice Afghánistánu představují příležitost ke krizi a ničivé válce v Pamíru. Abychom stabilizovali hranici mezi námi a naším protivníkem, musíme spolupracovat na upevnění afghánského státu."
 je_consolidate_afghanistan: "Pamírské vymezení hranic"
 je_consolidate_afghanistan_reason: "Propustné a nejasně vymezené hranice afghánských států sloužily jako ohnisko konfliktů v pamírském regionu. Jednání se zemí [SCOPE.sCountry('rival_gp_scope').GetName] o vymezení mezinárodně uznaných hranic Afghánistánu výrazně přispěje ke snížení rizika války v Pamíru.\n\n[ROOT.GetCountry.GetAdjective] návrhy:\n• #v $AFG$#! se vzdá všech nároků mimo své uznané hranice\n[SCOPE.GetRootScope.GetCountry.GetCustom('afghanistan_delineation_northern_proposal')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('afghanistan_delineation_southeastern_proposal')][SCOPE.GetRootScope.GetCountry.GetCustom('afghanistan_delineation_offer_compensation')][SCOPE.GetRootScope.GetCountry.GetCustom('afghanistan_delineation_threaten_reprisals')]\n\nNávrhy země [SCOPE.sCountry('rival_gp_scope').GetName]:\n• #v $AFG$#! se vzdá všech nároků mimo své uznané hranice\n[SCOPE.sCountry('rival_gp_scope').GetCustom('afghanistan_delineation_northern_proposal')]\n[SCOPE.sCountry('rival_gp_scope').GetCustom('afghanistan_delineation_southeastern_proposal')][SCOPE.sCountry('rival_gp_scope').GetCustom('afghanistan_delineation_offer_compensation')][SCOPE.sCountry('rival_gp_scope').GetCustom('afghanistan_delineation_threaten_reprisals')]"
