 je_great_game_control: "Velká hra"
 je_great_game_control_reason: "Postup směrem #bold vlevo#! na ukazateli bude prospívat #v $GBR$#!, zatímco postup směrem #bold vpravo#! bude prospívat #v $RUS$#!.\n\nPočátkem devatenáctého století se #bold Velká hra#! stala obecným označením pro konflikty mezi #v $GBR$#! a #v $RUS$#! o vliv nad oblastí [GetGeographicRegion('geographic_region_central_asia_old').GetName] a jejím okolím. Jelikož obě vlády považují úplné vojenské vítězství nad tou druhou za nemožné, začala se #bold Velká hra#! vést prostřednictvím řady nepřímých střetů o vliv nad zeměmi ležícími na linii mezi oběma národy.\n\n#bold Vítězství:#!\n[SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_caucasus')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_kazakhstan')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_khanates')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_afghanistan')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_persia')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_victory_korea')]\n#bold Postupy:#!\n#variable Rusko#! - prosazena Turkmenčajská smlouva\n#variable Británie#! - úspěšná expedice do Buchary\n[SCOPE.GetRootScope.GetCountry.GetCustom('great_game_advance_chinese_border')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_advance_consolidated_british_india')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_advance_manchurian_railway')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_advance_contained_russian_pacific')][SCOPE.GetRootScope.GetCountry.GetCustom('great_game_advance_trans_siberian_railway')]"
