 notification_afghanistan_assistance_request_rejected_desc: "[SCOPE.sCountry('relevant_country').GetName] zaslala obecnou odpověď na naši žádost o podporu při sjednocení Afghánistánu, v níž uvádí, že se v tuto chvíli nemůže zavázat k pomoci."
 notification_afghanistan_assistance_request_rejected_tooltip: "#header $notification_afghanistan_assistance_request_rejected_name$#!\n$TOOLTIP_DELIMITER$\n$notification_afghanistan_assistance_request_rejected_desc$"
