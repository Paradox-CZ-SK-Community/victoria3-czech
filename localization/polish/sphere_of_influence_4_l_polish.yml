 gg_core.1.t: "Velký triumf"
 gg_core.1.d: "Prostřednictvím intrik, obratné diplomacie a rozhodné války jsme dovedli Velkou hru k příznivému konci. Naše vítězství přineslo zemi [ROOT.GetCountry.GetName] slávu a zemi [SCOPE.sCountry('opponent_scope').GetName] ponížení na světové scéně."
 gg_core.1.f: "Teď už to psaly dokonce i [SCOPE.sCountry('opponent_scope').GetAdjectiveNoFormatting] noviny. Titulky, které kdysi dokázaly i velké nezdary překroutit v nenápadná vítězství a záchvěvy revanšismu, působily utlumeně a vážně informovaly o zahraničních záležitostech, jako by [ROOT.GetCountry.GetAdjectiveNoFormatting] hegemonie byla něčím, co existovalo odjakživa. Velvyslanec pohlédl na rozložené noviny a obrátil se na písaře, který sotva skrýval vlastní vzrušení.\n\n„Přineste mi jeden výtisk,“ řekl, „tenhle bych si rád pověsil na zeď.“"
 gg_core.1.a: "Klenot v naší koruně, jemuž se žádný jiný nevyrovná."
 gg_core.2.t: "Velká porážka"
 gg_core.2.d: "Rozhodná [SCOPE.sCountry('opponent_scope').GetAdjective] vítězství na polích Velké hry způsobila zemi [ROOT.GetCountry.GetName] obrovské ponížení na světové scéně. Konflikt skončil a skončil naší porážkou."
 gg_core.2.f: "„Poslední desetiletí jsme strávili v nádherném denním snu, bezcílně jsme klopýtali od jednoho neobratného vměšování k druhému. Jednou rukou jsme švihali po cílech, které ležely těsně mimo náš dosah, a druhou jsme si odcizovali ty, kdo nám kdysi byli nakloněni. Velkou hru jsme nikdy nemohli vyhrát - naše raná selhání nás ochromila dávno předtím, než jsme je poznali taková, jaká byla, dřív než jsme si vůbec uvědomili, že ji hrajeme.“"
 gg_core.2.a: "Jsou naše zlaté časy pryč?"
 gg_core.3.t: "Pat"
 gg_core.3.d: "Navzdory obrovským výdajům v boji o mezinárodní vliv nedosáhla ani země [ROOT.GetCountry.GetName], ani země [SCOPE.sCountry('opponent_scope').GetName] ve Velké hře rozhodného vítězství. Obě strany vyšly z konfliktu potlučené a neschopné tu druhou přemoci."
 gg_core.3.f: "Ještě než byla Hra v polovině, vycházely o ní už odhalující knihy. Deníky objevitelů, kteří rozjímali o tom, co viděli v Buchaře či Kábulu. K žádné shodě nikdy nedošlo, ačkoli byly chvíle, kdy nějaký pomíjivý triumf učinil módním prohlašovat britskou či ruskou převahu.\n\nNyní se však určitá shoda rodila, a nebyla taková, na kterou by byl kterýkoli národ hrdý. Velká hra jako pošetilost. Odtud už zbýval jen krátký krok k nové hře - hledání politika, na kterého svalit vinu."
 gg_core.3.a: "Příliš málo k získání."
 gg_core.4.t: "Konec her"
 gg_core.4.d: "Velká hra, která kdysi zacházela s našimi domovinami jako s hracím polem cizích mocností, byla ukončena. Poslední [SCOPE.sCountry('russia_scope').GetAdjective] a [SCOPE.sCountry('britain_scope').GetAdjective] síly opustily Střední Asii, vytlačeny nikoli intrikami té druhé strany, ale našima vlastníma rukama."
 gg_core.4.f: "V těchto dnech se noviny sháněly snáze. Ministr nashromáždil docela slušnou sbírku - Timesy z [SCOPE.sCountry('britain_scope').GetCapital.GetCityHubName], [SCOPE.sCountry('russia_scope').GetCapital.GetCityHubName] Record, Correspondent z Paříže. Minulý týden psaly o návratu vojenské expedice. Tento týden o rezignaci jeho protějšku v [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting]. Tucet drobných zpráv, které naznačovaly jejich bolestnou skutečnost. Selhali a snažili se zachovat si tvář. Oni, věčně povýšení, to možná nebudou ochotni říci nahlas - ale on to přesto věděl a očekával, že to vědí i jejich vlastní lidé."
 gg_core.4.a: "Budou nás oslovovat jako sobě rovné, nyní i navždy."
