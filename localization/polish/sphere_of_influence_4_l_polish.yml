 russo_chinese.4.t: "Ajgunská smlouva"
 russo_chinese.4.d: "Intenzivní vojenské posilování na Sibiři podnítilo jednání mezi diplomaty zastupujícími [ROOT.GetCountry.GetAdjective] a [SCOPE.sCountry('china_scope').GetAdjective] stát. Byla sestavena smlouva, která zajistí vzájemná plavební práva na řece Amur a převede území [SCOPE.sState('amur_scope').GetName] zemi [ROOT.GetCountry.GetName]."
 russo_chinese.4.f: "„Levý břeh řeky Amur, počínaje od řeky Argun až po ústí řeky Amur, bude držením [ROOT.GetCountry.GetAdjectiveNoFormatting] státu a pravý břeh po proudu až k řece Ussuri bude držením [SCOPE.sCountry('china_scope').GetAdjectiveNoFormatting] státu.\n\nOblasti a země od řeky Ussuri k moři budou až do určení hranice mezi oběma státy ve společném vlastnictví [SCOPE.sCountry('china_scope').GetAdjectiveNoFormatting] a [ROOT.GetCountry.GetAdjectiveNoFormatting] státu. Po Amuru, Sungari a Ussuri smějí plout pouze plavidla [SCOPE.sCountry('china_scope').GetAdjectiveNoFormatting] a ruského státu; plavidla všech ostatních cizích států po těchto řekách plout nesmějí...“"
 russo_chinese.4.a: "Nechť je toto vykonáváno přesně a nedotknutelně, navěky."
 emu_war.1.t: "Válka s emuy"
 emu_war.1.d: "[GetPopType('farmers').GetName] ve státě [SCOPE.sState('westralia_state').GetName] si stěžují, že je [SCOPE.gsInterestGroup('armed_forces_ig').GetName] dostatečně nechrání. Jméno jejich nejstrašnějšího nepřítele: Dromaius novaehollandiae."
 emu_war.1.f: "„Připomeň mi ještě jednou, proč bereme tolik nábojů na oslavovaný lov kachen.“\n\n„Kachen? Ty si myslíš, že lovíme vodní ptactvo? Vypláchni si uši, ty troubo. Bůh ti pomáhej, jestli skončíš na špatném konci těch pařátů. A jestli ano, já ti střeva zpátky cpát nebudu.“\n\n„Dobře, dobře, sakra, kámo. Jen jsem chtěl říct, že mi to přijde přehnané.“"
 emu_war.1.a: "Dobře, pošlete tam #italic někoho#!."
 emu_war.1.b: "Máme jim snad sepsat i formální vyhlášení války?"
