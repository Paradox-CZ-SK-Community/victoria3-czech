  japan_single_fire_events_seasonal_familiarity_mod: "Sezónní povědomí" # todo: CHANGED
  japan_events.3.t: "Rok přepočítán" # todo: CHANGED
  japan_events.3.d: "Přijetí nového kalendáře tiše zkrátilo rok. S menším počtem započítaných dnů už mzdy, nájmy a daně neodpovídají očekáváním vytvořeným za starého systému. Dělníci zjišťují, že jejich výplata se zmenšila, a úředníci zápasí s vysvětlováním nesrovnalostí." # todo: CHANGED
  japan_events.3.f: "Dělníci počítali své mince znovu a znovu a kroutili hlavami nespokojeně. Jejich ruce byly otlučené prací, ale viděli málo odměny. Rok se zkrátil a každý ztracený den zanechal stopu v unavených pažích a prázdných kapsách." # todo: CHANGED
  japan_events.3.a: "Rok je kratší. Ať tak je." # todo: CHANGED
  japan_events.3.b: "Přerozdělit břemeno mezi obyvatele." # todo: CHANGED
  japan_events.3.c: "Přijmout ztrátu ve prospěch stability." # todo: CHANGED
  japan_single_fire_events_lost_income_mod: "Šok z kratšího roku na mzdy" # todo: CHANGED
  japan_shortened_year_redistribute_burden_mod: "Přerozdělené fiskální břemeno" # todo: NEW TRANSLATION
  japan_shortened_year_accept_shortfall_mod: "Přijatý kalendářní deficit" # todo: NEW TRANSLATION
  japan_shortened_year_unfair_practices_mod: "Vnímané nespravedlivé daňové praktiky" # todo: NEW TRANSLATION
  japan_shortened_year_fair_tax_burden_mod: "Spravedlivé daňové zatížení" # todo: CHANGED
  japan_single_fire_events_shortfall_discontent_mod: "Nespokojenost způsobená reformou" # todo: CHANGED
  japan_single_fire_events_missing_tax_law_tt: "Nemá [GetLawType('law_per_capita_based_taxation').GetName|l] ani [GetLawType('law_proportional_taxation').GetName|l] [concept_law]" # todo: NEW TRANSLATION
  japan_events.4.t: "Západnění jmen" # todo: NEW TRANSLATION
  japan_events.4.d: "Jak [ROOT.GetCountry.GetName] navazuje diplomacii a obchod se zahraničními mocnostmi, objevily se otázky, jak by měla být jména [GetCulture('japanese').GetName] uváděna v traktátech, korespondenci a úředních dokumentech. Západní zástupci stále více očekávají, že jména budou následovat jejich zvyky a křestní jméno bude předcházet příjmení." # todo: CHANGED
  japan_events.4.f: "Úředníci se skláněli nad svými stoly, pera škrábala dopisy určené zahraničním úředníkům. Šeptali mezi sebou, zda omluví změnu dlouho držené tradice pro lepší srozumitelnost v zahraničí. Ruka s pečetí se na chvíli pozastavila nad papírem, než byla inkoustem vložena pečeť." # todo: CHANGED
  japan_events.4.a: "V zahraniční korespondenci přijmout západní konvence." # todo: CHANGED
  japan_events.4.b: "Zachovat tradiční pořadí jmen." # todo: NEW TRANSLATION
  japan_events.4.c: "Je to nová éra — zavést západní pořadí jmen ve všech případech." # todo: CHANGED
  japan_single_fire_events_name_order_westernized_mod: "Západní pořadí jmen" # todo: CHANGED
  japan_single_fire_events_name_order_traditional_mod: "Zachované tradiční pořadí jmen" # todo: CHANGED
  japan_single_fire_events_name_order_resistance_mod: "Kulturní spor o pojmenovávání" # todo: CHANGED
  japan_single_fire_events_name_order_approval_mod: "Administrativní vyjasnění" # todo: NEW TRANSLATION
  japan_events.5.t: "Otázka Kanbun" # todo: CHANGED
  japan_events.5.d: "Dekréty, nařízení a záznamy dlouho spoléhaly na klasický jazyk srozumitelný pouze vzdělanému málu. Reformátoři tvrdí, že administrativa vedená v běžné japonštině by zlepšila srozumitelnost a efektivitu, zatímco jiní trvají na tom, že právě tradice dodává písemnosti autoritu." # todo: CHANGED
  japan_events.5.f: "Byrokraté pracovali do pozdních hodin a vytrvale přeformulovávali směrnice s tichou rozhodností. Jeden si odmlčel, promnul si oči a pokračoval, dáváce pozor, aby nepřehlédl jediný znak. Každé škrábnutí pera působilo jako malý boj proti zmatku a nepořádku." # todo: CHANGED
  japan_events.5.a: "Prosazovat běžnou japonštinu v úřední správě." # todo: CHANGED
  japan_events.5.b: "Povolit omezenou reformu v interní korespondenci." # todo: CHANGED
  japan_events.5.c: "Zachovat klasický Kanbun ve všech státních dokumentech." # todo: CHANGED
  japan_language_partial_language_reform_mod: "Omezená jazyková reforma v administrativě" # todo: CHANGED
  japan_single_fire_events_language_reform_support_mod: "Přijetí běžné japonštiny v administraci" # todo: CHANGED
  japan_single_fire_events_language_traditionalist_opposition_mod: "Opozice proti běžné japonštině v administraci" # todo: CHANGED
  je_ryukyu_rivalry: "Skrytá doména" # todo: CHANGED
  je_ryukyu_rivalry_reason: "Od doby #b invaze roku 1609#! silami #b Satsuma Domain#! existovalo Království [SCOPE.sCountry('ryukyu_scope').GetName] v podstatě jako doména [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] kromě jména. Navzdory své podmanění Satsuma dvorem v Šuri nadále přijímalo investituru od [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] a vysílalo tributární mise do Pekingu, čímž si udrželo zdání nezávislosti.\n\nTento stav přetrval po generace; nicméně rovnováha sil ve východní Asii se změnila s rostoucí přítomností západních mocností a otevřením Japonska. Obě strany nyní musí vyjasnit svůj vztah k Ryukyu, což spouští otevřený souboj o jižní ostrovy.\n$TOOLTIP_DELIMITER$\n@warning! #r Neúspěch:#! \n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]'s Assertiveness dosáhne #variable 100%#!\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] nebo [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] jsou [Concept('concept_subject','Subjugated')] nebo #b Annexed#!\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] je [Concept('concept_subject','Subjugated')] nebo #b Annexed#! jinou zemí, která se nezapojuje\n\n@information! K ovlivnění:\n Mít #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) s [SCOPE.sCountry('ryukyu_scope').GetName]\n Mít #v Friendly#! nebo #v Amicable#! [concept_relations] s [SCOPE.sCountry('ryukyu_scope').GetName]\n Mít nejvyšší [concept_naval_power_projection]\n Mít [SCOPE.sCountry('ryukyu_scope').GetName] zavázané [concept_obligation] \n Použít akce [concept_journal_entry]" # todo: CHANGED
  je_ryukyu_rivalry_victory_japan: "Pro dosažení #b japonského#! vítězství:\n" # todo: CHANGED
  je_ryukyu_rivalry_victory_china: "Pro dosažení #b čínského#! vítězství:\n" # todo: CHANGED
  je_ryukyu_rivalry_victory_ryukyu: "Pro dosažení #b ryukyuanského#! vítězství:\n" # todo: CHANGED
  ryukyu_rivalry_sway_tt: "Úplné získání vlivu nad Ryukyu zruší jakoukoli kontrolu, kterou nad ní mohou mít protivníci, a znovu umožní [Concept('concept_subject','Subjugation')].\n\nK ovlivnění:\n Mít #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) s Ryukyu\n Mít #v Friendly#! nebo #v Amicable#! [concept_relations] s Ryukyu\n Mít nejvyšší [concept_naval_power_projection]\n Mít Ryukyu zavázané [concept_obligation]\n Použít akce [concept_journal_entry]" # todo: CHANGED
  ryukyu_rivalry_assertiveness_tt: "Ryukyu prosadí svou neutralitu, jakmile ukazatel dosáhne #v 100%#!. Jakmile bude deklarována, již jí nelze udělit status [concept_subject] pomocí [concept_diplomatic_action] po dobu #v 50#! let.\n\nUkazatel Assertiveness se zvýší o #g 0.5#! každý měsíc, pokud zůstane ukazatel Sway mezi #v -20#! a #v +20#!.\n\nRyukyu může prosadit neutralitu tím, že si svede Japonsko a Čínu navzájem proti sobě, použitím dostupných akcí ovlivňujících Sway. \n\nPříklady:\n Mít #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) s oběma nebo žádnou stranou\n Mít #v Friendly#! nebo #v Amicable#! [concept_relations] s oběma nebo žádnou stranou\n Mít dluh vůči oběma nebo žádné straně [concept_obligation]\n Zrušit nebo podepsat výše zmíněné smlouvy, když jedna strana získá převahu" # todo: CHANGED
