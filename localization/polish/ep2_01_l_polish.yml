  japan_events.2.t: "Nerovné kalendáře" # todo: CHANGED
  japan_events.2.d: "Japonský staletý lunisolární kalendář je stále více nesouladný se západním světem. Obchodníci si stěžují na obtíže při koordinaci s cizími partnery, zatímco obyvatelstvo hlásí zmatek kvůli nesouladným svátkům, nájmům a daňovým termínům." # todo: CHANGED
  japan_events.2.f: "Úředníci se skláněli nad svými knihami a pečlivě opisovali každý řádek. Hromádky papírů rostly s každým opakováním a oči je bolely ze sledování měsíců, které už neexistovaly. Starý kalendář tiše mizel." # todo: CHANGED
  japan_events.2.f_telegraph: "Kurýři spěchali ulicemi a doručovali zprávu za zprávou. Lidé se zastavovali, aby si oznámení přečetli, hlavy se jim točily, jak se data posouvala rychleji, než stíhali. Noviny a zprávy putovaly okamžitě a starý kalendář zmizel téměř přes noc." # todo: CHANGED
  japan_events.2.a: "Okamžitě přistoupit ke kalendářní reformě." # todo: CHANGED
  japan_events.2.b: "Využít [GetTechnology('electric_telegraph').GetName] k urychlení změn." # todo: NEW TRANSLATION
  japan_events.2.c: "Prozatím zachovat starý systém." # todo: NEW TRANSLATION
