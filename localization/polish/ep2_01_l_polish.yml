 je_ryukyu_rivalry: "Skrytá doména"
 je_ryukyu_rivalry_reason: "Od #b invaze roku 1609#! silami #b domény Sacuma#! existovalo království [SCOPE.sCountry('ryukyu_scope').GetName] jako doména [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetAltAdjective('G'), 'JAP_ADJ_G')] ve všem kromě jména. Navzdory svému podrobení Sacumou dvůr v Šuri nadále přijímal investituru od [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetAltAdjective('G'), 'CHI_ADJ_G')] a vysílal tributární mise do Pekingu, čímž zachovával zdání nezávislosti.\n\nToto uspořádání přetrvalo po generace; rovnováha sil ve východní Asii se však změnila s rostoucí přítomností západních mocností a otevřením Japonska. Obě strany si nyní musí vyjasnit svůj vztah k Rjúkjú, což vyvolá otevřený zápas o jižní ostrovy.\n$TOOLTIP_DELIMITER$\n@warning! #r Selhání:#! \n Asertivita [SCOPE.sCountry('ryukyu_scope').GetAltAdjectiveNoFlag('G')] dosáhne #variable 100%#!\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] nebo [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] jsou [Concept('concept_subject','podrobeny')] nebo #b anektovány#!\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] je [Concept('concept_subject','podrobeno')] nebo #b anektováno#! nezúčastněnou zemí\n\n@information! Pro přesvědčení:\n Mít s [SCOPE.sCountry('ryukyu_scope').GetAltAdjective('I')] [concept_article|l] #v převod peněz#!  (#g @money!0.1-2K#!)\n Mít #v přátelské#! nebo #v srdečné#! [concept_relations|l] s [SCOPE.sCountry('ryukyu_scope').GetAltAdjective('I')]\n Mít největší [Concept('concept_naval_power_projection','projekci námořné síly')]\n Mít od [SCOPE.sCountry('ryukyu_scope').GetAltAdjective('G')] dlužený [concept_obligation|l] \n Použít akce [Concept('concept_journal_entry','Záznamu v denníku')]"
 je_ryukyu_rivalry_victory_japan: "Pro dosažení #b japonského#! vítězství:\n"
 je_ryukyu_rivalry_victory_china: "Pro dosažení #b čínského#! vítězství:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Pro dosažení #b rjúkjúského#! vítězství:\n"
 ryukyu_rivalry_sway_tt: "Plné přesvědčení Rjúkjú na svou stranu zlomí jakýkoli vliv, který nad ní mohou mít protivníci, a znovu umožní [Concept('concept_subject','podrobení')].\n\nPro přesvědčení:\n Mít s Rjúkjú [concept_article|l] #v převod peněz#! (#g @money!0.1-2K#!)\n Mít #v přátelské#! nebo #v srdečné#! [concept_relations|l] s Rjúkjú\n Mít největší [Concept('concept_naval_power_projection','projekci námořné síly')]\n Mít od Rjúkjú dlužený [concept_obligation|l]\n Použít akce [Concept('concept_journal_entry','Záznamu v denníku')]"
 ryukyu_rivalry_assertiveness_tt: "Rjúkjú prosadí svou neutralitu, jakmile ukazatel dosáhne #v 100%#!. Jakmile ji prosadí, nebude již možné z ní učinit [Concept('concept_subject','závislou zemí')] prostřednictvím [Concept('concept_diplomatic_action','diplomatické akce')] po dobu #v 50#! let.\n\nUkazatel asertivity se zvýší o #g 0,5#! každý měsíc, pokud ukazatel přesvědčení zůstane mezi #v -20#! a #v +20#!.\n\nRjúkjú může prosadit svou neutralitu tím, že bude stavět Japonsko a Čínu proti sobě pomocí dostupných akcí, které ovlivňují přesvědčení. \n\nPříklady:\n Mít [concept_article|l] #v převod peněz#! (#g @money!0.1-2K#!) s oběma stranami nebo s žádnou\n Mít #v přátelské#! nebo #v srdečné#! [concept_relations|l] s oběma stranami nebo s žádnou\n Dlužit [concept_obligation|l] oběma stranám nebo žádné\n Zrušit nebo podepsat výše uvedené smlouvy, když jedna strana získá převahu nebo začne zaostávat"
