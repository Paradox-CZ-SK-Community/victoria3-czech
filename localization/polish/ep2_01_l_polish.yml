 japan_events.2.t: "Rozličné kalendáře"
 japan_events.2.d: "Japonský staletý lunisolární kalendář se stále více rozchází se západním světem. Obchodníci si stěžují na potíže s koordinací se zahraničními partnery, zatímco populace hlásí zmatek kvůli nesouladu svátků, nájmů a daňových lhůt."
 japan_events.2.f: "Písaři seděli sklonění nad svými knihami a pečlivě opisovali každý řádek. Jejich stohy papíru rostly s každým opakováním výš a oči je bolely ze sledování měsíců, které už neexistovaly. Starý kalendář se tiše vytrácel."
 japan_events.2.f_telegraph: "Kurýři spěchali ulicemi a doručovali jednu zprávu za druhou. Lidé se zastavovali, aby si každé oznámení přečetli, hlavy se jim točily, jak se data měnila rychleji, než je dokázali sledovat. Zprávy putovaly okamžitě a starý kalendář zmizel téměř přes noc."
 japan_events.2.a: "Okamžitě pokračujte v reformě kalendáře."
 japan_events.2.b: "Využijte [GetTechnology('electric_telegraph').GetName] k urychlení změn."
 japan_events.2.c: "Prozatím zachovejte starý systém."
