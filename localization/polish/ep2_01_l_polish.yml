 japan_events.4.t: "Pozápadnění jmen"
 japan_events.4.d: "Jak [ROOT.GetCountry.GetName] vede diplomacii a obchod se zahraničními mocnostmi, vyvstaly otázky, jak by měla být [GetCulture('japanese').GetName] jména uváděna ve smlouvách, korespondenci a úředních dokumentech. Západní zástupci stále více očekávají, že jména budou následovat jejich vlastní zvyklosti, tedy že křestní jméno bude předcházet příjmení."
 japan_events.4.f: "Písaři se skláněli nad stoly a pera škrábala po dopisech pro zahraniční úředníky. Šeptem mezi sebou debatovali, zda srozumitelnost v zahraničí ospravedlňuje změnu dlouho udržované tradice. Ruka držící pečeť se zastavila nad papírem a na okamžik zaváhala, než byl inkoust obtisknut."
 japan_events.4.a: "Přijměte západní zvyklosti v zahraniční korespondenci."
 japan_events.4.b: "Zachovejte tradiční pořadí jmen."
 japan_events.4.c: "Toto je nová éra - přijměte západní zvyklost ve všech případech."
 japan_single_fire_events_name_order_westernized_mod: "Pozápadněné jmenné zvyklosti"
 japan_single_fire_events_name_order_traditional_mod: "Zachované tradiční pořadí jmen"
 japan_single_fire_events_name_order_resistance_mod: "Kulturní spor o jména"
 japan_single_fire_events_name_order_approval_mod: "Administrativní vyjasnění"
 japan_events.5.t: "Otázka kanbunu"
 japan_events.5.d: "Výnosy, nařízení a záznamy se dlouho opíraly o klasický jazyk, jemuž rozuměla jen vzdělaná hrstka. Reformátoři tvrdí, že správa vedená v hovorové japonštině by zlepšila srozumitelnost a účinnost, zatímco jiní trvají na tom, že samotná tradice propůjčuje psanému slovu autoritu."
 japan_events.5.f: "Byrokraté pracovali dlouho do noci a s tichým odhodláním neúnavně přeformulovávali směrnice. Jeden se zastavil, aby si promnul oči, pak pokračoval dál, opatrný, aby nevynechal jedinou značku. Každé škrábnutí pera působilo jako malá bitva proti zmatku a nepořádku."
 japan_events.5.a: "Podporujte hovorovou japonštinu v úřední správě."
 japan_events.5.b: "Povolte omezenou reformu v interní korespondenci."
 japan_events.5.c: "Zachovejte klasický kanbun ve všech státních dokumentech."
