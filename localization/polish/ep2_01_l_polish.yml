 japan_events.3.t: "Přepočítaný rok"
 japan_events.3.d: "Přijetí nového kalendáře nenápadně zkrátilo rok. Kvůli menšímu počtu započítaných dnů už mzdy, nájmy a daně neodpovídají očekáváním vytvořeným za starého systému. Dělníci zjišťují, že jejich výplata se snížila, a úředníci se snaží vysvětlit tento nesoulad."
 japan_events.3.f: "Dělníci znovu a znovu počítali své mince a nesouhlasně kroutili hlavami. Ruce jim zhrubly prací, a přesto viděli jen malou odměnu. Rok se zkrátil a každý ztracený den zanechal svou stopu v unavených pažích a prázdných kapsách."
 japan_events.3.a: "Rok je kratší. Budiž."
 japan_events.3.b: "Rozložte zátěž na celou populaci."
 japan_events.3.c: "Převezměte ztrátu v zájmu stability."
