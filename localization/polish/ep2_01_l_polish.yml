l_polish:
 japan_events.1.t: "Dopisy pro všechny"
 japan_events.1.d: "Jak modernističtí myslitelé získávají v [ROOT.GetCountry.GetAltAdjective('L')] vliv, omezení starého kurýrního systému jsou stále zjevnější. Ať už díky demontáži feudálního řádu, nebo šíření gramotnosti mezi populací, nyní existují podmínky pro centralizovanou poštovní službu schopnou podporovat moderní stát."
 japan_events.1.f: "Poslové označení vládní pečetí běhali ulicemi se svými brašnami a nesli nezvyklé množství dopisů. V hlavním městě se úředníci skláněli nad mapami, upravovali trasy a celou noc počítali známky. Obchodníci reptali nad narušením starých kurýrních sítí, zatímco zvědavé děti vhazovaly své první dopisy do nových poštovních schránek. Země, kdysi rozdělená zvyklostmi, začínala mluvit jedním hlasem."
 japan_events.1.a: "Plně financujte celostátní zavedení."
 japan_events.1.b: "Zaměřte se na hlavní městská centra."
 japan_events.1.c: "Přednost mají venkovské oblasti."
 japan_events.1.e: "Svěřte reformu osobě [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Zachovejte starý kurýrní systém."
