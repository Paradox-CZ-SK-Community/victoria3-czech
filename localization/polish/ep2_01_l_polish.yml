l_polish:
  japan_events.1.t: "Dopisy pro všechny" # todo: NEW TRANSLATION
  japan_events.1.d: "Jak modernističtí myslitelé získávají vliv v rámci [ROOT.GetCountry.GetName], omezení starého kurýrního systému se stávají stále zřetelnějšími. Ať už díky zrušení feudálního řádu nebo šíření gramotnosti mezi obyvatelstvem, nyní existují podmínky pro centralizovanou poštovní službu schopnou podporovat moderní stát." # todo: CHANGED
  japan_events.1.f: "Poslové, označení vládním pečetítkem, běželi ulicemi s vaky přes ramena a nesli neobvyklé množství dopisů. V hlavním městě úředníci překlápěli mapy, upravovali trasy a celou noc počítali známky. Obchodníci reptali nad narušením starých kurýrních sítí, zatímco zvědavé děti vhazovaly své první dopisy do nových schránek. Země, kdysi rozdělená zvyky, začínala mluvit jedním hlasem." # todo: CHANGED
  japan_events.1.a: "Plně financovat národní zavedení." # todo: CHANGED
  japan_events.1.b: "Zaměřit se na velká městská centra." # todo: NEW TRANSLATION
  japan_events.1.c: "Prioritu mají venkovské oblasti." # todo: CHANGED
  japan_events.1.e: "Svěřte reformu [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]." # todo: CHANGED
  japan_events.1.g: "Zachovat starý kurýrní systém." # todo: NEW TRANSLATION
