 election_liberal_events.1.t: "Extrémní reakce"
 election_liberal_events.1.d: "Ve své kampani pro nadcházející volby strana [SCOPE.sParty('liberal_party').GetName] směřovala kritiku na stranu [SCOPE.sParty('conservative_party').GetName] za to, že ve svých řadách umožňuje působit [SCOPE.sCharacter('extremist_leader').GetFullName], přičemž poukazuje na [SCOPE.sCharacter('extremist_leader').GetHerHis] krajně pravicové názory jako na příklad toho, jak strana vychází vstříc extremistům."
 election_liberal_events.1.f: "„Říkají si konzervativci, což je samo o sobě prázdnota hodnot a ideálů, ale v této prázdnotě vyrostlo něco ještě horšího. V jejich řadách jsou tací, kteří by se nejen stavěli do cesty změnám naší země, ale chtěli by její budoucnost utvářet podle svých bludných představ o minulosti, která nikdy neexistovala — a jsou připraveni použít jakékoli prostředky, aby toho dosáhli. Neodevzdávejte svůj hlas lehkovážně, pokud nechcete učinit první krok na cestě k válce a genocidě.“"
 election_liberal_events.1.a: "Má to daleko k tradičním hodnotám země [ROOT.GetCountry.GetAdjective], které hlásají."
 election_liberal_events.1.b: "[SCOPE.sCharacter('extremist_leader').GetLastName] je prostě oddaný vlastenec!"
 downplaying_fascism: "Povolená diskriminace"
 election_liberal_events.2.t: "Svoboda bez anarchie"
 election_liberal_events.2.d: "Vzestup anarchistické politické skupiny [SCOPE.sParty('anarchist_party').GetName] byl využit ve volební kampani strany [SCOPE.sParty('liberal_party').GetName], která se líčí jako rozumnější alternativa."
 election_liberal_events.2.f: "„Lidé chtějí svobodu, ale od čeho? Od zákonů, od vlády, od samotné organizované společnosti? Samozřejmě že ne; pouze od zbytečných zákonů, špatné vlády a byzantské byrokracie. Příliš mnoho vlád nechává své výstřelky nekontrolovaně bujet jako stromy, jejichž rozložité větve sahají do každého domu a kapsy, dokud lidé nepřijdou s pochodněmi, aby je spálili. Tomu všemu lze předejít rozumným prořezáváním.“"
 election_liberal_events.2.a: "Skutečná svoboda vyžaduje čas."
 election_liberal_events.2.b: "Zkorumpovaný systém nelze reformovat; musí být svržen."
 election_liberal_events.3.t: "Mírnější [ROOT.GetCountry.GetName]"
 election_liberal_events.3.d: "[SCOPE.sCharacter('pacifist_leader').GetFullName], známý pacifista, vedl kampaň za stranu [SCOPE.sParty('liberal_party').GetName] v nadcházejících volbách na platformě mírumilovnější zahraniční politiky, než jakou se válečnická [ROOT.GetCountry.GetName] stala známou."
 election_liberal_events.3.f: "„Když cestuji do zahraničí, lidé mi říkají: ‚[SCOPE.sCharacter('pacifist_leader').GetFirstNameNoFormatting], je to beznadějné. [ROOT.GetCountry.GetAdjectiveNoFormatting] jsou zvyklí prosazovat svou vůli násilím a hrozbami. Takoví lidé se nikdy nezmění.‘ Říkám jim, že lid země [ROOT.GetCountry.GetAdjectiveNoFormatting] miluje mír, stejně jako lidé všech národů. Proto vůdci používají sílu a klam, aby je přiměli jít do války. Už ne! Lid bude vyslyšen a jeho pověst bude obnovena. Pokud dokážeme znovu získat mír zde, dokáže to celý svět!“"
 election_liberal_events.3.a: "Nyní jsme mírumilovný národ."
 election_liberal_events.3.b: "Naši nepřátelé by se nás neměli přestat bát, dnes ani nikdy."
 election_liberal_events.4.t: "Otevřené trhy"
 election_liberal_events.4.d: "Vysoké ceny zboží [SCOPE.sGoods('expensive_good').GetName] se staly významným tématem volební kampaně strany [SCOPE.sParty('free_trade_campaign_party').GetName], která tvrdí, že její politika volného obchodu by cenu snížila."
 election_liberal_events.4.f: "„Nenechte se oklamat! Obchodní omezení se nenazývají protekcionismem proto, že chrání vás. Chrání několik vybraných ziskuchtivců, ne před hladem nebo chudobou, ale před konkurencí. Chrání je před světem! Chtějí, abyste si mysleli, že jste bezpečnější s botou země [ROOT.GetCountry.GetAdjectiveNoFormatting] na krku, než kdybyste byli svobodní. Je čas přestat chránit je.“"
 election_liberal_events.4.a: "Toto je věk globálního trhu!"
 election_liberal_events.4.b: "Naše současná politika je nezbytná k udržení stability hospodářství."
 election_conservative_events.1.t: "Bezvěrní vůdci"
 election_conservative_events.1.d: "Podpora [SCOPE.sCharacter('atheist_leader').GetFullName] ze strany [SCOPE.sParty('liberal_party').GetName] se stala terčem útoku kampaně strany [SCOPE.sParty('conservative_party').GetName], která tvrdí, že vůdci odmítajícímu náboženství nelze důvěřovat, že dodrží sliby nebo si zachová pevný morální kompas."
 election_conservative_events.1.f: "„Na co takový [SCOPE.sCharacter('atheist_leader').GetWomanMan] přísahá? Jaký trest [SCOPE.sCharacter('atheist_leader').GetSheHe] očekává za to, že tajně poruší [SCOPE.sCharacter('atheist_leader').GetHerHis] slovo? Zdá se, že strana [SCOPE.sParty('liberal_party').GetNameNoFormatting] ve své honbě za svobodou zapomněla na ctnosti potřebné k tomu, aby byli svobodní hnáni k odpovědnosti.“"
 election_conservative_events.1.a: "Ti, kdo jsou tak chudí duchem, nemohou vést [ROOT.GetCountry.GetName]."
 election_conservative_events.1.b: "Možná [SCOPE.sCharacter('atheist_leader').GetLastName] vidí věci jasněji, nespoután náboženským dogmatem."
 election_conservative_events.2.t: "Jednota v tradici"
 election_conservative_events.2.d: "Ve světle [concept_devastation], kterou utrpěly státy jako [SCOPE.sState('devastation_state').GetName], vedla strana [SCOPE.sParty('conservative_party').GetName] kampaň za sjednocení země [ROOT.GetCountry.GetName] v této těžké době kolem tradičních hodnot."
 election_conservative_events.2.f: "„Náš národ leží v troskách, ale [ROOT.GetCountry.GetNameNoFormatting] už dříve povstala z popela a učiní tak znovu, dokud nezapomeneme, kým jsme. Teď není čas na radikalismus ani lehkovážnost. Teď je čas na uzdravení. Musíme hledět k tomu, co nám v minulosti umožnilo vytrvat, a chránit to před těmi, kteří by to chtěli zničit. Dokud znovu nevybudujeme, dokud se neuzdravíme, je to vše, co máme!“"
 election_conservative_events.2.a: "V této těžké době se musíme semknout."
 election_conservative_events.2.b: "To vypadá jako chladnokrevný oportunismus."
 election_conservative_events.3.t: "Zákon a pořádek"
 election_conservative_events.3.d: "Strana [SCOPE.sParty('conservative_party').GetName] poukazuje na rozsáhlý [concept_turmoil] způsobený radikálními aktivitami ve státě [SCOPE.sState('turmoil_state').GetName] a vede kampaň na platformě posílení policejní činnosti."
 election_conservative_events.3.f: "„Zdá se, že lidé si myslí, že i ta nejchatrnější politická záminka může ospravedlnit chaos, který vidíme ve státě [SCOPE.sState('turmoil_state').GetNameNoFormatting]. A pokud si ještě žádnou záminku nevymysleli, naši odpůrci jim ji ochotně poskytnou. My ne! Musíme vyslat jasný vzkaz těm, kdo by chtěli zesměšnit zákon země [ROOT.GetCountry.GetAdjectiveNoFormatting], že spravedlnosti neuniknou.“"
 election_conservative_events.3.a: "Této ráně bylo dovoleno hnisat příliš dlouho."
 election_conservative_events.3.b: "Klíčem k prevenci zločinu je prevence chudoby."
 election_conservative_events.4.t: "Nejlepší obrana"
 election_conservative_events.4.d: "Naši sousedé v zemi [SCOPE.sCountry('election_threatening_neighbor').GetName] se stali známými svou bezohlednou zahraniční politikou, což je obava, kterou strana [SCOPE.sParty('hawk_campaign_party').GetName] vznesla ve své volební kampani a slíbila, že bude na oplátku tvrdší, aby odradila agresi."
 election_conservative_events.4.f: "„Byl mi předložen návrh, aby naši diplomaté studovali více jazyků a usnadnili tak navazování kontaktů po celém světě. To je všechno hezké, ale všichni víme, že existuje jen jeden jazyk, kterému [SCOPE.sCountry('election_threatening_neighbor').GetAdjectiveNoFormatting] surovec rozumí. Na univerzitách ho neučí, ale raději bychom měli být připraveni jím mluvit, pokud chceme, aby hranice zůstala tam, kde je!“"
 election_conservative_events.4.a: "[SCOPE.sCountry('election_threatening_neighbor').GetAdjective] hrozba musí být odstrašena!"
 election_conservative_events.4.b: "Jen hledají terč pro své předvádění."
 election_moderate_events.1.t: "[ROOT.GetCountry.GetGovernment.GetName] svědomí"
 election_moderate_events.1.d: "Vzestup krajně levicových a krajně pravicových politických stran v zemi [ROOT.GetCountry.GetName] vedl stranu [SCOPE.sParty('moderate_party').GetName] k tomu, aby se v nadcházejících volbách vykreslila jako hlas rozumu, umírněná centristická alternativa k extremismu."
 election_moderate_events.1.f: "„Když slyšíte některou rétoriku používanou mými odpůrci, mysleli byste si, že by raději žádné volby vůbec neměli! Přes všechen svůj idealismus se sotva zdá, že se nemohou dočkat, až začnou prolévat krev. Jaké utopie může taková nenávist vybudovat? Cestu do nebe dlážděnou špatnými úmysly.“"
 election_moderate_events.1.a: "Rozumná a stabilní volba pro voliče."
 election_moderate_events.1.b: "Naopak, politika země [ROOT.GetCountry.GetAdjective] by potřebovala trochu rozhýbat!"
 election_moderate_events.2.t: "Rudá hrozba"
 election_moderate_events.2.d: "Vzestup komunismu v mocných zemích, jako je [SCOPE.sCountry('communist_country').GetName], se stal tématem volební kampaně strany [SCOPE.sParty('moderate_party').GetName], která varuje před podobným domácím hnutím."
 election_moderate_events.2.f: "„Není žádným tajemstvím, že komunisté usilují o mezinárodní revoluci. Režim země [SCOPE.sCountry('communist_country').GetAdjectiveNoFormatting] se může zhroutit každým dnem, ale to neznamená, že můžeme brát hrozbu pádu další vlády na lehkou váhu. Ať už si říkají demokratičtí socialisté, syndikalisté nebo jakkoli jinak z těchto produktů levicového frakcionářství, všichni představují hrozbu pro hodnoty země [ROOT.GetCountry.GetAdjectiveNoFormatting].“"
 election_moderate_events.2.a: "Ulice [ROOT.GetCountry.GetCapital.GetCityHubName] nezrudnou, krví ani jinak!"
 election_moderate_events.2.b: "Mezinárodní dělnické hnutí parlamentáři nezastaví."
