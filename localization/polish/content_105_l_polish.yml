 je_warlord_china_reason: "Stav #bold ukazatele postupu#! se bude #tooltippable;tooltip:[Country.GetTooltipTag],je_warlord_china_special_tooltip_advance posouvat vpřed#! nebo #tooltippable;tooltip:[Country.GetTooltipTag],je_warlord_china_special_tooltip_deplete ustupovat#! na základě určitých podmínek. Pokud #bold ukazatel postupu#! dosáhne #variable 0 %#!, povede to k úplné ztrátě kontroly ústřední vlády a uchopení moci despotickými místními úřady.\n\nNavzdory období dočasné stability za císařů Jung-čeng a Čchien-lung se Čína vydala na setrvalý sestup ke kolapsu pod tíhou povstání, špatné správy a vnějšího tlaku. Pokud bude autorita ústřední vlády dostatečně narušena, místní vojenské mocnosti v zemi [SCOPE.GetRootScope.GetCountry.GetName] hrozí, že zemi roztrhají na drobná léna."
