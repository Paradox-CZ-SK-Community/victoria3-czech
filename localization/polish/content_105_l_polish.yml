 peoples_springtime.1.t: "Jiskra revoluce"
 peoples_springtime.1.d: "Revoluční události v zemi [SCOPE.sCountry('revolutionary_country').GetName] inspirují [GetIdeology('ideology_radical').GetName] nálady po celé Evropě."
 peoples_springtime.1.d_france: "Pád monarchie a vyhlášení země [SCOPE.sCountry('revolutionary_country').GetName] vyvolaly po celé Evropě přílivovou vlnu [GetIdeology('ideology_radical').GetName] nálad."
 peoples_springtime.1.f: "„Chápu, že existují určité obavy, že zbraně použité v [ROOT.GetCountry.GetAdjectiveNoFormatting] revoluci by si mohly najít cestu do sousedních zemí a skončit v nesprávných rukou. Nebojím se střelného prachu, ale toho, co by jej mohlo zažehnout. Ne každý člověk touží po moci pro ni samu, ale pokud je přesvědčen, že byl připraven o svůj podíl, může považovat za svou povinnost si jej nárokovat. Co může být nebezpečnější než myšlenka, že moc náleží lidu?“"
 peoples_springtime.1.a: "Kdo povede zemi [ROOT.GetCountry.GetName] do budoucnosti?"
 peoples_springtime.1.b: "Nedovolíme, aby nás tyto ideály rozdělily!"
 peoples_springtime.2.t: "Ozvěny revolucí"
 peoples_springtime.2.d: "Mezinárodně se šíří proud radikálního liberálního myšlení a nedávno dorazil i do země [ROOT.GetCountry.GetName]."
 peoples_springtime.2.f: "„Proč bych se měl zajímat o svobodu tisku? Všechno, co tisknou, jsou nesmysly!“\n\n„Kdybyste věděl, jaké nesmysly se do tisku nedostanou, možná by vám rozdíl mezi jejich druhy připadal důležitější, než si myslíte.“"
 peoples_springtime.2.a: "Poslechněme si, co mají na srdci."
 peoples_springtime.2.b: "Zní to jako hrozba."
 peoples_springtime.3.t: "Revolucionář pro naši dobu"
 peoples_springtime.3.d: "Hlas liberalismu, který je v současnosti na vzestupu, našel odezvu u skupiny [SCOPE.gsInterestGroup('radical_ig').GetName]."
 peoples_springtime.3.f: "„Nevím, co si mám o tomto novém stylu politiky myslet. Zdá se netaktní vznášet požadavky tak bezohledně.“\n\n„Když někdo tvrdí, že samotné předpoklady toho, co tvoří politický takt, jsou chybné, trocha netaktnosti může pomoci tuto pointu zdůraznit.“"
 peoples_springtime.3.a: "Musí být vyslyšen."
 peoples_springtime.3.a.tt: "#bold Radikální#! postava převezme vedení skupiny [SCOPE.gsInterestGroup('radical_ig').GetName]."
 peoples_springtime.3.b: "To je pro [ROOT.GetCountry.GetAdjectiveNoFormatting] politiku až příliš extrémní."
 peoples_springtime.4.t: "Dobré slovo revoluce"
 peoples_springtime.4.d: "Zastánci liberálních reforem se snaží šířit své myšlenky do našich sousedních zemí."
 peoples_springtime.4.f: "„Co když revoluce selže? Co když [ROOT.GetCountry.GetAdjectiveNoFormatting] lid není na tyto myšlenky připraven?“\n\n„Pak zasadíme tisíc semen, a až bude země [ROOT.GetCountry.GetNameNoFormatting] připravena, plody těchto stromů zasejí naši budoucnost.“"
 peoples_springtime.4.a: "Čím jsme my, tím budou i oni!"
 peoples_springtime.4.b: "Tuto nákazu je třeba zadržet!"
 peoples_springtime.5.t: "Probouzející se radikalismus"
 peoples_springtime.5.d: "Radikální liberální proudy v částech země [ROOT.GetCountry.GetName] vyvolávají místní revoluční aktivitu."
 peoples_springtime.5.f: "„Takže to jen místní skupiny dělají rozruch? Žádná celostátní koordinace?“\n\n„Nu, jediné, co můžeme vědět jistě, je, že pokud celostátní koordinace existuje, koordinuje své vlastní utajení.“"
 peoples_springtime.5.a: "Může se to stát kdekoli."
 peoples_springtime.5.b: "Sídlí v srdci naší země."
 peoples_springtime.6.t: "Konec jara"
 peoples_springtime.6.d: "Mezinárodní trend radikálního myšlení a revolučních nálad se chýlí ke konci."
 peoples_springtime.6.f: "„Možná je příliš brzy na to, abychom se shodli, zda naše pokusy skončily úspěchem, nebo selháním. Rád bych věřil, že jsme uvedli do pohybu síly, které budou naše cíle prosazovat ještě dlouho poté, co ohně této éry vyhasnou.“"
 peoples_springtime.6.a: "Svět se mění."
 peoples_springtime.6.a.tt: "[concept_journal_entry] $je_springtime_of_the_peoples$ zmizí ze všech zemí."
 peoples_springtime.7.t: "Vítězná revoluce"
 peoples_springtime.7.d: "Revoluce ukončila monarchickou moc a rozdrtila kontrarevoluci dříve, než mohla povstat. [ROOT.GetCountry.GetAdjective] lid bude mít svou republiku."
 peoples_springtime.7.f: "„Teď není čas odpočívat a obdivovat naši práci! Kolik revolucionářů nevyužilo svou chvíli, jen aby zjistili, že jejich úspěchy byly smeteny jako hrady z písku přílivem dějin? Moc vyklouzla z rukou tyranů a my musíme zajistit, aby ji už nikdy nemohli uchopit.“"
 peoples_springtime.7.a: "Kabinet [SCOPE.gsInterestGroup('radical_ig').GetLeader.GetLastName] přinese ještě větší svobody!"
 peoples_springtime.7.b: "Náš lid je naší silou!"
 peoples_springtime.7.tt: "Radikální vůdci se budou v zemi [ROOT.GetCountry.GetName] objevovat častěji."
 peoples_springtime.8.t: "Revoluce poražena"
 peoples_springtime.8.d: "Pokus o liberální revoluci vedený radikálními vůdci v zemi [ROOT.GetCountry.GetName] byl potlačen mocnostmi, které znovu upevnily svou moc a zatlačily radikály do bezvýznamnosti."
 peoples_springtime.8.f: "„Nižší a střední třídy se vždy pokoušely uchopit moc, ale jen zřídka se jim ji podaří udržet, jakmile ji získají. Je štěstím, že tento pokus byl krátký a neplodný, jinak mohly být tradicím a společenskému řádu země [ROOT.GetCountry.GetNameNoFormatting] způsobeny nevýslovné škody.“"
 peoples_springtime.8.a: "[ROOT.GetCountry.GetRuler.GetFullName] bude vládnout pevně, ale spravedlivě."
 peoples_springtime.8.b: "Lid se nenechá strhnout takovým buřičstvím!"
 peoples_springtime.8.tt: "Radikální vůdci se budou v zemi [ROOT.GetCountry.GetName] objevovat méně často."
