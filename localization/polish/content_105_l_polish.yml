l_polish:
 pm_events.1.t: "Nebezpečné vybavení"
 pm_events.1.d: "V budově [SCOPE.sBuilding('industrialized_pm_building').GetName] ve státě [SCOPE.sState('industrialized_pm_state').GetName] došlo kvůli zvýšené mechanizaci a špatným bezpečnostním předpisům k nárůstu pracovních úrazů."
 pm_events.1.f: "K nehodám docházelo vždy, ale míval jsem pocit, že mám čas zareagovat. Tentokrát ne. Popadl jsem ho za paži, abych ho odtáhl z cesty, ale sotva jsem ho chytil za zápěstí, už jsem držel jen tu paži."
 pm_events.1.a: "Zpomalte výrobu, dokud si personál nezvykne na nové stroje."
 pm_events.1.b: "Nemůžeme brzdit motory pokroku!"
 industrial_safety_slowdowns: "Zpomalení kvůli průmyslové bezpečnosti"
 lacking_industrial_safety_regulations: "Chybějící předpisy průmyslové bezpečnosti"
 slowed_down_production: "Zpomalená výroba"
 ignored_safety_concerns: "Ignorovány bezpečnostní obavy"
 pm_events.2.t: "Nezkušené ruce"
 pm_events.2.d: "Děti pracující v budově [SCOPE.sBuilding('industrialized_pm_building').GetName] ve státě [SCOPE.sState('industrialized_pm_state').GetName] utrpěly zranění při pokusu obsluhovat stroje používané ve výrobě."
 pm_events.2.f: "Po prohlídce chlapcovy ruky se lékař posadil zpět, otočil se k matce a zhluboka si povzdechl.\n\n„Obávám se, že se váš syn nikdy nestane velkým hudebníkem,“ řekl, „ale na druhou stranu to možná nikdy nepatřilo mezi jeho pravděpodobnější vyhlídky.“"
 pm_events.2.a: "Držte děti mimo tovární podlahu!"
 pm_events.2.b: "Tato nová odvětví potřebují všechny zaměstnance, které mohou získat."
 child_labor_restrictions: "Omezení dětské práce"
 dangerous_child_labor: "Nebezpečná dětská práce"
 child_crushing_machines: "Stroje drtící děti"
 pm_events.3.t: "Věčná bdělost"
 pm_events.3.d: "Protestující z hnutí střídmosti protestují proti výrobě alkoholu ve státě [SCOPE.sState('liquor_making_state').GetName]."
 pm_events.3.f: "„Říkají, že mého manžela zabila slabost charakteru, jako každého muže, který propadne lahvi. S hanbou těchto obvinění dokážu žít, ale proč musí mé děti vyrůstat a slýchat takové věci o svém otci, když ti, kdo plní lahve, se vůbec nestydí ničit tolik rodin a životů?“"
 pm_events.3.a: "Musíme přestat destilovat tento jed!"
 pm_events.3.b: "Přestaňme vyrábět nejsilnější lihoviny."
 pm_events.3.c: "[SCOPE.sState('liquor_making_state').GetName] by měl být hrdý na své lihoviny!"
 liquor_production_ban: "Zákaz výroby lihovin"
 liquor_production_restrictions: "Omezení výroby lihovin"
 permitted_limited_liquor_production: "Povolena omezená výroba lihovin"
 permitted_unrestricted_liquor_production: "Povolena neomezená výroba lihovin"
 pm_events.4.t: "Válečné zbohatlictví"
 pm_events.4.d: "Pacifisté vedení [SCOPE.sCharacter('pacifist_leader').GetFullName] protestují proti výrobě zbraní ve státě [SCOPE.sState('arms_making_state').GetName]"
 pm_events.4.f: "„Někteří vám mohou říkat, že [ROOT.GetCountry.GetNameNoFormatting] je v míru,“ řekl [SCOPE.sCharacter('pacifist_leader').GetLastNameNoFormatting] davu. Poté [SCOPE.sCharacter('pacifist_leader').GetSheHe] ukázal směrem k dílně a s opravdovým hněvem v [SCOPE.sCharacter('pacifist_leader').GetHerHis] hlase pokračoval:\n\n„Říkám vám, dokud se z těchto pušek střílí v kterékoli zemi tohoto světa, nejsme v míru! Krev těchto válek je i na našich rukou a nebude smyta, dokud nepřestaneme vyrábět tyto nástroje smrti.“"
 pm_events.4.a: "Zastavte výrobu pušek, dokud se situace neuklidní."
 pm_events.4.b: "Jako kompromis výrazně omezte výrobu zbraní."
 pm_events.4.c: "Nenecháme se zahanbit za své dobré řemeslo!"
 arms_manufacturing_ban: "Zákaz výroby zbraní"
 arms_manufacturing_restrictions: "Omezení výroby zbraní"
 permitted_limited_arms_manufacturing: "Povolena omezená výroba zbraní"
 permitted_unrestricted_arms_manufacturing: "Povolena neomezená výroba zbraní"
 pm_events.5.t: "Dobrý ročník"
 pm_events.5.d: "Víno, které vyprodukuje [SCOPE.sState('vinyard_state').GetName], bylo sommeliéry chváleno jako vynikající."
 pm_events.5.f: "„Když lidé říkají, že něco zraje jako víno, ne vždy rozlišují mezi vínem a #ITALIC vínem#!. Dovolte mi tedy toto rozlišení učinit. Pokud se vám podaří získat láhev ze státu [SCOPE.sState('vinyard_state').GetNameNoFormatting], může být taková láhev víc než jen dobrý zážitek — může být investicí.“"
 pm_events.5.a: "Udělejte z něj exkluzivní produkt na vývoz."
 pm_events.5.b: "Zvyšte výrobu, abychom uspokojili prudce rostoucí poptávku."
 exclusive_wine: "Exkluzivní víno"
 popular_wine: "Oblíbené víno"
 obligation_events.1.t: "Upřednostněná strana"
 obligation_events.1.d: "To, že nám země [SCOPE.sC('obligation_request_target').GetName] dluží závazek, bychom mohli využít k nátlaku, aby do své vlády zahrnula [SCOPE.gsInterestGroup('obligation_request_ig').GetName]."
 obligation_events.1.f: "„Nepřísluší mi říkat ctěnému [SCOPE.sC('obligation_request_target').GetRuler.GetPrimaryRoleTitle], jak má řídit [SCOPE.sC('obligation_request_target').GetRuler.GetHerHis] zemi,“ řekl [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] a mávl [ROOT.GetCountry.GetRuler.GetHerHis] rukou, „chci jen zmínit, že [SCOPE.gsInterestGroup('obligation_request_ig').GetLeader.GetFullNameNoFormatting] je velmi rozumný [SCOPE.gsInterestGroup('obligation_request_ig').GetLeader.GetWomanMan], který si zaslouží být vyslyšen!“"
 obligation_events.1.a: "Potřebují jen malé postrčení správným směrem!"
 obligation_events.a.tt: "Pokud přijmou:"
 obligation_events.b.tt: "Pokud nepřijmou:"
 notification_obligation_events_accepted_tooltip: "#header $notification_obligation_events_accepted_name$#!\n$TOOLTIP_DELIMITER$\n$notification_obligation_events_accepted_desc$"
 notification_obligation_events_accepted_name: "[SCOPE.sC('obligation_request_target').GetName] přijala návrh!"
 notification_obligation_events_accepted_desc: "[SCOPE.sC('obligation_request_target').GetName] přijala náš návrh."
 notification_obligation_events_rejected_tooltip: "#header $notification_obligation_events_rejected_name$#!\n$TOOLTIP_DELIMITER$\n$notification_obligation_events_rejected_desc$"
 notification_obligation_events_rejected_name: "[SCOPE.sC('obligation_request_target').GetName] odmítla návrh!"
 notification_obligation_events_rejected_desc: "[SCOPE.sC('obligation_request_target').GetName] odmítla náš návrh."
 obligation_events.1.b: "Měli bychom se držet stranou od jejich vnitřní politiky."
 obligation_events.2.t: "Cizí zájmy"
 obligation_events.2.d: "Závazek, který dlužíme zemi [SCOPE.sC('obligation_request_sender').GetName], je používán jako záminka k žádosti, abychom do naší vlády zahrnuli jejich přátele ze skupiny [SCOPE.gsInterestGroup('obligation_request_ig').GetName]."
 obligation_events.2.f: "„Jakkoli by bylo trapné nechat jinou zemi diktovat naši politiku, bylo by také poněkud nevhodné, kdyby vkládala větší důvěru do naší opozice než do naší vlády.“"
 obligation_events.2.a: "[SCOPE.sC('obligation_request_sender').GetName] nám kdysi pomohla. Jejich radu přijmeme."
 obligation_events.2.b: "Už samotný návrh je pohoršující!"
 obligation_events.3.t: "Obávaní, ale nemilovaní"
 obligation_events.3.d: "To, že nám země [SCOPE.sC('obligation_request_target').GetName] dluží závazek, bychom mohli využít k žádosti o propagandistickou kampaň, která naši zemi ukáže světu v příjemnějším světle."
 obligation_events.3.f: "„Je dobré, když je země respektována, dokonce obávána, ale můžeme opravdu očekávat, že nás v budoucnu podpoří, pokud většina [SCOPE.sC('obligation_request_target').GetAdjectiveNoFormatting] dětí vyrůstá na příbězích o tom, že je sníme, když nebudou poslouchat?“"
 obligation_events.3.a: "Každý by si měl pamatovat, jak jsme jim přišli na pomoc."
 obligation_events.3.b: "Proč, když jsme země, které je třeba se bát?"
 obligation_events.4.t: "Vlídnější obraz"
 obligation_events.4.d: "Závazek, který dlužíme zemi [SCOPE.sC('obligation_request_sender').GetName], je používán jako záminka k žádosti, abychom jejich zemi vykreslili jako menší hrozbu pro svět."
 obligation_events.4.f: "„Nebyla by to přesně propaganda, kdybychom zemi [SCOPE.sC('obligation_request_sender').GetNameNoFormatting] vykreslili jako zemi, která má na srdci nejlepší zájmy všech. Kdysi nám pomohli, ne snad? Byla by to jen připomínka naší minulosti.“"
 obligation_events.4.a: "Nepochopená země. Zaslouží si druhou šanci!"
 obligation_events.4.b: "Jsou hrozbou. Nebudeme našemu lidu lhát."
 obligation_events.5.t: "[SCOPE.sC('obligation_request_target').GetAdjectiveNoFormatting] talent"
 obligation_events.5.d: "Vidíme příležitost využít závazek, který nám země [SCOPE.sC('obligation_request_target').GetName] dluží, žádostí o službu jejich velitele [SCOPE.sCharacter('obligation_request_character').GetFullName]."
 obligation_events.5.f: "„Ne každému se v jeho domovské zemi dostane příležitostí, které si zaslouží. Jsme ambiciózní země, která využije [SCOPE.sCharacter('obligation_request_character').GetHerHis] schopnosti lépe, než by kdy dokázali oni.“"
 obligation_events.5.a: "Přesně to naše armáda potřebuje!"
 obligation_events.5.b: "Ten závazek má větší cenu než schopnosti jednoho [SCOPE.sCharacter('obligation_request_character').GetWomanMan]."
 obligation_events.6.t: "Žádaný [SCOPE.sCharacter('obligation_request_character').GetWomanMan|U]"
 obligation_events.6.d: "[SCOPE.sC('obligation_request_sender').GetName] využívá závazek, který jí dlužíme, a žádá, aby náš velitel [SCOPE.sCharacter('obligation_request_character').GetFullName] byl vyslán sloužit v její armádě."
 obligation_events.6.f: "„Spousta řečí o službě vlastní zemi v armádě, jako by to byla jednoduchá volba. Co když nejlepší službou, kterou můžete své zemi poskytnout, je sloužit jiné?“"
 obligation_events.6.a: "Malá cena za to, čím si to zasloužili!"
 obligation_events.6.b: "Mohou mít naši vojenskou pomoc, ale ne naše vojenské vůdce."
 obligation_events.tt.no: "Zemi [SCOPE.sC('obligation_request_target').GetName] nebude odeslána žádná zpráva."
 trade_route_events.1.t: "Nebezpeční zbrojíři"
 trade_route_events.1.d: "$ig_armed_forces$ zpochybňují moudrost spoléhání se na dovoz zbraní ze země [SCOPE.sC('arms_seller_threat').GetName], která je uznávanou hrozbou pro naši zemi."
 trade_route_events.1.f: "„Ne že bych zpochybňoval spolehlivost [SCOPE.sC('arms_seller_threat').GetAdjectiveNoFormatting] pušek,“ řekl generál, „ale sotva můžeme počítat s tím, že nám je budou dál dodávat, pokud očekávají, že sami budou hledět do jejich hlavní!“"
 trade_route_events.1.a: "Zřídíme domácí zbrojní průmysl pro případ zrady."
 trade_route_events.1.b: "[SCOPE.sC('arms_seller_threat').GetAdjectiveNoFormatting] hrozba byla zveličena."
 trade_route_events.2.t: "Vypůjčené návrhy"
 trade_route_events.2.d: "Pokročilejší zbraně, které dovážíme ze země [SCOPE.sC('arms_seller_gun_tech').GetName], by mohly poskytnout cenné poznatky pro náš současný vojenský výzkumný projekt."
 trade_route_events.2.f: "„Nebyla by to přesně vojenská špionáž, ani průmyslová špionáž. Spíše by šlo o inovativní poctu našim [SCOPE.sC('arms_seller_gun_tech').GetAdjectiveNoFormatting] přátelům, kteří nám poskytli tak elegantní ukázky puškařského řemesla.“"
 trade_route_events.2.a: "Rozeberte je a zjistěte, jak je znovu složit!"
 trade_route_events.2.b: "Vyrazíme si vlastní cestu k budoucnosti zbraní."
 trade_route_events.3.t: "Dekadentní priority"
 trade_route_events.3.d: "[SCOPE.gsInterestGroup('angry_luxury_import_ig').GetName] zpochybnili morálnost dovozu luxusu do našeho hlavního města, zatímco vysoká cena $grain$ je důvodem k obavám mnoha chudých občanů."
 trade_route_events.3.f: "Položil bednu s větší silou, než bylo nutné, aby zdůraznil svůj názor.\n\n„My víme lépe než kdokoli jiný, kolik zásilek se každý den tahá po těchto docích. Neříkejte mi, že cena bochníku chleba nemá nic společného s tímhle nóbl zbožím, které dnes překládáme!“"
 trade_route_events.3.a: "Budeme se snažit dovážet i toto základní zboží."
 trade_route_events.3.b: "Ať jedí briošky!"
 trade_route_events.4.t: "Materiály průmyslové kvality"
 trade_route_events.4.d: "$ig_industrialists$ považují vysokou cenu $steel$ v hlavním městě za překážku svých ambicí a chtěli by, abychom upřednostnili jeho dovoz."
 trade_route_events.4.f: "„Moji obchodní společníci v zahraničí říkají, že řídím svůj podnik železnou pěstí. Možná to zní hrozivě, ale ve skutečnosti je to poněkud ponižující vtip na můj účet; chtějí tím naznačit, že začínám rezivět!“"
 trade_route_events.4.a: "Najdeme zdroj tohoto životně důležitého materiálu moderní doby."
 trade_route_events.4.b: "Jejich ambicí by nejprve mělo být ocel vyrábět, ne ji používat."
 trade_route_events.5.t: "Plátno myšlenek"
 trade_route_events.5.d: "$ig_intelligentsia$ obtížně shánějí levný $paper$, který potřebují k zvěčnění svých myšlenek."
 trade_route_events.5.f: "„Jedinou výhodou tohoto ubohého stavu věcí,“ řekl profesor s podrážděným povzdechem, „je, že když někdo řekne, že nějaká myšlenka nestojí ani za papír, na němž je vytištěna, myslí to alespoň doslova!“"
 trade_route_events.5.a: "Zajistíme stránky zítřejších klasiků!"
 trade_route_events.5.b: "Naučte se stručnosti."
