 je_corn_laws: "Obilní zákony"
 je_corn_laws_reason: "Naše prohibitivní dovozní daň na obilí působí jako silná protekcionistická politika ve prospěch zájmů třídy vlastníků půdy a v případě zrušení vyvolá otřesy."
 corn_laws.1.t: "Konec obilních zákonů"
 corn_laws.1.d: "Dovozní daň na obilí známá jako obilní zákony byla zrušena, což značí politický odklon od merkantilismu a moci vlastníků půdy."
 corn_laws.1.f: "„Někteří mohou říkat, že jsme se sklonili před vůlí obchodníků a opustili hospodářskou moc drženou půdou naší země ve prospěch vod mezinárodního obchodu. Příliš snadno zapomínají, že nic neohrožuje jejich moc víc než dav hladovějících rolníků.“"
 corn_laws.1.a: "Ať začne obchod s obilím!"
 corn_laws.2.t: "Liga proti obilním zákonům"
 corn_laws.2.d: "V řadách skupiny [SCOPE.gsInterestGroup('pb_ig').GetName] se objevila nová osobnost, která organizuje inovativní nátlakovou kampaň na podporu zrušení obilních zákonů."
 corn_laws.2.f: "„Ve principu volného obchodu spatřuji to, co bude působit na mravní svět tak, jako působí gravitační princip ve vesmíru — přitahovat lidi k sobě, odsouvat stranou nepřátelství rasy, vyznání a jazyka a spojovat nás pouty věčného míru. Pohlédl jsem ještě dál. Spekuloval jsem, a pravděpodobně snil, v mlhavé budoucnosti — ano, za tisíc let — spekuloval jsem o tom, jaký může být účinek vítězství tohoto principu. Věřím, že jeho účinkem bude proměnit tvář světa tak, aby byl zaveden systém vlády zcela odlišný od toho, který převládá nyní.“\n\n— Richard Cobden" # Richard Cobden
 corn_laws.2.a: "Inspirace pro naši dobu!"
 corn_laws.2.b: "Štvavé řečnění tuto politiku nezmění."
 corn_laws_agitator_appears_tt: "V zemi [ROOT.GetCountry.GetName] se objeví [concept_agitator] skupiny [SCOPE.gsInterestGroup('pb_ig').GetName] s ideologií [GetIdeology('ideology_market_liberal').GetName]"
 corn_laws.3.t: "Zrno moci"
 corn_laws.3.d: "Obilní zákony, naše daně z dovozu obilí, poskytly třídám vlastníků půdy značnou hospodářskou páku, kterou využívají k udržení svého vlivu na politiku země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 corn_laws.3.f: "„Debatovat o hospodářské teorii je hezké, ale nesmíme odvracet zrak od reality, kterou tato teorie vytváří. Sliby obilních zákonů, že budou chránit zájmy země [ROOT.GetCountry.GetNameNoFormatting], znějí čím dál prázdněji. Spíše se zdá, že chrání zájmy několika vybraných občanů země [ROOT.GetCountry.GetAdjectiveNoFormatting]. Člověk se může ptát, kolik dalších zákonů je stejných.“"
 corn_laws.3.a: "Každá země potřebuje aristokracii, aby vládla svým nižším."
 corn_laws.3.b: "Znepokojivý vývoj."
 corn_laws.4.t: "Žádný chléb, žádná svoboda"
 corn_laws.4.d: "Naše prohibitivní dovozní daň na obiloviny ztížila chudým možnost dovolit si chléb a lidé ve státě [SCOPE.sState('bread_buying_state').GetName] se blíží hranici hladovění."
 corn_laws.4.f: "„Říkají, že cla jsou zavedena proto, aby chránila každého farmáře země [ROOT.GetCountry.GetAdjectiveNoFormatting] před klesajícími mzdami a hladověním. Že bez nich by trhy zaplavil chléb, na který bychom byli příliš chudí. Na to říkám: k čertu s těmi cly! Už teď hladovím. Bez nich by aspoň mohl být chléb, který by hladovějící člověk mohl ukrást!“"
 corn_laws.4.a: "I chudí musí sklízet plody naší politiky."
 corn_laws.4.b: "Musí to snést kvůli hospodářství."
 corn_law_proponent: "Zastánce obilních zákonů"
