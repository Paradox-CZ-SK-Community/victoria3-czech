 citizenship_laws.1.t: "Míry lebky"
 citizenship_laws.1.d: "Profesoři na Univerzitě ve státě [SCOPE.sState('phreonology_state').GetName] věří, že nové teorie využívající kraniometrii lze použít k prokázání rasových rozdílů, čímž mobilizují podporu pro zákon [SCOPE.sLaw('current_law_scope').GetName]."
 citizenship_laws.1.f: "„Existují samozřejmě individuální rozdíly, které mohou poskytnout pozoruhodné vhledy do povahy nízkých a zločinných rysů, ale rozdíly mezi většími skupinami jsou naším současným zaměřením. Mám zde lebku běžného občana kultury [SCOPE.sCulture('primary_culture_pop').GetNameNoFormatting], za života zdravé mysli i těla, laskavě darovanou naší instituci. Představuje nejvyšší stupeň lidstva. Nyní, jak si jistě dokážete představit, některé další exempláře v mé sbírce jsou podstatně méně vyspělé.“"
 citizenship_laws.1.a: "Fascinující. Přineste posuvná měřítka!"
 citizenship_laws.1.b: "Neplýtvejte časem na tyhle nesmysly."
 citizenship_laws.2.t: "Kulturní přínosy"
 citizenship_laws.2.d: "Debaty kolem zákona [SCOPE.sLaw('current_law_scope').GetName] vyvolaly na Akademii umění ve státě [SCOPE.sState('degenerate_art_state').GetName] diskusi o tom, zda mají umělecká hnutí ovlivněná umělci kultury [SCOPE.sCulture('degenerate_art_pop').GetName] místo v uměleckém světě země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 citizenship_laws.2.f: "„V současném sochařství, malířství i hudbě je cítit zhoubný vliv těchto takzvaných ‚umělců‘. To, že se to vyučuje v našich školách a vystavuje v našich muzeích, je políčkem do tváře duši země [ROOT.GetCountry.GetAdjectiveNoFormatting]. Aby byly city a hodnoty našeho lidu ochráněny před špínou kultury [SCOPE.sCulture('degenerate_art_pop').GetNameNoFormatting], musí být vymýcena!“"
 citizenship_laws.2.a: "Je to vysloveně ne-[ROOT.GetCountry.GetAdjectiveNoFormatting]!"
 citizenship_laws.2.b: "Jejich dílo je součástí našeho uměleckého odkazu."
 citizenship_laws.3.t: "Občané druhé kategorie"
 citizenship_laws.3.d: "Lidé kultury [SCOPE.sCulture('future_discriminated_pop').GetName] se vyslovili proti přijetí zákona [SCOPE.sLaw('current_law_scope').GetName] a tvrdí, že si zaslouží stejná práva jako všichni ostatní občané."
 citizenship_laws.3.f: "„Co to posedlo vůdce tohoto národa, že nás považují za nepřátele? Copak jsme spolu nepracovali, netrpěli spolu, nejedli u stejných stolů a nežili jako bratři a sestry až dosud? Naše děti si budou pamatovat zemi, kterou jejich rodiče pomáhali budovat, zemi, která s nimi zacházela spravedlivě, jako zemi, která se k nim obrátila zády, když podlehla fanatismu a zlobě. Ještě není pozdě obrátit se zpět.“"
 citizenship_laws.3.a: "Jsou škodlivou a cizorodou přítomností!"
 citizenship_laws.3.b: "Jsou součástí společnosti země [ROOT.GetCountry.GetAdjectiveNoFormatting], ale musí být segregováni."
 citizenship_laws.4.t: "Hlas kultury [SCOPE.sCulture('future_accepted_pop').GetName]"
 citizenship_laws.4.d: "Skupina [SCOPE.gsInterestGroup('supporting_ig').GetName] prosazuje přijetí zákona [SCOPE.sLaw('current_law_scope').GetName], počínaje ve vlastních řadách. Politik kultury [SCOPE.sCulture('future_accepted_pop').GetName] může převzít vedení v boji za přijetí této kultury v zemi [ROOT.GetCountry.GetName]."
 citizenship_laws.4.f: "„Vyslat zprávu ostatním je součástí věci, ale není to jediný důvod. Musíme znovu posoudit, kdo je v naší organizaci skutečně schopný a zaslouží si určité pozice, kdo byl v méně osvícených časech přehlížen a ignorován. Pokud uspějeme, celá země [ROOT.GetCountry.GetNameNoFormatting] bude muset udělat totéž.“"
 citizenship_laws.4.a: "Rovnost začíná zde!"
 citizenship_laws.4.b: "Vedení [SCOPE.gsInterestGroup('supporting_ig').GetLeader.GetFullName] je v těchto nejistých časech potřebné."
 citizenship_laws.5.t: "Zloději a lháři"
 citizenship_laws.5.d: "Hnutí [SCOPE.sPoliticalMovement('discrimination_movement').GetName] zahájilo propagandistickou kampaň, která vykresluje lidi kultury [SCOPE.sCulture('future_accepted_pop').GetName] jako zločince, jimž nový zákon [SCOPE.sLaw('current_law_scope').GetName] umožní řádit bez omezení."
 citizenship_laws.5.f: "„Ano, četl jsem ten pamflet. Není to nic nového. ‚[SCOPE.sCulture('future_accepted_pop').GetNameNoFormatting] jsou zloději, [SCOPE.sCulture('future_accepted_pop').GetNameNoFormatting] jsou násilničtí rváči, kultura [SCOPE.sCulture('future_accepted_pop').GetNameNoFormatting] je ze své podstaty zkažená a desegregace bude koncem země [ROOT.GetCountry.GetNameNoFormatting]‘. Obrázek muže kultury [SCOPE.sCulture('future_accepted_pop').GetNameNoFormatting] v hadrech, který neurčitě připomíná mého otce. Napadlo je někdy, že důvod, proč tolik z nás žije v chudobě, je ten, že nás tam současné zákony nutí?“"
 citizenship_laws.5.a: "Musíme se postavit proti těmto odporným lžím."
 citizenship_laws.5.b: "Ať si fňukají."
 citizenship_laws.6.t: "Zákazníci kultury [SCOPE.sCulture('future_accepted_pop').GetName] nejsou vítáni"
 citizenship_laws.6.d: "Někteří $shopkeepers$ vyjádřili odpor vůči rovnému zacházení s lidmi kultury [SCOPE.sCulture('future_accepted_pop').GetName] podle zákona [SCOPE.sLaw('current_law_scope').GetName] a oznámili, že je odmítnou obsloužit."
 citizenship_laws.6.f: "„Pro ty politiky je snadné sepisovat své plány rovnosti a bratrství, ale já musím vést podnik. Pokud začnu pouštět dovnitř [SCOPE.sCulture('future_accepted_pop').GetNameNoFormatting], přijdu o polovinu svých zákazníků. Nejsou to fanatici, víte, jen dobří lidé kultury [SCOPE.sCulture('shopkeeper_pop').GetNameNoFormatting], kteří jsou zvyklí, že se tady věci dělají určitým způsobem. A my je tak budeme dělat dál.“"
 citizenship_laws.6.a: "Taková diskriminace je nepřijatelná."
 citizenship_laws.6.b: "Se svými vlastními podniky si mohou dělat, co chtějí."
