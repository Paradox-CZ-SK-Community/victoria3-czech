 africa_colonial_events.1.t: "Zapojení do závodu o Afriku"
 africa_colonial_events.1.d: "Rostoucí [ROOT.GetCountry.GetAltAdjective('aa')|l] koloniální říše v Africe spolu s novými prostředky k prevenci malárie z nás učinila vážného uchazeče o koloniální ovládnutí kontinentu."
 africa_colonial_events.1.f: "„Když se dívám na tento kontinent, vidím surový, neopracovaný materiál, z něhož lze vytesat cokoli. Ale stejně jako často při práci s hrubým materiálem jsou nehody nevyhnutelné. Něco se zlomí, prolije se krev. [ROOT.GetCountry.GetNameNoFormatting] přece není tak útlocitná, aby nechala trochu krve stát v cestě ambicím, že ne?“"
 africa_colonial_events.1.a: "Vytáhněte mapy a pravítka!"
 africa_colonial_events.2.t: "Naše místo na slunci"
 africa_colonial_events.2.d: "Naše koloniální úsilí v Africe přineslo ovoce a získalo značnou část kontinentu pro naše vlastní záměry."
 africa_colonial_events.2.f: "„Někteří mohou ještě zpochybňovat přesný rozsah naší koloniální říše, ale nikdo nemůže zpochybnit její přítomnost. Těm, kdo se chtějí přít o hranice, říkám to, co jsem říkal vždy: dějiny, nyní stejně jako dříve, píší kartografové.“"
 africa_colonial_events.2.a: "To je teprve začátek říše země [ROOT.GetCountry.GetAdjectiveNoFormatting]!"
 africa_colonial_events.4.t: "Misie do Afriky"
 africa_colonial_events.4.d: "Skupina křesťanských misionářů chce přinést spásu evangelií do naší kolonie ve státě [SCOPE.sState('african_colony_state').GetName]."
 africa_colonial_events.4.f: "„Nevěřím, že každý má nárok na spásu, protože ji musíme mít svobodu odmítnout, ale věřím, že každý má nárok na volbu! Nesmíme, nemůžeme nečinně sedět v zemi [ROOT.GetCountry.GetNameNoFormatting], dokud jsou na tomto světě stále neosvícení pohané. Pokud je koloniální projekt skutečně morální, jak tvrdíte, pak veškeré morální poučení jistě musí začínat touto volbou.“"
 africa_colonial_events.4.a: "Šíření pravé víry je životně důležitou součástí koloniálního projektu!"
 africa_colonial_events.4.b: "Jsme tam pro slávu země [ROOT.GetCountry.GetName], ne pro slávu Boží."
 africa_colonial_events.5.t: "Ukončení obchodu s otroky"
 africa_colonial_events.5.d: "[SCOPE.sCharacter('anti_slave_trade_ig_leader').GetFullName], vůdce skupiny [SCOPE.gsInterestGroup('anti_slave_trade_ig').GetName] a známý odpůrce globálního obchodu s otroky, tvrdí, že naše koloniální ambice ve státě [SCOPE.sState('african_colony_state').GetName] by měly být využity k ukončení této praxe na kontinentu."
 africa_colonial_events.5.f: "„Ukončení otroctví v našich vlastních hranicích je v širším pohledu lidských dějin jen skromným vítězstvím. Dokud budou na tomto světě země ochotné prodávat otroky, budou existovat země, které je budou přicházet kupovat, a naopak. Tento koncept musí být vymýcen všude, kde jej lze nalézt, aby mohl být nakonec vymýcen i v samotné lidské duši.“"
 africa_colonial_events.5.a: "Máme povinnost ukončit otroctví všude, kam dosáhne naše moc!"
 africa_colonial_events.5.a.tt: "Závazek k tomuto cíli může později vést k dalším událostem."
 africa_colonial_events.5.b: "Praktická diplomacie musí mít přednost před takovými moralistickými pocity."
 africa_colonial_events.5.c: "Místní obchod s otroky by mohl být dobrým zdrojem pracovní síly pro naše místní projekty!"
 africa_colonial_events.6.t: "Otroctví a koloniální práce"
 africa_colonial_events.6.d: "Navzdory našemu proklamovanému cíli ukončit obchod s otroky v Africe nedávné zprávy naznačují, že dělníci ve státě [SCOPE.sState('african_colony_state').GetName] jsou pod naší vlastní koloniální správou otroky ve všem kromě jména."
 africa_colonial_events.6.f: "Mladík, který si horečně zapisoval, náhle vypadal omámeně a pokynul tlumočníkovi, aby přestal.\n„Budete mě muset omluvit. To vše musí být zdokumentováno, ale jelikož jsem na kontinentu nový, nejsem zvyklý slýchat o tak divošském chování.“\nTlumočník vypadal chvíli zmateně a otočil se zpět, aby vysvětlil přerušení. Starý místní muž, s nímž vedl rozhovor, odpověděl a tlumočník se obrátil zpět k mladíkovi:\n„Říká, že na to také nebyl zvyklý, dokud nedorazili vaši krajané.“"
 africa_colonial_events.6.a: "To je naprosté pokrytectví. Tato zneužívání musí skončit!"
 africa_colonial_events.6.b: "Může to působit podobně, ale tvrdá práce, kterou poskytujeme, buduje charakter."
 africa_colonial_events.7.t: "Návštěvníci z kolonií"
 africa_colonial_events.7.d: "Intelektuálové ze země [SCOPE.sC('visiting_colonized_country').GetName] navštěvují naše hlavní město a tvrdí, že jejich domovská země je mnohem civilizovanější, než jak ji líčíme, a že naše koloniální záměry vůči nim jsou neopodstatněné."
 africa_colonial_events.7.f: "„Je opravdu zarážející, musím říci, slyšet vás mluvit o okrádání, když vám [ROOT.GetCountry.GetNameNoFormatting] přináší největší dar ze všech — dar civilizace!“\n\n[SCOPE.sC('visiting_colonized_country').GetAdjectiveNoFormatting] gentleman se naklonil blíž a hořce odpověděl.\n\n„Viděl jsem lodě, které připlouvají k našim břehům, i lodě, které odplouvají. Tato civilizace, kterou přinášíte, musí být velmi lehká, ale cena, kterou za ni platíme, se zdá být opravdu těžká.“"
 africa_colonial_events.7.a: "Jsou to jen pózy a lži. Okamžitě je pošlete zpět."
 africa_colonial_events.7.b: "Možná má určitou cenu vyslechnout jejich pohled."
 africa_colonial_events.51.t: "Opovážlivá expedice"
 africa_colonial_events.51.d: "Expedice země [SCOPE.sC('african_colony_conflict_recipient').GetAdjectiveNoFormatting] ve státě [SCOPE.sState('african_colony_state_sender').GetName] narazila na naše vlastní jednotky, což naznačuje, že jejich koloniální ambice v oblasti jsou v rozporu s těmi našimi."
 africa_colonial_events.51.f: "„Ani vzdáleně nešlo o nepřátelské setkání. Naopak, zdálo se, že jsou docela rádi, že potkali další lidi ve, no, řekl bych, že by se tomu dalo říkat stejné řemeslo.“\n\n„Řemeslo! Zapomněli snad, že jsou vojáci? Věří snad, že kolonizace afrického kontinentu je společné úsilí? Pokud setkání našich armád na sporném území nepředstavuje nepřátelské setkání, naši diplomaté v [SCOPE.sC('african_colony_conflict_recipient').GetCapital.GetNameNoFormatting] budou muset být dvakrát tak nepřátelští, aby to vynahradili!“"
 africa_colonial_events.51.a: "Musí se okamžitě obrátit zpět!"
 africa_colonial_events.51.b: "Ve státě [SCOPE.sState('african_colony_state_sender').GetName] je dost země pro všechny!"
 africa_colonial_events.52.t: "Koloniální střet"
 africa_colonial_events.52.d: "Jedna z našich koloniálních expedic ve státě [SCOPE.sState('african_colony_state_recipient').GetName] narazila v oblasti na jednotky země [SCOPE.sC('african_colony_conflict_sender').GetAdjectiveNoFormatting]. [SCOPE.sC('african_colony_conflict_recipient').GetName] požaduje, abychom se obrátili zpět a vzdali se svých záměrů ve státě [SCOPE.sState('african_colony_state_recipient').GetName]."
 africa_colonial_events.52.f: "Dokud nedorazily pokyny z [SCOPE.sC('african_colony_conflict_sender').GetCapital.GetNameNoFormatting] a [SCOPE.sC('african_colony_conflict_recipient').GetCapital.GetNameNoFormatting], zdáli se odhodláni udržet žoviální náladu navzdory formálnímu patu. Důstojník země [SCOPE.sC('african_colony_conflict_sender').GetAdjectiveNoFormatting] odzátkoval láhev [SCOPE.sCountry('african_colony_conflict_sender').GetCustom('alcohol')] a navrhl přípitek. Velitel země [SCOPE.sC('african_colony_conflict_recipient').GetAdjectiveNoFormatting] si neochotně vzal sklenici.\n„Co všechno dělám pro [SCOPE.sC('african_colony_conflict_recipient').GetNameNoFormatting],“ pomyslel si, když ji vypil."
 africa_colonial_events.52.a: "[ROOT.GetCountry.GetName] se nenechá odradit!"
 africa_colonial_events.52.b: "Oni mají vojáky. My máme jen argumenty."
 africa_colonial_events.53.t: "Kontinent příležitostí"
 africa_colonial_events.53.d: "Kolonisté, kteří se přestěhovali do státu [SCOPE.sState('african_colony_state').GetName] v naději, že si vybudují nový život na nových afrických územích země [ROOT.GetCountry.GetName], se v neznámém prostředí snaží přežít."
 africa_colonial_events.53.f: "„Kdyby šlo jen o teplotu a počasí, zvládli bychom to! Kdyby nám nebyly tak zcela cizí také rostlinstvo, zvířena a půda! Věděli jsme, že budeme na hranici nové kapitoly dějin země [ROOT.GetCountry.GetAdjectiveNoFormatting], ale má-li z toho být něco víc než poznámka pod čarou, pomoc, které se nám dosud dostalo, žalostně nestačí.“"
 africa_colonial_events.53.a: "Dodáme jim, co potřebují."
 africa_colonial_events.53.b: "Koloniální správa by jim měla pomoci."
 africa_colonial_events.53.c: "Africké kolonie jsou pro ty, kdo přežijí, ne pro případy závislé na dobročinnosti!"
 africa_colonial_events.54.t: "Neúcta k našim mapám"
 africa_colonial_events.54.d: "[SCOPE.sCountry('african_colony_claim_conflict_recipient').GetName] zřejmě přehlíží náš [concept_claim] na koloniální projekty ve státě [SCOPE.sState('african_colony_claim_state').GetName]. Pokud jim to dostatečně důrazně připomeneme, možná je přesvědčíme, aby nám jej postoupili."
 africa_colonial_events.54.f: "„Možná věří, že tak daleko od [ROOT.GetCountry.GetCapital.GetCityHubName] si toho nevšimneme. Nebo že jde jen o plány, které jsme si vytvořili, ale které bychom ochotně upravili, abychom se vyhnuli diplomatickému konfliktu s někým, kdo tam dorazil první. Ať už mají jakékoli důvody, musí si myslet, že nás mohou ošálit a připravit o náš oprávněný podíl na africkém kontinentu rychlými loděmi a smělými tahy. Co si svět pomyslí o zemi [ROOT.GetCountry.GetNameNoFormatting], pokud jim dáme za pravdu?“"
 africa_colonial_events.54.a: "Mapy jsou jasné. Kolonie je naše!"
 africa_colonial_events.54.b: "Nedělejme incident z několika čar na papíře."
 africa_colonial_events.55.t: "Pochybný nárok"
 africa_colonial_events.55.d: "[SCOPE.sCountry('african_colony_claim_conflict_sender').GetName] si povšimla naší kolonie ve státě [SCOPE.sState('african_colony_claim_state').GetName] a pokouší se prosadit svůj [concept_claim] na tuto oblast tím, že požaduje, abychom jim kolonii postoupili."
 africa_colonial_events.55.f: "„[SCOPE.sCountry('african_colony_claim_conflict_sender').GetAdjectiveNoFormatting] mají sklon k teoretizování, nemyslíte? Zatímco lidé země [ROOT.GetCountry.GetAdjectiveNoFormatting] byli vždy pragmatičtí. Viděli jsme příležitost a chopili jsme se jí. Nyní musíme snášet kňučení těch, kteří by raději mluvili o tom, jaké příležitosti si plánují vzít v budoucnu, a závidí nám to, co už je naše. Bohužel to kňučení začíná být docela hlasité.“"
 africa_colonial_events.55.a: "Co záleží na nároku, když jsme tam dorazili první?"
 africa_colonial_events.55.b: "Prosté nedorozumění! Dostanou ji."
