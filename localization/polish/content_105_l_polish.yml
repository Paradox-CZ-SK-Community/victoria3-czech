 discrimination_events.1.t: "Navzdory překážkám"
 discrimination_events.1.d.culture: "Přestože podle zákonů země [ROOT.GetCountry.GetAdjective] nemají plná práva, někteří bohatší lidé kultury [SCOPE.sPop('discriminated_culture_pop').GetCulture.GetName] se začali stěhovat do čtvrtí a navštěvovat podniky, odkud by za normálních okolností byli vyloučeni."
 discrimination_events.1.d.religion: "Přestože podle zákonů země [ROOT.GetCountry.GetAdjective] nemají plná práva, někteří bohatší lidé náboženství [SCOPE.sPop('discriminated_religion_pop').GetReligion.GetName] se začali stěhovat do čtvrtí a navštěvovat podniky, odkud by za normálních okolností byli vyloučeni."
 discrimination_events.1.f: "„Chceme-li, aby naše děti měly budoucnost, měli bychom je vychovávat právě tady,“ řekl. „Chci, aby žily někde v bezpečí.“\n\nZkřížila ruce.\n\n„Viděl jsi ty pohledy, které po nás vrhají? Když lidé mluví o ‚bezpečí‘, nemyslí bezpečí #ITALIC pro#! nás. Myslí bezpečí #ITALIC před#! námi.“"
 discrimination_events.1.a: "Možná budeme potřebovat nová nařízení k zachování míru."
 discrimination_events.1.b: "Svůj úspěch si poctivě zasloužili, se vším, co obnáší."
 discrimination_events.2.t: "Nůž do zad"
 discrimination_events.2.d.culture: "Pokořeni naší nedávnou vojenskou porážkou mnozí lidé obrátili vinu proti kultuře [SCOPE.sPop('discriminated_culture_pop').GetCulture.GetName] v zemi [ROOT.GetCountry.GetName] a tvrdí, že zradila naše válečné úsilí na domácí frontě."
 discrimination_events.2.d.religion: "Pokořeni naší nedávnou vojenskou porážkou mnozí lidé obrátili vinu proti náboženství [SCOPE.sPop('discriminated_religion_pop').GetReligion.GetName] v zemi [ROOT.GetCountry.GetName] a tvrdí, že zradilo naše válečné úsilí na domácí frontě."
 discrimination_events.2.f: "Prudce praštil sklenicí o stůl. Náhle se přechod od hořkosti k naprostému vzteku v jeho tváři završil naráz.\n\n„Bojovali jsme dobře, úplně každý z nás. Front nezakolísal! Nikdy jsme nezklamali [ROOT.GetCountry.GetNameNoFormatting] a [ROOT.GetCountry.GetNameNoFormatting] nikdy nezklamala nás. Nikdo nezklamal. Ale někdo uspěl. A já vám řeknu kdo.“"
 discrimination_events.2.a: "Musí to tak být! [ROOT.GetCountry.GetName] by nikdy neprohrála férový boj."
 discrimination_events.2.b: "Musíme tuto porážku přijmout jako vlastní."
 discrimination_events.3.t: "Jazyk ve třídě"
 discrimination_events.3.d: "Studenti kultury [SCOPE.sCulture('discriminated_culture').GetName] někdy ve školách země [ROOT.GetCountry.GetAdjectiveNoFormatting] používají svůj rodný jazyk. Někteří volají po tom, aby učitelé používání těchto jazyků trestali a nutili děti mluvit úředním jazykem země [ROOT.GetCountry.GetName]."
 discrimination_events.3.f: "„Taky sis toho všiml, že? Zlobí se, když někdo ve třídě mluví, ale vždycky se zlobí víc, když mluvíme my. Možná si myslí, že mluvíme o něm.“\n\n„Myslím, že se mu jen nelíbí připomínka, že víme něco, co on ne.“"
 discrimination_events.3.a: "Škola by je měla naučit mluvit správným jazykem!"
 discrimination_events.3.b: "Jejich jazyk je součástí jejich dědictví."
 discrimination_events.4.t: "Průmyslové bariéry"
 discrimination_events.4.d: "Bylo hlášeno, že továrny ve státě [SCOPE.sState('discrimination_state').GetName] zařazují lidi kultury [SCOPE.sCulture('discriminated_culture_pop').GetName] na pozice s mimořádně špatnými pracovními podmínkami kvůli jejich postavení občanů druhé kategorie v zemi [ROOT.GetCountry.GetName]."
 discrimination_events.4.f: "„Já vím, já vím. My podnikatelé máme pověst těch, kterým jde jen o konečný zisk. U některých to může být pravda, ale jak to vidím já, každý podnik musí stát na pevných základech hodnot. [SCOPE.sCulture('discriminated_culture_pop').GetNameNoFormatting] těmto hodnotám nerozumí. Jak by mohli? To jsou #ITALIC naše#! hodnoty.“"
 discrimination_events.4.a: "Takové nerovné zacházení nemůže obstát!"
 discrimination_events.4.b: "Mají štěstí, že vůbec dostali nějakou práci."
 industrial_barriers_b_tt: "Všechny státy země [SCOPE.sCountry('home_country').GetAdjective] získají modifikátor #RED -2#! [concept_sol] pro kulturu [SCOPE.sCulture('discriminated_culture_pop').GetName]"
