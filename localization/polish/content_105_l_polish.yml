 je_pumpjacks: "Rozšíření ropného průmyslu"
 je_pumpjacks_reason: "Teprve jsme začali objevovat využití ropy, ale už jsme objevili její určité zásoby. Musíme je bez prodlení využít."
 je_electrical_generation: "Rozšíření elektráren"
 je_electrical_generation_reason: "Někteří tvrdí, že v budoucnu by elektřina mohla pohánět všechno. Ať už se tyto sny naplní, či nikoli, v průmyslu má už nyní hojné využití. Kde je poptávka, musíme vytvořit nabídku."
 production_tech_events.401.t: "Rozkvět ropného průmyslu"
 production_tech_events.401.d: "Nedávné rozšíření budovy [SCOPE.sBuilding('oil_rig_building').GetName] ve státě [SCOPE.sState('oil_rig_state').GetName] posílilo důvěru v budoucnost země [ROOT.GetCountry.GetName] jako producenta ropy."
 production_tech_events.401.f: "„Kdyby naši předkové viděli stroje poháněné černou, hořlavou kapalinou tryskající ze země, jistě by naše technologické zázraky označili za dílo ďábla. Díky Bohu, že žijeme v tak osvícených časech!“"
 production_tech_events.401.a: "Získejte z těch vrtů každou kapku!"
 production_tech_events.401.b: "Najdeme další věci, do nichž půjde dát ropa!"
 production_tech_events.402.t: "Stabilní dodávka energie"
 production_tech_events.402.d: "Nedávné rozšíření budovy [SCOPE.sBuilding('power_plant_building').GetName] ve státě [SCOPE.sState('power_plant_state').GetName] vzbudilo víru v budoucnost, v níž bude celá země [ROOT.GetCountry.GetName] elektrifikována."
 production_tech_events.402.f: "„Spoutání síly burácejících řek a vodopádů tím, že ji přeměníme v sílu bouře, musí být znamením, že se blížíme ke konečné fázi vlády člověka nad přírodou. Jsme připraveni? Morálně, intelektuálně, duchovně? Na tom nezáleží. Přichází to.“"
 production_tech_events.402.a: "Neomezená energie!"
 production_tech_events.402.b: "Veškerá technologie musí být využita pro lepší vlaky."
 production_tech_events.402.c: "Musí existovat i jiné způsoby výroby elektřiny."
 production_tech_events.402.e: "Když světlo svítí nepřetržitě, proč by se práce měla kdy zastavit?"
 oil_production_modifier: "Ropný rozmach"
 electrical_power_production_modifier: "Průkopník elektráren"
 camera_film_pm_events.1.t: "Zachycené světlo a stín"
 camera_film_pm_events.1.d: "Zájem o fotografické umění v celé zemi [ROOT.GetCountry.GetName] dal vzniknout mnoha novým uměleckým hnutím experimentujícím s touto technologií."
 camera_film_pm_events.1.f: "„Zachytit realitu tak, jak ji vnímá lidské oko, bez lásky či milosrdenství lidského srdce, které by obraz změkčily, se může zdát příliš tvrdé. Přesunutím této odpovědnosti z umělce na pozorovatele však doufáme, že lidi přimějeme více si uvědomovat obsah vlastních srdcí.“"
 camera_film_pm_events.1.a: "To by měl být nový nástroj novinových reportérů všude!"
 camera_film_pm_events.1.b: "Měl by sloužit k zachycení krásy země [ROOT.GetCountry.GetName]."
 camera_film_pm_events.1.c: "Měli bychom své úsilí zaměřit na to, aby tyto obrazy ožily."
 camera_film_pm_events.2.t: "Pohyblivý obraz"
 camera_film_pm_events.2.d: "Pořízení filmového záznamového vybavení a zřízení kin po celé zemi [ROOT.GetCountry.GetName] vedlo k tomu, že zde začíná zapouštět kořeny mladý filmový průmysl."
 camera_film_pm_events.2.f: "Když byla malá dívka, jednou si směla vypůjčit fenakistoskop a zůstala uchvácena otáčejícím se diskem, taneční dvojicí, která se na něm zdánlivě neustále otáčela. O mnoho let později to považovala za dětskou představu, prostou iluzi pro tvárnou mysl. \n\nKdyž však spatřila projekci vlaku přijíždějícího do stanice, cítila, jak se do toho okamžiku vrací. Kouzlo bylo znovu skutečné."
 camera_film_pm_events.2.a: "Film je dokonalým nástrojem k zachycení drsné reality naší doby."
 camera_film_pm_events.2.b: "Kinematografie bude novou hranicí vyprávění příběhů!"
 camera_film_pm_events.2.c: "Jaké politické využití bychom mohli najít pro tak působivé médium?"
 je_camera: "Založení fotografického umění"
 je_camera_reason: "Z fotografického aparátu, původně technologické novinky, se stává nástroj umělců k zobrazování světa. Měli bychom stát v čele této nové umělecké formy."
 je_film: "Založení filmového umění"
 je_film_reason: "Technologie zaznamenávání a promítání pohyblivých obrazů představuje fascinující příležitost jak pro nové umělecké ambice, tak pro masovou komunikaci, které bychom se měli chopit vybudováním základů tohoto nového odvětví po celé zemi."
 landscape_photography: "Krajinářská fotografie"
 newspaper_photography: "Novinová fotografie"
 actuality_films: "Aktualitní filmy"
 dramatic_films: "Dramatické filmy"
 famine_political.d: "Hladomor ve státě [SCOPE.sState('famine_state').GetName] vyvolal kritiku hospodářské politiky země [ROOT.GetCountry.GetName], konkrétně"
 famine_political.1.t: "Zastaralé hospodářství"
 famine_political.1.d: "$famine_political.d$ tradicionalismu, s jeho odporem vůči mezinárodnímu obchodu a odmítáním měnit se s dobou."
 famine_political.1.f: "„V čí prospěch nechává [ROOT.GetCountry.GetNameNoFormatting] své hospodářství zůstávat v minulosti, zatímco se svět kolem řítí do modernity? Rozhodně ne ve prospěch těch, kdo leží mrtví ve škarpě. Ti, kterým to prospívá, si možná myslí, že nás tradice oslepila vůči tomu, kdo jsou a co je třeba udělat, ale minulost, které se drží, už neexistuje. Pokud se rozhodnou v ní zůstat, nebudou existovat ani oni.“"
 famine_political.1.a: "Udržování tradic by nemělo stát životy!"
 famine_political.1.b: "Rolníci hladověli v každé éře. Takový je chod světa."
 famine_political.2.t: "Hospodářské vězení"
 famine_political.2.d: "$famine_political.d$ izolacionismu, s jeho odmítáním přijímat zboží z jiných zemí."
 famine_political.2.f: "„Bylo nám řečeno, že máme být hrdí na nezávislost našeho národa na zahraničních produktech; že vše, co potřebujeme, si dokážeme vypěstovat sami. V jakém okamžiku se tato prostá hrdost proměnila v bludy? Kolik dalších musí zemřít, než naši vůdci přiznají, že nemáme potraviny? Je čas spolknout svou hrdost dřív, než bude poslední věcí v této zemi, kterou ještě půjde spolknout.“"
 famine_political.2.a: "Musíme začít dělat výjimky."
 famine_political.2.b: "Budeme soběstační, ať to stojí cokoli."
 famine_political.3.t: "Nevyvážený obchod"
 famine_political.3.d: "$famine_political.d$ merkantilismu, s jeho důrazem na obchod zaměřený na vývoz."
 famine_political.3.f: "„Zdá se, že někteří naši vůdci vnímají [ROOT.GetCountry.GetNameNoFormatting] prostě jako hráče u stolu, který se snaží přechytračit jiné národy a vyhrát jakousi abstraktní hru mimo chápání obyčejného člověka. Kdyby na okamžik odtrhli oči od svých rozvah a podívali se na lidi, kteří vyrábějí zboží na nich uvedené, možná by si všimli, že to jsou lidé z masa a kostí, ne pěšáci, a že potřebují jíst.“"
 famine_political.3.a: "Nezbytný dovoz musí být zajištěn, i za merkantilismu."
 famine_political.3.b: "Co chudí vědí o národním hospodářství?"
 famine_political.4.t: "Svoboda hladovět"
 famine_political.4.d: "$famine_political.d$ volného obchodu, s jeho odevzdáním se tržním silám."
 famine_political.4.f: "„Svoboda obchodu, svoboda trhů — samé poetické výrazy, které zastírají, že ve skutečnosti jde o svobodu těch, kdo mají peníze. Pro ty bez peněz neexistuje žádná nabídka, jakkoli velká je poptávka. Těm, kdo tuto politiku obhajují a nazývají se laissez-faire, říkám toto: Můžete sami sobě lhát, že smrt chudým přináší neviditelná ruka, ale vaše oběti budou vědět, na čích rukou je krev doopravdy.“"
 famine_political.4.a: "Můžeme přiložit ruku na váhy, pokud to zachrání životy."
 famine_political.4.b: "Trhy stanovují ceny spravedlivě; zaplať, nebo zemři."
 famine_political.5.t: "Selhané plány, plánovaná selhání"
 famine_political.5.d: "$famine_political.d$ příkazového hospodářství, s jeho spoléháním na vládní plánování."
 famine_political.5.f: "„Od chvíle, kdy stát převzal kontrolu nad naším hospodářstvím, nám často říkají, že dočasné nedostatky či dokonce trvalé problémy jsou podřízeny velkolepějším plánům pro budoucnost země [ROOT.GetCountry.GetNameNoFormatting]. Už dříve bylo těžké uvěřit, že tato selhání byla součástí plánu. Nyní, když si hladomor každý den bere životy, by trvání na víře, že je to součást velkého státního záměru, bylo ještě horší obžalobou jeho morálního bankrotu než prohlásit jej za neschopný.“
 famine_political.5.a: "Musíme přijmout své selhání a otevřít naše hospodářství."
 famine_political.5.b: "Hladomor? To zní jako opoziční propaganda."
