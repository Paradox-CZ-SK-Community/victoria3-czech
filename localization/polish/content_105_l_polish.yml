 raj.3.t: "Zakázané mazivo"
 raj.3.d: "Úředníci vyjádřili obavy, že nový typ pušky, který má být vydán našim jednotkám, používá mazivo nábojů, jež může obsahovat lůj a sádlo, tabu v hinduistické a muslimské víře."
 raj.3.f: "„Cítil jsem jeho chuť, když jsem se zakousl do náboje. Zjistit v zápalu bitvy, že Společnost našla tak záludný a podlý způsob, jak podkopat víru nás, jejích nejloajálnějších vojáků, byla bezkonkurenční zrada. Kdybych mohl tu kulku vpálit do muže, který za to nesl odpovědnost, udělal bych to bez váhání.“"
 raj.3.a: "Musíme okamžitě provést úpravy, abychom předešli pobouření."
 raj.3.b: "Vojáci se to stejně nedozvědí, nebo snad ano?"
 raj.4.t: "Kala Pani"
 raj.4.d: "Kvůli zákazům v náboženství [SCOPE.sReligion('hindu_pop').GetName] proti překračování moří byli vojáci v minulosti osvobozeni od služby v zámoří. Někteří správci nyní tvrdí, že by tato výjimka měla být odstraněna."
 raj.4.f: "„Ačkoli se může zdát pohodlné požadovat zámořskou službu od každého vojáka, už v minulosti to bylo příčinou konfliktu. Roku 1824 několik pluků v Bengálsku zahájilo vzpouru kvůli plánovanému pochodu do Barmy, protože se obávaly, že budou poslány po moři. Chceme-li verbovat z vyšších kast, musíme chápat, jak vážně toto tabu berou.“"
 raj.4.a: "Je nutné brát tyto místní tradice v úvahu."
 raj.4.b: "Musí sloužit všude, kde jsou potřeba!"
 raj.5.t: "Podezření z proselytismu"
 raj.5.d: "Přítomnost $clergymen$ náboženství [SCOPE.sReligion('suspected_missionaries').GetName] ve státě [SCOPE.sState('missionaries_suspicion_state').GetName] vedla některé místní k podezření, že [ROOT.GetCountry.GetName] plánuje pokusit se obrátit lidi na křesťanství."
 raj.5.f: "„Je dobře známo, že se nám Společnost snaží vnutit své vlastní představy o civilizaci. Kdo může říci, že dalším krokem nebudou masové konverze? Předstírají úctu k naší víře, aby zachovali mír, ale nevykreslovali ji celou dobu jen jako další kulturní prvek, podřadný vůči tomu jejich? Jistě jen vyčkávají na budoucí projekt, v němž nás všechny donutí přijmout jejich víru.“"
 raj.5.a: "To nemůže být dál od pravdy."
 raj.5.b: "Pokud tam jsou, aby šířili svou víru, mohou tak činit."
 raj.6.t: "Vzpoura!"
 raj.6.d: "Po dlouhé době narůstajícího odporu proti vládě Společnosti povstali vojáci a další místní a vyhlásili obnovení moci mughalského císaře v severní Indii."
 raj.6.f: "„Dokud v srdcích našich gházíů zůstane vůně ímánu, potud bude meč Hindustánu blýskat před trůnem Londýna.“" # Bahadur Shah Zafar
 raj.6.a: "Musí být potlačena!"
 raj.6.b: "Ať žije nový Hindustán!"
 raj.7.t: "Konec Společnosti"
 raj.7.a: "Společnost skončila, ale impérium žije dál."
