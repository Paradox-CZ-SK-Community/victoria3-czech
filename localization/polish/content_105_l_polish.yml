 migration_laws.1.t: "Občané světa"
 migration_laws.1.d: "Inspirován probíhající reformou zákona [SCOPE.sLaw('current_law_scope').GetName] sepsal [SCOPE.sCharacter('no_borders_visionary').GetFullName] ze skupiny [SCOPE.sCharacter('no_borders_visionary').GetInterestGroup.GetName] vizi budoucnosti, v níž budou hranice zcela zrušeny."
 migration_laws.1.f: "„Hranice jsou jizvy mapy. Stejně jako jizvy je někteří svým způsobem považují za krásné. Těžce vybojované, těžce získané. Připadají jim tak krásné, že zapomínají, že mapy jizvy nepotřebují, a tak je začínají způsobovat. Na mapách, ale ještě děsivěji na lidech. Den, kdy se dokážeme oprostit od minulosti a necháme jizvy zahojit, bude dnem, kdy můžeme být konečně svobodní.“"
 migration_laws.1.a: "Tohle je budoucnost, kterou chceme!"
 migration_laws.1.b: "Má to správného ducha, ale působí to naivně utopicky."
 migration_laws.2.t: "Cizí víry"
 migration_laws.2.d: "Návrh zákona [SCOPE.sLaw('current_law_scope').GetName] vyvolal ve skupině [SCOPE.gsInterestGroup('devout_ig').GetName] debatu o tom, zda budou přistěhovalci sdílet jedinečně [ROOT.GetCountry.GetAdjectiveNoFormatting] náboženské cítění."
 migration_laws.2.f: "„I kdyby byli [ROOT.GetCountry.GetStateReligion.GetNameNoFormatting], kdo může říci, jaké podivné cizí obřady si s sebou přinesou? Zkomolenou víru [ROOT.GetCountry.GetStateReligion.GetNameNoFormatting], poskvrněnou lidovými praktikami z jejich domoviny. Co se stane s našimi vlastními tradicemi, pokud se takovým věcem bude vycházet vstříc?“"
 migration_laws.2.a: "Měli bychom přijímat přistěhovalce, kteří svou víru nepraktikují tak jako my."
 migration_laws.2.b: "Možná můžeme zavést určitá omezení, abychom tomu zabránili."
 migration_laws.3.t: "Cizí konkurence"
 migration_laws.3.d: "Lidé žijící ve státě [SCOPE.sState('improverished_state').GetName] v zoufalých podmínkách se obávají, že reforma zákona [SCOPE.sLaw('current_law_scope').GetName] zvýší konkurenci na trhu práce."
 migration_laws.3.f: "„Čí to byl nápad? Nejspíš někoho, kdo se nemusel každý den bát, zda bude mít práci, aby měl mzdu, aby mohl žít. Bohatý přistěhovalec nikdy nepůsobí jako hrozba pro ty, kdo už se mají dobře. Ale řeknu vám, tady dole u dna je vždycky těsno.“"
 migration_laws.3.a: "Pokud nedokážou konkurovat, zaslouží si přijít o práci."
 migration_laws.3.b: "Zajistíme, aby o všechny bylo postaráno, pokud na to dojde."
 migration_laws.3.c: "[ROOT.GetCountry.GetAltAdjectiveNoFormatting('sti')] uchazeči o práci by měli mít přednost!"
 migration_laws.4.t: "Udržet [SCOPE.sC('immigrant_fear_neighbor').GetAltAdjectiveNoFormatting('ee')|l] cizáky venku"
 migration_laws.4.d: "Snaha zavést zákon [SCOPE.sLaw('current_law_scope').GetName] byla posílena vlnou odporu vůči našim sousedům v [SCOPE.sC('immigrant_fear_neighbor').GetAltAdjective('L')], která tvrdí, že reforma je nezbytná k zastavení migrace odtamtud."
 migration_laws.4.f: "„Když říkáte kontrola hranic, všichni víme, kterou hranici máte na mysli. Nemusíte to říkat. Měli byste to ale říci. Není ostuda přiznat, koho se snažíme udržet venku. Nemáme se za co stydět. #italic Oni#! by se měli stydět!“"
 migration_laws.4.a: "Ta [SCOPE.sC('immigrant_fear_neighbor').GetAltAdjectiveNoFormatting('aa')|l] prasata jsou přesně důvodem tohoto zákona!"
 migration_laws.4.b: "Jde o obecnou reformu, která nemá s [SCOPE.sC('immigrant_fear_neighbor').GetAltAdjective('I')] nic společného."
 migration_laws.5.t: "Lidé a zboží"
 migration_laws.5.d: "Někteří zastánci volného obchodu se obávají, že imigrační reforma směrem k zákonu [SCOPE.sLaw('current_law_scope').GetName] je prvním krokem k uzavření země [ROOT.GetCountry.GetName] před vnějším světem, nejen před migranty, ale i před trhy."
 migration_laws.5.f: "„Může se zdát, že jde o oddělené otázky a principy, ale to je povrchní analýza. Vysíláme světu zprávu: Nejste tu vítáni. Jak můžeme odmítat lidi z cizích zemí a očekávat, že se s námi budou ochotně dělit o vše, co mohou nabídnout?“"
 migration_laws.5.a: "Možná že je!"
 migration_laws.5.b: "Zákon navrhneme tak, aby bylo jasné, že tomu tak není."
 migration_laws.6.t: "[SCOPE.sCulture('migrant_pop').GetName|U] prosba"
 migration_laws.6.d: "V reakci na návrh zákona [SCOPE.sLaw('current_law_scope').GetName] lidé kultury [SCOPE.sCulture('migrant_pop').GetName] žijící ve státě [SCOPE.sState('migrant_pop_state').GetName] poukázali na to, že tam kdysi také přistěhovali, a že budoucí omezení mohou zabránit jejich příbuzným, aby se k nim připojili."
 migration_laws.6.f: "„Všichni jsme někdy dorazili tam, kde jsme. Někteří včera, jiní v dávno zapomenutých časech. Možná zapomenutých z nějakého důvodu. Kolik krve bylo prolito, když si váš lid nárokoval zemi, kterou dnes nazýváte svou? Odkud berete morální autoritu říkat nám, kdo má právo se k nám zde připojit?“"
 migration_laws.6.a: "Částí smyslu je zabránit všem, aby sem zvali své rodiny!"
 migration_laws.6.b: "Tohle se kultury [SCOPE.sCulture('migrant_pop').GetName] vůbec netýká."
