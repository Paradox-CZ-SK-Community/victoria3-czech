 oil_rush.1.t: "Ropa!"
 oil_rush.1.d: "Objev ropy ve státě [ROOT.GetState.GetName] způsobuje, že se do tohoto státu hrnou lidé v naději, že najdou práci v tomto rychle rostoucím odvětví."
 oil_rush.1.f: "„Zlato? Stříbro? Diamanty? K čemu? Cetky a paráda pro panstvo, lesk zakrývající, že jejich čas už pominul? Poslouchej, příteli, nostalgie může být pozlacená, ale budoucnost — budoucnost běží na ropě.“"
 oil_rush.1.a: "Podpořte tento trend. Ropa je budoucnost!"
 oil_rush.1.b: "Pokrok je nejlepší mírnit opatrností."
 oil_rush.1.c: "Vždy! Vždy podporujte ropnou horečku, kdekoli je objevena."
 oil_rush.1.e: "Opatrnost je vždy moudrá, bez ohledu na čas či místo."
 always_oil_rush_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí vždy, když v některém [concept_state] nastane ropná horečka."
 always_oil_caution_tt: "Tato událost bude v budoucnu skryta a výše uvedené účinky se automaticky použijí vždy, když v některém [concept_state] nastane ropná horečka."
 oil_rush.2.t: "Ropná horečka opadá"
 oil_rush.2.d: "Po dokončení základů ropného odvětví ve státě [SCOPE.sState('oil_state').GetName] jeho přitažlivost a příslib slábnou mezi těmi, kdo si chtějí vydobýt vlastní jmění."
 oil_rush.2.f: "„Povaha těchto podniků je taková, že nakonec bude několik lidí držet všechny trumfy. Odvětví žije dál, ale naše karty už byly vyloženy. My jsme mezi těmi několika nebyli.“"
 oil_rush.2.a: "Ale ropa vydrží navždy..."
 oil_rush.2.b: "Přesuňte odborné znalosti do průmyslové výroby."
 oil_rush.3.t: "Divoké vrty"
 oil_rush.3.d: "Erupce vrtů, ropné požáry a další smrtelné nehody jsou čím dál běžnější, jak se honba za ropou ve státě [ROOT.GetState.GetName] stává bezohlednější."
 oil_rush.3.f: "„Myslíš si, že jsi viděl oheň, ale takový oheň jsi ještě nikdy neviděl,“ řekl a přísně pohlédl na mladíka. „A raději se modli, abys ho nikdy neviděl, protože pokud jsi nebyl na ropných polích, jediné místo, kde bys ho kdy mohl spatřit, je samo peklo.“"
 oil_rush.3.a: "Kde je ropa, tam poteče krev."
 oil_rush.3.b: "Přitlačte na vlastníky, aby zvolili opatrnější přístup."
 oil_rush.4.t: "Ropovod ve státě [ROOT.GetState.GetName]"
 oil_rush.4.d: "Ropné společnosti působící ve státě [ROOT.GetState.GetName] požádaly vládu o pomoc s financováním ropovodu a slibují, že jeho výstavbu doprovodí i další zlepšení infrastruktury."
 oil_rush.4.f: "„Nalít kapalinu do pevné nádoby, tu pevnou nádobu vložit do další pevné nádoby a celou tu změť hnát po železnici — věř mi, v budoucnu se budou smát tomu, jak jsme to kdysi dělali. Teď ti ukážu, jak jednoduché by to mohlo být. Bude to jako otočit kohoutkem.“"
 oil_rush.4.a: "Přispějeme na financování tohoto projektu."
 oil_rush.4.b: "To není v rozpočtu země [ROOT.GetState.GetOwner.GetName]"
 oil_rush.5.t: "Černé zlato, černé peníze"
 oil_rush.5.d: "Vyšetřování odhalilo, že nedávné bohatství vládního politika [SCOPE.sCharacter('bribed_politician').GetFullName] bylo nashromážděno prostřednictvím úplatků od ropných společností, kterým umožnil pronajímat si půdu bez nabídkového řízení."
 oil_rush.5.f: "„Při takovém vyšetřování existuje způsob, jak poznat, že jste na správné stopě. Záznamy o tom, co hledáte, totiž začnou mizet. Čím usilovněji hledáte, tím více toho mizí, až to vypadá, jako by si člověk vyčaroval jmění z ničeho. Jakmile je přinutíte, aby to vypadalo jako kouzlo, můžete začít odhalovat trik.“"
 oil_rush.5.a: "Musíme ze všech stran tohoto skandálu učinit odstrašující příklad."
 oil_rush.5.tt: "[SCOPE.sCharacter('bribed_politician').GetFullName] dostane přísný trest a bude donucen rezignovat."
 oil_rush.5.b: "Zvolený úředník zneužívající své postavení se dopouští závažného zločinu."
 oil_rush.5.c: "Korporátní vůdci podkopávající naši vládu nesmějí zůstat na svobodě."
 oil_rush.5.e: "I velcí lidé dělají chyby. To vše lze vyřešit několika pokutami."
