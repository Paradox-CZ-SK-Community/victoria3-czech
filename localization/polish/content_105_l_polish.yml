 slave_owner_paranoia: "Paranoidní otrokáři"
 slave_owner_paranoia_reason: "Nízká, ale znatelná míra nepokojů mezi otroky v některých státech způsobila, že otrokáři mají stále větší obavy z hnutí [SCOPE.sPoliticalMovement('slave_revolt_movement_scope').GetName]. Začali tvrdě potlačovat i ty nejmenší známky vzpoury mezi zotročeným obyvatelstvem."
 slave_owner_paranoia_radicalization_high: "Existuje jasné a bezprostřední riziko #b povstání otroků#!."
 slave_owner_paranoia_radicalization_mid: "Otrokáři pozorně sledují zvěsti o #b povstání otroků#!."
 slave_owner_paranoia_radicalization_low: "Obavy z #b povstání otroků#! přetrvávají, i když je nepravděpodobné."
 slave_owner_paranoia_events.1.t: "Malé spiknutí"
 slave_owner_paranoia_events.1.d: "Malá skupina lidí byla přistižena při podněcování povstání otroků ve státě [SCOPE.sState('small_conspiracy_state').GetName]. Místní otrokáři však věří, že jde o známky mnohem rozsáhlejšího spiknutí, a požadují potrestání podezřelých."
 slave_owner_paranoia_events.1.f: "„Možná jsme našli jen dva muže, jednu zbraň a spoustu řečí, ale zamyslete se nad tím. Nebylo by neprokazatelné, rozsáhlé spiknutí, které neviditelně rozprostírá svá chapadla po celém městě, přesně tím druhem spiknutí, které by mohlo vyvolat úspěšné povstání? Není už samotná možnost dostatečným důvodem učinit odstrašující příklad z těch, kdo se na něm mohou podílet?“"
 slave_owner_paranoia_events.1.a: "U takové podvratné činnosti nemůžeme podstoupit žádné riziko."
 slave_owner_paranoia_events.1.b: "Takovou bezohlednost by bylo lepší uplatnit při vymítání vašich vlastních démonů."
 slave_owner_paranoia_events.2.t: "Skryté komunity"
 slave_owner_paranoia_events.2.d: "Malé komunity uprchlých otroků, ukryté v odlehlých oblastech státu [SCOPE.sState('hidden_communities_state').GetName], se staly terčem místních otrokářů, kteří se obávají, že by mohly pomáhat při případných povstáních."
 slave_owner_paranoia_events.2.f: "Vzal si první hlídku. Brzy se drobné noční zvuky začaly odlišovat od toho, co zpočátku působilo jako naprosté ticho. Zvuky stromů a močálů, větru a vody; bezpečné zvuky.\n\nVždycky rád naslouchal noci. I tehdy na plantáži bylo toto ticho, nebo něco tak blízkého tichu, jak jen se dalo dostat, zdrojem útěchy. Teď však znamenalo něco víc: každá noc ticha byla další nocí svobody."
 slave_owner_paranoia_events.2.a: "Samotná existence takových míst podkopává autoritu našich institucí!"
 slave_owner_paranoia_events.2.b: "Čeho by asi dosáhli lovem lidí uprostřed ničeho?"
 slave_owner_paranoia_events.3.t: "Hostující abolicionista"
 slave_owner_paranoia_events.3.d: "[SCOPE.sCharacter('visiting_abolitionist_scope').GetFullName] ze skupiny [SCOPE.gsInterestGroup('visiting_abolitionist_ig').GetName] v poslední době cestuje po státě [SCOPE.sState('visiting_abolitionist_state').GetName], kde sbírá svědectví pro abolicionistickou věc a zároveň ji šíří. Otrokáři ve státě to považují za pokus podnítit mezi otroky násilné povstání a požadují, aby byl [SCOPE.sCharacter('visiting_abolitionist_scope').GetLastName] ze státu okamžitě vypovězen."
 slave_owner_paranoia_events.3.f: "„Ach, vy považujete [SCOPE.sCharacter('visiting_abolitionist_scope').GetHerHim] za ‚umírněného‘? Slyšeli jste [SCOPE.sCharacter('visiting_abolitionist_scope').GetHerHim] mluvit? [SCOPE.sCharacter('visiting_abolitionist_scope').GetSheHe|U] možná otevřeně nemluví o tom, že by otroci měli povstat proti svým pánům, ale v každém projevu je obžaloba samotné instituce a každého, kdo ji podporuje, tak přísná, že je těžké si představit, že by posluchač sympatizující s touto věcí dospěl k jinému závěru. Otroci možná nesmějí poslouchat, ale i pouhá zpráva, že se zde takové projevy konají, jim dodá odvahu. Je to jen otázka času, pamatujte na má slova.“"
 slave_owner_paranoia_events.3.a: "Opodstatněné obavy. [SCOPE.sCharacter('visiting_abolitionist_scope').GetLastName] je potížista."
 slave_owner_paranoia_events.3.b: "Mluvit o svobodě a spravedlnosti musí být vždy povoleno."
