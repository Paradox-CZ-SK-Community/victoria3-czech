 je_liberalism_1: "Cesta k liberalismu"
 je_liberalism_1_reason: "Demokratičtější společnost se správnými ideály položí základy země, kde je svoboda všech občanů nejvyšší hodnotou."
 has_ideology_liberal_tt: "Má [concept_ideology] [GetIdeology('ideology_liberal').GetName]"
 je_liberalism_2: "Svoboda obchodu"
 je_liberalism_2_reason: "Otevřená země, která obchoduje se sousedy i vzdálenými národy, je klíčem k budoucnosti hospodářského liberalismu."
 je_liberalism_2_goal: "Zvyšte [concept_trade] země [ROOT.GetCountry.GetAdjective] o 50 %."
 je_liberalism_3: "Svoboda myšlení"
 je_liberalism_3_reason: "Tím, že umožníme slovu být svobodné, osvobodí se s ním i myšlení, což přinese novou éru radikálních inovací a reforem."
 je_liberalism_4: "Nový kolos"
 je_liberalism_4_reason: "Lidé všech ras a vyznání budou vítáni v naší svobodné a otevřené společnosti!"
 liberalism.1.t: "Svoboda, rovnost a bratrství"
 liberalism.1.d: "Skupina [SCOPE.sCharacter('liberal_leader').GetInterestGroup.GetName] pod vedením [SCOPE.sCharacter('liberal_leader').GetFullName] zahájila éru liberální politiky, která slibuje svobodnější společnost, kde se všichni občané podílejí na politickém procesu."
 liberalism.1.f: "„Najdete mnoho ideologů, kteří tvrdí, že zastupují vůli lidu, ale umlčují jeho hlas, když se ozve proti jejich politice. My ne! Sejmeme lidem okovy, jeden po druhém, dokud nebudou osvobozeni od jha minulosti. Teprve potom uvidíme, jaká skutečně je vůle lidu, a necháme ji utvářet budoucnost.“"
 liberalism.1.a: "[SCOPE.sCharacter('liberal_leader').GetLastName] je nebojácný vizionář!"
 liberalism.1.b: "Ostatní političtí vůdci by udělali moudře, kdyby tento trend následovali!"
 liberalism.1.c: "Možná je třeba hlas rozumu, než se to stane příliš radikálním."
 liberalism.2.t: "Trh světa"
 liberalism.2.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] trh se proslavil po celém světě tím, že je vstřícný a otevřený zahraničnímu obchodu."
 liberalism.2.f: "„Budeme si užívat nejexotičtější zboží z nejvzdálenějších trhů, nikoli skrze dobývání a podmaňování cizích národů, ale tím, že jim na oplátku nabídneme to, co máme my. Národ, který si je jistý tím, co může nabídnout, nepotřebuje zbraně. Ledaže by ovšem prodával právě zbraně!“"
 liberalism.2.a: "Prodávat. Prodávat!"
 liberalism.2.b: "Nakupovat. Nakupovat! Nakupovat!"
 liberalism.3.t: "Myšlenka, slovo a ideál"
 liberalism.3.d: "Ti, kdo chtějí myslet směle a svobodně, stále častěji zjišťují, že [ROOT.GetCountry.GetName] je jedním z nejbezpečnějších míst pro zkoumání jejich idejí."
 liberalism.3.f: "„Četli jste tu špínu obsaženou v této údajné ‚básni‘ o [ROOT.GetCountry.GetAdjectiveNoFormatting] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]? Skandální.“\n„Skandální!“\n„A navíc ji napsal jeden z [ROOT.GetCountry.GetRuler.GetHerHis] krajanů. Dokážete si to představit?“\n„Pořídil jsem si vlastní výtisk. Někdo musí na ty literární libertiny dohlížet. [ROOT.GetCountry.GetAdjectiveNoFormatting] vláda to rozhodně nedělá!“"
 liberalism.3.a: "Utopie pro moderního umělce."
 liberalism.3.b: "Místo, kde výzkum nebrzdí tradice."
 liberalism.4.t: "Otevřená náruč"
 liberalism.4.d: "[ROOT.GetCountry.GetName] se po celém světě proslaviluje jako místo, které vítá přistěhovalce bez diskriminace."
 liberalism.4.f: "„Prošlé země, nechte si báje“ volá\nmlčky. „Kto znavené mi, nuzné zvěří,\nschoulený dav dychtící dýchat zhola,\nz pobřeží vašich rušných splach.\nTy, kteří jsou bez přístřeší,\nvšem, kdož bouř zdolá,\nsvůj zdvihám svit u zlatozářnych dveří!“" # Emma Lazarus
 liberalism.4.a: "Přijďte jeden, přijďte všichni!"
 liberalism.4.b: "Všichni nás budou znát jako bezpečný přístav!"
 liberal_trailblazer: "Průkopník liberalismu"
 free_imports: "Svobodný dovoz"
 free_exports: "Svobodný vývoz"
 free_arts: "Svobodné umění"
 free_science: "Svobodná věda"
 teeming_shore: "Přelidněný břeh"
 new_colossus: "Nový kolos"
 education_laws.1.t: "Akademická pomoc"
 education_laws.1.d: "Učitelé našich vyšších vzdělávacích institucí nabídli vládě poradenství při zavádění nového zákona [SCOPE.sLaw('current_law_scope').GetName]."
 education_laws.1.f: "„Mezi výukou základů u dětí a pokročilejším vzděláním nabízeným na našich univerzitách jistě existují rozdíly. Přesto jako architekti vyšších pater této tyčící se stavby vědění věříme, že to nejmenší, co můžeme udělat, je poskytnout určitý vhled do toho, jak by měly být vybudovány základy.“"
 education_laws.1.a: "Rádi přijmeme jejich pomoc!"
 education_laws.1.b: "Jejich výzkumná práce je důležitější."
 education_laws.1.c: "Mohli by pomoci s dokončením návrhu zákona."
 education_laws.2.t: "Dohlížet a trestat"
 education_laws.2.d: "Skupina [SCOPE.gsInterestGroup('armed_forces_ig').GetName] vznesla otázku úlohy disciplíny v novém zákoně [SCOPE.sLaw('current_law_scope').GetName] jako oblasti, v níž lze plány na tento nový vzdělávací systém zlepšit."
 education_laws.2.f: "„Nejde jen o udržení pořádku ve třídě, aby bylo možné předávat vědomosti; jde o předávání charakteru. Koneckonců nám rodiče těchto dětí svěřili obrovskou odpovědnost, neboť sami dělají vše, co mohou, aby je vychovali jako řádné občany. Příliš často nacházíme chlapce vstupující do vojenské služby, jejichž charakter byl už téměř nenávratně zničen neukázněným mládím a nedostatkem úcty k autoritě. Tak to být nemusí!“"
 education_laws.2.a: "Měli bychom se soustředit na učební osnovy."
 education_laws.2.b: "Zapracovat to do školského systému je naprosto zásadní."
 education_laws.3.t: "Spory o učební osnovy"
 education_laws.3.d: "Neshody uvnitř vlády ohledně toho, co by se mělo vyučovat v rámci nového zákona [SCOPE.sLaw('current_law_scope').GetName], zastavily zavádění reformy."
 education_laws.3.f: "„Tyto předměty se možná dobře hodily pro výuku šlechticů před dvěma stoletími, ale věřit, že v dnešní době dobře poslouží širšímu okruhu studentů, je čiré šílenství!“\n„A chcete snad říci, že vaše ‚moderní‘ alternativy jim poslouží lépe? Chcete, aby byly klasické předměty postupně vyřazeny ve prospěch nevědomosti a špatné gramatiky?“"
 education_laws.3.a: "Vynuťte kompromis."
 education_laws.3.b: "Dejte si čas na vyřešení rozdílů."
 education_laws.3.c: "Přepracujte zákon tak, aby pro to vznikl nezávislý orgán."
 education_laws.4.t: "Další učitelé"
 education_laws.4.d: "Rodiče, kteří mají zkušenosti s domácí výukou dětí, nabízejí pomoc jako učitelé ve venkovských oblastech, aby usnadnili zavedení nového systému zákona [SCOPE.sLaw('current_law_scope').GetName]."
 education_laws.4.f: "„Zeptejte se kteréhokoli z mých sousedů a potvrdí vám, co jsem pro komunitu udělal, i bez formální kvalifikace! Všechny děti tady v okolí, které už umějí číst nebo psát, jsem to naučil já. Je to pro mě větší zdroj hrdosti než cokoli, co jsem vyrobil vlastníma rukama.“"
 education_laws.4.a: "Máme štěstí, že už máme vzdělané lidi!"
 education_laws.4.b: "Nesmíme dovolit, aby to odvádělo pozornost od jiné práce."
 education_laws.4.tt: "Dopad tohoto úsilí je úměrný [concept_literacy] země [THIS.GetCountry.GetAdjectiveNoFormatting] v [Concept('concept_incorporated_state', '$concept_incorporated_states$')] země [THIS.GetCountry.GetIncorporatedLiteracyRate|%v]"
 education_laws.5.t: "Chlapci a dívky"
 education_laws.5.d: "Debata o tom, zda by nový zákon [SCOPE.sLaw('current_law_scope').GetName] měl mít oddělené třídy pro studenty a studentky, a možná i rozdílné učební osnovy, vyvolává neshody ohledně toho, jak nový vzdělávací systém zavést."
 education_laws.5.f: "„Zpochybňoval by snad někdo vrozené rozdíly v povaze mezi pohlavími nebo jejich božsky určené role v naší společnosti? Jak bychom mohli očekávat, že vychováme řádné dámy a gentlemany, pokud v jejich vzdělávání nebudeme činit žádný takový rozdíl?“"
 education_laws.5.a: "Takové představy jsou pozůstatky minulé éry."
 education_laws.5.b: "Měli bychom vypracovat dvě oddělené větve."
 education_laws.6.t: "Organizace škol"
 education_laws.6.d: "Skupina [SCOPE.gsInterestGroup('devout_ig').GetName] tradičně nesla část odpovědnosti za vzdělávání v zemi [ROOT.GetCountry.GetName]. Při budování nového systému zákona [SCOPE.sLaw('current_law_scope').GetName] se otázka její role v organizaci těchto škol stala ústředním bodem reformy."
 education_laws.6.f: "„Stát by samozřejmě stále zůstal nejvyšší autoritou v otázce priorit škol, ale na místní úrovni je třeba zajistit mnoho administrativních povinností. V každém případě jsou texty víry [ROOT.GetCountry.GetStateReligion.GetNameNoFormatting] už součástí studijního plánu, nejsou snad?“"
 education_laws.6.a: "Organizační odpovědnost by měla nést skupina [SCOPE.gsInterestGroup('devout_ig').GetName]."
 education_laws.6.b: "Musíme vybudovat sekulární školský systém od základů."
