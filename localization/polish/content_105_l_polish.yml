 je_scramble_for_africa: "Závod o Afriku"
 je_scramble_for_africa_reason: "Připojili jsme se ke koloniálním mocnostem soupeřícím o kontrolu nad africkým kontinentem, odhodláni vybudovat si vlastní koloniální říši."
 scramble_for_africa_0_states: "V našich afrických koloniích jsme ztratili půdu pod nohama, ale stále máme naději, že si udržíme někdejší slávu."
 scramble_for_africa_3_states: "Naše koloniální říše v Africe je stále v plenkách, ale vykazuje dostatečný příslib, abychom byli považováni za důležitého hráče v oblasti."
 scramble_for_africa_4_states: "Naše koloniální říše v Africe vyrostla ze svých skromných počátků a ukazuje příslib budoucích ambicí."
 scramble_for_africa_6_states: "Jsme blízko dosažení své ambice vybudovat na africkém kontinentu velkou, trvalou koloniální říši."
