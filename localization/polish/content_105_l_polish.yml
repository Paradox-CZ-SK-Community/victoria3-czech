 je_dreadnoughts: "Válčení s dreadnoughty"
 je_dreadnoughts_reason: "Je jasné, že tyto velké, působivé lodě jsou v době míru považovány za měřítko námořní síly, ale jak si povedou ve skutečné válce?"
 je_destroyers: "Válčení s torpédoborci"
 je_destroyers_reason: "Ačkoli náš torpédoborcový doprovod poskytuje teoretickou bezpečnost, plně zjistíme, jak jej používat, až bude nasazen v ozbrojeném konfliktu."
 je_battleships: "Válčení s bitevními loděmi"
 je_battleships_reason: "Moderní bitevní lodě jsou stále složitější. Obstojí jejich dopad ve skutečné válce vůči jejich teoretické síle?"
 naval_tech_events.1.t: "Děla a pára"
 naval_tech_events.1.d: "[SCOPE.sCharacter('dreadnought_tech_commander').GetFullName] úspěšně nasadil naše působivé dreadnoughty v probíhajícím konfliktu a dokázal, že nejsou pouhými marnivými projekty námořnictva."
 naval_tech_events.1.f: "„Zpočátku byli přihlížející šokováni, protože z dálky to vypadalo, jako by loď sama explodovala. Ve skutečnosti plameny, které ji pohltily, pocházely z její první plné boční salvy. Loď samotná byla zcela nepoškozená, ačkoli jsem později slyšel, že při takové příležitosti není radno nechávat na palubě žádné křehké předměty.“"
 naval_tech_events.1.a: "Teď jsou působivější než kdy dřív."
 naval_tech_events.1.b: "Teď víme, jak je efektivně používat i v době míru."
 naval_tech_events.2.t: "Ničitel a ochránce"
 naval_tech_events.2.d: "[SCOPE.sCharacter('destroyer_tech_commander').GetFullName] využil torpédoborce v probíhajícím konfliktu a naučil nás mnoho o tom, jak je nejlépe používat."
 naval_tech_events.2.f: "„Takže chápu správně, že ‚ničitel torpédových člunů‘ je přesnější název?“\n\n„Vůbec ne. Věřím, že mohou být navrženy k ničení všemožných věcí.“"
 naval_tech_events.2.a: "Teď se nikdo neodváží zaútočit na naše konvoje!"
 naval_tech_events.2.b: "Tvoří důležitou součást našich flotil."
 naval_tech_events.3.t: "Obři moří"
 naval_tech_events.3.d: "Použití bitevních lodí [SCOPE.sCharacter('battleship_tech_commander').GetFullName] během probíhající války ukázalo, že tyto mohutné konstrukce mohou mít v moderním námořním válčení stále své místo."
 naval_tech_events.3.f: "Malá dívka se široce otevřenýma očima dívala na loď plující v přístavu.\n\n„Vypadá, jako by na její stavbu byla potřeba všechna ocel světa! Kolik takových lodí existuje?“\n\n„Takové nesmírnosti jen jedna,“ odpověděl admirál, „ale můžete si být jistá, slečno, že jakmile se o ní dozvědí naši nepřátelé, budou dvě.“"
 naval_tech_events.3.a: "Jejich přítomnost bude přesvědčivým argumentem."
 naval_tech_events.3.b: "Díky jejich síle budeme vládnout mořím!"
 naval_tech_events.3.c: "Tyto taktické zkušenosti dobře využijeme."
