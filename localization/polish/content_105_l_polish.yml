 welfare_laws.1.t: "Domy víry"
 welfare_laws.1.d: "Vyhlídka, že chudobince budou do své činnosti zahrnovat náboženskou výuku, umožnila návrhu zákona [SCOPE.sLaw('current_law_scope').GetName] získat přízeň skupiny [SCOPE.gsInterestGroup('devout_ig').GetName]."
 welfare_laws.1.f: "„Jaký je rozdíl mezi člověkem, kterého chudoba pronásleduje až k vlastní zkáze, a asketou, který chudobu vyhledává pro zdokonalení své duše? Odpověď jistě nespočívá v povaze hmotné chudoby, ale v chudobě ducha. Právě tuto podobu chudoby musí chudobince nejnaléhavěji zmírňovat.“"
 welfare_laws.1.a: "Náboženské praktiky jsou klíčem k morální disciplíně, kterou chudí potřebují!"
 welfare_laws.1.b: "Morální zásady lze vštěpit i bez pomoci skupiny [SCOPE.gsInterestGroup('devout_ig').GetNameNoFormatting]."
 welfare_laws.2.t: "Princip populace"
 welfare_laws.2.d: "Někteří intelektuálové varují, že pokud nebudou zákony [SCOPE.sLaw('current_law_scope').GetName] přijaty, rostoucí populace neproduktivních chudých se stane pro společnost neudržitelnou zátěží."
 welfare_laws.2.f: "„Rostoucí chudá populace je nevyhnutelností ve společnosti, která se ji nesnaží kontrolovat. Některá opatření se krátkozrakým mohou zdát bezcitná, ale pokud nebudeme chudé odrazovat od množení, brzy budeme mít více hladovějících úst.“"
 welfare_laws.2.a: "K odvrácení takové katastrofy je třeba pevná ruka."
 welfare_laws.2.b: "Toto šíření strachu činí zákon vyloženě nelidským."
 welfare_laws.2.c: "Musíme si dát čas, aby se rozšířily lepší argumenty."
 welfare_laws.3.t: "Vězení pro chudé"
 welfare_laws.3.d: "Někteří sociální reformátoři ze skupiny [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] se vyslovili proti navrhovaným zákonům [SCOPE.sLaw('current_law_scope').GetName], neboť je vnímají jako pokus učinit ze samotné chudoby zločin."
 welfare_laws.3.f: "„Smím-li obrátit vaši pozornost k návrhu těch nejambicióznějších plánů chudobinců, možná si všimnete nápadné podobnosti s našimi nejmodernějšími pokusy o výstavbu ideálních věznic. Je to proto, že to věznice jsou. Věznice určené k ubytování lidí, kteří nespáchali žádný zločin, kde účelem není spravedlnost, ale trest a vykořisťování slabých pro vlastní cíle.“"
 welfare_laws.3.a: "Chudí jsou zátěží pro společnost, což je zločin samo o sobě."
 welfare_laws.3.b: "Musí existovat způsoby, jak tento nový systém přimět respektovat osobní svobodu."
 welfare_laws.4.t: "Dítě z chudobince"
 welfare_laws.4.d: "Dítě, které vyrostlo v chudobinci, dnes promluvilo před [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')], popsalo tamní podmínky a naléhalo na zrušení chudinských zákonů."
 welfare_laws.4.f: "„Většina z vás posluchačů by, tím jsem si jist, váhala přivést své dítě na návštěvu takového místa. A přesto tam děti jsou, každý den, ačkoli se rychle učí být méně jako děti, méně součástí rodiny a více součástí stroje. Rodina je zde, stejně jako jídlo, jen dalším luxusem, kterého se žádný chovanec v těchto místech zřejmě nemůže žádným množstvím práce stát hoden.“"
 welfare_laws.4.a: "Více takových dětí musí být vyslyšeno!"
 welfare_laws.4.b: "To vyjadřuje podstatu dostatečně dobře."
 welfare_laws.5.t: "Vůdčí ruka"
 welfare_laws.5.d: "Skupina [SCOPE.gsInterestGroup('landowners_ig').GetName] se obává, že bez dohledu chudobinců nad chudými jim bude chybět vedení, které považuje za nezbytné pro nižší třídy."
 welfare_laws.5.f: "„V každé společnosti má aristokracie určitou odpovědnost vůči nižším třídám, stejně jako ony mají odpovědnost vůči svým lepším. Když rušíme instituci navrženou k usnadnění takové odpovědnosti, musíme dbát, abychom spolu s ní nezrušili i samotnou odpovědnost.“"
 welfare_laws.5.a: "Chudí nepotřebují vedení o nic víc než bohatí."
 welfare_laws.5.b: "Bič práská z lásky!"
 welfare_laws.6.t: "Zahálčivé ruce"
 welfare_laws.6.d: "Uzavření chudobinců po zrušení chudinských zákonů vyvolává u některých občanů obavy ze zvýšené kriminality, protože nejchudší členové společnosti už nebudou v těchto institucích drženi."
 welfare_laws.6.f: "„Kdyby někdo navrhl zrušení kolonie malomocných, jistě by první otázka, na kterou by se od něj čekala odpověď, zněla: Kam tito lidé půjdou? Přesto se od nás očekává, že budeme předpokládat, že zbídačení a zoufalí lidé proudící ze zavíraných chudobinců nemají být důvodem k takovým obavám. Jsou to lidé, kteří si nedokázali vydělat poctivé živobytí. Jaké nepoctivé živobytí si zařídí, až budou venku?“"
 welfare_laws.6.a: "Právě tento strach z chudých způsobil tento nelidský zákon!"
 welfare_laws.6.b: "Tito lidé mají právo cítit se v bezpečí před nemajetnými tuláky."
 welfare_laws.8.t: "Cena války"
 welfare_laws.8.d: "Staří veteráni se vyslovili ve prospěch zákona [SCOPE.sLaw('current_law_scope').GetName] a shromáždili mnohé ve skupině [SCOPE.gsInterestGroup('armed_forces_ig').GetName] k podpoře reformy."
 welfare_laws.8.f: "„Nemohu dost zdůraznit, jak velká část brutality války vůči lidské mysli spočívá v nejistotě. Nejistotě, kdy nepřítel zaútočí, nejistotě, kde se za několik dní probudíte, nejistotě, #ITALIC zda#! se za několik dní vůbec probudíte a kdo s vámi ještě bude, pokud ano. Mnozí pociťují nejistotu ohledně toho, co se s nimi stane, pokud zemřou. Žádáme jen úlevu v podobě jistoty, co se s námi stane, pokud přežijeme.“"
 welfare_laws.8.a: "Vojenští veteráni jsou v tomto novém penzijním systému naší nejvyšší prioritou."
 welfare_laws.8.b: "Všichni pracovníci slouží své zemi svým vlastním způsobem."
 welfare_laws.9.t: "Páka pro odbory"
 welfare_laws.9.d: "Skupina [SCOPE.gsInterestGroup('industrialists_ig').GetName] se obává, že navrhovaná reforma zákona [SCOPE.sLaw('current_law_scope').GetName] dá skupině [SCOPE.gsInterestGroup('trade_unions_ig').GetName] páku při vyjednávání o výhodách."
 welfare_laws.9.f: "„Charita je dobrá a chvályhodná věc, ale představa, že existují určité formy charity, na které má člověk nárok už jen tím, že existuje, může být velmi zákeřná. Spravedlivé vyjednávání umožňuje stranám dospět k dohodě na základě toho, co od sebe navzájem potřebují. Pokud má jedna strana už předem zaručité určité zaopatření, nu, dali jste jim už palec zadarmo, ne? A víte, co se říká o tom, když někomu dáte palec.“"
 welfare_laws.9.a: "Tím lépe. Měla by to být práva, ne výhody."
 welfare_laws.9.b: "Budeme spolupracovat s podnikateli na vypracování přijatelné reformy."
 welfare_laws.10.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] vyzývá k opatrnosti"
 welfare_laws.10.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] nedávno pronesl projev varující před nadměrnými vládními výdaji, což učinilo [ROOT.GetCountry.GetRuler.GetHerHis] podporovatele ve skupině [ROOT.GetCountry.GetRuler.GetInterestGroup.GetName] skeptičtějšími vůči navrhovanému zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 welfare_laws.10.f: "„Instituce země [ROOT.GetCountry.GetNameNoFormatting] musí být vybudovány tak, aby vydržely v dobrých i zlých časech. Musíme dbát, abychom během mírné zimy nezískali ambici rozšířit svůj dům tak, že si během kruté zimy nebudeme moci dovolit jej vytápět.“"
 welfare_laws.10.a: "Tento návrh je o sdílení bohatství, ne o jeho zmenšení."
 welfare_laws.10.b: "Je důležité, ať [ROOT.GetCountry.GetNameNoFormatting] žije v mezích svých možností."
