 state_in_africa_desc: "Stát se nachází na africkém kontinentu."
 meiji.7.t: "Železniční poradci"
 meiji.7.d: "Abychom urychlili své ambice vybudovat železniční síť, bylo navrženo, že by mohli být přizváni zahraniční poradci ze zemí se zavedenými železničními systémy."
 meiji.7.f: "„Teprve jsem se s tím gentlemanem seznámil, když jsem se ho zeptal na jeho zájem o lokomotivy, aniž bych čekal, že toho k tématu bude tolik. Jak se ukázalo, o vlacích je toho překvapivě mnoho co vědět.“"
 meiji.7.a: "[SCOPE.sC('railway_engineer_country_1').GetName] nám může pomoci."
 meiji.7.b: "[SCOPE.sC('railway_engineer_country_2').GetName] má vynikající inženýry!"
 meiji.7.c: "[SCOPE.sC('railway_engineer_country_3').GetName] zná železnice."
 meiji.7.e: "Nepotřebujeme zahraniční rady."
 meiji.8.t: "Vojenské železnice"
 meiji.8.d: "Skupina [SCOPE.gsInterestGroup('armed_forces_ig').GetName], obeznámená s vládní ambicí rozšířit železnice země [ROOT.GetCountry.GetName], nabídla podporu těmto snahám ve státě [SCOPE.sState('military_railway_state').GetName]."
 meiji.8.f: "„Vojsku budou železnice prospěšné tak jako tak, ale v současnosti jsou jen jednou z mnoha priorit. Dovolit mu stavět vlastní tratě by bylo něco docela jiného. V každé éře leží mnoho moci v rukou těch, kdo mohou kreslit určité mapy. V naší éře se těmito mapami může docela dobře stát železniční síť.“"
 meiji.8.a: "Vynikající spolupráce mezi armádou a průmyslem!"
 meiji.8.b: "Priority stanovíme sami."
 meiji.9.t: "Žáci meče"
 meiji.9.d: "Jak se zvláštní privilegia samurajské třídy zmenšují, bylo zpochybněno i jejich zvláštní právo nosit meče jako symbol postavení."
 meiji.9.f: "„Možná je osudem všech zemí procházet obdobími, kdy válečnická třída ztrácí své zvláštní postavení ve společnosti, protože její hodnota je odsunuta stranou ve prospěch současných priorit. Přesto odebrat válečníkovi jeho zbraň, vzít mu nejen postavení, ale i symbol toho, kým je, a cti jeho předků, musí být považováno za vrchol ponížení!“"
 meiji.9.a: "Je čas toto právo zrušit."
 meiji.9.b: "Právo by mohlo být rozšířeno i na jiné občany s postavením."
 meiji.9.c: "Vzít samurajovi meč by znamenalo vyrvat mu duši!"
 meiji.10.t: "Ši-gakkó"
 meiji.10.d: "[SCOPE.sCharacter('armed_forces_leader').GetFullName] začal ve státě [SCOPE.sState('kyushu_state').GetName] organizovat soukromé vojenské akademie, kde nevyučuje jen vojenskou teorii, ale i své vlastní politické myšlenky."
 meiji.10.f: "„Můžete to vnímat jako politickou organizaci, ale jak máme studentům vštěpovat ducha samurajů, pokud je neučíme o odpovědnosti, kterou mají za vedení, a o významu národních ambicí a expanze? Jak můžeme vyučovat vojenskou taktiku, aniž bychom probírali, jak by bylo možné provést invazi našich sousedů? Rozsah toho, k čemu může být vojenská síla použita, až po její politické využití včetně, zkrátka může a musí být součástí osnov!“"
 meiji.10.a: "Poskytují našim ozbrojeným silám cennou službu."
 meiji.10.b: "Musí být uzavřeny, než se tato politická frakce stane nebezpečnou."
 meiji.11.t: "Incident v [SCOPE.sState('infringed_port_state').GetPortHubName]"
 meiji.11.d: "[SCOPE.sC('infringing_country').GetName] se pokusila násilím otevřít jeden z našich přístavů a požaduje přístup k přístavu ve státě [SCOPE.sState('infringed_port_state').GetName]."
 meiji.11.f: "„Viděl jsem námořníky země [SCOPE.sC('infringing_country').GetAdjectiveNoFormatting], když se ještě blížili k pobřeží. Než jsem shromáždil skupinu, abychom je zahnali zpět na moře, už byli u břehu. Většina z nás byli rolníci, ne vojáci, ale tehdy jsem si myslel, že ani oni možná nebudou připraveni bojovat. Připraveni či ne, krev byla prolita. My ostatní jsme uprchli. Nevím, kam šli potom.“"
 meiji.11.a: "Braňte se! Sakoku musí být chráněno."
 meiji.11.b: "Vyjednávejte, abychom splnili některé jejich požadavky."
 meiji.11.c: "Možná by [SCOPE.sC('assistance_country').GetName] mohla pomoci zprostředkovat tuto obtížnou situaci."
 meiji.12.t: "Kudy vane vítr"
 meiji.12.d: "Nedávno publikovaný článek rozebíral, kde leží budoucnost země [ROOT.GetCountry.GetName] po konci sakoku, a zvažoval výhody spojenectví s jinými asijskými zeměmi či obratu ke Spojeným státům a evropským mocnostem."
 meiji.12.f: "„Může se zdát samozřejmé, že loajalita země by se měla řídit praktickými hledisky geografie, ale takové uvažování patří minulosti. Velikost světa se změnila. Kdo ví, jak bude v budoucnu ovládán? Svět se bude... dál zmenšovat.“"
 meiji.12.a: "[ROOT.GetCountry.GetName] musí nechat Asii za sebou a hledět k západním mocnostem."
 meiji.12.b: "Budeme stát při sousedních národech."
 meiji.12.c: "Budoucnost je nejistá. Musíme být připraveni na cokoli."
