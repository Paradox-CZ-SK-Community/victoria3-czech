 je_suffragists: "Výzva k volebnímu právu žen"
 je_suffragists_reason: "Vzestup sufražistického hnutí, které volá po rozšíření volebního práva na způsobilé občanky, se stal výrazným rysem současné politické scény."
 suffragist_events.9.t: "Hlasy pro ženy"
 suffragist_events.9.d: "Ženy v zemi [ROOT.GetCountry.GetName] se začaly organizovat, aby vedly kampaň za své právo hlasovat ve všeobecných volbách. [SCOPE.sCharacter('suffragette_agitator_scope').GetFullName] ze skupiny [SCOPE.gsInterestGroup('suffragist_ig').GetName] se stala vůdčí postavou tohoto hnutí."
 suffragist_events.9.f: "„Má-li demokracie dostát svým vlastním ideálům, nemůže být jen napodobením starověkých republik. Musí být trvalým projektem, který si neustále klade otázku: Koho není slyšet? Čí moudrost je zavrhována? [ROOT.GetCountry.GetNameNoFormatting] už uznala ženy jako schopné vládnout samy sobě. Proč bychom tedy neměly pomáhat vládnout národu?“"
 suffragist_events.9.a: "Záslužná věc!"
 suffragist_events.9.b: "To zní jako řeči opozice."
 suffragist_events.10.t: "První volby"
 suffragist_events.10.d: "[ROOT.GetCountry.GetName] pořádá své první volby od chvíle, kdy bylo volební právo rozšířeno na ženy, což značí začátek nové éry v demokracii země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 suffragist_events.10.f: "Vhození jejího hlasu do volební urny bylo svým způsobem překvapivě nevzrušivým okamžikem. Dostat se až sem působilo jako skutečný politický boj. Bylo to hlučné, neposlušné, někdy násilné. Odměnou bylo toto tiché, spořádané uplatnění moci. Znovu byla loajální občankou; změnila se jen očekávání.\n\nNa druhou stranu, možná právě takto se moc cítila. Možná právě to ji činilo zákeřnou. Přemýšlela, zda se tak až dosud cítili ti, kteří jí ji odpírali. Na prchavý okamžik doufala, že si na to nezvykne."
 suffragist_events.10.a: "Dělnické hnutí musí pokračovat v boji za rovnost!"
 suffragist_events.10.b: "Rovnost je součástí naší intelektuální tradice."
 suffragist_events.10.c: "Všichni se musí měnit s dobou."
 suffragist_events.10.e: "Velké vítězství pro sufražistky!"
 suffragist_events.1.t: "Pochod sufražistek"
 suffragist_events.1.d: "Aktivistky vedené osobou [SCOPE.sCharacter('suffragist_leader').GetFullName] se shromáždily, aby protestovaly proti nedostatku volebních práv pro ženy v zemi [ROOT.GetCountry.GetName]."
 suffragist_events.1.f: "„Četl jsem o nich v novinách,“ prohlásil mladík. „Říkají jim ‚sufražetky‘, víte. Tato demonstrace, tato takzvaná demonstrace, je jakousi hrou na politický aktivismus, ne nepodobnou tomu, co by dělalo dítě, když je poprvé poučováno o fungování demokratické společnosti. Je třeba to chápat právě v takovém kontextu...“\n\nJeho hlas se vytratil. Jedna z žen v procházejícím davu se otočila a podívala se přímo na něj. Jeho přátelé tiše souhlasně přikyvovali, ale nikdo už nic neřekl."
 suffragist_events.1.a: "Tento protest musí být vyslyšen."
 suffragist_events.1.b: "Seberte a zatkněte tyto potížistky."
 suffragist_events.2.t: "Sufražistky promlouvají v [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]"
 suffragist_events.2.d: "Zastánkyně volebního práva žen přišly promluvit před [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')], aby obhájily svou věc, což vyvolalo posměch ze strany [SCOPE.sCharacter('anti_feminist_leader').GetFullName], který tvrdí, že ženy nemají v síních vlády co dělat."
 suffragist_events.2.f: "Když si [SCOPE.sCharacter('suffragist_leader').GetFullNameNoFormatting] uvědomila, že čekat, až se místnost utiší, by bylo marným cvičením v trpělivosti, promluvila rázně:\n\n„Dnes jsme zde nejen proto, abychom si nárokovaly svůj oprávněný podíl na politické moci v našem národě, ale abychom prohlásily, že pokud chcete vládnout moudře a spravedlivě, budete nás potřebovat. Kdo může tvrdit, že [ROOT.GetCountry.GetNameNoFormatting] je dnes natolik prostá utrpení a svárů, že se muži ukázali být obzvlášť vhodnými pro vládnutí?“"
 suffragist_events.2.a: "Kdo by mohl těmto statečným duším upřít možnost napravit naši zemi?"
 suffragist_events.2.b: "Tak nepřátelský tón je známkou toho, že něžné pohlaví není připraveno na politickou rozpravu."
 suffragist_events.3.t: "Žhářský útok"
 suffragist_events.3.d: "[SCOPE.sCharacter('anti_feminist_leader').GetFullName], významný odpůrce volebních práv žen, se stal terčem žhářského činu ze strany zastánkyň této věci."
 suffragist_events.3.f: "„Dnes se v novinách objevily titulky o bombách zaslaných do kanceláře [SCOPE.sCharacter('anti_feminist_leader').GetLastNameNoFormatting]. Kde byly tyto titulky, když jsme posílaly dopisy? Četli je? Byly vůbec otevřeny? Tváří v tvář tak chladné aroganci bylo nevyhnutelné, že někdo nakonec pošle balíček, který nebude možné ignorovat.“"
 suffragist_events.3.a: "Zatkněte vůdkyni stojící za tímto nebezpečným hnutím!"
 suffragist_events.3.a.tt: "[SCOPE.sCharacter('militant_suffragist_leader').GetFullName] bude uvězněna na tři roky."
 suffragist_events.3.b: "Stíhejte ty, kdo jsou za útok přímo odpovědní."
 suffragist_events.4.t: "Sufražistka zabita"
 suffragist_events.4.d: "Aktivistka usilující o upozornění na věc volebního práva žen zemřela při incidentu na derby, kde ji zabil dostihový kůň patřící osobě [ROOT.GetCountry.GetRuler.GetFullName]."
 suffragist_events.4.f: "„Některé jsou opravdovějšími bojovnicemi než jiné, ale dokonalou Amazonkou je ta, která obětuje vše až do posledního, aby pro své pohlaví získala Perlu svobody.“"
 suffragist_events.4.a: "Nikdo by pro tuto věc nemusel zemřít, kdyby tato základní práva byla udělena!"
 suffragist_events.4.b: "Tak lehkovážnému chování neprojevíme politické sympatie."
 suffragist_events.5.t: "Hladovky"
 suffragist_events.5.d: "Mnoho sufražistek, které byly zatčeny během svých politických aktivit, zahájilo hladovku na protest proti svému uvěznění."
 suffragist_events.5.f: "„Upírají nám hlas ve světě politiky kvůli naší jemnosti, naší křehkosti, tvrdíce, že nás chrání před hrůzami světa. Stačí ten nejmenší vzdor, aby tuto iluzi rozbilo brutální, ponižující zacházení, jemuž muži podrobují ženy, které nechtějí mlčky snášet nespravedlivý trest.“"
 suffragist_events.5.a: "Zaveďte politiku nuceného krmení hladovkářek."
 suffragist_events.5.b: "Propusťte vězeňkyně, dokud se jim nevrátí lepší zdraví, poté je vraťte zpět."
 suffragist_events.5.b.tt: "[THIS.GetInterestGroup.GetLeader.GetFullName] je propuštěna z vězení."
 suffragist_events.6.t: "Zákon kočky a myši"
 suffragist_events.6.d: "Praxe propouštění vězeňkyň, které zahájí hladovku, a jejich opětovného zatýkání, jakmile se jejich zdraví zlepší, je kritizována jako krutá a absurdní."
 suffragist_events.6.f: "„Myslí si, že si s námi mohou pohrávat, že se šťastně vrátíme do svých cel a budeme hrát spolu s touto předstíranou starostí o naše blaho, že zůstaneme stranou zraku, abychom se vyhnuly opětovnému zatčení. Uděláme pravý opak: vyzveme je, ať si pro nás přijdou, promluvíme nahlas, spojíme se. Celý národ, ba celý svět pozná, jaké krutosti jsou tito údajní strážci morálky schopni.“"
 suffragist_events.6.a: "Za rozhodnutím si stojíme."
 suffragist_events.6.b: "Zákon by měl být zrušen."
 suffragist_events.7.t: "Deklarace práv ženy"
 suffragist_events.7.d: "[SCOPE.sCharacter('suffragist_philosopher').GetFullName] napsala dílo obhajující politická a občanská práva žen, v němž představuje vizi rovnosti mezi pohlavími v politické sféře."
 suffragist_events.7.f: "„Ženo, probuď se; poplašný zvon rozumu je slyšet po celém vesmíru; poznej svá práva. Mocná říše přírody už není obklopena předsudky, fanatismem, pověrou a lžemi. Plameny pravdy rozptýlily všechna mračna pošetilosti a uzurpace.“"
 suffragist_events.7.a: "Tento spis by měl být široce šířen."
 suffragist_events.7.b: "Publikace by měla být zakázána."
 suffragist_events.7.c: "Ostatní političtí vůdci by si to měli prostudovat."
 suffragist_events.8.t: "Konvent za práva žen"
 suffragist_events.8.d: "V [ROOT.GetCountry.GetCapital.GetName] se koná konvent o právech žen. Organizátorky jsou odhodlány usilovat o rozšíření majetkových a společenských práv žen, ale vedou debatu, zda své ambice rozšířit i do politické oblasti."
 suffragist_events.8.f: "„V tomto upření práva účastnit se vlády nedochází pouze k ponížení ženy a zvěčnění velké nespravedlnosti, ale i k ochromení a zavržení jedné poloviny morální a intelektuální síly vlády světa.“"
 suffragist_events.8.a: "Hlasování je základní právo, o které musíme usilovat!"
 suffragist_events.8.b: "Postupná změna je bezpečnější cestou k pokroku."
