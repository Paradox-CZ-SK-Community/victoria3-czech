 secession_events.1.t: "Separatistický manifest"
 secession_events.1.d: "V zemi [ROOT.GetCountry.GetName] se začal šířit manifest předkládající argumenty pro nezávislost kultury [SCOPE.sCulture('secessionist_culture').GetName]."
 secession_events.1.f: "„Mělo by něco takového být nelegální? Nevyzývá to k ozbrojené revoluci. Nezávislost kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting] by mohla být zcela mírovým procesem. Řeknu však toto: pokud taková revoluce přijde, právě tohle budou vykřikovat z barikád.“"
 secession_events.1.a: "Spusťte propagandistickou kampaň proti těmto argumentům."
 secession_events.1.b: "Zakažte manifest."
 secession_events.1.c: "Nevěnujte tomu pozornost."
 secession_events.2.t: "Úřední překlady"
 secession_events.2.d: "Vláda obdržela žádosti od kultury [SCOPE.sCulture('secessionist_culture').GetName] o poskytnutí překladů některých úředních dokumentů do jejich jazyka."
 secession_events.2.f: "„Když mluvíte o kultuře [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting] jako o nevzdělané, máte zřejmě na mysli ty z nás, kteří nemluví dvěma jazyky, ale pouze jedním — stejně jako vy.“"
 secession_events.2.a: "Je důležité, aby tyto dokumenty byly dostupné všem."
 secession_events.2.b: "Měli by se naučit úřední jazyk."
 secession_events.3.t: "Vedení kultury [SCOPE.sCulture('secessionist_culture').GetName]"
 secession_events.3.d: "Politik z kultury [SCOPE.sCulture('secessionist_culture').GetName] se separatistickými sympatiemi získal významné postavení ve skupině [SCOPE.gsInterestGroup('secessionist_ig').GetName]."
 secession_events.3.f: "„Slyšeli jste, kdo mluvil na jejich posledním shromáždění? Představte si, že opozice teď dodává věrohodnost propagandě kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting]! Úřadující vláda by takového řečníka nikdy nehostila. Což byl mimochodem přesně argument, který zazněl v samotném projevu.“"
 secession_events.3.a: "Politický vůdce z kultury [SCOPE.sCulture('secessionist_culture').GetName]? Nemyslitelné!"
 secession_events.3.b: "V zemi [ROOT.GetCountry.GetName] se může prosadit kdokoli."
 secessionist_agitator_tt: "V zemi [ROOT.GetCountry.GetName] se objeví [concept_agitator] z kultury [SCOPE.sCulture('secessionist_culture').GetName]"
 secessionist_leader_tt: "[concept_politician] z kultury [SCOPE.sCulture('secessionist_culture').GetName] převezme vedení skupiny [SCOPE.gsInterestGroup('secessionist_ig').GetName]"
 secession_events.4.t: "Separatisté protestují"
 secession_events.4.d: "Zastánci separatistického hnutí kultury [SCOPE.sCulture('secessionist_culture').GetName] se shromáždili k veřejnému protestu."
 secession_events.4.f: "Když se dav začal shromažďovat, mezi přihlížejícími a kolemjdoucími bylo patrné napětí větší, než jaké by se obvykle dalo očekávat při pohledu na politické shromáždění. Možná plán národní nezávislosti vyvolával myšlenky na občanskou válku, nebo — pravděpodobněji — šlo prostě o nezvyklý pocit, že se byť jen na okamžik ocitli v menšině vůči lidem z kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting]."
 secession_events.4.a: "Rozežeňte je."
 secession_events.4.b: "Nechte je promluvit."
 secession_events.5.t: "Politik z kultury [SCOPE.sCulture('secessionist_culture').GetName] promlouvá"
 secession_events.5.d: "[SCOPE.sCharacter('secessionist_leader').GetFullName], vůdce skupiny [SCOPE.gsInterestGroup('secessionist_ig').GetName] a jedna z nejvýznamnějších osobností kultury [SCOPE.sCulture('secessionist_culture').GetName] v našem národě, se vyslovil ve prospěch nezávislého národa kultury [SCOPE.sCulture('secessionist_culture').GetName]."
 secession_events.5.f: "„Mé politické cíle sice mohly být utvářeny mou výchovou, ale nikdy jsem nedovolil, aby je určoval můj původ z kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting]. Stále více se však zdá, že je to jediné kritérium, podle něhož mě [ROOT.GetCountry.GetNameNoFormatting] hodlá posuzovat.“"
 secession_events.5.a: "Řekněte skupině [SCOPE.gsInterestGroup('secessionist_ig').GetName], ať si tohoto zrádce drží na uzdě!"
 secession_events.5.b: "Ignorujte tyto zbytečné žvásty."
 secession_events.5.c: "Možná nastal čas, aby toto hnutí bylo vyslyšeno."
 secession_events.6.t: "[SCOPE.gsInterestGroup('secessionist_ig').GetName] podporují odtržení kultury [SCOPE.sCulture('secessionist_culture').GetName]"
 secession_events.6.d: "Skupina [SCOPE.gsInterestGroup('secessionist_ig').GetName] poukazuje na diskriminaci, kterou lidé kultury [SCOPE.sCulture('secessionist_culture').GetName] trpí pod zákony země [ROOT.GetCountry.GetAdjectiveNoFormatting], a tvrdí, že by měli mít právo na sebeurčení."
 secession_events.6.f: "„Jsou tací, kteří říkají, že tato otázka trhá náš národ na kusy, ale kdo může nazývat národ celistvým, pokud nezachází se svými lidmi jako s rovnými před zákonem? Kdo může vinit ty, kteří by raději zemřeli jako občané první třídy státu kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting], než žili jako občané druhé třídy země [ROOT.GetCountry.GetNameNoFormatting]?“"
 secession_events.6.a: "Zrádná pomluva našeho soudního systému!"
 secession_events.6.b: "Nelze popřít, že s nimi není zacházeno rovně."
 secession_events.7.t: "Nacionalistická opera"
 secession_events.7.d: "Představení opery s nacionalistickými revolučními motivy na nadcházejícím festivalu je jejími zastánci otevřeně spojováno se separatistickým hnutím kultury [SCOPE.sCulture('secessionist_culture').GetName]."
 secession_events.7.f: "„Pondělí 23., ohňostroj; úterý 24., iluminace; středa 25., revoluce.“"
 secession_events.7.a: "Zrušte ohňostroj."
 secession_events.7.b: "Zrušte iluminace."
 secession_events.7.c: "Zrušte revoluci."
 secession_events.8.t: "Separatisté odpálili budovu"
 secession_events.8.d: "Militantní křídlo separatistického hnutí kultury [SCOPE.sCulture('secessionist_culture').GetName] se přihlásilo k odpovědnosti za výbuch u vládní budovy a oznámilo, že čas otevřené války se rychle blíží."
 secession_events.8.f: "„Možná nemůžeme rozhodnout, zda bude válka. Možná nemůžeme rozhodnout ani to, kdy válka bude. Ale možná naše rozhodnutí, zatímco se snažíme nad těmito otázkami vykonávat kontrolu, určí, kdo bude na naší straně, až válka přijde.“"
 secession_events.8.a: "Samotný náš národ je ohrožen hrozbou kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting]."
 secession_events.8.b: "Nedovolíme, aby tento odporný čin zničil křehký mír, který máme."
 secession_events.9.t: "Smrt separatistům?"
 secession_events.9.d: "[SCOPE.sCharacter('secessionist_leader').GetFullName], významný politický vůdce kultury [SCOPE.sCulture('secessionist_culture').GetName], se stal symbolem jejich hnutí za nezávislost. Vysoce postavení zpravodajští úředníci vymysleli plán, jak se tiše vypořádat s osobou [SCOPE.sCharacter('secessionist_leader').GetLastName] a oslabit tak jejich věc."
 secession_events.9.f: "„Možná máte pocit, že určité metody jsou nepřijatelné, a právě proto bych vám radil, abyste se méně starali o metody a více o výsledky. Jistě je sjednocená země [ROOT.GetCountry.GetNameNoFormatting], včetně jejích poddaných z kultury [SCOPE.sCulture('secessionist_culture').GetNameNoFormatting], jediným přijatelným výsledkem? Pak nechte metody na mně.“"
 secession_events.9.a: "Příhodný konec pro nepohodlného [SCOPE.sCharacter('secessionist_leader').GetWomanMan]."
 secession_events.9.b: "[ROOT.GetCountry.GetName] se nezabývá vražděním svých občanů."
