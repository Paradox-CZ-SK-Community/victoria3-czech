 je_springtime_of_the_peoples_reason: "Nespokojenost s ponapoleonským reakcionářským řádem propukla v přílivovou vlnu [GetIdeology('ideology_radical').GetName] nálad po celé #b Evropě#!. Liberální revolucionáři vztyčují trikolóry a volají po svobodě, rovnosti a bratrství.\n\n#b Na barikády!:#!\nPokud se #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt liberální#! nebo #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt socialistické#! [concept_political_movement] stane [Concept('concept_insurrection', '$concept_insurrectionary$')] v našem [Concept('concept_capital_state','$concept_capital_state_short$')], zatímco je tento [concept_journal_entry] aktivní, revoluční síly se mohou pokusit uchopit moc nad naší zemí."
