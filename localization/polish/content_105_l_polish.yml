 je_flamethrowers: "Plivání ohně"
 je_flamethrowers_reason: "Náš nový vynález, moderní plamenomet, musí být ještě důkladně vyzkoušen ve skutečném konfliktu. Jeho schopnost nahánět hrůzu by se neměla podceňovat."
 flamethrowers_event.1.t: "Drak zákopů"
 flamethrowers_event.1.d: "Ačkoli jde o situační zbraň, plamenomet se ve válce [SCOPE.sWar('flamethrowers_event_war').GetName] ukazuje jako účinná podpora v boji zblízka v zákopech."
 flamethrowers_event.1.f: "„My lidé se můžeme povyšovat nad nižší tvory svým ovládnutím ohně, ale neexistuje ostřejší připomínka toho, kolik vystrašeného zvířete stále žije v srdci člověka, než když vidí oheň naplnit příkop, v němž se skrývá. Jen málo jich zemře v plamenech; mnozí zemřou při pokusu jim uniknout.“"
 flamethrowers_event.1.a: "Měl by zasít strach do srdcí našich nepřátel."
 flamethrowers_event.1.b: "Měl by být nasazen tam, kde dokáže účinně vypudit vojáky."
 instrument_of_fear: "Nástroje strachu"
 instrument_of_death: "Nástroje smrti"
 slavery_law_events.7.t: "Zvláštní usmíření"
 slavery_law_events.7.d: "Po letech od přijetí zákona [SCOPE.sLaw('slavery_banned_scope').GetName] prootrokářské ideály mezi skupinou [SCOPE.gsInterestGroup('slaver_ig').GetName] výrazně vybledly."
 slavery_law_events.7.f: "V ozvěnou znějících panských síních panství skupiny [SCOPE.gsInterestGroup('slaver_ig').GetNameNoFormatting] se slova, která kdysi vládu pranýřovala za tyranii při odebrání jejich otroků, začala měnit. Nyní místo otevřeného odsuzování a výzev k obnovení této instituce přicházely návrhy alternativ — pachtýřství, využívání vězňů, tucet různých prostředků zbavení práv k obnovení toho, co považovali za přirozený řád.\n\nNikdo se však neodvážil vznést myšlenku otevřeného pohrdání výnosem — alespoň ne teď, kdy se vláda zdála ostražitá a dříve zotročení byli stále obezřetní. Prozatím tedy budou jednoduše pracovat s tím, co mají."
 slavery_law_events.7.a: "Nyní je čas spojit se a odpustit."
 slavery_law_events.7.b: "Na pachatele tohoto zločinu nesmíme zapomenout."
 modifier_slavery_forgotten: "Očištění v otázce otroctví"
 modifier_slavery_whitewashing: "Očišťování otrokářů"
 modifier_slavery_forgotten_bad: "Dědictví otroctví"
