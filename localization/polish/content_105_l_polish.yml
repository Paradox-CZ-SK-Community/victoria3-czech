 distribution_of_power_laws.1.t: "Strhující [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
 distribution_of_power_laws.1.d: "Snahy [ROOT.GetCountry.GetRuler.GetFullName] upevnit moc pomocí zákona [SCOPE.sLaw('current_law_scope').GetName] podpořilo [ROOT.GetCountry.GetRuler.GetHerHis] přirozené charisma."
 distribution_of_power_laws.1.f: "„Nemám rád politiky. Většině [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ů bych nevěřil ani to, že napustí vanu. [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] je úplně jiný případ! Podle mě je nejlepší způsob, jak udržet [ROOT.GetCountry.GetNameNoFormatting] v bezpečí, nechat [ROOT.GetCountry.GetRuler.GetHerHim] řídit věci a držet ostatní supy stranou. Vypadá to, že přesně o to se [ROOT.GetCountry.GetRuler.GetSheHe] snaží!“"
 distribution_of_power_laws.1.a: "Veškerou moc [ROOT.GetCountry.GetRuler.GetLastName], našemu osvoboditeli!"
 distribution_of_power_laws.1.b: "[ROOT.GetCountry.GetRuler.GetLastName] je hlasem lidu!"
 distribution_of_power_laws.2.t: "Papírování nového režimu"
 distribution_of_power_laws.2.d: "$bureaucrats$ pracující na udržování mnoha demokratických institucí, které jsou nyní rozkládány ve prospěch zákona [SCOPE.sLaw('current_law_scope').GetName], mají obavy o svou budoucnost v režimu [ROOT.GetCountry.GetRuler.GetFullName]."
 distribution_of_power_laws.2.f: "„Naší hlavní starostí je samozřejmě omezení práv, která zde máme chránit. V závislosti na prioritách nové země [ROOT.GetCountry.GetNameNoFormatting] však můžeme být k jistému užitku. Koneckonců taková centrální kontrola může vytvářet spoustu papírování.“"
 distribution_of_power_laws.2.a: "Mrtvá tkáň musí být odříznuta, aby [ROOT.GetCountry.GetName] omládla!"
 distribution_of_power_laws.2.b: "V nové správě pro ně bude místo."
 distribution_of_power_laws.3.t: "Vox populi"
 distribution_of_power_laws.3.d: "Mnoho lidí, jejichž hlas v politickém systému země [ROOT.GetCountry.GetAdjectiveNoFormatting] bude umlčen přechodem k zákonu [SCOPE.sLaw('current_law_scope').GetName], se shromáždilo k protestu před [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]."
 distribution_of_power_laws.3.f: "„Toto převzetí moci spoléhá na apatii, nevědomost a strach zbavených práv. Očekává se od nás, že uvěříme, že nám je politická moc odebrána pro naše vlastní dobro, že na nás budou jiní dohlížet a naším jménem dbát na naše nejlepší zájmy. Nenecháme se oklamat a nebudeme mlčet!“"
 distribution_of_power_laws.3.a: "Budou první, kdo okusí, jak nový režim zachází s odpůrci!"
 distribution_of_power_laws.3.b: "Pokud se chtějí nechat slyšet, mohou. Prozatím."
 distribution_of_power_laws.4.t: "Vojenská podpora"
 distribution_of_power_laws.4.d: "[SCOPE.sCharacter('supportive_commander').GetFullName] se z obav z napětí kolem probíhajícího přechodu k zákonu [SCOPE.sLaw('current_law_scope').GetName] vyslovil na podporu nového zákona a slíbil, že se postaví proti případným pokusům zbavených práv rozpoutat povstání."
 distribution_of_power_laws.4.f: "„Neříkám, že očekávám vzpouru, nic takového. Zdá se, že máte situaci zcela pod kontrolou. V dobách, kdy politická moc mění majitele, však lidé snadno zapomínají, jak rychle se občanský spor může stát vojenskou záležitostí. Reformu v zásadě podporuji, stejně jako mnozí jiní, jako krok k nastolení pořádku a jednoty v zemi, která je často v rozporu sama se sebou. Ještě důležitější je, že ji podporuji prakticky. Věřte mi, od vojenského [SCOPE.sCharacter('supportive_commander').GetWomanMan] je to podpora, která se skutečně počítá.“"
 distribution_of_power_laws.4.a: "Potřebujeme [SCOPE.sCharacter('supportive_commander').GetHerHis] podporu tváří v tvář nezkrotným masám!"
 distribution_of_power_laws.4.b: "[SCOPE.sCharacter('supportive_commander').GetSheHe|U] je vynikajícím příkladem loajality v našich řadách!"
 distribution_of_power_laws.5.t: "Nevědomé masy"
 distribution_of_power_laws.5.d: "Politici podporující reformu zákona [SCOPE.sLaw('current_law_scope').GetName] vznesli argument, že je nutné odebrat volební právo nižším třídám, neboť tvrdí, že nejsou vzdělané v politických otázkách a nejsou vybavené k takovým rozhodnutím.\n\nDopad tohoto argumentu je úměrný míře gramotnosti země [ROOT.GetCountry.GetAdjectiveNoFormatting], která činí [ROOT.GetCountry.GetTotalLiteracyRate|%v]"
 distribution_of_power_laws.5.f: "„Mnozí filozofové a státníci varovali před tyranií vlády davu. Demokracie v zemi [ROOT.GetCountry.GetNameNoFormatting] se stala fraškou, v níž lidé, kteří nevědí nic o řízení země, odevzdávají svůj hlas tomu podvodníkovi, který dokáže uplést nejpřesvědčivější lež. Naštěstí máme lepší třídu občanů, kteří jsou v takových věcech vzdělaní. Ti budou pečovat o zájmy lidu lépe, než by to kdy dokázal on sám.“"
 distribution_of_power_laws.5.a: "Veřejnost země [ROOT.GetCountry.GetAdjectiveNoFormatting] potřebuje větší mozky, aby se o ni postaraly."
 distribution_of_power_laws.5.b: "To je cizí propaganda, která má očernit náš lid!"
 distribution_of_power_laws.6.t: "Demokratický zástupce"
 distribution_of_power_laws.6.d: "V reakci na přechod k zákonu [SCOPE.sLaw('current_law_scope').GetName] [SCOPE.sCharacter('opposing_politician').GetFullName], vládní ministr ze skupiny [SCOPE.sCharacter('opposing_politician').GetInterestGroup.GetName], tvrdí, že toto omezení volebního práva je v rozporu s jeho rolí zvoleného zástupce."
 distribution_of_power_laws.6.f: "„Zarmucuje mě, když vidím, jak tato vláda odhazuje stranou právě ty lidi, jimž máme sloužit a kteří dodávají legitimitu moci, kterou vykonáváme. Omezením volebního práva vysíláme jasný vzkaz, že nevěříme, že máme podporu veřejnosti. Vzkaz nejen o tom, že politiku vidíme jako hru, ale jako hru, kterou se neodvažujeme hrát ani poctivě; hru, v níž jsme ochotni změnit pravidla, abychom vyhráli. Já sloužím zemi [ROOT.GetCountry.GetNameNoFormatting], ne sobě. To nebudu trpět!“"
 distribution_of_power_laws.6.a: "Ať [SCOPE.sCharacter('opposing_politician').GetHerHim] rezignuje!"
 distribution_of_power_laws.6.a.tt: "[SCOPE.sCharacter('opposing_politician').GetFullName] rezignuje na politický život."
 distribution_of_power_laws.6.b: "Přesvědčte [SCOPE.sCharacter('opposing_politician').GetHerHim], aby zůstal."
 distribution_of_power_laws.6.c: "[SCOPE.sCharacter('opposing_politician').GetSheHe|U] se tedy bude muset vypořádat s nově vymezeným obvodem."
 distribution_of_power_laws.7.t: "Kořeny demokracie"
 distribution_of_power_laws.7.d: "Na znamení veřejné podpory nové reformě zákona [SCOPE.sLaw('current_law_scope').GetName] nabídli občané ve státě [SCOPE.sState('election_organizers_state').GetName], že budou dobrovolně pomáhat s organizací nadcházejících voleb."
 distribution_of_power_laws.7.f: "„Demokracie, která funguje jen z milosti byrokratů a vládních úředníků, nikdy nemůže odrážet občanskou povinnost, k jejímuž plnění své občany vyzývá. Musíme přispět všichni, nejen svými hlasy, ale i prací a prostředky, které těmto hlasům umožní mít účinek.“"
 distribution_of_power_laws.7.a: "Vyšlete je po celé zemi!"
 distribution_of_power_laws.7.b: "Měli by své úsilí zaměřit na stát [SCOPE.sState('election_organizers_state').GetName]."
 distribution_of_power_laws.8.t: "Pošetilosti mládí"
 distribution_of_power_laws.8.d: "Nová reforma zákona [SCOPE.sLaw('current_law_scope').GetName] vedla v zemi [ROOT.GetCountry.GetName] k debatě o volebním věku."
 distribution_of_power_laws.8.f: "„Ani jeden z mých rodičů neumí číst, ale můj bratr ano, a co je důležitější, také čte. Když se naposledy vrátil domů z univerzity, zeptal se mě na smysl povinnosti, který cítím vůči [ROOT.GetCountry.GetNameNoFormatting], když jsem přísahal, že zemřu při její obraně. Pak mi pověděl o nové volební reformě a zeptal se mě, zda jsem někdy přemýšlel o povinnostech, které by [ROOT.GetCountry.GetNameNoFormatting] měla mít vůči mně. Myslím, že předkládá přesvědčivý argument — a pokud jsem dost starý na to, abych volil, on zcela jistě také.“"
 distribution_of_power_laws.8.a: "Volební věk 25 let by měl zajistit, že budou zahrnuti pouze odpovědní dospělí."
 distribution_of_power_laws.8.b: "21 let se zdá být rozumným kompromisem."
 distribution_of_power_laws.8.c: "Volební věk 18 let je cestou budoucnosti."
 distribution_of_power_laws.9.t: "Stará autorita"
 distribution_of_power_laws.9.d: "Reforma zákona [SCOPE.sLaw('current_law_scope').GetName] ohrožuje moc, kterou drží mnoho předních osobností v zemi [ROOT.GetCountry.GetName], z nichž někteří využívají své politické kontakty k tomu, aby bránili jejímu přijetí."
 distribution_of_power_laws.9.f: "„Mezi námi, je do toho zapojeno až příliš mnoho vznešených idealistů. Nacházejí cosi ušlechtilého v tom, že se vzdají vlastního vlivu a rozšíří jej mezi masy jako almužnu chudým. Možná si myslí, že tím zachrání své duše nebo své odkazy. Já jsem praktičtějšího založení. Zajímá mě bezprostřední budoucnost moje a mých přátel. Mezi ně vás mohu počítat. Nemám pravdu?“"
 distribution_of_power_laws.9.a: "Pokud se pokusí nový zákon zastavit, musí být sesazeni ze svých pozic!"
 distribution_of_power_laws.9.b: "Možná s nimi můžeme spolupracovat na vytvoření nového systému."
 distribution_of_power_laws.10.t: "Hříchy minulosti"
 distribution_of_power_laws.10.d: "Zastánci reformy zákona [SCOPE.sLaw('current_law_scope').GetName] upozornili na dřívější zneužívání moci současným režimem jako na důvod, proč je tato změna naléhavě potřebná."
 distribution_of_power_laws.10.f: "„No, sám si to sotva pamatuji. Byla to jiná doba. Takové věci se prostě děly a nikdy jsem nečekal, že kvůli nim budu vyslýchán. Ne že by to nikdo nezpochybňoval, ale vždycky se najdou stěžovatelé. Nemohli jste jim naslouchat, pokud jste chtěli něco dokázat. Samozřejmě, všechno to mělo souhlas [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Ne oficiálně, ale myslím, že byste to měl vědět. To zůstane mezi námi.“"
 distribution_of_power_laws.10.a: "Moc korumpuje, a proto se mocní musí zodpovídat voličům."
 distribution_of_power_laws.10.b: "Minulost je minulostí. Tyto záležitosti s reformou nesouvisejí."
 distribution_of_power_laws.11.t: "Demokracie bez lidu"
 distribution_of_power_laws.11.d: "Zastánci zákona [SCOPE.sLawType('universal_suffrage_type').GetName] tvrdí, že probíhající reforma zákona [SCOPE.sLaw('current_law_scope').GetName] je nedostatečný kompromis, který mnoha lidem upírá právo účastnit se demokracie."
 distribution_of_power_laws.11.f: "„‚[SCOPE.sLaw('current_law_scope').GetNameNoFormatting]‘. Už jen ten zvuk! Jako by to znamenalo, že jsme odhodili jho útlaku, místo abychom jen přesunuli jeho břemeno. Jak se máme za touto reformou solidárně semknout, když stále ponechává tolik lidí bez přístupu k volebnímu právu? Jako obvykle se od nich očekává, že budou rádi, že se vůbec něco děje. Že nebudou mít žádná očekávání od vlastních životů. Tak se s lidskou bytostí nezachází.“"
 distribution_of_power_laws.11.a: "Měli bychom se soustředit na naši současnou reformu, která je jasným zlepšením."
 distribution_of_power_laws.11.b: "[SCOPE.sLaw('current_law_scope').GetName] je odrazovým můstkem na cestě k zákonu [SCOPE.sLawType('universal_suffrage_type').GetName]!"
 distribution_of_power_laws.12.t: "Papírování voleb"
 distribution_of_power_laws.12.d: "Zavedení řádného volebního systému pro nadcházející volby podle zákona [SCOPE.sLaw('current_law_scope').GetName] zatížilo administrativní kapacity vlády země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 distribution_of_power_laws.12.f: "„Jakmile budeme mít celou infrastrukturu připravenou, bude to mnohem snazší. Musíme prokázat, že to dokážeme. Lidé musí mít možnost věřit, že jejich hlasy jsou řádně shromážděny a spočítány, jinak rychle označí volby za podvod. Lidé se dívají. Jiné země se dívají. Nemůžeme si dovolit zkratky.“"
 distribution_of_power_laws.12.a: "V případě potřeby použijeme zdroje z jiných správních odvětví."
 distribution_of_power_laws.12.b: "Budeme si zkrátka muset dát na čas."
