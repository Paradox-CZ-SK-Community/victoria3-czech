 hokkaido_events.7.t: "Závěrečný akt komise" # todo: NEW TRANSLATION
 hokkaido_events.7.d: "Oficiálně oznamujíc úspěch svého vládou zadaného úkolu rozhodla Development Commission [SCOPE.sState('hokkaido_state_scope').GetName] předat své zbývající povinnosti státu." # todo: CHANGED
 hokkaido_events.7.f: "#b Proklamace č. 8#!\nDevelopment Commission [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] je tímto zrušena a zřizují se tři prefektury Hakodate, Sapporo a Nemuro. Hranice jejich příslušných jurisdikcí budou stanovena později." # todo: CHANGED
 hokkaido_events.7.a: "Zářný příklad pro budoucí koloniální výpravy..." # todo: CHANGED
 hokkaido_events.7.b: "...a pro [GetGeographicRegion('geographic_region_home_islands').GetName], mimochodem." # todo: CHANGED
