 hokkaido_events.7.t: "Poslední akt Komise"
 hokkaido_events.7.d: "Komise pro rozvoj [SCOPE.sState('hokkaido_state_scope').GetName] po formálním oznámení úspěchu své vládou svěřené mise rozhodla převést své zbývající odpovědnosti na stát."
 hokkaido_events.7.f: "#b Vyhláška č. 8#!\nKomise pro rozvoj [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] se tímto ruší a zřizují se tři prefektury Hakodate, Sapporo a Nemuro. Hranice jejich příslušných jurisdikcí budou vyhlášeny později."
 hokkaido_events.7.a: "Zářný příklad pro budoucí koloniální snahy..."
 hokkaido_events.7.b: "...a koneckonců i pro [GetGeographicRegion('geographic_region_home_islands').GetName]."
 modifier_external_applications: "Kaitakuši: vnější využití"
 modifier_domestic_applications: "Kaitakuši: domácí využití"
 hokkaido_events.8.t: "Komise bez poslání"
 hokkaido_events.8.d: "Ztráta [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] donutila Komisi pro rozvoj rozpustit se, aniž by dokončila své poslání. Pobouření občané v reakci na to vyšli do ulic země [ROOT.GetCountry.GetName] a protestují proti ztrátě národní prestiže i svých osobních investic."
 hokkaido_events.8.f: "Vyčerpaný vysloužilý správce se sesul do kancelářského křesla a nalil si štědrou číši saké. Vypil ji naráz a nechal oči spočinout na mapách rozložených před sebou na stole. Byly plné čmáranic, poznámek a značek, z nichž každá označovala samostatný plán, do kterého vložil svou životní energii. Teď nezůstal ani plán, ani energie, a naznačený optimismus v každé poznámce zněl posměšně.\n\nK čertu s tím vším, pomyslel si a nalil si další číši."
 hokkaido_events.8.a: "Bohužel je tento výsledek mimo kontrolu vlády."
 modifier_lost_northern_investments: "Ztracené severní investice"
