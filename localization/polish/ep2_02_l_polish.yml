 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir" # todo: NEW TRANSLATION
 hokkaido_events.6.d: "V atmosféře jisté domácí kontroverze vydalo [ROOT.GetCountry.GetCapital.GetCityHubName] nový dekret o právním statusu [SCOPE.sState('hokkaido_state_scope').GetName], formálně vymezující Ainu vlast a zakládající omezené instituce, které budou koexistovat paralelně s oficiálním [ROOT.GetCountry.GetAdjective] byrokratickým aparátem." # todo: CHANGED
 hokkaido_events.6.f: "„Hinna! Hinna!“ Se skoro bezzubým úsměvem stará Ainu čarodějka podala misku polévky. Podíval se na směs lovené zvěře a poděkoval nebesům, že jeho rodiče nejsou zde, aby ho soudili.\n\n„Co dělám pro mír,“ zamumlal si a přijal jídlo se strnule přinuceným úsměvem." # todo: CHANGED
 hokkaido_events.6.a: "„Tato země je dost velká pro oba.“" # todo: CHANGED
