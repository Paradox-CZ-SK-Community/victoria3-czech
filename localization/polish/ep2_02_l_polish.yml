l_polish:
 edo_system: "Edo statusní systém" # todo: CHANGED
 strata_samurai_high: "Vyšší samurajové" # todo: CHANGED
 strata_samurai_high_desc: "Vysoce postavení válečníci, jako daimyō a starší vazalové; vrchní vrstvy samurajské třídy monopolizovaly většinu významných úřadů a těší se značnému dědičnému prestiži." # todo: CHANGED
 strata_samurai_low: "Nižší samurajové" # todo: CHANGED
 strata_samurai_low_desc: "Nižší válečníci a vazalové, jako gokenin a ashigaru, kteří slouží jako administrativní a vojenská pracovní síla pod samurajskou elitou." # todo: CHANGED
 strata_religious: "Jisha" # todo: NEW TRANSLATION
 strata_religious_desc: "Kněží šintoistických svatyní organizovaní skrze chrámové instituce a regulovaní úřady. Ačkoliv mají vliv na místní život, vzdělanost a náboženské obřady, existují částečně mimo právně vymezené statusní třídy." # todo: CHANGED
 strata_commoners_peasants: "Hyakushō" # todo: NEW TRANSLATION
 strata_commoners_peasants_desc: "Podskupina stavovské třídy; rolníci jsou nejpočetnější z japonských společenských vrstev. Členové rolnické třídy jsou registrováni ve vesnicích a jsou vázáni místními povinnostmi a daněmi. Jsou určeni svou registrací — nikoli povoláním — a zahrnují venkovské řemeslníky i obchodníky stejně jako farmáře." # todo: CHANGED
 strata_commoners_townspeople: "Chōnin" # todo: NEW TRANSLATION
 strata_commoners_townspeople_desc: "Podskupina stavovské třídy; měšťané jsou hlavními obyvateli japonských městských center. Členové měšťanské třídy jsou registrováni přes městské instituce a tradičně se spojují s řemesly a obchodem. Ačkoli mohou nashromáždit značné bohatství a vliv, jejich sociální mobilita je zpomalena tím, že nejsou válečníky." # todo: CHANGED
 strata_outcastes: "Eta-Hinin" # todo: NEW TRANSLATION
 strata_outcastes_desc: "Eta a Hinin tvoří nejnižší řady japonské společnosti. Silně diskriminovaní, jsou spojováni s „nečistými“ povoláními, jako jsou kopání hrobů, žebrání a pouliční vystoupení." # todo: CHANGED
 lawgroup_edo_social_system: "Edo statusní systém" # todo: CHANGED
 lawgroup_edo_social_system_desc: "Prosazování $lawgroup_edo_social_system$" # todo: NEW TRANSLATION
 law_strict_edo_system: "Strnulý statusní řád" # todo: CHANGED
 law_strict_edo_system_desc: "Vše od právních a profesních příležitostí až po počet obytných bran, které někomu jeho stav poskytuje, je přísně regulováno a vynucováno státem. Jakékoli porušení protokolu je tvrdě sankcionováno a měšťané a rolníci nemají žádnou formální cestu, jak vstoupit do řad samurajů." # todo: CHANGED
 law_intermediate_edo_system: "Uvolněný statusní řád" # todo: CHANGED
 law_intermediate_edo_system_desc: "Právní a sumptuární zákony byly uvolněny a obyčejní lidé získávají rostoucí vliv a postavení ve společnosti. Bohatí měšťané nebo rolníci se mohou koupí stát gokeninem — nízko postaveným samurajem." # todo: CHANGED
 law_lax_edo_system: "Volný statusní řád" # todo: CHANGED
 law_lax_edo_system_desc: "Pozice a role dříve vyhrazené samurajům jsou otevřeny i pro obyčejné lidi a vynucování zbývajících sumptuárních a profesních omezení probíhá jen selektivně, obvykle omezeně na nejzávažnější přestupky." # todo: CHANGED
 je_tenpo_crisis: "Tenpō krize" # todo: NEW TRANSLATION
 je_tenpo_crisis_reason: "Vyhlášená v roce 1830, éra Tenpō, nebo „Nebeské ochrany“, se zpočátku zdála naplňovat své příznivé jméno. Špatné počasí na [GetGeographicRegion('geographic_region_honshu').GetName] však brzy vedlo k prudkému zdražení rýže a hladomoru v celé zemi, zatímco rostoucí bohatství a vliv [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] ohrožuje zavedený řád [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName].\n\nMezitím se na obzoru západní [Concept('concept_great_power','$concept_great_powers$')] chovají stále odvážněji a jejich obchodní lodě a kanonové čluny se přibližují k našim břehům.\n\nVe snaze řešit tyto problémy představili reformně smýšlející notabilitové své vize Bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Program reformátorů#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] přijal [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] #b ne#! přijal [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] má #v 3#! [Concept('concept_state', '$concept_states$')] s úrovní #v 3#! [GetBuildingType('building_urban_center').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] [concept_clout] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] je #v 10#! nebo více\n#tooltippable;tooltip:tenpo_hardliner_tt #b Program tvrdého křídla#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] přijal [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] přijal [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] má #v 40#! úrovní [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] je [concept_marginalized]\n#tooltippable;tooltip:tenpo_shared_tt #b Sdílený program#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Žádný#! vlastněný [GetCulture('japanese').GetName] [concept_homeland] [concept_state] netrpí [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] má [Concept('concept_gdp', '$concept_gdp_short$')] @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! nebo více\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] armáda [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_power_projection] je větší než #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Máme #v 10#! nebo více úrovní [GetBuildingType('building_naval_fortification').GetName] v vlastněných [Concept('concept_state', '$concept_states$')]" # todo: CHANGED
 je_tenpo_crisis_complete_header: "Ukončí se úspěšnou Tenpō reformou pokud:\n" # todo: CHANGED
 je_tenpo_crisis_failure_header: "Ukončí se neúspěšnou Tenpō reformou pokud:\n" # todo: CHANGED
 je_tenpo_crisis_success_tt: "Dokončili jsme alespoň #v 8#! cílů agendy" # todo: CHANGED
 je_tenpo_crisis_success_2_tt: "V závislosti na počtu #tooltippable;tooltip:tenpo_shared_tt #b Sdílených#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformátorových#!#! nebo #tooltippable;tooltip:tenpo_hardliner_tt #b Tvrdého křídla#!#! cílů, se odměna změní" # todo: CHANGED
 je_tenpo_crisis_success_outcome_tt: "V závislosti na počtu #b Sdílených#!, #b Reformátorových#! nebo #b Tvrdého křídla#! dokončených cílů se odměna změní." # todo: CHANGED
 je_tenpo_crisis_success_outcome_1_tt: "Pokud jsme dokončili více #b cílů Tvrdého křídla#!:" # todo: CHANGED
 je_tenpo_crisis_success_outcome_2_tt: "Pokud jsme dokončili více #b cílů Reformátorů#!:" # todo: CHANGED
 je_tenpo_crisis_success_outcome_3_tt: "Pokud jsme dokončili stejný počet #b cílů Tvrdého křídla#! a #b Reformátorů#!:" # todo: CHANGED
 modifier_tenpo_crisis_reward_hardliner: "Návrat k řádu" # todo: CHANGED
 modifier_tenpo_crisis_reward_reformer: "Upevnění nového" # todo: CHANGED
 modifier_tenpo_crisis_reward_balanced: "Měřené reformy" # todo: NEW TRANSLATION
 modifier_rice_hoarding: "Masivní hromadění rýže" # todo: CHANGED
 tenpo_hardliner_tt: "Frakce #b Tvrdého křídla#! věří, že japonská společnost upadá v morální úpadek, a že tento úpadek lze zastavit pouze návratem k tradici.\n\nProsazuje zavedení přísnějších sumptuárních zákonů a aby samurajové opustili městské požitky a vrátili se ke své idealizované roli střídmých venkovských správců." # todo: CHANGED
 tenpo_reformer_tt: "Frakce #b Reformátorů#! věří, že japonská společnost se nevratně změnila a že zákony země by měly vycházet z aktuální situace místo ideálů romantizované minulosti.\n\nProsazuje politické povýšení japonských obyčejných lidí a podporu obchodu." # todo: CHANGED
 tenpo_shared_tt: "Obě frakce, #b Tvrdé křídlo#! i #b Reformátoři#!, se shodují, že je naléhavé ochránit Japonsko před vnějšími hrozbami a že je třeba řešit otázku potravinové bezpečnosti a ekonomiky." # todo: CHANGED
 button_je_tenpo_combat_rice_hoarding: "Zakažte hromadění rýže" # todo: CHANGED
 button_je_tenpo_combat_rice_hoarding_desc: "Politická a ekonomická nestabilita [ROOT.GetCountry.GetNameNoFlag] způsobila, že bezohlední aktéři nakupují a hromadí velké množství rýže, čímž zvyšují ceny. V důsledku toho si mnoho japonských rodin nyní nemůže dovolit koupit dostatek rýže na uživení." # todo: CHANGED
 button_je_tenpo_frugal_ordinance: "Vydat úsporný dekret" # todo: CHANGED
 button_je_tenpo_frugal_ordinance_desc: "Rostoucí rozmařilost městského [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] ohrožuje stabilitu naší vlády. Začali se chovat nad svůj stav a okázale předvádějí své bohatství.\n\nMusíme jim připomenout jejich roli ve společnosti zavedením dalších právních omezení na luxusní zboží, zábavu a literaturu." # todo: CHANGED
 button_je_tenpo_confiscate_land: "Vydat rozkaz konfiskace Edo-Osaka" # todo: CHANGED
 button_je_tenpo_confiscate_land_desc: "Oblast do 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! od Eda a Ósaky představuje složitou spleť tenryo-, daimyo- a hatamoto-vlastněných pozemků. Nedostatek jednotné administrativní struktury má závažné dopady na národní obranu a naši schopnost využít plný potenciál půdy; přední Rōjū proto navrhl její konfiskaci a konsolidaci.\n\nVysídlení zemědělci obdrží odškodnění v podobě pozemků jinde v Japonsku." # todo: CHANGED
 modifier_consolidation_payments: "Platby za konsolidaci pozemků" # todo: NEW TRANSLATION
 modifier_consolidated_state_land: "Zákon o konsolidaci 10 Ri" # todo: CHANGED
 glossary_ri: "#b #italic Ri#!#! je tradiční jednotka délky odvozená z čínského #italic li#!.\n\nDefinovaná délka ri se v průběhu času měnila, ale v pozdním éře Edo přibližně odpovídala 36 #italic chō#!, tedy asi 3,9 km." # todo: CHANGED
 modifier_tenpo_crisis_ongoing: "Turbulence éry Tenpō" # todo: CHANGED
 tenpo_events.1.t: "Éra Nebeské ochrany" # todo: NEW TRANSLATION
 tenpo_events.1.d: "Po letech nepříznivého počasí postihuje zemi [concept_famine] v [ROOT.GetCountry.GetNameNoFlag]. Chudí a ubogí se potýkají s přežitím a Bakufu čelí rostoucímu nespokojení těch, kdo věří, že vláda mohla udělat více." # todo: CHANGED
 tenpo_events.1.f: "Jeho ženiny tkaniny se vždy dobře prodávaly na trhu a v lepších časech jim dokonce umožnily občas koupit nějakou sladkost. Nyní za ně získal jen čtyři nebo pět gō rýže, jestli vůbec. Sotva jim to vystačí na den, pomyslel si, natož na týden, který potřebovali — i když ho doplnili nalezenými listy a plevelem.\n\nŠel domů, krátce se zastavil pohledem na starého Torova domu. Kopřivka už si vyžádala dva z jeho dětí — a pokud byly pravdivé drby o pláštěnkách, pravděpodobně si vezme další v následujících týdnech. Přidržujíc si pytel rýže, pomodlil se potichu a odešel." # todo: CHANGED
 tenpo_events.1.a: "Ó nebe, chraň nás!" # todo: NEW TRANSLATION
 tenpo_events.1.tt_1: "#r Prudké#! [GetHarvestConditionType('torrential_rains').GetName] zasáhly [GetGeographicRegion('geographic_region_honshu').GetName], #r zničily#! kriticky důležité #b sklizně rýže#! země a vážně zhoršily [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_food_security]." # todo: CHANGED
 tenpo_events.1.tt_2: "Po celém [GetGeographicRegion('geographic_region_honshu').GetName] jsou domy lichvářů a podezřelých hromaditelů rýže terčem davů provádějících tzv. #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, což vede k #r rozsáhlému zdevastování#!." # todo: CHANGED
 glossary_uchikowashi: "#b #italic Uchikowashi#!#! označuje jednání ničení majetku vnímaných amorálních aktérů, jako jsou lichváři, hromaditelé rýže a spekulanti s cenami, členy veřejnosti.\n\nAčkoli těmto činům často provázel plenění, v mnoha případech se pachatelé uchikowashi záměrně zdrželi plenění, aby zdůraznili legitimitu svého činu." # todo: CHANGED
 tenpo_events.2.t: "Vzpoura filozofického samuraje" # todo: CHANGED
 tenpo_events.2.d: "Znechucen vzatým pořádkem a jeho neschopností řešit [concept_famine], které sužuje [SCOPE.sState('osaka_scope').GetName], vzbouřil se magistrát a učenec [SCOPE.sCharacter('oshio_scope').GetFullName] proti místním úřadům. Velká část [SCOPE.sState('osaka_scope').GetCityHubName] už hoří, zatímco jeho příznivci vypalují místní vládní úřady." # todo: CHANGED
 tenpo_events.2.f: "„Ačkoli nemáme moc Tchangů a Wu, ani ctnost Konfucia a Meng-cua, nejde to jinak: pro dobro říše jsme se rozhodli jednat — přestože to na náš vlastní rod může přinést kletbu.\n\nPotrestáme a popravíme různé úředníky, kteří sužují a zneklidňují lid, a poté také potrestáme a popravíme bohaté měšťany Ósaky, kteří ztloustli rozmařilostí.\n\nPak zlato, stříbro a mince, které ukryli v tajných trezorech, a balíky rýže, jež schovali ve skladech a sídlech, budou rozděleny a přiděleny.„\n\n— Ōshio Heihachirō, #italic Výňatky z manifestu#!" # todo: CHANGED
 tenpo_events.2.a: "Povolat milici a přibít toho zrádce na kříž." # todo: CHANGED
 tenpo_events.2.b: "Zoufale, a přesto spravedlivě." # todo: CHANGED
 tenpo_events.2.c: "Rebelové přemohli místní posádku a zajali [SCOPE.sState('osaka_scope').GetCityHubName]." # todo: CHANGED
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] uniká zatčení a spáchá sebevraždu upálením." # todo: CHANGED
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName] je mučen, osolen a ukřižován úřady." # todo: CHANGED
 tenpo_events.2.tt_3: "Místní milice #b potlačí povstání#! dříve, než se rozšíří." # todo: NEW TRANSLATION
 tenpo_events.2.tt_4: "Konfuziánský agitátor [SCOPE.sCharacter('oshio_scope').GetFullName] dostane lehký, symbolický trest a je mu dovoleno pokračovat v činnosti." # todo: CHANGED
 modifier_osaka_burning: "Kritika podepsaná krví" # todo: NEW TRANSLATION
 modifier_controversial_pardon: "Kontroverzní milost" # todo: NEW TRANSLATION
 tenpo_events.3.t: "Povinné reformy" # todo: NEW TRANSLATION
 tenpo_events.3.d: "Spokojen s tempem reforem, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] poblahopřál předsedajícím radním k jejich pokroku — věříce, že [ROOT.GetCountry.GetAdjective] národ dokáže překonat jakoukoli nadcházející výzvu, ať už cizí či domácí." # todo: CHANGED
 tenpo_events.3.f: "„Dvanáct, pane,“ řekl hlavní radní a odložil štětec na stůl. „A zprávy z Kinai ukazují totéž, naše reformy se zdají zakořeňovat.“\n\nZ tribunyny [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] pokývl úsečným kývnutím. „Dobře. Chci, aby byl dvorec včas informován. Nyní ohledně zprávy z Nagasaki…“" # todo: CHANGED
 tenpo_events.3.a: "Ať to znamená konec [ROOT.GetCountry.GetAdjective] morálního a politického úpadku." # todo: CHANGED
 tenpo_events.3.b: "Od rolníka po samuraje, nejsme přece všichni poddaní císaře?" # todo: CHANGED
 tenpo_events.3.c: "Stabilita říše je prvořadá." # todo: CHANGED
 tenpo_outcome_hardliner_tt: "Dokončili jsme více #b cílů Tvrdého křídla#! než #b Reformátorů#!" # todo: CHANGED
 tenpo_outcome_reformer_tt: "Dokončili jsme více #b cílů Reformátorů#! než #b Tvrdého křídla#!" # todo: CHANGED
 tenpo_outcome_balanced_tt: "Dokončili jsme stejný počet #b cílů Tvrdého křídla#! a #b Reformátorů#!" # todo: CHANGED
 tenpo_events.4.t: "Akce a nečinnost" # todo: CHANGED
 tenpo_events.4.d: "Nespokojen s výsledky reforem a čelící rostoucí veřejné nevůli vůči hlavním radním, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] odvolal [SCOPE.sCharacter('roju_scope').GetFullName] z jeho funkce." # todo: CHANGED
 tenpo_events.4.f: "Vyhnanství. Bývalý radní okusil to slovo a nijak mu nepřirostlo k srdci. Přesto bylo možná lepší než zůstávat v Eda po včerejších událostech. Jeho zbylí sluhové stále odstraňovali dlaždice a kamení z rybníka a nádvoří a některá z výhrůžných slov, která toho dne zaslechl, se už nikdy nedala nevyslyšet.\n\nSlovo znovu ochutnal a zjistil, že už mu není tak odporné. Kromě toho si pomyslel, vždycky toužil spatřit horu Gassan na vlastní oči." # todo: CHANGED
 tenpo_events.4.a: "Nechci už toho blázna nikdy v životě vidět." # todo: CHANGED
 tenpo_events.4.b: "Zvrátit jeho všechna rozhodnutí a dát to na vědomí veřejnosti." # todo: CHANGED
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName] je #r degradován#! a interně vyhnán do provincie #b Dewa#!" # todo: CHANGED
 modifier_tenpo_fail: "Tenpō reformy přerušeny" # todo: CHANGED
 tenpo_events_4_demotion_tt: "Vedoucí [concept_interest_group] v [concept_in_government] je degradován a interně vyhnán" # todo: CHANGED
 tenpo_events.5.t: "Pozemkoví držitelé odolávají centralizaci" # todo: CHANGED
 tenpo_events.5.d: "Náš krok ke konfiskaci země v [SCOPE.sState('kanto_scope').GetName] a [SCOPE.sState('kansai_scope').GetName] narazil na široký odpor místních držitelů půdy. Nejhlučnější nářky přicházejí od těch, jejichž pozemky byly uděleny jako odměna za vojenské služby." # todo: CHANGED
 tenpo_events.5.f: "„Vojenské zásluhy udělily mému předkovi půdu, kterou nyní držím. Od Sekigahary každá generace obdělávala pole — zvyšovala výnosy a odváděla našim pánům jejich podíl, vždy bez stížností.\n\nZaslouží si taková služba teď takové zacházení? Je přesun bez odpovídající kompenzace naší odměnou?„" # todo: CHANGED
 tenpo_events.5.a: "Zrušit centralizaci dříve, než se to vymkne kontrole." # todo: CHANGED
 tenpo_events.5.b: "Nabídnout přemístěným další pozemky jako kompenzaci." # todo: CHANGED
 tenpo_events.5.c: "Připomenout jim, že je to vůle [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!" # todo: CHANGED
 modifier_heavy_handed_land_confiscations: "Tvrdé konfiskace pozemků" # todo: CHANGED
 modifier_promotions_and_koku_redistribution: "Povýšení a přerozdělení koku" # todo: NEW TRANSLATION
 modifier_reckless_roju: "Neopatrný Rōjū" # todo: CHANGED
 modifier_will_of_the_shogun: "Ve jménu šóguna" # todo: NEW TRANSLATION
 tenpo_events.6.t: "Lev v dračím doupěti" # todo: CHANGED
 tenpo_events.6.d: "Vítězství [SCOPE.sCountry('britain_scope').GetName] proti [SCOPE.sCountry('china_scope').GetAdjective] výrazně otřáslo naší zemí. Čínské junky a armády byly snadno poraženy nadřazenými [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting] silami a mnoho lidí nyní zpochybňuje schopnost [ROOT.GetCountry.GetName] odrazit podobný útok." # todo: CHANGED
 tenpo_events.6.f: "„Od chrámu Ganlu na západě po chrám Jinshan na východě byly okolní země plné černých a bílých barbarů — jako kusy rozházené po go desce — a místní se divili, zda někdy odejdou.“\n\n— Mineta Fūkō, #italic Nové zprávy ze zámoří#!" # todo: CHANGED
 tenpo_events.6.a: "Nebe nás ochraňuj, naši samurajové možná ne." # todo: CHANGED
 tenpo_events.6.b: "Cenzurovat jakékoli negativní zprávy z Číny." # todo: NEW TRANSLATION
 tenpo_events.6.c: "Jsme útes, o který se vlny barbarů rozbijí." # todo: CHANGED
 modifier_opium_war_aftermath: "Barbaři u bran" # todo: NEW TRANSLATION
 modifier_defenses_strengthened: "Posílené pobřežní posádky" # todo: CHANGED
 tenpo_events.7.t: "Škola Takashima" # todo: NEW TRANSLATION
 tenpo_events.7.d: "Z obav o budoucnost Japonska po Opiumové válce zorganizoval nagaskijský magistrát [SCOPE.sCharacter('takashima_scope').GetFullName] moderní vojenskou jednotku podle holandského vzoru a vyzývá zbytek země, aby následoval." # todo: CHANGED
 tenpo_events.7.f: "„Jejich kulometní helmy připomínají zvláštní koruny a jejich rozkazy jsou křikem v drsné řeči Holanďanů. Přesto jsou jejich formace dobře cvičené a organizované a jsou schopny vést salva téměř dvakrát rychleji než moji vazalové, i když jejich přesnost je poněkud nižší.“\n\n„A co dělostřelectvo?“\n\n„Bezkonkurenční. Obávám se, že čím déle váháme s jeho přijetím, tím menší budou naše šance odrazit barbary.“" # todo: CHANGED
 tenpo_events.7.a: "Schválit přijetí barbarofilních zbraní a technik." # todo: CHANGED
 tenpo_events.7.b: "Dát přednost tradičním mušketýrským domům." # todo: CHANGED
 modifier_inoue_tatsuke_primacy: "Primát Inoue-Tatsuke" # todo: CHANGED
 modifier_favouring_traditional_musketry_houses: "Upřednostnění tradičních mušketýrských domů" # todo: CHANGED
 modifier_favouring_takashima: "Mušketýrské domy odsunuty" # todo: CHANGED
 modifier_takashima_school: "Podpora školy Takashima" # todo: NEW TRANSLATION
 tenpo_events.8.t: "Pro misku rýže" # todo: CHANGED
 tenpo_events.8.d: "Obvinění z hromadění rýže a manipulace cenami vyvolala napětí mezi rolníky a obchodníky v [SCOPE.sState('tenpo_unrest_state_scope').GetName], které vygradovalo. Se stoupajícími řadami zbídačených rolníků se místní úřady nyní potýkají s povstáním v celé provincii." # todo: CHANGED
 tenpo_events.8.f: "Byl jedním z prvních. Ti veselí, kteří napadli domov zlého obchodníka a rozdělili jeho nepoctivé zboží lidu. Ale když se jeho oči rozhlédly kolem ohniště, uvědomil si, kolik jich zůstalo. Eikichi a Matsuzō zůstali, i když už málo připomínali muže, které kdysi znal, planoucí spravedlivým hněvem. Fukumatsu ztratil život druhý den, následuje Takeshichi sedmého dne. Ostatní se rozptýlili jako listí, jak je pronásledovali úředníci.\n\nCharakter mužů, kteří je nahradili, ho naplnil hanbou a zoufalstvím, ale neviděl jinou cestu. I chudé společenství se mu zdálo božské ve srovnání s katařovým pilníkem." # todo: CHANGED
 tenpo_events.8.a: "Poslat muže, aby ty ničemní zpacifikovali." # todo: CHANGED
 tenpo_events.8.b: "Nechat neklid vyhasnout sám od sebe." # todo: CHANGED
 tenpo_events.8.c: "Podplatit místní vesnické hlavy, aby pomohly potlačit neklid." # todo: CHANGED
 modifier_consulted_headsmen: "Vesnické ústupky" # todo: NEW TRANSLATION
 modifier_lingering_brigandry: "Přeživší banditismus" # todo: CHANGED
 modifier_brutal_anti_bandit_campaigns: "Brutální protibanditní kampaně" # todo: CHANGED
 je_taming_the_north: "Přepracování severu" # todo: CHANGED
 je_taming_the_north_reason: "S vytvořením #b [SCOPE.sState('hokkaido_state_scope').GetName] Development Commission#!, běžně nazývané #b Kaitakushi#!, je toto bývalé pohraničí v ruchu. Každý den přijíždějí noví muži a ženy z jihu hledat nové pozemky a příležitosti.\n\nAvšak nejde o běžný příliv lidí. S osadníky přicházejí úředníci, intelektuálové a modernizační vizionáři s misí utvářet zemi — dychtiví spatřit svou vizi budoucnosti [ROOT.GetCountry.GetName] realizovanou v dnešním [SCOPE.sState('hokkaido_state_scope').GetName]." # todo: CHANGED
 taming_the_north_agriculture_potentials_goal_tt: "Použili jsme akci #b $button_je_taming_the_north_agriculture_potentials$#! #v 3#! krát" # todo: CHANGED
 taming_the_north_agriculture_arable_goal_tt: "Použili jsme akci #b $button_je_taming_the_north_agriculture_arable_land$#! #v 3#! krát" # todo: CHANGED
 taming_the_north_colonies_goal_tt: "Použili jsme akci #b $button_je_taming_the_north_establish_colonies$#!" # todo: NEW TRANSLATION
 je_taming_the_north_additional_goal_pre: "Pokud vlastníme celé #b $STATE_SAKHALIN$#!, platí #b $modifier_tamed_north$#! [concept_timed_modifier] také pro $STATE_SAKHALIN$ [concept_state_region]:" # todo: CHANGED
 je_taming_the_north_additional_goal: "Pokud vlastníme celé [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], platí #b $modifier_tamed_north$#! [concept_timed_modifier] také pro [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:" # todo: CHANGED
 je_taming_the_north_additional_goal_completed: "Jelikož vlastníme celé [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], platí #b $modifier_tamed_north$#! [concept_timed_modifier] také pro [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:" # todo: CHANGED
 modifier_tamed_north: "Vzorová kolonie" # todo: CHANGED
 modifier_northern_learnings: "Poučení Kaitakushi" # todo: CHANGED
 button_je_taming_the_north_establish_colonies: "Založit státem podporované osady" # todo: CHANGED
 button_je_taming_the_north_establish_colonies_desc: "Kolonie bez dostatečných osadníků jsou odsouzeny k neúspěchu. Měli bychom zvážit pobídky, které přilákají rodiny z celého [ROOT.GetCountry.GetName] k usazení na severu." # todo: CHANGED
 button_je_taming_the_north_integrate_ainu: "Zavést právní ochrany Ainu" # todo: CHANGED
 button_je_taming_the_north_integrate_ainu_desc: "Doposud byla pozice Komise vůči [GetCulture('ainu').GetName] násilná integrace a kulturní vymazání. Naše postupné kroky směrem k spravedlivějším vztahům s obyvateli severu z [GetCulture('ainu').GetNameNoFormatting] však vedly k oteplení vzájemných vztahů.\n\nByl proto předložen návrh [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], aby byli [GetCulture('ainu').GetNameNoFormatting] právně uznáni jako chráněný bratrský národ podle [ROOT.GetCountry.GetAdjective] zákona, rovnoprávní v právech i povinnostech s [GetCulture('japanese').GetName]." # todo: CHANGED
 ainu_frenship_tt: "Důsledně jsme podporovali zájmy [GetCulture('ainu').GetName] v #b událostech#!" # todo: CHANGED
 button_je_taming_the_north_sapporo_agricultural_college: "Založit Sapporoský zemědělský kolegium" # todo: CHANGED
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Sever je ideální pole pro testování nejnovějších teorií v zemědělství a správě půdy. Založíme špičkové zemědělské kolegium zaměstnávající zkušené cizince, které bude jádrem naší vědecké transformace krajiny." # todo: CHANGED
 sapporo_partner_positive_catalyst_tt: "S #g pozitivním#! [concept_diplomatic_catalyst] dojde k navázání náhodných kontaktů s vybranou zemí splňující požadavky" # todo: CHANGED
 button_je_taming_the_north_agriculture_potentials: "Zavést nové plodiny" # todo: NEW TRANSLATION
 button_je_taming_the_north_agriculture_potentials_desc: "Dostupné orné plochy na ostrově mohou být nesmírně důležité, ale skutečný ekonomický rozvoj nastane jen tehdy, když budeme pěstovat ty správné plodiny.\n\nNové objevy v zemědělství — vedené #b Sapporoským zemědělským kolegiem#! — nám umožňují zavést na tuto mrazivou hranici plodiny, které byly dosud považovány za nemožné.\n\nDostupné možnosti:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (škálování)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]" # todo: CHANGED
 established_sapporo_college_tt: "Založili jsme #b Sapporoský zemědělský kolegium#!" # todo: CHANGED
 hokkaido_agriculture_potentials_tt: "Toto rozhodnutí lze učinit celkem #v 3#! krát. (aktuálně [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])" # todo: NEW TRANSLATION
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]" # todo: NEW TRANSLATION
 button_je_taming_the_north_agriculture_arable_land: "Pokračovat v odvodňování a melioracích" # todo: CHANGED
 button_je_taming_the_north_agriculture_arable_land_desc: "Ačkoli jsou tyto rozsáhlé pozemky zemědělsky málo rozvinuté, ukrývají velký potenciál. Velké horské pásy — odkud pramení hojná voda — nabízejí mnoho možností pro rozšíření orných ploch na sever.\n\nVyprázdníme mokřady, zavlažíme pole a zkrotíme zemi jako důkaz nezlomného [GetCulture('japanese').GetName] ducha." # todo: CHANGED
 hokkaido_agriculture_arable_tt: "Toto rozhodnutí lze učinit celkem #v 3#! krát. (aktuálně [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])" # todo: NEW TRANSLATION
 hokkaido_events.1.t: "Osmý okruh" # todo: NEW TRANSLATION
 hokkaido_events.1.d: "S začleněním [SCOPE.sState('hokkaido_scope').GetName] — nebo zemí Ainu — do Japonska je třeba zvolit nové jméno, které odráží nový status této země. Nově ustavená Development Commission předložila několik návrhů k přezkoumání [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]." # todo: CHANGED
 hokkaido_events.1.f: "„Země divochů to je. Bažin a bláta. Chudých rybářů a pojídačů masa. Co od té prokleté země čekáš, co ti nemůže dát již naše [ROOT.GetCountry.GetCapital.GetCityHubName]?“\n\n„Smysl, matko. A něco vlastního.“" # todo: CHANGED
 hokkaido_events.1.a: "Bude se jmenovat #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#!: Okruh Severního moře." # todo: CHANGED
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, na počest obyvatel této země." # todo: NEW TRANSLATION
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, Okruh mořských ostrovů, je zjevně lepší volba." # todo: CHANGED
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! zní poněkud literárně." # todo: CHANGED
 hokkaido_events.1.tt_1: "Město #b Sapporo#! bylo založeno a stalo se novým správním centrem ostrova, nahrazující #b Hakodate#!" # todo: CHANGED
 modifier_ainu_heritage_aknowleged: "Země Kai" # todo: NEW TRANSLATION
 modifier_breaking_new_ground: "Dobývání nového území" # todo: CHANGED
 modifier_hokkaido_naval_connections: "Mořský okruh" # todo: NEW TRANSLATION
 modifier_call_of_the_frontier: "Volání hranice" # todo: NEW TRANSLATION
 the_ainu_will_appreciate_this_tt: "@information! [GetCulture('ainu').GetName] si toho bude pamatovat" # todo: NEW TRANSLATION
 hokkaido_events.1_tt_2: "#b Severní kai okruh#!\nSlovy člena komise Matsuura Takeshirō, #italic kai#! (加伊) je chápáno jako staré endonymum Ainu pro jejich vlastní národ." # todo: CHANGED
 hokkaido_events.1_tt_3: "#b Okruh Severního moře#!\nVládní proti návrhu Matsuura Takeshirō. Zde jsou znaky pro #italic kai#! (加伊) nahrazeny identicky znějícím znakem #italic kai#! (海), znamenajícím „moře“.\n\n@information! Toto je historicky vybraný návrh." # todo: CHANGED
 hokkaido_events.1_tt_4: "#b Okruh mořských ostrovů#!\nNad všechny ostatní věci ostrov definuje jeho vztah k moři — skutečnost, která by se měla projevit v novém jménu." # todo: CHANGED
 hokkaido_events.1_tt_5: "#b Okruh země vycházejícího slunce#!\nArchaické jméno z japonské doby Jamato pro severovýchodní pohraniční země. Volba této možnosti ukotvuje novou kolonii pevně v dávné japonské minulosti." # todo: CHANGED
 hokkaido_events.2.t: "Nové pohraničí" # todo: CHANGED
 hokkaido_events.2.d: "Otázka, jak nejlépe osídlit region, zaměstnávala členy Development Commission [SCOPE.sState('hokkaido_state_scope').GetName] už nějakou dobu. Netrpěliví správci nyní žádají, abychom dospěli k definitivnímu rozhodnutí." # todo: CHANGED
 hokkaido_events.2.f: "Vyrůstal, otec mu často vyprávěl o předcích. O hrdinných a vznešených válečnících období válčících států. O jejich strohé důstojnosti a velkých činech. Příběhy ho jako dítě fascinovaly, ale teď mu přinášely jen melancholii. Ironie otce, papírového úředníka a městského opilce, který držel meč jen kvůli důstojnosti, a chválil ctnosti minulosti, byla nesnesitelná.\n\nKdyž ho otec požádal, aby mu pomohl v podnikání, odmítl s opovržením a okamžitě se vydal na sever. Možná tam najde spásu pro svoji linii?" # todo: CHANGED
 hokkaido_events.2.a: "Upřednostnit osídlení vojáky-osadníky." # todo: NEW TRANSLATION
 hokkaido_events.2.b: "Prostý rolník je páteří [ROOT.GetCountry.GetName]." # todo: CHANGED
 hokkaido_events.2.c: "Omezit většinu [GetCulture('japanese').GetName] osad na oblasti nepoužívané [GetCulture('ainu').GetName]." # todo: CHANGED
 modifier_tondenhei_settlements: "Tondenhei osady" # todo: CHANGED
 modifier_peasant_settlements: "Osady rolníků" # todo: CHANGED
 modifier_restricted_settlements: "Zachování srdcí Ainu" # todo: CHANGED
 hokkaido_events.2.tt_1: "#v 1.5%#! všech [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] z [concept_capital_state] se přestěhuje do [SCOPE.sState('hokkaido_state_scope').GetName]" # todo: NEW TRANSLATION
 hokkaido_events.2.tt_2: "#v 3%#! všech [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] v [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (jednom z [Concept('concept_state', '$concept_states$')] s nejnižším [Concept('concept_gdp','$concept_gdp_short$')] v [GetGeographicRegion('geographic_region_home_islands').GetName]) se přestěhuje do [SCOPE.sState('hokkaido_state_scope').GetName]" # todo: NEW TRANSLATION
 modifier_old_swords_in_new_lands: "Staří meče na nových půdách" # todo: CHANGED
 modifier_go_north_young_man: "Jdi na sever, mladý muži" # todo: NEW TRANSLATION
 hokkaido_events.3.t: "Semena pokroku" # todo: NEW TRANSLATION
 hokkaido_events.3.d: "Nedávné průlomy v Sapporoském zemědělském kolegiu podnítily návrhy zavést nové plodiny na polích [SCOPE.sState('hokkaido_state_scope').GetName]." # todo: CHANGED
 hokkaido_events.3.f: "#b Osobní zápis v laboratoři, 154#!\nOdrůdy z jižních oblastí byly nyní upřednostněny před západními variantami na základě posledních testů. Chlapci tvrdí, že hranice pěstování se očekává posunout značně severněji, možná i za Kamikawa. Další studie jsou potřeba pro posouzení výnosového potenciálu, ale cítíme se optimističtí. Požadováno setkání s vedoucím fakulty zítra. Potřebuji koupit novou kravatu." # todo: CHANGED
 hokkaido_events.3.a: "Zaměřit se na zlepšení stávajících plodin." # todo: CHANGED
 hokkaido_events.3.b: "Vyvinout odolné odrůdy, aby umožnily místní [GetBuildingType('building_rice_farm').GetName]." # todo: CHANGED
 hokkaido_events.3.c: "Nížiny jsou vhodné pro indigo [GetBuildingType('building_dye_plantation').GetName]." # todo: NEW TRANSLATION
 hokkaido_events.3.e: "Mák se zde dobře uchytil, [GetBuildingType('building_opium_plantation').GetName] jsou budoucnost." # todo: CHANGED
 hokkaido_events.3.g: "Založit [GetBuildingType('building_vineyard').GetName] se specializovanými odrůdami rév." # todo: CHANGED
 button_je_taming_the_north_complete: "Rozvíjeli jsme zemi tolik, kolik nám dovoluje technologie" # todo: CHANGED
 modifier_introducing_new_crops: "Zavádění nových plodin" # todo: NEW TRANSLATION
 modifier_opimizing_existing_variants: "Chladně optimalizované varianty plodin" # todo: CHANGED
 hokkaido_events.4.t: "Růst půdy" # todo: NEW TRANSLATION
 hokkaido_events.4.d: "Development Commission [SCOPE.sState('hokkaido_state_scope').GetName] dosáhla dalšího významného milníku, když velké plochy bývalých mokřadů byly přeměněny na cennou zemědělskou půdu." # todo: CHANGED
 hokkaido_events.4.f: "Bylo to opravdu působivé. Před deseti lety by největší loď, která by bezpečně projela řekou před ním, byla malá člun. Teď sledoval skupinu dělníků, jak vykládají bedny a pytle z masivního parního pramice chrlícího dým do čistého horského vzduchu. Materiál pro další zámek snad? Nebo pro další odvodňovací projekt výše po proudu? Nebo jen zásoby z nové vesnice v údolí za nimi? Nevěděl to, a vlastně na tom nesešlo — cokoliv to přiváží, přiváží budoucnost." # todo: CHANGED
 hokkaido_events.4.a: "S každým úderem motyky tvarujeme tuto zemi." # todo: CHANGED
 hokkaido_events.4.b: "A s každým novým domem ji rozšiřujeme." # todo: NEW TRANSLATION
 hokkaido_events.4.tt_1: "#v 2%#! všech [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] v [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (jednom z [Concept('concept_state', '$concept_states$')] s nejnižším [Concept('concept_gdp','$concept_gdp_short$')] v [GetGeographicRegion('geographic_region_home_islands').GetName]) se přestěhuje do [SCOPE.sState('hokkaido_state_scope').GetName]" # todo: NEW TRANSLATION
 modifier_immigration_burst: "Vlna imigrace" # todo: NEW TRANSLATION
 modifier_open_to_business: "Otevřeno podnikání" # todo: CHANGED
 hokkaido_events.5.t: "Chlapci, buďte ambiciózní..." # todo: NEW TRANSLATION
 hokkaido_events.5.d: "S ukončením první třídy Sapporoského zemědělského kolegia vedeného personálem ze [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] jsou absolventi dychtiví uplatnit nové dovednosti. Mezitím správní rada kolegia zvažuje budoucí směřování a zaměření institutu." # todo: CHANGED
 hokkaido_events.5.f: "„...buďte ambiciózní ne pro peníze, ne pro sobecké zvýšení postavení, ne pro pomíjivou věc, které lidé říkají sláva. Buďte ambiciózní pro dosažení všeho, čím může člověk být.“\n\n— William Smith Clark, „Rozlučková řeč prezidenta Sapporoského zemědělského kolegia“" # todo: CHANGED
 hokkaido_events.5.a: "Zemědělské kolegium by se mělo primárně věnovat zemědělství." # todo: CHANGED
 hokkaido_events.5.b: "Měli bychom upřednostnit rozšíření inženýrské fakulty." # todo: NEW TRANSLATION
 hokkaido_events.5.c: "Zřídit fakultu humanitních věd a zahájit místní kulturní studie." # todo: CHANGED
