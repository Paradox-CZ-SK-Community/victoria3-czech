 hokkaido_events.8.t: "Komise bez cíle" # todo: NEW TRANSLATION
 hokkaido_events.8.d: "Ztráta [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] donutila Development Commission rozevřít se dříve, než dokončila své poslání. V reakci se rozzlobení občané vydali do ulic [ROOT.GetCountry.GetName] protestovat proti ztrátě národního prestiže a svých osobních investic." # todo: CHANGED
 hokkaido_events.8.f: "Vyčerpaný emeritní administrátor se sklátil do svého kancelářského křesla a nalil si vydatnou porci saké. Pohár vypil najednou a nechal oči spočinout na mapách rozložených na stole. Plné čmáranic, poznámek a značek, každá označovala samostatný plán, do kterého vložil svou životní energii. Teď už žádný plán ani energie nezbyly a implicitní optimismus v každé poznámce zněl posměšně.\n\nSakra to celé, pomyslel si, a nalil si další pohár." # todo: CHANGED
 hokkaido_events.8.a: "Litujeme, tento výsledek je mimo kontrolu vlády." # todo: CHANGED
