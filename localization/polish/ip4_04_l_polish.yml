 je_devorismo: "Vláda požíračů"
 je_devorismo_reason: "Rozhodující vítězství liberálů v portugalské občanské válce vyhnalo pretendenta krále Miguela do Říma a učinilo z jeho stoupenců vyčerpanou sílu v domácí politice. V jejím důsledku se dominantní [GetIdeology('ideology_cartist').GetName] frakce liberálů pustila do upevňování svého monopolu na moc - a svého neomezeného přístupu k [ROOT.GetCountry.GetAdjective] státní pokladně.\n\nBěhem uplynulého roku zahájila $ideology_cartist$ vláda rozsáhlý program prodeje národního majetku soukromým investorům, politiku, kterou její odpůrci nazvali „Devorismo“, neboli „požíračství“. Tyto privatizace zdaleka smysluplně nezmírnily značné dluhy země [ROOT.GetCountry.GetNameNoFormatting]; naopak vedly ke koncentraci majetku v rukou bohatých stoupenců liberálů a přispěly k rozkolu v [ROOT.GetCountry.GetAdjectiveNoFormatting] liberalismu, který se každým dnem stále více prohlubuje."
 je_devorismo_cartist_header: "#title Bude zakončeno #b chartistickým#! vítězstvím, pokud:#!\n"
 je_devorismo_constitutionalist_header: "#title Bude zakončeno #b konstitucionalistickým#! vítězstvím, pokud:#!\n"
