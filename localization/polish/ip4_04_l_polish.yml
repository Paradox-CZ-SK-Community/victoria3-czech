 upon_researching_pan_nationalism_iberia_tt: "Po vyzkoumání #v $pan-nationalism$#! bude globální [concept_journal_entry] #v $je_iberia$#! přidán do deníku všech [Concept('concept_country','$concept_countries$')] v [GetGeographicRegion('geographic_region_iberia_old').GetName]"
 je_iberia_discard_tt: "Rozhodneme se neusilovat o #v $IBE_ADJ$#! [Concept('concept_unification','$concept_unification_short$')]"
 je_iberia_may_activate_again_warning_tt: "@warning! Pokud se kterákoli jiná [concept_country] v [GetGeographicRegion('geographic_region_iberia_old').GetName] rozhodne usilovat o #v $IBE_ADJ$#! [Concept('concept_unification','$concept_unification_short$')], globální [concept_journal_entry] #v $je_iberia$#! bude přidán do deníku"
