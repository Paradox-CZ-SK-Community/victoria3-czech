 regency.1.t: "Regentství"
 regency.1.d: "Titul [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] přešel na [SCOPE.sCharacter('monarch_scope').GetFullName], který ještě nedosáhl plnoletosti. Úkol sestavit regentství připadl stávající vládě."
 regency.1.f: "„Vaším úkolem bude především udržet stabilitu země [ROOT.GetCountry.GetNameNoFormatting] po dobu nezletilosti [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]. Královská rodina je připravena převzít odpovědnost za výchovu dítěte. Můžete si být jisti, že nejste povoláváni jako náhradní rodič.“\n\nVyslanec se odmlčel a čekal na ministrovu odpověď.\n\n„Rozumím,“ zazněla odpověď. „Pokud jde o vzdělání, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] je připraven uhradit nezbytnou částku. Co dalšího požadujete?“"
 regency.1.a: "[SCOPE.gsInterestGroup('ig_candidate_1').GetLeader.GetFullName] je zjevnou volbou."
 regency.1.b: "[SCOPE.gsInterestGroup('ig_candidate_2').GetLeader.GetFullName] lze důvěřovat, že monarchii udrží."
 regency.1.c: "Můžeme dosáhnout kompromisu s [SCOPE.gsInterestGroup('ig_candidate_3').GetLeader.GetFullName]."
 regency.1.e: "Jmenování [SCOPE.gsInterestGroup('ig_candidate_4').GetLeader.GetFullName] bude populární volbou."
 regency.2.t: "Indisponován"
 regency.2.d: "Ze zdravotních důvodů [SCOPE.sCharacter('regent_scope').GetFullName] prohlásil, že [SCOPE.sCharacter('regent_scope').GetHerselfHimself] není schopen vykonávat své povinnosti jako [SCOPE.sCharacter('regent_scope').GetPrimaryRoleTitle]. Vláda musí rozhodnout, kdo [SCOPE.sCharacter('regent_scope').GetHerHim] nahradí."
 regency.2.f: "„S hlubokou lítostí oznamuji, že...“\n\n[SCOPE.sCharacter('regent_scope').GetLastNameNoFormatting] se na nedokončenou větu ještě jednou podíval, úhledně papír složil a vsunul jej do krbu. Ne, nepřijatelné. Mohlo by to být špatně vyloženo a použito k jeho očernění jako člověka lačného po moci. Muselo to být neutrálnější. Něco, co by ani jeho nejhorší nepřátelé nedokázali překroutit. Vzal si další list papíru.\n\n„Považoval jsem za svou povinnost předstoupit před panovníka...“"
 regency.2.a: "Jmenovat nového kandidáta z řad [SCOPE.gsInterestGroup('ig_candidate_1').GetName]."
 regency.2.b: "[SCOPE.gsInterestGroup('ig_candidate_2').GetLeader.GetFullName] nejlépe odráží současnou vládu."
 regency.2.c: "[SCOPE.gsInterestGroup('ig_candidate_3').GetLeader.GetFullName] prokázal věrnost koruně."
 regency.2.e: "Vybrat populárního kandidáta - [SCOPE.gsInterestGroup('ig_candidate_4').GetLeader.GetFullName]."
 regency.3.t: "Den korunovace"
 regency.3.d: "[SCOPE.sCharacter('monarch_scope').GetFullName] dosáhl plnoletosti a nyní může usednout na [ROOT.GetCountry.GetAdjective] trůn. Regentství [SCOPE.sCharacter('regent_scope').GetFullName] skončilo."
 regency.3.f: "[SCOPE.sCharacter('regent_scope').GetFullNameNoFormatting] sledoval, jak kněz provádí poslední pomazání. Rozdíl mezi [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] dneška a včerejška byl výraznější, než si [SCOPE.sCharacter('regent_scope').GetSheHe] kdy dokázal představit. [SCOPE.sCharacter('monarch_scope').GetSheHe|U] stál vzpřímeněji než dříve, s nacvičeným výrazem odhodlání ve [SCOPE.sCharacter('monarch_scope').GetHerHis] tváři. Koruna působila beztížně, když byla položena na [SCOPE.sCharacter('monarch_scope').GetHerHis] hlavu.\n\nKněz ustoupil a rozezněla se fanfára doprovázená duněním děl za zdmi paláce.\n\n„Věci, které jsem zde dříve slíbil, vykonám a dodržím,“ odříkal [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]. „K tomu mi dopomáhej [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')].“"
 regency.3.a: "Ať žije [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]!"
 proclaim_regent_monarch: "Prohlásit regenta panovníkem"
 proclaim_regent_monarch_desc: "Bez legitimního nárokovatele v linii následnictví čelíme nevděčnému úkolu vybrat nového panovníka, který bude vládnout zemi [Character.GetCountry.GetName]. Stávající [Character.GetPrimaryRoleTitle] je silným uchazečem o tuto pozici."
 no_heir_tt: "Neexistuje žádný legitimní [Concept('concept_heir','nárokovatel')] trůnu"
 eterna_regency_tt: "Stávající [Concept('concept_ruler','$RULER_TITLE_REGENT$')] je u moci déle než #v 10 let#! (aktuálně [Character.MakeScope.Var('regency_years').GetValue|v0])"
 modifier_new_royal_dynasty: "Nová královská dynastie"
 effects_depend_on_popularity_tt: "Účinky této interakce se budou lišit podle [concept_popularity] postavy [Character.GetFullName]"
 espartero_becomes_monarch_tt: "[SCOPE.sCharacter('espartero_scope').GetFullName] bude korunován jako [SCOPE.sCharacter('espartero_scope').GetCountry.GetCustom('country_male_royal_title')] země [ROOT.GetCountry.GetName]"
 male_regent_becomes_monarch_tt: "[Character.GetFullName] bude korunován jako [Character.GetCountry.GetCustom('country_male_royal_title')] země [Character.GetCountry.GetName]"
 female_regent_becomes_monarch_tt: "[Character.GetFullName] bude korunována jako [Character.GetCountry.GetCustom('country_female_royal_title')] země [Character.GetCountry.GetName]"
