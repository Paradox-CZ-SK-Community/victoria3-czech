 notification_pope_super_rejects_archbishop_of_toledo_desc: "[SCOPE.sCountry('papacy_scope').GetRuler.GetPrimaryRoleTitle] v souladu s politikou římskokatolické církve neuznávat legitimitu [SCOPE.sCountry('spain_scope').GetHeir.GetFullName] jako [SCOPE.sCountry('spain_scope').GetHeir.GetPrimaryRoleTitle] země [SCOPE.sCountry('spain_scope').GetName] požadoval, aby [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName] odsoudil jmenování [SCOPE.sCharacter('spanish_archbishop_scope').GetHerHim] toledským arcibiskupem ze strany [SCOPE.sCountry('spain_scope').GetRuler.GetFullName]. [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName] odešel z politiky."
