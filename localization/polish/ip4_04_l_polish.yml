 je_portugal_united_kingdom: "Spojené království"
 je_portugal_united_kingdom_reason: "V letech 1807 až 1821 vládl dvůr země [ROOT.GetCountry.GetName] z Ria de Janeira. Ve snaze vyjít vstříc [SCOPE.sCountry('brazil_scope').GetAdjective] obavám povýšil král João VI. #b $BRZ$#! na postavení rovnocenného království a vytvořil #b Spojené království Portugalska, Brazílie a Algarves#!. Ačkoli nezávislost #b $BRZ$#! ukončila první Spojené království, #b $POR$#! a #b $BRZ$#! byly brzy poté spojeny krátkou personální unií pod králem a císařem Pedrem IV. a I.\n\nNedávné oživení $POR_ADJ$ moci a současná příznivá atmosféra mezi námi a naší bývalou kolonií vzbudily naděje na obnovení #b Spojeného království#!. Pokud budou #b $BRZ_ADJ$#! nástupnické zákony pozměněny, tyto naděje se mohou stát skutečností.\n\nDokud je tento [concept_journal_entry] aktivní, budeme moci se zemí [SCOPE.sCountry('brazil_scope').GetName] podepsat [concept_treaty] o $amend_succession$, čímž položíme základy budoucí [concept_personal_union]."
