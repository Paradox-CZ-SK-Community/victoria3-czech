 je_iberia: "Iberská unie"
 je_iberia_reason: "Stejně jako germánské národy usilují o sjednocené #v $GER$#! a Italové touží po #v $ITA$#!, tak i nesčetné národy Iberského poloostrova vzhlížejí ke sjednocené [GetGeographicRegion('geographic_region_iberia_old').GetName]. [GetPlayer.GetCustom('iberian_union_political_text')]\n\nOficiální podpora sjednocení ze strany jedné či více mocností poloostrova proměnila sjednocený $geographic_region_iberia$ ze vzdáleného snu v bezprostředně dosažitelný cíl - pokud se všechny mocnosti poloostrova podaří sladit.\n\n@information! Všechny [Concept('concept_country','$concept_countries$')] zapojené do tohoto [concept_journal_entry] jsou obecně vstřícné k nějaké formě [Concept('concept_unification','$concept_unification_short$')]. Aby mohl být poloostrov diplomaticky sjednocen, musí všechny jeho politické celky sladit své [Concept('concept_law','$concept_laws$')] a mít kompatibilní #b principy vlády#!."
 iberia_union_political_text_monarchy: "Na vrcholu španělské a portugalské říše byla celá Iberie spojena pod #v Iberskou unií#!. Dynastičtí unionisté volají po obnovení této unie a snaží se odstranit hospodářské bariéry oddělující Španělsko a Portugalsko a uskutečnit nový zlatý věk."
 iberia_union_political_text_theocracy: "Univerzální katolická církev stojí nad všemi národy. Zanícení universalisté volají po #v iberském konkordátu#!, který by přivedl celý poloostrov do posvátné unie."
 iberia_union_political_text_republic: "Radikální republikáni, inspirovaní příkladem evropských liberálních revolucí, volají po sjednocení všech národů poloostrova pod jedinou #v Iberskou federací#!."
 iberia_union_political_communist: "Proletariát nezná národ - feudální a buržoazní konstrukce, které po staletí vládly poloostrovu, musí být zničeny a z jejich popela se musí zrodit socialistická #v Iberská federace#!."
