l_polish:
 je_ip4_coup: "Puč!"
 je_ip4_coup_reason: "[ROOT.GetCountry.GetCustom('get_coup_je_text')], [SCOPE.sCharacter('golpista_general').GetCustom('ordered_personality_traits_loc')|l] [SCOPE.sCharacter('golpista_general').GetRankName] [SCOPE.sCharacter('golpista_general').GetFullName] a [SCOPE.sCharacter('golpista_general').GetHerHis] spojenci mezi [SCOPE.gsInterestGroup('golpista_ig').GetName] začali manévrovat směrem k uchvácení státní moci silou zbraní.\n\nDokud je tento [concept_journal_entry] aktivní, rychlost, jakou bude $concept_coup$ #tooltippable;tooltip:[GetPlayer.GetTooltipTag],coup_progress_factors_tt postupovat#! nebo #tooltippable;tooltip:[GetPlayer.GetTooltipTag],coup_regress_factors_tt slábnout#!, bude určena [concept_coup_strength] postavy [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName] ([SCOPE.sCharacter('golpista_general').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2]) sníženou o [concept_coup_resistance] země [ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]). Pokud #b postup#! dosáhne #v 100 %#! a [SCOPE.sCharacter('golpista_general').GetLastNameNoFormatting] bude schopen zahájit svůj [concept_coup], hrozí riziko svržení naší vlády."
 coup_je_reason_text_1: "Ve snaze zastavit prosazení zákona [ROOT.Var('coup_loc_law_var').GetLaw.GetName]"
 coup_je_reason_text_2: "Rozzuřeni selháním stávající vlády při prosazování jejich legislativní agendy"
 coup_je_reason_text_3: "Jako odplatu za zradu závazku ze strany stávající vlády"
 coup_je_reason_text_4: "Ve snaze naplnit [ROOT.Var('coup_loc_char_var').GetCharacter.GetHerHis] osobní ambice"
 coup_je_reason_text_5: "Ve jménu svržení a nahrazení vládnoucí dynastie [ROOT.GetCountry.GetRuler.GetLastName]"
 coup_je_reason_text_6: "Ve snaze dosadit režim přívětivější k zemi [ROOT.Var('coup_loc_lobby_country_var').GetCountry.GetName]"
 coup_je_reason_text_7: "V [ROOT.Var('coup_loc_char_var').GetCharacter.GetHerHis] neúnavné snaze o Republiku práce"
 coup_je_reason_text_0: "V nestoudném projevu ambicí"
 coup_progress_factors_tt: "Mezi faktory, které budou #b posouvat#! postup [concept_coup], patří:\n• Nízká [concept_legitimacy] [concept_government]\n• Vysoká [concept_popularity] pučistického [concept_commander]\n• Podíl všech [Concept('concept_unit','$concept_units$')] pod velením pučistického [concept_commander]\n• [concept_clout] $ig_approval_unhappy$ [Concept('concept_interest_group','$concept_interest_groups$')] podporujících $concept_coup$\n• Blízkost [concept_military_formation] pučistického [concept_commander] k [concept_capital_state]"
 coup_regress_factors_tt: "Mezi faktory, které budou #b snižovat#! postup [concept_coup], patří:\n• Vysoká [concept_legitimacy] [concept_government]\n• Nízká [concept_popularity] pučistického [concept_commander]\n• Úroveň investic do [GetInstitutionType('institution_home_affairs').GetName] podle [Concept('concept_law', '$concept_laws$')] [GetLawType('law_secret_police').GetName] nebo [GetLawType('law_national_guard').GetName]\n• Zvyšování [concept_approval] [Concept('concept_interest_group','$concept_interest_groups$')] podporujících $concept_coup$\n• Vzdálenost [concept_military_formation] pučistického [concept_commander] od [concept_capital_state]"
 ip4_coup.1.t: "Úsilí postavy [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName]"
 ip4_coup.1.d_1: "[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName], významný odpůrce zákona [SCOPE.sLaw('current_law_scope').GetName], začal manévrovat směrem k zastavení prosazení tohoto zákona silou. [SCOPE.sCharacter('golpista_general').GetHerHis|U] pokus o moc podporuje frakce [SCOPE.gsInterestGroup('golpista_ig').GetName]."
 ip4_coup.1.d_2: "Frakce [SCOPE.gsInterestGroup('golpista_ig').GetName], rozzuřená selháním stávající vlády při uskutečňování jejich legislativní agendy, začala spřádat spiknutí s [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] s cílem uchvátit moc nad zemí [ROOT.GetCountry.GetName]."
 ip4_coup.1.d_3: "Frakce [SCOPE.gsInterestGroup('golpista_ig').GetName], rozzuřená zradou závazku stávající vlády vůči nim, ztratila víru v politický proces. Obrátila se na [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] s plánem uchvátit moc nad zemí [ROOT.GetCountry.GetName]."
 ip4_coup.1.d_4: "[SCOPE.sCharacter('golpista_general').GetCustom('personality_traits_loc')|l] [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName], vycítil příležitost naplnit [SCOPE.sCharacter('golpista_general').GetHerHis] osobní ambice, shromáždil své podporovatele mezi [SCOPE.gsInterestGroup('golpista_ig').GetName], aby uchvátil moc nad zemí [ROOT.GetCountry.GetName]."
 ip4_coup.1.d_7: "[SCOPE.sCharacter('golpista_general').GetCustom('personality_traits_loc')|l] [SCOPE.sCharacter('golpista_general').GetFullName], vycítil příležitost uskutečnit emancipaci dělnické třídy, zorganizoval své sympatizanty mezi [SCOPE.gsInterestGroup('golpista_ig').GetName] ve snaze uchvátit moc nad zemí [ROOT.GetCountry.GetName]."
 ip4_coup.1.d: "[SCOPE.sCharacter('golpista_general').GetCustom('personality_traits_loc')|l] [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] začal činit výhružné kroky směrem k uchvácení moci nad zemí [ROOT.GetCountry.GetName]. [SCOPE.sCharacter('golpista_general').GetSheHe|U] je podporován frakcí [SCOPE.gsInterestGroup('golpista_ig').GetName]."
 ip4_coup.1.f: "Plukovník [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting] zvedl cíp stanového vchodu a vklouzl dovnitř. Vzduch už byl těžký kouřem a ostatní židle byly obsazené. Po stole byly rozprostřeny mapy - terén, vládní zařízení, životně důležitá infrastruktura. Zasalutoval [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle], sedícímu na konci stolu, a usedl.\n\nNebyl sám. Po jeho levici seděl plukovník [SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting] a jeho dýmka vesele přispívala k dusivému oparu.\n\n„Omlouvám se za zpoždění,“ začal [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]. „U brány byl nový strážný.“\n\n[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] přikývl. „Promíjím. Vaše hlášení, prosím. Stav Čtyřiadvacátého?“"
 ip4_coup.1.a: "Šťastnou cestu, [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName]!"
 ip4_coup.1.b: "Současný režim musí přežít."
 ip4_coup.11.t: "[SCOPE.sCountry('coupist_lobby_country').GetAdjective] plán"
 ip4_coup.11.d: "[SCOPE.sPoliticalLobby('relevant_lobby').GetName], vedená [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName], začala manévrovat směrem k nastolení pro-[SCOPE.sCountry('coupist_lobby_country').GetAdjective] vlády v zemi [ROOT.GetCountry.GetName] silou zbraní. Plán je podporován značným zahraničním financováním."
 ip4_coup.11.f: "Plukovník [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting] zvedl cíp stanového vchodu a vklouzl dovnitř. Vzduch už byl těžký kouřem a ostatní židle byly obsazené. Po stole byly rozprostřeny mapy - terén, vládní zařízení, životně důležitá infrastruktura. Zasalutoval [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle], sedícímu na konci stolu, a usedl.\n\nNebyl sám. Po jeho levici seděl plukovník [SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting] a jeho dýmka vesele přispívala k dusivému oparu.\n\n„Omlouvám se za zpoždění,“ začal [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]. „U brány byl nový strážný.“\n\n[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] přikývl. „Promíjím. Vaše hlášení, prosím. Stav Čtyřiadvacátého?“"
 ip4_coup.11.a: "[SCOPE.sCountry('coupist_lobby_country').GetAdjectiveNoFormatting] orientace by se mohla ukázat jako příznivá."
 ip4_coup.11.b: "Současný režim musí přežít."
 ip4_coup.2.t: "Pronunciamento!"
 ip4_coup.2.d: "[SCOPE.sCharacter('golpista_general').GetRankName] [SCOPE.sCharacter('golpista_general').GetFullName] vydal pronunciamento ze svého velitelství ve státě [SCOPE.sState('pronunciamento_state').GetName]. [SCOPE.sCharacter('golpista_general').GetCustom('getGeneralAdmiral')] a [SCOPE.sCharacter('golpista_general').GetHerHis] spojenci v [SCOPE.gsInterestGroup('golpista_ig').GetName] otevřeně vystoupili proti naší vládě."
 ip4_coup.2.d_1: "[SCOPE.sCharacter('golpista_general').GetRankName] [SCOPE.sCharacter('golpista_general').GetFullName] vydal pronunciamento ze svého velitelství ve státě [SCOPE.sState('pronunciamento_state').GetName]. [SCOPE.sCharacter('golpista_general').GetCustom('getGeneralAdmiral')] a [SCOPE.sCharacter('golpista_general').GetHerHis] spojenci v [SCOPE.sPoliticalLobby('relevant_lobby').GetName] otevřeně vystoupili proti naší vládě."
 ip4_coup.2.f: "Spoluobčané,\n\nRežim ve městě [ROOT.GetCountry.GetCapital.GetCityHubName] vynesl rozsudek smrti nad zemí [ROOT.GetCountry.GetNameNoFormatting] a připravil nás o jakoukoli naději ukončit občanský svár. Nezbývá nic než obrátit se na lid.\n\nMoji krajané! Slyšte volání vlasti! Zavřete uši před návrhy režimu, který ve své zášti a bezmoci vkládá všechny své naděje do nejednoty lidu a armády.\n\nVelitelství ve státě [SCOPE.sState('pronunciamento_state').GetNameNoFormatting], [TimeKeeper.GetCurrentDate.GetString]\n[SCOPE.sCharacter('golpista_general').GetFullNameNoFormatting]"
 ip4_coup.2.f_7: "Občané,\n\nRoky roubíků! Roky urážek! Náš národ vysmívaný, drancovaný, pošlapaný! Nestačilo to snad? Ne! Nyní hlad trhá vnitřnosti lidu! Žádné další dílny! Žádná další manželství! To všechno je revoluční. Nic než paláce a vězení, kláštery a nevěstince!\n\nDo zbraně, lide města [SCOPE.sState('pronunciamento_state').GetCityHubName]! Už dost! Svobodu jste přijali od svých otců; svým synům nezanecháte otroctví.\n\nUtlačovatelé naplnili pohár až po okraj. Do zbraně! Ať trest dopadne jako blesk na jejich zvěrstva. Hodina velké revoluce lidu udeřila! Pochodujme!"
 ip4_coup.2.a: "Armáda promluvila. Náš mandát skončil."
 ip4_coup.2.b: "Nekapitulujeme!"
 ip4_coup.3.t: "Pro nedostatek zájmu"
 ip4_coup.3.d: "Spiknutí s cílem svrhnout stávající [ROOT.GetCountry.GetAdjective] vládu ztratilo mezi [SCOPE.gsInterestGroup('golpista_ig').GetName] veškerý elán. Plán [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] byl opuštěn."
 ip4_coup.3.f: "„Problém s vámi, [SCOPE.sCharacter('golpista_general').GetLastNameNoFormatting], je v tom, že jen proto, že se vám podařilo přesvědčit hrstku napůl pomatených hlupáků, aby hyzdili scénu města [SCOPE.sState('capital_scope').GetCityHubName] tím, že chodí v černých kraťasech, si myslíte, že jste někdo. Slyšíte je křičet „Sláva, [SCOPE.sCharacter('golpista_general').GetLastNameNoFormatting]!“ a představujete si, že je to hlas lidu. A právě v tom děláte chybu. Hlas lidu říká: „Podívejte na toho strašlivého osla [SCOPE.sCharacter('golpista_general').GetLastNameNoFormatting], jak se natřásá ve fotbalových šortkách! Viděli jste kdy v životě tak dokonalého ničemu?“"
 ip4_coup.3.a: "Modleme se, aby se nikdo nedozvěděl, co se málem stalo."
 ip4_coup.3.b: "Víme, jaké plány [SCOPE.sCharacter('golpista_general').GetSheHe] chystal. Spravedlnosti bude učiněno zadost."
 ip4_coup.4.t: "Smyčka se stahuje"
 ip4_coup.4.d: "[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] si všiml snah státu snížit množství vojenských sil, které má [SCOPE.sCharacter('golpista_general').GetHerHim] k dispozici. [SCOPE.sCharacter('golpista_general').GetSheHe|U] obvinil vládu z bezohledného vměšování do vojenských záležitostí."
 ip4_coup.4.f: "[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastNameNoFormatting] přecházel sem a tam po podlaze svého stanu. Před [SCOPE.sCharacter('golpista_general').GetHerHim] stáli shromáždění jeho věrní poručíci - ti, kteří ještě nebyli donuceni k přesunu. Nemohl přímo odmítnout rozkazy, které náhle dorazily z města [ROOT.GetCountry.GetCapital.GetCityHubName] a omezily ho na kostru nejdůležitějšího štábního personálu.\n\nVláda mu byla na stopě. Sotva existovalo jiné vysvětlení. Žádné jiné velení nebylo tak silně zacíleno. Pokud měl své pozice obnovit, musel odpovědět. Pokynul dvěma mužům v přední řadě.\n\n„Plukovníku [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting], majore [SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting]...“"
 ip4_coup.4.a: "„...dejte svým mužům pokyn zaujmout pozice.“"
 ip4_coup.4.b: "„...předejte zprávu našim vzdáleným kolegům.“"
