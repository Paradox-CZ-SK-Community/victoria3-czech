 caciquismo.1.t: "Hned, šéfe"
 caciquismo.1.d: "Se začátkem volební sezóny se klientelistické sítě, které prostupují [ROOT.GetCountry.GetAltAdjective('yym')|l] venkovem, probudily k pohotovosti. [ROOT.GetCountry.GetCustom('get_political_boss_name')|U] čekají na rozkazy provinčních guvernérů."
 caciquismo.1.f: "Atmosféra v kasinu těžkla kouřem. V rohovém boxu mával muž v panamském klobouku kubánským doutníkem a ve tváři měl hraně melancholický výraz.\n\n„My liberálové jsme byli přesvědčeni, že volby vyhrajeme. Boží vůle však byla jiná.“\n\nVložil si doutník do úst a vyfoukl oblak kouře. Kolem rtů se mu pohrával úsměv.\n\n„Zdá se, že volby jsme vyhráli my, konzervativci.“"
 caciquismo.1.a: "[SCOPE.sParty('party_1_scope').GetName] získá podporu pro stranu."
 caciquismo.1.b: "[SCOPE.sParty('party_2_scope').GetName] si zaslouží období ve vládě."
