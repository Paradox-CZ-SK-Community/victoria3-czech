 je_portugal_and_brazil_pursue_united_kingdom_button_desc: "Není to tak dávno, co #b $POR$#! a #b $BRZ$#! byly rovnocennými celky v rámci jediného Spojeného království. Ačkoli #b $BRZ_ADJ$#! Generální shromáždění přijalo opatření, aby obnově unie zabránilo, zákon nemusí být vytesán do kamene - co kdysi bylo, může být znovu."
