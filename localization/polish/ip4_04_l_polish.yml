 je_iberia_union_button_desc: "[ROOT.GetCountry.GetCustom('iberia_union_desc')]"
 iberia_union_desc_monarchy: "Pyrenejské státy dostatečně sladily své zákony a vytvořily tak základ pro iberský zákoník. Nyní můžeme přivést koruny do trvalé unie."
 iberia_union_desc_theocracy: "Pyrenejské státy dostatečně sladily své zákony a vytvořily tak základ pro iberský zákoník. Nyní můžeme podepsat trvalý konkordát, který je přivede k jednotě."
 iberia_union_desc_republic: "Pyrenejské státy dostatečně sladily své zákony a vytvořily tak základ pro iberský zákoník. Nyní můžeme vydat novou ústavu, zřídit Federální shromáždění a udělit mu nejvyšší zákonodárnou moc nad poloostrovem."
 iberia_union_desc_communist: "Pyrenejské republiky dostatečně sladily své politiky a vytvořily tak správní cestu ke svému sjednocení. Nyní můžeme vytvořit nové Shromáždění rad pro Iberii a přivést republiky do federace."
 iberia_union_desc_anarchy: "Pyrenejské komuny dostatečně sladily své politiky a bylo dosaženo širokého konsenzu ohledně sjednocení. Nyní je můžeme považovat za jednotky v rámci jediné iberské konfederace."
 je_iberia_preserve_union_button: "Zachovat personální unii"
 je_iberia_preserve_union_button_desc: "Personální unie, která v současnosti existuje mezi iberskými státy, je dostatečným základem pro politické uspořádání poloostrova. Vydáme ústavu, která tuto volnou unii trvale zakotví a zaručí jejím členům plnou vnitřní autonomii."
