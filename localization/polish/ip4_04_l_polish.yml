 je_spain_provisional_government_portuguese_button: "Oslovit rod Bragança"
 je_spain_provisional_government_portuguese_button_desc: "„Konstituční“ větev rodu Bragança má silné liberální předpoklady a kulturní vazby na $SPA$. Dosazení člena rodu Bragança na španělský trůn může přispět k vytvoření unie mezi $SPA_ADJ_I$ a $POR_ADJ_I$."
 spa_becomes_personal_union_of_por_tt: "[ROOT.GetCountry.GetName] se stane mladším partnerem v [concept_personal_union] s #v $POR$#!"
 summoning_country_becomes_junior_in_personal_union_with_owner_tt: "[SCOPE.sCountry('summoning_country').GetName] se stane mladším partnerem v [concept_personal_union] se zemí [SCOPE.sCountry('yoink_country').GetName]"
 summoning_country_becomes_senior_in_personal_union_with_owner_tt: "[SCOPE.sCountry('summoning_country').GetName] se stane starším partnerem v [concept_personal_union] se zemí [SCOPE.sCountry('yoink_country').GetName]"
 je_spain_provisional_government_espartero_button: "Oslovit generála Espartera"
 je_spain_provisional_government_espartero_button_desc: "Generál Baldomero Espartero je jedním z velkých vojenských hrdinů $SPA_ADJ_G$, oddaným liberálem a inspirativním příkladem společenské mobility. Více než kterýkoli Španěl nízkého původu má za sebou činy nezbytné k legitimizaci svého nástupu na trůn. Dosadit jej na trůn by znamenalo vytvořit královskou dynastii z rodiny tesařů."
 je_spain_provisional_government_hohenzollern_button: "Oslovit rod Hohenzollernů"
 je_spain_provisional_government_hohenzollern_button_desc: "Rod Hohenzollernů, vládnoucí dynastie $PRU_ADJ_G$ a Hohenzollern-Sigmaringenu, je nejvýznamnějším rodem mezi německými státy. Dosazení Hohenzollerna na trůn by $SPA_ADJ_D$ zajistilo užší vazby s pány Německa, avšak ve $FRA_ADJ_L$ by vyvolalo obavy z obklíčení."
 je_spain_provisional_government_italian_button: "Oslovit rod Savoia"
 je_spain_provisional_government_italian_button_desc: "Více než kterákoli jiná italská dynastie se rod Savoia spojil s představou italského národa. Dosazení savojského prince na trůn by mezi evropskými mocnostmi nebylo kontroverzní a zaručilo by $SPA_ADJ_D$ panovníka oddaného ústavní vládě."
 je_spain_provisional_government_isabelist_button: "Korunovat isabelinského krále"
 je_spain_provisional_government_isabelist_button_desc: "„Konstituční“ větev rodu Borbónů, v jejímž čele stojí bývalá královna Isabel II., vznikla po sporném nástupnictví Ferdinanda VII. Přestože po určitou dobu sloužila jako konstituční monarchové, rod Borbónů byl v očích mnohých zdiskreditován selháními, která vedla ke Slavné revoluci. Obnovit je na trůnu by znamenalo návrat k předrevolučnímu statusu quo."
 je_spain_provisional_government_carlist_button: "Korunovat karlistického krále"
 je_spain_provisional_government_carlist_button_desc: "„Karlistická“ větev rodu Borbónů, v jejímž čele stojí Don Carlos de Borbón, vznikla po sporném nástupnictví Ferdinanda VII. Karlistická linie představuje pevný tradicionalismus, na rozdíl od konstitucionalismu isabelinské linie. Přítomnost karlistů v prozatímní vládě činí obnovu tradiční monarchie reálnou možností - dosadit je na trůn posílí konzervativní síly ve Španělsku, aby zvrátily revoluci."
 je_spain_provisional_government_bonaparte_button: "Oslovit rod Bonapartů"
 je_spain_provisional_government_bonaparte_button_desc: "Rod Bonapartů vládl nad $SPA_ADJ_I$ krátké období mezi lety 1808 a 1813. Král tohoto období, Josef I. Bonaparte, nebyl většinou španělské populace nikdy považován za legitimního a byl ze Španělska vyhnán lidovým povstáním. Minulé události však nezaručují budoucí výsledky. Pokud si prozatímní vláda přeje učinit vstřícný krok vůči $FRA$, může pozvat bonapartistického prince a doufat v lepší výsledek."
 je_spain_provisional_government_republic_button: "Vyhlásit republiku"
 je_spain_provisional_government_republic_button_desc: "Republikanismus je v $SPA_ADJ_L$ novým postojem, který se objevil teprve nedávno jako protiváha konstitučního monarchismu typického pro španělské doktrinářské liberály. Pokud nelze najít žádného krále, nebo pokud republikanismus politicky zastíní konstitucionalismus, může být vyhlášení republiky jedinou zbývající možností."
