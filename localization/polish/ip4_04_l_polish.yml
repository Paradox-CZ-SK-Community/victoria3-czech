 je_spain_provisional_government_reason: "[ROOT.GetCountry.GetCustom('spa_provisional_government_reason_loc')] S uprázdněným [ROOT.GetCountry.GetAdjectiveNoFormatting] trůnem si nově vyhlášená prozatímní vláda stanovila úkol najít kandidáta, který bude sloužit jako král."
 je_spain_provisional_government_reason_snippet: "Vojenské povstání svrhlo nepopulární dynastii [ROOT.GetCountry.GetCustom('spa_couped_dynasty_loc')] a poslalo bývalé vládce země [ROOT.GetCountry.GetName] spěšně do vyhnanství."
 je_spain_provisional_government_reason_snippet_2: "Krátkodobý republikánský experiment v zemi [ROOT.GetCountry.GetName] byl svržen a k moci byla přivedena vláda oddaných roajalistů."
