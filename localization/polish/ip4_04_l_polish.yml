 iberia.1.t: "Jeden poloostrov"
 iberia.1.d: "Rostoucí pannacionalistické cítění šířící se napříč [GetGeographicRegion('geographic_region_europe').GetName] dorazilo i do země [ROOT.GetCountry.GetName]. Dynastičtí unionisté i internacionalističtí radikálové začali volat po sjednocení [GetGeographicRegion('geographic_region_iberia_old').GetName] pod svou upřednostňovanou formou vlády."
 iberia.1.f: "„Unie Španělska a Portugalska je výhodná pro obě země: je přirozená, je spravedlivá, je legitimní, je nezbytná - ba řekněme více, je nevyhnutelná. Cokoli působí proti této unii, škodí oběma národům; cokoli ji posiluje, je prospěšné. Obtíž spočívá pouze v nalezení prostředků, jak tuto velkou myšlenku uskutečnit spontánním, svobodným a čestným způsobem pro obě strany.“\n\n—Fernández Cuesta"
 iberia.1.a_1: "Byli jsme rozděleni příliš dlouho."
 iberia.1.a_2: "Proletáři všech zemí, spojte se!"
 iberia.1.b: "[ROOT.GetCountry.GetNameNoFormatting] je suverénní národ a tím také zůstane."
 iberia.11.t: "Jeden poloostrov"
 iberia.11.d: "S rostoucím pannacionálním cítěním napříč [GetGeographicRegion('geographic_region_iberia_old').GetName] prohlásila vláda země [SCOPE.sCountry('iberia_forming_country').GetName] sjednocení poloostrova za oficiální politiku. Když je postoj země [SCOPE.sCountry('iberia_forming_country').GetNameNoFormatting] jasný, musíme vyhlásit ten vlastní."
 iberia.11.f: "„Unie Španělska a Portugalska je výhodná pro obě země: je přirozená, je spravedlivá, je legitimní, je nezbytná - ba řekněme více, je nevyhnutelná. Cokoli působí proti této unii, škodí oběma národům; cokoli ji posiluje, je prospěšné. Obtíž spočívá pouze v nalezení prostředků, jak tuto velkou myšlenku uskutečnit spontánním, svobodným a čestným způsobem pro obě strany.“\n\n—Fernández Cuesta"
