 caciquismo.2.t: "Správný výsledek"
 caciquismo.2.d: "V zemi [ROOT.GetCountry.GetName] začala volební sezóna - a s ní i plánování vládních manipulátorů. Budeme-li chtít, můžeme využít moc státu k zajištění příznivého výsledku."
 caciquismo.2.f: "Na stole se přes knihy, prázdné hrnky a ztracené kreslicí náčiní rozprostírala mapa [SCOPE.sState('rural_state').GetNameNoFormatting]. Čtyři muži kolem ní utvořili kruh a hovořili o intuitivním směřování [SCOPE.sState('rural_state').GetFarmHubName]. Rozhodli, že jistě podpoří vládu - ale o kolik? Dokázali by z předměstí získat tisíc hlasů navíc? Jak nedávné nahromadění dělníků v oblasti ovlivní volební vzorce?\n\nPůl hodiny po začátku toho, co mělo být polední pauzou, dospěli k rozhodnutí. Město dá jejich straně osm tisíc hlasů, se solidním - avšak bezvýsledným - opozičním blokem v dělnických čtvrtích. Mnohem vkusnější než 101% účast."
 caciquismo.2.a: "[SCOPE.sParty('party_1_scope').GetName] je přirozenou stranou vlády."
 caciquismo.2.b: "Zvýhodnit [SCOPE.sParty('party_2_scope').GetName]."
 caciquismo.2.c: "Změnit kurz - dopřát straně [SCOPE.sParty('party_3_scope').GetName] období u moci."
 caciquismo.2.e: "[SCOPE.sParty('party_4_scope').GetName] potřebuje pomoc."
 caciquismo.2.g: "[SCOPE.sParty('party_5_scope').GetName] bude mít naši podporu."
 caciquismo.2.h: "Máme-li něčeho dosáhnout, volby musí být svobodné."
 caciquismo.2.i: "$caciquismo.1.h$"
