 devorismo.4.t: "Tomu se dá věřit"
 devorismo.4.d: "Požár v budově královské pokladny zničil mnoho dokumentů týkajících se výdajů vlády [SCOPE.sCharacter('prime_minister_scope').GetLastName]. Ačkoli skuteční pachatelé nejsou známi, opoziční představitelé obvinili vládu, že požár zinscenovala, aby zakryla svou korupci."
 devorismo.4.f: "„Čistě náhodné-“\n„Tragédie pro #italic celý#! národ-“\n„Vyšetřování probíhá-“\n\nMinistr vzhlédl ze svého rozmazaného světa psaní dopisů, vyrušen náhle mihotavým světlem. Svíčka zase dohořívala a večerní slunce úplně zmizelo. Obrátil se k nejbližšímu sluhovi a pokynul směrem k ní.\n\n„Chtějí po mně, abych vysvětlil, jak mohl požár vypuknout právě tady, ze všech míst,“ zabručel. „Musejí pochopit, že žádná protipožární ochrana není dokonalá...“"
 devorismo.4.a: "Absurdní konspirační blouznění!"
 devorismo.4.b: "Svalit vinu na ministra financí."
 devorismo.5.t: "Prožráno skrz naskrz"
 devorismo.5.d: "Politiky „Devorisma“ spotřebovaly drtivou většinu bývalého národního majetku země [ROOT.GetCountry.GetName]. Zatímco peněženky politiků [GetIdeology('ideology_cartist').GetName] zaznamenaly velké zisky, státní pokladna zůstává zbídačená."
 devorismo.5.f: "„Národ a sněmy mají právo znát pravdu a celou pravdu, a jelikož jsou naše neduhy tak hluboké, je nezbytné, aby byly poznány a mohly být napraveny. Národ byl unaven občanskou válkou a krvavým zápasem, naše jmění bylo promrháno pachateli uzurpace a první povinností vlády bylo vydat se cestou hospodářské správy. Bohužel tato cesta nebyla následována: snadnost získávání peněz prostřednictvím půjček vyvolala jakési nadšení ve prospěch úvěru a jeho zázraky byly v této sněmovně při několika příležitostech zveličovány.“\n\n—Francisco Antonio de Campos"
 devorismo.5.a: "Došli jsme po této cestě k jejímu hořkému konci."
 devorismo.5.b: "Soukromé vlastnictví je cílem samo o sobě."
 devorismo.6.t: "Pryč s dobročinností"
 devorismo.6.d: "Zavedení přímých voleb a odstranění vlády [GetIdeology('ideology_cartist').GetName] vytvořilo příležitost nahradit nepopulární Ústavní chartu z roku 1826. [SCOPE.gsInterestGroup('septemberist_ig').GetName] vyzvala k nové ústavě, přijaté demokratickými prostředky namísto královského diktátu."
 devorismo.6.f: "„Jaký je rozdíl mezi ústavou udělenou a ústavou přijatou? Je to rozdíl mezi dobročinností a poctivou prací, mezi dětstvím a dospělostí. Ta první představuje národ jako poddané panovníka, pokorně se natahující po drobcích dobré vůle. Ta druhá ztělesňuje národ jako sebeurčující se tělo, jehož představitelem je panovník.“\n\nZávěr projevu přešel ve zuřivé škrábání sekretářova pera. Uspokojivé „klap“ označilo jeho dokončení.\n\n„Dobře,“ řekl řečník. „Teď ještě šest bodů...“"
 devorismo.6.a: "[ROOT.GetCountry.GetAdjective] lid bude mít svou ústavu!"
 devorismo.6.b: "Naše problémy nespočívají v systému, ale v těch, kdo stojí v jeho čele."
