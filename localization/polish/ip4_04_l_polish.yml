 spain_provisional_government.1.t: "$SPA_ADJ$ trůn"
 spain_provisional_government.1.d: "Prozatímní vláda země [SCOPE.sCountry('spain_scope').GetName] nabídla uprázdněný trůn země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] kterémukoli členu rodu Bragança, který bude ochoten přísahat věrnost [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] ústavě."
 spain_provisional_government.1.f: "„Ústavodárné Cortesy $SPA_ADJ$ národa po dokončení závažného a delikátního poslání, které jim svobodným hlasováním svěřil lid, na slavnostním a veřejném zasedání minulého měsíce [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] zvolily Vaši Výsost, aby usedla na trůn. Na základě jejich čestné důvěry přicházíme Vaší Výsosti předat hlas zastoupení lidu, jenž je pánem vlastního osudu, a vyzvat vás, abyste přijetím této spontánní nabídky vložil na čelo Vaší Královské Výsosti korunu $SPA$, kterou sto králů svými slavnými činy tak velkolepě ozdobilo.“"
 spain_provisional_government.1.a: "[SCOPE.sCountry('portugal_scope').GetRuler.GetPrimaryRoleTitle] přijme druhou korunu."
 spain_provisional_government.1.b: "Předložit kandidáta z našeho rodu."
 spain_provisional_government.1.c: "Držet [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] trůn by ohrozilo naši suverenitu."
 spain_provisional_government.11.t: "Iberská svatba"
 spain_provisional_government.11.d_1: "[SCOPE.sCountry('portugal_scope').GetRuler.GetPrimaryRoleTitle] země [SCOPE.sCountry('portugal_scope').GetName], [SCOPE.sCountry('portugal_scope').GetRuler.GetFullName], přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu. [SCOPE.sCountry('portugal_scope').GetRuler.GetHerHis|U] nástup přivede naše dvě země znovu do unie."
 spain_provisional_government.11.d_2: "Rod Bragança přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu a nabízí, že nástup [SCOPE.sCountry('portugal_scope').GetCustom('getCurrentPeripheralBraganza')] zajistí pevné vztahy mezi našimi dvěma zeměmi."
 spain_provisional_government.11.f: "„Jak zajímavé,“ řekl opisovač, „že #italic señor#! [SCOPE.sCountry('spain_scope').GetRuler.GetLastNameNoFormatting] zřejmě touží být Garibaldim.“\n\nÚzkostné pohyby jeho prstů kontrastovaly s jeho pomalým, opatrným tónem. Pracovaly na rohu listu papíru a ohýbaly jej sem a tam. Tiché šustění vyplňovalo vzduch mezi jeho slovy.\n\nFranciscovi to dávalo naprostý smysl. Věděl, že jeho druh tomu rozumí stejně dobře. „Chtějí si přivlastnit naši věc. Vidí Iberii jako nové Německo nebo Itálii. Vědí, že toužíme po svobodné Iberii. Nechápou, co znamená ‚svobodná‘, a tak jim to mizí z dohledu. Zjistí, že pro lid toto slovo znamená mnohem víc než další cár země.“"
 spain_provisional_government.11.a: "Potvrdit nástup [SCOPE.sCountry('portugal_scope').GetRuler.GetPrimaryRoleTitle] a uvést unii v život."
 spain_provisional_government.11.b: "Bude to Bragança."
 spain_provisional_government.11.c: "Tohle jsme si nepřáli."
 ana_de_jesus_maria_de_braganca_loc: "$Ana_de_Jesus_Maria$ $de_Braganca$, teta královny Marie II., aby sloužila jako královna $SPA$. Její"
 fernando_de_saxe_coburg_gotha_loc: "$Fernando$ $de_SaxO_nia-Coburgo_e_Gota$, manžel a spoluvládce královny Marie II., aby sloužil jako král $SPA$. Jeho"
 afonso_de_braganca_loc: "$Afonso$ $de_Braganca$, vévoda z Porta, aby sloužil jako král $SPA$. Jeho"
 spain_provisional_government.2.t: "Král vlastní zásluhou"
 spain_provisional_government.2.d: "Maršál [SCOPE.sCharacter('espartero_scope').GetFullName], hrdina karlistické války, souhlasil, že bude dosazen na trůn jako král země [SCOPE.sCountry('spain_scope').GetName]. Rod Esparterů, kdysi skromných dělníků, se stal nejváženější šlechtou země [SCOPE.sCountry('spain_scope').GetNameNoFormatting]."
 spain_provisional_government.2.f: "„Espartero! Věříš tomu?“\n\nBylo to už podeváté, co to Francisco dnes slyšel, obvykle doprovázené podrobným výkladem o tom, jak skvělý ten starý voják je. Každý další případ zarazil hřeby děsu hlouběji do jeho srdce. Nepopulární despota byl v pořádku - mohl rozdávat diktáty, jak chtěl, a nechat se za to hnát přes hranice. Ale někdo, kdo dokáže uchvátit masy? Ten by mohl #italic vládnout#!. Mohl by proměnit obyvatelstvo Barcelony ve sto tisíc policistů. Mohl by zmanipulovat lid, aby pověsil jeho, aby pověsil jeho spolurevolucionáře, aby...\n\nFrancisco si vynutil úsměv a otočil se k úředníkovi, který promluvil. „Nic menšího jsem nečekal.“"
 spain_provisional_government.2.a: "Ať žije Espartero, maršál a král!"
 spain_provisional_government.3.t: "$SPA_ADJ$ trůn"
 spain_provisional_government.3.d: "Prozatímní vláda země [SCOPE.sCountry('spain_scope').GetName] nabídla uprázdněný trůn země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] kterémukoli princi z rodu Hohenzollernů, který bude ochoten přísahat věrnost [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] ústavě."
 spain_provisional_government.3.f: "$spain_provisional_government.1.f$"
 spain_provisional_government.3.a: "Předložit kandidáta na trůn."
 spain_provisional_government.3.b: "Nebudeme riskovat svou krev v tak nestabilní zemi."
 spain_provisional_government.31.t: "Objetí bez lásky"
 spain_provisional_government.31.d: "Nominace prince z rodu Hohenzollernů na [SCOPE.sCountry('spain_scope').GetAdjective] trůn hrozí vytvořením kruhu [SCOPE.sCountry('hohenzollern_scope').GetAdjective] spojenců kolem země [SCOPE.sCountry('france_scope').GetName]. Ministerstvo války vyhlásilo poplach a tvrdí, že takové uspořádání by představovalo vážné riziko pro naši národní integritu."
 spain_provisional_government.31.f: "„Na co #italic myslí#!?“ Velvyslanec znovu pohlédl na svůj výtisk #italic Gaceta de Madrid#!. Pročítání dopisu Cortes mu neposkytlo o nic víc odpovědí než poprvé.\n\nRty ministra zahraničí se jednou, dvakrát, třikrát stáhly stranou gestem, které narušilo jeho mohutný knír. Odpověď nenabídl. Jeho pohled zůstával na stole, upřený na úkol číst noviny vzhůru nohama.\n\n„Ministr války trvá na tom, abych se odmítl vrátit do města [SCOPE.sCountry('spain_scope').GetCapital.GetCityHubName],“ pokračoval velvyslanec, „a tuto otázku předávám vám. Trvá na tom, že jde o záměrnou provokaci, přesto se domnívám, že pravděpodobnějším vysvětlením může být naivita...“"
 spain_provisional_government.31.a: "To je urážka! Připravte armádu."
 spain_provisional_government.31.b: "Co se dá dělat?"
 spain_provisional_government.32.t: "Býk a orel"
 spain_provisional_government.32.d_1: "Rod Hohenzollernů přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu a nabídl prince, který má sloužit jako král země [SCOPE.sCountry('spain_scope').GetNameNoFormatting]. [SCOPE.sCountry('france_scope').GetName] se obává obklíčení [SCOPE.sCountry('hohenzollern_scope').GetAdjective] spojenci a pohrozila válkou, pokud na trůn nastoupí."
 spain_provisional_government.32.d_2: "Rod Hohenzollernů přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu a nabídl prince, který má sloužit jako král země [SCOPE.sCountry('spain_scope').GetNameNoFormatting]. Umožnit jeho nástup by znepokojilo zemi [SCOPE.sCountry('france_scope').GetName], ale zajistilo by pevné vztahy se zemí [SCOPE.sCountry('hohenzollern_scope').GetName]."
 spain_provisional_government.32.f: "Nad Barcelonou se stahovala bouřková mračna. Francisco ležel zády na střešních taškách a sledoval, jak věčně šedá obloha černá jako smůla.\n\nZaslechl vedle sebe klapot nohou po taškách a otočil hlavu. Stál tam opisovač s rukama roztaženýma doširoka, aby udržel rovnováhu. Tlustá kapka deště, nasáklá kouřem z textilních továren, mu zanechala na tváři šedou šmouhu. Bylo to zvláštně krásné.\n\n„Všichni zemřeme,“ řekl a znovu pohlédl směrem ke vzdáleným Pyrenejím. Francisco sledoval jeho pohled.\n\n„...možná,“ řekl. „Skoro by mi to nevadilo, kdyby šel král s námi.“"
 spain_provisional_government.32.a: "Bude to Hohenzollern."
 spain_provisional_government.32.b: "Stáhnout nabídku - nemůžeme riskovat další invazi."
 spain_provisional_government.4.t: "$SPA_ADJ$ trůn"
 spain_provisional_government.4.d: "Prozatímní vláda země [SCOPE.sCountry('spain_scope').GetName] nabídla uprázdněný trůn země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] kterémukoli savojskému princi, který bude ochoten přísahat věrnost [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] ústavě."
 spain_provisional_government.4.f: "$spain_provisional_government.1.f$"
 spain_provisional_government.4.a: "$spain_provisional_government.3.a$"
 spain_provisional_government.4.b: "$spain_provisional_government.3.b$"
 spain_provisional_government.41.t: "Zvolený král"
 spain_provisional_government.41.d: "Rod Savoia přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu a vyslal prince do města [SCOPE.sCountry('spain_scope').GetCapital.GetCityHubName], aby se formálně ucházel o tuto pozici. Cortesy jejich kandidáta zvolily králem drtivou většinou."
 spain_provisional_government.41.f: "Kolem panovalo až příliš mnoho dobré nálady, pomyslel si Francisco. Ulice byla ucpaná barety a čapkami - oděvem jásajících středních vrstev. Zastihlo ho to venku, když dorazily zprávy, vyvěsily se stuhy a jeho cesta se ztrojnásobila. Za další řadou klobouků viděl svůj cíl, dvoupatrový městský dům, v němž sídlily dva tiskařské lisy - jeden oficiální, jeden tajný.\n\nLoktem odstrčil jednoho oslavujícího, vrazil klíč do zámku a vklouzl dovnitř.\n\n„Radujte se!“ vykřikl do schodů. „Máme svůj červenec!“"
 spain_provisional_government.41.a: "Ať žije koruna a Cortesy!"
 spain_provisional_government.5.t: "Bourbonská restaurace"
 spain_provisional_government.5.d: "Protože se neobjevili žádní další kandidáti, Cortesy zvolily [ROOT.GetCountry.GetRuler.GetFullName], dalšího člena rodu Borbónů v „konstituční“ linii následnictví, jako [ROOT.GetCountry.GetRuler.GetCustom('getQueenKing')] země [ROOT.GetCountry.GetName]."
 spain_provisional_government.5.f: "Ulice byla lemována červeno-žlutými stuhami, a přesto nebylo nikoho vidět. Francisco přitiskl čelo k zaprášenému oknu a rozhlížel se na všechny strany. Klapot tiskařského lisu ve vedlejší místnosti mu plnil uši a přehlušoval myšlenky. Tím lépe, protože kdyby je zachytil a pořádně si je prohlédl, jen by ho to poslalo hlouběji do propasti.\n\n„Čekali snad oslavu?“ zeptal se. „K čertu s nimi. Ti zrádci, hrobaři... k čertu s nimi!“\n\nKdesi daleko zazněla vojenská trubka a pak dusot bot."
 spain_provisional_government.5.a: "Právoplatná dynastie se vrací na trůn."
 spain_provisional_government.6.t: "Bourbonská restaurace"
 spain_provisional_government.6.d: "Karlisticky smýšlející Cortesy zvolily [ROOT.GetCountry.GetRuler.GetFullName], současného člena rodu Borbónů v karlistické linii následnictví, jako [ROOT.GetCountry.GetRuler.GetCustom('getQueenKing')] země [ROOT.GetCountry.GetName]. Nad zemí bude znovu vládnout pevný tradicionalista."
 spain_provisional_government.6.f: "Francisco vběhl do městského domu a zavřel za sebou dveře. Stálo ho všechno úsilí, aby jimi nepráskl a neupozornil sousedy na svůj rozrušený stav. Na schodech se ozval zvuk spěchajících nohou. Bledé pavoučí prsty sevřely roh zdi a strašidelné oči na něj hleděly shora.\n\n„Řekni mi, že není konec,“ řekl opisovač.\n\nFrancisco zavrtěl hlavou. „Budeš se muset dívat jinam,“ odpověděl, „protože ti nedokážu lhát do očí.“\n\nOpisovačovy klouby zbělely. „Revoluce je tedy mrtvá, a my také. Bůh nám všem pomáhej.“"
 spain_provisional_government.6.a: "$spain_provisional_government.5.a$"
 spain_provisional_government.7.t: "$SPA_ADJ$ trůn"
 spain_provisional_government.7.d: "Prozatímní vláda země [SCOPE.sCountry('spain_scope').GetName] nabídla uprázdněný trůn země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] kterémukoli princi z rodu Bonapartů, který bude ochoten přísahat věrnost [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] ústavě."
 spain_provisional_government.7.f: "$spain_provisional_government.1.f$"
 spain_provisional_government.7.a: "Vidíme, že konečně dostali rozum."
 spain_provisional_government.7.b: "$spain_provisional_government.3.b$"
 spain_provisional_government.71.t: "Bonapartovská restaurace"
 spain_provisional_government.71.d: "Rod Bonapartů přijal naši nabídku [SCOPE.sCountry('spain_scope').GetAdjective] trůnu a vyslal prince do města [SCOPE.sCountry('spain_scope').GetCapital.GetCityHubName], aby sloužil jako král země [SCOPE.sCountry('spain_scope').GetNameNoFormatting]. Po svém zvolení se před Cortesy sám korunoval."
 spain_provisional_government.71.f: "„Karl Marx řekl - tedy, citoval Hegela... že světodějné osobnosti se objevují takříkajíc dvakrát.“ Francisco přecházel po místnosti a zuřivě zíral na knihu ve své ruce. „A že Hegel zapomněl dodat: poprvé jako tragédie, podruhé jako fraška.“\n\nOpisovač s očima zarudlýma od slz ho sledoval, jak přechází. „Vydřeš mi do podlahy brázdu,“ řekl. „Oba víme, co je třeba udělat, a uděláme to.“\n\nFrancisco zastavil svůj okruh a položil knihu na židli napůl utopenou v pamfletech. Jeho oči sklouzly ke stolu, ke sklenicím s prachem tvořícím jeho nový středobod, k balíčku hřebíků.\n\n„To tedy ano,“ řekl. „To tedy ano.“"
 spain_provisional_government.71.a: "Sláva Bonapartovi, konečně obnovenému!"
 spain_provisional_government.8.t: "Vyhlášení republiky"
 spain_provisional_government.8.d: "Protože žádný král nepřichází, Cortesy se prohlásily za zákonodárný sbor španělské republiky, s [ROOT.GetCountry.GetRuler.GetFullName] jako prozatímní výkonnou hlavou."
 spain_provisional_government.8.f: "„Máme republiku!“\n\nVolání z ulice dole vymrštilo Francisca na nohy a rozházelo hromadu papírů všemi směry. Zadupal po schodech nahoru, přes podlahu podkroví až k okraji koberce přitisknutého ke zdi. Na něm ležela tenká přikrývka, z níž bledá ruka sahala po pistoli, o níž věděl, že je ukrytá v krokvích.\n\n„Máme republiku!“ zopakoval napůl bez dechu a ruka se zastavila, odhodila přikrývku stranou a odhalila pár široce rozevřených, zarudlých očí.\n\n„Můj Bože,“ řekl opisovač. „Málem jsem tě zastřelil.“\n\n„A já ti odpouštím!“ Francisco vyprskl smíchy. „Vstávej, Àngeli! Neříkal jsi, že půjdeš tančit?“"
 spain_provisional_government.8.a: "Přivítejme ji jako slunce."
