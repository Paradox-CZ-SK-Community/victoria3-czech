 modifier_devorismo: "Devorismo"
 devorismo.1.t: "Slíbeno a splněno"
 devorismo.1.d: "Navzdory pochybovačným slovům radikální opozice se vládě [SCOPE.sCharacter('pm_scope').GetLastName] podařil ohromný čin - splatit dluhy země [ROOT.GetCountry.GetName]. Vítězství „Devorisma“ mohou jednoho dne zastínit jeho groteskní korupci."
 devorismo.1.f: "Ministr financí vystoupil na řečniště a přejel pohledem po sněmovně. Na první pohled poznal, kdo z nich bude přátelský a kdo podstatně méně. Kolik z těchto poslanců zastupovalo oblasti, jejichž obecní půda byla rozprodána jeho spojencům? Kolik z nich čelilo peticím zoufalých mužů a žen, kteří nyní museli platit za palivové dříví? Nebyla jich většina, a to jediné bylo důležité.\n\n„První povinností vlády,“ řekl, „bylo vydat se cestou hospodářské správy. A po této cestě jsme kráčeli přesně tak, jak bylo zamýšleno...“"
 devorismo.1.a: "Účel začal světit prostředky."
 devorismo.1.b: "Věc [GetIdeology('ideology_cartist').GetName] si připsala další vítězství."
 devorismo.2.t_dummy: "[SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] revoluce"
 devorismo.2.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('getPortugalRevolutionMonthName')] revoluce"
 devorismo.2.d: "Zneužívání moci ze strany „požíračské“ vlády již nelze přehlížet. Masy z města [ROOT.GetCountry.GetCapital.GetCityHubName] a Národní garda sestoupily na Cortes Geraes a požadují, aby [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] předal moc opozici."
 devorismo.2.f: "„Jsme v předvečer občanské války. Zítra bude Vaše Excelence velet armádám [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a já budu velet armádám republiky. Pokud se meč Bouças střetne s mečem Asseiceiry, mé přátelství a úcta k Vaší Excelenci neutrpí ani nejmenší újmu.“\n\n—Manuel da Silva Passos markýzi ze Sá da Bandeira"
 devorismo.2.a: "Charta se vyčerpala - ať žije ústava!"
 devorismo.2.b: "Nevrátí nás do anarchie!"
 modifier_september_revolution_radicalism: "Radikalizovaní progresivisté"
 devorismo.3.t: "Klub Camilů"
 devorismo.3.d: "[SCOPE.sCharacter('intelligentsia_ig_char').GetFullName], [SCOPE.sCharacter('trade_unions_ig_char').GetFullName] a skupina dalších levicových politiků založili společnost k diskusi o radikální reformě v zemi [ROOT.GetCountry.GetName]. Členové stávající vlády ji odsoudili jako rozvratné spiknutí a vyzvali k jejímu nucenému uzavření."
 devorismo.3.f: "„Jak je možné, že někdo může být zároveň vlastencem i zrádcem?“\n\nAntónio natáhl ruku a prudce zatáhl žaluzie. Ohlédl se k muži na druhé straně stolu a ztišil hlas.\n\n„Dokud je Dom Miguel na trůně,“ začal, „muž, který proti němu bojuje, je vlastenec. Může rozbíjet, co chce, neboť je to prostředek k cíli. Ale kdyby do svého kabinetu jmenoval liberála? Ach, pak stojí království za ochranu a všichni, kdo pokračují v boji, se stávají zrádci. Držba trůnu z nás všech dělá reakcionáře.“"
 devorismo.3.a: "Nařídit okamžité uzavření této organizace."
 devorismo.3.b: "Kdysi jsme všichni byli revolucionáři."
 if_revolution_ongoing_tt: "Pokud probíhá [concept_revolution]: #indent_newline:3 \n• Spustí událost #v $devorismo.2.t_dummy$#!#!"
