 two_spains.4.t_1: "Slavná revoluce"
 two_spains.4.t_2: "Navrácení koruny"
 two_spains.4.d_1: "Úsilí [SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetFullName] vedlo k tomu, že nepopulární dynastie [SCOPE.sCharacter('deposed_spanish_monarch').GetLastName] byla smetena od moci. S uprázdněným [ROOT.GetCountry.GetAdjective] trůnem bylo pod vedením [ROOT.GetCountry.GetRuler.GetFullName] zřízeno regentství, které má rozhodnout o budoucnosti koruny."
 two_spains.4.d_2: "Úsilí [SCOPE.sCharacter('golpista_general').GetCustom('getGeneralAdmiral')] [SCOPE.sCharacter('golpista_general').GetFullName] vedlo k tomu, že nepopulární dynastie [SCOPE.sCharacter('deposed_spanish_monarch').GetLastName] byla smetena od moci. S uprázdněným [ROOT.GetCountry.GetAdjective] trůnem bylo zřízeno regentství, které má rozhodnout o budoucnosti koruny."
 two_spains.4.f: "„Tak je to ono? Máme republiku?“\n\nFrancisco vzhlédl k otevřenému oknu, k bledému opisovači, který se z něj vykláněl. Po něm ven zavál pach inkoustu a vosku ze svíček.\n\n„Ještě ne, ale brzy,“ odpověděl. „Můžeme doufat! To je víc, než jsme mohli říct minulý týden!“"
 two_spains.4.a: "A nyní vládnout."
