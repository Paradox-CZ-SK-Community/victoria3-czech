 je_portugal_and_brazil: "Stará říše"
 je_portugal_and_brazil_reason: "Od našeho uznání její nezávislosti v roce 1825 bývalá [ROOT.GetCountry.GetAdjective] kolonie [SCOPE.sCountry('brazil_scope').GetName] dominuje jihoamerickému kontinentu. Ačkoli krátké období poosamostatněné personální unie pod vládou krále a císaře Pedra IV. a I. skončilo neúspěchem, kulturní vazby mezi #b $POR$#! a #b $BRZ$#! zůstávají silné. Tyto existující vazby představují výbornou příležitost k navázání trvalého hospodářského a diplomatického vztahu."
