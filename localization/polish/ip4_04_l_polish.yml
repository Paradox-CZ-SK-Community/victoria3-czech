 je_the_two_spains: "Dvě Španělska"
 je_the_two_spains_reason: "#b Ukazatel postupu#! se bude v průběhu času posouvat směrem k #tooltippable;tooltip:[GetPlayer.GetTooltipTag],two_spains_liberal_pivot_factors_tt [SCOPE.ScriptValue('two_spains_liberal_display')|%0o]#!/#tooltippable;tooltip:[GetPlayer.GetTooltipTag],two_spains_conservative_pivot_factors_tt [SCOPE.ScriptValue('two_spains_conservative_display')|%0u]#!.\n#b Ukazatel napětí#! se bude v průběhu času posouvat směrem k #tooltippable;tooltip:[GetPlayer.GetTooltipTag],two_spains_tension_pivot_factors_tt [SCOPE.ScriptValue('two_spains_tension_pivot')|%0v]#!.\nVysoké #b napětí#! způsobí zvýšený [concept_activism] a vyšší pravděpodobnost [concept_coup].\n\n#italic „Zde leží polovina Španělska. Zemřela kvůli té druhé polovině.“#!\n—Mariano José de Larra\n\nOd války za nezávislost je [ROOT.GetCountry.GetCustom('getNameIBEorSPA')] uvězněna v často násilném zápase mezi „dvěma Španělsky“, z nichž první je věrné církvi a koruně a druhé osvícenství a ústavě. Nesmiřitelné nepřátelství obou stran, zrozené z nedostatečně rozvinutého liberálního projektu, upevnilo politický řád, který se spoléhá více na armádu než na hlasovací lístek. Má-li [ROOT.GetCountry.GetCustom('getNameIBEorSPANoFormatting')] nalézt mír, musí si zvolit, která vize ji bude určovat."
