 iberia.2.t: "Iberský úsvit"
 iberia.2.d_1: "Malicherné národní státy Iberie byly poraženy a poloostrov osvobozen sjednocenými pracujícími země[ROOT.GetCountry.GetCustom('to_the_or_not_to_the')] [ROOT.GetCountry.GetName]. Od Alenteja po Pyreneje vlaje černá vlajka vysoko a svobodně."
 iberia.2.d_2: "Proletariát Iberie se spojil pod jedinou [ROOT.GetCountry.GetName]. Poloostrov už nikdy nebude rozdělen diktátem malicherných králů a generálů."
 iberia.2.d_3: "Trůny $SPA$ a $POR$ znovu drží jediný [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Tato nová [ROOT.GetCountry.GetName] slibuje poloostrovu nový zlatý věk, větší než kdy dříve."
 iberia.2.d_4: "[ROOT.GetCountry.GetName] přivedla věřící poloostrova do jednoho velkého shromáždění. Od Alenteja po Pyreneje zvuk kostelních zvonů ohlašuje nový zlatý věk."
 iberia.2.d_5: "$SPA$ a $POR$ se konečně sjednotily pod [ROOT.GetCountry.GetName]. Od Alenteja po Pyreneje vzhlížejí národy Iberie k novému zlatému věku."
 iberia.2.f: "Když kameny dopadly na hladinu Doura, vyrazily vzhůru mohutný gejzír vody, který promočil převozníky až na kůži. Z říčního dna se zvedla mračna bahna a vyplašených ryb a zbarvila vodu kolem plavidla do zakalené zelenohnědé.\n\nZa týden, doufali, bude pilíř vyčnívat tři metry nad vodu. Za měsíc se k němu připojí dalších pět, každý spojený se svými bratry mřížovím podpěrných trámů. Do konce roku z toho bude most, jedna z tuctu nových staveb překlenujících bývalou hranici. Unaveně a vítězoslavně sledovali převozníci, jak se kameny usazují, a znovu uchopili své bidla."
 iberia.2.a: "Vztyčit @ibe_republic_1_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],ibe_republic_1_tt vlajku unie#!!"
 iberia.2.b: "Nechte vlát @ibe_republic_2_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],ibe_republic_2_tt trikolóru#!!"
 iberia.2.c: "Vzdáváme čest @ibe_republic_3_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],ibe_republic_3_tt federální vlajce#!!"
 iberia.2.e: "Mír mezi námi, válku tyranům!"
 iberia.2.g: "¡Viva Ibérica!"
 iberia.3.t: "Všichni lidé jsou bratři"
 iberia.3.d: "Sjednocením [GetGeographicRegion('geographic_region_iberia_old').GetName] usilujeme o vytvoření nové společnosti založené na principech proletářského internacionalismu. Umělý jazyk #b $language_esperanto$#!, oblíbený mezi iberskými socialisty, může posloužit jako vhodně mezinárodní jazyk správy."
 iberia.3.f: "„Bude to obtížné,“ začal řečník. „Budeme se muset pustit do velkého díla výuky tohoto jazyka. Reakcionáři se budou tvrdohlavě držet starých národních jazyků a budou se maskovat za masy, které se esperanto ještě nenaučily. Ale revoluce byla také velkým dílem, nebyla snad? A my jsme se před ní nekrčili kvůli odporu, kterému jsme čelili. Vyzývám vás, radní, dovolte nám přispět k běhu revoluce a k rozpuštění staré společnosti. Ať naše děti v příštích letech říkají - #italic proletoj de la mondo, unuiĝu!#!“"
 iberia.3.a: "Prohlásit esperanto za úřední jazyk."
 iberia.3.b: "Národní jazyky, buržoazní kultury... to všechno musí pryč."
 iberia.3.c: "Naděje je nade vše tím, co nás definuje."
 je_iberia_adopt_esperanto_language: "Přijmout esperanto"
 je_iberia_adopt_esperanto_language_desc: "Iberští socialisté mají dlouhodobý zájem o #b $language_esperanto$#!, umělý jazyk zamýšlený jako mezinárodní pomocný jazyk. Přijmout $language_esperanto$ jako úřední jazyk bude velkým krokem k vytvoření skutečně mezinárodní federace."
