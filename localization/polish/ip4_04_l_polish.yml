 decision_revoke_banishment_law: "Zrušit zákon o vyhnanství"
 decision_revoke_banishment_law_desc: "Roku 1834, v reakci na to, že sesazený král Miguel odvolal svou kapitulaci v liberálních válkách, královna Marie II. vyhlásila zákon, který jej i jeho potomky navždy vypověděl z Portugalska. S vládou nakloněnou věci sesazeného krále můžeme tento zákon zrušit a přivítat jej zpět u našich břehů."
 miguel_invited_back_tt: "#b $Miguel$ $de_Braganca$#! se objeví v zemi [ROOT.GetCountry.GetName] jako [concept_agitator] s ideologií [GetIdeology('ideology_miguelist').GetName]"
 je_second_liberalism: "Druhý liberalismus"
 je_second_liberalism_reason: "Liberální revoluce roku 1820 zahájila v zemi [ROOT.GetCountry.GetName] éru ústavní vlády a počátek toho, čemu se říká „první liberalismus“. Ačkoli král Miguel I. dokázal na krátkou dobu obnovit absolutismus, jeho porážka v liberálních válkách a následné vyhnanství učinily z ústavní vlády skutečnost.\n\nAčkoli je nyní každá úroveň [ROOT.GetCountry.GetAdjectiveNoFormatting] vlády obsazena bývalými revolucionáři, od umírněného směru [GetIdeology('ideology_cartist').GetName] až po progresivní radikály, přesná podoba tohoto „druhého liberalismu“ dosud není vymezena. Zvítězí stabilizační kompromisy umírněných, nebo duch roku 1820 znovu ožije?"
 if_republic_instated_tt: "Pokud [ROOT.GetCountry.GetNameNoFlag] nemá [GetLawType('law_monarchy').GetName]: #indent_newline:3 \n• Spustí událost #v $second_liberalism.2.t$#!#!"
 if_miguelist_king_tt: "Pokud je nárokovatel s ideologií [GetIdeology('ideology_miguelist').GetName] [concept_ruler] země [ROOT.GetCountry.GetNameNoFlag]: #indent_newline:3 \n• Spustí událost #v $second_liberalism.3.t$#!#!"
 is_great_power_tt: "[ROOT.GetCountry.GetName] se stala [concept_great_power]"
 miguelist_monarch_tt: "Nárokovatel s ideologií [GetIdeology('ideology_miguelist').GetName] je [concept_ruler] země [ROOT.GetCountry.GetName]"
 second_liberalism.1.t: "Z temnoty"
 second_liberalism.1.d: "Hrdinské úsilí koruny a Cortes vytvořilo ze země [ROOT.GetCountry.GetName] zcela moderní a liberální národ. Ústavní řád zvítězil nad všemi, kdo by jej chtěli zpochybnit."
 second_liberalism.1.f: "Kolem stropu důstojnického klubu se nahromadila silná vrstva kouře a posouvala světlo lamp do načervenalého odstínu. Byly skoro dvě hodiny ráno a všichni kromě nejzarytějších oslavenců se už stáhli zpět do svých ubytování. V rohu seděl muž v generálské uniformě, obklopen svým štábem a nadšeně rozmlouvající se služebnou.\n\n„Nějaký hlupák mi poslal dopis,“ řekl, „a byl příšerný. Urážka Boha, ale přesto hodná smíchu. Ten pán použil krycí jméno a zdál se být rozhodnutý zatáhnout mě do jakéhosi tupohlavého spiknutí. Jako bych pozvedl zbraně proti své zemi! Měl by jít s dobou.“"
 second_liberalism.1.a: "Ať žije ústava!"
 second_liberalism.1.b: "Duch vintismu nikdy nezemře."
 second_liberalism.2.t: "Nejvyšší poslání"
 second_liberalism.2.d_1: "Svržením monarchie jsme učinili kompromisy a kapitulace starých konstitucionalistů zbytečnými. [ROOT.GetCountry.GetName] nyní bude mít vládu lidu, lidem a pro lid."
 second_liberalism.2.d_2: "Triumf proletariátu ukončil éru liberalismu v zemi [ROOT.GetCountry.GetName]. Už se nikdy nespokojíme se stále dokonalejší podobou buržoazní vlády."
 second_liberalism.2.d_3: "Vláda církve ukončila konstitucionalistický experiment. [ROOT.GetCountry.GetName] už nikdy nebude určována rozporem mezi božským právem a zákony člověka."
 second_liberalism.2.f: "„Jakmile se existence koruny stane předmětem veřejné debaty,“ řekl vyhnanec, „už nemůže plnit svou sjednocující roli. A jaký jiný důvod k existenci vlastně měla?“\n\nVelvyslanec při jeho slovech přikyvoval. „A podle vás proto padla?“\n\n„Příznak, nikoli důvod. Koruna kapitulovala znovu a znovu. Kompromis s liberály byl od počátku odsouzen k nezdaru. Jejich ústavy zbavují krále božského práva a mění je v oslavované úředníky.“ Každé slovo z jeho úst odkapávalo hořkostí. „Kdybych to jen viděl dřív.“"
 second_liberalism.2.a: "Tak začíná nová kapitola dějin."
 second_liberalism.2.b: "Třetí liberalismus číhá za obzorem."
 second_liberalism.3.t: "Lid a král"
 second_liberalism.3.d: "Navrácení [SCOPE.sCharacter('miguelist_claimant_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('miguelist_claimant_scope').GetFullName] na [ROOT.GetCountry.GetAdjective] trůn znamená konečnou porážku konstitucionalistického projektu. Koruna už nikdy nebude muset dělat kompromisy se svou Bohem danou mocí."
 second_liberalism.3.f: "„Během několika měsíců se od jednoho konce království k druhému probudil národní duch; nejzjevnější odpor k revolučním zásadám se projevil s takovou intenzitou, že jen úcta náležející milosrdenství Mého vznešeného Otce, kterou Mu věrný portugalský národ prokazoval, mohla zabránit tomu, aby lid obětoval ty, kdo revoluci podnítili a udržovali.“\n\n— #italic Manifest Jeho Nejvěrnějšího Veličenstva, našeho krále D. Miguela#!"
 second_liberalism.3.a: "Liberální zvrácenost dospěla ke svému konci."
 second_liberalism.3.b: "Současnost nelze jednoduše ignorovat."
 je_portugal_regeneration: "Naše šťastné oživení"
 je_portugal_regeneration_reason: "#italic „Nad dostavníkovým koněm stojí tramvaj, nad ní lokomotiva a nade vším pokrok.“#!\n— Fontes Pereira de Melo\n\nMnozí považují [ROOT.GetCountry.GetName] za národ, jehož čas pominul, za zemi, která se už nikdy ani nepřiblíží slávě svého zlatého věku. Tento pocit bídy vedl [ROOT.GetCountry.GetAdjectiveNoFormatting] liberální politiky ke snům o „oživení“, období rychlých změn, které by národ vytrhlo ze stagnace a obnovilo jeho někdejší prestiž.\n\nNastolení sjednocujícího režimu proměnilo toto dlouho vytoužené oživení z ideálu ve skutečnost. Vláda představila plány ambiciózních institucionálních reforem. Pokud budou dokončeny, slibují zvrátit dlouhý úpadek země [ROOT.GetCountry.GetNameNoFormatting] - a vybudovat základ nezlomného liberálního řádu."
 je_portugal_regeneration_agriculture_complete_tt: "Dokončen #v $je_portugal_regeneration_agriculture$#!"
 je_portugal_regeneration_public_works_tt: "Dokončen #v $je_portugal_regeneration_public_works$#!"
 je_portugal_regeneration_institutions_tt: "Dokončen #v $je_portugal_regeneration_institutions$#!"
 je_portugal_regeneration_agriculture: "Oživení: Venkov"
 je_portugal_regeneration_agriculture_reason: "$regeneration_shared_loc$\n\nNeefektivní a zastaralá povaha [ROOT.GetCountry.GetAdjectiveNoFormatting] zemědělství dlouho brzdila rozvoj. Venkov je říší rozsáhlých, neefektivních šlechtických statků a církevních pozemků, které využívají postupy nezměněné po staletí. Má-li oživení přijít na venkov, musí přijít spolu s využitím nových technologií a podnikavějších forem vlastnictví půdy."
 je_portugal_regeneration_public_works: "Oživení: Veřejné práce"
 je_portugal_regeneration_public_works_reason: "$regeneration_shared_loc$\n\nPevninská [ROOT.GetCountry.GetNameNoFormatting] je drsná, řídce osídlená země s mnoha izolovanými oblastmi a nedostatečně rozvinutými spojovacími trasami. Když se vezme v úvahu její zámořská říše, problém dopravy nabývá nové naléhavosti. Telegraf a železnice jsou politiky oživení považovány za samotné ztělesnění pokroku - technologie, které propojí národ a říši pevněji než kdykoli dříve."
 je_portugal_regeneration_institutions: "Oživení: Národní instituce"
 je_portugal_regeneration_institutions_reason: "$regeneration_shared_loc$\n\nSamotný stát - rámec, v němž jsou vymáhány smlouvy, přidělovány prostředky a zajišťováno stabilní prostředí - je ústředním prvkem programu oživení. K vybudování moderního státu je zapotřebí moderní populace - vzdělané, schopné a vlastenecké. Nová generace právníků, úředníků a důstojníků zaplní řady byrokracie a vytvoří instituce potřebné pro další rozvoj."
 regeneration_shared_loc: "Po léta snili [ROOT.GetCountry.GetAltAdjective('sti')|l] liberální politici o „oživení“ - ambiciózním programu výstavby fyzické a právní infrastruktury, která poslouží jako základ národního rozvoje. Relativní politická stabilita, jíž [ROOT.GetCountry.GetNameNoFormatting] dosáhla, vytvořila příležitost tyto četné reformy uskutečnit."
 surplus_50_percent_of_the_time_tt: "[ROOT.GetCountry.GetNameNoFlag] měla kladný zůstatek po více než polovinu doby, kdy byl tento [concept_journal_entry] aktivní (aktuálně [ROOT.GetCountry.MakeScope.Var('surplus_time_var').GetValue|v0]/[ROOT.GetCountry.MakeScope.Var('je_age_in_months_var').GetValue|v0] #v měsíců#!)"
 no_notable_miguelists_tt: "#b Žádná#! nemarginalizovaná [concept_interest_group] nemá [concept_leader] s [concept_ideology] [GetIdeology('ideology_miguelist').GetName]"
 je_portugal_regeneration_tt: "Dokončeno #v $je_portugal_regeneration$#!"
 modifier_second_liberalism_over: "Pád monarchie"
 modifier_traditionalism_over_conservatism: "Tradicionalismus nad konzervatismem"
 modifier_unabashed_reaction: "Nestoudná reakce"
 portugal_regeneration.1.t: "Duch oživení"
 portugal_regeneration.1.d: "Ideál velkého „oživení“, které by zvrátilo dlouhý úpadek země [ROOT.GetCountry.GetName], dlouho ovládal [ROOT.GetCountry.GetAdjectiveNoFormatting] liberalismus. Vláda [SCOPE.sCharacter('pm_scope').GetLastName] využila jeho relativní popularity a prohlásila se za první vládu oživení."
 portugal_regeneration.1.f: "„Pocty a odměny budou udělovány jako výsledek skutečné služby. Veřejné vzdělávání učiní mládež ctnostnou a ukázněnou. Armáda bude pevným opěrným bodem míru, zahraničního i domácího, a její síla bude vyvážena organizací národních legií pod kontrolou civilních úřadů. Počet vlastníků půdy poroste. Rolník bude požívat plody své práce. Továrny zásobí veřejnost zbožím nezbytným ke spotřebě a zaměstnají mnohé ruce, které nyní chřadnou v nečinnosti a bídě.“\n\n—Manuel Borges Carneiro, #italic Obrozené Portugalsko#!"
 portugal_regeneration.1.a: "Pro dobro země."
 portugal_regeneration.2.t: "Konečně"
 portugal_regeneration.2.d: "Oživení přineslo modernitu do každé stránky [ROOT.GetCountry.GetAdjective] společnosti. Pokud kdysi platilo, že náš národ upadá, naše úspěchy prokázaly, že to nemusí být trvalé."
 portugal_regeneration.2.f: "Prostor kolem lůžka nemocného byl přeplněn příbuznými, až João sotva zahlédl jediný vlas na dědečkově hlavě. Jeho hlas, kdysi silný baryton, za ta léta zeslábl a ztenčil se. Přesto jej nesl, jak nejlépe dovedl, a ti, kterým po tvářích tekly slzy, se utišili, aby ho bylo slyšet.\n\n„...když jsem byl mladý, bojoval jsem s Francouzi,“ řekl, „a Évora neměla pouliční osvětlení. A teď máme vlaky a ten vás všechny může dovézt za mnou. Co jiného mohu dělat než děkovat Bohu, že ze všech dob zvolil právě tuto, aby mě sem a teď umístil?“"
 portugal_regeneration.2.a: "Ať žije obrozené [ROOT.GetCountry.GetNameNoFormatting]!"
 portugal_regeneration.2.b: "Našimi hrdiny jsou ti, kdo sní o infrastruktuře."
 portugal_regeneration.3.t: "Žebřík pro Ikara"
 portugal_regeneration.3.d: "Období politické a fiskální stability, které umožnilo ambiciózní program oživení, skončilo. [ROOT.GetCountry.GetName] si už možná nemůže dovolit snít."
 portugal_regeneration.3.f: "Bylo po všem. Všechno, pro co ministr pracoval, všechna opatření, která v posledním desetiletí tak pečlivě načrtával. Možná byl stav země prostě nenapravitelný. Možná to bylo marné od samého začátku a nikdy nemohl udělat nic, co by obnovilo její vzestup ke slunci. Možná to bylo ještě horší a země byla zcela zachránitelná, nebýt eg generálů a jiných pošetilců.\n\nVěděl, že akademici se o tom budou přít celé příští století. Bude se muset vyrovnat s tím, že na policích uvidí knihy o přerušeném oživení a pocítí strašlivou touhu zjistit, co o něm říkají. Co jiného se dalo dělat než plakat?"
 portugal_regeneration.3.a: "Přežití převáží všechno ostatní."
 portugal_regeneration.4.t: "Barva pokroku"
 portugal_regeneration.4.d: "Agrární reformy oživení zvýšily produktivitu a zároveň přešly k podnikavějšímu systému vlastnictví. Čas sklizně nyní doprovází rachot strojů a vydatný příkrov kouře."
 portugal_regeneration.4.f: "„Tak, António, pověz mi, jak jsi k tomu všemu přišel?“ Maria mávla rukou přes salon s mramorovými sloupy, obrazy rozeseté po zdech a velkolepé schodiště z tvrdého dřeva.\n\n„Ach, vzpomínáš si na vinici mého otce? Uvedl jsem ji na burzu a měl jsem velké štěstí, že jsem upoutal pozornost konsorcia anglických investorů. Během dvou let jsem své peníze zdvojnásobil. Během čtyř jsem je zdvojnásobil znovu. Teď si mohu najmout člověka, který ji bude spravovat za mě. A s časem, který ušetřím...“\n\nJeho prsty se jemně dotkly hřbetu její ruky a ona cítila, jak jí tvář hřeje."
 portugal_regeneration.4.a: "Venkov, dlouho nezměněný, nachází nový život."
 portugal_regeneration.4.b: "Oživení pozvedá vše, čeho se dotkne."
 portugal_regeneration.5.t: "Tisíc mil"
 portugal_regeneration.5.d: "Oživení přineslo železnici a telegraf do každé provincie země [ROOT.GetCountry.GetName]. Široce dostupná doprava otevřela kdysi izolované komunity svobodné výměně zboží a informací."
 portugal_regeneration.5.f: "„Minulý měsíc jsem jel vlakem do Porta.“\n\nCarlos se otočil ke svému sousedovi se skeptickým výrazem ve tváři. Manuelovy perleťově bílé zuby zářily pod vrstvou potu a cihlového prachu. Vytáhl zednickou lžíci a nanesl vrstvu malty na další místo na zdi.\n\n„Opravdu?“ řekl Carlos. „Kolik stál lístek?“\n\n„Ach, copak mě máš za milionáře? Byl jsem topič!“"
 portugal_regeneration.5.a: "Už si nemusíme zůstávat cizí."
 portugal_regeneration.5.b: "Veškerou politiku lze zredukovat na dopravu."
 portugal_regeneration.6.t: "Podepsáno a kontrasignováno"
 portugal_regeneration.6.d: "Oživení změnilo tvář [ROOT.GetCountry.GetAltAdjective('ee')|l] veřejné správy. Do škol každoročně vstupuje bezprecedentní počet studentů a hojnost čerstvých absolventů univerzit poskytuje nové síly jak soukromému podnikání, tak státní byrokracii."
 portugal_regeneration.6.f: "Studenti seděli v úhledných řadách, knihy v klíně, oči upřené vpřed. Nikdo z nich se neodvážil vydat ani hlásku. Profesor si je prohlédl, než promluvil. Jeho hlas se odrážel od dlážděné podlahy a stěn pokrytých obrazy stoletých rektorů.\n\n„Popište, jak se vyjmenované pravomoci Cortes liší mezi ústavou z roku 1822 a Ústavní chartou z roku 1828.“\n\nJako jeden muž se tucet per pustil do práce na stránkách."
 portugal_regeneration.6.a: "Náš lid se stane nejvzdělanějším v Evropě."
 portugal_regeneration.6.b: "Právníci pro všechny!"
