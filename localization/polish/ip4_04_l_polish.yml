 anarchism_events.6.t: "Nejlepší ze všech možných světů"
 anarchism_events.6.d: "Přízrak anarchismu byl z [ROOT.GetCountry.GetAdjective] půdy vymýcen. Do ulic se vrátil pořádek a naši občané se už nemusejí bát anarchistického teroru."
 anarchism_events.6.f: "Arkády města [ROOT.GetCountry.GetCapital.GetCityHubName] zářily sklem a plynovým světlem. Postavy oděné v hedvábí poletovaly z obchodu do obchodu a odevzdávaly mzdu za celé desetiletí za náhrdelník či klobouk. Pokladní se ztuhlými úsměvy si plnili dlaně pesetami určenými do kapes jejich zaměstnavatelů.\n\nNa polích za [SCOPE.sState('agricultural_state_scope').GetFarmHubName] se kosy zvedaly a klesaly v hypnotické vlně. Dělník uprostřed řady, oslepený potem a vzduchem vířenými plevami, udělal neobratný krok vpřed. Upadl a prasknutí jeho kotníku zaznělo jako výstřel.\n\nOkno tiskárny ukazovalo jen modř a mosaz. První policista ve dveřích byl děsivě mladý - bez vousů, s tváří posetou akné, s lámajícím se hlasem, když křičel. Francisco se mu podíval do očí a vrazil si dýku do vlastní hrudi."
 anarchism_events.6.a: "Mír znovu vládne."
 anarchism_events.6.b: "Tohle je všechno, co je, a všechno, co kdy bude."
 anarchism_events.7.t: "Internacionalisté"
 anarchism_events.7.d: "Zájem o rostoucí [ROOT.GetCountry.GetAdjective] [SCOPE.sPoliticalMovement('anarchist_movement_scope').GetName] přilákal přes hranice ze země [SCOPE.sCountry('relevant_border_country').GetName] zástupce Mezinárodního dělnického sdružení jménem [SCOPE.sCharacter('international_man_scope').GetFullName]."
 anarchism_events.7.f: "Internacionální [SCOPE.sCharacter('international_man_scope').GetWomanMan] přišel o půlnoci. Proklouzl zadními dveřmi obchodu jako vánek, přivítal čekající muže pokývnutím a zašeptaným heslem a pak se vytratil nahoru.\n\nTam, v bezpečí za zataženou záclonou, si vyměnili svá krycí jména, své legendy a příběhy o jizvách z bojů. Tvrdá podlaha prozatím postačí, řekl internacionální [SCOPE.sCharacter('international_man_scope').GetWomanMan]. Jeho hostitelé se usmáli nad [SCOPE.sCharacter('international_man_scope').GetHerHis] troufalostí a nabídli mu čestné místo na jediném koberci v podkroví. Opisovač si vezme první hlídku a usadí se u okna se zastřenou svíčkou.\n\nV sedm ráno už byl [SCOPE.sCharacter('international_man_scope').GetWomanMan] na voze směřujícím na jih a místní si gratulovali k dobře vykonané práci."
 anarchism_events.7.a: "Vítej v zemi [ROOT.GetCountry.GetNameNoFormatting], camarada!"
 anarchism_events.7.b: "Pečlivě toho cizince sledujte."
