 anarchism_events.1.t: "Poslové smrti"
 anarchism_events.1.d_1: "Zatímco [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetCustom('anarchist_assassination_circumstances')] ve městě [SCOPE.sState('anarchist_terror_state_scope').GetCityHubName], k [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetPrimaryRoleTitle] [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetFullName] přistoupil militant [SCOPE.sPoliticalMovement('anarchist_terror_movement_scope').GetName]. Militant vystřelil na [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetPrimaryRoleTitle] z pistole a smrtelně [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHim] zranil."
 anarchism_events.1.d_2: "Zatímco [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetCustom('anarchist_assassination_circumstances')] ve městě [SCOPE.sState('anarchist_terror_state_scope').GetCityHubName], k [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetFullName] přistoupil militant [SCOPE.sPoliticalMovement('anarchist_terror_movement_scope').GetName]. Militant vystřelil na [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetLastNameNoFormatting] z pistole a smrtelně [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHim] zranil."
 anarchism_events.1.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] si zapálil dýmku a podal rychle hasnoucí sirku doprava. Jeho soused si zapálil svou a pach levného tabáku mu začal pronikat do nosu.\n\nMuž, který se k němu připojil, zvedl dýmku ke rtům a vypustil spokojený kroužek kouře. V dálce, na samé hranici jejich sluchu, se ozval ostrý zvuk. Pak další a další.\n\n„Slyšel jsi to taky?“ zeptal se, ačkoli odpověď už znal. A pak, dříve než čekal, se ozval odporný výkřik."
 anarchism_events.1.a: "Musíme podniknout odvetu."
 anarchism_events.1.b: "Ať žije anarchie!"
 anarchism_events.2.t: "A potom nic"
 anarchism_events.2.d_1: "Militant [SCOPE.sPoliticalMovement('anarchist_terror_movement_scope').GetName] zavraždil [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetPrimaryRoleTitle] [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetFullName] v ulicích města [SCOPE.sState('anarchist_terror_state_scope').GetCityHubName] pomocí podomácku vyrobené bomby. Po atentátu se na město snesla atmosféra teroru."
 anarchism_events.2.d_2: "Militant [SCOPE.sPoliticalMovement('anarchist_terror_movement_scope').GetName] zavraždil [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetFullName] v ulicích města [SCOPE.sState('anarchist_terror_state_scope').GetCityHubName] pomocí podomácku vyrobené bomby. Po atentátu se na město snesla atmosféra teroru."
 anarchism_events.2.f: "Na krátký, šílený okamžik si [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] myslela, že ten muž mává. A pak uviděla předmět ve vzduchu, muže, který se obracel k útěku, a [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetLastNameNoFormatting], jak zvedá [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHis] ruku, aby si zakryl [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHis] tvář. A pak to dopadlo.\n\nOzvalo se strašlivé tlesknutí, výbuch tlaku, obláček kouře, který vypadal mnohem menší, než měl být. Odporné zvonění přehlušilo všechen ostatní zvuk. Viděla, jak [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetLastNameNoFormatting|U] vykročil z kouře a tupě pohlédl dolů na místo, kde bývala [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHis] ruka. A pak se [SCOPE.sCharacter('propaganda_of_the_deed_victim').GetHerHis] kolena podlomila a po dlažbě se rozlila kluzká rudá zkáza."
 anarchism_events.2.a: "[SCOPE.sCharacter('propaganda_of_the_deed_victim').GetLastName|U] bude pomstěn."
 anarchism_events.2.b: "Ať žije anarchie!"
 anarchism_events.3.t: "Pekelný čin"
 anarchism_events.3.d: "Militant [SCOPE.sPoliticalMovement('anarchist_terror_movement_scope').GetName] provedl teroristický útok ve městě [SCOPE.sState('anarchist_terror_state_scope').GetCityHubName], když hodil dvě bomby do orchestřiště zaplněného divadla. Desítky návštěvníků byly zabity nebo zraněny."
 anarchism_events.3.f: "„Tady nemůžeš být,“ řekl muž u dveří. „Rozumíš tomu? Tvé činy na nás přivedou všechny státní psy.“\n\nTvář [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] se roztáhla do úšklebku. „Jsi zbabělec,“ odpověděl. „Ufňukaný, pošetilý zbabělec. Obětoval jsem se ve prospěch lidského pokroku. Máš povinnost-“\n\n„Mluv #italic tišeji#!. Pokrok... jsi řezník dětí a tady být nemůžeš. Chápeš, co jsi udělal? Tvé nerozlišující vraždění vrátilo důvěru lidu v nás o století zpátky... Vehnal jsi je do náruče státu. Musíš odejít. #italic Hned#!.“"
 anarchism_events.3.a: "Tento teror nelze tolerovat."
 anarchism_events.3.b: "Neexistuje nevinná buržoazie."
 circumstances_spa: "navštěvoval lázně"
 circumstances_fair: "navštěvoval jarmark"
 circumstances_walking: "šel na procházku"
