 two_spains.1.t: "Dvě Španělska"
 two_spains.1.d_1: "Od války za nezávislost byla [ROOT.GetCountry.GetCustom('getNameIBEorSPA')] vystavena krutému střídání reforem a reakce. Zatímco liberální [ROOT.GetCountry.GetCustom('getNameIBEorSPANoFormatting')] usedá na trůn, konzervativní [ROOT.GetCountry.GetCustom('getNameIBEorSPANoFormatting')] se znovu šikuje, aby ji srazila."
 two_spains.1.d_2: "Od války za nezávislost byla země [ROOT.GetCountry.GetName] vystavena krutému střídání reforem a reakce. Zatímco konzervativní [ROOT.GetCountry.GetCustom('getNameIBEorSPANoFormatting')] usedá na trůn, liberální [ROOT.GetCountry.GetCustom('getNameIBEorSPANoFormatting')] se znovu šikuje, aby ji srazila."
 two_spains.1.f: "V chalupě na okraji Barcelony žena s puchýřovitýma rukama navíjí vlněnou nit kolem kolíků tkalcovského stavu. Továrna požadovala pět metrů do konce týdne, a jak požadovala, tak také dostane.\n\nV Andalusii muž zatíná motyku do neúprosné půdy. Po každé jeho straně stojí řada sta lidí. Nikdo z nich nikdy nepozná nic víc.\n\nPřed stanem v Toledu kráčí důstojník podél řady odvedenců. Jeho hlava je plná střelného dýmu a ty jejich neobsahují vůbec nic. Budou se muset učit, to věděl. Jak shánět potravu, jak přimět jeden náboj vykonat práci deseti. Pokud morálka skutečně převážila nad materiálem, prokáže se to zde."
 two_spains.1.a: "Koruna, nebo Cortesy - jaká budoucnost nastane?"
 two_spains.2.t: "Nejvznešenější"
 two_spains.2.d: "Duch městského, osvíceného [ROOT.GetCountry.GetCustom('getSpainName')] zvítězil nad [ROOT.GetCountry.GetCustom('getSpainNameNoFormatting')] koruny a církve. Ať nás budoucnost zavede kamkoli, budeme ji následovat nezatíženi tradicí."
 two_spains.2.f: "„Svět nikdy nespatřil vznešenější smělost,\nani den větší statečnosti,\nnež ten, kdy jsme v plamenech cítili oheň,\njenž v Riegovi vzbudil lásku k vlasti.\n\nVojáci, vlast nás volá do boje,\npřísahejme, že pro ni zvítězíme, nebo zemřeme.“\n\n— Evaristo Fernández de San Miguel, #italic Himno de Riego#!"
 two_spains.2.a: "Libertad!"
 two_spains.2.b: "Duch plukovníka Riega stojí vzpřímeně."
 modifier_god_fatherland_fuero_king: "Bůh, vlast, fuero, král"
 two_spains.3.t: "Duch dona Carlose"
 two_spains.3.d: "Duch venkovského, tradicionalistického [ROOT.GetCountry.GetCustom('getSpainName')] zvítězil nad [ROOT.GetCountry.GetCustom('getSpainNameNoFormatting')] osvícenství a ústavy. Bezbožná budoucnost, kdysi považovaná za nevyhnutelnou, byla vyhnána od našich břehů."
 two_spains.3.f: "„Skrze katolicismus člověk poznal zákon řádu a skrze člověka tento řád vstoupil do společnosti. Vykoupení navrátilo mravnímu světu zákony, které ztratil skrze provinění a hřích. Katolické dogma se stalo měřítkem věd, katolická etika vodítkem lidského jednání a katolická dobročinnost normou citů. Lidské svědomí, osvobozené od rozkladného působení omylu a hříchu, bylo tak osvíceno ve svém nitru stejně jako ve své vnější temnotě. A vedeno světlem těchto tří měřítek bylo navráceno k blaženosti ztracené nevinnosti.“\n\n— Juan Donoso Cortés, #italic Eseje o katolicismu, liberalismu a socialismu#!"
 two_spains.3.a: "Za Boha, vlast a krále stojíme vítězně."
 two_spains.3.b: "Zjevení znovu napraví svět."
