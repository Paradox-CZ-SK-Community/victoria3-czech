 je_spanish_anarchism_reason: "Bída a politické napětí vlastní zemi [ROOT.GetCountry.GetName] vytvořily úrodnou půdu pro růst [SelectLocalization(SCOPE.sPoliticalMovement('anarchist_movement_scope').IsValid, SCOPE.sPoliticalMovement('anarchist_movement_scope').GetName, 'movement_anarchist')]. Anarchističtí agitátoři našli pevnou základnu podpory mezi těmi, jejichž živobytí se kvůli modernizaci $SPA$ stalo nejistým.\n\nOd továren města [SelectLocalization(SCOPE.sState('relevant_urban_state').IsValid, SCOPE.sState('relevant_urban_state').GetCityHubName, ROOT.GetCountry.GetCapital.GetCityHubName)] až po jižní vesnice přeplněné zbídačenými nádeníky se tváře unavené prací obracejí k těm s ohnivýma očima a prsty umazanými od prachu. Naslouchají a učí se - a dostanou-li sebemenší příležitost, budou jednat."
