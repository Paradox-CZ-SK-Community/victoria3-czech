 notification_pope_rejects_archbishop_of_toledo_desc: "[SCOPE.sCountry('papacy_scope').GetRuler.GetPrimaryRoleTitle] odmítl potvrdit jmenování [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName] toledským arcibiskupem ze strany [SCOPE.sCountry('spain_scope').GetRuler.GetFullName], v souladu s politikou římskokatolické církve neuznávat legitimitu [SCOPE.sCountry('spain_scope').GetHeir.GetFullName] jako [SCOPE.sCountry('spain_scope').GetHeir.GetPrimaryRoleTitle] země [SCOPE.sCountry('spain_scope').GetName]."
