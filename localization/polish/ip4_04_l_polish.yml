 spain_politics.1.t: "Nevěsta Kristova"
 spain_politics.1.d: "Zemřel pevně konzervativní toledský arcibiskup [SCOPE.sCharacter('pedro_inguanzo_scope').GetFullName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] má nyní příležitost jmenovat nástupce vstřícnějšího k isabelinské věci."
 spain_politics.1.f: "„Rád bych řekl ‚dobře, že je pryč‘,“ řekl [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. „Opravdu bych si přál věřit, že to bude pro královnu požehnáním. Bohužel zůstává až příliš mnoho otázek.“\n\n„Opravdu?“ [SCOPE.sCharacter('name_b_scope').GetFirstNameNoFormatting] pozvedl obočí. Všude kolem jejich loďky pokojně plynula Manzanares. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] švihl rybářským prutem ven. Háček opsal široký oblouk, než se ponořil do vody.\n\n„Papež na to nepřistoupí, za prvé. Řím je nakloněn pretendentům. Za druhé... nedostatky církve nelze přičítat jednomu muži. Loajální náhrada může podnítit další povstání, Bůh nám pomáhej.“"
 spain_politics.1.a: "Konstituční arcibiskup nám dobře poslouží."
 spain_politics.1.b: "Jmenovat smířlivějšího kandidáta."
 spain_politics.101.t: "Liberální primas"
 spain_politics.101.d_1: "Po smrti předchozího toledského arcibiskupa jmenovala vláda země [SCOPE.sCountry('spain_scope').GetName] jako jeho nástupce pevně liberálního předsedu Senátu [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName]. Schválení [SCOPE.sCharacter('spanish_archbishop_scope').GetHerHis] jmenování by nepřímo uznalo [SCOPE.sCharacter('spanish_queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('spanish_queen_scope').GetFirstName] jako legitimní."
 spain_politics.101.d_2: "Po smrti předchozího toledského arcibiskupa jmenovala vláda země [SCOPE.sCountry('spain_scope').GetName] jako jeho nástupce umírněně liberálního biskupa Kanárských ostrovů [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName]. Schválení [SCOPE.sCharacter('spanish_archbishop_scope').GetHerHis] jmenování by nepřímo uznalo [SCOPE.sCharacter('spanish_queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('spanish_queen_scope').GetFirstName] jako legitimní."
 spain_politics.101.f: "Spor o [SCOPE.sCountry('spain_scope').GetAdjectiveNoFormatting] následnictví způsobil papežství nemalé bolesti hlavy. Ferdinand VII., který byl podle všeho dobrým katolíkem, podepsal dekret, jenž umožnil jeho dceři Isabelle nastoupit na trůn. Tváří v tvář povstání jejího strýce se Isabelina regentka rozhodla spojit s liberály - frakcí, která byla vůči církvi přinejlepším chladná. A tak byla církev nucena volit - zbožný rebel, nebo nepřátelská královna?"
 spain_politics.101.a: "[SCOPE.sCountry('spain_scope').GetAdjective] [SCOPE.sCharacter('spanish_queen_scope').GetPrimaryRoleTitle] je pretendentka. [SCOPE.sCharacter('spanish_queen_scope').GetSheHe|U] nemá právo jmenovat arcibiskupa."
 spain_politics.101.b: "Vláda země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] prokázala, že není nepřátelská. Potvrdit jmenování."
 spain_politics.101.c: "Odmítnout jmenování a požadovat, aby se jej biskup zřekl."
 spain_politics.2.t: "Prapor republiky"
 spain_politics.2.d: "Pád monarchie a vyhlášení země [ROOT.GetCountry.GetName] nastolily otázku, jakou vlajku má republika přijmout. Demokratická levice se semkla kolem přidání purpurového pruhu, který představuje historickou Kastilii a León."
 spain_politics.2.f: "„Republika poskytuje útočiště všem. Stejně tak i vlajka, která znamená mír a spolupráci občanů pod vládou spravedlivých zákonů. Znamená ještě víc: novou skutečnost ve španělských dějinách, že jednání státu nemá jiný motiv než zájem země a žádné jiné pravidlo než úctu ke svědomí, svobodě a práci.“\n\n—Prezidentství prozatímní vlády republiky, 1931"
 spain_politics.2.a: "Vlajkou republiky bude @spa_republic_2_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],spa_republic_2_tt červeno-žluto-purpurová#! trikolóra."
 spain_politics.2.b: "@spa_republic_3_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],spa_republic_3_tt červeno-bílo-purpurová#! trikolóra bude odvážným prohlášením."
 spain_politics.2.c: "Prozatímní @spa_republic_1_flag_small! #tooltippable;tooltip:[GetPlayer.GetTooltipTag],spa_republic_1_tt bikolóra#! by měla být učiněna trvalou."
