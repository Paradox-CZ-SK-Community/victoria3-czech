 independence.1.t: "Válka za nezávislost"
 independence.1.d: "Naše válka za nezávislost na zemi [SCOPE.sCountry('former_colonial_overlord').GetName] donutila zbytky koloniální správy uprchnout do města [SCOPE.sCountry('former_colonial_government').GetCapital.GetName]. Máme-li být nezávislí, musíme se rozhodnout pro strukturu, která zaplní vzniklé vakuum."
 independence.1.f: "„Slyšíte děla? Zní každý výstřel blíž a blíž? Radujte se! Je to vzácný okamžik, kdy může člověk vzít pero a rozhodnout o svém osudu. Okupanti prchají a před námi leží čistý list. Rychle, teď! Granáty se snášejí dolů a nebylo by dobré, kdyby byl tento podnik přerušen hned na svém počátku.“"
 independence.1.a: "Sestavit prozatímní vládu."
 independence.1.b: "Budeme mít republiku pod vedením [ROOT.GetCountry.GetRuler.GetFullName]."
 independence.1.c: "[ROOT.GetCountry.GetRuler.GetFullName] získá korunu, pokud si to [ROOT.GetCountry.GetRuler.GetSheHe] přeje."
 independence.1.e: "Jednota tříd zajistí naše vítězství."
 independence.1.g: "Proletariát stojí v čele našeho boje."
 independence.1.h: "Toto úsilí vede [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]."
 independence.2.t: "Den nezávislosti"
 independence.2.d: "Staré koloniální struktury, které dříve spravovaly naše území, jsou pro nezávislý stát žalostně nedostatečné. Musíme se rozhodnout o základech svobodné a nezávislé země [ROOT.GetCountry.GetName]."
 independence.2.f: "Guvernér neměl čas sbalit svůj nábytek, než odešel. Půl tuctu vytříbených evropských židlí zdobilo jeho jídelnu a obklopovalo stůl, z něhož prchající předchozí obyvatelé narychlo strhli stříbro i hedvábný ubrus. Na těchto vytříbených židlích nyní sedělo šest vytříbených pánů. Někteří z nich měli to štěstí, že si vysloužili pozvání na guvernérovy večeře, a byli zde už dříve. Zbytek byl drsnější, novější. Pokud by zde někdo měl sklon předložit něco odvážného, byl by to jeden z nich."
 independence.2.a: "[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|U] bude nejvyšší autoritou."
 independence.2.b: "Budeme mít republiku."
 independence.2.c: "[ROOT.GetCountry.GetRuler.GetFullName] získá korunu, pokud si to [ROOT.GetCountry.GetRuler.GetSheHe] přeje."
 independence.2.e: "Jednota tříd zachová naši nezávislost."
 independence.2.g: "Byl to proletariát, kdo vybojoval naše vítězství."
 independence.2.h: "[ROOT.GetCountry.GetName] bude vedena božskou prozřetelností."
