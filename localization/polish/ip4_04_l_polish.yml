 anarchism_events.4.t: "Propaganda činem"
 anarchism_events.4.d: "[SCOPE.sPoliticalMovement('propaganda_of_the_deed_movement_scope').GetName] považuje otevřenou politickou organizaci za neproveditelnou a přijalo doktrínu „propagandy činem“. Veřejnými atentáty na politiky a podnikatele hnutí doufá, že inspiruje masy k další revoluční činnosti."
 anarchism_events.4.f: "Průčelí budovy, ožehnuté do černé jako smůla, se před detektivem rozvíralo jako tlama velkého mořského netvora vyvrženého na břeh. Výkladní skříně a stojany na šaty, roztříštěné a shozené na zem, tvořily jeho křivé zuby.\n\nVětrem unášený list papíru s ohořelými rohy se přilepil ke straně jeho boty. „#b Válka#!“ hlásal úhledným mědiryteckým písmem. Zvedl ho a obrátil se zády k větru, aby se přestal třepotat. „#b Třídní válka#!,“ pokračoval, „zažehnutá #b vámi#!...“\n\nSchoval si ho do kapsy. Tak, pomyslel si. Kde je nejbližší tiskárna?"
 anarchism_events.4.a: "Čekají nás násilné časy."
 anarchism_events.4.b: "O důvod víc být ostražití."
 anarchist_terrorism_start_tt: "Dokud je [Concept('concept_activism','$concept_activism_short$')] hnutí [SCOPE.sPoliticalMovement('propaganda_of_the_deed_movement_scope').GetName] vyšší než @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!), může hnutí provádět #r teroristické útoky#! proti našim [Concept('concept_executive','$concept_executives$')], [Concept('concept_politician', '$concept_politicians$')] nebo [concept_ruler]"
 modifier_propaganda_of_the_deed_security: "Bezpečnostní síly v pohotovosti"
 anarchism_events.5.t: "Černá bouře"
 anarchism_events.5.d: "[SCOPE.sPoliticalMovement('anarchist_movement_scope').GetName] se chopilo zbraní a zahájilo revoluční boj proti vládě ze svého centra v [SCOPE.sState('revolutionary_country_capital_scope').GetName]."
 anarchism_events.5.f: "„Už není čas. Musíme jít. #italic Hned#!.“\n\nFrancisco mocným obloukem smetl rukou stůl a poslal jeho obsah do své odřené kožené brašny. Na druhé straně místnosti jeho druh sypal lahvičky střelného prachu do strojů tiskařského lisu. Zvenčí doléhal zvuk trubek. Pochodující muži, někde nedaleko. O dvě ulice dál? O tři?\n\n„Dost už s tím,“ řekl. „Vezmi zápalky, vystačíme si s tím, co máme.“\n\nPřehodil si brašnu přes rameno a vyrazil ke dveřím, brzy následován pavoučími kroky. Vzrušení hrozilo, že mu vybuchne srdce. [SCOPE.sState('revolutionary_country_capital_scope').GetFarmHubName] bylo tak, tak blízko, a svobodný svět už jen o málo dál."
 anarchism_events.5.a: "Viva España!"
 anarchism_events.5.b: "A las barricadas!"
