 notification_pope_confirms_archbishop_of_toledo_desc: "[SCOPE.sCountry('papacy_scope').GetRuler.GetPrimaryRoleTitle] potvrdil jmenování [SCOPE.sCharacter('spanish_archbishop_scope').GetFullName] toledským arcibiskupem ze strany [SCOPE.sCountry('spain_scope').GetRuler.GetFullName], čímž nepřímo uznal legitimitu vlády [SCOPE.sCountry('spain_scope').GetHeir.GetPrimaryRoleTitle] [SCOPE.sCountry('spain_scope').GetHeir.GetFirstName]."
