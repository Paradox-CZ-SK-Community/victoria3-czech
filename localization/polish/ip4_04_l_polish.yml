 brazilian_succession_explanation_tt: "Pokud bude #b postup#! #v $BRZ_ADJ_eeho$#! [concept_journal_entry] #v $je_pedro_brazil$#! na #v 50 %#! nebo níže (aktuálně [GetPlayer.MakeScope.ScriptValue('brazil_pedropoints_as_percent')|v%0]), #v $BRZ$#! po smrti #b $Pedro$ $de_Braganca$#! padne republikánskému puči. Pokud k tomuto puči dojde, náš [concept_ruler] nebude moci úspěšně nastoupit na #v $BRZ_ADJ$#! trůn."
 lusofonia.1.t: "Zpět v pořádku"
 lusofonia.1.d: "Podle podmínek [SCOPE.sTreaty('relevant_treaty_scope').GetName] byli [SCOPE.sCharacter('portuguese_monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('portuguese_monarch_scope').GetFullName] a [SCOPE.sCharacter('portuguese_monarch_scope').GetHerHis] potomci navráceni na své právoplatné místo v [SCOPE.sCountry('brazil_scope').GetAdjective] linii následnictví. Jakmile [SCOPE.sCharacter('brazil_monarch_scope').GetFullName] opustí trůn, bude nad zemí [SCOPE.sCountry('brazil_scope').GetNameNoFormatting] znovu vládnout [ROOT.GetCountry.GetAdjective] panovník."
 lusofonia.1.f: "Zákon z 30. října, než byl pozměněn, stanovil, že žádný cizinec nesmí držet brazilský trůn. Vyloučil královnu Marii z linie následnictví a rozdělil rod Bragançů na dvě části - na portugalskou a na tu nezávislé Brazílie.\n\nMohl by někdo skutečně tvrdit, že kterýkoli Portugalec je cizinec? Ano, říkali nacionalisté, kteří poukazovali na nezávislé brazilské dědictví, na zneužívání moci portugalskými Cortes a na těžce vybojovanou nezávislost. Ne, říkali unionisté, kteří hlásali univerzálnost portugalské identity a její plurikontinentální dějiny. Jak by se země, která kdysi hostila portugalský dvůr, mohla kdy považovat za samostatný národ?"
 lusofonia.1.a: "Mít a držet."
 lusofonia.2.t: "$POR_ADJ_ee$ spojení"
 lusofonia.2.d: "Agenti země [SCOPE.sCountry('portugal_scope').GetName] vycítili republikánskou hrozbu pro korunu a nabídli diplomatickou pomoc na podporu [SCOPE.sCharacter('pedro_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pedro_scope').GetFullName]."
 lusofonia.2.f: "„Jsme si dobře vědomi potíží, kterým čelíte,“ řekl muž v panamském klobouku. „Brazílie dlouho těžila z velkorysosti svého císaře, a přesto někteří nemají úctu k jeho roli. Touží po monopolu na moc. A co s ním udělají?“\n\nÚředník přiložil kubánský doutník ke rtům a vyfoukl oblak kouře. Chvíli počkal, než odpověděl. „Rozdělí zemi, předpokládám. Domnívají se, že svoboda jednotlivce se nejlépe vyjadřuje svobodou provincií.“\n\nMuž v panamském klobouku přikývl. „Vaše slova, nikoli moje. Naše #italic Regeneração#! výrazně rozšířila naše možnosti. Stačí dát slovo a poskytneme vám vše, co můžeme.“"
 lusofonia.2.a: "Jejich dobrá vůle je nám drahá."
 lusofonia.2.b: "Obstojíme vlastními zásluhami."
 lusofonia.3.t: "Plurikontinentální"
 lusofonia.3.d: "Díky prozíravé diplomacii jsme získali zpět to, co bylo kdysi považováno za nenávratně ztracené. [SCOPE.sCountry('portugal_scope').GetName] a [SCOPE.sCountry('brazil_scope').GetName] jsou znovu spojeny transoceánským sňatkem."
 lusofonia.3.d2: "Rozhodnou ukázkou síly jsme získali zpět to, co bylo kdysi považováno za nenávratně ztracené. [SCOPE.sCountry('portugal_scope').GetName] a [SCOPE.sCountry('brazil_scope').GetName] jsou znovu spojeny věčnou unií."
 lusofonia.3.f: "Antônio stál s rukama za zády a sledoval, jak umělec škrábe po nákresovém papíře. To, co byly dosud hrubé tvary, se nyní začínalo měnit v něco podrobnějšího - dvě ženy zahalené do vlajek Spojeného království, Jižní kříž na obloze, pár andělských křídel. Když uhelná tužka dokončila první tah přes jejich tváře, odkašlal si.\n\n„Hm?“ řekl umělec, oči stále upřené na svou práci.\n\n„Musejí se líbat tak... vášnivě?“\n\n„Ano,“ odpověděl umělec. „Ujišťuji vás, že je to naprosto nezbytné.“"
 lusofonia.3.a: "Ať jsou naše pouta silnější než kdy dřív."
 lusofonia.3.b: "Naše je Páté impérium, a největší ze všech."
 lusofonia.4.t: "Republika meče"
 lusofonia.4.d: "V předvečer nástupu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] na trůn země [SCOPE.sCountry('brazil_scope').GetName] se [SCOPE.sCountry('brazil_scope').GetAdjectiveNoFormatting] [SCOPE.gsInterestGroup('brz_armed_forces').GetName] pokusily uchvátit moc. Vyhlásily republiku a přísahaly bránit zemi proti jakémukoli případnému cizímu vládci."
 lusofonia.4.f: "Velvyslancova tvář se zachvěla, když četl telegram. Byla mu příliš velká zima. Krb plápolal za růžovým mramorovým ohništěm, ale už ho nedokázal cítit.\n\n„Ne tady,“ řekl do prázdné místnosti. „Ne teď. Ne takhle. Trvalo to příliš dlouho...“\n\nChlad vystřídalo cosi doběla rozžhaveného. Vstal, přešel místnost a prudce otevřel dveře."
 lusofonia.4.a: "Zavolejte ministra námořnictva."
 lusofonia.4.b: "Kotvy vzhůru! Ukončíme to tady a teď."
 lusofonia.4.c: "Udělali jsme vše, co jsme mohli."
