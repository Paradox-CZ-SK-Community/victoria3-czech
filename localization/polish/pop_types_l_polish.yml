l_polish:
 aristocrats: "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon: "@aristocrats!"
 aristocrats_no_icon: "Aristokraté"
 aristocrats_desc: "Bohatí zemědělci, starý kapitál se starými vazbami. Pracují výhradně v [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', 'budovách')], kde vlastní farmy a plantáže. Něco ze svých zisků přispívají do [Concept('concept_investment_pool','investičního fondu')]. Jejich politické zájmy jsou zastoupeny jako [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."
 bureaucrats: "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon: "@bureaucrats!"
 bureaucrats_no_icon: "Byrokraté"
 bureaucrats_desc: "Úředníci odpovědní za administraci vládních funkcí a infrastruktury. Politicky jsou obvykle na straně Inteligencie alebo Maloburžoazie."
 capitalists: "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon: "@capitalists!"
 capitalists_no_icon: "Kapitalisté"
 capitalists_desc: "Hlavní představitelé průmyslu, nový kapitál pro novou éru. Pracují výhradně v [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', 'budovách')], kde vlastní doly a manufaktury. Něco ze svých zisků přispívají do [Concept('concept_investment_pool','investičního fondu')]. Jejich politické zájmy jsou zastoupeny jako [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]."
 clergymen: "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon: "@clergymen!"
 clergymen_no_icon: "Duchovní"
 clergymen_desc: "Kněží, učenci a další náboženští vůdci, kteří se starají o duchovní potřeby venkovské populace. Politicky jsou páteří Zbožných."
 clerks: "@clerks! $clerks_no_icon$"
 clerks_only_icon: "@clerks!"
 clerks_no_icon: "Úředníci"
 clerks_desc: "Úředníci na nižších pozicích vykonávající administrativní úkoly ve vládě, infrastruktuře a obchodech. Obvykle jsou ze Maloburžoazie, i když někteří se připojují k odborům."
 engineers: "@engineers! $engineers_no_icon$"
 engineers_only_icon: "@engineers!"
 engineers_no_icon: "Inženýři"
 engineers_desc: "Vynálezci a návrháři technických řešení, pracující s pokročilými stroji v sektorech jako výroba, těžba a stavebnictví. Někteří podporují Průmyslníky nebo Maloburžoazii, zatímco jiní se připojují k odborům."
 farmers: "@farmers! $farmers_no_icon$"
 farmers_only_icon: "@farmers!"
 farmers_no_icon: "Farmáři"
 farmers_desc: "Podílníci, malorolníci a další, kteří vedou stabilní, ale skromný životní styl, vyrábějící potraviny nebo pěstující plodiny na prodej. Většina vidí své zájmy zastoupené jako Venkovský lid."
 peasants: "@peasants! $peasants_no_icon$"
 peasants_only_icon: "@peasants!"
 peasants_no_icon: "Rolníci"
 peasants_desc: "Farmáři soběstačného způsobu obživy, nalezení pouze v [Concept('concept_subsistence_building', 'samozásobitelských budovách')], kde produkují zemědělské a jednoduché vyrobené produkty, které většinou používají pro vlastní potřebu. Závisí na [Concept('concept_subsistence_output','samozásobitelstvý')] pro přežití a hrají pouze omezenou roli v [Concept('concept_market','trhové')] ekonomice. Obvykle mají tendenci být [Concept('concept_politically_unaligned_aligned', 'politicky neangažovaní')]."
 laborers: "@laborers! $laborers_no_icon$"
 laborers_only_icon: "@laborers!"
 laborers_no_icon: "Dělníci"
 laborers_desc: "Dělníci na denní bázi, zemědělci a další s nízkou až žádnou pracovní jistotou, vykonávající jakoukoli dostupnou práci ve společnosti. Obvykle se nezapojí do politiky, ale mohou se zapojit prostřednictvím odborů."
 officers: "@officers! $officers_no_icon$"
 officers_only_icon: "@officers!"
 officers_no_icon: "Důstojníci"
 officers_desc: "Pověření důstojníci velebných vojenských sil národa v armádě a námořnictvu. Politicky reprezentují vyšší třídy Ozbrojených sil."
 academics: "@academics! $academics_no_icon$"
 academics_only_icon: "@academics!"
 academics_no_icon: "Akademici"
 academics_desc: "Vědci, lékaři, právníci a další vzdělaní odborníci, kteří studují a vyučují na akademických institucích. Politicky jsou v čele Inteligencie."
 shopkeepers: "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon: "@shopkeepers!"
 shopkeepers_no_icon: "Obchodníci"
 shopkeepers_desc: "Majitelé a manažeři obchodů, prodávající zboží zákazníkům ve městech. Politicky obvykle spadají do Maloburžoazie."
 slaves: "@slaves! $slaves_no_icon$"
 slaves_only_icon: "@slaves!"
 slaves_no_icon: "Otroci"
 slaves_desc: "Bráni ne jako osoby, ale jako majetek, vykonávající nucené práce v různých sektorech v zemích, kde je otroctví povoleno. Kvůli svému statusu jim není dovoleno politicky se angažovat."
 soldiers: "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon: "@soldiers!"
 soldiers_no_icon: "Vojáci"
 soldiers_desc: "Vojáci a námořníci tvořící většinu vojenského personálu národa. Politicky jsou běžně nakloněný se svou rolí v Ozbrojených silách."
 machinists: "@machinists! $machinists_no_icon$"
 machinists_only_icon: "@machinists!"
 machinists_no_icon: "Strojníci"
 machinists_desc: "Manuální pracovníci se stabilním zaměstnáním, kteří ovládají stroje v manufakturách, dolech, mechanizovaných farmách a dalších sektorech. Politicky mají tendenci být hnací silou odborů."
 ACADEMICS_QUALIFICATIONS_DESC: "Pouze popy s dostatečnou [concept_literacy] se mohou stát #v $academics$#!. Potenciál se zvyšuje s vyšší [concept_literacy] a [concept_wealth]. Popy, jejichž [concept_culture] mají nízké [concept_acceptance], potřebují mnohem více času. #v $clerks$#! a #v $aristocrats$#! mají obzvlášť snadnou cestu stát se #v $academics$#!" # todo: NEW TRANSLATION
 ARISTOCRATS_QUALIFICATIONS_DESC: "Pouze členové populace s adekvátním [Concept('concept_wealth','bohatstvím')] se mohou stát #v @aristocrats! aristokraty#!. Potenciál se zvyšuje s vyšším [Concept('concept_wealth','bohatstvím')] a v menší míře s [Concept('concept_literacy','gramotností')]. Členové populace, jejichž [Concept('concept_culture','kultura')] má nízké [Concept('concept_acceptance','přijetí')], se stávají #v @aristocrats! aristokraty#! mnohem pomaleji. #v @officers! Důstojníci#! a #v @bureaucrats! byrokraté#! mají obzvlášť snadnou cestu stát se #v @aristocrats! aristokraty#!."
 BUREAUCRATS_QUALIFICATIONS_DESC: "Pouze členové populace s adekvátní [Concept('concept_literacy','gramotností')] se mohou stát #v @bureaucrats! byrokraty#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')]. Členové populace, jejichž [Concept('concept_culture','kultura')] má nízké [Concept('concept_acceptance','přijetí')], se stávají #v @bureaucrats! byrokraty#! mnohem pomaleji, zatímco ti s vysokým [Concept('concept_acceptance','přijetím')] se jimi stávají rychleji, zejména pokud sdílejí [Concept('concept_culture','kulturu')] a [Concept('concept_religion','náboženství')]. #v @clerks! Úředníci#! a #v @clergymen! duchovní#! mají obzvlášť snadnou cestu stát se #v @bureaucrats! byrokraty#!."
 CAPITALISTS_QUALIFICATIONS_DESC: "Pouze členové populace s adekvátním [Concept('concept_wealth','bohatstvím')] se mohou stát #v @capitalists! kapitalisty#!. Potenciál se zvyšuje s vyšším [Concept('concept_wealth','bohatstvím')] a [Concept('concept_literacy','gramotností')]. Členové populace, jejichž [Concept('concept_culture','kultura')] má nízké [Concept('concept_acceptance','přijetí')], se stávají #v @capitalists! kapitalisty#! mnohem pomaleji. #v @shopkeepers! Obchodníci#! a #v @engineers! inženýry#! mají obzvlášť snadnou cestu stát se #v @capitalists! kapitalisty#!."
 CLERGYMEN_QUALIFICATIONS_DESC: "Pouze členové populace s adekvátní [Concept('concept_literacy','gramotností')] se mohou stát #v @clergymen! duchovními#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')]. Členové populace, jejichž [Concept('concept_religion','náboženství')] má nízké [Concept('concept_acceptance','přijetí')], se stávají #v @clergymen! duchovními#! mnohem pomaleji, zatímco ti s vysokým [Concept('concept_acceptance','přijetím')] se jimi stávají rychleji. #v @academics! Akademici#! a #v @aristocrats! aristokraté#! mají obzvlášť snadnou cestu stát se #v @clergymen! duchovními#!."
 CLERKS_QUALIFICATIONS_DESC: "Každý člen populace se může stát #v @clerks! úředníky#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')]. #v @laborers! Dělníci#! mají obzvlášť snadnou cestu stát se #v @clerks! úředníky#!."
 ENGINEERS_QUALIFICATIONS_DESC: "Pouze členové populace s adekvátní [Concept('concept_literacy','gramotností')] se mohou stát #v @engineers! inženýry#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')] a [Concept('concept_wealth','bohatstvím')]. #v @machinists! strojníky#! a #v @clerks! úředníky#! mají obzvlášť snadnou cestu stát se #v @engineers! inženýry#!."
 FARMERS_QUALIFICATIONS_DESC: "Každý člen populace se může stát #v @farmers! farmáři#!. Potenciál se zvyšuje s vyšším [Concept('concept_wealth','bohatstvím')]. #v @peasants! Rolníci#! a #v @laborers! dělníci#! mají obzvlášť snadnou cestu stát se #v @farmers! farmáři#!."
 MACHINISTS_QUALIFICATIONS_DESC: "Členové populace s minimální [Concept('concept_literacy','gramotností')] se mohou stát #v @machinists! strojníky#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')]. #v @laborers! Dělníci#! mají obzvlášť snadnou cestu stát se #v @machinists! strojníky#!."
 OFFICERS_QUALIFICATIONS_DESC: "Pouze #v @soldiers! vojáci#! nebo členové populace, jejichž [Concept('concept_culture','kultura')] má dostatečné [Concept('concept_acceptance','přijetí')], se mohou stát #v @officers! důstojníky#!. Potenciál se zvyšuje s vyšší [Concept('concept_literacy','gramotností')]. #v @aristocrats! aristokraty#! mají obzvlášť snadnou cestu stát se #v @officers! důstojníky#!."
 SHOPKEEPERS_QUALIFICATIONS_DESC: "Pouze členové populace s určitým [Concept('concept_wealth','bohatstvím')] se mohou stát #v @shopkeepers! obchodníky#!. Potenciál se zvyšuje s vyšším [Concept('concept_wealth','bohatstvím')]. #v @clerks! Úředníci#! a #v @farmers! farmáři#! mají obzvlášť snadnou cestu stát se #v @shopkeepers! obchodníky#!."
