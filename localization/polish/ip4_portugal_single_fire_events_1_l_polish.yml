l_polish:
 portugal_single_fire_events.1.t: "Výstavba Grémio Literário"
 portugal_single_fire_events.1.d: "Členové [SCOPE.gsInterestGroup('intelligentsia_scope').GetName] propagují myšlenku založení soukromého literárního klubu s názvem „Grémio Literário“. Požádali o finanční a politickou podporu, aby tuto vizi uvedli v život."
 portugal_single_fire_events.1.f: "„[ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], z Boží milosti [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFormatting] a všech jejích dominií,\n\nNechť je známo všem, kdo obdrží mou chartu: že vzhledem k tomu, co mi bylo předloženo Státní radou prostřednictvím čestného ministra a státního sekretáře Rodriga da Fonsecy Magalhãese, v jeho postavení prezidenta komise pověřené vypracováním stanov společnosti zvané Grémio Literário...“"
 portugal_single_fire_events.1.a: "Máte náš štědrý souhlas."
 portugal_single_fire_events.1.b: "Žadonění není cesta k hledání poznání."
 portugal_single_fire_events.2.t: "Azylové ústavy státu [SCOPE.sState('azores_state_scope').GetName]"
 portugal_single_fire_events.2.d: "Sekulární [SCOPE.gsInterestGroup('intelligentsia_scope').GetName] znepokojily zprávy o Azylu pro znevýhodněné dětství v Hortě, který indoktrinuje nezletilé náboženským fanatismem. Požadují kroky k ochraně mládeže před náboženským dogmatem."
 portugal_single_fire_events.2.f: "„Nám liberálům se říká, abychom drželi jazyk za zuby – že jde o charitu, že sytí hladové, že #italic mravní zdokonalení#! je neoddělitelné od evangelia podle svatého Antonína. Odpovídáme: existuje charita, která osvobozuje, a charita, která spoutává. Toto je ta druhá.“"
 portugal_single_fire_events.2.a: "[SCOPE.gsInterestGroup('devout_scope').GetName] mají plné právo formovat příští generaci [SCOPE.GetRootScope.GetCountry.GetAdjective] vlastenců."
 portugal_single_fire_events.2.b: "Pravda, tohle zašlo příliš daleko."
 portugal_single_fire_events.2.c: "Vyřešte si to mezi sebou."
 portugal_single_fire_events.3.t: "Vrah z akvaduktu"
 portugal_single_fire_events.3.d: "Objevilo se několik zpráv o sériovém vrahovi známém jako „vrah z akvaduktu“. Údajně zabil desítky obětí tím, že je shodil z akvaduktu Águas Livres. Veřejnost požaduje okamžitý zásah."
 portugal_single_fire_events.3.f: "Světlo luceren se chvělo ve vlhkém předúsvitu a odráželo se od kluzkého kamene. Boty dutě zněly o oblouk akvaduktu, zatímco říční vítr čeřil ticho pod ním. Pak se tam, kde se okraj temnoty setkával s propastí, objevila bledá nehybná postava."
 portugal_single_fire_events.3.a: "Okamžitě vyslat zkušené strážce zákona."
 portugal_single_fire_events.3.b: "Na přesně takový případ máme vycvičené odborníky."
 portugal_single_fire_events.3.c: "Zinscenovat veřejné divadlo a obětovat statečnou duši."
 portugal_single_fire_events.3.e: "Vražda?! Každý přece ví, že akvadukt je místo, kde následujete volání prázdnoty."
 portugal_single_fire_events.4.t: "Vinná plíseň"
 portugal_single_fire_events.4.d: "Vinice ve státě [SCOPE.sState('madeira_state_scope').GetName] zasáhla epidemie padlí, která ochromila výrobu slavného madeirského vína. Zahraniční obchodníci začali v panice opouštět ostrov."
 portugal_single_fire_events.4.f: "„Mezi všemi víny vyrobenými za posledních pět set let vyniká madeirské víno jako nejcharakterističtější pro svou dobu i místo; jde o mimořádný nápoj vytvořený ohněm a žárem. Jeho réva, živená popelem prastarého lesa spáleného před pěti stoletími, je zakořeněna v kamenité půdě vzniklé ze sopečných erupcí, k nimž došlo přibližně před 14 miliony let.“"
 portugal_single_fire_events.4.a: "Poslat vědce, aby provedli výzkum a rychle přišli s řešením."
 portugal_single_fire_events.4.b: "Odškodnit obchodníky, než odejdou."
 portugal_single_fire_events.4.c: "Pozvedněme ruce a pohlédněme k nebi."
 portugal_single_fire_events.5.t: "Zoologická zahrada"
 portugal_single_fire_events.5.d: "Skupina zapálených lékařů připravila podrobné plány pro první zoologickou zahradu ve státě [SCOPE.sState('capital_scope').GetName]. Přejí si souhlas a podporu vlády, aby mohli projekt uskutečnit."
 portugal_single_fire_events.5.f: "Chlapec pevně držel matčinu ruku v rukavici a očima přejížděl od houpajícího se chobotu slona k třpytu zeleno-zlatého peří nad sebou. Každá klec působila jako brána do jiného světa. Opice skákající jako živé ohňostroje, zívnutí lva mu dunělo v hrudi.\n\nV tu chvíli mu [SCOPE.sState('capital_scope').GetNameNoFormatting] připadal stejně rozlehlý jako mapy v jeho školní učebnici."
 portugal_single_fire_events.5.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] souhlasí."
 portugal_single_fire_events.5.b: "Co bude dál, parlament pro papoušky?"
 portugal_single_fire_events.6.t: "Ženy červů"
 portugal_single_fire_events.6.d: "Dvě lidové léčitelky ze státu [SCOPE.sState('shanghai_state_scope').GetName] působily v hotelu ve státě [SCOPE.sState('capital_scope').GetName] a tvrdily, že dokážou léčit potíže se zrakem alternativními metodami. Guvernér, sám lékař, se je pokusil zastavit, ale námitky místních se staly otázkou veřejného pořádku."
 portugal_single_fire_events.6.f: "„Říká se, že je to jedno z těch východních zaklínadel, která žádají o pomoc démonické skřety, temnou magii a podobné věci. Raději zůstanu slepá, než abych potom každý den viděla ďábla. Ano... Ne, děkuji.“\n\nGlória ji ostře zarazila. „Copak už teď každé ráno nevidíš ďábla vedle sebe, Maro? Jaký je v tom, proboha, rozdíl?“"
 portugal_single_fire_events.6.a: "Označit je za čarodějnice a udělat s takovými jedinci vše, co je nezbytné."
 portugal_single_fire_events.6.b: "Přinutit guvernéra, aby dámy nechal být, a zmírnit tak napětí."
 portugal_single_fire_events.6.c: "Ať se s nimi vypořádá [SCOPE.sCountry('shanghai_owner_scope').GetName], deportujte tu dvojici."
