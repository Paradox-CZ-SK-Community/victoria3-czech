 laws_police.1.t: "O vlásek"
 laws_police.1.d: "Kulka atentátníka dnes ráno jen těsně minula ministra z [SCOPE.gsInterestGroup('assassination_target_ig').GetName], což vyvolalo výzvy k rychlému prosazení zákonů [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.gsInterestGroup('they_dont_like_laws_ig').GetName], odpůrci [SCOPE.sLaw('current_law_scope').GetName], jsou navíc obviňováni z nepřímé podpory atentátníka."
 laws_police.1.f: "„Tento téměř smrtelný incident je jen poslední z dlouhé řady. Pokud něco neuděláme dnes, tak kdy? Kolik lidí musí být ještě zraněno, než začneme jednat?“"
 laws_police.1.a: "Musíme chránit vlastní lidi."
 laws_police.1.b: "Ti, kdo se staví proti pořádku, musí být pokáráni."
 laws_police.2.t: "Novinové polemiky o policii"
 laws_police.2.d: "Národní snaha o zavedení [SCOPE.sLaw('current_law_scope').GetName] se stala předmětem sporů mezi stranickými novinami a může narušit legislativní proces."
 laws_police.2.f: "„Vážený redaktore,\n\njako soukromý občan, který rozhodně není spojen s probíhajícím národním sporem o tuto legislativu, bych rád napsal několik slov...“"
 laws_police.2.a: "Nechme noviny psát, co chtějí."
 laws_police.2.b: "Vydat vlastní články do novin."
 laws_police.2.c: "Noviny už k tomu řekly dost."
 laws_police.3.t: "Shromáždění brutálně potlačeno"
 laws_police.3.d: "Převážně pokojná demonstrace za [SCOPE.sPoliticalMovement('rally_movement').GetName] byla násilně rozehnána místní milicí. [SCOPE.gsInterestGroup('rally_movement_ig').GetName], významný podporovatel hnutí, je z násilí obzvlášť pobouřen. Incident přiměl mnohé zpochybnit moudrost zavedení stálých bezpečnostních složek s právem používat sílu."
 laws_police.3.f: "„Zlosynové, řezníci, tasili své sekery, které již páchnou krví nevinných. Je tohle ta ‚spravedlnost‘, kterou chcete šířit po celé zemi? Pokud vláda nepohne se svými ministry k odpovědnosti a neuleví lidu, bude jistě svržena.“"
 laws_police.3.a: "Možná je teď potřeba čas na zamyšlení."
 laws_police.3.b: "Nesmíme dopustit, aby se to rozšířilo – zakročit proti [SCOPE.sPoliticalMovement('rally_movement').GetName]."
 laws_police.3.c: "Právě proto potřebujeme [SCOPE.sLaw('current_law_scope').GetName] místo těchto surovců!"
