 je_railroads_status: "Zajistit železniční dopravu pro náš průmysl."
 je_railroads_reason: "Naše nové železnice by měly být zásobovány dopravou z menších tratí, abychom plně využili jejich kapacity."
 engine_production_modifier: "Rozmach lokomotiv"
 railway_production_modifier: "Dopravní boom"
 production_tech_events.501.t: "Železniční boom"
 production_tech_events.501.d: "Růst vedlejších tratí podél hlavních železničních tras byl nesmírně přínosný pro rozvoj našeho rychle rostoucího železničního průmyslu."
 production_tech_events.501.f: "„Dítě bylo zatčeno za sbírání uhlí podél nově položených kolejí. Kdyby bylo dost chytré na to, aby ukradlo celou železnici, bylo by oslavováno jako Napoleon průmyslu.“"
 production_tech_events.501.a: "Železnice v [SCOPE.sState('railway_state').GetName] budou vzkvétat."
 production_tech_events.501.b: "Výrobci lokomotiv v [SCOPE.sState('engine_state').GetName] by měli z tohoto rozmachu těžit."
 production_tech_events.501.c: "Neusínejme na vavřínech, ale hleďme do budoucnosti!"
 je_indian_removal_resolve_the_chain: "Ukončit probíhající proces vystěhování buď jeho zastavením, nebo dokončením."
 slavery_law_events.1.t: "Klasický argument pro okovy"
 slavery_law_events.1.d: "[SCOPE.sCharacter('slaver_ig_leader_scope').GetFullName], vůdce [SCOPE.gsInterestGroup('slaver_ig_scope').GetName], pronesl dobře přijatý projev o klasických základech [SCOPE.sLaw('current_law_scope').GetName] a jeho historické legitimitě."
 slavery_law_events.1.f: "„Od samého počátku civilizace člověk zotročoval člověka. To byl vždy přirozený řád věcí a nevidím důvod, proč bychom měli přírodu nyní opouštět.“"
 slavery_law_events.1.a: "Prosadit [SCOPE.sCharacter('slaver_ig_leader_scope').GetFullName] jako vůdce lidu."
 slavery_law_events.1.b: "Chválit [SCOPE.gsInterestGroup('slaver_ig_scope').GetName] jako pěstitele velkých myslí." 
 slavery_law_events.2.t: "Hypoteticky o otroctví"
 slavery_law_events.2.d: "[SCOPE.sCharacter('slaver_ig_leader_scope')], vůdce [SCOPE.gsInterestGroup('slaver_ig_scope').GetName], vyjádřil zájem obhajovat otroctví ve veřejné debatě. Teoretická debata však nemusí dopadnout tak dobře, jak [SCOPE.sCharacter('slaver_ig_leader_scope').GetSheHe] doufá."
 slavery_law_events.2.f: "„Diskutujte se mnou! Řekněme hypoteticky, že bych obhajoval otroctví a vy byste mi oponovali, i když byste se mýlili. Diskutujte se mnou!“"
 slavery_law_events.2.a: "Není třeba pořádat veřejnou debatu."
 slavery_law_events.2.b: "[SCOPE.sCharacter('slaver_ig_leader_scope').GetFullName] může mít svou veřejnou debatu." 
 slavery_law_events.3.t: "Importované otrocké příběhy"
 slavery_law_events.3.d: "Vlna knih napsaných bývalými otroky ze zahraničí byla nedávno vydána v [SCOPE.GetRootScope.GetCountry.GetName] a popisuje hrůzné podmínky, kterým čelili. To otřáslo důvěrou veřejnosti ve snahy o zavedení [SCOPE.sLaw('current_law_scope').GetName]."
 slavery_law_events.3.f: "„Bylo navrženo, že vyprávění o mém životě a neštěstích v okovech by mohlo veřejnost zajímat. Od získání své svobody jsem si nemohl nevšimnout rostoucího zájmu o otázku otroctví...“"
 slavery_law_events.3.a: "To je jen drobná, snesitelná překážka v našich plánech."
 slavery_law_events.3.b: "Musíme tento pomlouvačný materiál veřejně zpochybnit!" 
 slavery_law_events.4.t: "Život mezi poníženými"
 slavery_law_events.4.d: "[SCOPE.sCharacter('abolitionist_ig_leader_scope').GetFullName], vůdce [SCOPE.gsInterestGroup('abolitionist_ig_scope').GetName], napsal senzační příběh o životě na otrokářské plantáži."
 slavery_law_events.4.f: "„Pozdě odpoledne chladného únorového dne seděli dva pánové blízko u sebe a zdálo se, že s velkou vážností diskutují. Pro pohodlí říkáme dva pánové. Jeden z nich však, jakmile začal mluvit o své plantáži, si označení ‚pán‘ příliš nezasloužil.“"
 slavery_law_events.4.a: "Oslavovat [SCOPE.sCharacter('abolitionist_ig_leader_scope').GetFullName] jako významného autora."
 slavery_law_events.4.b: "Podporovat [SCOPE.gsInterestGroup('abolitionist_ig_scope').GetName] jako vydavatele protiotrokářských děl." 
 slavery_law_events.5.t: "Velké debaty"
 slavery_law_events.5.d: "[SCOPE.sCharacter('abolitionist_ig_scope')] navrhl uspořádat sérii debat o výhodách zrušení otroctví. Pokud debaty dopadnou dobře, [SCOPE.gsInterestGroup('abolitionist_ig_scope').GetName] i samotná věc abolicionismu posílí."
 slavery_law_events.5.f: "„Je to věčný boj mezi dvěma principy — správným a nesprávným — po celém světě. Otroctví je vždy tím stejným nesprávným a tyranským principem, bez ohledu na podobu.“"
 slavery_law_events.5.a: "Veřejná debata představuje příliš velké riziko. Nemůžeme ji dovolit."
 slavery_law_events.5.b: "Povolit veřejné debaty o zrušení otroctví." 
 slavery_law_events.6.t: "Zastánci plantáží propagují své názory"
 slavery_law_events.6.d: "Obhájci pokračujícího otroctví zveřejnili vlnu pamfletů, traktátů a senzačních fiktivních příběhů na podporu své věci. Množství, i když ne kvalita, těchto děl otřáslo důvěrou veřejnosti v abolicionismus."
 slavery_law_events.6.f: "„Je mou povinností a nezbytností ve veřejném zájmu odstranit předsudky vůči zvláštním institucím našeho národa co nejdříve. Zrušit instituci, která existovala po všechny věky — proč! Taková troufalost se může rovnat jen své pošetilosti.“"
 slavery_law_events.6.a: "Nechme otrokáře mluvit prázdná slova."
 slavery_law_events.6.b: "Tyto publikace jsou plné zla a lží a musí být zpochybněny."
