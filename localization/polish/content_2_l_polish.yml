 je_submarines: "Válka pod hladinou"
 je_submarines_reason: "Pokroky v technologii ponorek znamenají, že námořní válka se již nemusí vést pouze na hladině moře."
 naval_tech_events.4.t: "Nadvláda ponorek"
 naval_tech_events.4.d: "Rostoucí využití ponorek ve válce vytvořilo novou generaci velitelů, jako je [SCOPE.sCharacter('submarine_commander').GetFullName], kteří velmi dobře rozumějí podmořskému boji."
 naval_tech_events.4.f: "„Moře je nekonečné, a přesto se jen pohupujeme na jeho hladině, nevědomí hlubin pod námi. Dokážete si představit, jakou moc bychom měli, kdybychom tento bezedný prostor ovládli a udeřili na ty hlupáky na hladině, kdykoli bychom chtěli?“"
 naval_tech_events.4.a: "Naše ponorky uškrtí naše nepřátele!"
 naval_tech_events.4.b: "Naučme se, jak se proti těmto plavidlům bránit."
 naval_tech_events.4.c: "Vyzdvihnout schopnosti [SCOPE.sCharacter('submarine_commander').GetLastName] jako velitele."
 naval_tech_events.4.e: "Propagovat [SCOPE.sCharacter('submarine_commander').GetLastName] jako charismatického hrdinu nové éry."
 unrestricted_submarine_warfare: "Neomezená ponorková válka"
 je_carriers: "Nad vlnami"
 je_carriers_reason: "Průlomy v námořní a letecké technologii vytvořily nové plavidlo: letadlovou loď. Tato loď nese letadla místo torpéd a děl. Její skutečný bojový potenciál zatím není plně znám, ale její konstrukce je velmi slibná."
 naval_tech_events.5.t: "Ukázka bombardování"
 naval_tech_events.5.d: "[SCOPE.sCharacter('aviator_commander').GetFullName], významný zastánce námořního letectva, uspořádal sérii cvičení, během nichž letadla startující z lodí bombardovala vyřazené vraky."
 naval_tech_events.5.f: "„Žádná loď nemůže uniknout zkáze způsobené útokem letadel shora — nejúčinnější námořní zbraní budoucnosti bude bomba z nebe, nikoli granát z děla. Toto cvičení jasně ukázalo, že letadla budou mečem i štítem námořnictva zítřka.“"
 naval_tech_events.5.a: "Žádné námořnictvo nebude tak pokročilé jako naše!"
 naval_tech_events.5.b: "Ten důstojník zesměšnil službu! Odvolejte [SCOPE.sCharacter('aviator_commander').GetFullName]."
 naval_tech_events.5.c: "[SCOPE.sCharacter('aviator_commander').GetFullName] by mohl lépe prosazovat své myšlenky ve vládě."
 naval_tech_events.5.e: "Pozemní síly musí držet krok s námořní technologií."
 naval_traditions_upheld: "Námořní tradice zachovány"
 je_unite_the_principalities: "Sjednotit knížectví"
 je_unite_the_principalities_reason: "Podunajská knížectví se probudila z dlouhé letargie. Práva a zájmy vlasti volají po osvobození; dobro a štěstí rumunského národa vyžaduje čin! Musíme usilovat o sjednocení a pomoci vybudovat jednotný stát. Je však třeba postupovat opatrně — nesmíme rozhněvat žádnou [Concept('concept_great_power', '$concept_great_powers$')]."
 je_unite_the_principalities_button: "Prosadit sjednocení"
 je_unite_the_principalities_button_desc: "Prvním krokem ke sjednocení rumunského národa je ustanovení společného vládce. Společné vedení, i když státy zůstanou formálně oddělené, výrazně napomůže sjednocení."
 je_unite_the_principalities_united_two_principalities_tt: "[SCOPE.GetRootScope.GetCountry.GetName] vytvořil [concept_personal_union] s jinou #bold rumunskou#! zemí nebo ji učinil [concept_puppet] zemí [SCOPE.GetRootScope.GetCountry.GetName]."
 je_unite_the_principalities_friend_with_all_great_powers_tt: "[SCOPE.GetRootScope.GetCountry.GetName] má #bold pozitivní#! vztahy se všemi [concept_great_power], které mají v regionu [concept_interest]."
 je_unite_the_principalities_no_other_romanians_tt: "Neexistují žádné další #bold rumunské#! země ke sjednocení."
 je_unite_the_principalities_romania_is_real_tt: "#bold Rumunsko#! již vzniklo."
 je_unite_the_principalities_amicable_or_better_relations_tt: "[SCOPE.GetRootScope.GetCountry.GetName] má #bold přátelské#! nebo lepší vztahy s jinou #bold rumunskou#! zemí a obě jsou buď nezávislé, nebo pod stejným vládcem."
 je_all_for_one: "Všichni za jednoho"
 je_all_for_one_reason: "Společně jsme silnější. Musíme udržet naši křehkou unii a proměnit ji v jednotné Rumunsko."
 je_all_for_one_goal: "Udržet unii knížectví po dobu 10 let"
 je_south_bessarabian_retrocession_button: "Navrácení jižní Besarábie"
 je_south_bessarabian_retrocession_button_desc: "Moldavsko kdysi ovládalo území s přístupem k moři. Znovuzískání tohoto území by nám umožnilo zapojit se do obchodu na Černém moři."
 je_south_bessarabian_retrocession_button_tt1: "[SCOPE.GetRootScope.GetCountry.GetName] musí mít #bold přátelské#! vztahy s [concept_great_power], která #bold nevlastní#! #bold Besarábii#!."
 je_south_bessarabian_retrocession_button_tt2: "#bold Besarábie#! musí být pod kontrolou země, která má #bold pozitivní#! vztahy s [SCOPE.GetRootScope.GetCountry.GetName]."
 je_marea_unire_button: "Marea Unire"
 je_marea_unire_button_desc: "Velké sjednocení všech rumunských národů vyžaduje nejen sjednocení podunajských knížectví, ale i všech rumunských zemí — včetně Transylvánie."
 rom_annex_trs: "Dokončit Velké sjednocení"
 rom_annex_trs_desc: "Rumunský národ není úplný bez začlenění Transylvánie. Pokud by tato země byla alespoň v naší sféře vlivu, měli bychom—musíme!—usilovat o její plné začlenění."
 romania.1.t: "Rumunské vyhlášení sjednocení"
 romania.1.d: "[SCOPE.sCountry('romania_unifier').GetName] se prohlašuje sjednotitelem Rumunska a usiluje o vytvoření unie s ostatními rumunskými knížectvími v regionu."
 romania.1.f: "„Prohlašujeme se za skutečné představitele národa, dědice bohaté země a živé historie. Toto naplnění posvátné touhy nám zajistí přízeň budoucích generací a nebudeme tolerovat žádný odpor — toto je naše země a toto je náš osud.“"
 romania.1.a: "Toto sjednocení vítáme a budeme dodržovat dohody s [SCOPE.sCountry('romania_unifier').GetAltAdjective('I')]."
 romania.1.b: "S tímto nesouhlasíme! [SCOPE.sCountry('romania_unifier').GetName] musí být za své činy odsouzen."
 romania.2.t: "Naše vyhlášení sjednocení"
 romania.2.d: "Díky naší síle a důvtipu jsme učinili první kroky ke sjednocení rumunského národa. Budoucnost nás volá!"
 romania.2.f: "Reportér začal zapisovat události dne. „Celým hlavním městem se neslo jen to nejživější nadšení. Byla to jediná podívaná na všech ulicích, chodnících i veřejných prostranstvích. Naši rolní bratři nyní z plných sil volali: '#italic Ať žije národ! Ať žije Rumunsko!#!'“\n\nJedna radostná slza mu sklouzla po tváři. „Všichni si padali do náruče bez ohledu na postavení, jako by se každý zbavil toho nejtěžšího jha.“"
 romania.2.a: "Toți în unu!"
 romania.2.a.tta: "[SCOPE.sCountry('romania_lesser_partner').GetName] se stane menším členem [concept_personal_union] s námi."
 romania.2.a.ttb: "[SCOPE.sCountry('romania_lesser_partner').GetName] se stane naší [concept_puppet]."
 romania.3.t: "Procitni, Rumune!"
 romania.3.d: "Naše unie s [SCOPE.sCountry('romania_lesser_union_partner').GetAltAdjective('I')] je dokončena. Naše pouta jsou pevná, naše vůle neochvějná — společně jsme #bold Rumunsko#!."
 romania.3.d2: "Naše unie s [SCOPE.sCountry('romania_lesser_union_partner').GetAltAdjective('I')] a [SCOPE.sCountry('transylvania_union_partner').GetAltAdjective('I')] je dokončena. Naše pouta jsou pevná, naše vůle neochvějná — společně jsme #bold Rumunsko#!."
 romania.3.f: "„Procitni, Rumune, ze spánku smrti,“ burácel dav.\n\n„Do něhož tě uvrhli barbarští tyrani.\nNyní či nikdy si vytvoř nový osud,\npřed nímž se skloní i tví krutí nepřátelé!“\n\nTrikolóry vlály ve větru. Děti byly zvedány do vzduchu, aby si ten okamžik zapamatovaly. Lidé společně zpívali píseň, kterou nikdy předtím neslyšeli, ale její slova již znali ve svých srdcích."
 romania.3.a: "Jednota v životě a bratrství ve smrti!"
 romania.4.t: "Navrácení jižní Besarábie"
 romania.4.d: "S podporou velmoci žádá [SCOPE.sCountry('romanian_bessarabia_receiver').GetName] o část území v [SCOPE.sState('south_bessarabia_cession').GetName] — území dříve spravovaného Moldavskem — aby získala přístup k Černému moři. Vyslanci nás informovali, že bychom si tím získali vděčnost rumunského národa."
 romania.4.f: "„Jakým státem bychom byli bez přístupu k moři? Cahul, Bolgrad a Izmajil by výrazně přispěly k naší prosperitě i vaší budoucnosti.“"
 romania.4.a: "Postoupení [SCOPE.sState('south_bessarabia_cession').GetName] si můžeme dovolit."
 romania.4.b: "[SCOPE.sState('south_bessarabia_cession').GetName] je a zůstane naše, ne jejich!"
 scramble_for_africa_complete_2_tt: "#header 95%#! [Concept('concept_state_region','$concept_state_regions$')] v [GetGeographicRegion('geographic_region_africa').GetName] musí být plně vlastněno [Concept('concept_recognized_power','$concept_recognized_powers$')] nebo jejich [Concept('concept_subject','$concept_subjects$')]"
 scramble_for_africa_fail_tt: "[ROOT.GetCountry.GetName] nemá žádný [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] ani [Concept('concept_subject','$concept_subjects$')] na africkém kontinentu"
 je_unite_the_nations: "Národy Želvího ostrova"
 je_unite_the_nations_reason: "Abychom my i naši bratři přežili, musíme se spojit. Jen jednotní dokážeme odolat postupům kolonizačních mocností, diplomatickým i násilným."
 je_unite_the_nations_proclaim_turtle_island_button: "Vyhlásit Želví ostrov"
 je_unite_the_nations_proclaim_turtle_island_button_desc: "Společně jsme mnohem silnější než jakýkoli jednotlivý národ. Staneme se centrem odporu, výzvou proti těm, kteří nás utlačují a zasahují do všeho, co je nám drahé."
 je_unite_the_nations_organize_the_tribes_button: "Zorganizovat kmeny"
 je_unite_the_nations_organize_the_tribes_button_desc: "Prostřednictvím vyslanců a přímé pomoci můžeme podpořit přetvoření spřátelených národů do odolnější podoby vůči vnějším tlakům."
 je_unite_the_nations_offer_confederation_button: "Nabídnout konfederaci"
 je_unite_the_nations_offer_confederation_button_desc: "Naše věc je společnou věcí všech národů této země; je přirozené, že se k nám naši bratři připojí."
 supporting_reform_efforts_among_brothers: "Podpora reforem mezi bratry"
 je_unite_the_nations_complete_tt: "Všechny [Concept('concept_decentralized_nation','$concept_decentralized_nations$')] v #bold Severní Americe#! byly buď anektovány námi, nebo kolonizovány cizími mocnostmi."
 je_unite_the_nations_organize_the_tribes_tt: "Převedeme sousední [concept_decentralized_nation] s nejvyšším [concept_gdp], který s námi sousedí, na [concept_unrecognized_power]."
 je_unite_the_nations_offer_confederation_tt: "Nabídneme konfederaci domorodému národu s nejvyšším [concept_gdp], který s námi sousedí."
 turtle_island_state_of_nations: "Stát mnoha národů"
 je_seminole_wars: "Seminolské války"
 je_seminole_wars_reason: "Podle smlouvy Adams–Onís patří Florida nám a podle smlouvy z Payne’s Landing mají být [SCOPE.sCountry('seminoles').GetName] přesídleni na západ. Ti však odmítají. Musíme získat plnou kontrolu nad Floridou."
 je_seminole_wars_removal: "Každý [SCOPE.sCulture('seminole_peoples').GetName] [concept_pop] ve státě [SCOPE.sState('flarda').GetName] se přesune do oblasti [SCOPE.sStateRegion('oklahoma_region').GetName]"
 native_resettlement.7.t: "Seminolský mír"
 native_resettlement.7.d: "Naše vítězství na Floridě přinutilo [SCOPE.sCulture('seminole_people').GetName] vzdát se posledních útočišť. Nyní můžeme budovat novou budoucnost."
 native_resettlement.7.f: "Uprchli hlouběji do bažin mezi cypřiše. Doufali, že jednou bude bezpečné žít mimo ně. Prozatím přežívali."
 native_resettlement.7.a: "Smlouva z Payne’s Landing byla naplněna."
 florida_resettlement: "Přesídlení Floridy"
 anti_expedition_war: "Válka proti expedici"
 je_lion_of_the_zanj: "Páni Zandže"
 je_lion_of_the_zanj_reason: "Naše kontrola nad východní Afrikou je spíše iluzorní než skutečná. Musíme ji upevnit diplomacií nebo silou, jinak se naše říše může zhroutit."
 je_lion_of_the_zanj_claims: "[ROOT.GetCountry.GetName] získá [Concept('concept_claim', '$concept_claims$')] na tyto [concept_state_region], pokud nejsou plně vlastněny:\n• [SCOPE.sStateRegion('kenya_region').GetName]\n• [SCOPE.sStateRegion('rift_valley_region').GetName]\n• [SCOPE.sStateRegion('zanzibar_region').GetName]\n• [SCOPE.sStateRegion('tanganyika_region').GetName]\n• [SCOPE.sStateRegion('lindi_region').GetName]"
 je_lion_of_the_zanj_homelands_swahili: "Pokud všech pět [Concept('concept_state_region', '$concept_state_regions$')] plně ovládáme, některé se stanou [SCOPE.sCulture('swahili_scope').GetName] [Concept('concept_homeland','$concept_homelands$')]"
 je_lion_of_the_zanj_homelands_bedouin: "Pokud všech pět oblastí plně ovládáme, [SCOPE.sStateRegion('zanzibar_region').GetName] se stane [SCOPE.sCulture('omani_scope').GetName] [concept_homeland]"
 je_lion_of_the_zanj_fail: "Jakýkoli stát mimo Afriku kontroluje území v těchto oblastech:"
 je_lion_of_the_zanj_loss_of_territory: "Ztratíme kontrolu nad územími ve prospěch kolonizátorů nebo vzniknou nezávislé státy."
 zanzibar.2.t: "[SCOPE.sCountry('deag_scope').GetAltAdjective('aa')] východoafrická společnost"
 zanzibar.2.d: "Někteří podnikaví průzkumníci a obchodníci napojení na koloniální zájmy tvrdí, že by bylo snadné podkopat autoritu [SCOPE.sCountry('zanzibar_scope').GetAdjectiveNoFormatting] v Africe tím, že by přímo uzavírali smlouvy s místními náčelníky v regionu. Podle všeho je autorita [SCOPE.sCountry('zanzibar_scope').GetNameNoFormatting] mimořádně slabá — pokud to dopustíme, povede to k tomu, že získáme [SCOPE.sStateRegion('zanzibar_tanganyika_scope').GetName] a [SCOPE.sCountry('zanzibar_scope').GetNameNoFormatting] se přes noc zcela zhroutí."
 zanzibar.2.f: "„Říkám ti, ten člověk je napůl šílený! Celý ten jeho plán ztroskotá ve chvíli, kdy ho přestaneme držet za ruku!“\n\nKouř z doutníku se vznášel v tlumeném světle salónu, zatímco dvě postavy mlčky zvažovaly, co dělat. „Možná,“ zamyslel se druhý hlas, „to jen znamená, že ho nesmíme pustit.“ Nastala krátká pauza přerušená pobaveným uchechtnutím. „Říká se, že Zandž je na jaře nádherný.“"
 zanzibar.2.a: "Můžeme mnoho získat z konce [SCOPE.sCountry('zanzibar_scope').GetAltAdjectiveNoFormatting('G')]."
 zanzibar_2_notification: "[SelectLocalization(SCOPE.sCountry('zanzibar_scope').IsValid,'scoped_zanzibar_notification','dead_zanzibar_notification')]"
 scoped_zanzibar_notification: "[SCOPE.sCountry('zanzibar_scope').GetName] se zhroutil a ztratil většinu svého území ve prospěch místních válečníků a koloniálních mocností."
 dead_zanzibar_notification: "Východoafrický stát #b Zanzibar#! se zhroutil a veškeré jeho území připadlo koloniálním mocnostem a místním válečníkům."
 notification_zanzibar_2_player_notification_name: "Zisky ve východní Africe"
 notification_zanzibar_2_player_notification_desc: "[SelectLocalization(SCOPE.sCountry('zanzibar_scope').IsValid,'scoped_zanzibar_player_notification','dead_zanzibar_player_notification')]"
 notification_zanzibar_2_player_notification_tooltip: "#header $notification_zanzibar_2_player_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_zanzibar_2_player_notification_desc$"
 scoped_zanzibar_player_notification: "Získali jsme území v oblasti [SCOPE.sStateRegion('ceded_state_region').GetName] v důsledku zhroucení [SCOPE.sCountry('zanzibar_scope').GetName]."
 dead_zanzibar_player_notification: "Získali jsme území v oblasti [SCOPE.sStateRegion('ceded_state_region').GetName] v důsledku zhroucení státu #b Zanzibar#!."
 zanzibar.2.b: "Zničením [SCOPE.sCountry('zanzibar_scope').GetAltAdjectiveNoFormatting('G')] nic nezískáme."
 ig_colonialists_pleased: "Kolonialisté potěšeni"
 ig_colonialists_displeased: "Kolonialisté nespokojeni"
 zanzibar.3.t: "Lev bez hrdosti"
 zanzibar.3.d: "Koloniální úředníci z [SCOPE.sCountry('deag_scope').GetName] obešli naše opěrné body a uzavřeli dohody s vnitrozemskými náčelníky, o nichž jsme dlouho tvrdili, že podléhají naší vládě. Naše představa o nadvládě ve východní Africe se tímto činem přes noc zhroutila a místní válečníci i další koloniální mocnosti rychle rozebírají zbytky našeho impéria."
 zanzibar.3.f: "Ostrý rytmus bot [SCOPE.sCountry('deag_scope').GetAdjectiveNoFormatting], pochodujících ulicemi [ROOT.GetCountry.GetCapital.GetCityHubName], probudil celé město. Rostoucí dav je následoval, když vojáci dorazili na hlavní náměstí, a zalapal po dechu, když vztyčili vlajku [SCOPE.sCountry('deag_scope').GetNameNoFormatting]. Kdo byli ti lidé? Kde byl [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]? #italic Co se děje s [ROOT.GetCountry.GetNameNoFormatting]?#!"
 zanzibar.3.a: "Toto je nejtemnější hodina [ROOT.GetCountry.GetNameNoFormatting]."
 zanzibar.3.tt: "#r #b [SCOPE.sCountry('deag_scope').GetNameNoFormatting] se zmocnila našeho impéria a zredukovala nás na pouhé [ROOT.GetCountry.GetCapital.GetName]#!#!"
 zanzibar.4.t: "Dědicové královny Azizy"
 zanzibar.4.d: "Díky obratné diplomacii a pečlivému státnictví jsme si zajistili kontrolu nad Zandží. Dnes [ROOT.GetCountry.GetName] stojí hrdě!"
 zanzibar.4.f: "Nový pamflet koloval mezi kavárnami a knihkupci v [ROOT.GetCountry.GetCapital.GetCityHubName]: #italic Pravé kroniky Zanzibaru#!. Lidová historie vyprávěla o slavných počátcích ostrova Unguja pod vedením královny Azizy, mytické postavy, na kterou se téměř zapomnělo. Stejně jako Aziza se i Zanzibar nyní vynořil ze stínů a znovu si vydobyl své místo na výsluní — a toto světlo bylo vidět na každé rozzářené tváři Zanzibaranů, když četli o své slavné minulosti a snili o své slavné budoucnosti."
 zanzibar.4.a: "Slavný den pro nás všechny!"
 zanzibar.5.t: "Tippu Tip"
 zanzibar.5.d: "Ambiciózní obchodník s otroky a slonovinou jménem Hamad ibn Muhammad al Murjabi žádá [ROOT.GetCountry.GetName] o podporu koloniální výpravy. Navrhuje založení nové vlády v $STATE_CONGO_ORIENTALE$. Pokud ho podpoříme, jeho stát se stane naší závislou zemí, ale velmoci to neschválí a náš postup k tomu stát se [Concept('concept_recognized_power','$concept_recognized_power_short$')] se výrazně zpomalí."
 zanzibar.5.f: "„Proč ti vlastně říkají ‚Tippu Tip‘, Hamade?“ zeptal se cizinec, když karavana se slonovinou začala brodit další řekou.\n\nObchodník se usmál. „Je to podle zvuku mých zbraní, protože víš — ach, k čertu, podívej!“\n\nRozběhl se k vodě a volal o pomoc na svou karavanu.\n\n„Loď plná otroků se potopila!“ zvolal. „Jaká škoda! To byla pěkná kánoe.“"
 zanzibar.5.a: "Tippu Tipa nemůžeme podpořit, ale neodvažujeme se ho odsoudit."
 zanzibar.5.b: "Vítáme toto opěrné místo v Kongu."
 zanzibar.5.c: "Zadržte Tippu Tipa a ukončete to dříve, než to začne!"
 zanzibar.5.dd: "Přesvědčte Tippu Tipa, že své zájmy může lépe prosazovat zde, s námi."
 zanzibar.6.t: "Konec arabské nadvlády?"
 zanzibar.6.d: "Vzestup [SCOPE.sCharacter('zan_ruler').GetFullName], významné osobnosti kultury [SCOPE.sCulture('zan_ruler_culture').GetName], znamená konec staletí arabské nadvlády. Vůdci [SCOPE.sCulture('zan_swahili_culture').GetName] požadují, aby byla tato zásadní událost využita k oficiálnímu zrušení dominance [SCOPE.sCulture('zan_omani_culture').GetName] v rámci [ROOT.GetCountry.GetName]."
 zanzibar.6.f: "Ulice staré čtvrti Stone Town na Zanzibaru byly opuštěné. Všichni se zavřeli ve svých domech a čekali, co přinese zítřek.\n\nZpočátku někteří slavili a tvrdili, že zatímco stovky kmenů před staletími ztratily svobodu, dnes ji jeden národ znovu získal. Jiní hleděli na ostrov bílých pláží a modrých vod a obávali se, že pokud dnes nic neudělají, zítra přijdou o všechno. Všichni nakonec vyšli do ulic — jen na krátký okamžik — a brzy na sebe narazili.\n\nPříliš mnoho lidí si náhle uvědomilo, že jejich sousedé jsou pro ně cizinci, a tak nyní čekali každý sám, vedle sebe."
 zanzibar.6.a: "[ROOT.GetCountry.GetName] patří národu [SCOPE.sCulture('zan_swahili_culture').GetName]!"
 zanzibar.6.b: "Jeden [SCOPE.sCulture('zan_ruler_culture').GetName] [SCOPE.sCharacter('zan_ruler').GetPrimaryRoleTitle|l] nic neznamená — [ROOT.GetCountry.GetName] zůstává [SCOPE.sCulture('zan_omani_culture').GetName]."
 can_reformer_movement_fury: "Hněv reformního hnutí"
 je_struggle_for_the_highveld: "Boj o Vysoká Veld"
 je_struggle_for_the_highveld_reason: "Vnitrozemské oblasti veldu se na první pohled zdají být nehostinnou křovinatou krajinou, avšak mezi poli se nachází úrodná půda a srázy lákavě září. Musí zde být nastolen pořádek — náš pořádek — aby tato bohatá země mohla konečně poznat mír, který nutně potřebuje k rozvinutí svého plného potenciálu."
 je_struggle_for_the_highveld_saf_states: "[ROOT.GetCountry.GetName] vlastní alespoň #b 4#! státy v oblasti [GetGeographicRegion('geographic_region_south_africa').GetName]"
 je_struggle_for_the_highveld_saf_success: "Každá jiná země s hlavním městem v oblasti [GetGeographicRegion('geographic_region_south_africa').GetName] je buď závislou zemí [SCOPE.sCountry('cape_colony_scope').GetAltAdjective('G')], nebo sdílí stejného vládce jako [SCOPE.sCountry('cape_colony_scope').GetNameNoFormatting]."
 je_struggle_for_the_highveld_saf_fail: "Jakákoli jiná země s hlavním městem v oblasti [GetGeographicRegion('geographic_region_south_africa').GetName] se stane nezávislou [concept_recognized_power] s pobřežním [concept_incorporated_state]."
 je_struggle_for_the_highveld_anyone_else_wins_everyone_else_fail: "Jakákoli jiná země než [SCOPE.sCountry('cape_colony_scope').GetName], s hlavním městem v oblasti [GetGeographicRegion('geographic_region_south_africa').GetName], se stane [concept_recognized_power], která není [concept_subject] žádné jiné země a má pobřežní [concept_incorporated_state]."
 je_struggle_for_the_highveld_saf_wins_everyone_else_fail: "Každý stát v oblasti [GetGeographicRegion('geographic_region_south_africa').GetName] je buď ovládán [SCOPE.sCountry('cape_colony_scope').GetName], nebo jinou zemí s hlavním městem v některém z těchto států, která není [Concept('concept_decentralized_nation', '$concept_decentralized$')] a je buď [concept_subject] [SCOPE.sCountry('cape_colony_scope').GetAltAdjectiveNoFormatting('G')], nebo vládce [SCOPE.sCountry('cape_colony_scope').GetAltAdjectiveNoFormatting('G')]."
 saf_highveld_add_boer_as_primary_button: "Přidat [SCOPE.sCulture('boer_culture').GetName] jako [Concept('concept_primary_cultures','$concept_primary_culture$')|U]"
 saf_highveld_add_boer_as_primary_button_desc: "Pokud se podaří vyřešit obavy Búrů ohledně jejich postavení v naší zemi, bude možné integrovat búrskou kulturu do [ROOT.GetCountry.GetName]."
 saf_struggle_for_the_highveld_boer_confederation_tt: "Bude dostupná možnost konfederace s búrskými státy, #n ale přidání Griqua jako primární kultury bude nemožné.#!"
 saf_highveld_add_griqua_as_primary_button: "Přidat [SCOPE.sCulture('griqua_culture').GetName] jako [Concept('concept_primary_cultures','$concept_primary_culture$')|U]"
 saf_highveld_add_griqua_as_primary_button_desc: "Pokud dokážeme podpořit přijetí Griquů v rámci [ROOT.GetCountry.GetName], bude možné integrovat griquskou kulturu do [ROOT.GetCountry.GetName]."
 saf_struggle_for_the_highveld_griqua_confederation_tt: "Bude dostupná možnost konfederace s griquskými státy, #n ale přidání Búrů jako primární kultury bude nemožné.#!"
 highveld_offer_boer_confederation_button: "Nabídnout konfederaci [SCOPE.sCulture('boer_culture').GetName]"
 highveld_offer_boer_confederation_button_desc: "Můžeme nabídnout konfederaci slabšímu sousednímu búrskému státu a připojit ho."
 highveld_offer_boer_confederation_tt: "Mít alespoň přátelské vztahy a vyšší HDP než sousední búrská země, která je buď\n$EFFECT_LIST_BULLET$nezávislá\n$EFFECT_LIST_BULLET$závislou zemí [ROOT.GetCountry.GetName]\n$EFFECT_LIST_BULLET$sdílí stejného vládce jako [ROOT.GetCountry.GetNameNoFlag]"
 highveld_offer_boer_confederation_effect_tt: "[ROOT.GetCountry.GetNameNoFlag] anektuje sousední zemi [SCOPE.sCulture('boer_culture').GetName]"
 highveld_offer_griqua_confederation_button: "Nabídnout konfederaci [SCOPE.sCulture('griqua_culture').GetName]"
 highveld_offer_griqua_confederation_button_desc: "Můžeme nabídnout konfederaci slabšímu sousednímu griquskému státu a připojit ho."
 highveld_offer_griqua_confederation_tt: "Mít alespoň přátelské vztahy a vyšší [concept_gdp] než sousední griquská země, která je buď nezávislá, závislou zemí [ROOT.GetCountry.GetName], nebo sdílí stejného vládce jako [ROOT.GetCountry.GetNameNoFlag]"
 highveld_offer_griqua_confederation_effect_tt: "[ROOT.GetCountry.GetNameNoFlag] anektuje sousední zemi [SCOPE.sCulture('griqua_culture').GetName]"
 struggle_for_the_highveld.1.t: "Bitva u Vegkopu"
 struggle_for_the_highveld.1.d: "Silně ozbrojená skupina búrských trekkerů úspěšně odrazila rozsáhlý nájezd [SCOPE.sCountry('ndebele').GetAdjective] #italic amabutho#! a vážně tak oslabila jejich moc. Poté, co byla nadvláda [SCOPE.sCountry('ndebele').GetAdjectiveNoFormatting] touto porážkou otřesena, jejich král [SCOPE.sCharacter('mzilikazi').GetFirstName] nařídil stažení z oblasti [SCOPE.sStateRegion('transvaal_region').GetName] a přesun celého národa na sever."
 struggle_for_the_highveld.1.f: "Válečníci bili do svých štítů, aby uklidnili své rozjitřené nervy, než znovu zaútočili na vozovou hradbu a volali jméno svého [SCOPE.sCharacter('mzilikazi').GetPrimaryRole.GetName|l]. Jakmile tak učinili, palba z vozové hradby zesílila. Muškety se objevily za vozy a pálily kulky, broky — cokoli, co bylo možné ve spěchu nabít a vystřelit proti útočícímu nepříteli. Každý válečník, který přežil tuto smršť palby a překonal trnité překážky k vozům, byl přivítán úderem seker. Kouř z výstřelů se mísil s krví a vytvářel hustý opar, v němž útočníci i obránci doslova dýchali smrt.\n\nKdyž bojový křik utichl a kouř se rozptýlil, mezi zohavenými těly na bojišti ležely i ambice [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting], mrtvé stejně jako válečníci, kteří toho dne zaútočili na vozovou hradbu."
 struggle_for_the_highveld.1.a: "Vyrabujte [SCOPE.sCountry('ndebele').GetNameNoFormatting], když prchají na sever."
 struggle_for_the_highveld.1.b: "Přijměte část [SCOPE.sCountry('ndebele').GetNameNoFormatting] mezi nás."
 struggle_for_the_highveld.1.c: "Hrozba Búrů byla odhalena! Musíme pomoci, ne škodit [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting]."
 struggle_for_the_highveld.1.a.notification: "[SCOPE.sCountry('ndebele').GetName] opustila oblast [SCOPE.sStateRegion('transvaal_region').GetName] a Búrové z [SCOPE.sCountry('transvaal').GetName] rychle obsadili jejich bývalá území."
 struggle_for_the_highveld.1.b.notification: "Oblast [SCOPE.sStateRegion('transvaal_region').GetName] byla rozdělena mezi [SCOPE.sCountry('zulu').GetAdjective] a [SCOPE.sCountry('transvaal').GetAdjective]"
 zul_trn_rapid_overexpansion: "Rychlá nadměrná expanze"
 zul_passed_on_chance_for_victory: "Promarněná šance na vítězství"
 zul_a_friend_to_enemies: "Přítel nepřátel"
 struggle_for_the_highveld.2.t: "V stopách [SCOPE.sCharacter('mzilikazi').GetFirstName]"
 struggle_for_the_highveld.2.d: "Celé území [SCOPE.sCountry('ndebele').GetAdjective] migruje na sever po ztrátách proti [SCOPE.sCountry('zulu').GetName] a ozbrojeným skupinám trekboerů. Oblast [SCOPE.sStateRegion('transvaal_region').GetName] je otevřená nárokům!"
 struggle_for_the_highveld.2.f: "Zprávy přicházející z Highveldu byly zmatené a protichůdné. Někteří tvrdili, že jediný búrský tábor zničil celou armádu [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] v jediné bitvě, zatímco jiní říkali, že síly [SCOPE.sCountry('zulu').GetAdjectiveNoFormatting] dokázaly zlomit kontrolu [SCOPE.sCountry('ndebele').GetNameNoFormatting] nad [SCOPE.sStateRegion('transvaal_region').GetNameNoFormatting] prostřednictvím vytrvalých nájezdů a útoků. Ať už byla příčina jakákoli, výsledek je jasný: [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] vede lid [SCOPE.sCountry('ndebele').GetAdjectiveNoFormatting] na sever a zanechává [SCOPE.sStateRegion('transvaal_region').GetNameNoFormatting] otevřený každému s průkopnickým duchem."
 struggle_for_the_highveld.2.a: "Jednejte, aby [SCOPE.sStateRegion('transvaal_region').GetName] patřil nám!"
 struggle_for_the_highveld.2.a.notification: "Búrové z [SCOPE.sCountry('transvaal').GetName] rychle obsadili území [SCOPE.sStateRegion('transvaal_region').GetName], opuštěná [SCOPE.sCountry('ndebele').GetName]."
 struggle_for_the_highveld.2.b: "Nechte to být! Správa této země je pro nás příliš náročná."
 struggle_for_the_highveld.2.b.tt: "[SCOPE.sCountry('pedi').GetName] místo nás obsadí opuštěná území v oblasti [SCOPE.sStateRegion('transvaal_region').GetName]."
 struggle_for_the_highveld.2.b.notification: "[SCOPE.sCountry('pedi').GetName] rychle obsadila území [SCOPE.sStateRegion('transvaal_region').GetName], opuštěná [SCOPE.sCountry('ndebele').GetName]."
 struggle_for_the_highveld.2.c: "Podpořte osidlování [SCOPE.sStateRegion('transvaal_region').GetName], ale nenárokujte si tato území najednou."
 trn_transvaal_treks_denied: "Transvaalské treky odmítnuty"
 trn_transvaal_treks_encouraged: "Transvaalské treky podpořeny"
 struggle_for_the_highveld.3.t: "Postoupení Natalu"
 struggle_for_the_highveld.3.d: "[SCOPE.sCharacter('piet_retief').GetFullName] věří, že [SCOPE.sCharacter('dingane').GetFirstName], [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] [SCOPE.sCountry('zulu').GetName], může být přesvědčen, aby postoupil jižní polovinu [SCOPE.sStateRegion('zululand_region').GetName] [ROOT.GetCountry.GetName]. [SCOPE.sCharacter('piet_retief').GetSheHe|U] se domnívá, že dohody lze dosáhnout, pokud bude jednat osobně na dvoře [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] [SCOPE.sCharacter('dingane').GetFirstName]. Někteří varují, že [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] je nebezpečný partner k jednání."
 struggle_for_the_highveld.3.f: "„Je to jednoduché,“ zasmál se [SCOPE.sCharacter('piet_retief').GetFullNameNoFormatting] a mával dopisem v ruce. „Stačí ukázat [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle], že jsme důvěryhodní, a brzy budeme mít vlastní přístav!“\n\nDav kolem něj mumlal střídavě vzrušením i obavami.\n\n„Nový domov! Země, kterou si můžeme vzít!“\n\n„Nejsem si jistý, že [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] [SCOPE.sCharacter('dingane').GetFirstNameNoFormatting] je tak snadný na jednání.“\n\n„Pche! To je na [SCOPE.sCharacter('piet_retief').GetFirstNameNoFormatting], aby to zjistil, ne na nás!“"
 struggle_for_the_highveld.3.a: "[SCOPE.sCharacter('piet_retief').GetFullName] získá [SCOPE.sStateRegion('zululand_region').GetName] pro [ROOT.GetCountry.GetNameNoFormatting]!"
 struggle_for_the_highveld.3.b: "[SCOPE.sCharacter('dingane').GetFirstName] je nebezpečný — [SCOPE.sCharacter('piet_retief').GetLastName] musí tento nápad opustit."
 ora_natalia_venture_rejected: "Projekt Natalia odmítnut"
 struggle_for_the_highveld.4.t: "Búrové požadují Thukelu"
 struggle_for_the_highveld.4.d: "Delegace búrských osadníků vedená [SCOPE.sCharacter('piet_retief').GetFullName] dorazila do [ROOT.GetCountry.GetCapital.GetCityHubName] a požaduje, abychom postoupili území jižně od řeky Thukela, tedy polovinu oblasti [SCOPE.sStateRegion('zululand_region').GetName]. Tento návrh je urážkou i provokací, ale existuje mnoho dalších dobře ozbrojených Búrů odkud tato delegace přišla."
 struggle_for_the_highveld.4.f: "[SCOPE.sCharacter('piet_retief').GetFullNameNoFormatting] stál před [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] s úsměvem, bez nejmenší známky ostychu v jeho výrazu či postoji. [SCOPE.sCharacter('piet_retief').GetSheHe|U] hovořil o přátelství a respektu, jak tlumočník sdělil [SCOPE.sCharacter('dingane').GetFirstNameNoFormatting], ale již přicházely zprávy o zmizelém dobytku a záhadných průzkumných skupinách, které prchaly při každém přiblížení. Dobytek mohl být odcizen konkurenčními náčelníky — nebo osobou, která nyní stála před [SCOPE.sCharacter('dingane').GetHerHim]. Důvěra byla v těchto dnech #italic tak#! vzácná..."
 struggle_for_the_highveld.4.a: "Tento požadavek je absurdní. Zabijte celou delegaci [SCOPE.sCharacter('piet_retief').GetLastName]."
 notification_piet_retief_killed_name: "[SCOPE.sCharacter('piet_retief').GetFullName] zabit"
 notification_piet_retief_killed_desc: "[SCOPE.sCharacter('piet_retief').GetLastName] byl zabit na rozkaz [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle] [SCOPE.sCharacter('dingane').GetFirstName] ze země [SCOPE.sCountry('zulu').GetName]."
 notification_piet_retief_killed_tooltip: "#header $notification_piet_retief_killed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_piet_retief_killed_desc$"
 struggle_for_the_highveld.4.b: "Sneste urážku, ale pošlete [SCOPE.sCharacter('piet_retief').GetLastName] domů s prázdnou."
 struggle_for_the_highveld.4.b.tt: "[SCOPE.sCharacter('piet_retief').GetFullName] se vrátí do [SCOPE.sCountry('oranje').GetName] a bude falešně tvrdit, že jsme souhlasili s osídlením Búrů v oblasti [SCOPE.sStateRegion('zululand_region').GetName]."
 notification_piet_retief_forges_name: "Smlouva [SCOPE.sCharacter('piet_retief').GetFullName]"
 notification_piet_retief_forges_desc: "[SCOPE.sCharacter('piet_retief').GetFullName] se vrací ze země [SCOPE.sCountry('zulu').GetName] s pochybným dokumentem, o němž tvrdí, že postoupení oblasti [SCOPE.sStateRegion('zululand_region').GetName] zajišťuje pro [SCOPE.sCountry('oranje').GetName]. Raději ho příliš nezkoumejme!"
 notification_piet_retief_forges_tooltip: "#header $notification_piet_retief_forges_name$#!\n$TOOLTIP_DELIMITER$\n$notification_piet_retief_forges_desc$"
 struggle_for_the_highveld.4.c: "Postoupení poloviny [SCOPE.sStateRegion('zululand_region').GetName] je jedinou cestou k míru!"
 notification_natal_ceded_name: "[SCOPE.sCountry('oranje').GetName] v Natalu"
 notification_natal_ceded_desc: "[SCOPE.sCountry('zulu').GetName] postoupila část svých jižních území [SCOPE.sCountry('oranje').GetName]."
 notification_natal_ceded_tooltip: "#header $notification_natal_ceded_name$#!\n$TOOLTIP_DELIMITER$\n$notification_natal_ceded_desc$"
 struggle_for_the_highveld.5.t: "Krvavá řeka"
 struggle_for_the_highveld.5.d: "Napětí mezi migrujícími búrskými Voortrekkery a [SCOPE.sCountry('zulu').GetName] neustále roste. Pokus vytlačit velkou búrskou skupinu na březích řeky Ncome skončil katastrofou. [SCOPE.sCharacter('mpande').GetPrimaryRoleTitle] [SCOPE.sCharacter('mpande').GetFirstName] se domnívá, že jižní část [SCOPE.sStateRegion('zululand_region').GetName] může být postoupena Búrům výměnou za mír, avšak k tomu nedojde, pokud [SCOPE.sCharacter('dingane').GetFirstName] zůstane [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle|l]."
 struggle_for_the_highveld.5.f: "Další armáda — zničena. Kolik krve bylo prolito? Kolik mužů zbývá k velení? Kolik z těch, co zůstali, by #italic přijalo#! rozkaz od svého [SCOPE.sCharacter('dingane').GetPrimaryRole.GetName|l]? [SCOPE.sCharacter('mpande').GetPrimaryRoleTitle] [SCOPE.sCharacter('mpande').GetFirstNameNoFormatting] navrhoval nehorázné myšlenky, zcela nepřijatelné — znamenaly by smrt říše... nebo alespoň smrt [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle]."
 struggle_for_the_highveld.5.a: "Učiňte [SCOPE.sCharacter('mpande').GetPrimaryRoleTitle] [SCOPE.sCharacter('mpande').GetFirstName] novým [SCOPE.sCharacter('dingane').GetPrimaryRoleTitle|l] a podepište smlouvu."
 struggle_for_the_highveld.5.a.tt: "Polovina [SCOPE.sStateRegion('zululand_region').GetName] bude postoupena novému búrskému státu."
 notification_blood_river_mpande_rules_natalia_founded_name: "Búrská republika v Natalu"
 notification_blood_river_mpande_rules_natalia_founded_desc: "$ZUL$ postoupila svá jižní území nové búrské republice."
 notification_blood_river_mpande_rules_natalia_founded_tooltip: "#header $notification_blood_river_mpande_rules_natalia_founded_name$#!\n$TOOLTIP_DELIMITER$\n$notification_blood_river_mpande_rules_natalia_founded_desc$"
 struggle_for_the_highveld.5.b: "[SCOPE.sCharacter('mpande').GetFirstName] je zrádce! Zajměte [SCOPE.sCharacter('mpande').GetHerHim] — pouze [SCOPE.sCharacter('dingane').GetFirstName] nás může vést."
 struggle_for_the_highveld.5.b.tt: "Území [SCOPE.sCountry('zulu').GetName] zůstane jednotné, ale jeho vedení již bylo zpochybněno."
 zul_desperately_clinging_to_power: "Zoufale se drží osobní moci"
 zul_desperately_clinging_to_power_ig: "Zoufale se drží politické moci"
 struggle_for_the_highveld.5.c: "Není třeba panikařit! Požádejme naše spojence o pomoc."
 struggle_for_the_highveld.5.c.tt: "Pomohli jsme lidem na Vysokého Veldu po bitvě u Vegkopu"
 struggle_for_the_highveld.6.t: "Vládce na Vysokém Veldu"
 struggle_for_the_highveld.6.d: "Po překonání nesčetných zkoušek a útrap jsme nyní nepochybně dominantní mocností v Jižní Africe."
 struggle_for_the_highveld.6.f: "Nad jásajícími davy v ulicích zazněl hlas, který pronikl skrze hluk.\n\n„Nechť nebesa požehnají Africe a vyslyší naše modlitby!“ zvolal hlas. „A nechť je náš národ chráněn, všechny konflikty a potíže ukončeny! Chraň nás, chraň náš národ a dovol nám žít a pokračovat v [SCOPE.sCountry('highveld_winner').GetNameNoFormatting], naší zemi!“"
 struggle_for_the_highveld.6.a: "Nechť [SCOPE.sCountry('highveld_winner').GetAdjectiveNoFormatting('yy')] roh zazní do dáli!"
 struggle_for_the_highveld.7.t: "Poražení na Vysokém Veldu"
 struggle_for_the_highveld.7.d: "Navzdory našemu úsilí je nyní [SCOPE.sCountry('highveld_winner').GetName] nepochybně dominantní mocností v Jižní Africe."
 struggle_for_the_highveld.7.f: "Nad Jižní Afrikou vlaje nová vlajka — [SCOPE.sCountry('highveld_winner').GetAdjectiveNoFormatting('aa')] vlajka. [SCOPE.sCountry('highveld_loser').GetNameNoFormatting] může stále existovat, ale budoucnost patří [SCOPE.sCountry('highveld_winner').GetAdjectiveNoFormatting]."
 struggle_for_the_highveld.7.a: "Pláčeme pro tebe, [SCOPE.sCountry('highveld_loser').GetNameNoFormatting]."
