 monarchy_law_events.1.t: "Lidové provolání"
 monarchy_law_events.1.d: "Průvod aktivistů v hlavním městě se rozrostl o vojáky i civilisty, kteří všichni volají po monarchii. [SCOPE.sCharacter('monarchist_ig_leader_scope').GetFullName] využil příležitosti a promluvil přímo k shromážděnému davu."
 monarchy_law_events.1.f: "„Přátelé! Národ volá po vedení, po spravedlnosti a po konci chaosu! Pokud chcete stabilitu, pokud chcete, aby vůle národa byla plně naplněna, pak pojďme společně hlasovat pro krále — a už nikdy nebudete muset hlasovat znovu.“"
 monarchy_law_events.1.a: "[SCOPE.sCharacter('monarchist_ig_leader_scope').GetFullName] je člověk, který skutečně ví, o čem mluví."
 monarchy_law_events.1.b: "[SCOPE.gsInterestGroup('monarchist_ig_scope').GetName] je zjevně domovem monarchistů — a tedy i národa."
 monarchy_law_events.2.t: "Světské šeptandy"
 monarchy_law_events.2.d: "[ROOT.GetCountry.GetRuler.GetFullNameWithTitle] byl slyšen, jak nezávazně pronáší pozitivní poznámky o různých sekulárních vládách. Někteří se domnívají, že [SCOPE.sCharacter('secularizing_spiritualist').GetSheHe] začíná být unaven vládnutím [ROOT.GetCountry.GetName] jako teokrat."
 monarchy_law_events.2.f: "„Ano, ano, samozřejmě mi záleží na duších mého stáda. Není většího poslání než spása člověka, vykoupení zbloudilých, triumf víry. Ale... buďme upřímní — je na koruně něco špatného?“"
 monarchy_law_events.2.a: "[SCOPE.sCharacter('secularizing_spiritualist').GetFullName] ví, kam vítr vane."
 monarchy_law_events.2.b: "[SCOPE.gsInterestGroup('monarchist_ig_scope').GetName] oceňuje, že jsou jeho myšlenky podporovány."
 monarchy_law_events.3.t: "Importovaná modrá krev?"
 monarchy_law_events.3.d: "Otázka, kdo by měl usednout na trůn, vedla některé monarchisty k návrhu pozvat člena [SCOPE.sCountry('neighboring_monarchy').GetAdjectiveNoFormatting] královské rodiny, aby se stal naším panovníkem. Tento nápad byl přijat, mírně řečeno, rozporuplně."
 monarchy_law_events.3.f: "„Je to jednoduché. Potřebujeme někoho, kdo nejen symbolizuje sílu a stabilitu našeho národa, ale také již důkladně rozumí roli panovníka. Kdo jiný by to zvládl lépe než někdo vychovaný na královském dvoře?“"
 monarchy_law_events.3.a: "Nepodporujme tyto řeči."
 monarchy_law_events.3.b: "Každý monarchista si zaslouží být vyslyšen."
 monarchy_law_events.4.t: "Koruna z pozlátka"
 monarchy_law_events.4.d: "Někteří monarchisté diskutují o královských insigniích a uvědomili si, že země nemá nic skutečně vhodného pro panovníka. Jeden pokus o domácí korunu z plechu a zlaté fólie se stal symbolem údajné „vrozené lacinosti“ navrhované monarchie."
 monarchy_law_events.4.f: "„Naše krásná monarchie — neboť monarchii musíme mít — vyžaduje důstojné, i když skromné a vkusné insignie. Již jsem kontaktoval zlatníky, brusiče drahokamů i výrobce trůnů s pravou korintskou kůží. Mezitím...“"
 monarchy_law_events.4.a: "Ta koruna je jen symbol! Tedy..."
 monarchy_law_events.4.b: "Ta koruna JE symbol! Symbol lásky národa k monarchii!"
