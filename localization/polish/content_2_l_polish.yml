 texan_war_of_independence.3.t: "Generál Santa Anna zajat"
 texan_war_of_independence.3.d: "[SCOPE.sCharacter('santa_anna_scope').GetFullName], vládce Mexika a jeden z jeho hlavních generálů, byl našimi silami zajat v bažině, převlečený do uniformy dragouna. Nabízí, že okamžitě podepíše mír výměnou za své propuštění."
 texan_war_of_independence.3.f: "„Santa Anna živý může být pro Texas neocenitelným přínosem; Santa Anna mrtvý by byl jen další obětí.“"
 texan_war_of_independence.3.a: "Využít Santa Annu k vyjednání dohody."
 texan_war_of_independence.3.b: "Nechme ho vrátit se do Mexika, budeme bojovat dál!"
 notification_santa_anna_captured_notification_name: "Santa Anna zajat"
 notification_santa_anna_captured_notification_desc: "[SCOPE.sCountry('texas_scope').GetName] zajal [SCOPE.sCountry('mexico_scope').GetAdjective] generála Santa Annu, který využil svého osobního vlivu k vyjednání ukončení texaské války za nezávislost"
 notification_santa_anna_captured_notification_tooltip: "#header $santa_anna_captured_notification_name$#!\n$TOOLTIP_DELIMITER$\n$santa_anna_captured_notification_desc$"
 native_resettlement.1.t: "Worcester vs. Georgia"
 native_resettlement.1.d: "[SCOPE.sCharacter('indian_removal_president').GetPrimaryRoleTitle] [SCOPE.sCharacter('indian_removal_president').GetFullName] se postavil proti rozhodnutí Nejvyššího soudu a nařídil přesun lidu [SCOPE.sCulture('cherokee_culture').GetName] do [SCOPE.sCountry('indian_territory_scope').GetName]."
 native_resettlement.1.f: "„Co na tom záleží, co říká Nejvyšší soud? Stačí pod nimi rozdělat oheň, a až bude dost horko, pohnou se — a to, co je naše, bude naše.“"
 native_resettlement.1.a: "Je to vůbec legální?"
 native_resettlement.2.t: "Protestní petice Johna Rosse"
 native_resettlement.2.d: "Náčelník John Ross, jeden z hlavních vůdců lidu [SCOPE.sCulture('cherokee_culture').GetName], předložil Kongresu petici žádající zrušení smlouvy, která nutí národ [SCOPE.sCulture('cherokee_culture').GetName] k přesídlení do [SCOPE.sCountry('indian_territory_scope').GetName]. Jeho petice má téměř tolik podpisů jako celá východní populace Čerokíů."
 native_resettlement.2.f: "„Podle ustanovení této smlouvy jsme zbaveni všech atributů svobody. Náš majetek může být před našima očima drancován; na našich osobách může být pácháno násilí, dokonce nám mohou být odňaty životy, a nikdo se nezastane našich stížností. Jsme zbaveni národní identity; jsme zbaveni práv. Jsme vyňati z lidské rodiny!“"
 native_resettlement.2.a: "Smlouva je smlouva. Nemůžeme zrušit to, co jsme podepsali."
 native_resettlement.2.b: "Naše svědomí nás nutí smlouvu o přesídlení zrušit."
 native_resettlement.3.t: "Vystěhování Indiánů"
 native_resettlement.3.d: "V souladu se smlouvou o přesídlení je čas, aby [SCOPE.sCulture('cherokee_culture').GetName] z [SCOPE.sState('indian_removal_state').GetName] odešli do [SCOPE.sCountry('indian_territory_scope').GetName]. Někteří odmítají opustit své domovy a mnozí nejsou na cestu dostatečně vybaveni."
 native_resettlement.3.f: "„Přátelé, okolnosti znemožňují, abyste vzkvétali uprostřed naší společnosti. Máte pouze jedno řešení — odejít na západ. A čím dříve to učiníte, tím dříve začnete svou cestu k pokroku a prosperitě.“"
 native_resettlement.3.a: "Donutit je silou bajonetů."
 native_resettlement.3.b: "Poskytnout jim určitou pomoc na cestu."
 native_resettlement.4.t: "Stezka slz"
 native_resettlement.4.d: "Naše snahy o vystěhování [SCOPE.sCulture('cherokee_culture').GetName] z východních území vedly během jejich pochodu na západ k mnoha úmrtím."
 native_resettlement.4.f: "„Spalničky, cholera, hlad — toto vystěhování vytvořilo pro náš lid stezku slz a smrti.“"
 native_resettlement.4.a: "Udělali jsme, co jsme mohli."
 native_resettlement.4.b: "Jejich krev je na našich rukou."
 native_resettlement.5.t: "Vyčištění východu"
 native_resettlement.5.d: "Přesídlení [SCOPE.sCulture('cherokee_culture').GetName] do [SCOPE.sCountry('indian_territory_scope').GetName] je dokončeno. Ať už dobře či špatně, záležitost je uzavřena."
 native_resettlement.5.f: "„Kdo tu žil před námi? Jaké jméno dali tomuto místu? Bude to někdo z nás vědět? Pamatuje si to ještě někdo?“"
 native_resettlement.5.a: "Modleme se, aby se to už nikdy neopakovalo."
 je_indian_removal: "Vystěhování Indiánů"
 je_indian_removal_reason: "Osadníci chtějí, aby národ Čerokíů opustil žádanou půdu. Prezident v rozporu s rozhodnutím Nejvyššího soudu nařídil, aby se národ Čerokíů přesunul do Indiánského teritoria."
