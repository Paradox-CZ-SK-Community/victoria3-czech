 slave_revolt.1.t: "Vzpoura na otrokářské lodi"
 slave_revolt.1.d: "Otroci na jedné z obchodních lodí naší země povstali, převzali nad lodí kontrolu a dopluli do nedaleké [SCOPE.sCountry('neighbor_country').GetName], kde je otroctví nelegální."
 slave_revolt.1.f: "„Není na zahraničních soudech, aby rozhodovaly o postavení těchto lidí, kteří pluli pod vlajkou naší země. Toto právo nemůže spravedlivě náležet jiné zemi, bez ohledu na důvod!“"
 slave_revolt.1.a: "Vydat důrazný protest."
 slave_revolt.1.b: "To už není v našich rukou."
 notification_slave_revolt_1_tooltip: "#header $notification_slave_revolt_1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_slave_revolt_1_desc$"
 notification_slave_revolt_1_name: "[concept_relations] s [SCOPE.sC('originator').GetName ] poškozeny"
 notification_slave_revolt_1_desc: "[SCOPE.sC('originator').GetName] snížil naše [concept_relations], protože naše odmítnutí otroctví vedlo k útěku jejich otroků na naše území za svobodou."
 slave_revolt.2.t: "Uprchlí otroci"
 slave_revolt.2.d: "Významná skupina otroků povstala a zamířila k hranicím [SCOPE.sCountry('neighbor_country').GetName], kde je otroctví nelegální."
 slave_revolt.2.f: "„Povinností této vlády je zadržet uprchlíky a vrátit je na území, odkud uprchli. Jděte a splňte svou povinnost!“"
 slave_revolt.2.a: "Budeme financovat dopadení všech uprchlíků."
 slave_revolt.2.b: "Nebudeme nic platit."
 notification_slave_revolt_2_tooltip: "#header $notification_slave_revolt_2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_slave_revolt_2_desc$"
 notification_slave_revolt_2_name: "[concept_relations] s [SCOPE.sC('originator').GetName ] poškozeny"
 notification_slave_revolt_2_desc: "[SCOPE.sC('originator').GetName] snížil naše [concept_relations], protože naše odmítnutí otroctví vedlo k útěku jejich otroků na naše území za svobodou."
 slave_revolt.3.t: "Povstání v [SCOPE.sState('slave_insurrection_state').GetName]"
 slave_revolt.3.d: "Otroci povstali v [SCOPE.sState('slave_insurrection_state').GetName]. Zatím nepředstavují významnou sílu a existuje několik způsobů, jak s nimi naložit."
 slave_revolt.3.f: "„Chceme svobodu! Chceme odplatu! Opravdu vás to překvapuje? Ti, kdo upírají svobodu druhým, si ji sami nezaslouží.“"
 slave_revolt.3.a: "Vyjednávat s vůdci povstání a uklidnit situaci."
 slave_revolt.3.b: "S povstalci nevyjednáváme."
