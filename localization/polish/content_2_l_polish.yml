 trains.1.t: "Velká vlaková srážka"
 trains.1.d: "Podnikavý bavič uspořádal na místním veletrhu srážku dvou starých lokomotiv. Výsledná kolize může ohrozit dav, což však nezabránilo [SCOPE.sCharacter('train_crash_attendee').GetFullName], vůdci [SCOPE.gsInterestGroup('train_crash_attendee_ig').GetName], aby si zajistil místo v první řadě."
 trains.1.f: "„Proboha, proč? Proč chceš tak moc vidět srážku?“\n\n„Upřímně? Věřím, že někde v každém z nás — včetně mě — se skrývá potlačená touha něco rozbít.“"
 trains.1.a: "Všichni si užijte podívanou!"
 trains.1.b: "Zakázat [SCOPE.sCharacter('train_crash_attendee').GetFullName], aby riskoval [SCOPE.sCharacter('train_crash_attendee').GetHerHis] život!"
 a_smashing_appearance: "Velkolepá účast"
 the_desire_to_smash_things_up: "Touha rozbíjet naplněna"
 the_desire_to_smash_things_up_has_been_denied: "Odepřena účast na destruktivní podívané"
 economy_laws.1.t: "Růst překonává očekávání"
 economy_laws.1.d: "Ústřední ekonomický úřad oznámil, že naše snahy dostat ekonomické záležitosti pod kontrolu státu vedly k překvapivě pozitivnímu růstu."
 economy_laws.1.f: "Muž si nervózně upravil brýle. „Upřímně řečeno, jsem ohromen,“ přiznal. „Přepočítal jsem to dvakrát a tři úředníci v kanceláři mi to zkontrolovali — a věřte nebo ne, jsme napřed oproti plánu i nad očekávanými hodnotami! Možná bych to měl oslavit!“\n\nNatáhl se po motýlku a po chvíli zápasení si ho sundal. „Pozor, světe, dnes večer se utrhnu ze řetězu!“ zvolal nadšeně."
 economy_laws.1.a: "Výborně! Pokračujme v prosazení zákona."
 economy_laws.1.b: "Výborně! Podpořme úředníky, kteří to umožnili." 
 economy_laws.2.t: "Stranické spory"
 economy_laws.2.d: "Frakce vlády protestuje proti tempu a přístupu k naší měnící se hospodářské politice a chce diskutovat a upravit náš současný program."
 economy_laws.2.f: "„Vím, že mě někteří obviňují z opozičních tendencí, ale ujišťuji vás, že jsem loajální člen strany. Jen říkám, přátelé, že bychom měli zvážit, zda naše politika dostatečně dozrála na to, abychom zcela opustili zastaralý socioekonomický systém.“"
 economy_laws.2.a: "Nechme členy strany debatovat."
 economy_laws.2.b: "Prosazujme naši linii na stranických konferencích."
 economy_laws.2.c: "Promluvme si s našimi odpůrci." 
 economy_laws.3.t: "Opilí úspěchem"
 economy_laws.3.d: "Naše snahy prosadit ekonomickou reformu vedly k nedostatkům a špatnému řízení v [SCOPE.sState('state_run_state').GetName]."
 economy_laws.3.f: "„Je faktem, že jsme naši plánovanou reformu ekonomiky splnili nad očekávání a naši přátelé z [SCOPE.gsInterestGroup('command_econ_proponent_ig').GetNameNoFormatting] se opili úspěchem a na chvíli ztratili jasnost myšlení i střízlivost úsudku.“"
 economy_laws.3.a: "Musíme přiznat své chyby."
 economy_laws.3.b: "Nemáme žádná selhání, jen úspěchy!" 
 economy_laws.4.t: "Neobhajitelné vydírání"
 economy_laws.4.d: "Řečník z [SCOPE.gsInterestGroup('pro_free_trade_ig').GetName] vyrazil na turné po celé zemi, kde kritizuje [SCOPE.sLaw('standing_law_scope').GetName] a vyzdvihuje hodnotu volného obchodu."
 economy_laws.4.f: "„Když si uvědomíme, že náš velký systém zaručuje každému plné užívání plodů jeho práce a podnikání, je zřejmé, že cokoli jiného než volný tok zboží je neobhajitelné vydírání a zavržení našich hodnot.“"
 economy_laws.4.a: "Pracujeme na společném cíli!"
 economy_laws.4.b: "[SCOPE.gsInterestGroup('pro_free_trade_ig').GetName] má skutečně pozoruhodného řečníka." 
 economy_laws.5.t: "Trh idejí"
 economy_laws.5.d: "Odpůrci našich plánovaných ekonomických reforem požadují právo, aby jejich myšlenky byly slyšeny stejně jako ty naše — a s drzostí využívají naši rétoriku volného trhu k obhajobě vlastního práva mluvit."
 economy_laws.5.f: "„Žádáme jen volný obchod... s myšlenkami.“"
 economy_laws.5.a: "Chceme volný trh, ne volné řeči!"
 economy_laws.5.b: "Konkurence je nutná, i v idejích."
 economy_laws.5.c: "Ve svobodném střetu vítězí pravda!" 
 economy_laws.6.t: "Průmysl trpí v [SCOPE.sState('industrial_protectionist_state').GetName]"
 economy_laws.6.d: "Zahraniční konkurence vedla k poklesu poptávky po výrobcích z [SCOPE.sState('industrial_protectionist_state').GetName], což vyvolalo obavy ohledně našich plánovaných reforem."
 economy_laws.6.f: "„Volný zahraniční obchod dává naše peníze i trhy jiným a poškozuje naši práci, náš průmysl i náš lid. K čemu jsou tyto politiky, pokud nám nepřinášejí prospěch?“"
 economy_laws.6.a: "Musíme zmírnit obavy v [SCOPE.sState('industrial_protectionist_state').GetName]."
 economy_laws.6.b: "Musíme přesvědčit [SCOPE.sState('industrial_protectionist_state').GetName] o přínosu našich reforem."
 economy_laws.6.c: "Musíme pokračovat bez ohledu na to." 
 africa_colonial_events.40.t: "Neposlušný šovinista"
 africa_colonial_events.40.d: "Důstojník v našich afrických koloniích úmyslně vyprovokoval konflikt s [SCOPE.sCountry('jingoist_officer_victim').GetAltAdjective('I')], navzdory rozkazům udržet mír. Můžeme buď zachovat tvář a podpořit jeho plán, nebo ho odvolat, přiznat ztrátu kontroly nad situací a rozhněvat šovinisty."
 africa_colonial_events.40.f: "„Zapomeňte na rozkazy slabochů z hlavního města! Všeho, čeho jsem dosáhl, jsem dosáhl navzdory ministerstvu, ne díky němu.“"
 africa_colonial_events.40.a: "Nemáme jinou možnost než zaútočit na [SCOPE.sCountry('jingoist_officer_victim').GetAltAdjective('A')]."
 africa_colonial_events.40.b: "Odvolejte důstojníka a ukončete toto šílenství!"
 africa_colonial_events.40.c: "Tenhle se mi líbí! Pokračujte v útoku a povyšte ho." 
 africa_colonial_events.41.t: "Nezřízený imperialista"
 africa_colonial_events.41.d: "Vlastenecký průzkumník a stoupenec [SCOPE.gsInterestGroup('rogue_imperialist_ig').GetName] zkoumal území v [SCOPE.sState('rogue_imperialist_state').GetName] a uzavíral smlouvy s místními vůdci jménem našeho státu, avšak [SCOPE.sCountry('rogue_imperialist_target').GetName] zde již má svou přítomnost. Pokud jeho nároky uznáme, [SCOPE.sCountry('rogue_imperialist_target').GetName] bude rozzuřen."
 africa_colonial_events.41.f: "„Ten člověk je šílenec! Snažíme se hrát opatrnou hru a on musí převrátit stůl a způsobit problémy — a kvůli čemu? Národu? Prosím vás! Neuvědomuje si, jaké škody napáchal?“"
 africa_colonial_events.41.a: "Uznat nárok na [SCOPE.sState('rogue_imperialist_state').GetName] a rozzlobit [SCOPE.sCountry('rogue_imperialist_target').GetName]."
 africa_colonial_events.41.b: "Odmítnout průzkumníka a rozzlobit vlastní šovinisty."
 africa_colonial_events.41.c: "Tenhle muž je vzorem! Měl by vstoupit do politiky!"
