 je_splitting_oman: "Rozpad Ománu"
 je_splitting_oman_reason: "Synové [ROOT.GetCountry.GetRuler.GetFullName] touží po moci a území. Po smrti sultána si synové [ROOT.GetCountry.GetRuler.GetFirstName] rozdělí zemi mezi arabská a africká území a budou soupeřit o nadvládu."
 said_bin_sultan_al_said_dies: "Sultán Saíd al Saíd zemřel."
 omani_realm_splits: "Ománská říše se rozdělí mezi Omán a Zanzibar."
 zanzibar.1.t: "Vzestup Zanzibaru"
 zanzibar.1.d: "Zatímco [SCOPE.sCharacter('sultan_of_muscat_and_oman').GetFullName] převzal moc v Ománu a Maskatu, jeho mladší bratr [SCOPE.sCharacter('sultan_of_zanzibar').GetFullName] si vybudoval vlastní mocenskou základnu jako [SCOPE.sCountry('sultanate_of_zanzibar').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('sultanate_of_zanzibar').GetNameNoFlag] ve východní Africe."
 zanzibar.1.f: "„Proč Afrika? Rozhlédni se! Vody kolem Zanzibaru jsou modřejší než samotné nebe, bílý písek je tak jemný, že bych mohl ležet na pobřeží jako na stovce polštářů, a na trzích lze získat veškeré bohatství Afriky. Proč se trápit v Ománu, když zde mohu vybudovat říši?“"
 zanzibar.1.a: "[SCOPE.sCountry('muscat_and_oman').GetNameNoFlag] zůstává nadřazený!"
 zanzibar.1.a.tt: "Pokračujete ve hře za [SCOPE.sCountry('muscat_and_oman').GetNameNoFlag]."
 zanzibar.1.b: "Naše budoucnost je v [SCOPE.sCountry('sultanate_of_zanzibar').GetNameNoFlag]."
 zanzibar.1.c: "Zastavte [SCOPE.sCountry('sultanate_of_zanzibar').GetNameNoFlag]! [SCOPE.sCountry('muscat_and_oman').GetNameNoFlag] nesmí být rozdělen."
 je_military_aviation: "Válka v oblacích"
 je_military_aviation_reason: "Pokroky v letectví otevřely nové bojiště: nebe nad námi."
 aviation.1.t: "Letecké eso"
 aviation.1.d: "[SCOPE.sCharacter('flying_circus_general').GetFullName] si získal slávu nejen využíváním letadel v boji, ale i tím, že osobně pilotuje nad [SCOPE.sState('flying_circus_state').GetName]."
 aviation.1.f: "„Noviny ho nazývají ‚[SCOPE.sCharacter('flying_circus_general').GetCustom('air_ace_adjective_loc')] [SCOPE.sCharacter('flying_circus_general').GetCustom('air_ace_noun_loc')]‘! Je neuvěřitelný — nevím, jestli ho raději ukazovat doma, nebo ho dál posílat do boje nad [SCOPE.sState('flying_circus_state').GetAltAdjectiveNoFormatting('A')].“"
 aviation.1.a: "Uctívání hrdinů pomůže doma."
 aviation.1.b: "Váleční hrdinové musí zůstat na frontě."
 war_hero_cult: "Hrdina domácí fronty"
 war_hero_fighter: "Letecký hrdina"
 je_trench_warfare: "Válka v bahně"
 je_trench_warfare_reason: "Vojáci objevili novou zbraň této éry vědecké války: lopatu."
 trench_warfare.1.t: "Zákopová fronta"
 trench_warfare.1.d: "Masivní využívání zákopů v [SCOPE.sState('trench_warfare_state').GetName] pod vedením [SCOPE.sCharacter('trench_warfare_general').GetFullName] proměnilo krajinu v zpustošené peklo. Patová situace nemůže trvat věčně, ale další postup není jasný."
 trench_warfare.1.f: "„Byl jsi někdy v zákopech? Je to méně osamělé, než si myslíš. Máš tam přátele všude — krysy jsou s tebou ve dne v noci, a i když tví druhové padnou, zůstanou s tebou, dole v bahně.“"
 trench_warfare.1.a: "Musíme se dále zakopat v [SCOPE.sState('trench_warfare_state').GetName]."
 trench_warfare.1.b: "Nesmíme nechat obranu stagnovat."
 trench_warfare.1.c: "Potřebujeme průlom."
