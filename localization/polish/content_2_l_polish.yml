 anti_state_religion.1.t: "Odhalená náboženská korupce"
 anti_state_religion.1.d: "Šokující odhalení zveřejněné v [ROOT.GetCountry.GetAdjectiveNoFormatting] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] odhalilo hlubokou korupci v náboženských institucích naší země. Veřejné mínění se výrazně obrátilo proti duchovenstvu [SCOPE.sReligion('country_religion').GetName]."
 anti_state_religion.1.f: "„Zajímá naši kněžskou třídu skutečně duše člověka, nebo jeho peněženka? Je jejich zlato určeno vyššímu poslání, nebo nízkým účelům? Jak mohou lidé pracovat v takových úřadech a nezaplést se do sítě nemorálnosti, proti níž sami kážou?“"
 anti_state_religion.1.a: "I víra může být zkažená!"
 anti_state_religion.1.b: "Děsivé! Možná je čas změnit směr."
 anti_state_religion.2.t: "Proti antiklerikalismu"
 anti_state_religion.2.d: "Snahy státu o omezení moci duchovenstva vyvolaly odpor mezi [SCOPE.gsInterestGroup('community_rel_ig_scope').GetName], kteří požadují ukončení těchto antiklerikálních politik."
 anti_state_religion.2.f: "„Národ potřebuje víru, která ho sjednocuje. Opustit naše tradice by znamenalo přijmout systém plný omylů a klamů! Vždyť by to... podkopalo společenský řád tím, že by zničilo samotné základy všeho, co je nám drahé!“"
 anti_state_religion.2.a: "Antiklerikalismus je nezbytný."
 anti_state_religion.2.b: "Měli bychom přehodnotit naše plány."
 anti_state_religion.3.t: "Mučedník"
 anti_state_religion.3.d: "Do hlavního města dorazil horlivý kazatel [SCOPE.sReligion('country_religion_pop').GetName], který vyvolává potyčky se strážemi a vykřikuje nejvíce pobuřující prohlášení. Zjevně se snaží být zatčen a stát se „mučedníkem“ víry."
 anti_state_religion.3.f: "„Tato vláda je v rozporu s přirozenou vírou všech lidí! Její pojetí společnosti je zcela cizí duchovním pravdám. Věří, že existuje nepřekonatelný rozpor mezi naší vírou a [ROOT.GetCountry.GetAdjectiveNoFormatting] světonázorem — a myslí si, že může rozhodovat o osudu našich duší. Směšné! Tato vláda je odporná fraška rouhající se všemu dobrému.“"
 anti_state_religion.3.a: "Okouzlující. Zatkněte toho muže."
 anti_state_religion.3.b: "Opravdu? Nechte ho být."
 election_neutral.1.t: "Prosím, spalte tento dopis"
 election_neutral.1.d: "[SCOPE.sCharacter('mulligan_letters_leader').GetFullName], významný člen [SCOPE.sParty('mulligan_letters_party').GetName], byl obviněn z hrubé korupce. [SCOPE.sCharacter('mulligan_letters_leader').GetSheHe|U] všechna obvinění důrazně popíral, dokud se neobjevily usvědčující dopisy podepsané [SCOPE.sCharacter('mulligan_letters_leader').GetHerHim]."
 election_neutral.1.f: "„Ano, ano, jsem ochoten projednat obsah těchto dopisů s komisí, pokud mi bude nejprve umožněno je prostudovat v soukromí. Samozřejmě na svou čest prohlašuji, že žádné důkazy nezměním ani nezničím. Opravdu.“"
 election_neutral.1.a: "[SCOPE.sParty('mulligan_letters_party').GetName] by měla stát za [SCOPE.sCharacter('mulligan_letters_leader').GetFullName] a vše popřít."
 election_neutral.1.b: "[SCOPE.sCharacter('mulligan_letters_leader').GetFullName] by měl být izolován, aby ochránil zbytek [SCOPE.sParty('mulligan_letters_party').GetName]."
 election_neutral.1.c: "V [SCOPE.sParty('mulligan_letters_party').GetName] jsou spojenci, kteří mohou vystoupit na obranu [SCOPE.sCharacter('mulligan_letters_leader').GetLastName]."
 election_neutral.1.c.tt: "Postava v [SCOPE.sParty('mulligan_letters_party').GetName] má vlastnost Charismatic."
 election_neutral.2.t: "Velitel chválí občanskou koalici"
 election_neutral.2.d: "[SCOPE.sCharacter('electioneering_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('electioneering_commander').GetLastName] veřejně vyjádřil podporu [SCOPE.sParty('electioneering_commander_party').GetName], čímž zpochybnil politickou neutralitu armády."
 election_neutral.2.f: "„Mou povinností je bránit národ a jeho zájmy. Politika je součástí války stejně jako bitvy a logistika — nevidím problém v tom, že plním svou povinnost a snažím se zajistit, aby vládli ti nejvhodnější.“"
 election_neutral.2.a: "[SCOPE.sCharacter('electioneering_commander').GetFullName] může říkat, co chce."
 election_neutral.2.b: "Pokárat [SCOPE.sCharacter('electioneering_commander').GetHerHim] — dobrý voják rozkazy nevydává, ale plní!"
 election_neutral.2.c: "Když má [SCOPE.sCharacter('electioneering_commander').GetFullName] tak rád politiku, měl by se zapojit více."
 election_neutral.2.c.tt: "[SCOPE.sCharacter('electioneering_commander').GetFullName] nemá vlastnost Politician."
 election_neutral.3.t: "Vlaková kampaň"
 election_neutral.3.d: "[SCOPE.sCharacter('whistle_stop_leader').GetFullName] plánuje cestovat po [SCOPE.sState('whistle_stop_state').GetName] vlakem a vést kampaň pro [SCOPE.sParty('whistle_stop_party').GetName]."
 election_neutral.3.f: "„Chci se jen ukázat lidem — jsem obyčejný [SCOPE.sCharacter('whistle_stop_leader').GetWomanMan], který chce šířit poselství naší strany nejlepšími dostupnými prostředky.“"
 election_neutral.3.a: "Kampaň vlakem je chytrý tah."
 election_neutral.3.b: "Byla by škoda, kdyby ten vlak měl neustálá zpoždění."
 election_neutral.3.c: "Osud národa závisí na tom, aby ten vlak jel včas!"
 election_neutral.3.b.tt: "Zájmová skupina podporující [SCOPE.sParty('whistle_stop_party').GetName] není ve vládě."
 mysteriously_mismanaged_rail_network: "Záhadně špatně řízená železniční síť"
 stressed_rail_network: "Přetížená železniční síť"
 surprisingly_efficient_rail_network: "Překvapivě efektivní železniční síť"
 election_neutral.4.t: "Kampaň v [SCOPE.sState('midlothian_campaign_state').GetName]"
 election_neutral.4.d: "Přátelské vztahy vlády s [SCOPE.sCountry('midlothian_campaign_ally_country').GetName], nechvalně proslulou zemí, se staly terčem ostré kritiky opozice."
 election_neutral.4.f: "„Pomyslete jen, že jméno [ROOT.GetCountry.GetNameNoFormatting], nikoli z nutnosti, ale z cynických diplomatických gest, je spojováno s hrůznými zločiny [SCOPE.sCountry('midlothian_campaign_ally_country').GetNameNoFormatting]! Musíme prosazovat novou, etickou zahraniční politiku! K čemu to všechno je, když se nemůžeme podívat do zrcadla bez studu?“"
 election_neutral.4.a: "Možná má řečník z [SCOPE.sParty('opposition_party').GetName] pravdu."
 election_neutral.4.b: "Pokud se vláda distancuje od [SCOPE.sCountry('midlothian_campaign_ally_country').GetName], argument opozice oslabí."
 election_neutral.5.t: "Příliš horliví stoupenci"
 election_neutral.5.d: "Podporovatelé [SCOPE.sParty('campaign_club_party').GetName] překročili meze kampaně a obtěžují či napadají protivníky."
 election_neutral.5.f: "„Jsem prostě straník. Vím, koho mám rád, koho ne, a chci, aby naši vyhráli a oni prohráli.“"
 election_neutral.5.a: "Zakročit proti aktivitám [SCOPE.sParty('campaign_club_party').GetName]."
 election_neutral.5.b: "Nechat stoupence jednat bez zásahu."
 election_neutral.5.c: "Proč se omezovat? Ať bojují naplno!"
 election_neutral.5.c.tt: "Vůdce [SCOPE.sParty('campaign_club_party').GetName] má vlastnost Wrathful nebo Cruel."
 election_neutral.6.t: "Stranický tisk"
 election_neutral.6.d: "Stranické noviny se během voleb rychle šíří. Ty spojené s [SCOPE.sParty('newspaper_party').GetName] jsou obzvlášť účinné."
 election_neutral.6.f: "„Čtěte! Poctiví politici napadeni zbabělci! Kandidát hladí štěně! Čtěte!“"
 election_neutral.6.a: "[SCOPE.sParty('newspaper_party').GetName] využívá tisk brilantně."
 election_neutral.6.b: "Prodej novin roste! Vydavatelé prosperují."
 election_neutral.6.c1: "Je v zájmu státu podporovat pravdu."
 election_neutral.6.c2: "Je v zájmu státu omezit lži."
 election_neutral.6.c1.tt: "Máte zákon #bold Censorship#!\nZájmová skupina podporující [SCOPE.sParty('newspaper_party').GetName] je ve vládě."
 election_neutral.6.c2.tt: "Máte zákon #bold Censorship#!\nZájmová skupina podporující [SCOPE.sParty('newspaper_party').GetName] je #bold není#! ve vládě."
 election_neutral.7.t: "Financování kampaní"
 election_neutral.7.d: "Strany, zejména [SCOPE.sParty('campaign_financing_party').GetName], mají potíže získat finance na kampaň."
 election_neutral.7.f: "„Podívejme se... poplatky... ale co je tohle? Ten hotel by ubytoval půl vesnice! A alkoholu je tu na utopení ryby!“\n\n„Hlasy nejsou levné, pane. Chcete vyhrát, že?“"
 election_neutral.7.a: "Přispějme [SCOPE.sParty('campaign_financing_party').GetName]."
 election_neutral.7.b: "Poskytnout základní financování všem stranám."
 election_neutral.7.c: "Kdo nemá na kampaň, neměl by ji vést."
 election_neutral.8.t: "Tažení za změnu"
 election_neutral.8.d: "Snaha o prosazení [SCOPE.sLaw('changing_policies_law').GetName] nadchla [SCOPE.sParty('changing_policies_favorable_party').GetName], která ji plně podporuje."
 election_neutral.8.f: "„Země touží po změně! Musíme přijmout budoucnost!“"
 election_neutral.8.a: "[SCOPE.sParty('changing_policies_favorable_party').GetName] jsou šampioni změny!"
 election_neutral.8.b: "Lid promluvil!"
