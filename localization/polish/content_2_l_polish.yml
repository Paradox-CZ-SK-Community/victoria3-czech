l_polish:
 industrial_accident_events.1.t: "Velký požár oděvní továrny"
 industrial_accident_events.1.d: "Smrtící požár zabil mnoho dělníků v [SCOPE.sState('triangle_shirtwaist_factory_state').GetName], částečně kvůli nebezpečným pracovním podmínkám a zamčeným nouzovým východům. Bylo odhaleno, že [SCOPE.sCharacter('guilty_factory_owner').GetFullName], významný člen [SCOPE.gsInterestGroup('guilty_factory_owner_ig').GetName], byl vlastníkem nyní vyhořelé továrny."
 industrial_accident_events.1.f: "Jeden z mužů, kteří se snažili požár uhasit, vypovídal při vyšetřování: „Myslel jsem si, že místnost je plná jen ohořelých strojů,“ řekl, „ale pak jsem šlápl na něco měkkého.“"
 industrial_accident_events.1.a: "To je prostě cena pokroku."
 industrial_accident_events.1.b: "[SCOPE.sCharacter('guilty_factory_owner').GetFullName] musí být za tyto smrti pohnán k odpovědnosti!"
 industrial_accident_events.1.b.tt: "[SCOPE.sCharacter('guilty_factory_owner').GetFullName] bude zatčen a zbaven [SCOPE.sCharacter('guilty_factory_owner').GetHerHis|l] mocenské pozice."
 industrial_accident_events.2.t: "Nehoda v barvírně"
 industrial_accident_events.2.d: "Několik dělníků dnes zemřelo v barvírně v [SCOPE.sState('dyeworks_state').GetName], když se průmyslová nádoba s horkým barvivem převrhla a zaplavila dílnu i nic netušící pracovníky."
 industrial_accident_events.2.f: "Místní obyvatelé jsou incidentem pobouřeni a tvrdí, že za nehodu mohou špatné bezpečnostní podmínky v horkém a nebezpečném prostředí, a vyzývají vládu k zásahu. Když záchranáři opouštěli místo, někteří zaměstnanci dílny stále umírali."
 industrial_accident_events.2.a: "Dříve či později zčernáme všichni."
 industrial_accident_events.2.b: "Nezemřeli nadarmo!"
 industrial_accident_events.3.t: "Statečný strojvedoucí"
 industrial_accident_events.3.d: "Železniční nehoda v [SCOPE.sState('casey_jones_state').GetName] jen těsně zabránila velkým ztrátám na životech díky rychlému jednání strojvedoucího, který při nehodě zahynul. Zemřelo jen několik lidí, ale odstranění trosek bude trvat nějaký čas."
 industrial_accident_events.3.f: "„Pojďte všichni sem, chcete-li slyšet příběh o statečném strojvedoucím...“"
 industrial_accident_events.3.a: "Díkybohu za pohotové strojvedoucí!"
 industrial_accident_events.3.b: "Železničáři by si za smrt v práci zasloužili víc než jen píseň."
 industrial_accident_events.4.t: "Velká melasová povodeň"
 industrial_accident_events.4.d: "Nádrž plná melasy určené pro výrobu rumu praskla a zaplavila ulice obchodního centra [SCOPE.sState('molasses_flood_state').GetCityHubName], přičemž zabila desítky lidí a stovky dalších zranila."
 industrial_accident_events.4.f: "„Melasa, sahající do pasu, pokryla ulice a vířila kolem trosek. Tu a tam se zmítala nějaká postava... nebylo možné poznat, zda jde o zvíře nebo člověka. Jen pohyby v lepkavé hmotě naznačovaly, že tam je život.“"
 industrial_accident_events.4.a: "Uzavřít lihovary, dokud nebudou trosky odstraněny."
 industrial_accident_events.4.b: "Jedna tragédie nesmí zastavit pokrok!"
 industrial_accident_events.5.t: "Výbuch kotle"
 industrial_accident_events.5.d: "Továrnou v [SCOPE.sState('boiler_explosion_state').GetName] otřásl obrovský výbuch kotle, který zabil nebo zranil desítky lidí. Zpráva o této tragédii se rychle stala celonárodní událostí."
 industrial_accident_events.5.f: "„Spalující pára se vyvalila z prasklého kotle a udeřila muže v dílně přímo do tváře. Pokud je nezabila samotná exploze nebo trosky, pak je jistě dostala pára.“"
 industrial_accident_events.5.a: "Tyto události jsou prostě cenou pokroku."
 industrial_accident_events.5.b: "Dělníci by neměli být vykořisťováni a nuceni do takových podmínek."
 industrial_accident_events.5.c: "Stroje jsou nebezpečné! Průmysl je sám o sobě zhoubou."
 industrial_accident_events.6.t: "Důlní neštěstí"
 industrial_accident_events.6.d: "Důl v [SCOPE.sState('mining_accident_state').GetName] se zřítil a uvěznil horníky v temných šachtách pod zemí. Rozsah nehody učinil z této tragédie zprávu napříč [SCOPE.sState('mining_accident_state').GetName] i celou zemí."
 industrial_accident_events.6.f: "„Mě vykopali, ale mého přítele tam nechali.“\n\nTo bylo vše, co byl předák schopen z nešťastného chlapce dostat. Špinavé cáry na něm visely jako potrhaný pohřební oděv. Zda zadržoval slzy ze strachu před bitím, nebo aby zůstal silný, předák nevěděl. Pro dnešek byl zlomený. Předák jen doufal, že vedoucí projeví milosrdenství."
 industrial_accident_events.6.a: "To je malá cena za postup průmyslu."
 industrial_accident_events.6.b: "Toto pobuřující zneužívání obyčejných lidí nesmí pokračovat!"
 industrial_accident_events.6.c: "Tyto doly jsou pohromou pro lidi i krajinu."
 egyptian_crisis_events.1.t: "Obnovení naší autority v Sýrii"
 egyptian_crisis_events.1.d: "Egypt v roce 1833 obsadil většinu našich levantských provincií poté, co se jeho místodržitel pokusil neúspěšně svrhnout celou imperiální vládu. Čas znovu získat území, která jsme v této válce ztratili, je již dávno pryč.\n\nTento krok však pravděpodobně přitáhne pozornost evropských [Concept('concept_great_power', 'velmocí')]."
 egyptian_crisis_events.1.f: "„Co bylo kdysi naše, bude opět naše. Otisk, který jsme zanechali v Egyptě a Levantě, nelze ignorovat. Stejně jako čas vyrývá linie do hor, i my jsme vyrývali svůj osud do jejich země stopami našich předků.\n\nJděte, jděte nyní, děti Slunce!“"
 egyptian_crisis_events.1.a: "Musíme zajistit, aby stáli na naší straně."
 egyptian_crisis_events.1.a.tt: "[THIS.GetCountry.GetAltAdjective('D')] bude nabídnut [concept_interest] v regionu."
 egyptian_crisis_events.1.b: "Nepotřebujeme jejich souhlas, abychom si vzali to, co je naše."
 egyptian_crisis_events.2.t: "Turecký vpád"
 egyptian_crisis_events.2.d: "Osmané zahájili své kroky k opětovnému získání území, která jsme od nich získali v roce 1833. To je porušení naší suverenity! Tento konflikt však pravděpodobně přitáhne pozornost evropských [Concept('concept_great_power', 'velmocí')], což nám dává příležitost získat mocné spojence."
 egyptian_crisis_events.2.f: "„Věřím, že já a sultán máme nevyřízené účty.“"
 egyptian_crisis_events.2.a: "Musíme se této agresi postavit!"
 egyptian_crisis_events.2.a.tt: "Všem evropským [Concept('concept_great_power', 'velmocem')] bude nabídnut [concept_interest] v našem regionu."
 egyptian_crisis_events.4.t: "Egyptsko-osmanská krize"
 egyptian_crisis_events.4.d: "Pokus Osmanské říše znovu získat kontrolu nad Levantou od Egypta se stal mezinárodním incidentem. Naše zapojení může ovlivnit rovnováhu sil v regionu."
 egyptian_crisis_events.4.f: "Ve dvanáct třicet dorazil posel s jedinou obálkou zapečetěnou voskem. Chladný vítr následoval jeho klopýtavou, udýchanou chůzi. Ostatní generálové i poradci se shromáždili kolem [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a žádali klid. Posel předal zprávu s přerývaným dechem o jejím původu: Egypt. Osmané táhnou na Egypt."
 egyptian_crisis_events.4.a: "Musíme situaci sledovat."
 egyptian_crisis_events.4.b: "Tato krize nás nezajímá."
