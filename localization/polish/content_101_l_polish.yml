 character_events.6.t: "Socha historie"
 character_events.6.d: "Ve státě [SCOPE.sState('statue_state').GetName] stojí socha starého panovníka. Někteří navrhují, aby byla stržena."
 character_events.6.f: "„Shlíží na nás, to tedy ano, směje se, holedbá se, vysmívá se nám. Strhnout ji je jediný způsob, jak se jí zbavit.“"
 character_events.6.a: "Strhněte symboly starého světa."
