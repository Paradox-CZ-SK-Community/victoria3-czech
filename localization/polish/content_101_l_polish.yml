 character_events.5.d: "Byla objednána socha [SCOPE.sCharacter('statue_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('statue_ruler').GetFullName] a bylo navrženo, aby byla hrdě vystavena ve státě [SCOPE.sState('statue_state').GetName]. "
 character_events.5.f: "„[SCOPE.sCharacter('statue_ruler').GetCustom('personality_traits_loc')] – tak by se dal popsat výraz tváře sochy, když se na vás shlížejíc usmívá. Oči, které se mihotají opačným směrem než slunce.\n\nMožná si to ale jen představujete?“"
