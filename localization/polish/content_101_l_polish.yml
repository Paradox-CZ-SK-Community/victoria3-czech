 je_war_nursing: "Váleční ranění"
 je_war_nursing_reason: "Mezi válečnými raněnými ve válce [SCOPE.sWar('ongoing_journal_war').GetName] se nekontrolovaně šíří nemoci. Zařízení pro péči o raněné jsou přetížená. Musíme nějak snížit úroveň nemocí, jinak zemře více lidí."
 nursing_events.1.t: "Nemoci mezi raněnými"
 nursing_events.1.d: "Počet úmrtí na nemoci mezi raněnými vojáky prudce vzrostl."
 nursing_events.1.f: "„Představte si kvart, víte, kolik je kvart, že? Ne? Tak si představte dva šálky čaje, a teď si místo čaje představte, že jsou plné červů. Tolik jsme jich vytáhli z tohohle chudáka, když byl ponechán hnít.“"
 nursing_events.1.a: "To je znepokojivé."
 nursing_events.1.b: "Přesuňte část zátěže na civilní zdravotnický sektor."
 for_duration_of_war_tt: "Po dobu trvání války..."
 war_wounded_disease: "Nemoci mezi raněnými"
 nursing_events.2.t: "Lékařská čistota"
 nursing_events.2.d: "Některé ze sester pracujících na frontových liniích války [SCOPE.sWar('ongoing_war').GetName] navrhly, že přijetím nových postupů čistoty bychom mohli snížit počet úmrtí."
 nursing_events.2.f: "„Udržujte oddělení čisté, ruce čisté a především rány čisté. Udělejte byť jen jednu z těchto věcí a výsledky jsou upřímně ohromující.“"
 nursing_events.2.a: "To je výborný nápad."
 nursing_events.2.b: "Tyto znalosti se musí šířit."
