 congo_free_state_events.6.t: "Zpráva"
 congo_free_state_events.6.d: "Vláda země [SCOPE.sCountry('report_country').GetAdjective] zveřejnila zprávu o [SCOPE.sCountry('free_state').GetNameNoFlag], která odhaluje strašlivé činy páchané místní správou."
 congo_free_state_events.6.f: "„Místní úředníci jsou jmenováni, aby zajistili sběr surovin. Nesplnění této kvóty znamená rozsudek smrti. Důkaz? Ruka oběti. Tyto ohavné skutky brutality už nemohou zůstat nenahlášeny.“"
