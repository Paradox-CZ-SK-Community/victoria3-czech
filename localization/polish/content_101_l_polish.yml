 council_republic_law_events.1.t: "Charismatický projev"
 council_republic_law_events.1.d: "Obzvlášť charismatický intelektuál z oboru politologie pronesl v [ROOT.GetCountry.GetCapital.GetCityHubName] projev o výhodách zákona [SCOPE.sLaw('current_law_scope').GetName], který se setkal s velkým nadšením."
 council_republic_law_events.1.f: "„Kapitalistické stroje běží na našem potu a krvi, a kdo sklízí zisky? My ne, to tedy ne! Muž v cylindru s nóbl botami a k tomu rekreačním domem v [SCOPE.sCountry('holiday_home_country').GetCapital.GetCityHubName]. Popíjí nejjemnější víno, zatímco my se plazíme pro zbytky.“"
 council_republic_law_events.1.a: "Výborně, měli by toho dělat víc!"
 council_republic_law_events.1.b: "Možná jejich přirozené charisma dokáže vzbudit trochu loajality."
 council_republic_speech_advance: "Projev pro radní republiku"
 council_republic_law_events.2.t: "Revoluce v malém"
 council_republic_law_events.2.d: "Říká se, že se skupina dělníků vzbouřila proti svým šéfům a převzala kontrolu nad továrnou v [ROOT.GetCountry.GetCapital.GetCityHubName]."
 council_republic_law_events.2.f: "„Jednoho dne přišli, vyhodili šéfa na dlažbu a pak se pustili do práce jako obvykle. Policie se pokusila zasáhnout, ale zkuste říct stovkám rozzuřených továrních dělníků mávajících nástroji, co mají dělat.“"
 council_republic_law_events.2.a: "Uvidíme, jak se to vyvine."
 council_republic_law_events.2.b: "Musíme to zastavit."
 council_republic_law_events.2.c: "Tohle je začátek skutečné revoluce!"
 council_republic_debate_progress: "Dělníkům dovoleno řídit továrnu"
 council_republic_factory_debate_fail: "Dělníci zatčeni za tovární povstání"
 angry_at_factory_revolution: "Hněv kvůli továrnímu povstání."
 council_republic_law_events.3.t: "Stranické ústředí vyhořelo"
 council_republic_law_events.3.d: "Ústředí komunistické strany vyhořelo. Tato organizační ztráta je vážně poškodila."
 council_republic_law_events.3.f: "„Drahý soudruhu @censored!@censored!@censored!@censored!, s lítostí tě informuji, že naše stranické ústředí nacházející se v ulici @censored!@censored!@censored!@censored! již není provozuschopné poté, co požár zničil většinu budovy. Podezříváme ze záškodnictví @censored!@censored!@censored!@censored!, ale v tuto chvíli to nedokážeme prokázat.“"
 council_republic_law_events.3.a: "Hrozné zprávy."
 council_republic_law_events.3.b: "Jsem si jist, že bychom je mohli někde ubytovat."
