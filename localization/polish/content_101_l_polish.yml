 warlord_china_events.100.t: "Čína se tříští"
 warlord_china_events.100.d: "Pád dynastie Čching ukončil dlouhé období čínské císařské vlády a zahájil novou éru vlády válečníků."
 warlord_china_events.100.f: "„Říše, stejně jako sny, jsou utvořeny z nehmatatelné hmoty, tak křehké, že mohou kdykoli skončit, bez jakéhokoli varování. Přesto v sobě nesou tutéž šílenou přitažlivost. I když nit držící jejich švy pohromadě je neviditelná a každý steh skrývá ránu.\n\nTisíce let císařské vlády skončily v jediném okamžiku.“"
 warlord_china_events.100.a: "Musíme tuto situaci zachránit."
 warlord_china_events.110.t: "Rozbíjení melounů"
 warlord_china_events.110.d: "Hrozí, že se na veřejnost dostane, že [SCOPE.sCharacter('prisoner_killing_warlord').GetPrimaryRoleTitle] [SCOPE.sCharacter('prisoner_killing_warlord').GetFullName] se baví tím, že mečem rozbíjí lebky vězňů."
 warlord_china_events.110.f: "„Víš, proč mi někteří říkají Starý šestaosmdesát? Je to kvůli velikosti mého...“ \n\n Zbytek slov, která [SCOPE.sCharacter('prisoner_killing_warlord').GetPrimaryRoleTitle] pronáší, přehluší výkřiky a křupání kostí, když [SCOPE.sCharacter('prisoner_killing_warlord').GetSheHe] spustí svůj meč na hlavu vězně.\n\n „...přesně osmdesáti šesti mexických stříbrných dolarů.“ "
 warlord_china_events.110.a: "Lidé by to měli vědět."
 warlord_china_events.110.b: "Nejlepší bude to ututlat."
