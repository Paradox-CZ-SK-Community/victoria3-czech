 character_events.4.t: "Cirkevní skandál"
 character_events.4.d: "Bylo odhaleno, že [SCOPE.sCharacter('devout_scandal').GetFullName] ze skupiny [SCOPE.sCharacter('devout_scandal').GetInterestGroup.GetName] udržoval tajný poměr se členem duchovenstva. Je požadována [SCOPE.sCharacter('devout_scandal').GetHerHis|U] rezignace."
 character_events.4.f: "„Už samotný fakt, že si tenhle úskočný parchant myslel, že mu projde tak hrubé zneužití [SCOPE.sCharacter('devout_scandal').GetHerHis] moci, ukazuje všechno, co je špatně na vedení [SCOPE.sCharacter('devout_scandal').GetInterestGroup.GetNameNoFormatting].“"
 character_events.4.a: "Donuťte [SCOPE.sCharacter('devout_scandal').GetHerHim], aby odstoupil."
 character_events.4.b: "„Kdo je bez hříchu, ať první hodí kamenem.“"
