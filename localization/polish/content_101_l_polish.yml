 technology_events.1.t: "Neregulované automobily"
 technology_events.1.d: "Vzhledem k sérii nehod se objevily požadavky na regulaci automobilů."
 technology_events.1.f: "Je hlášeno, že [SCOPE.GetRootScope.GetCountry.GetCustom('automobile_accident_type')]„Rychlejší než kůň a dvakrát tak těžké. Pokud lidé nevidí, proč je to nebezpečné, nevím, co bych vám měl říct."
 technology_events.1.a: "Přísnější zákony učiní ulice bezpečnějšími."
 technology_events.1.b: "Lidé se musí pouze přizpůsobit."
 technology_events.1.c: "Auta by měla mít přednost."
 custom_automobile_accident_type_crash: "se dvě auta srazila vysokou rychlostí, což závažně zranilo cestující."
 custom_automobile_accident_type_wall_crash: "auto, které se vymklo kontrole, narazilo do zdi vysokou rychlostí a zabilo řidiče."
 custom_automobile_accident_type_wall_person_hit: "auto narazilo do muže, který přecházel ulici, a zabilo ho."
 custom_automobile_accident_type_river: "automobil sjel ze silnice do blízké řeky."
 technology_events.10.t: "Mezinárodní telefonní ústředna"
 technology_events.10.d: "Bylo navrženo, že zřízením přeshraniční telefonní ústředny s [SCOPE.sC('telephone_neighbour').GetAltAdjective('I')] bychom mohli snadněji zlepšit vztahy."
 technology_events.10.f: "„Určitě to snižuje nedorozumění, když můžeme jednoduše zvednout telefon a vyřešit, co se děje za hranicemi.“"
 technology_events.10.a: "Zní to jako skvělý nápad."
 technology_events.10.b: "To si nemyslím."
 technology_events.20.t: "Rozhovor u krbu"
 technology_events.20.d: "[SCOPE.sCharacter('radio_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('radio_ruler').GetFullName] se [Select_CString(SCOPE.sCharacter('radio_ruler').IsFemale,'rozhodla','rozhodl')] využít novou a vzrušující technologii rádia k přímějšímu spojení s lidmi."
 technology_events.20.f: "„Je to, jako by [Select_CString(SCOPE.sCharacter('radio_ruler').IsFemale,'byla','byl')] tady v místnosti se mnou. Je těžké nebýt přesvědčen.“"
 technology_events.20.a: "Mělo by to vyjadřovat autoritu"
 technology_events.20.b: "Mělo by nás to ukazovat v dobrém světle."
 technology_events.20.c: "Dovolte mi vám říct o tomto novém zázračném léku."
 modifier_radio_authority: "Autoritářská rozhlasová hlášení"
 modifier_radio_ig: "Pozitivní rozhlasová publicita"
