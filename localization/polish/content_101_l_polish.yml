 je_radio: "Výroba rádií"
 je_radio_reason: "Poskytnutí masového přístupu k rádiu umožňuje šířit informace široko daleko bez potíží a zvláštností novin."
 production_tech_events.210.t: "Výroba rádií"
 production_tech_events.210.d: "Výroba rádií v našich továrnách vedla k prudkému růstu zaměstnanosti a zisku."
 production_tech_events.210.f: "„Telefony? Ne, ne, ne, kdo chce telefon? Jeden člověk mluví s druhým? K ničemu! To, co chcete, je rádio! Jeden člověk mluví ke stovkám, ba tisícům, a co je na tom nejlepší? Nemohou odpovědět!“"
 production_tech_events.210.a: "Více rádií!"
