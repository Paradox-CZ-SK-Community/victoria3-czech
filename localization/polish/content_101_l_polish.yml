 central_america.2.t: "Rozpad Střední Ameriky"
 central_america.2.d: "Zbývající státy unie vyhlásily svou nezávislost. Je jasné, že unie [ROOT.GetCountry.GetName] skončila a že [SCOPE.sState('capital_scope').GetName] se o sebe musí postarat sama."
 central_america.2.f: "„Jde o to znovu převzít vlastnictví naší země, nebo se jim podrobit. Jde o to zapomenout jména našich rodičů, nebo se učit předky nepřítele. Jde o to osévat vlastní zemi, nebo sledovat, jak ji pustoší. Je to svoboda, nebo válka!“"
 central_america.2.a: "Musíme přijmout svůj osud."
 central_america.2.b: "Unii tak lehce neopustíme."
