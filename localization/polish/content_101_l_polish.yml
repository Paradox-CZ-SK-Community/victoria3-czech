 diplomatic_friction.1.d: "Podpoříme dělníky v [SCOPE.sCountry('rival_scope').GetAltAdjective('L')], čímž posílíme moc jejich odborů."
 diplomatic_friction.1.f: "„Možná věříme v mezinárodní věc pracujícího člověka, možná ne. Nakonec na tom nezáleží, důležité je, že [SCOPE.sCountry('rival_scope').GetAdjectiveNoFormatting] odbory zesílí.“"
