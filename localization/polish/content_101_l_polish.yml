 congo_free_state_events.1.t: "[SCOPE.sCountry('free_state').GetNameNoFlag]"
 congo_free_state_events.1.d: "[SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('free_state_monarch').GetFullName] prohlásil, že tato země bude nyní svobodným státem pod [SCOPE.sCharacter('free_state_monarch').GetHerHis] kontrolou v personální unii s naší zemí."
 congo_free_state_events.1.f: "[SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle] má tvář strnulou v nehybném úsměvu jako mramorová socha. [SCOPE.sCharacter('free_state_monarch').GetSheHe|U] mluví sametovým hlasem, po němž stěny rudnou a útulní: „Nechci riskovat, že propásneme skvělou příležitost zajistit si pro sebe kus tohoto velkolepého afrického koláče.“\n\nObrazy za [SCOPE.sCharacter('free_state_monarch').GetHerHim] všechny zobrazují společné téma; plátno se třpytí v místech s krví."
 congo_free_state_events.1.a: "Měli bychom to sledovat."
 congo_free_state_events.2.t: "Zvěsti z [SCOPE.sCountry('free_state').GetNameNoFlag]"
 congo_free_state_events.2.d: "Ve vládních kruzích se mluví o tom, že [SCOPE.sCountry('free_state').GetNameNoFlag], vlastněný osobně [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('free_state_monarch').GetFullName], se ke svým lidem nechová příliš dobře."
 congo_free_state_events.2.f: "„Lodě připlouvající do přístavu předvádějí podezřelý, a přece odvážný třpyt. Rubíny a diamanty, planoucí jako pochodně, koketně vstupují do země. Lodě vracející se zpět, ach, to je jiná věc.\n\nPušky, střelný prach a vojáci. Rád bych to řekl mírněji, příteli, věř mi. Rád bych.“"
 congo_free_state_events.2.a: "Není se čeho obávat."
 congo_free_state_events.2.b: "Promluvíme si s [SCOPE.sCharacter('free_state_monarch').GetFullName]." 
 congo_free_state_events.3.t: "Znepokojivý úbytek populace"
 congo_free_state_events.3.d: "Misionáři i laici vyjádřili své nejhlubší znepokojení nad rostoucím počtem úmrtí v [SCOPE.sCountry('free_state').GetNameNoFlag]."
 congo_free_state_events.3.f: "„V tuhle chvíli je to všechno. Jsou to nemoci, hladovění, válka, špatná voda. Ach, vždycky je to válka, že? Jsou to důstojníci. Nejsou nakonec i všechny ostatní věci také důstojníci? A především je to [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle].“"
 congo_free_state_events.3.a: "Nemůžeme jít proti vládě [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle]."
 congo_free_state_events.3.b: "Tohle je masakr! Svět to musí vědět!"
 congo_massacre_mortality_modifier: "Masakr ve Svobodném státě"
 congo_massacre_modifier: "Náklady eskalace ve Svobodném státě"
 je_free_state: "Otázka Svobodného státu"
 je_free_state_status: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName] vyhlásil vytvoření [SCOPE.GetRootScope.GetCountry.GetName] v personální unii s naší zemí. Měli bychom tuto situaci sledovat a zjistit, jak se vyvine."
 je_free_state_goal: "Eskalujte konflikt Svobodného státu a požádejte o pomoc mezinárodní společenství."
 integrate_free_state: "Znovu začlenit Svobodný stát"
 integrate_free_state_desc: "Svobodný stát by měl být znovu začleněn do země. Potřebujeme však k tomu dobrý důvod."
 integrate_free_state_international_opinion_tt: "Mezinárodní mínění o Svobodném státě je špatné."
 modifier_denied_monarch_colony_country: "Odepřen panovníkův Svobodný stát"
 modifier_denied_monarch_colony_country_desc: "Panovníkovi byl odepřen Svobodný stát, na který si činil nárok."
 modifier_denied_monarch_colony_ig: "Odepřen panovníkův Svobodný stát"
 modifier_denied_monarch_colony_ig_desc: "Panovníkovi byl odepřen Svobodný stát, na který si činil nárok."
 congo_free_state_events.4.t: "Zničující článek"
 congo_free_state_events.4.d: "V [SCOPE.sCountry('newspaper_country').GetAdjectiveNoFormatting] novinách „[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]“ byl napsán zničující článek o zvěrstvech páchaných v [SCOPE.sCountry('free_state').GetNameNoFlag]."
 congo_free_state_events.4.f: "„Náčelníci, kteří podepsali předání své země, nevěděli, co podepisují. Nebyly to rovnocenné a spravedlivé smlouvy, byla to fraška. Od té doby se zacházení s místními rovnalo otroctví.“"
 congo_free_state_events.4.a: "Nešťastné, ale patří to [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle]."
 congo_free_state_events.4.b: "Musíme to odsoudit."
 congo_free_state_events.5.t: "Otázka Svobodného státu"
 congo_free_state_events.5.d: "Po zmizení monarchie je jasné, že [SCOPE.sCountry('free_state').GetNameNoFlag] je reliktem minulosti. Nyní bychom mohli stát znovu začlenit a vydat se novým směrem pod vedením [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle]."
 congo_free_state_events.5.d2: "Mezinárodní mínění o [SCOPE.sCountry('free_state').GetAltAdjectiveNoFlag('L')] se po odhalení jeho zvěrstev výrazně zhoršilo. Nyní bychom mohli stát znovu začlenit s velmi malým odporem ze strany [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle]."
 congo_free_state_events.5.f: "„Je děsivé byť jen pomyslet, že se něco takového mohlo stát. Smrti, masakry a hladomory. Vše ve jménu zisku — a radosti. Důstojníci soutěžící o to, kdo je nejbrutálnější, vystavující stopy zanechané na místních jako válečné trofeje.\n\nPorušili všechny zákony lidstva. Vetřelci z nejhlubších pekel, jejichž samotné spojení s lidstvím je urážkou nás všech.“"
 congo_free_state_events.5.f2: "To, že se to všechno stalo se souhlasem [SCOPE.sCharacter('free_state_monarch').GetPrimaryRoleTitle], je zjevně absurdní. Představa, že [SCOPE.sCharacter('free_state_monarch').GetWomanMan] může vlastnit celý národ stejně jako [SCOPE.sCharacter('free_state_monarch').GetSheHe] vlastní dům na venkově, je náš nejhlubší a nejsměšnější omyl.\n\nSmrti, masakry a hladomory. Vše ve jménu osobního zisku – a chorobné radosti."
 congo_free_state_events.5.a: "Začleníme stát."
 congo_free_state_events.5.b: "Možná nastal čas, aby byl skutečně „svobodným“ státem."
 free_state_monarch_modifier: "Panovník Svobodného státu"
