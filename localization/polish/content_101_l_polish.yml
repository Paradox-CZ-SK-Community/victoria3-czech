 natural_disaster_events.1.t: "Zemětřesení ve státě [SCOPE.sState('earthquake_state').GetName]"
 natural_disaster_events.1.d: "Stát [SCOPE.sState('earthquake_state').GetName] zasáhlo zemětřesení, které zničilo budovy, zranilo lidi a dokonce si vyžádalo několik životů."
 natural_disaster_events.1.f: "„Připadalo mi, jako by končil celý svět. Naštěstí se nikomu z nás nic nestalo, ale náš dům byl zničen.“"
 natural_disaster_events.1.a: "Stát si s tím bude muset poradit sám."
 natural_disaster_events.1.b: "Měli bychom vložit více peněz do pomoci."
 modifier_earthquake_relief: "Pomoc po zemětřesení"
 natural_disaster_events.2.t: "Povodeň ve státě [SCOPE.sState('flood_state').GetName]"
 natural_disaster_events.2.d: "Ve státě [SCOPE.sState('flood_state').GetName] se místní řeka vylila z břehů, zničila domy a vyžádala si životy."
 natural_disaster_events.2.f: "„Břehy se vzdouvaly celé dny, ale včerejší příval jsme nečekali. Nebyli jsme připraveni.“"
 natural_disaster_events.2.a: "Stát si s tím bude muset poradit sám."
 natural_disaster_events.2.b: "Měli bychom vložit více peněz do pomoci."
 modifier_flood_relief: "Pomoc po povodni"
 local_river: "místní řeka"
 natural_disaster_events.3.t: "Velká povodeň ve státě [SCOPE.sState('mega_flood_state').GetName]"
 natural_disaster_events.3.d: "Břehy řek se vylily po celém státě [SCOPE.sState('mega_flood_state').GetName], ničily domy a vyžádaly si životy v bezprecedentním měřítku."
 natural_disaster_events.3.f: "„Smetlo to všechno: domovy, majetek a samozřejmě i životy. Jak lze spočítat úhrn této tragédie?“"
 natural_disaster_events.3.a: "Stát se s tím bude muset vypořádat sám."
 natural_disaster_events.3.b: "Měli bychom vložit více peněz do pomoci."
 natural_disaster_events.4.t: "Velké zemětřesení ve státě [SCOPE.sState('mega_earthquake_state').GetName]"
 natural_disaster_events.4.d: "Stát [SCOPE.sState('mega_earthquake_state').GetName] byl zemětřesením bezprecedentního rozsahu proměněn v ruiny. Bylo zničeno nespočet budov a počet ztracených životů nelze určit."
 natural_disaster_events.4.f: "„Když se to stalo, mysleli jsme si, že končí svět, a vlastně jsme se nemýlili. Celá města zničena, celé rodiny ztraceny. Tady už to nikdy nebude stejné.“"
 natural_disaster_events.4.a: "Stát se s tím bude muset vypořádat sám."
 natural_disaster_events.4.b: "Měli bychom vložit více peněz do pomoci."
 modifier_mega_earthquake_relief: "Pomoc po katastrofálním zemětřesení"
 natural_disaster_events.5.t: "Neúroda ve státě [SCOPE.sState('crop_fail_state').GetName]"
 natural_disaster_events.5.d: "Stát [SCOPE.sState('crop_fail_state').GetName] postihla sněť. Plodiny hynou jedna za druhou a letošní sklizeň bude jistě nižší, než se očekávalo."
 natural_disaster_events.5.f: "„Před několika týdny jsme si všimli, že některé plodiny hynou, ale nic jsme si z toho nedělali. Vždycky o pár přijdeme. Tohle jsme nečekali.“"
 natural_disaster_events.5.a: "To ovlivní sklizeň."
 natural_disaster_events.5.b: "Pomůžeme, jak budeme moci."
 modifier_crop_failure: "Neúroda"
 modifier_crop_failure_relief: "Pomoc při neúrodě"
 modifier_mega_flood_relief: "Pomoc po rozsáhlé povodni"
 natural_disaster_events.6.t: "Cyklón ve státě [SCOPE.sState('cyclone_state').GetName]"
 natural_disaster_events.6.d: "Stát [SCOPE.sState('cyclone_state').GetName] zasáhl od moře cyklón, který se prohnal domovy i lidmi."
 natural_disaster_events.6.f: "„Zničilo to náš domov a rozbilo mou rybářskou loď. Moje rodina je možná v bezpečí, ale jak ji mám uživit?“"
 natural_disaster_events.6.a: "Tragédie, ale co se dá dělat?"
 natural_disaster_events.6.b: "Měli bychom vložit více peněz do pomoci."
 modifier_cyclone_relief: "Pomoc po cyklónu"
 historical_events.1.t: "První let"
 historical_events.1.d: "Byl uskutečněn první let strojem těžším než vzduch! Tato technologie připraví cestu budoucnosti letectví."
 historical_events.1.f: "„Nikdy předtím jsme neovládali nebesa tak dokonale. S těmito odvážnými novými pokroky jsou možnosti neomezené!“"
 historical_events.1.a: "Podívejte, jsem pták!"
