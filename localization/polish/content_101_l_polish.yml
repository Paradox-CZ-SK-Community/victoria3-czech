 ig_suppression_events.1000.t: "Nelichotivý článek"
 ig_suppression_events.1000.d: "Najali jsme bezskrupulózní novináře, aby napsali zničující články o [SCOPE.gsInterestGroup('negative_article_ig').GetName], čímž poškodí její pověst."
 ig_suppression_events.1000.f: "Reportér [ROOT.GetCountry.GetAdjectiveNoFormatting] novin „[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]“ si nervózně kroutil palci: „Jen jeden článek a splatíte všechny mé dluhy?“ \n\n „Jen jeden článek, ale musí být na titulní straně a musí zcela rozcupovat [SCOPE.gsInterestGroup('negative_article_ig').GetNameNoFormatting].“"
