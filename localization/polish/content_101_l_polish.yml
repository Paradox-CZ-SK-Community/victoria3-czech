 diplomatic_friction.20.t: "Odsouzení otroctví"
 diplomatic_friction.20.d: "[SCOPE.sCountry('rival_scope').GetName], náš rival, nadále praktikuje otroctví. Mohli bychom ho za to snadno odsoudit na světové scéně."
 diplomatic_friction.20.f: "„Skutečnost, že tato chorá, odporná a zvrácená praktika smí kdekoli na světě pokračovat, je urážkou samotného lidstva. Musíme tuto praktiku co nejdříve důrazně a veřejně odsoudit.“"
