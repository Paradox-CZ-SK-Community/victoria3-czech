 crime_events.2.t: "Organizovaný zločin"
 crime_events.2.d: "Ve státě [SCOPE.sState('organised_crime_state').GetName] začaly působit zločinecké organizace."
 crime_events.2.f: "„Nezáleží na tom, jestli zatkneme jednoho člověka nebo vyřešíme jeden zločin. Bude to pokračovat, dokud nepůjdeme až úplně nahoru.“"
 crime_events.2.a: "Vložte nějaké prostředky do potírání těchto organizací."
 crime_events.2.b: "Jsem si jist, že úřady si s tím poradí."
 modifier_organised_crime_suppressed: "Organizovaný zločin potlačen"
 modifier_organised_crime: "Organizovaný zločin"
 crime_events.10.t: "Rozparovač: hrůzné vraždy"
 crime_events.10.d: "Noviny [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] informují o sérii strašlivých vražd ve státě [SCOPE.sState('serial_killer_state').GetName]. Podle článku je policie bezmocná a nedokáže zastavit vraha, kterého nazývá [SCOPE.sState('serial_killer_state').GetCityHubName]ský rozparovač."
 crime_events.10.f: "Starý ošuntělý trh je plný policejních světel a kapsářů. Mrtvola leží tváří dolů na ulici. Táhne se za ní dlouhá tmavá skvrna, která ji celou noc sledovala jako trpělivý lovec. Inspektor přistoupí blíž. Dávno zaschlá. U hlavy je červeň světlejší.\n\n„Pohněte tělem.“ Znovu přistoupí blíž. Zohavená. Páchnoucí. Ten zápach z ulice nezmizí celé dny. Z té ženy je teď vidět víc uvnitř než venku.\n\nBlíž. Blíž. Dávno zaschlá. Zohavená. Páchnoucí. Odpudivá."
 crime_events.10.a: "Musíme vraha postavit před spravedlnost."
 crime_events.11.t: "Rozparovač: v okovech"
 crime_events.11.d: "Vrah známý jako [SCOPE.sState('serial_killer_state_scope').GetCityHubName]ský rozparovač, který dlouho sužoval [SCOPE.sState('serial_killer_state_scope').GetName], byl konečně zatčen."
 crime_events.11.d2: "Vrah známý jako [SCOPE.sState('serial_killer_state_scope').GetCityHubName]ský rozparovač, který dlouho sužoval [SCOPE.sState('serial_killer_state_scope').GetName], byl konečně zatčen. Šokující je, že tyto hrůzné zločiny nespáchal nikdo jiný než [SCOPE.sCharacter('important_killer').GetFullName]!"
 crime_events.11.f: "Inspektor zuřivě svírá svou vycházkovou hůl; sotva se usměje. Tvář viníka matně osvětluje světlo cely. Z této vzdálenosti připomíná jednoho z inspektorových přátel z dětství, jeho bratrance, každého jiného policistu.\n\nAni nezvedne hlavu, když mu podají trochu mdlé ovesné kaše. „Teď je po všem.“ Inspektor z toho muže nemůže spustit oči. Světlo zabliká. Někdo už to řekl tisku, kancelář je plná hlasů, vrah něco mumlá; sotva se usměje."
 crime_events.11.a: "Dostali jsme toho parchanta."
 crime_events.11.b: "Tohle tajemství si musíme vzít do hrobu."
 crime_events.12.t: "Rozparovač: tajemný dopis"
 crime_events.12.d: "Policie ve státě [SCOPE.sState('serial_killer_state_scope').GetName] obdržela dopis, údajně napsaný vrahem známým jako [SCOPE.sState('serial_killer_state_scope').GetCityHubName]ský rozparovač. Tato tajemná zpráva by mohla skrývat klíč k odhalení jeho identity."
 crime_events.12.f: "„Zpívá v poledne. V zimě. @devout! Nikdy během podzimu. Když se na to podíváš přes zrcadlo, @capitalists! přiblíží se to. Když se na to podíváš @clergymen! skrz sníh, uvidíš to dole.\n\nBudu v @censored!@censored!@censored!@censored! po @officers! setmění, přijď, nebo nepřijď, ale měj @red_cross! neustále na paměti, že nejsem vždy tak laskavý. @starving!“"
 crime_events.12.a: "Možná může pomoci univerzita."
 crime_events.12.b: "Zdvojnásobte policejní vyšetřování."
 crime_events.12.c: "Tajemné symboly jsou nerozluštitelné."
 crime_events.13.t: "Rozparovač: nové oběti"
 crime_events.13.d: "Ve státě [SCOPE.sState('serial_killer_state_scope').GetName] bylo několik dalších mrtvol označeno za oběti vraha známého jako [SCOPE.sState('serial_killer_state_scope').GetCityHubName]ský rozparovač. Pečlivé a odhodlané vyšetřování může přinést stopy k vrahově identitě."
 crime_events.13.f: "Mrtvola znovu leží tváří dolů. Je tu dlouhá tmavá skvrna, která přes noc zaschla. Inspektor přistoupí blíž. Vnitřnosti oběti jsou rozházené kolem jako masový salát.\n\n„Všechny vypadají stejně – [SCOPE.GetRootScope.GetCountry.GetCustom('serial_killer_modus_operandi')].“\n\nZnepokojivý pohled; oči bílé a zkažené jako zkyslé mléko, chlapec dál pozoruje scénu z jedné ze střech, inspektor pohne rukou, aby ho odehnal. Hromada těl dál roste jako nedokončený obraz."
 crime_events.13.a: "Financujte rozsáhlejší vyšetřování."
 crime_events.13.b: "Tyto zločiny nespojují žádné důkazy."
 modifier_public_worried: "Rozparovač: panika veřejnosti"
 modifier_killer_caught: "Vrah dopaden"
 custom_disembowled: "vrah je vykuchá, odstraní některé orgány a rozmístí je v kruhu kolem těla."
 custom_face_removed: "vrah jim zcela sejme tvář, není to pěkný pohled."
 custom_surgical: "vrah provádí čisté a přesné řezy, jsme si jisti, že musí mít nějaký chirurgický výcvik."
 custom_crocodile: "jsou z nich vykousnuty velké nelidské kusy. Zvíře to však být nemůže, protože jsme našli stopy."
 custom_strangled: "vrah každého z nich uškrtí ve spánku a druhého rána jsou nalezeni."
 custom_stabbed: "ubodáni stovkami ran, až jsou téměř k nepoznání."
