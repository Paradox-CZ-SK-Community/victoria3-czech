 character_events.3.t: "Souboj"
 character_events.3.d: "[SCOPE.sCharacter('duel_participant_1').GetFullName] vyzval [SCOPE.sCharacter('duel_participant_2').GetFullName] na souboj na život a na smrt."
 character_events.3.f: "Aura obklopující jejich dvě postavy působí jako něco z romantického románu. [SCOPE.sCharacter('duel_participant_2').GetFullNameNoFormatting] se usmívá. [SCOPE.sCharacter('duel_participant_2').GetSheHe|U] si tento okamžik nacvičoval před usnutím.\n\n„[SCOPE.sCharacter('duel_participant_1').GetFullNameNoFormatting], [SCOPE.sCharacter('duel_participant_1').GetCustom('custom_insult_loc')]“\n\n„Vaše urážky nemohou zůstat bez odpovědi, zvolte si zbraň a zítra se setkáme.“"
