 dan_society_tech_events.1.t: "Registrační skříně"
 dan_society_tech_events.1.d: "Používání registračních skříní v budově [SCOPE.sBuilding('government_building').GetName] výrazně zvýšilo účinnost státní byrokracie."
 dan_society_tech_events.1.f: "„Budoucnost není v létání jako pták ani v burácení po kolejích ve vlaku. Ne... budoucnost je v zakládání spisů.“"
