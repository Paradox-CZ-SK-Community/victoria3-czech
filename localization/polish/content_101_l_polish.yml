 nursing_events.3.t: "Prefabrikované nemocnice"
 nursing_events.3.d: "Bylo navrženo, aby byla postavena prefabrikovaná nemocnice a poté převezena těsně za frontové linie války [SCOPE.sWar('ongoing_war').GetName], kde by pomohla ošetřovat raněné."
 nursing_events.3.f: "„Může být postavena tady doma a poté odvezena kus po kusu a znovu sestavena. Všechny výhody řádné nemocnice, ale bez dlouhé doby výstavby.“"
 nursing_events.3.a: "Skvělý nápad."
 nursing_events.3.b: "Tyto zdroje bude lepší vložit do výzkumu."
 prefab_hospital: "Prefabrikovaná nemocnice"
 nursing_events.4.t: "Moderní ošetřovatelství"
 nursing_events.4.d: "Skupina zkušených sester zreformovala postupy na frontě války [SCOPE.sWar('complete_nursing_war').GetName], což vedlo k výrazně menšímu počtu úmrtí."
 nursing_events.4.f: "„Říkají jí dáma s lampou, v noci navštěvuje raněné vojáky a kontroluje je. Ta má opravdu zlaté srdce.“"
 nursing_events.4.a: "Jaká revoluce pro lékařskou profesi."
