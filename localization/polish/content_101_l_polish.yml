 production_tech_events.200.t: "Výroba plastů"
 production_tech_events.200.d: "Přechod na plast v našich sklárnách se chystá způsobit revoluci v celém odvětví. "
 production_tech_events.200.f: "„Dámy a pánové, představuji vám světovou premiéru. Pohleďte na tuto dokonale vyřezávanou šachovou figurku ze slonoviny. Krásná, že? Co kdybych vám řekl, že to vůbec není slonovina, ale nový materiál známý jako plast!“"
 production_tech_events.200.a: "Plast je budoucnost!"
 production_tech_events.200.b: "Měli bychom tyto znalosti šířit."
