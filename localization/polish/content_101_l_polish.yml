 character_events.2.t: "Dar vědění"
 character_events.2.d: "[SCOPE.sCharacter('university_benefactor').GetFullName] nabídl, že vynaloží část svého osobního bohatství na financování založení univerzity ve státě [SCOPE.sState('university_state').GetName]. To však pravděpodobně poskytne [SCOPE.sCharacter('university_benefactor').GetInterestGroup.GetName] určitý vliv."
 character_events.2.f: "„Univerzita [SCOPE.sCharacter('university_benefactor').GetFullNameNoFormatting] bude hrdou baštou vzdělanosti v těchto časech rychlého pokroku, kdy vědění je skutečně moc.“"
