 free_speech_laws.6.t: "Urážlivá kresba"
 free_speech_laws.6.d: "Po celé zemi byla rozšířena neslušná kresba [SCOPE.sCharacter('ig_leader_scope').GetFullName], vůdce [SCOPE.gsInterestGroup('free_speech_ig').GetName]."
 free_speech_laws.6.f: "„No, není zrovna lichotivá, že?“ řekl pobočník a zamyšleně si kresbu prohlížel. \n\n„Ne zrovna... vždyť je to detailní kresba mě při obcování s oslem, proboha! Proč by měla být lichotivá?“ odpověděl [SCOPE.sCharacter('ig_leader_scope').GetFullNameNoFormatting] a rozhodil rukama. \n\n„To tedy je, ale nemůžete popřít, že vaši podobu vystihli.“"
 free_speech_laws.6.a: "Přesně o tom mluvíme!"
 free_speech_laws.6.b: "No, tahle kresba *je* docela zábavná."
