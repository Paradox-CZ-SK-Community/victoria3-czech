 diplomatic_friction.2.t: "Překročení hranice"
 diplomatic_friction.2.d: "Naši vojáci pravidelně provádějí manévry poblíž [SCOPE.sCountry('rival_scope').GetAltAdjective('ee')|l] hranice. Nechat naše jednotky pochodovat po celé hranici, jako by pro ně nic neznamenala, by mohlo být užitečnou ukázkou síly, zvláště pokud to budeme vydávat za „nehodu“."
 diplomatic_friction.2.f: "„Hranice je jen čára nakreslená na mapě. Pokud není střežena ani bráněna, proč by neměl přijít podnikavý národ a ty hranice trochu poupravit?“"
 diplomatic_friction.2.a: "Skvělý nápad."
 diplomatic_friction.2.b: "To by nebylo rozumné."
 diplomatic_friction.2.a.tt: "Stane se jedna z následujících věcí:"
 diplomatic_friction.3.t: "Vniknutí na cizí území"
 diplomatic_friction.3.d: "Vojáci z [SCOPE.sCountry('rival_scope').GetAltAdjective('G')] překročili naše hranice. Když byli konfrontováni, tvrdili, že se ztratili. Pokud nezareagujeme, mohlo by to být považováno za slabost."
 diplomatic_friction.3.f: "„‚Problémy s orientací,‘ řekl velitel čety, ale tomu nevěřím ani na vteřinu. Proč byste museli být ozbrojeni až po zuby, kdybyste jen prováděli průzkum?“"
 diplomatic_friction.3.a: "Musí být potrestáni."
 diplomatic_friction.3.b: "Nebyl v tom úmysl."
