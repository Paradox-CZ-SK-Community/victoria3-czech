 technology_events.30.t: "Zbraně války"
 technology_events.30.d: "Článek byl publikován v [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yym')] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] o některých zbraních, které naše země používá v probíhající válce [SCOPE.sWar('ongoing_war').GetName]."
 technology_events.30.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('war_weapons_article')] Veřejnost požaduje omezení používání takových zbraní.\n\n„Takové odporné nástroje bolesti a utrpení nemají na tomto světě místo.“"
 technology_events.30.a: "Neomezovat je."
 technology_events.30.b: "Utajte jejich používání."
 custom_weapon_article_machine_gun: "Článek se zaměřuje na kulomet, děsivou zbraň, která trhá maso i kosti téměř nelidskou rychlostí."
 custom_weapon_article_chemical_weapons: "Článek se zaměřuje na použití chlorového plynu, děsivé zbraně."
 technology_events.40.t: "Fotografie [ROOT.GetCountry.GetAltAdjective('G')]"
 technology_events.40.d: "Bylo navrženo pořídit a šířit fotografie nejznámějších památek naší země."
 technology_events.40.f: "„Tolik nádherných míst po celé naší zemi! Je jen správné, aby je viděl i zbytek světa.“"
 technology_events.40.a: "Měli bychom je šířit mezinárodně."
 technology_events.40.b: "Měli bychom je šířit v rámci země."
 modifier_international_photographs: "Mezinárodně šířené fotografie"
 modifier_domestic_photographs: "Vnitrostátně šířené fotografie"
 technology_events.50.t: "Přístup „to zvládneme“"
 technology_events.50.d: "Vojáci si stěžují, že nemají jak otevřít své konzervované jídlo."
 technology_events.50.f: "„Jistě, jídlo je o něco lepší, ale k čemu to je, když se k němu nedostaneme, co? Někteří hoši používají kameny, jiní nože. Jediné spolehlivé je to, jak zatraceně otravné je se najíst.“"
 technology_events.50.a: "Vynaložte peníze na vývoj řešení."
 technology_events.50.b: "Oni už na něco přijdou."
 modifier_can_anger: "Nedostatek technologie otevírání konzerv"
 modifier_developing_can_opener: "Vývoj otvíráku na konzervy"
 modifier_weapons_regulated: "Používání zbraní regulováno"
 modifier_weapons_unregulated: "Neregulované používání zbraní"
 expedition_events.501.t: "Nilská expedice"
 expedition_events.501.d: "Navzdory stovkám let hledání nám pramen Nilu stále uniká. Máme vyslat expedici, která se pokusí zmapovat tok řeky?"
 expedition_events.501.f: "„Pánové, předkládám vám neúplnou mapu. Mnozí z vás, kteří mají sklony k nautice, možná poznají tuto deltu. Je to jedna z kolébek civilizace, jak ji známe, a přesto o ní víme příliš málo. Navrhuji prosté: udeříme hluboko do srdce Afriky a najdeme tajemství, které hledalo mnoho jiných.“"
 expedition_events.501.a: "Znám pro tu práci toho pravého."
 expedition_events.501.b: "Teď ne."
 expedition_events.502.a: "[SCOPE.sCharacter('expedition_leader_1').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_1').GetFullName]"
 expedition_events.502.b: "[SCOPE.sCharacter('expedition_leader_2').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_2').GetFullName]"
 expedition_events.502.c: "[SCOPE.sCharacter('expedition_leader_3').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_3').GetFullName]"
 expedition_events.504.t: "Expedice vyráží"
 expedition_events.504.d: "Po několika týdnech příprav a cestování dorazila expedice vedená [SCOPE.sCharacter('expedition_leader').GetFullName] na Zanzibar. Odtud zahájí svou cestu za objevením nepolapitelného pramene řeky Nil."
 expedition_events.504.f: "„Pobřeží bylo méně písčité, než jsme očekávali. Na kopci vedoucím k městu se shromáždila skupina místních, aby sledovala naši expedici, spíše pobavená než zaujatá. V jazyce, kterému jsme nerozuměli, na nás pokřikovali. Jeden z našich mužů jim gestem odpověděl a výstřelem do vzduchu byl spor urovnán.\n\nNa druhé straně moře se třpytil písek – vrstva vyleštěného slunečního světla.“"
 expedition_events.504.a: "Kupředu!"
 expedition_events.511.t: "Úspěšná expedice"
 expedition_events.511.d: "[SCOPE.sCharacter('expedition_leader').GetFullName] se triumfálně vrátil a pramen řeky Nil byl objeven. Ukázalo se, že pramenem jsou velká africká jezera. "
 expedition_events.511.f: "„Burácivý zvuk vody mi připomněl dětství. Vzdálenou a rozmazanou hranici, kterou už nikdy nelze překročit. Ve svých nočních můrách jsem se topíval. Příval se valil dál a dál, jako otevřená rána – krvácející. Srdce Afriky odhalené před námi, pitva kontinentu provedená s pečlivou precizností.\n\nVe svých nočních můrách se stále topím.“"
 expedition_events.511.a: "Výborné zprávy!"
 expedition_events.512.t: "Neúspěšná expedice"
 expedition_events.512.d: "Po mnoha měsících bez jakýchkoli zpráv je jasné, že expedice do srdce Afriky selhala a [SCOPE.sCharacter('expedition_leader').GetFullName] se ztratil spolu s ní."
 expedition_events.512.f: "„Seděli jsme na vrcholu hory. Na krátkou chvíli jsme se zastavili. Voda docházela a jídlo také. Džungle nemohla nikdy skončit; nebylo to v její povaze. Obludné stromy ukusovaly poslední cáry nebe. Byli jsme tak unavení. Tak unavení.“"
 expedition_events.512.a: "Zatraceně!"
 central_africa_expedition: "Expedice za nalezením pramene Nilu"
 central_africa_expedition_desc: "Střed afrického kontinentu ukrývá tajemství pramene Nilu."
 central_africa_expedition_tooltip: "Požadavky:"
 modifier_central_africa_expedition_complete: "Nalezen pramen Nilu"
 expedition_events.520.t: "Místní daň"
 expedition_events.520.d: "Místní vládce požádal, abyste za průchod jeho zemí zaplatili dodatečné „hongo“, druh daně."
 expedition_events.520.f: "„Za každý kousek území, kterým procházíme, musíme platit další daň. Pokud jednomu vládci zaplatíme dodatečnou daň, budeme ji muset zaplatit všem. Pokud nezaplatíme... no, věci se mohou zvrtnout.“"
 expedition_events.520.a: "Zaplaťte daň."
 expedition_events.520.b: "Neplaťte."
 expedition_events.530.t: "Ztracená mula"
 expedition_events.530.d: "Jedna z nákladních mul, které jsme s sebou přivedli, se zatoulala do podrostu. Mohli bychom strávit nějaký čas jejím hledáním, nebo se prostě vydat dál."
 expedition_events.530.f: "„Dobrý Bože, mula je pryč! Rozdělte se a najděte ji, ale nezdržujte se déle než do hodiny. Pokud ji nenajdeme, můžeme doufat, že nám to zvíře někteří místní vykoupí zpátky. A zůstaňte v doslechu našich píšťalek!“"
 expedition_events.530.a: "Věnujte nějaký čas hledání muly."
 expedition_events.530.b: "Je to jen jedna mula, nechte ji být."
 expedition_events.540.t: "Spatřen nosorožec"
 expedition_events.540.d: "Nedaleko byl spatřen nosorožec. Mohli bychom expedici na krátkou dobu zastavit a pokusit se získat jeho roh jako trofej."
 expedition_events.540.f: "„To zvíře bylo téměř shrbené: jeho vrásčité tělo a pomalé pohyby připomínaly starce.\n\n„Když ho dostaneme teď, představte si, jaké jmění nám za něj zaplatí doma v [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')]. Je úplně sám.“\n\nJak se obloha k večeru stmívala, zůstával dokonalý, neposkvrněný lesk odrážející bledost jeho rohu.“"
 expedition_events.540.a: "Budeme ho lovit."
 expedition_events.540.b: "Nenechme se rozptylovat."
 expedition_events.541.t: "Nosorožec uloven"
 expedition_events.541.d: "Úspěšně jsme ulovili nosorožce a přinesli jeho roh jako trofej."
 expedition_events.541.f: "„Navzdory úspěchu a skvělému lovu nikdo z místních nechtěl jíst nosorožčí maso. Nechápu proč, zdá se škoda jím plýtvat.“"
 expedition_events.541.a: "Budeme pokračovat."
 expedition_events.542.t: "Neúspěšný lov nosorožce"
 expedition_events.542.d: "Při neúspěšném lovu nosorožce byl zraněn člen expedice a bude třeba strávit nějaký čas tím, aby se zotavil."
 expedition_events.542.f: "„Bohužel mi v rozhodující chvíli nevystřelila puška a jeden z členů lovecké skupiny byl... no, myslím, že probodnutý je správný výraz. Chudák parchant bude potřebovat několik dní na zotavení.“"
 expedition_events.542.a: "To je pohroma."
 expedition_events.550.t: "Lepší brouk v hrsti než dva v uchu"
 expedition_events.550.d: "Do ucha [SCOPE.sCharacter('expedition_leader').GetFullName] vlezl brouk. Bez okamžité lékařské pomoci by to mohlo zpomalit postup expedice."
 expedition_events.550.f: "„Bzučivý zvuk, svědění stále sílilo. „VEN. VEN. VEN.“ Třásl jsem hlavou a křičel bolestí. „DOSTAŇTE HO VEN. VEN.“ Cítil jsem, jak se mi v uchu pohybují jeho křídla a jak se snaží zalézt hlouběji. „[SCOPE.sCharacter('expedition_leader').GetCustom('getSirMadam')]!“ jeden z členů expedice se mě pokouší chytit za ruku, když sahám po noži.\n\n„VEN! VEN!!“"
 expedition_events.550.a: "Zastavíme a vyhledáme řádnou pomoc."
 expedition_events.550.b: "Nemůžeme zastavit, dejte [SCOPE.sCharacter('expedition_leader').GetHerHim] nůž."
 sir_loc: "Sire"
 madam_loc: "Madam"
 mr_loc: "Pane"
 ms_loc: "Slečno"
 expedition_event_delayed_tt: "Expedice se mírně zpozdila."
 expedition_events.560.t: "[SCOPE.sCharacter('expedition_leader').GetCustom('drug_type')] dochází"
 expedition_events.560.d: "[SCOPE.sCharacter('expedition_leader').GetFullName] požaduje, abychom expedici zastavili a počkali, až dorazí další zásoby [SCOPE.sCharacter('expedition_leader').GetCustom('drug_type')]. "
 expedition_events.560.f: "„No, ode mě jste to neslyšeli, ale [SCOPE.sCharacter('expedition_leader').GetSheHe] rozerval půl tábora při hledání dalšího [SCOPE.sCharacter('expedition_leader').GetCustom('drug_type')]. Když to [SCOPE.sCharacter('expedition_leader').GetSheHe] nenašel, trval na tom, abychom pro nějaké poslali. Bez ohledu na to, jak dlouho to potrvá.“"
 expedition_events.560.a: "Zastavíme a počkáme, až dorazí další."
 expedition_events.560.b: "Budeme pokračovat bez toho."
