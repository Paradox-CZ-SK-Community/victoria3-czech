 free_speech_laws.1.t: "Letáky za svobodu projevu"
 free_speech_laws.1.d: "Ve většině našich velkých měst byl nezákonně šířen leták podporující zákon [SCOPE.sLaw('current_law_scope').GetName]."
 free_speech_laws.1.f: "„Tisknou je rychleji, než je dokážeme zabavovat, a my jsme už víceméně vzdali snahu to zadržet. Teď, když je to venku, už to nemá smysl.“"
 free_speech_laws.1.a: "To pomůže naší věci"
 free_speech_laws.1.b: "Mohli bychom to využít k prosazení důraznějšího sdělení"
 free_speech_pamphlet_advance: "Letáky za svobodu projevu"
 free_speech_pamphlet_risk_success: "Více letáků za svobodu projevu"
 free_speech_pamphlet_risk_fail: "Další letáky za svobodu projevu selhaly"
 free_speech_pamphlet_risk_success_movement: "$free_speech_pamphlet_risk_success$"
 free_speech_laws.2.t: "Pálení knih"
 free_speech_laws.2.d: "Členové [SCOPE.gsInterestGroup('book_burning_ig').GetName] zorganizovali pálení knih s materiálem považovaným za proti-[ROOT.GetCountry.GetAdjectiveNoFormatting]. Tím se normalizuje podpora zákona [SCOPE.sLaw('current_law_scope').GetName]."
 free_speech_laws.2.f: "„Knihy jsou tesáky jedovatého hada propagandy, který šíří své lži krevním oběhem společnosti. Jejich pálení je velmi účinný způsob, jak tyto tesáky otupit.“"
 free_speech_laws.2.a: "To je vynikající."
 free_speech_laws.2.b: "Co kdybychom zorganizovali státem řízené pálení knih?"
 free_speech_book_burning_advance: "Pálení knih"
 free_speech_book_burning_risk_success: "Oblíbené vládní pálení knih"
 free_speech_book_burning_risk_fail: "Neoblíbené vládní pálení knih"
 free_speech_laws.3.t: "Přehnaně horlivá cenzura"
 free_speech_laws.3.d: "Zákon [SCOPE.sLaw('current_law_scope').GetName] má potíže získat lidovou podporu, protože zmínky o něm potlačuje současný cenzurní aparát."
 free_speech_laws.3.f: "„Cokoli, co se týká cenzury, je okamžitě cenzurováno, tak jak o tom proboha máme vést otevřenou diskusi?“\n\n „Poprvé, co? Jsou jen tak chytří, jak tomu rozumějí. Pokud nejsou zrovna sečtělí, můžete jim propašovat pár metafor a přirovnání.“\n\n„Co k čertu je přirovnání? Nějaký pokřivený úsměv?“"
 free_speech_laws.3.a: "Moc s tím nenaděláme."
 free_speech_laws.3.b: "Možná můžeme zákony trochu obejít."
 free_speech_censorship_stall: "Svoboda projevu cenzurována"
 free_speech_censorship_stall_fail: "Obcházení cenzury selhalo"
 free_speech_censorship_stall_success: "Obcházení cenzury uspělo"
 free_speech_censorship_stall_success_ig: "$free_speech_censorship_stall_success$"
 free_speech_laws.4.t: "Ohromující propaganda"
 free_speech_laws.4.d: "Máme potíže získat podporu pro zákon [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.gsInterestGroup('free_speech_ig').GetName] využívá současné volné zákony k tisku a šíření tisíců propagandistických letáků a novin."
 free_speech_laws.4.f: "„Tisknou nový leták téměř každý den a vychvalují takzvané ctnosti svobodného tisku. Nezáleží na tom, jak dobré jsou naše argumenty, v tomhle hluku nás není slyšet.“"
 free_speech_laws.4.a: "Tohle je mimo naši kontrolu."
 free_speech_laws.4.b: "Mohli bychom část z toho cenzurovat... nezákonně"
 free_speech_no_censorship_stall: "Ohromující svoboda projevu"
 free_speech_no_censorship_stall_fail: "Selhání nezákonné cenzury"
 free_speech_no_censorship_stall_success: "Úspěch nezákonné cenzury"
 free_speech_laws.5.t: "Nemravná literatura"
 free_speech_laws.5.d: "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] byl přistižen při četbě kontroverzní cenzurované knihy, což vyvolalo další otázky v debatě o zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 free_speech_laws.5.f: "„[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] má být vzorem našich hodnot a skutečnost, že [SCOPE.sCharacter('ruler_scope').GetSheHe] byl přistižen při čtení něčeho tak pokleslého jako „[SCOPE.GetRootScope.GetCountry.GetCustom('horny_adjective')] [SCOPE.sCountry('neighbour_country').GetAltAdjectiveNoFormatting('yy')|l] [SCOPE.GetRootScope.GetCountry.GetCustom('job_title')]“, je upřímně nepřijatelná.“"
 free_speech_laws.5.a: "Trapné, ale podporuje to naši věc!"
 free_speech_laws.5.b: "Měli bychom to co nejrychleji zamést pod koberec."
