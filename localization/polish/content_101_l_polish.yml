 ig_suppression_events.1001.d: "Zastrašováním členů [SCOPE.gsInterestGroup('suppressed_ig').GetName] můžeme učinit jejich aktivní podporu mnohem méně přitažlivou vyhlídkou. "
 ig_suppression_events.1001.f: "„Jistě, možná neodradíme vůdce, ideologické křižáky, ale řadové členy? Těm záleží na vlastním blahu mnohem víc než na nějaké mizerné věci.“"
 ig_suppression_events.1001.a: "Když nebude moct chodit, jak se dostane do volební místnosti?"
 ig_suppression_events.1001.b: "Tohle se nezdá být zrovna morální."
