 rights_of_women_laws.1.t: "Přelomový případ"
 rights_of_women_laws.1.d: "V soudním případu, který upoutal pozornost celé země, soudce rozhodl, že domácí násilí je důvodem k rozvodu."
 rights_of_women_laws.1.f: "„Znovu a znovu ji bil jen proto, že upustila talíř. Bylo to jen nejnovější z řady bití, táhnoucích se od líbánek až po současnost. Jak můžeme jakoukoli ženu odsoudit k tomuto nekonečnému trestu? Rozvod pro ženy v násilných situacích není jen spravedlivý, je samotným ztělesněním spravedlnosti.“"
 rights_of_women_laws.1.a: "To nesmírně podporuje náš případ."
 rights_of_women_laws.1.b: "Neslavme příliš hlasitě, abychom nerozrušili [SCOPE.gsInterestGroup('anti_women_ig').GetName]."
 womens_rights_divorce_advance: "Přelomový rozvodový případ"
 womens_rights_divorce_lesser_advance: "Přelomový rozvodový případ"
 womens_rights_divorce_ig_anger: "Hněv kvůli přelomovému rozvodovému případu"
 rights_of_women_laws.2.t: "Cesty [ROOT.GetCountry.GetAdjectiveNoFormatting] ženy"
 rights_of_women_laws.2.d: "Byla vydána oblíbená cestopisná díla autorky, která podporují zákon [SCOPE.sLaw('current_law_scope').GetName]."
 rights_of_women_laws.2.f: "„Procestovala všechno možně sama, prý dokonce jezdí na koni čelem dopředu, jako muž!“"
 rights_of_women_laws.2.a: "Jaké velké dobrodiní pro naši věc."
 rights_of_women_laws.2.b: "Možná bychom mohli získat většího vydavatele."
 womens_rights_travel_writing_advance: "Cestopisy podporují hnutí za volební právo"
 womens_rights_travel_writing_risk_fail: "Odpor proti cestopisům"
 womens_rights_travel_writing_risk_success: "Cestopisy podporují hnutí za volební právo"
 rights_of_women_laws.3.t: "Hysterické tvrzení"
 rights_of_women_laws.3.d: "Nedávno publikovaná práce o „hysterii u žen“ získává pozornost v lékařské komunitě. Tato práce je používána jako propaganda proti právům žen a proti zákonu [SCOPE.sLaw('current_law_scope').GetName]."
 rights_of_women_laws.3.f: "„Neexistují skutečné důkazy, že by ‚hysterie‘ byla u žen častější než u mužů, ale z nějakého důvodu jsme to my, komu ji stále diagnostikují.“"
 rights_of_women_laws.3.a: "To je znepokojivé."
 rights_of_women_laws.3.b: "Možná můžeme provést vlastní výzkum?"
 rights_of_women_laws.3.c: "Věnujte čas vydání obsáhlého vyvrácení."
 womens_hysteria_stall_fail: "Tvrzení o hysterii brzdí debatu"
 womens_hysteria_stall_success: "Výzkum hysterie vyvrácen"
 womens_hysteria_stall: "Tvrzení o hysterii zpomalují debatu"
 rights_of_women_laws.4.t: "Noviny nabízejí podporu"
 rights_of_women_laws.4.d: "Redaktor [ROOT.GetCountry.GetAltAdjectiveNoFormatting('yych')|l] novin „[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]“ vystoupil a nabídl podporu zákonu [SCOPE.sLaw('current_law_scope').GetName], pokud jim pomůžeme s financováním."
 rights_of_women_laws.4.f: "„Mít den co den články psané na jeho podporu je samozřejmě přínos. Skutečná výhoda ale spočívá v tom, že nebudou vycházet články proti němu.“"
 rights_of_women_laws.4.a: "Příliš drahé."
 rights_of_women_laws.4.b: "To je skvělé."
 womens_rights_newspaper_not_paid: "Novinám nezaplaceno"
 womens_rights_newspaper_paid: "Novinám zaplaceno"
 womens_rights_newspaper_paid_costs: "Placení novinám za podporu"
 rights_of_women_laws.5.t: "Shromáždění za volební právo"
 rights_of_women_laws.5.d: "Po celé zemi se konají shromáždění na podporu zákona [SCOPE.sLaw('current_law_scope').GetName], ale některá z nich se zvrhla v násilí."
 rights_of_women_laws.5.f: "„Samozřejmě 95 % protestujících je pokojných, ale stačí jeden radikální prvek, aby se věci daly do pohybu, a než se nadějete, máme tu celý dav vybičovaný k zuřivosti.“"
 rights_of_women_laws.5.a: "Omezte shromáždění."
 rights_of_women_laws.5.b: "Trochu násilí riskneme."
 womens_rights_rally: "Shromáždění za volební právo žen"
 womens_rights_peaceful_rally: "Další shromáždění za volební právo žen"
 womens_rights_violent_rally: "Násilí na shromáždění za volební právo žen"
 violent_womens_rally_backlash: "Odpor proti násilnému shromáždění za volební právo"
 rights_of_women_laws.6.t: "Násilí okrajové skupiny"
 rights_of_women_laws.6.d: "Násilí malé skupiny v rámci sufražistického hnutí hrozí, že obrátí širokou veřejnost proti němu."
 rights_of_women_laws.6.f: "„Násilí a chaos jsou jejich řemeslem, a pokud je necháme v něm pokračovat, způsobí naší věci víc škody než užitku. Nemůžeme nečinně přihlížet, jak se to děje.“"
 rights_of_women_laws.6.a: "Nedá se nic dělat."
 rights_of_women_laws.6.b: "Musíme to zastavit."
 womens_rights_fringe_group_violence: "Násilí okrajové skupiny za práva žen"
 womens_rights_fringe_group_violence_stopped: "Násilí okrajové skupiny za práva žen zastaveno"
 rights_of_women_laws.7.t: "Každodenní narušení"
 rights_of_women_laws.7.d: "Ve fabrikách po celé zemi se má konat velký protest za volební právo. Zvýší popularitu zákona [SCOPE.sLaw('current_law_scope').GetName], ale pravděpodobně rozruší mnoho dělníků."
 rights_of_women_laws.7.f: "„Možná to některé dělníky podráždí. Ale trocha nespokojenosti mezi populací stojí za to, aby se tyto důležité otázky dostaly do mysli všech.“"
 rights_of_women_laws.7.a: "Ignorujte dělníky."
 rights_of_women_laws.7.b: "Můžeme svůj protest přesunout."
