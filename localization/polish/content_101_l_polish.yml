 create_peru_bolivia_confederation: "Znovu sjednotit Bolívii a Peru"
 create_peru_bolivia_confederation_desc: "V Bolívii roste podpora pro znovusjednocení Bolívie a Peru. Mohli bychom oslovit Peru a zjistit, zda by mělo o takové uspořádání zájem."
 south_america.4.t: "Bolívie a Peru znovu sjednoceny"
 south_america.4.d: "Peruánci přijali náš návrh na spojení našich národů a nyní jsme s nimi v konfederaci."
 south_america.4.f: "„Je to slavný den pro Bolívii i Peru, neboť se spojujeme v jeden silnější národ, sloučený v něco většího než součet jeho částí.“"
 south_america.4.a: "Přesně jak jsme plánovali."
 south_america.4.a.tt: "Bolívie a Peru společně vstoupí do konfederace."
 modifier_combined_bolivia_peru: "Vytvořena Peruánsko-bolivijská konfederace "
 central_america_falls_apart: "Rozpad Středoamerické federace"
 central_america_falls_apart_reason: "Středoamerické státy volají po nezávislosti. Dáme jim ji? Brzy nám předloží ultimátum."
 ragamuffin_war: "Válka Farrapů"
 ragamuffin_war_reason: "Povstalci v Rio Grande do Sul požadují nezávislost a jsou ochotni za ni zaplatit svou krví."
 south_america.5.t: "Vítězní Farrapové"
 south_america.5.d: "Navzdory drtivé přesile se Piratini podařilo vyhrát Válku Farrapů a s ní i nezávislost."
 south_america.5.f: "„Jejich tváře byly zformovány do výrazů vítězství a únavy. Jako rozmazané postavy na plátně připomínali muže minulosti. V čase apatie bez snů a poražených národů stále bojovali. A zvítězili.“"
 south_america.5.a: "Pomstíme se."
 south_america.5.b: "Mír je lepší možnost."
 lost_ragamuffin_war: "Poraženi ve Válce Farrapů"
 won_ragamuffin_war_integrate: "Začlenit Farrapy"
 won_ragamuffin_war_ostracize: "Vyloučit Farrapy"
 south_america.6.t: "Porážka Farrapů"
 south_america.6.d: "Jak se očekávalo, povstání Farrapů bylo rozdrceno. Jak máme naložit se zbývajícími přeživšími?"
 south_america.6.f: "„Ne všechny návrhy byly zrovna milosrdné. Válka to s lidmi dělává. Někteří velitelé se usmívají vedle stanů, rty zkřivené triumfálním potěšením. Jiní tvrdí, že už bylo prolito dost krve – následujícího večera se jim vysmívají.\n\nZbytek mlčky přihlíží, což je možná ještě horší.“"
 south_america.6.a: "Začleňte je."
 south_america.6.b: "Vylučte je."
 won_ragamuffin_war: "Vítězství ve Válce Farrapů"
 central_america_collapse_tt: "Středoamerická federace se rozpadne."
 free_state_status_new: "Svobodný stát byl nedávno založen, jen čas ukáže, jak se vyvine."
 free_state_status_suspected: "Zvěsti o špatném zacházení visí nad Svobodným státem jako zápach. Mezinárodní novináři pohrozili zveřejněním článků o tamních podmínkách."
 free_state_status_known: "Zvěrstva spáchaná ve Svobodném státě jsou známa celému světu. Je jen otázkou času, kdy bude vydána mezinárodní zpráva."
 je_free_state_reason: "Svobodný stát je kolonie osobně vlastněná panovníkem."
