 expedition_events.570.t: "Geografický průzkum"
 expedition_events.570.d: "Bylo navrženo, abychom se zastavili a provedli geografický průzkum oblasti, abychom rozšířili své místní znalosti."
 expedition_events.570.f: "„První paprsky slunce dopadaly z oblohy kolmo na suchou, napůl osvětlenou půdu. Mihotaly se na hladině řeky a pohybovaly vodou jako křehké větve nemocného stromu.\n\nTéměř-třpyt se vsakoval do skal; rozmarná krajina, kde se život zdál tak odlišný, tak cizí – tak živý.“"
 expedition_events.570.a: "Dobrý nápad."
 expedition_events.570.b: "Nemáme čas."
 modifier_expedition_geographic_study: "Proveden geografický průzkum"
 modifier_expedition_geographic_study_desc: "Při pokusu určit pramen řeky Nil byl věnován nějaký čas studiu geografické oblasti."
 expedition_event_peril_tt: "To by mohlo #tooltippable;negative_value;TOOLTIP:expedition_peril_explanation_tt negativně#! ovlivnit výsledek expedice."
 expedition_peril_explanation_tt: "Čím více rizik během expedice podstupujete, tím nebezpečnější se stává, což vede k větší pravděpodobnosti neúspěchu."
 modifier_expedition_rhino_hunt: "Trofej z lovu nosorožce"
 crime_events.1.t: "Velká vlaková loupež v [SCOPE.sState('train_robbery_state').GetNameNoFormatting]"
 crime_events.1.d: "Po celém státě [SCOPE.sState('train_robbery_state').GetName] spáchaly odvážné gangy sérii vlakových loupeží, čímž ohrožují zákon, pořádek i měšce bohatých v celém státě."
 crime_events.1.f: "„Procházeli se po vagónu s namyšleným výrazem, jednoho z nich jsem poznal z plákátu s hledanými osobami. Nepochyboval jsem, že je za tým [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting] a [Select_CString(SCOPE.sCharacter('name_a_scope').IsFemale, 'její','jeho')] [SCOPE.GetRootScope.GetCountry.GetCustom('outlaw_gang_type')].“"
 crime_events.1.a: "Naši maršálové s nimi rychle zatočí."
 crime_events.1.b: "Koho zajímá jeden nebo dva vlaky?"
