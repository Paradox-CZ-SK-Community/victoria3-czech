 je_the_grand_collapse: "İnhidam-ı Azîm"
 je_the_grand_collapse_reason: "S nepokoji plížícími se v žilách národa se naše panství potácí na pokraji zkázy a ukázka imperiální strategie jistě připomene všem našim závislým zemím moc jeho někdejší slávy.\n\nMusíme uplatnit smířlivou obratnost, abychom zajistili bezpečnost našich hranic. Pokud takové zkoušky nedokážou situaci zvrátit, budou rozervány a zažehne se rozbuška #r Velkého kolapsu#!."
 je_the_grand_collapse_bribe_politicians_button: "Lobbovat u významných osobností"
 je_the_grand_collapse_bribe_politicians_button_desc: "Budování silnějších vztahů s vůdci různých ideologických skupin by nám mohlo pomoci prosazovat naše myšlenky účinněji a snadněji."
 je_the_grand_collapse_issue_khutbah_button: "Vydat páteční chutbu"
 je_the_grand_collapse_issue_khutbah_button_desc: "Rozesílá tištěná kázání sepsaná ulamá do všech koutů země, aby je imámové četli místnímu obyvatelstvu. Text znovu zdůrazňuje jednotu mezi našimi sunnitskými poddanými."
 je_the_grand_collapse_law_speed_start_button: "Vynutit menší tanzimaty"
 je_the_grand_collapse_law_speed_start_button_desc: "Tlačení zbytků naší autoritativní moci až na hranici možností nepochybně urychlí dosažení politických výsledků."
 je_the_grand_collapse_law_speed_stop_button: "Přestat vynucovat menší tanzimaty"
 je_the_grand_collapse_relation_speed_start_button: "Studovat archivy sefâretnâme"
 je_the_grand_collapse_relation_speed_start_button_desc: "Staletí zaznamenaných cest k cizím dvorům zapadají prachem. Tyto dokumenty ukazují minulé diplomatické úspěchy a mohou našim velvyslancům pomoci přesvědčit současné závislé země."
 je_the_grand_collapse_relation_Speed_stop_button: "Přestat studovat archivy sefâretnâme"
 the_grand_collapse.1.t: "Fetret"
 the_grand_collapse.1.d: "Velký kolaps začal. Politická neloajalita nebyla takto rozšířená od dob Çelebiho Mehmeda během prvního bezvládí. Pokud nebude obnoven pořádek, naše země se roztříští na kusy."
 the_grand_collapse.1.f: "„Estağfurullah, nikdy nepochopím, jaký užitek může mít takovéto provokování [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting].“\n\n„Je to hra, Salihu. Vzruší čtenáře, jako teď tebe, a připraví cestu k usmíření s novými guvernéry pro případ pádu. Vallahi, tihle lidé přerušují půst naší krví.“\n\nVdechnutí vůně máty z jeho nargile rozjasnilo uhlíky, zatímco Salih pohlédl ven a složil svou mecmuu.\n\n„Pádu čeho... koho?“"
 the_grand_collapse.1.a: "Zvrátíme to."
 the_grand_collapse.2.t: "Každý přístav dobrý v bouři"
 the_grand_collapse.2.d: "Naše závislá země [SCOPE.sCountry('marketless_country_scope').GetName] nám v těchto zoufalých časech nabízí svou loajalitu výměnou za ústupek."
 the_grand_collapse.2.f: "Diplomatické listiny předložené Hariciye Nezâreti naznačovaly nápadnou aroganci maskovanou královským uznáním. Jako hyeny obkličující smrtelně raněného lva se naše závislé země stále pokoušejí ukousnout si, co jen mohou, dokud je příležitost nablízku.\n\nKdyž si [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] dokumenty prohlédl, zavřel oči a zamumlal modlitbu, než učinil konečné rozhodnutí."
 the_grand_collapse.2.a: "Udělit jim hospodářskou nezávislost."
 the_grand_collapse_2.a_tt: "[SCOPE.sCountry('marketless_country_scope').GetName] získá přístup ke svému vlastnímu [Concept('concept_market', '$concept_market$')]"
 the_grand_collapse.2.b: "Překreslit jejich hranice."
 the_grand_collapse.2.c: "Dát jim více autonomie."
 the_grand_collapse_2.c_tt: "[SCOPE.sCountry('marketless_country_scope').GetName] získá přístup ke svému vlastnímu [Concept('concept_market', '$concept_market$')]"
 the_grand_collapse.2.e: "Oportunisté si naši pozornost nezaslouží."
 the_grand_collapse.3.t: "Zoufalá opatření"
 the_grand_collapse.3.d: "Při hledání možných lidových vůdců, které bychom mohli přesvědčit na naši stranu, předložili agenti několik možností."
 the_grand_collapse.3.f: "Ziyâfet-i Hükûmet - česky Vládní hostina - je chvíle, kdy [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] může ukázat svou velkolepost všem významným hostům.\n\nZdatní služebníci, hudebníci a kuchaři ze všech koutů světa se snaží zanechat trvalý dojem ve jménu svého pána.\n\nJe to také neopomenutelná příležitost pro pozvané významné osobnosti, které se pouštějí do nevyslovené války výhod."
 the_grand_collapse.3.a: "Pochválit [SCOPE.sCharacter('lobbied_ig_leader_1').GetFullName], vůdce [SCOPE.gsInterestGroup('lobbied_ig_1').GetName]."
 the_grand_collapse.3.b: "Oslovit [SCOPE.sCharacter('lobbied_ig_leader_2').GetFullName], vůdce [SCOPE.gsInterestGroup('lobbied_ig_2').GetName]."
 the_grand_collapse.3.c: "Nalákat [SCOPE.sCharacter('lobbied_ig_leader_3').GetFullName], vůdce [SCOPE.gsInterestGroup('lobbied_ig_3').GetName]."
 the_grand_collapse.4.t: "Vysoká porta"
 the_grand_collapse.4.d: "Pořádek byl obnoven a nikdo se nepostaví proti našemu právu vládnout, jak jsme činili po staletí. Velký kolaps byl odvrácen a my sklidíme plody své prozíravosti."
 the_grand_collapse.4.f: "„Ach, jak drahá jsi, ó naděje dnů dosud nezrozených -\nty osvobozuješ svět od žalu a zoufalství.\n\nTobě patří věk impéria; rozprostři moc po zemi.\nKéž Všemohoucí chrání tvůj osud před každou skrytou léčkou.\n\nPouště, které ti kdysi patřily, si nárokují psi tyranie.\nProbuď se, ó raněný lve, z tohoto bezstarostného spánku!“\n\n— Namık Kemal, „Óda na svobodu“"
 the_grand_collapse.4.a: "Sláva našemu praporu!"
 the_grand_collapse.4.b: "Neměli jsme sejít z přímé cesty."
 the_grand_collapse.5.t: "Velký kolaps"
 the_grand_collapse.5.d: "Ze všech koutů našeho národa se vynořil chaos. Jsme omezeni na naši domovinu a nyní je nemožné zastavit spirálu revoluce všude kolem nás. Musíme jít dál."
 the_grand_collapse.5.f: "„Jako u všech věcí jsou smrt a rozklad konečným zakončením, synu. Hřbitovy jsou plné lidí, kteří kdysi byli ctižádostiví a plní síly kvůli dočasným věcem, a nyní nad nimi bdí strážce.\n\nTakový je osud národů, které kdysi vybudovali ti pod hlínou a které živí zoufale zkrášlují. I strážce se k nim brzy přidá, neboť nic netrvá věčně.“\n\n„Nic?“\n\n„Kromě Něj.“"
 the_grand_collapse.5.a: "Bylo nám to určeno, tak ať se stane."
