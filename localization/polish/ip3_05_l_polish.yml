l_polish:
 je_serbian_throne: "Trůn z trní"
 je_serbian_throne_reason: "[ROOT.GetCountry.GetCustom('serbia_throne_of_thorns_house_loc')]\n\nPokud [concept_dynastic_loyalty] klesne na #v 0 %#!, náš [concept_ruler] a jeho dynastie budou svrženi a nahrazeni členem [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')]."
 je_serbian_throne_invalidation_tt: "Nežije žádná postava z rodu [Concept('concept_house_of_obrenovic','$concept_house_of_obrenovic_short$')] ani [Concept('concept_house_of_karadjordjevic','$concept_house_of_karadjordjevic_short$')]"
 je_serbian_throne_status_loc_karadordevic_dominance: "[Concept('concept_house_of_karadjordjevic','$concept_house_of_karadjordjevic_short$')] získal širokou loajalitu"
 je_serbian_throne_status_loc_karadordevic_leaning: "Lidé se přiklánějí k [Concept('concept_house_of_karadjordjevic','$concept_house_of_karadjordjevic_short$')]"
 je_serbian_throne_status_loc_neutral: "Lidé jsou rozděleni mezi [Concept('concept_house_of_obrenovic','$concept_house_of_obrenovic_short$')] a [Concept('concept_house_of_karadjordjevic','$concept_house_of_karadjordjevic_short$')]"
 je_serbian_throne_status_loc_obrenovic_leaning: "Lidé se přiklánějí k [Concept('concept_house_of_obrenovic','$concept_house_of_obrenovic_short$')]"
 je_serbian_throne_status_loc_obrenovic_dominance: "[Concept('concept_house_of_obrenovic','$concept_house_of_obrenovic_short$')] získal širokou loajalitu"
 je_serbian_throne_obrenovic_desc: "Podle našich informátorů [concept_house_of_karadjordjevic], rodina, jejíž zakladatel byl kdysi znám jako hrdina srbského lidu, kuje pikle s cílem sesadit [concept_house_of_obrenovic]. $concept_house_of_karadjordjevic_short$ osvobodil srbské provincie od tyranie odpadlických janičářů a zažehl světlo svobody na úsvitu století.\n\nByl to však také on, kdo uprchl z bojiště, když byla situace zoufalá. $concept_house_of_obrenovic$ od té doby vykročil vpřed a převzal prapor. Časem se spiklenci jistě pokusí podnítit obyvatelstvo, aby dosáhli svých zlomyslných cílů a sesadili $concept_house_of_obrenovic_short$."
 je_serbian_throne_karadjordjevic_desc: "[concept_house_of_karadjordjevic] úspěšně svrhli své soupeře z [concept_house_of_obrenovic] a vykoupili velkého Karađorđe v očích národa. [ROOT.GetCountry.GetName] opět vládne dynastie, která stála v čele hrdinského prvního povstání proti Turkům.\n\nSpiklenci $concept_house_of_obrenovic_short$ však krouží kolem a snaží se obnovit svou vládu a přivést $SER$ zpět do $AUS_ADJ$ sféry. Pokud dynastie projeví sebemenší náznak slabosti, udeří a pokusí se vrátit $concept_house_of_karadjordjevic_short$ do potupného vyhnanství."
 je_tot_slander_button: "Pomluvit soupeřící dynastii"
 je_tot_slander_button_desc: "Máme moc obrazů, tak proč ji nevyužít ve svůj prospěch?"
 je_tot_slander_button_custom_tt: "Posílí [Concept('concept_dynastic_loyalty','$concept_dynastic_loyalty$')] na základě [concept_literacy] s #bold jedním#! z následujících nákladů:"
 je_tot_slander_button_cooldown_tt: "Toto rozhodnutí nebylo použito během posledních #bold čtyř let#!."
 je_tot_campaign_button: "Spustit kampaň"
 je_tot_campaign_button_desc: "Shromáždí královský doprovod, aby zorganizoval celostátní cestu vynucením [concept_authority] nebo utracením [concept_money]. Cílem je navštívit všechny [Concept('concept_state','$concept_states$')], rozmlouvat s prostým lidem a nabídnout mu hmatatelné iniciativy pokroku výměnou za jeho cennou [Concept('concept_dynastic_loyalty','$concept_dynastic_loyalty$')]. Také to posílí naši [concept_popularity] a očerní našeho soupeře."
 je_tot_campaign_button_tt: "Přípravy začínají a brzy budeme vyzváni, abychom od této myšlenky navždy upustili, nebo si zvolili #bold jeden#! z následujících výdajů až do konce kampaně:"
 je_tot_campaign_button_tt_2: "Zvolená výše výdajů určí účinnost investic do navštívených [Concept('concept_state','$concept_states$')] a naši [concept_popularity] na nadcházející roky."
 je_serbian_throne_fail_header: "#title Sesadí vládnoucí dynastii, pokud:#!\n"
 je_serbian_throne_on_fail_header: "#title Pokud bude [concept_dynastic_loyalty] vyčerpána:#!\n$EFFECT$"
