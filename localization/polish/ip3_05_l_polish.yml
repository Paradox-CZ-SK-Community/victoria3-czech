 je_the_balkan_league: "Balkánská liga"
 je_the_balkan_league_reason: "Nyní, když jsou balkánské národy osvobozeny ze sevření Vysoké porty, panuje shoda na vytvoření aliance, která ji jednou provždy zatlačí zpět. Taková shoda však nebude trvat věčně a naše okno příležitosti je omezené. \n\nNadějí všech našich národů je, že [SCOPE.sStrategicRegion('balkans_scope').GetName] bude jednoho dne patřit svým pravým obyvatelům!"
