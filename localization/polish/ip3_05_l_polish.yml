 je_the_balkan_league_research_mil_tech_start_button: "Vyhradit vojenský výzkum"
 je_the_balkan_league_research_mil_tech_start_button_desc: "Dohnat standardy mocného nepřítele je zásadní. Získání technologií od jiných velmocí urychlí náš pokrok v modernizaci armády. Budou obzvláště vstřícné, pokud $dyn_c_ottoman_empire$ má nějaké technologie, které dosud nemáme."
