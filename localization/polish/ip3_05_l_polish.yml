 je_the_balkan_league_resign_button: "Odstoupit"
 je_the_balkan_league_resign_button_desc: "Formální odstoupení z aliance neutralizuje náš diplomatický postoj, ale ostatní země #bold Balkánské ligy#! nás budou považovat za zrádce."
 je_the_balkan_wars_resign_button_tt: "Spustí zvláštní událost, která způsobí selhání záznamu v deníku."
 je_the_balkan_wars_resign_button_tt2: "Zvýší vztahy se zemí [SCOPE.sCountry('ottoman_empire_scope').GetName] a sníží vztahy s následujícími zeměmi:"
 je_the_balkan_wars_resign_button_tt2_bl_members_list: "[THIS.GetCountry.GetName]"
 je_the_balkan_wars_resign_button_tt3: "Můžeme se rozhodnout stát se [Concept('concept_protectorate', '$concept_protectorate$')] země [SCOPE.sCountry('ottoman_empire_scope').GetName]."
 je_the_balkan_league_start_war: "Zahájit válku"
 je_the_balkan_league_start_war_desc: "Zahájí #b zvláštní#! [concept_diplomatic_play] proti Vysoké portě. Všichni členové #bold Balkánské ligy#! se připojí na naši stranu. V tuto chvíli mají [SCOPE.sCountry('ottoman_empire_scope').GetName] a jejich spojenci [concept_army_power_projection] ve výši #variable [ROOT.GetCountry.MakeScope.ScriptValue('ottoman_power_projection')|D] #!, zatímco #bold Balkánská liga#! a její spojenci mají celkem #variable [ROOT.GetCountry.MakeScope.ScriptValue('balkan_league_power_projection')|D]#!.\n\nVítězstvím nad [SCOPE.sCountry('ottoman_empire_scope').GetName] pomocí [concept_diplomatic_play] #v Balkánská válka#! ztratí vlastnictví všech vlastněných [Concept('concept_state', '$concept_states$')] ve [SCOPE.sStrategicRegion('balkans_scope').GetName]. Vítězství v této [concept_war] bez zásahu [concept_great_power] na naší straně nám poskytne dodatečnou odměnu."
 balkan_league_members_start_the_war_header_tt: "Následující členové #bold Balkánské ligy#! se připojí k naší [concept_diplomatic_play]:"
 balkan_league_members_start_the_war_tt: "[THIS.GetCountry.GetName]"
 balkan_war_pp_comparison: "Kombinovaná [concept_army_power_projection] #bold Balkánské ligy#! a spojenců (#variable [ROOT.GetCountry.MakeScope.ScriptValue('balkan_league_power_projection')|D]#!) dosahuje alespoň poloviny hodnoty [SCOPE.sCountry('ottoman_empire_scope').GetName] a spojenců (#variable [ROOT.GetCountry.MakeScope.ScriptValue('ottoman_power_projection')|D]#!)"
 balkan_wars.1.t: "Balkánská liga"
 balkan_wars.1.d: "Byla nám nabídnuta příležitost stát se členem aliance ve [SCOPE.sStrategicRegion('balkans_scope').GetName] proti zemi [SCOPE.sCountry('ottoman_empire_scope').GetName]. Sjednocená armáda s jediným cílem může být jediným prostředkem, jak je z oblasti jednou provždy vyhnat."
 balkan_wars.1.f: "„Pánové! Příležitost je na dosah. Toto může být naše jediná šance splatit velký dluh našich předků. Ať toto bratrství stojí jako jeden celek po nesčetná staletí, až nadejde den našeho společného triumfu.“\n\nVýbor povstal a zatleskal. Bylo to, jako by vítězství již bylo dosaženo, navzdory lasicím v místnosti."
 balkan_wars.1.a: "[ROOT.GetCountry.GetNameNoFormatting] odpoví na výzvu."
 balkan_wars.1.a_opener_tt: "Následující země založily #bold Balkánskou ligu#!:"
 balkan_wars.1.a_league_members_list_tt: "[THIS.GetCountry.GetName]"
 balkan_wars.1.b: "Tohle není řešení."
 balkan_wars.1.b_tt: "Nebudeme součástí #bold Balkánské ligy#!."
 balkan_wars.2.t: "Konec jedné éry"
 balkan_wars.2.d: "Je hotovo. [SCOPE.sCountry('ottoman_empire_scope').GetName] byla konečně vytlačena ze [SCOPE.sStrategicRegion('balkans_scope').GetName] a její bývalá území nyní patří svým právoplatným vlastníkům. Balkánská liga se ukázala jako úspěšná iniciativa."
 balkan_wars.2.f: "„Matko! Matko! Zvon zvoní. Nesmíme přijít pozdě!“\n\nMalý chlapec, oblečený do nově ušitého místního oděvu, prožíval nejvzrušující den svého života. Průvod, který měl putovat do hlavního města, měl právě projít středem vesnice.\n\nUž to nějakou dobu bylo, co k nim dorazily zprávy o slávě, ale zdravit jejich veteránské hrdiny byl pocit jako žádný jiný."
 balkan_wars.2.a: "Konečně nám naše země patří!"
 balkan_wars.2.tt_1: "Protože jsme vyhráli [concept_diplomatic_play] #v Balkánská válka#! bez zapojení [concept_great_power], získáme následující dodatečnou odměnu:"
 modifier_balkan_wars_won_alone: "Sláva hrdinům"
 balkan_wars.3.t: "Svoboda zmařena"
 balkan_wars.3.d: "Poroba nahradila naši žízeň po slávě. Naše podrobení zemí [ROOT.GetCountry.GetTopOverlord.GetName] ukončilo naši schopnost připojit se k jakékoli strategické koalici."
 balkan_wars.3.f: "Podle místních legend kdysi existoval nejvyšší vůdce, který požádal svého rádce, aby ho naučil moudrost na celý život.\n\n„Řekni mi, starče. Jaká jediná věc bys poradil vládci, který má potenciál stanout na vrcholu světa, i jeho pravému opaku?“"
 balkan_wars.3.a: "„I toto pomine.“"
 balkan_wars.4.t: "Rozbitá aliance"
 balkan_wars.4.d: "S pádem Balkánské ligy už neexistuje síla dostatečně mocná, aby se postavila za naši věc. Jakákoli naděje, která mohla existovat na znovuzískání našich území, je ztracena."
 balkan_wars.4.f: "Život se pro poctivý lid Balkánu znovu propadl do monotónnosti. Zdají se být oklamáni a zlomeni sliby vůdců bez prozíravosti a odbornosti.\n\nJistě, ve světě plném imperialistických kolosů je aliance oddělená hranicemi v těchto divokých zemích nyní spíše snem než sjednocující ambicí.\n\nBoj trvá dál, pochmurnější než dříve."
 balkan_wars.4.a: "Jednoho dne..."
 balkan_wars.4.a_tt: "#bold Balkánská liga#! byla rozpuštěna."
 balkan_wars.5.t: "Postradatelná loajalita"
 balkan_wars.5.d: "Dobrovolně jsme odstoupili z Balkánské ligy. Pokud chceme vybudovat pevnou budoucnost, cenění zubů na [SCOPE.sCountry('ottoman_empire_scope').GetName] musí být tou nejmenší z našich starostí."
 balkan_wars.5.f: "Ve vzduchu byl cítit duch vzpoury, když prohlášení pronesl přímo [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Točilo se kolem myšlenky, že možná je moudřejší zůstat spokojení a nedělat unáhlená rozhodnutí, aby se předešlo větším katastrofám způsobeným honbou za klamnými ambicemi.\n\nPublikum se zdálo být čím dál přesvědčenější, jak se projev blížil ke svému vrcholu."
 balkan_wars.5.a: "Na tomhle se podílet nebudeme."
 balkan_wars.5.b: "Pokud je nedokážeme porazit, musíme se k nim přidat."
 balkan_wars_5.b_protectorate_tt: "[ROOT.GetCountry.GetName] se stane [Concept('concept_protectorate', '$concept_protectorate$')] země [SCOPE.sCountry('ottoman_empire_scope').GetName] "
 balkan_wars.6.t: "Zmařené ambice"
 balkan_wars.6.d: "Nepodařilo se nám dosáhnout cíle vyhnat [SCOPE.sCountry('ottoman_empire_scope').GetName] ze [SCOPE.sStrategicRegion('balkans_scope').GetName], ale přesto jsme si zachovali nezávislost."
 balkan_wars.6.f: "Matky a manželky prolévaly slzy a naříkaly nad hromadami mladých mrtvých mužů. Opustili své vesnice, aby se hnali za chamtivostí a krví ve jménu expanzionismu politiků. Zůstaly po nich jen pomníky a masové hroby. Nehybné předměty národní hanby.\n\n„Tvrdý ořech je zvláštní plod, ty jsi ho nerozlouskl, on vylámal zuby tobě!“\n\n— Petar II. Petrović Njegoš, #italic Horský věnec#!"
 balkan_wars.6.a: "Přesto je budoucnost jasnější než minulost."
 balkan_wars.7.t: "Místní odvedenci"
 balkan_wars.7.d: "Rozhodli jsme se sáhnout do pokladny o něco hlouběji. To nám umožní zvýšit odvody pro náš boj proti zemi [SCOPE.sCountry('ottoman_empire_scope').GetName]."
 balkan_wars.7.f: "Mladík, ohromený tím, že stojí vedle dvojice profesionálních gardistů, se zhluboka nadechl, než vstoupil do sálu.\n\nOd časných ranních hodin čekal celé hodiny ve frontě, jen aby dostal uniformu. Takovou, která mu nejspíš stejně nebude sedět, čímž naváže na tradici prvního obchodu rekruta.\n\nPrávě tehdy obvykle poznáte svého prvního druha, než se proměníte v pouhý detail mezi hordami mužů."
 balkan_wars.7.a: "Nepřehánějme to."
 balkan_wars.7.b: "Ozbrojte každého, kdo je k dispozici."
 balkan_wars.8.t: "Student strategie"
 balkan_wars.8.d: "Náš generál [SCOPE.sCharacter('scoped_general').GetFullName] byl v rámci financování našeho vojenského výzkumu vyslán do zahraničí, aby si vyměnil znalosti a zkušenosti se sobě rovnými."
 balkan_wars.8.f: "Dobře chráněn v rychlíku se skupinou velících důstojníků si odpovědný muž vychutnával krásnou krajinu. Uklidňující změna tempa oproti všem obvyklým formalitám mu znovu připomněla, o čem je život.\n\nNavzdory třesoucímu se stolku pokračoval v namáčení pera do inkoustu. Stále zbývala hromada hlášení k dokončení."
 balkan_wars.8.a: "Bez trpělivosti není disciplíny."
 balkan_wars.8.b: "Měl by se více naučit o umění útoku."
 balkan_wars.8.c: "Každá bitva je vyhrána dříve, než je vybojována."
 balkan_wars.9.t: "Chyceni uprostřed"
 balkan_wars.9.d: "[SCOPE.gsInterestGroup('armed_forces_scope').GetName] s pomocí místních vyhání [SCOPE.sCulture('turkish_pop_scope').GetName] lidi z jejich domovů ve státě [SCOPE.sState('caught_root_state_scope').GetName]. Pokud se tomu nezabrání, může se to snadno změnit v krveprolití."
 balkan_wars.9.f: "Dávní sousedé aktivně vyhledávají každou příležitost, jak zaútočit na nechráněné Turky. Bez sil [SCOPE.sCountry('ottoman_empire_scope').GetRuler.GetPrimaryRoleTitle] jsou zranitelné komunity vystaveny každodennímu obtěžování a nepřátelství.  \n\nStupňující se napětí vedlo v některých vesnicích k znepokojivému zmizení několika členů rodin, zatímco úřady projevují očividnou lhostejnost. Jak se dalo čekat, někteří úředníci jsou do těchto nájezdů dokonce zapleteni."
 balkan_wars.9.a: "Vytvořte koridor."
 balkan_wars.9.a_move_pops_tt: "Všechny [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] bezpečně emigrují do [SCOPE.sState('caught_ottoman_state_scope').GetName]."
 balkan_wars.9.b: "Nechte vojáky a místní na pokoji."
 balkan_wars.9.b_move_pops_tt: "75 % [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] uprchne do [SCOPE.sState('caught_ottoman_state_scope').GetName]."
 balkan_wars.9.b_kill_pops_tt: "25 % [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] bude zabito."
 balkan_wars.9.c: "Povzbuďte vojáky."
 balkan_wars.9.c_move_pops_tt: "Polovina [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] uprchne do [SCOPE.sState('cruelty_ottoman_state_scope').GetName]."
 balkan_wars.9.c_kill_pops_tt: "Polovina [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] bude zabita."
 balkan_wars.9.c_cruel_trait_tt: "Tato možnost je dostupná, protože vládce je #bold krutý#!."
 balkan_wars.9.e: "Žili zde po staletí, tohle není správné."
 balkan_wars.9.e_kill_pops_tt: "5 % [SCOPE.sCulture('turkish_pop_scope').GetName] [Concept('concept_pop', '$concept_pops$')] ve státě [SCOPE.sState('caught_root_state_scope').GetName] bude zabito."
 balkan_wars.10.t: "Správa přebytku"
 balkan_wars.10.d: "Ve státě [SCOPE.sState('barracks_state_scope').GetName] vznikl přebytek z letošních výdajů fondu a správci se ptají, kam jej nasměrovat."
 balkan_wars.10.f: "Uprostřed chaosu by bylo docela snadné udělat v účetních výkazech „chybu“. Navzdory pokušením se však zdá, že k tomu nedošlo. Je to jasný znak nacionalistické ambice směřující ke společnému cíli a projev skutečného charakteru.\n\nLidé zapojení do pohybu kapitálu podstupují největší riziko vůči sobě samým. Národy povstávají na ramenou takových jednotlivců, kteří nesejdou z přímé cesty pravdomluvnosti."
 balkan_wars.10.a: "Přeměňte nevyužitou budovu na kasárna."
 balkan_wars.10.b: "Mělo by to připadnout těm, kdo rozhodují."
 balkan_wars.10.c: "Muži ve službě to potřebují nejvíce."
 balkan_wars.11.t: "Chaos na Balkáně"
 balkan_wars.11.d: "Aliance našich bývalých závislých zemí ve [SCOPE.sStrategicRegion('balkans_scope').GetName], #bold Balkánská liga#!, oficiálně vyhlásila povstání proti nám. Pokud v nadcházející válce zvítězí, ztratíme všechny naše země v oblasti a vzniknou nové národy."
 balkan_wars.11.f: "Starý imám se na schodech minbaru otočil k věřícím a začal pronášet chutbu.\n\n„Ó věřící!\n\nVězte, že v tento den, stejně jako za dnů našich předků, nám osmanský sultán, stín Boha na Zemi, přikazuje povstat na obranu naší víry, našich zemí a naší cti. Tato válka není pouhým konfliktem lidí, je to zkouška od Všemohoucího, zápas na cestě pravdy proti tyranii a útlaku!“"
 balkan_wars.11.a: "Budou litovat dne, kdy se k tomu odhodlali."
 balkan_wars.11.a_opener_tt: "Následující země #bold Balkánské ligy#! proti nám zahájily diplomatickou hru:"
 balkan_wars.11.a_league_members_list_tt: "[THIS.GetCountry.GetName]"
 balkan_wars.12.t: "Válka začíná"
 balkan_wars.12.d: "Jménem všech členů Balkánské ligy [SCOPE.sCountry('first_balkan_war_initiator').GetName] oficiálně oznámila přípravu války za znovuzískání všech zemí [SCOPE.sCountry('ottoman_empire_scope').GetName] ve [SCOPE.sStrategicRegion('balkans_scope').GetName]."
 balkan_wars.12.f: "Provolání hlasatele, střeženého hrstkou žoldnéřů, bylo mezi vesničany všech vrstev přijato se smíšenými pocity.\n\n„Slyšte, děti země [ROOT.GetCountry.GetNameNoFormatting]!\n\nNa výslovný rozkaz ctihodného [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] se naše armáda připravuje na posvátné tažení proti společnému nepříteli. Nechť je všem známo: v následujících měsících budou verbováni stateční noví muži těchto zemí, snad aby naposledy bojovali za očištění toho, co bývalo našimi vesnicemi, městečky, městy, loukami a horami, a aby si nárokovali to, co nám právem patří...“"
 balkan_wars.12.a: "Nastal čas."
 joined_balkan_war_tt: "[ROOT.GetCountry.GetName] se připojí k Balkánské válce jako člen nebo spojenec #v Balkánské ligy#!"
 balkan_wars.13.t: "Kataklyzma"
 balkan_wars.13.d: "Po úspěšném tažení vedeném zemí [SCOPE.sCountry('first_balkan_war_initiator').GetName] jsme přišli o všechny země ve [SCOPE.sStrategicRegion('balkans_scope').GetName]. Balkánská liga splnila svůj účel a zanikla; z jejího popela vyrašily nové národy."
 balkan_wars.13.f: "„Uštědřili jsme políček tváři pravdy,\nvzdorovali jsme vládě svědomí.\nPostavili jsme most přes plameny pekla,\nmost zbabělců - smetený povodní.\n\nHej, Rızo! Tato prolitá krev byla naše...\nMilovaná, nyní služka nepřátel, byla naše...\nZemě Rúmu!... Ta drahocenná vlast byla naše -\nale měli jsme ji za nehodnou a zmocnil se jí jiný.“\n\n— Rıza Tevfik, „Pro Rumelii“"
 balkan_wars.13.a: "Musíme se zotavit."
