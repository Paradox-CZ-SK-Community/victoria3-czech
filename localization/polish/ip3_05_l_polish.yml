 je_spoils_of_war: "Válečná kořist"
 je_spoils_of_war_reason: "Jen několik dní po vyhlášení vítězství obrátili všichni zbývající členové Balkánské ligy svůj pohled k zemím dobytým od Osmanů, o nichž tvrdí, že byly nespravedlivě rozděleny.\n\nVysocí důstojníci i politici, včetně těch našich, požadují nápravu, zatímco železo války je stále rozpálené."
 je_spoils_of_war_timed_out_tt: "#b Dokončení#! bude vyhodnoceno, až [concept_journal_entry] #v $je_spoils_of_war$#! #b vyprší#!"
