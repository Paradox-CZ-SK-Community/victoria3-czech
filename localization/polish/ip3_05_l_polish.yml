 serbian_dethrone_progress_bar: "Loajalita"
 serbian_dethrone_progress_bar_desc: "[concept_dynastic_loyalty]: [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|v1%] ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 serbia.1.t: "Trůn z trní"
 serbia.1.d: "Mocenské váhy se přesouvají mezi rodinami [SCOPE.sCharacter('rival_dynasty_contender_scope').GetLastName] a vládnoucími [ROOT.GetCountry.GetRuler.GetLastName]. Věrnost se slibovala nalevo i napravo bez většího rozmýšlení. Kdo je právoplatným vládcem země [ROOT.GetCountry.GetName]?"
 serbia.1.f: "„Nepochybně, můj [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], naše podpora náleží vám. Tak jako jsme byli pod dubem svázáni vaším posvátným projevem k revoluci, budeme při vás znovu stát pro slávu Srbska.“\n\nByl to sice patolízal, ale jeho sebejistota byla nenucená. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] přemýšlel, jak to dokáže. Jeho nespolehlivá povaha byla už nějakou dobu veřejně známá - zdálo se, že je jediným člověkem v místnosti, který věří ve vlastní důvěryhodnost."
 serbia.1.a: "Cena loajality se neustále mění."
 serbia.2.t: "Mihailovo nástupnictví"
 serbia.2.d: "Druhorozený syn revolucionáře, [ROOT.GetCountry.GetRuler.GetFullName], byl korunován novým knížetem země [ROOT.GetCountry.GetName]. Masy si myslí, že v sobě má víc než jeho starší bratr."
 serbia.2.f: "„...a náš zápas přesahuje světské záležitosti, neboť v rukou držíme božské právo vládnout a nebýt ovládáni.“ Nový kníže se rozhlédl, aby odhadl reakce. „Ponesu pochodeň těch, kdo přišli přede mnou, dokud planoucí světlo mé duše neopustí tuto smrtelnou schránku.“\n\n„Čas a mé právo!“"
 serbia.2.a: "Ať je jeho vláda pamětihodná."
 serbian_throne.1.t: "Církevní publicita"
 serbian_throne.1.d: "[SCOPE.gsInterestGroup('serb_clerical_publicity_ig').GetName] nám nabídla pomoc v naší posvátné věci oslabit vliv [SCOPE.sCharacter('rival_dynasty_contender_scope').GetFullName] na lid. Potomci zběhů nebudou mít v [ROOT.GetCountry.GetName] hlas."
 serbian_throne.1.f: "V tichém údolí vesnice Takovo vyšel [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] se svými lidmi ze shromáždění, když vyhlásil srbské povstání proti Osmanům.\n\nPsal se rok 1815. Ti, kdo sami sebe nazývali „hrdiny“, už uprchli hledat útočiště pod křídly svých zahraničních pánů. Jedním z nich byl Karađorđe, otec [SCOPE.sCharacter('rival_dynasty_contender_scope').GetFirstNameNoFormatting]."
 serbian_throne.1.a: "To by mělo stačit."
 serbian_throne.1.b: "V jednotě je síla."
 serbian_throne.1.c: "Filantropie je podstatou víry, že?"
 serbian_throne.2.t: "Pomlouvačné pamflety"
 serbian_throne.2.d: "Dostali jsme příležitost vyrobit pamflety, které očerní [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')]."
 serbian_throne.2.f: "Mezi propagandou a pomluvou vede tenká hranice. A ta první se jistě může stát nejsmrtonosnější zbraní politika. Toho rána byl knížeti předložen vzorek pamfletu vytvořený proslulým umělcem a kaligrafem.\n\nKdyž držel papír v rukou, všiml si, že pod mnoha zlomyslnými „fakty“ napsanými nahoře je patriarcha [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')] na všech čtyřech, žvýkající stehenní maso, které bylo v místním jazyce označeno jako „srbský rolník“, zatímco se mu vysmívá a rozkazuje osmanský paša."
 serbian_throne.2.a: "Geniální."
 serbian_throne.2.b: "Zahajte výrobu, hned!"
 serbian_throne.3.t: "Odhalení pokrytců"
 serbian_throne.3.d: "Ukázalo se, že [SCOPE.sCharacter('serb_busted_ig_leader').GetFullName], vůdce [SCOPE.gsInterestGroup('serb_busted_ig').GetName], tajně pracoval na přesvědčování dalších politiků ve prospěch odporné kampaně [SCOPE.sCharacter('rival_dynasty_contender_scope').GetLastName]."
 serbian_throne.3.f: "Hostiny slouží jako důležitá shromáždění, kde se odehrávají různé nevyslovené dynamiky. Často zahrnují vyjednávání, předvádění vlivu, mlaskavé zvuky nenasytných megalomanů a všudypřítomné soupeření o udržení prestiže mezi sobě rovnými.\n\nOrientovat se ve složitostech jedinců, kteří ukazují různé stránky své osobnosti, je náročné i odměňující úsilí."
 serbian_throne.3.a: "Nechte ho zmizet."
 serbian_throne.3.b: "Přinuťte ho pracovat pro nás."
 serbian_throne.4.t: "Odpadličtí hajduci"
 serbian_throne.4.d: "Nepravidelné oddíly pod velením [SCOPE.sCharacter('rival_dynasty_contender_scope').GetFullName] obtěžují [SCOPE.sReligion('sunni_pop_scope').GetName] a [SCOPE.sReligion('jewish_pop_scope').GetName] čtvrti."
 serbian_throne.4.f: "„Víte, jací jsou, můj [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Dříve si užívali přepadání osmanských obchodních karavan a aristokratů, ale teď jim zbyli jen rolníci, kteří nemají nikoho, kdo by je chránil.“ Poradce rychlým gestem odehnal posla, než pokračoval: „Karađorđe byl jedním z nich v letech povstání a teď se jeho syn snaží udržet otcovy přátele spokojené.“"
 serbian_throne.4.a: "Nechte je být, jinak se kvůli kořisti obrátí proti vlastním."
 serbian_throne.4.b: "Tohle nemůže pokračovat."
 serbian_throne.5.t: "Městští rebelové"
 serbian_throne.5.d: "Skupina rebelů v [SCOPE.sState('capital_state').GetName] po nás požaduje, abychom abdikovali ve prospěch [SCOPE.sCharacter('rival_dynasty_contender_scope').GetFullName]. Nepředstavují zásadní hrozbu, ale způsob, jak s nimi bude naloženo, vyšle jasný vzkaz."
 serbian_throne.5.f: "Empatie je vlastnost, kterou musí mít všichni pozoruhodní vůdci. Kníže, který se vzbouřil proti nechtěnému útlaku, velmi dobře ví, co znamená vzít si zpět to, co vám skutečně patří.\n\n„Nejsou ničím víc než skupinou mladých, důvěřivých darebáků,“ zamumlal, když vyhlížel z okna. „My jsme alespoň bojovali za budoucnost našeho národa, ne za nějakého muže.“"
 serbian_throne.5.a: "Zajistěte, aby byli řádně umlčeni."
 serbian_throne.5.b: "Vyzbrojte loajalisty a pošlete je tam jako ukázku síly."
 serbian_throne.5.c: "Není třeba prolévat krev, každý má svou cenu."
 serbian_throne.6.t: "Prosba o pomoc"
 serbian_throne.6.d: "Nedávno k nám dorazily zoufalé zprávy o maďarizaci v [SCOPE.sState('delvidek_scope').GetName]. Některé srbské vesnice očekávají podporu od svých bratří za řekou. Je to cenná příležitost posílit naše postavení proti [SCOPE.sCharacter('rival_dynasty_contender_scope').GetFullName]."
 serbian_throne.6.f: "Pomocník rozvázal provázek, který svazoval všechny obálky dohromady, a poté otevřel tu svrchní, aby ji přečetl nahlas.\n\n„Jeho nejvznešenější Výsosti, [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] z rodu [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] všech počestných Srbů.\n\nKéž se to zalíbí vaší vznešenosti,\n\npíši pokorně jménem naší nehodné, avšak loajální vesnice, abych požádal o oplátku laskavosti. Jak si možná vzpomínáte, ač nikoli ve skutečnosti, byli jsme tam při vašem revolučním vítězství nad Osmany se vším, co jsme mohli poslat...“"
 serbian_throne.6.a: "Pošlete jim pomoc, aby mohli vzdorovat."
 serbian_throne.6.b: "Pozvěte je do jejich skutečné vlasti a pomozte jim znovu začít."
 serbian_throne.6.b_move_pops_tt: "10 % Srbů v [SCOPE.sState('delvidek_scope').GetName] se přesune do [SCOPE.sState('capital_state').GetName]."
 serbian_throne.9.t: "Zůstáváme"
 serbian_throne.9.d: "Jeden po druhém zrazovali lokajové [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')] své pány na cestě k hroznému osudu. Všichni spatřili nespornou pravdu: [ROOT.GetCountry.GetName] patří [ROOT.GetCountry.GetCustom('serbia_ruling_dynasty')]!"
 serbian_throne.9.f: "„Takhle zacházíte se svými zachránci?“ sálem se rozléhala panika a zoufalství. „Můj otec dovedl tuto zemi ke svobodě, zatímco vy všichni jste hromadili bohatství. Nikdy nepochopíte, co znamená nést krev hrdiny!“\n\nLoajální psi čekali na rozsudek.\n\n„Nikdy!“"
 serbian_throne.9.a: "Budete sdílet osud svého otce."
 serbian_throne.9.b: "Už nikdy nevkročte na srbskou půdu."
 serbian_throne.9.c: "Milosrdenství je dar, který poskytují jen skuteční vůdci."
 serbian_throne.10.t: "Zúčtování"
 serbian_throne.10.d: "Stejně jako je jejich otec vyvedl z pokraje zkázy, [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')] zvítězili nad tyranií [ROOT.GetCountry.GetCustom('serbia_ruling_dynasty_short')]. Trůn země [ROOT.GetCountry.GetName] nyní patří jim."
 serbian_throne.10.f: "„Druhové! Posvátné matky! Nyní jsme svobodní ze spárů hnízdících politiků, kteří nedělají nic pro dobro naší vlasti...“ zvolal nový [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFormatting]. \n\nDav si připomínal hrdinské úsilí jeho otce o svobodu a dál jásal, dychtivý vyslechnout konečný rozsudek. \n\n„...a co říkáte na osud zrádců?“ Kníže se na okamžik odmlčel, jistý si tím, že ať z jeho úst zazní cokoli, bez otázek se podřídí."
 serbian_throne.10.a: "„...máme je poslat setkat se s Pánem?“"
 serbian_throne.10.b: "„...máme je dál živit?“"
 serbian_throne.10.c: "„...bude milosrdenství jejich konečným rozsudkem?“"
 serbian_throne.11.t: "Není důvod bojovat"
 serbian_throne.11.d: "Protagonisté nechvalně proslulé krevní msty mezi rody $concept_house_of_obrenovic_short$ a $concept_house_of_karadjordjevic_short$ už pro sebe navzájem nepředstavují hrozbu. Nyní je čas jít dál jako sjednocený národ bez malicherných sporů."
 serbian_throne.11.f: "„Není moudré rozdělovat říši kvůli pomíjivým rodinným rozepřím. Proto je solidarita podstatou pokroku, neboť je známo, že rozptýlení vždy svádělo muže z přímé cesty.\n\nKromě toho vnitřní boje obvykle způsobují utrpení těm, jejichž jedinou povinností je platit daně. \n\nPánové, máme národ, který musíme vybudovat!“"
 serbian_throne.11.a: "Ať žije Srbsko!"
 serbian_throne.12.t: "Plánování kampaně"
 serbian_throne.12.d: "Začaly přípravy celostátní kampaně, která má zvýšit naši popularitu a pošpinit [ROOT.GetCountry.GetCustom('serbia_rival_dynasty')] v očích široké veřejnosti. Musíme rozhodnout o výši výdajů."
 serbian_throne.12.f: "„...a ctihodný [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] posílá všem svým poddaným laskavé pozdravy.\n\nNyní začneme vybírat dobrovolníky pro přehlídku.“\n\nStatní mladí muži, následovaní přehnaně nadějnými městskými děvčaty, dychtivě vykročili vpřed, aby se shromáždili na určeném místě. Byla to neopakovatelná příležitost, jak si jich může všimnout královská rodina a snad je i zachránit před životem nošení sena nebo jízd na mezcích na pole."
 serbian_throne.12.a: "Jaký to má smysl, když platíme my?"
 serbian_throne.12.b: "Zaplaťte, co je nutné."
 serbian_throne.12.c: "Nešetřete na ničem."
 serbian_throne.12.e: "Možná to nakonec není dobrá iniciativa."
 serbian_throne.12.e_tt: "Tato myšlenka bude odložena na příštích #v 5 let#!"
 serbian_throne.12.prep_choice_tt: "Přípravy probíhají"
 each_monarch_may_only_do_this_once_tt: "Každý [concept_ruler] může tuto akci provést pouze #b jednou#! za funkční období"
 ser_campaign_not_on_cooldown_tt: "Během posledních #v 5 let#! #b nezrušil#! kampaň"
 serbian_throne.13.t: "Dohoda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
 serbian_throne.13.d: "Naši organizátoři kampaně přišli s myšlenkou podpořit zájmovou skupinu, abychom získali větší loajalitu."
 serbian_throne.13.f: "Jeden po druhém vstupovali ke dvoru zástupci určitých kruhů, aby projednali své nedostatky. Vždy to byli ti samí.\n\nZvláštní okolností, které si poradci [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] během těchto schůzek všimli, bylo hektické soupeření mezi skupinami. Rychle si uvědomili možnost využít tento závod k získání větší politické moci a byli si plně vědomi, že jde o transakci, nikoli dar."
 serbian_throne.13.a: "Budeme prosazovat [SCOPE.gsInterestGroup('campaign_ig_1').GetName]."
 serbian_throne.13.b: "Vezměme s sebou [SCOPE.gsInterestGroup('campaign_ig_2').GetName]."
 serbian_throne.13.c: "Podpora [SCOPE.gsInterestGroup('campaign_ig_3').GetName] nám z dlouhodobého hlediska prospěje."
 serbian_throne.13.e: "Tato čest náleží pouze nám."
 serbian_throne.13.accord_chosen_tt: "Kampaň brzy začne"
 serbian_throne.14.t: "Kampaň ve státě [SCOPE.sState('campaign_state').GetName]"
 serbian_throne.14.d: "Dorazili jsme do [SCOPE.sState('campaign_state').GetName], abychom oslovili potřeby prostého lidu a vykreslili mu jasnější budoucnost. Dychtivě čeká, až vyslechne naše sliby placené z prostředků kampaně."
 serbian_throne.14.f: "Důstojníci přednesli pečlivě připravené a nazpaměť naučené projevy, které v srdcích posluchačů zažehly národní hrdost.\n\nJejich cílem bylo zapojit dav před krátkým závěrečným projevem [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], který zakončí událost darem komunitě, aby upevnil své postavení v srdcích lidu i na trůně.\n\nPříznivci [SCOPE.sCharacter('rival_dynasty_contender_scope').GetLastNameNoFormatting] z toho nebudou mít radost."
 serbian_throne.14.a: "Blaho všech nade vše!"
 serbian_throne.14.b: "[SCOPE.sState('campaign_state').GetName] si zaslouží lepší základy."
 serbian_throne.14.c: "Všichni by měli umět číst o zradách Karađorđeho!"
 serbian_throne.14.e: "Společně jsme silnější!"
 serbian_throne.14_next_state_tt: "Přesuneme se do dalšího státu."
 serbian_throne.14_campaign_ends_tt: "Kampaň jsme završili návštěvou všech dostupných států."
 serbian_throne.15.t: "Zpět do paláce"
 serbian_throne.15.d: "Po vyčerpávající kampani nás královský doprovod přivedl zpět do paláce. Můžeme pokračovat v každodenních záležitostech."
 serbian_throne.15.f: "Skřípění kol vozu otáčejících se po kamenné cestě mírně tlumilo kakofonii jásotu lidu, když se jejich nejvyšší [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] vracel domů.\n\nDovolil si zavřít oči a chvíli snít o spánku v posteli. Sen se však rychle změnil v noční můru, která mu připomněla hady pod ní pracující pro [SCOPE.sCharacter('rival_dynasty_contender_scope').GetLastNameNoFormatting]."
 serbian_throne.15.a: "Museli si zapamatovat, kdo je jejich skutečný [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
