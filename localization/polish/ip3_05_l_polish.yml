 ottoman_monarchs.1.t: "Puč Bâb-ı Âli"
 ottoman_monarchs.1.d: "Členové Bâb-ı Âli zahájili puč proti [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]. Viníci již informovali nového vládce."
 ottoman_monarchs.1.f: "Ranní recitace [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] byly náhle přerušeny zvukem cülûských děl. Tušil, co bude následovat, když do místnosti vtrhl eunuch, aby doručil nešťastnou zprávu.\n\nPalác obklopili ti, kdo ještě předchozího dne zdravili jeho rozkazy, a člun byl připraven na cestu do ústraní. Důstojníci již začínali stoupat po schodech, aby jej odvedli."
 ottoman_monarchs.1.a: "Vallahi, tohle je dílo kâfirů..."
 ottoman_monarchs.1_tt: "Úspěšný puč sesadil [ROOT.GetCountry.GetRuler.GetFullName] a nahradil jej novým [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 ottoman_monarchs.2.t: "Vláda šílenství"
 ottoman_monarchs.2.d: "Členové Bâb-ı Âli rozhodli, že kvůli nedostatku příčetnosti [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] musí povstat nový vládce, aby vládl našemu národu."
 ottoman_monarchs.2.f: "Po epizodách veřejných činů, které zahanbily jeho jméno, byl [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] nalezen v posteli, jak se třese strachem a paranoiou.\n\nZprávy o vraždě bývalého sultána Abdulazize po jeho sesazení zhoršily duševní stav [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting].\n\nPokusy skočit do palácového bazénu a prchnout před duchovními během obřadu věrnosti nepochybně ukázaly, že jeho vláda bude krátká."
 ottoman_monarchs.2.a: "Držte se ode mě dál!"
 ottoman_monarchs.2_tt: "[ROOT.GetCountry.GetRuler.GetFullName] dostává péči o duševní zdraví, zatímco další [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] v pořadí je připravován k převzetí vedení."
 balkan_wars.14.t: "Zvěsti o Balkánské lize"
 balkan_wars.14.d: "Naši špehové zjistili, že několik národů, vesměs starých [SCOPE.sCountry('ottoman_empire_scope').GetAdjectiveNoFormatting] závislých zemí, vytvořilo alianci. Pokud by někdo podpořil naši nezávislost, mohli bychom se připojit k jejich nadcházející válce."
 balkan_wars.14.f: "„Ale strýčku, jsou to jiní lidé, kteří chtějí své vlastní země. Můžeme jim věřit?“ \n\n „Nezajímá mě, odkud jsou. Nezajímá mě, v co věří. Nezajímá mě, na jaká údolí si činí nárok. Dokud nenávidí tyto [SCOPE.sCountry('ottoman_empire_scope').GetAdjectiveNoFormatting] tyrany alespoň z poloviny tolik jako my - dokud by jejich válka mohla vést k naší svobodě - rád budu krvácet po jejich boku.“"
 balkan_wars.14.a: "Zaslouží si naši podporu"
 balkan_wars.14.b: "Naše místo je s $dyn_c_ottoman_empire$"
