 je_philippines_main_ilustrado_button: "Podpořit ilustrados"
 je_philippines_main_ilustrado_button_desc: "Mnozí příslušníci vyšší a střední třídy [GetCulture('filipino_mestizo').GetCustom('getPluralDemonym')] a takzvaní #italic Indios#! byli vystaveni [GetCulture('spanish').GetName] ideálům [GetIdeology('ideology_liberal').GetName]. Tato rychle rostoucí vzdělaná třída se začala spojovat s [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]. Usilují o reformu zákonů a nastavení liberálnější agendy v zemi [ROOT.GetCountry.GetName]."
 je_philippines_development_complete: "Dokončen [concept_journal_entry] $je_philippines_development$."
 notification_filipino_mestizo_now_primary_culture_name: "[GetCulture('spanish').GetName] již není [Concept('concept_primary_cultures','$concept_primary_culture$')]"
 notification_filipino_mestizo_now_primary_culture_desc: "Nyní, když už nejsme pod vládou $SPA_ADJ$, je [GetCulture('filipino_mestizo').GetName] naší [Concept('concept_primary_cultures','$concept_primary_culture$')]."
 notification_filipino_mestizo_now_primary_culture_tooltip: "#header $notification_filipino_mestizo_now_primary_culture_name$#!\n$TOOLTIP_DELIMITER$\n$notification_filipino_mestizo_now_primary_culture_desc$"
 philippines.1.t: "[ROOT.GetCountry.GetAltAdjective('aa')] identita"
 philippines.1.d: "Uprostřed rostoucího napětí stále více lidí usiluje o větší zastoupení ve vládě, zatímco jiní volají po nezávislosti na zemi [ROOT.GetCountry.GetTopOverlord.GetName]. Převládne [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] vláda, nebo lid země [ROOT.GetCountry.GetName] uspěje v získání větších svobod?"
 philippines.1.f: "„Filipíny tedy zůstanou pod španělskou nadvládou, avšak s větší zákonností a větší svobodou, nebo se prohlásí za nezávislé poté, co sebe i mateřskou zemi zbrodí krví.\n\nProtože nikdo by si neměl přát ani doufat v tak nešťastný rozkol, který by byl zlem pro všechny a pouze posledním argumentem v nejzoufalejší situaci, podívejme se, jakými formami pokojného vývoje mohou ostrovy zůstat podřízeny španělské autoritě s co nejmenší újmou pro práva, zájmy a důstojnost obou stran.“\n\n—José Rizal, #italic Filipíny za sto let#!"
 philippines.1.a: "Získání nezávislosti je zásadní."
 philippines.1.b: "Nakonec se zodpovídáme zemi [ROOT.GetCountry.GetTopOverlord.GetNameNoFlag]."
 modifier_phi_lib_gain: "Rodící se hnutí za nezávislost"
 modifier_phi_lib_lose: "Španělsko-filipínské bratrské společnosti"
 philippines.2.t: "Milovaná země, vyvolená země"
 philippines.2.d: "Nezávislá a prosperující země [ROOT.GetCountry.GetName] bude po mnoho dalších let pevnou oporou v Pacifiku."
 philippines.2.f: "„Země jitra,\ndítě vracejícího se slunce,\ns planoucím zápalem\ntě naše duše zbožňují.“\n\n-José Palma, #italic Lupang Hinirang#!"
 philippines.2.a: "Budoucnost země [ROOT.GetCountry.GetName] je jasná."
 notification_filipino_culture_genesis_name: "Geneze kultury [GetCulture('filipino').GetName]"
 notification_filipino_culture_genesis_desc: "Země [SCOPE.sCountry('filipino_nation_scope').GetName] zažila rozsáhlé kulturní probuzení a směřuje k svébytné kultuře [GetCulture('filipino').GetName]."
 notification_filipino_culture_genesis_tooltip: "#header $notification_filipino_culture_genesis_name$#!\n$TOOLTIP_DELIMITER$\n$notification_filipino_culture_genesis_desc$"
 philippines.3.t: "Spoléhání na [SelectLocalization(ROOT.GetCountry.GetTopOverlord.IsValid, ROOT.GetCountry.GetTopOverlord.GetNameNoFormatting, 'SPA')]"
 philippines.3.d: "Nadále těžíme ze svých vazeb s metropolí, zatímco [ROOT.GetCountry.GetTopOverlord.GetAdjective] a [ROOT.GetCountry.GetAdjective] záležitosti se stále více prolínají."
 philippines.3.f: "[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] vláda v tomto souostroví zůstává pevná, jako tomu bylo po staletí, a lid země [ROOT.GetCountry.GetNameNoFormatting] projevil rostoucí odhodlání posilovat vazby se zemí [ROOT.GetCountry.GetTopOverlord.GetNameNoFormatting].\n\nPro některé členy [SCOPE.gsInterestGroup('ilustrado_ig_scope').GetNameNoFormatting] je to vítězství a příslib velkých věcí budoucích. Pro jiné jsou tato pevná pouta znepokojivá a představují hrozbu pro budoucnost země."
 philippines.3.a: "To skutečně znamená novou kapitolu pro naši zemi."
 modifier_metropole_business_networks: "Finanční vazby na metropoli"
 modifier_national_consolidation: "Úsilí o národní konsolidaci"
 notification_filipino_hispanophone_culture_genesis_name: "Geneze kultury [GetCulture('filipino_hispanophone').GetName]"
 notification_filipino_hispanophone_culture_genesis_desc: "Země [SCOPE.sCountry('filipino_nation_scope').GetName] zažila rozsáhlé kulturní probuzení a směřuje k svébytné kultuře [GetCulture('filipino_hispanophone').GetName]."
 notification_filipino_hispanophone_culture_genesis_tooltip: "#header $notification_filipino_hispanophone_culture_genesis_name$#!\n$TOOLTIP_DELIMITER$\n$notification_filipino_hispanophone_culture_genesis_desc$"
 philippines.4.t: "Střet místního kléru"
 philippines.4.d: "Novinový článek napsaný na protest proti starému dekretu [ROOT.GetCountry.GetTopOverlord.GetAdjective] vlády tvrdí, že bratři kultury [GetCulture('filipino_mestizo').GetName] by měli mít stejnou autoritu jako bratři kultury [GetCulture('spanish').GetName]."
 philippines.4.f: "Noviny kolovaly po celém městě [ROOT.GetCountry.GetCapital.GetCityHubName] a pobouřily jak [GetCulture('spanish').GetNameNoFormatting] bratry, tak vládní správce.\n\n„Po desetiletí spravovali [GetCulture('filipino_mestizo').GetNameNoFormatting] bratři místní farnosti,“ tvrdil anonymní autor. „Proč musíme znovu předávat kontrolu [GetCulture('spanish').GetNameNoFormatting]?“"
 philippines.4.a: "[GetCulture('filipino_mestizo').GetNameNoFormatting] bratři jsou stejně schopní spravovat místní farnosti."
 philippines.4.b: "Přínos bratrů kultury [GetCulture('spanish').GetName] byl neocenitelný."
 pedro_pelaez_appears_tt: "Pedro Peláez se objeví v zemi [ROOT.GetCountry.GetNameNoFormatting]"
 friar_agitator_popularity: "Podpora místního kléru"
 philippines.5.t: "Reformy ilustrados"
 philippines.5.d: "Díky našemu úsilí si ilustrados zajistili pevnější postavení ve [ROOT.GetCountry.GetAdjective] vládě."
 philippines.5.f: "„Početná osvícená třída nyní existuje na ostrovech i mimo ně; třída vytvořená a neustále rozšiřovaná hloupostí určitých vládnoucích mocí, která nutí obyvatele opouštět zemi, aby získali vzdělání v zahraničí, a která se udržuje a bojuje díky provokacím a módnímu systému špehování. Tato třída, jejíž počet souhrnně narůstá, je v neustálém spojení se zbytkem ostrovů, a pokud dnes tvoří pouze mozek země, za několik let vytvoří celý nervový systém a projeví svou existenci ve všech jejích činech.“\n\n—José Rizal, #italic Filipíny za sto let#!"
 philippines.5.a: "Vliv ilustrados bude nadále růst."
 ilustrados_education_fervor_add: "Zanícení pedagogové"
 philippines.7.t: "Guardia Civil na Filipínách"
 philippines.7.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] jménem [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] správy zavedl [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] do [ROOT.GetCountry.GetAdjectiveNoFormatting] souostroví."
 philippines.7.f: "„Přesto navzdory tolika nepříznivým okolnostem byla španělská autorita udržena po více než tři staletí a, ačkoli byla omezena, stále řídí osudy filipínského souostroví.“\n\n—José Rizal, #italic Filipíny za sto let#!"
 philippines.7.a: "Zneužijí však důstojníci svou nově nabytou autoritu?"
 philippines.7.b: "Velmi dobře, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] má vše pevně v rukou."
 ig_guardia_civil_modifier_b: "Vliv generálního guvernéra"
 philippines.9.t: "Plodná budoucnost"
 philippines.9.d: "S přístavy otevřenými zahraničnímu obchodu má souostroví větší potenciál rozvinout se v prosperující oblast. Nejvíce mohou získat přístavní města a zemědělský sektor."
 philippines.9.f: "Na pravém břehu řeky Pasig žije [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] země [ROOT.GetCountry.GetNameNoFormatting], který dohlíží na rozvoj těchto ostrovů jménem [ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] správy. A na tomtéž břehu řeky, o tři míle níže, stojí přístavní mola a sklady úspěšných obchodníků, kteří nemalou měrou posilují ekonomiku.\n\n[ROOT.GetCountry.GetCapital.GetCityHubName], jeden z nejnavštěvovanějších přístavů v oblasti, je bohatý na příležitosti pro ty, kdo je hledají."
 philippines.9.a: "Musíme své úsilí zaměřit na naše přístavy."
 philippines.9.b: "Je zásadní, abychom se zaměřili na rozvoj zemědělského sektoru."
 philippines_development_modifier_a: "Vyhlídky přístavního města"
 philippines_development_modifier_b: "Souostrovní zemědělství"
 philippines.10.t: "Působivý rozvoj"
 philippines.10.d: "Půda je nyní připravena pro to, aby rostoucí střední třída získala větší politický vliv. V rozvoji souostroví bylo dosaženo stabilního pokroku."
 philippines.10.f: "Ve městě [ROOT.GetCountry.GetCapital.GetCityHubName] je [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ohromen rozvojem zemědělského sektoru a prosperujícími přístavy v zemi [ROOT.GetCountry.GetNameNoFormatting].\n\nJak rozvoj země působí na [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] dojmem, životy mnoha lidí se zlepšují a peníze plní kapsy rostoucí střední třídy. Tyto společensky stoupající rodiny nyní posílají své děti na univerzity jak ve městě [ROOT.GetCountry.GetCapital.GetCityHubName], tak v zahraničí. Domácí vyhlídky se rozhodně zlepšují."
 philippines.10.a: "[SCOPE.sState('visayas_scope').GetStateRegion.GetName] bude jistě prosperovat po celé příští generace."
 philippines.10.b: "[SCOPE.sState('mindanao_scope').GetStateRegion.GetName] se bude nadále rozvíjet v prosperující oblast."
 unlocks_je_philippines_main_ilustrado_button_tt: "Splní požadavek pro použití tlačítka #b $je_philippines_main_ilustrado_button$#! v #b $je_philippines_main$#! [concept_journal_entry]"
 modifier_growth_of_the_middle_class: "Růst střední třídy"
 philippines.11.t: "Ostrovní identita"
 philippines.11.d: "Naše velké úsilí o vzdělávání [ROOT.GetCountry.GetAltAdjective('yych')] národů vedlo k vytvoření panfilipínské národní identity."
 philippines.11.f: "„Vytvoření nezávislého státu je pouze prvním krokem ke skutečnému národnímu osvobození. Teprve až všechny jeho tvořící národy budou mluvit jedním hlasem, bude naše práce skutečně dokončena.“"
 philippines.11.a: "Pochodujeme společně vstříc budoucnosti."
 philippines.12.t: "Milované dítě metropole"
 philippines.12.d: "Komplexní vzdělávací úsilí a naše neochvějné vazby na [GetCulture('spanish').GetName] národ vedly ke vzniku nové, svébytné a hispanofonní panfilipínské identity."
 philippines.12.f: "„Matko Španělsko, tvůj jazyk je klíčem: jím otevíráme úřady, noviny a dveře univerzit.“"
 philippines.12.a: "Naše kulturní pouto se Španělskem je zdrojem síly."
 je_sagrada_familia: "Katedrála Sagrada Família"
 je_sagrada_familia_reason: "Příznivci [SCOPE.gsInterestGroup('relevant_ig').GetName] vybrali prostředky na vytvoření katedrály ve městě [SCOPE.sState('relevant_state').GetCityHubName]. Jeden filantrop již pro tento ambiciózní podnik zakoupil pozemek a pověřil renomované architekty návrhem chrámu.\n\n$building_sagrada_familia_cathedral_3$ bude třeba vybudovat ve třech fázích a lze ji postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_CATALONIA')]"
 no_cathedral_status_loc: ""
 cathedral_0_built_cathedral_1_ready_status_loc: "První fáze budovy [GetBuildingType('building_sagrada_familia_cathedral_1').GetName] je připravena k výstavbě"
 cathedral_1_built_cathedral_2_ready_status_loc: "Druhá fáze budovy [GetBuildingType('building_sagrada_familia_cathedral_2').GetName] je připravena k výstavbě"
 cathedral_2_built_cathedral_3_ready_status_loc: "Třetí fáze budovy [GetBuildingType('building_sagrada_familia_cathedral_3').GetName] je připravena k výstavbě"
 cathedral_3_built_complete_status_loc: "$building_sagrada_familia_cathedral_3$ je dokončena"
 sagrada_familia_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] vybudovala tři fáze budovy $building_sagrada_familia_cathedral_3$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_CATALONIA$"
 sagrada_familia_populated_tt: "[concept_occupancy] pracovní síly budovy $building_sagrada_familia_cathedral_3$ je vyšší nebo rovna #variable 50 %#!"
 rejected_sagrada_familia_project_tt: "[ROOT.GetCountry.GetNameNoFormatting] odmítá návrh na výstavbu budovy $building_sagrada_familia_cathedral_3$"
 does_not_have_state_catalonia_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_CATALONIA$"
 sagrada_familia.1.t: "Modernistická architektura"
 sagrada_familia.1.d: "Sdružení ctitelů svatého Josefa najalo architekta, který vytvořil návrh budovy $building_sagrada_familia_cathedral_3$ v modernistickém stylu jedinečném pro $STATE_CATALONIA$. Jakmile bude schválen, výstavba může okamžitě začít."
 sagrada_familia.1.f: "„V přírodě nejsou žádné rovné čáry ani ostré rohy.\nProto ani budovy nesmějí mít rovné čáry ani ostré rohy.“\n\n— Antoni Gaudí"
 sagrada_familia.1.a: "Svěřit tomuto architektovi dohled nad výstavbou."
 sagrada_familia.1.b: "Tento podnik je pobuřující."
 sagrada_familia_1_construct_tt: "$building_sagrada_familia_cathedral_1$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_CATALONIA')]"
 sagrada_familia_2_construct_tt: "$building_sagrada_familia_cathedral_2$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_CATALONIA')]"
 sagrada_familia_3_construct_tt: "Další fasádu budovy $building_sagrada_familia_cathedral_3$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_CATALONIA')]. Vyžaduje technologii $pneumatic_tools$."
 dismissed_sagrada_familia_je_tt: "#r #bold $je_sagrada_familia$#! [concept_journal_entry] bude zrušen#!"
 sagrada_familia_accepted: "Schválená výstavba katedrály"
 sagrada_familia_rejected: "Odmítnutá výstavba katedrály"
 sagrada_familia.2.t: "Fasáda Zrození"
 sagrada_familia.2.d: "Ve vývoji budovy $building_sagrada_familia_cathedral_3$ bylo dosaženo stabilního pokroku. [SCOPE.gsInterestGroup('relevant_ig').GetName], ohromeni architektovou oddaností projektu, nyní podporují další fázi výstavby."
 sagrada_familia.2.f: "Z dálky východně orientovaná Fasáda Zrození budovy $building_sagrada_familia_cathedral_1$ září, když ji zalijí zlaté paprsky úsvitu. Zaoblené botanické tvary zobrazují narození Ježíše Krista. I v tomto částečně dokončeném stavu je chrám divem."
 sagrada_familia.2.a: "[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] mají bystrý zrak."
 sagrada_familia_patron: "Modernistický patron"
 sagrada_familia.3.t: "Nedokončené mistrovské dílo"
 sagrada_familia.3.d: "Nedokončená, avšak neopustěná výstavba budovy $building_sagrada_familia_cathedral_3$ pokračuje, i když architekt, který původně navrhl velkolepé plány chrámu, zemřel. Jeho nástupce se jí ujme, aby výstavba neutrpěla obdobím zanedbání."
 sagrada_familia.3.f: "„Není důvod litovat, že kostel nemohu dokončit. Zestárnu, ale po mně přijdou jiní. Vždy musí být zachován duch díla, avšak jeho život musí záviset na generacích, jimž je předáváno a s nimiž žije a vtěluje se.“\n\n— Antoni Gaudí"
 sagrada_familia.3.a: "Jeho odkaz bude žít dál."
 sagrada_familia_construction: "Modernistické magnum opus"
 sagrada_familia.4.t: "Konec, prozatím"
 sagrada_familia.4.d: "Další fasáda budovy $building_sagrada_familia_cathedral_3$ byla dokončena, což prozatím znamená konec výstavby. Mimořádná vize modernistického architekta je zde ve státě [SCOPE.sState('relevant_state').GetName] kulturním milníkem."
 sagrada_familia.4.f: "Po tolika letech výstavby byly ambiciózní architektonické návrhy další fasády uskutečněny. Zahraniční cestovatelé, kteří přicházejí k budově $building_sagrada_familia_cathedral_3$, žasnou nad jedinečným stylem této stavby. Před nejnovějším přírůstkem chrámu stojí dva návštěvníci.\n\n„Dechberoucí,“ poznamená jeden cestovatel a nedokáže skrýt úžas v hlase.\n\nJeho společník se však dívá skepticky. „Možná je tento modernistický styl získanou chutí.“"
 sagrada_familia.4.a: "Tak výjimečné umění!"
 sagrada_familia.4.b: "Skutečný architektonický div."
 sagrada_familia_reward_loc: "Modernistické mistrovské dílo"
 sagrada_familia_reward_int: "Architektonické uznání"
 je_pena_palace: "Nádherný Eden"
 je_pena_palace_reason: "Manžel [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] nedávno získal starý klášter Pena na vrcholu pohoří Sintra. S velkými uměleckými ambicemi usiluje o přeměnu kláštera v letní sídlo královské rodiny."
 pena_palace_possible_tt: "[JournalEntry.GetCountry.GetName] má $building_pena_convent$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_ESTREMADURA$"
 pena_palace_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] vybudovala $building_pena_palace$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_ESTREMADURA$"
 pena_palace_populated_tt: "[concept_occupancy] pracovní síly budovy $building_pena_palace$ je vyšší nebo rovna #variable 50 %#!"
 rejected_pena_palace_project_tt: "[ROOT.GetCountry.GetNameNoFormatting] odmítá návrh na výstavbu a renovaci budovy $building_pena_palace$"
 does_not_have_state_estremadura_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_ESTREMADURA$"
 pena_palace.1.t: "Nádherný Eden"
 pena_palace.1.d: "Manžel [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] vypracoval plány na zadání obnovy a renovace kláštera Pena."
 pena_palace.1.f: "„Hle! Cintrin nádherný Eden vstupuje\nv pestré bludiště hor a údolí.\nAch běda! Čí ruka může vést štětec či pero,\naby zachytila aspoň polovinu toho, po čem oko prahne\nv pohledech skvělejších pro smrtelné poznání\nnež ty, o nichž takové věci pěvec vypráví,\nten, jenž ohromenému světu odemkl brány Elyseia?“\n\n— Lord Byron" # from Childe Harold's Pilgrimage, Canto I about Sintra Mountains
 pena_palace.1.a: "Palác bude uměleckým úspěchem země [ROOT.GetCountry.GetNameNoFormatting]!"
 pena_palace.1.b: "Jak lehkovážné."
 pena_palace_construct_tt: "$building_pena_palace$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_ESTREMADURA')]"
 dismissed_pena_palace_je_tt: "#r #bold $je_pena_palace$#! [concept_journal_entry] bude zrušen#!"
 pena_palace_accepted: "Schválená výstavba paláce"
 pena_palace_rejected: "Odmítnutá výstavba paláce"
 pena_palace.2.t: "Klenot Sintry"
 pena_palace.2.d: "Renovace budovy $building_pena_palace$ jsou nyní dokončeny. Ruiny bývalého kláštera byly důkladně proměněny."
 pena_palace.2.f: "Za jasného dne, když se mlha v pohoří Sintra rozplyne, lze stavbu na vrcholcích kopců spatřit z města [SCOPE.sState('relevant_state').GetCityHubName]. Zrozené z královy představivosti a přetvořené romantickým architektem, jasně červené a žluté fasády budovy $building_pena_palace$ září nádherou - skutečný [ROOT.GetCountry.GetAdjectiveNoFormatting] poklad."
 pena_palace.2.a: "Krása paláce je nesporná."
 pena_palace.2.b: "Svět bude žasnout nad naším uměleckým úspěchem."
 pena_palace_reward_loc: "Palácový ráj"
 pena_palace_reward_int: "Král-umělec"
 je_gran_teatro: "Gran Teatro"
 je_gran_teatro_reason: "V srdci státu [SCOPE.sState('relevant_state').GetName] se nachází Plaza de Isabella, pečlivě udržované náměstí, kde lze nalézt některé z nejmódnějších kaváren a restaurací města [SCOPE.sState('relevant_state').GetCityHubName]. Od deváté hodiny večerní až do časných ranních hodin se zde shromažďují lidé všech vrstev a vdechují náměstí život. Teatro Tacón patří mezi mnohé vytříbené podniky naproti náměstí. Navzdory velkolepému interiéru však jeho vnější vzhled ponechává mnoho co přát.\n\n[GetCulture('galician').GetName] členové [SCOPE.gsInterestGroup('relevant_ig').GetName] vypracovali návrh na rozšíření a proměnu místa, kde stojí Teatro Tacón, v $building_gran_teatro_de_la_habana$ s nadějí, že bude v nadcházejících desetiletích velmi oslavováno."
 gran_teatro_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] vybudovala $building_gran_teatro_de_la_habana$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_WESTERN_CUBA$"
 gran_teatro_populated_tt: "[concept_occupancy] pracovní síly budovy $building_gran_teatro_de_la_habana$ je vyšší nebo rovna #variable 50 %#!"
 rejected_gran_teatro_project_tt: "Návrh na výstavbu budovy $building_gran_teatro_de_la_habana$ byl odmítnut"
 does_not_have_state_western_cuba_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_WESTERN_CUBA$"
 gran_teatro.1.t: "Rozšíření umění ve městě $HUB_NAME_STATE_WESTERN_CUBA_city$"
 gran_teatro.1.d: "[GetCulture('galician').GetName] členové [SCOPE.gsInterestGroup('relevant_ig').GetName] předložili návrh na výstavbu budovy $building_gran_teatro_de_la_habana$ v srdci státu [SCOPE.sState('relevant_state').GetName] na místě Teatro Tacón. Skupina shromáždila značnou částku peněz, která má být použita na tento renovační podnik."
 gran_teatro.1.f: "„Proslulé Taconovo divadlo stojí naproti Paseo de Isabella a je postaveno na rohu ulice San Rafael. Je to prostorná stavba, ale zvenčí mimořádně prostá a nepůsobivá. ... Fresky jsou v dobrém stylu a výzdoba, aniž by byla přehnaná, je ve výborném a harmonickém vkusu. Velký, nádherný skleněný lustr, osvětlený plynem, a četné menší lustry vycházející z lóží poskytují tomuto elegantnímu domu, jednomu z největších divadel na světě, zářivé světlo.“\n\n— Maturin Murray Ballou" # from Due South; or, Cuba past and present, 1885
 gran_teatro.1.a: "Velkolepost budovy $building_gran_teatro_de_la_habana$ bude nesporná."
 gran_teatro.1.b: "[SCOPE.sState('relevant_state').GetCityHubName] takový podnik nepotřebuje."
 gran_teatro_construct_tt: "$building_gran_teatro_de_la_habana$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_WESTERN_CUBA')]"
 dismissed_gran_teatro_je_tt: "#r #bold $je_gran_teatro$#! [concept_journal_entry] bude zrušen#!"
 gran_teatro_accepted: "Schválená výstavba divadla"
 gran_teatro_rejected: "Odmítnutá výstavba divadla"
 gran_teatro.2.t: "Palacio del Centro Gallego"
 gran_teatro.2.d: "Výstavba a renovace navržená [GetCulture('galician').GetName] členy [SCOPE.gsInterestGroup('relevant_ig').GetName] je nyní dokončena. Umění vzkvétá nejen v nově postavené budově $building_gran_teatro_de_la_habana$, ale také v ulicích města [SCOPE.sState('relevant_state').GetCityHubName]."
 gran_teatro.2.f: "„Večerní hudba pod širým nebem je vždy přitažlivá, ale nikde není její vliv cítit silněji než pod měkkou září tropických nocí. Nikde si neumíme představit hudební vystoupení poslouchané s větší chutí a oceněním než na Plaza de Armas nebo v Parque de Isabella v Havaně. Druhé z těchto míst je při koncertech útočištěm všech vrstev. ... I prosté vrstvy jsou ve velkém počtu vidět, jak se tiše procházejí po vnějších částech náměstí, poslouchají vynikající vystoupení kapely a tiše si užívají hudbu, ‚zkrocené a stále vedené touto kouzelnicí.‘“\n\n— Maturin Murray Ballou" #from Due South; or, Cuba past and present, 1885
 gran_teatro.2.a: "$CUB_ADJ_ee$ umění bude v regionu vzkvétat."
 gran_teatro.2.b: "To jistě vynese $CUB_ADJ_ee$ umění na světovou scénu."
 gran_teatro_reward_loc: "Vzkvétající umění"
 gran_teatro_reward_int: "Přítomnost na jevišti"
 je_atocha_railway: "Železniční stanice Atocha"
 je_atocha_railway_reason: "[SCOPE.gsInterestGroup('relevant_ig').GetName] se po mnoho let snaží vybudovat $building_estacion_de_madrid_atocha$ ve státě [SCOPE.sState('relevant_state').GetName]. Jejich úsilí mařily protichůdné požadavky a zájmy - od zásahů vlády až po smrt najatého architekta, který měl dohlížet na výstavbu. Žádný návrh dosud nesplňoval všechna kritéria, až dosud.\n\nNaděje [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] na výstavbu stanice neochably. Věří, že $building_estacion_de_madrid_atocha$ bude pro [ROOT.GetCountry.GetNameNoFormatting] klíčovou institucí nejen ve státě [SCOPE.sState('relevant_state').GetNameNoFormatting], ale i napříč celým kontinentem."
 atocha_railway_possible_tt: "[ROOT.GetCountry.GetNameNoFormatting] má $building_railway$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_NEW_CASTILE$"
 atocha_railway_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] vybudovala $building_estacion_de_madrid_atocha$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_NEW_CASTILE$"
 atocha_railway_populated_tt: "[concept_occupancy] pracovní síly budovy $building_estacion_de_madrid_atocha$ je vyšší nebo rovna #variable 50 %#!"
 rejected_atocha_railway_project_tt: "[ROOT.GetCountry.GetNameNoFormatting] odmítá návrh na výstavbu budovy $building_estacion_de_madrid_atocha$."
 does_not_have_state_new_castile_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_NEW_CASTILE$"
 atocha_railway.1.t: "Přepracovaný návrh"
 atocha_railway.1.d: "Po řadě odmítnutých plánů se zdá, že přepracovaný návrh nově najatého architekta splňuje kritéria vlády i [SCOPE.gsInterestGroup('relevant_ig').GetName] pro zahájení výstavby budovy $building_estacion_de_madrid_atocha$."
 atocha_railway.1.f: "Mladý inženýr, velký znalec železné architektury, která je nyní oblíbená v $FRA$, předkládá výboru k posouzení nejnovější návrhy budovy $building_estacion_de_madrid_atocha$. Členové [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] dychtivě přihlížejí a po mnoha letech debat jsou přepracovanými plány velmi potěšeni.\n\nInženýr všechny ujišťuje o životaschopnosti projektu: „Jakmile bude projekt schválen, práce mohou začít okamžitě!“"
 atocha_railway.1.a: "To je jistě v souladu se zájmy všech."
 atocha_railway.1.b: "[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] špatně odhadli poptávku po takové stavbě."
 atocha_railway_construct_tt: "$building_estacion_de_madrid_atocha$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_NEW_CASTILE')]"
 dismissed_atocha_railway_je_tt: "#r [concept_journal_entry] #bold $je_atocha_railway$#! bude zrušen#!"
 atocha_railway_accepted: "Schválená výstavba železnice"
 atocha_railway_rejected: "Odmítnutá výstavba železnice"
 atocha_railway.2.t: "$building_estacion_de_madrid_atocha$ otevřena"
 atocha_railway.2.d: "V srdci města [SCOPE.sState('relevant_state').GetCityHubName] je $building_estacion_de_madrid_atocha$ nyní v provozu. Ambice [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] byly naplněny."
 atocha_railway.2.f: "Nově vybudovaná železnice je malebná, se svými červenými cihlami z jemného lisovaného písku a terakotovými ozdobami. Hlavní loď nádražní haly budovy $building_estacion_de_madrid_atocha$ vítá příliv cestujících při příjezdu do státu [SCOPE.sState('relevant_state').GetNameNoFormatting] a zve je do rušných ulic města [SCOPE.sState('relevant_state').GetCityHubName]."
 atocha_railway.2.a: "Přínosy železniční stanice jsou nezměrné."
 atocha_railway.2.b: "$building_estacion_de_madrid_atocha$ je víc než železnice; je to umělecké dílo!"
 atocha_railway_reward_loc: "Robustní železnice"
 atocha_railway_reward_int: "Precizně zpracované umění"
 je_manila_cathedral: "Obnova manilské katedrály"
 je_manila_cathedral_reason: "Škody způsobené velmi silným zemětřesením zanechaly $building_manila_cathedral_original$ v troskách. Zatímco se [SCOPE.sState('relevant_state').GetNameNoFormatting] zotavuje ze zkázy způsobené katastrofou, [GetPopType('clergymen').GetNameNoFormatting] z [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] shromáždili prostředky a chtějí pokročit s obnovou katedrály."
 manila_cathedral_possible_tt: "[ROOT.GetCountry.GetNameNoFormatting] má $building_manila_cathedral_ruins$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_LUZON$"
 manila_cathedral_complete_tt: "[ROOT.GetCountry.GetNameNoFormatting] obnovila $building_manila_cathedral_monument$ v [Concept('concept_state_region','$concept_state_region$')] $STATE_LUZON$"
 manila_cathedral_populated_tt: "[concept_occupancy] pracovní síly budovy $building_manila_cathedral_monument$ je vyšší nebo rovna #variable 50 %#!"
 rejected_manila_cathedral_project_tt: "[ROOT.GetCountry.GetNameNoFormatting] odmítá návrh na obnovu budovy $building_manila_cathedral_monument$"
 does_not_have_state_luzon_tt: "[ROOT.GetCountry.GetNameNoFormatting] nemá $STATE_LUZON$"
 manila_cathedral.1.t: "Zemětřesení ve státě [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetNameNoFormatting, 'STATE_LUZON')]"
 manila_cathedral.1.d: "$building_manila_cathedral_original$ je nyní v troskách poté, co stát [SCOPE.sState('relevant_state').GetName] zasáhlo silné zemětřesení. [GetPopType('clergymen').GetName] z [SCOPE.gsInterestGroup('relevant_ig').GetName] předložili návrh na obnovu katedrály. Skupina shromáždila značnou částku peněz, která má být použita na její výstavbu."
 manila_cathedral.1.f: "„Nikde nejsou ničivé spouště a změny způsobené zemětřeseními pozoruhodnější než na Filipínách. Převracela hory, zaplňovala údolí, zpustošila rozsáhlé pláně; otevřela moři průchody do vnitrozemí a z jezer do moře. Existuje mnoho tradičních příběhů o těchto územních převratech, ale záznamy o nedávných katastrofách jsou spolehlivé. ... Opakovaná zemětřesení přinesla Luzonu řadu pohrom.“\n\n— John Bowring" #A Visit to the Philippine Islands, 1859
 manila_cathedral.1.a: "Musíme katedrálu rychle obnovit."
 manila_cathedral.1.b: "[SCOPE.sState('relevant_state').GetNameNoFormatting] má mnohem naléhavější problémy."
 manila_cathedral_construct_tt: "$building_manila_cathedral_monument$ lze postavit v panelu státu [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_LUZON')]"
 dismissed_manila_cathedral_je_tt: "#r #bold $je_manila_cathedral$#! [concept_journal_entry] bude zrušen#!"
 pedro_pelaez_dies_tt: "[SCOPE.sCharacter('relevant_character').GetLastName] zemřel při zřícení manilské katedrály."
 pelaez_in_memoriam: "In memoriam"
 manila_cathedral_accepted: "Schválené opravy katedrály"
 manila_cathedral_rejected: "Odmítnuté opravy katedrály"
 manila_cathedral.2.t: "Šestá $building_manila_cathedral_monument$"
 manila_cathedral.2.d: "Navzdory poškození a škodám na své předchůdkyni je $building_manila_cathedral_monument$ opět katedrálou manilské arcidiecéze."
 manila_cathedral.2.f: "„Ačkoli se jméno Manila dává hlavnímu městu Filipínských ostrovů, původně se toto označení vztahovalo pouze na pevnost a posádku obsazenou úřady. ... Palác vyplňuje jednu stranu veřejného náměstí v pevnosti, katedrála druhou v téže lokalitě, připomínající londýnská náměstí, avšak s výhodou středu ozdobeného nádhernou vegetací tropů, jejíž listy představují všechny odstíny barev od nejjasnější žluté po nejhlubší zeleň a jejíž květy jsou pozoruhodné svou nádherou a krásou.“\n\n— John Bowring" #A Visit to the Philippine Islands, 1859
 manila_cathedral.2.a: "Katedrála je dojemným projevem zbožnosti."
 manila_cathedral.2.b: "Katedrála bude trvalým symbolem Manily."
 manila_cathedral_reward_loc: "Projev zbožnosti"
 manila_cathedral_reward_int: "Církevní autorita"
