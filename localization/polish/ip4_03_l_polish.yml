 notification_manila_cathedral_in_ruins_desc: "$building_manila_cathedral_monument$ je nyní v troskách poté, co stát [SCOPE.sState('relevant_state').GetName] zasáhlo zemětřesení. Můžeme ji znovu obnovit."
 notification_manila_cathedral_in_ruins_tooltip: "#header $notification_manila_cathedral_in_ruins_name$#!\n$TOOLTIP_DELIMITER$\n$notification_manila_cathedral_in_ruins_desc$"
