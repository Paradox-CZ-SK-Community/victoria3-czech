 notification_manila_cathedral_rebuilt_desc: "$building_manila_cathedral_monument$ byla obnovena ve státě [SCOPE.sState('relevant_state').GetName]. Její trvalý odkaz prospěje celé zemi [ROOT.GetCountry.GetNameNoFormatting]."
 notification_manila_cathedral_rebuilt_tooltip: "#header $notification_manila_cathedral_rebuilt_name$#!\n$TOOLTIP_DELIMITER$\n$notification_manila_cathedral_rebuilt_desc$"
 seventh_manila_cathedral_loc: "Sedmá"
 eighth_manila_cathedral_loc: "Osmá"
