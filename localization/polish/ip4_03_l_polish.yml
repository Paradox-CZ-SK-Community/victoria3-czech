l_polish:
 je_philippines_development: "Pokroky v souostroví"
 je_philippines_development_reason: "Ve vzdáleném souostroví země [ROOT.GetCountry.GetNameNoFlag] položil nárůst mezinárodního obchodu základy k tomu, aby rostoucí střední třída získala větší vliv navzdory pokračujícím politickým otřesům.\n\nRozvíjej domácí zemědělský sektor, zvyš [concept_sol] a buduj přístavy, aby byla zajištěna plodná budoucnost země [ROOT.GetCountry.GetNameNoFormatting]."
 philippines10a_tt: "„$STATE_VISAYAS$ bude jistě prosperovat po celé příští generace.“"
 philippines10b_tt: "„$STATE_MINDANAO$ se bude nadále rozvíjet v prosperující oblast.“\n$TAB$#b #r Možnost dostupná pouze tehdy, pokud [JournalEntry.GetCountry.GetName] vlastní přístav Davao#! #!"
 modifier_archipelagic_anger: "Přerušené obchodní vazby"
 modifier_developmental_dearth: "Nedostatek rozvoje"
 je_filipino_ethnogenesis: "Souostrovní etnogeneze"
 je_filipino_ethnogenesis_reason: "[ROOT.GetCountry.GetAdjective] národ je domovem mnoha národů, které - ačkoli sdílejí společné dějiny - zůstávají odlišné v otázkách kultury a jazyka. Pokud máme vybudovat silný národ, musejí být takové drobné rozdíly odsunuty stranou."
 je_filipino_ethnogenesis_colonization_button: "Kolonizovat [GetStateRegion('STATE_MINDANAO').GetName]"
 je_filipino_ethnogenesis_colonization_button_desc: "Od bojovných sultanátů zálivu kultury [GetCulture('moro').GetName] po rozptýlené kmeny kultury [GetCulture('lumad').GetName] na vysočině - národy [GetStateRegion('STATE_MINDANAO').GetName] dlouho odolávaly našim pokusům nastolit pořádek v této necivilizované zemi.\n\nNastal čas přivést je do filipínského národa, ať chtějí, nebo ne."
 modifier_integrating_the_highlands: "Integrace vysočiny"
 modifier_settling_the_highlands_cost: "Mindanaoské infrastrukturní projekty"
 modifier_phi_spanish_vision: "Perla španělského Orientu"
 modifier_phi_indepenent_vision: "Svoboda, spravedlnost a rovnost"
 modifier_popular_genesis: "Lidová geneze"
 je_philippines_main: "Perla del Mar de Oriente"
 je_philippines_main_reason: "Vzestupná mobilita rostoucí střední třídy přispěla k sílícímu národnímu vědomí. Napětí v zemi [ROOT.GetCountry.GetName] roste. [GetCulture('spanish').GetName] [GetPopType('clergymen').GetName] ovládají světský i náboženský život, zatímco [GetCulture('filipino_mestizo').GetName] [GetPopType('clergymen').GetNameNoFormatting] vedou vzpoury proti jejich autoritě. [GetCulture('filipino_mestizo').GetNameNoFormatting] elity [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] rovněž manévrují za větší zastoupení ve vládě.\n\n[SelectLocalization(ROOT.GetCountry.GetTopOverlord.IsValid, ROOT.GetCountry.GetTopOverlord.GetAdjective, 'SPA_ADJ')] vláda má nakonec vysoká očekávání, že [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] udrží železnou vládu nad svým územím v Pacifiku. Toto tření hrozí svrhnout naši stabilitu a ohrožuje budoucnost země [ROOT.GetCountry.GetName]."
 philippines2a_tt: "„Budoucnost země [JournalEntry.GetCountry.GetName] je jasná.“"
 philippines3a_tt: "„To skutečně znamená novou kapitolu pro naši zemi.“"
 spain_is_overlord_tt: "[concept_overlord] je #b $SPA$#!"
