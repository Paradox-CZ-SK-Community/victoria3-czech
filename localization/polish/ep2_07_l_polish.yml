l_polish:
 je_sakoku: "Uzavřená země"
 je_sakoku_reason: "Od éry Kan’ei a nejranějších dnů moci Tokugawů je $JAP$ zemí uzavřenou cizincům. Jediné, co kdy bylo povoleno, byl tenký pramínek obchodu s několika vybranými národy v několika určených přístavech. Ačkoli tento systém přetrval více než dvě století, svět se začíná měnit způsoby, které stále více ztěžují udržení země pod zámkem, i když si zájmy uvnitř $JAP$ přejí, aby věci zůstaly navždy stejné. Pokud nelze zastavit cizí pokusy otevřít naše země, pak musíme dovážet jejich myšlenky stejně jako jejich zboží."
 je_sakoku_meiji_restoration: "#b Císař#! byl navrácen k moci a #b šógun#! svržen"
 je_sakoku_stop_being_closed_button: "Zrušit [GetLawType('law_sakoku').GetName]"
 je_sakoku_stop_being_closed_button_desc: "Vyhrocující se situace a rostoucí tlak ze zahraničí učinily konec [GetLawType('law_sakoku').GetName] naprostou naléhavostí. Za těchto okolností možná dokážeme starý systém izolace násilně ukončit, ale rozzuří to všechny, kdo stále podporují staré zákony."
 notification_morrison_incident_has_incidented_name: "Obchodník ostřelován $JAP$"
 notification_morrison_incident_has_incidented_desc: "Dobrodružný obchodník z našich zemí se pokusil porušit $JAP_ADJ$ omezení vůči cizím obchodním lodím a byl ostřelován pobřežní baterií, což zhoršilo vztahy mezi našimi národy."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Mírný přístup k cizincům"
 caved_to_foreign_pressure_opposition: "Ústup cizímu tlaku"
 caved_to_foreign_pressure_government: "Ústup cizímu tlaku"
 overdue_break_with_tradition: "Opožděný rozchod s tradicí"
 forced_transition_from_tradition: "Vynucený odklon od tradice"
 the_picked_lock_modifier: "Vypáčený zámek"
 sakoku_entrenched_modifier: "Upevněné sakoku"
 meiji_failure_modifier: "Neúspěšné reformy restaurace"
 ep2_sakoku.1.t: "Znepokojivá [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting] porážka"
 ep2_sakoku.1.d: "Náš rozlehlý a ctihodný soused, [SCOPE.sCountry('opium_wars_loser').GetName], právě prohrál válku o opium a obchod proti nějaké dotěrné zámořské zemi. Pokud [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] nedokáže ovládat vlastní trh a držet cizince venku, jak můžeme udržet [GetLawType('law_sakoku').GetName] v našich vlastních zemích?"
 ep2_sakoku.1.f: "„Přes všechnu zemi, všechno bohatství, všechnu moc, kterou měli – nic z toho se nemohlo měřit se silou, která proti nim byla postavena. Cizinci už teď žadoní, aby byli vpuštěni do naší země. Budeme následovat příklad [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] a stejně jako [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] se je pokusíme zadržet, dokud jejich děla nezačnou chrlit oheň na naše města? Nebo budeme hledat vlastní cestu? Musíme se rozhodnout nyní, dřív než tyto síly železa a děl vplují do našich vod a rozhodnou za nás.“"
 ep2_sakoku.1.a: "Nemyslitelné je nyní třeba zvážit."
 ep2_sakoku.1.b: "Nemyslitelné je nyní třeba přijmout."
 end_sakoku_button_now_available: "Možnost předčasně násilně ukončit [GetLawType('law_sakoku').GetName] bude nyní viditelná v $je_sakoku$."
 ep2_sakoku.2.t: "Vypáčení zámku"
 ep2_sakoku.2.d: "S rostoucím neklidem doma i v zahraničí se [GetLawType('law_bakufu').GetName] rozhodlo prosadit okamžitý konec [GetLawType('law_sakoku').GetName]."
 ep2_sakoku.2.f: "Dav obchodníků zaplavil celnici. Tváří v tvář jim stál osamělý, vyčerpaný úředník. „Ano, samozřejmě to znamená, že země už nebude uzavřená.“\n\nTucet otázek z davu se na správce valil jako hukot. „Co tedy bude místo toho? Já... nejsem si jistý. Možná tu bude– ne, počkejte, jen proto, že– toto rozhodnutí není na mně ani na vás, nemůžete prostě–“\n\nKaždá odpověď, kterou dal, vyvolala dalších dvacet otázek. #italic Práce byla mnohem snazší, když byla země ponechána o samotě#!, pomyslel si."
 ep2_sakoku.2.a: "Budoucnost [ROOT.GetCountry.GetNameNoFormatting] spočívá v [GetLawType('law_mercantilism').GetName]."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName] osvobodí [ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName] nám umožní obchodovat s cizími zájmy opatrně."
 ep2_sakoku.3.t: "Incident [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]"
 ep2_sakoku.3.d: "Obchodník ze země [SCOPE.sCountry('morrison_incident_country').GetName] se pokusil ignorovat přísné protokoly [GetLawType('law_sakoku').GetName] a obchodovat v neschváleném přístavu. Jeho plavidlo, #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, bylo zahnáno palbou pobřežních baterií. Vztahy se zemí [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting], jaké vůbec byly, se zhoršily."
 ep2_sakoku.3.f: "Velitel se ušklíbl, když dělová koule konečně zasáhla loď. Zákon byl naprosto jasný; loď neměla právo plout těmito vodami. Nezajímalo ho, co si myslí kapitán na palubě onoho plavidla. Chtěl jen, aby se ta loď otočila a odplula."
 ep2_sakoku.3.a: "Místní posádka udělala to, co měla."
 ep2_sakoku.3.b: "Měli bychom se zemi [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] omluvit a obchodníkovi vyplatit náhradu, abychom věci urovnali."
 ep2_sakoku.3.c: "Toto je příležitost, kterou potřebujeme k přehodnocení nezbytnosti [GetLawType('law_sakoku').GetName]."
 ep2_sakoku.4.t: "Vypáčený zámek"
 ep2_sakoku.4.d: "Při zvládání tlaků zevnitř i zvenčí bylo [GetLawType('law_sakoku').GetName] zrušeno. [ROOT.GetCountry.GetNameNoFormatting] si odemkla novou budoucnost."
 ep2_sakoku.4.f: "Úředník hleděl přes záliv. U doků stály nové lodě. Neznámé lodě, mávající vlajkami, které nikdy předtím neviděl. Co nabízely [ROOT.GetCountry.GetNameNoFormatting]? Co si chtěly od [ROOT.GetCountry.GetNameNoFormatting] vzít?\n\nJeho pohled setrval na zakotvených lodích dlouho, velmi dlouho, než se konečně odvrátil. Jeho oči mu dnes nemohly dát odpověď, po které toužil. Jen čas mu mohl říct, co tato nová éra dá jeho vlasti."
 ep2_sakoku.4.a: "Dnes se Japonsko otevírá!"
 ep2_sakoku.5.t: "Zrezivělé zavření"
 ep2_sakoku.5.d: "Pokračující dodržování [GetLawType('law_sakoku').GetName] v [ROOT.GetCountry.GetAltAdjectiveNoFormatting('L')], i když zemí otřásají zásadní politické změny, nevěstí nic dobrého pro jakoukoli naději na prolomení vlastní izolace země. Zdá se, že [GetLawType('law_sakoku').GetNameNoFormatting] tu zůstane."
 ep2_sakoku.5.f: "Úředník hleděl přes záliv. U doků stály staré lodě, tytéž, které by viděl jeho otec, jeho děd či jeho předci po několik generací nazpět. Uvidí tytéž lodě jeho děti? Jeho vnuci? Změní se někdy tento výhled?\n\nJeho pohled setrval na zakotvených lodích dlouho, velmi dlouho, než se konečně odvrátil. Jeho oči mu dnes nemohly dát odpověď, po které toužil. Jen čas mohl ukázat, zda jeho vlast skutečně zůstane navždy stejná."
 ep2_sakoku.5.a: "Zámek zůstává zamčený."
 meiji.14.t: "Prázdná restaurace"
 meiji.14.d: "Navzdory opojným slibům reforem prosazovaným novou vládou éry [ROOT.GetCountry.GetCustom('JAP_era_name')] neprošla země [ROOT.GetCountry.GetNameNoFlag] žádnými významnými změnami. Kritici si stěžují, že dnešní stát se jen málo liší od státu před restaurací."
 meiji.14.f: "Na tovární podlaze funěl a supěl obrovský stroj, roztáčel mohutný setrvačník a poháněl ohromné soustruhy a vrtačky. Tyto stroje vyřezávaly nové hlavně, nové zámky, nové spouště pro rozsáhlý nový arzenál zbraní. Nějaký národ brzy využije tuto páru a železo, aby vtiskl světu svou stopu – a tím národem nebude [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Dnes slunce spočívá na snu."
 je_end_edo_system_button_name: "Ukončit edský stavovský systém"
 je_end_edo_system_button_desc: "V této době reforem a obnovy nás starý kastovní systém brzdí. Každý občan může být cennou součástí státu, bez ohledu na své životní postavení."
