l_polish:
 je_sakoku: "Uzavřená země" # todo: NEW TRANSLATION
 je_sakoku_reason: "Od éry Kan'ei a prvních dnů moci Tokugawa byl $JAP$ zemí uzavřenou pro cizince. Jen malý proud obchodu s několika vybranými státy v několika určených přístavech byl vždy povolen. Ačkoli tento systém trvá více než dvě století, svět se začíná měnit způsoby, které ztěžují udržet zemi uzamčenou, i kdyby zájmy v rámci $JAP$ přály, aby vše zůstalo navždy stejné. Pokud nelze zabránit cizím pokusům otevřít naše země, musíme dovézt jejich myšlenky stejně jako jejich zboží." # todo: CHANGED
 je_sakoku_meiji_restoration: "The #b Císař#! has been restored to power and the #b Šógun#! overthrown" # todo: CHANGED
 je_sakoku_stop_being_closed_button: "Zrušit [GetLawType('law_sakoku').GetName]" # todo: NEW TRANSLATION
 je_sakoku_stop_being_closed_button_desc: "Vyostřující se situace a rostoucí tlaky ze zahraničí udělaly z konce [GetLawType('law_sakoku').GetName] skutečný nouzový stav. Za těchto okolností můžeme být schopni donutit k ukončení starého systému izolace silou, ale tím rozhněváme všechny, kdo stále podporují staré zákony." # todo: CHANGED
 notification_morrison_incident_has_incidented_name: "Obchodník ostřelován $JAP$" # todo: CHANGED
 notification_morrison_incident_has_incidented_desc: "Dobrodružný obchodník z našich zemí se pokusil porušit $JAP_ADJ$ omezení ohledně cizích obchodních lodí a byl ostřelen pobřežní baterií, což zhoršilo vztahy mezi našimi národy." # todo: CHANGED
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$" # todo: NEW TRANSLATION
 light_hand_with_foreigners: "Mírná ruka vůči cizincům" # todo: CHANGED
 caved_to_foreign_pressure_opposition: "Podlehli zahraničnímu tlaku" # todo: CHANGED
 caved_to_foreign_pressure_government: "Podlehli zahraničnímu tlaku" # todo: CHANGED
 overdue_break_with_tradition: "Zpožděné přerušení tradice" # todo: CHANGED
 forced_transition_from_tradition: "Nucený odchod od tradice" # todo: CHANGED
 the_picked_lock_modifier: "Odemčený zámek" # todo: CHANGED
 sakoku_entrenched_modifier: "Sakoku zakořeněné" # todo: CHANGED
 meiji_failure_modifier: "Neúspěšné restaurovací reformy" # todo: CHANGED
 ep2_sakoku.1.t: "Znepokojivá [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting] porážka" # todo: NEW TRANSLATION
 ep2_sakoku.1.d: "Náš rozlehlý a vážený soused, [SCOPE.sCountry('opium_wars_loser').GetName], právě prohrál válku o opium a obchod proti nějakému vzpurnému zámořskému národu. Pokud [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] není schopen ovládat svůj trh a udržet cizince venku, jak můžeme udržet [GetLawType('law_sakoku').GetName] v našich vlastních krajích?" # todo: CHANGED
 ep2_sakoku.1.f: "„Pro veškerou zemi, veškeré bohatství, veškerou moc, kterou měli — nic se nevyrovná síle, která proti nim stanula. Cizinci už prosí, aby jim bylo dovoleno vstoupit do naší země. Máme následovat příklad [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] a, stejně jako [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting], se je snažit zadržet, dokud jejich děla nezačnou lítat oheň na naše města? Nebo hledáme vlastní cestu? Musíme se rozhodnout nyní, dříve než ty síly železa a děl vplují do našich vod a rozhodnou za nás." # todo: CHANGED
 ep2_sakoku.1.a: "Nyní je třeba zvážit to nepředstavitelné." # todo: NEW TRANSLATION
 ep2_sakoku.1.b: "Nyní je třeba přijmout nepředstavitelné." # todo: CHANGED
 end_sakoku_button_now_available: "Možnost násilně ukončit [GetLawType('law_sakoku').GetName] dříve bude nyní viditelná v $je_sakoku$." # todo: CHANGED
 ep2_sakoku.2.t: "Odemknutí zámku" # todo: CHANGED
 ep2_sakoku.2.d: "Pod tlakem bouřícími se zevnitř i zvenčí se [GetLawType('law_bakufu').GetName] rozhodl usilovat o okamžité zrušení [GetLawType('law_sakoku').GetName]." # todo: CHANGED
 ep2_sakoku.2.f: "Dav obchodníků zaplavil celnici. Proti nim stál osamělý, vystresovaný úředník. „Ano, samozřejmě to znamená, že země už nebude uzavřena.“\n\nDesítky otázek se přes něj jako řev přehnaly. „Co to bude místo toho? Já... nejsem si jistý. Možná bude—ne, počkejte, jen proto, že—toto rozhodnutí není ani mé ani vaše, nemůžete jen—“\n\nKaždá jeho odpověď vyprovokovala ještě víc otázek. #italic Bylo mnohem snazší, když byla země ponechána sama sobě#!, pomyslel si." # todo: CHANGED
 ep2_sakoku.2.a: "Budoucnost [ROOT.GetCountry.GetNameNoFormatting] spočívá v [GetLawType('law_mercantilism').GetName]." # todo: NEW TRANSLATION
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName] osvobodí [ROOT.GetCountry.GetNameNoFormatting]." # todo: NEW TRANSLATION
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName] nám umožní obchodovat opatrně s cizími zájmy" # todo: CHANGED
 ep2_sakoku.3.t: "Incident [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]" # todo: NEW TRANSLATION
 ep2_sakoku.3.d: "Obchodník z [SCOPE.sCountry('morrison_incident_country').GetName] se pokusil ignorovat přísné protokoly [GetLawType('law_sakoku').GetName] a obchodovat v neschváleném přístavu. Jeho loď, #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, byla pobřežními bateriemi zahnána pryč pod palbou. Vztahy, jaké jsou, s [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] se zhoršily." # todo: CHANGED
 ep2_sakoku.3.f: "Velitel se ušklíbl, když dělostřelecký granát konečně zasáhl loď. Zákon byl velmi jasný; loď neměla právo plout v těchto vodách. Nezajímalo ho, co si o tom myslí kapitán na palubě. Chtěl jen, aby ta loď otočila a odplula pryč. " # todo: CHANGED
 ep2_sakoku.3.a: "Místní posádka udělala, co měla." # todo: NEW TRANSLATION
 ep2_sakoku.3.b: "Měli bychom se omluvit [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] a odškodnit obchodníka, aby se věci urovnaly." # todo: CHANGED
 ep2_sakoku.3.c: "To je příležitost, kterou potřebujeme k přehodnocení nezbytnosti [GetLawType('law_sakoku').GetName]" # todo: CHANGED
 ep2_sakoku.4.t: "Odemčený zámek" # todo: CHANGED
 ep2_sakoku.4.d: "Pod tlakem vnitřních i vnějších sil byl [GetLawType('law_sakoku').GetName] zrušen. [ROOT.GetCountry.GetNameNoFormatting] si otevřela novou budoucnost." # todo: CHANGED
 ep2_sakoku.4.f: "Úředník pohlédl přes zátoku. V přístavech stály nové lodě. Neznámé lodě mávající vlajkami, které nikdy dříve neviděl. Co nabízely [ROOT.GetCountry.GetNameNoFormatting]? Co se snažily vzít od [ROOT.GetCountry.GetNameNoFormatting]?\n\nJeho pohled zůstal upřený na kotvící lodě dlouho, velmi dlouho, než se konečně odvrátil. Jeho oči mu nedokázaly dát odpověď, kterou chtěl, ne dnes. Jen čas mu ukáže, co tato nová éra přinese jeho vlasti." # todo: CHANGED
 ep2_sakoku.4.a: "Dnes se Japonsko otevírá!" # todo: NEW TRANSLATION
 ep2_sakoku.5.t: "Zarezlé" # todo: NEW TRANSLATION
 ep2_sakoku.5.d: "Další dodržování [GetLawType('law_sakoku').GetName] v [ROOT.GetCountry.GetNameNoFormatting], i když je země otřesena zásadními politickými změnami, přináší špatné vyhlídky pro jakoukoli naději na vymanění se z vlastní izolace. Zdá se, že [GetLawType('law_sakoku').GetNameNoFormatting] tu zůstane." # todo: CHANGED
 ep2_sakoku.5.f: "Úředník hleděl přes zátoku. U mol stály staré lodě, stejné, které by viděl jeho otec, nebo dědeček, nebo jeho předci po několik generací zpět. Uvidí jeho děti ty samé lodě? Jeho vnuci? Změní se tento výhled někdy?\n\nJeho pohled zůstal upřený na kotvící lodě dlouho, velmi dlouho, než se konečně odvrátil. Jeho oči mu nedokázaly dát odpověď, kterou chtěl, ne dnes. Jen čas může ukázat, zda jeho vlast opravdu zůstane navždy stejná." # todo: CHANGED
 ep2_sakoku.5.a: "Zámek zůstává zavřený." # todo: NEW TRANSLATION
 meiji.14.t: "Prázdné obnovení" # todo: CHANGED
 meiji.14.d: "Navzdory vzrušujícím slibům reforem, které prosazuje nová vláda [ROOT.GetCountry.GetCustom('JAP_era_name')], [ROOT.GetCountry.GetNameNoFlag] neprošel žádnými zásadními změnami. Kritici si stěžují, že dnešní stát se málo liší od státu před Obnovením." # todo: CHANGED
 meiji.14.f: "Obrovský stroj funěl a rachotil na tovární podlaze, roztáčel obří setrvačník a poháněl mohutné soustruhy a vrtačky. Tyto stroje vyráběly nové hlavně, nové zámky, nové spouště pro obrovský nový arzenál zbraní. Brzy si nějaký národ osvojí tuto páru a železo, aby otiskl svou stopu do světa — a tímto národem nebude [ROOT.GetCountry.GetNameNoFormatting]." # todo: CHANGED
 meiji.14.a: "Dnes slunce spočívá na snu." # todo: NEW TRANSLATION
 je_end_edo_system_button_name: "Zrušit Edo systém stavů" # todo: CHANGED
 je_end_edo_system_button_desc: "V této době reforem a obnovy nás starý kastovní systém brzdí. Každý občan může být cennou součástí státu, bez ohledu na své postavení v životě." # todo: NEW TRANSLATION
 edo_system_not_support_enforcement_tt: "Nepodporuje přijetí [GetLawType('law_intermediate_edo_system').GetName] nebo [GetLawType('law_strict_edo_system').GetName]" # todo: CHANGED
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag] zcela ruší [Concept('concept_social_hierarchy','$edo_system$')]" # todo: CHANGED
 notification_edo_system_disappears_name: "Rozpad edského systému" # todo: CHANGED
 notification_edo_system_disappears_desc: "V důsledku nedávných kulturních a společenských změn už Systém Edo není uznávaným [concept_social_hierarchy] v [SCOPE.sCountry('relevant_country_scope').GetName]." # todo: CHANGED
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$" # todo: NEW TRANSLATION
 je_meiji_army_barracks_condition: "Každý [ROOT.GetCountry.GetAdjectiveNoFlag] [GetBuildingType('building_barrack').GetName]:\n$EFFECT_LIST_BULLET$ #bold Není#! aktivován #yellow $pm_no_organization$#! ani #yellow $pm_samurai_training$#!" # todo: CHANGED
