l_polish:
 je_conquest_of_tetouan: "Oko za oko"
 je_conquest_of_tetouan_reason: "Poslední kapku, po níž pohár přetekl, přidali anjerští kmenoví příslušníci místní v oblasti [SelectLocalization(SCOPE.sState('al_rif').IsValid, SCOPE.sState('al_rif').GetName, 'STATE_AL_RIF')]. Nedávno provedli krvavý nájezd na jednu z našich pohraničních posádek.\n\n[SCOPE.gsInterestGroup('armed_forces_scope').GetName] a místní poddaní této oblasti požadují odplatu proti těmto nájezdníkům za hranicí země [SelectLocalization(SCOPE.sCountry('morocco_scope').IsValid, SCOPE.sCountry('morocco_scope').GetName, 'MOR')].\n\nPokud nebudou neprodleně přijata vojenská opatření, naše národní postavení se výrazně zhorší."
 je_western_saharan_conquest: "Saharský soumrak"
 je_western_saharan_conquest_reason: "Po vítězství ve státě [SCOPE.sStateRegion('al_rif_scope').GetName] určili zkušení generálové [SCOPE.gsInterestGroup('armed_forces_scope').GetName] strategickou polohu za obzorem. Spolu se svými přírodními zdroji nám tato část Afriky jistě pomůže v našem poslání získat zpět prestiž, kterou jsme kdysi měli."
 je_guinean_conquest: "Rovníkový opěrný bod"
 je_guinean_conquest_reason: "Posílení pobřežní bezpečnosti západní Afriky a jejích izolovaných oblastí znovu roznítilo naši ambici obnovit naše imperiální postavení jako významné mocnosti na kontinentu.\n\nMusíme postupovat vpřed a rozšiřovat svůj vliv podél pobřeží oblasti [GetGeographicRegion('geographic_region_subsaharan_africa').GetName], protože naši imperiální soupeři také dychtí po zisku z bohatství tohoto regionu."
 je_moroccan_conquest: "Zahrada Maghrebu"
 je_moroccan_conquest_reason: "Vzhledem k úspěchu našich nedávných iniciativ v Africe se úředníci shodují, že naše úsilí by bylo skutečně naplněno získáním území za oblastí [SCOPE.sStateRegion('gibraltar_scope').GetName].\n\nTaké nás varují, že i po dobytí oficiálních území bude podrobení jejich obyvatel naší vládě představovat novou výzvu, vzhledem k početným kmenovým komunitám odděleným od centrální politiky. Přesto splněním tohoto úkolu proměníme tuto část Maghrebu v náš dvorek za Andalusií."
 je_guinean_conquest_complete_tt: "Alespoň #v 3#! [Concept('concept_state', '$concept_states$')] v oblasti [GetGeographicRegion('geographic_region_subsaharan_africa').GetName] vlastní [ROOT.GetCountry.GetName] nebo některá z jejích #v $colonial$#! [Concept('concept_subject', '$concept_subjects$')]"
 revoke_fernando_po: "Odvolat pronájem Fernanda Po"
 revoke_fernando_po_desc: "Jelikož jsme si ostrov oficiálně nárokovali v roce 1778, máme právo požadovat po Velké Británii, aby se vzdala své držby nad ním. Vyšleme posla a vyslechneme jejich odpověď."
 revoke_fernando_po_tt: "Odešle formální požadavek, aby #v $GBR$#! odvolala svůj pronájem ostrova #b Fernando Po#!. Pokud přijme, ostrov okamžitě převezmeme pod svou kontrolu. Pokud odmítne, naše [concept_relations] s ní se výrazně zhorší a utrpí mezinárodní diplomatický úder."
 failed_retaliation_modifier: "Neúspěšná odveta"
 successful_retaliation_modifier: "Úspěšná odveta"
 stalled_african_ambitions_modifier: "Pozastavené africké ambice"
 successful_saharan_ambitions_modifier: "Úspěšné saharské ambice"
 abandoned_equatorial_campaign_modifier: "Opuštěné rovníkové tažení"
 successful_equatorial_campaign_modifier: "Úspěšné rovníkové tažení"
 rejected_lease_revocation_of_fernando_po_modifier: "Odmítnuté oprávněné odvolání pronájmu"
 conquest_of_gibraltar_modifier: "Dobytí Gibraltaru"
 rejected_conquest_demand_modifier: "Odmítnutý požadavek na dobytí"
 successful_spanish_african_campaign_modifier: "Úspěšné africké tažení"
 successful_spanish_african_campaign_only_prestige_modifier: "Propagované africké tažení"
 successful_spanish_african_campaign_ig_approval_modifier: "Triumf nad koloniálním úspěchem"
 failed_african_campaign: "Neúspěšné africké tažení"
 compromised_failed_african_campaign: "Kompromis po neúspěšném africkém tažení"
 spanish_morocco_modifier: "Španělské Maroko"
 modifier_african_adventure: "Africké dobrodružství"
 spanish_africa.1.t: "Pohraniční obtěžování"
 spanish_africa.1.d: "Kmenoví příslušníci ze státu [SCOPE.sState('al_rif_state_scope').GetName] neúnavně podnikali nájezdy na naši stranu hranice a obtěžovali cestovatele i karavany. Jejich útok na vojenskou posádku byl poslední kapkou. [SCOPE.gsInterestGroup('armed_forces_scope').GetName] trvá na tom, že toto je dokonalý okamžik k dlouho očekávanému zásahu proti zemi [SCOPE.sCountry('rif_enemy_scope').GetName]."
 spanish_africa.1.f: "Náčelník Rashan ze sedla shlížel na tábor a hodnotil chmurné vyhlídky, zatímco soumrak téměř skrýval jejich přítomnost na této straně kopce.\n\n„Zvěsti jsou pravdivé, můj náčelníku, Uqban padl jako mučedník, možná i se svou klisnou. Zkusíme to zítra znovu?“\n\n„Ať odpočívá v al-Barzachu.“ Krátce se odmlčel, než otočil svého oře čelem ke zvědovi. „Vrátíme se za úsvitu, po modlitbě fadžr. Tohle není ta noc.“"
 spanish_africa.1.a: "Ukažme, kdo jsme."
 spanish_africa.1.a_tt: "[SCOPE.gsInterestGroup('armed_forces_scope').GetName] a jejich podporovatelé budou očekávat, že my nebo některá z našich závislých zemí budeme do 10 let vlastnit [SCOPE.sStateRegion('al_rif_scope').GetName]. Pokud se nám to nepodaří, sníží to naši [concept_legitimacy] a jejich [concept_approval] a podnítí [Concept('concept_radical','$concept_radicals$')] v jejich řadách. Naopak úspěch zlepší naše vztahy s nimi a zvýší naši [concept_prestige]."
 spanish_africa.1.b: "Nesmíme rozdmýchat oheň."
 spanish_africa.2.t: "Odplata"
 spanish_africa.2.d: "Podrobení [SCOPE.sStateRegion('al_rif_scope').GetName] a zajištění naší nadvlády nad severním pobřežím uklidnilo náš lid. [SCOPE.gsInterestGroup('armed_forces_scope').GetName] však hledá další slávu. Naléhá na nás, abychom přesunuli svou pozornost na jih, k divokým končinám státu [SCOPE.sState('west_sahara_state_scope').GetName]."
 spanish_africa.2.f: "Prodejci a dílny v Tetuánu, provozované místními rodinami po celé generace, pociťovali kolektivní nejistotu ohledně budoucnosti svých podniků. Ještě před oficiálním příchodem Španělů ovlivňovala bazary představa pracovitých kolosů přicházejících ze severních zemí se svým masově vyráběným zbožím.\n\nRychle si uvědomili, že nekonečně rostoucí daně vydávané machzenem nebo nafukování místních ekonomik měly být ve srovnání s tím, co je mohlo čekat pod „ochranou“ Andalusanů, tou nejmenší starostí."
 spanish_africa.2.a: "Nemá smysl teď zastavovat, udržme si tempo."
 spanish_africa.2.a_tt: "[SCOPE.gsInterestGroup('armed_forces_scope').GetName] a jejich podporovatelé budou očekávat, že my nebo některá z našich závislých zemí budeme do 10 let vlastnit [SCOPE.sStateRegion('west_sahara_scope').GetName]. Pokud se nám to nepodaří, sníží to naši [concept_legitimacy] a jejich [concept_approval] a podnítí [Concept('concept_radical','$concept_radicals$')] v jejich řadách. Naopak úspěch zlepší naše vztahy s nimi a zvýší naši [concept_prestige]."
 spanish_africa.2.b: "Raději bychom se měli spokojit s tím, co máme, a zaměřit se na své vnitřní zápasy."
 spanish_africa.3.t: "Do srdce Afriky"
 spanish_africa.3.d: "Když je [SCOPE.sState('west_sahara_scope').GetName] pod naší vládou, získali jsme nový opěrný bod, který lze využít k propojení pevniny s jádrem Afriky. [SCOPE.gsInterestGroup('armed_forces_scope').GetName] nás vyzývá, abychom udrželi současné tempo rozšířením své přítomnosti jižně od Sahary."
 spanish_africa.3.f: "Některé klany, zvyklé na nomádské tradice, si nedokázaly představit život pod vládou nevěřících a zahájily svou hidžru směrem k rozlehlému oceánu, jímž je Sahara.\n\nMezi nimi byli Banu Khezzan, malá skupina rodin se stády, která bylo třeba chránit. Saleeh, mladý člen klanu, neznal politické složitosti nedávných událostí, ale ve své dětské mysli cítil něco, co bylo těžké vyjádřit.\n\nNěco, co páchlo pomstou a zuřivostí vůči těm, kdo ho donutili znovu se přesunout."
 spanish_africa.3.a: "Začněte s přípravami, hned!"
 spanish_africa.3.a_tt: "[SCOPE.gsInterestGroup('armed_forces_scope').GetName] a jejich podporovatelé budou očekávat, že budeme mít do 10 let alespoň 3 [Concept('concept_colony','$concept_colonies$')] v oblasti [GetGeographicRegion('geographic_region_subsaharan_africa').GetName]. Pokud se nám to nepodaří, sníží to naši [concept_legitimacy] a jejich [concept_approval] a podnítí [Concept('concept_radical','$concept_radicals$')] v jejich řadách. Naopak úspěch zlepší naše vztahy s nimi a zvýší naši [concept_prestige]."
 spanish_africa.3.b: "Nesmíme se příliš vzdálit od své vlasti."
 spanish_africa.4.t: "Svázání volných konců"
 spanish_africa.4.d: "Povzbuzeni úspěchem našich nedávných výpadů do Afriky [SCOPE.gsInterestGroup('armed_forces_scope').GetName] navrhuje přesunout naše nyní zkušené vojáky a zmocnit se toho, co leží mezi pevninou a státem [SCOPE.sState('west_sahara_scope').GetName]."
 spanish_africa.4.f: "„A co kaple?“ zeptal se guvernér a ukázal ke středu plánu na stole pod provizorním stanem.\n\n„Co s ní, Gobernadore?“ odpověděl zmatený architekt a vybavil si okamžik, kdy mu dokonce vysvětloval odlévání jejího zvonu.\n\n„Používáme kámen, nebo dřevo?“ - pach ho měl prozradit. Zjevně byl stále podnapilý. \n\n„Kámen, pane? Kámen. Ze samotné vlasti.“"
 spanish_africa.4.a: "Dává to dokonalý smysl."
 spanish_africa.4.a_tt: "[SCOPE.gsInterestGroup('armed_forces_scope').GetName] a jejich podporovatelé budou očekávat, že ze země [SCOPE.sCountry('morocco_scope').GetName] učiníme svou [concept_subject], nebo budeme do 10 let vlastnit následující [Concept('concept_state_region','$concept_state_regions$')]:\n• [SCOPE.sStateRegion('al_rif_scope').GetName]\n• [SCOPE.sStateRegion('fez_scope').GetName]\n• [SCOPE.sStateRegion('inner_morocco_scope').GetName]\n• [SCOPE.sStateRegion('marrakech_scope').GetName]\nPokud se nám to nepodaří, sníží to naši [concept_legitimacy] a jejich [concept_approval] a podnítí [Concept('concept_radical','$concept_radicals$')] v jejich řadách. Naopak úspěch zlepší naše vztahy s nimi a zvýší naši [concept_prestige]."
 spanish_africa.4.b: "Neměli bychom jednat podle rozmarů vojáků."
 spanish_africa.5.t: "Héraklovy sloupy"
 spanish_africa.5.d: "Konečně jsme získali Gibraltarskou skálu zpět od $GBR_ADJ$ a obnovili [SCOPE.sStateRegion('gibraltar_scope').GetName] jako nedílnou součást našich držav. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] vyhlásil nový státní svátek na oslavu znovudobytí."
 spanish_africa.5.f: "#italic Plus Ultra#! — S tímto heslem Španělská říše vždy usilovala o nepředstavitelnou cestu napříč všemi pobřežími za svými poloostrovními domovinami.\n\n#italic Ještě dále#! — V ctěném latinském jazyce jeho význam označuje naši povinnost jako národa střežit brány úžasu a odvahy pro ty, kdo chtějí riskovat a usilovat o výjimečnost za hranicemi Středomoří.\n\nZnovu jsme právoplatnými strážci Východu a Západu."
 spanish_africa.5.a: "Héraklés by byl hrdý."
 spanish_africa.6.t: "Pronájem státu [SCOPE.sState('fernando_po_scope').GetName]"
 spanish_africa.6.d: "Vyslanec ze země [SCOPE.sCountry('spain_scope').GetName] čeká na naši diplomatickou odpověď ohledně žádosti o vydání státu [SCOPE.sState('fernando_po_scope').GetName] a tvrdí, že jsou právoplatnými vlastníky ostrova."
 spanish_africa.6.f: "I jako zkušený diplomat považoval svůj první příjezd ze země [SCOPE.sCountry('spain_scope').GetNameNoFormatting] do města [SCOPE.sState('gbr_capital_scope').GetNameNoFormatting] za nezapomenutelnou vzpomínku. Od rušných bulvárů přes úhledně ohrazené parky až po složitě vystavěné mosty - na tomto místě bylo něco úchvatného, nepodobného ničemu jinému, pomyslel si.\n\nBohužel nebyl čas se zdržovat, protože schůzka byla stanovena na tentýž den.\n\nPoselství bylo jasné; a jeho [SCOPE.sCountry('spain_scope').GetRuler.GetPrimaryRoleTitle] by sotva přijal odmítnutí jako odpověď."
 spanish_africa.6.a: "Mají právo, evakuujte ostrov."
 spanish_africa.6.a_tt: "Dáme zemi [SCOPE.sCountry('spain_scope').GetName] vědět, že pronájem je odvolán."
 spanish_africa.6.b: "Nikdy!"
 spanish_africa.6.b_tt: "[SCOPE.sCountry('spain_scope').GetName] brzy obdrží zprávu o našem odmítnutí."
 spanish_africa.7.t: "[SCOPE.sCountry('gbr_scope').GetName] vrací [SCOPE.sState('fernando_po_scope').GetName]"
 spanish_africa.7.d: "[SCOPE.sCountry('gbr_scope').GetName] přijala naši žádost o odvolání pronájmu státu [SCOPE.sState('fernando_po_scope').GetName]. [SCOPE.sCountry('gbr_scope').GetAdjectiveNoFormatting] síly se z ostrova brzy stáhnou."
 spanish_africa.7.f: "„Kam jedeme, mamá?“\n\n„Na Fernando Pó, cielo.“\n\n„Budeme tam šťastní?“\n\n„Samozřejmě že budeme, říká se, že je to krásný ostrov.“\n\n„Ale my už jsme šťastní tady? A proč s námi nejede papá?“\n\n„Děláme, co náš [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] říká, cariño. Všechno bude v pořádku. Nemusíš si dělat starosti.“"
 spanish_africa.7.a: "Výborně."
 spanish_africa.8.t: "[SCOPE.sCountry('gbr_scope').GetName] okupuje [SCOPE.sState('fernando_po_scope').GetName]"
 spanish_africa.8.d: "[SCOPE.sCountry('gbr_scope').GetName] odmítla naši žádost o odvolání pronájmu státu [SCOPE.sState('fernando_po_scope').GetName]."
 spanish_africa.8.f: "#bold Agnign#! — výraz používaný domorodými obyvateli [SCOPE.sState('fernando_po_scope').GetNameNoFormatting], který se do evropských jazyků zhruba překládá jako „žít“ nebo „prožívat“.\n\nKdysi #italic žili#!, aniž by tušili záměry civilizovaných lidí s jejich posvátnou půdou.\n\nA #italic prožívali#! svobodně, vážíce si každého okamžiku nespoutaného cizími rušivými vlivy."
 spanish_africa.8.a: "Jak se opovažují?"
 spanish_africa.9.t: "Návrat ke slávě"
 spanish_africa.9.d: "Náš velký národ úspěšně dosáhl všech cílů stanovených ohledně Afriky. Kdo ví, co se nyní skrývá za obzorem?"
 spanish_africa.9.f: "Dnešek byl pro polního velitele mimořádným dnem - takovým, který naplní zbytek jeho let hrdostí a slávou pro jeho zemi.\n\nNic se nevyrovná uznání, které přichází s úspěšnou službou vlastní zemi, ani cti obdržet medaili po náročném tažení, obzvlášť v zámoří."
 spanish_africa.9.a: "Ať žije [SCOPE.sCountry('spain_scope').GetName]. Plus Ultra!"
 spanish_africa.9.b: "Máme zde něco hmatatelného, co můžeme propagovat."
 spanish_africa.9.c: "Věnujme vítězství našemu lidu."
 spanish_africa.10.t: "Africké pochybení"
 spanish_africa.10.d: "Nesplnění našich expanzionistických vyhlídek v Africe silně rozrušilo [SCOPE.gsInterestGroup('armed_forces_scope').GetName] i její podporovatele."
 spanish_africa.10.f: "„Pánové, národ, který se nerozšiřuje, umírá pomalou a bolestivou smrtí. Jsem si jistý, že se na tom všichni shodneme. Musíme si zajistit svůj osud silou, bude-li to nutné. To, čemu říkají naše ambice „bezohlednost“, nazýváme vizí a oprávněnou žízní po slávě, kterou si [ROOT.GetCountry.GetNameNoFormatting] už dlouho zaslouží. Dnes ten den nenastal, ale říkám vám, je blízko.“\n\nZkušení důstojníci na sebe kývali a vstřebávali ta slova. Člověk by skoro uvěřil, že si kvůli povýšení nevstřelí navzájem kulku do zad."
 spanish_africa.10.a: "Měli by znát své místo."
 spanish_africa.10.b: "Možná existuje kompromis?"
 further_events_upon_researching_civilising_mission_tt: "Další příležitosti se objeví po rozvoji [GetInstitutionType('institution_colonial_affairs').GetName] jako [concept_institution] a vyzkoumání #v $civilizing_mission$#!"
