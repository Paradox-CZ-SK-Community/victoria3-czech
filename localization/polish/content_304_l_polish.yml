 je_great_reformer: "Velký reformátor"
 je_great_reformer_reason: "Nástup [SCOPE.sCharacter('alexander_ii_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('alexander_ii_scope').GetFullName] na trůn země [ROOT.GetCountry.GetAdjectiveNoFormatting] mnozí reformátoři oslavují jako příležitost zcela přetvořit zastaralé struktury státu země [ROOT.GetCountry.GetAdjectiveNoFormatting]. Reformně smýšlející [SCOPE.sCharacter('alexander_ii_scope').GetPrimaryRoleTitle] vytvořil množství komisí, které mají zkoumat a uskutečňovat různé reformní návrhy. Pokud tyto „velké reformy“ uspějí, znovuoživená [ROOT.GetCountry.GetNameNoFormatting] může překonat jakoukoli jinou evropskou mocnost.\n\nPo dobu vlády [SCOPE.sCharacter('alexander_ii_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('alexander_ii_scope').GetFullNameNoFormatting] se budou v zemi [ROOT.GetCountry.GetName] mnohem častěji objevovat postavy s ideologií [GetIdeology('ideology_market_liberal').GetName]."
 je_great_reformer_goal: "Dokončete #v 3#! [Concept('concept_journal_entry', '$concept_journal_entries$')] velkých reforem"
 je_great_reforms_serfdom: "Velké reformy: rolnická reforma"
 je_great_reforms_serfdom_reason: "Nespokojenost s praxí [GetLawType('law_serfdom').GetName] v reformistických kruzích existuje už dlouho. Liberální [GetPopType('aristocrats').GetName] tuto praxi kritizovali za to, že váže obrovské sumy kapitálu ve vlastnictví neproduktivních nevolníků a omezuje schopnost aristokracie investovat do produktivnějších oblastí. Dokud bude tato praxe pokračovat, bude představovat břemeno pro potenciál státu projít hospodářskou modernizací.\n\nAbychom se vyrovnali hospodářskému pokroku západní Evropy, musí být nevolníci osvobozeni a ekonomika přeorientována k produktivnějším cílům."
 je_great_reforms_military: "Velké reformy: vojenská reforma"
 je_great_reforms_military_reason: "#b Ruská imperiální armáda#!, tvořená z velké části špatně vycvičenými jednotkami [GetLawType('law_peasant_levies').GetName], postupem času stále více zaostávala za profesionálnějšími vojenskými silami Evropy. Abychom tyto nedostatky vyrovnali, musí být zlepšena kvalita výzbroje a výcviku armády a odvod musí být reformován tak, aby vytvořil větší zásobu zkušeného vojenského personálu."
 je_great_reforms_bureaucratic: "Velké reformy: byrokratická reforma"
 je_great_reforms_bureaucratic_reason: "Navzdory snahám předchozího cara posílit státní byrokracii zůstává státní aparát země [ROOT.GetCountry.GetAdjective] příliš závislý na svévolných a zastaralých místních orgánech. Abychom mohli uskutečnit naše další reformy s co největší účinností, musí být na našich rozsáhlých územích zajištěna rovná vláda zákona a autorita státu.\n\nDaňový systém, v současnosti závislý na místních vlastnících půdy vybírajících daně od rolníků, musí být přenesen do rukou státu. Stejně tak musí být místní správci voláni k odpovědnosti a správní privilegia šlechty omezena."
 je_great_reforms_serfdom_complete_tt: "Dokončila #b $je_great_reforms_serfdom$#!"
 je_great_reforms_military_complete_tt: "Dokončila #b $je_great_reforms_military$#!"
 je_great_reforms_bureaucratic_complete_tt: "Dokončila #b $je_great_reforms_bureaucratic$#!"
 ruler_not_alexander_ii_tt: "[SCOPE.sCharacter('alexander_ii_scope').GetFullName] již není [SCOPE.sCharacter('alexander_ii_scope').GetPrimaryRoleTitle] země [ROOT.GetCountry.GetName]"
 advances_great_reforms_tt: "Posune [concept_journal_entry] #b $je_great_reformer$#!"
 paralegal_discrimination.1.t: "Noví sousedé, staré zášti"
 paralegal_discrimination.1.d: "Menšinová skupina kultury [SCOPE.sCulture('newcomer_culture').GetName] se nedávno usadila ve státě [ROOT.GetState.GetName] a hledá lepší budoucnost. Místní elity kultury [SCOPE.sCulture('biggest_primary_culture').GetName] však rozdmýchávají odpor a tvrdí, že nově příchozí kultury [SCOPE.sCulture('newcomer_culture').GetNameNoFormatting] zničí tradiční způsob života."
 paralegal_discrimination.1.f: "„Nepatří sem! Naše zvyky kultury [SCOPE.sCulture('biggest_primary_culture').GetNameNoFormatting], náš způsob života... budou ztraceny, pokud dovolíme, aby se [SCOPE.sCulture('newcomer_culture')GetCustom('getPluralDemonym')] usadili!“ Slova pronesená významným vlastníkem půdy se rozléhala hostincem v [ROOT.GetState.GetCityHubName]. Následující den se šířila tržištěm a další den už byla na rtech tajemníků radnice. Když nově příchozí procházeli ulicemi, čekaly je zavřené dveře a chladné pohledy." 
 paralegal_discrimination.1.a: "Lidé kultury [SCOPE.sCulture('newcomer_culture').GetName] musí přijmout svůj úděl."
 paralegal_discrimination.1.b: "Musíme podporovat soulad mezi lidmi, ať už kultury [SCOPE.sCulture('newcomer_culture').GetName], nebo [SCOPE.sCulture('biggest_primary_culture').GetName]."
 paralegal_discrimination.1.c: "Staré způsoby kultury [SCOPE.sCulture('biggest_primary_culture').GetName] už nemohou nadále ovládat náš moderní národ."
 great_reformer.1.t: "Velký reformátor"
 great_reformer.1.d: "Nejdůležitější reformy [SCOPE.sCharacter('alexander_ii_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('alexander_ii_scope').GetFullName] byly přijaty. Liberální byrokraté je oslavují jako cestu k modernitě v zemi [ROOT.GetCountry.GetName]."
 great_reformer.1.f: "„V nejodlehlejších městech, kde se dosud všechny životní zájmy skládaly z karet, vodky, úplatků a klepů, se objevily veřejné knihovny, časopisy a noviny. Intelektuální život byl všude probuzen a oživen.“" #- Severnaya Pchela article
 great_reformer.1.a: "Car musí být za svou práci poctěn."
 great_reformer.1.b: "Po reformě revoluce."
 modifier_great_reforms_complete: "Velké reformy dokončeny"
 most_european_pops_abandon_alaska_tt: "Velký počet #bold evropských#! [Concept('concept_pop','$concept_pops$')] evakuuje [SCOPE.sState('capital_scope').GetName]"
 some_european_pops_abandon_alaska_tt: "Některé #bold evropské#! [Concept('concept_pop','$concept_pops$')] evakuují [SCOPE.sState('capital_scope').GetName]"
 inherit_characters_from_athabaska_tt: "Zdědí všechny [Concept('concept_character', '$concept_characters$')] od #v $ATB$#!"
 alaskan_declaration_of_independence_tt: "Vyhlásíme svou suverenitu jako #bold Aljašská republika#!"
 modifier_alyaska_republic: "Vyhlášena Aljašská republika"
 alk_breakup.1.t: "Sami v chladu"
 alk_breakup.1.d: "Bez vedení a bez životně důležité opory poskytované koloniálním vládcem se pokračování operací země [ROOT.GetCountry.GetName] nyní zdá neudržitelné. Evropští osadníci se připravují na hromadnou evakuaci."
 alk_breakup.1.f: "„Je nás sotva pár tisíc, obklopených prázdným kontinentem. Bez podpory je naše jídlo odsouzeno ke zkáze a naše domovy ke zřícení. Až přijde zima, co budeme dělat? Pokud budeme rychlí, můžeme se do té doby dostat do Irkutsku – nebo, pokud budeme ochotni vzdorovat fjordům, do Vancouveru.“"
 alk_breakup.1.a: "Uspořádejte spořádaný ústup z Aljašky."
 alk_breakup.1.b: "Vydržte v naději na návrat našeho vládce."
 alk_breakup.1.c: "Přineste pero a psací potřeby. Učiníme tuto zemi svou vlastní!"
 alk_breakup.1.e: "Předejte zemi jejím domorodým národům."
 modifier_ryotwari_system: "Systém ryotwari"
 modifier_utopian_commune: "Utopické kolonie"
 utopian.1.t: "Okno do utopie"
 utopian.1.d: "Skupina lidí inspirovaných teoriemi [GetIdeology('ideology_utopian').GetName] [SCOPE.sCharacter('utopian_leader_scope').GetFullName] založila experimentální kolonii na venkově státu [SCOPE.sState('utopian_community_state_scope').GetName]. Kolonie se sama chápe jako okno do idylické společnosti budoucnosti."
 utopian.1.f: "„Titul „páže“ se uděluje těm, kdo slouží králům. Právem spíše náleží těm, kdo slouží falanstéře, neboť falanstéra je Bůh v činnosti. Je duchem Božím, neboť se skládá z dvanácti harmonizovaných vášní; z vášnivé přitažlivosti, praktické pravdy, matematické spravedlnosti a jednoty jednání.\n\nSloužit falanstéře kolektivně tedy znamená sloužit Bohu, a právě tak jsou domácí povinnosti pojímány v harmonii. Pokud by bylo toto prvotní odvětví průmyslu znevažováno tak jako dnes, vášnivá rovnováha by se stala nemožnou.“" # Edited quote from Charles Fourier
 utopian.1.a: "Inspirativní."
 utopian.1.b: "Nic z toho nevzejde."
 utopian.1.c: "Rodící se povstání."
 utopian.2.t: "Bez iluzí"
 utopian.2.d: "Mezi současnou generací socialistů nahradil rozmanité [GetIdeology('ideology_utopian').GetName] myšlenky minulosti způsob analýzy založený na třídním konfliktu. Snít už nestačí."
 utopian.2.f: "„Pro utopisty je socialismus vyjádřením absolutní pravdy, rozumu a spravedlnosti, z nichž každá je u zakladatele každé školy jiná. A protože zvláštní druh absolutní pravdy, rozumu a spravedlnosti každého z nich je opět podmíněn jeho subjektivním chápáním, jeho životními podmínkami, mírou jeho vědomostí a intelektuální výchovou, není v tomto konfliktu absolutních pravd možné jiné vyústění než to, že se budou navzájem vylučovat.“" #- Edited quote from Engels, Socialism: Utopian and Scientific
 utopian.2.a: "Socialismus se vyvinul a jeho stoupenci se musí vyvinout také."
 utopian.2.b: "Osvobození jednotlivce přinese utopii."
 utopian.2.c: "Nová společnost se zrodí ze spolupráce mezi třídami."
 utopian.2.e: "V temných časech se člověk musí držet toho, co jej inspiruje."
