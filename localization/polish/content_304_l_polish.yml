 caudillo.6.t: "Výzva vůdcovství"
 caudillo.6.d: "[SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetFullName], významný vojenský velitel, začal zpochybňovat civilní vedení skupiny [SCOPE.gsInterestGroup('leadership_challenge_ig').GetName] pod [SCOPE.sCharacter('leadership_challenge_politician').GetFullName]. Ambice [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] hrozí rozšířit vládu caudillů do další oblasti společnosti."
 caudillo.6.f: "#bold Nová vojenská ofenziva: civilní úřady pod palbou! #!\n\nDnes ráno zazněla zvláštní polnice, když [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRole.GetName] [SCOPE.sCharacter('leadership_challenge_commander').GetFullNameNoFormatting] oznámil [SCOPE.sCharacter('leadership_challenge_commander').GetHerHis] záměr zavést rozsáhlé reformy v současném politickém zřízení pod vedením [SCOPE.sCharacter('leadership_challenge_politician').GetFullNameNoFormatting]. Šepot z ulic města [ROOT.GetCountry.GetCapital.GetCityHubName] o vedení [SCOPE.sCharacter('leadership_challenge_politician').GetFullNameNoFormatting] se změnil ve výkřiky požadující odstoupení, stoupající v chóru s odsouzením [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRole.GetName] [SCOPE.sCharacter('leadership_challenge_commander').GetLastNameNoFormatting]. (Pokrač. str. 3)"
 caudillo.6.a: "Důvěřujte hrdinství [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetLastName]."
 caudillo.6.b: "Skupina [SCOPE.gsInterestGroup('leadership_challenge_ig').GetName] musí zůstat pod civilní kontrolou."
 politician_gets_pushed_out_tt: "[SCOPE.sCharacter('leadership_challenge_politician').GetFullName] se stane [concept_politician]"
 resignation.2.t: "Vzdáváme to"
 resignation.2.d: "Se zhroucením občanského pořádku v zemi [ROOT.GetCountry.GetName] oznámil [SCOPE.sCharacter('resigning_politician').GetFullName] [SCOPE.sCharacter('resigning_politician').GetHerHis] rezignaci na úřad [SCOPE.sCharacter('resigning_politician').GetPrimaryRoleTitle]. V [ROOT.GetCountry.GetCapital.GetCityHubName] vzniklo mocenské vakuum a revolucionáři i loajalisté se ho snaží zaplnit."
 resignation.2.f: "„Dav prošel centrální čtvrtí před hodinou. Teď mají lucerny, ale je to jen předehra k puškám a obuškom.“\n\n„Takže je to tak. Naše vláda je ztracena. Dobrá tedy, půjdeme k nim s formální kapitulací. Ale zůstaň se mnou na poslední sklenku, starý příteli. Budeme potřebovat odvahu na to, co přijde.“"
 resignation.2.a: "[SCOPE.sCharacter('resigning_politician').GetSheHe|U] kapituloval, ale [ROOT.GetCountry.GetName] nikoli."
 resignation.2.b: "Jsme bezmocní tváří v tvář nadcházející bouři."
 resignation.2.c: "Na polovičatá opatření není čas. Vydejte mimořádné pravomoci."
 resignation.3.t: "Abdikace [ROOT.GetCountry.GetRuler.GetFullName]"
 resignation.3.d: "Se zhroucením občanského pořádku v zemi [ROOT.GetCountry.GetName] oznámil [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('abdicating_monarch').GetFullName] [SCOPE.sCharacter('abdicating_monarch').GetHerHis] abdikaci z trůnu země [ROOT.GetCountry.GetName]. V [ROOT.GetCountry.GetCapital.GetCityHubName] vzniklo mocenské vakuum a revolucionáři i loajalisté se ho snaží zaplnit."
 resignation.3.f: "Z balkonu ve třetím patře paláce bylo jasně vidět, že mandát nebes přešel na dav. [SCOPE.sCharacter('abdicating_monarch').GetFullNameNoFormatting] už nebyl [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle]. Lepší, pomyslel si [SCOPE.sCharacter('abdicating_monarch').GetSheHe], odstoupit teď, dokud davy přijmou kapitulaci, než být odvlečen ke smyčce."
 resignation.3.a: "Naše naděje musí spočinout na [SCOPE.sCharacter('heir_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('heir_scope').GetFirstName]."
 resignation.3.b: "Uprchněte přes hranici, dokud je ještě čas."
 resignation.3.c: "[SCOPE.sCharacter('abdicating_monarch').GetHerHis|U] nástupce musí vládnout se silou, která [SCOPE.sCharacter('abdicating_monarch').GetSheHe] chyběla."
