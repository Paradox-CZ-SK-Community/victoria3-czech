 italian_unification.4.t: "Trikolóry nad [SCOPE.sState('capital_scope').GetCityHubName]"
 italian_unification.4.d_annex: "Nacionalističtí rebelové, inspirovaní výzvami ke znovusjednocení Itálie, ovládli [SCOPE.sState('capital_scope').GetCityHubName] a přísahali věrnost sjednocené Itálii pod vládou [SCOPE.sCountry('italian_leader').GetRuler.GetFullName] ze země [SCOPE.sCountry('italian_leader').GetName]."
 italian_unification.4.d_coup: "Nacionalističtí rebelové, inspirovaní výzvami ke znovusjednocení Itálie, ovládli [SCOPE.sState('capital_scope').GetCityHubName] a prohlásili vládu [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] za svrženou."
 italian_unification.4.f: "„Zrádci! Zrádci mezi námi! Vyhlašte poplach, ihned zavolejte stráže!“\n\n„Myslíte ty muže v oblecích vedle mě, signore? Doufám, že ano, když jste byl natolik pošetilý, že jste oznámil svou přítomnost. Nyní to řeknu jasně, protože vaše běsnící neschopnost nás k tomu donutila: sjednocená Itálie povstává. Žádá si místo na světové scéně a nebude o ni pečováno muži vašeho nepadnoucího druhu.“"
 italian_unification.4.a: "Znovu povstaneme jako součást celku."
 italian_unification.4.b: "Ať žije Itálie!"
 italian_unification.4.c: "Znovu povstaneme jako součást celku."
 italian_unification.5.t: "Italští nacionalisté ovládli [SCOPE.sState('capital_scope').GetCityHubName]"
 italian_unification.5.d: "Nacionalističtí rebelové, inspirovaní výzvami k vytvoření jediného italského národa, ovládli zemi [SCOPE.sCountry('italian_pannational_country').GetName] a přísahali věrnost sjednocení Itálie pod praporem [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 italian_unification.5.f: "Sjednocená Itálie nikdy nebyla daleko od rtů šílenců i ctižádostivců. Vskutku, nádherné znovuprobuzení poloostrova by přimělo k váhání i jediného Boha. Takové pokusy byly v minulosti pošetilostí. Přesto se v pokradmých šepotech ozývá víra, že snad existuje naděje, aby povstal nový Řím."
 italian_unification.5.a: "Vítáme své bratry a sestry."
 italian_unification.5.b: "Bude nejlepší neděsit naše sousedy."
 italian_unification.6.t: "Italští nacionalisté svrhli vládu země [SCOPE.sCountry('italian_pannational_country').GetAdjective]"
 italian_unification.6.d: "Nacionalističtí rebelové, inspirovaní výzvami ke znovusjednocení Itálie, ovládli [SCOPE.sCountry('italian_pannational_country').GetCapital.GetCityHubName] a nad jejími bývalými suverénními územími vyhlásili republiku."
 italian_unification.6.f: "To, co mu pobočník přinesl, bylo neuvěřitelné: další pokus sjednotit Apeninský poloostrov pod jedinou zástavou. Zdálo se to nemožné, rozdělené mezi nejméně půl tuctu drobných pánů a městských států, kteří by se nejraději navzájem škrtili stejně jako Evropa. Ale jak pobočník mluvil, bylo jasné, že to není plané chvástání. Ne, to si zasloužilo vyslance nesoucí buď gladius, nebo olivovou ratolest."
 italian_unification.6.a: "Nabídněte novému režimu naše sympatie."
 italian_unification.6.b: "S těmito teroristy nemáme společnou věc."
 italian_unification.7.t: "Pět dní v [SCOPE.sState('rsm_capital_scope').GetCityHubName]"
 italian_unification.7.d: "Po nepokojích mezi italským obyvatelstvem Lombardsko-benátska nacionalističtí rebelové vyhlásili vznik země [SCOPE.sCountry('rsm_scope').GetName], revolučního státu založeného s cílem získat nezávislost na vládě země [ROOT.GetCountry.GetAdjective]."
 italian_unification.7.f: "Jezdec v bílém na bílé klisně projel kolem pozemků poblíž místa, kde toho rána [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] snídal. Lokaj, který k [ROOT.GetCountry.GetRuler.GetHerHim] přistoupil s potem prosakujícím z každého popraskaného póru, nesl krvavě rudý dopis. Italská území vstoupila do vzpoury. Další zpocený pobočník přinesl další zprávu: tato vzbouřená území volají po posilách. Po posilách, o nichž [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting] věděl, že jistě přijdou."
 italian_unification.7.a: "Okamžitě se stáhněte do Kvadrilaterálu!"
 italian_unification.7.b: "Viva San Marco!"
 italian_states_choose_sides_tt: "#bold Italské#! státy dostanou příležitost podpořit zemi [SCOPE.sCountry('rsm_scope').GetName]"
 italian_states_choose_sides_danger_tt: "@warning! Vztahy s #bold italskými#! státy se mohou rychle zhoršit"
 italian_unification.8.t: "Italská válka za nezávislost"
 italian_unification.8.d: "Revolucionáři v [SCOPE.sCountry('rsm_scope').GetCapital.GetCityHubName] vyhlásili vznik země [SCOPE.sCountry('rsm_scope').GetName], nezávislé na vládě země [SCOPE.sCountry('rsm_revolted_scope').GetName]. Ve svém boji volají o pomoc všechny italské státy."
 italian_unification.8.f: "„Matko... rozhodl jsem se. Jdu do Benátek, s tvým požehnáním nebo bez něj.“\n\n„Dobrá, dobře, jdi! Žádný můj syn by nikdy nepromarnil život kvůli něčemu tak bezvýznamnému, jako je vlajka. Kvůli takovému zbytečnému poměřování délek penne jsem už ztratila bratry a strýce. Zůstaň tady a buď v bezpečí!“\n\n„Je to všechno možné, jen ne zbytečné, matko! Máme šanci být znovu jednou Itálií. Mohli bychom zase jít kamkoli, dělat cokoli. Znovu bychom měli #bold něco#!!“"
 italian_unification.8.a: "Stojí za nás a my za ně."
 italian_unification.8.b: "Nebudeme prolévat krev země [ROOT.GetCountry.GetAdjectiveNoFormatting] za [SCOPE.sCountry('rsm_scope').GetCapital.GetCityHubName]."
 italian_unification.10.t: "Šepot risorgimenta"
 italian_unification.10.d: "Větry nacionalismu začaly procházet dlouho rozdělenými státy Apeninského poloostrova. Vlastenci země [ROOT.GetCountry.GetAdjective] i romantičtí učenci začali volat po sjednocení jediného italského státu."
 italian_unification.10.f: "„Ne, signore. Nejsem cizinec a nejsem [ROOT.GetCountry.GetAdjectiveNoFormatting]. Jsem Ital a Ital v Itálii není nikdy cizincem.“"
 italian_unification.10.a: "Itálie musí být obnovena ze zapomnění."
 italian_unification.10.b: "Nevrhneme se kvůli tomu do větru."
