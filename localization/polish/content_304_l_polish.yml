 KOR_declare_korean_empire_desc: "Korea je obklopena říšemi dvou císařů. Abychom ochránili svou suverenitu, musíme se povznést a stát se jejich rovnými."
 korea.1.t: "Éra Kwangmu"
 korea.1.d: "V nově vybudované svatyni Hwangudan nově korunovaný císař [SCOPE.sCharacter('korea_emperor_scope').GetFullName] vyhlásil konec éry země [ROOT.GetCountry.GetName] a založení nového Korejského císařství."
 korea.1.f: "Desetiletí šeptání, roky plánů a měsíce příprav vyústily v tento okamžik: velké znovuzrození ducha lidu. Uprostřed ohňostrojů, jemného hedvábí a lidových písní domova pozvedlo několik zahraničních hodnostářů, kteří se obřadu účastnili, své číše s tichým uznáním a trpkými pohledy."
 korea.1.a: "Jasný a slavný den."
