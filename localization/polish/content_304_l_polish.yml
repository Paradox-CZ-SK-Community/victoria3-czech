 rhine_confederation.1.t: "Druhý Rheinbundakte"
 rhine_confederation.1.d: "Podpisem nového Rheinbundakte pod dohledem země [ROOT.GetCountry.GetAdjective] se ze znesvářených německých států znovu zformovala země [SCOPE.sCountry('rhine_scope').GetName]."
 rhine_confederation.1.f: "Tváří v tvář nejisté budoucnosti je jednota hotovým lékem na nesčetné hrozby u našich dveří. Tato řeka – náš život, náš domov, samotné naše srdce! – by nám měla být příkladem, když kráčíme do nové éry. Budeme postupovat jako jeden celek k vyššímu cíli. Budeme se navzájem pozvedat a živit až do onoho cíle. A budou-li nás sužovat praky a šípy, najdeme útočiště v jejím lůně."
 rhine_confederation.1.a: "Moc země [ROOT.GetCountry.GetAdjectiveNoFormatting] se dále rozšiřuje na východ."
 rhine_confederation.1.b: "Nový úsvit pro Německo."
