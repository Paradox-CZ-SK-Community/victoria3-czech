 government_collapse.1.t: "Strana kolísá"
 government_collapse.1.d: "Poté, co skupina [SCOPE.gsInterestGroup('relevant_ig').GetName] vstoupila do otevřeného povstání, byla moc, kterou strana [SCOPE.sParty('relevant_party').GetName] držela nad národem země [ROOT.GetCountry.GetAdjective], naprosto zlomena. Loajální vládní úředníci navrhli zrušení strany, aby zachovali stát."
 government_collapse.1.f: "„Připoutali jsme se k nim bokem a teď jsme jejich odchodem ochromeni. Musíme jednat! Zachráníme těchto pár zbytků, nebo nezachráníme nic.“\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] hleděl na zprávy o zoufalství a zběhnutí, které pokrývaly [ROOT.GetCountry.GetRuler.GetHerHis] stůl, a učinil [ROOT.GetCountry.GetRuler.GetHerHis] rozhodnutí."
 government_collapse.1.a: "Musíme dosadit nouzovou vládu."
 government_collapse.1.b: "Nabídněte olivovou ratolest, než bude příliš pozdě."
