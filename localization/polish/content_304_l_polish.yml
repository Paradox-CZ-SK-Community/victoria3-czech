l_polish:
 je_risorgimento: "Risorgimento"
 je_risorgimento_reason: "Větry nacionalismu vanoucí Evropou začaly procházet i zemí [ROOT.GetCountry.GetName] a inspirovaly osobnosti uvnitř naší vlády i mimo ni, aby hleděly k obnově jediné, sjednocené Itálie.\n\nDokud je tento záznam v deníku aktivní, jakákoli aktivní [concept_revolution] způsobená hnutím [SelectLocalization(SCOPE.sPoliticalMovement('italian_national_movement').IsValid, SCOPE.sPoliticalMovement('italian_national_movement').GetName, 'movement_italian_national')] povede k uchopení vlády země [ROOT.GetCountry.GetAdjective] panitalskými revolucionáři[ROOT.GetCountry.GetCustom('italy_fate_loc')]."
 austrian_radicals_cooldown_tt: "V uplynulých #v [GetPlayer.MakeScope.ScriptValue('risorgimento_action_cooldown_years')]#! letech nebylo použito rozhodnutí #bold Podpořit italský nacionalismus#!"
 italian_radicals_cooldown_tt: "V uplynulých #v [GetPlayer.MakeScope.ScriptValue('risorgimento_action_cooldown_years')]#! letech nebylo použito rozhodnutí #bold Podpořit prosjednocovací nálady#!"
 is_italy_tt: "Vytvořila národ #bold Itálie#!"
 italy_will_get_couped_custom: " a nastolení #bold demokratické republiky#!"
 italy_will_get_annexed_custom: " a #red anexe#! vedoucím italským státem"
 owns_italian_homelands_tt: "Vlastní státy [concept_homeland] kultury [GetCulture('north_italian').GetName] nebo [GetCulture('south_italian').GetName]"
 je_risorgimento_italian_minors_tt: "#b $ITA_ADJ$#! menší národy se s námi mohou sjednotit, pokud se staneme jediným #b $ITA_ADJ$#! [concept_unification_candidate]"
 je_risorgimento_austrian_radicals_button: "Podpořit italský nacionalismus"
 je_risorgimento_austrian_radicals_button_desc: "Od konce napoleonských válek drží italská území cizí mocnosti. Naše cesta ke sjednocení poloostrova je může inspirovat, aby pozvedly zbraně proti vlastním utlačovatelům."
 je_risorgimento_italian_radicals_button: "Podnítit prosjednocovací nálady"
 je_risorgimento_italian_radicals_button_desc: "Po celém Apeninském poloostrově se masy pomalu probouzejí a obracejí k myšlence sjednocené Itálie. Pokud jejich vládci nejsou nakloněni následovat toto volání, možná jím budou jejich lidé."
 ausrad_cooldown_year_tt: "Toto rozhodnutí bude znovu dostupné za #v [GetPlayer.MakeScope.ScriptValue('risorgimento_action_cooldown_years')] let#!"
 itarad_cooldown_year_tt: "Toto rozhodnutí bude znovu dostupné za #v [GetPlayer.MakeScope.ScriptValue('risorgimento_action_cooldown_years')] let#!"
 owns_no_italian_homelands_tt: "#b Nevlastní#! žádné státy [concept_homeland] kultury [GetCulture('north_italian').GetName] ani [GetCulture('south_italian').GetName]"
 russia_monarchy.1.t: "Nástup Alexandra II."
 russia_monarchy.1.d: "Po skončení vlády Mikuláše I. nastoupil [SCOPE.sCharacter('tsar_scope').GetFullName] na trůn země [ROOT.GetCountry.GetAdjective] jako Alexandr II., car vší Rusi. Mnozí liberální byrokraté doufají, že [SCOPE.sCharacter('tsar_scope').GetHerHis|U] vláda přinese novou éru reforem."
 russia_monarchy.1.f: "„Tváří v tvář Bohu, který je neviditelně přítomen s námi, přijímáme posvátný slib mít vždy blaho naší vlasti za jediný cíl.\n\nAno, vedeni a chráněni Prozřetelností, která nás povolala k této veliké službě, pozvedněme Rusko na nejvyšší stupeň moci a slávy; nechť se skrze nás naplní stálá přání a záměry našich vznešených předchůdců, požehnaných a nezapomenutelných.“" #- Alexander's coronation manifesto
 russia_monarchy.1.a: "Ať žije car!"
 russia_monarchy.2.t: "Záchvat slabosti"
 russia_monarchy.2.d: "Během dovolené byl [SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('nicholas_scope').GetFullName] zasažen náhle se zhoršující nemocí. Lékaři se obávají o život rychle slábnoucího [SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle]."
 russia_monarchy.2.f: "Nemoc jej zachvátila během cesty po pobřeží Středozemního moře, zrazeného slanými větry, které byly vychvalovány pro svou léčivou povahu. Ležel zabalený v přikrývkách a třásl se navzdory potu, jenž mu stékal z čela a vsakoval se do polštáře pod ním.\n\nSestra stojící u lůžka slyšela jeho slova, protlačená křečovitými rty, ale vůbec jim nedokázala porozumět."
 russia_monarchy.2.a: "Jeho poslední dny musí být teplé a pohodlné."
 russia_monarchy.2.b: "Léčte ho naší nejinovativnější medicínou."
 nicholas_lives_tt: "[SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle] se ze své nemoci zotaví"
 russia_monarchy.3.t: "Nástup Mikuláše II."
 russia_monarchy.3.d: "Bývalý carevič [SCOPE.sCharacter('tsar_scope').GetFullName] nastoupil na trůn země [ROOT.GetCountry.GetAdjective] jako Mikuláš II. Bývalí vychovatelé nového cara chválí [SCOPE.sCharacter('tsar_scope').GetHerHis] vzdělaný rozhled, který slibuje liberální a osvícenou vládu."
 russia_monarchy.3.f: "„Pane Bože našich otců a Králi králů, jenž jsi svým slovem stvořil vše, nechť je s námi moudrost, která náleží tvému trůnu; sešli ji ze svého Svatého nebe, abychom poznali, co se líbí tvému zraku a co je správné podle tvého přikázání.“" #- Tsar's Prayer
 russia_monarchy.3.a: "Za naše strážce pravdy, Bože, ochraňuj je!"
 russia_monarchy.4.t: "Nástup Alexandra III."
 russia_monarchy.4.d: "Carevič z důvodu tragické smrti svého staršího bratra, [SCOPE.sCharacter('tsar_scope').GetFullName], nastoupil na trůn země [ROOT.GetCountry.GetAdjective] jako Alexandr III. Očekává se, že [SCOPE.sCharacter('tsar_scope').GetHerHis|U] vláda zahájí věk prudkého patriotismu a protirevolučního konzervatismu."
 russia_monarchy.4.f: "„Uprostřed našeho velikého zármutku nám Boží hlas přikazuje, abychom se s radostí postavili k dílu vlády v naději na Boží prozřetelnost, s vírou v sílu a pravdu naší moci, kterou jsme povoláni potvrzovat a chránit pro dobro lidu před jakýmikoli zásahy do ní.“" #- Pobedonostsev Manifesto
 russia_monarchy.4.a: "Podmaniteli pyšných dopřej vše!"
 russia_monarchy.5.t: "Nástup Mikuláše II."
 russia_monarchy.5.d: "[SCOPE.sCharacter('tsar_scope').GetFullName] nastoupil po svém otci jako car země [ROOT.GetCountry.GetName]. Od vlády nově intronizovaného Mikuláše II. se očekává hospodářská modernizace, politická centralizace i posílení moci monarchie."
 russia_monarchy.5.f: "„Nechť všichni vědí, že zasvětíme všechny své síly dobru lidu a budeme chránit základ své vlády stejně pevně a neochvějně, jako jej chránil náš nezapomenutelný zesnulý rodič. Kéž nám milosrdný Pán Bůh pomáhá v našem úkolu, kéž nás posiluje a požehná nám dlouhým a plodným životem.“"
 russia_monarchy.5.a: "Bože, chraň cara a pravoslavnou Rus!"
 russia_monarchy.6.t: "Narození Alexeje"
 russia_monarchy.6.d: "Manželka [SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('nicholas_scope').GetFullName] konečně porodila syna. Novorozený [SCOPE.sCharacter('alexei_scope').GetFullName] bude vychován jako nový [SCOPE.sCharacter('alexei_scope').GetPrimaryRoleTitle] země [ROOT.GetCountry.GetName]."
 russia_monarchy.6.f: "„Dítě leželo na polštáři ze zlatohlavu, zavěšeném na princezniných ramenou širokou zlatou stuhou. Bylo přikryto těžkým pláštěm ze zlatohlavu, podšitým hermelínem, který nosí dědic koruny. Když je starý otec Janyšev ponořil do křtitelnice, hlasitě plakalo jako každé obyčejné dítě.“" #- Sophie Buxhoeveden
 russia_monarchy.6.a: "Narodil se car."
 alexei_becomes_heir_tt: "#variable Alexej Romanov#! se stává dědicem trůnu země [SCOPE.sCountry('rus_scope').GetAdjective]"
 russia_monarchy.7.t: "Nemoc [SCOPE.sCharacter('nicholas_scope').GetFullName]"
 russia_monarchy.7.d: "Obtíže, jimž národ země [ROOT.GetCountry.GetAdjective] čelí, těžce doléhají na [SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('nicholas_scope').GetFullName]. [SCOPE.sCharacter('nicholas_scope').GetSheHe|U] vážně onemocněl zápalem plic a odmítá léčbu."
 russia_monarchy.7.f: "„Nevyslechne naše námitky. Cestoval, aby si prohlédl své vojáky, stále silnějším mrazem. Onemocněl poprvé i podruhé, a přesto odmítá odpočívat. Lze ho nalézt v pracovně nebo v poli.“\n\nLékařovy oči sklouzly stranou, nedůvěřivé k důvěrnosti chodby.\n\n„Tohle – tohle je horší než smrt – obávám se, že je to sebevražda!“"
 russia_monarchy.7.a: "Není čas plýtvat poleháváním na lůžku."
 russia_monarchy.7.b: "Přemluvte [SCOPE.sCharacter('nicholas_scope').GetHerHim], aby vyhledal léčbu."
 russia_monarchy.8.t: "Osudná vyjížďka"
 russia_monarchy.8.d: "[SCOPE.sCharacter('georgy_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('georgy_scope').GetFullName], známý svou chatrnou tělesnou konstitucí, zmizel na motocyklu na venkově. Domácí služebnictvo se obává o jeho zdraví."
 russia_monarchy.8.f: "Zvuk motoru slábl a slábl, jak motocykl zdolal jeden ze zvlněných kopců a zmizel za ním. Do zelené propasti zmizel [SCOPE.sCharacter('georgy_scope').GetPrimaryRole.GetName], uhánějící, aby unikl pomalým, teplým pramínkům bolesti v hrudi."
 russia_monarchy.8.a: "Najděte ho a vraťte domů."
 russia_monarchy.8.b: "Nechte ho urychleně převézt do našich nových nemocnic."
 michael_becomes_heir_tt: "#variable Michail Romanov#! se stává dědicem trůnu země [SCOPE.sCountry('rus_scope').GetAdjective]"
 georgy_lives_tt: "[SCOPE.sCharacter('nicholas_scope').GetPrimaryRoleTitle] se ze své nemoci zotaví"
 russia_monarchy.9.t: "Nástup Alexeje II."
 russia_monarchy.9.d: "Po skončení vlády Mikuláše II. nastoupil jeho první a jediný syn [SCOPE.sCharacter('tsar_scope').GetFullName] na trůn země [ROOT.GetCountry.GetAdjective] jako Alexej II. Mladý a bojovný car prohlásil, že hodlá rozšířit dlouhé svitky vojenské slávy země [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 russia_monarchy.9.f: "„Pane Bože našich otců, nechť je naše srdce v tvé ruce, abychom vykonali vše, co je ku prospěchu lidu svěřeného naší péči a k tvé slávě, abychom ti tak v den tvého soudu mohli bez viny vydat počet ze své správy.“" #- The Tsar's Prayer
 russia_monarchy.9.a: "Zažene nehodné a dá nám sílu!"
 russia_monarchy.10.t: "Nástup Michaila II."
 russia_monarchy.10.d: "Konec vlády Mikuláše II. přivedl [SCOPE.sCharacter('tsar_scope').GetFullName] k nástupnictví po jeho starším bratrovi jako carovi země [ROOT.GetCountry.GetName]. Očekává se, že vláda zdrženlivého Michaila II. přinese opatrnou ústavní reformu a odpovědnou vládu."
 russia_monarchy.10.f: "„Inspirováni, stejně jako všechen lid, vírou, že blaho naší země musí stát nade vším ostatním, svoláváme na ruský lid Boží požehnání a přijímáme posvátný slib chránit naši vlast mocí, která nám byla svěřena.“" #- Edit of Michael II's abdication
 russia_monarchy.10.a: "Ochránci slabých dopřej vše!"
 russia_monarchy.11.t: "Nástup Jiřího I."
 russia_monarchy.11.d: "Po skončení vlády Mikuláše II. nastoupil [SCOPE.sCharacter('tsar_scope').GetFullName] na trůn země [ROOT.GetCountry.GetName]. Navzdory svému trvale chatrnému zdraví nově intronizovaný Jiří I. uznal za vhodné pevně prosazovat vědecký pokrok a modernistickou reformu."
 russia_monarchy.11.f: "„Pane Bože, jenž jsi svým slovem stvořil vše a svou moudrostí učinil člověka, aby kráčel vzpřímeně a spravedlivě vládl tvému světu; ty jsi nás vyvolil za cara a soudce nad svým lidem. Uznáváme tvůj nevyzpytatelný záměr vůči nám a vděčně se skláníme před tvým Veličenstvem.“" #- The Tsar's Prayer
 russia_monarchy.11.a: "Kéž mu jsou dopřány dlouhé dny."
 modifier_alexander_ii: "Velký reformátor"
 modifier_nicholas_tsesarevich: "Koruna dokonalosti"
 modifier_alexander_iii: "Mírotvůrce"
 modifier_nicholas_ii: "Car mimo svou dobu"
 modifier_george_i: "Zasněný panovník"
 modifier_michael_ii: "Neklidný vlastenec"
 modifier_alexei_ii: "Car-válečník"
 alexander_ii_enthroned_tt: "Postavy s ideologií tržního liberalismu se budou v zemi [SCOPE.sCountry('russia_scope').GetName] objevovat častěji po dobu vlády [SCOPE.sCharacter('tsar_scope').GetFullName]"
 alexander_iii_enthroned_tt: "Postavy s tradicionalistickou ideologií se budou v zemi [SCOPE.sCountry('russia_scope').GetName] objevovat častěji po dobu vlády [SCOPE.sCharacter('tsar_scope').GetFullName]"
 alexei_ii_enthroned_tt: "Postavy se šovinistickou ideologií se budou v zemi [SCOPE.sCountry('russia_scope').GetName] objevovat častěji po dobu vlády [SCOPE.sCharacter('tsar_scope').GetFullName]"
 sweden_monarchy.1.t: "Nástup Oskara I."
 sweden_monarchy.1.d: "Po skončení vlády Karla Johana nastoupil [SCOPE.sCharacter('oscar_scope').GetFullName] na trůn země [ROOT.GetCountry.GetAdjective] jako Oskar I., král [ROOT.GetCountry.GetCustom('get_king_sweden_norway')]. Mnozí doufají, že [SCOPE.sCharacter('oscar_scope').GetHerHis|U] vláda přinese novou éru reforem."
 sweden_monarchy.1.f: "Arcibiskup pomazal krále na čele, hrudi, spáncích a zápěstích se slovy:\n\n„Všemohoucí Bůh nechť vylije svého Ducha svatého do tvé duše a mysli, plánů a podniků, abys díky jeho daru vládl zemi a království tak, že to přispěje ke cti a slávě Boží, zachová spravedlnost a rovnost a bude ku prospěchu země a lidu.“ \n\nKrál poté vstal a znovu usedl na svůj trůn. \n\n„Nyní byl [SCOPE.sCharacter('oscar_scope').GetFullNameNoFormatting] korunován králem Sveů, Gótů a Vendů. On a nikdo jiný.“" #- Swedish coronation manifesto
 sweden_monarchy.1.a: "Ať žije král!"
 sweden_monarchy.2.t: "Smrt krále"
 sweden_monarchy.2.d: "Vláda Oskara I. skončila poté, co trpěl nemocí, která se postupně zhoršovala a vedla k ochrnutí a smrti. [SCOPE.sCharacter('relevant_heir').GetFullName] nastoupil na trůn země [ROOT.GetCountry.GetAdjective] jako Karel XV., král [ROOT.GetCountry.GetCustom('get_king_sweden_norway')]. Mnozí doufají, že [SCOPE.sCharacter('relevant_heir').GetHerHis|U] vláda přinese novou éru reforem."
 sweden_monarchy.2.f: "Arcibiskup pomazal krále na čele, hrudi, spáncích a zápěstích se slovy:\n\n„Všemohoucí Bůh nechť vylije svého Ducha svatého do tvé duše a mysli, plánů a podniků, abys díky jeho daru vládl zemi a království tak, že to přispěje ke cti a slávě Boží, zachová spravedlnost a rovnost a bude ku prospěchu země a lidu.“ \n\nKrál poté vstal a znovu usedl na svůj trůn. \n\n„Nyní byl [SCOPE.sCharacter('relevant_heir').GetFullNameNoFormatting] korunován králem Sveů, Gótů a Vendů. On a nikdo jiný.“" #- Swedish coronation manifesto
 sweden_monarchy.2.a: "Ať žije král!"
 sweden_monarchy.3.t: "Nečekaná smrt"
 sweden_monarchy.3.d: "Vláda Karla XV. skončila. [SCOPE.sCharacter('oscar_relevant_ruler').GetFullName] nastoupil na trůn země [ROOT.GetCountry.GetAdjective] jako Oskar II., král [ROOT.GetCountry.GetCustom('get_king_sweden_norway')]. Mnozí doufají, že [SCOPE.sCharacter('oscar_relevant_ruler').GetHerHis|U] vláda přinese novou éru reforem."
 sweden_monarchy.3.f: "Arcibiskup pomazal krále na čele, hrudi, spáncích a zápěstích se slovy:\n\n„Všemohoucí Bůh nechť vylije svého Ducha svatého do tvé duše a mysli, plánů a podniků, abys díky jeho daru vládl zemi a království tak, že to přispěje ke cti a slávě Boží, zachová spravedlnost a rovnost a bude ku prospěchu země a lidu.“ \n\nKrál poté vstal a znovu usedl na svůj trůn. \n\n„Nyní byl [SCOPE.sCharacter('oscar_relevant_ruler').GetFullNameNoFormatting] korunován králem Sveů, Gótů a Vendů. On a nikdo jiný.“" #- Swedish coronation manifesto
 sweden_monarchy.3.a: "Ať žije král!"
 sweden_migration.1.t: "Švédská migrace"
 sweden_migration.1.d: "Špatné podmínky v zemi [SCOPE.sCountry('migration_country').GetName] učinily migraci do státu [SCOPE.sState('migration_target_state').GetName] velmi lákavou alternativou. Tisíce lidí kultury [SCOPE.sCulture('migration_culture').GetName] se vydaly přes moře do Ameriky."
 sweden_migration.1.f: "Rolníci kultury [SCOPE.sCulture('migration_culture').GetNameNoFormatting] se shromažďují po vystoupení z nejnovější lodi. Desítky tisíc jich přišly už před nimi a další desítky tisíc jsou na cestě. \nŠvédům se Minnesota jevila jako pozemský ráj, její temná a štědrá půda dávala úrody dost na to, aby zahnala nouzi a potěšila srdce."
 sweden_migration.1.a: "Lepší život je přesně to, co teď potřebujeme."
 sweden_migration.1.b: "New York poslouží docela dobře."
 sweden_migration: "Švédská migrace"
 sweden_law.1.t: "Rasová biologie"
 sweden_law.1.d: "Státní ústav pro rasovou biologii země [SCOPE.sCountry('sweden_law_country').GetAdjective] dostal za úkol najít příčinu zločinnosti, alkoholismu a duševních potíží. Tvrzení ústavu vedla Riksdag k přijetí politik kontrolujících porodnost lidí kultury [SCOPE.sCulture('sweden_law_culture').GetName]."
 sweden_law.1.f: "V posluchárnách v Uppsale drží profesoři posuvná měřítka, jako by to byla orákula. Rozkládají tabulky fyziognomií a postupně na každou ukazují. \nTento je čistokrevný Švéd, dlouhých končetin a zdravé mysli. Tento je poskvrněn míšením, odsouzen k osudu alkoholismu. První je budoucností národa. Druhý je předurčen tiše zmizet. \nBylo by to humánní, pokračuje profesor. Podívejte se na grafy, na přehledně uspořádaná čísla. Národ od nás vyžaduje víc, než je on schopen poskytnout."
 sweden_law.1.a: "Tři generace slabomyslných stačí."
 sweden_law.1.b: "Musíme dostat tuto situaci pod kontrolu."
