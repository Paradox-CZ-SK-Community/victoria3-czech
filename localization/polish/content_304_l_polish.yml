 resign_from_office_desc: "Tato postava odstoupí ze své pozice [Character.GetPrimaryRoleTitle] země [Character.GetCountry.GetName]"
 resignation.1.t: "Rezignační dopisy"
 resignation.1.d1: "Po úplném zhroucení [SCOPE.sCharacter('resigning_politician').GetHerHis] podpory mezi skupinou [SCOPE.sCharacter('resigning_politician').GetInterestGroup.GetName] oznámil [SCOPE.sCharacter('resigning_politician').GetFullName] [SCOPE.sCharacter('resigning_politician').GetHerHis] rezignaci na úřad [SCOPE.sCharacter('resigning_politician').GetPrimaryRoleTitle]."
 resignation.1.d2: "Po sérii ničivých skandálů a mizerné veřejné podpoře oznámil [SCOPE.sCharacter('resigning_politician').GetFullName] [SCOPE.sCharacter('resigning_politician').GetHerHis] rezignaci na úřad [SCOPE.sCharacter('resigning_politician').GetPrimaryRoleTitle]."
 resignation.1.d3: "[SCOPE.sCharacter('resigning_politician').GetFullName] s odvoláním na špatné zdraví oznámil [SCOPE.sCharacter('resigning_politician').GetHerHis] rezignaci na úřad [SCOPE.sCharacter('resigning_politician').GetPrimaryRoleTitle]."
 resignation.1.d4: "[SCOPE.sCharacter('resigning_politician').GetFullName] s odvoláním na touhu trávit více času se svou rodinou oznámil [SCOPE.sCharacter('resigning_politician').GetHerHis] rezignaci na úřad [SCOPE.sCharacter('resigning_politician').GetPrimaryRoleTitle]."
 resignation.1.f: "Reakce na oznámení byly rozmanité. Stoupenci [SCOPE.sCharacter('resigning_politician').GetPrimaryRole.GetName] se snažili zadržet svou porážku a obavy. Opozice byla rozpolcena mezi projevy soucitu a nadšením z vyhlídky, že získá [SCOPE.sCharacter('resigning_politician').GetHerHis] křeslo. Pro personál domu to však znamenalo jen další dlouhý týden uhýbání novinářům a přesouvání nábytku."
 resignation.1.a: "Popřejte [SCOPE.sCharacter('resigning_politician').GetHerHis] nástupci pevné zdraví a štěstí."
 resignation.1.b: "Dlouhá řada katastrof dospěla ke konci."
 resignation.1.c: "Vyhlaste okamžité volby k sestavení nového kabinetu."
