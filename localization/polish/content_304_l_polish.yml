 election_generic.1.t: "Naléhavé otázky"
 election_generic.1.d: "Probíhající volby přitáhly pozornost k programům různých soupeřících stran. Po celé zemi [ROOT.GetCountry.GetName] voliči debatují, které straně stojí za to svěřit příští období ve vládě."
 election_generic.1.f: "„První, co beru v úvahu, je bezpečí mých investic. Pokud by nějaká strana představovala chaos, mohu ji bezpečně odepsat.“\n\nBurzovní makléř poklepal doutníkem o okraj popelníku a pokračoval. Novinář si během jeho řeči dělal poznámky.\n\n„Jak ovlivní celní politika nastupující vlády mé nezbytné dovozy? Chtějí uvalit daně, které mohou vyvolat nejistotu? Chtějí se pouštět do vojenských dobrodružství? Budou tato dobrodružství výnosná, nebo zhoubná? Je toho mnoho ke zvážení.“"
 election_generic.1.a: "Strana [SCOPE.sParty('party_1_scope').GetName] předkládá rozhodné argumenty."
 election_generic.1.b: "Voliči důvěřují politice strany [SCOPE.sParty('party_2_scope').GetName]."
 election_generic.1.c: "Politika strany [SCOPE.sParty('party_3_scope').GetName] má své přednosti."
 election_generic.1.e: "Nejlepší argumenty patří straně [SCOPE.sParty('party_4_scope').GetName]."
 election_generic.2.t: "Soutěž popularity"
 election_generic.2.d: "Zraky voličů se obrátily ke kandidátům, kteří se ucházejí o místo v čele vlády. S blížícími se volbami voliči debatují o tom, kdo by poskytl zemi [ROOT.GetCountry.GetName] nejlepší vedení."
 election_generic.2.f: "„[SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetLastNameNoFormatting] se mi docela líbí,“ uvažoval jeden z mužů u baru. „Nedokázal bych říct, v čem s [SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetHerHim] souhlasím, ale myslím, že [SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetSheHe] má dobrou hlavu na [SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetHerHis] ramenou.“\n\nJeho soused se ozval: „Dost dobrou na to, abys přehlédl společnost, kterou si drží?“\n\n„Proč ne? [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] ví, že totéž by se dalo říct o komkoli z nás. Nikdo si s hlupákem neporadí lépe než jeho přítel.“"
 election_generic.2.a: "[SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetFullName] je [SCOPE.gsInterestGroup('party_1_ig_scope').GetLeader.GetWomanMan] této chvíle."
 election_generic.2.b: "Období [SCOPE.gsInterestGroup('party_2_ig_scope').GetLeader.GetFullName] je to, co země potřebuje."
 election_generic.2.c: "[SCOPE.gsInterestGroup('party_3_ig_scope').GetLeader.GetFullName] má povahu pro tuto práci."
 election_generic.2.e: "[SCOPE.gsInterestGroup('party_4_ig_scope').GetLeader.GetFullName] stojí za vyslechnutí."
