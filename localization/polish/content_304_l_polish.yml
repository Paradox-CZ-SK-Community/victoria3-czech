 CHI_missionaries.1.t: "Misionářská činnost ve státě [SCOPE.sState('evangelisation_state').GetName]"
 CHI_missionaries.1.d: "Misionářská činnost víry [GetReligion('protestant').GetName] ve státě [SCOPE.sState('evangelisation_state').GetName] si začala nacházet nové posluchače, zatímco cizinci uplatňují svá práva na přístup do této oblasti."
 CHI_missionaries.1.f: "Diákon podle všeho, už jen podle toho, jak hrubě vyřezaný růženec mu visel kolem krku. Přesto jej vyrobil vlastní rukou a byl jeho pýchou a radostí při mnoha dobrodružstvích. Pevně jej sevřel, když vstoupil na cesty státu [SCOPE.sState('evangelisation_state').GetNameNoFormatting]. Dá-li Bůh, pomyslel si, i jedno vstřícné ucho by bylo vítaným přírůstkem do Ježíšova stáda."
 CHI_missionaries.1.a: "Hlasy ze vzdáleného světa."
 CHI_missionaries.1.b: "Své kázání by si měli odnést spolu se svým opiem."
 CHI_missionaries.2.t: "Porušení hranice ve státě [SCOPE.sState('forbidden_state').GetName]"
 CHI_missionaries.2.d: "Skupina misionářů víry [GetReligion('protestant').GetName] pocházejících ze země [SCOPE.sCountry('missionary_country').GetName] byla zadržena několik mil za hranicí provincie [SCOPE.sState('forbidden_state').GetName], kam mají cizinci zakázaný přístup."
 CHI_missionaries.2.f: "„Tohle je třináctý, kterého jsme chytili za stejný počet týdnů. Tenhle je první [SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting], který přišel po delší době.“\n\n„Počkej... podívej se na ty papíry. Tenhle je chráněný. Co můžeme dělat?“\n\n„Záleží na tom? Jen ztracený křesťan, který neumí číst. Platí náš zákon; jeho ne.“"
 CHI_missionaries.2.a: "Doveďte je k hranici a nechte je popravit."
 CHI_missionaries.2.b: "Uplatněte šestý článek našeho zákona proti pověře."
 CHI_missionaries.2.c: "Otevřete provincii omezenému cestování."
 deport_to_central_asia_tt: "Misionáři budou deportováni do státu [SCOPE.sState('deportation_state').GetName], kde budou sloužit jako otroci"
 CHI_missionaries.3.t: "Misionářská škola ve státě [SCOPE.sState('missionary_schools_state').GetName]"
 CHI_missionaries.3.d: "Misionáři víry [GetReligion('protestant').GetName] otevřeli ve státě [SCOPE.sState('missionary_schools_state').GetName] několik charitativních škol, které nabízejí vzdělání v západní náboženské a vědecké praxi."
 CHI_missionaries.3.f: "„Nazvu ji Svatého Judy. Pokud v Orientu nikdo jiný nevyslyší modlitby, ať dosáhnou k tomu, kdo bude hledat tak daleko.“\n\n„A ten svatý Juda? Kdo je? Myslel jsem, že to byl ten, kdo zradil vašeho Ježíše.“\n\n„Ne, ten druhý Juda. Ale je známý tím, že pomáhá beznadějným věcem. A tato škola navzdory všemu přece stojí.“"
 CHI_missionaries.3.a: "Mohou v oblasti působit."
 CHI_missionaries.3.b: "Zakažte našim občanům docházku."
 CHI_missionaries.4.t: "Misionářská nemocnice otevřena v [SCOPE.sState('missionary_hospitals_state').GetCityHubName]"
 CHI_missionaries.4.d: "Misionáři víry [GetReligion('protestant').GetName] otevřeli charitativní nemocnici v [SCOPE.sState('missionary_hospitals_state').GetCityHubName], šíří své evangelium a zároveň nabízejí bezplatnou léčbu nemocným a raněným."
 CHI_missionaries.4.f: "#bold Bůh vítá všechny ve svém domě uzdravení! #!\n\nNová nemocnice ve státě [SCOPE.sState('missionary_hospitals_state').GetNameNoFormatting] pro ty nejpotřebnější. Ježíš vítá všechny.\n\n#italic A zavolal k sobě svých dvanáct učedníků a dal jim moc nad nečistými duchy, aby je vyháněli a uzdravovali každou nemoc a každou chorobu. (Matouš 10:1) #!"
 CHI_missionaries.4.a: "Mohou v oblasti působit."
 CHI_missionaries.4.b: "Zastavte tuto nepovolenou stavbu."
 CHI_missionaries.5.t: "Misionáři zatčeni ve státě [SCOPE.sState('missionary_strife_state').GetName]"
 CHI_missionaries.5.d: "Místní úřady ve státě [SCOPE.sState('missionary_strife_state').GetName] zatkly několik [SCOPE.sCountry('missionary_country').GetAdjective] misionářů víry [GetReligion('protestant').GetName] za vyvolávání konfliktů s místními. Požádaly o pokyny, jak má být s cizinci naloženo."
 CHI_missionaries.5.f: "Zeleně odění strážní přinesli parfémovanou truhlu a postavili ji před spoutané misionáře. Jeden vypáčil víko a mávl rukou nad dokumenty uvnitř. Všichni misionáři kromě jednoho svraštili obočí a zavrtěli hlavou. Ten uprostřed sebou trhl: úhledné latinské písmo bylo nepochybně jeho. Mezi dopisy žádajícími kardinály o pomoc byly zprávy podrobně popisující zvyky místního magistráta."
 CHI_missionaries.5.a: "Vraťte je do nejbližší koncesní oblasti."
 CHI_missionaries.5.b: "Bude s nimi naloženo jako s každými jinými zločinci."
 warlord_china_events.200.t: "Století triumfu"
 warlord_china_events.200.d: "Období pečlivé modernizace a centralizačních snah konečně ukončilo riziko, že stát roztříští malicherný warlordismus. Navzdory úsilí vnitřních i vnějších nepřátel stojí [ROOT.GetCountry.GetName] nezlomena a sjednocena."
 warlord_china_events.200.f: "Tam na okraji obzoru, ozářené zapadajícím sluncem, byly poslední cizí lodě. Jejich barvy vlály na půl žerdi, jisté znamení, že prchají s ocasem staženým mezi nohy. Proti nim na moři vlála čínská vlajka vysoko na čínské půdě. Poselství světu bylo jasné: mandát Číny zůstává v jejích vlastních rukou. Její budoucnost povedou jen její lidé."
 warlord_china_events.200.a: "Stát, který přetrvá až do konce času."
 warlord_china_events.200.b: "Důvtip našeho lidu nás povede stále dál."
