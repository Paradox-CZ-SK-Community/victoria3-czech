 corporate_state.1.t: "Národní odbory"
 corporate_state.1.d: "Části skupiny [SCOPE.gsInterestGroup('trade_unions_ig').GetName] vyjádřily podporu oficiálnímu uznání práce v navrhovaném zákoně [SCOPE.sLaw('current_law_scope').GetName]. Slouží jako cenná protiváha komunistické opozici."
 corporate_state.1.d1: "Části skupiny [SCOPE.gsInterestGroup('trade_unions_ig').GetName] vyjádřily podporu oficiálnímu uznání role práce v našem státě. Slouží jako cenná protiváha komunistické opozici."
 corporate_state.1.f: "„Dnes samotná buržoazie projevuje sympatie a sklon, které nejsou nijak nelogické, k odborovému sdružování dělnické třídy. Inteligentnější části buržoazie by skutečně ochotně přijaly reformu státu a zastupitelského aparátu, aby poskytly větší prostor „apolitickým“ odborům, a dokonce i jejich nárokům vykonávat kontrolu nad výrobním systémem. Buržoazie cítí, že dokud lze činnost proletariátu omezit na bezprostřední hospodářské požadavky vznášené v jednotlivých odvětvích, pomáhá to chránit status quo a zabránit vzniku nebezpečného „politického“ vědomí...“" # - Amadeo Bordiga, Party and Class [1921]
 corporate_state.1.a: "Jejich podpora je vítána."
 corporate_state.1.b: "Využijte je k náboru do naší národní pracovní organizace."
 corporate_state.1.c: "Výborná příležitost zdiskreditovat naše odpůrce."
 corporate_state.2.t: "Socializace"
 corporate_state.2.d: "Části naší vlády začaly debatovat o znárodnění klíčových odvětví ve struktuře navrhovaného zákona [SCOPE.sLaw('current_law_scope').GetName]. Mnoho soukromých podnikatelů se proti návrhu ohradilo."
 corporate_state.2.f: "Vlastník továrny byl malý muž, jemuž na velikosti dodávaly podpatky, masitý obličej a působivý klobouk. Byl to zjevný přínos jeho šťastného postavení a skutečnost, které si byl hluboce vědom.\n\n„Byl jsem ševcem od třinácti,“ začal a divoce gestikuloval směrem k oknu do výrobní haly. „A můj učitel byl velký muž. Ve dvaceti jsem po něm zdědil obchod a o devět let později koupil tuto továrnu. Bez mě by toto město nebylo ničím. Rozumíte tomu? Tohle nebudu poslouchat. Nebudu.“"
 corporate_state.2.a: "Podpořte socializaci podniků s více než stovkou zaměstnanců."
 corporate_state.2.b: "Povzbuďte zakládání závodních rad ke koordinaci malých podniků."
 corporate_state.2.c: "Podpořte znárodnění výhradně zahraničních podniků."
 corporate_state.2.e: "Soukromé podnikání může řídit své vlastní záležitosti."
 corporate_state.3.t: "Nesmiřitelné rozdíly"
 corporate_state.3.d: "Zprávy o brutálním zneužívání práce v budově [SCOPE.sBuilding('relevant_building').GetName] ve státě [SCOPE.sState('relevant_state').GetName] se rozšířily po celé zemi. Disidenti na to poukazují jako na důkaz, že navrhovanému zákonu [SCOPE.sLaw('current_law_scope').GetName] vlády nelze důvěřovat, že ochrání práva pracovníků."
 corporate_state.3.f: "„Každý den slýcháme příběhy o našich třídních bratrech, kteří přicházejí o život, ať už zcela, nebo zčásti, kvůli drancování ze strany zaměstnavatelů. Na toto pozorování zaměstnavatelé odpovídají, že i oni nesou břemeno a že zajišťují nás stejně, jako my zajišťujeme je. Proč tedy nikdy neslyšíme o vlastnících, kteří přijdou o prsty nebo o zrak? Proč umírají v pětašedesáti, zatímco my umíráme ve třiceti? Stalo se rutinou, že naše mrtvoly jsou vyváženy z jejich továren, zatímco to nejhorší, co může potkat je, je stát se jedněmi z nás!“"
 corporate_state.3.a: "Oznamte právní kroky proti vlastníkům."
 corporate_state.3.b: "Potlačte tento příběh dříve, než se rozšíří dál."
 corporate_state.3.c: "Co nám záleží na nějakých povalečích kultury [SCOPE.sPop('relevant_pop').GetCulture.GetName]?"
 corporate_state.4.t: "Zbytková kategorie"
 corporate_state.4.d: "Viditelným zvýhodňováním odvětví zaměstnanosti považovaných za produktivní vláda úspěšně vybudovala podporu pro zavedení zákona [SCOPE.sLaw('current_law_scope').GetName]. Jejich odpůrci byli odsouzeni jako neproduktivní a parazitičtí."
 corporate_state.4.f: "„Když se analyzuje souhrn výroby v kapitalistické ekonomice, dospěje se k závěru, že existují dvě hlavní kategorie, do nichž lze populaci rozdělit. Produktivní kategorie – ti, kdo vytvářejí materiální proměny přírody – a zbytková kategorie, ti, kdo to nedělají. První vytváří hodnotu, druhá ji nenasytně spotřebovává.\n\nTato druhá kategorie v kapitalistické společnosti zahrnuje samotné kapitalisty, byrokraty všeho druhu, bezpečnostní síly, úředníky, odborníky a „pracovníky služeb“. První kategorie ospravedlňuje svou existenci vytvářením podmínek k vlastní reprodukci – ale jak to dělá ta druhá?“" #- Incorporates a heavily altered quote from Lyndon LaRouche's Dialectical Economics
 corporate_state.4.a: "Kvalitní práce je tradicí kultury [SCOPE.sCulture('primary_culture_scope').GetName]."
 corporate_state.4.b: "Za poctivý režim produktivních tříd!"
 corporate_state.5.t: "Nominační orgány"
 corporate_state.5.d: "Zatímco vláda debatuje o zavedení zákona [SCOPE.sLaw('current_law_scope').GetName], různé organizace předložily své požadavky na větší zastoupení v korporativních orgánech. Patří mezi ně dělnické organizace, sdružení zaměstnavatelů a univerzity."
 corporate_state.5.f: "Schéma, které zastánci zákona vytvořili, bylo úchvatné na pohled. Stěna černého inkoustu, seznamy všech oficiálně uznaných odborů a zaměstnavatelských konfederací země [ROOT.GetCountry.GetAdjectiveNoFormatting]. Čáry je spojovaly s dvaadvaceti velkými bloky, všechny uspořádané pod několika koordinačními orgány a navrhovanou radou ministrů. Každý prozatímní radní, který na to pohlédl, měl stejnou myšlenku – jak by mohl prázdná místa zaplnit vlastními jmény?"
 corporate_state.5.a: "Zvýhodněte pracovní organizace a skupinu [SCOPE.gsInterestGroup('trade_unions_ig').GetName]."
 corporate_state.5.b: "Podporujte sdružení zaměstnavatelů a skupinu [SCOPE.gsInterestGroup('industrialists_ig').GetName]."
 corporate_state.5.c: "Podpořte nabídku univerzit a skupinu [SCOPE.gsInterestGroup('intelligentsia_ig').GetName]."
 corporate_state.5.e: "V nominačním procesu nebudeme nikomu nadržovat."
 on_enactment_trade_unions_bonus_tt: "Po přijetí tohoto zákona získá skupina [SCOPE.gsInterestGroup('trade_unions_ig').GetName] bonus k [concept_political_strength], dokud bude zákon aktivní"
 on_enactment_industrialists_bonus_tt: "Po přijetí tohoto zákona získá skupina [SCOPE.gsInterestGroup('industrialists_ig').GetName] bonus k [concept_political_strength], dokud bude zákon aktivní"
 on_enactment_intelligentsia_bonus_tt: "Po přijetí tohoto zákona získá skupina [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] bonus k [concept_political_strength], dokud bude zákon aktivní"
 corporate_state_trade_unions_bias_tt: "Skupina [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] získá bonus k [concept_political_strength], dokud bude tento zákon aktivní"
 corporate_state_industrialists_bias_tt: "Skupina [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] získá bonus k [concept_political_strength], dokud bude tento zákon aktivní"
 corporate_state_intelligentsia_bias_tt: "Skupina [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] získá bonus k [concept_political_strength], dokud bude tento zákon aktivní"
 corporate_state.6.t: "Nezpůsobilí vést"
 corporate_state.6.d: "Návrh na zavedení zákona [SCOPE.sLaw('current_law_scope').GetName] narazil na odpor skupiny [SCOPE.gsInterestGroup('relevant_ig').GetName], která tvrdí, že návrh umožní nekvalifikovaným pracovníkům získat příliš velkou kontrolu nad jejich podniky."
 corporate_state.6.f: "„Co si pamatuji, drželi jsme se stejné smlouvy. Poskytujeme vedení těm, kdo pro nás pracují, a kvalita tohoto vedení závisí na mém uvážení. Mám to štěstí, že už čtyřicet let pracuji v oboru výroby nábytku... ti lidé, kterým chcete dát stejnou autoritu jako mně, kolik z nich je gramotných? Kolik z nich má titul?“\n\nÚředník za stolem přikyvoval, zatímco majitel mluvil, s nakrčeným čelem. Tento muž se cítí ohrožen, připomněl si, a má ty nejlepší úmysly. Zda to byla pravda, nebo ne, bylo nepodstatné – právě tato mantra jej držela ve středu.\n\n„Pojďme tedy probrat vaše současné střední vedení?“"
 corporate_state.6.a: "Ujistěte je o našem závazku k právům soukromého vlastnictví."
 corporate_state.6.b: "Vydejte pro tyto podniky výjimku."
 corporate_state.6.c: "Nemají právo mluvit o kvalifikaci."
 corporatist_leaders_boost_tt: "Skupina [SCOPE.gsInterestGroup('trade_unions_ig').GetName] bude častěji vybírat postavy s ideologií [GetIdeology('ideology_corporatist').GetName]"
 every_investing_country_upset_tt: "Vztahy s každou zemí, která vlastní více než #b 1 %#! našeho celkového [concept_gdp], se zhorší o #r 15#!"
 je_reunify_china: "Éra militaristů"
 je_reunify_china_reason: "Kolaps autority ústřední vlády vedl k vzestupu různých soupeřících vojenských mocností napříč Čínou. Máme-li obnovit Čínu z ruin, musíme se prosadit jako něco víc než jen další #bold $gov_warlord_state$#!.\n\nDokud je tento [concept_journal_entry] aktivní, méně mocné militaristické státy si budou pravděpodobněji pomáhat proti mocnějším státům."
 warlord_china_events.101.t: "Sjednocení Číny"
 warlord_china_events.101.d: "Díky píli našeho lidu a statečnosti našich vojáků byly poslední armády militaristů poraženy nebo donuceny k poslušnosti. [ROOT.GetCountry.GetName] byla znovu sjednocena, silnější než kdy dřív."
 warlord_china_events.101.f: "Nikdy neviděla na obloze tolik světla. Moře rudých, žlutých a růžových jisker proměnilo noc v den, prokládané výbuchy dalších ohňostrojů. V ulicích pod jejím domem sousedé vypouštěli lucerny ve velkých zářících hejnech, která se ve výšce setkávala s ohňostroji.\n\nSlavnost nakonec samozřejmě skončí kvůli omezeným zásobám a potřebě spánku, ale příležitost, kterou symbolizovala, nikoli. Čína byla opět jednotná – nedělitelná, svrchovaná a věčná."
 warlord_china_events.101.a: "Náš národ musí být navždy nedělitelný."
 warlord_china_events.101.b: "Věnujme veškeré své úsilí obnově."
 modifier_chinese_warlord_era: "Éra militaristů"
 modifier_end_of_warlord_period: "Znovusjednocená Čína"
