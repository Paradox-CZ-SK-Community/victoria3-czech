 je_sale_of_alaska_reason: "[SCOPE.sState('alaska_scope').GetName], izolované území na okraji země [SCOPE.sCountry('alaska_owner_scope').GetName], se v posledních letech ocitlo pod hrozbou zabrání nepřátelskými cizími mocnostmi.\n\nAby z tohoto území vytěžili alespoň nějaký zisk a vyhnuli se ponížení, že by je v případě války zabrali naši nepřátelé, úředníci ve vládě [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] navrhli najít pro [SCOPE.sState('alaska_scope').GetName] kupce."
