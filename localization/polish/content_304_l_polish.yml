 je_confederation_of_the_rhine: "Rýnský spolek"
 je_confederation_of_the_rhine_reason: "V letech 1806 až 1813 byly německé státy z vůle Napoleona Bonaparta sjednoceny pod jedinou vládou – #bold Rýnským spolkem#!. Tato konstrukce upevnila Napoleonovu nepřímou kontrolu nad Německem a omezila moc #bold Pruska#! i #bold Rakouska#!. Obnovení tohoto uspořádání zajistí moc země [SCOPE.sCountry('rhine_overlord').GetName] v Německu a odvrátí plán na nekontrolovatelné sjednocené Německo."
 rhine_formed_tt: "Podpořili jsme vytvoření #bold Rýnského spolku#! jako závislé země [SCOPE.sCountry('rhine_overlord').GetAltAdjective('G')]"
 je_confederation_of_the_rhine_confederate_button: "Zorganizovat konfederaci"
 je_confederation_of_the_rhine_confederate_button_desc: "Naše kontrola nad vybranými německými politickými celky nám umožňuje reorganizovat toto území v obnovený a racionalizovaný #bold Rýnský spolek#!, čímž zastavíme pruské či rakouské ambice v oblasti."
