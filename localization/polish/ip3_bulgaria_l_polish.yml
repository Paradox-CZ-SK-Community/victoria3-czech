 je_prussia_of_the_balkans: "Prusko Balkánu"
 je_prussia_of_the_balkans_desc: "[concept_army_power_projection] je [SCOPE.GetRootScope.GetCountry.GetArmyPowerProjection|0] / 1000"
 je_prussia_of_the_balkans_reason: "Bulharská říše se kdysi rozprostírala od Černého moře až k Jónskému a Egejskému moři. Náš lid je odhodlán obnovit naši někdejší slávu. \n\nNáš nově znovuzrozený národ se nemůže spoléhat na pomoc silných mužů zpoza našich hranic. Prostřednictvím technologie, síly zbraní a pouhých počtů vybudujeme armádu, která dokáže chránit naši nezávislost, naše zájmy i naše ambice."
 bularia_military_progress_bar: "Síla armády"
 bularia_military_progress_bar_desc: "[concept_army_power_projection]: [SCOPE.GetRootScope.GetCountry.GetArmyPowerProjection|0] / 1000"
 bularia_military_progress_tt: "[SCOPE.GetRootScope.GetCountry.GetNameNoFlag] má [concept_army_power_projection] alespoň #variable [GetPlayer.MakeScope.Var('army_projection_target').GetValue|0] #!"
 bulgaria_events.1.t: "Prusko Balkánu"
 bulgaria_events.1.d: "Ostatní národy, ohromené velikostí a silou naší armády, nás znají jako „Prusko Balkánu“. Zbývá už jen rozhodnout, kam mají naši vojáci pochodovat."
 bulgaria_events.1.f: "„I kdyby mi usekli hlavu, stále budu volat: „Ať žije Bulharsko!““ \n\n - Nikolaj Chajtov"
 bulgaria_events.1.a: "Pochodujeme na Carigrad!"
 bulgaria_events.1.b: "Pouze ve sjednoceném jugoslávském národě můžeme být skutečně svobodní!"
 bulgaria_events.1.c: "Toto je začátek bulharské renesance!"
 bulgaria_pursued_greater_yugoslavism_tt: "Usilovali jsme o #v Velký jugoslavismus#! v události #v $bulgaria_events.1.t$#!"
 bulgaria_unlock_yugoslavia_tt: "Budeme moci vytvořit #v $YUG$#!"
 bulgarian_empire_homeland_tt: "[GetStateRegion('STATE_MACEDONIA').GetName], [GetStateRegion('STATE_EASTERN_SERBIA').GetName] a [GetStateRegion('STATE_EASTERN_THRACE').GetName] se po získání stanou [GetCulture('bulgarian').GetName] [Concept('concept_homeland','$concept_homelands$')]"
 bulgarian_empire_claims_tt: "[ROOT.GetCountry.GetName] získá [concept_claim] na každý nevlastněný [concept_state] v [GetGeographicRegion('geographic_region_greater_bulgaria').GetName]"
 bulgaria_events.2.t: "Konečně svobodní"
 bulgaria_events.2.d: "Bulharsko se konečně stalo nezávislým národem. Kdo by nám měl vládnout skrze zmatky změn vstříc prosperující budoucnosti?"
 bulgaria_events.2.f: "„Princ Ferdinand, který byl Koburkem, byl bratrancem mého otce, a pamatuji si, jak ten po návratu do hotelu říkal, že jako nejmladší ze své rodiny byl přirozeně považován za hlupáka. „Ale,“ řekl můj otec, „na rodinného hlupáka si nevedl vůbec špatně a nepřekvapilo by mě, kdyby jim všem dokázal opak.““ \n\n— Lady Helena Gleichen"
 bulgaria_events.2.a: "Podpořit carova synovce."
 bulgaria_events.2.b: "Podpořit Ferdinanda."
 bulgaria_events.2.c: "Žádní králové, zvolíme muže z lidu."
 bulgaria_events.2.e: "Sbor povede neposkvrněný a neznámý hlas."
 bulgaria_events.2.g: "Z řad šlechty musí povstat kníže."
 bul_random_leader_tt: "Zvolíme vůdce z lidu!"
 bul_random_leader_monarch_tt: "Korunujeme nového knížete z aristokracie"
 bulgaria_events.3.t: "[SCOPE.sCulture('rebel_culture').GetName] hrůzy"
 bulgaria_events.3.d: "Noviny po celém světě informují o válečných zločinech, které naši vojáci spáchali během nedávného konfliktu s [SCOPE.sCulture('rebel_culture').GetName] rebely."
 bulgaria_events.3.f: "Počet dětí zabitých při těchto masakrech je obrovský. Často byly napichovány na bajonety a máme několik vyprávění očitých svědků, kteří viděli malé nemluvňata nesená ulicemi, zde i v Olluk-Kni, na hrotech bajonetů.\n\n— J. A. MacGahan, #italic The Daily News. #!"
 bulgaria_events.3.a: "To jsou hrůzné lži!"
 bulgaria_events.3.b: "Veřejně oběsit [SCOPE.sCharacter('scapegoat').GetFullName] za tyto zločiny."
 bulgaria_events.3.c: "Naše kontakty v [SCOPE.sCountry('closest_great_power').GetNameNoFlag] se za nás zaručí."
 bulgaria_events.3.e: "Příští rebelové dopadnou mnohem hůř."
 ai_strategy_prussia_of_the_balkans: "$je_prussia_of_the_balkans$"
 ai_strategy_prussia_of_the_balkans_desc: "$je_prussia_of_the_balkans_reason$"
 TUR_how_to_play_bulgaria_tt: "Chcete-li hrát za #v $BUL_ADJ_A$#!, propusťte jej jako nezávislou [concept_country] nebo se postavte na stranu [GetCulture('bulgarian').GetName] [concept_secession]"
 bulgaria_proclaim_empire: "Vyhlásit $dyn_c_bulgarian_empire_adj_A$"
 bulgaria_proclaim_empire_desc: "Po dobytí Konstantinopole, římského císařského hlavního města, budeme konečně moci upevnit legitimitu a postavení bulharského carství na vrcholu národů východního křesťanstva."
 bulgarian_empire_tt: "Budeme známi jako #v $dyn_c_bulgarian_empire$#! a získáme novou vlajku a barvu na mapě"
