l_polish:
 je_mughal_hindustan: "Vězeň Červené pevnosti"
 je_mughal_hindustan_reason: "Páni země [SCOPE.sCountry('mughal_scope').GetName] kdysi vládli od Kábulu až po karnátacké pobřeží, ale tento zlatý věk je už dávno pryč. Moc země [SCOPE.sCountry('bic_scope').GetName] vytrvale roste a každý rok si osobuje nové výsady, zatímco našemu dvoru upírá stále více autority, prestiže a tradic, kterým se kdysi těšil. Velcí potomci Tímúra nyní sotva vládnou za zdmi dillíské Červené pevnosti!\n\n#N #bold Musíme jednat, abychom zachránili [SCOPE.sCountry('mughal_scope').GetNameNoFormatting], jinak upadne v zapomnění.#!#!"
 mughal.1.t: "Dědičné křivdy" # You don't need to make this a pun in other languages if you don't want to.
 mughal.1.d: "V roce 1835 britští agenti trvali na tom, aby [SCOPE.sCharacter('akbar_ii').GetPrimaryRoleTitle] [SCOPE.sCharacter('akbar_ii').GetFirstName] uznal [SCOPE.sCharacter('bahadur_ii').GetPrimaryRoleTitle] [SCOPE.sCharacter('bahadur_ii').GetFirstName] za [SCOPE.sCharacter('akbar_ii').GetHerHis|l] dědice, navzdory přání [SCOPE.sCharacter('akbar_ii').GetPrimaryRoleTitle] jmenovat svým následníkem trůnu Mirzu #tooltippable_name #bold Salima#!#!, [SCOPE.sCharacter('akbar_ii').GetHerHis|l] churavého osmého syna. Některé kruhy u dvora naléhaly na [SCOPE.sCharacter('akbar_ii').GetFirstNameNoFormatting], aby toto rozhodnutí ještě naposledy napadl."
 mughal.1.f: "„Podívejte se na sebe!“ zahřměl dvořan, rozhořčený. „Podívejte se na toto místo! Spočívají zde stovky let moci a slávy! V žilách vám koluje Tímúrova krev! A přesto tu sedíte, pokorný, a necháte jakéhosi agenta v Kalkatě určovat vaše vlastní nástupnictví! Nejste snad císař? #bold Velcí muži musí konat velké věci!#!“"
 mughal.1.a: "Rozhodnutí země [SCOPE.sCountry('probably_east_india_company_scope').GetName] je konečné."
 mughal.1.b: "[SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] názor budiž zatracen, #bold Mirza Salim#! #italic bude#! dědicem."
 mirza_salim_succeeds: "#tooltippable_name Salim Gurkáni#! nahradí [SCOPE.sCharacter('bahadur_ii').GetFullName] jako [SCOPE.sCharacter('bahadur_ii').GetPrimaryRoleTitle]. Je #P mladší#! a #P ambicióznější#! než Bahadur, ale je #N churavý#!."
 mirza_salim_will_probably_die: "Stres z tohoto odmítnutí zhorší nemoc churavého #bold Mirzy Salima#! a pravděpodobně ho zabije."
 notification_mirza_salim_has_died_name: "Mirza Salim zemřel."
 notification_mirza_salim_has_died_desc: "#bold Mirza Salim#!, smutný a sklíčený, zemřel na vřed."
 notification_mirza_salim_has_died_tooltip: "#header $mirza_salim_has_died_name$#!\n$TOOLTIP_DELIMITER$\n$mirza_salim_has_died_desc$"
 assertive_mughals: "Rázní Mughalové"
 belated_british_interference: "Opožděné britské vměšování"
 notification_mughals_pick_own_successor_name: "[SCOPE.sCountry('hindustan').GetName] ignoruje náš diktát!"
 notification_mughals_pick_own_successor_desc: "[SCOPE.sCharacter('akbar_ii').GetPrimaryRoleTitle] [SCOPE.sCharacter('akbar_ii').GetFirstName] ze země [SCOPE.sCountry('hindustan').GetName] odmítl naše dřívější rozhodnutí a jmenoval [SCOPE.sCharacter('crown_prince_mirza_salim').GetFullName] svým dědicem."
 notification_mughals_pick_own_successor_tooltip: "#header $mughals_pick_own_successor_name$#!\n$TOOLTIP_DELIMITER$\n$mughals_pick_own_successor_desc$"
 mughal.4.t: "Žádost vetřelcům"
 mughal.4.d: "Průtahy při prosazování zákona [SCOPE.sLaw('current_law_scope').GetName] vyvolaly u dvora nesmírnou frustraci. Je možné požádat o přímluvu země [SCOPE.sCountry('probably_east_india_company_scope').GetName], ale to by v podstatě znamenalo postoupit zemi [SCOPE.sCountry('probably_east_india_company_scope').GetNameNoFormatting] další zákonodárné pravomoci."
 mughal.4.f: "Agent [SCOPE.sCharacter('probably_bic_governor_general').GetPrimaryRoleTitle] prostě stál #italic přímo tam#!, neříkal vůbec nic, a přitom říkal vše, co bylo třeba říci. [SCOPE.sCharacter('hindustan_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('hindustan_ruler').GetFirstNameNoFormatting] po něm nervózně pokukoval, zatímco v [SCOPE.sCharacter('hindustan_ruler').GetHerHis|l] rukou držel sporný výnos. Bylo by tak jednoduché požádat ho o jedinou laskavost! [SCOPE.sCharacter('hindustan_ruler').GetHerHim|l] by to nestálo nic – ale [SCOPE.sCharacter('hindustan_ruler').GetSheHe|l] věděl, že říši by to stálo všechno."
 mughal.4.a: "Požádejte zemi [SCOPE.sCountry('probably_east_india_company_scope').GetName] o rozhodnutí"
 mughal.4.b: "Tento zákon je pro [SCOPE.sCountry('hindustan').GetNameNoFormatting] a bude vydán pouze zemí [SCOPE.sCountry('hindustan').GetNameNoFormatting]!"
 governor_general_rules_in_favor_of_law: "Přízeň generálního guvernéra"
 government_reliant_on_bic: "Cena závislosti"
 mired_in_court_intrigue: "Zabřednutí do dvorských intrik"
 mug_independent_lawmakers: "Nezávislí zákonodárci"
 mughal.5.t: "Nátlak kvůli apanáži"
 mughal.5.d: "Teoreticky [SCOPE.sCountry('hindustan').GetName] stále ovládá řadu výnosných území, která lze zdanit, ale v praxi má sotva jakýkoli vliv za hranicemi Dillí. Jediným způsobem, jak zvýšit příjmy, je k velkému zahanbení dvora požádat o vyšší apanáž z pokladen země [SCOPE.sCountry('probably_east_india_company_scope').GetName]. Pro [SCOPE.sCountry('probably_east_india_company_scope').GetCapital.GetCityHubName] to může být maličkost, ale pro [SCOPE.sCountry('hindustan').GetCapital.GetCityHubName] jde o vážnou částku."
 mughal.5.f: "„Daně!“ zasmál se [SCOPE.sCharacter('hindustan_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('hindustan_ruler').GetFirstNameNoFormatting]. „Daně!“ [SCOPE.sCharacter('hindustan_ruler').GetSheHe|U] se na [SCOPE.sCharacter('hindustan_ruler').GetHerHis] trůně zakymácel a ještě chvíli se pochechtával.\n\n[SCOPE.sCharacter('hindustan_ruler').GetSheHe|U] mávl k mramorovým stěnám kolem [SCOPE.sCharacter('hindustan_ruler').GetHerHim|l]. „Co máme danit? Kameny?“ [SCOPE.sCharacter('hindustan_ruler').GetSheHe|U] zavrtěl [SCOPE.sCharacter('hindustan_ruler').GetHerHis|l] hlavou. „Ne, věci se tu mění v prach, ne ve zlato. Musíme se poohlédnout jinde.“ [SCOPE.sCharacter('hindustan').GetSheHe|U] pokynul písaři. Nastal čas se před [SCOPE.sCountry('probably_east_india_company_scope').GetNameNoFormatting] opět pokořit."
 mughal.5.a: "Apanáž je nezbytná, abychom udrželi naše finance v pořádku."
 mughal.5.b: "Je lepší být bez peněz než být zavázán zemi [SCOPE.sCountry('probably_east_india_company_scope').GetNameNoFormatting]."
 reliant_on_temporary_stipend: "Dvůr spoléhá na cizí peníze"
 proudly_poor: "Hrdě chudý dvůr"
 mughal.6.t: "[SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] společnost pro Indii"
 mughal.6.d: "Reformátoři ze země [SCOPE.sCountry('probably_britain_scope').GetName] projevili zájem o naše záležitosti, o zacházení země [SCOPE.sCountry('probably_east_india_company_scope').GetName] s námi a obecněji o blaho Indie. Kontakt s nimi by nám mohl získat podporu v zemi [SCOPE.sCountry('probably_britain_scope').GetNameNoFormatting], ale pokud budou působit zde, mohou mezi našimi intelektuály podnítit radikální myšlenky."
 mughal.6.f: "[SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] muž se nervózně zavrtěl, nesvůj pod mramorovými klenbami audienční síně. „Procestoval jsem Indii křížem krážem, [SCOPE.sCharacter('hindustan_ruler').GetPrimaryRoleTitle],“ začal, „a zjistil jsem, že rozsah nerovnosti, naprostá bezcitnost vlády země [SCOPE.sCountry('probably_britain_scope').GetNameNoFormatting]“ – úsměv [SCOPE.sCharacter('hindustan_ruler').GetFirstNameNoFormatting] pohasl – „volá po nejvyšší spolupráci a podpoře každého ochotného člena [SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] společnosti, aby napomohl věci reformy a emancipace v Indii.“\n\n[SCOPE.sCharacter('hindustan_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('hindustan_ruler').GetFirstNameNoFormatting] si postavu před [SCOPE.sCharacter('hindustan_ruler').GetHerHim] měřil. Mohl by být mocným spojencem, ale stejně tak bylo docela možné, že svými reformistickými řečmi jen rozjitří vášně v [SCOPE.sCountry('hindustan').GetCapital.GetCityHubName] a vládě situaci zhorší. Stál tento [SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] muž za to riziko?"
 mughal.6.a: "Podpořme kontakty s [SCOPE.sCountry('probably_britain_scope').GetAdjective] reformátory."
 mughal.6.b: "Věc [SCOPE.sIdeology('potentially_swayed_mug_ideology').GetName] by způsobila více potíží, než by vyřešila."
 mughal.6.c: "Využijte vazby [SCOPE.sPoliticalLobby('pro_probably_britain_lobby_scope').GetName] k upoutání pozornosti na naši věc v zemi [SCOPE.sCountry('probably_britain_scope').GetNameNoFormatting]."
 british_india_society_support: "Podpora Společnosti pro Indii"
 ideology_surge_in_popularity: "Prudký nárůst popularity ideologie"
 ig_mug_slavers_pleased: "Otrokaři potěšeni"
 britains_baleful_eye: "Nevítaná pozornost mateřské země"
 mughal_6_slavers_offended: "[SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] reformátoři pobouřili podporovatele otroctví v [SCOPE.sCountry('hindustan').GetCapital.GetCityHubName]."
 mughal_6_moderate_swayed_to_ideology: "[SCOPE.sCharacter('potentially_swayed_mug_politician').GetFullName] přechází k věci [SCOPE.sIdeology('potentially_swayed_mug_ideology').GetName]."
 mughal_6_overlord_pleased_at_discretion: "[SCOPE.sCountry('probably_east_india_company_scope').GetNameNoFormatting] si oddechla, že jste se rozhodli nerozvířit vody."
 notification_britain_hindustan_intervention_name: "[SCOPE.sCountry('probably_britain_scope').GetName] podporuje [SCOPE.sCountry('hindustan').GetAdjective] reformátory"
 notification_britain_hindustan_intervention_desc: "Reformátoři podporovaní zemí [SCOPE.sCountry('hindustan').GetName] způsobili, že [SCOPE.sCountry('probably_britain_scope').GetName] nad námi dočasně zpřísnila kontrolu a donutila nás povolit sevření našich poddaných. Ta drzost!"
 notification_britain_hindustan_intervention_tooltip: "#header $notification_britain_hindustan_intervention_name$#!\n$TOOLTIP_DELIMITER$\n$notification_britain_hindustan_intervention_desc$"
 mughal.7.t: "Paví trůn vylétá z klece"
 mughal.7.d: "Díky politikaření, intrikám a zásahu shora získala země [SCOPE.sCountry('mughal_scope').GetName] svobodu od země [SCOPE.sCountry('bic_scope').GetName]. [SCOPE.sCountry('mughal_scope').GetCapital.GetCityHubName] víří oslavami vlády [SCOPE.sCharacter('hindustan_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('hindustan_ruler').GetFirstName]."
 mughal.7.f: "„Pane, pohleďte! Dobrota a víra, věrnost i láska, to vše se vrátilo do této požehnané země!“ zvolal ctižádostivý básník.\n\nStařec v publiku se mdle usmál, zatímco mladík poskakoval svými verši. Bylo sice pěkné a dobré, že [SCOPE.sCountry('mughal_scope').GetNameNoFormatting] je svobodný, ale věděl, že říše ještě zdaleka není v bezpečí. Otcové a synové si šli po krku, bratr bojoval s bratrem a jednota byla po celé Indii podkopána.\n\nPřesto si pomyslel, když se na polštářích zavrtěl a bard dál monotónně přednášel, že navzdory této zlověstné atmosféře soudný den nepřišel a poslední polnice nezazněla. Kdo koneckonců ví, kdo drží otěže poslední katastrofy? Lepší je oslavovat radosti, které jsou teď, než se tím vším trápit." # with apologies to Mirza Ghalib and his fine work, the Chiragh-i-Dair
 mughal.7.a: "Celá Indie bude v nové zemi [SCOPE.sCountry('mughal_scope').GetNameNoFormatting] vítána."
 mughal.7.b: "Králi králů, nejmocnější z vládců, budeme na tebe pamatovat!"
 mughal.7.c: "Plamen ambicí, dlouho doutnající, nyní burácí!"
 mughal.7.dd: "Nyní je čas napravit vše, co země [SCOPE.sCountry('bic_scope').GetNameNoFormatting] nechala hnít."
 mughal_7_annex_up_to_3_immediate_neighbors: "Až #bold #green 3#!#! sousední země se sdíleným rysem #bold původu#! a #green #bold srdečnými#!#! vztahy či lepšími budou anektovány zemí [SCOPE.sCountry('mughal_scope').GetNameNoFormatting]."
 mughal_7_annex_up_to_2_immediate_neighbors: "Až #bold #green 2#!#! sousední země se sdíleným rysem #bold původu#! a #green #bold srdečnými#!#! vztahy či lepšími budou anektovány zemí [SCOPE.sCountry('mughal_scope').GetNameNoFormatting]."
 liberator_of_hindustan: "Osvoboditel Hindustánu"
 scion_of_the_liberator: "Potomek osvoboditele"
 mug_unshackled_governance: "Osvobozená vláda"
 je_india_non_cooperation_movement: "Hnutí nespolupráce"
 je_india_non_cooperation_movement_reason: "Národní hnutí v zemi [SCOPE.sCountry('india_scope').GetName] nabírá na síle a jeho vůdci přišli s novou kampaní s jasným cílem: ekonomickou a politickou nespoluprací, odmítáním spolupráce s [SCOPE.sCountry('probably_britain_scope').GetAdjective] úřady. Doufají, že sílu svého hnutí prokážou ochromením [SCOPE.sCountry('probably_britain_scope').GetAdjectiveNoFormatting] obchodu se zbožím [SCOPE.sGoods('british_trade_route_goods').GetName] se zemí [SCOPE.sCountry('india_scope').GetNameNoFormatting]."
 national_swadeshi_movement: "Národní svadéšské hnutí"
 india_non_cooperation_violence_escalates_tt: "Pokud radikalismus hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] dosáhne #warning 75#! nebo více, může se Hnutí nespolupráce uchýlit k násilí a skončit."
 india_non_cooperation.1.t: "Hnutí nespolupráce"
 india_non_cooperation.1.d: "[SCOPE.sCountry('probably_britain_scope').GetAdjective] obchod se zbožím [SCOPE.sGoods('british_trade_route_goods').GetName] je terčem ambicí hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName]: [SCOPE.sCountry('india_scope').GetName] nezůstane poddanou země [SCOPE.sCountry('probably_britain_scope').GetNameNoFormatting] a jejího obchodního impéria!"
 india_non_cooperation.1.f: "Zasedací síň byla přeplněná muži a tak stísněná, že se zdálo až neuvěřitelné, že řečník může stát vzpřímeně, aniž by narazil do stropu. Navzdory hrozným podmínkám jeho hlas prořízl dusný vzduch jako nůž:\n\n„Skrze soběstačnost můžeme získat svou autonomii i nezávislost. Naše cíle jsou jednoduché: chceme to, co nám patří, a chceme bojkotovat to, co naší zemi nepatří.“"
 india_non_cooperation.1.a: "Toto hnutí musí být pečlivě sledováno."
 india_bar_advance_10_tt: "#b Ukazatel postupu#! #v $je_india_nationalism_britain$#! postoupí o #v 10#!"
 india_non_cooperation.1.b: "Možná nějaký čas ve vězení pomůže [SCOPE.sCharacter('indian_independence_movement_agitator').GetFullName] přehodnotit toto hnutí."
 india_non_cooperation.2.t: "Nespolupráce v zemi [SCOPE.sCountry('india_scope').GetName]"
 india_non_cooperation.2.d: "Nacionalističtí agitátoři v zemi [SCOPE.sCountry('india_scope').GetName] se zapřisáhli, že budou bojkotovat naše zboží. Pokud uspějí, naše pokladna neutrpí, ale naše postavení u [SCOPE.sCountry('india_scope').GetAdjectiveNoFormatting] jistě klesne."
 india_non_cooperation.2.f: "Kouř se vznášel mezi krokvemi, zatímco prošedivělá postava v brýlích monotónně předčítala hlášení. Byla slyšet slova „[SCOPE.sCountry('india_scope').GetNameNoFormatting]“ a „agitace“, ale z jejího mumlání se dalo pochopit jen sotva co dalšího. Záleželo na tom však? Impérium si vedlo dobře."
 india_non_cooperation.2.a: "Jsem si jistý, že se na to někdo podívá."
 india_non_cooperation.3.t: "Hartál!"
 india_non_cooperation.3.d: "Dělníci v [SCOPE.sState('hartal_state').GetName], pohnutí k činu agitací hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName], odložili nástroje a opustili pracoviště. Celá oblast stávkuje!"
 india_non_cooperation.3.f: "Písař vtrhl do úřadu magistráta, lapal po dechu a ztěžka oddychoval. „P-pane!“ zakoktal, „přestali pracovat, pane!“\n\nStarý magistrát se zamračil. „Kdo přestal pracovat?“\n\n„Všichni, pane, všichni ve státě [SCOPE.sState('hartal_state').GetNameNoFormatting]!“\n\n„Dobrý Bože! Je to #italic povoleno#!?“"
 india_non_cooperation.3.a: "Tato pracovní akce je urážkou řádné vlády!"
 india_non_cooperation.3.b: "Možná je čas vyjednávat s hnutím [SCOPE.sPoliticalMovement('indian_independence_movement').GetName]."
 hartal_action: "Hartálové stávky"
 hartal_negotiating_with_leaders: "Hartálová vyjednávání"
 india_non_cooperation.4.t: "Svadéšské protesty"
 india_non_cooperation.4.d: "Vůdci hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] v [SCOPE.sState('swadeshi_state').GetName] povzbuzují lidi, aby vyráběli vlastní zboží a spotřebovávali pouze místně vyráběné produkty. Cla a daně prudce klesají!"
 india_non_cooperation.4.f: "„Můj nacionalismus je tak široký jako má soběstačnost!“ zaburácel řečník. „Chci, aby duch země [SCOPE.sCountry('india_scope').GetNameNoFormatting] povstal, aby z něj mohl těžit celý svět.“"
 india_non_cooperation.4.a: "Tato akce v [SCOPE.sState('swadeshi_state').GetName] je bezvýznamná."
 india_non_cooperation.4.b: "Okamžitě zastavte ty agitátory v [SCOPE.sState('swadeshi_state').GetName]!"
 swadeshi_agitation: "Svadéšská agitace"
 successful_swadeshi_action: "Úspěšná svadéšská akce"
 suppressed_swadeshi_action: "Potlačená svadéšská akce"
 india_non_cooperation.5.t: "Hořící čaukí"
 india_non_cooperation.5.d: "Rostoucí radikalismus vyvolal střet mezi stoupenci svadéšského hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] a místní policií ve státě [SCOPE.sState('chauri_chaura_state').GetName]. Na protestující bylo zahájeno střelba a v reakci na to dav vypálil místní policejní stanici. Zástupci hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] působí zprávami o násilí viditelně otřeseni."
 india_non_cooperation.5.f: "Noviny se třásly v mužových rozechvělých rukou. Vzhlédl k mužům kolem sebe. „Tohle jsme nechtěli.“ Po tváři mu stekla slza. „Tohle jsem nechtěl, aby se z hnutí stalo. Musíme kampaň zastavit.“"
 india_non_cooperation.5.a: "Nenásilná nespolupráce není životaschopná."
 india_non_cooperation.5.b: "Možná je čas, aby měkkosrdcaté duše ustoupily stranou."
 indian_nationalist_leader_retires_tt: "[SCOPE.sCharacter('nonviolent_movement_leader').GetFullName] odejde z hnutí i z veškeré politické činnosti."
 failure_of_non_cooperation: "Selhání nespolupráce"
 india_non_cooperation.6.t: "Nedostatečná soběstačnost"
 india_non_cooperation.6.d: "Úsilí hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] zlomit sevření země [SCOPE.sCountry('probably_britain_scope').GetName] nad [SCOPE.sCountry('india_scope').GetAdjectiveNoFormatting] obchodem vyšumělo bez výrazných úspěchů."
 india_non_cooperation.6.f: "Zasedací síň působila poloprázdně, přestože byla malá, a navzdory všemu místu k sezení se každý muž uvnitř cítil stísněně, uvězněně. „Možná jsme žádali příliš mnoho,“ zamyslela se jedna postava zachmuřeně. „Možná jsme si mysleli, že naši utlačovatelé jsou slabší, než ve skutečnosti jsou. Možná národ vlastně není—“\n\n„Mlč, příteli,“ tiše zaprosil muž vedle něj. „Už teď nás to bolí dost.“"
 india_non_cooperation.6.a: "Je nedostatek vítězství skutečně porážkou?"
 india_non_cooperation.7.t: "Vítězství satjágrahy"
 india_non_cooperation.7.d: "Hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetName] dnes vyhlásilo velké vítězství, oslavilo [SCOPE.sCountry('india_scope').GetName] za triumf nad [SCOPE.sCountry('probably_britain_scope').GetAdjective] obchodem a společně učinilo monumentální krok vpřed jako národ i hnutí."
 india_non_cooperation.7.f: "Přístavní skladiště teď stála prázdná, ale tentokrát to bylo dobře. [SCOPE.sCountry('probably_britain_scope').GetNameNoFormatting] čelila síle [SCOPE.sCountry('india_scope').GetAdjectiveNoFormatting] národa a #italic prohrála#!, když veškerá její ekonomická moc a finanční sítě nedokázaly porazit prostou sílu sjednoceného lidu. Co čekalo hnutí [SCOPE.sPoliticalMovement('indian_independence_movement').GetNameNoFormatting] po vítězství nespolupráce a soběstačnosti dál?"
 india_non_cooperation.7.a: "Toto je velký den pro národní hnutí!"
 satyagraha_triumphant: "Triumfující satjágraha"
 satyagrahi: "Satjágrahí"
