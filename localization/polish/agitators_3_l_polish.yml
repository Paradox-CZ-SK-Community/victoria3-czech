 exiles_events.100.t: "Repatriace"
 exiles_events.100.d: "[SCOPE.sCharacter('repatriated_scope').GetFullName] se vrátil z exilu v zemi [SCOPE.sCountry('repatriator_country_scope').GetName] s podporou tamní vlády. Zdá se, že [SCOPE.sCountry('repatriator_country_scope').GetNameNoFormatting] mají důvod šířit ideologii [SCOPE.sCharacter('repatriated_scope').GetIdeology.GetName] v zemi [ROOT.GetCountry.GetName]."
 exiles_events.100.f: "Druhé šance přicházejí zřídka. Domov, který byl [SCOPE.sCharacter('repatriated_scope').GetHerHim] kdysi odepřen, nyní otevírá své dveře s podporou cizí mocnosti. Dříve ho zavrhli a dali přednost falešnému nebi stále tyranštějších hlasů. Druhá šance pro něj však znamená i druhou šanci pro sen. Pro skutečné bratrství. Možná jeho velké dílo přece jen přinese ovoce."
 exiles_events.100.a: "Vyhostili jsme ho z dobrého důvodu."
 exiles_events.100.b: "Vítej doma!"
 repatriated_agitator: "Repatriovaný agitátor"
 exiling_dissident_radicals_factors: "Množství [Concept('concept_radical','$concept_radicals$')] závisí na našem zákonu o svobodě projevu [Concept('concept_law', '$concept_laws$')] a na [concept_popularity] [concept_character]"
 ideology_positivist: "Pozitivista"
 ideology_positivist_desc: "Tato postava je zapálený technokrat a antiklerikál, opovrhující jak svévolnou mocí panovníků, tak vrtkavými náladami veřejnosti."
 law_technocracy: "Technokracie"
 law_technocracy_desc: "Země je řízena nevolenou radou mužů rozumu a schopností."
 technocracy.1.t: "Veřejný kolaps"
 technocracy.1.d: "Po sérii špatných obchodních rozhodnutí začal [SCOPE.sCharacter('technocrat_leader').GetFullName] útočit na své kritiky v bulvárním tisku. Tyto výpady zničily jeho veřejnou reputaci a poškodily podporu pro [GetLawType('law_technocracy').GetName]."
 technocracy.1.f: "„Nechť jsou velebeny nízké vášně v tomto divadle zatracených! Éra neosvíceného barbarství a puritánského populismu. Jen skutečně šílení by mohli odmítnout blahodárnou vládu osvícené menšiny. Proklínám vás, ztracené ovce! Možná byste tam měli zůstat, zatímco já a moji druhové budeme sklízet plody tak utopického systému, že se před jeho velikostí vše zachvěje. A tehdy budete #bold prosit#!, abyste byli jeho součástí! Pamatujte si má slova, pánové!“"
 technocracy.1.a: "Veřejná finanční pomoc problém vyřeší."
 technocracy.1.b: "Hanebné chování."
 technocracy.1.c: "Nechte ho zavřít do ústavu."
 foolish_technocrat: "Zdiskreditovaný technokrat"
 disgraced_technocrat: "Zdiskreditovaný technokrat"
 bailed_out_technocrat: "Zachráněný technokrat"
 technocracy.2.t: "Nový stroj"
 technocracy.2.d: "Skupina vlivných $engineers$ výrazně zvýšila produktivitu v [SCOPE.sBuilding('new_machine_building').GetName] ve státě [SCOPE.sState('new_machine_state').GetName] díky aplikaci vědeckých principů. Tvrdí, že za [GetLawType('law_technocracy').GetName] by mohli tyto principy uplatnit i na mechanismy vlády."
 technocracy.2.f: "Podstatou inteligence je pochopení vlastních omezení. Z toho plyne vědomí, že zkušenost je konečná a podmíněná perspektivou. Bez tohoto základu je lidská inteligence náchylná k pýše.\n\nNapříklad si někdo může myslet, že lze byrokracii chápat jako stroj, místo souboru dovedností. A tak zacházet s lidmi jako s problémy k řešení, nikoli jako s nezávislými proměnnými s vlastní zkušeností a inteligencí."
 technocracy.2.a: "Průmysl je potřebuje nejvíce."
 technocracy.2.b: "Fascinující návrh."
 new_machine_enactment: "Nový stroj"
 new_machine_state_mod: "Vědecký průmysl"
 new_machine_building_mod: "Lokalizovaný vědecký průmysl"
 technocracy.3.t: "Elitáři!"
 technocracy.3.d: "Mezi $academics$ na [SCOPE.sBuilding('university_building').GetName] ve státě [SCOPE.sState('university_state').GetName] probíhá debata o otázce vlády lidu versus vlády osvícené elity. Spor přitáhl pozornost veřejnosti kvůli snaze prosadit [GetLawType('law_technocracy').GetName]."
 technocracy.3.f: "„Dokud se filosofové nestanou králi v našich státech nebo ti, které nyní nazýváme králi a vládci, nezačnou vážně a dostatečně usilovat o filosofii, a dokud se nespojí tyto dvě věci - politická moc a filosofická inteligence - zatímco pestrý dav těch, kdo se nyní věnují jedné bez druhé, nebude nutně vyloučen, nebude, milý Glaukóne, konec trápení pro naše státy ani, myslím, pro lidské pokolení.“"
 technocracy.3.a: "Lidé potřebují velké mysli, aby poznaly, co je pro ně nejlepší."
 technocracy.3.b: "Alespoň se shodneme na odporu k $aristocrats$."
 technocracy_debate_enactment: "Debata o technokracii"
 anti_aristocratic_sentiment: "Protiaristokratické nálady"
 ATHEIST_CLERGYMEN: "Z ateistického [concept_religion|l]"
 rally_against_france: "Sjednocení proti Francii"
 natural_borders.4.t: "Stráž na Rýně"
 natural_borders.4.d: "[SCOPE.sCountry('france_scope').GetName] oznámila své ambice rozšířit své hranice od Savojska po Rýn. To vystavuje [SCOPE.sState('french_claim_state').GetName] značnému riziku invaze."
 natural_borders.4.f: "„Francouzi se od dob Bonaparta nic nenaučili. Pokud mají jedinou šavli nebo dělo, budou hledat záminku k boji.“\n\n„Můžeme počítat s novou aliancí, která by Francii zadržela? Poslední válka nás všechny zanechala tak vyčerpané, že stojí za to zachovat jakýkoli mír.“"
 natural_borders.4.f2: "Opakované invaze do těchto pohraničních oblastí zanechaly obyvatele pravého břehu plné hořkosti vůči Francouzům. Regionem se nyní šíří nová hymna, burácivá výzva všem německým rytířům, živým i mrtvým, k obraně proti dalšímu vpádu."
 natural_borders.4.a: "Svolat každého schopného muže k obraně domova."
 natural_borders.4.b: "Možná je uklidnění nejlepší cestou."
 notification_fra_natural_borders_notification_name: "Francouzské ambice"
 notification_fra_natural_borders_notification_desc: "[SCOPE.sCountry('france_scope').GetName] oznámila svůj záměr rozšířit se k „přirozeným hranicím“, od Atlantiku po Rýn."
 notification_fra_natural_borders_notification_tooltip: "#header $notification_fra_natural_borders_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_fra_natural_borders_notification_desc$"
 france_annex_luxembourg: "Koupě Lucemburska"
 france_annex_luxembourg_desc: "Lucembursko leží v našich přirozených hranicích a mělo by být součástí Francie. Možná by štědrá nabídka přesvědčila jeho vládce k prodeji."
 natural_borders.5.t: "Koupě Lucemburska"
 natural_borders.5.d: "[SCOPE.sCountry('lux_overlord').GetName] moudře souhlasil s našimi podmínkami pro koupi [SCOPE.sCountry('lux_scope').GetName]. Toto území se vrátilo na své právoplatné místo jako součást [ROOT.GetCountry.GetAdjective] země."
 natural_borders.5.f: "Pozoruhodné věci, které lze dělat s penězi — kupovat půdu, umlčet kritiku, najmout pracovní sílu — jsou s tím správným přístupem neomezené. S dostatkem peněz by si člověk mohl koupit i celou zemi."
 natural_borders.5.a: "Přirozené rozšíření našich hranic."
 luxembourg_payment: "Platby za Lucembursko"
 luxembourg_payment_received: "Přijaté platby za Lucembursko"
