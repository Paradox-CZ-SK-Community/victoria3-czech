 je_french_foreign_legion: "Francouzská cizinecká legie"
 je_french_foreign_legion_reason: "Pokud chceme vládnout v Africe, musíme na kontinentu vybudovat trvalou vojenskou přítomnost. Musíme být připraveni přijmout, že tyto jednotky budou rekrutovány z místního obyvatelstva i z odvážných či zoufalých vojáků cizích zemí."
 algeria_events.9.t: "Francouzská cizinecká legie"
 algeria_events.9.d: "Vybudováním stálé legionářské [SCOPE.sBuilding('legion_barracks').GetName] v [SCOPE.sState('algeria_state_scope').GetName], nazvané Quartier Viénot, byla [ROOT.GetCountry.GetAdjectiveNoFormatting] cizinecká legie ustanovena jako elitní bojová síla v Africe."
 algeria_events.9.f: "„Přišli jste přede mě jako Španělé, Němci či Italové. Někteří vedeni touhou po slávě, jiní povinností, další voláním po dobrodružství.\n\nVšichni však s ochotou prolévat krev za věc, která nebyla vaší vlastní.\n\nA co přede mnou stojí nyní? Legionáři! Muži s železnou vůlí, zocelenou pod spalujícím africkým sluncem. Muži, kteří by raději ztratili život než odvahu, i tváří v tvář nepřekonatelným překážkám. Muži, kteří přijímají naše motto nejen jako symbol, ale jako způsob života.“"
 algeria_events.9.a: "Čest a věrnost."
 algeria_events.9.b: "Legie je naše země."
