 wedding.2.t: "Hledání chotě"
 wedding.2.d: "[SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFullName] hledá partnera či partnerku urozeného původu."
 wedding.2.f: "„Matko, proč si nemůžu vzít [SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle]? Proč si [SCOPE.sCharacter('royal_marriage_character').GetSheHe] musí vzít nějakého cizího šlechtice?“\n\n„Jsme obyčejní lidé, drahá. Nepřísluší se, aby se vznešení snižovali na naši úroveň.“"
 wedding.2.a: "Člen rodu [SCOPE.sCountry('marriage_country_1').GetAdjective] z domu [SCOPE.sCharacter('foreign_ruler_1').GetLastName] by byl vhodný."
 wedding.2.b: "[SCOPE.sCharacter('foreign_ruler_2').GetPrimaryRoleTitle] ze země [SCOPE.sCountry('marriage_country_2').GetName] má vhodného příbuzného."
 wedding.2.c: "Královská rodina [SCOPE.sCountry('marriage_country_3').GetAdjective] by byla výbornou volbou."
 wedding.3.t: "Abdikace"
 wedding.3.d1: "Rozhořčen politickými událostmi, které znevýhodňují zájmovou skupinu [SCOPE.gsInterestGroup('monarch_ig').GetName] v zemi [ROOT.GetCountry.GetName], se [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('abdicating_monarch').GetFirstName] rozhodl abdikovat ve prospěch svého dědice, [SCOPE.sCharacter('heir_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('heir_scope').GetFullName]."
 wedding.3.d2: "Uvědomujíc si, že jeho nedostatek [concept_popularity] může instituci [SCOPE.sLawType('monarchy_law').GetName] spíše škodit než prospívat, se [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('abdicating_monarch').GetFirstName] rozhodl abdikovat ve prospěch [SCOPE.sCharacter('heir_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('heir_scope').GetFullName]."
 wedding.3.d3: "Zdravotní stav [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] [SCOPE.sCharacter('abdicating_monarch').GetFirstName] způsobil, že se stal neschopným vládnout. Ve vzácném okamžiku jasnozřivosti [SCOPE.sCharacter('abdicating_monarch').GetSheHe] souhlasil s abdikací ve prospěch [SCOPE.sCharacter('heir_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('heir_scope').GetFullName]."
 wedding.3.f: "„Říká se, že [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] se zbláznil. Prý se pokusil oženit se svým koněm nebo tak něco.“\n\n„Jaké nesmysly čteš v [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]? Jde o vznešenější záležitosti, zjevně související se situací [SCOPE.gsInterestGroup('monarch_ig').GetNameNoFormatting].“\n\n„Není to nic složitého. Všichni toho [SCOPE.sCharacter('abdicating_monarch').GetPrimaryRoleTitle] nenávidí, takže musí pryč. Prostá demokracie.“"
 wedding.3.a: "Uspořádat soukromou, elitní korunovaci."
 wedding.3.b: "Uspořádat velkolepou veřejnou korunovaci."
