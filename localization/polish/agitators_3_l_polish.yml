 orleanist_button: "Podpořit orleanisty"
 orleanist_button_desc: "Budoucnost Francie bude financována obchodem a průmyslem. Potřebujeme panovníka, který bude naslouchat obavám našich nejbohatších občanů."
 legitimist_button: "Podpořit legitimisty"
 legitimist_button_desc: "Francie byla zkažena dekadencí revoluce. Musíme se vrátit ke starému způsobu vlády, kdy lidé znali své místo."
 french_pretenders.5.t: "Pretendenti na trůn"
 french_pretenders.5.d: "Tři dynastie si činí nárok na francouzský trůn: linie [SCOPE.sCharacter('orleanist_character').GetIdeology.GetName] podporuje konstituční červencovou monarchii, linie [SCOPE.sCharacter('legitimist_character').GetIdeology.GetName] stojí za potomky Karla X., zatímco linie [SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName] usiluje o obnovení Napoleonova francouzského císařství."
 french_pretenders.5.f: "Tři rody povstaly, aby si nárokovaly jednu korunu. Kdysi úhlavní nepřítel Říma, poté klenot křesťanstva a nyní... dědicové nejisté budoucnosti. Dny revoluce jsou ve francouzské mysli stále čerstvé. Další, tak brzy, by mohla znamenat katastrofu. Krev může téct ulicemi, než bude tato záležitost skutečně vyřešena."
