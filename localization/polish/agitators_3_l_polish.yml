l_polish:
 je_french_natural_borders: "Přirozené hranice Francie"
 je_french_natural_borders_reason: "Ve Francii se opět objevují expanzionistické tendence. Občané, nebo alespoň ti nejhlasitější, požadují, aby naše hranice sahaly až k břehům Rýna a svahům Alp."
 own_all_french_homelands: "Vlastnit všechny francouzské domovské státy"
 natural_borders.1.t: "Hranice národa"
 natural_borders.1.d: "Představa „přirozených hranic“ si získala popularitu mezi stoupenci režimu [SCOPE.sCharacter('borders_leader').GetLastName]. Francouzští patrioti požadují rozšíření [ROOT.GetCountry.GetAdjective] státu do sousedních oblastí."
 natural_borders.1.f: "„Hranice Francie jsou dány přírodou. Dosáhneme obzoru, od břehů [SCOPE.sState('rhineland_state').GetStateRegion.GetNameNoFormatting], přes hory [SCOPE.sState('savoy_state').GetStateRegion.GetNameNoFormatting], až po pobřeží [SCOPE.sState('flanders_state').GetStateRegion.GetNameNoFormatting]. Tam musí ležet hranice našeho národa.“"
 natural_borders.1.a: "Naše hranice musí dosáhnout Rýna."
 natural_borders.1.b: "To je absurdní představa."
 dismiss_natural_borders_tt: "Záznam v deníku „Přirozené hranice Francie“ bude zrušen"
 natural_borders.2.t: "Přirozené hranice Francie"
 natural_borders.2.d: "Nyní, když se [ROOT.GetCountry.GetName] rozprostírá až k vzdáleným oblastem Rýna a Alp, jsme dosáhli toho, co zastánci tohoto projektu nazývají „přirozenými hranicemi“. Nyní musíme spravovat nově získaná území."
 natural_borders.2.f: "Rýnský úředník přivítal nově příchozího. V poslední době přicházelo mnoho lidí ze západu. Vytáhl formulář a začal psát.\n„Ano, herr—ehm, monsieur. Vaše jméno?“\n„Jean Robert.“\n„Věk?“\n„Třicet jedna.“\n„Povolání?“\n„Ah non, mon ami! Jen na návštěvě.“"
 natural_borders.2.a: "Musí se naučit být Francouzi."
 natural_borders.2.b: "Sláva hrdinům [ROOT.GetCountry.GetName]!"
 natural_borders.2.c: "Jsme osvoboditelé Galie."
 natural_borders.3.t: "Turínská smlouva"
 natural_borders.3.d: "[SCOPE.sCountry('savoy_country').GetName] souhlasilo s postoupením států [SCOPE.sState('savoy_state').GetName] a [SCOPE.sState('nice_state').GetName] [ROOT.GetCountry.GetName]."
 natural_borders.3.d2: "[SCOPE.sCountry('savoy_country').GetName] souhlasilo s postoupením státu [SCOPE.sState('savoy_state').GetName] [ROOT.GetCountry.GetName]."
 natural_borders.3.f: "„Nejmocnější důvody politické nutnosti, požadavky budoucnosti Itálie, pocit vděčnosti vůči našemu mocnému spojenci a konečně i výjimečné okolnosti naší země přiměly, byť s lítostí, našeho milovaného [SCOPE.sCharacter('savoy_ruler').GetPrimaryRoleTitle] k oddělení provincií, které byly po tolik století úzce spjaty s naším národem. Veškerý odpor musí ustoupit zájmům země a smyslu pro povinnost.“"
 natural_borders.3.a: "Okamžitě začlenit Savojsko."
 natural_borders.3.b: "Uspořádat plebiscit, aby se uklidnilo obyvatelstvo."
 france_natural_borders_pursuit: "Prosazování přirozených hranic"
 no_natural_borders: "Odmítnuté přirozené hranice Francie"
 natural_borders_assimilation: "Francouzská asimilace"
 natural_borders_achieved: "Dosažené přirozené hranice"
 france_annex_savoy: "Turínská smlouva"
 france_annex_savoy_desc: "Savojsko je přirozenou součástí francouzského národa a domovem mnoha lidí, kteří se již považují za Francouze. Může být možné přesvědčit jejich vládce k postoupení území diplomatickou cestou."
 obligation_for_savoy_tt: "Vyměníme náš závazek za Savojsko a případně i Nice"
 sell_savoy: "Turínská smlouva"
 sell_savoy_desc: "Savojsko se stalo předmětem sporu mezi naší zemí a Francií. Pokud budeme ochotni jej postoupit, Francie se bude považovat za našeho dlužníka."
 at_peace_nocontext_tt: "Je v míru"
 relations_amicable_nocontext_tt: "Vztahy jsou alespoň přátelské"
 je_coup: "Puč!"
 je_coup_reason: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] plánuje puč proti našim demokratickým institucím s cílem převzít kontrolu nad vládou a nastolit režim více nakloněný jejich zájmům."
 je_coup_goal: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] je připravena provést puč"
 coup_no_progress: "Puč nepostupuje"
 coup_remove_ig: "Pokud je zájmová skupina během plánování puče odstraněna z vlády, její podpora bude výrazně snížena"
 coup_advancing: "Očekává se, že puč bude postupovat"
 coup_declining: "Očekává se, že puč bude ztrácet na síle"
 coup_success_tt: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] okamžitě prosadí zákon [SCOPE.sLaw('coup_desired_law').GetName]"
 coup.1.t: "Plánování puče"
 coup.1.d: "[SCOPE.sCharacter('coup_leader').GetFullName] začal být nespokojen s institucemi vlády [ROOT.GetCountry.GetAdjectiveNoFormatting]. Mezi [SCOPE.gsInterestGroup('golpista_ig').GetName] se formuje spiknutí s cílem provést puč proti vládě a zavést [SCOPE.sLaw('coup_desired_law').GetName]."
 coup.1.f: "„Co si myslíš o tom projevu [SCOPE.sCharacter('coup_leader').GetFirstNameNoFormatting] před chvílí?“\n„Je to radikální návrh. Ale těžké časy vyžadují, aby se velcí muži ujali vedení.“\n„Uvidí to tak i lid?“\n„Musí to tak vidět.“"
 coup.1.a: "Ďábelsky půvabné."
 coup.1.b: "Pozorně sleduj [SCOPE.sCharacter('coup_leader').GetFullName]."
 coup.2.t: "Puč!"
 coup.2.d: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] úspěšně zorganizovala puč proti demokracii [ROOT.GetCountry.GetAdjective]. [SCOPE.sCharacter('coup_leader').GetFullName] vyhlásil stav národní nouze, což mu umožňuje vést zemi jako [SCOPE.sLaw('coup_desired_law').GetName]."
 coup.2.d2: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] úspěšně zorganizovala puč proti státu [ROOT.GetCountry.GetAdjective]. Jako odvážný první krok [SCOPE.sCharacter('coup_leader').GetFullName] vyhlásil vznik [SCOPE.sLaw('monarchy_law').GetName] pod absolutistickou vládou."
 coup.2.d3: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] úspěšně zorganizovala puč proti státu [ROOT.GetCountry.GetAdjective]. [SCOPE.sCharacter('coup_leader').GetFullName] prohlásil předchozí vládu za nelegitimní a vyhlásil vznik [SCOPE.sLaw('coup_desired_law').GetName] pod dočasnou absolutní vládou."
 coup.2.d4: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] úspěšně zorganizovala puč proti státu [ROOT.GetCountry.GetAdjective]. [SCOPE.sCharacter('coup_leader').GetFullName] odsoudil buržoazní diktaturu předchozí vlády a vyhlásil vznik [SCOPE.sLaw('coup_desired_law').GetName] pod dočasnou absolutní vládou."
 coup.2.d5: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] úspěšně zorganizovala puč proti státu [ROOT.GetCountry.GetAdjective]. [SCOPE.sCharacter('coup_leader').GetFullName] označil předchozí vládu za urážku [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] a vyhlásil vznik [SCOPE.sLaw('coup_desired_law').GetName] pod dočasnou absolutní vládou."
 coup.2.f: "„Rychle, dovnitř! Za chvíli začne zákaz vycházení.“ Dveře se zabouchly o něco hlasitěji, než by bylo zdrávo.\n„Nechceš narazit na grázly [SCOPE.sCharacter('coup_leader').GetLastNameNoFormatting]. Vidí odpůrce i v konvici na čaj.“ Zvuk těžkých kroků se blížil a oni se bránili nutkání podívat se z okna.\n„Zastřelili ty staré politiky, víš, přímo u zdí paláce.“\n„Ticho! Jsou tady. Zhasni tu svíčku.“\nZa dveřmi bylo slyšet šourání bot a tlumené hlasy. Naštěstí se dlouho nezdrželi."
 coup.2.a: "[ROOT.GetCountry.GetNameNoFormatting] potřebuje silného vůdce."
 coup.2.b: "Ať žije monarchie!"
 coup.2.c: "Ať žije republika!"
 coup.2.e: "Za slávu [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]!"
 coup.2.g: "Ať žije diktatura proletariátu!"
 coup.3.t: "Pokus o puč zmařen"
 coup.3.d: "[SCOPE.sCharacter('coup_leader').GetFullName] byl rázně odstraněn od moci ještě předtím, než mohl provést svůj puč a zavést [SCOPE.sLaw('coup_desired_law').GetName]. Demokracie sice prozatím přežila, ale [SCOPE.gsInterestGroup('golpista_ig').GetName] nesou svůj politický exil velmi nelibě."
 coup.3.f: "„Předpokládám, že když spolu mluvíme tak otevřeně, plán proběhl bez problémů?“\n\n„Bez problémů?! Zbláznil ses? Skončilo to dřív, než to vůbec začalo. A rozhodně ne bez tvé pomoci! Kde jsi sakra byl?“\n\n„Ach, prostě jsem nemohl přijít. Naléhavá rodinná záležitost, moje teta má dnu, víš. Ale zní to alespoň tak, že to mohlo dopadnout i hůř.“"
 coup.3.a: "Nech [SCOPE.sCharacter('coup_leader').GetFullName] zatknout a popravit."
 coup.3.b: "Odhal [SCOPE.gsInterestGroup('golpista_ig').GetName] jako zrádce [ROOT.GetCountry.GetName]."
 coup.3.c: "Vyhni se dalšímu popuzování [SCOPE.gsInterestGroup('golpista_ig').GetName]."
 coup.5.t: "[SCOPE.gsInterestGroup('golpista_ig').GetName] opouští vládu"
 coup.5.d: "Zájmová skupina [SCOPE.gsInterestGroup('golpista_ig').GetName] zcela opustila vládu. Zavedení [SCOPE.sLaw('coup_desired_law').GetName] bude pravděpodobně prosazeno na bojišti spíše než v sálech vlády."
 coup.5.f: "„Vidíme tedy, že válka není pouze politickým aktem, ale také skutečným politickým nástrojem, pokračováním politického styku, jeho uskutečněním jinými prostředky. Vše ostatní, co je válce vlastní, se vztahuje pouze ke zvláštní povaze prostředků, které používá.“\n\n— Carl von Clausewitz, #italic O válce#!"
 coup.5.a: "Krysy se rozprchnou, jakmile na ně dopadne světlo."
 coup.5.b: "Ať je [SCOPE.sCharacter('coup_leader').GetFullName], ať už poražen či ne, navždy znám jako zrádce."
